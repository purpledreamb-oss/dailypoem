  "author": "宋・辛棄疾",
  "body": [
   "連雲松竹，萬事從今足。",
   "拄杖東家分社肉，白酒床頭初熟。",
   "",
   "西風梨棗山園，兒童偷把長竿。",
   "莫遣旁人驚去，老夫靜處閒看。"
  ],
  "note": "看兒童偷打梨棗，老來的閒適勝過功名。"
 },
 {
  "title": "新城道中",
  "author": "宋・蘇軾",
  "body": [
   "東風知我欲山行，吹斷簷間積雨聲。",
   "嶺上晴雲披絮帽，樹頭初日掛銅鉦。",
   "野桃含笑竹籬短，溪柳自搖沙水清。",
   "西崦人家應最樂，煮芹燒筍餉春耕。"
  ],
  "note": "東風善解人意吹散積雨，山行處處是春色。"
 },
 {
  "title": "暑旱苦熱",
  "author": "宋・王令",
  "body": [
   "清風無力屠得熱，落日著翅飛上山。",
   "人固已懼江海竭，天豈不惜河漢乾？",
   "崑崙之高有積雪，蓬萊之遠常遺寒。",
   "不能手提天下往，何忍身去遊其間！"
  ],
  "note": "天下苦熱而己不能救，是仁者最深的不忍。"
 },
 {
  "title": "思遠人・紅葉黃花秋意晚",
  "author": "宋・晏幾道",
  "body": [
   "紅葉黃花秋意晚，千里念行客。",
   "飛雲過盡，歸鴻無信，何處寄書得？",
   "",
   "淚彈不盡臨窗滴，就硯旋研墨。",
   "漸寫到別來，此情深處，紅箋為無色。"
  ],
  "note": "淚滴研墨寫情書，寫到深處紅箋都褪了色。"
 },
 {
  "title": "如夢令・昨夜雨疏風驟",
  "author": "宋・李清照",
  "body": [
   "昨夜雨疏風驟，濃睡不消殘酒。",
   "試問捲簾人，卻道海棠依舊。",
   "知否，知否？應是綠肥紅瘦。"
  ],
  "note": "風雨之後綠肥紅瘦，春天的美總是短暫的。"
 },
 {
  "title": "長相思・吳山青",
  "author": "宋・林逋",
  "body": [
   "吳山青，越山青，兩岸青山相送迎。誰知離別情？",
   "",
   "君淚盈，妾淚盈，羅帶同心結未成。江頭潮已平。"
  ],
  "note": "兩岸青山相迎送，卻不知人間的離別之苦。"
 },
 {
  "title": "鵲橋仙・華燈縱博",
  "author": "宋・陸游",
  "body": [
   "華燈縱博，雕鞍馳射，誰記當年豪舉。",
   "酒徒一半取封侯，獨去作、江邊漁父。",
   "",
   "輕舟八尺，低篷三扇，占斷蘋洲煙雨。",
   "鏡湖元自屬閒人，又何必、官家賜與。"
  ],
  "note": "鏡湖本屬閒人，何須等官家賜予。"
 },
 {
  "title": "過松源晨炊漆公店",
  "author": "宋・楊萬里",
  "body": [
   "莫言下嶺便無難，賺得行人空喜歡。",
   "正入萬山圈子裏，一山放過一山攔。"
  ],
  "note": "人生如行山路，過了一山還有一山攔。"
 },
 {
  "title": "浣溪沙・門隔花深夢舊遊",
  "author": "宋・吳文英",
  "body": [
   "門隔花深夢舊遊，夕陽無語燕歸愁。玉纖香動小簾鉤。",
   "",
   "落絮無聲春墮淚，行雲有影月含羞。東風臨夜冷於秋。"
  ],
  "note": "落絮無聲如春在墮淚，行雲有影似月在含羞。"
 },
 {
  "title": "祝英臺近・荷花",
  "author": "宋・高觀國",
  "body": [
   "擁紅妝，翻翠蓋，花影暗南浦。",
   "笑攜來、粉蝶不知，遊人立日暮。",
   "芳心只願託丹青，寫真留佳句。",
   "又攜去、一陣晚涼歸路。",
   "",
   "別離處。暗想年少遊蕩，如今情緒。",
   "水邊燈火漸人行，天外一鉤殘照與。"
  ],
  "note": "荷花如紅妝翠蓋，年少遊蕩的記憶最難忘。"
 },
 {
  "title": "訴衷情近・雨晴氣爽",
  "author": "宋・柳永",
  "body": [
   "雨晴氣爽，佇立江樓望處。",
   "澄明遠水生光，重疊暮山聳翠。",
   "遙認斷橋幽徑，隱隱漁村，向晚孤煙起。",
   "",
   "殘陽裏，脈脈朱闌靜倚。",
   "黯然情緒，未飲先如醉。",
   "愁無際。暮雲過了，秋光老盡，故人千里。",
   "竟日空凝睇。"
  ],
  "note": "未飲先醉是因為愁太深，故人千里望不盡。"
 },
 {
  "title": "浪淘沙・疏雨洗天清",
  "author": "宋・邓剡",
  "body": [
   "疏雨洗天清，枕簟涼生。",
   "井桐一葉做秋聲。誰念客身輕似葉，千里飄零？",
   "",
   "夢斷古臺城，月淡潮平。",
   "便須攜酒訪新亭。不見當時王謝宅，煙草青青。"
  ],
  "note": "客身輕似秋葉千里飄零，舊時王謝已成煙草。"
 },
 {
  "title": "夜直",
  "author": "宋・王安石",
  "body": [
   "金爐香盡漏聲殘，翦翦輕風陣陣寒。",
   "春色惱人眠不得，月移花影上欄杆。"
  ],
  "note": "月移花影上欄杆，春夜美到令人無法入眠。"
 },
 {
  "title": "臨江仙・斗轉星橫乍曙",
  "author": "宋・張先",
  "body": [
   "自是花中第一流，不須格外結風流。",
   "霜毫拂拭意如意，誰料東風欲倦時。",
   "",
   "待約箇梅魁，未開時先有香飛。",
   "沉吟久坐西窗下，人不知春在哪裏。"
  ],
  "note": "梅花未開香先飄，最美的事物往往不張揚。"
 },
 {
  "title": "感皇恩・讀莊子聞朱晦庵即世",
  "author": "宋・辛棄疾",
  "body": [
   "案上數編書，非莊即老。",
   "會說忘言始知道。萬言千句，不自能忘堪笑。",
   "今朝梅雨霽，青天好。",
   "",
   "一壑一丘，也須殊自了。",
   "大廈將顛一木少。人間奇禍，誰能料。"
  ],
  "note": "萬言千句不如忘言知道，天晴之後看淡萬事。"
 },
 {
  "title": "江梅引・憶江梅",
  "author": "宋・洪皓",
  "body": [
   "天涯除館憶江梅，幾枝開？使南來。",
   "還帶餘杭、春信到燕臺。",
   "準擬寒英聊慰遠，隔山水，應銷落，赴訴誰。",
   "",
   "空恁遐想笑摘蕊，斷回腸，思故里。",
   "漫彈綠綺，引三弄、不覺魂飛。",
   "更聽胡笳，哀怨淚沾衣。",
   "亂插繁花須異日，待歸去、對影飲，一杯時。"
  ],
  "note": "天涯除館思故里，梅花香信隔山水也寄不到。"
 },
 {
  "title": "水調歌頭・和馬叔度遊月波樓",
  "author": "宋・辛棄疾",
  "body": [
   "客子久不到，好景為君留。",
   "西樓著意吟賞，何必問更籌？",
   "喚起一天明月，照我滿懷冰雪，浩蕩百川流。",
   "鯨飲未吞海，劍氣已橫秋。",
   "",
   "野光浮，天宇迥，物華幽。",
   "中州遺恨，不知今夜幾人愁？",
   "誰念英雄老矣？不道功名蕞爾，決策尚悠悠。",
   "此事費分說，來日且扶頭。"
  ],
  "note": "喚起明月照冰雪胸懷，英雄老矣壯心未已。"
 },
 {
  "title": "菩薩蠻・歸鴻聲斷殘雲碧",
  "author": "宋・李清照",
  "body": [
   "歸鴻聲斷殘雲碧，背窗雪落爐煙直。",
   "燭底鳳釵明，釵頭人勝輕。",
   "",
   "角聲催曉漏，曙色回牛斗。",
   "春意看花難，西風留舊寒。"
  ],
  "note": "雪落爐煙直的清冷中，春意難覓西風猶寒。"
 },
 {
  "title": "清平樂・年年雪裏",
  "author": "宋・李清照",
  "body": [
   "年年雪裏，常插梅花醉。",
   "挼盡梅花無好意，贏得滿衣清淚。",
   "",
   "今年海角天涯，蕭蕭兩鬢生華。",
   "看取晚來風勢，故應難看梅花。"
  ],
  "note": "從插梅花醉到無心看梅花，是一個人的滄桑史。"
 },
 {
  "title": "念奴嬌・梅",
  "author": "宋・辛棄疾",
  "body": [
   "疏疏淡淡，問阿誰、堪比天真顏色。",
   "笑殺東君虛占斷，多少朱朱白白。",
   "雪裏溫柔，水邊明秀，不借春工力。",
   "骨清香嫩，迥然天與奇絕。",
   "",
   "嘗記寶篽寒輕，瑣窗人睡起，玉纖輕摘。",
   "漂泊天涯空瘦損，猶有當年標格。",
   "萬里風煙，一溪霜月，未怕欺他得。",
   "不如歸去，閣樓仙蕊曾識。"
  ],
  "note": "梅花不借春工力，骨清香嫩天賦奇絕。"
 },
 {
  "title": "臨江仙・都城元夕",
  "author": "宋・毛滂",
  "body": [
   "聞道長安燈夜好，雕輪寶馬如雲。",
   "蓬萊高處步青雲。東風吹鼓角，雪暗鳳城春。",
   "",
   "闇記年時沽酒處，淡月胭脂小巷深。",
   "花間竹裏有清尊。梨花寒食夜，深院小桃春。"
  ],
  "note": "記得當年沽酒處，淡月胭脂巷深深。"
 },
 {
  "title": "臨江仙・高詠楚辭酬午日",
  "author": "宋・陳與義",
  "body": [
   "高詠楚辭酬午日，天涯節序匆匆。",
   "榴花不似舞裙紅。無人知此意，歌罷滿簾風。",
   "",
   "萬事一身傷老矣，戎葵凝笑牆東。",
   "酒杯深淺去年同。試澆橋下水，今夕到湘中。"
  ],
  "note": "端午天涯漂泊，酒澆橋下水寄思念到湘中。"
 },
 {
  "title": "登岳陽樓",
  "author": "宋・陳與義",
  "body": [
   "洞庭之東江水西，簾旌不動夕陽遲。",
   "登臨吳蜀橫分地，徙倚湖山欲暮時。",
   "萬里來遊還望遠，三年多難更憑危。",
   "白頭弔古風霜裏，老木滄波無限悲。"
  ],
  "note": "萬里漂泊三年多難，白頭弔古老木滄波。"
 },
 {
  "title": "山中",
  "author": "宋・林逋",
  "body": [
   "結茅臨水石，淡寂益閒吟。",
   "久雨寒蟬少，空山落葉深。",
   "危樓乘月上，遠寺聽鐘尋。",
   "昨得江僧信，期來此息心。"
  ],
  "note": "空山落葉深處，結茅而居息心閒吟。"
 },
 {
  "title": "戚氏・晚秋天",
  "author": "宋・柳永",
  "body": [
   "晚秋天，一霎微雨灑庭軒。",
   "檻菊蕭疏，井梧零亂惹殘煙。",
   "淒然，望江關，飛雲黯淡夕陽間。",
   "當時宋玉悲感，向此臨水與登山。",
   "遠道迢遞，行人淒楚，倦聽隴水潺湲。",
   "",
   "正蟬吟敗葉，蛩響衰草，相應喧喧。",
   "孤館度日如年。風露漸變，悄悄至更闌。",
   "長天淨，絳河清淺，皓月嬋娟。",
   "思綿綿，夜永對景那堪，屈指暗想從前。"
  ],
  "note": "晚秋天孤館如年，屈指暗想從前的溫暖。"
 },
 {
  "title": "歸朝歡・別岸扁舟三兩隻",
  "author": "宋・柳永",
  "body": [
   "別岸扁舟三兩隻，葭葦蕭蕭風淅淅。",
   "沙汀宿雁破煙飛，溪橋殘月和霜白。",
   "漸漸分曙色，路遙山遠多行役。",
   "往來人，只輪雙槳，盡是利名客。",
   "",
   "一望鄉關煙水隔，轉覺歸心生羽翼。",
   "愁雲恨雨兩牽縈，新春殘臘相催逼。",
   "歲華都瞬息，浪萍風梗誠何益。",
   "歸去來，玉樓深處，有箇人相憶。"
  ],
  "note": "利名路上往來奔波，不如歸去，有人在深處相憶。"
 },
 {
  "title": "木蘭花慢・送歸雲去雁",
  "author": "宋・張先",
  "body": [
   "送歸雲去雁，淡寒採、滿溪樓。正沙淨草枯，水平天遠，雪月交輝。",
   "誰信有書來，沙鶻過，千里暮雲收。",
   "",
   "回首重城不見，寒江天際流。",
   "寄語東陽道上人，莫教辜負了春遊。",
   "吳山越水間，多少閒愁。"
  ],
  "note": "千里暮雲收盡時，寒江天際獨自流。"
 },
 {
  "title": "夢玉人引・送行甚麼是離拆",
  "author": "宋・周邦彥",
  "body": [
   "送行甚麼是離拆，意緒繁蕪如織。",
   "淚染面、酒添顏色。",
   "拊掌笑人間，萬事復何益？",
   "",
   "小簾鉤，見月明遠岫色。",
   "記昨宵有約，只恐歸來遲卻。",
   "更待寒潮退了，又鬱鬱重離側。"
  ],
  "note": "送行時萬般滋味交織，小簾鉤月明徒增離愁。"
 },
 {
  "title": "好事近・夢中作",
  "author": "宋・周邦彥",
  "body": [
   "浮花浪蕊都盡，伴君幽獨。",
   "忍把千金酬一笑？畢竟相思，不似相逢好。",
   "",
   "錦幄初溫，獸煙不斷，一曲能教腸寸結。"
  ],
  "note": "浮花浪蕊散盡，唯留幽獨的陪伴。"
 },
 {
  "title": "水調歌頭・把酒對斜日",
  "author": "宋・楊炎正",
  "body": [
   "把酒對斜日，無語問西風。",
   "胭脂何事，都做顏色染芙蓉。",
   "放眼暮江千頃，中有離愁萬斛，無處落征鴻。",
   "天在闌干角，人倚醉醒中。",
   "",
   "千萬里，江南北，浙西東。",
   "吾生如寄，尚想三徑菊花叢。",
   "誰是中州豪傑？借我五湖舟楫，去作釣魚翁。",
   "故國且回首，此意莫匆匆。"
  ],
  "note": "萬斛離愁無處安放，不如借五湖舟楫做釣翁。"
 },
 {
  "title": "卜算子・片片蝶衣輕",
  "author": "宋・劉克莊",
  "body": [
   "片片蝶衣輕，點點猩紅小。",
   "道是天公不惜花，百種千般巧。",
   "",
   "朝見樹頭繁，暮見枝頭少。",
   "道是天公果惜花，雨洗風吹了。"
  ],
  "note": "天公惜花或不惜花，終究風雨吹落無情。"
 },
 {
  "title": "水調歌頭・隱括杜牧之齊山詩",
  "author": "宋・朱熹",
  "body": [
   "江水浸雲影，鴻雁欲南飛。",
   "攜壺結客，何處空翠渺煙霏。",
   "塵世難逢一笑，況有紫萸黃菊，堪插滿頭歸。",
   "風景今朝是，身世昔人非。",
   "",
   "酬佳節，須酩酊，莫相違。",
   "人生如寄，何事辛苦怨斜暉。",
   "無盡今來古往，多少春花秋月，那更有危機。",
   "與問牛山客，何必獨沾衣。"
  ],
  "note": "人生如寄何須怨，春花秋月盡可酩酊歸。"
 },
 {
  "title": "望海潮・洛陽懷古",
  "author": "宋・秦觀",
  "body": [
   "梅英疏淡，冰澌溶洩，東風暗換年華。",
   "金谷俊遊，銅駝巷陌，新晴細履平沙。",
   "長記誤隨車，正絮翻蝶舞，芳思交加。",
   "柳下桃蹊，亂分春色到人家。",
   "",
   "西園夜飲鳴笳。有華燈礙月，飛蓋妨花。",
   "蘭苑未空，行人漸老，重來是事堪嗟。",
   "煙暝酒旗斜。但倚樓極目，時見棲鴉。",
   "無奈歸心，暗隨流水到天涯。"
  ],
  "note": "東風暗換年華，歸心暗隨流水到天涯。"
 },
 {
  "title": "沁園春・孤館燈青",
  "author": "宋・蘇軾",
  "body": [
   "孤館燈青，野店雞號，旅枕夢殘。",
   "漸月華收練，晨霜耿耿；雲山摛錦，朝露漙漙。",
   "世路無窮，勞生有限，似此區區長鮮歡。",
   "微吟罷，憑征鞍無語，往事千端。",
   "",
   "當時共客長安，似二陸初來俱少年。",
   "有筆頭千字，胸中萬卷；致君堯舜，此事何難？",
   "用舍由時，行藏在我，袖手何妨閒處看。",
   "身長健，但優游卒歲，且鬥尊前。"
  ],
  "note": "用舍由時行藏在我，身長健且優遊卒歲。"
 },
 {
  "title": "八聲甘州・記玉關踏雪事清遊",
  "author": "宋・張炎",
  "body": [
   "記玉關踏雪事清遊，寒氣脆貂裘。",
   "傍枯林古道，長河飲馬，此意悠悠。",
   "短夢依然江表，老淚灑西州。",
   "一字無題處，落葉都愁。",
   "",
   "載取白雲歸去，問誰留楚佩，弄影中洲？",
   "折蘆花贈遠，零落一身秋。",
   "向尋常、野橋流水，待招來、不是舊沙鷗。",
   "空懷感、有斜陽處，卻怕登樓。"
  ],
  "note": "折蘆花贈遠人，零落一身秋色是最深的懷念。"
 },
 {
  "title": "念奴嬌・登石頭城次東坡韻",
  "author": "宋・辛棄疾",
  "body": [
   "倚空絕壁，直下江千尺。天際兩蛾凝黛，愁與恨、幾時極！",
   "暮潮風正急，酒闌聞塞笛。",
   "試問憂愁都幾許？依舊是、山河如此。",
   "",
   "半江帶雨蒼烟闊，翠色暮雲閒。",
   "回首六朝形勝地，惟有青山。"
  ],
  "note": "江千尺壁立萬仞，六朝形勝唯餘青山。"
 },
 {
  "title": "減字木蘭花・賣花擔上",
  "author": "宋・李清照",
  "body": [
   "賣花擔上，買得一枝春欲放。",
   "淚染輕勻，猶帶彤霞曉露痕。",
   "",
   "怕郎猜道，奴面不如花面好。",
   "雲鬢斜簪，徒要教郎比並看。"
  ],
  "note": "買花與郎比美的嬌俏，是少女最可愛的心思。"
 },
 {
  "title": "關山月",
  "author": "宋・陸游",
  "body": [
   "和戎詔下十五年，將軍不戰空臨邊。",
   "朱門沉沉按歌舞，廄馬肥死弓斷弦。",
   "戍樓刁斗催落月，三十從軍今白髮。",
   "笛裏誰知壯士心，沙頭空照征人骨。",
   "中原干戈古亦聞，豈有逆胡傳子孫！",
   "遺民忍死望恢復，幾處今宵垂淚痕。"
  ],
  "note": "將軍不戰歌舞昇平，遺民望恢復淚痕幾處。"
 },
 {
  "title": "玉蝴蝶・為甚夜來添病",
  "author": "宋・吳文英",
  "body": [
   "為甚夜來添病，強臨杯酒、怯對花枝。",
   "恁時攜手處，回頭萬里，只在良宵如夢中。",
   "",
   "紅蠟淚落成堆，寒食近、花下偷期。",
   "月明千里夢相思。"
  ],
  "note": "月明千里的夢中相思，是病中最真摯的牽掛。"
 },
 {
  "title": "瑞鶴仙・賦梅",
  "author": "宋・辛棄疾",
  "body": [
   "雁霜寒透幕，正護月雲輕，嫩冰猶薄。",
   "溪奩照梳掠，想含香弄粉，豔妝難學。",
   "玉肌瘦弱，更重重、龍綃襯著。",
   "倚東風、一笑嫣然，轉盼萬花羞落。",
   "",
   "寂寞，家山何在？雪後園林，水邊籬落。",
   "瑤池舊約，鱗鴻更無信，好音難託。",
   "倩誰摘取，寄贈情人桃葉？秦鏡高明裏、也應細觀容顏老却。"
  ],
  "note": "梅花玉肌嫣然一笑，萬花皆羞，寂寞更無人知。"
 },
 {
  "title": "鹧鸪天・化度寺作",
  "author": "宋・吳文英",
  "body": [
   "池上紅衣伴倚闌，棲鴉常帶夕陽還。",
   "殷雲度雨疏橋畔，明月生涼古殿間。",
   "",
   "鄉夢窄，水天寬。小窗愁黛淡秋山。",
   "吳鴻好為傳歸信，楊柳閶門屋數間。"
  ],
  "note": "鄉夢太窄裝不下水天之寬，只盼鴻雁傳歸信。"
 },
 {
  "title": "蘇武慢・雁落平沙",
  "author": "宋・蔡伸",
  "body": [
   "雁落平沙，煙籠寒水，古壘鳴笳聲斷。",
   "青山隱隱，敗葉蕭蕭，天際暝鴉零亂。",
   "黯銷凝，追想當年事，花月夜、人在秦樓。",
   "",
   "落梅橫笛已三更，更無人處月朧明。",
   "沈沈暗想，似夢裏、淚暗滴。"
  ],
  "note": "平沙落雁寒水籠煙，古壘笳聲是最深的懷古。"
 },
 {
  "title": "減字木蘭花・莎衫筠笠",
  "author": "宋・卢炳",
  "body": [
   "莎衫筠笠，正是村村農務急。",
   "綠水千畦，慣聽田間布穀啼。",
   "",
   "洞簫橫笛，和了一聲天淡碧。",
   "醉把花枝，欲向花間臥未知。"
  ],
  "note": "農忙時節簫笛和鳴，醉臥花間是田園最美的畫面。"
 },
 {
  "title": "臨江仙・憶昔午橋橋上飲",
  "author": "宋・陳與義",
  "body": [
   "憶昔午橋橋上飲，坐中多是豪英。",
   "長溝流月去無聲。杏花疏影裏，吹笛到天明。",
   "",
   "二十餘年如一夢，此身雖在堪驚。",
   "閒登小閣看新晴。古今多少事，漁唱起三更。"
  ],
  "note": "二十年如一夢，長溝流月杏花笛聲猶在耳畔。"
 },
 {
  "title": "浣溪沙・二月和風到碧城",
  "author": "宋・晏幾道",
  "body": [
   "二月和風到碧城，萬條千縷綠相迎。舞煙眠雨過清明。",
   "",
   "妝鏡巧眉偷學樣，歌樓妍曲借名聲。晚秋霜霰莫無情。"
  ],
  "note": "二月春風萬縷綠柳，願晚秋霜霰莫太無情。"
 },
 {
  "title": "漁父",
  "author": "宋・蘇軾",
  "body": [
   "漁父飲，誰家去？魚蟹一時分付。",
   "酒無多少醉為期，彼此不論錢數。"
  ],
  "note": "漁父飲酒不問錢數，醉了便是歸期。"
 },
 {
  "title": "浪淘沙・極目楚天空",

  <script>
    // ===== 載入詩庫 =====
    var poemDatabase = [];
    try {
      var rawData = document.getElementById('poem-data');
      if (rawData) {
        poemDatabase = JSON.parse(rawData.textContent);
        console.log('✅ JSON.parse 成功，共', poemDatabase.length, '首');
      }
    } catch(e) {
      console.error('❌ 詩庫解析失敗:', e);
    }
    let poems = poemDatabase.slice();
    let currentIndex = 0;
    let apiPoemLoaded = false;
    let customPoems = [];

    console.log('詩庫載入完成:', poems.length, '首');

    // ===== 今日詩詞 API（自動更新古詩）=====
    async function fetchApiPoem() {
      try {
        // 使用「今日詩詞」開放 API — 每次回傳一首隨機古詩詞
        const res = await fetch('https://v2.jinrishici.com/one.json', {
          headers: { 'X-User-Token': 'daily-poem-site' }
        });
        if (!res.ok) return null;
        const data = await res.json();

        if (data.status === 'success' && data.data) {
          const d = data.data;
          const content = d.content || '';
          const title = d.origin?.title || '佚名詩';
          const author = d.origin?.author || '佚名';
          const dynasty = d.origin?.dynasty || '';
          const fullText = d.origin?.content || [content];

          return {
            title: title,
            author: dynasty ? `${dynasty}·${author}` : author,
            body: fullText,
            note: `── 來自「今日詩詞」API · 每次重新整理都是不同的相遇`,
            fromApi: true
          };
        }
      } catch (e) {
        console.log('API 詩詞載入失敗，使用本地詩庫', e);
      }
      return null;
    }

    // 嘗試取得 Token (今日詩詞 API 需要)
    async function getApiToken() {
      try {
        const res = await fetch('https://v2.jinrishici.com/token');
        if (res.ok) {
          const data = await res.json();
          return data.data;
        }
      } catch(e) {}
      return null;
    }

    async function loadApiPoem() {
      const token = await getApiToken();
      if (!token) return;

      try {
        const res = await fetch('https://v2.jinrishici.com/sentence', {
          headers: { 'X-User-Token': token }
        });
        if (!res.ok) return;
        const data = await res.json();

        if (data.status === 'success' && data.data) {
          const d = data.data;
          const title = d.origin?.title || '佚名詩';
          const author = d.origin?.author || '佚名';
          const dynasty = d.origin?.dynasty || '';
          const fullText = d.origin?.content || [d.content || ''];

          const apiPoem = {
            title: title,
            author: dynasty ? `${dynasty} · ${author}` : author,
            body: fullText,
            note: '來自「今日詩詞」— 每次重新整理，都是不同的相遇。',
            fromApi: true
          };

          // 插入到詩庫最前面
          poems.unshift(apiPoem);
          apiPoemLoaded = true;

          // 如果還在顯示第一首，就更新畫面
          if (currentIndex === 0) {
            renderPoem(0);
            document.getElementById('poem-source').textContent = '✦ 來自今日詩詞 API · 自動更新';
          }
        }
      } catch (e) {
        console.log('API 載入失敗，使用本地詩庫');
      }
    }

    // ===== DATE =====
    function setDate() {
      const now = new Date();
      const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      document.getElementById('today-date').textContent = now.toLocaleDateString('zh-TW', opts);
    }

    // ===== POEM RENDERING =====
    function getDailyIndex() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      const diff = now - start;
      const oneDay = 1000 * 60 * 60 * 24;
      return Math.floor(diff / oneDay) % poems.length;
    }

    function renderPoem(index) {
      const poem = poems[index];
      const titleEl = document.getElementById('poem-title');
      const authorEl = document.getElementById('poem-author');
      const bodyEl = document.getElementById('poem-body');
      const noteEl = document.getElementById('poem-note');
      const sourceEl = document.getElementById('poem-source');

      // Smooth transition
      const inner = document.querySelector('.hero-inner');
      inner.classList.add('poem-fade-out');

      setTimeout(() => {
        titleEl.textContent = poem.title;
        authorEl.textContent = poem.author;
        bodyEl.innerHTML = poem.body
          .map(line => line === '' ? '<br>' : `<p>${line}</p>`)
          .join('');
        noteEl.textContent = poem.note;
        sourceEl.textContent = poem.fromApi
          ? '✦ 來自今日詩詞 API · 自動更新'
          : poem.custom
          ? '✦ 你收藏的詩'
          : `✦ 詩庫 · 第 ${index + 1} / ${poems.length} 首`;

        inner.classList.remove('poem-fade-out');
        inner.classList.add('poem-fade-in');
        setTimeout(() => inner.classList.remove('poem-fade-in'), 400);
      }, 300);
    }

    function nextPoem() { currentIndex = (currentIndex + 1) % poems.length; renderPoem(currentIndex); }
    function prevPoem() { currentIndex = (currentIndex - 1 + poems.length) % poems.length; renderPoem(currentIndex); }
    function randomPoem() {
      let idx;
      do { idx = Math.floor(Math.random() * poems.length); } while (idx === currentIndex && poems.length > 1);
      currentIndex = idx;
      renderPoem(currentIndex);
    }

    // ===== BREATHING =====
    let breatheRunning = false, breatheTimer = null, breathePhase = 0, breatheCycles = 0;
    const phases = [
      { text:'吸氣', sub:'慢慢地吸……', cls:'inhale', dur:4000 },
      { text:'屏息', sub:'穩穩地停……', cls:'hold-in', dur:4000 },
      { text:'吐氣', sub:'輕輕地吐……', cls:'exhale', dur:4000 },
      { text:'屏息', sub:'安靜地等……', cls:'hold-out', dur:4000 }
    ];
    function runBreathePhase() {
      if (!breatheRunning) return;
      const p = phases[breathePhase];
      const circle = document.getElementById('breathe-circle');
      circle.className = 'breathe-circle';
      void circle.offsetWidth;
      circle.classList.add(p.cls);
      document.getElementById('breathe-text').textContent = p.text;
      document.getElementById('breathe-sub').textContent = p.sub;
      breathePhase = (breathePhase + 1) % 4;
      if (breathePhase === 0) {
        breatheCycles++;
        document.getElementById('breathe-counter').textContent = `已完成 ${breatheCycles} 個循環`;
      }
      breatheTimer = setTimeout(runBreathePhase, p.dur);
    }
    function toggleBreathe() {
      const btn = document.getElementById('breathe-btn');
      if (breatheRunning) {
        breatheRunning = false; clearTimeout(breatheTimer);
        btn.textContent = '繼續呼吸';
        document.getElementById('breathe-text').textContent = '已暫停';
        document.getElementById('breathe-sub').textContent = '準備好後再繼續';
      } else {
        breatheRunning = true; btn.textContent = '暫停'; runBreathePhase();
      }
    }
    function resetBreathe() {
      breatheRunning = false; clearTimeout(breatheTimer);
      breathePhase = 0; breatheCycles = 0;
      document.getElementById('breathe-circle').className = 'breathe-circle';
      document.getElementById('breathe-text').textContent = '準備好了嗎？';
      document.getElementById('breathe-sub').textContent = '4-4-4-4 方塊呼吸法';
      document.getElementById('breathe-btn').textContent = '開始呼吸';
      document.getElementById('breathe-counter').textContent = '';
    }

    // ===== SHARE =====
    function shareToLine() {
      const p = poems[currentIndex];
      const t = `📖 ${p.title}｜${p.author}\n\n${p.body.join('\n')}\n\n— 日日一詩 —`;
      window.open(`https://social-plugins.line.me/lineit/share?text=${encodeURIComponent(t)}`, '_blank');
    }
    function copyPoem() {
      const p = poems[currentIndex];
      const t = `${p.title}｜${p.author}\n\n${p.body.join('\n')}\n\n— 日日一詩 —`;
      navigator.clipboard.writeText(t).then(() => showToast('已複製詩句 ✓'));
    }
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ===== ADD POEM =====
    function openAddPoem() {
      document.getElementById('add-poem-modal').classList.add('open');
    }
    function closeAddPoem() {
      document.getElementById('add-poem-modal').classList.remove('open');
      document.getElementById('add-title').value = '';
      document.getElementById('add-author').value = '';
      document.getElementById('add-body').value = '';
      document.getElementById('add-note').value = '';
    }
    function saveNewPoem() {
      const title = document.getElementById('add-title').value.trim();
      const author = document.getElementById('add-author').value.trim();
      const bodyText = document.getElementById('add-body').value.trim();
      const note = document.getElementById('add-note').value.trim() || '你收藏的一首詩。';

      if (!title || !author || !bodyText) {
        showToast('請填寫詩名、作者和詩文');
        return;
      }

      const body = bodyText.split('\n');
      const newPoem = { title, author, body, note, custom: true };

      poems.push(newPoem);
      customPoems.push(newPoem);
      window.__customPoems = customPoems;

      closeAddPoem();
      currentIndex = poems.length - 1;
      renderPoem(currentIndex);
      showToast(`已收藏「${title}」✓ （共 ${poems.length} 首）`);
    }

    // ===== SCROLL OBSERVER =====
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.2 });
    document.querySelectorAll('.fade-section').forEach(el => obs.observe(el));

    // ===== INIT =====
    setDate();
    currentIndex = getDailyIndex();

    // 先用本地詩庫渲染（立刻顯示）
    const poem = poems[currentIndex];
    document.getElementById('poem-title').textContent = poem.title;
    document.getElementById('poem-author').textContent = poem.author;
    document.getElementById('poem-body').innerHTML = poem.body.map(l => l === '' ? '<br>' : `<p>${l}</p>`).join('');
    document.getElementById('poem-note').textContent = poem.note;
    document.getElementById('poem-source').textContent = `✦ 詩庫 · 第 ${currentIndex + 1} / ${poems.length} 首`;

    // 再非同步載入 API 詩（自動更新）
    loadApiPoem();
  </script>
</body>
</html>
