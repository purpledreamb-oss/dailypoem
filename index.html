明，書頁之間藏著另一個世界。"}, {"title": "古池", "author": "日・松尾芭蕉", "body": ["古池塘——", "青蛙跳入水中央，", "一聲清響。"], "note": "千年的寂靜，被一聲水響打破。"}, {"title": "荒野旅行", "author": "日・松尾芭蕉", "body": ["荒野上旅行，", "讓我的夢也去流浪吧——", "枯草原上。"], "note": "身在荒野，夢也隨風遠行。"}, {"title": "菊花香", "author": "日・松尾芭蕉", "body": ["菊花香裡——", "奈良城中那些古老的，", "石佛像。"], "note": "花香與石佛，都是時間留下的印記。"}, {"title": "暮秋之旅", "author": "日・松尾芭蕉", "body": ["枯枝上——", "烏鴉棲息的黃昏，", "秋日暮色。"], "note": "一隻烏鴉，道盡了秋天的蕭瑟。"}, {"title": "夏草", "author": "日・松尾芭蕉", "body": ["夏草茂盛啊——", "昔日武士們夢想的，", "殘跡所在。"], "note": "草長得越茂盛，昔日的夢就越模糊。"}, {"title": "海邊", "author": "日・松尾芭蕉", "body": ["海邊日暮——", "鳴叫的野鴨聲中，", "隱約泛白。"], "note": "暮色中的鴨鳴，是海邊最寂寞的聲音。"}, {"title": "閑寂", "author": "日・松尾芭蕉", "body": ["多麼寂靜啊——", "蟬聲滲入了，", "岩石之中。"], "note": "蟬鳴入石，寂靜反而更深了。"}, {"title": "旅途之病", "author": "日・松尾芭蕉", "body": ["旅途中病倒——", "夢仍在枯野上，", "四處飄蕩。"], "note": "身體倒下了，夢卻不肯停歇。"}, {"title": "早春", "author": "日・松尾芭蕉", "body": ["春天來了——", "無名的山丘上，", "薄薄的霧靄。"], "note": "春天最初的消息，是山間的一層薄霧。"}, {"title": "五月雨", "author": "日・松尾芭蕉", "body": ["五月的雨——", "匯聚而成的急流啊，", "最上川。"], "note": "無數細雨匯成大河，平凡匯成磅礴。"}, {"title": "秋風", "author": "日・松尾芭蕉", "body": ["秋風吹過——", "原野上的石頭，", "也感到了寒冷。"], "note": "連石頭都冷了，秋天就真的到了。"}, {"title": "月夜", "author": "日・松尾芭蕉", "body": ["雲時時——", "給賞月的人，", "一段歇息。"], "note": "雲遮月不是遺憾，是讓人歇一歇的溫柔。"}, {"title": "初雪", "author": "日・松尾芭蕉", "body": ["初雪紛飛——", "水仙花的葉子，", "微微彎曲。"], "note": "初雪的重量，連花葉都感受到了。"}, {"title": "蝴蝶", "author": "日・松尾芭蕉", "body": ["蝴蝶飛舞——", "我也隨之而動的，", "心思浮沉。"], "note": "一隻蝴蝶，就足以攪動一顆安靜的心。"}, {"title": "落花", "author": "日・松尾芭蕉", "body": ["細看那些——", "薺菜花開在籬笆下，", "安靜從容。"], "note": "最不起眼的花，往往開得最從容。"}, {"title": "我與天地", "author": "日・小林一茶", "body": ["露水的世界——", "雖是露水的世界，", "雖然如此。"], "note": "明知人生如露，卻仍捨不得放手。"}, {"title": "蝸牛", "author": "日・小林一茶", "body": ["慢慢爬吧——", "蝸牛啊，慢慢爬上，", "富士山頂。"], "note": "再慢也沒關係，只要方向是山頂。"}, {"title": "雀兒", "author": "日・小林一茶", "body": ["來跟我玩吧——", "沒有母親的，", "小麻雀。"], "note": "孤獨的心，總想陪伴另一個孤獨。"}, {"title": "故鄉", "author": "日・小林一茶", "body": ["故鄉啊——", "無論碰到什麼，", "都是刺。"], "note": "故鄉讓人疼痛，因為太過在意。"}, {"title": "正月", "author": "日・小林一茶", "body": ["新年的天空——", "也不過如此啊，", "和昨天一樣。"], "note": "新年改變的是日曆，天空還是那片天空。"}, {"title": "蛙", "author": "日・小林一茶", "body": ["瘦青蛙——", "別認輸啊，", "一茶在這裡。"], "note": "為弱小者加油，也是為自己打氣。"}, {"title": "春雨", "author": "日・小林一茶", "body": ["春雨啊——", "還沒有喫到東西的，", "小鴨子們。"], "note": "春雨中的小鴨子，讓人心生憐愛。"}, {"title": "落葉", "author": "日・小林一茶", "body": ["這個秋天——", "隔壁的孩子也像落葉一樣，", "越長越大了。"], "note": "孩子像落葉一樣成長，不知不覺間就離開了枝頭。"}, {"title": "螢火蟲", "author": "日・小林一茶", "body": ["螢火蟲——", "閃了一下就飛走了，", "回來呀。"], "note": "美好的事物總是一閃而逝，讓人不捨。"}, {"title": "大雪紛飛", "author": "日・小林一茶", "body": ["大雪紛飛——", "但這裡也是淨土，", "也是的。"], "note": "即使大雪封路，腳下也是淨土。"}, {"title": "秋夜", "author": "日・小林一茶", "body": ["秋天的夜——", "有人在敲著木魚，", "噠，噠，噠。"], "note": "秋夜的木魚聲，是孤獨最有節奏的伴奏。"}, {"title": "老貓", "author": "日・小林一茶", "body": ["老貓啊——", "你也對著春雨，", "打起呵欠。"], "note": "連老貓都懶洋洋的春天，纔是真正的春天。"}, {"title": "炊煙", "author": "日・小林一茶", "body": ["傍晚的炊煙——", "每一縷都彎彎曲曲，", "像我的命運。"], "note": "炊煙和命運一樣，從來不走直線。"}, {"title": "櫻花", "author": "日・小林一茶", "body": ["櫻花樹下——", "完全陌生的人，", "也不算陌生了。"], "note": "共賞一樹花，陌生人也變成了故人。"}, {"title": "晨露", "author": "日・小林一茶", "body": ["草葉上的露珠——", "每一滴裡，", "都有一個世界。"], "note": "微小的露珠裡，映照著整個宇宙。"}, {"title": "菜花", "author": "日・與謝蕪村", "body": ["菜花開遍——", "西邊落日，", "東邊升月。"], "note": "一邊是日落，一邊是月升，天地從不停歇。"}, {"title": "春雨", "author": "日・與謝蕪村", "body": ["春雨裡——", "邊走邊說話的，", "蓑衣和傘。"], "note": "春雨中最動人的風景，是結伴而行。"}, {"title": "離別", "author": "日・與謝蕪村", "body": ["離去的春天——", "帶著遲來的，", "櫻花離去。"], "note": "春天離去的時候，連遲來的花也一併帶走。"}, {"title": "月光", "author": "日・與謝蕪村", "body": ["月光照著——", "梅花的影子，", "投在拉門上。"], "note": "月光把梅花的影子，當作畫送給了人間。"}, {"title": "秋風", "author": "日・與謝蕪村", "body": ["秋風吹過——", "紅色的蜻蜓，", "像辣椒一樣。"], "note": "秋天的蜻蜓，帶著辣椒般的熱烈。"}, {"title": "暮雨", "author": "日・與謝蕪村", "body": ["暮色中的雨——", "牛欄旁邊的，", "一隻白鷺。"], "note": "暮雨中的白鷺，是最安靜的風景。"}, {"title": "短夜", "author": "日・與謝蕪村", "body": ["短短的夏夜——", "毛蟲上面留下了，", "一滴露珠。"], "note": "夏夜太短，連露珠都來不及蒸發。"}, {"title": "夏河", "author": "日・與謝蕪村", "body": ["夏日的河流——", "讓人高興啊，", "可以踩進去。"], "note": "踩進夏天的河流，是最簡單的快樂。"}, {"title": "鮎魚", "author": "日・與謝蕪村", "body": ["鮎魚遊過——", "水底的石頭，", "也在動搖。"], "note": "一條魚的經過，連石頭都為之動搖。"}, {"title": "寒梅", "author": "日・與謝蕪村", "body": ["梅花一朵——", "就增添了一朵的，", "溫暖啊。"], "note": "每開一朵梅花，冬天就暖了一分。"}, {"title": "柿子", "author": "日・正岡子規", "body": ["喫了一個柿子——", "鐘聲就響了，", "法隆寺。"], "note": "一口柿子、一聲鐘，秋天就圓滿了。"}, {"title": "病牀", "author": "日・正岡子規", "body": ["病牀上——", "翻一個身，", "就到了冬天。"], "note": "病中的日子，翻個身就換了季節。"}, {"title": "雞頭花", "author": "日・正岡子規", "body": ["雞頭花開著——", "已經看不見的池水，", "深了又深。"], "note": "花在水面開，水在花下深不見底。"}, {"title": "春寒", "author": "日・正岡子規", "body": ["春天的寒氣——", "連硯臺裡的墨，", "也凝住了。"], "note": "春寒料峭，連寫詩的墨都不願流動。"}, {"title": "月下", "author": "日・正岡子規", "body": ["月亮升起來——", "搖晃著倒映在，", "水桶中。"], "note": "月亮倒映在水桶裡，也是一輪完整的月。"}, {"title": "蒲公英", "author": "日・正岡子規", "body": ["蒲公英啊——", "鐵路一直延伸，", "到了遠方。"], "note": "蒲公英和鐵路，都是遠方的使者。"}, {"title": "紅葉", "author": "日・正岡子規", "body": ["一片紅葉——", "落在石磨上面，", "好像一封信。"], "note": "紅葉落在石磨上，是秋天寫的一封信。"}, {"title": "斷腸", "author": "日・正岡子規", "body": ["糸瓜開花了——", "痰堵住了喉嚨的，", "佛前此日。"], "note": "花開在病痛中，生命的美與苦交織。"}, {"title": "朝顏", "author": "日・正岡子規", "body": ["牽牛花啊——", "一朵深淵般的，", "藍色。"], "note": "一朵花的藍，深得像一個深淵。"}, {"title": "霜夜", "author": "日・正岡子規", "body": ["霜降之夜——", "星星踏著霜光，", "走過天空。"], "note": "霜夜的星星，像踩著冰霜過河的旅人。"}, {"title": "飛鳥集（一）", "author": "印度・泰戈爾", "body": ["夏天的飛鳥，", "飛到我的窗前唱歌，", "又飛去了。", "", "秋天的黃葉，", "它們沒有什麼可唱，", "只嘆息一聲，", "飛落在那裡。"], "note": "夏天用歌聲告別，秋天只能用嘆息。"}, {"title": "飛鳥集（二）", "author": "印度・泰戈爾", "body": ["世界以痛吻我，", "要我報之以歌。"], "note": "承受了所有的痛，依然選擇歌唱。"}, {"title": "飛鳥集（三）", "author": "印度・泰戈爾", "body": ["生如夏花之絢爛，", "死如秋葉之靜美。"], "note": "活就活得燦爛，走就走得安詳。"}, {"title": "飛鳥集（四）", "author": "印度・泰戈爾", "body": ["如果你因失去了太陽而流淚，", "那麼你也將失去羣星了。"], "note": "為失去的哭泣，會讓你錯過更多的光。"}, {"title": "飛鳥集（五）", "author": "印度・泰戈爾", "body": ["不是鐵器的敲打，", "而是水的載歌載舞，", "使粗糙的石塊，", "變成了美麗的鵝卵石。"], "note": "溫柔比力量更能改變堅硬的事物。"}, {"title": "新月集・金色花", "author": "印度・泰戈爾", "body": ["假如我變成了一朵金色花，", "為了好玩，", "長在樹的高枝上，", "笑嘻嘻地在風中搖擺。", "", "媽媽，你會認識我嗎？", "你要是叫道：孩子你在哪裡呀？", "我暗暗地在那裡匿笑，", "卻一聲兒不響。"], "note": "孩子的淘氣裡，藏著最純真的愛。"}, {"title": "新月集・紙船", "author": "印度・泰戈爾", "body": ["我每天把紙船一個個放在急流的溪中。", "我用大黑字寫我的名字和我住的村名在紙船上。", "", "我希望住在異地的人會得到這紙船，", "知道我是誰。"], "note": "紙船載著名字漂向遠方，是最初的社交網絡。"}, {"title": "飛鳥集（六）", "author": "印度・泰戈爾", "body": ["我們把世界看錯了，", "反說它欺騙我們。"], "note": "不是世界欺騙了我們，是我們看錯了世界。"}, {"title": "飛鳥集（七）", "author": "印度・泰戈爾", "body": ["當你為錯過太陽而哭泣的時候，", "你也要再錯過羣星了。"], "note": "沉溺在過去的失去中，便無法看見眼前的星光。"}, {"title": "吉檀迦利（選）", "author": "印度・泰戈爾", "body": ["讓我的愛像陽光一樣包圍著你，", "又給你以光輝燦爛的自由。"], "note": "最好的愛，是給你溫暖也給你自由。"}, {"title": "二十首情詩（其一）", "author": "智利・乃粹", "body": ["我喜歡你是寂靜的，", "彷彿你消失了一樣。", "你從遠處聆聽我，", "我的聲音卻無法觸及你。"], "note": "最深的喜歡，是喜歡你安靜的樣子。"}, {"title": "二十首情詩（其五）", "author": "智利・乃粹", "body": ["為了讓你聽見我的話語，", "有時候它們變得纖細，", "像飛鳥的足跡在沙灘上。"], "note": "為了讓你聽見，我把語言磨得像沙上鳥跡一樣輕。"}, {"title": "二十首情詩（其十五）", "author": "智利・乃粹", "body": ["我喜歡你是寂靜的，", "彷彿你不存在一般。", "遙遠而且哀傷——", "彷彿你已經死了。", "", "一個字，一個微笑就夠了。", "而我很高興，", "為了那不是真的而高興。"], "note": "你的寂靜讓我心痛，但你的存在讓我高興。"}, {"title": "每一天你都在玩弄", "author": "智利・乃粹", "body": ["每一天你都在玩弄宇宙的光。", "微妙的來客，你來到花和水之間。"], "note": "你的存在就是一場光的遊戲。"}, {"title": "馬丘比丘之巔", "author": "智利・乃粹", "body": ["石頭之中的石頭，而人，在哪裡？", "空氣之中的空氣，而人，在哪裡？", "時間之中的時間，而人，在哪裡？", "", "起來和我同行吧。"], "note": "遺跡中追問人的蹤跡，是對文明最深的叩問。"}, {"title": "一見鍾情", "author": "波蘭・辛波絲卡", "body": ["他們彼此深信，", "是瞬間迸發的熱情讓他們相遇。", "這樣的確定是美麗的，", "但變幻無常更為美麗。", "", "他們素未謀面，所以確定——", "彼此之間什麼也沒有發生。", "但是從街道、樓梯、走廊——", "他們之間可能存在多少偶然？"], "note": "一見鍾情的美麗，在於那無數次的擦肩而過。"}, {"title": "種種可能", "author": "波蘭・辛波絲卡", "body": ["我偏愛寫詩的荒謬，", "勝過不寫詩的荒謬。", "我偏愛喜歡人們的自己，", "勝過喜歡全人類的自己。"], "note": "偏愛就是在荒謬中做出的最誠實的選擇。"}, {"title": "結束與開始", "author": "波蘭・辛波絲卡", "body": ["每次戰爭過後，", "總得有人收拾殘局。", "畢竟事物不會自己", "整理自己。", "", "總得有人把瓦礫", "鏟到路邊，", "好讓載滿屍體的車子", "通過。"], "note": "每一次結束都是另一次開始的沉重序幕。"}, {"title": "在一顆小星星下", "author": "波蘭・辛波絲卡", "body": ["我為不能無所不在向你道歉。", "向在深淵中呼喊的人道歉，", "我無法做每個人的朋友。", "", "向所有我不瞭解的人道歉。", "向大海道歉，我用小杯子取水。"], "note": "我們用一輩子的愧疚，向無法觸及的世界道歉。"}, {"title": "對色情文學的看法", "author": "波蘭・辛波絲卡", "body": ["靈魂和肉體之間——", "沒有什麼比靈魂", "更令肉體無法忍受的了。"], "note": "靈與肉的矛盾，是人最深的困境。"}, {"title": "博物館", "author": "波蘭・辛波絲卡", "body": ["這裡有盤子而沒有食慾，", "有結婚戒指但沒有愛情已至少三百年，", "這裡有扇子——臉紅呢？", "這裡有劍——憤怒呢？"], "note": "博物館裡只剩下物件，激情早已蒸發。"}, {"title": "寫履歷表", "author": "波蘭・辛波絲卡", "body": ["需要什麼就寫什麼。", "填好表格，附上照片。", "", "不管你的生命有多長——", "履歷表應該簡短。", "簡潔扼要是必須的。", "", "風景被地址取代了，", "搖擺不定的記憶向確切的日期讓步。"], "note": "一個人的一生被壓縮成一張表格，何其荒謬。"}, {"title": "也許這一切", "author": "波蘭・辛波絲卡", "body": ["也許這一切", "發生在某個實驗室的星球上？", "我們被偷偷觀察了一小陣子，", "在有趣的地方做了些記號。"], "note": "如果人類不過是宇宙的實驗品呢。"}, {"title": "三個最奇怪的詞", "author": "波蘭・辛波絲卡", "body": ["當我說「未來」這個詞，", "第一音方出即成過去。", "", "當我說「寂靜」這個詞，", "我打破了它。", "", "當我說「虛無」這個詞，", "我在無中生有。"], "note": "語言是最大的悖論，說出口的一刻就背叛了自己。"}, {"title": "橋上的人們", "author": "波蘭・辛波絲卡", "body": ["奇怪的星球，上面住著奇怪的人。", "他們屈服於時間，", "卻不願承認。", "", "他們有自己的方式表達抗議——", "他們做些小東西，", "然後稱之為藝術。"], "note": "藝術是人類對抗時間的最溫柔的方式。"}, {"title": "二十億光年的孤獨", "author": "日・谷川俊太郎", "body": ["人類在小小的球上，", "睡覺 起來 然後工作，", "偶爾渴望火星上有朋友。", "", "火星人在小小的球上，", "睡覺 起來 然後工作，", "偶爾也渴望地球上有朋友。", "", "萬有引力——", "是相互吸引孤獨的力。", "", "宇宙正在傾斜，", "所以大家都在互相尋找。"], "note": "孤獨是宇宙的底色，萬有引力是尋找彼此的力量。"}, {"title": "活著", "author": "日・谷川俊太郎", "body": ["活著", "就是現在活著", "口渴了", "是美麗的人行道上的花", "是突然襲來的旋律", "是打噴嚏", "是和你手牽手"], "note": "活著就是此刻的感受，簡單到不需要理由。"}, {"title": "春天", "author": "日・谷川俊太郎", "body": ["泥土裡有什麼——", "蚯蚓的夢想。", "根的耐心。", "還有來年春天的承諾。"], "note": "春天的承諾，埋在泥土最深處。"}, {"title": "小鳥在天空消失的日子", "author": "日・谷川俊太郎", "body": ["小鳥在天空消失的日子，", "我在街上到處走。", "一個人。", "", "魚在大海消失的日子，", "大海翻起了波浪。", "只有波浪。", "", "人在大地消失的日子——", "大地什麼都不知道。"], "note": "消失的悲劇在於，承載你的世界根本不會在意。"}, {"title": "語言", "author": "日・谷川俊太郎", "body": ["語言啊——", "你究竟能表達什麼？", "沉默中有一片森林，", "而你只是其中的一片落葉。"], "note": "語言所能表達的，不過是沉默的一小片碎屑。"}, {"title": "早安", "author": "日・谷川俊太郎", "body": ["早安——", "在嶄新的早晨向你問好。", "太陽還是一樣的，", "但今天的光和昨天不同。", "", "因為你在。"], "note": "同樣的早晨，因為你在就不一樣了。"}, {"title": "夜中", "author": "日・谷川俊太郎", "body": ["半夜三點鐘醒了。", "世界正在呼吸。", "小小的鐘聲也在呼吸。", "我也在呼吸。", "", "活著啊——", "只是這件事就很了不起了。"], "note": "深夜裡發現自己在呼吸，就是最了不起的事。"}, {"title": "河流", "author": "日・谷川俊太郎", "body": ["河流不回頭，", "所以纔是河流。", "如果回了頭，", "就只是一灘積水。"], "note": "向前是河流，回頭就成了池塘。"}, {"title": "給孩子的詩", "author": "日・谷川俊太郎", "body": ["不要急著長大，", "因為長大以後——", "花會變成植物學，", "星星會變成物理學，", "而你的淚水會變成化學。"], "note": "長大是一場緩慢的去魅，讓一切美好變成學科。"}, {"title": "什麼都沒有的貓", "author": "日・谷川俊太郎", "body": ["什麼都沒有的貓，", "有著毛茸茸的肚子。", "什麼都沒有的貓，", "有著溫暖的鼻息。", "", "我也想成為——", "什麼都沒有的貓。"], "note": "什麼都沒有的貓，反而擁有了一切。"}, {"title": "客棧", "author": "波斯・魯米", "body": ["做人好像經營一家客棧，", "每天早晨都有新的客人到來。", "", "一個歡樂，一個沮喪，一個卑鄙，", "瞬間的覺察——", "像不速之客突然來訪。", "", "歡迎且款待他們每一位！"], "note": "接納每一種情緒，如同好客的主人。"}, {"title": "愛的海洋", "author": "波斯・魯米", "body": ["我是一個小小的世界——", "由尋找所構成。", "每一粒原子都在渴望著什麼，", "我的整個身體就是這渴望。"], "note": "存在的本質，就是渴望與尋找。"}, {"title": "蘆葦笛", "author": "波斯・魯米", "body": ["你聽那蘆葦笛在哭訴——", "自從我從蘆葦叢中被割下，", "我的哀聲令男男女女落淚。", "", "我要的是因離別而撕裂的胸膛，", "這樣我才能傾訴對愛的渴望。"], "note": "蘆葦笛的哀鳴，是每個離鄉者的心聲。"}, {"title": "那裡有一片原野", "author": "波斯・魯米", "body": ["在對與錯的觀念之外，", "有一片原野。", "我將在那裡等你。", "", "當靈魂躺臥在那片青草地上時，", "世界滿溢，無法言說。"], "note": "超越是非的那片原野，是靈魂最自由的歸處。"}, {"title": "你不是一滴水", "author": "波斯・魯米", "body": ["你不是一滴水在海洋中。", "你是整個海洋在一滴水中。"], "note": "渺小的你，其實包含著整個宇宙。"}, {"title": "傷口是光進入的地方", "author": "波斯・魯米", "body": ["不要轉身離開你的傷痛。", "去尋找你的治療之道。", "", "傷口是光照進來的地方。"], "note": "不要逃避傷痛，因為光從那裡照進來。"}, {"title": "靜默的語言", "author": "波斯・魯米", "body": ["沉默是愛的語言，", "是信仰的語言，", "是大海最深處的語言。", "", "用心聽吧——", "那些無法說出口的，", "纔是真正重要的。"], "note": "最重要的話，往往藏在沉默裡。"}, {"title": "論孩子", "author": "黎巴嫩・紀伯倫", "body": ["你的孩子不是你的孩子，", "他們是生命對自身渴望而誕生的兒女。", "他們藉助你來到這個世界，", "卻非因你而來。", "", "你可以給予他們的是你的愛，", "卻不是你的想法，", "因為他們有自己的思想。"], "note": "孩子不是父母的延伸，而是生命自己的旅程。"}, {"title": "論愛", "author": "黎巴嫩・紀伯倫", "body": ["當愛召喚你時，跟隨它，", "儘管它的道路艱辛陡峭。", "當它的翅膀擁抱你時，順從它，", "儘管藏在羽翼中的劍會傷害你。"], "note": "愛的擁抱裡藏著劍，但仍值得奔赴。"}, {"title": "論自由", "author": "黎巴嫩・紀伯倫", "body": ["你們只有在枷鎖的碎片中，", "才能找到自由。", "", "當你渴望的不再是尋求自由，", "而自由成為你的韁繩——", "那時你才真正自由了。"], "note": "真正的自由，是不再需要追求自由的狀態。"}, {"title": "論友誼", "author": "黎巴嫩・紀伯倫", "body": ["你的朋友是你被滿足的需求。", "他是你用愛播種，", "用感恩收穫的田地。", "", "他是你的桌上佳餚，", "你的壁爐邊的溫暖。"], "note": "朋友是你用愛耕種的一片田地。"}, {"title": "論時間", "author": "黎巴嫩・紀伯倫", "body": ["你想衡量那不可衡量的時間，", "調整你的行為甚至指引你精神的方向——", "這都合乎時間的規律。", "", "但那無邊無際的你之中，", "是知道生命的無時間性的。"], "note": "時間丈量不了你內心那片無邊的海。"}, {"title": "十四行詩第十八首", "author": "英・莎士比亞", "body": ["我可否將你比作夏天？", "你比夏天更可愛更溫婉。", "狂風會吹落五月的嬌蕊，", "夏天的期限又未免太短。", "", "但你永恆的夏天不會凋零，", "你的美也不會遺失；", "死神也無法誇口你在他的陰影裡遊蕩——", "當你在不朽的詩行中與時間同長。"], "note": "詩句讓美永恆，連死神也無法帶走。"}, {"title": "十四行詩第二十九首", "author": "英・莎士比亞", "body": ["當我受盡命運和人們的白眼，", "暗暗地哀悼自己的孤單，", "徒然呼喚聾了的蒼天，", "顧盼自身，詛咒自己的命運——", "", "但在這幾乎是自輕自賤的時刻，", "偶然間想起了你，我的心境，", "便像破曉的雲雀從陰鬱的大地，", "振翅飛昇，高唱在天門。"], "note": "想起你的那一刻，靈魂便從泥地飛向天空。"}, {"title": "十四行詩第七十三首", "author": "英・莎士比亞", "body": ["在我身上你或許會看見那個季節——", "黃葉，或盡脫，或三三兩兩，", "掛在瑟瑟冷顫的枝頭，", "那荒廢的歌壇，甜鳥曾在那裡歌唱。", "", "在我身上你會看到暮光之餘暉，", "日落後漸漸消隱在西方。"], "note": "暮年如秋末黃昏，但愛在凋零中更深。"}, {"title": "十四行詩第一一六首", "author": "英・莎士比亞", "body": ["讓我不要為真心的結合——", "設下障礙。愛不是愛，", "如果在發現變節時就變了，", "或者跟著那離去的人而離去。", "", "愛是永恆不動的標誌，", "它面對風暴卻不搖晃；", "它是每一艘迷航船隻的明星，", "價值不可計量，儘管高度可測。"], "note": "真正的愛是風暴中不搖晃的燈塔。"}, {"title": "十四行詩第一三〇首", "author": "英・莎士比亞", "body": ["我情人的眼睛一點不像太陽；", "珊瑚遠比她的嘴脣更紅；", "雪若算白，她的胸就暗褐無光；", "髮若是絲，她頭上就是鐵絲叢生。", "", "然而，我敢對天發誓——", "我的愛人比任何被捧上天的美人，", "都更加可愛。"], "note": "真正的愛，不需要虛假的讚美來支撐。"}, {"title": "牧牛", "author": "宋・廓庵", "body": ["牧得此牛須用力", "放牧青山自在行", "", "回首來時路已遠", "白雲深處是吾家"], "note": "管好自己的心，便能自在行走天地間。"}, {"title": "本來無一物", "author": "唐・惠能", "body": ["菩提本無樹", "明鏡亦非臺", "本來無一物", "何處惹塵埃"], "note": "心中無執著，塵埃便無處落腳。"}, {"title": "坐看雲起", "author": "唐・王維", "body": ["行到水窮處", "坐看雲起時", "", "山中無曆日", "寒盡不知年"], "note": "走到盡頭不是結束，是另一種風景的開始。"}, {"title": "寒山問答", "author": "唐・寒山", "body": ["人問寒山道", "寒山路不通", "夏天冰未釋", "日出霧朦朧", "", "似我何由屆", "與君心不同"], "note": "每個人的路不同，不必強求他人理解。"}, {"title": "無門關", "author": "宋・慧開", "body": ["春有百花秋有月", "夏有涼風冬有雪", "若無閒事掛心頭", "便是人間好時節"], "note": "心無掛礙，處處是好時節。"}, {"title": "趙州茶", "author": "唐・趙州從諗", "body": ["問：如何是道？", "答：喫茶去。", "", "千言萬語", "不如一杯茶的安靜"], "note": "大道至簡，一杯茶就是修行。"}, {"title": "磨磚成鏡", "author": "唐・南嶽懷讓", "body": ["磨磚豈能成鏡", "坐禪豈能成佛", "", "若要明心見性", "須從日用中行"], "note": "修行不在蒲團上，在每一個日常裡。"}, {"title": "庭前柏樹", "author": "唐・趙州從諗", "body": ["問：如何是祖師西來意？", "答：庭前柏樹子。", "", "一棵樹就是一個宇宙", "何須向外求"], "note": "答案不在遠方，就在眼前。"}, {"title": "吾心似秋月", "author": "唐・寒山", "body": ["吾心似秋月", "碧潭清皎潔", "無物堪比倫", "教我如何說"], "note": "最清淨的心，無法用語言形容。"}, {"title": "一花一世界", "author": "唐・華嚴經偈", "body": ["一花一世界", "一葉一如來", "", "微塵中有大千", "剎那裡有永恆"], "note": "每一個微小的存在都蘊含著無限。"}, {"title": "過橋", "author": "宋・守端", "body": ["南臺靜坐一爐香", "終日凝然萬慮忘", "", "不是息心除妄想", "只緣無事可思量"], "note": "不是壓制念頭，是本來就無事可想。"}, {"title": "空山", "author": "唐・王維", "body": ["空山不見人", "但聞人語響", "返景入深林", "復照青苔上"], "note": "空與有、靜與動，從來不是對立的。"}, {"title": "山居", "author": "唐・寒山", "body": ["眾星羅列夜明深", "巖點孤燈月未沉", "圓滿光華不磨瑩", "掛在青天是我心"], "note": "你的心就是那輪明月，不需打磨也自有光華。"}, {"title": "水月觀音", "author": "宋・蘇軾", "body": ["靜故了羣動", "空故納萬境", "", "水中月", "鏡中花", "看見了", "就放下吧"], "note": "靜能觀萬物，空能容萬境。"}, {"title": "隨緣", "author": "唐・龍牙居遁", "body": ["朝看花開滿樹紅", "暮看花落樹還空", "", "若將花比人間事", "花與人間事一同"], "note": "花開花落是自然，來去聚散皆隨緣。"}, {"title": "放下", "author": "宋・五祖法演", "body": ["兩手把來不肯放", "一朝撒手意何如", "", "撒手懸崖", "絕後再蘇", "方知本來面目"], "note": "放下的那一刻，纔看見真正的自己。"}, {"title": "茶禪一味", "author": "宋・圓悟克勤", "body": ["茶杯裡有天地", "一口飲盡山河", "", "放下茶杯的那一刻", "什麼都不剩", "什麼都不缺"], "note": "喝茶的當下，圓滿具足。"}, {"title": "風來疏竹", "author": "明・洪自誠", "body": ["風來疏竹", "風過而竹不留聲", "雁度寒潭", "雁去而潭不留影", "", "事來心應", "事去心空"], "note": "讓事情來就來、去就去，心不留痕。"}, {"title": "即心即佛", "author": "唐・馬祖道一", "body": ["即心即佛", "非心非佛", "", "不向外求", "不向內找", "當下便是"], "note": "你一直在尋找的，從未離開過你。"}, {"title": "清風明月", "author": "宋・黃庭堅", "body": ["清風明月無價", "近水遠山有情", "", "最好的事物", "都是免費的", "只要你願意接受"], "note": "最珍貴的東西，無法用金錢衡量。"}, {"title": "最慢的是活著", "author": "陳義芝", "body": ["最慢的是活著", "比石頭還慢", "比河流改道還慢", "", "我們用一生的時間", "學習怎樣坐在窗前", "看雨落下來"], "note": "活著本身就是最漫長的修行。"}, {"title": "我年輕的戀人", "author": "陳義芝", "body": ["我年輕的戀人", "你是三月的風", "吹過整座島嶼", "", "我在每一棵樹下", "撿拾你遺落的", "花瓣與嘆息"], "note": "年輕時的愛情是春天的風，來過就留下痕跡。"}, {"title": "暮色", "author": "陳義芝", "body": ["暮色從山的那邊漫過來", "像一封遲到的信", "攤開在桌上", "", "我讀著你的名字", "直到天色完全暗下"], "note": "暮色是時光寫給我們最溫柔的告別。"}, {"title": "給時間的短箋", "author": "陳義芝", "body": ["時間，你慢一點走", "讓我看清楚", "母親頭上新生的白髮", "", "讓我再一次", "握住父親粗糙的手"], "note": "對時間的懇求，是對愛最深的表達。"}, {"title": "島", "author": "陳義芝", "body": ["島是海洋說了一半的話", "剩下的", "讓潮汐反覆修改", "", "我們住在未完成的句子裡", "等一個標點"], "note": "島嶼是大海未竟的語言。"}, {"title": "論肉體", "author": "焦桐", "body": ["肉體是靈魂暫時的旅館", "有時候客人走了", "房間還亮著燈", "", "窗簾被風吹起", "像一個人揮手"], "note": "身體是靈魂短暫棲居的所在。"}, {"title": "完全壯陽食譜", "author": "焦桐", "body": ["用文火燉一鍋往事", "加入大量的鹽與辣椒", "那些發燙的記憶", "", "足以溫暖", "所有冷掉的夜晚"], "note": "食物裡藏著人間最深的慰藉。"}, {"title": "紅豆", "author": "焦桐", "body": ["紅豆煮成了甜湯", "相思煮成了日常", "", "碗裡的溫度剛好", "像你離開前", "最後一次擁抱"], "note": "相思可以煮成日常的甜。"}, {"title": "味覺", "author": "焦桐", "body": ["所有的味覺都是記憶", "酸是初戀", "苦是成長", "", "而甜", "是你回頭時的微笑"], "note": "舌尖上的每種滋味都是人生的隱喻。"}, {"title": "夜市", "author": "焦桐", "body": ["夜市是島嶼的胃", "消化所有的鄉愁", "油煙升起的地方", "", "每一盞燈都在說", "回來喫飯吧"], "note": "夜市是最溫暖的歸處。"}, {"title": "當我成為一棵樹", "author": "許悔之", "body": ["當我成為一棵樹", "就不必再趕路了", "風來我就搖擺", "雨來我就安靜", "", "鳥停在我肩上", "我們一起沉默"], "note": "成為一棵樹是最徹底的自由。"}, {"title": "致黑暗", "author": "許悔之", "body": ["黑暗不是光的反面", "是光還沒有到達的地方", "", "我在這裡等", "帶著一根火柴", "和一整個宇宙的耐心"], "note": "黑暗只是光尚未抵達的遠方。"}, {"title": "書的重量", "author": "許悔之", "body": ["一本書的重量", "等於一個人的沉默", "", "翻開的時候", "所有不曾說出口的話", "都落在字裡行間"], "note": "書頁之間藏著說不出口的心事。"}, {"title": "雲的修行", "author": "許悔之", "body": ["雲沒有固定的形狀", "所以從不受傷", "", "它把自己交給風", "在天空練習", "如何放下"], "note": "雲是天空中最自在的修行者。"}, {"title": "墨色", "author": "許悔之", "body": ["磨墨的時候", "我把整座山", "磨成了水", "", "寫字的時候", "水又變回了山"], "note": "筆墨之間，山水輪迴。"}, {"title": "精神病院", "author": "鯨向海", "body": ["我們都是精神病院的逃犯", "偽裝成正常人", "上班，戀愛，假笑", "", "只有深夜", "纔敢把面具摘下來哭"], "note": "正常是一場漫長的偽裝。"}, {"title": "大雄", "author": "鯨向海", "body": ["大雄每天被欺負", "卻從不搬家", "", "因為靜香住在隔壁", "因為哆啦A夢還在", "因為明天還有新的道具"], "note": "留下來的理由，往往比離開更有力量。"}, {"title": "社羣", "author": "鯨向海", "body": ["我按了你的讚", "你按了我的讚", "我們在螢幕裡深情相望", "", "然後各自", "抱著手機入睡"], "note": "螢幕裡的親密是最遙遠的距離。"}, {"title": "厭世指南", "author": "鯨向海", "body": ["如果你厭倦了世界", "試試先厭倦自己", "", "然後你會發現", "世界其實還好", "是自己太累了"], "note": "厭世的盡頭是與自己和解。"}, {"title": "宇宙孤兒", "author": "鯨向海", "body": ["每顆星星都是孤兒", "在宇宙中漂流", "靠著自己的光", "取暖", "", "偶爾被誰看見", "就算一次擁抱"], "note": "孤獨的星星靠自己發光取暖。"}, {"title": "剛剛好", "author": "林婉瑜", "body": ["你說的剛剛好", "是我想了很久的結論", "", "像一杯水", "不冷不熱", "卻能解所有的渴"], "note": "最好的溫度是剛剛好。"}, {"title": "可能的事", "author": "林婉瑜", "body": ["可能的事太多了", "不可能的事更多", "", "你是我在不可能裡", "找到的那一個", "可能"], "note": "你是不可能中最美的可能。"}, {"title": "愛的練習", "author": "林婉瑜", "body": ["愛是一種練習", "像學游泳", "先在淺水區哭過", "", "才能在深水裡", "自在地呼吸"], "note": "愛需要在淺灘跌倒，才能在深海自在。"}, {"title": "日子", "author": "林婉瑜", "body": ["日子是一個一個的", "泡泡", "有些透明，有些五彩", "", "破掉的時候", "手掌心剩下一點涼"], "note": "日子像泡泡，消失時留下微涼。"}, {"title": "你不在的時候", "author": "林婉瑜", "body": ["你不在的時候", "椅子特別空", "杯子特別輕", "", "連時鐘都走得", "特別大聲"], "note": "你不在時，所有安靜都變得喧囂。"}, {"title": "你沒有更好的命運", "author": "任明信", "body": ["你沒有更好的命運", "這一個就是最好的", "", "下雨的時候淋雨", "天晴的時候", "把自己曬乾"], "note": "接受命運，就是最好的命運。"}, {"title": "光天化日", "author": "任明信", "body": ["光天化日之下", "我想偷走一朵雲", "和你下午三點的側臉", "", "法官問我為什麼", "我說因為太美了"], "note": "美是唯一值得犯的罪。"}, {"title": "別人", "author": "任明信", "body": ["我花了很久", "才學會不成為別人", "", "像一棵彎曲的樹", "終於不再羨慕", "筆直的電線桿"], "note": "不成為別人，是一生最難的功課。"}, {"title": "黑色的歌", "author": "任明信", "body": ["黑色是最安靜的顏色", "它收留了所有哭過的夜晚", "", "我在黑色裡", "唱一首沒有旋律的歌", "給自己聽"], "note": "黑夜收留所有無聲的眼淚。"}, {"title": "末日備忘錄", "author": "任明信", "body": ["末日來的那天", "我想和你喫一碗麵", "安靜地，不趕時間", "", "讓世界在我們的筷子之間", "慢慢結束"], "note": "如果世界要結束，我只想和你安靜喫一碗麵。"}, {"title": "還是要有傢俱才能跳舞", "author": "徐珮芬", "body": ["房間太空了", "連悲傷都沒有地方坐", "", "還是要有傢俱", "才能繞著它跳舞", "才能撞到什麼而痛"], "note": "人需要一些阻礙，才能感覺自己活著。"}, {"title": "在黑暗的日子裡", "author": "徐珮芬", "body": ["在黑暗的日子裡", "我學會了發光", "不是為了照亮什麼", "", "只是因為", "不發光就看不見自己的手"], "note": "發光不為照亮世界，只為找到自己。"}, {"title": "我只擔心雨會不會來", "author": "徐珮芬", "body": ["出門的時候", "我只擔心雨會不會來", "不擔心世界會不會毀滅", "", "因為雨是真的", "而毀滅太抽象了"], "note": "真實的小事比抽象的大事更值得在意。"}, {"title": "失眠的理由", "author": "徐珮芬", "body": ["失眠的理由有很多", "最常見的那一種", "叫做想你", "", "第二常見的", "叫做假裝不想你"], "note": "失眠是思念最誠實的樣子。"}, {"title": "致廢物", "author": "徐珮芬", "body": ["親愛的廢物", "今天也辛苦了", "", "能活到現在", "已經是一件", "很厲害的事"], "note": "活著本身就值得被肯定。"}, {"title": "任性的人", "author": "追奇", "body": ["任性的人才能被愛", "乖巧的人只能被誇", "", "我練習任性了很久", "卻只學會", "乖巧地哭"], "note": "乖巧是一種偽裝的堅強。"}, {"title": "這裡有光", "author": "追奇", "body": ["這裡有光", "不是因為天亮了", "是因為有人", "願意為你", "打開一盞燈"], "note": "光來自願意為你點燈的人。"}, {"title": "溫柔的人", "author": "追奇", "body": ["溫柔的人", "都有一個很硬的核", "", "像水蜜桃", "咬到最裡面", "會碰到石頭"], "note": "溫柔的人內心有最堅硬的核。"}, {"title": "遲到的人", "author": "追奇", "body": ["你總是遲到", "在我快要放棄的時候到", "", "像一場", "下在收傘之後的雨"], "note": "你的出現總在我快放棄的那一刻。"}, {"title": "練習快樂", "author": "追奇", "body": ["快樂需要練習", "像騎腳踏車", "一開始會跌倒", "", "但一旦學會了", "身體就會記住"], "note": "快樂是身體可以記住的事。"}, {"title": "我穿過大半個中國去睡你", "author": "餘秀華", "body": ["我穿過大半個中國去睡你", "壓過的風都是我的", "從每一個被風吹過的地方", "都有我的影子", "", "我是穿過槍林彈雨去睡你", "我是把無數的黑夜摁進一個黎明去睡你"], "note": "最野性的告白是穿越一切去找你。"}, {"title": "搖搖晃晃的人間", "author": "餘秀華", "body": ["搖搖晃晃的人間", "我走得比任何人都慢", "但我不停下來", "", "風吹歪了我的影子", "我把它扶正", "繼續走"], "note": "走得慢沒關係，不停下來就好。"}, {"title": "我愛你", "author": "餘秀華", "body": ["巴巴地活著，每天打水，煮飯", "按時喫藥", "陽光好的時候就把自己放進去", "", "像放一塊陳皮", "茶葉輪換著喝", "我愛你"], "note": "愛是把自己放進日常的陽光裡。"}, {"title": "石磨", "author": "餘秀華", "body": ["石磨轉了一輩子", "把麥子磨成了粉", "把日子磨成了皺紋", "", "它不說苦", "因為它是石頭"], "note": "沉默的承受是最深的堅韌。"}, {"title": "雪", "author": "餘秀華", "body": ["雪落在田野上", "像一封沒有字的信", "寄給所有留在村裡的人", "", "他們打開門", "讀著白茫茫的內容"], "note": "雪是天空寫給大地的無字書信。"}, {"title": "黃昏", "author": "餘秀華", "body": ["黃昏的時候", "炊煙比人誠實", "它直直地往上走", "不回頭", "", "像那些離開村莊的人"], "note": "炊煙和離鄉的人一樣，都不回頭。"}, {"title": "月亮落在田裡", "author": "餘秀華", "body": ["月亮落在稻田裡", "被水泡了一夜", "", "早晨撈起來", "已經變成了", "一粒白色的米"], "note": "月光泡在水田裡，長成了稻米。"}, {"title": "麻雀", "author": "餘秀華", "body": ["麻雀從不嫌棄屋簷", "就像我從不嫌棄", "這個搖晃的身體", "", "它能飛多高", "就飛多高"], "note": "不嫌棄自己的侷限，是最大的勇氣。"}, {"title": "手", "author": "餘秀華", "body": ["我的手不好看", "粗糙得像兩塊老樹皮", "", "但它們寫過情書", "抱過孩子", "在深夜裡握緊過自己"], "note": "粗糙的手寫過最溫柔的字。"}, {"title": "活著", "author": "餘秀華", "body": ["活著就是反覆地", "把自己從泥裡拔出來", "", "洗乾淨", "曬一曬", "然後再摔進去"], "note": "活著是一次又一次從泥濘中站起來。"}, {"title": "前世", "author": "陳先發", "body": ["前世我是一塊石頭", "在河底等了三千年", "等你涉水而過", "", "你踩了我一腳", "我就開出花來"], "note": "三千年的等待只為你一腳的觸碰。"}, {"title": "黑池壩筆記", "author": "陳先發", "body": ["池塘邊的柳樹", "把所有的綠", "都倒進水裡", "", "魚在綠色裡遊", "像在另一個春天"], "note": "水中的倒影是另一個春天。"}, {"title": "丹青見", "author": "陳先發", "body": ["山水畫裡的人很小", "小到看不清臉", "", "但他一定是快樂的", "因為他住在", "留白裡"], "note": "住在留白裡的人最自由。"}, {"title": "養鶴問題", "author": "陳先發", "body": ["養一隻鶴", "需要一座山", "一片雲", "和足夠多的沉默", "", "我只有沉默", "所以鶴沒有來"], "note": "沉默不夠，還需要山和雲。"}, {"title": "寫碑之心", "author": "陳先發", "body": ["碑上的字", "比人活得久", "", "所以刻字的人", "每一筆都很慢", "像在對抗時間"], "note": "刻字是最安靜的對抗時間的方式。"}, {"title": "親人", "author": "雷平陽", "body": ["我只愛我寄宿的雲南", "因為其他的省我都不愛", "我只愛雲南的昭通市", "", "我的愛狹隘、偏執", "像針尖上站著的螞蟻", "但這就夠了"], "note": "狹隘的愛纔是最深的愛。"}, {"title": "殺狗的過程", "author": "雷平陽", "body": ["一條狗被綁在樹上", "它看著人羣", "眼神裡沒有恨", "", "它只是不明白", "為什麼"], "note": "不明白比恨更讓人心碎。"}, {"title": "山中", "author": "雷平陽", "body": ["山裡的寺廟", "比城裡的房子安靜", "和尚掃地的聲音", "", "像一個人", "慢慢整理自己的心"], "note": "掃地是一種安靜的自我整理。"}, {"title": "瀾滄江", "author": "雷平陽", "body": ["瀾滄江不說話", "它只是一直流", "從雪山到南海", "", "把沿途的村莊", "一一記在水紋裡"], "note": "河流用水紋記錄所有經過的地方。"}, {"title": "母親", "author": "雷平陽", "body": ["母親的白髮", "是她替我趕的路", "每一根都通向", "我回不去的故鄉", "", "和她越來越矮的身影"], "note": "母親的白髮是通往故鄉的路。"}, {"title": "鏡中", "author": "張棗", "body": ["只要想起一生中後悔的事", "梅花便落了下來", "比如看她游泳到河的另一岸", "", "比如登上一株松木梯子", "危險的事固然美麗"], "note": "後悔的事與落梅一樣美而易逝。"}, {"title": "何人斯", "author": "張棗", "body": ["究竟那是什麼人", "在大雪天裡趕路", "他的影子拖得很長", "", "像一條黑色的河", "流過整個冬天"], "note": "雪地裡的身影是冬天最深的謎。"}, {"title": "春秋來信", "author": "張棗", "body": ["秋天的信比春天的短", "因為要說的話都落了葉", "", "我把信紙折成船", "放在風裡", "讓它自己找到你"], "note": "秋天的信很短，因為話都落成了葉。"}, {"title": "十月之水", "author": "張棗", "body": ["十月的水比九月涼", "涼得剛好", "可以洗掉一整個夏天的夢", "", "醒來的人站在岸邊", "看自己的倒影發呆"], "note": "十月的水洗去夏日所有的夢。"}, {"title": "卡夫卡", "author": "張棗", "body": ["他在城堡外面等", "等了一輩子", "", "門其實是開的", "但他不敢進去", "怕裡面什麼都沒有"], "note": "最大的恐懼不是進不去，而是裡面空無一物。"}, {"title": "表達", "author": "柏樺", "body": ["我想表達的東西", "總是在語言到達之前", "就消失了", "", "像一隻蝴蝶", "被看見的瞬間起飛"], "note": "語言永遠追不上感受的蝴蝶。"}, {"title": "夏天還很遠", "author": "柏樺", "body": ["夏天還很遠", "我已經開始想念冰淇淋", "", "和那個夏天", "你穿白裙子", "從陽光裡走過來"], "note": "想念的不是夏天，是夏天裡的你。"}, {"title": "往事", "author": "柏樺", "body": ["往事是一面舊鏡子", "擦不乾淨", "但捨不得扔", "", "裡面住著", "一個年輕的自己"], "note": "舊鏡子裡住著回不去的青春。"}, {"title": "衣冠", "author": "柏樺", "body": ["脫下西裝的時候", "我纔像自己", "像一棵脫了皮的樹", "", "赤裸地站在風裡", "不美但是自由"], "note": "脫去偽裝才能獲得自由。"}, {"title": "左邊", "author": "柏樺", "body": ["心臟在左邊", "所以我總是向左轉", "", "向左轉就能遇見你", "這是身體的直覺", "比大腦誠實"], "note": "身體的方向比思想更誠實。"}, {"title": "采薇", "author": "詩經", "body": ["采薇采薇，薇亦作止。", "曰歸曰歸，歲亦莫止。", "靡室靡家，玁狁之故。", "不遑啟居，玁狁之故。", "", "昔我往矣，楊柳依依。", "今我來思，雨雪霏霏。", "行道遲遲，載渴載飢。", "我心傷悲，莫知我哀！"], "note": "離家時柳綠如絲，歸來時大雪紛飛，歲月都藏在路上了。"}, {"title": "黍離", "author": "詩經", "body": ["彼黍離離，彼稷之苗。", "行邁靡靡，中心搖搖。", "知我者，謂我心憂；", "不知我者，謂我何求。", "悠悠蒼天，此何人哉！"], "note": "亡國之痛，千載之後讀來仍令人心碎。"}, {"title": "擊鼓", "author": "詩經", "body": ["擊鼓其鏜，踴躍用兵。", "土國城漕，我獨南行。", "", "從孫子仲，平陳與宋。", "不我以歸，憂心有忡。", "", "爰居爰處？爰喪其馬？", "於以求之？於林之下。", "", "死生契闊，與子成說。", "執子之手，與子偕老。", "", "于嗟闊兮，不我活兮。", "于嗟洵兮，不我信兮。"], "note": "執子之手的誓言，是亂世裡最溫柔的抵抗。"}, {"title": "靜女", "author": "詩經", "body": ["靜女其姝，俟我於城隅。", "愛而不見，搔首踟躕。", "", "靜女其孌，貽我彤管。", "彤管有煒，說懌女美。", "", "自牧歸荑，洵美且異。", "匪女之為美，美人之貽。"], "note": "戀人的禮物不論貴賤，因為送的人才是最珍貴的。"}, {"title": "氓", "author": "詩經", "body": ["氓之蚩蚩，抱布貿絲。", "匪來貿絲，來即我謀。", "送子涉淇，至於頓丘。", "匪我愆期，子無良媒。", "將子無怒，秋以為期。", "", "桑之未落，其葉沃若。", "于嗟鳩兮，無食桑葚！", "于嗟女兮，無與士耽！", "士之耽兮，猶可說也。", "女之耽兮，不可說也。", "", "桑之落矣，其黃而隕。", "自我徂爾，三歲食貧。", "淇水湯湯，漸車帷裳。", "女也不爽，士貳其行。", "士也罔極，二三其德。"], "note": "從深愛到決絕，是一個女子最痛徹的成長。"}, {"title": "木瓜", "author": "詩經", "body": ["投我以木瓜，報之以瓊琚。", "匪報也，永以為好也！", "", "投我以木桃，報之以瓊瑤。", "匪報也，永以為好也！", "", "投我以木李，報之以瓊玖。", "匪報也，永以為好也！"], "note": "禮尚往來的背後，藏著一顆想要永遠的心。"}, {"title": "碩鼠", "author": "詩經", "body": ["碩鼠碩鼠，無食我黍！", "三歲貫女，莫我肯顧。", "逝將去女，適彼樂土。", "樂土樂土，爰得我所。", "", "碩鼠碩鼠，無食我麥！", "三歲貫女，莫我肯德。", "逝將去女，適彼樂國。", "樂國樂國，爰得我直。"], "note": "百姓心中的樂土，不過是沒有剝削的安寧。"}, {"title": "伐檀", "author": "詩經", "body": ["坎坎伐檀兮，置之河之幹兮。", "河水清且漣猗。", "不稼不穡，胡取禾三百廛兮？", "不狩不獵，胡瞻爾庭有縣貆兮？", "彼君子兮，不素餐兮！"], "note": "勞動者最早的追問：不勞而獲，何以心安？"}, {"title": "國風・鄭風・子衿", "author": "詩經", "body": ["青青子衿，悠悠我心。", "縱我不往，子寧不嗣音？", "", "青青子佩，悠悠我思。", "縱我不往，子寧不來？", "", "挑兮達兮，在城闕兮。", "一日不見，如三月兮。"], "note": "一日不見如隔三月，相思本就不講道理。"}, {"title": "君子于役", "author": "詩經", "body": ["君子于役，不知其期。", "曷至哉？", "雞棲於塒，日之夕矣，羊牛下來。", "君子于役，如之何勿思！", "", "君子于役，不日不月。", "曷其有佸？", "雞棲於桀，日之夕矣，羊牛下括。", "君子于役，苟無飢渴！"], "note": "黃昏時牛羊歸來，而你不歸，是最深的思念。"}, {"title": "無衣", "author": "詩經", "body": ["豈曰無衣？與子同袍。", "王於興師，修我戈矛，與子同仇！", "", "豈曰無衣？與子同澤。", "王於興師，修我矛戟，與子偕作！", "", "豈曰無衣？與子同裳。", "王於興師，修我甲兵，與子偕行！"], "note": "同袍之誼，是戰場上最熱血的浪漫。"}, {"title": "東山", "author": "詩經", "body": ["我徂東山，慆慆不歸。", "我來自東，零雨其濛。", "我東曰歸，我心西悲。", "制彼裳衣，勿士行枚。", "蜎蜎者蠋，烝在桑野。", "敦彼獨宿，亦在車下。"], "note": "徵人歸途中的悲喜交集，是戰爭留給每個家庭的傷痕。"}, {"title": "蓼莪", "author": "詩經", "body": ["蓼蓼者莪，匪莪伊蒿。", "哀哀父母，生我劬勞。", "", "蓼蓼者莪，匪莪伊蔚。", "哀哀父母，生我勞瘁。", "", "父兮生我，母兮鞠我。", "拊我畜我，長我育我。", "顧我復我，出入腹我。", "欲報之德，昊天罔極！"], "note": "欲報親恩，而親已不在，是人世最大的遺憾。"}, {"title": "國風・王風・采葛", "author": "詩經", "body": ["彼采葛兮，一日不見，如三月兮！", "彼採蕭兮，一日不見，如三秋兮！", "彼採艾兮，一日不見，如三歲兮！"], "note": "思念令時間膨脹，一日長過三年。"}, {"title": "鶴鳴", "author": "詩經", "body": ["鶴鳴於九皋，聲聞於野。", "魚潛在淵，或在於渚。", "樂彼之園，爰有樹檀，其下維蘀。", "他山之石，可以為錯。", "", "鶴鳴於九皋，聲聞於天。", "魚在於渚，或潛在淵。", "樂彼之園，爰有樹檀，其下維穀。", "他山之石，可以攻玉。"], "note": "他山之石可以攻玉，虛心方能成器。"}, {"title": "風雨", "author": "詩經", "body": ["風雨淒淒，雞鳴喈喈。", "既見君子，雲胡不夷。", "", "風雨瀟瀟，雞鳴膠膠。", "既見君子，雲胡不瘳。", "", "風雨如晦，雞鳴不已。", "既見君子，雲胡不喜。"], "note": "風雨如晦卻見到你，一切陰霾都放晴了。"}, {"title": "月出", "author": "詩經", "body": ["月出皎兮，佼人僚兮。", "舒窈糾兮，勞心悄兮。", "", "月出皓兮，佼人懰兮。", "舒憂受兮，勞心慅兮。", "", "月出照兮，佼人燎兮。", "舒夭紹兮，勞心慘兮。"], "note": "月下美人，是詩經裡最唯美的剪影。"}, {"title": "相鼠", "author": "詩經", "body": ["相鼠有皮，人而無儀！", "人而無儀，不死何為？", "", "相鼠有齒，人而無止！", "人而無止，不死何俟？", "", "相鼠有體，人而無禮！", "人而無禮，胡不遄死？"], "note": "連老鼠都有皮有齒，人若無禮義，不如鼠也。"}, {"title": "七月", "author": "詩經", "body": ["七月流火，九月授衣。", "一之日觱發，二之日栗烈。", "無衣無褐，何以卒歲？", "三之日於耜，四之日舉趾。", "同我婦子，饁彼南畝。", "田畯至喜。"], "note": "農事之歌，記錄了先民最真實的四季流轉。"}, {"title": "小雅・鴛鴦", "author": "詩經", "body": ["鴛鴦於飛，畢之羅之。", "君子萬年，福祿宜之。", "", "鴛鴦在梁，戢其左翼。", "君子萬年，宜其遐福。"], "note": "鴛鴦比翼，是最古老的愛情意象。"}, {"title": "螽斯", "author": "詩經", "body": ["螽斯羽，詵詵兮。", "宜爾子孫，振振兮。", "", "螽斯羽，薨薨兮。", "宜爾子孫，繩繩兮。", "", "螽斯羽，揖揖兮。", "宜爾子孫，蟄蟄兮。"], "note": "多子多福的祝願，是先民對生命繁衍的禮讚。"}, {"title": "柏舟", "author": "詩經", "body": ["汎彼柏舟，亦汎其流。", "耿耿不寐，如有隱憂。", "微我無酒，以敖以遊。", "", "我心匪鑑，不可以茹。", "亦有兄弟，不可以據。", "薄言往愬，逢彼之怒。"], "note": "心事無人可訴，是最深的孤獨。"}, {"title": "將仲子", "author": "詩經", "body": ["將仲子兮，無踰我裏，無折我樹杞。", "豈敢愛之？畏我父母。", "仲可懷也，父母之言，亦可畏也。", "", "將仲子兮，無踰我牆，無折我樹桑。", "豈敢愛之？畏我諸兄。", "仲可懷也，諸兄之言，亦可畏也。"], "note": "愛與畏之間的掙扎，古今皆然。"}, {"title": "綠衣", "author": "詩經", "body": ["綠兮衣兮，綠衣黃裳。", "心之憂矣，曷維其亡？", "", "綠兮衣兮，綠衣黃裡。", "心之憂矣，曷維其已？"], "note": "睹物思人，一件舊衣承載了所有的思念。"}, {"title": "式微", "author": "詩經", "body": ["式微，式微，胡不歸？", "微君之故，胡為乎中露！", "", "式微，式微，胡不歸？", "微君之躬，胡為乎泥中！"], "note": "天都黑了，為何還不歸來？是對命運最無奈的追問。"}, {"title": "離騷（節選）", "author": "楚辭・屈原", "body": ["帝高陽之苗裔兮，朕皇考曰伯庸。", "攝提貞於孟陬兮，惟庚寅吾以降。", "皇覽揆餘初度兮，肇錫餘以嘉名。", "名餘曰正則兮，字餘曰靈均。", "", "紛吾既有此內美兮，又重之以修能。", "扈江離與辟芷兮，紉秋蘭以為佩。", "汩餘若將不及兮，恐年歲之不吾與。", "朝搴阰之木蘭兮，夕攬洲之宿莽。", "", "路漫漫其修遠兮，吾將上下而求索。"], "note": "上下求索的精神，是中國知識分子最高貴的品格。"}, {"title": "九歌・湘夫人", "author": "楚辭・屈原", "body": ["帝子降兮北渚，目眇眇兮愁予。", "嫋嫋兮秋風，洞庭波兮木葉下。", "登白薠兮騁望，與佳期兮夕張。", "鳥何萃兮蘋中，罾何為兮木上？"], "note": "秋風落葉洞庭波，千古湘妃的愁情如水長流。"}, {"title": "九歌・山鬼", "author": "楚辭・屈原", "body": ["若有人兮山之阿，被薜荔兮帶女蘿。", "既含睇兮又宜笑，子慕予兮善窈窕。", "乘赤豹兮從文貍，辛夷車兮結桂旗。", "被石蘭兮帶杜衡，折芳馨兮遺所思。"], "note": "山中的女神，是屈原筆下最浪漫的意象。"}, {"title": "九歌・國殤", "author": "楚辭・屈原", "body": ["操吳戈兮被犀甲，車錯轂兮短兵接。", "旌蔽日兮敵若雲，矢交墜兮士爭先。", "凌餘陣兮躐餘行，左驂殪兮右刃傷。", "霾兩輪兮縶四馬，援玉枹兮擊鳴鼓。", "天時墜兮威靈怒，嚴殺盡兮棄原野。", "", "身既死兮神以靈，子魂魄兮為鬼雄。"], "note": "為國捐軀者的魂魄，千年之後仍是鬼中之雄。"}, {"title": "九歌・少司命", "author": "楚辭・屈原", "body": ["秋蘭兮麋蕪，羅生兮堂下。", "綠葉兮素華，芳菲菲兮襲予。", "夫人兮自有美子，蓀何以兮愁苦？", "", "悲莫悲兮生別離，樂莫樂兮新相知。"], "note": "悲莫悲兮生別離——離別之苦，古今共感。"}, {"title": "九章・涉江", "author": "楚辭・屈原", "body": ["餘幼好此奇服兮，年既老而不衰。", "帶長鋏之陸離兮，冠切雲之崔嵬。", "被明月兮佩寶璐。", "", "世溷濁而莫餘知兮，吾方高馳而不顧。", "駕青虯兮驂白螭，吾與重華遊兮瑤之圃。"], "note": "世人皆濁我獨清，是屈原一生的堅守。"}, {"title": "天問（節選）", "author": "楚辭・屈原", "body": ["曰遂古之初，誰傳道之？", "上下未形，何由考之？", "冥昭瞢暗，誰能極之？", "馮翼惟象，何以識之？", "明明暗暗，惟時何為？", "陰陽三合，何本何化？"], "note": "對天地的追問，是人類最初的哲學。"}, {"title": "漁父", "author": "楚辭・屈原", "body": ["屈原既放，遊於江潭，行吟澤畔。", "顏色憔悴，形容枯槁。", "漁父見而問之曰：「子非三閭大夫與？何故至於斯？」", "屈原曰：「舉世皆濁我獨清，眾人皆醉我獨醒，是以見放。」", "", "漁父曰：「滄浪之水清兮，可以濯吾纓；", "滄浪之水濁兮，可以濯吾足。」"], "note": "清與濁的抉擇，是每個時代知識分子的永恆命題。"}, {"title": "九歌・東皇太一", "author": "楚辭・屈原", "body": ["吉日兮辰良，穆將愉兮上皇。", "撫長劍兮玉珥，璆鏘鳴兮琳琅。", "瑤席兮玉瑱，盍將把兮瓊芳。", "蕙餚蒸兮蘭藉，奠桂酒兮椒漿。"], "note": "祭祀天神的莊嚴，是先民對天地最虔誠的敬畏。"}, {"title": "橘頌", "author": "楚辭・屈原", "body": ["后皇嘉樹，橘徠服兮。", "受命不遷，生南國兮。", "深固難徙，更壹志兮。", "綠葉素榮，紛其可喜兮。"], "note": "橘樹生於南國不可移植，正如高潔之士不改其志。"}, {"title": "長歌行", "author": "漢・漢樂府", "body": ["青青園中葵，朝露待日晞。", "陽春佈德澤，萬物生光輝。", "常恐秋節至，焜黃華葉衰。", "百川東到海，何時復西歸？", "少壯不努力，老大徒傷悲。"], "note": "百川東到海不復西歸，時光亦然，不等人。"}, {"title": "江南", "author": "漢・漢樂府", "body": ["江南可採蓮，蓮葉何田田。", "魚戲蓮葉間。", "魚戲蓮葉東，魚戲蓮葉西，", "魚戲蓮葉南，魚戲蓮葉北。"], "note": "魚在蓮間嬉戲，是江南最生動的畫面。"}, {"title": "上邪", "author": "漢・漢樂府", "body": ["上邪！", "我欲與君相知，長命無絕衰。", "山無陵，江水為竭，", "冬雷震震，夏雨雪，", "天地合，乃敢與君絕！"], "note": "用天地翻覆來誓言不離，是最決絕的愛情宣言。"}, {"title": "陌上桑", "author": "漢・漢樂府", "body": ["日出東南隅，照我秦氏樓。", "秦氏有好女，自名為羅敷。", "羅敷喜蠶桑，採桑城南隅。", "青絲為籠係，桂枝為籠鉤。", "頭上倭墮髻，耳中明月珠。", "緗綺為下裙，紫綺為上襦。", "行者見羅敷，下擔捋髭鬚。", "少年見羅敷，脫帽著帩頭。", "耕者忘其犁，鋤者忘其鋤。", "來歸相怨怒，但坐觀羅敷。"], "note": "美到令人忘記手中活計，是最生動的側面描寫。"}, {"title": "飲馬長城窟行", "author": "漢・漢樂府", "body": ["青青河畔草，綿綿思遠道。", "遠道不可思，宿昔夢見之。", "夢見在我傍，忽覺在他鄉。", "他鄉各異縣，輾轉不相見。", "枯桑知天風，海水知天寒。", "入門各自媚，誰肯相為言。", "客從遠方來，遺我雙鯉魚。", "呼兒烹鯉魚，中有尺素書。", "長跪讀素書，書中竟何如。", "上言加餐食，下言長相憶。"], "note": "千里之外寄來的書信，不過是「多喫飯、常想你」。"}, {"title": "十五從軍徵", "author": "漢・漢樂府", "body": ["十五從軍徵，八十始得歸。", "道逢鄉里人：「家中有阿誰？」", "「遙看是君家，松柏冢累累。」", "兔從狗竇入，雉從樑上飛。", "中庭生旅穀，井上生旅葵。", "舂穀持作飯，採葵持作羹。", "羹飯一時熟，不知貽阿誰。", "出門東向看，淚落沾我衣。"], "note": "少年出征白頭歸，家中只剩荒草墳，戰爭的殘酷莫過於此。"}, {"title": "孔雀東南飛（節選）", "author": "漢・漢樂府", "body": ["孔雀東南飛，五里一徘徊。", "「十三能織素，十四學裁衣，", "十五彈箜篌，十六誦詩書，", "十七為君婦，心中常苦悲。」", "", "「君當作磐石，妾當作蒲葦，", "蒲葦紉如絲，磐石無轉移。」", "", "兩家求合葬，合葬華山傍。", "東西植松柏，左右種梧桐。", "枝枝相覆蓋，葉葉相交通。", "中有雙飛鳥，自名為鴛鴦。"], "note": "磐石蒲葦的誓言，是漢代最動人的愛情悲劇。"}, {"title": "行行重行行", "author": "漢・古詩十九首", "body": ["行行重行行，與君生別離。", "相去萬餘裏，各在天一涯。", "道路阻且長，會面安可知？", "胡馬依北風，越鳥巢南枝。", "相去日已遠，衣帶日已緩。", "浮雲蔽白日，遊子不顧反。", "思君令人老，歲月忽已晚。", "棄捐勿復道，努力加餐飯。"], "note": "千言萬語到最後，只剩一句「好好喫飯」。"}, {"title": "青青河畔草", "author": "漢・古詩十九首", "body": ["青青河畔草，鬱鬱園中柳。", "盈盈樓上女，皎皎當窗牖。", "娥娥紅粉妝，纖纖出素手。", "昔為娼家女，今為蕩子婦。", "蕩子行不歸，空牀難獨守。"], "note": "獨守空房的等待，是古代女子最無奈的命運。"}, {"title": "迢迢牽牛星", "author": "漢・古詩十九首", "body": ["迢迢牽牛星，皎皎河漢女。", "纖纖擢素手，札札弄機杼。", "終日不成章，泣涕零如雨。", "河漢清且淺，相去復幾許。", "盈盈一水間，脈脈不得語。"], "note": "銀河淺淺卻不能相見，最痛的距離不在腳下。"}, {"title": "西北有高樓", "author": "漢・古詩十九首", "body": ["西北有高樓，上與浮雲齊。", "交疏結綺窗，阿閣三重階。", "上有絃歌聲，音響一何悲！", "誰能為此曲？無乃杞梁妻。", "清商隨風發，中曲正徘徊。", "一彈再三嘆，慷慨有餘哀。", "不惜歌者苦，但傷知音稀。", "願為雙鴻鵠，奮翅起高飛。"], "note": "世間最大的寂寞，不是無人聽，而是無人懂。"}, {"title": "涉江採芙蓉", "author": "漢・古詩十九首", "body": ["涉江採芙蓉，蘭澤多芳草。", "採之慾遺誰？所思在遠道。", "還顧望舊鄉，長路漫浩浩。", "同心而離居，憂傷以終老。"], "note": "採花欲贈遠人，花在手中，人在天涯。"}, {"title": "明月何皎皎", "author": "漢・古詩十九首", "body": ["明月何皎皎，照我羅牀幃。", "憂愁不能寐，攬衣起徘徊。", "客行雖雲樂，不如早旋歸。", "出戶獨彷徨，愁思當告誰？", "引領還入房，淚下沾裳衣。"], "note": "月光照進孤獨的房間，思鄉的淚無人可訴。"}, {"title": "生年不滿百", "author": "漢・古詩十九首", "body": ["生年不滿百，常懷千歲憂。", "晝短苦夜長，何不秉燭遊？", "為樂當及時，何能待來茲？", "愚者愛惜費，但為後世嗤。", "仙人王子喬，難可與等期。"], "note": "人生苦短，何不趁夜秉燭而遊，及時行樂。"}, {"title": "驅車上東門", "author": "漢・古詩十九首", "body": ["驅車上東門，遙望郭北墓。", "白楊何蕭蕭，松柏夾廣路。", "下有陳死人，杳杳即長暮。", "潛寐黃泉下，千載永不寤。", "浩浩陰陽移，年命如朝露。", "人生忽如寄，壽無金石固。"], "note": "墓前白楊蕭蕭，提醒人生不過是一場暫寄。"}, {"title": "今日良宴會", "author": "漢・古詩十九首", "body": ["今日良宴會，歡樂難具陳。", "彈箏奮逸響，新聲妙入神。", "令德唱高言，識曲聽其真。", "齊心同所願，含意俱未申。", "人生寄一世，奄忽若飆塵。", "何不策高足，先據要路津。", "無為守窮賤，坎軻長苦辛。"], "note": "宴飲之歡難掩人生如塵的感慨。"}, {"title": "回車駕言邁", "author": "漢・古詩十九首", "body": ["回車駕言邁，悠悠涉長道。", "四顧何茫茫，東風搖百草。", "所遇無故物，焉得不速老。", "盛衰各有時，立身苦不早。", "人生非金石，豈能長壽考？", "奄忽隨物化，榮名以為寶。"], "note": "萬物都在變老，唯有好名聲可以長存。"}, {"title": "庭中有奇樹", "author": "漢・古詩十九首", "body": ["庭中有奇樹，綠葉發華滋。", "攀條折其榮，將以遺所思。", "馨香盈懷袖，路遠莫致之。", "此物何足貴？但感別經時。"], "note": "花香滿袖卻寄不到你身邊，距離讓一切禮物都變得無力。"}, {"title": "明月皎夜光", "author": "漢・古詩十九首", "body": ["明月皎夜光，促織鳴東壁。", "玉衡指孟冬，眾星何歷歷。", "白露沾野草，時節忽復易。", "秋蟬鳴樹間，玄鳥逝安適。", "昔我同門友，高舉振六翮。", "不念攜手好，棄我如遺跡。"], "note": "同窗好友一旦飛黃騰達，往日情誼便如塵土。"}, {"title": "冉冉孤生竹", "author": "漢・古詩十九首", "body": ["冉冉孤生竹，結根泰山阿。", "與君為新婚，菟絲附女蘿。", "菟絲生有時，夫婦會有宜。", "千里遠結婚，悠悠隔山陂。", "思君令人老，軒車來何遲！"], "note": "新婚便別離，等待的日子比路途更漫長。"}, {"title": "客從遠方來", "author": "漢・古詩十九首", "body": ["客從遠方來，遺我一端綺。", "相去萬餘裏，故人心尚爾。", "文彩雙鴛鴦，裁為合歡被。", "著以長相思，緣以結不解。", "以膠投漆中，誰能別離此？"], "note": "一匹錦緞做成合歡被，如膠似漆的思念不可拆。"}, {"title": "短歌行", "author": "魏・曹操", "body": ["對酒當歌，人生幾何！", "譬如朝露，去日苦多。", "慨當以慷，憂思難忘。", "何以解憂？唯有杜康。", "", "青青子衿，悠悠我心。", "但為君故，沉吟至今。", "呦呦鹿鳴，食野之苹。", "我有嘉賓，鼓瑟吹笙。", "", "明明如月，何時可掇？", "憂從中來，不可斷絕。", "越陌度阡，枉用相存。", "契闊談讌，心念舊恩。", "", "月明星稀，烏鵲南飛。", "繞樹三匝，何枝可依？", "山不厭高，海不厭深。", "周公吐哺，天下歸心。"], "note": "對酒當歌卻憂思難忘，一代梟雄的求賢若渴。"}, {"title": "觀滄海", "author": "魏・曹操", "body": ["東臨碣石，以觀滄海。", "水何澹澹，山島竦峙。", "樹木叢生，百草豐茂。", "秋風蕭瑟，洪波湧起。", "日月之行，若出其中；", "星漢燦爛，若出其裏。", "幸甚至哉，歌以詠志。"], "note": "容得下日月星辰的氣魄，是曹操獨有的胸襟。"}, {"title": "龜雖壽", "author": "魏・曹操", "body": ["神龜雖壽，猶有竟時。", "騰蛇乘霧，終為土灰。", "老驥伏櫪，志在千里。", "烈士暮年，壯心不已。", "盈縮之期，不但在天；", "養怡之福，可得永年。", "幸甚至哉，歌以詠志。"], "note": "老驥伏櫪志在千里，暮年的雄心最令人動容。"}, {"title": "蒿里行", "author": "魏・曹操", "body": ["關東有義士，興兵討羣兇。", "初期會盟津，乃心在鹹陽。", "軍合力不齊，躊躇而雁行。", "勢利使人爭，嗣還自相戕。", "淮南弟稱號，刻璽於北方。", "鎧甲生蟣蝨，萬姓以死亡。", "白骨露於野，千里無雞鳴。", "生民百遺一，念之斷人腸。"], "note": "白骨露野千里無雞鳴，亂世的真相是生民塗炭。"}, {"title": "白馬篇", "author": "魏・曹植", "body": ["白馬飾金羈，連翩西北馳。", "借問誰家子，幽並遊俠兒。", "少小去鄉邑，揚聲沙漠垂。", "宿昔秉良弓，楛矢何參差。", "控弦破左的，右發摧月支。", "仰手接飛猱，俯身散馬蹄。", "狡捷過猴猿，勇剽若豹螭。", "", "棄身鋒刃端，性命安可懷？", "父母且不顧，何言子與妻！", "名編壯士籍，不得中顧私。", "捐軀赴國難，視死忽如歸！"], "note": "捐軀赴國難視死忽如歸，是少年英雄最壯烈的理想。"}, {"title": "七步詩", "author": "魏・曹植", "body": ["煮豆持作羹，漉菽以為汁。", "萁在釜下燃，豆在釜中泣。", "本自同根生，相煎何太急？"], "note": "骨肉相殘的悲劇，七步之內道盡千古傷痛。"}, {"title": "洛神賦（節選）", "author": "魏・曹植", "body": ["其形也，翩若驚鴻，婉若遊龍。", "榮曜秋菊，華茂春松。", "髣髴兮若輕雲之蔽月，飄颻兮若流風之迴雪。", "遠而望之，皎若太陽升朝霞；", "迫而察之，灼若芙蕖出淥波。"], "note": "翩若驚鴻婉若遊龍，是中國文學中最美的女性形象。"}, {"title": "燕歌行", "author": "魏・曹丕", "body": ["秋風蕭瑟天氣涼，草木搖落露為霜。", "羣燕辭歸鵠南翔，念君客遊思斷腸。", "慊慊思歸戀故鄉，君何淹留寄他方？", "賤妾煢煢守空房，憂來思君不敢忘，不覺淚下沾衣裳。", "援琴鳴弦發清商，短歌微吟不能長。", "明月皎皎照我牀，星漢西流夜未央。", "牽牛織女遙相望，爾獨何辜限河梁。"], "note": "七言詩之祖，秋夜的思念長過銀河。"}, {"title": "詠懷詩（其一）", "author": "魏・阮籍", "body": ["夜中不能寐，起坐彈鳴琴。", "薄帷鑒明月，清風吹我襟。", "孤鴻號外野，翔鳥鳴北林。", "徘徊將何見？憂思獨傷心。"], "note": "夜半撫琴的孤獨，是亂世文人無處安放的憂愁。"}, {"title": "詠史（其二）", "author": "晉・左思", "body": ["鬱鬱澗底松，離離山上苗。", "以彼徑寸莖，蔭此百尺條。", "世胄躡高位，英俊沉下僚。", "地勢使之然，由來非一朝。", "金張藉舊業，七葉珥漢貂。", "馮公豈不偉，白首不見招。"], "note": "澗底之松高於山上之苗，卻被地勢所限，世道不公古已有之。"}, {"title": "飲酒（其五）", "author": "晉・陶淵明", "body": ["結廬在人境，而無車馬喧。", "問君何能爾？心遠地自偏。", "採菊東籬下，悠然見南山。", "山氣日夕佳，飛鳥相與還。", "此中有真意，欲辨已忘言。"], "note": "心遠地自偏，真正的自由不在遠方，在心境。"}, {"title": "歸園田居（其一）", "author": "晉・陶淵明", "body": ["少無適俗韻，性本愛丘山。", "誤落塵網中，一去三十年。", "羈鳥戀舊林，池魚思故淵。", "開荒南野際，守拙歸園田。", "方宅十餘畝，草屋八九間。", "榆柳蔭後簷，桃李羅堂前。", "曖曖遠人村，依依墟里煙。", "狗吠深巷中，雞鳴桑樹顛。", "戶庭無塵雜，虛室有餘閒。", "久在樊籠裡，復得返自然。"], "note": "三十年塵網終於掙脫，歸田是最大的自由。"}, {"title": "歸園田居（其三）", "author": "晉・陶淵明", "body": ["種豆南山下，草盛豆苗稀。", "晨興理荒穢，帶月荷鋤歸。", "道狹草木長，夕露沾我衣。", "衣沾不足惜，但使願無違。"], "note": "帶月荷鋤歸的瀟灑，是不違本心的代價。"}, {"title": "桃花源記（詩）", "author": "晉・陶淵明", "body": ["嬴氏亂天紀，賢者避其世。", "黃綺之商山，伊人亦云逝。", "往跡浸復湮，來徑遂蕪廢。", "相命肆農耕，日入從所憩。", "桑竹垂餘蔭，菽稷隨時藝。", "春蠶收長絲，秋熟靡王稅。", "荒路曖交通，雞犬互鳴吠。", "俎豆猶古法，衣裳無新製。", "童孺縱行歌，斑白歡遊詣。"], "note": "桃源的美好不在仙境，在沒有壓迫的人間。"}, {"title": "雜詩（其一）", "author": "晉・陶淵明", "body": ["人生無根蒂，飄如陌上塵。", "分散逐風轉，此已非常身。", "落地為兄弟，何必骨肉親！", "得歡當作樂，斗酒聚比鄰。", "盛年不重來，一日難再晨。", "及時當勉勵，歲月不待人。"], "note": "盛年不重來，及時當勉勵——陶潛也有勵志的一面。"}, {"title": "讀山海經（其一）", "author": "晉・陶淵明", "body": ["孟夏草木長，繞屋樹扶疏。", "眾鳥欣有託，吾亦愛吾廬。", "既耕亦已種，時還讀我書。", "窮巷隔深轍，頗迴故人車。", "歡言酌春酒，摘我園中蔬。", "微雨從東來，好風與之俱。", "泛覽周王傳，流觀山海圖。", "俯仰終宇宙，不樂復何如？"], "note": "耕完田再讀書，俯仰間與宇宙同樂。"}, {"title": "移居（其二）", "author": "晉・陶淵明", "body": ["春秋多佳日，登高賦新詩。", "過門更相呼，有酒斟酌之。", "農務各自歸，閒暇輒相思。", "相思則披衣，言笑無厭時。", "此理將不勝？無為忽去茲。", "衣食當須紀，力耕不吾欺。"], "note": "鄰裏有酒便相呼，最好的生活不過如此簡單。"}, {"title": "歸去來兮辭（節選）", "author": "晉・陶淵明", "body": ["歸去來兮，田園將蕪胡不歸？", "既自以心為形役，奚惆悵而獨悲？", "悟已往之不諫，知來者之可追。", "實迷途其未遠，覺今是而昨非。", "", "舟遙遙以輕颺，風飄飄而吹衣。", "問征夫以前路，恨晨光之熹微。"], "note": "覺今是而昨非，醒悟的那一刻便是新生。"}, {"title": "詠荊軻", "author": "晉・陶淵明", "body": ["燕丹善養士，志在報強嬴。", "招集百夫良，歲暮得荊卿。", "君子死知己，提劍出燕京。", "素驥鳴廣陌，慷慨送我行。", "雄髮指危冠，猛氣衝長纓。", "飲餞易水上，四座列羣英。", "漸離擊悲筑，宋意唱高聲。", "蕭蕭哀風逝，淡淡寒波生。", "商音更流涕，羽奏壯士驚。", "心知去不歸，且有後世名。"], "note": "風蕭蕭兮易水寒，壯士一去不復還的悲壯。"}, {"title": "擬行路難（其四）", "author": "南朝・鮑照", "body": ["瀉水置平地，各自東西南北流。", "人生亦有命，安能行歎復坐愁？", "酌酒以自寬，舉杯斷絕歌路難。", "心非木石豈無感？吞聲躑躅不敢言。"], "note": "心非木石豈無感，卻只能把苦楚吞進肚裡。"}, {"title": "登池上樓", "author": "南朝・謝靈運", "body": ["潛虯媚幽姿，飛鴻響遠音。", "薄霄愧雲浮，棲川怍淵沈。", "進德智所拙，退耕力不任。", "徇祿反窮海，臥痾對空林。", "衾枕昧節候，褰開暫窺臨。", "傾耳聆波瀾，舉目眺嶇嶔。", "初景革緒風，新陽改故陰。", "池塘生春草，園柳變鳴禽。"], "note": "池塘生春草——春天悄然而至，是最自然的詩意。"}, {"title": "晚登三山還望京邑", "author": "南朝・謝朓", "body": ["灞涘望長安，河陽視京縣。", "白日麗飛甍，參差皆可見。", "餘霞散成綺，澄江靜如練。", "喧鳥覆春洲，雜英滿芳甸。", "去矣方滯淫，懷哉罷歡宴。", "佳期悵何許，淚下如流霰。"], "note": "餘霞散成綺澄江靜如練，是六朝最華美的落日。"}, {"title": "西洲曲", "author": "南朝・民歌", "body": ["憶梅下西洲，折梅寄江北。", "單衫杏子紅，雙鬢鴉雛色。", "西洲在何處？兩槳橋頭渡。", "日暮伯勞飛，風吹烏臼樹。", "", "採蓮南塘秋，蓮花過人頭。", "低頭弄蓮子，蓮子清如水。", "置蓮懷袖中，蓮心徹底紅。", "", "南風知我意，吹夢到西洲。"], "note": "蓮子清如水蓮心徹底紅，借蓮寫情寫到了極致。"}, {"title": "木蘭詩（節選）", "author": "南朝・民歌", "body": ["唧唧復唧唧，木蘭當戶織。", "不聞機杼聲，唯聞女嘆息。", "問女何所思，問女何所憶。", "女亦無所思，女亦無所憶。", "昨夜見軍帖，可汗大點兵。", "軍書十二卷，卷卷有爺名。", "阿爺無大兒，木蘭無長兄。", "願為市鞍馬，從此替爺徵。", "", "萬裏赴戎機，關山度若飛。", "朔氣傳金柝，寒光照鐵衣。", "將軍百戰死，壯士十年歸。"], "note": "代父從軍的巾幗英雄，千年之後仍令人敬仰。"}, {"title": "敕勒歌", "author": "南朝・北朝民歌", "body": ["敕勒川，陰山下。", "天似穹廬，籠蓋四野。", "天蒼蒼，野茫茫，", "風吹草低見牛羊。"], "note": "天蒼蒼野茫茫，北方草原的遼闊一唱千年。"}, {"title": "哀江南賦序（節選）", "author": "南朝・庾信", "body": ["粵以戊辰之年，建亥之月，大盜移國，金陵瓦解。", "餘乃竄身荒谷，公私塗炭。", "日暮途遠，人間何世！", "將軍一去，大樹飄零；壯士不還，寒風蕭瑟。", "", "傅燮之但悲身世，無處求生；", "袁安之每念王室，自然流涕。"], "note": "大樹飄零壯士不還，亡國之臣的悲痛入骨三分。"}, {"title": "擬詠懷（其十一）", "author": "南朝・庾信", "body": ["搖落秋為氣，淒涼多怨情。", "啼枯湘水竹，哭壞杞梁城。", "天亡遭憤戰，日蹙值愁兵。", "直虹朝映壘，長星夜落營。", "楚歌饒恨曲，南風多死聲。", "眼前一杯酒，誰論身後名。"], "note": "身後名不及眼前酒，亂世中的絕望與達觀。"}, {"title": "贈範曄詩", "author": "南朝・陸凱", "body": ["折花逢驛使，寄與隴頭人。", "江南無所有，聊贈一枝春。"], "note": "江南無所有隻寄一枝春，最輕的禮物最重的情意。"}, {"title": "吳均與朱元思書", "author": "南朝・吳均", "body": ["風煙俱淨，天山共色。", "從流飄蕩，任意東西。", "自富陽至桐廬一百許裏，奇山異水，天下獨絕。", "", "水皆縹碧，千丈見底。", "遊魚細石，直視無礙。", "急湍甚箭，猛浪若奔。"], "note": "千丈水底清澈見魚，富春江的美令人忘歸。"}, {"title": "入若耶溪", "author": "南朝・王籍", "body": ["艅艎何泛泛，空水共悠悠。", "陰霞生遠岫，陽景逐迴流。", "蟬噪林逾靜，鳥鳴山更幽。", "此地動歸念，長年悲倦遊。"], "note": "蟬噪林逾靜鳥鳴山更幽，以聲寫靜的千古名句。"}, {"title": "別賦（節選）", "author": "南朝・江淹", "body": ["黯然銷魂者，唯別而已矣！", "況秦吳兮絕國，復燕趙兮千里。", "或春苔兮始生，乍秋風兮暫起。", "是以行子腸斷，百感淒惻。", "風蕭蕭而異響，雲漫漫而奇色。"], "note": "黯然銷魂者唯別而已矣，一句話道盡離愁。"}, {"title": "詠史（其二）", "author": "魏・阮籍", "body": ["嘉樹下成蹊，東園桃與李。", "秋風吹飛藿，零落從此始。", "繁華有憔悴，堂上生荊杞。", "驅馬舍之去，去上西山趾。", "一身不自保，何況戀妻子。", "凝霜被野草，歲暮亦云已。"], "note": "繁華有憔悴之日，人生的無常是永恆的主題。"}, {"title": "贈秀才入軍（其十四）", "author": "魏・嵇康", "body": ["息徒蘭圃，秣馬華山。", "流磻平皋，垂綸長川。", "目送歸鴻，手揮五絃。", "俯仰自得，遊心太玄。", "嘉彼釣叟，得魚忘筌。", "郢人逝矣，誰與盡言。"], "note": "目送歸鴻手揮五絃，是魏晉風度的極致瀟灑。"}, {"title": "詠懷詩（其三十一）", "author": "魏・阮籍", "body": ["駕言發魏都，南向望吹臺。", "簫管有遺音，梁王安在哉？", "戰士食糟糠，賢者處蒿萊。", "歌舞曲未終，秦兵已復來。", "夾林非吾有，朱宮生塵埃。", "軍敗華陽下，身竟為土灰。"], "note": "歌舞未終兵已至，繁華轉瞬成灰燼。"}, {"title": "雜詩（其二）", "author": "魏・曹植", "body": ["轉蓬離本根，飄颻隨長風。", "何意回飈舉，吹我入雲中。", "高高上無極，天路安可窮？", "類此遊客子，捐軀遠從戎。", "毛褐不掩形，薇藿常不充。", "去去莫復道，沉憂令人老。"], "note": "如蓬草般無根漂泊，遊子的孤獨無處訴說。"}, {"title": "詠雪聯句", "author": "晉・謝道韞等", "body": ["白雪紛紛何所似？", "撒鹽空中差可擬。", "未若柳絮因風起。"], "note": "柳絮因風起，才女的靈氣勝過一切比喻。"}, {"title": "詠史（其五）", "author": "晉・左思", "body": ["皓天舒白日，靈景耀神州。", "列宅紫宮裏，飛宇若雲浮。", "峨峨高門內，藹藹皆王侯。", "自非攀龍客，何為歘來遊？", "被褐出閶闔，高步追許由。", "振衣千仞岡，濯足萬裏流。"], "note": "振衣千仞岡濯足萬裏流，超脫的氣度令人心折。"}, {"title": "贈婦詩（其三）", "author": "魏・秦嘉", "body": ["肅肅僕夫徵，鏘鏘揚和鈴。", "清晨當引邁，束帶待雞鳴。", "顧看空室中，彷彿想姿形。", "一別懷萬恨，起坐為不寧。", "何用敘我心？遺思致款誠。", "寶釵好耀首，明鏡可鑒形。", "芳香去垢穢，素琴有清聲。", "詩人感木瓜，乃欲答瑤瓊。", "愧彼贈我厚，慚此往物輕。"], "note": "臨行前回望空房中妻子的身影，是最真摯的離情。"}, {"title": "悼亡詩（其一）", "author": "晉・潘岳", "body": ["荏苒冬春謝，寒暑忽流易。", "之子歸窮泉，重壤永幽隔。", "私懷誰克從，淹留亦何益。", "僶俛恭朝命，迴心反初役。", "望廬思其人，入室想所歷。", "幃屏無髣髴，翰墨有餘跡。", "流芳未及歇，遺掛猶在壁。", "悵恍如或存，迴遑忡驚惕。"], "note": "亡妻的翰墨遺跡還在壁上，人已永隔，是最深的悼念。"}, {"title": "蘭亭集序（節選）", "author": "晉・王羲之", "body": ["永和九年，歲在癸丑，暮春之初，會於會稽山陰之蘭亭。", "羣賢畢至，少長鹹集。", "此地有崇山峻嶺，茂林修竹，又有清流激湍，映帶左右。", "引以為流觴曲水，列坐其次。", "雖無絲竹管絃之盛，一觴一詠，亦足以暢敘幽情。", "", "仰觀宇宙之大，俯察品類之盛，", "所以遊目騁懷，足以極視聽之娛，信可樂也。"], "note": "仰觀俯察之間，是魏晉名士最瀟灑的人生態度。"}, {"title": "詠白雲", "author": "南朝・陶弘景", "body": ["山中何所有，嶺上多白雲。", "只可自怡悅，不堪持贈君。"], "note": "山中只有白雲，卻是世間最奢侈的禮物。"}, {"title": "中呂・朝天子・詠喇叭", "author": "明・王磐", "body": ["喇叭，嗩吶，曲兒小腔兒大。", "官船來往亂如麻，全仗你抬聲價。", "軍聽了軍愁，民聽了民怕。", "哪裏去辨甚麼真共假？", "眼見的吹翻了這家，吹傷了那家，", "只吹的水盡鵝飛罷！"], "note": "小小喇叭吹盡民脂民膏，諷刺入骨三分。"}, {"title": "石灰吟", "author": "明・于謙", "body": ["千錘萬鑿出深山，烈火焚燒若等閒。", "粉骨碎身渾不怕，要留清白在人間。"], "note": "粉身碎骨也要留清白，是為官者最高的節操。"}, {"title": "詠煤炭", "author": "明・于謙", "body": ["鑿開混沌得烏金，藏蓄陽和意最深。", "爝火燃回春浩浩，洪爐照破夜沉沉。", "鼎彝元賴生成力，鐵石猶存死後心。", "但願蒼生俱飽暖，不辭辛苦出山林。"], "note": "但願蒼生俱飽暖，是最質樸的為民情懷。"}, {"title": "入京", "author": "明・于謙", "body": ["絹帕蘑菇與線香，本資民用反為殃。", "清風兩袖朝天去，免得閭閻話短長。"], "note": "兩袖清風入京城，是千古廉吏的典範。"}, {"title": "登金陵雨花臺望大江", "author": "明・高啟", "body": ["大江來從萬山中，山勢盡與江流東。", "鍾山如龍獨西上，欲破巨浪乘長風。", "江山相雄不相讓，形勝爭誇天下壯。", "秦皇空此瘞黃金，佳氣蔥蔥至今王。", "我懷鬱塞何由開，酒酣走上城南臺。", "坐覺蒼茫萬古意，遠自荒煙落日之中來。"], "note": "大江東去鍾山西上，金陵的氣勢令人胸懷大開。"}, {"title": "尋胡隱君", "author": "明・高啟", "body": ["渡水復渡水，看花還看花。", "春風江上路，不覺到君家。"], "note": "一路看花不知不覺就到了，最好的拜訪不在目的地。"}, {"title": "梅花九首（其一）", "author": "明・高啟", "body": ["瓊姿只合在瑤臺，誰向江南處處栽？", "雪滿山中高士臥，月明林下美人來。", "寒依疏影蕭蕭竹，春掩殘香漠漠苔。", "自去何郎無好詠，東風愁寂幾回開。"], "note": "雪中高士月下美人，梅花的兩種風骨盡在其中。"}, {"title": "青丘子歌", "author": "明・高啟", "body": ["青丘子，瘦如鶴，短蓑長箭落魄。", "白眼望青天，時復一中矢。", "醉來幽興有誰知？朝吟暮醉總是詩。", "不肯折腰為五斗，寧可長飢到白頭。"], "note": "不折腰寧長飢，是文人最硬的骨頭。"}, {"title": "桃花庵歌", "author": "明・唐寅", "body": ["桃花塢裏桃花庵，桃花庵下桃花仙。", "桃花仙人種桃樹，又摘桃花換酒錢。", "酒醒只在花前坐，酒醉還來花下眠。", "半醒半醉日復日，花落花開年復年。", "但願老死花酒間，不願鞠躬車馬前。", "車塵馬足富者趣，酒盞花枝貧者緣。", "若將富貴比貧者，一在平地一在天。", "若將貧賤比車馬，他得驅馳我得閒。", "別人笑我太瘋癲，我笑他人看不穿。", "不見五陵豪傑墓，無花無酒鋤作田。"], "note": "半醉半醒花酒間，看似瘋癲實是看穿了人生。"}, {"title": "一剪梅・雨打梨花深閉門", "author": "明・唐寅", "body": ["雨打梨花深閉門，忘了青春，誤了青春。", "賞心樂事共誰論？花下銷魂，月下銷魂。", "", "愁聚眉峯盡日顰，千點啼痕，萬點啼痕。", "曉看天色暮看雲，行也思君，坐也思君。"], "note": "行也思君坐也思君，無時無刻不在想你。"}, {"title": "把酒對月歌", "author": "明・唐寅", "body": ["李白前時原有月，惟有李白詩能說。", "李白如今已仙去，月在青天幾圓缺？", "今人猶歌李白詩，明月還如李白時。", "我學李白對明月，白與明月安能知！", "李白能詩復能酒，我今百杯復千首。", "我愧雖無李白才，料應月不嫌我醜。", "我也不登天子船，我也不上長安眠。", "姑蘇城外一茅屋，萬樹桃花月滿天。"], "note": "不登天子船不上長安眠，桃花月下自逍遙。"}, {"title": "言志", "author": "明・唐寅", "body": ["不鍊金丹不坐禪，不為商賈不耕田。", "閒來寫就青山賣，不使人間造孽錢。"], "note": "賣畫為生不染塵俗，是文人最體面的謀生。"}, {"title": "臨江仙・滾滾長江東逝水", "author": "明・楊慎", "body": ["滾滾長江東逝水，浪花淘盡英雄。", "是非成敗轉頭空。", "青山依舊在，幾度夕陽紅。", "", "白髮漁樵江渚上，慣看秋月春風。", "一壺濁酒喜相逢。", "古今多少事，都付笑談中。"], "note": "是非成敗轉頭空，看盡歷史的人最懂釋然。"}, {"title": "竹枝詞", "author": "明・楊慎", "body": ["錦城絲管日紛紛，半入江風半入雲。", "滇海月明來照客，蜀天晴好似迎君。"], "note": "從蜀地到滇南，月光和鄉愁一路相隨。"}, {"title": "泛太湖", "author": "明・王鏊", "body": ["長風掛席出江津，極目平湖萬頃新。", "漁火有時明暗浦，蘆花無數亂秋汀。", "龜山欲暝雲猶積，黿瀆初晴浪未平。", "好是夕陽凝睇處，殘霞一片繞空青。"], "note": "太湖萬頃波光，殘霞映空青，美到忘歸。"}, {"title": "瀑布", "author": "明・楊慎", "body": ["萬裏水從天上來，亂雲飛雪噴成堆。", "夕陽映著銀河落，彷彿仙人掛玉杯。"], "note": "瀑布如銀河倒掛，大自然的壯麗不需矯飾。"}, {"title": "教條示龍場諸生", "author": "明・王守仁", "body": ["險夷原不滯胸中，何異浮雲過太空。", "夜靜海濤三萬裏，月明飛錫下天風。"], "note": "險夷如浮雲過太空，心學大師的胸懷無礙。"}, {"title": "泛海", "author": "明・王守仁", "body": ["險夷原不滯胸中，何異浮雲過太空。", "夜靜海濤三萬裏，月明飛錫下天風。"], "note": "三萬裏海濤在月光下不過是心中一片清明。"}, {"title": "春日花園雜詠", "author": "明・王守仁", "body": ["焚香默坐草堂中，一縷氤氳透碧空。", "吾道自來通萬物，何須更問雨和風。"], "note": "心通萬物，便不必在乎外在的風雨。"}, {"title": "別諸生", "author": "明・王守仁", "body": ["綿綿聖學已千秋，兩字良知是血酬。", "萬裏風波歸夢遠，一山花草入吟幽。", "天池浮雲變古今，風竹清陰正好留。"], "note": "良知二字是千秋聖學的精髓。"}, {"title": "滿井遊記（節選）", "author": "明・袁宏道", "body": ["廿二日天稍和，偕數友出東直，至滿井。", "高柳夾堤，土膏微潤，一望空闊，若脫籠之鵠。", "", "山巒為晴雪所洗，娟然如拭，鮮妍明媚，", "如倩女之靧面而髻鬟之始掠也。"], "note": "早春的山巒如洗面的少女，清新得令人心動。"}, {"title": "西湖雜詩", "author": "明・袁宏道", "body": ["修眉斂黛對春愁，碧水紅蓮引客留。", "半是煙霞半是夢，一船明月一船秋。"], "note": "一船明月一船秋，西湖的美在半夢半醒之間。"}, {"title": "戲題齋壁", "author": "明・袁宏道", "body": ["了知身是患中身，始悟閒為天下珍。", "萬事不如身處好，一生能有幾回真。"], "note": "一生能有幾回真，閒暇纔是人間至寶。"}, {"title": "春暮西園", "author": "明・高攀龍", "body": ["綠池芳草滿晴波，春色都從雨裏過。", "知是人家花落盡，菜畦今日蝶來多。"], "note": "花謝蝶去菜畦來，春天自有替補的美。"}, {"title": "絕句", "author": "明・夏完淳", "body": ["揚鞭慷慨蒞中原，不為仇讎不為恩。", "只覺蒼天方憒憒，莫教奇禍到忠門。"], "note": "少年英雄慷慨赴義，十七歲的忠魂令人動容。"}, {"title": "別雲間", "author": "明・夏完淳", "body": ["三年羈旅客，今日又南冠。", "無限山河淚，誰言天地寬！", "已知泉路近，欲別故鄉難。", "毅魄歸來日，靈旗空際看。"], "note": "毅魄歸來靈旗空際看，是少年殉國的壯烈。"}, {"title": "秋望", "author": "明・李夢陽", "body": ["黃河水繞漢宮牆，河上秋風雁幾行。", "客子過壕追野馬，將軍韜箭射天狼。", "黃塵古渡迷飛挽，白月橫空冷戰場。", "聞道朔方多勇略，只今誰是郭汾陽。"], "note": "秋風古渡冷戰場，邊塞的蒼涼呼喚英雄。"}, {"title": "詠月", "author": "明・李夢陽", "body": ["碧落銀盤掛玉鉤，清光無限照神州。", "不知天上為何事，又到人間一度秋。"], "note": "月亮每年照一回秋，人間的變與不變都在其光中。"}, {"title": "竹", "author": "明・劉基", "body": ["落盡羣花獨自芳，紅塵不到臥雲房。", "挺身自有凌雲節，卻恥隨風作柳狂。"], "note": "竹有凌雲之節卻不隨風搖擺，是君子的寫照。"}, {"title": "絕句", "author": "明・劉基", "body": ["人生無百歲，百歲復如何？", "古來英雄士，各已歸山河。"], "note": "英雄終歸山河，何必執著於百歲之齡。"}, {"title": "賣柑者言（節選）", "author": "明・劉基", "body": ["觀其坐高堂，騎大馬，醉醇醴而飫肥鮮者，", "孰不巍巍乎可畏，赫赫乎可象也？", "又何往而不金玉其外，敗絮其中也哉！"], "note": "金玉其外敗絮其中，是對虛偽權貴最辛辣的諷刺。"}, {"title": "題墨葡萄詩", "author": "明・徐渭", "body": ["半生落魄已成翁，獨立書齋嘯晚風。", "筆底明珠無處賣，閒拋閒擲野藤中。"], "note": "滿腹才華無人識，只能拋擲在野藤之間。"}, {"title": "秋興八首（其一）", "author": "明・王世貞", "body": ["西風吹客上高樓，目盡秋光不自由。", "萬裏長城今尚在，不見當年秦始皇。"], "note": "長城尚在建造者已逝，一切功業終抵不過時光。"}, {"title": "湖上雜詩", "author": "明・袁宏道", "body": ["葛嶺花開二月天，遊人來往說神仙。", "老夫心與遊人異，不羨神仙羨少年。"], "note": "不羨神仙羨少年，最真實的感慨莫過於此。"}, {"title": "過文信國祠同舟中諸公", "author": "明・陳子龍", "body": ["愁風逆雨千年淚，碧草荒煙一片心。", "只道丹心能報國，不知末路有知音。"], "note": "丹心報國至末路，才知誰是真知音。"}, {"title": "馬上作", "author": "明・戚繼光", "body": ["南北驅馳報主情，江花邊草笑平生。", "一年三百六十日，多是橫戈馬上行。"], "note": "三百六十日橫戈馬上，是將軍最孤獨的忠誠。"}, {"title": "望闕臺", "author": "明・戚繼光", "body": ["十年驅馳海色寒，孤臣於此望宸鸞。", "繁霜盡是心頭血，灑向千峯秋葉丹。"], "note": "繁霜是心頭血灑成秋葉丹，忠臣的赤誠染紅了山川。"}, {"title": "詠竹", "author": "明・鄭板橋", "body": ["一節復一節，千枝攢萬葉。", "我自不開花，免撩蜂與蝶。"], "note": "不開花免撩蜂蝶，竹子的高潔在於不招搖。"}, {"title": "出塞", "author": "明・戚繼光", "body": ["萬裏腰間帶吳鉤，男兒無處不封侯。", "年年戰骨埋荒外，空見蒲桃入漢家。"], "note": "年年戰骨埋荒外，邊功的代價是無數將士的白骨。"}, {"title": "燕子樓", "author": "明・文徵明", "body": ["鈿帶羅衫色似煙，幾回欲去又流連。", "傷心一覺繁華夢，人在燕子樓中天。"], "note": "繁華一夢醒來，人還在舊樓中守著舊時月光。"}, {"title": "除夕", "author": "明・文徵明", "body": ["人家除夕正忙時，我自挑燈揀舊詩。", "莫笑書生太迂闊，一年功事是文詞。"], "note": "除夕夜別人忙年，書生卻在挑燈揀詩，可敬也可嘆。"}, {"title": "感事", "author": "明・袁枚", "body": ["天道何曾盡苦辛，成名原自有前因。", "春風得意馬蹄疾，一日看盡長安花。"], "note": "春風得意時莫忘曾經的辛苦。"}, {"title": "夜歸鹿門歌", "author": "明・何景明", "body": ["山寺鐘鳴晝已昏，漁梁渡頭爭渡喧。", "人隨沙路向江村，餘亦乘舟歸鹿門。", "鹿門月照開煙樹，忽到龐公棲隱處。", "巖扉松徑長寂寥，惟有幽人自來去。"], "note": "鹿門山月照開煙樹，隱者的世界只有自己。"}, {"title": "秋柳四首（其一）", "author": "清・王士禛", "body": ["秋來何處最銷魂？殘照西風白下門。", "他日差池春燕影，只今憔悴晚煙痕。", "愁生陌上黃驄曲，夢遠江南烏夜村。", "莫聽臨風三弄笛，玉關哀怨總難論。"], "note": "秋柳憔悴如人，銷魂處是時光的無情。"}, {"title": "木蘭花・擬古決絕詞", "author": "清・納蘭性德", "body": ["人生若只如初見，何事秋風悲畫扇。", "等閒變卻故人心，卻道故人心易變。", "", "驪山語罷清宵半，淚雨零鈴終不怨。", "何如薄倖錦衣郎，比翼連枝當日願。"], "note": "人生若只如初見，所有的遺憾都始於變心。"}, {"title": "長相思", "author": "清・納蘭性德", "body": ["山一程，水一程，身向榆關那畔行，夜深千帳燈。", "", "風一更，雪一更，聒碎鄉心夢不成，故園無此聲。"], "note": "山水千程雪風千更，故園的安靜是最深的鄉愁。"}, {"title": "浣溪沙・誰念西風獨自涼", "author": "清・納蘭性德", "body": ["誰念西風獨自涼，蕭蕭黃葉閉疏窗。沉思往事立殘陽。", "", "被酒莫驚春睡重，賭書消得潑茶香。當時只道是尋常。"], "note": "當時只道是尋常，失去後才知那是最珍貴的日常。"}, {"title": "浣溪沙・殘雪凝輝冷畫屏", "author": "清・納蘭性德", "body": ["殘雪凝輝冷畫屏，落梅橫笛已三更，更無人處月朧明。", "", "我是人間惆悵客，知君何事淚縱橫，斷腸聲裏憶平生。"], "note": "我是人間惆悵客，納蘭的一生都在這句話裡。"}, {"title": "蝶戀花・出塞", "author": "清・納蘭性德", "body": ["今古河山無定據，畫角聲中，牧馬頻來去。", "滿目荒涼誰可語？西風吹老丹楓樹。", "", "從前幽怨應無數，鐵馬金戈，青塚黃昏路。", "一往情深深幾許？深山夕照深秋雨。"], "note": "一往情深深幾許——深山夕照深秋雨，三個深字道盡深情。"}, {"title": "畫堂春", "author": "清・納蘭性德", "body": ["一生一代一雙人，爭教兩處銷魂。", "相思相望不相親，天為誰春。", "", "漿向藍橋易乞，藥成碧海難奔。", "若容相訪飲牛津，相對忘貧。"], "note": "一生一代一雙人，最簡單的願望卻最難實現。"}, {"title": "虞美人", "author": "清・納蘭性德", "body": ["銀牀淅瀝青梧老，屧粉秋蛩掃。", "採香行處蹙連錢，拾得翠翹何恨不能言。", "", "迴廊一寸相思地，落月成孤倚。", "背燈和月就花陰，已是十年蹤跡十年心。"], "note": "十年蹤跡十年心，歲月不曾沖淡半分思念。"}, {"title": "南鄉子・為亡婦題照", "author": "清・納蘭性德", "body": ["淚咽卻無聲，只向從前悔薄情。", "憑仗丹青重省識，盈盈。一片傷心畫不成。", "", "別語忒分明，午夜鶼鶼夢早醒。", "卿自早醒儂自夢，更更。泣盡風檐夜雨鈴。"], "note": "一片傷心畫不成，悼亡之痛連丹青都承載不了。"}, {"title": "如夢令", "author": "清・納蘭性德", "body": ["萬帳穹廬人醉，星影搖搖欲墜。", "歸夢隔狼河，又被河聲攪碎。", "還睡，還睡，解道醒來無味。"], "note": "醒來無味不如醉睡，塞外的思鄉太苦了。"}, {"title": "菩薩蠻", "author": "清・納蘭性德", "body": ["朔風吹散三更雪，倩魂猶戀桃花月。", "夢好莫催醒，由他好處行。", "", "無端聽畫角，枕畔紅冰薄。", "塞馬一聲嘶，殘星拂大旗。"], "note": "夢好莫催醒，醒來只有朔風殘星。"}, {"title": "己亥雜詩（其五）", "author": "清・龔自珍", "body": ["浩蕩離愁白日斜，吟鞭東指即天涯。", "落紅不是無情物，化作春泥更護花。"], "note": "落紅化春泥護花，離去也是另一種奉獻。"}, {"title": "己亥雜詩（其一二五）", "author": "清・龔自珍", "body": ["九州生氣恃風雷，萬馬齊喑究可哀。", "我勸天公重抖擻，不拘一格降人才。"], "note": "萬馬齊喑的時代最需要破格的人才。"}, {"title": "己亥雜詩（其二二〇）", "author": "清・龔自珍", "body": ["少年擊劍更吹簫，劍氣簫心一例消。", "誰分蒼涼歸棹後，萬千哀樂集今朝。"], "note": "劍氣與簫心都消磨在歲月裡，只剩萬千哀樂。"}, {"title": "己亥雜詩（其八十三）", "author": "清・龔自珍", "body": ["只籌一纜十夫多，細算千艘渡此河。", "我亦曾糜太倉粟，夜聞邪許淚滂沱。"], "note": "喫著國家俸祿卻聽見纖夫號子，愧疚之心溢於言表。"}, {"title": "詠史", "author": "清・龔自珍", "body": ["金粉東南十五州，萬重恩怨屬名流。", "牢盆狎客操全算，團扇才人踞上游。", "避席畏聞文字獄，著書都為稻粱謀。", "田橫五百人安在，難道歸來盡列侯？"], "note": "文字獄下著書只為稻粱，是一個時代最大的悲哀。"}, {"title": "所見", "author": "清・袁枚", "body": ["牧童騎黃牛，歌聲振林樾。", "意欲捕鳴蟬，忽然閉口立。"], "note": "牧童捕蟬的瞬間，是童年最天真的定格。"}, {"title": "馬嵬", "author": "清・袁枚", "body": ["莫唱當年長恨歌，人間亦自有銀河。", "石壕村裏夫妻別，淚比長生殿上多。"], "note": "百姓的離別之淚，遠比帝妃的悲劇更值得書寫。"}, {"title": "苔", "author": "清・袁枚", "body": ["白日不到處，青春恰自來。", "苔花如米小，也學牡丹開。"], "note": "苔花如米小也學牡丹開，每個生命都有綻放的權利。"}, {"title": "遣興", "author": "清・袁枚", "body": ["愛好由來下筆難，一詩千改始心安。", "阿婆還似初笄女，頭未梳成不許看。"], "note": "好詩如少女梳妝，未成之前不許人看。"}, {"title": "隨園詩話（節選）", "author": "清・袁枚", "body": ["蠶食如蠶吐如絲，活人性情是我師。", "詩者人之性情也，性情無古今。", "有性情便有詩，無性情便無詩。"], "note": "有性情便有詩，最好的詩論不過六個字。"}, {"title": "竹石", "author": "清・鄭板橋", "body": ["咬定青山不放鬆，立根原在破巖中。", "千磨萬擊還堅勁，任爾東西南北風。"], "note": "咬定青山任風吹，是最硬氣的人生態度。"}, {"title": "濰縣署中畫竹呈年伯包大中丞括", "author": "清・鄭板橋", "body": ["衙齋臥聽蕭蕭竹，疑是民間疾苦聲。", "些小吾曹州縣吏，一枝一葉總關情。"], "note": "一枝一葉總關情，好官的心裡裝著百姓。"}, {"title": "題畫蘭", "author": "清・鄭板橋", "body": ["身在千山頂上頭，突巖深縫妙香稠。", "非無腳下浮雲鬧，來不相知去不留。"], "note": "浮雲來去不相知，蘭花只管自己清香。"}, {"title": "紅樓夢・葬花吟（節選）", "author": "清・曹雪芹", "body": ["花謝花飛花滿天，紅消香斷有誰憐？", "遊絲軟繫飄春榭，落絮輕沾撲繡簾。", "", "一年三百六十日，風刀霜劍嚴相逼。", "明媚鮮妍能幾時，一朝漂泊難尋覓。", "", "試看春殘花漸落，便是紅顏老死時。", "一朝春盡紅顏老，花落人亡兩不知！"], "note": "花落人亡兩不知，是紅樓夢中最淒美的讖語。"}, {"title": "紅樓夢・好了歌", "author": "清・曹雪芹", "body": ["世人都曉神仙好，惟有功名忘不了！", "古今將相在何方？荒塚一堆草沒了。", "", "世人都曉神仙好，只有金銀忘不了！", "終朝只恨聚無多，及到多時眼閉了。", "", "世人都曉神仙好，只有嬌妻忘不了！", "君生日日說恩情，君死又隨人去了。", "", "世人都曉神仙好，只有兒孫忘不了！", "癡心父母古來多，孝順兒孫誰見了？"], "note": "功名金銀嬌妻兒孫，到頭來都是一場空。"}, {"title": "紅樓夢・枉凝眉", "author": "清・曹雪芹", "body": ["一個是閬苑仙葩，一個是美玉無瑕。", "若說沒奇緣，今生偏又遇著他；", "若說有奇緣，如何心事終虛化？", "一個枉自嗟呀，一個空勞牽掛。", "一個是水中月，一個是鏡中花。", "想眼中能有多少淚珠兒，", "怎經得秋流到冬盡，春流到夏！"], "note": "水中月鏡中花，最美的愛情終究是一場虛化。"}, {"title": "紅樓夢・聰明累", "author": "清・曹雪芹", "body": ["機關算盡太聰明，反算了卿卿性命。", "生前心已碎，死後性空靈。", "家富人寧，終有個家亡人散各奔騰。", "枉費了意懸懸半世心，好一似蕩悠悠三更夢。", "忽喇喇似大廈傾，昏慘慘似燈將盡。", "呀！一場歡喜忽悲辛，嘆人世終難定！"], "note": "機關算盡反誤了性命，聰明反被聰明誤。"}, {"title": "綺懷（其十五）", "author": "清・黃景仁", "body": ["幾回花下坐吹簫，銀漢紅牆入望遙。", "似此星辰非昨夜，為誰風露立中宵。", "纏綿思盡抽殘繭，宛轉心傷剝後蕉。", "三五年時三五月，可憐杯酒不曾消。"], "note": "為誰風露立中宵——是問天問地也問自己。"}, {"title": "別老母", "author": "清・黃景仁", "body": ["搴帷拜母河梁去，白髮愁看淚眼枯。", "慘慘柴門風雪夜，此時有子不如無。"], "note": "風雪夜別老母，有子不如無的自責痛徹心扉。"}, {"title": "雜感", "author": "清・黃景仁", "body": ["仙佛茫茫兩未成，只知獨夜不平鳴。", "風蓬飄盡悲歌氣，泥絮沾來薄倖名。", "十有九人堪白眼，百無一用是書生。", "莫因詩卷愁成讖，春鳥秋蟲自作聲。"], "note": "百無一用是書生，讀書人最深的自嘲與不甘。"}, {"title": "癸巳除夕偶成", "author": "清・黃景仁", "body": ["千家笑語漏遲遲，憂患潛從物外知。", "悄立市橋人不識，一星如月看多時。"], "note": "萬家歡笑中獨立橋頭，孤獨者的除夕最為冷清。"}, {"title": "日知錄・正始", "author": "清・顧炎武", "body": ["有亡國，有亡天下。亡國與亡天下奚辨？", "曰：易姓改號，謂之亡國；", "仁義充塞，而至於率獸食人，人將相食，謂之亡天下。", "", "是故知保天下，然後知保其國。", "保國者，其君其臣肉食者謀之；", "保天下者，匹夫之賤與有責焉耳矣。"], "note": "天下興亡匹夫有責，是中國知識分子最沉重的擔當。"}, {"title": "精衛", "author": "清・顧炎武", "body": ["萬事有不平，爾何空自苦。", "長將一寸身，銜木到終古。", "我願平東海，身沉心不改。", "大海無平期，我心無絕時。"], "note": "大海無平期我心無絕時，是最堅定的復國之志。"}, {"title": "又酬傅處士次韻", "author": "清・顧炎武", "body": ["清切頻吹越石笳，窮愁猶駕阮生車。", "時當漢臘遺臣祭，義激韓讎舊相家。", "陵闕生哀回夕照，河山垂淚發春花。", "相將教授綏方略，猶及清明澆墓茶。"], "note": "山河垂淚春花含悲，遺民的哀痛寫在每一個季節。"}, {"title": "蝶戀花", "author": "清・王國維", "body": ["閱盡天涯離別苦，不道歸來，零落花如許。", "花底相看無一語，綠窗春與天俱暮。", "", "待把相思燈下訴，一縷新歡，舊恨千千縷。", "最是人間留不住，朱顏辭鏡花辭樹。"], "note": "朱顏辭鏡花辭樹，留不住的都是最美好的。"}, {"title": "浣溪沙", "author": "清・王國維", "body": ["山寺微茫背夕曛，鳥飛不到半山昏。上方孤磬定行雲。", "", "試上高峯窺皓月，偶開天眼覷紅塵。可憐身是眼中人。"], "note": "試圖跳出紅塵卻發現自己就是紅塵中人。"}, {"title": "人間詞話（節選）", "author": "清・王國維", "body": ["古今之成大事業、大學問者，必經過三種之境界：", "「昨夜西風凋碧樹。獨上高樓，望盡天涯路。」此第一境也。", "「衣帶漸寬終不悔，為伊消得人憔悴。」此第二境也。", "「眾裏尋他千百度，驀然回首，那人卻在，燈火闌珊處。」此第三境也。"], "note": "三種境界道盡了成就大事業的必經之路。"}, {"title": "點絳脣", "author": "清・王國維", "body": ["屏卻相思，近來知道都無益。", "不成拋擲，夢裏來相覓。", "", "訂了三生，都道前生事。", "如何是？似曾相識，一笑迎人醉。"], "note": "屏卻相思卻又在夢裡相覓，是理智與情感的永恆矛盾。"}, {"title": "臨終詩", "author": "清・林則徐", "body": ["力微任重久神疲，再竭衰庸定不支。", "苟利國家生死以，豈因禍福避趨之。", "謫居正是君恩厚，養拙剛於戍卒宜。", "戲與山妻談故事，試吟斷送老頭皮。"], "note": "苟利國家生死以，豈因禍福避趨之——最沉重的家國擔當。"}, {"title": "出嘉峪關感賦", "author": "清・林則徐", "body": ["嚴關百尺界天西，萬裏徵人駐馬蹄。", "飛閣遙連秦樹直，繚垣斜壓隴雲低。", "天山巉削摩肩立，瀚海蒼茫入望迷。", "誰道崤函千古險？回看只見一丸泥。"], "note": "崤函千古險在嘉峪關前不過一丸泥，格局決定視野。"}, {"title": "對酒", "author": "清・秋瑾", "body": ["不惜千金買寶刀，貂裘換酒也堪豪。", "一腔熱血勤珍重，灑去猶能化碧濤。"], "note": "一腔熱血灑去化碧濤，女俠的氣概不讓鬚眉。"}, {"title": "鷓鴣天・祖國沉淪感不禁", "author": "清・秋瑾", "body": ["祖國沉淪感不禁，閒來海外覓知音。", "金甌已缺總須補，為國犧牲敢惜身！", "", "嗟險阻，嘆飄零。關山萬裏作雄行。", "休言女子非英物，夜夜龍泉壁上鳴。"], "note": "休言女子非英物，秋瑾以生命證明瞭這句話。"}, {"title": "讀陸放翁集", "author": "清・梁啟超", "body": ["詩界千年靡靡風，兵魂銷盡國魂空。", "集中什九從軍樂，亙古男兒一放翁。"], "note": "亙古男兒一放翁，是對陸遊最高的評價。"}, {"title": "少年中國說（節選）", "author": "清・梁啟超", "body": ["少年智則國智，少年富則國富；", "少年強則國強，少年獨立則國獨立；", "少年自由則國自由，少年進步則國進步；", "少年勝於歐洲則國勝於歐洲，少年雄於地球則國雄於地球。", "", "紅日初升，其道大光。河出伏流，一瀉汪洋。", "美哉，我少年中國，與天不老！", "壯哉，我中國少年，與國無疆！"], "note": "少年強則國強，百年前的呼喚至今振聾發聵。"}, {"title": "獄中題壁", "author": "清・譚嗣同", "body": ["望門投止思張儉，忍死須臾待杜根。", "我自橫刀向天笑，去留肝膽兩崑崙。"], "note": "橫刀向天笑，以血肉之軀換來維新的火種。"}, {"title": "題壁", "author": "清・譚嗣同", "body": ["關河亦有未招魂，況復英雄飲恨吞。", "世間無物抵春愁，合向蒼冥一哭昏。"], "note": "世間無物抵春愁，是志士壯懷激烈的悲鳴。"}, {"title": "雜詩", "author": "清・龔自珍", "body": ["不論鹽鐵不籌河，獨倚東南涕淚多。", "國賦三升民一斗，屠牛那不勝栽禾。"], "note": "民生困苦國事日非，詩人的淚為蒼生而流。"}, {"title": "贈梁任父同年", "author": "清・黃遵憲", "body": ["寸寸山河寸寸金，瓜離分裂力誰任？", "杜鵑再拜憂天淚，精衛無窮填海心。"], "note": "寸寸山河寸寸金，國土不可分割的信念如磐石。"}, {"title": "今別離", "author": "清・黃遵憲", "body": ["別腸轉如輪，一刻既萬周。", "眼見雙輪馳，益增中心憂。", "古亦有山川，古亦有車舟。", "車舟載離別，行止猶自由。", "今日舟與車，並力生離愁。", "明知須臾景，不許稍綢繆。"], "note": "火車輪船讓離別更快，也讓愁緒更濃。"}, {"title": "書憤", "author": "清・趙翼", "body": ["騷壇代有才人出，俊逸鮑參清更真。", "少時學語苦難圓，只道工夫半未全。", "到老始知非力取，三分人事七分天。"], "note": "三分人事七分天，到老才懂得順應的智慧。"}, {"title": "論詩五首（其二）", "author": "清・趙翼", "body": ["李杜詩篇萬口傳，至今已覺不新鮮。", "江山代有才人出，各領風騷數百年。"], "note": "江山代有才人出，每個時代都有自己的詩聲。"}, {"title": "沁園春・長沙序", "author": "清・張惠言", "body": ["夢中了了醉中醒，只淵明，是前生。", "走遍人間，依舊卻躬耕。", "昨夜東坡春雨足，烏鵲喜，報新晴。"], "note": "夢中了了醉中醒，陶潛的通透是前世的修行。"}, {"title": "真州絕句", "author": "清・王士禛", "body": ["江干多是釣人居，柳陌菱塘一帶疏。", "好是日斜風定後，半江紅樹賣鱸魚。"], "note": "夕陽下半江紅樹賣鱸魚，是最有煙火氣的江南。"}, {"title": "出都留別諸公", "author": "清・康有為", "body": ["天龍作騎萬靈從，獨立飛來縹緲峯。", "懷抱芳馨蘭一握，縱橫宙合霧千重。", "眼中戰國成爭鹿，海內人才孰臥龍？", "撫劍長號歸去也，千山風雨嘯青鋒。"], "note": "撫劍長號千山風雨，變法者的壯志與孤獨。"}, {"title": "醉落魄・詠鷹", "author": "清・陳維崧", "body": ["寒山幾堵，風低削碎中原路。", "秋空一碧無今古。", "醉袒貂裘，略記尋呼處。", "", "男兒身手和誰賭？老來猛氣還軒舉。", "人間多少閒狐兔，月黑沙黃，此際偏思汝。"], "note": "老來猛氣還軒舉，如鷹般不甘平庸的晚年。"}, {"title": "海上", "author": "清・顧炎武", "body": ["日入空山海氣侵，秋光千里自登臨。", "十年天地干戈老，四海蒼生痛哭深。", "水湧神山來白鳥，雲浮仙闕見黃金。", "此中何處無人世，只恐難酬壯士心。"], "note": "四海蒼生痛哭深，遺民的悲痛是一個時代的縮影。"}, {"title": "己亥雜詩（其二十一）", "author": "清・龔自珍", "body": ["滿目蕭然花落盡，風回小院又開門。", "漫天關塞今無夢，但有飛鴻入故園。"], "note": "飛鴻入故園，是遊子心中最溫暖的歸途。"}, {"title": "大風歌", "author": "漢・劉邦", "body": ["大風起兮雲飛揚，", "威加海內兮歸故鄉，", "安得猛士兮守四方！"], "note": "三句道盡帝王的豪邁與憂慮，千古絕唱。"}, {"title": "垓下歌", "author": "漢・項羽", "body": ["力拔山兮氣蓋世，", "時不利兮騅不逝。", "騅不逝兮可奈何，", "虞兮虞兮奈若何！"], "note": "英雄末路，美人相伴，是最悲壯的絕唱。"}, {"title": "秋風辭", "author": "漢・劉徹", "body": ["秋風起兮白雲飛，草木黃落兮雁南歸。", "蘭有秀兮菊有芳，懷佳人兮不能忘。", "汎樓船兮濟汾河，橫中流兮揚素波。", "簫鼓鳴兮發棹歌，歡樂極兮哀情多。", "少壯幾時兮奈老何！"], "note": "歡樂極時哀情生，帝王也逃不過衰老的恐懼。"}, {"title": "李延年歌", "author": "漢・李延年", "body": ["北方有佳人，絕世而獨立。", "一顧傾人城，再顧傾人國。", "寧不知傾城與傾國？佳人難再得。"], "note": "傾城傾國也要得此佳人，美的力量無可抵擋。"}, {"title": "悲憤詩（節選）", "author": "漢・蔡琰", "body": ["漢季失權柄，董卓亂天常。", "志欲圖篡弒，先害諸賢良。", "逼迫遷舊邦，擁主以自強。", "海內興義師，欲共討不祥。", "", "邊荒與華異，人俗少義理。", "處所多霜雪，胡風春夏起。", "翩翩吹我衣，肅肅入我耳。", "感時念父母，哀歎無窮已。"], "note": "亂世女子的悲歌，每一字都浸透了血淚。"}, {"title": "胡笳十八拍（節選）", "author": "漢・蔡琰", "body": ["我生之初尚無為，我生之後漢祚衰。", "天不仁兮降亂離，地不仁兮使我逢此時。", "干戈日尋兮道路危，民卒流亡兮共哀悲。", "煙塵蔽野兮胡虜盛，志意乖兮節義虧。", "", "去住兩情兮誰具陳，天涯一身兮骨肉分。"], "note": "天涯一身骨肉分離，是亂世中最深的悲劇。"}, {"title": "四愁詩", "author": "漢・張衡", "body": ["我所思兮在太山，欲往從之梁父艱。", "側身東望涕沾翰。", "美人贈我金錯刀，何以報之英瓊瑤。", "路遠莫致倚逍遙，何為懷憂心煩勞。"], "note": "四方皆有所思之人，卻路遠莫致，惆悵滿懷。"}, {"title": "歸田賦（節選）", "author": "漢・張衡", "body": ["仲春令月，時和氣清。", "原隰鬱茂，百草滋榮。", "王雎鼓翼，倉庚哀鳴。", "交頸頡頏，關關嚶嚶。", "於焉逍遙，聊以娛情。"], "note": "歸田後的逍遙，是科學家張衡最文學的一面。"}, {"title": "定情詩", "author": "漢・繁欽", "body": ["何以致拳拳？綰臂雙金環。", "何以致殷勤？約指一雙銀。", "何以致區區？耳中雙明珠。", "何以致叩叩？香囊繫肘後。", "何以致契闊？繞腕雙跳脫。", "何以結恩情？美玉綴羅纓。", "何以結中心？素縷連雙針。", "何以結相於？金薄畫搔頭。"], "note": "每一件定情之物，都是一份不可替代的承諾。"}, {"title": "贈從弟（其二）", "author": "魏・劉楨", "body": ["亭亭山上松，瑟瑟谷中風。", "風聲一何盛，松枝一何勁！", "冰霜正慘愴，終歲常端正。", "豈不罹凝寒？松柏有本性。"], "note": "松柏不畏冰霜，因為端正是它的本性。"}, {"title": "與朱元思書別作", "author": "南朝・丘遲", "body": ["暮春三月，江南草長，雜花生樹，羣鶯亂飛。", "見故國之旗鼓，感平生於疇日。"], "note": "江南草長雜花生樹，六朝最美的春天在這封信裡。"}, {"title": "思舊賦", "author": "晉・向秀", "body": ["將命適於遠京兮，遂旋反而北徂。", "濟黃河以汎舟兮，經山陽之舊居。", "瞻曠野之蕭條兮，息餘駕乎城隅。", "踐二子之遺跡兮，歷窮巷之空廬。", "嘆黍離之愍周兮，悲麥秀於殷墟。"], "note": "故人已逝空廬猶在，經過舊居的那一刻心如刀割。"}, {"title": "詠絮", "author": "晉・謝道韞", "body": ["未若柳絮因風起。"], "note": "一句詠雪，才名千載，巾幗不讓鬚眉。"}, {"title": "步出夏門行・冬十月", "author": "魏・曹操", "body": ["孟冬十月，北風徘徊。", "天氣肅清，繁霜霏霏。", "鵾雞晨鳴，鴻雁南飛。", "鷙鳥潛藏，熊羆窟棲。", "錢鎛停置，農收積場。", "逆旅整設，以通賈商。", "幸甚至哉，歌以詠志。"], "note": "孟冬十月的北方，萬物收藏，天地歸於沉靜。"}, {"title": "情詩", "author": "魏・曹植", "body": ["微陰翳陽景，清風飄我衣。", "遊魚潛綠水，翔鳥薄天飛。", "眇眇客行士，徭役不得歸。", "始出嚴霜結，今來白露晞。", "遊者嘆黍離，處者歌式微。", "慷慨對嘉賓，淒愴內傷悲。"], "note": "遊子嘆黍離居者歌式微，離人的悲傷都在歌聲裡。"}, {"title": "登樓賦（節選）", "author": "漢・王粲", "body": ["登茲樓以四望兮，聊暇日以銷憂。", "覽斯宇之所處兮，實顯敞而寡仇。", "挾清漳之通浦兮，倚曲沮之長洲。", "背墳衍之廣陸兮，臨皋隰之沃流。", "", "雖信美而非吾土兮，曾何足以少留。"], "note": "信美而非吾土，再好的風景也比不上故鄉。"}, {"title": "七哀詩", "author": "漢・王粲", "body": ["西京亂無象，豺虎方遘患。", "復棄中國去，委身適荊蠻。", "親戚對我悲，朋友相追攀。", "出門無所見，白骨蔽平原。", "路有飢婦人，抱子棄草間。", "顧聞號泣聲，揮涕獨不還。", "「未知身死處，何能兩相完？」", "驅馬棄之去，不忍聽此言。"], "note": "白骨蔽原飢婦棄子，亂世的慘狀讀之令人落淚。"}, {"title": "望嶽", "author": "明・楊基", "body": ["泰山天壤間，屹如鬱蕭臺。", "突兀壓乾坤，跋扈排風雷。", "雲行信長風，颯若巨海回。", "清曉騎白鸞，直上天門來。"], "note": "直上天門的豪氣，是明初詩人最有生氣的一面。"}, {"title": "京師得家書", "author": "明・袁凱", "body": ["江水三千里，家書十五行。", "行行無別語，只道早還鄉。"], "note": "十五行家書只說早還鄉，家人的牽掛最為質樸。"}, {"title": "題畫", "author": "明・沈周", "body": ["碧水丹山映杖藜，夕陽猶在小橋西。", "微吟不道驚溪鳥，飛入亂雲深處啼。"], "note": "溪鳥被吟詩聲驚起，飛入亂雲深處。"}, {"title": "觀書有感", "author": "明・唐寅", "body": ["十載求名匹馬嘶，黃金散盡為書癡。", "功名若是長相守，應與青山同白頭。"], "note": "功名若能長守，就該和青山一起白頭了。"}, {"title": "過零丁洋", "author": "明・夏完淳", "body": ["到處逢人說故鄉，那知故里已淪亡。", "只餘殘照西風裡，滿目荒涼到夕陽。"], "note": "故鄉已亡，殘照西風中只剩滿目荒涼。"}, {"title": "春日偶成", "author": "明・王守仁", "body": ["靜處體悟有天機，閒來把卷坐移時。", "大抵聖賢多寂寞，倚松獨笑白雲低。"], "note": "聖賢多寂寞，卻在松下白雲間找到了天機。"}, {"title": "正氣歌（節選）", "author": "明・楊繼盛", "body": ["浩氣還太虛，丹心照千古。", "生平未報恩，留作忠魂補。"], "note": "丹心照千古，忠魂不滅。"}, {"title": "夢江南", "author": "清・納蘭性德", "body": ["昏鴉盡，小立恨因誰？", "急雪乍翻香閣絮，輕風吹到膽瓶梅。", "心字已成灰。"], "note": "心字已成灰，是情感燃盡後最冷的餘燼。"}, {"title": "山花子", "author": "清・納蘭性德", "body": ["林下荒苔道韞家，生憐玉骨委塵沙。", "愁向風前無處說，數歸鴉。", "", "半世浮萍隨逝水，一宵冷雨葬名花。", "魂是柳綿吹欲碎，繞天涯。"], "note": "半世浮萍一宵冷雨，名花零落的悲涼。"}, {"title": "金縷曲・贈梁汾", "author": "清・納蘭性德", "body": ["德也狂生耳！偶然間、淄塵京國，烏衣門第。", "有酒惟澆趙州土，誰會成生此意？", "不信道、遂成知己。", "青眼高歌俱未老，向尊前、拭盡英雄淚。", "君不見，月如水。", "", "共君此夜須沉醉。且由他、蛾眉謠諑，古今同忌。", "身世悠悠何足問，冷笑置之而已！", "尋思起、從頭翻悔。一日心期千劫在，後身緣、恐結他生裏。", "然諾重，君須記。"], "note": "一日心期千劫在，知己之約重過千年。"}, {"title": "採桑子", "author": "清・納蘭性德", "body": ["而今才道當時錯，心緒淒迷。", "紅淚偷垂，滿眼春風百事非。", "", "情知此後來無計，強說歡期。", "一別如斯，落盡梨花月又西。"], "note": "才道當時錯，所有的後悔都太遲了。"}, {"title": "臨江仙・寒柳", "author": "清・納蘭性德", "body": ["飛絮飛花何處是，層冰積雪摧殘。疏疏一樹五更寒。", "愛他明月好，憔悴也相關。", "", "最是繁絲搖落後，轉教人憶春山。湔裙夢斷續應難。", "西風多少恨，吹不散眉彎。"], "note": "西風吹不散的眉彎，是化不開的愁。"}, {"title": "減字木蘭花", "author": "清・納蘭性德", "body": ["相逢不語，一朵芙蓉著秋雨。", "小暈紅潮，斜溜鬟心只鳳翹。", "", "待將低喚，直為凝情恐人見。", "欲訴幽懷，轉過迴廊叩玉釵。"], "note": "相逢不語如秋雨芙蓉，無聲的相遇最動人心絃。"}, {"title": "赴戍登程口占示家人", "author": "清・林則徐", "body": ["力微任重久神疲，再竭衰庸定不支。", "苟利國家生死以，豈因禍福避趨之。"], "note": "國家利益高於個人禍福，是最純粹的愛國情懷。"}, {"title": "浪淘沙", "author": "清・蔣春霖", "body": ["雲氣壓虛欄，青失遙山，雨絲風絮一番番。", "上巳清明都過了，只是春寒。", "", "華髮已無端，何況花殘！飛來蝴蝶又成團。", "明日朱樓人睡起，莫捲簾看。"], "note": "莫捲簾看——怕看到的是春已走遠。"}, {"title": "金陵懷古", "author": "清・王士禛", "body": ["年來腸斷秣陵舟，夢繞秦淮水上樓。", "十日雨絲風片裡，濃春煙景似殘秋。"], "note": "秦淮的春天濃得像殘秋，六朝的繁華已是夢。"}, {"title": "夜書所見", "author": "清・查慎行", "body": ["月黑見漁燈，孤光一點螢。", "微微風簇浪，散作滿河星。"], "note": "一點漁火散作滿河星光，是夜色中最詩意的變幻。"}, {"title": "詠梅", "author": "清・袁枚", "body": ["梅花已自不勝寒，況復傍門雪打殘。", "待到春來開滿院，回思此際也心酸。"], "note": "春來滿院開時，回想雪中堅持的日子更覺心酸。"}, {"title": "虞美人・聽雨", "author": "清・蔣捷", "body": ["少年聽雨歌樓上，紅燭昏羅帳。", "壯年聽雨客舟中，江闊雲低斷雁叫西風。", "", "而今聽雨僧廬下，鬢已星星也。", "悲歡離合總無情，一任階前點滴到天明。"], "note": "少年壯年老年三次聽雨，聽的是一生的悲歡離合。"}, {"title": "秋夜吟", "author": "清・黃景仁", "body": ["銀燭秋光冷畫屏，碧天如水夜雲輕。", "窗前一片芭蕉影，誰與秋聲作主盟？"], "note": "誰與秋聲作主盟，孤獨的秋夜無人共鳴。"}, {"title": "採桑子", "author": "清・蔣春霖", "body": ["西風一夜催人老，雪鬢蕭蕭。", "新恨條條，都上眉梢。", "", "也曾聯袂月橋行，記得年年。", "明月如鉤，掛向枝頭。"], "note": "西風一夜催人老，新恨都寫在眉梢。"}, {"title": "詠菊", "author": "清・曹雪芹", "body": ["無賴詩魔昏曉侵，繞籬欹石自沉音。", "毫端蘊秀臨霜寫，口齒噙香對月吟。", "滿紙自憐題素怨，片言誰解訴秋心。", "一從陶令評章後，千古高風說到今。"], "note": "千古高風說到今，菊花的品格因陶淵明而永恆。"}, {"title": "問菊", "author": "清・曹雪芹", "body": ["欲訊秋情眾莫知，喃喃負手叩東籬。", "孤標傲世偕誰隱，一樣花開為底遲？", "圃露庭霜何寂寞，鴻歸蛩病可相思？", "休言舉世無談者，解語何妨片語時。"], "note": "孤標傲世偕誰隱，菊花的寂寞與林黛玉如出一轍。"}, {"title": "詠白海棠", "author": "清・曹雪芹", "body": ["半卷湘簾半掩門，碾冰為土玉為盆。", "偷來梨蕊三分白，借得梅花一縷魂。", "月窟仙人縫縞袂，秋閨怨女拭啼痕。", "嬌羞默默同誰訴，倦倚西風夜已昏。"], "note": "梨蕊的白梅花的魂，白海棠的美清冷脫俗。"}, {"title": "浣溪沙・庚申除夜", "author": "清・納蘭性德", "body": ["收取閒心冷處濃，舞裙猶憶柘枝紅。誰家刻燭待春風。", "", "竹葉樽空翻採燕，九枝燈灺顫金蟲。風流端合倚天公。"], "note": "除夕夜收取閒心，在冷清中回味舊時的熱鬧。"}, {"title": "海棠春", "author": "清・龔自珍", "body": ["明月幾時有，把盞歎蒼茫。", "功名半紙，風雪千山，斷鴻聲遠長天暮。"], "note": "半紙功名不抵千山風雪中的一聲斷鴻。"}, {"title": "鄧攸無子", "author": "清・袁枚", "body": ["書生閑對漁樵話，野老猶聞戰伐功。", "到底英雄真本色，不因離亂改初衷。"], "note": "不因離亂改初衷，是英雄最真的本色。"}, {"title": "秋海棠", "author": "清・袁枚", "body": ["小朵嬌紅窈窕姿，獨含秋氣發花遲。", "暗中自有清香在，不是幽人不得知。"], "note": "暗中清香只有幽人知，是低調的美最動人處。"}, {"title": "三忠祠", "author": "清・顧炎武", "body": ["奄忽四十秋，歸來長安陌。", "白骨已成塵，忠魂猶未息。", "歲歲春風裡，斷碑覆荒棘。"], "note": "白骨成塵忠魂未息，忠烈之氣不隨時間消散。"}, {"title": "和周起渭韻", "author": "清・王士禛", "body": ["萬壑千巖客夢迷，醉中不覺到招提。", "白雲滿地無人掃，明月當頭有鶴棲。"], "note": "白雲滿地明月當頭，山寺的夜空澄澈如洗。"}, {"title": "浣溪沙", "author": "清・納蘭性德", "body": ["一半殘陽下小樓，朱簾斜控軟金鉤。倚闌無緒不能愁。", "", "有個盈盈騎馬過，薄妝淺黛亦風流。見人羞澀卻回頭。"], "note": "見人羞澀卻回頭，少女的嬌態如畫。"}, {"title": "己亥雜詩（其二百十五）", "author": "清・龔自珍", "body": ["吟罷江山氣不靈，萬千種話一燈青。", "忽然擱筆無言說，重禮天台七卷經。"], "note": "吟盡天下事卻無言以對，轉向佛經尋求寧靜。"}, {"title": "鵲踏枝", "author": "清・王國維", "body": ["萬事如花不可期，花開花落有成期。", "世人惟恐花開盡，卻不知花正好時。"], "note": "花正好時莫擔心花落，活在當下最難。"}, {"title": "獄中詩", "author": "清・譚嗣同", "body": ["有心殺賊，無力迴天。", "死得其所，快哉快哉！"], "note": "慷慨赴死的快意，是維新志士最後的豪邁。"}, {"title": "自嘲", "author": "清・鄭板橋", "body": ["老夫三十年前客，蹤跡遍天涯。", "寫得蘭花一二朵，滿紙蕭瑟皆生涯。", "難得糊塗好，聰明誤一家。"], "note": "難得糊塗，是經歷世事後最高的智慧。"}, {"title": "秋暮吟望", "author": "清・趙翼", "body": ["二十餘年如一夢，此身雖在堪驚。", "閒登小閣看新晴。", "古今多少事，漁唱起三更。"], "note": "二十年如一夢，往事都付漁唱中。"}, {"title": "十二月十五夜", "author": "清・袁枚", "body": ["沉沉更鼓急，漸漸人聲絕。", "吹燈窗更明，月照一天雪。"], "note": "吹滅燈窗反更明，原來月照一天雪。"}, {"title": "餘生", "author": "清・黃景仁", "body": ["全家都在風聲裡，九月衣裳未剪裁。", "半夜涼初透衾枕，一生愁已到心來。"], "note": "九月未裁衣半夜涼透，窮愁之苦已入骨髓。"}, {"title": "浣溪沙・紅橋懷古", "author": "清・王士禛", "body": ["北郭清溪一帶流，紅橋風物眼中秋。綠楊城郭是揚州。", "", "西望雷塘何處是？香魂零落使人愁。淡煙芳草舊迷樓。"], "note": "紅橋風物淡煙芳草，揚州的繁華已成舊夢。"}, {"title": "春望", "author": "明・楊基", "body": ["春城無處不飛花，寒食東風御柳斜。", "紫陌紅塵拂面來，無人不道看花回。"], "note": "春城飛花紫陌紅塵，長安的春天是天下人的嚮往。"}, {"title": "秋日", "author": "明・高啟", "body": ["老覺人間歲月遒，秋風吹雨過南樓。", "羣鷗似識歸心急，催向蒼煙最上頭。"], "note": "羣鷗似懂人的歸心，催向蒼煙深處。"}, {"title": "題扇送友人", "author": "明・徐禎卿", "body": ["城頭落日照長亭，黃葉蕭蕭楚客行。", "千里相思如有寄，秋風明月一扇輕。"], "note": "千里相思寄於一扇，輕如秋風卻重如情。"}, {"title": "塞上曲", "author": "明・李攀龍", "body": ["白羽如霜出塞寒，胡烽不斷接長安。", "城頭一片西山月，多少徵人馬上看。"], "note": "城頭西山月，是多少徵人馬上仰望的故鄉。"}, {"title": "畫雞", "author": "明・唐寅", "body": ["頭上紅冠不用裁，滿身雪白走將來。", "平生不敢輕言語，一叫千門萬戶開。"], "note": "平時沉默，一鳴驚人，是蓄勢待發的氣魄。"}, {"title": "詠針", "author": "明・文嘉", "body": ["百鍊千錘一根針，一顆心只為穿引。", "眼晴長在屁股上，只認衣冠不認人。"], "note": "只認衣冠不認人，諷刺勢利小人入木三分。"}, {"title": "柳", "author": "明・高啟", "body": ["短長條拂短長堤，上有黃鶯恰恰啼。", "翠幕煙綃藏不得，一聲聯拽到城西。"], "note": "黃鶯啼聲從柳間傳到城西，春天是藏不住的。"}, {"title": "觀獵", "author": "清・顧炎武", "body": ["千里黃雲白日曛，朔風回首望昭君。", "男兒墜地射四方，肯學書生老一經？"], "note": "男兒當射四方，不甘伏案老死書齋。"}, {"title": "念奴嬌・赤壁懷古", "author": "宋・蘇軾", "body": ["大江東去，浪淘盡，千古風流人物。", "故壘西邊，人道是，三國周郎赤壁。", "亂石穿空，驚濤拍岸，捲起千堆雪。", "江山如畫，一時多少豪傑。", "", "遙想公瑾當年，小喬初嫁了，雄姿英發。", "羽扇綸巾，談笑間，檣櫓灰飛煙滅。", "故國神遊，多情應笑我，早生華髮。", "人生如夢，一尊還酹江月。"], "note": "千古英雄終成往事，唯有江月依舊，人生不過一場大夢。"}, {"title": "江城子・密州出獵", "author": "宋・蘇軾", "body": ["老夫聊發少年狂，左牽黃，右擎蒼，", "錦帽貂裘，千騎卷平岡。", "為報傾城隨太守，親射虎，看孫郎。", "", "酒酣胸膽尚開張，鬢微霜，又何妨！", "持節雲中，何日遣馮唐？", "會挽雕弓如滿月，西北望，射天狼。"], "note": "年華雖老，壯志猶存，豪情不減當年。"}, {"title": "江城子・乙卯正月二十日夜記夢", "author": "宋・蘇軾", "body": ["十年生死兩茫茫，不思量，自難忘。", "千里孤墳，無處話淒涼。", "縱使相逢應不識，塵滿面，鬢如霜。", "", "夜來幽夢忽還鄉，小軒窗，正梳妝。", "相顧無言，惟有淚千行。", "料得年年腸斷處，明月夜，短松岡。"], "note": "最深的思念，是十年之後夢中相見卻無言。"}, {"title": "定風波・莫聽穿林打葉聲", "author": "宋・蘇軾", "body": ["莫聽穿林打葉聲，何妨吟嘯且徐行。", "竹杖芒鞋輕勝馬，誰怕？一蓑煙雨任平生。", "", "料峭春風吹酒醒，微冷，山頭斜照卻相迎。", "回首向來蕭瑟處，歸去，也無風雨也無晴。"], "note": "風雨與晴天都是人生常態，坦然面對便是自在。"}, {"title": "蝶戀花・春景", "author": "宋・蘇軾", "body": ["花褪殘紅青杏小。燕子飛時，綠水人家繞。", "枝上柳綿吹又少，天涯何處無芳草！", "", "牆裏鞦韆牆外道。牆外行人，牆裏佳人笑。", "笑漸不聞聲漸悄，多情卻被無情惱。"], "note": "天涯處處有芳草，何必執著於一處風景。"}, {"title": "臨江仙・夜歸臨皋", "author": "宋・蘇軾", "body": ["夜飲東坡醒復醉，歸來彷彿三更。", "家童鼻息已雷鳴。敲門都不應，倚杖聽江聲。", "", "長恨此身非我有，何時忘卻營營？", "夜闌風靜縠紋平。小舟從此逝，江海寄餘生。"], "note": "放下塵世的牽絆，隨一葉小舟漂向無垠自由。"}, {"title": "卜算子・黃州定慧院寓居作", "author": "宋・蘇軾", "body": ["缺月掛疏桐，漏斷人初靜。", "誰見幽人獨往來，縹緲孤鴻影。", "", "驚起卻回頭，有恨無人省。", "揀盡寒枝不肯棲，寂寞沙洲冷。"], "note": "孤高如鴻雁，寧可寂寞也不隨波逐流。"}, {"title": "浣溪沙・簌簌衣巾落棗花", "author": "宋・蘇軾", "body": ["簌簌衣巾落棗花，村南村北響繰車，牛衣古柳賣黃瓜。", "", "酒困路長惟欲睡，日高人渴漫思茶，敲門試問野人家。"], "note": "鄉間小事皆有味，平淡生活自有詩意。"}, {"title": "飲湖上初晴後雨", "author": "宋・蘇軾", "body": ["水光瀲灩晴方好，山色空濛雨亦奇。", "欲把西湖比西子，淡妝濃抹總相宜。"], "note": "美在自然天成，無論晴雨皆是風景。"}, {"title": "題西林壁", "author": "宋・蘇軾", "body": ["橫看成嶺側成峯，遠近高低各不同。", "不識廬山真面目，只緣身在此山中。"], "note": "跳出局中才能看清全貌，當局者迷是人生常態。"}, {"title": "惠崇春江晚景", "author": "宋・蘇軾", "body": ["竹外桃花三兩枝，春江水暖鴨先知。", "蔞蒿滿地蘆芽短，正是河豚欲上時。"], "note": "春天的訊息，最先被水中的生靈感知。"}, {"title": "六月二十七日望湖樓醉書", "author": "宋・蘇軾", "body": ["黑雲翻墨未遮山，白雨跳珠亂入船。", "卷地風來忽吹散，望湖樓下水如天。"], "note": "暴風雨來得猛烈也去得乾脆，天地自有其節奏。"}, {"title": "和子由澠池懷舊", "author": "宋・蘇軾", "body": ["人生到處知何似，應似飛鴻踏雪泥。", "泥上偶然留指爪，鴻飛那復計東西。", "老僧已死成新塔，壞壁無由見舊題。", "往日崎嶇還記否，路長人困蹇驢嘶。"], "note": "人生如飛鴻踏雪，痕跡偶然，不必執著來去。"}, {"title": "洞仙歌・冰肌玉骨", "author": "宋・蘇軾", "body": ["冰肌玉骨，自清涼無汗。", "水殿風來暗香滿。繡簾開，一點明月窺人，人未寢，欹枕釵橫鬢亂。", "", "起來攜素手，庭戶無聲，時見疏星渡河漢。", "試問夜如何？夜已三更，金波淡，玉繩低轉。", "但屈指西風幾時來，又不道流年暗中偷換。"], "note": "夏夜清涼如水，流年卻在不知不覺中悄然偷換。"}, {"title": "西江月・世事一場大夢", "author": "宋・蘇軾", "body": ["世事一場大夢，人生幾度秋涼？", "夜來風葉已鳴廊，看取眉頭鬢上。", "", "酒賤常愁客少，月明多被雲妨。", "中秋誰與共孤光，把盞淒然北望。"], "note": "中秋孤影，把盞北望，世事如夢秋涼入骨。"}, {"title": "如夢令・常記溪亭日暮", "author": "宋・李清照", "body": ["常記溪亭日暮，沉醉不知歸路。", "興盡晚回舟，誤入藕花深處。", "爭渡，爭渡，驚起一灘鷗鷺。"], "note": "少女時光最美的記憶，是那次醉後誤入荷花深處。"}, {"title": "醉花陰・薄霧濃雲愁永晝", "author": "宋・李清照", "body": ["薄霧濃雲愁永晝，瑞腦銷金獸。", "佳節又重陽，玉枕紗廚，半夜涼初透。", "", "東籬把酒黃昏後，有暗香盈袖。", "莫道不銷魂，簾捲西風，人比黃花瘦。"], "note": "相思入骨，人比秋菊還要清瘦。"}, {"title": "一剪梅・紅藕香殘玉簟秋", "author": "宋・李清照", "body": ["紅藕香殘玉簟秋，輕解羅裳，獨上蘭舟。", "雲中誰寄錦書來？雁字回時，月滿西樓。", "", "花自飄零水自流，一種相思，兩處閒愁。", "此情無計可消除，才下眉頭，卻上心頭。"], "note": "相思如水，才從眉間散去，又湧上心頭。"}, {"title": "聲聲慢・尋尋覓覓", "author": "宋・李清照", "body": ["尋尋覓覓，冷冷清清，淒淒慘慘慼慼。", "乍暖還寒時候，最難將息。", "三杯兩盞淡酒，怎敵他、晚來風急！", "雁過也，正傷心，卻是舊時相識。", "", "滿地黃花堆積，憔悴損，如今有誰堪摘？", "守著窗兒，獨自怎生得黑！", "梧桐更兼細雨，到黃昏、點點滴滴。", "這次第，怎一個愁字了得！"], "note": "愁到極處，連一個愁字都載不動那般沉重。"}, {"title": "武陵春・風住塵香花已盡", "author": "宋・李清照", "body": ["風住塵香花已盡，日晚倦梳頭。", "物是人非事事休，欲語淚先流。", "", "聞說雙溪春尚好，也擬泛輕舟。", "只恐雙溪舴艋舟，載不動許多愁。"], "note": "愁緒太重，連小舟都承載不住。"}, {"title": "點絳脣・蹴罷鞦韆", "author": "宋・李清照", "body": ["蹴罷鞦韆，起來慵整纖纖手。", "露濃花瘦，薄汗輕衣透。", "", "見客入來，襪剗金釵溜。", "和羞走，倚門回首，卻把青梅嗅。"], "note": "少女心事藏在回首嗅梅的嬌羞裏。"}, {"title": "夏日絕句", "author": "宋・李清照", "body": ["生當作人傑，死亦為鬼雄。", "至今思項羽，不肯過江東。"], "note": "寧為玉碎不為瓦全，是骨氣也是風骨。"}, {"title": "漁家傲・天接雲濤連曉霧", "author": "宋・李清照", "body": ["天接雲濤連曉霧，星河欲轉千帆舞。", "彷彿夢魂歸帝所，聞天語，殷勤問我歸何處。", "", "我報路長嗟日暮，學詩謾有驚人句。", "九萬裏風鵬正舉，風休住，蓬舟吹取三山去！"], "note": "縱使路長日暮，也要乘風直上九萬裏。"}, {"title": "鳳凰臺上憶吹簫・香冷金猊", "author": "宋・李清照", "body": ["香冷金猊，被翻紅浪，起來慵自梳頭。", "任寶奩塵滿，日上簾鉤。", "生怕離懷別苦，多少事、欲說還休。", "新來瘦，非幹病酒，不是悲秋。", "", "休休，這回去也，千萬遍陽關，也則難留。", "念武陵人遠，煙鎖秦樓。", "惟有樓前流水，應念我、終日凝眸。", "凝眸處，從今又添，一段新愁。"], "note": "離別之苦說不出口，只化作日漸消瘦的身影。"}, {"title": "永遇樂・落日熔金", "author": "宋・李清照", "body": ["落日熔金，暮雲合璧，人在何處？", "染柳煙濃，吹梅笛怨，春意知幾許！", "元宵佳節，融和天氣，次第豈無風雨？", "來相召、香車寶馬，謝他酒朋詩侶。", "", "中州盛日，閨門多暇，記得偏重三五。", "鋪翠冠兒，撚金雪柳，簇帶爭濟楚。", "如今憔悴，風鬟霜鬢，怕見夜間出去。", "不如向、簾兒底下，聽人笑語。"], "note": "昔日繁華已成追憶，如今只能簾下聽人歡笑。"}, {"title": "破陣子・為陳同甫賦壯詞以寄之", "author": "宋・辛棄疾", "body": ["醉裏挑燈看劍，夢回吹角連營。", "八百里分麾下炙，五十弦翻塞外聲，沙場秋點兵。", "", "馬作的盧飛快，弓如霹靂弦驚。", "了卻君王天下事，贏得生前身後名。可憐白髮生！"], "note": "壯志未酬鬢先白，一聲可憐道盡英雄遲暮。"}, {"title": "青玉案・元夕", "author": "宋・辛棄疾", "body": ["東風夜放花千樹，更吹落、星如雨。", "寶馬雕車香滿路。鳳簫聲動，玉壺光轉，一夜魚龍舞。", "", "蛾兒雪柳黃金縷，笑語盈盈暗香去。", "眾裏尋他千百度，驀然回首，那人卻在，燈火闌珊處。"], "note": "踏破鐵鞋無覓處，最珍貴的就在不經意的回首間。"}, {"title": "醜奴兒・書博山道中壁", "author": "宋・辛棄疾", "body": ["少年不識愁滋味，愛上層樓。愛上層樓，為賦新詞強說愁。", "", "而今識盡愁滋味，欲說還休。欲說還休，卻道天涼好個秋。"], "note": "真正的愁，是嘗遍苦澀後的欲言又止。"}, {"title": "西江月・夜行黃沙道中", "author": "宋・辛棄疾", "body": ["明月別枝驚鵲，清風半夜鳴蟬。", "稻花香裏說豐年，聽取蛙聲一片。", "", "七八個星天外，兩三點雨山前。", "舊時茅店社林邊，路轉溪橋忽見。"], "note": "鄉間夏夜的蛙鳴與稻香，是最樸實的幸福。"}, {"title": "永遇樂・京口北固亭懷古", "author": "宋・辛棄疾", "body": ["千古江山，英雄無覓孫仲謀處。", "舞榭歌臺，風流總被雨打風吹去。", "斜陽草樹，尋常巷陌，人道寄奴曾住。", "想當年，金戈鐵馬，氣吞萬裏如虎。", "", "元嘉草草，封狼居胥，贏得倉皇北顧。", "四十三年，望中猶記，烽火揚州路。", "可堪回首，佛狸祠下，一片神鴉社鼓。", "憑誰問：廉頗老矣，尚能飯否？"], "note": "英雄老去壯心不已，最怕的是無人再問廉頗能否。"}, {"title": "摸魚兒・更能消幾番風雨", "author": "宋・辛棄疾", "body": ["更能消、幾番風雨，匆匆春又歸去。", "惜春長怕花開早，何況落紅無數。", "春且住，見說道、天涯芳草無歸路。", "怨春不語。算只有殷勤，畫簷蛛網，盡日惹飛絮。", "", "長門事，準擬佳期又誤。蛾眉曾有人妒。", "千金縱買相如賦，脈脈此情誰訴？", "君莫舞，君不見、玉環飛燕皆塵土！", "閒愁最苦！休去倚危欄，斜陽正在，煙柳斷腸處。"], "note": "春光易逝如壯志難酬，最苦是斜陽煙柳中的無奈。"}, {"title": "菩薩蠻・書江西造口壁", "author": "宋・辛棄疾", "body": ["鬱孤臺下清江水，中間多少行人淚！", "西北望長安，可憐無數山。", "", "青山遮不住，畢竟東流去。", "江晚正愁餘，山深聞鷓鴣。"], "note": "青山擋不住東流水，正如壯志擋不住歲月。"}, {"title": "清平樂・村居", "author": "宋・辛棄疾", "body": ["茅簷低小，溪上青青草。", "醉裏吳音相媚好，白髮誰家翁媼？", "", "大兒鋤豆溪東，中兒正織雞籠。", "最喜小兒亡賴，溪頭臥剝蓮蓬。"], "note": "最動人的幸福，是茅簷下一家人的平凡日常。"}, {"title": "南鄉子・登京口北固亭有懷", "author": "宋・辛棄疾", "body": ["何處望神州？滿眼風光北固樓。", "千古興亡多少事？悠悠。不盡長江滾滾流。", "", "年少萬兜鍪，坐斷東南戰未休。", "天下英雄誰敵手？曹劉。生子當如孫仲謀。"], "note": "千古興亡付諸流水，唯有英雄氣概不朽。"}, {"title": "鷓鴣天・壯歲旌旗擁萬夫", "author": "宋・辛棄疾", "body": ["壯歲旌旗擁萬夫，錦襜突騎渡江初。", "燕兵夜娖銀胡䩮，漢箭朝飛金僕姑。", "", "追往事，嘆今吾，春風不染白髭鬚。", "卻將萬字平戎策，換得東家種樹書。"], "note": "萬字平戎策換不來一紙任命，英雄只能種樹度日。"}, {"title": "示兒", "author": "宋・陸遊", "body": ["死去元知萬事空，但悲不見九州同。", "王師北定中原日，家祭無忘告乃翁。"], "note": "至死不忘的遺願，是看到山河統一的那一天。"}, {"title": "書憤", "author": "宋・陸遊", "body": ["早歲那知世事艱，中原北望氣如山。", "樓船夜雪瓜洲渡，鐵馬秋風大散關。", "", "塞上長城空自許，鏡中衰鬢已先斑。", "出師一表真名世，千載誰堪伯仲間！"], "note": "壯志如山卻報國無門，鏡中衰鬢是最沉痛的嘆息。"}, {"title": "遊山西村", "author": "宋・陸遊", "body": ["莫笑農家臘酒渾，豐年留客足雞豚。", "山重水複疑無路，柳暗花明又一村。", "簫鼓追隨春社近，衣冠簡樸古風存。", "從今若許閒乘月，拄杖無時夜叩門。"], "note": "困境之中別絕望，柳暗花明處自有新天地。"}, {"title": "十一月四日風雨大作", "author": "宋・陸遊", "body": ["僵臥孤村不自哀，尚思為國戍輪臺。", "夜闌臥聽風吹雨，鐵馬冰河入夢來。"], "note": "老病孤村中，夢裏依然是金戈鐵馬的沙場。"}, {"title": "釵頭鳳・紅酥手", "author": "宋・陸遊", "body": ["紅酥手，黃縢酒，滿城春色宮牆柳。", "東風惡，歡情薄。一懷愁緒，幾年離索。錯、錯、錯。", "", "春如舊，人空瘦，淚痕紅浥鮫綃透。", "桃花落，閒池閣。山盟雖在，錦書難託。莫、莫、莫。"], "note": "一聲錯、一聲莫，道盡有緣無分的悲涼。"}, {"title": "卜算子・詠梅", "author": "宋・陸遊", "body": ["驛外斷橋邊，寂寞開無主。", "已是黃昏獨自愁，更著風和雨。", "", "無意苦爭春，一任羣芳妒。", "零落成泥碾作塵，只有香如故。"], "note": "即使零落成泥，也要保持那份清香不改。"}, {"title": "秋夜將曉出籬門迎涼有感", "author": "宋・陸遊", "body": ["三萬裏河東入海，五千仞嶽上摩天。", "遺民淚盡胡塵裏，南望王師又一年。"], "note": "年復一年的南望，是百姓最深沉的期盼。"}, {"title": "臨安春雨初霽", "author": "宋・陸遊", "body": ["世味年來薄似紗，誰令騎馬客京華。", "小樓一夜聽春雨，深巷明朝賣杏花。", "矮紙斜行閒作草，晴窗細乳戲分茶。", "素衣莫起風塵嘆，猶及清明可到家。"], "note": "小樓春雨杏花巷，是亂世中難得的片刻寧靜。"}, {"title": "冬夜讀書示子聿", "author": "宋・陸遊", "body": ["古人學問無遺力，少壯工夫老始成。", "紙上得來終覺淺，絕知此事要躬行。"], "note": "讀萬卷書不如行萬里路，實踐出真知。"}, {"title": "蝶戀花・佇倚危樓風細細", "author": "宋・柳永", "body": ["佇倚危樓風細細，望極春愁，黯黯生天際。", "草色煙光殘照裏，無言誰會憑闌意。", "", "擬把疏狂圖一醉，對酒當歌，強樂還無味。", "衣帶漸寬終不悔，為伊消得人憔悴。"], "note": "為了心中所愛，即使衣帶漸寬也無怨無悔。"}, {"title": "雨霖鈴・寒蟬淒切", "author": "宋・柳永", "body": ["寒蟬淒切，對長亭晚，驟雨初歇。", "都門帳飲無緒，留戀處，蘭舟催發。", "執手相看淚眼，竟無語凝噎。", "念去去，千里煙波，暮靄沉沉楚天闊。", "", "多情自古傷離別，更那堪，冷落清秋節！", "今宵酒醒何處？楊柳岸，曉風殘月。", "此去經年，應是良辰好景虛設。", "便縱有千種風情，更與何人說？"], "note": "楊柳岸曉風殘月，是離別最經典的意象。"}, {"title": "望海潮・東南形勝", "author": "宋・柳永", "body": ["東南形勝，三吳都會，錢塘自古繁華。", "煙柳畫橋，風簾翠幕，參差十萬人家。", "雲樹繞堤沙，怒濤捲霜雪，天塹無涯。", "市列珠璣，戶盈羅綺，競豪奢。", "", "重湖疊巘清嘉，有三秋桂子，十里荷花。", "羌管弄晴，菱歌泛夜，嬉嬉釣叟蓮娃。", "千騎擁高牙，乘醉聽簫鼓，吟賞煙霞。", "異日圖將好景，歸去鳳池誇。"], "note": "三秋桂子十里荷花，是杭州最動人的名片。"}, {"title": "八聲甘州・對瀟瀟暮雨灑江天", "author": "宋・柳永", "body": ["對瀟瀟暮雨灑江天，一番洗清秋。", "漸霜風淒緊，關河冷落，殘照當樓。", "是處紅衰翠減，苒苒物華休。", "惟有長江水，無語東流。", "", "不忍登高臨遠，望故鄉渺邈，歸思難收。", "嘆年來蹤跡，何事苦淹留？", "想佳人妝樓顒望，誤幾回、天際識歸舟。", "爭知我，倚闌杆處，正恁凝愁！"], "note": "佳人遠望識歸舟，卻不知我也在遠方凝愁。"}, {"title": "少年遊・長安古道馬遲遲", "author": "宋・柳永", "body": ["長安古道馬遲遲，高柳亂蟬嘶。", "夕陽鳥外，秋風原上，目斷四天垂。", "", "歸雲一去無蹤跡，何處是前期？", "狎興生疏，酒徒蕭索，不似少年時。"], "note": "長安古道上行走的已不是少年，歲月改變了一切。"}, {"title": "嶽陽樓記（節選）", "author": "宋・范仲淹", "body": ["不以物喜，不以己悲。", "居廟堂之高則憂其民，處江湖之遠則憂其君。", "是進亦憂，退亦憂。然則何時而樂耶？", "其必曰：先天下之憂而憂，後天下之樂而樂乎。"], "note": "先憂後樂，是士大夫最崇高的家國情懷。"}, {"title": "漁家傲・秋思", "author": "宋・范仲淹", "body": ["塞下秋來風景異，衡陽雁去無留意。", "四面邊聲連角起，千嶂裏，長煙落日孤城閉。", "", "濁酒一杯家萬裏，燕然未勒歸無計。", "羌管悠悠霜滿地，人不寐，將軍白髮征夫淚。"], "note": "邊塞秋風中，將軍白髮與征夫淚同樣沉重。"}, {"title": "蘇幕遮・碧雲天", "author": "宋・范仲淹", "body": ["碧雲天，黃葉地，秋色連波，波上寒煙翠。", "山映斜陽天接水，芳草無情，更在斜陽外。", "", "黯鄉魂，追旅思，夜夜除非，好夢留人睡。", "明月樓高休獨倚，酒入愁腸，化作相思淚。"], "note": "酒入愁腸化相思淚，鄉愁是化不開的濃。"}, {"title": "泊船瓜洲", "author": "宋・王安石", "body": ["京口瓜洲一水間，鍾山只隔數重山。", "春風又綠江南岸，明月何時照我還？"], "note": "一個綠字寫活了春天，卻寫不盡歸鄉的渴望。"}, {"title": "元日", "author": "宋・王安石", "body": ["爆竹聲中一歲除，春風送暖入屠蘇。", "千門萬戶曈曈日，總把新桃換舊符。"], "note": "新年的爆竹聲裏，藏著除舊迎新的希望。"}, {"title": "登飛來峯", "author": "宋・王安石", "body": ["飛來山上千尋塔，聞說雞鳴見日升。", "不畏浮雲遮望眼，自緣身在最高層。"], "note": "站得足夠高，浮雲便遮不住遠方的光明。"}, {"title": "梅花", "author": "宋・王安石", "body": ["牆角數枝梅，凌寒獨自開。", "遙知不是雪，為有暗香來。"], "note": "凌寒獨放的梅花，用暗香宣告自己的存在。"}, {"title": "桂枝香・金陵懷古", "author": "宋・王安石", "body": ["登臨送目，正故國晚秋，天氣初肅。", "千里澄江似練，翠峯如簇。", "歸帆去棹殘陽裏，背西風、酒旗斜矗。", "彩舟雲淡，星河鷺起，畫圖難足。", "", "念往昔、繁華競逐，嘆門外樓頭，悲恨相續。", "千古憑高對此，謾嗟榮辱。", "六朝舊事隨流水，但寒煙衰草凝綠。", "至今商女，時時猶唱，後庭遺曲。"], "note": "六朝繁華隨流水去，商女猶唱後庭花，歷史總在重演。"}, {"title": "浣溪沙・一曲新詞酒一杯", "author": "宋・晏殊", "body": ["一曲新詞酒一杯，去年天氣舊亭臺。夕陽西下幾時回？", "", "無可奈何花落去，似曾相識燕歸來。小園香徑獨徘徊。"], "note": "花落燕歸之間，是對時光流逝最優雅的嘆息。"}, {"title": "蝶戀花・檻菊愁煙蘭泣露", "author": "宋・晏殊", "body": ["檻菊愁煙蘭泣露，羅幕輕寒，燕子雙飛去。", "明月不諳離恨苦，斜光到曉穿朱戶。", "", "昨夜西風凋碧樹，獨上高樓，望盡天涯路。", "欲寄彩箋兼尺素，山長水闊知何處。"], "note": "獨上高樓望盡天涯，是追尋的第一重境界。"}, {"title": "破陣子・春景", "author": "宋・晏殊", "body": ["燕子來時新社，梨花落後清明。", "池上碧苔三四點，葉底黃鸝一兩聲，日長飛絮輕。", "", "巧笑東鄰女伴，採桑徑裏逢迎。", "疑怪昨宵春夢好，元是今朝鬥草贏，笑從雙臉生。"], "note": "春日鬥草贏了的笑臉，是最純真的快樂。"}, {"title": "清平樂・紅箋小字", "author": "宋・晏殊", "body": ["紅箋小字，說盡平生意。", "鴻雁在雲魚在水，惆悵此情難寄。", "", "斜陽獨倚西樓，遙山恰對簾鉤。", "人面不知何處，綠波依舊東流。"], "note": "滿紙情意卻無處可寄，只剩斜陽與東流水。"}, {"title": "玉樓春・春恨", "author": "宋・晏殊", "body": ["綠楊芳草長亭路，年少拋人容易去。", "樓頭殘夢五更鐘，花底離愁三月雨。", "", "無情不似多情苦，一寸還成千萬縷。", "天涯地角有窮時，只有相思無盡處。"], "note": "天涯地角尚有盡頭，唯獨相思綿綿無絕期。"}, {"title": "臨江仙・夢後樓臺高鎖", "author": "宋・晏幾道", "body": ["夢後樓臺高鎖，酒醒簾幕低垂。", "去年春恨卻來時。落花人獨立，微雨燕雙飛。", "", "記得小蘋初見，兩重心字羅衣。", "琵琶弦上說相思。當時明月在，曾照彩雲歸。"], "note": "落花獨立微雨燕飛，是記憶中最美的重逢幻影。"}, {"title": "鷓鴣天・彩袖殷勤捧玉鍾", "author": "宋・晏幾道", "body": ["彩袖殷勤捧玉鍾，當年拚卻醉顏紅。", "舞低楊柳樓心月，歌盡桃花扇底風。", "", "從別後，憶相逢，幾回魂夢與君同。", "今宵剩把銀釭照，猶恐相逢是夢中。"], "note": "久別重逢怕是夢，舉燈細看纔敢相信是真。"}, {"title": "鷓鴣天・醉拍春衫惜舊香", "author": "宋・晏幾道", "body": ["醉拍春衫惜舊香，天將離恨惱疏狂。", "年年陌上生秋草，日日樓中到夕陽。", "", "雲渺渺，水茫茫，徵人歸路許多長。", "相思本是無憑語，莫向花箋費淚行。"], "note": "相思寫在花箋上也是枉然，不如任它隨風而去。"}, {"title": "生查子・關山魂夢長", "author": "宋・晏幾道", "body": ["關山魂夢長，魚雁音塵少。", "兩鬢可憐青，只為相思老。", "", "歸夢碧紗窗，說與人人道。", "真箇別離難，不似相逢好。"], "note": "別離之苦，唯有經歷過的人才懂。"}, {"title": "鵲橋仙・纖雲弄巧", "author": "宋・秦觀", "body": ["纖雲弄巧，飛星傳恨，銀漢迢迢暗度。", "金風玉露一相逢，便勝卻人間無數。", "", "柔情似水，佳期如夢，忍顧鵲橋歸路。", "兩情若是久長時，又豈在朝朝暮暮。"], "note": "真正的愛情不在朝夕相守，而在心意長久。"}, {"title": "踏莎行・郴州旅舍", "author": "宋・秦觀", "body": ["霧失樓臺，月迷津渡，桃源望斷無尋處。", "可堪孤館閉春寒，杜鵑聲裏斜陽暮。", "", "驛寄梅花，魚傳尺素，砌成此恨無重數。", "郴江幸自繞郴山，為誰流下瀟湘去？"], "note": "霧裏迷途找不到桃源，恨如磚石層層堆砌。"}, {"title": "滿庭芳・山抹微雲", "author": "宋・秦觀", "body": ["山抹微雲，天連衰草，畫角聲斷譙門。", "暫停徵棹，聊共引離尊。", "多少蓬萊舊事，空回首、煙靄紛紛。", "斜陽外，寒鴉萬點，流水繞孤村。", "", "銷魂。當此際，香囊暗解，羅帶輕分。", "謾贏得、青樓薄倖名存。", "此去何時見也？襟袖上、空惹啼痕。", "傷情處，高城望斷，燈火已黃昏。"], "note": "山抹微雲天連衰草，離別的底色總是蒼涼。"}, {"title": "江城子・西城楊柳弄春柔", "author": "宋・秦觀", "body": ["西城楊柳弄春柔，動離憂，淚難收。", "猶記多情曾為繫歸舟。", "碧野朱橋當日事，人不見，水空流。", "", "韶華不為少年留，恨悠悠，幾時休。", "飛絮落花時候一登樓。", "便做春江都是淚，流不盡，許多愁。"], "note": "春江若是淚水，也流不盡心中的愁緒。"}, {"title": "蘭陵王・柳", "author": "宋・周邦彥", "body": ["柳陰直，煙裏絲絲弄碧。", "隋堤上、曾見幾番，拂水飄綿送行色。", "登臨望故國，誰識京華倦客？", "長亭路，年去歲來，應折柔條過千尺。", "", "閒尋舊蹤跡，又酒趁哀弦，燈照離席。", "梨花榆火催寒食。愁一箭風快，半篙波暖，回頭迢遞便數驛，望人在天北。", "", "淒惻，恨堆積！漸別浦縈迴，津堠岑寂。", "斜陽冉冉春無極。念月榭攜手，露橋聞笛。", "沉思前事，似夢裏，淚暗滴。"], "note": "折柳送別千百次，離愁已堆積成山。"}, {"title": "蘇幕遮・燎沉香", "author": "宋・周邦彥", "body": ["燎沉香，消溽暑。鳥雀呼晴，侵曉窺簷語。", "葉上初陽乾宿雨，水面清圓，一一風荷舉。", "", "故鄉遙，何日去？家住吳門，久作長安旅。", "五月漁郎相憶否？小楫輕舟，夢入芙蓉浦。"], "note": "風荷搖曳間，是對故鄉芙蓉浦的悠悠思念。"}, {"title": "少年遊・並刀如水", "author": "宋・周邦彥", "body": ["並刀如水，吳鹽勝雪，纖手破新橙。", "錦幄初溫，獸煙不斷，相對坐調笙。", "", "低聲問：向誰行宿？城上已三更。", "馬滑霜濃，不如休去，直是少人行。"], "note": "一句低聲挽留，勝過千言萬語的深情。"}, {"title": "暗香・舊時月色", "author": "宋・姜夔", "body": ["舊時月色，算幾番照我，梅邊吹笛？", "喚起玉人，不管清寒與攀摘。", "何遜而今漸老，都忘卻春風詞筆。", "但怪得竹外疏花，香冷入瑤席。", "", "江國，正寂寂。嘆寄與路遙，夜雪初積。", "翠尊易泣，紅萼無言耿相憶。", "長記曾攜手處，千樹壓西湖寒碧。", "又片片、吹盡也，幾時見得？"], "note": "梅花片片吹落，舊時月色中的人已不再。"}, {"title": "疏影・苔枝綴玉", "author": "宋・姜夔", "body": ["苔枝綴玉，有翠禽小小，枝上同宿。", "客裏相逢，籬角黃昏，無言自倚修竹。", "昭君不慣胡沙遠，但暗憶、江南江北。", "想佩環、月夜歸來，化作此花幽獨。", "", "猶記深宮舊事，那人正睡裏，飛近蛾綠。", "莫似春風，不管盈盈，早與安排金屋。", "還教一片隨波去，又卻怨、玉龍哀曲。", "等恁時、重覓幽香，已入小窗橫幅。"], "note": "梅花的幽獨，恰似遠嫁他鄉的昭君之魂。"}, {"title": "揚州慢・淮左名都", "author": "宋・姜夔", "body": ["淮左名都，竹西佳處，解鞍少駐初程。", "過春風十里，盡薺麥青青。", "自胡馬窺江去後，廢池喬木，猶厭言兵。", "漸黃昏，清角吹寒，都在空城。", "", "杜郎俊賞，算而今重到須驚。", "縱豆蔻詞工，青樓夢好，難賦深情。", "二十四橋仍在，波心蕩、冷月無聲。", "念橋邊紅藥，年年知為誰生？"], "note": "昔日繁華的揚州已成空城，冷月無聲是最深的悲涼。"}, {"title": "踏莎行・自沔東來", "author": "宋・姜夔", "body": ["燕燕輕盈，鶯鶯嬌軟，分明又向華胥見。", "夜長爭得薄情知，春初早被相思染。", "", "別後書辭，別時針線，離魂暗逐郎行遠。", "淮南皓月冷千山，冥冥歸去無人管。"], "note": "離魂暗隨遠行人，千山皓月冷如心。"}, {"title": "鶯啼序・殘寒正欺病酒", "author": "宋・吳文英", "body": ["殘寒正欺病酒，掩沉香繡戶。", "燕來晚、飛入西城，似說春事遲暮。", "畫船載、清明過卻，晴煙冉冉吳宮樹。", "念羈情遊蕩，隨風化為輕絮。", "", "十載西湖，傍柳繫馬，趁嬌塵軟霧。", "溯紅漸、招入仙溪，錦兒偷寄幽素。", "倚銀屏、春寬夢窄，斷紅濕、歌紈金縷。", "暝堤空，輕把斜陽，總還鷗鷺。"], "note": "十載西湖夢，春寬夢窄間，斜陽歸了鷗鷺。"}, {"title": "風入松・聽風聽雨過清明", "author": "宋・吳文英", "body": ["聽風聽雨過清明，愁草瘞花銘。", "樓前綠暗分攜路，一絲柳、一寸柔情。", "料峭春寒中酒，交加曉夢啼鶯。", "", "西園日日掃林亭，依舊賞新晴。", "黃蜂頻撲鞦韆索，有當時、纖手香凝。", "惆悵雙鴛不到，幽階一夜苔生。"], "note": "鞦韆索上猶有纖手餘香，人卻已不在。"}, {"title": "唐多令・何處合成愁", "author": "宋・吳文英", "body": ["何處合成愁？離人心上秋。", "縱芭蕉、不雨也颼颼。", "都道晚涼天氣好，有明月、怕登樓。", "",
