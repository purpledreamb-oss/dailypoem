   "贤王玉笛，花奴羯鼓，韵美声繁。",
   "宁王锦瑟，梅妃玉箫，嘹亭循环。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "同乐院燕青博鱼・煞尾",
  "author": "元・李文蔚",
  "body": [
   "则你个纸做的瓶儿怎拔干的井，蜡打的锹儿怎撅的坑？你道他有体态，有聪明，知你的意，会你的情，有他时春自生，没他时坐不宁。",
   "怎知他欠本分，少至诚，忒淫滥苏小卿，不值钱王桂英。",
   "拿住奸夫你又杀不成，倒被他拖入囚牢死狗似撑。",
   "也不是我病僧劝患僧，有一日押向云阳市上行，只等的高叫开刀和那声，方才道悔不当初你可便恁时节省。",
   "(同燕大下)。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "锦云堂暗定连环计・正宫/端正好",
  "author": "元・无名氏",
  "body": [
   "仗才能，凭谋量，不须动阔剑长枪，无非是偎红倚翠如屏障，早摆设的都停当。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "刘千病打独角牛・滚绣球",
  "author": "元・无名氏",
  "body": [
   "他将那名姓呼，志气来口店，他在那露台上光闪，果然是名不虚传。",
   "他可也忒自专，说大言，自夸轻健，可是他空说在骏马之前。",
   "我打这厮东头不说可在这西头说，我打这厮上口不口店下口口店，无耻无廉。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "包待制智勘后庭花・川拨棹",
  "author": "元・郑延玉",
  "body": [
   "我敢搠碎你口中牙，不剌这是你家里说话？那恰便似一部鸣蛙，絮絮答答，叫叫吖吖。",
   "觑了他精神口抹，再言语还重打。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "中吕・朝天子西湖",
  "author": "元・徐再思",
  "body": [
   "里湖，外湖，无处是无春处。",
   "真山真水真画图，一片玲珑玉。",
   "宜酒宜诗，宜晴宜雨。",
   "销金锅锦绣窟，老苏，老逋，杨柳堤梅花墓。",
   "手帕酒痕，泪痕，半带着胭脂润。",
   "鲛渊一片玉霄云，缕缕东风恨。",
   "待写回文，敷陈方寸，怕莺花说与春。",
   "使人，赠君，寄风月平安信。",
   "常山江行远山，近山，一片青无间。",
   "逆流流流诉上乱石滩，险似连云栈。",
   "落日昏鸦，西风归雁，叹崎岖途路难。",
   "得闲，且闲，何处无鱼羹饭？杨姬艳冶，唱彻，〔金缕〕歌全阕。",
   "秋娘声价有谁轶？曾奉黄金阙。",
   "歌扇生春，舞裙回雪，不风流不醉也。",
   "舞者，唱者，一曲秦楼月。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "孟德耀举案齐眉・鸳鸯煞",
  "author": "元・无名氏",
  "body": [
   "荷君恩特降黄麻沼，谢天臣远践红尘道。",
   "却教我一介书生，早做了极品随朝。",
   "畅道顿首诚惶，瞻天拜表，则俺这犬马微劳，知甚日能图效。",
   "且自快活逍遥，两口儿夫妻共谐老。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "严子陵垂钓七里滩・乔牌儿",
  "author": "元・宫天挺",
  "body": [
   "辇路傍啄绿苔，猛然间那惊怪，元来是七里滩朱顶仙鹤在碧云间将雪翅开，他直飞到皇宫探我来。",
   "他为甚还闷在阑干外？是不是我的仙鹤？若是我的呵，则不肯来。",
   "和他那献果木猿猱也到来。",
   "我山野的心常布。",
   "俺那里水似蓝山如黛，不由我见景生情，睹物伤怀。",
   "俺那七里滩好多好景致：麋鹿衔花，野猿献果。",
   "天灯自见，乌鹊报晓，禽有禽言，兽有兽语。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "耍孩儿・诧跋的单脚实村纣，呼喝的扌且扌来每叫吼。瞅粘的绿老更昏花，",
  "author": "元・高安道",
  "body": [
   "把棚的莽壮真牛。",
   "吹笛的把瑟歪着尖嘴，擂鼓的撅丁瘤着左手，撩打的腔腔嗽。",
   "靠棚头的先虾着脊背，卖薄荷的自肿了咽喉。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "商调・梧叶儿客中闻雨",
  "author": "元・杨朝英",
  "body": [
   "檐头溜，窗外声，直响到天明。",
   "滴得人心碎，聒得人梦怎成。",
   "夜雨好无情，不道我愁人怕听。",
   "戏贾观音奴庞儿俊，更喜恰，堪咏又堪夸。",
   "得空便处风流话，没人处再敢么。",
   "救苦难俏冤家，有吴道子应难画他。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "杜蕊娘智赏金线池・七兄弟",
  "author": "元・关汉卿",
  "body": [
   "早则是对面、并肩、绿窗前，从今后称了平生愿。",
   "一个向青灯黄卷赋诗篇，一个剪红绢翠锦学针线。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "桃花女破法嫁周公・醉高歌",
  "author": "元・王晔",
  "body": [
   "坐车儿倒背我这身奇，手帕儿遮檬了我面皮。",
   "(彭大云)怎么这新人车儿不向前走，到往后退那？(正旦唱)大公也，你可怎生不解其中意，我则怕撞着那凶神的这太岁。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "庞居士误放来生债・醉扶归",
  "author": "元・刘君锡",
  "body": [
   "我为甚么相怜悯，与你这一锭家那雪花银？(磨博士云)爹，你可为甚么与我这银子？(正末唱)我则报答你那脚打罗三年这足一下恩。",
   "(磨博士云)爹，我罗和请罪咱。",
   "我昨日瞒着爹做一个贼，偷了二升麦子，去那长街市上算了一个卦，那先生说我今年今月今日今时，可当发迹，得些儿横财。",
   "不想爹叫我出来，与了我这个银子，那先生也会算哩。",
   "(正末唱)那人也算的着轮到你那磨眼儿今日合交运。",
   "(磨博士云)爹，你与我这个银子，去做甚么生意好？(正末唱)这银子我与你做买卖权时做本，(磨博士云)多谢爹，孩儿从今以后，再也不打罗了。",
   "(正末唱)哎！孩儿呵，我从今以后再不要你似这般当粗坌。",
   "(磨博士云)则说银子银子，谁曾见他来？这个原来是银子。",
   "(正末唱)。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "柳青娘",
  "author": "元・杨景贤",
  "body": [
   "休么，从来不以这妖魔，忒轻薄也待如何？那厮有神通难摸，艺高强名扬播。",
   "偷灵丹老子怎近他？盗蟠桃玉皇难奈何。",
   "那厮上天宫将神威挫，下人间兴祸多。",
   "看着身躯大，顷刻成微末；看着东方过，顷刻向西方落。",
   "一任他铁骨铜筋火眼睛，不索交兵，敢着他随风一扇扇了渡江河。"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {
  "title": "江南柳",
  "author": "宋・张先",
  "body": [
   "隋堤远，波急路尘轻。",
   "今古柳桥多送别，见人分袂亦愁生。",
   "何况自关情。",
   "斜照后，新月上西城。",
   "城上楼高重倚望，愿身能似月亭亭。",
   "千里伴君行。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "山居詩  其一六",
  "author": "宋・釋延壽",
  "body": [
   "抱朴澄神藴道光，石爐閒爇六時香。",
   "曳空橫野雲和靜，逗石穿崖水自忙。",
   "晚圃雨來葵葉嫩，晴坡燒後蕨苗長。",
   "一心包盡乾坤內，莫把閒文更度量。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "采桑子·咏春雨",
  "author": "清・納蘭性德",
  "body": [
   "嫩烟分染鹅儿柳，一样风丝",
   "似整如欹，才着春寒瘦不支",
   "凉侵晓梦轻蝉腻，约略红肥",
   "不惜葳蕤，碾取名香作地衣"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "都孔目风雨还牢末・胡十八",
  "author": "元・无名氏",
  "body": [
   "是那个扳我脊梁？是那个摸我胸膛？是那个把头发水揪、胳膊来搪？是那个喳喳的高叫在耳边厢？原来是僧住和赛娘！他救到有半响，也则为父子每情切切，因此上儿女每意慌慌。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "尾・窗下尘蒙青鸾鉴，问章台何处停骖？薄幸才郎不顾咱，有谁画青山两",
  "author": "元・吴仁卿",
  "body": [
   "眉淡？。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "严子陵垂钓七里滩・脱布衫",
  "author": "元・宫天挺",
  "body": [
   "则为你般调人两字功名，躯荣人半世浮生。",
   "-个楚霸王拔山举鼎，乌江岸剑抹了咽颈。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "糖多令",
  "author": "元・无名氏《张协状元》",
  "body": [
   "劫去我盘缠，皮肉打恁穿。",
   "一身如水没些绵。",
   "今夜更无存宿处，我拼一命赴黄泉！(末唱)。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "刘玄德独赴襄阳会・紫花儿序",
  "author": "元・高文秀",
  "body": [
   "则愿的驯良纯善，怕的是踢跳湾奔，使不着嘶喊咆哮。",
   "马乃是将之司命，盗了马步骤难熬。",
   "量度，又不是穴隙逾墙做贼盗，蒙差遣怎敢违拗！你正是人急偎亲，他可甚善与人交？。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "薛仁贵荣归故里・鹊踏枝",
  "author": "元・张国宾",
  "body": [
   "你道他是农夫，做军卒，(带云)想那诸葛亮呵，(唱)偏不曾隐迹南阳，乐意耕锄。",
   "(张士贵云)他后来却怎的？(正末唱)命通也逢着帝王，一年间三谒茅庐。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "那叱令",
  "author": "元・杨景贤",
  "body": [
   "身才儿俊长，加持得鬼王；容貌儿善良，修持得梵正；胸襟儿纪纲，扶持得帝王。",
   "头如蓝靛青，语似春雷壮，这和尚端的非常。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "鲁大夫秋胡戏妻・二煞",
  "author": "元・石君宝",
  "body": [
   "俺那牛屋里怎成得美眷姻？鸦窠里怎生着鸾凤雏？蚕茧纸难写姻缘簿，短桑科长不出连枝树，沤麻坑养不活比目鱼，辘轴上也打不出那连环玉。",
   "似你这伤风败俗，怕不的地灭天诛！。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "虎牢关三战吕布・雁儿落",
  "author": "元・郑光祖",
  "body": [
   "往常我观云间乌兔走，今日个看地下蚍蜉斗。",
   "姜太公渭水河边执着钓钩，今日个轮到俺辕门外打鼻钮。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "刘夫人庆赏五侯宴・梁州",
  "author": "元・关汉卿",
  "body": [
   "我如今官差可便弃舍。",
   "哎，儿也！咱两个须索今日离别，这冤家必定是前生业。",
   "这孩儿仪容儿清秀，模样儿英杰。",
   "我熬煎了无限，受苦了偌些。",
   "我和他是吃了人多少唇舌，不由我感叹伤嗟！我、我、我，今日个母弃了儿，非是我心毒，是、是、是，更和这儿离了母如何的弃舍！哎！天也，天也！俺可便眼睁睁子母每各自分别，直恁般运拙。",
   "这冤家苦楚何时彻？谁能够暂时歇？若是我无你个孩儿伶俐些，那其间方得宁贴。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "陈季卿误上竹叶舟・收江南",
  "author": "元・杨梓",
  "body": [
   "呀，则俺呵曾经三醉岳阳楼，踏罡风吹上碧云游，枉下俺这大罗仙来度脱你个报官囚。",
   "空笑杀城南老柳，则教你做一场蝴蝶梦庄周。",
   "(列御寇云)秀才，你既不肯跟随我等出家，不可久留在此，你回去罢。",
   "(陈季卿云)只是小生迷着路哩。",
   "(正末云)呆汉，前途不远，你到家近了也，只要你休忘了正道。",
   "(唱)。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "刘晨阮肇误入桃源・殿前欢",
  "author": "元・王子一",
  "body": [
   "不觉的五魂消，则见这无媒径路草萧萧，急煎煎似上蚰蜒道。",
   "一会价心痒难揉，这时节武陵溪怎暗约？桃花片空零落，胡麻饭绝音耗。",
   "做了个云迷楚岫，水淹蓝桥。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "钟离春智勇定齐・紫花儿序",
  "author": "元・郑光祖",
  "body": [
   "凭着我五行斡运，八卦周流，万象璇玑。",
   "用先天乾坤南北，坎离东西，周回。",
   "艮兑风雷一任疾，山泽通气，霎时天地相交，水火相催。",
   "(净合眼虎云)娘待今日怎么与他厮杀？量他到的那里！等我一个杀他这些秦兵。",
   "(正旦云)大小众将，您军排万队，将列阵前，摆一个周天二十八宿，名曰\"九宫八卦阵\"。",
   "合眼虎！(净合眼虎云)哎！娘叫怎的？(正旦云)与你一千军马，与我引战，则要你输。",
   "若秦兵不识此机，你诈败赶入垓心，必中吾计。",
   "(净合眼虎云)知道了。",
   "料必我则是输了。",
   "(正旦云)远远的敢是秦兵来了也。",
   "(秦姬辇同孙操、吴起跚马儿领卒子上)(秦姬辇云)某乃秦姬辇是也。",
   "颇奈钟无盐无礼，将某玉环摔破，将使命文面而回，此恨痛入骨髓。",
   "某会合魏国吴起、燕国孙操，统大势雄兵，征伐钟无盐，走一遭去。",
   "大小三军，摆开阵势者！(孙操云)将军且稍待，等我与他比试三合！来者何人？(净合眼虎云)某乃齐公子手下合眼虎是也。",
   "(孙操云)兀那厮，你那无盐女在于何处，怎敢将吾毁谤？我不与你厮杀，你则着无盐女出来。",
   "(净合眼虎云)我道你不敢和我相持么？(孙操云)小贼开大言，小校操鼓来！(战科)(净合眼虎诈败走科，云)近不的他，走、走、走！(下)(孙操云)那里去！不问那里赶将去。",
   "(正旦云)左右与我拿住者！(众做拿住孙操科)(卒子云)拿住孙操也。",
   "(正旦唱)。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "三・新茅柴沽满瓶，活鲜鱼旋煮铛。粗衣淡饭无监禁。闷来时看四周翠岫",
  "author": "元・无名氏",
  "body": [
   "烟霞景，闲来时诵一卷黄庭道德经。",
   "倒大来身心静。",
   "非是无钱断酒，临老修行。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "三・无愁心自安，高眠梦不惊，不乏衣食为侥幸。身闲才见公途险，累少",
  "author": "元・曾瑞",
  "body": [
   "方知担子轻。",
   "成家庆，顽童前引，稚子随行。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "萨真人夜断碧桃花・醉春风",
  "author": "元・无名氏",
  "body": [
   "我这里叹世事若浮云，想光阴如逝水。",
   "常则在大人家服侍了许多年，端的是喜，喜。",
   "赤紧的小姐谦和，相公宽厚。",
   "更遇着大人贤慧。",
   "(嬷嬷云)可早来到也。",
   "兴儿，你报复去，说徐亲家差嬷嬷问安哩。",
   "(兴儿报科，云)相公，有徐家嬷嬷，在于门首。",
   "(张道南云)快请进，(见科)(嬷嬷云)相公，老身奉老相公言语，本待自来问候，恐怕相公病体，迎接不便，径着老身来探近日病体如何？(张道南云)我害的病，不阴不阳，发寒发热，不知是甚么症侯？(嬷嬷唱)。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "包待制智勘后庭花・红绣鞋",
  "author": "元・郑延玉",
  "body": [
   "那家居住在东村西地，那家委实的姓甚名谁？似这般几时得个分明日！你休得要硬抵讳，休得要假疑惑，我索合从头推勘你。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "黑旋风双献功・越调/金蕉叶",
  "author": "元・高文秀",
  "body": [
   "你看他那说话处阿，（带云）我才说道恕生面少拜识，（唱）他做多少去眉弄色。",
   "（搽旦云）你看我这几步儿走，（正末唱）你看他那行动处呵，（带云）娘也，又不是那小脚儿，竖里一尺，横里五寸。",
   "（唱）做多少家鞋弓袜窄，可怕不打扮得十分像路？（带云）哥哥，不是你兄弟口歹也，（唱）你可敢记着一场大来大小利害。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "天仙子·渌水亭秋夜",
  "author": "清・納蘭性德",
  "body": [
   "水浴凉蟾风入袂，鱼鳞蹙损金波碎",
   "好天良夜酒盈尊，心自醉，愁难睡",
   "西风月落城乌起"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "小桃红・装跷委实用心机，不枉了夸强会，女辈丛中最为贵。煞曾习，沾",
  "author": "元・关汉卿",
  "body": [
   "身那取着田地。",
   "赶起了白踢，诸余里快收拾。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "金菊香・多应他意重我情薄，既不是可怎生雁贴鱼缄音信杳。相别时话儿",
  "author": "元・杨景贤",
  "body": [
   "不甚好，恨锁眉梢，越思量越思想越添焦。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "月明和尚度柳翠・得胜令",
  "author": "元・李寿卿",
  "body": [
   "柳也，这不是大树大阴凉，我则怕甘做了老孤桩柳也，早逢着玉殿骖鸾客，再休想那章台走马郎。",
   "度你到西方，饱看取明月清风况，世脱下皮囊，一任教黄莺紫燕忙。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "越调・寨儿令早春湖游",
  "author": "元・赵善庆",
  "body": [
   "景物新，艳晨昏，山气张天成绿云。",
   "画舫红裙，紫陌游人，香软马蹄尘。",
   "棹涟漪水皱罗纹，破韶华桃露朱唇。",
   "湖风肥柳线，堤雨厚莎茵。",
   "春，又早二三分。",
   "春情愁冉冉，病恹恹，红窗睡起不甚タ。",
   "墨淡眉尖，风冷牙签，象管怕重拈。",
   "倦梳云懒对妆奁，怕愁春不卷珠帘。",
   "落红堆翠径，飞絮拥雕檐。",
   "嫌，楼外雨帘纤。",
   "泊潭洲忆旧游，叹迟留，情似汉江不断头。",
   "暮霭西收，楚水东流，烟草替人愁。",
   "鹭分沙接岸沧州，鱼惊饵晒网轻舟。",
   "风闲沽酒旆，月淡挂帘钩。",
   "秋，尽在雁边楼。",
   "美妓舞态轻，曲声清，生香玉骨粉扌若成。",
   "娇眼珠星，指甲春冰，云鬓剪鸦翎。",
   "记沉香火里调笙，忆砑罗裙上弹筝。",
   "轻颦欺燕燕，浅笑妒莺莺。",
   "挣，那更性胡伶。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "中吕・普天乐湘阳道中",
  "author": "元・卢挚",
  "body": [
   "岳阳来，湘阳路。",
   "望炊烟田舍，掩映沟渠。",
   "山远近，云来去。",
   "溪上招提烟中树，看时见三两樵渔。",
   "凭谁画出，行人得句，不用前驱。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "双调・蟾宫曲西湖",
  "author": "元・徐再思",
  "body": [
   "十年不到湖山，齐楚秦燕，皓首苍颜。",
   "今日重来，莺嫌花老，燕怪春悭。",
   "听越女鸾箫象板，恼司空雾鬓云环。",
   "道院弹关，酒会诗坛，万古西湖，天上人间。",
   "钱子云赴都赋河梁渺渺予怀，今日阳关，明日秦淮。",
   "鹏翼风云，龙门波浪，马足尘埃。",
   "宽洗汕胸中四海，便蜚腾天上三台。",
   "休等书斋，梅子花开，人在江南，先寄诗来。",
   "江淹寺紫霜毫是是非非，万古虚名，一梦初回。",
   "失又何愁？得之何喜？闷也何为？落日外萧山翠微，小桥边古寺残碑。",
   "文藻珠玑，醉墨淋淳，何似班超，投却毛锥。",
   "登太和楼白云中涌出蓬莱，俯视西湖，图画天开。",
   "暮雨珠帘，朝云画栋，夜月瑶台。",
   "书籍会三千剑客，管弦声十二金钗。",
   "对酒兴杯，拊髀怜才，寄语玲珑，王粲曾来。",
   "竹夫人湘妃应是前身，不记何年，封虢封秦。",
   "万古虚心，百年贞节，一世故人。",
   "剖苍壁寒凝泪痕，挽潜蛟巧结香纹。",
   "侍枕知恩，入梦无春，两腋清风，满枕行云。",
   "姑苏台荒台谁唤姑苏？兵渡西兴，祸起东吴。",
   "切齿仇冤，捧心钓饵，尝胆权谋。",
   "三千尺侵云粪土，十万家泣血膏腴。",
   "日月居诸，台殿丘墟。",
   "何似灵岩，山色如初。",
   "名姬玉莲荆山一片玲珑，分付冯夷，捧出波中。",
   "白羽香寒，琼衣露重，粉面冰融。",
   "知造化私加密宠，为风流洗尽娇红。",
   "月对芙蓉，人在帘栊。",
   "太华朝云，太液秋风。",
   "春情平生不会相思，才会相思，便害相思。",
   "身似浮云，心如飞絮，气若游丝。",
   "空一缕余香在此，盼千金游子何之。",
   "证候来时，正是何时？灯半昏时，月半明时。",
   "西湖寻春清明春色三分，湖上行舟，陌上游人。",
   "一片花阴，两行柳影，十里莎ブ。",
   "不要多ゾ排一品，休嫌少酒止三巡。",
   "处处开樽，步步寻春。",
   "花下归来，带月敲门。",
   "送沙宰宦游人过钱塘，江水汤汤，山色苍苍。",
   "马首西风，鸡声残月，雁影斜阳。",
   "男子志周流四方，循吏心恪守三章。",
   "岐麦林桑，渡虎驱蝗。",
   "人颂《甘棠》，春满琴堂。",
   "月问青天呼酒重倾，几度盈亏，几度阴晴。",
   "夜冷鱼沉，山空鹤唳，露滴乌惊。",
   "看杨柳楼心弄影，听梨花树底吹笙。",
   "雪与争明，风与双清。",
   "玉兔韬光，万古长生。",
   "赠粉英温柔乡里娉婷，清比梅花，更有余清。",
   "玉蕊含香，琼蕤沁月，瑶萼裁冰。",
   "冠杨柳东风媚景，赋芙蓉夜月幽情。",
   "花下苏卿，月下崔莺，世上飞琼，天上双成。",
   "西湖夏宴卷荷筒翠袖生香，忙处投闲，静处寻凉。",
   "一片歌声，四围山色，十里湖光。",
   "只此是人间醉乡，更休题天上天堂。",
   "老子疏狂，信手新词，赠与秋娘。",
   "红梅蕊珠宫内琼姬，醉倚东风，谁与更衣？血泪痕深，茜裙香冷，粉面春回。",
   "桃杏色十分可喜，冰霜心一片难移。",
   "何处长笛？吹散胭脂，分付春归。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "东堂老劝破家子弟・殿前欢",
  "author": "元・秦简夫",
  "body": [
   "俺孩儿甫能勾得成人，你又待教他一年春尽一年春。",
   "他上那丽春园纳了那颗争锋印，你休闹波完体将军！你便说天花信口喷，他如今有时运。",
   "怎肯不惺惺再打入迷魂阵。",
   "我劝你两个风流子弟，呵也别寻一个合死的郎君。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "前同换头",
  "author": "元・无名氏《张协状元》",
  "body": [
   "秋至，采楼高，龙山耸月正辉。",
   "宴着红裙，终夜一任眠迟。",
   "冬季赏雪，胆瓶簪梅数枝。",
   "暖阁团坐，饮羊羔风味。",
   "须知富贵，自然娇艳，有不搽红粉也相宜。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "尾・堪图石氏黄金帐，宜住芦花白玉堂，折莫便冰雪前村一千丈。沽一壶",
  "author": "元・亢文苑",
  "body": [
   "酒浆，向蹇驴背上，教那快忍冻的书生尽自赏。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "和太常蕭少卿近郊馬上偶吟  其一",
  "author": "宋・徐鉉",
  "body": [
   "田園經雨綠分畦，飛蓋閑行九里堤。",
   "拂袖清風塵不起，滿川芳草路如迷。",
   "林開始覺晴天迥，潮上初驚浦岸齊。",
   "怪得仙郎詩句好，斷霞殘照遠山西。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "湘夫人",
  "author": "屈原",
  "body": [
   "帝子降兮北渚，目眇眇兮愁予",
   "袅袅兮秋风，洞庭波兮木叶下",
   "登白薠兮骋望，与佳期兮夕张",
   "鸟何萃兮苹中，罾何为兮木上？",
   "沅有茝兮醴有兰，思公子兮未敢言",
   "荒忽兮远望，观流水兮潺湲",
   "麋何食兮庭中，蛟何为兮水裔",
   "朝驰余马兮江皋，夕济兮西澨",
   "闻佳人兮召余，将腾驾兮偕逝",
   "筑室兮水中，葺之兮荷盖",
   "荪壁兮紫坛，播芳椒兮成堂",
   "桂栋兮兰橑，辛夷楣兮药房",
   "罔薜荔兮为帷，擗蕙櫋兮既张",
   "白玉兮为镇，疏石兰兮为芳",
   "芷葺兮荷屋，缭之兮杜衡",
   "合百草兮实庭，建芳馨兮庑门",
   "九嶷缤兮并迎，灵之来兮如云",
   "捐余袂兮江中，遗余褋兮醴浦",
   "搴汀洲兮杜若，将以遗兮远者",
   "时不可兮骤得，聊逍遥兮容与！"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "搅筝芭・恰撇下心儿忘，才说着意儿谎。俺捱过恶诧风声，搜索遍风流伎",
  "author": "元・李唐宾",
  "body": [
   "蓦忖量，猛参详。",
   "空将顺人情笔尖和泪染，怎诉衷肠！。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "乔牌儿・行时思坐不安，所事儿怕干犯。多情反受风流难，旧愁积新恨",
  "author": "元・无名氏",
  "body": [
   "亻赞。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "賜道士鄧紫陽",
  "author": "唐・明皇帝",
  "body": [
   "太乙三門訣，元君六甲符。",
   "下傳金版術，上刻玉清書。",
   "有美探真士，囊中得祕書。",
   "自知三醮後，翊我滅殘胡。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "小拜门・把门似临潼会里，{坫瓦}颏如细柳军围，看诸葛纵擒蜀孟获。两",
  "author": "元・周德清",
  "body": [
   "下里，马来回，堪题。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "看钱奴买冤家债主・倘秀才",
  "author": "元・郑延玉",
  "body": [
   "饿的我肚里饥失魂丧魄，冻的我身上冷无颜落色。",
   "这雪呵，偏向俺穷汉身边乱洒来。",
   "(带云)大嫂(唱)你看雪深埋脚面，风紧透人怀，我忙将这孩儿的手揣。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "題程修己竹障",
  "author": "唐・文宗皇帝",
  "body": [
   "良工運精思，巧極似有神。",
   "臨窗忽覩繁陰合，再盼真假殊未分。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "功臣宴敬德不伏老・尾声",
  "author": "元・杨梓",
  "body": [
   "饯一道咸阳陌上尘，折一枝霸陵桥上柳。",
   "众公卿相见知仙行？(徐)老将军早饮一杯。",
   "(尉)饮过这一杯西出刚关这饯行的酒。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "死生交范张鸡黍・胜葫芦",
  "author": "元・宫天挺",
  "body": [
   "都做了野草闲花满地愁，你为甚不肯上坟丘？枉教那一二千人都落后。",
   "这的是谁亲谁旧，谁薄谁厚？(带云)兄弟也，(唱)不能勾相守到白头。",
   "(云)再将酒来，我与兄弟浇奠咱。",
   "(唱)。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "萧何月夜追韩信・醉春风",
  "author": "元・金仁杰",
  "body": [
   "昨日看青山绿水剑光昏，今朝见白马红缨彩色新。",
   "便做一宵宫里梦贤人，也似这般准，准。",
   "三省吾身，五陵年少，端的一言难尽。",
   "(做探萧何，礼了)今日得见官里，谢丞相一人而己。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "郊廟歌辭 中宗祀昊天樂章 豫和",
  "author": "唐・不詳",
  "body": [
   "天之曆數歸睿唐，顧惟菲德欽昊蒼。",
   "撰吉日兮表殷薦，冀神鑒兮降闓陽。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "瘸李岳诗酒玩江亭・七兄弟",
  "author": "元・无名氏",
  "body": [
   "这厮便指望，大纲要成双，(牛员外云)你走的那里去？(正旦唱)百般的不肯将咱放。",
   "身躯儿左右怎遮拦，手脚儿怎生难遮当？。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "二郎神醉射锁魔镜・骂玉郎",
  "author": "元・无名氏",
  "body": [
   "我平生正直无私徇，你休怠慢莫消停，你索用心机打破他那迷魂阵。",
   "除免你那腹内愁，顿脱了眉上锁，释放了心头病。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "减字木兰花·从教铁石",
  "author": "清・納蘭性德",
  "body": [
   "从教铁石，每见花开成惜惜",
   "泪点难消，滴损苍烟玉一条",
   "怜伊大冷，添个纸窗疏竹影",
   "记取相思，环佩归来月上时"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "圣药王・风物熙，丽日迟，连天芳草正萋萋。客万里，人九嶷，遥岑十二",
  "author": "元・贯云石",
  "body": [
   "远烟迷，生隔断武陵溪。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "吕洞宾三醉岳阳楼・牧羊关",
  "author": "元・马致远",
  "body": [
   "这吐也无那竹叶云涛泛，也无那石铛雪浪翻。",
   "这吐呵但开口满帘香散，更压着仙酒延年，更压着蟠桃般驻颜。",
   "也不索采蒙顶山头雪，也不索茶点鹧鸪斑。",
   "比尔你吸引扬子江心水，(带云)马儿也，(唱)可强似汤生螃蟹眼。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "杨氏女杀狗劝夫・货郎儿",
  "author": "元・萧德祥",
  "body": [
   "他道俺哥哥十分家沉醉，且吃些儿热汤热水。",
   "俺哥哥直睡到红日三竿未起，可怎生近新来偏恁觉来疾？(孙大做醒科，云)好睡也。",
   "(正末唱)他酩子里纽回胭颈，没揣地转过身体。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "郊廟歌辭 武后大享昊天樂章 七",
  "author": "唐・不詳",
  "body": [
   "樽浮九醞，禮備三周。",
   "陳誠菲奠，契福神猷。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "杜牧之诗酒扬州梦・幺篇",
  "author": "元・乔吉",
  "body": [
   "怕听阳关第四声，回首家山千万程，博着个甚功名，教俺做浮萍浪梗？因此上意懒出豫章城。",
   "(同一下)。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "崔莺莺夜听琴(第二本)・二煞",
  "author": "元・王实甫",
  "body": [
   "夫人只一家，老兄无伴等，为嫌繁冗寻幽静。",
   "(末云)别有甚客人？(红唱)单请你个有恩有义闲中客，且回避了无是无非窗下僧。",
   "夫人的命，道是下莫教推托，和贱妾即便随行。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "赵匡义智娶符金锭・采茶歌",
  "author": "元・无名氏",
  "body": [
   "父亲你走将来快安排，今日个洛阳花酒一时来。",
   "(赵匡义云)姐姐，那韩松若知道呵，必然与俺争竞也。",
   "(正旦云)不怕他。",
   "(唱)统领军卒驱士马，我着他闻咱名姓命先衰。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "夜行船",
  "author": "宋・谢绛",
  "body": [
   "昨夜佳期初共。",
   "鬓云低、翠翘金凤。",
   "尊前和笑不成歌，意偷转、眼波微送。",
   "草草不容成楚梦。",
   "渐寒深、翠帘霜重。",
   "相看送到断肠时，月西斜、画楼钟动。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "杜牧之诗酒扬州梦・一煞",
  "author": "元・乔吉",
  "body": [
   "则愿的行云不返三山洞，好梦休惊五夜钟。",
   "我这里绣被香寒，五楼人去，锦树花飞，金谷阅空。",
   "飞腾了彩风，解放了红绒，摔碎下雕笼，若不是天公作用，险些儿风月两无功。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "尾・黄昏时春色生容貌，清镜晓秋霜点鬓毛。愁虽是多，恨也不少。衰了",
  "author": "元・沙正卿",
  "body": [
   "潘容，瘦了沈腰。",
   "镜里端详，心下暗约。",
   "端详罢怎不教我心焦，则一夜剩添十岁老。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "包待制智赚生金阁・牧羊关",
  "author": "元・武汉臣",
  "body": [
   "他那里才言罢，唬的我魂暗消。",
   "离城中则半载其高，可怎么白日神嚎，到黄昏鬼闹。",
   "我半生多正直，怎见这蹊跷？只今的离村疃犹然早，(云)张千，将马来。",
   "(张千云)理会的。",
   "(正末唱)我和你到皇都赴晚朝。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "吕洞宾度铁拐李岳・煞尾",
  "author": "元・岳伯川",
  "body": [
   "你学那守三贞赵真女罗裙包土将坟茔建，休学那犯十恶桑新妇彩扇题诗则将那墓顶扇。",
   "黑娄娄潮上涎，铁屑屑手腕软，直挺挺腿怎拳。",
   "铜斗儿家私不能勾擅，血点儿相识不能勾面，花朵般浑家不能勾恋，魔合罗孩儿不能勾见。",
   "半世团圆分福浅，则俺这三口儿相逢路儿远。",
   "(下)。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "幺・春光有钱容易买，秋景最伤杯。他便似无根蓬草，任飘零不厌尘埃。",
  "author": "元・马致远",
  "body": [
   "假饶是线断风笋，落谁家也要个明白。",
   "近来自知浮世窄，少负他惹多苦债，别离期限数，占卜卦钱排。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "四・一个女孩儿转了几遭，不多时引出一伙，中间里一个央人货，裹着枚",
  "author": "元・杜仁杰",
  "body": [
   "皂头巾顶门上插一管笔，满脸石灰更着些黑道儿抹。",
   "知他待是如何过？浑身上下，则穿领花布直裰。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "逞风流王焕百花亭・普天乐",
  "author": "元・无名氏",
  "body": [
   "水晶球，铜豌豆。",
   "红裙中插手，锦被里舒头。",
   "金杯浮蜡蚁春，红炭灸肥羊肉。",
   "惜玉怜香天生就，另一种可喜风流。",
   "淹润惯熟，玲珑剔透，软款温柔。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "旋风子",
  "author": "元・施惠《幽闺记》",
  "body": [
   "(末扮太白星上)祥云缥缈，飞升体探人间。",
   "湛湛清天不可欺，未曾举意早先知。",
   "善恶到头终有报，只争来早与来迟。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "驻马听・寂寂瑶阶，春日阑珊景物乖。困人天色，不堪梳洗傍妆台。梨花",
  "author": "元・刘庭信",
  "body": [
   "寂寞玉容衰，海常零落胭脂败。",
   "自裁划，今春更比前春煞。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "刮地风・我这里叉手躬身将礼数迎，请禅师细说叮咛。他道有一个女娉婷，",
  "author": "元・宋方壶",
  "body": [
   "寺里闲踢蹬。",
   "他生的袅袅婷婷，阁不住的雨泪盈盈。",
   "愁凄凄有如痴挣，闷恹恹染成疾病，蘸霜毫回廊下壁上题名。",
   "猛抬头恰定睛，正是俺可意多情，走龙蛇字体儿堪人敬，他诉衷肠表志诚。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "越调・柳营曲赏春",
  "author": "元・吴西逸",
  "body": [
   "花艳冶，柳欹斜，粉墙低画楼人困也。",
   "庭院星列，罗绮云叠，簇簇闹蜂蝶。",
   "紫霞杯我辈豪侠，绿云鬟仕女奇绝。",
   "乌丝栏看醉草，红牙板唱声揭。",
   "别，同载七香车。",
   "避暑偶成共翠娥，酌金波，湖上晚风摇芰荷。",
   "丝管情多，帘幕凉过，暑气尽消磨。",
   "扇停风几缕柔歌，袜凌波一掬香罗。",
   "醉魂偏浩荡，诗兴费吟哦。",
   "睃，老子正婆娑。",
   "秋闺笼太纤，拜银蟾，恰团圆几时云又掩。",
   "尘淡妆奁，风透朱帘，无语望雕檐。",
   "博山炉香冷慵添。",
   "阳春曲唱和难タ。",
   "新凉开扇影，清恨蹙眉尖。",
   "嫌，何处可消淹？。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "玉箫女两世姻缘・柳叶儿",
  "author": "元・乔吉",
  "body": [
   "兀的不寂寞了菱花妆镜，自觑下白害心疼，将一片志诚心写入下冰绡巾争。",
   "这一篇相思令，寄与多情，道是人憔悴不似丹青。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "尾声・恰能够天涯萍水同携手，谁承望江上莼鲈又买舟，少不的再叙离怀",
  "author": "元・汤舜民",
  "body": [
   "那时候。",
   "连床秉烛，隔离唤酒，夜雨呼童剪春菲。",
   "赠钱塘镊者三万六千日有限期，一百二十行无休息。",
   "但识破毫厘千里谬，才知道四十九年非。",
   "这归去来兮，明是个安身计，人都道陶潜有见识。",
   "谁恋他花扑扑云路功名，他偏爱清淡淡仙家道理。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "王月英元夜留鞋记・后庭花",
  "author": "元・无名氏",
  "body": [
   "你将这锦纹笺为定礼，(梅香云)也要鼓笛送去才好。",
   "(正旦唱)你将这紫霜毫做鼓笛。",
   "(梅香云)谁是保亲的？(正旦唱)保亲的是鸳鸯字，(梅香云)谁是主婚的？(正旦唱)主婚的是锦绣题。",
   "(梅香云)母亲知道呵，可怎了也？(正旦唱)休怕我母亲知，抵多少姻缘相会。",
   "卓文君驾香车归故里，汉相如到他乡发志气。",
   "薛琼琼有宿缘仙世期，崔怀宝花园中成匹配。",
   "韩彩云芙蓉亭遇故知，崔伯英两团圆直到底。",
   "(梅香云)常言道得好，佳人有意郎君俏，可知姐姐看上他来。",
   "(正旦唱)。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "梅花塘",
  "author": "元・高明《蔡伯喈琵琶记》",
  "body": [
   "卖头发，买的休论价。",
   "念我受饥荒，囊箧无些个。",
   "丈夫出去，那更连丧了公婆，没奈何，只得卖头发，资送他。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "双调・春闺怨",
  "author": "元・乔吉",
  "body": [
   "雪月风花收拾够也，用心用力这时节，担儿上一担担风月。",
   "途路赊，步步些些。",
   "不系雕鞍门前柳，玉容寂寞见花羞，冷风儿吹雨黄昏后。",
   "帘控钩，掩上珠楼，风雨替花愁。",
   "黑海春愁浑无处躲，嫩香腻玉渐消磨，瘦呵也不似今春个。",
   "无奈何，自画双蛾，添得越愁多。",
   "薄命儿心肠较软，道声去也泪涟涟，这些时攒下春闺怨。",
   "离恨天，几度前，羞见月儿圆。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "雁鱼锦",
  "author": "元・柯丹邱《荆钗记》",
  "body": [
   "长安四月花正飞，见残红万片皆愁泪。",
   "何苦被利禄成抛弃，如今把孤身旅泊天涯。",
   "意悬悬止不住思维，音书曾有回，只怕他望帝都欲赴愁迢递。",
   "望目断故园，知他知也未？。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "四丞相高会丽春堂・幺篇",
  "author": "元・王实甫",
  "body": [
   "俺只见一缕垂杨落晓风。",
   "(押宴官云)老丞相射中三箭也。",
   "将过那锦袍玉带来。",
   "送与老丞相。",
   "令人将酒来，老水相满饮-杯。",
   "(正末唱)人列绣芙蓉，翠袖殷勤捧玉钟。",
   "赢的这千花锦段，万金玉带，拚却醉颜红。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "关张双赴西蜀梦・醉春风",
  "author": "元・关汉卿",
  "body": [
   "安喜县把督邮鞭，当阳桥将曹操喝，共吕温侯配战九十合，那其间也是我、我！壮志消磨，暮年折挫，今日向匹夫行伏落。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "正官・绿幺遍自述",
  "author": "元・乔吉",
  "body": [
   "不占龙头选，不入名贤传。",
   "时时酒圣，处处诗禅，烟霞状元，江湖醉仙，笑谈便是编修院。",
   "留连，批风抹月四十年。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "王月英元夜留鞋记・呆骨朵",
  "author": "元・无名氏",
  "body": [
   "说甚么金尊倒处千愁解，好教人感叹伤怀。",
   "你只恋北海春醪，偏不待西厢月色。",
   "我道是看书人多志诚，你如今倒把我厮禁害。",
   "(带云)哎，秀才，秀才。",
   "(唱)那里也色胆天来大，却原来酒肠宽似海。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "沙门岛张生煮海・滴滴金",
  "author": "元・李好古",
  "body": [
   "趁着那绿水清波，良辰美景，轻云薄雾，霜气浸冰壶。",
   "可则是玉露泠泠。",
   "金风淅淅，中秋节序，正值着冷清清，人静更初。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "小张屠焚儿救母・水仙子",
  "author": "元・无名氏",
  "body": [
   "莫谩天地莫谩神，远在儿孙近在身。",
   "焚儿救母行忠信，报爷娘养育恩，劝人间爷子恩情。",
   "为父的行忠孝，为子的行孝顺，传与你万古留名。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "月明和尚度柳翠・黄钟尾",
  "author": "元・李寿卿",
  "body": [
   "你道是这回和月常相守，(带云)我为你走了两番也。",
   "(唱)才赚的春风可便树点头。",

  "author": "元・王实甫",
  "body": [
   "\"请\"字儿不曾出声，\"去\"字儿连忙答应；可早莺莺跟前，\"姐姐\"呼之，喏喏连声。",
   "秀才每闻道\"请\"，恰便是听将军严令，利他那五脏神愿随鞭镫。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "礼魂",
  "author": "屈原",
  "body": [
   "成礼兮会鼓，",
   "传芭兮代舞",
   "姱女倡兮容与",
   "春兰兮秋菊，",
   "长无绝兮终古。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "雁门关存孝打虎・幺",
  "author": "元・无名氏",
  "body": [
   "我从来劣性难拿，正恼犯如何收煞。",
   "见咱，赶他，撞阵冲军，倒戈弃甲。",
   "纵辔加鞭催战马，恨不的剪断紫稍，踏斜宝镫，顿宽玉勒，摆损金算刂。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "柳枝辭十二首  其六",
  "author": "宋・徐鉉",
  "body": [
   "濛濛堤畔柳含烟，疑是陽和二月天。",
   "醉裏不知時節改，漫隨兒女打鞦韆。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "中吕・红绣鞋竹衫儿",
  "author": "元・乔吉",
  "body": [
   "并刀剪龙须为寸，玉丝穿龟背成文，襟袖清凉不沾尘。",
   "汗香晴带雨，肩瘦冷搜云，是玲珑剔透人。",
   "浃背全无暑汗，曲肱时印新瘢，衬荷花落魄壮怀宽。",
   "挹风香双袖细，披野色一襟团，满身儿窥豹管。",
   "书所见脸儿嫩难藏酒晕，扇儿薄不隔歌尘，佯整金钗暗窥人。",
   "凉风醒醉眼，明月破诗魂，料今宵怎睡得稳。",
   "泊皋亭山下石骨瘦金珠窟嵌，树身驰璎珞褴衤参，秋影秋声绕蓬龛。",
   "青山黄鹤楼，白水黑龙潭，野猿啼碎胆。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "迎新春",
  "author": "宋・柳永",
  "body": [
   "嶰管变青律，帝里阳和新布。",
   "晴景回轻煦。",
   "庆嘉节、当三五。",
   "列华灯、千门万户。",
   "遍九陌、罗绮香风微度。",
   "十里然绛树。",
   "鳌山耸、喧天潇鼓。",
   "渐天如水，素月当午。",
   "香径里、绝缨掷果无数。",
   "更阑烛影花阴下，少年人、往往奇遇。",
   "太平时、朝野多欢民康阜。",
   "随分良聚。",
   "堪对此景，争忍独醒归去。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "武肅王有旨石橋設齋會進一詩  其一",
  "author": "宋・釋延壽",
  "body": [
   "南有天台事可尊，孕靈含秀獨超羣。",
   "重重曲澗侵危石，步步層巖踏碎雲。",
   "金雀每從雲裏現，異香多向夜深聞。",
   "當知此界非凡界，一道幽奇各自分。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "朝中措",
  "author": "宋・欧阳修",
  "body": [
   "平山阑槛倚晴空。",
   "山色有无中。",
   "手种堂前垂柳，别来几度春风。",
   "文章太守，挥毫万字，一饮千锺。",
   "行乐直须年少，尊前看取衰翁。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "尉迟恭单鞭夺槊・天下乐",
  "author": "元・关汉卿",
  "body": [
   "纵使有铁壁银山也撞开！哎，你个英也波才，休浪猜，你既肯面缚归降，我也须降阶接待。",
   "请将军去了服，罢了哀，俺今日与将军庆贺来。",
   "（尉迟云）元帅请坐，受尉迟恭几拜！（做拜科）（正未云）将军清起。",
   "（尉迟云）量尉迟恭有何德能，蒙元帅这般宽恕！敢不终身愿随鞭镫？（正末唱）。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "后庭花・瘦来金缕宽，空将宝镜看；髻绾双鬟乱，眉颦八字弯。最心烦，",
  "author": "元・无名氏",
  "body": [
   "花开庭院，子规啼数番。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "登三臺言志",
  "author": "唐・太宗皇帝",
  "body": [
   "未央初壯漢，阿房昔侈秦。",
   "在危猶騁麗，居奢遂役人。",
   "豈如家四海，日宇罄朝倫。",
   "扇天裁戶舊，砌地翦基新。",
   "引月擎宵桂，飄雲逼曙鱗。",
   "露除光炫玉，霜闕映雕銀。",
   "舞接花梁燕，歌迎鳥路塵。",
   "鏡池波太液，莊苑麗宜春。",
   "作異甘泉日，停非路寢辰。",
   "念勞慙逸己，居曠返勞神。",
   "所欣成大厦，宏材佇渭濱。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "死生交范张鸡黍・梧叶儿",
  "author": "元・宫天挺",
  "body": [
   "举孝廉曾三聘，论文才第一流，我道你不拜相决封侯。",
   "正沧海鱼龙夜，趁西风雕鹗秋。",
   "此一去不回头，好教我这烦恼越感的天长地久。",
   "(云)你众人打开棺函，我试看咱。",
   "(卜儿云)哥哥不可。",
   "已死过许多时，则怕尸气扑着你也。",
   "(正末云)母亲，便有尸气扑死我，我和兄弟一处埋葬更好哩。",
   "(众开棺，正末看，跌倒科，唱)。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "贈索處士",
  "author": "宋・譚用之",
  "body": [
   "不將桂子種諸天，長得尋君水石邊。",
   "玄豹夜寒和霧隠，驪龍春暖抱珠眠。",
   "山中宰相陶弘景，洞裏真人葛稚川。",
   "一度相思一惆悵，水寒烟澹落花前。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "幺篇・宋玉悲秋愁闷，江淹梦笔寂寞。人间岂无成与破，想别离情绪，世",
  "author": "元・白朴",
  "body": [
   "界里只有俺一个。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "尾声・从今后休将锦字传青鸟，谩把纶竿钓巨鳌。不是我巧语花言厮推调，",
  "author": "元・汤舜民",
  "body": [
   "恁如今模样正娇，年纪儿又小，则不如觅个知心俊孤老。",
   "劝妓女从良丽春园有世情，鸣珂巷无公论。",
   "爱村沙欺软弱，嫌文墨笑温纯。",
   "别是个家门，饱暖随时运，诙谐教子孙。",
   "伴风姨陪月姊甚日辞栅，觅花钱偿酒债何年证本？。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "汉高皇濯足气英布・竹枝儿",
  "author": "元・尚仲贤",
  "body": [
   "他若问英布如何救外黄，咱则说项羽亏输走夏阳，恨不就穷追直赶到乌江。",
   "今日个鸣金收士马，奏凯见君王，堤防，只怕他放二四又做出那濯足踞胡床。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "李云英风送梧桐叶・油葫芦",
  "author": "元・李唐宾",
  "body": [
   "悔杀当初不自忖，轻将罗袂分，今日个锦笺无路托鸿鳞。",
   "我如今瘦岩岩腰减罗裙褪，他那里急煎煎人远大涯近。",
   "昨日是秋，今日是春。",
   "叹光阴有尽情难尽，无计觅行云。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "对弈・骂玉郎",
  "author": "元・詹时雨",
  "body": [
   "寻思使得心肠碎，宵废寝，昼忘食，知难见可观乎势。",
   "局面危，拈上难，冲开易。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "满庭芳・三闾枉了，众人都醉倒，你也铺啜些ㄤ糟。朝中待独自要个醒醒",
  "author": "元・邓玉宾",
  "body": [
   "号，怎当他众口嗷嗷？一个阳台上襄王睡着，一个巫山下宋玉神交。",
   "休道你向渔夫行告，遮莫论天写来，谁肯问《离骚》？。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "张天师断风花雪月・感皇恩",
  "author": "元・吴昌龄",
  "body": [
   "怪不着你正是遥授夫妻，你可甚步步相随？更做道秀才每忒上紧，忒着迷。",
   "你伴的是琴书度日，怎想着那广寒宫窃药的仙姬？专等待三更后，才斗转，恰星移。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "包待制智赚灰栏记・仙吕/点绛唇",
  "author": "元・李行甫",
  "body": [
   "月户云窗，绣帏罗帐。",
   "谁承望，我如今弃贱从良，拜辞了这鸣珂巷。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "添字尹令",
  "author": "元・无名氏《张协状元》",
  "body": [
   "奴家拜告，听取奴家：得婆周庇，直欲靠婆到老。",
   "张协要好，出路宜及早。",
   "(合)归来后称怀抱，除非异时，归古庙挂绿袍。",
   "(净)。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "黑旋风双献功・仙吕/点绛唇",
  "author": "元・高文秀",
  "body": [
   "柳絮堪扯，似飞花引惹，纷纷谢。",
   "莺燕调舌，此景宜游冶。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "混江龙・桔槔闲挂，呼童汲水旋烹茶。柔桑荏苒，古柏槎牙。雾锁草桥三",
  "author": "元・王大学士",
  "body": [
   "四横，烟笼茅舍数十家。",
   "岗盘曲畎兜答，莺迁乔木丘篆。",
   "一个鸥鹭水面，雁落平沙。",
   "喧檐宿雀，啼树栖鸦。",
   "柴扉吠犬，鼓吹鸣蛙。",
   "侬家鹦鹉洲，不入麒麟画。",
   "百姓每讴歌鼓腹，一弄儿笑语喧哗。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "南海子·相风微动九门开",
  "author": "清・納蘭性德",
  "body": [
   "相风微动九门开，南陌离宫万柳栽",
   "草色横粘下马泊，水光平占晾鹰台",
   "锦鞯欲射波间去，玉辇疑从岛上回",
   "自是软红惊十丈，天教到此洗尘埃"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "幺篇・劝酒佳人擎金盏，当歌者款撒香檀。歌罢喧喧笑语繁，夜将阑，画",
  "author": "元・白朴",
  "body": [
   "烛银光灿。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "孟德耀举案齐眉・收尾",
  "author": "元・无名氏",
  "body": [
   "只愿的丹墀早把千言对，施展你男儿壮气。",
   "休得要做了无名金榜不回归，空教我斜倚定柴门盼望着你。",
   "(下)。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "崔莺莺夜听琴(第二本)・朝天子",
  "author": "元・王实甫",
  "body": [
   "休道这生，年纪儿后生，恰学害相思病。",
   "天生聪俊，打扮素净，奈夜夜成孤另。",
   "才子多情，佳人薄幸，兀的不担阁了人性命。",
   "(末云)你姐姐果有信行？(红唱)谁无一个信行，谁无一个志诚，你两个今夜亲折证。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "圣药王・等一掷，心暗喜，并合梁恨不的马都回。恰四六十，又三四七，",
  "author": "元・周德清",
  "body": [
   "更幺三一二紧相随，心急马行迟。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "赚尾・既把世情疏，感谢君恩厚，臣怕饮的是黄封御酒。竹杖芒鞋任意留，",
  "author": "元・不忽木",
  "body": [
   "拣溪山好处追游。",
   "就着这晓云收，冷落了深秋，饮遍金山月满舟。",
   "那其间潮来的正悠，船开在当溜，卧吹箫管到扬州。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "天问",
  "author": "屈原",
  "body": [
   "曰：",
   "遂古之初，谁传道之？",
   "上下未形，何由考之？",
   "冥昭瞢暗，谁能极之？",
   "冯翼惟象，何以识之？",
   "明明暗暗，惟时何为？",
   "阴阳三合，何本何化？",
   "圜则九重，孰营度之？",
   "惟兹何功，孰初作之？",
   "斡维焉系，天极焉加？",
   "八柱何当，东南何亏？",
   "九天之际，安放安属？",
   "隅隈多有，谁知其数？",
   "天何所沓？",
   "十二焉分？",
   "日月安属？",
   "列星安陈？",
   "出自汤谷，次于蒙汜。",
   "自明及晦，所行几里？",
   "夜光何德，死则又育？",
   "厥利维何，而顾菟在腹？",
   "女岐无合，夫焉取九子？",
   "伯强何处？",
   "惠气安在？",
   "何阖而晦？",
   "何开而明？",
   "角宿未旦，曜灵安藏？",
   "不任汩鸿，师何以尚之？",
   "佥曰",
   "“何忧，何不课而行之？”",
   "鸱龟曳衔，鲧何听焉？",
   "顺欲成功，帝何刑焉？",
   "永遏在羽山，夫何三年不施？",
   "伯禹愎鲧，夫何以变化？",
   "纂就前绪，遂成考功。",
   "何续初继业，而厥谋不同？",
   "洪泉极深，何以窴之？",
   "地方九则，何以坟之？",
   "河海应龙？",
   "何尽何历？",
   "鲧何所营？",
   "禹何所成？",
   "康回冯怒，墬何故以东南倾？",
   "九州安错？",
   "川谷何洿？",
   "东流不溢，孰知其故？",
   "东西南北，其修孰多？",
   "南北顺椭，其衍几何？",
   "昆仑悬圃，其尻安在？",
   "增城九重，其高几里？",
   "四方之门，其谁从焉？",
   "西北辟启，何气通焉？",
   "日安不到？",
   "烛龙何照？",
   "羲和之未扬，若华何光？",
   "何所冬暖？",
   "何所夏寒？",
   "焉有石林？",
   "何兽能言？",
   "焉有虬龙，负熊以游？",
   "雄虺九首，鯈忽焉在？",
   "何所不死？",
   "长人何守？",
   "靡蓱九衢，枲华安居？",
   "灵蛇吞象，厥大何如？",
   "黑水玄趾，三危安在？",
   "延年不死，寿何所止？",
   "鲮鱼何所？",
   "鬿堆焉处？",
   "羿焉彃日？",
   "乌焉解羽？",
   "禹之力献功，降省下土四方。",
   "焉得彼嵞山女，而通之於台桑？",
   "闵妃匹合，厥身是继。",
   "胡维嗜不同味，而快鼌饱？",
   "启代益作后，卒然离蠥。",
   "何启惟忧，而能拘是达？",
   "皆归射鞫，而无害厥躬。",
   "何后益作革，而禹播降？",
   "启棘宾商，《九辨》《九歌》。",
   "何勤子屠母，而死分竟地？",
   "帝降夷羿，革孽夏民。",
   "胡射夫河伯，而妻彼雒嫔？",
   "冯珧利决，封豨是射。",
   "何献蒸肉之膏，而后帝不若？",
   "浞娶纯狐，眩妻爰谋。",
   "何羿之射革，而交吞揆之？",
   "阻穷西征，岩何越焉？",
   "化而为黄熊，巫何活焉？",
   "咸播秬黍，莆雚是营。",
   "何由并投，而鲧疾修盈？",
   "白蜺婴茀，胡为此堂？",
   "安得夫良药，不能固臧？",
   "天式从横，阳离爰死。",
   "大鸟何鸣，夫焉丧厥体？",
   "蓱号起雨，何以兴之？",
   "撰体协胁，鹿何膺之？",
   "鳌戴山抃，何以安之？",
   "释舟陵行，何之迁之？",
   "惟浇在户，何求于嫂？",
   "何少康逐犬，而颠陨厥首？",
   "女歧缝裳，而馆同爰止。",
   "何颠易厥首，而亲以逢殆？",
   "汤谋易旅，何以厚之？",
   "覆舟斟寻，何道取之？",
   "桀伐蒙山，何所得焉？",
   "妺嬉何肆，汤何殛焉？",
   "舜闵在家，父何以鳏？",
   "尧不姚告，二女何亲？",
   "厥萌在初，何所亿焉？",
   "璜台十成，谁所极焉？",
   "登立为帝，孰道尚之？",
   "女娲有体，孰制匠之？",
   "舜服厥弟，终然为害。",
   "何肆犬豕，而厥身不危败？",
   "吴获迄古，南岳是止。",
   "孰期去斯，得两男子？",
   "缘鹄饰玉，后帝是飨。",
   "何承谋夏桀，终以灭丧？",
   "帝乃降观，下逢伊挚。",
   "何条放致罚，而黎服大说？",
   "简狄在台，喾何宜？",
   "玄鸟致贻，女何喜？",
   "该秉季德，厥父是臧。",
   "胡终弊于有扈，牧夫牛羊？",
   "干协时舞，何以怀之？",
   "平胁曼肤，何以肥之？",
   "有扈牧竖，云何而逢？",
   "击床先出，其命何从？",
   "恒秉季德，焉得夫朴牛？",
   "何往营班禄，不但还来？",
   "昏微循迹，有狄不宁。",
   "何繁鸟萃棘，负子肆情？",
   "眩弟并淫，危害厥兄。",
   "何变化以作诈，而后嗣逢长？",
   "成汤东巡，有莘爰极。",
   "何乞彼小臣，而吉妃是得？",
   "水滨之木，得彼小子。",
   "夫何恶之，媵有莘之妇？",
   "汤出重泉，夫何辠尤？",
   "不胜心伐帝，夫谁使挑之？",
   "会朝争盟，何践吾期？",
   "苍鸟群飞，孰使萃之？",
   "列击纣躬，叔旦不嘉。",
   "何亲揆发足，周之命以咨嗟？",
   "授殷天下，其位安施？",
   "反成乃亡，其罪伊何？",
   "争遣伐器，何以行之？",
   "并驱击翼，何以将之？",
   "昭后成游，南土爰底。",
   "厥利惟何，逢彼白雉？",
   "穆王巧梅，夫何为周流？",
   "环理天下，夫何索求？",
   "妖夫曳炫，何号于市？",
   "周幽谁诛？",
   "焉得夫褒姒？",
   "天命反侧，何罚何佑？",
   "齐桓九会，卒然身杀。",
   "彼王纣之躬，孰使乱惑？",
   "何恶辅弼，谗谄是服？",
   "比干何逆，而抑沈之？",
   "雷开阿顺，而赐封之？",
   "何圣人之一德，卒其异方？",
   "梅伯受醢，箕子详狂？",
   "稷维元子，帝何竺之？",
   "投之于冰上，鸟何燠之？",
   "何冯弓挟矢，殊能将之？",
   "既惊帝切激，何逢长之？",
   "伯昌号衰，秉鞭作牧。",
   "何令彻彼岐社，命有殷国？",
   "迁藏就岐，何能依？",
   "殷有惑妇，何所讥？",
   "受赐兹醢，西伯上告。",
   "何亲就上帝罚，殷之命以不救？",
   "师望在肆，昌何识？",
   "鼓刀扬声，后何喜？",
   "武发杀殷，何所悒？",
   "载尸集战，何所急？",
   "伯林雉经，维其何故？",
   "何感天抑墬，夫谁畏惧？",
   "皇天集命，惟何戒之？",
   "受礼天下，又使至代之？",
   "初汤臣挚，后兹承辅。",
   "何卒官汤，尊食宗绪？",
   "勋阖梦生，少离散亡。",
   "何壮武历，能流厥严？",
   "彭铿斟雉，帝何飨？",
   "受寿永多，夫何久长？",
   "中央共牧，后何怒？",
   "蜂蛾微命，力何固？",
   "惊女采薇，鹿何佑？",
   "北至回水，萃何喜？",
   "兄有噬犬，弟何欲？",
   "易之以百两，卒无禄？",
   "薄暮雷电，归何忧？",
   "厥严不奉，帝何求？",
   "伏匿穴处，爰何云？",
   "荆勋作师，夫何长？",
   "悟过改更，我又何言？",
   "吴光争国，久余是胜。",
   "何环穿自闾社丘陵，爰出子文？",
   "吾告堵敖以不长。",
   "何试上自予，忠名弥彰？"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {
  "title": "尾声・别离苦恨从头记，有一日捱出凄凉日期。则俺那薄幸短命若回程，",
  "author": "元・无名氏",
  "body": [
   "我将这一件件一桩桩诉与你。",
   "小令。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "汤泉应制·六龙初驻浴蓝天",
  "author": "清・納蘭性德",
  "body": [
   "六龙初驻浴蓝天，碧瓦朱旗共一川",
   "润逼仙桃红自舞，醉酣人柳绿犹眠",
   "吹成暖律回燕谷，散作薰风入舜弦",
   "最是垂衣深圣德，不须词笔颂甘泉"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "杜蕊娘智赏金线池・川拨棹",
  "author": "元・关汉卿",
  "body": [
   "似这等好姻缘，人都道全在天。",
   "若是俺福过灾缠，空意惹情牵；间阻的山长水远，几时得人月圆？。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "西华山陈抟高卧・金盏儿",
  "author": "元・马致远",
  "body": [
   "到这戌字上呵，水形成火长生，避垂龙大小运今年并：后交的丙辰一运大峥嵘。",
   "日犯空亡为将相，时逢禄马作公卿。",
   "你是南方赤帝子，上应北极紫微星。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "马丹阳三度任风子・雁儿落",
  "author": "元・马致远",
  "body": [
   "我只道人不知鬼不觉，却原来你空叫咱空闹。",
   "(带云)金珠财宝都将的去，师父来问，我说些甚么？哥哥，你姓甚名谁？(六贼云)我名可名，无姓名。",
   "(正末唱)你道是名可名无姓名。",
   "(带云)俺出家的东西你将的去。",
   "(唱)可正是道可道非常道。",
   "(六贼云)任屠，你怎生骂我？(做揪住科)(正末唱)。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "看钱奴买冤家债主・秃厮儿",
  "author": "元・郑延玉",
  "body": [
   "论你个小本钱茶坊酒肆，有甚么大度量仗义轻施，你也则可怜俺饥寒穷路不自支。",
   "如今这银一个，酬谢你酒三卮，也见俺的情私。",
   "(店小二云)这等，小子收了，多谢老员外。",
   "(正末云)孩儿，这多余的银子，你与我都散与那贫难无倚的。",
   "可是为何？这二十年来俺骂的那财主每多了也。",
   "(唱)。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "逞风流王焕百花亭・酣葫芦",
  "author": "元・无名氏",
  "body": [
   "姐姐你烦恼除我知，我烦恼除你知。",
   "再休说坐儿不觉立儿饥，常言道海深须见底。",
   "各办着个真心实意，这的是有情谁怕隔年期。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "郊廟歌辭 五郊樂章 黑帝羽音 舒和",
  "author": "唐・魏徵",
  "body": [
   "執籥持羽初終曲，朱干玉鏚始分行。",
   "七德九功咸已暢，明靈降福具穰穰。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "两军师隔江斗智・醋葫芦",
  "author": "元・无名氏",
  "body": [
   "你那里群臣喜共忧？(刘封云)军师们都好好的没甚么忧。",
   "(正旦唱)事情歹共好？(刘封云)我们荆州一个低钱买个大馍馍，这个便是事情。",
   "(正旦唱)则您那云长、翼德敢心焦？(刘封云)俺两个叔叔终日喝酒快据，则不心焦。",
   "(正旦唱)则怕他急煎煎盼着音信杳。",
   "为着个甚些担阁？我怕您无人处将我厮评跋。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "尾声・准备着花烛洞房春，安排下夜月笙歌笑，那时节喜喜欢欢宴乐。地",
  "author": "元・赵彦晖",
  "body": [
   "久天长成配偶，一世儿永远坚牢。",
   "画堂高怕是么暮暮朝朝，则学那连理树、合欢带、比翼鸟。",
   "宝炉香渐烧，银台灯高照，成就了碧桃花下凤鸾交。"

  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "鲠直张千替杀妻・油葫芦",
  "author": "元・无名氏",
  "body": [
   "嫂嫂道坟在溪桥水那边，斟量来不甚远。",
   "恰来到杏花庄景可人怜。",
   "我则见垂杨拂岸黄金线，我则见桃落处胭脂片。",
   "嫂嫂，这路儿更小呵！不去他大路上行，则小路儿上穿。",
   "骑着匹驺骅骝难把莎茵践，正是芳草地杏花天。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "吕洞宾度铁拐李岳・醉扶归",
  "author": "元・岳伯川",
  "body": [
   "你问他在村镇居城郭？(张千云)兀那老子，俺哥哥问你城里住？村里住？(韩魏公云)哥哥，老汉村里也有庄儿，城里也有宅儿。",
   "(张千云)这老头子，硬头硬脑的，正是躲避差徭游食户。",
   "村里寻往城里去。",
   "城里寻往村里去。",
   "你则在这里，我回俺哥哥话去。",
   "(做见正末，云)哥哥，那村老子说：城里也有宅儿，村里也有庄儿。",
   "(正末云)这老子好无礼也，他回我这等话。",
   "张千，你敢问的差了也，你则依着我再问他去。",
   "(唱)你问他当军役纳差徭。",
   "(张千云)兀那老子，俺哥哥着我问你当差是军身？是民户？(韩魏公云)老汉军差也当，民差也当。",
   "因老汉有几文钱，又当站户哩。",
   "(张千云)你军差也当，民差也当，因有钱又当站户？(韩魏公云)是。",
   "(张千云)他是埋头财主。",
   "我回哥哥话去。",
   "(做见正末，云)哥哥，他说军差也当，民差也当，因有钱又当站户哩。",
   "(正末云)噤声！这厮好不干事，跟我这几年了，着这庄家老子使的两头回来走的，你则依着我再问去。",
   "(唱)你问他开铺席为经商可也做甚手作？(张千云)兀那老子，你可开铺席，做经商的，是什么手作？(正末云)张千你再问他。",
   "(唱)你与我审个住处查个名号。",
   "(张千云)他是个庄家老子，只管要问他住处怎的？(正末唱)我多待不的三日五朝，将他那左解的冤仇报。"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {

  "author": "元・郑延玉",
  "body": [

 {

 {

  "body": [

 {

 {

 {

 {

 {

  "author": "元・高文秀",
  "body": [

 {
  "title": "风雨像生货郎旦・转调货郎儿",
  "author": "元・无名氏",
  "body": [
   "也不唱韩元帅偷营劫寨，也不唱汉司马陈言献策，也不唱巫娥云雨楚阳台。",
   "也不唱梁山伯，也不唱祝英台。",
   "(小末云)你可唱甚么那？(副旦唱)只唱那娶小妇的长安李秀才。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "冤报冤赵氏孤儿・醉扶归",
  "author": "元・纪君祥",
  "body": [
   "你为赵氏存遗胤，我于屠贼有何亲？却待要乔做人情遣众军，打一个回风阵。",
   "你义忠我可也又信，你若肯舍残生，我也愿把这头来刎。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "含笑花・暗疾，函谷孟尝归，不下鸿门樊哙急。失家如误了吴元济，点颏",
  "author": "元・周德清",
  "body": [
   "如跳溪刘备。",
   "无梁如火烧曹孟德，撞门如拒水张飞。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "金盏儿・去来兮，莫呆痴，寓形宇内能何已？委心不为去留迷。嘻遑遑将",
  "author": "元・张可久",
  "body": [
   "到底，用怡怡欲潜归。",
   "知帝乡人不到，任富贵愿皆违。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "郑孔目风雪酷寒亭・收尾",
  "author": "元・杨显之",
  "body": [
   "我如今一脱气直走向京都地，一句句向哥哥说知。",
   "有一日郑孔目到来时，不道肯轻轻的素放了你。",
   "(下)。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "商调・梧叶儿怀古",
  "author": "元・宋方壶",
  "body": [
   "黄州地，赤壁矶，衰草接天涯。",
   "周公瑾，曹孟德，果何为？都打入渔樵话里。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "武肅王有旨石橋設齋會進一詩  其二",
  "author": "宋・釋延壽",
  "body": [
   "仙源佛窟有天台，今古嘉名遍九垓。",
   "石磴嵌空神匠出，瀑泉雄壯雨聲來。",
   "景强偏感高僧住，地勝能令遠思開。",
   "一等翹誠依此處，自然靈貺作梯媒。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "余音・毫分不惜蝇头利，十万曾缠鹤背钱，红景乡中姿欢宴。行携素手，",
  "author": "元・沈禧",
  "body": [
   "坐并香肩，似这般美满恩情世间鲜。",
   "咏雪景千山鸟罢飞，四野云同螟。",
   "九天敷上瑞，万国贺升平。",
   "积素堆琼，幻出冰壶镜，妆成白玉京。",
   "那时节拥蓝关马足难行，临蔡地兵威越整。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "唐享昊天樂 第二",
  "author": "唐・則天皇后",
  "body": [
   "瞻紫極，望玄穹。",
   "翹至懇，罄深衷。",
   "聽雖遠，誠必通。",
   "垂厚澤，降雲宮。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "降桑椹蔡顺奉母・鹊踏枝",
  "author": "元・刘唐卿",
  "body": [
   "富家郎逞英豪，显奢骄，他每便语话言谈，气势偏高。",
   "腆着脯向人前气傲，他把这贫民每当作儿曹。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "李素兰风月玉壶春・红绣鞋",
  "author": "元・贾仲明",
  "body": [
   "若瞒过那老虔婆赚离了门外，便是将俺那望夫石唤下山来，哎，你一个忒聪明肯做美的姨姨，你白裁划。",
   "你道他风流刚二八，我俊雅未头门，姨姨则道波。",
   "我则怕兀那青春不再来。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "圣药王・醉似泥，仆从随，见小桥流水隔花溪。柳岸西，近古堤，数枝红",
  "author": "元・王伯成",
  "body": [
   "杏出疏篱，墙外舞青旗。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "马丹阳度脱刘行首・混江龙",
  "author": "元・杨景贤",
  "body": [
   "神仙有分，披毡化我出凡尘。",
   "脱离了火院，大走入玄门。",
   "七朵金莲浮水面，一双银海照乾坤。",
   "奉吾师法旨，我可便普天下都寻尽。",
   "(带云)寻谁来？(唱)寻俺那丘、刘、谈、马，大古里六个真人。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "挂打沽・浅浅江梅驿使传，乱剪碎鹅毛片。旋剖温橙列着玳筵，玉液着金",
  "author": "元・关汉卿",
  "body": [
   "瓶旋。",
   "酒晕红，新妆面，人道是穷冬，我道是虚言。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "宋太祖龙虎风云会・倘秀才",
  "author": "元・罗贯中",
  "body": [
   "则见他铁桶般重门掩上，我将这铜兽面双环扣响。",
   "(做敲门科，张千问云)甚么人敲门？(正末唱)敲门的是万岁山前赵大郎。",
   "(张千云)这早晚夜又深，雪又大，来作甚么？(正末唱)堂中无客伴，(张千云)俺老爹看书哩。",
   "(正末唱)灯下看文章，(张千云)你来有甚事？(正末唱)特来听讲。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "鲠直张千替杀妻・得胜令",
  "author": "元・无名氏",
  "body": [
   "我死呵记相识，你从今好将息。",
   "与我干取些穷活计，休惹人闲是非。",
   "你非。",
   "你再休贪杯，见放着傍州例。",
   "你若求妻，(云)常言道丑妇家中宝，休贪他人才精精细细，伶伶俐俐，能言快语，不中。",
   "(外云了)娶一个端方稳重的。"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {
  "title": "郑月莲秋夜云窗梦・元和令",
  "author": "元・无名氏",
  "body": [
   "洞房春口内言，阳关路眼前现。",
   "赛潘安容貌可人怜，俺秀才腹中诗欺谪仙。",
   "一春常费买花钱，我怎肯不辨个愚共贤。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "杨氏女杀狗劝夫・牧羊关",
  "author": "元・萧德祥",
  "body": [
   "恰便似醉汉当街上睡，死狗儿般门外停。",
   "(云)嫂嫂，则怕天明了，待我背他出去。",
   "(做背科，唱)我背则背手似捞铃，怎么的口边头拔了七八根家狗毛，脸儿上拿了三四个狗毛。",
   "这厮死时节定触犯了刀砧杀，醉时节敢透入在喂猪坑。",
   "既不沙怎闻不的十分臭，当不的他一阵腥。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "黑旋风双献功・夜行船",
  "author": "元・高文秀",
  "body": [
   "俺家里要打水浇畦，（带云）打罢那水，浇罢那畦，俺娘道：\"果厮，你还不往田里去。",
   "\"（唱）我又索与他压耙扶犁。",
   "（牢子云）好也，他把我当耕牛使用。",
   "（正末唱）我家里还待要打柴刈苇，织履编席，倒杼翻机。",
   "俺做庄家忒老实，俺可也不谎诈不虚脾。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "賜棃李泌與諸王聯句",
  "author": "唐・肅宗皇帝",
  "body": [
   "先生年幾許，顏色似童兒。",
   "夜抱九仙骨，朝披一品衣。",
   "不食千鍾粟，唯餐兩顆棃。",
   "天生此間氣，助我化無爲。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "梁州・七窍达八荒广漠，一帘隔万里空虚。谁不知方寸地无多物。玄参黄",
  "author": "元・汤舜民",
  "body": [
   "老，易论程朱。",
   "诗敲险怪，棋较赢输。",
   "不闻满耳喧呼，只宜竟日跏趺。",
   "恰枕肱悠悠梦绕华胥，不动脚默默神游洛浦，才合眼飘飘身在蓬壶。",
   "本无，间阻。",
   "山林城市俱同路，解到此中趣。",
   "便觉吾生百虑疏，遐迩何如。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "・佳人才子游船上，醉醺醺笑饮琼浆。归棹晚，湖光荡，一钩新月，十里芰荷香。秋",
  "author": "元・贯云石",
  "body": [
   "幺芙蓉映水菊花黄，满目秋光。",
   "枯荷叶底鹭鸶藏，金风荡，飘动桂枝香。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "上小楼・寝食处珠围翠绕，行踏处白牙高纛。荫子封妻，五花官诰。若一",
  "author": "元・邓玉宾",
  "body": [
   "朝，犯制条，凶星来照，一霎儿早不知消耗。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "尾・绿阴繁渐渐春风老，玉壶暖迟迟夜月高，九十日光阴能有几日笑。朱",
  "author": "元・无名氏",
  "body": [
   "帘下着，低垂绣幄，休放那搅春梦呢喃燕来了。",
   "夏景池塘睡锦鸳，楼阁飞双燕。",
   "红榴招戏蝶，绿柳噪新蝉。",
   "葵火阶前，竹笋侵墙串，泉流草径边。",
   "绿茸茸蓑展青毡，密匝匝苔铺翠藓。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "滴溜子",
  "author": "元・施惠《幽闺记》",
  "body": [
   "(外)我有一个道理：明日里，明日里，小设酒筵；媒婆去，媒婆去，传语状元，既然他心中不愿，如何强逼他谐缱绻。",
   "(老旦)既如此，你请他来怎么？(外)请来饮酒之间呵，先教他妹子在堂前，隔帘认看。",
   "(老旦)此计甚好。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "圣药王・想着我星月底，言海誓，尽今生一世效于飞。我如今废寝忘餐染",
  "author": "元・无名氏",
  "body": [
   "病疾，上看山不见故人回，险化做望夫石。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "哭岐婆",
  "author": "元・高明《蔡伯喈琵琶记》",
  "body": [
   "洛阳富贵，花如锦绮。",
   "红楼数里，无非娇媚。",
   "春风得意马蹄疾，天街赏遍方归去。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "调笑令・我恰待睡些，不宁贴，熏金炉引梦赊。破题儿告一纸相思赦，楚",
  "author": "元・无名氏",
  "body": [
   "巫娥不顺关截。",
   "恰相逢陡恁般厮间别，望阳关永远山叠。"
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "尉迟恭三夺槊・王宫/端正好",
  "author": "元・尚仲贤",
  "body": [
   "如今罢了干戈，绝了征战，扶持俺这唐世界文武官员。",
   "那回是真个今番演，赵显得俺经熬炼。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "双调・湘妃曲赠钟继先",
  "author": "元・邵元长",
  "body": [
   "高山流水少人知，几拟黄金铸子期。",
   "继先贤既解其中意，恨相逢何太迟，示佳编古怪新奇。",
   "想达士无他事，录名公半是鬼，叹人生不死何归？。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "萧淑兰情寄菩萨蛮・尾声",
  "author": "元・贾仲明",
  "body": [
   "锦片前程今美满，舞菱花一对青鸾，早不入凤台闲玉管。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "驻马听・小小亭轩，燕子来时帘未卷。深庭小院，杜鹃啼处月空圆。金钗",
  "author": "元・程景初",
  "body": [
   "拨尽玉炉烟，香尘渍满琵琶面。",
   "谁共言？何时枕匾黄金钏？。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "两军师隔江斗智・尧民歌",
  "author": "元・无名氏",
  "body": [
   "呀，我见他曲躬躬双手捧金杯，喜孜孜一团儿和气蔼庭闱。",
   "不由我不立钦钦奉命谨依随，拚的个醉醺醺满饮不辞推。",
   "我今日须也波知周瑜你好没见识，怎不的观时势。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "降桑椹蔡顺奉母・清江引",
  "author": "元・刘唐卿",
  "body": [
   "这雪白来白似白厮赖，(云)这雪若还下在席子上，(唱)恰便似一床白绫被。",
   "铺在热炕上，盖着和衣儿睡，醒来时化了一身水。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "包待制智斩鲁斋郎・幺篇",
  "author": "元・关汉卿",
  "body": [
   "我一时间不认的人，你两个忒做的出！空教我乞留乞良、迷留没乱、放声啼哭。",
   "这郑孔目拿定了萧娥胡做，知他那里去了赛娘、僧住？（云）罢、罢、罢！浑家被鲁斋郎夺将去了，一双儿女又不知所向。",
   "甫能得了个女人，又是银匠李四的浑家，我在这里怎生存坐？舅子，我将家缘家计，都分付与你两口儿；每月斋粮道服，休少了我的。",
   "我往华山出家去也！（李四云）姐夫，你怎生弃舍了铜斗儿家缘、桑麻地土？我扯住你的衣服，至死不放你去。",
   "（正末唱）。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "四丞相高会丽春堂・秃厮儿",
  "author": "元・王实甫",
  "body": [
   "可人意清歌妙舞，酬吾志美酒鲜鱼。",
   "则这春风一枝花解语，似出塞美人图，可便妆梳。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "张君瑞闹道场(第一本)・双调/新水令",
  "author": "元・王实甫",
  "body": [
   "梵王宫殿月轮高，碧琉璃瑞烟笼罩。",
   "香烟云盖结，讽咒海波潮。",
   "幡影飘遥，诸檀越尽来到。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "仙吕・赏花时送友人入全真道院",
  "author": "元・汤舜民",
  "body": [
   "世路崎岖鸟道分，人海苍茫鲸浪奔。",
   "喧马足闹车尘，麻姑笑哂，落日又黄昏。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "驻马听・聒煞我也当当丁丁，恰便似再出世陈抟睡不成。度一宵如同百岁，",
  "author": "元・蒲察善长",
  "body": [
   "捱一朝胜似三春。",
   "金炉香烬酒初醒，孤眠那怕心肠硬。",
   "闲愁可惯经？惟有相思最是难熬的症。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "相国寺公孙合汗衫・越调/斗鹌鹑",
  "author": "元・张国宾",
  "body": [
   "气的来有眼如盲、有口似哑。",
   "您两个绿鬓朱颜，也合问您这苍髯皓发。",
   "不争你背母抛爹，直闪的我形孤也那景寡。",
   "婆婆，他可便那里怕人笑，怕人骂，只待要急煎煎挟橐携囊，稳拍拍乘舟骗马。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "歌儿",
  "author": "元・刘唐卿《白兔记》",
  "body": [
   "我在沙陀村受狼狈也是没极奈何。",
   "为父的日间在马鸣王庙中栖身。",
   "感李太公领归我，他把嫡亲儿招我为夫妇。",
   "两老双双都亡过。",
   "被大舅争强，把我鸾凰都耽误。",
   "儿既来问我。",
   "华堂享富贵的是你继母，那村僻妇人是你亲母。",
   "剖剖心肠，磨房中生下你儿-个。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "西华山陈抟高卧・滚绣球",
  "author": "元・马致远",
  "body": [
   "俺便是那闲云自在飞，心情与世违。",
   "可又不贪名利，怎生来教天子闻知？是未发迹，卦铺里，那时节相识，曾算是他南面登基。",
   "(使臣上，云)陈先生恭喜，官里赐来衣冠道号，望阙谢恩。",
   "(正末拜谢科，唱)因此上将龙庭御宝皇宣诏，赐与我鹤氅金冠碧玉圭，道号希夷。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "正宫・小梁州春夜",
  "author": "元・张可久",
  "body": [
   "玉箫吹断凤钗分，瘦损真真。",
   "小词空制锦回文，孤眠恨，翠被宝香温。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "醋葫芦・诗吟出锦绣文，字装成古样体。家冠济楚俊容仪，酒席间唱和音",
  "author": "元・谷子敬",
  "body": [
   "韵美。",
   "一团儿和气，论聪明俊俏有谁及？。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "定风波令・定风波",
  "author": "宋・张先",
  "body": [
   "碧玉篦扶坠髻云。",
   "莺黄衫子退红裙。",
   "妆样巧将花草竞。",
   "相并。",
   "要教人意胜於春。",
   "酒眼茸茸香拂面。",
   "□见。",
   "丹青宁似镜中真。",
   "自是有情偏小小。",
   "向道。",
   "江东谁信更无人。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "尾・据坚平明正清，非为俺自专。若回光返照仁人面，廉洁分明自然显。思乡",
  "author": "元・曾瑞",
  "body": [
   "辇毂下人生有幸，乐太平歌舞同欢庆。",
   "金绮陌玉娉婷，间笙簧歌转流莺。",
   "斗驰骋，粉浓兰麝，肌莹琼酥，花解语娇相并。",
   "旦暮花魔酒病，诗酬酢好句，词赓和新声。",
   "樱唇月下品玉箫，春笋花前按银筝。",
   "正宴乐皇都，忽忆吴山，顿思越景。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "李素兰风月玉壶春・四块玉",
  "author": "元・贾仲明",
  "body": [
   "这壶画的来玉润温，这兰画的来香飘荡。",
   "看了这玉软香娇不寻常，则这个玉生香花解语风流像。",
   "端的可便堪画图，画图来堪咏题，咏题来堪玩赏。"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {
  "title": "苏子瞻风雪贬黄州・川拨棹",
  "author": "元・费唐臣",
  "body": [
   "这世里欠田文，都是些吃敲的石季伦。",
   "屋也似金银，山也似珠珍。",
   "有一千个为富不仁，傲贫人谄富人。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "同劉晃喜雨",
  "author": "唐・明皇帝",
  "body": [
   "節變寒初盡，時和氣已春。",
   "繁雲先合寸，膏雨自依旬。",
   "颯颯飛平野，霏霏靜暗塵。",
   "懸知花葉意，朝夕望中新。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "南吕・一枝花为玉叶儿作",
  "author": "元・亢文苑",
  "body": [
   "名高唐国盘，色压陈亭榭。",
   "霞光侵赵璧，瑞霭赛隋珠。",
   "无半点儿尘俗，不比寻常物，世间总不如。",
   "莫夸谈天上飞琼，休卖弄人间美玉。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "九煞・朝天宫道友多，天界寺僧众广，天禧寺古塔霞光放。三山香火年年",
  "author": "元・胡用和",
  "body": [
   "盛，十庙英灵世世昌，宝宁寺一境多幽况，鸡鸣山烟笼佛寺，神乐观云拥仙乡。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "驻马听・林外萧条，一夜霜侵红叶老。庭前寂寥，几番风撼的碧梧雕。病",
  "author": "元・汤舜民",
  "body": [
   "儿多偏觉被儿薄。",
   "影儿孤最怕灯儿照。",
   "睡不着，淅零零暮雨窗前哨。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "施仁义刘弘嫁婢・耍孩儿",
  "author": "元・无名氏",
  "body": [
   "即来托我为交契，我不曾见伊家面皮。",
   "你和咱素日不相识，知道也那临危向妻子行留遗。",
   "(云)你和我做兄弟。",
   "(唱)凭着这半张白纸为交友，隔着这千里关山厮认义。",
   "我明知你是容妻子安身计，他知我恤孤念寡，救困扶危。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "北清江引",
  "author": "元・徐田臣《杀狗记》",
  "body": [
   "(净)将狗儿扯将来忙杀取，看起垂珠泪，怎的割舍得？愿你超生去，院君你自作区处。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "桃花女破法嫁周公・正宫/端正好",
  "author": "元・王晔",
  "body": [
   "则为这镜儿昏，我可也难梳裹，就东庄头巧匠明磨。",
   "去时节大斋时，急回来可早日头儿末，不知俺家中有甚的人焦聒。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "翠红乡儿女两团圆・梧叶儿",
  "author": "元・高茂卿",
  "body": [
   "我听说罢着我醒如醉。",
   "可便唬的我来心似呆，(云)哥，你不知道王兽医是个不良的人？他问你父亲借具牛。",
   "你父亲不曾借与他，他记这些冤仇，阻隔您这父子的情也。",
   "(唱)我急慌里着些闲散活儿遮。",
   "(带云)王兽医，哎，(唱)他是个不睹事的乔男女，你便横枝儿待犯些口舌，那厮敢平地下锹撅，(带云)哎，哥也，则你休听他这酒魔的汉呵，(唱)一谜里便胡诌乱说。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "张孔目智勘魔合罗・后庭花",
  "author": "元・孟汉卿",
  "body": [
   "俺家里有一遭新板闼住两间高瓦屋。",
   "隔壁儿是个熟食店，对门儿是个生药局。",
   "怕老的若有不是处你则问那里是李德昌家绒线铺，街坊每他都道与。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "钱大尹智勘绯衣梦・青哥儿",
  "author": "元・关汉卿",
  "body": [
   "庆安也，我和你难凭、难凭鱼雁，我每日家枕冷、枕冷衾寒，则俺这夙世姻缘休等闲！（李庆安云）则是万望小姐怜悯小生也。",
   "（正旦云）庆安，我今夜晚间收拾一包袱金珠财宝，着梅香送与你，倒换过来做你的财礼钱，你可来娶我，你意下如何？（李庆安云）恁的呵，多谢姐姐！我到多早晚来？（正旦唱）你等到的夜静更阑，柳影花间。",
   "（李庆安云）我知道了也。",
   "姐姐，我回去也。",
   "（正旦云）你且回来。",
   "（唱）我则怕\"别时容易见时难\"，庆安，你则将这佳期盼。"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {
  "title": "萧何月夜追韩信・仙吕/点绛唇",
  "author": "元・金仁杰",
  "body": [
   "想着我独步才超，性与天道，凌云浩。",
   "世事皆浊，则我这美玉谁雕琢？。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "张公艺九世同居・骂玉郎",
  "author": "元・无名氏",
  "body": [
   "声名不落他人后，心已遂更何求。",
   "人情世事皆虚谬，想如今故友稀，叹鬓边白发新，喜榻上青毡旧。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "奉和御製麟德殿宴百僚應制",
  "author": "唐・尚宮宋氏若昭",
  "body": [
   "垂衣臨八極，肅穆四門通。",
   "自是無爲化，非關輔弼功。",
   "修文招隱伏，尚武殄妖兇。",
   "德炳韶光熾，恩霑雨露濃。",
   "衣冠陪御宴，禮樂盛朝宗。",
   "萬壽稱觴舉，千年信一同。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "啭林萦",
  "author": "元・高明《蔡伯喈琵琶记》",
  "body": [
   "荒年万般遭坎坷，丈夫又在京华。",
   "糟糠暗吃担饥饿，公婆死卖头发去埋他。",
   "把孤坟自造，土泥尽是我罗裙包裹。",
   "也非夸，手指伤。",
   "血痕尚在衣罗。",
   "(贴唱)。"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {
  "title": "苏子瞻醉写赤壁赋・那吒令",
  "author": "元・无名氏",
  "body": [
   "我这里自想，东坡的伎俩，怎比那东山气象，怎做的东床伴当。",
   "主人宽东阁开，直吃的曙色晓东方亮，论甚么日照东窗。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "冻苏秦衣锦还乡・喜江南",
  "author": "元・无名氏",
  "body": [
   "呀，莫不我驴生笄角瓮生根，你觑波莫不我穷断脊梁筋，苏秦只是旧苏秦。",
   "今日个证本，想皇天也不负读书人！。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "看钱奴买冤家债主・金菊香",
  "author": "元・郑延玉",
  "body": [
   "这的是雕梁画栋圣祠堂，又不是锦帐罗帏你的卧房，怎这般厮推厮抢赶我在半壁厢？(兴儿云)你这老弟子孩儿，口里唠唠叨叨的，还说甚么哩？(正末唱)你、你、你，全不顾我这鬓雪鬟霜，(云)你这厮还要打谁？婆婆，你向前着，我不信。",
   "(唱)你可敢便打、打、打这个八十岁病婆娘？。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "琐窗郎",
  "author": "元・高明《蔡伯喈琵琶记》",
  "body": [
   "吾家一女娉婷，不曾许与公卿。",
   "昨承帝旨，选他书生。",
   "媒婆，你对他说：不须用白壁、黄金为聘。",
   "(合)若是姻缘前世已曾定，今日里，共欢庆。",
   "(丑唱)。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "金陵覽古 直瀆",
  "author": "宋・朱存",
  "body": [
   "晝役人功夜鬼功，陽開陰闔幾時終。",
   "不聞擲土江中語，爭得盈流一水通。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "死生交范张鸡黍・采茶歌",
  "author": "元・宫天挺",
  "body": [
   "我恰待向前些，他把我紧拦截，(张元伯遮面云)哥哥靠后些。",
   "(正末唱)只见他折回衫油把面皮遮。",
   "(张元伯云)哥哥，你岂知我心中烦恼。",
   "(正末云)兄弟，(唱)既然道有事关心能哽咽，怎这般无言低首谩伤嗟。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "南吕・玉娇枝过四块玉",
  "author": "元・无名氏",
  "body": [
   "休争闲气，都只是南柯梦里。",
   "想功名到底成何济？总虚华几人知！百般乖不如一就痴，十分醒争似三分醉。",
   "则这的是人生落得，不受用图个甚的！赤紧的乌紧飞，兔紧追，看看的老来催。",
   "人无百岁人，枉作千年计。",
   "将眉间闷锁开，休把心上愁绳系，则这的是延年益寿的理。"

  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "李云英风送梧桐叶・上小楼",
  "author": "元・李唐宾",
  "body": [
   "这彩偻百尺其高，势压着南山北岳。",
   "六曲阑干，四面帘栊，一片旌旄。",
   "彩扇交，锦帐飘，余珠错落，盼望他娇滴滴袅香风玉人来到。",
   "(小旦云)姐姐。",
   "你扶我上彩楼去来。",
   "(做上楼科)(正旦唱)。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "花滚",
  "author": "元・刘唐卿《白兔记》",
  "body": [
   "(外)然起道德香，然起道德香，超三界炉烟细。",
   "嵬阁楼殿，通情旨，弟子家住沙陀村里。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "尾声・闷恹恹好似如年夜，常记的相思那些。题起那眉尖恨恰舒开，心儿",
  "author": "元・无名氏",
  "body": [
   "疼又到也。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "花间四友东坡梦・天下乐",
  "author": "元・吴昌龄",
  "body": [

   "(正末唱)似这般荒僻的山门，(东坡云)好个古刹寺院。",
   "(正末唱)你可也莫要哂。",
   "(东坡云)这是伽蓝堂怎生不打供？(正末唱)俺这里伽蓝堂静悄悄隔着世尘。",
   "(东坡云)天阴雨，有些疏漏么？(正末唱)便淋漓污了衣，颠倒可便里裹了巾。",
   "(带云)学士大人，(唱)俺这里怕甚么骑驴冲大尹。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "梁州・看鞍马上诸公衮衮，听刀戈下众口嗷嗷。因此上五云迷却长安道。",
  "author": "元・汤舜民",
  "body": [
   "曳裾休叹，投笔空焦；题桥谩逞，击楫徒劳。",
   "直钩儿怎钓鲸鳌，闷弓儿难谢鹏雕。",
   "喜的是砚池内通流着千丈沧溟，诗卷里包藏着九重宣诏，书楼上接连着万里云霄。",
   "虽道是浅识，寡学。",
   "这几篇齐鲁论也不下于黄公略，捻吟髭自含笑。",
   "矫首中天日正高，豪气飘飘。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "破幽梦孤雁汉宫秋・幺篇",
  "author": "元・马致远",
  "body": [
   "伤感似替昭君思汉主，哀怨似作薤露哭田横，凄怆似和半夜梦歌声，悲切似唱三叠阳关令。",
   "(雁叫科)(云)则被那泼毛团叫的凄楚人也。",
   "(唱)。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "鲁大夫秋胡戏妻・满庭芳",
  "author": "元・石君宝",
  "body": [
   "我慌还一个庄家万福。",
   "(秋胡云)不敢，小娘子。",
   "(正旦唱)他不是闲游的浪子，多敢是一个取应的名儒。",
   "我见他便躬着身，插着手，陪言语。",
   "你既读那孔圣之书，(秋胡云)小娘子，有凉浆儿，觅些与小生吃波。",
   "(正旦唱)我是个采桑养蚕妇女，休猜做锄田送饭村姑。",
   "(秋胡云)这里也无人，小娘子，你近前来，我与你做个女婿，怕做甚么？(正旦怒科，唱)他酩子里丢抹娘一句，怎人模人样，做出这等不君子，待何如？。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "赚尾・为他娇，因他俊，迤逗的俺行痴立盹。便得后冤家行频觑付，偷工",
  "author": "元・无名氏",
  "body": [
   "夫短命行温存。",
   "是费了些精神，一夜欢娱正了本。",
   "他于咱意亲，俺于他心顺，不由人终日脚儿勤。",
   "芳菲过眼，向玉砌雕阑，翠落红翻。",
   "都来一段，新愁旧恨相烦。",
   "帘垂永日人乍别，门掩东风花又残。",
   "无语问春归，天上人间。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "郊廟歌辭 武后大享拜洛樂章 九和",
  "author": "唐・不詳",
  "body": [
   "祗荷坤德，欽若乾靈。",
   "慙惕罔寘，興居匪寧。",
   "恭崇禮則，肅奉儀形。",
   "惟憑展敬，敢薦非馨。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "功臣宴敬德不伏老・天下乐",
  "author": "元・杨梓",
  "body": [
   "叔宝老将军，你便是活佛也，教咱怎生忍？老将军你便休也不嗔，非是我情性狠。",
   "量这个泼无徒怎敢来小觑人。",
   "我割舍得发一会儿村，使一会儿狠。",
   "道宗。",
   "你有何功劳，敢坐上首，簪我的花，饮我的酒？(李)尉迟恭，你有甚么来要打我？(尉)我不打你这泼无徒教咱怎的忍？。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "水底鱼",
  "author": "元・施惠《幽闺记》",
  "body": [
   "(小生、外、末扮番军上)白草黄沙，毡房为住家。",
   "胡儿胡女惯能骑战马。",
   "因贪财宝到中华，闲戏耍，被他拿住，铁里温都哈喇。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "玉箫女两世姻缘・梧叶儿",
  "author": "元・乔吉",
  "body": [
   "火燎也似身躯热，锥剜也似额角疼，即渐里瘦子身形。",
   "这几日茶饭上不待吃，睡卧又不甚宁。",
   "(卜儿云)我请医者看看你这脉息，知他是甚么症候。",
   "(正旦唱)若将这脉来凭，多管是废寝忘餐病症。",
   "(卜儿云)梅香，好生伏事您姐姐，我下边看些汤药来。",
   "(虚下)(梅香云)姐姐，你怎么这等想俺姐夫？(正旦云)我实瞒不的你，据着他那人物才学，如何教我不想也！(唱)。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "宋上皇御断金凤钗・金盏儿",
  "author": "元・郑延玉",
  "body": [
   "你道你典了满身衣，我搅了一身亏，想我那虚名枉上登科记。",
   "(云)小二哥，你好乔，听的得了官，就买酒相贺；听的剥落了官职，就索要房钱。",
   "(唱)你却便攀高接贵，教我笑，店都知。",
   "我得官也，相庆相贺，剥落了也，不追随！正是世情看冷暖，人面逐高低。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "尾・我元阳寿未终，死得真个屈苦。告你个阎罗王正直无私曲，诉不尽平",
  "author": "元・姚守中",
  "body": [
   "生受过苦。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "荷叶鱼儿",
  "author": "元・柯丹邱《荆钗记》",
  "body": [
   "［外上］春雨新收，喜见山明水秀，万花深处有鸣鸠，软红泥踏青时候。",
   "试蹑青鞋，慢拖斑竹，去寻良友。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "小尉迟将斗将认父归朝・沽美酒",
  "author": "元・无名氏",
  "body": [
   "我兴心的报主恩，竭力的扫胡尘。",
   "常言道上阵无过子父军，只待一鞭儿把番兵杀尽，扶宇宙定乾坤。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "四丞相高会丽春堂・收尾",
  "author": "元・王实甫",
  "body": [
   "则我这好山好水难将去，待写入丹青画图。",
   "白日里对酒赏无休，到晚来挑灯看不足。",
   "(下)(孤云)不想天朝使命来，还取的四丞相往京师去了。",
   "琼英，(旦儿云)有。",
   "(孤云)我与你将酒肴整备，再到十里长亭，与丞相送行，走一遭去。",
   "(诗云)香山设宴逞粗豪，久矣闲居更入朝。",
   "不知此去成功后，李圭头上可能饶。",
   "(下)。"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {
  "title": "李云英风送梧桐叶・普天乐",
  "author": "元・李唐宾",
  "body": [
   "玉娉婷，新梳掠，曲弯弯柳眉青浅，香馥馥桃脸红娇。",
   "腰肢一捻轻，举止十分俏，便似画真儿描不成如花貌。",
   "有三般儿比并妖娆，(卜儿云)是那三般儿？(正旦唱)若耶溪西施戏瓢，九龙池玉环斗草，凤凰台秦女吹箫。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "宋太祖龙虎风云会・哭皇天",
  "author": "元・罗贯中",
  "body": [
   "把好梦来惊觉，听军中不定交。",
   "那里也兵严刑法重，则末早人怨语声高。",
   "(众军一拥向前齐呼万岁)(正末唱)险将咱唬倒，庙廊召会，台省所关；君王振怒，太后生嗔。",
   "不剌则俺这歹名儿怎地了？惊急列心如刀锯，颤笃速身如火燎。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "幺・说破真如妙理，唯恐露玄机。春夏秋冬，披星带月守寒溪。一点残星",
  "author": "元・吕侍中",
  "body": [
   "照水，上下接光辉。",
   "素波如练，东流不住，锦鳞不遇又空回。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "薛仁贵荣归故里・双调/新水令",
  "author": "元・张国宾",
  "body": [
   "我为你个养家儿哭的眼睛花，哎！则从你去家来我可便放心不下。",
   "儿也，你若不是多时归地府，怎十载滞天涯？甚的是出入通达，好教我这烦恼甚时罢。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "贈顔詡",
  "author": "宋・孟賓于",
  "body": [
   "園林蕭爽聞來久，欲訪因循二十秋。",
   "此日開襟吟不盡，碧山重疊水長流。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "双调・夜行船送景贤回武林",
  "author": "元・汤舜民",
  "body": [
   "花柳乡中自在仙，惹春风两袖翩翩。",
   "酒社诗坛，舞台歌榭，百年里几番相见。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "白华",
  "author": "詩經",
  "body": [
   "白华菅兮，白茅束兮。之子之远，俾我独兮。",
   "",
   "英英白云，露彼菅茅。天步艰难，之子不犹。",
   "",
   "滮池北流，浸彼稻田。啸歌伤怀，念彼硕人。",
   "",
   "樵彼桑薪，卬烘于煁。维彼硕人，实劳我心。",
   "",
   "鼓钟于宫，声闻于外。念子懆懆，视我迈迈。",
   "",
   "有鹙在梁，有鹤在林。维彼硕人，实劳我心。",
   "",
   "鸳鸯在梁，戢其左翼。之子无良，二三其德。",
   "",
   "有扁斯石，履之卑兮。之子之远，俾我疧兮。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "龙济山野猿听经・村里迓鼓",
  "author": "元・无名氏",
  "body": [
   "我子见碧霄、碧霄云控，绿岩、绿岩畔风动。",
   "有他那苍松古柏，见一派寒泉出迸。",
   "你看那桃花喷火，杨柳拖烟，依稀庵洞。",
   "更有那鹳鸟呜，芝兰秀，桂柏荣，呀，妆点的清幽寺拥。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "金水桥陈琳抱妆盒・太平令",
  "author": "元・无名氏",
  "body": [
   "非是我挑茶斡刺，则问你李美人生下的孩儿，要说个丁一卯二，不许你差三错四。",
   "你则说淹死太子、这个口词，休连累陈琳两字。",
   "(刘皇后云)陈琳，你怎的这般打？敢怕他指攀你来那？(正末唱)。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "謝文靜墓下作",
  "author": "宋・徐鉉",
  "body": [
   "越徼稽天討，周京亂虜塵。",
   "蒼生何可奈，江表更無人。",
   "豈憚尋荒壟，猶思認後身。",
   "春風白楊裏，獨步淚霑巾。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "昊天塔孟良盗骨・天下乐",
  "author": "元・朱凯",
  "body": [
   "哎！你说甚么胜败兵家本不穷，则这兵也波书，我可索是通。",
   "(带云)俺家姓杨，被番兵陷在虎口交牙峪里，这个叫做羊落虎口，正犯了兵家所忌，怎还有活的人也？(唱)奈贼臣把俺来着了羊投虎口嘶断送，方信道将在谋，不在勇，兀的不横亡了俺这姜太公。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "驻马听・日月如飞，急急光阴如逝水；去年今日，看看故友眼前稀。想藏",
  "author": "元・范康",
  "body": [
   "阄打马都成非，思包商吟咏成何济，何所宜，都不如保全一点元阳气。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "梁州・流水绕一村桑柘，乱山围四壁烟岚。颠峰倒影澄波蘸。遥岑叠翠，",
  "author": "元・无名氏",
  "body": [
   "远水揉蓝。",
   "鸢飞鹭落，鱼跃深潭。",
   "偃怡场水府山岩，安乐窝土洞石龛。",
   "景不嫌物少人稀，食不厌茶浑酒淡，家不离水北山南。",
   "有何，不堪？篮舆到水轻舟泛，稼穑外得时暂。",
   "闲饮渔樵酒半酣，阔论高谈。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "醉太平・看别人挥鞭登剑阁，举棹泛沧波，争如我得磨跎处且磨跎。无名",
  "author": "元・曾瑞",
  "body": [
   "缰利锁，携壶策杖穿林落，临风对月闲吟课。",
   "有花有酒且高歌，居村落快活。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "看钱奴买冤家债主・仙吕/赏花时",
  "author": "元・郑延玉",
  "body": [
   "积善存仁为第一，暗室亏心天地和。",
   "则俺这家豪富是祖先积，只为他施仁布德，也则要博一个孝子和贤妻。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "阀阅舞射柳蕤丸记・得胜令",
  "author": "元・无名氏",
  "body": [
   "呀，我在这鞍上整彪躯，手内月弯弧。",
   "远步马通先路，则他那双蹄口内吐。",
   "俺则辨个赢输，取胜如神助。",
   "(做射柳中科，云)射中了也。",
   "(唱)柳中这金镞，(云)监军，(唱)我和你敢再赌。",
   "(范仲淹云)延寿马射中了柳也。",
   "葛监军，你众官可打球门去。",
   "(葛监军云)这个可也不大紧，头里不干我事，是我这马眼叉把来走过去了。",
   "这打球门，我从小里可弄的熟。",
   "等我先打。",
   "(众做打球门科)(葛监军做打科，云)过去。",
   "(做打不中科)(范仲淹云)葛监军又打不中也。",
   "延寿马将军，你打球门去。",
   "(正末云)理会的。",
   "左右收了弓箭者。",
   "(正末做打球门科)(唱)。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "紫花儿序・香馥馥花开满路，碧粼粼水绕孤村，绿茸茸芳草烟迷。扬鞭指",
  "author": "元・王伯成",
  "body": [
   "处，堪画堪题。",
   "更那堪，竹坞人家傍不溪。",
   "彩绳高系，春色飘零，花事狼藉。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "酹江月",
  "author": "元・高明《蔡伯喈琵琶记》",
  "body": [
   "玉楼绛气，卷霞绡云浪寒光澄澈。",
   "丹桂飘香清思爽，人在瑶台银阙。",
   "(生)影透空帏，光窥罗帐，露冷蛩声切。",
   "关山今夜，照人几处离别。",
   "(净)须信离合悲欢，还如玉兔，有阴晴圆缺。",
   "便做人生长宴会，几见冰轮皎洁？(丑)此夜明多，隔生期远，莫放金樽歇。",
   "(合)但愿人长久，年年同赏明月。",
   "(贴唱)。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "破苻坚蒋神灵应・混江龙",
  "author": "元・李文蔚",
  "body": [
   "万民仰望，中兴光武出南阳。",
   "衣冠济楚，人物轩昂。",
   "道统相承尊礼义，彝伦正体叙纲常。",
   "因此上繁华美丽，盛成风光，卿云秀气，瑞霭祯祥。",
   "他正是乐雍熙宁宇宙大朝臣，端的是贺升平安社稷边庭将，那其间息平戈戟，不动刀枪。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "四丞相高会丽春堂・一锭银",
  "author": "元・王实甫",
  "body": [
   "玉管轻吹引凤凰，余韵尚悠扬。",
   "他将那〔阿那忽〕腔儿合唱，越感起我悲伤。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "搅筝琶・君休欠，何故苦厌厌。月满还亏，杯盈自滟，荣贵路景稠粘。沾",
  "author": "元・曾瑞",
  "body": [
   "惹情タ，把穿。",
   "绝业贯休再添，徒尔趋炎。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "正宫・小梁州春游晚归",
  "author": "元・张可久",
  "body": [
   "玉壶春水浸晴霞，景物奢华。",
   "彩船歌管间琵琶，青旗挂，沽酒是谁家？。"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {
  "title": "尾声・赏心乐事休教欠，饮兴吟怀似要添，醉倒樽前任君僭。将咱指点，",
  "author": "元・张可久",
  "body": [
   "便嫌，胜似你红尘路儿险。",
   "冬景青山失翠微，白玉无瑕玷。",
   "梨花和雨舞，柳絮带风ㄎ。",
   "拨粉堆盐，祥瑞天无欠，丰年气象添。",
   "乱飘湿僧舍茶烟，密洒透歌楼酒帘。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "采茶歌・望长安，盼雕鞍，夕阳花草树遮山。叠翠堆岚凝望眼，则我这薄",
  "author": "元・贯云石",
  "body": [
   "情何处走云山？。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "晋文公火烧介子推・煞尾",
  "author": "元・狄君厚",
  "body": [
   "太子呵，你若是报不得母、雪不得兄，你便空破了国。",
   "我若是借不得母、埋不得儿，我便是白丧了家。",
   "你若是雪不得冤、报不得恨，则恁地空干罢！太子呵，你便是治不得国，我便是齐不得家，吡，枉教人唾骂杀。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "包待制三勘蝴蝶梦・挂玉钩",
  "author": "元・关汉卿",
  "body": [
   "你与我揪住头心掐下颏，我与你高阜处招魂魄。",
   "石和哎，贪慌处将孩儿落了鞋，你便叫煞他、怎得他瞅睬？空教我闷转加、愁无奈，只落得哭哭啼啼、怨怨哀哀。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "尾・十年功业难修养，取得个年老妖精复落娼，卧兔当来受灾障，常把三",
  "author": "元・赵彦晖",
  "body": [
   "门紧关上。",
   "那妮子僧房中叫，反教你削了发的耆卿后院里攘。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "郊廟歌辭 五郊樂章 赤郊迎神",
  "author": "唐・不詳",
  "body": [
   "青陽節謝，朱明候改。",
   "靡草彫華，含桃流彩。",
   "虡列鐘磬，筵陳脯醢。",
   "樂以迎神，神其如在。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "郑月莲秋夜云窗梦・尾煞",
  "author": "元・无名氏",
  "body": [
   "泪漫漫不暂停，哭啼啼不住声。",
   "不争这惊回一枕云窗梦，这烦恼直哭的西楼月儿冷。",
   "(下)(净上，云)小子李多是也。",
   "如今郑月莲被他母亲卖的洛阳张行首家中去了，我如今寻到那里，问亲去来。",
   "(卜儿上，云)李官，你须计较停当去，那妮子不肯便嫁你。",
   "(净云)洛阳府判是我叔父，到那里好歹娶了他。",
   "(卜云)好计，好计。",
   "(同下)。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "感天动地窦娥冤・鲍老儿",
  "author": "元・关汉卿",
  "body": [
   "念窦娥伏侍婆婆这几年，遇时节将碗凉浆奠；你去那受刑法尸骸上烈些纸钱，只当把你亡化的孩儿荐。",
   "（卜儿哭科，云）孩儿放心，这个老身都记得。",
   "天那，兀的不痛杀我也！（正旦唱）婆婆也，再也不要啼啼哭哭，烦烦恼恼，怨气冲天。",
   "这都是我做窦娥的没时没运，不明不暗，负屈衔冤。",
   "（刽子做喝科，云）兀那婆子靠后，时辰到了也。",
   "（正旦跪科）（刽子开枷科）（正旦云）窦娥告监斩大人，有一事肯依窦娥，便死而无怨。",
   "（监斩官云）你有甚么事？你说。",
   "（正旦云）要一领净席，等我窦娥站立；又要丈二白练，挂在旗枪上：若是我窦娥委实冤枉，刀过处头落，一腔热血休半点儿沾在地下，都飞在白练上者。",
   "（监斩官云）这个就依你，打甚么不紧。",
   "（刽子做取席站科，又取白练挂旗上科）（正旦唱）。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "争报恩三虎下山・圣药王",
  "author": "元・无名氏",
  "body": [
   "我可也千不合，万不合，一时间做事忒多罗。",
   "没来由结识这个，认义那个。",
   "我正是识人多者是非多，舌也罗，平地起风波。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "四・有一日大小运并在命宫，死囚限缠在卯酉，甚的散得疾子为你聚来得",
  "author": "元・钱霖",
  "body": [
   "恰待调和新曲歌金帐，逼临得佳人坠玉楼。",
   "难收救，一壁相投河奔井，一壁相烂额焦头。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "川拨棹・不由我泪盈盈，听长空孤雁声。我与你暂出门庭，听我丁宁。自",
  "author": "元・蒲察善长",
  "body": [
   "别情人，雁儿，我其实捱不过衾寒枕冷，相思病积渐成。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "菩萨蛮·飘蓬只逐惊飚转",
  "author": "清・納蘭性德",
  "body": [
   "飘蓬只逐惊飚转，行人过尽烟光远",
   "立马认河流，茂陵风雨秋",
   "寂寥行殿锁，梵呗琉璃火",
   "塞雁与宫鸦，山深日易斜"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "结音・似觉筵间香风散，香风散非麝非兰。醉眼朦腾问小蛮，多管是南轩",
  "author": "元・白朴",
  "body": [
   "蜡梅绽。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "亻刍梅香骗翰林风月・初问口",
  "author": "元・郑光祖",
  "body": [
   "不争你先辈颠狂，枉惹的爵侪耻笑。",
   "你恋着这尾生期改尽颜回乐。",
   "(白敏中云)小生今生不能成双，死于九泉之下，也要相会呵！(正旦唱)又不曾荐枕席，便指望同棺椁，只想夜偷期不记朝闻道。",
   "(白敏中云)小娘子可怜见，成就了这门亲事，小生必有犬马之报。",
   "(正旦云)先生既读孔圣之书，必达周公之礼。",
   "老夫人使妾身探病，如何只管胡言，是何礼也？(唱)。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "寄生草・相思病何年尽？姻缘簿甚日了？你看他知轻知重知分晓，不能够",
  "author": "元・赵彦晖",
  "body": [
   "同行同坐同欢笑，到教我添愁添闷添烦恼。",
   "怎能够喜孜孜花下燕莺期？几时得笑吟吟春日鸳鸯效？。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "柳枝辭十二首  其二",
  "author": "宋・徐鉉",
  "body": [
   "南園日暮起春風，吹散楊花雪滿空。",
   "不惜楊花飛也得，愁君老盡臉邊紅。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "冯玉兰夜月泣江舟・幺篇",
  "author": "元・无名氏",
  "body": [
   "则这个年迈的是父亲，(金御史云)又有个小孩儿可是谁？(正旦唱)可怜呵俺弟兄年纪小。",
   "(金御史云)那小孩儿原来是你兄弟，可怜！可怜！那个女人是谁？(正旦唱)他是俺梅香小字唤春娇，(金御史云)还有三个男子是谁？(正旦唱)俺家童未将人事晓。",
   "(金御史云)是了，那两个呢？(正旦唱)那两个是船家将钱觅到，也都在劫数里不能逃。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "浣溪沙·肯把离情容易看",
  "author": "清・納蘭性德",
  "body": [
   "肯把离情容易看，要从容易见艰难",
   "难抛往事一般般",
   "今夜灯前形共影，枕函虚置翠衾单",
   "更无人与共春寒"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "好观音・信步闲庭院阑槛，荷钱小池面ソ蓝。点检芳丛总不堪，正蜻蜓雨",
  "author": "元・吴仁卿",
  "body": [
   "过波纹蘸。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "李太白贬夜郎・柳叶儿",
  "author": "元・王伯成",
  "body": [
   "同此上醉魂如灯火，中秋夜禄尽衣绝，再相逢水底捞明月。",
   "生冤业，死离别，今番去再那里来也。",
   "(下)。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "马丹阳度脱刘行首・拨不断",
  "author": "元・杨景贤",
  "body": [
   "洞云迷，野猿啼，柴门半倚闻鹤唳。",
   "菊蕊丛丛绽竹篱，松花点点铺苔砌。",
   "端的个山中七日，世上千年，兴亡不管，生死无忧。",
   "(带云)你觑波，(唱)则俺这里别是一般天气。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "朱砂担滴水浮沤记・黄钟尾",
  "author": "元・无名氏",
  "body": [
   "罢、罢、罢，我这性命呵，似半轮残月三更后，一日无常万事休。",
   "苦奔波，枉生受，有谁人，肯搭救，单只被几颗朱砂，送了我头。",
   "拚的向阎罗告究，着铁幡竿等候。",
   "遮莫你板门似手掌儿，也掩不得俺这叫屈的口。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "浣溪沙·十八年来堕世间",
  "author": "清・納蘭性德",
  "body": [
   "十八年来堕世间，吹花嚼蕊弄冰弦",
   "多情情寄阿谁边",
   "紫玉钗斜灯影背，红绵粉冷枕函偏",
   "相看好处却无言"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "庞居士误放来生债・秃厮儿",
  "author": "元・刘君锡",
  "body": [
   "赤历历那电光掣一天家火块，吸力力雷霆震半壁崩崖。",
   "俺这里轻身向前将这海岸踹，(卜儿扯科，云)居士靠后些。",
   "(正末云)婆婆，你怕甚么？(唱)你还耽着鬼魂胎，哀哉。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "幺・我似那鸳鸯怕自飞，我似那鸾鹤该并舞。由来天性怎生拂。我和他久",
  "author": "元・无名氏",
  "body": [
   "交欢乍知离别苦。",
   "百无是处，眼睁睁伶俐变糊突。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "包龙图智赚合同文字・挂玉钩",
  "author": "元・无名氏",
  "body": [
   "相公道谁是谁非便得知，(包待制做怒科，云)兀那刘安住，你可怎生不着实打者，(正未唱)俺父亲尚兀是他亲兄弟。",
   "却教俺乱棒胡敲忍下的，也要想个人心大理终难昧。",
   "我须是他亲子侄，又不争甚家和计。",
   "我本为行孝而来，可怎么生忿而归？(包待制诗云)老夫低首自评论，就中曲直岂难分。",
   "为甚侄儿不将伯父打。",
   "可知亲者原来则是亲。",
   "兀那小厮，我着你打这老儿，你左来右去。",
   "只是不肯打。",
   "张千，取枷来将那小厮枷了者。",
   "(做枷正末科)(正末唱)。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "隔尾・诵诗书稚子无闲暇，奉甘旨萱堂到白发，伴辘轳村翁说一会挺膊子",
  "author": "元・孛罗御史",
  "body": [
   "闲时节笑咱，醉时节睡咱，今日里无是无非快活煞！。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "刘夫人庆赏五侯宴・喜江南",
  "author": "元・关汉卿",
  "body": [
   "儿也！今日个\"月明千里故人来\"，这一场好事奔人来。",
   "俺孩儿堂堂状貌有人材，畅好是气概！恰便似九重天飞下一纸赦书来。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "杜蕊娘智赏金线池・十二月",
  "author": "元・关汉卿",
  "body": [
   "想那厮着人赞称，天生的济楚才能；只除了心不志诚，诸余的所事儿聪明。",
   "本分的从来老成，聪俊的到底杂情。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "道和排歌",
  "author": "元・徐田臣《杀狗记》",
  "body": [
   "(小生)想他每结义时，要学关张的。",
   "言语总成虚，寻思太无知。",
   "那些恩德！那些仁义！(贴)嫡亲兄弟受凌逼，娘行杀狗劝夫回，骨肉团圆不暂离。",
   "(合前)。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "张君瑞害相思(第三本)・天下乐",
  "author": "元・王实甫",
  "body": [
   "方信道才子佳人信有之，红娘看时，有些乖性儿，则怕有情人不遂心也似此。",
   "他害的有些抹媚，我遭着没三思，一纳头安排着憔悴死。",
   "却早来到书院里，我把唾津儿润破窗纸，看他在书房里做甚么。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "春日出苑遊矚",
  "author": "唐・明皇帝",
  "body": [
   "三陽麗景早芳辰，四序佳園物候新。",
   "梅花百樹障去路，垂柳千條暗回津。",
   "鳥飛直爲驚風葉，魚沒都由怯岸人。",
   "惟願聖主南山壽，何愁不賞萬年春。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "昊天塔孟良盗骨・寄生草",
  "author": "元・朱凯",
  "body": [
   "俺为甚么泪频挥，也只要您心暗懂。",
   "早遣那嘉山太仆来争哄，把这宣花巨斧轻输动，免着俺昊天塔上长酸痛。",
   "您若是和番家忘了戴天仇，可不俺望乡台枉做下还家梦。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "包待制智斩鲁斋郎・折桂令",
  "author": "元・关汉卿",
  "body": [
   "想当初向清明日共饮金波，张孔目家世坟莹，须不是风月鸣珂。",
   "他将俺儿女夫妻，直认做了云雨巫娥。",
   "俺自撇下家缘过活，再无心缎匹缤罗你只管信口开合，絮絮聒聒；俺张孔目怎还肯缘木求鱼，鲁斋郎他可敢暴虎冯河！。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "梁州第七・担阁了闺院女西园斗草，误了你也富贵郎南陌东郊。只见白茫",
  "author": "元・无名氏",
  "body": [
   "茫迷却前村道。",
   "那里也游蜂采蕊，那里也紫燕寻巢，那里也莺声恰恰，那里也蝶翅飘飘。",
   "洒歌楼酒力微消，望江天万里琼瑶。",
   "恰便似银砌就枯木寒鸦，玉琢就冰枝冻雀，粉妆成野杏山桃。",
   "浅桥，填了。",
   "负薪樵子归岩峤，渔翁冷怎垂钓？古寺里山僧煮茗瀹，对景寂寥。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "忠义士豫让吞炭・鬼三台",
  "author": "元・杨梓",
  "body": [

 {

 {
  "title": "西湖念语",
  "author": "宋・欧阳修",
  "body": [
   "昔者王子猷之爱竹，造门不问于主人，陶渊明之卧舆，遇酒便留于道士。",
   "况西湖之胜概，擅东颍之佳名。",
   "虽美景良辰，固多于高会。",
   "而清风明月，幸属于闲人。",
   "并游或结于良朋，乘兴有时而独往。",
   "鸣蛙暂听，安问属官而属私。",
   "曲水临流，自可一觞而一咏。",
   "至欢然而会意，亦傍若于无人。",
   "乃知偶来常胜於特来，前言可信。",
   "所有虽非于己有，其得已多。",
   "因翻旧阕之辞，写以新声之调，敢阵薄伎，聊佐清欢。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "梁州・听得那静鞭响ㄡㄡ聒聒，听得杖鼓鸣恰早喜喜欢欢。近着那独杨宫",
  "author": "元・马致远",

  ],
  "note": "古人的浪漫，藏在字裡行間。"

 {

   "忒跷蹊，教俺、教俺难根缉，教俺、教俺耽干系。",

 {

  "body": [

   "上嶺梯登危石側，渡溪橋踏古槎橫。",

 {
  "title": "泉水",
  "author": "詩經",
  "body": [

   "",
   "出宿于泲，饮饯于祢。女子有行，远父母兄弟，问我诸姑，遂及伯姊。",

  "title": "布袋和尚忍字记・混江龙",

  "body": [

   "(刘均佑云)哥哥满饮一杯。",
   "(正末云)兄弟，好酒也。",
   "(唱)俺只见玉盏光浮春酒熟，金炉烟袅寿香烧。",
   "(云)说与那放生的，(唱)着他静悄悄，休要闹吵吵。",
   "(刘均佑云)小的每，说与那放生的，着他远着些，不要在此喧闹。",
   "(正末云)兄弟，你哥哥为甚积攒成这个家私来，(唱)则为我平日间省钱俭用，到如今才得这富贵奢豪。",
   "(外扮布袋和尚领婴儿、姹女上，云)佛、佛、佛，南无阿弥陀佛。",
   "(做笑科，偈云)行也布袋，坐也布袋，放下布袋，到大自在。",
   "世俗的人，跟贫僧出家去来，我着你人人成佛，个个作祖。",
   "贫僧是这凤翔府岳林寺住持长老，行脚至此。",
   "此处有一个刘均佐，是个巨富的财主。",
   "争奈此人贫饕贿赂，悭吝苦克，一文不使，半文不用。",
   "贫僧特来点化此人。",
   "这是他家门首，兀那刘均佐看财奴！(做笑科)(刘均佑云)哥哥，门首是甚么人大惊小怪的，我试看咱。",
   "(见布袋科，云)好个胖和尚也！(布袋笑科，云)冻不死的叫化头，你那看财奴有么？(刘均佑背云)我冻倒在哥哥门首，他怎生便知道？(布袋云)你那看财奴在家么？(刘均佑云)我对俺哥哥说去。",
   "(见正末笑云)哥哥，笑杀我也。",

   "(布袋念偈云)刘均佐，你笑我无，我笑你有，无常到来，大家空手。",
   "(正末云)兄弟，笑杀我也。",

  "author": "元・薛昂夫",
  "body": [

 {

  "body": [

 {
  "title": "状元堂陈母教子・红绣鞋",

  "body": [

   "教那厮把盏！先从大哥来把了盏，便问道：\"吃酒的是谁？把盏的是谁？各自称呼着那官位者。",

   "（正旦云）先从大哥来。",

   "紫袍象简朝金阙，圣人敕赐状元郎。",
   "（三末云）住者！白马红缨麾盖下，紫袍金带气昂昂。",

   "休笑绿袍官职小，才高压尽状元郎。",
   "（王拱辰饮酒科，云）问将来！（三末云）吃酒的是谁？（王洪辰云）是状元郎。",

 {
  "title": "鶺鴒頌",
  "author": "唐・明皇帝",
  "body": [
   "伊我軒宮，奇樹青葱。",
   "藹周廬兮，冒霜停雪，以茂以悅。",
   "恣卷舒兮，連枝同榮，吐綠含英。",
   "曜春初兮，蓐收御節，寒露微結。",
   "氣清虛兮，桂宮蘭殿，唯所息宴。",
   "棲雍渠兮，行搖飛鳴，急難有情。",
   "情有餘兮，顧惟德涼，夙夜兢惶。",
   "慙化疎兮，上之所教，下之所效。",
   "實在予兮，天倫之性，魯衛分政。",
   "親賢居兮，爰遊爰處，爰笑爰語。",
   "巡庭除兮，觀此翔禽，以悅我心，良史書兮。"

   "\"他犹有相兼并。"

  "note": "詩是最溫柔的力量。"

 {
  "title": "醉春风・粉脸带胭憔，香魂和梦返。一天风月冷阳关，畅好是懒、懒。看",
  "author": "元・无名氏",

 {
  "title": "鲠直张千替杀妻・耍孩儿",
  "author": "元・无名氏",
  "body": [

   "当初一年结义知心友，谁想咱半路里番腾做刎颈交？泪不住腮边落，眼见的一刀两段，知他是今日明朝？。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "中吕・朝天曲",
  "author": "元・薛昂夫",
  "body": [
   "沛公，大风，也得文章用。",
   "却教猛士叹良弓，多了游云梦。",
   "驾驭英雄，能擒能纵，无人出彀中。",
   "后宫，外宗，险把炎刘并。",
   "子牙，鬓华，才上非熊卦。",
   "争些老死向天涯，只恁垂钩罢。",
   "满腹天机，天人齐发，武王任不差。",
   "用他，讨罚，一怒安天下。",
   "伍员，报亲，多了鞭君忿。",
   "可怜悬首在东门，不见包胥恨。",
   "半夜潮声，千年孤愤，钱塘万马奔。",
   "骇人，怒魂，何似吹箫韵？卞和，抱璞，只合荆山坐。",
   "三朝不遇待如何，两跣遭祸。",
   "传国争符，伤身行货，谁教献与他？切磋，琢磨，何似偷敲破？邵平，不平，楚汉争秦鼎。",
   "将军便去作园丁，软了英雄性。",
   "瓜苦瓜甜，秦衰秦盛，青门浪得名。",
   "此生，本轻，不是封侯命。",
   "假王，气昂，跨下羞都忘。",
   "提牌不过一中郎，漂母曾相饷。",
   "蒯彻名言，将军将强。",
   "良弓不早藏。",
   "未央，法场，险似坛台上。",
   "叔孙，讨论，早定君臣分。",
   "礼成文武两班分，舞蹈扬尘顺。",
   "拔剑争功，垂绅消忿，方知天子尊。",
   "武臣，勇人，也被书生困。",
   "丙吉，宰执，燮理阴阳气。",
   "有司不问尔相推，人命关天地。",
   "牛喘非时，何须留意？原来养得肥。",
   "早知，好吃，杀了供堂食。",
   "子陵，价轻，便入刘郎聘。",
   "等闲赢得一虚名，卖了先生姓。",
   "百尺丝纶，千年高兴，偶然一足横。",
   "帝星，客星，不料天文应。",
   "董永，卖身，孝感天心顺。",
   "谁知织女是天孙，同受为奴困。",
   "自有牛郎，佳期将近，书生休认真。",
   "本因，孝亲，不是夫妻分。",
   "老莱，戏采，七十年将迈。",
   "堂前取水作婴孩，犹欲双亲爱。",
   "东倒西歪，佯啼颠拜，虽然称孝哉。",
   "上阶，下阶，跌杀休相赖。",
   "董卓，巨饕，为恶天须报。",
   "一脐然出万民膏，谁把逃亡照？谋位藏金，贪心无道，谁知没下梢！好教，火烧，难买棺材料。",
   "杜甫，自苦，踏雪寻梅去。",
   "吟肩高耸冻来驴，迷却前村路。",
   "暖阁红炉，党家门户，玉纤捧绿醑。",
   "假如，便俗，也胜穷酸处。",
   "洞宾，道人，未到天仙分。",
   "岳阳三醉洞庭春，卖墨无人问。",
   "欲斩黄龙，青蛇犹钝，纯阳能几分。",
   "养真，炼神，却被仙姑困。",
   "伯牙，韵雅，自与松风话。",
   "高山流水淡生涯，心与琴俱化。",
   "欲铸钟期，黄金无价，知音人既寡。",
   "尽他，爨下，煮了仙鹤罢。",
   "则天，改元，雌鸟长朝殿。",
   "昌宗出入二十年，怀义阴功健。",
   "四海淫风，满朝窑变，《关睢》无此篇。",
   "弄权，妒贤，却听梁公劝。",
   "孟母，丧夫，教子迁离墓。",
   "再迁市井厌屠沽，迁傍芹宫住。",
   "如此三迁，房钱无数，方成一大儒。",
   "问猪，引取，好辩长于喻。",
   "弄玉，度曲，只道吹箫苦。",
   "谁知凤只和鸾孤，吹到声圆处。",
   "明月台空，萧郎同去，秦王一叹吁。",
   "假如，嫁夫，明白人间住。",
   "采鸾，怕寒，甲帐无人伴。",
   "文箫连累堕人间，卖韵供烟爨。",
   "谁使思凡，尘缘难断，羞还玉女班。",
   "紫坛，犯奸，误了朝元限。",
   "禄山，玉环，子母肠难断。",
   "何须兵变陷长安，且向宫中乱。",
   "赶得三郎，鸾舆逃窜，连云蜀道难。",
   "内奸，外反，误却霓裳慢。",
   "老矣，倦矣，消减尽风云气。",
   "世情嚼蜡烂如呢，不见真滋味。",
   "蜗角虚名，蝇头微利，便得来真做的。",
   "布衣，袖里，试屈指英雄辈。",
   "好官，也兴阑，早勇退身无患。",
   "人生六十便宜闲，十载疏狂限。",
   "买两个丫鬟，自拈牙板，一个歌一个弹。",
   "醒时节过眼，醉时节破颜，能到此是英雄汉。"

  "note": "詩不需要讀懂，只需要感受。"
