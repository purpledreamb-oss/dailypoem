  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "晋文公火烧介子推・耍孩儿",
  "author": "元・狄君厚",
  "body": [
   "哭啼啼诉不尽别离话，(太子云了)(正末唱)你与我疾忙上马。",
   "你一程程乘骑去他邦，我则索慢慢的步石自还家。",
   "他那里伤心去路何时尽，我这里含恨归程知他几日是家。",
   "(太子云了)(正末唱)赤紧的您父子无投机活，可知道风云气少，那里问儿女情多！。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "寄生草・为甚忧，为甚愁？为萧郎一去经今久。玉台宝鉴生尘垢，绿窗冷",
  "author": "元・关汉卿",
  "body": [
   "落闲针锈。",
   "岂知人玉腕钏儿松，岂知人两叶眉儿皱！。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "李太白贬夜郎・尾",
  "author": "元・王伯成",
  "body": [
   "那厮主置定乱宫心，酝酿着漫天谎，倚仗着强耶壮娘。",
   "全不顾白玉阶头纳表章，则信着被窝里顿首诚惶。",
   "我绕着利名扬，佯做个疯狂。",
   "指点银瓶索酒尝，尽教谗臣每数量。",
   "至尊把我屈央，休想楚三闾肯跳汨罗江。",
   "(下)。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "摩利支飞刀对箭・天下乐",
  "author": "元・无名氏",
  "body": [
   "几时能够宫殿风微燕雀高？我这里便量也波度，不由我心内焦，则我那上天梯若还寻觅着。",
   "龙能够致雨风，虎能够奋牙爪，将我这严生志须应了。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "幺・",
  "author": "元・冯子振",
  "body": [
   "断回肠一首阳关，早晚马头南去。",
   "对吴山结个茅庵，画不尽西湖巧处。",
   "野渡新晴孤村三两人家住，终日对野叟田父。",
   "说今朝绿水平桥，昨日溪南新雨。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "衡门",
  "author": "詩經",
  "body": [
   "衡门之下，可以栖迟。泌之洋洋，可以乐饥。",
   "",
   "岂其食鱼，必河之鲂？岂其取妻，必齐之姜？",
   "",
   "岂其食鱼，必河之鲤？岂其取妻，必宋之子？"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "梁山泊李逵负荆・沉醉东风",
  "author": "元・康进之",
  "body": [
   "呼保义哥哥见责，我李山儿情愿餐柴。",
   "第一来看着咱兄弟情，第二来少欠他脓血债。",
   "休道您兄弟不伏烧埋，由你便直打到梨花月上来。",
   "若不打，这顽皮不改。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "幺・倚定门儿语笑喧，来往星眸厮顾恋。彼各正当年，花阴柳影，月底共",
  "author": "元・杨果",
  "body": [
   "星前。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "郊廟歌辭 夕月樂章 雍和",
  "author": "唐・不詳",
  "body": [
   "朏晨爭舉，天宗禮闢。",
   "夜典涼秋，陰明湛夕。",
   "有𨣧斯旨，有牲斯碩。",
   "穆穆其暉，穰穰是積。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "诈妮子调风月・雁儿落",
  "author": "元・关汉卿",
  "body": [
   "燕燕那书房中伏侍处，许第二个夫人做。",
   "他须是人身人面皮，人口人言语！。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "杨氏女杀狗劝夫・油葫芦",
  "author": "元・萧德祥",
  "body": [
   "他骂道孙二穷厮煞是村，便待要赶出门，则着我自敦自逊自伤神。",
   "现如今爹爹奶奶都亡尽，但愿得哥哥嫂嫂休嗔忿。",
   "为甚么单骂着我？你敢是错怨了人。",
   "(孙大云)我和你有甚么情分，你来见我？(正末唱)既是哥哥与兄弟无情分，却怎生等我上新坟？。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "地藏王证东窗事犯・叨叨令",
  "author": "元・孔文卿",
  "body": [
   "恰问罢早驾祥云瑞霭，乘着风信，见一个牧童牛背笛声韵。",
   "我将那东南山去路将他问，他指一指隐灵寺行者分明近。",
   "他早去了也未哥，早去了也未哥，向前来扯住禅师问。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "李亚仙花酒曲江池・得胜令",
  "author": "元・石君宝",
  "body": [
   "你可认的那旧家计郑元和？(末见科，云)夫人，他是谁那？(正旦唱)他是你同伴的老哥哥。",
   "不争你那地塌下摇铃子，对着这衙厅上教演他唱挽歌。",
   "这般样村呵，你道是不快俺风尘过，休波倚仗着门前桃李多。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "麻婆子・汉祖胜乘威势，上苍助显号令。四野布层阴重，六花飞万片轻。",
  "author": "元・王伯成",
  "body": [
   "不添和气报丰年，特呈凶兆害生灵。",
   "手拘束难施展，足滑擦岂暂停。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "朱砂担滴水浮沤记・双调/新水令",
  "author": "元・无名氏",
  "body": [
   "正黄昏庭院景凄凄，哎哟天那！走的我软兀剌一丝两气。",
   "淅零零的山路冷，昏惨惨的晚风吹。",
   "脚步儿刚移，一步步行到枉死地。",
   "(做行科，云)来到这个所在，是十字坡口儿上酒店，正是我当初遇着那贼处。",
   "他见着我甚些动静，便起这点狠心？所算的我好苦也。",
   "(唱)。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "谢金吾诈拆清风府・哭皇天",
  "author": "元・无名氏",
  "body": [
   "那军情事非轻可，不知你曾引的人来也独自个？(六郎云)母亲，您孩儿同焦赞兄弟来也。",
   "(正旦云)焦赞孩儿在那里？着孩儿家里来波。",
   "(六郎云)入城来不见了也。",
   "(正旦唱)你道他入城时不见了，因甚的不寻地？他从来有些儿、有些儿撒泼。",
   "他若是见说拆毁咱楼阁，他若是见说跌损咱肩窝。",
   "怕不就掇起他不腾腾那杀人心、杀人心如烈火，怎还顾别人的利害，自己的死活。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "神奴儿大闹开封府・那吒令",
  "author": "元・无名氏",
  "body": [
   "你哥哥劝你，休烦天恼地；大嫂你靠这壁，休推天抢地；孩儿这里耍哩，休啼天哭地。",
   "(带云)李大员外、二员外，(唱)俺须是亲手足，您须是亲妯娌，有甚么话不投机。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "中吕・普天乐赠白玉梅",
  "author": "元・张可久",
  "body": [
   "谪仙名，乐天姓。",
   "缁尘不染，玉骨长清。",
   "西楼羌管声，东阁新诗兴。",
   "艳紫妖红尘俗病，论风流让与琼琼。",
   "孤山旧盟，黄昏月明，夜雪初晴。",
   "别怀二首故人疏，忧心悄。",
   "愁云淡淡，远水迢迢。",
   "一声白雁寒，几点青山小。",
   "满目凄凉谁知道？赋情词写遍芭蕉。",
   "明月洞箫，夕阳细草，沙渚残潮。",
   "梦初回，愁难禁。",
   "青楼痛饮，彩扇新吟。",
   "金莲小步移，玉藕香腮枕。",
   "惜雨怜云别图甚？五百年一对知音。",
   "别离动心，分明为您，憔悴如今。",
   "客怀楚山云，湘江岸。",
   "霜添白发，日减朱颜。",
   "秋风马耳寒，夜雪貂裘绽。",
   "万里南归孤飞雁，动离情故国乡关。",
   "闲身易懒，休官怕晚，倦羽知还。",
   "收心二首姓名香，行为俏。",
   "花花草草，暮暮朝朝。",
   "关心三月春，开口千金笑。",
   "惜玉怜香何时了，彩云空声断鸾箫。",
   "朱颜易老，青山自好，白发难饶。",
   "旧行头，家常扮。",
   "鸳鸯被冷，燕子楼拴。",
   "偷将心事传，掇了梯儿看。",
   "系柳监花乔公案，关防的不似今番。",
   "姨夫暗攒，行院斗侃，子弟先<走山>。",
   "秋怀为谁忙？莫非命。",
   "西风驿马，落月书灯。",
   "青天蜀道难，红叶吴江冷。",
   "两字功名频看镜，不饶人白发星星。",
   "钓鱼子陵，思莼季鹰，笑我飘零。",
   "道情北邙烟，西州泪。",
   "先朝故家，破冢残碑。",
   "樽前有限杯，门外无常鬼。",
   "未冷鸳帏合欢被，画楼前玉碎花飞。",
   "悔之晚矣，蒲团纸被，归去来兮。",
   "渡扬子江凤鸾吟，鱼龙竞。",
   "舟移古渡，潮打空城。",
   "清风江上筝，明月波心镜。",
   "未尽诗人登临兴，写新声寄与卿卿。",
   "金山雪晴，玉杯露冷，银海花生。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "思美人",
  "author": "屈原",
  "body": [
   "思美人兮，揽涕而竚眙。",
   "媒绝路阻兮，言不可结而诒。",
   "蹇蹇之烦冤兮，陷滞而不发。",
   "申旦以舒中情兮，志沉菀而莫达。",
   "愿寄言于浮云兮，遇丰隆而不将。",
   "因归鸟而致辞兮，羌迅高而难当。",
   "高辛之灵盛兮，遭玄鸟而致诒。",
   "欲变节以从俗兮，媿易初而屈志。",
   "独历年而离愍兮，羌凭心犹未化。",
   "宁隐闵而寿考兮，何变易之可为！",
   "知前辙之不遂兮，未改此度。",
   "车既覆而马颠兮，蹇独怀此异路。",
   "勒骐骥而更驾兮，造父为我操之，",
   "迁逡次而勿驱兮，聊假日以须是时。",
   "指嶓冢之西隈兮，与纁黄以为期。",
   "开春发岁兮，白日出之悠悠。",
   "吾将荡志而愉乐兮，遵江夏以娱忧。",
   "揽大薄之芳茝兮，搴长洲之宿莽。",
   "惜吾不及古人兮，吾谁与玩此芳草？",
   "解萹薄与杂菜兮，备以为交佩。",
   "佩缤纷以缭转兮，遂萎绝而离异。",
   "吾且儃徊以娱忧兮，观南人之变态。",
   "窃快在中心兮，扬厥凭而不竢。",
   "芳与泽其杂糅兮，羌芳华自中出。",
   "纷郁郁其远蒸兮，满内而外扬。",
   "情与质信可保兮，羌居蔽而闻章。",
   "令薜荔以为理兮，惮举趾而缘木。",
   "因芙蓉而为媒兮，惮褰裳而濡足。",
   "登高吾不说兮，入下吾不能。",
   "固朕形之不服兮，然容与而狐疑。",
   "广遂前画兮，未改此度也。",
   "命则处幽吾将罢兮，愿及白日之未暮也。",
   "独茕茕而南行兮，思彭咸之故也。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "清江引・自他那枕边说别离，巧舌头甜如蜜。三春有归期，四月无消息，",
  "author": "元・刘伯亨",
  "body": [
   "谎人情一星星不记得。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "赵盼儿风月救风尘・油葫芦",
  "author": "元・关汉卿",
  "body": [
   "姻缘簿全凭我共你？谁不待拣个称意的？他每都拣来拣去百千回。",
   "待嫁一个老实的，又怕尽世儿难成对；待嫁一个聪俊的，又怕半路里轻抛弃。",
   "遮莫向狗溺处藏，遮莫向牛屎里堆，忽地便吃了一个合扑地，那时节睁着眼怨他谁！。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "送玄同真人李抱朴謁灊山仙祠",
  "author": "唐・明皇帝",
  "body": [
   "城闕天中近，蓬瀛海上遙。",
   "歸期千載鶴，春至一來朝。",
   "采藥逢三秀，餐霞臥九霄。",
   "參同如有旨，金鼎待君燒。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "早度蒲津關",
  "author": "唐・明皇帝",
  "body": [
   "鐘鼓嚴更曙，山河野望通。",
   "鳴鑾下蒲坂，飛斾入秦中。",
   "地險關逾壯，天平鎮尚雄。",
   "春來津樹合，月落戍樓空。",
   "馬色分朝景，雞聲逐曉風。",
   "所希常道泰，非復候繻同。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "二・虽然动的脚根，何曾转的眼睛，杜鹃啼感动归家兴。羡孤云易举离南",
  "author": "元・曾瑞",
  "body": [
   "浦，无双翼高飞过渭城。",
   "行装并，载满船风月，十里旗亭。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "還陝述懷",
  "author": "唐・太宗皇帝",
  "body": [
   "慨然撫長劒，濟世豈邀名。",
   "星旂紛電舉，日羽肅天行。",
   "徧野屯萬騎，臨原駐五營。",
   "登山麾武節，背水縱神兵。",
   "在昔戎戈動，今來宇宙平。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "承明殿霍光鬼谏・青哥儿",
  "author": "元・杨梓",
  "body": [
   "他怎做的朝中朝中宰相？枉了失其失其民望。",
   "谅这厮生长在细米干柴不漏房，便赐与紫绶金章羽旌旄幢。",
   "教端堆都堂，辅佐吾皇，判断朝纲，整治家邦。",
   "我则怕差错阴阳，激恼穹苍。",
   "天降灾殃，六月飞霜，早杀了农桑，水淹了田庄，四境饥荒，万姓逃亡。",
   "觑着他，狠似豺狼，蠢似猪羊，眼嵌缩腮模样，面黄肌瘦形相。",
   "爷饭娘羹，娇养，夫贵妻荣休望，教骨奸折倍扌光，是无桅船，没底筐。",
   "我王待远法商汤，臣伏戎羌，郊拱平章，采纳贤良，选用忠良，行止端方，才智非常，论道经邦，展土开疆，教万国伏降，万民安康，万寿无疆，万世称扬。",
   "似这等油虫麻猾狲般性轻狂猖。",
   "他怎图画作麒麟像。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "仙吕・赏花时长江风送客",
  "author": "元・马致远",
  "body": [
   "冯客苏卿先配成，愁杀风流双县令。",
   "扑簌簌泪如倾，凄凉愁损，相伴着短檠灯。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "张君瑞庆团园(第五本)・四煞",
  "author": "元・王实甫",
  "body": [
   "这裹肚，手中一叶绵，灯下几回丝；表出腹中愁，果称心间事。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "应天长・僧舍窄，蚊帐矮，独拥单衾，一宵如半载。旧恨新愁深似海。情",
  "author": "元・睢景臣",
  "body": [
   "缘在，人无奈，几般儿可怪。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "冯玉兰夜月泣江舟・商调/集贤宾",
  "author": "元・无名氏",
  "body": [
   "正沧江夜寒明月皎，觑地远叩天遥。",
   "这船呵在风中簸荡任东西，水上浮漂。",
   "又无人把舵推篷，那里也举棹撑篙。",
   "我则听的古都都泼天也似怒涛，斗合着忽剌刺风声儿厮闹。",
   "这水也流不尽俺千端愁思积，这风也抵不过俺一片哭声高。",
   "(带云)父亲和兄弟，你都死的好苦也！(唱)。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "唐明皇秋夜梧桐雨・蛮姑儿",
  "author": "元・白朴",
  "body": [
   "懊恼，窨约。",
   "惊我来的又不是楼头过雁，砌下寒蛩，檐前玉马，架上金鸡；是兀那窗儿外梧桐上雨潇潇。",
   "一声声洒残叶，一点点滴寒梢，会把愁人定虐。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "幺・人俊惜风流，欠前生酒病花愁。尚还不彻相思债，携云挈雨，批风切",
  "author": "元・关汉卿",
  "body": [
   "月，到处绸缪。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "小尉迟将斗将认父归朝・游四门",
  "author": "元・无名氏",
  "body": [
   "你便有那银山铁壁数十重，杀的你人似血胡同。",
   "则他那尉迟敬德敌头重，(刘无敌云)小番则今日下教场点军，好歹要与他交锋去来。",
   "(正末唱)你那里高叫响如钟，空逞恁的好喉咙。",
   "(刘无敌云)养爷你放心，看我活拿了敬德回来，取将相王侯，都在这一遭儿也。",
   "(正末唱)。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "沙门岛张生煮海・双调/新水令",
  "author": "元・李好古",
  "body": [
   "则为这波涛相间的故人疏，我则怕黑漫漫各寻别路。",
   "受了些活地狱，下了些死工夫。",
   "海角天隅，须有日再完聚。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "隔尾・金风不念香须少，玉露那怜粉翅娇。风露催残冷来到，艳阳时过了。",
  "author": "元・吕天用",
  "body": [
   "暮秋天怎熬，将一捻儿香肌断送了。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "喜迁莺・想才郎丰鉴，貌堂堂阔论高谈。那堪。并不愚滥，一见了春愁独",
  "author": "元・曾瑞",
  "body": [
   "自搅，常好是忒大胆。",
   "怕不你心心儿里待贪，又则怕意意儿里相搀。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "萧淑兰情寄菩萨蛮・秃厮儿",
  "author": "元・贾仲明",
  "body": [
   "俺那崔氏女正红愁绿惨，你个张君瑞待面北眉南，着我老红娘将两下里做一担扭。",
   "请先生，省言鬼朱，喃喃。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "花间四友东坡梦・鸳鸯煞尾",
  "author": "元・吴昌龄",
  "body": [
   "从今后识破了人相我相众生相，生况死况别离况，永谢繁华，甘守凄凉。",
   "唱道是即色即空，无遮无障。",
   "笑杀东坡也忏悔春心荡，枉自有盖世文章，还向我佛印禅师听一会讲。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "尾声・喜携仗自耕耘，欢自己忘忧会，玩赏东篱足矣。采菊浮杯稳坐榻，",
  "author": "元・张可久",
  "body": [
   "对南山山色稀奇。",
   "看山巍山色相催，山色悠悠能有几？逍遥度日，优游卒岁，乐天之命复奚疑。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "尾声・解卸了一团儿娇，稍遍起浑身儿俏。似这般女校尉从来较少。随圆",
  "author": "元・邓玉宾",
  "body": [
   "社常将蹴リ抱抛，占场儿陪伴了些英豪。",
   "那丰标！体态妖娆。",
   "错认范的郎君他跟前入一脚，点着范轻轻的过了，打重他微微含笑。",
   "那姐姐见球来忙把脚儿跷。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "双调・折桂令湖上寒食",
  "author": "元・张可久",
  "body": [
   "雨霏霏店舍无烟，榆荚飞钱，柳线搓绵。",
   "绿水人家，残花院落，美女秋千。",
   "沽酒春衣自典，思家客子谁怜？第一桥边，恋住流莺，不信啼鹃。",
   "湖上道院鹤飞来一缕青霞，笑富贵飞蚊，名利争蜗。",
   "古砚玄香，名琴绿绮，土釜黄芽。",
   "双井先春采茶，孤山带月锄花。",
   "童子谁家？贪看西湖，懒诵南华。",
   "酒边即事莺莺燕燕相亲，幸有名园，著我闲身。",
   "竹点诗痕，花消酒困，柳拂歌尘。",
   "锦帐里团香弄粉，画楼前访雨寻云。",
   "不负青春，谁共佳人，相约黄昏？避暑醉题俯沧波楼观烟霞，胜览方舆，独占繁华。",
   "彩舰轻帘，银鞍骏马，翠袖娇娃。",
   "十里香风酒家，一川凉雨荷花。",
   "醉墨涂鸦，题遍红楼，倒裹乌纱。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "神奴儿大闹开封府・沉醉东风",
  "author": "元・无名氏",
  "body": [
   "他去那原告人十分觑问，眼见的那被告人九分关亲。",
   "他将李阿陈相哀悯，他去那李二行百般的施仇恨，料应来必有个缘因。",
   "我见他两次三番如丧神，早难道肋底下插柴自稳。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "下泉",
  "author": "詩經",
  "body": [
   "冽彼下泉，浸彼苞稂。忾我寤叹，念彼周京。",
   "",
   "冽彼下泉，浸彼苞萧。忾我寤叹，念彼京周。",
   "",
   "冽彼下泉，浸彼苞蓍。忾我寤叹，念彼京师。",
   "",
   "芃芃黍苗，阴雨膏之。四国有王，郇伯劳之。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "六幺序・不如俺闲乐，陶陶，木碗椰瓢，乞化村醪。醉得来前合后倒，又",
  "author": "元・邓玉宾",
  "body": [
   "带糟随下随高。",
   "都是教酒葫芦相与酬酢，归来醉也藜杖挑，过清风皓月溪桥。",
   "柴门掩上无锁钥，自颠狂自歌自笑，天地如我这草团标。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "刘千病打独角牛・那吒令",
  "author": "元・无名氏",
  "body": [
   "说着他这种田呵，我三衙家抹丢；道着他这放牛呵，我十分的便抖擞；提着道是拽拳呵，美也我精神儿便有。",
   "我可便打熬成，我敢则是温习就，凭着我这武艺滑熟。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "罗李郎大闹相国寺・川拨棹",
  "author": "元・无名氏",
  "body": [
   "谁家的小魔军，两三番迤逗人？我这里扭项回身，吃我会抢问。",
   "你畅是不知个高低远近，向前向审问的真。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "詠毛女",
  "author": "宋・陳摶",
  "body": [
   "曾折松枝爲寶櫛，又編栗葉作羅襦。",
   "有時問著秦宮事，笑撚仙花望太虛。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "关云长千里独行・采茶歌",
  "author": "元・无名氏",
  "body": [
   "叔叔你早则么皱着眉头，休记冤仇，叔叔你与我停嗔息怒。",
   "寿亭侯，则你那失散了的哥哥不知道无共有，方信道知心的这相识可也到头休。",
   "(云)妹妹，俺跪着。",
   "二叔叔，可怜见俺姊妹二人。",
   "(正旦、小旦都跪科)(关末云)嫂嫂请起。",
   "你休烦恼，你欢喜咱。",
   "(二旦云)我有甚么欢喜？(关末云)嫂嫂，你不知俺哥哥兄弟，见在古城有哩。",
   "(正旦云)叔权，谁那般道？(关末云)嫂嫂，今日曹丞相请我赴宴。",
   "有一个张虎来说，我哥哥兄弟杀退了他，哥哥兄弟如今见在古城。",
   "我故意推醉，我特来报与嫂嫂知道。",
   "(二旦云)是真个？(关末云)是真个。",
   "我将曹丞相赐与我的金银和这寿亭侯牌印，我都锁在宜阳宅。",
   "不分星夜，便出许都。",
   "(正旦云)是真个？惭愧也。",
   "叔叔，则今日收拾行李，便索长行。",
   "(唱)。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "越调・半鹌鹑避纷",
  "author": "元・王仲诚",
  "body": [
   "露冷霜寒，云低雾黯。",
   "洒洒潇潇，凄凄惨惨。",
   "眼底繁华，心头有感。",
   "名利绝，是非减。",
   "爱的是雪月风花，怕的是《官民要览》。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "梁州・翰墨夺人间锦乡，咳唾落天上珠玑。统雄藩肃镇西南裔。紫泥诏符",
  "author": "元・汤舜民",
  "body": [
   "分铜虎，碧油幢纛散红嫠。",
   "金麒麟绣蒙锁甲，玉暾龙带束宫衣。",
   "八卦营细柳深迷，五方旗铁马骄嘶。",
   "喜的是沙漠空狐兔尘清，江海静鲸鲵浪息，宫殿高燕雀风微。",
   "授之以德，用之以礼。",
   "因此上太平天子无为治，咫尺间九重内。",
   "唤得春来草木知，万物熙熙。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "梁州・东墙女空窥宋玉，西厢月却就崔姝。便休题月下老姻缘薄。风流偏",
  "author": "元・李致远",
  "body": [
   "阻，好事多辜。",
   "蓝田隐璧，沧海遗珠。",
   "桃源洞山谷崎岖，阳台路云雨模糊。",
   "书斋中勉强韩香，兰房中生疏郑五，泾河边不寄龙书。",
   "怨苦，自取。",
   "世间情知他是甚娘般物，自嗟叹静思虑。",
   "直教柳下惠开门不秉烛，薄命寒儒。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "狼跋",
  "author": "詩經",
  "body": [
   "狼跋其胡，载疐其尾。公孙硕肤，赤舄几几。",
   "",
   "狼疐其尾，载跋其胡。公孙硕肤，德音不瑕？"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "满庭芳・人间罕有，沉鱼落雁，月闭花羞。蕙兰性一点灵犀透，举止温柔。",
  "author": "元・王仲诚",
  "body": [
   "成合了鸾交凤友，匹配了燕侣莺俦。",
   "轻扌闰就，如弹玉纤粉汗流，佯呵欠袖儿里低声儿咒。",
   "一会家把人迤逗，撇不下漾秋波一对动情眸。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "包待制智勘后庭花・剔银灯",
  "author": "元・郑延玉",
  "body": [
   "听说道荆棘列半日，猛觑了呆打颏一会。",
   "兀那婆婆，不是你女孩儿身躯壳，且别寻觅。",
   "这一个尸首可是谁的？兀那婆婆你休瞒我，我问你这尸首如何不识？。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "商调・集贤宾宫词",
  "author": "元・曾瑞",
  "body": [
   "闷登楼倚阑干看暮景，天阔水云平。",
   "浸池面楼台倒影，书去笺雁字斜横。",
   "衰柳拂月户云窗，残荷临水阁凉亭。",
   "景凄凉助人愁越逞，下妆楼步月空庭。",
   "鸟惊环佩响，鹤吹铎铃鸣。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "寄江州蕭給事",
  "author": "宋・徐鉉",
  "body": [
   "夕郎憂國不憂身，今向天涯作逐臣。",
   "魂夢暗馳龍闕曙，嘯吟閒繞虎谿春。",
   "朝車載酒過山寺，諫紙題詩寄野人。",
   "惆悵懦夫何足道，自離羣後已同塵。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "醉思乡王粲登楼・普天乐",
  "author": "元・郑光祖",
  "body": [
   "楚天秋，山叠翠，对无穷景色，总是伤悲。",
   "好教我动旅怀，难成醉。",
   "枉了也壮志如虹英雄辈，都做助江天景物凄其。",
   "（云）老兄，小生有三桩儿不是。",
   "（许达云）可是那三桩儿不是？（正末云）是这气这愁和这泪。",
   "（许达云）气若何？（正末唱）气呵做了江风淅淅。",
   "（许达云）愁若何？（正末唱）泪呵弹做了江雨霏霏。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "采绿",
  "author": "詩經",
  "body": [
   "终朝采绿，不盈一匊。予发曲局，薄言归沐。",
   "",
   "终朝采蓝，不盈一襜。五日为期，六日不詹。",
   "",
   "之子于狩，言韔其弓。之子于钓，言纶之绳。",
   "",
   "其钓维何？维鲂及鱮。维鲂及鱮，薄言观者。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "李亚仙花酒曲江池・南吕/一枝花",
  "author": "元・石君宝",
  "body": [
   "俺娘眼上带一对乖，心内隐着十分狠；脸上生那歹斗毛，手内有那握刀纹。",
   "狠的来世上绝伦，下死手，无分寸。",
   "眼又尖，手又紧。",
   "他拳起处又早着昏，那郎君呵，不带伤必然内损。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "宋太祖龙虎风云会・呆骨朵",
  "author": "元・罗贯中",
  "body": [
   "冲寒风冒瑞雪来相访，(张千云)有甚么紧急事，你说。",
   "(正末唱)有机密事紧待商量。",
   "(张千报云)老爹，门外有人叫门。",
   "(普云)你问他是谁？(张千云)他说是赵大官人，有机密事来商议。",
   "(普做慌科，云)快开门，快开门！(普见驾，跪云)不知主上幸临，有失远接。",
   "(张千慌走科)(正末唱)忙怎么了事公人？(普又拜云)恕微臣之罪。",
   "(正末唱)免礼波招贤宰相。",
   "(正末问张千云)这是那里？(张千云)这就是俺丞相厅房。",
   "(正末云)怎么使你这般样人？(唱)正是调鼎鼐三公府，那个是剃头发杨和尚？(普云)陛下尊坐。",
   "(正末唱)我向坐席间听讲书。",
   "(张千云)老爹，酒食已备。",
   "捧上来罢？(正末唱)你休来耳边厢叫点汤。",
   "(正末云)夜深人静，张千好生看着相府门者。",
   "(普云)主公，今夜天气甚寒，不求安逸，冒雪而来，却是为何？(正末唱)。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "月明和尚度柳翠・赚煞尾",
  "author": "元・李寿卿",
  "body": [
   "我本待要蟾宫内栽培的你活，哎，柳也你却待向那牛员外上凋零尽。",
   "惹一番信手拈来斧痕。",
   "你则听枝上流莺和泪闻，直等的你那皮故成薪。",
   "你如今正青春，则伴着那暮雨朝云、倚仗着客舍青青柳色新，我本待从根波至本，却把那下梢来不问，哎，柳也，再休提你那永丰坊里旧腰身。",
   "(下)。"
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "江邊秋夕",
  "author": "宋・譚用之",
  "body": [
   "千鍾紫酒薦菖蒲，松島蘭舟瀲灩居。",
   "曲內橘香江客笛，字中嵐氣岳僧書。",
   "吟期汗漫驅金虎，坐約丹青跨玉魚。",
   "七色花虯一聲鶴，幾時乘興上清虛。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "十探子大闹延安府・油葫芦",
  "author": "元・无名氏",
  "body": [
   "则为那吏弊官浊民受苦，差小官亲体伏。",
   "有-等权豪势要狠无徒。",
   "他则待要倚强凌弱胡为做，全不怕一朝人怨天公怒。",
   "若有那衔冤的来告诉，小官可也无面目。",
   "施行那徒流笞杖我可便依著条律，不恁的何以得民服。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "阀阅舞射柳蕤丸记・尾声",
  "author": "元・无名氏",
  "body": [
   "则今日赍圣敕出皇都，驰驿马须行上，直至那云州地方，说与那延寿马将军疾便往。",
   "(范仲淹云)着延寿马与参谋使李信，便赴京师。",
   "(正末唱)命参谋转运军粮，他若是领儿郎，摆列着阔剑长枪，恁时节得胜也鞭敲金镫响。",
   "(范仲淹云)他若破虏之后，自有重赏加封官。",
   "(正末唱)稳情取封官重赏，不枉了我举贤才的当，(云)若得了胜呵，(唱)那其间衣锦却还乡，(下)。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "陪王庶子游後湖涵虛閣",
  "author": "宋・徐鉉",
  "body": [
   "懸圃清虛乍過秋，看山尋水上茲樓。",
   "輕鷗的的飛難沒，紅葉紛紛晚更稠。",
   "風卷微雲分遠岫，浪摇晴日照中州。",
   "躋攀況有承華客，如在南皮奉勝遊。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "包待制智赚灰栏记・幺篇",
  "author": "元・李行甫",
  "body": [
   "现放着收生的刘四婶，剃胎头的张大嫂，俺孩儿未经满月早问道我十数遭。",
   "今日个浪包娄到公庭混赖着您，街坊每常好是不合天道，得这些口含钱直恁般使的坚牢。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "风入松・翠屏灯影照人孤，花外响啼蛄。丁宁似把闲愁诉，凄凉待怎支吾。",
  "author": "元・萧德润",
  "body": [
   "泪珠伴檐化簌簌，梦魂惊城角呜呜。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "程咬金斧劈老君堂・中吕/粉蝶儿",
  "author": "元・郑光祖",
  "body": [
   "俺如今度日如年，遭缧绁心中嗟怨。",
   "悔不听贤相之言，自为载看金墉，寻白鹿，怎生敢相犯？他将我拿到厅前，下南牢不由人分辨。",
   "(刘文静云)元帅，休要恼怒，权且奈心也。",
   "(正末唱)。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "尾声・曾指归期在春暮，却又早霜冷菰蒲，把灯花影儿终夜卜。赏玩",
  "author": "元・无名氏",
  "body": [
   "杨柳横塘淡烟锁，娇滴滴芙蕖万朵。",
   "微雨过晚凉多。",
   "蝉咽庭柯，午梦方惊破。",
   "重洗盏泛金波，细细南薰透轻葛。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "摩利支飞刀对箭・越调/斗鹌鹑",
  "author": "元・无名氏",
  "body": [
   "走的我汗似汤浇，浑身上水洗。",
   "恰离了乱撺军营，急煎煎盼不到元帅府里。",
   "两只脚飞腾，一声儿踹起。",
   "苦亡家，倾败国，恶战敌。",
   "人着箭踉跄身歪，马中枪惊急里脚失。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "唐明皇秋夜梧桐雨・太清歌",
  "author": "元・白朴",
  "body": [
   "恨无情卷地狂风刮，可怎生偏吹落我御苑名花！想他魂断天涯，作几缕儿彩霞。",
   "天那！一个汉明妃远把单于嫁，止不过泣西风泪湿胡笳。",
   "几曾见六军厮践踏，将一个尸首卧黄沙？。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "初入秦川路逢寒食",
  "author": "唐・明皇帝",
  "body": [
   "洛陽芳樹映天津，灞岸垂楊窣地新。",
   "直爲經過行處樂，不知虛度兩京春。",
   "去年餘閏今春早，曙色和風著花草。",
   "可憐寒食與清明，光輝幷在長安道。",
   "自從關路入秦川，爭道何人不戲鞭。",
   "公子途中妨蹴踘，佳人馬上廢鞦韆。",
   "渭水長橋今欲渡，蔥蔥漸見新豐樹。",
   "遠看驪岫入雲霄，預想湯池起煙霧。",
   "煙霧氛氳水殿開，暫拂香輪歸去來。",
   "今歲清明行已晚，明年寒食更相陪。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "沙门岛张生煮海・骂玉郎",
  "author": "元・李好古",
  "body": [
   "可知道龙宫美女多娇态，想当时因有约，则今日独寻来，拚的个舍残生，做下风流债。",
   "那龙也青脸儿长左猜，恶性儿无可解，狠势儿将人害。",
   "(张生云)可怎生恁般利害？(仙姑唱)。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "萧何月夜追韩信・滚绣球",
  "author": "元・金仁杰",
  "body": [
   "哎，霸正呵，全个见鸿门会那气性。",
   "今日向乌江岸灭尽形，那里也拔山举鼎。",
   "怎想你临死也通点人情，自别处叫一声，乡人吕马童。",
   "枭首级分付的明，这两庄儿送得楚重瞳百事无成。",
   "待叫向垓心坦别了虞姬。",
   "闷闷闷，懒归西楚亲无救。",
   "待去来吴楚八千子弟散得无一人，羞答答耻向东吴又再起兵，另巍巍孤掌难鸣。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "孟德耀举案齐眉・上马娇",
  "author": "元・无名氏",
  "body": [
   "这的是时命乖，非是他文学疏。",
   "须知道天不负诗书。",
   "则看渭水边吕望将文王遇，哎，怎笑的霜雪也白头颅？。"
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "神仗儿",
  "author": "元・杨景贤",
  "body": [
   "风神王冷气酸，雨师雷伯两意欢，电母施威，水神没乱，这功劳都一般。",
   "往西天取得经完，再重来此处难顾管。",
   "奏天庭仍把诸佛唤，着火再休撺。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "二・天生社稷真卿相，才称朝廷作栋梁。这相公主见宏深，秉心仁恕，治",
  "author": "元・刘时中",
  "body": [
   "政公平，办事慈祥。",
   "可与萧、曹比并，伊、傅齐肩，周、召班行。",
   "紫泥宣诏，花衬马蹄忙。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "风帖儿",
  "author": "元・高明《蔡伯喈琵琶记》",
  "body": [
   "到得陈留，逢一个故老，在他每爹娘坟上拜扫。",
   "他爹娘呵，果然饥荒都死了；他媳妇，也来到；枉教人走这遭。",
   "(外唱)。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "郊廟歌辭 祀圜丘樂章 豫和",
  "author": "唐・褚亮",
  "body": [
   "上靈睠命膺會昌，盛德殷薦叶辰良。",
   "景福降兮聖德遠，玄化穆兮天曆長。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "小张屠焚儿救母・金蕉叶",
  "author": "元・无名氏",
  "body": [
   "你去山门前潜躲，你去东廊下休来伴我。",
   "你向松阴中权且歇波，我入三门沉吟了几合。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "天下乐・怎能够玉树同栖翡翠巢？无福的难也波消。自暗约，用心儿访寻",
  "author": "元・赵彦晖",
  "body": [
   "月下老。",
   "者莫你能会弹能会歌，能会绣能会描，怎生来少前程无下梢？。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "玉清庵错送鸳鸯被・滚绣球",
  "author": "元・无名氏",
  "body": [
   "兀的甚势沙，甚礼法，索甚么问天来买卦。",
   "莫不我与那刘员外合做浑家？他为咱，我为他，好着我放心不下。",
   "办着个志诚心，着俺这夫妇每欢洽。",
   "可是怎生黑洞洞桌面上绝了灯火，云黯黯碧天边闭了月华，倒省的人多少喧哗。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "晋陶母剪发待宾・尾声",
  "author": "元・秦简夫",
  "body": [
   "等俺孩儿若受了千钟禄三品职，成就了高堂大厦英杰子。",
   "你儿那时节五花诰驷马车，做一个大院深宅媳妇儿。",
   "更有乡邻不轻视，车马迎门不造次，百味珍羞拣口儿，喝婢呼奴换套儿，富贵荣华有人使，儿女团圆做了亲事。",
   "恁时节永远姻亲，方显的我慎终始。",
   "(下)。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "楚昭王疏者下船・折桂令",
  "author": "元・郑延玉",
  "body": [
   "我则道你趁横波一去无消息，可正是堂上糟糠，休猜做墙上泥皮。",
   "想当日船小江深，风高浪涌，云锁天地。",
   "若不是贤达妇三从四德，若不是仁孝子百顺千随。",
   "我则道夫妇分离，父子乖违，怎能彀再得团圆，还见这笑眼欢眉。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "赵匡义智娶符金锭・感皇恩",
  "author": "元・无名氏",
  "body": [
   "呀，便着你鱼水和谐，你也可稳放宽怀。",
   "我如今遣官媒，亲问候，便有个好音来。",
   "(赵匡义云)姐姐，你不知韩松那厮，倚逞权豪，他要强娶他哩。",
   "(正旦云)不妨事。",
   "(唱)遮莫他官居一品，怕甚么日转千街，凭着俺人力勇，弟兄多，便着他有非灾。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "出队子・科场不第，出落着个三不归。长安花酒价如泥，不信敲才主仗得，",
  "author": "元・顾德润",
  "body": [
   "似恁般情怀说向谁？。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "天仙令・晨妆罢，信步向庭隅。晓日楼台，秋千院宇。那更杜鹃催，春事",
  "author": "元・朱庭玉",
  "body": [
   "归欤。",
   "怜红爱紫无限心，空自长吁。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "终衮",
  "author": "元・无名氏《张协状元》",
  "body": [
   "似鸾凤和鸣，相应青云际。",
   "效鹣鹣比翼，鸳鸯双双戏。",
   "相怜相爱，拼尽老，与偎随。",
   "待把伊，托在心儿里。",
   "(末)神歌鬼舞，况我们村落皆欢喜，愿厮守终久于飞。",
   "(合)身赴月宫折桂枝，已两两同欢会，这些滋味美。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "生查子·东风不解愁",
  "author": "清・納蘭性德",
  "body": [
   "东风不解愁，偷展湘裙衩",
   "独夜背纱笼，影著纤腰画",
   "爇尽水沉烟，露滴鸳鸯瓦",
   "花骨冷宜香，小立樱桃下"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "孟德耀举案齐眉・笑歌赏",
  "author": "元・无名氏",
  "body": [
   "莫不是老嬷嬷欠供待的勤？莫不是小梅香有些的言词蠢？莫不是太夫人不曾与你相通问？莫不是妾身行做甚的多回避？莫不是老相公近新来有甚么别处分？你、你、你，只管里这等不邓邓含嗔忿。",
   "(梁鸿背叹科，云)早知如此挂人心，悔不当初莫相识。",
   "(正旦唱)。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "吕洞宾度铁拐李岳・仙吕/赏花时",
  "author": "元・岳伯川",
  "body": [
   "火炕里消息我敢踏，油镬内钱财我敢拿，则为我能跳塔快轮铡。",
   "今日向阴司折罚，(牛头云)我一叉跳下油镬去。",
   "(正末慌科，唱)望着番滚滚热油叉。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "眼儿媚·重见星娥碧海槎",
  "author": "清・納蘭性德",
  "body": [
   "重见星娥碧海槎，忍笑却盘鸦",
   "寻常多少，月明风细，今夜偏佳",
   "休笼彩笔闲书字，街鼓巳三挝",
   "烟丝欲袅，露光微泫，春在桃花"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "柳叶儿",
  "author": "元・杨景贤",
  "body": [
   "我又想当年时分，哭啼啼送你到江滨。",
   "今日个蒲帆百尺西风顺，休辞困，暂劳神，天那，谁承望血修书弄假成真？。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "喜迁莺・把离人愁助，闹西风翠竹苍梧。萧疏，粉墙外霜砧辘轳。一片秋",
  "author": "元・无名氏",
  "body": [
   "声厮断续，不知人心上苦。",
   "捱不过追魂铁马，更和那索命铜壶。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "同前",
  "author": "元・无名氏《宦门子弟错立身》",
  "body": [
   "哥哥听拜禀：它是伶伦一妇人，何须恁用心，谩终朝愁闷倾。",
   "若要和它同共枕，恐怕你爹行生嗔。",
   "那时节，悔无因，玷辱家门豪富人。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "尾声・幽寻不索桃源洞，高卧何须太华峰。但得个留心诵周孔，研朱墨训",
  "author": "元・汤舜民",
  "body": [
   "蒙，买犁锄务农，则消得赡老良田二三顷。",
   "桧轩为越中沙子正赋得指教三迁好住居，便栽培十丈深根蒂。",
   "能借取四时春造化，似生成一片翠屏帷。",
   "大刚是即景成规，直干攒楹密，横柯压栋齐。",
   "但将翰墨褒题，不假丹青绘饰。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "双调・沉醉东风秋夜旅思",
  "author": "元・张可久",
  "body": [
   "二十五点秋更鼓声，千三百里水馆邮程。",
   "青山去路长，红树西风冷。",
   "百年人半纸虚名，得似璩源阁上僧，午睡足梅窗日影。",
   "气球元气初包混沌，皮囊自喜囫囵。",
   "闲田地著此身，绝世虑萦方寸。",
   "圆满也不也烦人，一脚腾空上紫云，强似向红尘乱滚。",
   "琼珠台琪树暖青山鹧鸪，石床平红锦氍毹。",
   "云间萼绿华，梅下蓬莱屦。",
   "倚高寒满身香露，相伴仙人倒玉壶，月明夜瑶琴一曲。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "二郎神醉射锁魔镜・秃厮儿",
  "author": "元・无名氏",
  "body": [
   "火轮起金蛇乱走，鞭梢动骤损骅骝。",
   "我则见丝丝战尘遮了日头，早寻走路便搜求，无个缘由。"
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "二郎神醉射锁魔镜・仙吕/点绛唇",
  "author": "元・无名氏",
  "body": [
   "皆是天将英雄，地神簇捧，施英猛。",
   "凭着我变化神通，都降了十大魔君洞。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "铁拐李度金童玉女・玄鹤鸣",
  "author": "元・贾仲明",
  "body": [
   "遵径道，达玄妙，参祖师，习鸿宝。",
   "说杀你驾青牛，乘赤鲤，骖白鹿，骑黄鹤，怎如俺这宝马雕鞍最好？(铁拐云)你有甚快乐？快快跟我出家去。",
   "(正末云)我去不的。",
   "(唱)俺春风桃李，夏月葵榴，秋天金菊，冬雪江梅，一年中景物饶。",
   "料你那茅庵草舍，争似俺兰堂画阁？。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "感皇恩・冷落了金屋娇姝，寂寞了玉堂人物。这其间老了潘安，瘦了沈约，",
  "author": "元・汤舜民",
  "body": [
   "病了相如。",
   "怕不待勉强须臾，将惜身躯。",
   "磕不破玉马杓，解不开愁布袋，摔不碎闷葫芦。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "赵盼儿风月救风尘・落梅风",
  "author": "元・关汉卿",
  "body": [
   "则为你思虑，忒模糊。",
   "（周舍云）休书已毁了，你不跟我去待怎么？（外旦怕科）（正旦云）妹子休慌莫伯！咬碎的是假休书。",
   "（唱）我特故抄与你个休书。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "郑月莲秋夜云窗梦・鲍老儿",
  "author": "元・无名氏",
  "body": [
   "这搭儿再能见俺可憎，便医可了天样般相思病。",
   "我则道送人在长沙过了一生，今日个复对上临川令。",
   "鸾交凤友，莺期燕约，海誓山盟。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "虞美人·残灯风灭炉烟冷",
  "author": "清・納蘭性德",
  "body": [
   "残灯风灭炉烟冷，相伴唯孤影",
   "判教狼藉醉清樽，为问世间醒眼是何人",
   "难逢易散花间酒，饮罢空搔首",
   "闲愁总付醉来眠，只恐醒时依旧到樽前",
   " "
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "赵盼儿风月救风尘・村里迓鼓",
  "author": "元・关汉卿",
  "body": [
   "你也合三思而行，再思可矣。",
   "你如今年纪小哩，我与你慢慢的别寻个姻配。",
   "你可便宜，只守着铜斗儿家缘家计。",
   "也是你歹姐姐把衷肠话劝妹妹，我怕你受不过男儿气息。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "中吕・满庭芳自悟",
  "author": "元・刘时中",
  "body": [
   "花愁色胆，其中识破，就里曾参。",
   "雨云情到底皆虚泛，可暂休贪。",
   "撮艳处从今怕揽，闹篮中情愿妆憨。",
   "这其间实心谈，一任傍人笑俺，再不将风月话儿谈。",
   "狂踪怪胆，索一奉十，暮四朝三。",
   "喜孜孜笑脸儿将人赚，就里虚耽。",
   "白茫茫蓝桥水淹，黑洞洞袄庙云缄。",
   "赤紧地他愚滥，情疏意淡，再不将风月担儿担。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "张孔目智勘魔合罗・四门子",
  "author": "元・孟汉卿",
  "body": [
   "这的是严霜偏打枯根草，哎哟！正跌着我这残病腰。",
   "一会家疼一会家焦，想钱财莫不是无福消？一会家疼一会家焦，我将这神灵祷告。",
   "(李文道慌上)来到这庙也，哥哥在那里？(正末见科)(唱)。"
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "出队子北・心怀悒怏，无一时不盼望。尘蒙了锦瑟助凄凉，香尽了金炉空",
  "author": "元・荆干臣",
  "body": [
   "念想，弦断了瑶琴魂荡羡。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "刘夫人庆赏五侯宴・梅花酒",
  "author": "元・关汉卿",
  "body": [
   "他不住的唤奶奶，把泪眼揉开，走向前来，急慌忙扶策。",
   "众军卒一字摆，众官员两边排。",
   "俺孩儿是壮哉！可扑的跪在尘埃，可扑的跪在尘埃。",
   "（李从珂云）母亲，认的您孩儿王阿三么？（正旦云）谁是王阿三？（李从珂云）则我便是王阿三。",
   "（正旦与从珂做悲科）（正旦唱）。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "神奴儿大闹开封府・梁州第七",
  "author": "元・无名氏",
  "body": [
   "你莫不大街上逢着甚么驴马？你莫不小巷里撞着甚么车乘？则我这好言好语无心听。",
   "我将你来厮将厮领，同坐同行。",
   "眼睛儿般照觑，气命儿般看承。",
   "他行坐里陪着一个笑脸儿相迎，待飞腾则恨我肋下没稍翎。",
   "教我便来来去去脚似撺梭，我可便笃笃末末身如这翻饼，哎哟天那！好教我便慌慌速速手似捞铃。",
   "(云)想必哥哥等不得，回家去了。",
   "我且到家中看咱。",
   "(大旦上，云)院公你来了也。",
   "(正末慌科)(唱)则听的，叫咱一声。",
   "水浇般不由我浑身冷，我待悔来教我悔不定。",
   "(大旦云)神奴孩儿在那里？(正末唱)告嫂嫂休忙且暂停，(大旦云，做哭科)(正末唱)省可里两泪如倾。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "黄钟尾声・雁儿，你写西风曲似苍颉字，对南浦愁如宋玉词。恰春归，早",
  "author": "元・贯云石",
  "body": [
   "秋至，多寒温，少传示。",
   "恼人肠，聒人耳，碎人心，堕人志。",
   "雁儿，直被你撺掇出无限相思，偏怎生不寄俺有情分故人书半纸。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "幺篇・彤云布，朔风起，遍长空柳花飘棉。几朵早梅开放蕊，销金帐共谁",
  "author": "元・无名氏",
  "body": [
   "两个欢宴？独自个守炉边。",
   "想杀人也天，盼杀人也天，短命冤家，音稀信杳，莫不误约盟言。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "下山虎・向这芙蓉锦帐配合春娇，说不尽忄乞僧处有万般小巧。割舍了叶",
  "author": "元・王元和",
  "body": [
   "损枝残，蕊开瓣凋，早一树烟华春事了。",
   "是咱思算少，又被傍人一觅里搅。",
   "猛可里祆神庙顿然火烧，险把蓝桥水淹倒。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "保成公径赴渑池会・上小楼",
  "author": "元・高文秀",
  "body": [
   "早难道\"颠而不扶，危而不持\"。",
   "你若是谋动干戈，境内分崩，四方离析。",
   "(廉颇云)相如，你说不要起兵，依着你怎生是好？(正末唱)则不如叙彝伦，正纲常，躬行仁义，我则要效唐虞太平之治。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "亻刍梅香骗翰林风月・收尾",
  "author": "元・郑光祖",
  "body": [
   "俺小姐情坚如碧玉簪，心赤如黄金凤，意你不别你个白衣相。",
   "（白敏中云）小姐还有甚么分付小生来？（正旦云）呀！争些儿反来忘了。",
   "（唱）两件事教先生行拜上，（白敏中云）那两件事那？（正旦云）小姐道，你若是凤墀得志，雁塔题名，可早来呵！（唱）做俺这有情的相国状元郎。",
   "（白敏中云）那一件却是甚么？（正旦云）则不要叫人骂你。",
   "（唱）骂你做薄幸的长安少年党。",
   "（下）。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "辅成王周公摄政・双调/新水令",
  "author": "元・郑光祖",
  "body": [
   "当初被流言千里地定了江淮，更怕为臣的坐观成败。",
   "今日却能够见公侯伯子男，呵，叹自己年月日时胎。",
   "当初把福变为灾，今日否极也却生泰。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "布袋和尚忍字记・尧民歌",
  "author": "元・郑延玉",
  "body": [
   "呀！那里也脱空神语浪舌佛，我倒做了个庄子先生鼓盆歌。",
   "师父也不叟你升天去后我如何。",
   "(云)罢、罢、罢，要我性命做甚么，(唱)我则索割舍了残生撞松棵。",
   "(撞松科)(布袋上，云)刘均佐，你省了也么？(正末云)师父，你徒弟省了也。",
   "(布袋云)徒弟，今日正果已成，才信了也呵。",
   "(正末唱)说的是真也波哥，皆因忍字多，(云)师父，你再一会儿不来呵，(唱)这坨儿连印有三十个。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "幺",
  "author": "元・杨景贤",
  "body": [
   "徒弟每诸般劝，师父独自慌。",
   "俺女兵不用猴为将，女王岂用猪为相？如今女娘都爱唐三藏。",
   "你休痴迷修行今世有来生，我则待长江后浪催前浪。",
   "(女王做扯唐僧科)这正殿上不是说话的去处，俺两个后殿里去来。",
   "(唐僧云)孙悟空救我。",
   "(下)(行者云)我自也顾不得。",
   "(诸女做捉番孙、猪、沙发科)(下)(女王扯唐僧上，云)唐僧，我和你成其夫妇，你则今日就做国王，如何？(唐僧云)善哉！我要取经哩。",
   "(发科)(女王唱)。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "刘玄德醉走黄鹤楼・金盏儿",
  "author": "元・无名氏",
  "body": [
   "你道是张翼德气昂昂，性儿刚，(刘封云)俺三叔叔张飞，十八骑人马，在那当阳桥上，喝了一声，桥塌三横水逆流，唬的曹兵倒退三十里远。",
   "(正末唱)在那当阳桥喝退了曹丞相，据着他一冲一撞卖弄高强。",
   "(刘封云)凭着俺三叔叔坐下乌骓马，手中丈八矛，万夫不当之勇。",
   "(正末唱)倚仗着当三军不刺剌乌骓骑，敌万夫光灿灿丈八点钢枪。",
   "(刘封云)俺三叔安喜县鞭督邮，又在石亭驿中，将袁祥提起腿，掼的花红脑子出来。",
   "不妨事，父亲走一遭去。",
   "(正末唱)你休卖弄安喜县鞭督邮，石亭驿摔袁祥。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "海门张仲村乐堂・双调/新水令",
  "author": "元・无名氏",
  "body": [
   "同知着洒家下班去不唤再休来，便有那包龙图把他也难赛。",
   "我则怕那王伯当，泼乔才，久后生心，(云)干我甚的事来？(唱)知他是和尚在钵盂在？。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "朱砂担滴水浮沤记・沽美酒",
  "author": "元・无名氏",
  "body": [
   "并不曾见烈纸钱将咱祭，倒去熬粥汤送他吃，元来你个水性婆娘易转移。",
   "干着我生受了半世，眼睁睁看你做歹人妻。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "离亭宴煞・楚阳台步步荆榛隘，担阁下两厢情色。相思卷何年结束，糊突",
  "author": "元・无名氏",
  "body": [
   "谜甚日明白。",
   "传示你权宁耐，切莫把鲰生见责。",
   "是送暖的意儿虚，非偷香的性儿歹。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "刘晨阮肇误入桃源・脱布衫",
  "author": "元・王子一",
  "body": [
   "光闪闪贝阙珠宫，齐臻臻碧瓦朱甍。",
   "宽绰绰罗帏绣栊，郁巍巍画梁雕栋。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "幺・谁承望擒虎将军至，拥貔貅百万雄师。惊散了玉树歌，推上云阳市。黄天",
  "author": "元・汤舜民",
  "body": [
   "何事，流泪洒胭脂。"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {
  "title": "争报恩三虎下山・煞尾",
  "author": "元・无名氏",
  "body": [
   "那妮子又不知三年乳哺恩，那里晓怀耽十月胎。",
   "他将我这一双业种阴图害，可正是拾得孩儿落的摔。",
   "(下)。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "送道士薛季昌還山",
  "author": "唐・明皇帝",
  "body": [
   "洞府修真客，衡陽念舊居。",
   "將成金闕要，願奉玉清書。",
   "雲路三天近，松溪萬籟虛。",
   "猶期傳祕訣，來往候仙輿。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "郑孔目风雪酷寒亭・菩萨梁州",
  "author": "元・杨显之",
  "body": [
   "汤水儿或少或多，干粮儿一个两个，米面儿一撮半撮，舍贫的姐姐哥哥。",
   "他娘在谁敢把气儿呵？糖堆里养的偌来大，如今风雪街忍着十分饿。",
   "他不爱惜倒折挫，常言道：灰不如火热。",
   "多敢怕我信口开合。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "李亚仙花酒曲江池・仙吕/赏花时",
  "author": "元・石君宝",
  "body": [
   "赴选皇都将俺学业酬，正是男儿得志秋。",
   "题金榜，占鳌头，这万言策须当应口，直着那状元名喧满凤凰楼。",
   "(同张千下)。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "雁渔锦",
  "author": "元・高明《蔡伯喈琵琶记》",
  "body": [
   "思量，那日离故乡。",
   "记临歧送别多惆怅，携手共那人不厮放。",
   "教他好看承，我爹娘，料他每应不会遗忘。",
   "闻知饥与荒，只怕捱不过岁月难存养。",
   "若望不见信音却把谁倚仗。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "辅成王周公摄政・中吕/粉蝶儿",
  "author": "元・郑光祖",
  "body": [
   "想俗众口嗷嗷，苦残殷纣王无道，昨日致师于牧野商郊，一戎衣，天下定，宣明王教。",
   "怎生便凤返丹霄！哭一声痛连心血流七窃！。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "玉箫女两世姻缘・油葫芦",
  "author": "元・乔吉",
  "body": [
   "有那等滴溜的猱儿不觅钱，他每都错怨天，情知那干村沙怎做的玉天仙。",
   "那里有野鸳鸯眼秃刷的在黄金殿，则这伙木鹦哥嘴骨邦的在仙音院。",
   "搽-个红颊腮似赤马猴，舒着双黑爪老似通臂猿，抱着面紫檀槽弹不的昭君怨，凤凰箫吹不出鹧鸪天。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "黑旋风双献功・随尾",
  "author": "元・高文秀",
  "body": [
   "他、他、他，也会一骑马双驮着走，怎知俺两板斧劈下了头。",
   "这都是亲身作业亲身受，不枉了立军状的山儿果应了口。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "一・谩把猾，枉占奸，布衫领安上难寻绽。头巾顶攒就宜新裹，钅敖子饼",
  "author": "元・董君瑞",
  "body": [
   "热时赶热翻。",
   "消息汤着犯，你便辘轳井口，直打的泉干。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "唐明皇秋夜梧桐雨・古鲍老",
  "author": "元・白朴",
  "body": [
   "屹剌剌撒开紫檀，黄翻绰向前手拈板。",
   "低低的叫声玉环，太真妃笑时花近眼。",
   "红牙箸趁五音、击着梧桐案，嫩枝柯犹未干、更带着瑶琴音泛，卿呵，你则索出几点琼珠汗。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "尾・比我这泪珠儿何日干？愁眉甚日舒？将普天下烦恼收拾聚，也似不得",
  "author": "元・王氏",
  "body": [
   "苏卿半日苦。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "包待制智赚灰栏记・黄钟/醉花阴",
  "author": "元・李行甫",
  "body": [
   "头上雪何曾住半霎？摧林木狂风乱刮。",
   "我这更耽烦恼受嗟呀，走的来力尽筋乏，又加上些脓撼撼的棒疮发。",
   "(薛净云)着我们当这等苦差，还不走哩。",
   "(做打科)(正旦唱)怎当这嗔忿忿吖吖，但走的慢行的迟，他可便舍命的打。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "唐明堂樂章 商音",
  "author": "唐・則天皇后",
  "body": [
   "律中夷則，序應收成。",
   "功宣建武，義表惟明。",
   "爰申禮奠，庶展翹誠。",
   "九秋是式，百穀斯盈。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "苏子瞻醉写赤壁赋・仙吕/点绛唇",
  "author": "元・无名氏",
  "body": [
   "想伊每十载寒窗，平生指望，登春榜。",
   "今日便怀宝迷邦，谁肯待举直错诸枉。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "散家财天赐老生儿・落梅风",
  "author": "元・武汉臣",
  "body": [
   "你道他本贤达，能孝顺，只我个老无知偏生嗔忿。",
   "谁着他信夫妇的情，就忘了我养育的恩？(云)引孙，你对他说去，都不干我事。",
   "(唱)这都是他自做来有家难奔。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "一锭银・心友每相邀列着管弦，却子待欢解动凄然。十分酒十分悲怨，却",
  "author": "元・关汉卿",
  "body": [
   "不道怎生般消遣。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "乌夜啼・运坤火乾天雾，要殷勤守玉炉。炼真汞成至宝，烹白雪似收支金",
  "author": "元・无名氏",
  "body": [
   "煅黄芽做地母，饮刀圭习真土。",
   "将龙虎来擒伏，呼风唤雨。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "双调・风入松忆旧",
  "author": "元・赵天锡",
  "body": [
   "怨东风不到小窗纱，枉辜负荏苒韶华。",
   "泪痕湮透香罗帕，凭阑干望夕阳西下。",
   "恼人情愁闻杜宇，凝眸处数归鸦。",
   "唤丫鬟休买小桃花，一任教云鬓堆鸦。",
   "眉儿淡了不堪画，愁和闷将人禁加。",
   "咫尺间那人在家，浑一似阻天涯。",
   "记前日席上泛流霞，正遇着宿世冤家。",
   "自从见了心牵挂，心儿里撇他不下。",
   "梦儿里常常见他，说不的半星儿话。",
   "忆刘郎当日到仙苑，使自家心绪悬悬。",
   "眼儿里见了心儿里恋，口儿里不敢胡言。",
   "朝夕里只得告天，何时得再团圆？。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "后庭花・直须胜赏，想人生如转蓬。此夕休虚废，幽欢不易逢。快吟胸，",
  "author": "元・朱庭玉",
  "body": [
   "虹吞鲸吸，长川流不供。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "闺怨佳人拜月亭・混江龙",
  "author": "元・关汉卿",
  "body": [
   "许来大中都城内，各家烦恼各家知。",
   "且说君臣分散，想俺父子别离。",
   "遥想着尊父东行何日还？又随着车驾、车驾南迁甚日回？（夫人云了）（正旦做嗟叹科）这青湛湛碧悠悠天也知人意，早是秋风飒飒，可更暮雨凄凄。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "怨世",
  "author": "东方朔",
  "body": [
   "世沉淖而难论兮，俗岒峨而嵾嵯。",
   "清泠泠而歼灭兮，溷湛湛而日多。",
   "枭鸮既以成群兮，玄鹤弭翼而屏移。",
   "蓬艾亲入御于床笫兮，马兰踸踔而日加。",
   "弃捐药芷与杜衡兮，余柰世之不知芳何？",
   "何周道之平易兮，然芜秽而险戏。",
   "高阳无故而委尘兮，唐虞点灼而毁议。",
   "谁使正其真是兮，虽有八师而不可为。",
   "皇天保其高兮，后土持其久。",
   "服清白以逍遥兮，偏与乎玄英异色。",
   "西施媞媞而不得见兮，嫫母勃屑而日侍。",
   "桂蠹不知所淹留兮，蓼虫不知徙乎葵菜。",
   "处湣湣之浊世兮，今安所达乎吾志。",
   "意有所载而远逝兮，固非众人之所识。",
   "骥踌躇于弊輂兮，遇孙阳而得代。",
   "吕望穷困而不聊生兮，遭周文而舒志。",
   "宁戚饭牛而商歌兮，桓公闻而弗置。",
   "路室女之方桑兮，孔子过之以自侍。",
   "吾独乖剌而无当兮，心悼怵而耄思。",
   "思比干之恲恲兮，哀子胥之慎事。",
   "悲楚人之和氏兮，献宝玉以为石。",
   "遇厉武之不察兮，羌两足以毕斮。",
   "小人之居势兮，视忠正之何若？",
   "改前圣之法度兮，喜嗫嚅而妄作。",
   "亲谗谀而疏贤圣兮，讼谓闾娵为丑恶。",
   "愉近习而蔽远兮，孰知察其黑白？",
   "卒不得效其心容兮，安眇眇而无所归薄。",
   "专精爽以自明兮，晦冥冥而壅蔽。",
   "年既已过太半兮，然埳轲而留滞。",
   "欲高飞而远集兮，恐离罔而灭败。",
   "独冤抑而无极兮，伤精神而寿夭。",
   "皇天既不纯命兮，余生终无所依。",
   "愿自沉于江流兮，绝横流而径逝。",
   "宁为江海之泥涂兮，安能久见此浊世？"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "崔莺莺夜听琴(第二本)・醉春风",
  "author": "元・王实甫",
  "body": [
   "今日个东阁玳筵开，煞强如西厢和月等。",
   "薄衾单枕有人温，早则不冷、冷。",
   "受用足宝鼎香浓，绣帘风细，绿窗人静。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "随煞・休言功行何时就，谁道玄门不可投？人我场中枉驰骤，苦海波中早",
  "author": "元・邓学可",
  "body": [
   "回首。",
   "说甚么四大神游，三岛十洲。",
   "这神仙隐迹埋名，敢只在目前走。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "河广",
  "author": "詩經",
  "body": [
   "谁谓河广？一苇杭之。谁谓宋远？跂予望之。",
   "",
   "谁谓河广？曾不容刀。谁谓宋远？曾不崇朝。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "阀阅舞射柳蕤丸记・七弟兄",
  "author": "元・无名氏",
  "body": [
   "明晃晃摆着利物，齐臻臻列着这士卒。",
   "武将每一个个有机谋，施逞那武艺高强处。",
   "我恰才穿杨射柳定赢输，上雕鞍骤马当先去。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "鬼三台",
  "author": "元・杨景贤",
  "body": [
   "则说那费长房，法律强，化龙杖，每翱翔。",
   "昏澄澄，白茫茫，桑田变海海为桑。",
   "休恐惧，莫惊慌。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "草桥店梦莺莺(第四本)・东原乐",
  "author": "元・王实甫",
  "body": [
   "想思事，一笔勾，早则展放从前眉儿皱，美爱幽欢恰动头。",
   "既能够，张生，你觑兀的般可喜娘庞儿也要人消受。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "亭前柳",
  "author": "元・无名氏《张协状元》",
  "body": [
   "张协自到京都，及第也没音书。",
   "何须得问神道，已成虚。",
   "(旦)告神奴今只得去。",
   "(合)近日来，怕迤逦见人疏。",
   "(旦)。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "天下乐・几曾见翠袖殷勤捧玉钟，三冬，节序穷，老廉颇岂堪施会勇。桑",
  "author": "元・顾德润",
  "body": [
   "些柴弓悬臂间，纸糊锹逼手中，每日价干和哄。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "赵盼儿风月救风尘・商调/集贤宾",
  "author": "元・关汉卿",
  "body": [
   "咱这几年来待嫁人心事有，听的道谁揭债、谁买休。",
   "他每待强巴结深宅大院，怎知道摧折了舞榭歌楼？一个个眼张狂。",
   "似漏了网的游鱼，一个个嘴卢都似跌了弹的斑鸠。",
   "御园中可不道是栽路柳，好人家怎容这等娼优？他每初时间有些实意，临老也没回头。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "帝京篇十首 十",
  "author": "唐・太宗皇帝",
  "body": [
   "以茲遊觀極，悠然獨長想。",
   "披卷覽前蹤，撫躬尋既往。",
   "望古茅茨約，瞻今蘭殿廣。",
   "人道惡高危，虛心戒盈蕩。",
   "奉天竭誠敬，臨民思惠養。",
   "納善察忠諫，明科慎刑賞。",
   "六五誠難繼，四三非易仰。",
   "廣待淳化敷，方嗣云亭響。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "吕洞宾三度城南柳・幺",
  "author": "元・谷子敬",
  "body": [
   "学长生千岁柏，不老万年松。",
   "我将你柳向玉堂栽，花傍瑶池种。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "张君瑞闹道场(第一本)・甜水令",
  "author": "元・王实甫",
  "body": [
   "老的小的，村的俏的，没颠没倒，胜似闹元宵。",
   "稔色人儿，可意冤家，怕人知道，看时节泪眼偷瞧。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "梁州・图得些风月情长沾肺腑，赢得些是非尘不到襟裾。分明记得经行处。",
  "author": "元・汤舜民",
  "body": [
   "蹑苍梧冲飞彩凤，扣扶桑撼动金乌，登雁宕惊潜木客，涉龙门啸起天吴。",
   "又不比悠悠泛一叶黄芦，飘飘跨两足青凫。",
   "散诞似李元贞松阴内干禄求名，逍遥似赵师雄梅花下开樽按舞，廓落似淳于棼槐柯上架室安居。",
   "遮莫五湖，四渎。",
   "钓竿直拂珊瑚树，天地阔渺无路。",
   "撞入仙翁白玉壶，知他是紫府也那清都。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "地藏王证东窗事犯・游四门",
  "author": "元・孔文卿",
  "body": [
   "只怕不知祸起在萧墙！你待兴心乱朝纲，诈传宣赚离我边庭亡。",
   "原来恁没世界有官方，暗暗将刀斧列在阶旁。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "冤报冤赵氏孤儿・红芍药",
  "author": "元・纪君祥",
  "body": [
   "须二十年报仇的主人公，恁时节才称心胸。",
   "只怕我迟疾死后一场空。",
   "(程婴云)老宰辅，你精神还强健哩。",
   "(正末唱)我精神比往日难同，闪下这小孩童怎见功？你急切里老不的形容，正好替赵家出力做先锋。",
   "(带云)程婴，你只依着我便了。",
   "(唱)我委实的捱不彻暮鼓晨钟。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "桐廬員外出勳德之門以儒素爲業泊來儀於京闕久飛譽於縉紳今則膺鳳詔於朝端奏牛刀於江表會承旨尚書賦瓊章於丹地餞蘭櫂於清流愚雖不才敢繼其作",
  "author": "宋・扈蒙",
  "body": [
   "王謝高門江鮑才，東遊何用更裴回。",
   "弦歌好就吳鄉拜，簪組初從魏闕來。",
   "清酒一尊携瀲灩，舊詩千首貯瓊瑰。",
   "健颿輕櫂須行樂，莫效當時庾信哀。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "月明和尚度柳翠・雁儿落",
  "author": "元・李寿卿",
  "body": [
   "你可便罢追陪百二行，年纪到三十上。",
   "何不去步瑶台十二层，离苦海三千丈？。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "好酒赵元遇上皇・那吒令",
  "author": "元・高文秀",
  "body": [
   "前日是瞎王三上梁，（孛老云）昨日在那里吃酒来？（正末唱）昨日是村李胡赛羊，（孛老云）今日又醉了，可是那里吃酒来？（正末唱）今日是酒刘洪贵降。",
   "（搽旦云）好朋友都是伙不上台盘的狗油东西。",
   "（李老云）你这厮，每日则吃酒，不做生理，怎么是好？（正末唱）我本待不出来，他每都来相访，怎当他相领相将？。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "崔莺莺夜听琴(第二本)・叨叨令",
  "author": "元・王实甫",
  "body": [
   "浮沙羹，宽片粉添些杂糁。",
   "酸黄齑。",
   "烂豆腐休调啖，万余斤黑面从教暗，我将这五千人做一顿馒头馅。",
   "是必休溪了也么哥！休误了也么哥！包残余肉把行盐蘸。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "铁拐李度金童玉女・采茶歌",
  "author": "元・贾仲明",
  "body": [
   "你着我戏仙瓢，过金桥，怎肯生拆散碧桃花下凤鸾交？伴着你个铁拐云游同去也，可不闪的俺玉人何处教吹箫？。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "草桥店梦莺莺(第四本)・金蕉叶",
  "author": "元・王实甫",
  "body": [
   "\"我着你但去处行监坐守，谁着你拖逗的胡行乱走？\"若问着此一节呵如何诉休？你便索与他个\"知情\"的犯由。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "包待制三勘蝴蝶梦・太平令",
  "author": "元・关汉卿",
  "body": [
   "空教我哭啼啼自敦自摔，百般的唤不回来。",
   "也是我多灾多害，急煎煎不宁不耐。",
   "（云）石和孩儿呵！（王三上，应云）我在这里！（正旦唱）教我左猜、右猜，不知是那里应来？呀，莫不是山精水怪！。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "清江引・见了也泪淹衫袖湿，这的是傍州例。黄金少甚藏，白酒须当醉，",
  "author": "元・张碧山",
  "body": [
   "浇奠杀九泉无半米。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "沉醉东风・从教师诗书颇习，参释道性命根基。杏林中作生涯，橘井内为",
  "author": "元・范康",
  "body": [
   "活计。",
   "炼玄元象帝幽微。",
   "有一日三岛十洲将名姓题，抵多少一官半职。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "鸡鸣",
  "author": "詩經",
  "body": [
   "鸡既鸣矣，朝既盈矣。匪鸡则鸣，苍蝇之声。",
   "",
   "东方明矣，朝既昌矣。匪东方则明，月出之光。",
   "",
   "虫飞薨薨，甘与子同梦。会且归矣，无庶予子憎。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "昊天塔孟良盗骨・雁儿落",
  "author": "元・朱凯",
  "body": [
   "俺这里便骂了人也谁敢应？(杨景云)敢打人么？(正末唱)俺这里便打了人也无争竞。",
   "(杨景云)敢劫人么？(正末唱)俺这里便劫了人也没罪名。",
   "(杨景云)敢杀了么？(正末唱)俺这里便杀了人也不偿命。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "得胜令・谁念我当日跳檀溪，救先主出重围？谁念我单刀会随着关羽？谁",
  "author": "元・刘时中",
  "body": [
   "念我美良川扶持敬德？若论着今日，索输与这驴群队！果必有征敌，这驴每怎用的？。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "冯玉兰夜月泣江舟・浪里来煞",
  "author": "元・无名氏",
  "body": [
   "我见他怎恕饶，他见我难推调。",
   "怕不来一问一承招，只俺那山海般仇恨须当报。",
   "再不用荆条细拷，拚的亲手儿也还上一千刀！(同下)。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "降桑椹蔡顺奉母・得胜令",
  "author": "元・刘唐卿",
  "body": [
   "呀！他道是冬寒月变做春天，半夜里雪花舞雨涟涟。",
   "枯桑上生棋子，我醒来时把梦圆。",
   "走到那山前，桑椹子都生遍。",
   "摘将来新鲜，俺母亲吃了体自然。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "急三桅",
  "author": "元・徐田臣《杀狗记》",
  "body": [
   "(小生)败风俗，歹言语怎听？没家法，坏乱人伦。",
   "(净、丑)我两个替你告如何？(小生)逞奸狡，刁唆人告论，君子貌，小人心！。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "薛仁贵荣归故里・迓鼓儿",
  "author": "元・张国宾",
  "body": [
   "他、他、他，从小里，他、他、他，不务老实。",
   "便把那枪儿棒儿强温习，偏不肯拽把扶犁。",
   "常只是抛了农器演武艺，就压着那-班一辈。",
   "与他副弓箭能射，与他匹劣马能骑，更使着一条方天画戟。",
   "(薛仁贵云)他那一双父母，如今有甚么人侍养他？你说一遍，我是听咱。",
   "(正末云)他那老两口儿年纪高大，则有的这个孩儿，可又投军去了十年光景，音信皆无。",
   "做父母的在家少米无柴，眼巴巴不见回来，好不苦也。",
   "(唱)。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "四・写的来狂又古，颠又实，出乎其类拔乎萃。软如杨柳和风舞，硬似长",
  "author": "元・马致远",
  "body": [
   "空霹雳摧。",
   "真堪惜！沉沉着着，曲曲直直。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "随尾",
  "author": "元・杨景贤",
  "body": [
   "玉鞭紧紧催金革占，火焰山千难万险。",
   "早求法力到西天，莫把残躯葬山崦。",
   "(下)。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "关张双赴西蜀梦・幺篇",
  "author": "元・关汉卿",
  "body": [
   "哥哥你自暗约，这事非小可。",
   "投至的曹操、孙权，鼎足三分，社稷山河。",
   "筋厮锁，俺三个，同行同坐，怎先亡了咱弟兄两个？。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "李太白匹配金钱记・雁儿落",
  "author": "元・乔吉",
  "body": [
   "今日个画堂中设酒肴。",
   "花烛下同喧笑。",
   "高擎着合卺杯，齐动着合欢乐。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "于中好·咏史",
  "author": "清・納蘭性德",
  "body": [
   "马上吟成促渡江，分明闲气属闺房",
   "生憎久闭金铺暗，花冷回心玉一床",
   "添哽咽，足凄凉",
   "谁教生得满身香",
   "只今西海年年月，犹为萧家照断肠"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "四丞相高会丽春堂・唐兀歹",
  "author": "元・王实甫",
  "body": [
   "端的是万万载千秋圣主昌，地久天长。",
   "老臣怎敢道不谦让？可是当也波当。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "殿前欢・赛唐虞，大元至大古今无。架海梁对着檠天柱，玉带金符。庆风",
  "author": "元・贯云石",
  "body": [
   "云会龙虎，万户侯千钟录，播四海光千古。",
   "三阳交泰，五谷时熟。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "尉迟恭单鞭夺槊・青哥儿",
  "author": "元・关汉卿",
  "body": [
   "呀，据着你英雄、英雄慷慨，堪定那社稷、社稷兴衰。",
   "凭着你文武双全将相才，则要你扫荡云霾，肃靖尘埃。",
   "将勇兵乖，那其间挂印悬牌，便将你一日转千阶，非优待。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "庆青春",
  "author": "元・徐田臣《杀狗记》",
  "body": [
   "(小生上)芳草铺茵，夭桃喷火，丝丝细柳拖金。",
   "捻指光阴，使人无限伤情。",
   "归家暖阁排宴饮，才过了除夕，正遇元宵，游赏花灯，又早清明。",
   "感叹孩儿孝顺情，痛思父母泪偷零。",
   "去年记得兄和弟，同到坟前拜祖亲。",
   "今岁里，赶出门，哥哥豪富我身贫。",
   "正是坟前不敢高声哭，恐怕人闻也断魂。",
   "今日却是清明佳节，孙荣别无孝顺，寻得一陌纸钱，叫化得半瓶酒在此，不免去祖宗父母坟前拜扫，聊表孙荣穷孝顺。",
   "说话之间，已到父母坟前。",
   "(哭介)。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "东瓯令",
  "author": "元・施惠《幽闺记》",
  "body": [
   "(旦上)我那娘！心如醉，泪交流。",
   "去远家尊绝信久，途中母子生离别。",
   "这苦如何受？一重愁翻做两重愁，是我命合休。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "苏子瞻风雪贬黄州・小桃红",
  "author": "元・费唐臣",
  "body": [
   "想西湖风月绕苏堤，尚觉王孙贵，银烛高烧照珠翠。",
   "如今百事成非，江山不管春憔悴。",
   "想金勒马嘶，玉楼人醉，依旧画桥西。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "呆骨朵・这贼每也有难堪处，怎禁他强盗每追逐。要饭钱排日支持，索赍",
  "author": "元・刘时中",
  "body": [
   "发无时横取。",
   "奈表里通同做，有上下交征去。",
   "真乃是源清流亦清，休今后人除弊不除。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "忠义士豫让吞炭・哪吒令",
  "author": "元・杨梓",
  "body": [
   "为甚魏柜子，但言的便允？为甚韩康子，但索的便肯？为共赵襄子不辞而便奔？见他外面而服，非咱中心臣顺，都是些假热佯亲。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "酬郭先輩",
  "author": "宋・徐鉉",
  "body": [
   "太原郭夫子，行高文炳蔚。",
   "弱齡負世譽，一舉游月窟。",
   "仙籍第三人，時人故稱屈。",
   "昔余吏西省，傾蓋名籍籍。",
   "及我竄羣舒，向風心鬰鬰。",
   "歸來暮江上，雲霧一披拂。",
   "雷雨不下施，猶作池中物。",
   "念君介然氣，感時思奮發。",
   "示我數篇文，與古爭馳突。",
   "綵縟粲英華，理深刮肌骨。",
   "古詩尤精奧，史論皆宏拔。",
   "舉此措諸民，何憂民不活。",
   "吁嗟吾道薄，與世長迂闊。",
   "顧我徒有心，數奇身正絀。",
   "論兵屬少年，經國須儒術。",
   "夫子無自輕，蒼生正愁疾。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "庆春泽",
  "author": "宋・张先",
  "body": [
   "飞阁危桥相倚。",
   "人独立东风，满衣轻絮。",
   "还记忆江南，如今天气。",
   "正白苹花，绕堤涨流水。",
   "寒梅落尽谁寄。",
   "方春意无穷，青空千里。",
   "愁草树依依，关城初闭。",
   "对月黄昏，角声傍烟起。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "七娘子引",
  "author": "元・刘唐卿《白兔记》",
  "body": [
   "(生上)蒙君不弃我身寒，今日里喜结良缘。",
   "(旦上)一朵奇花今有主，姻缘感谢苍天。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "保成公径赴渑池会・尧民歌",
  "author": "元・高文秀",
  "body": [
   "呀，你说道面搽红粉的不便宜，则我这六阳会首不相亏。",
   "人言为信永无称，昧己瞒心把天欺。",
   "知也波知，与皇家作柱石，不比儿曹辈。",
   "(赵成公云)则今日点就百十骑人马，都要轻弓短箭，善马熟人，便索赴渑池会，走一遭去。",
   "(廉颇云)主公先行，某随后领大势雄兵，接应主公去。",
   "(正末云)主公放心也。",
   "(唱)。"
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "包待制三勘蝴蝶梦・叨叨令",
  "author": "元・关汉卿",
  "body": [
   "叫化的些残汤剩饭，那里有重罗面！你不想堂食玉酒琼林宴，想当初长枷钉出中牟县，却不道布衣走上黄金殿。",
   "兀的不苦杀人也么哥！兀的不苦杀人也么哥！告你个提牢押狱行方便。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "月明和尚度柳翠・挂玉钩",
  "author": "元・李寿卿",
  "body": [
   "我则听的檀板轻敲绕画梁，将我这慧眼忙开放，却原来一曲莺声啭绿杨，越引的魂飘荡。",
   "这的是弟子歌，又不是猱儿唱，饶他便铁石般怪心，也则索寸断柔肠。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "山神庙裴度还带・牧羊关",
  "author": "元・关汉卿",
  "body": [
   "念小生居在白屋，处于布衣，多感谢长老慈悲！为小生缘薄，承吾师厚礼；见一日无空过，整三顿饱斋食。",
   "你今日患难哀怜我，久以后得峥嵘答报你。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "功臣宴敬德不伏老・金蕉叶",
  "author": "元・杨梓",
  "body": [
   "我、我、我便有几颗头敢违宣抗敕？一句话恼得从头便至尾。",
   "怎着我这胡老子安邦定国？你何不去教李道宗相持来对垒？。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "赵盼儿风月救风尘・鹊踏枝",
  "author": "元・关汉卿",
  "body": [
   "俺不是卖查梨，他可也逞刀锥；一个个败坏人伦，乔做胡为。",
   "（云）但来两三遭，问那厮要钱，他便道：\"这弟子敲馒儿哩！\"（唱）但见俺有些儿不伶俐，便说是女娘家要哄骗东西。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "逍遥乐・非是把盟言辜负，多应是身事牵萦，致令的佳期间阻。抛撇下红",
  "author": "元・无名氏",
  "body": [
   "粉娇姝，自别来消息全无。",
   "怎能够萧娘一纸书，多应是水底沉鱼。",
   "好教我难捱白昼，最怕黄昏，几遍嗟吁。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "黄钟・侍香金童",
  "author": "元・关汉卿",
  "body": [
   "春闺院宇，柳絮飘香雪。",
   "帘幕轻寒雨乍歇，东风落花迷粉蝶。",
   "芍药初开，海棠才谢。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "争报恩三虎下山・天下乐",
  "author": "元・无名氏",
  "body": [
   "您做事可甚人不知鬼不觉？他把这房也波门房门可早关闭了，你可便走将来轻将这门扇敲。",
   "(云)你到这稍房儿里去做甚么？(搽旦云)我在这里拌草料喂马来。",
   "(正旦唱)这取又无他那盛料盆，又无那喂马槽，妹子也，你可甚空房中来和草？(搽旦云)他在这里正是贼！(正旦云)你道他是贼，知他谁是贼！(唱)。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "醉思乡王粲登楼・那吒令",
  "author": "元・郑光祖",
  "body": [
   "我怎肯空隐在严子陵钓滩，我怎肯甘老在班定远玉关。",
   "（带云）大丈夫仗鸿鹄之志，据英杰之才。",
   "（唱）我则待大走上韩元帅将坛。",
   "我虽贫呵乐有余，便贱呵非无惮，可难道脱不的二字饥寒？。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "寄生草・他生的倾城貌，绝代容。弄春情漏泄的秋波送，秋波送搬斗的春",
  "author": "元・于伯渊",
  "body": [
   "山纵，春山纵勾引的芳心动。",
   "鬓花腮粉可人怜，翠衾鸳枕和谁共。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "降桑椹蔡顺奉母・滚绣球",
  "author": "元・刘唐卿",
  "body": [
   "我焚香祭赛天，不觉的睡似痴，见一位增福神降临凡世。",
   "他说道半夜间响一阵春雷，他道是纷纷雪乱飞，淙淙雨下的疾。",
   "两般儿委实奇异，我醒来时心内猜疑。",
   "到天明我走到山间下，谁承望园内开花结果肥，椹子皆垂。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "苏子瞻醉写赤壁赋・驻马听",
  "author": "元・无名氏",
  "body": [
   "春事狼藉，桃李东风蝶梦回，离愁索系，关山夜月杜鹃啼。",
   "催促江水自奔驰，翰林风月教谁替。",
   "谩伤悲，滴不尽多少哭雄泪。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "刘晨阮肇误入桃源・太平令",
  "author": "元・王子一",
  "body": [
   "但得你天公指教，抵多少晏平仲善与人交。",
   "你若肯扶倾济弱，我可便回嗔作笑。",
   "一会价记着想着念着，(带云)休道是人呵，(唱)马也有垂缰之报。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "逞风流王焕百花亭・风人松",
  "author": "元・无名氏",
  "body": [
   "高常彬差使洛阳时，有多少过犯公私。",
   "克军需盗把官钱使，恋烟花艳质娇姿。",
   "强夺人他妻我妇，成就他燕子莺儿。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "遼東山夜臨秋",
  "author": "唐・太宗皇帝",
  "body": [
   "煙生遙岸隱，月落半崖陰。",
   "連山驚鳥亂，隔岫斷猿吟。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "山神庙裴度还带・感皇恩",
  "author": "元・关汉卿",
  "body": [
   "他显耀些饱暖衣食，卖弄些精细伶俐。",
   "怎听他假文谈，胡答应，强支持！出身于市井，便显耀雄威；则待要邀些名誉，施些小惠，要些便宜。",
   "（长老云）真乃君子、小人不同也！（正末唱）。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "双调・水仙子书所见",
  "author": "元・任昱",
  "body": [
   "闲开翠牖近沧州，忽见蛾眉出舵楼，来陪燕席翻红袖。",
   "舞春风宜佐酒，匆匆催去难留。",
   "解湘水烟中佩，驾浔阳江上舟，瘦损风流。",
   "泛舟牙樯绵缆过沙汀，皓齿青蛾捧玉觥，银塘绿水磨铜镜。",
   "船如天上行，人传李郭仙名。",
   "水晶寒瓜初破，藕花香洒易醒，无限诗情。",
   "友人席上绛罗为帐护寒轻，银甲弹筝带醉听，玉奴捧砚催诗赠。",
   "写青楼一片情，尽疏狂席上风生。",
   "红锦缠头罢，金钗剪烛明，有酒如渑。",
   "幽居小堂不闭野云封，隔岸时闻涧水舂，比邻分得山田种。",
   "宦情薄归兴浓，想从前错怨天公。",
   "食禄黄齑瓮，忘忧绿酒钟。",
   "未必全穷。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "贈王貞素先生",
  "author": "宋・徐鉉",
  "body": [
   "先生嘗已佩真形，紺髮朱顔骨氣清。",
   "道秘未傳鴻寶術，院深時聽步虛聲。",
   "遼東幾度悲城郭，吳市終應變姓名。",
   "三十六天皆有籍，他年何處問歸程。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "萧淑兰情寄菩萨蛮・神仗儿",
  "author": "元・贾仲明",
  "body": [
   "荔枝浆乳酪蜜团，甘蔗汁酥油糖拌。",
   "蔷薇露秋菊春兰，紫苏盐姜醋荐款，碧芥芽葱针寸段。",
   "(云)梅香，你看这生在书院相见之时，许多道学身分，今都到那里去了？(唱)细端详俊沈娇潘，可不道尊瞻视，正衣冠。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "都孔目风雨还牢末・收江南",
  "author": "元・无名氏",
  "body": [
   "呀，他把我死羊般拖奔入牢房，依旧硬邦邦匣定在囚床，便铁石人看见也心伤。",
   "非是俺口强，则不如早些儿死了落可便早收场。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "梁州第七",
  "author": "元・萧德祥《小孙屠》",
  "body": [
   "蓦蓦地古道西风峻岭，过了夕阳流水孤村，如今尘随马足何年尽！常就劳落，不必艰辛。",
   "几番回首，几度忘魂。",
   "只为家中年老慈亲，朝夕侍奉无人。",
   "明知孝悌人之大本，想着受煦劳育我全身，不能勾落业安平。",
   "自俺甫临行，曾把哥哥禀．常侍奉莫因循。",
   "只怕哥哥把话不准，迷恋着红裙。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "南吕・一枝花赠小园春",
  "author": "元・薛昂夫",
  "body": [
   "些些并蒂红，指指连枝翠。",
   "悭悭金谷路，窄窄五陵溪。",
   "一片花飞，泄漏春消息。",
   "舞盘中歌扇底，刮得尽风月无多，趱得过繁华有几？。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "罗李郎大闹相国寺・逍遥乐",
  "author": "元・无名氏",
  "body": [
   "闪的我单身独自，又不敢对人声扬，只自己感叹嗟咨。",
   "泼性命似风里游丝，(带云)你若死呵。",
   "(唱)落得一碗凉浆一陌纸。",
   "街坊论说，邻里计较，弟兄笑耻。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "双调・庆东原次马致远先辈韵九篇九首",
  "author": "元・张可久",
  "body": [
   "烧丹灶，洗药瓢，乐清闲几个人知道。",
   "闲吹凤箫，闷拈兔毫，焉用牛刀。",
   "他得志笑闲人，他失脚闲人笑。",
   "门长闭，客任敲，山童不唤陈抟觉。",
   "袖中《六韬》，鬓边二毛，家里箪瓢。",
   "他得志笑闲人，他失脚闲人笑。",
   "杀三士，因二桃，不如五柳庄前傲。",
   "文魔贾岛，诗穷孟郊，酒困山涛。",
   "他得志笑闲人，他失脚闲人笑。",
   "繁华梦，贫贱交，唐尧不改巢由调。",
   "纷纷紫袍，区区绿袍，恋恋绨袍。",
   "他得志笑闲人，他失脚闲人笑。",
   "诗情放，剑气豪，英雄不把穷通较。",
   "江中斩蛟，云间射雕，席上挥毫。",
   "他得志笑闲人，他失脚闲人笑。",
   "难开眼，懒折腰，白云不应蒲轮召。",
   "解组汉朝，寻诗灞桥，策杖临皋。",
   "他得志笑闲人，他失脚闲人笑。",
   "依山洞，结把茅，清风雨袖长舒啸。",
   "问江边老樵，访山中故交，伴云外孤鹤。",
   "他得志笑闲人，他失脚闲人笑。",
   "苍头哨，骢马骄，放辔头也只到长安道。",
   "说家门尽教，守齑盐慢熬，请荆布休焦。",
   "他得志笑闲人，他失脚闲人笑。",
   "山容瘦，木叶凋，对西窗尽是诗材料。",
   "苍烟树杪，残雪柳条，红日花梢。",
   "他得志笑闲人，他失脚闲人笑。",
   "越山即事二首庭前树，篱下菊，老渔樵相伴闲鸥鹭。",
   "听道士步虚，教稚子读书，引吟客携壶。",
   "借贺老鉴湖船，访谢傅东山去。",
   "云轻散，月易残，女萧何成败了些风流汉。",
   "冯魁硬铲，双生紧赶，小姐先<走山>。",
   "今夜惜花心，明日伤春叹。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "酒泉子·谢却荼蘼",
  "author": "清・納蘭性德",
  "body": [
   "谢却荼蘼，一片月明如水",
   "篆香消，犹未睡，早鸦啼",
   "嫩寒无赖罗衣薄，休傍阑干角",
   "最愁人，灯欲落，雁还飞"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "冻苏秦衣锦还乡・鸳鸯煞",
  "author": "元・无名氏",
  "body": [
   "想当初风尘落落谁怜悯，到今日衣冠楚楚争亲近。",
   "畅道威震诸侯，腰悬六印，也索把世态炎凉，心中暗忖：假使一朝马死黄金尽，可不的依旧苏秦，做陌路看承被人晒！。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "鹿鸣",
  "author": "詩經",
  "body": [
   "呦呦鹿鸣，食野之苹。我有嘉宾，鼓瑟吹笙。吹笙鼓簧，承筐是将。人之好我，示我周行。",
   "",
   "呦呦鹿鸣，食野之蒿。我有嘉宾，德音孔昭。视民不恌，君子是则是效。我有旨酒，嘉宾式燕以敖。",
   "",
   "呦呦鹿鸣，食野之芩。我有嘉宾，鼓瑟鼓琴。鼓瑟鼓琴，和乐且湛。我有旨酒，以燕乐嘉宾之心。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "梁州・取崖畔枯藤作杖，伐江皋曲木为庐，主人素得林泉趣。烹茶扫叶，",
  "author": "元・汪元亨",
  "body": [
   "引水通渠。",
   "钩帘待月，俯槛观鱼。",
   "耻于求自抱憨愚，厌追陪懒混尘俗。",
   "傲慢似去彭泽弃职陶潜，疏散如困夔俯豪吟杜甫，清高似老孤山不仕林逋。",
   "岂浊，不鲁。",
   "处酸寒紧闭乾坤目，躲风雷看乌兔。",
   "静掩柴扉春日哺，便休题黑漆似程途。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "庞涓夜走马陵道・中吕/粉蝶儿",
  "author": "元・无名氏",
  "body": [
   "打一轮皂盖轻车，按天书把三军摆设，谁识俺这阵似长蛇。",
   "端的个角生风，旗掣电，弓弯秋月。",
   "喊一声海沸山裂，管杀的他众儿郎不能相借。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "山居詩  其四四",
  "author": "宋・釋延壽",
  "body": [
   "萬境閒來情澹澹，羣囂息後思微微。",
   "當時白業無門入，今日玄關有路歸。",
   "熟果不摇翻自落，生禽誰喚却驚飛。",
   "到頭何用空忙得，任運應須待對機。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "双调・拨不断",
  "author": "元・马致远",
  "body": [
   "九重天，二十年，龙楼凤阁都曾见。",
   "绿水青山任自然，旧时王谢堂前燕，再不复海棠庭院。",
   "叹寒儒，谩读书，读书须索题桥柱。",
   "题柱虽乘驷马车，乘车谁买《长门赋》？且看了长安回去。",
   "路旁碑，不知谁，春苔绿满无人祭。",
   "毕卓生前酒一杯，曹公身后坟三尺，不如醉了还醉。",
   "怨离别，恨离别，君知君恨君休惹。",
   "红日如奔过隙驹，白头渐满杨花雪，一日一个渭城客舍。",
   "孟襄阳，兴何狂？冻骑驴灞陵桥上，便纵有些梅花入梦香，到不如风雪销金帐，慢慢的浅斟低唱。",
   "笑陶家，雪烹茶，就鹅毛瑞雪初成腊，见蝶翅寒梅正有花，怕羊羔美酒新添价，拖得人冷斋里闲话。",
   "菊花开，正归来。",
   "伴虎溪僧鹤林友龙山客，似杜工部陶渊明李太白，有洞庭柑东阳酒西湖蟹。",
   "哎？楚三闾休怪。",
   "浙江亭，看潮生，潮来潮去原无定，惟有西山万古青。",
   "子陵一钓多高兴，闹中取静。",
   "酒杯深，故人心，相逢且莫推辞饮。",
   "君若歌时我慢斟，屈原清死由他恁。",
   "醉和醒争甚？瘦形骸，闷情怀，丹枫醉倒秋山色，黄菊雕残戏马台，白衣盼杀东篱客，你莫不子猷访戴？布衣中，问英雄，王图霸业成何用！禾黍高低六代宫，楸梧远近千官冢，一场恶梦。",
   "竞江山，为长安，张良放火连云栈，韩信独登拜将坛，霸王自刎乌江岸，再谁分楚汉。",
   "子房鞋，买臣柴，屠沽乞食为僚宰，版筑躬耕有将才。",
   "古人尚自把天时待，只不如且酩子里胡捱。",
   "莫独狂，祸难防，寻思乐毅非良将，直待齐邦扫地亡，火牛一战几乎丧，赶人休赶上。",
   "立峰峦，脱簪冠。",
   "夕阳倒影松阴乱，太液澄虚月影宽，海风汗漫云霞断，醉眠时小童休唤。",
   "套数。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "尾・叮咛这雨声莫打梨花坠，风力休吹柳絮飞。留待睛明好天气，穿一领",
  "author": "元・马彦良",
  "body": [
   "布衣，着一对草履，访柳寻春万事喜。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "怨春郎",
  "author": "宋・欧阳修",
  "body": [
   "为伊家，终日闷。",
   "受尽恓惶谁问。",
   "不知不觉上心头，悄一霎身心，顿也没处顿。",
   "恼愁肠，成寸寸。",
   "已恁莫把人萦损。",
   "奈每每人前道著伊，空把相思泪眼和衣搵。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "谢金吾诈拆清风府・那吒令",
  "author": "元・无名氏",
  "body": [
   ")这都是王枢密，王枢密的计策；故意教谢金吾，谢金吾来拆坏；强把着宋真宗，宋真宗来顶戴。",
   "上不怕天理该，下不怕人情骇，你也启奏的忒不明白。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "中吕・喜春来六艺礼",
  "author": "元・马致远",
  "body": [
   "夙兴夜寐尊师行，动止浑绝浮浪名，身潜诗礼且陶情。",
   "柳溪中，人世小蓬瀛。",
   "乐宫商律吕随时秦，散虑焚香理素琴，人和神悦在佳音。",
   "不关心，玉漏滴残淋。",
   "射古来射席观其德，今向樽前自乐心，醉横壶矢卧蓑阴。",
   "且闲身，醒踏月明吟。",
   "御昔驰铁骑经燕赵，往复奔腾稳似船，今朝两鬓已成斑。",
   "机自参，牛背得身安。",
   "书笔尖落纸生云雾，扫出龙蛇惊四筵，蛮书写毕动君颜。",
   "酒中仙，一恁醉长安。",
   "数盈虚妙自胸中蓄，万事幽传一掌间，不如长醉酒垆边。",
   "是非潜，终日乐尧年。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "萧何月夜追韩信・混江龙",
  "author": "元・金仁杰",
  "body": [
   "消磨了圣人之教，儿时的经纶天地。",
   "整皇朝。",
   "时遇着梁雌雉，急切钓不的沧海鲸鳌。",
   "泪洒就长江千尺浪，气冲开云汉几重霄。",
   "啊次包罗大地，肺腑卷摄江河。",
   "笔尖能摇山岳，剑锋可摘星辰。",
   "叹英雄何日朝闻道，盼杀我也玉堂金马，困杀我也陋巷箪瓢。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "感天动地窦娥冤・得胜令",
  "author": "元・关汉卿",
  "body": [
   "呀，今日个搭伏定摄魂台，一灵儿怨哀哀。",
   "父亲也，你现拿着刑名事，亲蒙圣主差。",
   "端详这文册，那厮乱纲常，合当败。",
   "便万剐了乔才，还道报冤仇不畅怀！。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "谢金莲诗酒红梨花・煞尾",
  "author": "元・张寿卿",
  "body": [
   "俺孩儿一年来不得托生，秀才也你三更里撞着鬼魂。",
   "俺孩儿三年光。",
   "景无人问。",
   "(带云)哎，且喜波。",
   "(唱)可早有替代你的生天路儿稳。",
   "(下)(赵汝州云)三婆去了也。",
   "可怎生不见张千来？(张干上，云)我往书房中看秀才去。",
   "(见科)(赵汝州云)张千，相公在那里？(张千云)相公下乡劝农去了。",
   "(赵汝州云)相公曾分付你甚么来？(张干云)相公去时，分付我来，说公事忙，有好几时未得回哩。",
   "留下物件，着我交付与你。",
   "是花银两锭，春衣一套，全副鞍马一匹。",
   "(赵汝州云)既有此物，张千，多多的拜上您相公，则今日我就上朝取应去也。",
   "(张千云)相公还有分付，说秀才去的迟，便等相公回来，与你面别。",
   "(赵汝州云)我只是不等他了。",
   "(诗云)我不别仁兄不为过，只为后花园里难存坐。",
   "万一红梨花下那人来，可不与李家孩儿凑两个。",
   "(张于随下)。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "东门之墠",
  "author": "詩經",
  "body": [
   "东门之墠，茹藘在阪。其室则迩，其人甚远。",
   "",
   "东门之栗，有践家室。岂不尔思？子不我即！"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "雁儿落・一心待悟真常修物理，萦方寸绝名利，离尘寰远世交，游阆苑达",
  "author": "元・范康",
  "body": [
   "仙契。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "江舍人宅筵上有妓唱和州韓舍人歌辭因以寄",
  "author": "宋・徐鉉",
  "body": [
   "良宵絲竹偶成歡，中有佳人俯翠鬟。",
   "白雪飄颻傳樂府，阮郎憔悴在人間。",
   "清風朗月長相憶，佩蕙紉蘭早晚還。",
   "深夜酒空筵欲散，向隅惆悵鬢堪斑。"
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "破幽梦孤雁汉宫秋・满庭芳",
  "author": "元・马致远",
  "body": [
   "又不是心中爱听，大古似林风瑟瑟，岩溜冷冷。",
   "我只见山长水远天如镜，又生怕误了你途程。",
   "见被你冷落了潇湘暮景，更打动我边塞离情，还说甚雁过留声。",
   "那堪更瑶阶夜永，嫌杀月儿明。",
   "(黄门云)陛下省烦恼，龙体为重。",
   "(驾云)不由我不烦恼也。",
   "(唱)。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "龙济山野猿听经・折桂令",
  "author": "元・无名氏",
  "body": [
   "师父道登西方九品莲池，都只为悟彻无生，今日个平步上青天。",
   "再不去那山内闻经，林头抱影，涧底吟泉。",
   "我今日脱皮囊凡胎尽传，上灵山佛国攸然。",
   "也是苦志心坚，稳驾清风，飞上青天。",
   "(圣僧云)袁生，此间已是西方极乐世界。",
   "只因你一心向善，问道修真，致有今日。",
   "你看祥云霭霭，紫气腾腾，慈悲接引，善信偕行，果然是步步踏金莲也。",
   "袁生，你听者！只因你一念真心，悟如来般若玄音。",
   "脱皮毛闻经听法，改形容参访师林。",
   "了然彻无生道妙，须明透万法洪深。",
   "除却了轮回六道，免去了苦海潜津。",
   "赴西方莲开见佛，临极乐亲到雷音。",
   "今日个成真证果，礼如来法座皆钦。",
   "(正末云)也是我有缘也呵！(唱)。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "包待制三勘蝴蝶梦・寄生草",
  "author": "元・关汉卿",
  "body": [
   "你可便斟量着做，似这般甚意儿？你三人平昔无瑕疵，你三人打死虽然是，你三人倒惹下刑名事。",
   "则被这清风明月两闲人，送了你玉堂金马三学士。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "圣药王・好教我愁万结，恨万叠，满怀愁闷对谁说。成间别，时运拙，气",
  "author": "元・无名氏",
  "body": [
   "长吁多似篆烟斜，和绛蜡也啼血。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "包待制三勘蝴蝶梦・快活三",
  "author": "元・关汉卿",
  "body": [
   "眼见的你两个得生天，单则你小兄弟丧黄泉。",
   "（做觑王三悲科，唱）教我扭回身，忍不住泪涟涟。",
   "（王大、王二悲科）（正旦云）罢、罢、罢，但留的你两个呵，（唱）他便死也我甘心情愿。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "宜秋山赵礼让肥・混江龙",
  "author": "元・秦简夫",
  "body": [
   "待着峰粗粝，眼睁睁俺子母各天涯。",
   "想起来我心如刀割，题起来我泪似悬麻。",
   "饿杀人也无米无柴腹内饥，痛杀人也好儿好女眼前花。",
   "恢恢天网，漫漫黄沙，我一身饿死，四海无家。",
   "眼看得青云兄长事无成，可怜我白头老母年高大。",
   "压的我这双肩苦痛，走的我这两腿酸麻。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "锦云堂暗定连环计・寄生草",
  "author": "元・无名氏",
  "body": [
   "这本是服德非关力，你休便将恩认做仇。",
   "则愿你仗龙泉扫荡风尘垢，按龙韬补尽乾坤漏，坐龙庭稳占江山秀。",
   "(董卓云)此事只宜疾，不宜迟也。",
   "(正末唱)则愿你顺人和有麝自然香，休得要逆天心无祸谁能勾？。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "宜秋山赵礼让肥・正宫/端正好",
  "author": "元・秦简夫",
  "body": [
   "则我这身似病中鹤，心若云间鹗，我本待要驾清风万里扶摇。",
   "半生四海无着落，空着我穷似投林鸟。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "二・铰青丝缠做弩弦，裁香罗衲做战袄。补旗幡绞断翠裙腰，金疮药细将",
  "author": "元・汤舜民",
  "body": [
   "脂粉调。",
   "都是些风流功效，他则想五花诰飞下紫宸朝。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "刘玄德独赴襄阳会・雁儿落",
  "author": "元・高文秀",
  "body": [
   "他那里领雄兵临战场，俺这里先差个先锋将。",
   "凭着你长枪无对手，更和那乌马难遮当。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "荆楚臣重对玉梳记・仙吕/赏花时",
  "author": "元・贾仲明",
  "body": [
   "君既取功名妾不留，妾谨守香闺君莫忧。",
   "(带云)我将这玉梳呵，(唱)分两下有因由，则怕你撇咱脑后，似破镜合妆楼。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "郑孔目风雪酷寒亭・赚煞尾",
  "author": "元・杨显之",
  "body": [
   "准备着送灵车，安排着装衣架，摆列些高驮细马，走去衙门自告咱。",
   "问官人借对头踏，乱交加，奠酒浇茶。",
   "但见的都将你做话靶，满城人将你来怨煞。",
   "街坊都骂，骂你个不回头呆汉活气杀大浑家。",
   "(下)。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "郊廟歌辭 封泰山樂章 豫和 一",
  "author": "唐・張說",
  "body": [
   "款泰壇，柴泰清。",
   "受天命，報天成。",
   "竦皇心，薦樂聲。",
   "志上達，歌下迎。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "山神庙裴度还带・天下乐",
  "author": "元・关汉卿",
  "body": [
   "好教我\"十谒朱门九不开\"，我可便难也波禁，难禁那等朽木材：一个个铺眉苫眼妆些像态，他肚肠细，胸次狭，眼皮薄，局量窄。",
   "（云）此等人本性难移，（唱）可不道他山河容易改？（正末云）可早来到也。",
   "报复去，道有裴中立在门首。",
   "（家童云）你则在这里，我报复去。",
   "员外，有裴中立在门首。",
   "（员外云）着他过来。",
   "（家童云）理会的。",
   "员外着你过去。",
   "（正末见科，云）姨夫、姨娘请坐，受您侄儿几拜。",
   "（旦儿云）裴度，想你父母身亡之后，你不成半器，不肯寻些买卖营生做，你每日则是读书。",
   "我想来：你那读书的穷酸饿醋有甚么好处，几时能勾发迹也！（正末云）姨娘不知，圣人云：\"富家不用买良田，书中自有千钟粟。",
   "\"小生我虽居贫贱，我身贫志不贫。",
   "（员外云）大嫂，人说他胸次高傲，果然如此！我虽不通古今，你是读书人，你说那为人的道理，我试听咱。",
   "（旦儿云）谁听你那\"之乎者也\"的！（正末唱）。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "赵盼儿风月救风尘・脱布衫",
  "author": "元・关汉卿",
  "body": [
   "我更是的不待饶人，我为甚不敢明闻；肋底下插柴自忍，怎见你便打他一顿？。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "遊長寧公主流杯池二十五首 九",
  "author": "唐・上官昭容",
  "body": [
   "登山一長望，正遇九春初。",
   "結駟填街術，閭閻滿邑居。",
   "鬬雪梅先吐，驚風柳未舒。",
   "直愁斜日落，不畏酒尊虛。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "越调・小桃红湖上和刘时中二首",
  "author": "元・张可久",
  "body": [
   "一声娇燕绿杨枝，满眼寻芳事。",
   "塔影雷峰水边寺，夕阳时，画船无数围花市。",
   "三弦玉指，双钩草字，题赠粉团儿。",
   "棹歌惊起锦鸳鸯，开宴新亭上。",
   "诗有新题酒无量，醉何妨？长吟笑倚阑干望。",
   "西湖夜凉，吴姬低唱，画舫宿荷香。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "金菊香・无奈这逼人富贵太拘束，拈脂光阴忒迅速，一树红芳替他难做主。",
  "author": "元・无名氏",
  "body": [
   "等闲间减翠消绿，却教我感时抚景怎支吾。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "小桃红",
  "author": "元・杨景贤",
  "body": [
   "虽不道河头倾倒玉瓶双，满捧着香茶让。",
   "吾有那宰官婆罗小王像，虽不是按着宫商，一班佛乐何清亮。",
   "会诸天听讲，送唐僧三藏，你今日个名已入选佛场。",
   "师父闭眼者。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "刘千病打独角牛・倘秀才",
  "author": "元・无名氏",
  "body": [
   "我恰才吐架子左闪来右闪，我踢了个提过脚里臁也那外臁。",
   "嘴缝上直拳并塌那厮脸，着这厮头完擂，早着拳，打这厮自专。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "薛仁贵荣归故里・那吒令",
  "author": "元・张国宾",
  "body": [
   "论着你这文呵，怎的如管仲和鲍叔？(张士贵云)论我的武呢？(正末唱)论着你那武呵，怎如的周瑜鲁肃？(张士贵云)论我的智量呢？(正末唱)论着你智量呵，怎如的卧龙也那凤雏？(张士贵云)论着我兵书战策，揣着一肚子。",
   "我久后还要拜相封侯做大大的官哩。",
   "(正末唱)遮莫似张子房，辞朝待要归山去，再习些战策兵马。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "便宜行事虎头牌・大拜门",
  "author": "元・李直夫",
  "body": [
   "我可也不想今朝，常记的往年，到处里追陪下些亲眷。",
   "我也曾吹弹那管弦，快活了万千，可便是大拜门撒敦家的筵宴。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "正宫・端正好高隐",
  "author": "元・薛昂夫",
  "body": [
   "访知音习酬和，也不问名利如何。",
   "不贪不爱随缘过，把世事都参破。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "那吒令・谁待似落花般莺朋燕友，谁待似转灯般龙争虎斗，你看这迅指间",
  "author": "元・不忽木",
  "body": [
   "乌飞兔走。",
   "假若名利成，至如田园就，都是些去马来牛。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "采桑子·桃花羞作无情死",
  "author": "清・納蘭性德",
  "body": [
   "桃花羞作无情死，感激东风，吹落娇红，飞入窗间伴懊侬",
   "谁怜辛苦东阳瘦，也为春慵，不及芙蓉，一片幽情冷处浓"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "死生交范张鸡黍・梁州第七",
  "author": "元・宫天挺",
  "body": [
   "如今那萧丞相争头鼓脑，便有那鲁诸生也索缄口藏舌。",
   "将古今人物分优劣，为吏者矜夸显达，为儒者卖弄修洁。",
   "舜庭八凯，孔门十哲。",
   "更和那汉国三杰，况中兴以后三绝。",
   "如今那宪台疏乱滚滚当路豺狼，选法弊絮叨叨请俸日月。",
   "禹门深眼睁睁不辨龙蛇，纪纲败缺炎炎的汉火看看灭。",
   "士大夫尚风节，恰便似十草将来撞巨铁，枉自摧折。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "宋上皇御断金凤钗・梁州",
  "author": "元・郑延玉",
  "body": [
   "我便似箪瓢巷颜回暗宿，却浑如首阳山伯夷清斋。",
   "我便似绝粮孔子居陈蔡。",
   "饿杀我也口说珠玉，冻杀我也胸卷江淮。",
   "昨日失仪在金殿，今日卖诗在长街。",
   "见一个粗豪士，扯住个英才，我不合鬼擘口审问的明白。",
   "我遇着庞居士与了二百青蚨，合着孟尝君养三千剑客，撞着赛元达列十二金钗。",
   "我想来，不该。",
   "情知这范丹，怎放来生债。",
   "利又不见，本又不在。",
   "干与别人救祸灾，好教我无语支划。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "昭君怨·深禁好春谁惜",
  "author": "清・納蘭性德",
  "body": [
   "深禁好春谁惜，薄暮瑶阶伫立",
   "别院管弦声，不分明",
   "又是梨花欲谢，绣被春寒今夜",
   "寂寞锁朱门，梦承恩"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "南吕・四块玉恬退",
  "author": "元・马致远",
  "body": [
   "绿鬓衰，朱颜改，羞把尘容画麟台，故园风景依然在。",
   "三顷田，五亩宅，归去来。",
   "绿水边，青山侧，二顷良田一区宅，闲身跳出红尘外。",
   "紫蟹肥，黄菊开，归去来。",
   "翠竹边，青松侧，竹影松声两茅斋，太平幸得闲身在。",
   "三径修，五柳栽，归去来。",
   "酒旋沽，鱼新买，满眼云山画图开，清风明月还诗债。",
   "本是个懒散人，又无甚经济才，归去来。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "降桑椹蔡顺奉母・迎仙客",
  "author": "元・刘唐卿",
  "body": [
   "昨夜个瑞雪飘，雨汪洋，仰天外黑黯黯可便云雾长。",
   "融融的便暖如春，轰轰的便雷震响，影影的便电走金光，感应的祥瑞舞甘泽降。",
   "(兴儿云)小哥，你看这山林中，青山绿水，有如画意，堪入丹青之手也。",
   "(正末云)不觉的来到这大山中，是一派好山色景致也。",
   "(唱)。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "杜牧之诗酒扬州梦・煞尾",
  "author": "元・乔吉",
  "body": [
   "从今后风云气概都做下阳台梦，花月恩情犹高似太华峰。",
   "风送纱窗月影通，篆袅金炉香雾潆。",
   "银烛高烧锦帐融，罗帕重沾粉汗溶。",
   "高插鸾钗云髻耸，巧画蛾眉翠黛浓。",
   "柳坞花溪锦绣丛，烟户云窗闺阁中。",
   "可体样春衫亲手儿缝。",
   "有滋味珍馐拣口儿供。",
   "再不趁蝶使蜂媒厮断送，再不信怪友狂朋厮搬弄。",
   "但能勾鱼水相逢，琴瑟和同，(家童云)相公，咱回去来。",
   "(正末唱)早跳出这柳债花钱面糊桶。",
   "(同下)。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "迷青琐倩女离魂・刮地风",
  "author": "元・郑光祖",
  "body": [
   "行了些这没撒和的长途有十数程，越恁的骨瘦蹄轻。",
   "暮春天景物撩人兴，更见景留情。",
   "怪的是满路花生，一攒攒绿杨红杏，一双权紫燕黄莺，一对蜂，一对蝶，各相比并，想大公知他是怎生，不肯教恶了人情。"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {
  "title": "奉和聖製過溫湯",
  "author": "唐・越王貞",
  "body": [
   "鳳輦騰宸駕，驪籞次乾遊。",
   "坎德疎溫液，山隈派暖流。",
   "寒氛空外擁，蒸氣沼中浮。",
   "林凋帷影散，雲斂蓋陰收。",
   "霜郊暢玄覽，參差落景遒。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "冤报冤赵氏孤儿・昆江龙",
  "author": "元・纪君祥",
  "body": [
   "不甫能风调雨顺，太平年宠用着这般人。",
   "忠孝的在市曹中斩首，奸佞的在帅府内安身。",
   "现如今全作威来全作福，还说甚半由君也半由臣。",
   "他他他，把爪和牙布满在朝门，但违拗的早一个个诛夷尽。",
   "多咱是人间恶煞，可甚么阃外将军！。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "庞居士误放来生债・二煞",
  "author": "元・刘君锡",
  "body": [
   "古人道鹪鹩巢深林无过占的一枝，鼹鼠饮黄河无过装的满腹。",
   "咱人这家有万顷田，也则是日食的三升儿粟。",
   "博个甚睁着眼去那利画上克了我的衣食，闲着子去那算盘里拨了我的岁数。",
   "攒下些山岸也似堆金玉，这壁厢凌逼着我家长，那壁厢快活杀他妻孥。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "隔尾・写神的要得丹青意，子怕你巧笔难传造化机。不打草两般儿可同类。",
  "author": "元・钟嗣成",
  "body": [
   "法刀鞘依着格式，妆鬼的添上嘴鼻，眼巧何须样子比。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "都孔目风雨还牢末・青哥儿",
  "author": "元・无名氏",
  "body": [
   "他则是一般、一般滋味，我吃了六问、六问三推，我如今手掴着胸膛悔后迟。",
   "我当初凭着良媒取到我家里，换套儿穿衣，拣口儿吃食。",
   "这婆娘饱病难医，把赃物收执，早报与官知，断送我头皮。",
   "我劝你这一火良吏，再休把妓女娶为妻，则我是傍州例。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "薛仁贵荣归故里・仙吕/端正好",
  "author": "元・张国宾",
  "body": [
   "你如今离了村庄，别了乡党，拜辞了年老爹娘。",
   "(薛仁贵云)您孩儿此去，定要赤心报国，展土开疆，博个封侯拜将而回。",
   "父亲放心者。",
   "(正末唱)你待要，忘生舍死在这沙场上。",
   "则你那雄赳赳气昂昂，身凛凛貌堂堂。",
   "知甚日得还乡？哎！儿也，休教您这两口儿斜倚定门儿望。",
   "(同卜儿下)(旦儿云)大哥，妾身在家，情愿替你侍养公婆，你放心的自去。",
   "妾身送你出这柴门外也。",
   "(薛仁贵云)大嫂，堂上无人，你自回去，侍奉公婆，不必送我。",
   "(拜别科)(薛仁贵诗云)我今日远去投军，惟愿你孝顺双亲。",
   "(先下)(旦做悲科，诗云)虽然是芳年连理，为功名只得离分。",
   "(下)。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "晋文公火烧介子推・喜春来",
  "author": "元・狄君厚",
  "body": [
   "你今日修文治国平天下，你如今待演武安邦定杀伐。",
   "儿呵，你如今修文演武未通达。",
   "(带云)罢，罢，至如你便不成呵，(唱)似我也退朝，准肯将你货与帝王家？。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "尾・喜天阴唤锦鸠，爱花香哨画眉。伴露荷中烟柳外风蒲内，绿头鸭黄莺",
  "author": "元・马致远",
  "body": [
   "儿ㄋ七七。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "汉高皇濯足气英布・赚煞",
  "author": "元・尚仲贤",
  "body": [
   "你休将咱厮催逼。",
   "相撺掇，英布也今番去波。",
   "不争我服事重瞳没个结果，赤紧的做媳妇先恶了公婆，怎存活？恰便似睁着眼跳黄河，你着咱归顺他隆准的材王较面阔，你这里怕不有千般揣摩，却将咱一时间瞒过，则怕你弄的咱做了尖担两头脱。",
   "(卒随下)。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "东堂老劝破家子弟・剔银灯",
  "author": "元・秦简夫",
  "body": [
   "我其实可便消不得你这娇儿和幼女，我其实可便顾不得你这穷亲泼故。",
   "这厮有那一千桩儿情理难容处，这厮若论着五刑发落叮便罪不容诛。",
   "(带云)扬州奴，你不说来？(唱)我教你成个人物，做个财主，你却怎生背地里闲言落可便长语？(云)你不道来，我姓李，你姓赵，俺两家是甚么亲那？(唱)。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "拨不断・弃雕檐，隐闾阎。灰心打灭烧身焰，袖手擘开锁顶钳，柔舌砍钝",
  "author": "元・曾瑞",
  "body": [
   "吹毛剑。",
   "旧由绝念。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "送吳郎中爲宣州推官知涇縣",
  "author": "宋・徐鉉",
  "body": [
   "征虜亭邊月，雞鳴伴客行。",
   "可憐何水部，今事謝宣城。",
   "風物聊供賞，班資莫繫情。",
   "同心不同載，留滯爲浮名。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "還過東都留守周公筵上贈座客",
  "author": "宋・徐鉉",
  "body": [
   "賈生三載在長沙，故友相思道路賒。",
   "已分終年甘寂寞，豈知今日返京華。",
   "麟符上相恩偏厚，隋苑留歡日欲斜。",
   "明旦江頭倍惆悵，遠山芳草映殘霞。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "得胜令・呀，思量来端的没来由，和您娘无事做敌头。不是这掷果的潘安",
  "author": "元・无名氏",
  "body": [
   "俏，都则为当垆的卓氏羞。",
   "休忧，有日还成就；娇柔，忽的心上有。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "吕洞宾桃柳升仙梦・南桂枝香",
  "author": "元・贾仲明",
  "body": [
   "多承错爱，深蒙款待。",
   "则咱这爱恋如山，则咱这恩情似海。",
   "(末云)因姐姐容貌非常。",
   "(旦唱)我丰姿艳色，我丰姿艳色，你形端无赛。",
   "正是桃红柳绿，则愿的四时不改。",
   "今夜同相会，只怕青春不再来。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "李太白匹配金钱记・混江龙",
  "author": "元・乔吉",
  "body": [
   "博得个名扬天下，才能勾宴琼林饮御洒插宫花。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "中和節賜百官燕集因示所懷",
  "author": "唐・德宗皇帝",
  "body": [
   "至化恆在宥，保和茲息人。",
   "推誠撫諸夏，與物長爲春。",
   "仲月風景暖，禁城花柳新。",
   "芳時協金奏，賜宴同羣臣。",
   "絲竹豈云樂，忠賢惟所親。",
   "庶洽朝野意，曠然天地均。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "刘晨阮肇误入桃源・落梅风",
  "author": "元・王子一",
  "body": [
   "过了这苍苔径独木桥，路崎岖寂无人到。",
   "刘郎这回归去了，乱山头杜鹃休叫。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "苏子瞻醉写赤壁赋・仙吕/赏花时",
  "author": "元・无名氏",
  "body": [
   "我待将百姓民疾件件举，番做了秋草人情日日疏。",
   "老夫寒儒，哎！你个无端宰予，每日家醉卧碧纱橱。"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {
  "title": "金缕曲·亡妇忌日有感",
  "author": "清・納蘭性德",
  "body": [
   "此恨何时已",
   "滴空阶、寒更雨歇，葬花天气",
   "三载悠悠魂梦杳，是梦久应醒矣",
   "料也觉、人间无味",
   "不及夜台尘土隔，冷清清、一片埋愁地",
   "钗钿约，竟抛弃",
   "重泉若有双鱼寄",
   "好知他、年来苦乐，与谁相倚",
   "我自中宵成转侧，忍听湘弦重理",
   "待结个、他生知己",
   "还怕两人俱薄命，再缘悭、剩月零风里",
   "清泪尽，纸灰起"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "死生交范张鸡黍・上小楼",
  "author": "元・宫天挺",
  "body": [
   "过举他门下侍郎。",
   "落保了也朝中宰相。",
   "(第五伦云)因贤士高才大德，举荐为官。",
   "(正未唱)有甚么孝廉方正，德行才能，政事文章？(第五伦云)若得贤士为官，黎民有望也。",
   "(正末唱)怎消的一方之地，百万生灵，将咱倚仗？(第五伦云)贤士，您有尹铎之才，当以重用。",
   "(正末唱)我又无尹铎才怎生保障？。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "晋陶母剪发待宾・倘秀才",
  "author": "元・秦简夫",
  "body": [
   "我家里请下客非同造次，等着钱家小使，谁家自己发与人做头发儿？(韩夫人云)恁的呵，我不买。",
   "(旦云)你不买罢。",
   "(唱)常存的青丝在，须有变钱时，他比不的秋后的扇儿！。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "翠红乡儿女两团圆・天下乐",
  "author": "元・高茂卿",
  "body": [
   "岂不闻道路上人也那口似碑？我如今便年也波纪，年纪可便近六十，虽然咱有家私，我这眼前无一个子息。",
   "(云)李氏也，我为你呵，多曾用心来。",
   "(唱)我背地里祷神祗，(带云)也不论是男是女，(唱)但得一个喂眼的，恰便似那心肝儿般知重你。",
   "(二旦云)这个老弟子孩儿无礼，心肝儿般知重他哩。",
   "(做唤门科，云)开门来，开门来。",
   "(正末做开门科，云)呀！二嫂来了也。",
   "(二旦云)老弟子，为这个泼贱奴胎说的我好也。",
   "我打这歪刺骨。",
   "(正末唱)。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "安阳好・忆江南",
  "author": "宋・韩琦",
  "body": [
   "安阳好，形势魏西州。",
   "曼衍山川环故国，升平歌吹沸高楼。",
   "和气镇飞浮。",
   "笼画陌，乔木几春秋。",
   "花外轩窗排远岫，竹间门巷带长流。",
   "风物更清幽。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "临江仙·点滴芭蕉心欲碎",
  "author": "清・納蘭性德",
  "body": [
   "点滴芭蕉心欲碎，声声催忆当初",
   "欲眠还展旧时书",
   "鸳鸯小字，犹记手生疏",
   "倦眼乍低缃帙乱，重看一半模糊",
   "幽窗冷雨一灯孤",
   "料应情尽，还道有情无"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "尉迟恭三夺槊・隔尾",
  "author": "元・尚仲贤",
  "body": [
   "我从二十三上早驱军校，经到四五千场恶战讨。",
   "怎想头直上轮还老来到。",
   "我暗约，慢慢的想度，嗨，刮马似三十年过去了。"
  ],

 {

 {

 {

  "body": [
   "塞外悲風切，交河冰已結。",
   "瀚海百重波，陰山千里雪。",
   "迥戍危烽火，層巒引高節。",
   "悠悠卷斾旌，飲馬出長城。",

 {

   "心情恶",
   "模糊一片，强分哀乐",
   "拟将欢笑排离索，镜中无奈颜非昨",

 {

   "景媚鶯初囀，春殘日更長。",

 {
  "title": "谢金莲诗酒红梨花・金盏儿",

  "body": [

   "妾身住处兀那东直下，深村旷野不堪夸。",
   "俺那里遮藏红杏树，掩映碧桃花。",
   "兀良山前五六里，林外两三家。",
   "(赵汝州云)小娘子，你端的谁氏之家？(正旦云)妾身是王同知之女，今夜晚间，因看花来到太守花园里，不想遇着秀才。",
   "敢问秀才姓甚名谁？(赵汝州云)小生是太守相公的表弟赵汝州是也。",
   "小娘子既到此处，到我书房中饮几杯，有何不可？(正旦云)既然如此，同到书房中攀话去咱。",
   "(做进书房科)(赵汝州云)小娘子不嫌亵渎，请满饮一杯。",
   "(正旦云)秀才请。",
   "(赵汝州云)难得小娘子到此，多饮几杯。",
   "(正旦唱)。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "崔府君断冤家债主・得胜令",
  "author": "元・郑延玉",
  "body": [
   "这都是我那婆婆也作业自殃身，遗累及儿孙。",
   "再休提世上无恩怨，须信道空中有鬼神。",
   "(崔子玉云)兄弟，你省悟了么？(正末云)哥哥，张善友如今才省悟了也。",
   "(唱)总不如安贫，落一个身困心无困。",
   "这便是修因，也免的钱亲人不亲。"

  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"

 {
  "title": "冯玉兰夜月泣江舟・煞尾",

  "body": [

  "note": "每個人心裡，都住著一首詩。"

 {

  "author": "元・王晔",
  "body": [

 },
 {
  "title": "程咬金斧劈老君堂・挂玉钧",
  "author": "元・郑光祖",
  "body": [
   "萧铣英雄武艺能，方天戟横持定。",
   "出马开旗呐喊声，我刀过处无回颈，有似那斩蔡阳，霎时诛谗佞，将他那百万貔貅，一扫皆平。",
   "(殿头官云)元帅少待，小校就请季靖军师，将那收复了李密手下众将官，都与我拿将来者。",
   "(卒子云)理会的。",
   "李靖军师。",
   "大人有请。",
   "(李靖同卒子拿程咬金上，云)小官李靖是也。",

   "小官将程咬金执缚定，拿见秦王去。",
   "可早来到帅府门首也。",
   "小校报复去，有李靖军师来了也。",
   "(卒子云)理会的。",
   "报的大人得知，有李靖军师等来了也。",
   "(殿头官云)道有请。",
   "(做见科)(李靖云)大人，俺元帅平定了江南。",
   "深有汗马之功劳也。",
   "(正末云)军师真乃扶持社稷股肱之巨也。",
   "(李靖云)不敢不敢。",
   "小宫此一来有一事启知元帅。",
   "(正末云)军师有何事？(李靖云)如今李密手下大小众将。",
   "尽皆降俺大唐。",
   "内有一将乃是程咬金。",
   "某想此人手持宣花斧，追赶元帅，拿至金墉城。",
   "谁想今日程咬金投降，将此人执缚定了，拿来见元帅。",
   "见在帅府门首也。",
   "(做拿见科)(正末云)着他过来。",
   "(卒子云)理会的。",
   "左右人拿将过去！(李靖云)元帅，则他便是程咬金。",
   "(程交金云)大王，小将乃亡家之巨，前者不可追袭大王，小将有弥天之罪，今日投降。",
   "小将情愿纳头受死于大王斧钺之下也。",
   "(正末云)军师众大人听者，为人臣者当以尽忠报国，程咬金追某至老君堂，此人当时尽忠于魏王，未识某矣。",
   "今天投唐，某肯念其前仇？岂不闻桀犬吠尧，非尧不仁，皆各认其主。",
   "某今将程咬全将军举入朝中，必当重用。",
   "我亲释其缚也。",
   "(正末解程咬金绳私)(程咬金云)感蒙大王，赦臣万死，大王若纳微臣为将，我舍一腔热血，尽忠竭力，报大王不杀之恩。",
   "(正末云)程将军但放心，某奏过尊君，必有重用，封官赐赏也。",
   "(程咬金做拜谢科)(殿头宫云)左右人抬上果桌来者。",
   "(做递酒科)(殿头官云)元帅满饮此杯。",
   "(正末云)某也饮酒，老宰辅同军师与众将，今日与某正当龙虎风云会。",
   "(殿头官云)钦赐筵宴，庆功饮酒，正当其礼也。",
   "(正末唱)。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
