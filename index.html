<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日日一詩 — 與文字呼吸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FDF6EC;
      --warm-beige: #F5E6D3;
      --latte: #D4B896;
      --brown: #8B7355;
      --dark-brown: #5C4A32;
      --soft-orange: #E8A87C;
      --muted-rose: #D4A0A0;
      --sage: #A8B5A2;
      --text: #4A3F35;
      --text-light: #8B7D6B;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; height: 100%; }
    body {
      font-family: 'Noto Serif TC', serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100%;
      overflow-x: hidden;
    }

    /* ===== NAV ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(253,246,236,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212,184,150,0.15);
    }
    .logo { font-size: 1.2rem; font-weight: 600; color: var(--dark-brown); letter-spacing: 0.15em; }
    .logo span { font-weight: 300; color: var(--text-light); font-size: 0.8rem; margin-left: 0.4rem; }
    .nav-links { display: flex; gap: 1.8rem; list-style: none; }
    .nav-links a {
      text-decoration: none; color: var(--text-light); font-size: 0.85rem;
      font-family: 'Noto Sans TC', sans-serif; font-weight: 400;
      transition: color 0.3s; letter-spacing: 0.08em;
    }
    .nav-links a:hover { color: var(--dark-brown); }

    /* ===== HERO — POEM FRONT & CENTER ===== */
    #hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center;
      padding: 5rem 2rem 3rem;
      background: linear-gradient(170deg, var(--cream) 0%, var(--warm-beige) 50%, #EDD9C0 100%);
      position: relative; overflow: hidden;
    }
    #hero::before {
      content: ''; position: absolute; top: -40%; right: -15%;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(232,168,124,0.12) 0%, transparent 70%);
      border-radius: 50%; animation: float 8s ease-in-out infinite;
    }
    #hero::after {
      content: ''; position: absolute; bottom: -25%; left: -8%;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(168,181,162,0.1) 0%, transparent 70%);
      border-radius: 50%; animation: float 10s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-25px) scale(1.04); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-inner { position: relative; z-index: 1; max-width: 620px; }
    .hero-date {
      font-family: 'Noto Sans TC', sans-serif; font-weight: 300;
      font-size: 0.8rem; color: var(--latte); letter-spacing: 0.25em;
      margin-bottom: 1.8rem; opacity: 0; animation: fadeUp 0.8s 0.2s forwards;
    }
    .poem-tag {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.7rem;
      font-weight: 400; letter-spacing: 0.35em; color: var(--soft-orange);
      margin-bottom: 1.2rem; opacity: 0; animation: fadeUp 0.8s 0.35s forwards;
    }
    .poem-title {
      font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 500;
      color: var(--dark-brown); margin-bottom: 0.3rem;
      opacity: 0; animation: fadeUp 0.8s 0.5s forwards;
    }
    .poem-author {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.85rem;
      color: var(--text-light); margin-bottom: 2rem; font-weight: 300;
      opacity: 0; animation: fadeUp 0.8s 0.6s forwards;
    }
    .poem-body {
      font-size: 1.15rem; line-height: 2.3; color: var(--text);
      font-weight: 300; letter-spacing: 0.06em;
      opacity: 0; animation: fadeUp 0.8s 0.7s forwards;
      text-align: center;
      display: flex; flex-direction: column; align-items: center;
    }
    .poem-body p { margin-bottom: 0.3rem; }
    .poem-divider {
      width: 36px; height: 1px; background: var(--latte);
      margin: 2rem auto; opacity: 0; animation: fadeUp 0.8s 0.85s forwards;
    }
    .poem-note {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.85rem;
      color: var(--text-light); font-weight: 300; line-height: 1.8;
      max-width: 420px; margin: 0 auto;
      opacity: 0; animation: fadeUp 0.8s 0.95s forwards;
    }
    .poem-source {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.65rem;
      color: var(--latte); margin-top: 0.8rem; font-weight: 300;
      letter-spacing: 0.1em;
      opacity: 0; animation: fadeUp 0.8s 1s forwards;
    }
    .poem-nav {
      display: flex; gap: 0.8rem; margin-top: 2rem; justify-content: center;
      opacity: 0; animation: fadeUp 0.8s 1.05s forwards;
    }
    .poem-nav button {
      background: none; border: 1px solid var(--latte); color: var(--brown);
      padding: 0.5rem 1.3rem; font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.78rem; letter-spacing: 0.1em; cursor: pointer;
      border-radius: 2rem; transition: all 0.3s;
    }
    .poem-nav button:hover {
      background: var(--dark-brown); border-color: var(--dark-brown); color: var(--cream);
    }
    .poem-nav button.active {
      background: var(--soft-orange); border-color: var(--soft-orange); color: #fff;
    }

    .scroll-hint {
      position: absolute; bottom: 1.5rem;
      opacity: 0; animation: fadeUp 0.8s 1.2s forwards;
    }
    .scroll-hint span {
      display: block; width: 1px; height: 32px;
      background: var(--latte); margin: 0 auto;
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%,100% { transform: scaleY(1); opacity: 0.4; }
      50% { transform: scaleY(1.4); opacity: 0.8; }
    }

    /* ===== BREATHING ===== */
    #breathe {
      min-height: 100vh; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: linear-gradient(170deg, #F0E4D4 0%, var(--warm-beige) 50%, #E8DDD0 100%);
      padding: 3rem 2rem; user-select: none;
    }
    .breathe-wrapper { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
    .breathe-label {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.7rem;
      font-weight: 400; letter-spacing: 0.35em; color: var(--soft-orange);
    }
    .breathe-circle-wrapper {
      position: relative; width: 240px; height: 240px;
      display: flex; align-items: center; justify-content: center;
    }
    .breathe-circle-bg {
      position: absolute; width: 240px; height: 240px;
      border-radius: 50%; border: 1px solid rgba(212,184,150,0.25);
    }
    .breathe-circle {
      width: 110px; height: 110px; border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, var(--soft-orange), var(--muted-rose));
      opacity: 0.65; transition: all 0.1s linear;
      box-shadow: 0 0 50px rgba(232,168,124,0.15);
    }
    .breathe-circle.inhale { animation: inhale 4s ease-in-out forwards; }
    .breathe-circle.hold-in { animation: holdIn 4s ease-in-out forwards; }
    .breathe-circle.exhale { animation: exhale 4s ease-in-out forwards; }
    .breathe-circle.hold-out { animation: holdOut 4s ease-in-out forwards; }
    @keyframes inhale { from { transform: scale(1); opacity: 0.55; } to { transform: scale(1.8); opacity: 0.85; } }
    @keyframes holdIn { from, to { transform: scale(1.8); opacity: 0.85; } 50% { transform: scale(1.82); opacity: 0.88; } }
    @keyframes exhale { from { transform: scale(1.8); opacity: 0.85; } to { transform: scale(1); opacity: 0.55; } }
    @keyframes holdOut { from, to { transform: scale(1); opacity: 0.55; } 50% { transform: scale(1.02); opacity: 0.58; } }
    .breathe-text { font-size: 1.15rem; font-weight: 300; color: var(--dark-brown); letter-spacing: 0.2em; min-height: 1.8rem; }
    .breathe-sub { font-family: 'Noto Sans TC', sans-serif; font-size: 0.78rem; color: var(--text-light); font-weight: 300; }
    .breathe-controls { display: flex; gap: 0.8rem; margin-top: 0.5rem; }
    .btn-breathe {
      background: var(--dark-brown); color: var(--cream); border: none;
      padding: 0.6rem 1.8rem; font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem; letter-spacing: 0.12em; cursor: pointer;
      border-radius: 2rem; transition: all 0.3s;
    }
    .btn-breathe:hover { background: var(--brown); transform: translateY(-1px); }
    .btn-breathe.secondary { background: transparent; border: 1px solid var(--latte); color: var(--brown); }
    .breathe-counter {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.72rem;
      color: var(--text-light); font-weight: 300; letter-spacing: 0.1em;
    }

    /* ===== SUBSCRIBE ===== */
    #subscribe {
      min-height: 100vh; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: var(--dark-brown); color: var(--cream); padding: 3rem 2rem;
    }
    .subscribe-content { text-align: center; max-width: 460px; }
    .subscribe-tag {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.7rem;
      font-weight: 400; letter-spacing: 0.35em; color: var(--soft-orange); margin-bottom: 1.2rem;
    }
    .subscribe-title { font-size: 1.7rem; font-weight: 300; margin-bottom: 0.8rem; line-height: 1.6; }
    .subscribe-desc {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.88rem;
      font-weight: 300; color: rgba(253,246,236,0.65); line-height: 1.8; margin-bottom: 2rem;
    }
    .line-btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      background: #06C755; color: #fff; text-decoration: none;
      padding: 0.8rem 2.2rem; border-radius: 2rem;
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.9rem;
      font-weight: 500; letter-spacing: 0.05em; transition: all 0.3s;
      box-shadow: 0 4px 18px rgba(6,199,85,0.25);
    }
    .line-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(6,199,85,0.35); }
    .line-btn svg { width: 20px; height: 20px; }
    .subscribe-note {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.7rem;
      color: rgba(253,246,236,0.35); margin-top: 1.2rem; font-weight: 300;
    }

    /* ===== FOOTER ===== */
    footer {
      padding: 1.5rem; text-align: center; background: var(--dark-brown);
      border-top: 1px solid rgba(253,246,236,0.06);
    }
    footer p {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.7rem;
      color: rgba(253,246,236,0.3); font-weight: 300; letter-spacing: 0.1em;
    }

    /* ===== FLOATING BTNS ===== */
    .share-fab {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 90;
      display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
    }
    .share-fab button, .share-fab a {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.3s; box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    }
    .share-line { background: #06C755; color: #fff; }
    .share-line:hover { transform: scale(1.1); }
    .share-copy { background: rgba(255,255,255,0.85); color: var(--brown); backdrop-filter: blur(10px); }
    .share-copy:hover { transform: scale(1.1); }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 4.5rem; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--dark-brown); color: var(--cream);
      padding: 0.6rem 1.3rem; border-radius: 2rem;
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.78rem;
      opacity: 0; transition: all 0.3s; z-index: 200; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      nav { padding: 0.8rem 1rem; }
      .nav-links { gap: 1rem; }
      .nav-links a { font-size: 0.78rem; }
      .logo span { display: none; }
      #hero { padding: 4.5rem 1.2rem 2.5rem; }
      .poem-body { font-size: 1.05rem; line-height: 2; }
      .breathe-circle-wrapper { width: 200px; height: 200px; }
      .breathe-circle-bg { width: 200px; height: 200px; }
      .breathe-circle { width: 90px; height: 90px; }
    }

    /* ===== FADE SECTIONS ===== */
    .fade-section { opacity: 0; transform: translateY(25px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-section.visible { opacity: 1; transform: translateY(0); }

    /* ===== POEM TRANSITION ===== */
    .poem-fade-out { animation: poemOut 0.3s ease forwards; }
    .poem-fade-in { animation: poemIn 0.4s ease forwards; }
    @keyframes poemOut { to { opacity: 0; transform: translateY(-10px); } }
    @keyframes poemIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== ADD POEM MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(74,63,53,0.5); backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--cream); border-radius: 1rem; width: 100%; max-width: 500px;
      max-height: 85vh; overflow-y: auto; padding: 2rem;
      box-shadow: 0 20px 60px rgba(92,74,50,0.2);
    }
    .modal h2 {
      font-size: 1.2rem; font-weight: 500; color: var(--dark-brown);
      margin-bottom: 1.5rem; text-align: center;
    }
    .modal label {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.8rem;
      color: var(--text-light); font-weight: 400; letter-spacing: 0.08em;
      display: block; margin-bottom: 0.4rem; margin-top: 1rem;
    }
    .modal input, .modal textarea {
      width: 100%; padding: 0.7rem 1rem; border: 1px solid var(--latte);
      border-radius: 0.5rem; font-family: 'Noto Serif TC', serif;
      font-size: 0.9rem; color: var(--text); background: #fff;
      outline: none; transition: border 0.3s;
    }
    .modal input:focus, .modal textarea:focus { border-color: var(--soft-orange); }
    .modal textarea { min-height: 120px; resize: vertical; line-height: 1.8; }
    .modal-actions {
      display: flex; gap: 0.8rem; margin-top: 1.5rem; justify-content: center;
    }
    .modal-actions button {
      padding: 0.6rem 1.8rem; border-radius: 2rem; font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem; letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s;
    }
    .btn-save {
      background: var(--dark-brown); color: var(--cream); border: none;
    }
    .btn-save:hover { background: var(--brown); }
    .btn-cancel {
      background: transparent; border: 1px solid var(--latte); color: var(--brown);
    }
    .btn-cancel:hover { background: var(--warm-beige); }
    .custom-badge {
      display: inline-block; background: var(--soft-orange); color: #fff;
      font-size: 0.6rem; padding: 0.15rem 0.5rem; border-radius: 1rem;
      margin-left: 0.4rem; vertical-align: middle; font-family: 'Noto Sans TC', sans-serif;
    }
  </style>
</head>

   "而候鳥都能飛回故鄉",
   "",
   "一定有些什麼 是我所無能為力的",
   "不然 日與夜怎麼交替得",
   "那樣快",
   "所有的時刻都已錯過",
   "憂傷蝕我心懷"
  ],
  "note": "有些事無法掌控，放下也是一種力量。"
 },
 {
  "title": "一棵開花的樹",
  "author": "席慕蓉",
  "body": [
   "如何讓你遇見我",
   "在我最美麗的時刻",
   "為這",
   "我已在佛前求了五百年",
   "求佛讓我們結一段塵緣",
   "",
   "佛於是把我化作一棵樹",
   "長在你必經的路旁",
   "陽光下慎重地開滿了花",
   "朵朵都是我前世的盼望",
   "",
   "當你走近 請你細聽",
   "那顫抖的葉是我等待的熱情",
   "而當你終於無視地走過",
   "在你身後落了一地的",
   "朋友啊 那不是花瓣",
   "是我凋零的心"
  ],
  "note": "每一朵花開，都是一份用心的等待。"
 },
 {
  "title": "蓮的心事",
  "author": "席慕蓉",
  "body": [
   "我是一朵盛開的夏荷",
   "多希望",
   "你能看見現在的我",
   "",
   "風霜還不曾來侵蝕",
   "秋雨還未滴落",
   "青澀的季節又已離我遠去",
   "我已亭亭 不憂 亦不懼",
   "",
   "現在 正是",
   "我最美麗的時刻"
  ],
  "note": "此刻，就是你最美麗的時刻。"
 },
 {
  "title": "抉擇",
  "author": "席慕蓉",
  "body": [
   "假如我來世上一遭",
   "只為與你相聚一次",
   "只為了億萬光年裡的那一剎那",
   "一剎那裡所有的甜蜜與悲淒",
   "",
   "那麼 就讓一切該發生的",
   "都在瞬間出現",
   "讓我俯首感謝所有星球的相助",
   "讓我與你相遇",
   "與你別離"
  ],
  "note": "感謝所有的相遇，即使短暫。"
 },
 {
  "title": "出塞曲",
  "author": "席慕蓉",
  "body": [
   "請為我唱一首出塞曲",
   "用那遺忘了的古老言語",
   "請用美麗的顫音輕輕呼喚",
   "我心中的大好河山"
  ],
  "note": "心中有遼闊，到哪裡都是天涯。"
 },
 {
  "title": "初戀",
  "author": "席慕蓉",
  "body": [
   "還記得年少時的夢嗎",
   "像朵永遠不凋零的花",
   "陪我經過那風吹雨打",
   "看世事無常",
   "看滄桑變化"
  ],
  "note": "年少的夢不會老，它只是在心裡安靜地開著。"
 },
 {
  "title": "旅程",
  "author": "席慕蓉",
  "body": [
   "我總覺得",
   "每一條走過來的路",
   "都有不得不這樣跋涉的理由",
   "每一條要走下去的路",
   "都有不得不這樣選擇的方向"
  ],
  "note": "每一步都有它的意義。"
 },
 {
  "title": "覺",
  "author": "楊牧",
  "body": [
   "彷彿有人在遠方呼喚",
   "什麼驚覺了我的睡眠",
   "窗外是繁星和燈火",
   "階前落著昨夜的雨"
  ],
  "note": "被什麼驚醒的瞬間，世界格外清晰。"
 },
 {
  "title": "有人問我公理和正義的問題",
  "author": "楊牧",
  "body": [
   "有人問我公理和正義的問題",
   "寫在乾枯的葦草上",
   "——我在暮色中向他乞求最後的",
   "一點點寬容"
  ],
  "note": "在複雜的世界裡，保持溫柔已經是一種正義。"
 },
 {
  "title": "下午茶",
  "author": "夏宇",
  "body": [
   "把你的影子加點鹽",
   "醃起來",
   "風乾",
   "",
   "老的時候",
   "下酒"
  ],
  "note": "把回憶好好收藏。"
 },
 {
  "title": "甜蜜的復仇",
  "author": "夏宇",
  "body": [
   "把你的影子加點鹽",
   "醃起來",
   "風乾",
   "",
   "老的時候",
   "下酒"
  ],
  "note": "思念可以很甜，也可以很烈。"
 },
 {
  "title": "背影",
  "author": "夏宇",
  "body": [
   "你往我的方向走來",
   "相距一百步的時候",
   "我開始偷看你",
   "相距五十步的時候",
   "我開始微笑",
   "而在我們交錯而過的那一剎那",
   "我轉身",
   "看你的背影"
  ],
  "note": "有些人，只能看著他走遠。"
 },
 {
  "title": "回家",
  "author": "顧城",
  "body": [
   "我的心",
   "是一座城",
   "一座最小的城",
   "",
   "沒有雜亂的市場",
   "沒有眾多的居民",
   "冷冷清清",
   "只有一片落葉",
   "只有一簇花叢",
   "還偷偷掩藏著",
   "兒時的深情"
  ],
  "note": "心裡那座小小的城，永遠住著純真的自己。"
 },
 {
  "title": "小巷",
  "author": "顧城",
  "body": [
   "小巷",
   "又彎又長",
   "沒有門",
   "沒有窗",
   "你拿把舊鑰匙",
   "敲著厚厚的牆"
  ],
  "note": "找不到入口的時候，也許該換一條路。"
 },
 {
  "title": "我是一個任性的孩子",
  "author": "顧城",
  "body": [
   "我想在大地上畫滿窗子",
   "讓所有習慣黑暗的眼睛",
   "都習慣光明",
   "",
   "我是一個任性的孩子",
   "我想塗去一切不幸",
   "我想在大地上",
   "用我稚嫩的手指",
   "和蠟筆",
   "畫下永遠不會流淚的眼睛"
  ],
  "note": "願每一雙眼睛都習慣光明。"
 },
 {
  "title": "墓床",
  "author": "顧城",
  "body": [
   "我知道永逝降臨，並不悲傷",
   "松林中安放著我的願望",
   "下邊有海，遠看像水池",
   "一點點跟我的是下午的陽光"
  ],
  "note": "如果能帶走一樣東西，就帶走下午的陽光。"
 },
 {
  "title": "感覺",
  "author": "顧城",
  "body": [
   "天是灰色的",
   "路是灰色的",
   "樓是灰色的",
   "雨是灰色的",
   "",
   "在一片死灰之中",
   "走過兩個孩子",
   "一個鮮紅",
   "一個淡綠"
  ],
  "note": "灰色的日子裡，你就是那抹色彩。"
 },
 {
  "title": "有的人",
  "author": "臧克家",
  "body": [
   "有的人活著",
   "他已經死了",
   "有的人死了",
   "他還活著",
   "",
   "有的人",
   "騎在人民頭上：「呵，我多偉大！」",
   "有的人",
   "俯下身子給人民當牛馬"
  ],
  "note": "活著的方式，比活著本身更重要。"
 },
 {
  "title": "當你老了",
  "author": "葉芝（余光中譯）",
  "body": [
   "當你老了，頭白了，睡意昏沉",
   "爐火旁打盹，請取下這部詩歌",
   "慢慢讀，回想你過去眼神的柔和",
   "回想它們昔日濃重的陰影",
   "",
   "多少人愛你青春歡暢的時辰",
   "愛慕你的美麗，假意或真心",
   "只有一個人愛你那朝聖者的靈魂",
   "愛你衰老了的臉上痛苦的皺紋"
  ],
  "note": "真正的愛，是愛你靈魂的樣子。"
 },
 {
  "title": "我喜歡你是寂靜的",
  "author": "聶魯達（陳黎譯）",
  "body": [
   "我喜歡你是寂靜的，彷彿你消失了一樣",
   "你從遠處聆聽我，我的聲音卻無法觸及你",
   "好像你的雙眼已經飛離去",
   "如同一個吻，封緘了你的嘴"
  ],
  "note": "最深的連結，有時候在沉默裡。"
 },
 {
  "title": "自由",
  "author": "保羅·艾呂雅（戴望舒譯）",
  "body": [
   "在我的練習簿上",
   "在我的課桌和樹木上",
   "在沙上 在雪上",
   "我寫下你的名字",
   "",
   "在每一頁讀過的書上",
   "在每一頁白紙上",
   "石上 血上 紙上 灰上",
   "我寫下你的名字",
   "",
   "藉著一個字的力量",
   "我重新開始我的生活",
   "我生來是為了認識你",
   "為了呼喊你的名字",
   "",
   "自由"
  ],
  "note": "自由不是遠方，是你心裡喊得出的名字。"
 },
 {
  "title": "靜夜思",
  "author": "唐·李白",
  "body": [
   "床前明月光",
   "疑是地上霜",
   "舉頭望明月",
   "低頭思故鄉"
  ],
  "note": "千年以前的月光，和今晚的一樣溫柔。"
 },
 {
  "title": "春曉",
  "author": "唐·孟浩然",
  "body": [
   "春眠不覺曉",
   "處處聞啼鳥",
   "夜來風雨聲",
   "花落知多少"
  ],
  "note": "允許自己在春天多睡一會兒。"
 },
 {
  "title": "登鸛雀樓",
  "author": "唐·王之渙",
  "body": [
   "白日依山盡",
   "黃河入海流",
   "欲窮千里目",
   "更上一層樓"
  ],
  "note": "想看得更遠，就往上走一步。"
 },
 {
  "title": "江雪",
  "author": "唐·柳宗元",
  "body": [
   "千山鳥飛絕",
   "萬徑人蹤滅",
   "孤舟蓑笠翁",
   "獨釣寒江雪"
  ],
  "note": "極致的孤獨裡，藏著極致的自在。"
 },
 {
  "title": "楓橋夜泊",
  "author": "唐·張繼",
  "body": [
   "月落烏啼霜滿天",
   "江楓漁火對愁眠",
   "姑蘇城外寒山寺",
   "夜半鐘聲到客船"
  ],
  "note": "睡不著的夜晚，世界反而安靜得剛好。"
 },
 {
  "title": "春望",
  "author": "唐·杜甫",
  "body": [
   "國破山河在，城春草木深",
   "感時花濺淚，恨別鳥驚心",
   "烽火連三月，家書抵萬金",
   "白頭搔更短，渾欲不勝簪"
  ],
  "note": "珍惜身邊每一封溫暖的訊息。"
 },
 {
  "title": "登高",
  "author": "唐·杜甫",
  "body": [
   "風急天高猿嘯哀，渚清沙白鳥飛回",
   "無邊落木蕭蕭下，不盡長江滾滾來",
   "萬里悲秋常作客，百年多病獨登台",
   "艱難苦恨繁霜鬢，潦倒新停濁酒杯"
  ],
  "note": "站在高處，深呼吸，然後繼續。"
 },
 {
  "title": "相思",
  "author": "唐·王維",
  "body": [
   "紅豆生南國",
   "春來發幾枝",
   "願君多采擷",
   "此物最相思"
  ],
  "note": "想念，也是一種溫柔。"
 },
 {
  "title": "竹里館",
  "author": "唐·王維",
  "body": [
   "獨坐幽篁裡",
   "彈琴復長嘯",
   "深林人不知",
   "明月來相照"
  ],
  "note": "獨處不是寂寞，月光懂你。"
 },
 {
  "title": "送元二使安西",
  "author": "唐·王維",
  "body": [
   "渭城朝雨浥輕塵",
   "客舍青青柳色新",
   "勸君更盡一杯酒",
   "西出陽關無故人"
  ],
  "note": "每一次道別，都值得好好說聲珍重。"
 },
 {
  "title": "鹿柴",
  "author": "唐·王維",
  "body": [
   "空山不見人",
   "但聞人語響",
   "返景入深林",
   "復照青苔上"
  ],
  "note": "安靜到能聽見光的腳步。"
 },
 {
  "title": "山居秋暝",
  "author": "唐·王維",
  "body": [
   "空山新雨後，天氣晚來秋",
   "明月松間照，清泉石上流",
   "竹喧歸浣女，蓮動下漁舟",
   "隨意春芳歇，王孫自可留"
  ],
  "note": "雨後的山，就像洗過的心。"
 },
 {
  "title": "九月九日憶山東兄弟",
  "author": "唐·王維",
  "body": [
   "獨在異鄉為異客",
   "每逢佳節倍思親",
   "遙知兄弟登高處",
   "遍插茱萸少一人"
  ],
  "note": "節日最想的，是遠方的家人。"
 },
 {
  "title": "使至塞上",
  "author": "唐·王維",
  "body": [
   "單車欲問邊，屬國過居延",
   "征蓬出漢塞，歸雁入胡天",
   "大漠孤煙直，長河落日圓",
   "蕭關逢候騎，都護在燕然"
  ],
  "note": "孤獨的路上，風景反而更遼闊。"
 },
 {
  "title": "望廬山瀑布",
  "author": "唐·李白",
  "body": [
   "日照香爐生紫煙",
   "遙看瀑布掛前川",
   "飛流直下三千尺",
   "疑是銀河落九天"
  ],
  "note": "壯闊的風景，能讓心變得開闊。"
 },
 {
  "title": "早發白帝城",
  "author": "唐·李白",
  "body": [
   "朝辭白帝彩雲間",
   "千里江陵一日還",
   "兩岸猿聲啼不住",
   "輕舟已過萬重山"
  ],
  "note": "輕舟過萬山，什麼都擋不住前進的心。"
 },
 {
  "title": "將進酒",
  "author": "唐·李白",
  "body": [
   "君不見黃河之水天上來，奔流到海不復回",
   "君不見高堂明鏡悲白髮，朝如青絲暮成雪",
   "人生得意須盡歡，莫使金樽空對月",
   "天生我材必有用，千金散盡還復來"
  ],
  "note": "天生我材必有用，好好地欣賞自己。"
 },
 {
  "title": "月下獨酌",
  "author": "唐·李白",
  "body": [
   "花間一壺酒，獨酌無相親",
   "舉杯邀明月，對影成三人",
   "月既不解飲，影徒隨我身",
   "暫伴月將影，行樂須及春"
  ],
  "note": "就算只有自己，也值得好好慶祝。"
 },
 {
  "title": "行路難",
  "author": "唐·李白",
  "body": [
   "金樽清酒斗十千，玉盤珍羞直萬錢",
   "停杯投箸不能食，拔劍四顧心茫然",
   "",
   "欲渡黃河冰塞川，將登太行雪滿山",
   "",
   "行路難，行路難，多歧路，今安在",
   "長風破浪會有時，直掛雲帆濟滄海"
  ],
  "note": "路再難，總有破浪的時候。"
 },
 {
  "title": "送友人",
  "author": "唐·李白",
  "body": [
   "青山橫北郭，白水繞東城",
   "此地一為別，孤蓬萬里征",
   "浮雲遊子意，落日故人情",
   "揮手自茲去，蕭蕭班馬鳴"
  ],
  "note": "朋友，無論多遠，心裡都有你。"
 },
 {
  "title": "夜泊牛渚懷古",
  "author": "唐·李白",
  "body": [
   "牛渚西江夜，青天無片雲",
   "登舟望秋月，空憶謝將軍",
   "余亦能高詠，斯人不可聞",
   "明朝掛帆席，楓葉落紛紛"
  ],
  "note": "想念一個懂你的人。"
 },
 {
  "title": "黃鶴樓送孟浩然之廣陵",
  "author": "唐·李白",
  "body": [
   "故人西辭黃鶴樓",
   "煙花三月下揚州",
   "孤帆遠影碧空盡",
   "唯見長江天際流"
  ],
  "note": "看著朋友遠去，心隨江水流。"
 },
 {
  "title": "獨坐敬亭山",
  "author": "唐·李白",
  "body": [
   "眾鳥高飛盡",
   "孤雲獨去閒",
   "相看兩不厭",
   "只有敬亭山"
  ],
  "note": "找到那個看不厭的存在。"
 },
 {
  "title": "春夜喜雨",
  "author": "唐·杜甫",
  "body": [
   "好雨知時節，當春乃發生",
   "隨風潛入夜，潤物細無聲",
   "野徑雲俱黑，江船火獨明",
   "曉看紅濕處，花重錦官城"
  ],
  "note": "最好的愛，像春雨一樣潤物無聲。"
 },
 {
  "title": "絕句",
  "author": "唐·杜甫",
  "body": [
   "兩個黃鸝鳴翠柳",
   "一行白鷺上青天",
   "窗含西嶺千秋雪",
   "門泊東吳萬里船"
  ],
  "note": "推開窗，世界就在眼前。"
 },
 {
  "title": "月夜",
  "author": "唐·杜甫",
  "body": [
   "今夜鄜州月，閨中只獨看",
   "遙憐小兒女，未解憶長安",
   "香霧雲鬟濕，清輝玉臂寒",
   "何時倚虛幌，雙照淚痕乾"
  ],
  "note": "想家的心，月亮都看得見。"
 },
 {
  "title": "望岳",
  "author": "唐·杜甫",
  "body": [
   "岱宗夫如何？齊魯青未了",
   "造化鍾神秀，陰陽割昏曉",
   "蕩胸生層雲，決眥入歸鳥",
   "會當凌絕頂，一覽眾山小"
  ],
  "note": "站到頂峰，一切都變得渺小。"
 },
 {
  "title": "旅夜書懷",
  "author": "唐·杜甫",
  "body": [
   "細草微風岸，危檣獨夜舟",
   "星垂平野闊，月湧大江流",
   "名豈文章著，官應老病休",
   "飄飄何所似，天地一沙鷗"
  ],
  "note": "天地間，做一隻自由的鷗鳥也好。"
 },
 {
  "title": "過故人莊",
  "author": "唐·孟浩然",
  "body": [
   "故人具雞黍，邀我至田家",
   "綠樹村邊合，青山郭外斜",
   "開軒面場圃，把酒話桑麻",
   "待到重陽日，還來就菊花"
  ],
  "note": "老朋友家的飯菜，是最溫暖的味道。"
 },
 {
  "title": "宿建德江",
  "author": "唐·孟浩然",
  "body": [
   "移舟泊煙渚",
   "日暮客愁新",
   "野曠天低樹",
   "江清月近人"
  ],
  "note": "孤獨的時候，月亮離你最近。"
 },
 {
  "title": "涼州詞",
  "author": "唐·王之渙",
  "body": [
   "黃河遠上白雲間",
   "一片孤城萬仞山",
   "羌笛何須怨楊柳",
   "春風不度玉門關"
  ],
  "note": "有些地方春風到不了，但思念可以。"
 },
 {
  "title": "涼州詞",
  "author": "唐·王翰",
  "body": [
   "葡萄美酒夜光杯",
   "欲飲琵琶馬上催",
   "醉臥沙場君莫笑",
   "古來征戰幾人回"
  ],
  "note": "此刻能喝一杯茶，已是幸福。"
 },
 {
  "title": "出塞",
  "author": "唐·王昌齡",
  "body": [
   "秦時明月漢時關",
   "萬里長征人未還",
   "但使龍城飛將在",
   "不教胡馬度陰山"
  ],
  "note": "守護重要的人，是最古老的浪漫。"
 },
 {
  "title": "芙蓉樓送辛漸",
  "author": "唐·王昌齡",
  "body": [
   "寒雨連江夜入吳",
   "平明送客楚山孤",
   "洛陽親友如相問",
   "一片冰心在玉壺"
  ],
  "note": "無論外在如何，保持心的清澈。"
 },
 {
  "title": "閨怨",
  "author": "唐·王昌齡",
  "body": [
   "閨中少婦不知愁",
   "春日凝妝上翠樓",
   "忽見陌頭楊柳色",
   "悔教夫婿覓封侯"
  ],
  "note": "有時候，陪伴比成就更重要。"
 },
 {
  "title": "回鄉偶書",
  "author": "唐·賀知章",
  "body": [
   "少小離家老大回",
   "鄉音無改鬢毛衰",
   "兒童相見不相識",
   "笑問客從何處來"
  ],
  "note": "離開太久，家鄉認不出你，但你還記得它。"
 },
 {
  "title": "詠柳",
  "author": "唐·賀知章",
  "body": [
   "碧玉妝成一樹高",
   "萬條垂下綠絲絛",
   "不知細葉誰裁出",
   "二月春風似剪刀"
  ],
  "note": "春天的手藝，比任何人都精巧。"
 },
 {
  "title": "滁州西澗",
  "author": "唐·韋應物",
  "body": [
   "獨憐幽草澗邊生",
   "上有黃鸝深樹鳴",
   "春潮帶雨晚來急",
   "野渡無人舟自橫"
  ],
  "note": "無人的渡口，船也可以悠閒。"
 },
 {
  "title": "遊子吟",
  "author": "唐·孟郊",
  "body": [
   "慈母手中線",
   "遊子身上衣",
   "臨行密密縫",
   "意恐遲遲歸",
   "誰言寸草心",
   "報得三春暉"
  ],
  "note": "媽媽的愛，是穿在身上的溫暖。"
 },
 {
  "title": "題都城南莊",
  "author": "唐·崔護",
  "body": [
   "去年今日此門中",
   "人面桃花相映紅",
   "人面不知何處去",
   "桃花依舊笑春風"
  ],
  "note": "花還在，人已遠。珍惜每一次相見。"
 },
 {
  "title": "黃鶴樓",
  "author": "唐·崔顥",
  "body": [
   "昔人已乘黃鶴去，此地空餘黃鶴樓",
   "黃鶴一去不復返，白雲千載空悠悠",
   "晴川歷歷漢陽樹，芳草萋萋鸚鵡洲",
   "日暮鄉關何處是？煙波江上使人愁"
  ],
  "note": "站在高樓上，最想看見的是回家的路。"
 },
 {
  "title": "登幽州台歌",
  "author": "唐·陳子昂",
  "body": [
   "前不見古人",
   "後不見來者",
   "念天地之悠悠",
   "獨愴然而涕下"
  ],
  "note": "天地之間，感受自己的渺小與偉大。"
 },
 {
  "title": "望月懷遠",
  "author": "唐·張九齡",
  "body": [
   "海上生明月，天涯共此時",
   "情人怨遙夜，竟夕起相思",
   "滅燭憐光滿，披衣覺露滋",
   "不堪盈手贈，還寢夢佳期"
  ],
  "note": "同一輪月亮下，有人也在想你。"
 },
 {
  "title": "終南望餘雪",
  "author": "唐·祖詠",
  "body": [
   "終南陰嶺秀",
   "積雪浮雲端",
   "林表明霽色",
   "城中增暮寒"
  ],
  "note": "遠處的雪山，讓城裡多了一份靜。"
 },
 {
  "title": "烏衣巷",
  "author": "唐·劉禹錫",
  "body": [
   "朱雀橋邊野草花",
   "烏衣巷口夕陽斜",
   "舊時王謝堂前燕",
   "飛入尋常百姓家"
  ],
  "note": "繁華會過去，平淡才是真。"
 },
 {
  "title": "竹枝詞",
  "author": "唐·劉禹錫",
  "body": [
   "楊柳青青江水平",
   "聞郎江上唱歌聲",
   "東邊日出西邊雨",
   "道是無晴卻有晴"
  ],
  "note": "是晴是雨，心裡自有答案。"
 },
 {
  "title": "酬樂天揚州初逢席上見贈",
  "author": "唐·劉禹錫",
  "body": [
   "巴山楚水淒涼地，二十三年棄置身",
   "懷舊空吟聞笛賦，到鄉翻似爛柯人",
   "沉舟側畔千帆過，病樹前頭萬木春",
   "今日聽君歌一曲，暫憑杯酒長精神"
  ],
  "note": "沉舟側畔千帆過，一切都會過去的。"
 },
 {
  "title": "賦得古原草送別",
  "author": "唐·白居易",
  "body": [
   "離離原上草，一歲一枯榮",
   "野火燒不盡，春風吹又生",
   "遠芳侵古道，晴翠接荒城",
   "又送王孫去，萋萋滿別情"
  ],
  "note": "再大的困難，春天一來就重新開始。"
 },
 {
  "title": "錢塘湖春行",
  "author": "唐·白居易",
  "body": [
   "孤山寺北賈亭西，水面初平雲腳低",
   "幾處早鶯爭暖樹，誰家新燕啄春泥",
   "亂花漸欲迷人眼，淺草才能沒馬蹄",
   "最愛湖東行不足，綠楊陰裏白沙堤"
  ],
  "note": "春天來了，就出去走走吧。"
 },
 {
  "title": "暮江吟",
  "author": "唐·白居易",
  "body": [
   "一道殘陽鋪水中",
   "半江瑟瑟半江紅",
   "可憐九月初三夜",
   "露似真珠月似弓"
  ],
  "note": "日落時的江面，美得像一幅畫。"
 },
 {
  "title": "問劉十九",
  "author": "唐·白居易",
  "body": [
   "綠蟻新醅酒",
   "紅泥小火爐",
   "晚來天欲雪",
   "能飲一杯無"
  ],
  "note": "天冷了，找個人一起喝杯熱的。"
 },
 {
  "title": "長恨歌（節選）",
  "author": "唐·白居易",
  "body": [
   "在天願作比翼鳥",
   "在地願為連理枝",
   "天長地久有時盡",
   "此恨綿綿無絕期"
  ],
  "note": "深情到極致，就成了永恆。"
 },
 {
  "title": "琵琶行（節選）",
  "author": "唐·白居易",
  "body": [
   "千呼萬喚始出來，猶抱琵琶半遮面",
   "轉軸撥弦三兩聲，未成曲調先有情",
   "",
   "同是天涯淪落人，相逢何必曾相識"
  ],
  "note": "懂你的人，不需要太多解釋。"
 },
 {
  "title": "無題",
  "author": "唐·李商隱",
  "body": [
   "相見時難別亦難，東風無力百花殘",
   "春蠶到死絲方盡，蠟炬成灰淚始乾",
   "曉鏡但愁雲鬢改，夜吟應覺月光寒",
   "蓬山此去無多路，青鳥殷勤為探看"
  ],
  "note": "思念到極致，春蠶和蠟燭都懂。"
 },
 {
  "title": "夜雨寄北",
  "author": "唐·李商隱",
  "body": [
   "君問歸期未有期",
   "巴山夜雨漲秋池",
   "何當共剪西窗燭",
   "卻話巴山夜雨時"
  ],
  "note": "最浪漫的事，是把思念留到重逢時說。"
 },
 {
  "title": "錦瑟",
  "author": "唐·李商隱",
  "body": [
   "錦瑟無端五十弦，一弦一柱思華年",
   "莊生曉夢迷蝴蝶，望帝春心托杜鵑",
   "滄海月明珠有淚，藍田日暖玉生煙",
   "此情可待成追憶，只是當時已惘然"
  ],
  "note": "最美的感覺，往往在回憶裡才懂。"
 },
 {
  "title": "嫦娥",
  "author": "唐·李商隱",
  "body": [
   "雲母屏風燭影深",
   "長河漸落曉星沉",
   "嫦娥應悔偷靈藥",
   "碧海青天夜夜心"
  ],
  "note": "得到了自由，卻失去了陪伴。"
 },
 {
  "title": "贈別",
  "author": "唐·杜牧",
  "body": [
   "多情卻似總無情",
   "唯覺樽前笑不成",
   "蠟燭有心還惜別",
   "替人垂淚到天明"
  ],
  "note": "連蠟燭都為離別流淚。"
 },
 {
  "title": "泊秦淮",
  "author": "唐·杜牧",
  "body": [
   "煙籠寒水月籠沙",
   "夜泊秦淮近酒家",
   "商女不知亡國恨",
   "隔江猶唱後庭花"
  ],
  "note": "歷史的歌聲，穿越千年。"
 },
 {
  "title": "清明",
  "author": "唐·杜牧",
  "body": [
   "清明時節雨紛紛",
   "路上行人欲斷魂",
   "借問酒家何處有",
   "牧童遙指杏花村"
  ],
  "note": "雨天迷路的時候，總有人為你指路。"
 },
 {
  "title": "山行",
  "author": "唐·杜牧",
  "body": [
   "遠上寒山石徑斜",
   "白雲生處有人家",
   "停車坐愛楓林晚",
   "霜葉紅於二月花"
  ],
  "note": "秋天的紅葉，比春花更熱烈。"
 },
 {
  "title": "秋夕",
  "author": "唐·杜牧",
  "body": [
   "銀燭秋光冷畫屏",
   "輕羅小扇撲流螢",
   "天階夜色涼如水",
   "臥看牽牛織女星"
  ],
  "note": "涼涼的夜晚，躺著看星星。"
 },
 {
  "title": "江南春",
  "author": "唐·杜牧",
  "body": [
   "千里鶯啼綠映紅",
   "水村山郭酒旗風",
   "南朝四百八十寺",
   "多少樓台煙雨中"
  ],
  "note": "江南的春天，是一場煙雨中的夢。"
 },
 {
  "title": "寄揚州韓綽判官",
  "author": "唐·杜牧",
  "body": [
   "青山隱隱水迢迢",
   "秋盡江南草未凋",
   "二十四橋明月夜",
   "玉人何處教吹簫"
  ],
  "note": "遠方的朋友，今晚月光也照著你嗎？"
 },
 {
  "title": "金縷衣",
  "author": "唐·杜秋娘",
  "body": [
   "勸君莫惜金縷衣",
   "勸君惜取少年時",
   "花開堪折直須折",
   "莫待無花空折枝"
  ],
  "note": "想做的事，趁現在。"
 },
 {
  "title": "商山早行",
  "author": "唐·溫庭筠",
  "body": [
   "晨起動征鐸，客行悲故鄉",
   "雞聲茅店月，人跡板橋霜",
   "槲葉落山路，枳花明驛牆",
   "因思杜陵夢，鳧雁滿回塘"
  ],
  "note": "天還沒亮就出發，旅人的鄉愁特別濃。"
 },
 {
  "title": "望嶽",
  "author": "唐·杜甫",
  "body": [
   "岱宗夫如何，齊魯青未了",
   "造化鍾神秀，陰陽割昏曉",
   "蕩胸生層雲，決眥入歸鳥",
   "會當凌絕頂，一覽眾山小"
  ],
  "note": "總有一天，你會站上自己的山頂。"
 },
 {
  "title": "題破山寺後禪院",
  "author": "唐·常建",
  "body": [
   "清晨入古寺，初日照高林",
   "曲徑通幽處，禪房花木深",
   "山光悅鳥性，潭影空人心",
   "萬籟此俱寂，但餘鐘磬音"
  ],
  "note": "找一個安靜的角落，清空心裡的雜音。"
 },
 {
  "title": "春江花月夜（節選）",
  "author": "唐·張若虛",
  "body": [
   "春江潮水連海平，海上明月共潮生",
   "灩灩隨波千萬里，何處春江無月明",
   "",
   "江畔何人初見月，江月何年初照人",
   "人生代代無窮已，江月年年望相似",
   "不知江月待何人，但見長江送流水"
  ],
  "note": "月亮年年相似，而我們每天都是新的。"
 },
 {
  "title": "送杜少府之任蜀州",
  "author": "唐·王勃",
  "body": [
   "城闕輔三秦，風煙望五津",
   "與君離別意，同是宦遊人",
   "海內存知己，天涯若比鄰",
   "無為在歧路，兒女共沾巾"
  ],
  "note": "真正的朋友，不怕距離。"
 },
 {
  "title": "別董大",
  "author": "唐·高適",
  "body": [
   "千里黃雲白日曛",
   "北風吹雁雪紛紛",
   "莫愁前路無知己",
   "天下誰人不識君"
  ],
  "note": "不要擔心前方沒有知己。"
 },
 {
  "title": "塞下曲",
  "author": "唐·盧綸",
  "body": [
   "月黑雁飛高",
   "單于夜遁逃",
   "欲將輕騎逐",
   "大雪滿弓刀"
  ],
  "note": "在最暗的夜，做最勇敢的事。"
 },
 {
  "title": "逢入京使",
  "author": "唐·岑參",
  "body": [
   "故園東望路漫漫",
   "雙袖龍鍾淚不乾",
   "馬上相逢無紙筆",
   "憑君傳語報平安"
  ],
  "note": "遇到回家的人，請幫我帶一句：我很好。"
 },
 {
  "title": "白雪歌送武判官歸京（節選）",
  "author": "唐·岑參",
  "body": [
   "北風卷地白草折，胡天八月即飛雪",
   "忽如一夜春風來，千樹萬樹梨花開",
   "",
   "山迴路轉不見君，雪上空留馬行處"
  ],
  "note": "雪像花一樣，離別像詩一樣。"
 },
 {
  "title": "小池",
  "author": "宋·楊萬里",
  "body": [
   "泉眼無聲惜細流",
   "樹陰照水愛晴柔",
   "小荷才露尖尖角",
   "早有蜻蜓立上頭"
  ],
  "note": "美好的事物，總是安靜地出現。"
 },
 {
  "title": "水調歌頭",
  "author": "宋·蘇軾",
  "body": [
   "明月幾時有？把酒問青天",
   "不知天上宮闕，今夕是何年",
   "我欲乘風歸去，又恐瓊樓玉宇",
   "高處不勝寒",
   "起舞弄清影，何似在人間",
   "",
   "轉朱閣，低綺戶，照無眠",
   "不應有恨，何事長向別時圓",
   "人有悲歡離合，月有陰晴圓缺",
   "此事古難全",
   "但願人長久，千里共嬋娟"
  ],
  "note": "不完美才是常態，那些不圓滿終成最美風景。"
 },
 {
  "title": "題西林壁",
  "author": "宋·蘇軾",
  "body": [
   "橫看成嶺側成峰",
   "遠近高低各不同",
   "不識廬山真面目",
   "只緣身在此山中"
  ],
  "note": "換個角度看，答案就不一樣。"
 },
 {
  "title": "飲湖上初晴後雨",
  "author": "宋·蘇軾",
  "body": [
   "水光瀲灩晴方好",
   "山色空濛雨亦奇",
   "欲把西湖比西子",
   "淡妝濃抹總相宜"
  ],
  "note": "晴天雨天，都有各自的美。"
 },
 {
  "title": "念奴嬌·赤壁懷古",
  "author": "宋·蘇軾",
  "body": [
   "大江東去，浪淘盡，千古風流人物",
   "故壘西邊，人道是，三國周郎赤壁",
   "亂石穿空，驚濤拍岸，捲起千堆雪",
   "江山如畫，一時多少豪傑",
   "",
   "遙想公瑾當年，小喬初嫁了，雄姿英發",
   "羽扇綸巾，談笑間，檣櫓灰飛煙滅",
   "故國神遊，多情應笑我，早生華髮",
   "人生如夢，一尊還酹江月"
  ],
  "note": "人生如夢，不如敬月亮一杯。"
 },
 {
  "title": "定風波",
  "author": "宋·蘇軾",
  "body": [
   "莫聽穿林打葉聲，何妨吟嘯且徐行",
   "竹杖芒鞋輕勝馬，誰怕？",
   "一蓑煙雨任平生",
   "",
   "料峭春風吹酒醒，微冷",
   "山頭斜照卻相迎",
   "回首向來蕭瑟處，歸去",
   "也無風雨也無晴"
  ],
  "note": "也無風雨也無晴，淡然就好。"
 },
 {
  "title": "江城子·密州出獵",
  "author": "宋·蘇軾",
  "body": [
   "老夫聊發少年狂",
   "左牽黃，右擎蒼",
   "錦帽貂裘，千騎卷平岡",
   "為報傾城隨太守，親射虎，看孫郎",
   "",
   "酒酣胸膽尚開張",
   "鬢微霜，又何妨",
   "持節雲中，何日遣馮唐",
   "會挽雕弓如滿月，西北望，射天狼"
  ],
  "note": "年紀不是問題，心態決定一切。"
 },
 {
  "title": "江城子·乙卯正月二十日夜記夢",
  "author": "宋·蘇軾",
  "body": [
   "十年生死兩茫茫",
   "不思量，自難忘",
   "千里孤墳，無處話淒涼",
   "縱使相逢應不識",
   "塵滿面，鬢如霜",
   "",
   "夜來幽夢忽還鄉",
   "小軒窗，正梳妝",
   "相顧無言，惟有淚千行",
   "料得年年腸斷處",
   "明月夜，短松岡"
  ],
  "note": "真正的思念，不用刻意想起，它一直在。"
 },
 {
  "title": "蝶戀花",
  "author": "宋·柳永",
  "body": [
   "佇倚危樓風細細",
   "望極春愁，黯黯生天際",
   "草色煙光殘照裡",
   "無言誰會憑闌意",
   "",
   "擬把疏狂圖一醉",
   "對酒當歌，強樂還無味",
   "衣帶漸寬終不悔",
   "為伊消得人憔悴"
  ],
  "note": "為了重要的事，一切付出都不算辛苦。"
 },
 {
  "title": "雨霖鈴",
  "author": "宋·柳永",
  "body": [
   "寒蟬淒切，對長亭晚，驟雨初歇",
   "都門帳飲無緒，留戀處，蘭舟催發",
   "執手相看淚眼，竟無語凝噎",
   "念去去，千里煙波，暮靄沉沉楚天闊",
   "",
   "多情自古傷離別，更那堪，冷落清秋節",
   "今宵酒醒何處？楊柳岸，曉風殘月",
   "此去經年，應是良辰好景虛設",
   "便縱有千種風情，更與何人說"
  ],
  "note": "離別時說不出口的，都藏在握緊的手裡。"
 },
 {
  "title": "青玉案·元夕",
  "author": "宋·辛棄疾",
  "body": [
   "東風夜放花千樹",
   "更吹落，星如雨",
   "寶馬雕車香滿路",
   "鳳簫聲動，玉壺光轉",
   "一夜魚龍舞",
   "",
   "蛾兒雪柳黃金縷",
   "笑語盈盈暗香去",
   "眾裡尋他千百度",
   "驀然回首",
   "那人卻在",
   "燈火闌珊處"
  ],
  "note": "你找的人，也許就在回頭的那一瞬間。"
 },
 {
  "title": "破陣子·為陳同甫賦壯詞以寄之",
  "author": "宋·辛棄疾",
  "body": [
   "醉裡挑燈看劍，夢回吹角連營",
   "八百里分麾下炙，五十弦翻塞外聲",
   "沙場秋點兵",
   "",
   "馬作的盧飛快，弓如霹靂弦驚",
   "了卻君王天下事，贏得生前身後名",
   "可憐白髮生"
  ],
  "note": "心中有劍，即使白髮也不老。"
 },
 {
  "title": "醜奴兒·書博山道中壁",
  "author": "宋·辛棄疾",
  "body": [
   "少年不識愁滋味",
   "愛上層樓",
   "愛上層樓",
   "為賦新詞強說愁",
   "",
   "而今識盡愁滋味",
   "欲說還休",
   "欲說還休",
   "卻道天涼好個秋"
  ],
  "note": "真正懂了愁，反而說不出口了。"
 },
 {
  "title": "西江月·夜行黃沙道中",
  "author": "宋·辛棄疾",
  "body": [
   "明月別枝驚鵲，清風半夜鳴蟬",
   "稻花香裡說豐年，聽取蛙聲一片",
   "",
   "七八個星天外，兩三點雨山前",
   "舊時茅店社林邊，路轉溪橋忽見"
  ],
  "note": "走著走著，就看見了燈火。"
 },
 {
  "title": "聲聲慢",
  "author": "宋·李清照",
  "body": [
   "尋尋覓覓，冷冷清清",
   "淒淒慘慘戚戚",
   "乍暖還寒時候",
   "最難將息",
   "",
   "三杯兩盞淡酒",
   "怎敵他、晚來風急",
   "雁過也，正傷心",
   "卻是舊時相識",
   "",
   "滿地黃花堆積",
   "憔悴損，如今有誰堪摘",
   "守著窗兒，獨自怎生得黑",
   "梧桐更兼細雨",
   "到黃昏，點點滴滴",
   "這次第，怎一個愁字了得"
  ],
  "note": "難過的時候不必假裝堅強。"
 },
 {
  "title": "如夢令",
  "author": "宋·李清照",
  "body": [
   "常記溪亭日暮",
   "沉醉不知歸路",
   "興盡晚回舟",
   "誤入藕花深處",
   "爭渡，爭渡",
   "驚起一灘鷗鷺"
  ],
  "note": "迷路有時候是最美的意外。"
 },
 {
  "title": "一剪梅",
  "author": "宋·李清照",
  "body": [
   "紅藕香殘玉簟秋",
   "輕解羅裳，獨上蘭舟",
   "雲中誰寄錦書來",
   "雁字回時，月滿西樓",
   "",
   "花自飄零水自流",
   "一種相思，兩處閒愁",
   "此情無計可消除",
   "才下眉頭，卻上心頭"
  ],
  "note": "想念是擋不住的，才下眉頭卻上心頭。"
 },
 {
  "title": "醉花陰",
  "author": "宋·李清照",
  "body": [
   "薄霧濃雲愁永晝",
   "瑞腦銷金獸",
   "佳節又重陽，玉枕紗廚，半夜涼初透",
   "",
   "東籬把酒黃昏後",
   "有暗香盈袖",
   "莫道不銷魂",
   "簾捲西風",
   "人比黃花瘦"
  ],
  "note": "想念一個人的時候，連花都覺得比你豐滿。"
 },
 {
  "title": "虞美人",
  "author": "南唐·李煜",
  "body": [
   "春花秋月何時了？往事知多少",
   "小樓昨夜又東風",
   "故國不堪回首月明中",
   "",
   "雕欄玉砌應猶在",
   "只是朱顏改",
   "問君能有幾多愁",
   "恰似一江春水向東流"
  ],
  "note": "向前看，春水依然在流。"
 },
 {
  "title": "相見歡",
  "author": "南唐·李煜",
  "body": [
   "無言獨上西樓",
   "月如鉤",
   "寂寞梧桐深院鎖清秋",
   "",
   "剪不斷",
   "理還亂",
   "是離愁",
   "別是一般滋味在心頭"
  ],
  "note": "有些心情，剪不斷理還亂。"
 },
 {
  "title": "浪淘沙",
  "author": "南唐·李煜",
  "body": [
   "簾外雨潺潺",
   "春意闌珊",
   "羅衾不耐五更寒",
   "夢裡不知身是客",
   "一晌貪歡",
   "",
   "獨自莫憑欄",
   "無限江山",
   "別時容易見時難",
   "流水落花春去也",
   "天上人間"
  ],
  "note": "珍惜每一次相見，因為下次不知在何時。"
 },
 {
  "title": "卜算子·詠梅",
  "author": "宋·陸游",
  "body": [
   "驛外斷橋邊",
   "寂寞開無主",
   "已是黃昏獨自愁",
   "更著風和雨",
   "",
   "無意苦爭春",
   "一任群芳妒",
   "零落成泥碾作塵",
   "只有香如故"
  ],
  "note": "即使凋零，也保持自己的香氣。"
 },
 {
  "title": "釵頭鳳",
  "author": "宋·陸游",
  "body": [
   "紅酥手，黃藤酒",
   "滿城春色宮牆柳",
   "東風惡，歡情薄",
   "一懷愁緒，幾年離索",
   "錯，錯，錯",
   "",
   "春如舊，人空瘦",
   "淚痕紅浥鮫綃透",
   "桃花落，閒池閣",
   "山盟雖在，錦書難托",
   "莫，莫，莫"
  ],
  "note": "有些遺憾，只能用「莫」字結尾。"
 },
 {
  "title": "遊山西村",
  "author": "宋·陸游",
  "body": [
   "莫笑農家臘酒渾，豐年留客足雞豚",
   "山重水複疑無路，柳暗花明又一村",
   "簫鼓追隨春社近，衣冠簡樸古風存",
   "從今若許閒乘月，拄杖無時夜叩門"
  ],
  "note": "看似無路的時候，往往轉角就是花明。"
 },
 {
  "title": "示兒",
  "author": "宋·陸游",
  "body": [
   "死去元知萬事空",
   "但悲不見九州同",
   "王師北定中原日",
   "家祭無忘告乃翁"
  ],
  "note": "心裡放不下的事，就是最重要的事。"
 },
 {
  "title": "滿江紅",
  "author": "宋·岳飛",
  "body": [
   "怒髮衝冠，憑闌處、瀟瀟雨歇",
   "抬望眼、仰天長嘯，壯懷激烈",
   "三十功名塵與土，八千里路雲和月",
   "莫等閒、白了少年頭，空悲切",
   "",
   "靖康恥，猶未雪",
   "臣子恨，何時滅",
   "駕長車，踏破賀蘭山缺",
   "壯志飢餐胡虜肉，笑談渴飲匈奴血",
   "待從頭、收拾舊山河，朝天闕"
  ],
  "note": "莫等閒，白了少年頭。"
 },
 {
  "title": "水龍吟·登建康賞心亭",
  "author": "宋·辛棄疾",
  "body": [
   "楚天千里清秋",
   "水隨天去秋無際",
   "遙岑遠目，獻愁供恨，玉簪螺髻",
   "落日樓頭，斷鴻聲裡，江南遊子",
   "把吳鉤看了，欄杆拍遍",
   "無人會，登臨意"
  ],
  "note": "拍遍欄杆也無人懂，但你會懂自己。"
 },
 {
  "title": "鵲橋仙",
  "author": "宋·秦觀",
  "body": [
   "纖雲弄巧，飛星傳恨",
   "銀漢迢迢暗度",
   "金風玉露一相逢",
   "便勝卻人間無數",
   "",
   "柔情似水，佳期如夢",
   "忍顧鵲橋歸路",
   "兩情若是久長時",
   "又豈在朝朝暮暮"
  ],
  "note": "真正的感情，不在乎距離。"
 },
 {
  "title": "春日",
  "author": "宋·朱熹",
  "body": [
   "勝日尋芳泗水濱",
   "無邊光景一時新",
   "等閒識得東風面",
   "萬紫千紅總是春"
  ],
  "note": "打開心，萬紫千紅都是春天。"
 },
 {
  "title": "觀書有感",
  "author": "宋·朱熹",
  "body": [
   "半畝方塘一鑑開",
   "天光雲影共徘徊",
   "問渠那得清如許",
   "為有源頭活水來"
  ],
  "note": "持續學習，心就不會乾涸。"
 },
 {
  "title": "過零丁洋",
  "author": "宋·文天祥",
  "body": [
   "辛苦遭逢起一經，干戈寥落四周星",
   "山河破碎風飄絮，身世浮沉雨打萍",
   "惶恐灘頭說惶恐，零丁洋裡嘆零丁",
   "人生自古誰無死，留取丹心照汗青"
  ],
  "note": "無論何時，保持心中的光。"
 },
 {
  "title": "泊船瓜洲",
  "author": "宋·王安石",
  "body": [
   "京口瓜洲一水間",
   "鍾山只隔數重山",
   "春風又綠江南岸",
   "明月何時照我還"
  ],
  "note": "離家越近，歸心越切。"
 },
 {
  "title": "元日",
  "author": "宋·王安石",
  "body": [
   "爆竹聲中一歲除",
   "春風送暖入屠蘇",
   "千門萬戶曈曈日",
   "總把新桃換舊符"
  ],
  "note": "新的一天，就是新的開始。"
 },
 {
  "title": "題臨安邸",
  "author": "宋·林升",
  "body": [
   "山外青山樓外樓",
   "西湖歌舞幾時休",
   "暖風薰得遊人醉",
   "直把杭州作汴州"
  ],
  "note": "沉醉是美的，但別忘了清醒。"
 },
 {
  "title": "夏日絕句",
  "author": "宋·李清照",
  "body": [
   "生當作人傑",
   "死亦為鬼雄",
   "至今思項羽",
   "不肯過江東"
  ],
  "note": "氣節，是一個人最閃亮的地方。"
 },
 {
  "title": "飲酒·其五",
  "author": "晉·陶淵明",
  "body": [
   "結廬在人境，而無車馬喧",
   "問君何能爾？心遠地自偏",
   "採菊東籬下，悠然見南山",
   "山氣日夕佳，飛鳥相與還",
   "此中有真意，欲辨已忘言"
  ],
  "note": "心靜了，喧囂也就遠了。"
 },
 {
  "title": "歸園田居·其一",
  "author": "晉·陶淵明",
  "body": [
   "少無適俗韻，性本愛丘山",
   "誤落塵網中，一去三十年",
   "羈鳥戀舊林，池魚思故淵",
   "開荒南野際，守拙歸園田",
   "",
   "方宅十餘畝，草屋八九間",
   "榆柳蔭後簷，桃李羅堂前",
   "曖曖遠人村，依依墟里煙",
   "狗吠深巷中，雞鳴桑樹顛",
   "",
   "戶庭無塵雜，虛室有餘閒",
   "久在樊籠裡，復得返自然"
  ],
  "note": "回到自然，就是回到自己。"
 },
 {
  "title": "歸園田居·其三",
  "author": "晉·陶淵明",
  "body": [
   "種豆南山下",
   "草盛豆苗稀",
   "晨興理荒穢",
   "帶月荷鋤歸",
   "",
   "道狹草木長",
   "夕露沾我衣",
   "衣沾不足惜",
   "但使願無違"
  ],
  "note": "只要不違背心願，一切辛苦都值得。"
 },
 {
  "title": "雜詩",
  "author": "晉·陶淵明",
  "body": [
   "盛年不重來",
   "一日難再晨",
   "及時當勉勵",
   "歲月不待人"
  ],
  "note": "今天，就是最好的時候。"
 },
 {
  "title": "憶江南",
  "author": "唐·白居易",
  "body": [
   "江南好，風景舊曾諳",
   "日出江花紅勝火",
   "春來江水綠如藍",
   "能不憶江南？"
  ],
  "note": "記憶裡最美的地方，是你最想回去的那裡。"
 },
 {
  "title": "長歌行",
  "author": "漢樂府",
  "body": [
   "青青園中葵，朝露待日晞",
   "陽春布德澤，萬物生光輝",
   "常恐秋節至，焜黃華葉衰",
   "百川東到海，何時復西歸",
   "少壯不努力，老大徒傷悲"
  ],
  "note": "趁陽光正好，去做想做的事。"
 },
 {
  "title": "迢迢牽牛星",
  "author": "漢·佚名",
  "body": [
   "迢迢牽牛星，皎皎河漢女",
   "纖纖擢素手，札札弄機杼",
   "終日不成章，泣涕零如雨",
   "河漢清且淺，相去復幾許",
   "盈盈一水間，脈脈不得語"
  ],
  "note": "最近的距離，有時候是最遙遠的。"
 },
 {
  "title": "觀滄海",
  "author": "漢·曹操",
  "body": [
   "東臨碣石，以觀滄海",
   "水何澹澹，山島竦峙",
   "樹木叢生，百草豐茂",
   "秋風蕭瑟，洪波湧起",
   "",
   "日月之行，若出其中",
   "星漢燦爛，若出其裡",
   "幸甚至哉，歌以詠志"
  ],
  "note": "心有多大，世界就有多大。"
 },
 {
  "title": "龜雖壽",
  "author": "漢·曹操",
  "body": [
   "神龜雖壽，猶有竟時",
   "螣蛇乘霧，終為土灰",
   "老驥伏櫪，志在千里",
   "烈士暮年，壯心不已",
   "",
   "盈縮之期，不但在天",
   "養怡之福，可得永年",
   "幸甚至哉，歌以詠志"
  ],
  "note": "老驥伏櫪，志在千里。年齡不是限制。"
 },
 {
  "title": "短歌行",
  "author": "漢·曹操",
  "body": [
   "對酒當歌，人生幾何",
   "譬如朝露，去日苦多",
   "慨當以慷，憂思難忘",
   "何以解憂，唯有杜康",
   "",
   "月明星稀，烏鵲南飛",
   "繞樹三匝，何枝可依",
   "山不厭高，海不厭深",
   "周公吐哺，天下歸心"
  ],
  "note": "人生如朝露，更要把握每一刻。"
 },
 {
  "title": "七步詩",
  "author": "三國·曹植",
  "body": [
   "煮豆燃豆萁",
   "豆在釜中泣",
   "本是同根生",
   "相煎何太急"
  ],
  "note": "對自己人溫柔一點。"
 },
 {
  "title": "木蘭辭（節選）",
  "author": "南北朝·佚名",
  "body": [
   "唧唧復唧唧，木蘭當戶織",
   "不聞機杼聲，唯聞女嘆息",
   "",
   "萬里赴戎機，關山度若飛",
   "朔氣傳金柝，寒光照鐵衣",
   "",
   "雄兔腳撲朔，雌兔眼迷離",
   "雙兔傍地走，安能辨我是雄雌"
  ],
  "note": "勇敢不分性別，堅強是每個人的選擇。"
 },
 {
  "title": "敕勒歌",
  "author": "南北朝·佚名",
  "body": [
   "敕勒川，陰山下",
   "天似穹廬，籠蓋四野",
   "天蒼蒼，野茫茫",
   "風吹草低見牛羊"
  ],
  "note": "天地遼闊，心也可以很遼闊。"
 },
 {
  "title": "蘭亭集序（節選）",
  "author": "晉·王羲之",
  "body": [
   "仰觀宇宙之大",
   "俯察品類之盛",
   "所以遊目騁懷",
   "足以極視聽之娛",
   "信可樂也",
   "",
   "向之所欣，俯仰之間，已為陳跡",
   "猶不能不以之興懷",
   "況修短隨化",
   "終期於盡",
   "古人云：死生亦大矣",
   "豈不痛哉"
  ],
  "note": "人生短暫，所以每一刻的快樂都珍貴。"
 },
 {
  "title": "桃花源記（節選）",
  "author": "晉·陶淵明",
  "body": [
   "忽逢桃花林",
   "夾岸數百步",
   "中無雜樹",
   "芳草鮮美",
   "落英繽紛",
   "",
   "土地平曠，屋舍儼然",
   "有良田美池桑竹之屬",
   "阡陌交通，雞犬相聞"
  ],
  "note": "心裡的桃花源，隨時都可以走進去。"
 },
 {
  "title": "歸去來兮辭（節選）",
  "author": "晉·陶淵明",
  "body": [
   "歸去來兮",
   "田園將蕪胡不歸",
   "既自以心為形役",
   "奚惆悵而獨悲",
   "悟已往之不諫",
   "知來者之可追",
   "實迷途其未遠",
   "覺今是而昨非"
  ],
  "note": "回頭永遠不嫌晚。"
 },
 {
  "title": "滕王閣序（節選）",
  "author": "唐·王勃",
  "body": [
   "落霞與孤鶩齊飛",
   "秋水共長天一色",
   "",
   "關山難越，誰悲失路之人",
   "萍水相逢，盡是他鄉之客",
   "",
   "老當益壯，寧移白首之心",
   "窮且益堅，不墜青雲之志"
  ],
  "note": "窮且益堅，不墜青雲之志。"
 },
 {
  "title": "岳陽樓記（節選）",
  "author": "宋·范仲淹",
  "body": [
   "不以物喜，不以己悲",
   "居廟堂之高則憂其民",
   "處江湖之遠則憂其君",
   "",
   "先天下之憂而憂",
   "後天下之樂而樂"
  ],
  "note": "不因得失而動搖，保持心中的平靜。"
 },
 {
  "title": "愛蓮說",
  "author": "宋·周敦頤",
  "body": [
   "予獨愛蓮之出淤泥而不染",
   "濯清漣而不妖",
   "中通外直，不蔓不枝",
   "香遠益清，亭亭淨植",
   "可遠觀而不可褻玩焉"
  ],
  "note": "做一朵蓮花，出淤泥而不染。"
 },
 {
  "title": "陋室銘",
  "author": "唐·劉禹錫",
  "body": [
   "山不在高，有仙則名",
   "水不在深，有龍則靈",
   "斯是陋室，惟吾德馨",
   "",
   "苔痕上階綠，草色入簾青",
   "談笑有鴻儒，往來無白丁",
   "",
   "無絲竹之亂耳",
   "無案牘之勞形",
   "南陽諸葛廬，西蜀子雲亭",
   "孔子云：何陋之有？"
  ],
  "note": "空間不重要，重要的是裡面住著什麼樣的心。"
 },
 {
  "title": "師說（節選）",
  "author": "唐·韓愈",
  "body": [
   "古之學者必有師",
   "師者，所以傳道受業解惑也",
   "",
   "是故弟子不必不如師",
   "師不必賢於弟子",
   "聞道有先後",
   "術業有專攻",
   "如是而已"
  ],
  "note": "每個人都有值得學習的地方。"
 },
 {
  "title": "赤壁賦（節選）",
  "author": "宋·蘇軾",
  "body": [
   "且夫天地之間，物各有主",
   "苟非吾之所有，雖一毫而莫取",
   "",
   "惟江上之清風，與山間之明月",
   "耳得之而為聲，目遇之而成色",
   "取之無禁，用之不竭",
   "是造物者之無盡藏也",
   "而吾與子之所共適"
  ],
  "note": "清風明月不花錢，最好的東西都是免費的。"
 },
 {
  "title": "前赤壁賦（節選）",
  "author": "宋·蘇軾",
  "body": [
   "寄蜉蝣於天地",
   "渺滄海之一粟",
   "哀吾生之須臾",
   "羨長江之無窮",
   "",
   "蓋將自其變者而觀之",
   "則天地曾不能以一瞬",
   "自其不變者而觀之",
   "則物與我皆無盡也",
   "而又何羨乎"
  ],
  "note": "換個角度看，我們其實和宇宙一樣永恆。"
 },
 {
  "title": "登池上樓",
  "author": "南朝·謝靈運",
  "body": [
   "池塘生春草",
   "園柳變鳴禽",
   "",
   "祁祁傷豳歌",
   "萋萋感楚吟",
   "索居易永久",
   "離群難處心"
  ],
  "note": "池塘生春草，最美的發現在日常裡。"
 },
 {
  "title": "世說新語·詠雪",
  "author": "南朝·劉義慶",
  "body": [
   "白雪紛紛何所似",
   "",
   "撒鹽空中差可擬",
   "",
   "未若柳絮因風起"
  ],
  "note": "同一片雪花，不同的人看見不同的美。"
 },
 {
  "title": "出師表（節選）",
  "author": "三國·諸葛亮",
  "body": [
   "臣本布衣，躬耕於南陽",
   "苟全性命於亂世",
   "不求聞達於諸侯",
   "",
   "先帝不以臣卑鄙",
   "猥自枉屈",
   "三顧臣於草廬之中",
   "諮臣以當世之事",
   "由是感激",
   "遂許先帝以驅馳"
  ],
  "note": "被一個人真心對待，就值得用一生回報。"
 },
 {
  "title": "蒹葭",
  "author": "詩經",
  "body": [
   "蒹葭蒼蒼，白露為霜",
   "所謂伊人，在水一方",
   "溯洄從之，道阻且長",
   "溯游從之，宛在水中央"
  ],
  "note": "追尋的路很長，但那個人一直在那裡。"
 },
 {
  "title": "關雎",
  "author": "詩經",
  "body": [
   "關關雎鳩，在河之洲",
   "窈窕淑女，君子好逑",
   "",
   "求之不得，寤寐思服",
   "悠哉悠哉，輾轉反側"
  ],
  "note": "想念一個人的夜晚，翻來覆去。"
 },
 {
  "title": "桃夭",
  "author": "詩經",
  "body": [
   "桃之夭夭，灼灼其華",
   "之子于歸，宜其室家",
   "",
   "桃之夭夭，有蕡其實",
   "之子于歸，宜其家室",
   "",
   "桃之夭夭，其葉蓁蓁",
   "之子于歸，宜其家人"
  ],
  "note": "桃花盛開的日子，適合說祝福的話。"
 },
 {
  "title": "采薇（節選）",
  "author": "詩經",
  "body": [
   "昔我往矣，楊柳依依",
   "今我來思，雨雪霏霏",
   "行道遲遲，載渴載飢",
   "我心傷悲，莫知我哀"
  ],
  "note": "出發時春暖花開，回來時已是冬雪。時間不等人。"
 },
 {
  "title": "鹿鳴",
  "author": "詩經",
  "body": [
   "呦呦鹿鳴，食野之苹",
   "我有嘉賓，鼓瑟吹笙",
   "",
   "吹笙鼓簧，承筐是將",
   "人之好我，示我周行"
  ],
  "note": "有朋友來的日子，值得鼓瑟吹笙。"
 },
 {
  "title": "離騷（節選）",
  "author": "戰國·屈原",
  "body": [
   "路漫漫其修遠兮",
   "吾將上下而求索",
   "",
   "長太息以掩涕兮",
   "哀民生之多艱",
   "",
   "亦余心之所善兮",
   "雖九死其猶未悔"
  ],
  "note": "路很遠，但值得一直走下去。"
 },
 {
  "title": "九歌·湘夫人（節選）",
  "author": "戰國·屈原",
  "body": [
   "帝子降兮北渚",
   "目眇眇兮愁予",
   "嫋嫋兮秋風",
   "洞庭波兮木葉下"
  ],
  "note": "秋風起的時候，思念也跟著飄落。"
 },
 {
  "title": "天問（節選）",
  "author": "戰國·屈原",
  "body": [
   "遂古之初，誰傳道之",
   "上下未形，何由考之",
   "冥昭瞢暗，誰能極之",
   "馮翼惟象，何以識之"
  ],
  "note": "敢問天問地，就是智慧的開始。"
 },
 {
  "title": "早春呈水部張十八員外",
  "author": "唐·韓愈",
  "body": [
   "天街小雨潤如酥",
   "草色遙看近卻無",
   "最是一年春好處",
   "絕勝煙柳滿皇都"
  ],
  "note": "最美的春天，是那剛剛好的淡綠。"
 },
 {
  "title": "晚春",
  "author": "唐·韓愈",
  "body": [
   "草樹知春不久歸",
   "百般紅紫鬥芳菲",
   "楊花榆莢無才思",
   "惟解漫天作雪飛"
  ],
  "note": "就算不夠出眾，也可以努力綻放。"
 },
 {
  "title": "左遷至藍關示侄孫湘",
  "author": "唐·韓愈",
  "body": [
   "一封朝奏九重天，夕貶潮州路八千",
   "欲為聖明除弊事，肯將衰朽惜殘年",
   "雲橫秦嶺家何在，雪擁藍關馬不前",
   "知汝遠來應有意，好收吾骨瘴江邊"
  ],
  "note": "即使前路艱難，也不後悔說出真話。"
 },
 {
  "title": "石壕吏（節選）",
  "author": "唐·杜甫",
  "body": [
   "暮投石壕村，有吏夜捉人",
   "老翁逾牆走，老婦出門看",
   "",
   "吏呼一何怒，婦啼一何苦",
   "聽婦前致詞：三男鄴城戍",
   "一男附書至，二男新戰死",
   "存者且偷生，死者長已矣"
  ],
  "note": "每一個時代，都有普通人在默默承受。"
 },
 {
  "title": "茅屋為秋風所破歌（節選）",
  "author": "唐·杜甫",
  "body": [
   "八月秋高風怒號",
   "卷我屋上三重茅",
   "",
   "安得廣廈千萬間",
   "大庇天下寒士俱歡顏",
   "風雨不動安如山",
   "嗚呼！何時眼前突兀見此屋",
   "吾廬獨破受凍死亦足"
  ],
  "note": "願每個人都有一個溫暖的家。"
 },
 {
  "title": "聞官軍收河南河北",
  "author": "唐·杜甫",
  "body": [
   "劍外忽傳收薊北，初聞涕淚滿衣裳",
   "卻看妻子愁何在，漫卷詩書喜欲狂",
   "白日放歌須縱酒，青春作伴好還鄉",
   "即從巴峽穿巫峽，便下襄陽向洛陽"
  ],
  "note": "好消息來的時候，眼淚和笑容一起出現。"
 },
 {
  "title": "贈花卿",
  "author": "唐·杜甫",
  "body": [
   "錦城絲管日紛紛",
   "半入江風半入雲",
   "此曲只應天上有",
   "人間能得幾回聞"
  ],
  "note": "遇到美好的事物，好好感受。"
 },
 {
  "title": "溪居",
  "author": "唐·柳宗元",
  "body": [
   "久為簪組累，幸此南夷謫",
   "閒依農圃鄰，偶似山林客",
   "曉耕翻露草，夜榜響溪石",
   "來往不逢人，長歌楚天碧"
  ],
  "note": "有時候，被放逐反而找到了自由。"
 },
 {
  "title": "漁翁",
  "author": "唐·柳宗元",
  "body": [
   "漁翁夜傍西巖宿",
   "曉汲清湘燃楚竹",
   "煙銷日出不見人",
   "欸乃一聲山水綠",
   "回看天際下中流",
   "巖上無心雲相逐"
  ],
  "note": "清晨的山水間，一聲櫓響就是一首詩。"
 },
 {
  "title": "惠崇春江晚景",
  "author": "宋·蘇軾",
  "body": [
   "竹外桃花三兩枝",
   "春江水暖鴨先知",
   "蔞蒿滿地蘆芽短",
   "正是河豚欲上時"
  ],
  "note": "春天的消息，鴨子比人先知道。"
 },
 {
  "title": "六月二十七日望湖樓醉書",
  "author": "宋·蘇軾",
  "body": [
   "黑雲翻墨未遮山",
   "白雨跳珠亂入船",
   "卷地風來忽吹散",
   "望湖樓下水如天"
  ],
  "note": "暴風雨來得快也去得快，等一等就好。"
 },
 {
  "title": "春日偶成",
  "author": "宋·程顥",
  "body": [
   "雲淡風輕近午天",
   "傍花隨柳過前川",
   "時人不識余心樂",
   "將謂偷閒學少年"
  ],
  "note": "偶爾偷閒，像少年一樣無憂地走走。"
 },
 {
  "title": "秋詞",
  "author": "唐·劉禹錫",
  "body": [
   "自古逢秋悲寂寥",
   "我言秋日勝春朝",
   "晴空一鶴排雲上",
   "便引詩情到碧霄"
  ],
  "note": "誰說秋天一定是悲傷的？"
 },
 {
  "title": "浪淘沙",
  "author": "唐·劉禹錫",
  "body": [
   "九曲黃河萬里沙",
   "浪淘風簸自天涯",
   "如今直上銀河去",
   "同到牽牛織女家"
  ],
  "note": "順著黃河一直走，就能到達星空。"
 },
 {
  "title": "菩薩蠻·書江西造口壁",
  "author": "宋·辛棄疾",
  "body": [
   "鬱孤台下清江水",
   "中間多少行人淚",
   "西北望長安",
   "可憐無數山",
   "",
   "青山遮不住",
   "畢竟東流去",
   "江晚正愁余",
   "山深聞鷓鴣"
  ],
  "note": "青山遮不住，江水照樣流。"
 },
 {
  "title": "摸魚兒",
  "author": "宋·辛棄疾",
  "body": [
   "更能消，幾番風雨",
   "匆匆春又歸去",
   "惜春長怕花開早",
   "何況落紅無數",
   "春且住",
   "",
   "見說道，天涯芳草無歸路",
   "怨春不語",
   "算只有殷勤，畫簷蛛網",
   "盡日惹飛絮"
  ],
  "note": "春天留不住，但花開的記憶留得住。"
 },
 {
  "title": "永遇樂·京口北固亭懷古",
  "author": "宋·辛棄疾",
  "body": [
   "千古江山，英雄無覓，孫仲謀處",
   "舞榭歌台，風流總被，雨打風吹去",
   "斜陽草樹，尋常巷陌",
   "人道寄奴曾住",
   "",
   "想當年，金戈鐵馬",
   "氣吞萬里如虎",
   "",
   "憑誰問：廉頗老矣",
   "尚能飯否"
  ],
  "note": "英雄不問年齡，問的是還能不能再戰。"
 },
 {
  "title": "蘇幕遮",
  "author": "宋·范仲淹",
  "body": [
   "碧雲天，黃葉地",
   "秋色連波，波上寒煙翠",
   "山映斜陽天接水",
   "芳草無情，更在斜陽外",
   "",
   "黯鄉魂，追旅思",
   "夜夜除非，好夢留人睡",
   "明月樓高休獨倚",
   "酒入愁腸，化作相思淚"
  ],
  "note": "秋天的風景再美，也美不過想家的心。"
 },
 {
  "title": "漁家傲",
  "author": "宋·范仲淹",
  "body": [
   "塞下秋來風景異",
   "衡陽雁去無留意",
   "四面邊聲連角起",
   "千嶂裡，長煙落日孤城閉",
   "",
   "濁酒一杯家萬里",
   "燕然未勒歸無計",
   "羌管悠悠霜滿地",
   "人不寐，將軍白髮征夫淚"
  ],
  "note": "一杯酒，一萬里的鄉愁。"
 },
 {
  "title": "臨江仙",
  "author": "宋·晏幾道",
  "body": [
   "夢後樓台高鎖",
   "酒醒簾幕低垂",
   "去年春恨卻來時",
   "落花人獨立",
   "微雨燕雙飛",
   "",
   "記得小蘋初見",
   "兩重心字羅衣",
   "琵琶弦上說相思",
   "當時明月在",
   "曾照彩雲歸"
  ],
  "note": "落花人獨立，微雨燕雙飛——最美的孤獨。"
 },
 {
  "title": "浣溪沙",
  "author": "宋·晏殊",
  "body": [
   "一曲新詞酒一杯",
   "去年天氣舊亭台",
   "夕陽西下幾時回",
   "",
   "無可奈何花落去",
   "似曾相識燕歸來",
   "小園香徑獨徘徊"
  ],
  "note": "花落了還會開，燕去了還會來。"
 },
 {
  "title": "蝶戀花",
  "author": "宋·晏殊",
  "body": [
   "檻菊愁煙蘭泣露",
   "羅幕輕寒，燕子雙飛去",
   "明月不諳離恨苦",
   "斜光到曉穿朱戶",
   "",
   "昨夜西風凋碧樹",
   "獨上高樓，望盡天涯路",
   "欲寄彩箋兼尺素",
   "山長水闊知何處"
  ],
  "note": "獨上高樓，望盡天涯路——人生的第一重境界。"
 },
 {
  "title": "踏莎行",
  "author": "宋·歐陽修",
  "body": [
   "候館梅殘，溪橋柳細",
   "草薰風暖搖征轡",
   "離愁漸遠漸無窮",
   "迢迢不斷如春水",
   "",
   "寸寸柔腸，盈盈粉淚",
   "樓高莫近危闌倚",
   "平蕪盡處是春山",
   "行人更在春山外"
  ],
  "note": "你以為望到了盡頭，他卻在更遠的地方。"
 },
 {
  "title": "生查子·元夕",
  "author": "宋·歐陽修",
  "body": [
   "去年元夜時",
   "花市燈如晝",
   "月上柳梢頭",
   "人約黃昏後",
   "",
   "今年元夜時",
   "月與燈依舊",
   "不見去年人",
   "淚濕春衫袖"
  ],
  "note": "同一個節日，不同的人，不同的心情。"
 },
 {
  "title": "武陵春",
  "author": "宋·李清照",
  "body": [
   "風住塵香花已盡",
   "日晚倦梳頭",
   "物是人非事事休",
   "欲語淚先流",
   "",
   "聞說雙溪春尚好",
   "也擬泛輕舟",
   "只恐雙溪舴艋舟",
   "載不動許多愁"
  ],
  "note": "有些愁，輕舟也載不動。"
 },
 {
  "title": "點絳唇",
  "author": "宋·李清照",
  "body": [
   "蹴罷秋千",
   "起來慵整纖纖手",
   "露濃花瘦",
   "薄汗輕衣透",
   "",
   "見客入來",
   "襪剗金釵溜",
   "和羞走",
   "倚門回首",
   "卻把青梅嗅"
  ],
  "note": "少女的害羞，藏在回頭嗅青梅的動作裡。"
 },
 {
  "title": "南鄉子·登京口北固亭有懷",
  "author": "宋·辛棄疾",
  "body": [
   "何處望神州？滿眼風光北固樓",
   "千古興亡多少事？悠悠",
   "不盡長江滾滾流",
   "",
   "年少萬兜鍪",
   "坐斷東南戰未休",
   "天下英雄誰敵手？曹劉",
   "生子當如孫仲謀"
  ],
  "note": "千古興亡，都付與長江流水。"
 },
 {
  "title": "卜算子·送鮑浩然之浙東",
  "author": "宋·王觀",
  "body": [
   "水是眼波橫",
   "山是眉峰聚",
   "欲問行人去那邊",
   "眉眼盈盈處",
   "",
   "才始送春歸",
   "又送君歸去",
   "若到江南趕上春",
   "千萬和春住"
  ],
  "note": "如果到了春天的地方，記得和春天住在一起。"
 },
 {
  "title": "江南逢李龜年",
  "author": "唐·杜甫",
  "body": [
   "岐王宅裡尋常見",
   "崔九堂前幾度聞",
   "正是江南好風景",
   "落花時節又逢君"
  ],
  "note": "在最美的季節重逢，是人生最好的安排。"
 },
 {
  "title": "春夜洛城聞笛",
  "author": "唐·李白",
  "body": [
   "誰家玉笛暗飛聲",
   "散入春風滿洛城",
   "此夜曲中聞折柳",
   "何人不起故園情"
  ],
  "note": "一首歌就能喚起所有的鄉愁。"
 },
 {
  "title": "峨眉山月歌",
  "author": "唐·李白",
  "body": [
   "峨眉山月半輪秋",
   "影入平羌江水流",
   "夜發清溪向三峽",
   "思君不見下渝州"
  ],
  "note": "月亮跟著你走，就像思念跟著心走。"
 },
 {
  "title": "渡荊門送別",
  "author": "唐·李白",
  "body": [
   "渡遠荊門外，來從楚國遊",
   "山隨平野盡，江入大荒流",
   "月下飛天鏡，雲生結海樓",
   "仍憐故鄉水，萬里送行舟"
  ],
  "note": "故鄉的水，一路送你到遠方。"
 },
 {
  "title": "聯句（春日）",
  "author": "民間",
  "body": [
   "春水滿四澤",
   "夏雲多奇峰",
   "秋月揚明輝",
   "冬嶺秀寒松"
  ],
  "note": "四季各有各的美，每一天都值得感恩。"
 },
 {
  "title": "雪梅",
  "author": "宋·盧梅坡",
  "body": [
   "梅雪爭春未肯降",
   "騷人擱筆費評章",
   "梅須遜雪三分白",
   "雪卻輸梅一段香"
  ],
  "note": "每個人都有自己獨特的好。"
 },
 {
  "title": "書湖陰先生壁",
  "author": "宋·王安石",
  "body": [
   "茅簷長掃淨無苔",
   "花木成畦手自栽",
   "一水護田將綠繞",
   "兩山排闥送青來"
  ],
  "note": "用心打理的生活，連山水都會來拜訪。"
 },
 {
  "title": "約客",
  "author": "宋·趙師秀",
  "body": [
   "黃梅時節家家雨",
   "青草池塘處處蛙",
   "有約不來過夜半",
   "閒敲棋子落燈花"
  ],
  "note": "等一個人的夜晚，連敲棋子都是詩。"
 },
 {
  "title": "曉出淨慈寺送林子方",
  "author": "宋·楊萬里",
  "body": [
   "畢竟西湖六月中",
   "風光不與四時同",
   "接天蓮葉無窮碧",
   "映日荷花別樣紅"
  ],
  "note": "對的時候去對的地方，美就在那裡等你。"
 },
 {
  "title": "望天門山",
  "author": "唐·李白",
  "body": [
   "天門中斷楚江開",
   "碧水東流至此回",
   "兩岸青山相對出",
   "孤帆一片日邊來"
  ],
  "note": "前方的門終會為你打開。"
 },
 {
  "title": "贈汪倫",
  "author": "唐·李白",
  "body": [
   "李白乘舟將欲行",
   "忽聞岸上踏歌聲",
   "桃花潭水深千尺",
   "不及汪倫送我情"
  ],
  "note": "朋友的情誼，比最深的潭水還深。"
 },
 {
  "title": "夜書所見",
  "author": "宋·葉紹翁",
  "body": [
   "蕭蕭梧葉送寒聲",
   "江上秋風動客情",
   "知有兒童挑促織",
   "夜深籬落一燈明"
  ],
  "note": "深夜裡的一盞燈，就是溫暖。"
 },
 {
  "title": "墨梅",
  "author": "元·王冕",
  "body": [
   "吾家洗硯池頭樹",
   "朵朵花開淡墨痕",
   "不要人夸好顏色",
   "只留清氣滿乾坤"
  ],
  "note": "不需要別人的讚美，做自己就好。"
 },
 {
  "title": "石灰吟",
  "author": "明·于謙",
  "body": [
   "千錘萬鑿出深山",
   "烈火焚燒若等閒",
   "粉骨碎身渾不怕",
   "要留清白在人間"
  ],
  "note": "經歷千錘百煉，留下的是清白的心。"
 },
 {
  "title": "竹石",
  "author": "清·鄭燮",
  "body": [
   "咬定青山不放鬆",
   "立根原在破巖中",
   "千磨萬擊還堅勁",
   "任爾東西南北風"
  ],
  "note": "站穩了，什麼風都吹不倒你。"
 },
 {
  "title": "己亥雜詩",
  "author": "清·龔自珍",
  "body": [
   "浩蕩離愁白日斜",
   "吟鞭東指即天涯",
   "落紅不是無情物",
   "化作春泥更護花"
  ],
  "note": "離開不是結束，是另一種守護。"
 },
 {
  "title": "獄中題壁",
  "author": "清·譚嗣同",
  "body": [
   "望門投止思張儉",
   "忍死須臾待杜根",
   "我自橫刀向天笑",
   "去留肝膽兩崑崙"
  ],
  "note": "笑對命運，是最瀟灑的姿態。"
 },
 {
  "title": "對酒",
  "author": "清·秋瑾",
  "body": [
   "不惜千金買寶刀",
   "貂裘換酒也堪豪",
   "一腔熱血勤珍重",
   "灑去猶能化碧濤"
  ],
  "note": "為了相信的事，值得一腔熱血。"
 },
 {
  "title": "山園小梅",
  "author": "宋·林逋",
  "body": [
   "眾芳搖落獨暄妍",
   "占盡風情向小園",
   "疏影橫斜水清淺",
   "暗香浮動月黃昏",
   "",
   "霜禽欲下先偷眼",
   "粉蝶如知合斷魂",
   "幸有微吟可相狎",
   "不須檀板共金尊"
  ],
  "note": "在安靜的角落，獨自綻放也是一種美。"
 },
 {
  "title": "天淨沙·秋思",
  "author": "元·馬致遠",
  "body": [
   "枯藤老樹昏鴉",
   "小橋流水人家",
   "古道西風瘦馬",
   "夕陽西下",
   "斷腸人在天涯"
  ],
  "note": "旅途的盡頭，總有一個家在等。"
 },
 {
  "title": "山坡羊·潼關懷古",
  "author": "元·張養浩",
  "body": [
   "峰巒如聚，波濤如怒",
   "山河表裡潼關路",
   "望西都，意躊躇",
   "傷心秦漢經行處",
   "宮闕萬間都做了土",
   "",
   "興，百姓苦",
   "亡，百姓苦"
  ],
  "note": "歷史的真相，藏在普通人的眼淚裡。"
 },
 {
  "title": "正氣歌（節選）",
  "author": "宋·文天祥",
  "body": [
   "天地有正氣",
   "雜然賦流形",
   "下則為河嶽",
   "上則為日星",
   "",
   "於人曰浩然",
   "沛乎塞蒼冥",
   "皇路當清夷",
   "含和吐明庭"
  ],
  "note": "天地間有一股正氣，它住在你心裡。"
 },
 {
  "title": "沁園春·長沙",
  "author": "毛澤東",
  "body": [
   "獨立寒秋，湘江北去，橘子洲頭",
   "看萬山紅遍，層林盡染",
   "漫江碧透，百舸爭流",
   "鷹擊長空，魚翔淺底",
   "萬類霜天競自由",
   "",
   "悵寥廓",
   "問蒼茫大地",
   "誰主沉浮"
  ],
  "note": "面對遼闊的世界，問一問自己想要什麼。"
 },
 {
  "title": "七律·長征",
  "author": "毛澤東",
  "body": [
   "紅軍不怕遠征難",
   "萬水千山只等閒",
   "五嶺逶迤騰細浪",
   "烏蒙磅礡走泥丸",
   "金沙水拍雲崖暖",
   "大渡橋橫鐵索寒",
   "更喜岷山千里雪",
   "三軍過後盡開顏"
  ],
  "note": "再難的路，走過去了就是笑容。"
 },
 {
  "title": "卜算子·詠梅",
  "author": "毛澤東",
  "body": [
   "風雨送春歸",
   "飛雪迎春到",
   "已是懸崖百丈冰",
   "猶有花枝俏",
   "",
   "俏也不爭春",
   "只把春來報",
   "待到山花爛漫時",
   "她在叢中笑"
  ],
  "note": "等到春天來的時候，最早開的花反而安靜地笑了。"
 },
 {
  "title": "無題",
  "author": "魯迅",
  "body": [
   "萬家墨面沒蒿萊",
   "敢有歌吟動地哀",
   "心事浩茫連廣宇",
   "於無聲處聽驚雷"
  ],
  "note": "在最安靜的地方，聽見最大的力量。"
 },
 {
  "title": "自嘲",
  "author": "魯迅",
  "body": [
   "運交華蓋欲何求，未敢翻身已碰頭",
   "破帽遮顏過鬧市，漏船載酒泛中流",
   "橫眉冷對千夫指，俯首甘為孺子牛",
   "躲進小樓成一統，管他冬夏與春秋"
  ],
  "note": "橫眉冷對千夫指，俯首甘為孺子牛。"
 },
 {
  "title": "春",
  "author": "朱自清",
  "body": [
   "盼望著，盼望著",
   "東風來了",
   "春天的腳步近了",
   "",
   "一切都像剛睡醒的樣子",
   "欣欣然張開了眼",
   "山朗潤起來了",
   "水漲起來了",
   "太陽的臉紅起來了"
  ],
  "note": "春天來了，一切都在甦醒。"
 },
 {
  "title": "荷塘月色（節選）",
  "author": "朱自清",
  "body": [
   "曲曲折折的荷塘上面",
   "彌望的是田田的葉子",
   "葉子出水很高",
   "像亭亭的舞女的裙",
   "",
   "月光如流水一般",
   "靜靜地瀉在這一片葉子和花上",
   "薄薄的青霧浮起在荷塘裡"
  ],
  "note": "月光下的荷塘，是心靈的避風港。"
 },
 {
  "title": "背影（節選）",
  "author": "朱自清",
  "body": [
   "他用兩手攀著上面",
   "兩腳再向上縮",
   "他肥胖的身子向左微傾",
   "顯出努力的樣子",
   "",
   "這時我看見他的背影",
   "我的淚很快地流下來了",
   "我趕緊拭乾了淚",
   "怕他看見",
   "也怕別人看見"
  ],
  "note": "父親的背影，是世上最溫暖的風景。"
 },
 {
  "title": "雨的隨想",
  "author": "汪國真",
  "body": [
   "有時，外面下著雨",
   "心卻晴著",
   "又有時，外面晴著",
   "心卻下著雨",
   "",
   "世界上許多東西",
   "在對比中讓你品味"
  ],
  "note": "心晴的時候，什麼天氣都是好天氣。"
 },
 {
  "title": "熱愛生命",
  "author": "汪國真",
  "body": [
   "我不去想是否能夠成功",
   "既然選擇了遠方",
   "便只顧風雨兼程",
   "",
   "我不去想身後會不會襲來寒風冷雨",
   "既然目標是地平線",
   "留給世界的只能是背影"
  ],
  "note": "選擇了方向，就風雨兼程。"
 },
 {
  "title": "假如你不夠快樂",
  "author": "汪國真",
  "body": [
   "假如你不夠快樂",
   "也不要把眉頭深鎖",
   "人生本來短暫",
   "為什麼還要栽培苦澀",
   "",
   "打開塵封的門窗",
   "讓陽光雨露灑遍每個角落",
   "走向生命的原野",
   "讓風兒熨平前額"
  ],
  "note": "打開窗戶，讓陽光進來。"
 },
 {
  "title": "致青春",
  "author": "汪國真",
  "body": [
   "所有的日子，所有的日子都來吧",
   "讓我編織你們",
   "用青春的金線",
   "和幸福的瓔珞",
   "",
   "編織你們"
  ],
  "note": "青春是金線，把每一天都編織成美好。"
 },
 {
  "title": "旅行",
  "author": "汪國真",
  "body": [
   "凡是遙遠的地方",
   "對我們都有一種誘惑",
   "不是誘惑於美麗",
   "就是誘惑於傳說",
   "",
   "即便遠方的風景",
   "並不盡如人意",
   "我們也無需在乎",
   "因為這實在是一個",
   "迷人的錯"
  ],
  "note": "出發本身，就是意義。"
 },
 {
  "title": "小王子（節選）",
  "author": "聖修伯里（林秀清譯）",
  "body": [
   "如果你愛上了一朵生長在一顆星星上的花",
   "那麼夜間你看著天空就感到甜蜜愉快",
   "所有的星星上都好像開著花"
  ],
  "note": "當你愛上了什麼，全世界都會為你發光。"
 },
 {
  "title": "論語·學而",
  "author": "孔子",
  "body": [
   "學而時習之，不亦說乎",
   "有朋自遠方來，不亦樂乎",
   "人不知而不慍，不亦君子乎"
  ],
  "note": "學習、友情、坦然——快樂的三個來源。"
 },
 {
  "title": "論語·為政",
  "author": "孔子",
  "body": [
   "吾十有五而志於學",
   "三十而立",
   "四十而不惑",
   "五十而知天命",
   "六十而耳順",
   "七十而從心所欲不逾矩"
  ],
  "note": "人生每個階段都有它的功課。"
 },
 {
  "title": "道德經（節選）",
  "author": "老子",
  "body": [
   "上善若水",
   "水善利萬物而不爭",
   "處眾人之所惡",
   "故幾於道"
  ],
  "note": "像水一樣，利萬物而不爭。"
 },
 {
  "title": "道德經·第八十一章",
  "author": "老子",
  "body": [
   "信言不美，美言不信",
   "善者不辯，辯者不善",
   "知者不博，博者不知"
  ],
  "note": "真正的智慧，往往是簡單的。"
 },
 {
  "title": "逍遙遊（節選）",
  "author": "莊子",
  "body": [
   "北冥有魚，其名為鯤",
   "鯤之大，不知其幾千里也",
   "化而為鳥，其名為鵬",
   "鵬之背，不知其幾千里也",
   "",
   "怒而飛，其翼若垂天之雲"
  ],
  "note": "心有多大，翅膀就有多寬。"
 },
 {
  "title": "夢遊天姥吟留別（節選）",
  "author": "唐·李白",
  "body": [
   "海客談瀛洲，煙濤微茫信難求",
   "越人語天姥，雲霞明滅或可睹",
   "",
   "安能摧眉折腰事權貴",
   "使我不得開心顏"
  ],
  "note": "不為權勢低頭，才是真正的自在。"
 },
 {
  "title": "蜀道難（節選）",
  "author": "唐·李白",
  "body": [
   "噫吁嚱，危乎高哉",
   "蜀道之難，難於上青天",
   "",
   "蠶叢及魚鳧，開國何茫然",
   "爾來四萬八千歲",
   "不與秦塞通人煙"
  ],
  "note": "再難的路，也有人走過。"
 },
 {
  "title": "宣州謝朓樓餞別校書叔雲",
  "author": "唐·李白",
  "body": [
   "棄我去者，昨日之日不可留",
   "亂我心者，今日之日多煩憂",
   "長風萬里送秋雁，對此可以酣高樓",
   "",
   "抽刀斷水水更流，舉杯銷愁愁更愁",
   "人生在世不稱意，明朝散髮弄扁舟"
  ],
  "note": "過去留不住，不如放下，去吧。"
 },
 {
  "title": "客至",
  "author": "唐·杜甫",
  "body": [
   "舍南舍北皆春水，但見群鷗日日來",
   "花徑不曾緣客掃，蓬門今始為君開",
   "盤飧市遠無兼味，樽酒家貧只舊醅",
   "肯與鄰翁相對飲，隔籬呼取盡餘杯"
  ],
  "note": "有朋友來，粗茶淡飯也是盛宴。"
 },
 {
  "title": "蜀相",
  "author": "唐·杜甫",
  "body": [
   "丞相祠堂何處尋，錦官城外柏森森",
   "映階碧草自春色，隔葉黃鸝空好音",
   "三顧頻煩天下計，兩朝開濟老臣心",
   "出師未捷身先死，長使英雄淚滿襟"
  ],
  "note": "未完成的心願，是最深的遺憾。"
 },
 {
  "title": "兵車行（節選）",
  "author": "唐·杜甫",
  "body": [
   "車轔轔，馬蕭蕭，行人弓箭各在腰",
   "爺娘妻子走相送，塵埃不見咸陽橋",
   "牽衣頓足攔道哭，哭聲直上干雲霄"
  ],
  "note": "離別的哭聲，千年後依然讓人心疼。"
 },
 {
  "title": "秋興八首·其一",
  "author": "唐·杜甫",
  "body": [
   "玉露凋傷楓樹林，巫山巫峽氣蕭森",
   "江間波浪兼天湧，塞上風雲接地陰",
   "叢菊兩開他日淚，孤舟一繫故園心",
   "寒衣處處催刀尺，白帝城高急暮砧"
  ],
  "note": "秋天的惆悵，是因為心裡裝著太多。"
 },
 {
  "title": "戲為六絕句",
  "author": "唐·杜甫",
  "body": [
   "爾曹身與名俱滅",
   "不廢江河萬古流"
  ],
  "note": "經典之所以經典，是因為時間無法淹沒它。"
 },
 {
  "title": "終南別業",
  "author": "唐·王維",
  "body": [
   "中歲頗好道，晚家南山陲",
   "興來每獨往，勝事空自知",
   "行到水窮處，坐看雲起時",
   "偶然值林叟，談笑無還期"
  ],
  "note": "行到水窮處，坐看雲起時——這就是人生的態度。"
 },
 {
  "title": "輞川閒居贈裴秀才迪",
  "author": "唐·王維",
  "body": [
   "寒山轉蒼翠，秋水日潺湲",
   "倚杖柴門外，臨風聽暮蟬",
   "渡頭餘落日，墟里上孤煙",
   "復值接輿醉，狂歌五柳前"
  ],
  "note": "靠著柴門聽蟬鳴，這就是悠閒。"
 },
 {
  "title": "雜詩",
  "author": "唐·王維",
  "body": [
   "君自故鄉來",
   "應知故鄉事",
   "來日綺窗前",
   "寒梅著花未"
  ],
  "note": "從故鄉來的人，最想問的是那株梅花。"
 },
 {
  "title": "新嫁娘詞",
  "author": "唐·王建",
  "body": [
   "三日入廚下",
   "洗手作羹湯",
   "未諳姑食性",
   "先遣小姑嘗"
  ],
  "note": "小心翼翼的溫柔，是最可愛的用心。"
 },
 {
  "title": "賣炭翁（節選）",
  "author": "唐·白居易",
  "body": [
   "賣炭翁，伐薪燒炭南山中",
   "滿面塵灰煙火色，兩鬢蒼蒼十指黑",
   "賣炭得錢何所營？身上衣裳口中食",
   "可憐身上衣正單，心憂炭賤願天寒"
  ],
  "note": "每一份辛苦的勞動，都值得被看見。"
 },
 {
  "title": "花非花",
  "author": "唐·白居易",
  "body": [
   "花非花，霧非霧",
   "夜半來，天明去",
   "來如春夢幾多時",
   "去似朝雲無覓處"
  ],
  "note": "美好的事物來去匆匆，且珍惜。"
 },
 {
  "title": "夢微之",
  "author": "唐·白居易",
  "body": [
   "夜來攜手夢同遊",
   "晨起盈巾淚莫收",
   "漳浦老身三度病",
   "咸陽宿草八回秋",
   "君埋泉下泥銷骨",
   "我寄人間雪滿頭"
  ],
  "note": "最深的友情，跨越生死。"
 },
 {
  "title": "望洞庭",
  "author": "唐·劉禹錫",
  "body": [
   "湖光秋月兩相和",
   "潭面無風鏡未磨",
   "遙望洞庭山水翠",
   "白銀盤裡一青螺"
  ],
  "note": "平靜的湖面，像一面鏡子映照你。"
 },
 {
  "title": "西塞山懷古",
  "author": "唐·劉禹錫",
  "body": [
   "王濬樓船下益州，金陵王氣黯然收",
   "千尋鐵鎖沉江底，一片降幡出石頭",
   "人世幾回傷往事，山形依舊枕寒流",
   "今逢四海為家日，故壘蕭蕭蘆荻秋"
  ],
  "note": "歷史反覆，但山河不變。"
 },
 {
  "title": "望江南",
  "author": "唐·溫庭筠",
  "body": [
   "梳洗罷",
   "獨倚望江樓",
   "過盡千帆皆不是",
   "斜暉脈脈水悠悠",
   "腸斷白蘋洲"
  ],
  "note": "等的那個人，也許就在下一班船上。"
 },
 {
  "title": "尋隱者不遇",
  "author": "唐·賈島",
  "body": [
   "松下問童子",
   "言師採藥去",
   "只在此山中",
   "雲深不知處"
  ],
  "note": "找的人不在，但山裡的雲也是一種答案。"
 },
 {
  "title": "題李凝幽居",
  "author": "唐·賈島",
  "body": [
   "閒居少鄰並",
   "草徑入荒園",
   "鳥宿池邊樹",
   "僧敲月下門",
   "過橋分野色",
   "移石動雲根",
   "暫去還來此",
   "幽期不負言"
  ],
  "note": "推敲之間，藏著對生活的認真。"
 },
 {
  "title": "江南",
  "author": "漢樂府",
  "body": [
   "江南可採蓮",
   "蓮葉何田田",
   "魚戲蓮葉間",
   "魚戲蓮葉東",
   "魚戲蓮葉西",
   "魚戲蓮葉南",
   "魚戲蓮葉北"
  ],
  "note": "簡單的快樂，就像魚在蓮葉間嬉戲。"
 },
 {
  "title": "上邪",
  "author": "漢樂府",
  "body": [
   "上邪！我欲與君相知",
   "長命無絕衰",
   "山無陵，江水為竭",
   "冬雷震震，夏雨雪",
   "天地合，乃敢與君絕"
  ],
  "note": "除非天崩地裂，否則不會放手。"
 },
 {
  "title": "春江花月夜（續）",
  "author": "唐·張若虛",
  "body": [
   "白雲一片去悠悠",
   "青楓浦上不勝愁",
   "誰家今夜扁舟子",
   "何處相思明月樓",
   "",
   "可憐樓上月徘徊",
   "應照離人妝鏡台",
   "玉戶簾中卷不去",
   "擣衣砧上拂還來"
  ],
  "note": "月光是擋不住的，就像思念。"
 },
 {
  "title": "夜上受降城聞笛",
  "author": "唐·李益",
  "body": [
   "回樂峰前沙似雪",
   "受降城外月如霜",
   "不知何處吹蘆管",
   "一夜征人盡望鄉"
  ],
  "note": "一支笛曲，讓所有人都望向故鄉。"
 },
 {
  "title": "從軍行",
  "author": "唐·王昌齡",
  "body": [
   "青海長雲暗雪山",
   "孤城遙望玉門關",
   "黃沙百戰穿金甲",
   "不破樓蘭終不還"
  ],
  "note": "有了目標，百戰也不退縮。"
 },
 {
  "title": "旅宿",
  "author": "唐·杜牧",
  "body": [
   "旅館無良伴",
   "凝情自悄然",
   "寒燈思舊事",
   "斷雁警愁眠",
   "遠夢歸侵曉",
   "家書到隔年",
   "滄江好煙月",
   "門繫釣魚船"
  ],
  "note": "在異鄉的夜晚，回憶是最好的良伴。"
 },
 {
  "title": "遣悲懷三首·其二",
  "author": "唐·元稹",
  "body": [
   "昔日戲言身後意",
   "今朝都到眼前來",
   "衣裳已施行看盡",
   "針線猶存未忍開",
   "尚想舊情憐婢僕",
   "也曾因夢送錢財",
   "誠知此恨人人有",
   "貧賤夫妻百事哀"
  ],
  "note": "一起走過艱難日子的人，最讓人想念。"
 },
 {
  "title": "離思五首·其四",
  "author": "唐·元稹",
  "body": [
   "曾經滄海難為水",
   "除卻巫山不是雲",
   "取次花叢懶回顧",
   "半緣修道半緣君"
  ],
  "note": "見過最好的，其他的都不算什麼了。"
 },
 {
  "title": "秋思",
  "author": "唐·張籍",
  "body": [
   "洛陽城裡見秋風",
   "欲作家書意萬重",
   "復恐匆匆說不盡",
   "行人臨發又開封"
  ],
  "note": "寫了又拆，拆了又寫——因為想說的太多了。"
 },
 {
  "title": "憫農二首",
  "author": "唐·李紳",
  "body": [
   "鋤禾日當午",
   "汗滴禾下土",
   "誰知盤中餐",
   "粒粒皆辛苦",
   "",
   "春種一粒粟",
   "秋收萬顆子",
   "四海無閒田",
   "農夫猶餓死"
  ],
  "note": "珍惜每一口食物，背後都是辛勤。"
 },
 {
  "title": "長安秋望",
  "author": "唐·杜牧",
  "body": [
   "樓倚霜樹外",
   "鏡天無一毫",
   "南山與秋色",
   "氣勢兩相高"
  ],
  "note": "秋天的氣勢，和南山一樣高。"
 },
 {
  "title": "己亥歲",
  "author": "唐·曹松",
  "body": [
   "澤國江山入戰圖",
   "生民何計樂樵蘇",
   "憑君莫話封侯事",
   "一將功成萬骨枯"
  ],
  "note": "每一份榮耀的背後，都有無數人的犧牲。"
 },
 {
  "title": "寒食",
  "author": "唐·韓翃",
  "body": [
   "春城無處不飛花",
   "寒食東風御柳斜",
   "日暮漢宮傳蠟燭",
   "輕煙散入五侯家"
  ],
  "note": "春天的花瓣，飛到每一個角落。"
 },
 {
  "title": "春詞",
  "author": "唐·劉禹錫",
  "body": [
   "新妝宜面下朱樓",
   "深鎖春光一院愁",
   "行到中庭數花朵",
   "蜻蜓飛上玉搔頭"
  ],
  "note": "數花朵的時候，蜻蜓也來湊熱鬧。"
 },
 {
  "title": "後宮詞",
  "author": "唐·白居易",
  "body": [
   "淚濕羅巾夢不成",
   "夜深前殿按歌聲",
   "紅顏未老恩先斷",
   "斜倚薰籠坐到明"
  ],
  "note": "等不到的回應，是最深的孤獨。"
 },
 {
  "title": "柳枝詞",
  "author": "唐·劉禹錫",
  "body": [
   "清江一曲柳千條",
   "二十年前舊板橋",
   "曾與美人橋上別",
   "恨無消息到今朝"
  ],
  "note": "有些人離開了，就再也沒有消息。"
 },
 {
  "title": "楊柳枝",
  "author": "唐·白居易",
  "body": [
   "一樹春風千萬枝",
   "嫩於金色軟於絲",
   "永豐西角荒園裡",
   "盡日無人屬阿誰"
  ],
  "note": "再美的風景，也需要有人欣賞。"
 },
 {
  "title": "題菊花",
  "author": "唐·黃巢",
  "body": [
   "颯颯西風滿院栽",
   "蕊寒香冷蝶難來",
   "他年我若為青帝",
   "報與桃花一處開"
  ],
  "note": "如果可以改變規則，讓所有花一起開放。"
 },
 {
  "title": "不第後賦菊",
  "author": "唐·黃巢",
  "body": [
   "待到秋來九月八",
   "我花開後百花殺",
   "沖天香陣透長安",
   "滿城盡帶黃金甲"
  ],
  "note": "等到屬於你的季節，就是你的天下。"
 },
 {
  "title": "登科後",
  "author": "唐·孟郊",
  "body": [
   "昔日齷齪不足夸",
   "今朝放蕩思無涯",
   "春風得意馬蹄疾",
   "一日看盡長安花"
  ],
  "note": "好消息來的時候，整個世界都在微笑。"
 },
 {
  "title": "悯農（節選）",
  "author": "唐·李紳",
  "body": [
   "春種一粒粟",
   "秋收萬顆子",
   "四海無閒田",
   "農夫猶餓死"
  ],
  "note": "播種與收穫之間，是漫長的等待和辛勞。"
 },
 {
  "title": "秋夜將曉出籬門迎涼有感",
  "author": "宋·陸游",
  "body": [
   "三萬里河東入海",
   "五千仞嶽上摩天",
   "遺民淚盡胡塵裡",
   "南望王師又一年"
  ],
  "note": "等待的人最辛苦。"
 },
 {
  "title": "十一月四日風雨大作",
  "author": "宋·陸游",
  "body": [
   "僵臥孤村不自哀",
   "尚思為國戍輪台",
   "夜闌臥聯風吹雨",
   "鐵馬冰河入夢來"
  ],
  "note": "即使在病榻上，夢裡依然在奔跑。"
 },
 {
  "title": "書憤",
  "author": "宋·陸游",
  "body": [
   "早歲那知世事艱，中原北望氣如山",
   "樓船夜雪瓜洲渡，鐵馬秋風大散關",
   "塞上長城空自許，鏡中衰鬢已先斑",
   "出師一表真名世，千載誰堪伯仲間"
  ],
  "note": "年輕時的壯志，不要讓它白白老去。"
 },
 {
  "title": "臨安春雨初霽",
  "author": "宋·陸游",
  "body": [
   "世味年來薄似紗，誰令騎馬客京華",
   "小樓一夜聽春雨，深巷明朝賣杏花",
   "矮紙斜行閒作草，晴窗細乳戲分茶",
   "素衣莫起風塵嘆，猶及清明可到家"
  ],
  "note": "聽一夜春雨，等明天的花。"
 },
 {
  "title": "春夜",
  "author": "宋·王安石",
  "body": [
   "金爐香盡漏聲殘",
   "翦翦輕風陣陣寒",
   "春色惱人眠不得",
   "月移花影上欄杆"
  ],
  "note": "春天太美，讓人捨不得睡。"
 },
 {
  "title": "登飛來峰",
  "author": "宋·王安石",
  "body": [
   "飛來山上千尋塔",
   "聞說雞鳴見日升",
   "不畏浮雲遮望眼",
   "自緣身在最高層"
  ],
  "note": "站得夠高，浮雲就遮不住你的眼。"
 },
 {
  "title": "日出入行",
  "author": "唐·李白",
  "body": [
   "日出東方隈",
   "似從地底來",
   "歷天又復入西海",
   "自古及今行復回"
  ],
  "note": "太陽每天都會升起，明天也是。"
 },
 {
  "title": "子夜吳歌·秋歌",
  "author": "唐·李白",
  "body": [
   "長安一片月",
   "萬戶擣衣聲",
   "秋風吹不盡",
   "總是玉關情",
   "何日平胡虜",
   "良人罷遠征"
  ],
  "note": "月光下的思念，穿越了整座城。"
 },
 {
  "title": "玉階怨",
  "author": "唐·李白",
  "body": [
   "玉階生白露",
   "夜久侵羅襪",
   "卻下水晶簾",
   "玲瓏望秋月"
  ],
  "note": "什麼都沒說，卻什麼都說了。"
 },
 {
  "title": "把酒問月",
  "author": "唐·李白",
  "body": [
   "青天有月來幾時",
   "我今停杯一問之",
   "人攀明月不可得",
   "月行卻與人相隨",
   "",
   "今人不見古時月",
   "今月曾經照古人",
   "古人今人若流水",
   "共看明月皆如此"
  ],
  "note": "月亮陪了人類幾千年，今晚也陪著你。"
 },
 {
  "title": "春思",
  "author": "唐·李白",
  "body": [
   "燕草如碧絲",
   "秦桑低綠枝",
   "當君懷歸日",
   "是妾斷腸時",
   "春風不相識",
   "何事入羅幃"
  ],
  "note": "思念不需要理由，就像春風不需要邀請。"
 },
 {
  "title": "宿業師山房期丁大不至",
  "author": "唐·孟浩然",
  "body": [
   "夕陽度西嶺",
   "群壑倏已暝",
   "松月生夜涼",
   "風泉滿清聽",
   "樵人歸欲盡",
   "煙鳥棲初定",
   "之子期宿來",
   "孤琴候蘿徑"
  ],
  "note": "抱著琴等你，等到月亮都出來了。"
 },
 {
  "title": "題鶴林寺壁",
  "author": "唐·李涉",
  "body": [
   "終日昏昏醉夢間",
   "忽聞春盡強登山",
   "因過竹院逢僧話",
   "偷得浮生半日閒"
  ],
  "note": "偷得浮生半日閒，就是最大的奢侈。"
 },
 {
  "title": "溪上遇雨",
  "author": "唐·崔道融",
  "body": [
   "坐看黑雲銜猛雨",
   "噴灑前山此獨晴",
   "忽驚雲雨在頭上",
   "卻是山前晚照明"
  ],
  "note": "天氣和人生一樣，變化無常才是常態。"
 },
 {
  "title": "除夜作",
  "author": "唐·高適",
  "body": [
   "旅館寒燈獨不眠",
   "客心何事轉淒然",
   "故鄉今夜思千里",
   "霜鬢明朝又一年"
  ],
  "note": "又是一年，又大了一歲，也更懂了一些。"
 },
 {
  "title": "絕句漫興九首·其五",
  "author": "唐·杜甫",
  "body": [
   "腸斷春江欲盡頭",
   "杖藜徐步立芳洲",
   "顛狂柳絮隨風去",
   "輕薄桃花逐水流"
  ],
  "note": "隨風去吧，不必計較方向。"
 },
 {
  "title": "江畔獨步尋花·其六",
  "author": "唐·杜甫",
  "body": [
   "黃四娘家花滿蹊",
   "千朵萬朵壓枝低",
   "留連戲蝶時時舞",
   "自在嬌鶯恰恰啼"
  ],
  "note": "花開滿路的時候，連蝴蝶都捨不得離開。"
 },
 {
  "title": "月夜憶舍弟",
  "author": "唐·杜甫",
  "body": [
   "戍鼓斷人行",
   "邊秋一雁聲",
   "露從今夜白",
   "月是故鄉明",
   "",
   "有弟皆分散",
   "無家問死生",
   "寄書長不達",
   "況乃未休兵"
  ],
  "note": "月亮哪裡都一樣，但故鄉的那一輪最亮。"
 },
 {
  "title": "寄人",
  "author": "唐·張泌",
  "body": [
   "別夢依依到謝家",
   "小廊回合曲闌斜",
   "多情只有春庭月",
   "猶為離人照落花"
  ],
  "note": "月光為離人照著花落，這就是多情。"
 },
 {
  "title": "淮上與友人別",
  "author": "唐·鄭谷",
  "body": [
   "揚子江頭楊柳春",
   "楊花愁殺渡江人",
   "數聲風笛離亭晚",
   "君向瀟湘我向秦"
  ],
  "note": "你往南，我往北，但思念往同一個方向。"
 },
 {
  "title": "金陵圖",
  "author": "唐·韋莊",
  "body": [
   "誰謂傷心畫不成",
   "畫人心逐世人情",
   "君看六幅南朝事",
   "老木寒雲滿古城"
  ],
  "note": "傷心的事，畫出來也許就不那麼疼了。"
 },
 {
  "title": "題金陵渡",
  "author": "唐·張祜",
  "body": [
   "金陵津渡小山樓",
   "一宿行人自可愁",
   "潮落夜江斜月裡",
   "兩三星火是瓜州"
  ],
  "note": "遠處的燈火，是希望的方向。"
 },
 {
  "title": "自遣",
  "author": "唐·羅隱",
  "body": [
   "得即高歌失即休",
   "多愁多恨亦悠悠",
   "今朝有酒今朝醉",
   "明日愁來明日愁"
  ],
  "note": "今天的酒今天喝，明天的事明天說。"
 },
 {
  "title": "蜂",
  "author": "唐·羅隱",
  "body": [
   "不論平地與山尖",
   "無限風光盡被占",
   "採得百花成蜜後",
   "為誰辛苦為誰甜"
  ],
  "note": "辛苦釀的蜜，願你自己也嚐到甜。"
 },
 {
  "title": "詩品（節選）",
  "author": "南朝·鍾嶸",
  "body": [
   "氣之動物，物之感人",
   "故搖盪性情，形諸舞詠",
   "",
   "嘉會寄詩以親",
   "離群託詩以怨",
   "至於楚臣去境",
   "漢妾辭宮",
   "或骨橫朔野",
   "或魂逐飛蓬",
   "或負戈外戍",
   "殺氣雄邊",
   "塞客衣單",
   "孀閨淚盡",
   "",
   "凡斯種種，感蕩心靈",
   "非陳詩何以展其義",
   "非長歌何以騁其情"
  ],
  "note": "詩，是心靈被觸動後最自然的表達。"
 },
 {
  "title": "遊園不值",
  "author": "宋·葉紹翁",
  "body": [
   "應憐屐齒印蒼苔",
   "小扣柴扉久不開",
   "春色滿園關不住",
   "一枝紅杏出牆來"
  ],
  "note": "美好的事物，是關不住的。"
 },
 {
  "title": "鄉村四月",
  "author": "宋·翁卷",
  "body": [
   "綠遍山原白滿川",
   "子規聲裡雨如煙",
   "鄉村四月閒人少",
   "才了蠶桑又插田"
  ],
  "note": "忙碌也是一種充實。"
 },
 {
  "title": "墨竹圖題詩",
  "author": "清·鄭燮",
  "body": [
   "衙齋臥聽蕭蕭竹",
   "疑是民間疾苦聲",
   "些小吾曹州縣吏",
   "一枝一葉總關情"
  ],
  "note": "每一個小小的聲音，都值得被傾聽。"
 },
 {
  "title": "所見",
  "author": "清·袁枚",
  "body": [
   "牧童騎黃牛",
   "歌聲振林樾",
   "意欲捕鳴蟬",
   "忽然閉口立"
  ],
  "note": "專注的時刻，全世界都安靜了。"
 },
 {
  "title": "苔",
  "author": "清·袁枚",
  "body": [
   "白日不到處",
   "青春恰自來",
   "苔花如米小",
   "也學牡丹開"
  ],
  "note": "再小的花，也要努力綻放。"
 },
 {
  "title": "村居",
  "author": "清·高鼎",
  "body": [
   "草長鶯飛二月天",
   "拂堤楊柳醉春煙",
   "兒童散學歸來早",
   "忙趁東風放紙鳶"
  ],
  "note": "春天最快樂的事，就是放風箏。"
 },
 {
  "title": "論詩",
  "author": "清·趙翼",
  "body": [
   "李杜詩篇萬口傳",
   "至今已覺不新鮮",
   "江山代有才人出",
   "各領風騷數百年"
  ],
  "note": "每個時代都有屬於它的聲音。"
 },
 {
  "title": "臨江仙·滾滾長江東逝水",
  "author": "明·楊慎",
  "body": [
   "滾滾長江東逝水",
   "浪花淘盡英雄",
   "是非成敗轉頭空",
   "青山依舊在",
   "幾度夕陽紅",
   "",
   "白髮漁樵江渚上",
   "慣看秋月春風",
   "一壺濁酒喜相逢",
   "古今多少事",
   "都付笑談中"
  ],
  "note": "是非成敗轉頭空，笑一笑就好。"
 },
 {
  "title": "明日歌",
  "author": "明·錢福",
  "body": [
   "明日復明日",
   "明日何其多",
   "我生待明日",
   "萬事成蹉跎",
   "",
   "世人苦被明日累",
   "春去秋來老將至",
   "朝看水東流",
   "暮看日西墜",
   "百年明日能幾何",
   "請君聽我明日歌"
  ],
  "note": "不要等明天，今天就開始。"
 },
 {
  "title": "詠煤炭",
  "author": "明·于謙",
  "body": [
   "鑿開混沌得烏金",
   "藏蓄陽和意最深",
   "爝火燃回春浩浩",
   "洪爐照破夜沉沉",
   "鼎彝元賴生成力",
   "鐵石猶存死後心",
   "但願蒼生俱飽暖",
   "不辭辛苦出山林"
  ],
  "note": "但願每個人都溫飽，這就是最簡單的願望。"
 },
 {
  "title": "過華清宮",
  "author": "唐·杜牧",
  "body": [
   "長安回望繡成堆",
   "山頂千門次第開",
   "一騎紅塵妃子笑",
   "無人知是荔枝來"
  ],
  "note": "有些代價，旁人看不見。"
 },
 {
  "title": "題烏江亭",
  "author": "唐·杜牧",
  "body": [
   "勝敗兵家事不期",
   "包羞忍恥是男兒",
   "江東子弟多才俊",
   "捲土重來未可知"
  ],
  "note": "失敗不可怕，重要的是還有再來的勇氣。"
 },
 {
  "title": "三衢道中",
  "author": "宋·曾幾",
  "body": [
   "梅子黃時日日晴",
   "小溪泛盡卻山行",
   "綠陰不減來時路",
   "添得黃鸝四五聲"
  ],
  "note": "走回來的路上，多了幾聲鳥鳴。"
 },
 {
  "title": "四時田園雜興",
  "author": "宋·范成大",
  "body": [
   "梅子金黃杏子肥",
   "麥花雪白菜花稀",
   "日長籬落無人過",
   "惟有蜻蜓蛺蝶飛"
  ],
  "note": "夏日午後，只有蜻蜓和蝴蝶在忙。"
 },
 {
  "title": "病起書懷",
  "author": "宋·陸游",
  "body": [
   "病骨支離紗帽寬",
   "孤臣萬里客江干",
   "位卑未敢忘憂國",
   "事定猶須待闔棺"
  ],
  "note": "位卑未敢忘憂國。"
 },
 {
  "title": "冬夜讀書示子聿",
  "author": "宋·陸游",
  "body": [
   "古人學問無遺力",
   "少壯工夫老始成",
   "紙上得來終覺淺",
   "絕知此事要躬行"
  ],
  "note": "光看書不夠，要親自去做才會真懂。"
 },
 {
  "title": "文章千古事",
  "author": "唐·杜甫",
  "body": [
   "文章千古事",
   "得失寸心知",
   "作者皆殊列",
   "名聲豈浪垂"
  ],
  "note": "寫下的每一個字，自己最清楚它的份量。"
 },
 {
  "title": "行宮",
  "author": "唐·元稹",
  "body": [
   "寥落古行宮",
   "宮花寂寞紅",
   "白頭宮女在",
   "閒坐說玄宗"
  ],
  "note": "花還在開，人已老了。時間是最安靜的講述者。"
 },
 {
  "title": "夏日南亭懷辛大",
  "author": "唐·孟浩然",
  "body": [
   "山光忽西落",
   "池月漸東上",
   "散髮乘夕涼",
   "開軒臥閒敞",
   "荷風送香氣",
   "竹露滴清響",
   "欲取鳴琴彈",
   "恨無知音賞"
  ],
  "note": "美好的夜晚，只缺一個知音。"
 },
 {
  "title": "望洞庭湖贈張丞相",
  "author": "唐·孟浩然",
  "body": [
   "八月湖水平，涵虛混太清",
   "氣蒸雲夢澤，波撼岳陽城",
   "欲濟無舟楫，端居恥聖明",

 {

 {
  "title": "尾声・若能够半丝儿系足为媒聘，煞强似几缕同心结志诚。常记得雪虐风",
  "author": "元・汤舜民",
  "body": [

   "赠美人缘底事谪离方丈台，是谁人赚出桃源洞，何日里拜辞王母殿，甚风儿吹下广寒宫。",

 {
  "title": "金盏儿・山头雪巽风吹，甘露降饮刀圭。调停火候功夫细，久全阴静养神",

 {

 {

 {
  "title": "包龙图智赚合同文字・幺篇",
  "author": "元・无名氏",
  "body": [
   "伯娘你也忒狠酷，怎对付！则待要瞒了侄儿，背了伯伯，下了埋伏。",
   "单则是他亲女，和女夫，把家缘收取，可不俺两房头灭门绝户？(刘天祥云)安住孩儿，你那合同文书委实在那里也？(正末云)恰才是伯娘亲手儿拿进去了。",
   "(搽旦云)这个说谎的小弟子孩儿，我几曾见那文书来？(正末云)伯娘，休斗您孩儿妥。",
   "你恰才明明的拿进去，怎说不曾见？(搽旦云)我若见你那文书，着我邻舍家害疔疮。",
   "(刘天祥云)婆婆。",
   "你若是拿了，将来我看。",
   "(搽旦云)这老儿也糊突。",
   "这纸文书，我要他糊窗儿？有甚么用处？这厮故意的来捏舌，待诈骗咱的家私哩。",
   "(正未)伯伯，您孩儿不要家财，则要傍着祖坟上埋葬了俺父母这两把儿骨殖。",
   "我便去也。",
   "(搽旦打破正末头科，云)老的，你只管与他说甚么？咱家去来。",
   "(关门科)(下)(正末云)认我不队我便罢，怎么将我的头打破了？天那！谁人与我做主咱！(哭科)(李社长上，云)老汉李社长是也。",
   "打从刘天祥门省经过，看见一个后生，在那里啼哭，不知为何？我问他波。",
   "这小的，你是甚么人：(正末云)我是十五年前趁熟去的刘天瑞儿子刘安住，(社长认科，云)是谁打破你头天？(正末云)这不干我伯父事，是伯娘不肯认我，拿了我合同文书，抵死的赖了，又打破我的头来。",
   "(社长云)刘安住，你且省烦恼。",
   "你是我的女婿，我与你做主。",
   "(正末唱)。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "十二月・正月",
  "author": "元・无名氏",
  "body": [
   "年时节，元夜时，云鬓插小桃枝。",
   "今年早，不见你，泪珠儿，滴满了春衫袖儿。",
   "二月踏青去，二月时，则不肯上车儿。",
   "强那步，困又止，脱鞋儿，要人兜凌波袜儿。",
   "三月春三月，花满枝，秋千惹绿杨丝。",
   "才蹴罢，舒玉指，摸腰儿，谁拾得鲛绡帕儿？四月清和节，近洛时，寻思了又寻思。",
   "新荷叶，浑厮似，面花儿，贴在我芙蓉额儿。",
   "五月曾齐唱，端午词，香艾插交枝。",
   "琼酥腕，系彩丝，酒浓时，压匾了黄金钏儿。",
   "六月炎天热，无限时，香汗湿凝脂。",
   "谁如我，看定你，睡着时，才敢住了白纨扇儿。",
   "七月金风动，玉露滋，牛女会合时。",
   "人别后，无意思，折花枝，闲倚定桐梧树儿。",
   "八月中秋夜，饮玉卮，满酌不须辞。",
   "沉醉后，仰望时，月明儿，便似个青铜镜儿。",
   "九月重阳节，秋暮时，为折傲霜枝。",
   "归兰舍，忆旧时，梦魂儿，飞入销金帐儿。",
   "十月长思虑，长叹咨，烟外碧参差。",
   "或时诗句，或时词，写相思，无一个胭脂叶儿。",
   "十一月香闺静，憔悴死，玉壶内结冰澌。",
   "沉烟细，袅碧丝，断肠时，纱窗印梅花月儿。",
   "十二月十二月，十二时，无一刻不嗟咨。",
   "他来后，方则是，一团儿，香满了青绫被儿。",
   "嘲女人身长身材大，膊项长，难匹配怎成双？只道是巨无霸的女，原来是显道神的娘。",
   "我这里细端详，还只怕你明年又长。",
   "嘲人桌上睡难挂芙蓉帐，休题锦绣帏，误了他摆筵席。",
   "蟠蟠睡，款款偎，高卧得便宜，上台盘的先生是你！嘲谎人东村里鸡生凤，南庄上马变牛，六月里裹皮裘。",
   "瓦垄上宜栽树，阳沟里好驾舟。",
   "瓮来大肉馒头，俺家的茄子大如斗！贪一夜千条计，百年万世心，火院有海来深。",
   "头枕着连城玉，脚踏着遍地金。",
   "有一日死来临，问贪公那一件儿替得您？嗔怒纷纷心肠恶，气昂昂胆量粗，动不动撒无徒。",
   "忒嫉妒更狠毒！有一日命遭诛，那其间谁来救苦？痴不知无常路，不识有限身，恰便似睡馄饨。",
   "东走投西去，南行却北奔，枉做世间人，比贪嗔颠倒又蠢。",
   "戒莫作亏心事，休寻舍命因，难再得人身。",
   "问甚么腥和肉？管什么素与荤？只要你认天真，一步步前程息稳。",
   "定静里休作观，光中不见明，杳杳复冥冥。",
   "闻香不知异，对乐不听声，放下两无情，才是个真常小境。",
   "蕙看破无生事，参透悄然机，从些兔狐栖。",
   "大则瞒天地，小则入细微，除是自家知，使唤的泥牛下水。",
   "叹世叹贫富十年运，看兴亡一着棋，昨朝是今日非。",
   "绿草随春变，青山不改移，白发故人稀，恰便似黄叶落东流逝水。",
   "日月双飞箭，光阴一掷梭，尘事暗消磨。",
   "轻似花梢露，浮如水上波，贫富待如何？且放开眉间双锁。",
   "过一日无一日，度一年少一年，又何必苦熬煎。",
   "论什么贫和富？管什么愚共贤？头直上有青天，不觉的夕阳又转。",
   "嘲贪汉一粒米针穿着吃，一文钱剪截充，但开口昧神灵。",
   "看儿女如衔泥燕，爱钱财似竞血蝇，无明夜攒金银，都做充饥画饼。",
   "题情解不开同心扣，摘不脱倒须钩，糖和蜜搅酥油。",
   "活摆布千条计，死安排一处休，恁两个忒风流，死共活休要放手。",
   "惹离恨香罗袖，送愁闷白玉瓯，花和月两风流。",
   "闹攘攘莺花市，乱纷纷燕子楼，似这般几时休？憔悴了方才罢手。",
   "模样儿还依旧，心肠儿转换别，全不似旧时节。",
   "海誓都不应，山盟空自说，想起来暗伤嗟，好恩情不觉的罢也。",
   "泪滴湿香罗袖，泪湮透白苎衫，娇士女俊儿男。",
   "一个心肠热，一个眼脑馋，便死也心甘，俺为他他为俺。",
   "情如诉，心似许，萦系杀病相如。",
   "人如玉，花解语，更通疏，知道俺风流受苦。",
   "桃腮嫩，杏脸舒，红紫间锦模糊。",
   "春将暮，风乱鼓，落红疏，谁肯与残花做主？。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "死生交范张鸡黍・仙吕/赏花时",
  "author": "元・宫天挺",
  "body": [
   "俺本是义烈堂堂大丈夫，况同在成均共业儒。",
   "聚首数年余，今日个临岐归去，情悯默意踌躇。"
