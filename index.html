"年事夢中休，花空煙水流。", "燕辭歸、客尚淹留。", "垂柳不縈裙帶住，漫長是、繫行舟。"], "note": "愁字拆開是離人心上秋，一語道破千古離情。"}, {"title": "寄黃幾復", "author": "宋・黃庭堅", "body": ["我居北海君南海，寄雁傳書謝不能。", "桃李春風一杯酒，江湖夜雨十年燈。", "持家但有四立壁，治病不蘄三折肱。", "想得讀書頭已白，隔溪猿哭瘴溪藤。"], "note": "桃李春風與江湖夜雨，寫盡十年聚散離合。"}, {"title": "清平樂・春歸何處", "author": "宋・黃庭堅", "body": ["春歸何處？寂寞無行路。", "若有人知春去處，喚取歸來同住。", "", "春無蹤跡誰知？除非問取黃鸝。", "百囀無人能解，因風飛過薔薇。"], "note": "春天悄然離去無跡可尋，只有黃鸝知曉。"}, {"title": "登快閣", "author": "宋・黃庭堅", "body": ["癡兒了卻公家事，快閣東西倚晚晴。", "落木千山天遠大，澄江一道月分明。", "朱弦已為佳人絕，青眼聊因美酒橫。", "萬裏歸船弄長笛，此心吾與白鷗盟。"], "note": "落木千山澄江月明，此心只與白鷗為盟。"}, {"title": "小池", "author": "宋・楊萬裏", "body": ["泉眼無聲惜細流，樹陰照水愛晴柔。", "小荷才露尖尖角，早有蜻蜓立上頭。"], "note": "萬物初生之美，是小荷尖角上那隻蜻蜓。"}, {"title": "曉出淨慈寺送林子方", "author": "宋・楊萬裏", "body": ["畢竟西湖六月中，風光不與四時同。", "接天蓮葉無窮碧，映日荷花別樣紅。"], "note": "六月西湖的荷花，是天地間最盛大的紅與綠。"}, {"title": "閒居初夏午睡起", "author": "宋・楊萬裏", "body": ["梅子留酸軟齒牙，芭蕉分綠與窗紗。", "日長睡起無情思，閒看兒童捉柳花。"], "note": "午睡醒來無事可做，看孩童捉柳花也是一種閒趣。"}, {"title": "宿新市徐公店", "author": "宋・楊萬裏", "body": ["籬落疏疏一徑深，樹頭新綠未成陰。", "兒童急走追黃蝶，飛入菜花無處尋。"], "note": "黃蝶飛入菜花叢，童年的歡樂就是追逐那找不到的蹤影。"}, {"title": "觀書有感", "author": "宋・朱熹", "body": ["半畝方塘一鑑開，天光雲影共徘徊。", "問渠那得清如許？為有源頭活水來。"], "note": "學問如活水，唯有不斷汲取才能保持清澈。"}, {"title": "觀書有感・其二", "author": "宋・朱熹", "body": ["昨夜江邊春水生，艨艟巨艦一毛輕。", "向來枉費推移力，此日中流自在行。"], "note": "時機到了，昔日費力推不動的巨艦自然輕行。"}, {"title": "春日", "author": "宋・朱熹", "body": ["勝日尋芳泗水濱，無邊光景一時新。", "等閒識得東風面，萬紫千紅總是春。"], "note": "萬紫千紅皆是春的面貌，開放包容才見全景。"}, {"title": "偶成", "author": "宋・朱熹", "body": ["少年易老學難成，一寸光陰不可輕。", "未覺池塘春草夢，階前梧葉已秋聲。"], "note": "春草夢未醒，梧桐已秋聲，光陰不等人。"}, {"title": "過零丁洋", "author": "宋・文天祥", "body": ["辛苦遭逢起一經，干戈寥落四周星。", "山河破碎風飄絮，身世浮沉雨打萍。", "惶恐灘頭說惶恐，零丁洋裏嘆零丁。", "人生自古誰無死？留取丹心照汗青。"], "note": "生死之際，唯有一片丹心可照千秋史冊。"}, {"title": "正氣歌（節選）", "author": "宋・文天祥", "body": ["天地有正氣，雜然賦流形。", "下則為河嶽，上則為日星。", "於人曰浩然，沛乎塞蒼冥。", "皇路當清夷，含和吐明庭。"], "note": "天地正氣充塞宇宙，是人間浩然之氣的根源。"}, {"title": "滿江紅・寫懷", "author": "宋・嶽飛", "body": ["怒髮衝冠，憑欄處、瀟瀟雨歇。", "抬望眼、仰天長嘯，壯懷激烈。", "三十功名塵與土，八千里路雲和月。", "莫等閒、白了少年頭，空悲切。", "", "靖康恥，猶未雪。臣子恨，何時滅？", "駕長車，踏破賀蘭山缺。", "壯志飢餐胡虜肉，笑談渴飲匈奴血。", "待從頭、收拾舊山河，朝天闕。"], "note": "莫等閒白了少年頭，報國之志不容蹉跎。"}, {"title": "小重山・昨夜寒蛩不住鳴", "author": "宋・嶽飛", "body": ["昨夜寒蛩不住鳴，驚回千里夢，已三更。", "起來獨自繞階行，人悄悄，簾外月朧明。", "", "白首為功名，舊山松竹老，阻歸程。", "欲將心事付瑤琴，知音少，弦斷有誰聽？"], "note": "弦斷無人聽，英雄最怕的是無人懂得。"}, {"title": "四時田園雜興・其二十五", "author": "宋・范成大", "body": ["梅子金黃杏子肥，麥花雪白菜花稀。", "日長籬落無人過，惟有蜻蜓蛺蝶飛。"], "note": "初夏田園的寧靜，只有蜻蜓蝴蝶在忙碌。"}, {"title": "四時田園雜興・其三十一", "author": "宋・范成大", "body": ["晝出耘田夜績麻，村莊兒女各當家。", "童孫未解供耕織，也傍桑陰學種瓜。"], "note": "孩童學種瓜的模樣，是田園生活最溫暖的畫面。"}, {"title": "州橋", "author": "宋・范成大", "body": ["州橋南北是天街，父老年年等駕回。", "忍淚失聲詢使者，幾時真有六軍來？"], "note": "年年翹首盼王師，遺民的淚水最令人心碎。"}, {"title": "水龍吟・登建康賞心亭", "author": "宋・辛棄疾", "body": ["楚天千里清秋，水隨天去秋無際。", "遙岑遠目，獻愁供恨，玉簪螺髻。", "落日樓頭，斷鴻聲裏，江南遊子。", "把吳鉤看了，欄杆拍遍，無人會，登臨意。", "", "休說鱸魚堪膾，盡西風，季鷹歸未？", "求田問舍，怕應羞見，劉郎才氣。", "可惜流年，憂愁風雨，樹猶如此！", "倩何人喚取，紅巾翠袖，搵英雄淚？"], "note": "拍遍欄杆無人懂，英雄淚要何人來拭？"}, {"title": "賀新郎・別茂嘉十二弟", "author": "宋・辛棄疾", "body": ["綠樹聽鵜鴂，更那堪、鷓鴣聲住，杜鵑聲切。", "啼到春歸無尋處，苦恨芳菲都歇。", "算未抵、人間離別。馬上琵琶關塞黑，更長門翠輦辭金闕。", "看燕燕，送歸妾。", "", "將軍百戰身名裂，向河梁、回頭萬裏，故人長絕。", "易水蕭蕭西風冷，滿座衣冠似雪。", "正壯士、悲歌未徹。", "啼鳥還知如許恨，料不啼清淚長啼血。", "誰共我，醉明月？"], "note": "古來離別皆傷，啼鳥若知世間恨，當啼血而非淚。"}, {"title": "賀鑄・青玉案", "author": "宋・賀鑄", "body": ["凌波不過橫塘路，但目送、芳塵去。", "錦瑟華年誰與度？月橋花院，瑣窗朱戶，只有春知處。", "", "飛雲冉冉蘅皋暮，彩筆新題斷腸句。", "試問閒愁都幾許？一川煙草，滿城風絮，梅子黃時雨。"], "note": "閒愁多如煙草風絮黃梅雨，瀰漫了整個世界。"}, {"title": "醉蓬萊・歸故山", "author": "宋・賀鑄", "body": ["問東君何處，收拾春歸？", "空堦淡月，幾瞑迷離。", "繁紅嫩翠，如今何在？", "但一地殘香，半窗飛絮。", "回首來時路，人去也、花無主。"], "note": "春歸無處尋，只餘一地殘香與半窗飛絮。"}, {"title": "天仙子・水調數聲持酒聽", "author": "宋・張先", "body": ["水調數聲持酒聽，午醉醒來愁未醒。", "送春春去幾時回？臨晚鏡，傷流景，往事後期空記省。", "", "沙上並禽池上暝，雲破月來花弄影。", "重重簾幕密遮燈，風不定，人初靜，明日落紅應滿徑。"], "note": "雲破月來花弄影，動靜之間盡是詩意。"}, {"title": "千秋歲・數聲鶗鴂", "author": "宋・張先", "body": ["數聲鶗鴂，又報芳菲歇。", "惜春更把殘紅折，雨輕風色暴，梅子青時節。", "永豐柳，無人盡日飛花雪。", "", "莫把幺弦撥，怨極弦能說。", "天不老，情難絕。心似雙絲網，中有千千結。", "夜過也，東窗未白凝殘月。"], "note": "心如雙絲網千千結，情到深處解不開。"}, {"title": "虞美人・聽雨", "author": "宋・蔣捷", "body": ["少年聽雨歌樓上，紅燭昏羅帳。", "壯年聽雨客舟中，江闊雲低、斷雁叫西風。", "", "而今聽雨僧廬下，鬢已星星也。", "悲歡離合總無情，一任階前、點滴到天明。"], "note": "三段聽雨，三種人生，到最後只剩淡然。"}, {"title": "一剪梅・舟過吳江", "author": "宋・蔣捷", "body": ["一片春愁待酒澆，江上舟搖，樓上簾招。", "秋娘渡與泰娘橋，風又飄飄，雨又蕭蕭。", "", "何日歸家洗客袍？銀字笙調，心字香燒。", "流光容易把人拋，紅了櫻桃，綠了芭蕉。"], "note": "流光拋人而去，櫻桃紅了芭蕉綠了，歲月不等人。"}, {"title": "賀新郎・夢繞神州路", "author": "宋・陳亮", "body": ["夢繞神州路，悵秋風、連營畫角，故宮離黍。", "底事崑崙傾砥柱，九地黃流亂注。", "聚萬落千村狐兔。", "天意從來高難問，況人情老易悲難訴。", "更南浦，送君去。", "", "涼生岸柳催殘暑，耿斜河、疏星淡月，斷雲微度。", "萬裏江山知何處？回首對牀夜語。", "雁不到、書成誰與？", "目盡青天懷今古，肯兒曹恩怨相爾汝！", "舉大白，聽金縷。"], "note": "萬裏江山在夢中，天意高難問，人情更難訴。"}, {"title": "念奴嬌・登多景樓", "author": "宋・陳亮", "body": ["危樓還望，嘆此意、今古幾人曾會？", "鬼設神施，渾認作、天限南疆北界。", "一水橫陳，連岡三面，做出爭雄勢。", "六朝何事，只成門戶私計？", "", "因笑王謝諸人，登高懷遠，也學英雄涕。", "憑卻長江管不到，河洛腥羶無際。", "正好長驅，不須反顧，尋取中流誓。", "小兒破賊，勢成寧問強對！"], "note": "長江天塹不是偏安的藉口，正應長驅直入。"}, {"title": "六州歌頭・長淮望斷", "author": "宋・張孝祥", "body": ["長淮望斷，關塞莽然平。", "徵塵暗，霜風勁，悄邊聲。黯銷凝。", "追想當年事，殆天數，非人力，洙泗上，絃歌地，亦羶腥。", "隔水氈鄉，落日牛羊下，區脫縱橫。", "看名王宵獵，騎火一川明。笳鼓悲鳴，遣人驚。", "", "念腰間箭，匣中劍，空埃蠹，竟何成！", "時易失，心徒壯，歲將零。渺神京。", "幹羽方懷遠，靜烽燧，且休兵。", "冠蓋使，紛馳騖，若為情。", "聞道中原遺老，常南望、翠葆霓旌。", "使行人到此，忠憤氣填膺，有淚如傾。"], "note": "腰間箭匣中劍空濛塵，壯士有淚如傾。"}, {"title": "念奴嬌・過洞庭", "author": "宋・張孝祥", "body": ["洞庭青草，近中秋、更無一點風色。", "玉鑑瓊田三萬頃，著我扁舟一葉。", "素月分輝，明河共影，表裏俱澄澈。", "悠然心會，妙處難與君說。", "", "應念嶺表經年，孤光自照，肝膽皆冰雪。", "短髮蕭騷襟袖冷，穩泛滄溟空闊。", "盡挹西江，細斟北斗，萬象為賓客。", "扣舷獨嘯，不知今夕何夕。"], "note": "表裏澄澈如洞庭月色，是心靈最高的境界。"}, {"title": "山園小梅", "author": "宋・林逋", "body": ["眾芳搖落獨暄妍，佔盡風情向小園。", "疏影橫斜水清淺，暗香浮動月黃昏。", "霜禽欲下先偷眼，粉蝶如知合斷魂。", "幸有微吟可相狎，不須檀板共金尊。"], "note": "疏影暗香，是梅花留給世間最清雅的意象。"}, {"title": "相見歡・金陵城上西樓", "author": "宋・朱敦儒", "body": ["金陵城上西樓，倚清秋。", "萬裏夕陽垂地大江流。", "", "中原亂，簪纓散，幾時收？", "試倩悲風吹淚過揚州。"], "note": "亂世悲風中，淚隨江水流向失落的中原。"}, {"title": "約客", "author": "宋・趙師秀", "body": ["黃梅時節家家雨，青草池塘處處蛙。", "有約不來過夜半，閒敲棋子落燈花。"], "note": "等人不至的夜晚，閒敲棋子的寂寞也有詩意。"}, {"title": "雙雙燕・詠燕", "author": "宋・史達祖", "body": ["過春社了，度簾幕中間，去年塵冷。", "差池欲住，試入舊巢相並。", "還相雕樑藻井，又軟語、商量不定。", "飄然快拂花梢，翠尾分開紅影。", "", "芳徑，芹泥雨潤。愛貼地爭飛，競誇輕俊。", "紅樓歸晚，看足柳昏花暝。", "應自棲香正穩，便忘了、天涯芳信。", "愁損翠黛雙蛾，日日畫闌獨憑。"], "note": "燕子歸來尋舊巢，軟語商量的模樣令人莞爾。"}, {"title": "賀新郎・國脈微如縷", "author": "宋・劉克莊", "body": ["國脈微如縷，問長纓、何時入手，縛將戎主？", "未必人間無好漢，誰與寬些尺度？", "試看取、當年韓五。", "豈有谷城公付畀，遣鬼門關外著人處。", "昏霧塞，塞南路。", "", "蛇盤大石乘陰樹，極目望、翠煙如織，煙中人苦。", "但見淮山隱隱，日照千帆出浦。", "也莫惜、浮雲蔽天白日。", "清歌莫斷腸，回首關山難越。"], "note": "國脈如縷之際，呼喚英雄莫被埋沒。"}, {"title": "魯山山行", "author": "宋・梅堯臣", "body": ["適與野情愜，千山高復低。", "好峯隨處改，幽徑獨行迷。", "霜落熊升樹，林空鹿飲溪。", "人家在何許？雲外一聲雞。"], "note": "山行迷路不必慌，雲外雞鳴處便有人家。"}, {"title": "蝶戀花・庭院深深深幾許", "author": "宋・歐陽修", "body": ["庭院深深深幾許，楊柳堆煙，簾幕無重數。", "玉勒雕鞍遊冶處，樓高不見章臺路。", "", "雨橫風狂三月暮，門掩黃昏，無計留春住。", "淚眼問花花不語，亂紅飛過鞦韆去。"], "note": "深深庭院鎖不住春光，淚眼問花花也無語。"}, {"title": "生查子・元夕", "author": "宋・歐陽修", "body": ["去年元夜時，花市燈如晝。", "月上柳梢頭，人約黃昏後。", "", "今年元夜時，月與燈依舊。", "不見去年人，淚濕春衫袖。"], "note": "燈月依舊人已不在，同樣的夜晚卻是不同的心境。"}, {"title": "踏莎行・候館梅殘", "author": "宋・歐陽修", "body": ["候館梅殘，溪橋柳細，草薰風暖搖徵轡。", "離愁漸遠漸無窮，迢迢不斷如春水。", "", "寸寸柔腸，盈盈粉淚，樓高莫近危闌倚。", "平蕪盡處是春山，行人更在春山外。"], "note": "離愁如春水迢迢不斷，行人已在春山之外。"}, {"title": "採桑子・羣芳過後西湖好", "author": "宋・歐陽修", "body": ["羣芳過後西湖好，狼籍殘紅。飛絮濛濛，垂柳闌幹盡日風。", "", "笙歌散盡遊人去，始覺春空。垂下簾櫳，雙燕歸來細雨中。"], "note": "繁華散盡後的西湖，反而有一種空靈之美。"}, {"title": "浪淘沙・把酒祝東風", "author": "宋・歐陽修", "body": ["把酒祝東風，且共從容。", "垂楊紫陌洛城東，總是當時攜手處，遊遍芳叢。", "", "聚散苦匆匆，此恨無窮。", "今年花勝去年紅，可惜明年花更好，知與誰同？"], "note": "花年年更好，可惜共賞的人卻不知還在不在。"}, {"title": "戲答元珍", "author": "宋・歐陽修", "body": ["春風疑不到天涯，二月山城未見花。", "殘雪壓枝猶有橘，凍雷驚筍欲抽芽。", "夜聞歸雁生鄉思，病入新年感物華。", "曾是洛陽花下客，野芳雖晚不須嗟。"], "note": "曾見過洛陽繁花，便不必為野花遲開而嘆息。"}, {"title": "玉樓春・尊前擬把歸期說", "author": "宋・歐陽修", "body": ["尊前擬把歸期說，未語春容先慘咽。", "人生自是有情癡，此恨不關風與月。", "", "離歌且莫翻新闕，一曲能教腸寸結。", "直須看盡洛城花，始共春風容易別。"], "note": "人生多情是天性，此恨無關風月，只因太深。"}, {"title": "春宵", "author": "宋・蘇軾", "body": ["春宵一刻值千金，花有清香月有陰。", "歌管樓臺聲細細，鞦韆院落夜沉沉。"], "note": "春夜如此美好，每一刻都值得珍惜。"}, {"title": "贈劉景文", "author": "宋・蘇軾", "body": ["荷盡已無擎雨蓋，菊殘猶有傲霜枝。", "一年好景君須記，最是橙黃橘綠時。"], "note": "荷殘菊敗不是終結，橙黃橘綠纔是最好的時節。"}, {"title": "水龍吟・次韻章質夫楊花詞", "author": "宋・蘇軾", "body": ["似花還似非花，也無人惜從教墜。", "拋家傍路，思量卻是，無情有思。", "縈損柔腸，困酣嬌眼，欲開還閉。", "夢隨風萬裏，尋郎去處，又還被、鶯呼起。", "", "不恨此花飛盡，恨西園、落紅難綴。", "曉來雨過，遺蹤何在？一池萍碎。", "春色三分，二分塵土，一分流水。", "細看來，不是楊花，點點是離人淚。"], "note": "楊花似花非花，點點皆是離人淚。"}, {"title": "永遇樂・彭城夜宿燕子樓", "author": "宋・蘇軾", "body": ["明月如霜，好風如水，清景無限。", "曲港跳魚，圓荷瀉露，寂寞無人見。", "紞如三鼓，鏗然一葉，黯黯夢雲驚斷。", "夜茫茫，重尋無處，覺來小園行遍。", "", "天涯倦客，山中歸路，望斷故園心眼。", "燕子樓空，佳人何在，空鎖樓中燕。", "古今如夢，何曾夢覺，但有舊歡新怨。", "異時對、黃樓夜景，為餘浩嘆。"], "note": "古今皆如一夢，夢中人何曾真正醒來。"}, {"title": "行香子・述懷", "author": "宋・蘇軾", "body": ["清夜無塵，月色如銀。", "酒斟時、須滿十分。", "浮名浮利，虛苦勞神。", "嘆隙中駒，石中火，夢中身。", "", "雖抱文章，開口誰親。", "且陶陶、樂盡天真。", "幾時歸去，作個閒人。", "對一張琴，一壺酒，一溪雲。"], "note": "一琴一酒一溪雲，閒人之樂勝過浮名虛利。"}, {"title": "浣溪沙・細雨斜風作曉寒", "author": "宋・蘇軾", "body": ["細雨斜風作曉寒，淡煙疏柳媚晴灘。入淮清洛漸漫漫。", "", "雪沫乳花浮午盞，蓼茸蒿筍試春盤。人間有味是清歡。"], "note": "人間最有滋味的，是那份清淡的歡喜。"}, {"title": "滿庭芳・蝸角虛名", "author": "宋・蘇軾", "body": ["蝸角虛名，蠅頭微利，算來著甚幹忙。", "事皆前定，誰弱又誰強。", "且趁閒身未老，須放我、些子疏狂。", "百年裏，渾教是醉，三萬六千場。", "", "思量，能幾許？憂愁風雨，一半相妨。", "又何須抵死，說短論長。", "幸對清風皓月，苔茵展、雲幕高張。", "江南好，千鍾美酒，一曲滿庭芳。"], "note": "蝸角虛名蠅頭微利，不如對月飲酒來得暢快。"}, {"title": "南歌子・寓意", "author": "宋・蘇軾", "body": ["雨暗初疑夜，風回便報晴。", "淡雲斜照著山明，細草軟沙溪路、馬蹄輕。", "", "卯酒醒還困，仙材夢不成。", "藍橋何處覓雲英？只有多情流水、伴人行。"], "note": "世間知己難尋，唯有多情流水一路相伴。"}, {"title": "望江南・超然臺作", "author": "宋・蘇軾", "body": ["春未老，風細柳斜斜。", "試上超然臺上看，半壕春水一城花。煙雨暗千家。", "", "寒食後，酒醒卻諮嗟。", "休對故人思故國，且將新火試新茶。詩酒趁年華。"], "note": "與其思念故國，不如把握當下，詩酒趁年華。"}, {"title": "添字醜奴兒・窗前誰種芭蕉樹", "author": "宋・李清照", "body": ["窗前誰種芭蕉樹？陰滿中庭。", "陰滿中庭，葉葉心心，舒捲有餘清。", "", "傷心枕上三更雨，點滴霖霪。", "點滴霖霪，愁損北人，不慣起來聽。"], "note": "芭蕉夜雨聲聲入耳，愁損異鄉人。"}, {"title": "訴衷情・當年萬裏覓封侯", "author": "宋・陸遊", "body": ["當年萬裏覓封侯，匹馬戍梁州。", "關河夢斷何處？塵暗舊貂裘。", "", "胡未滅，鬢先秋，淚空流。", "此生誰料，心在天山，身老滄洲。"], "note": "心在天山身老滄洲，是英雄最深沉的無奈。"}, {"title": "釵頭鳳・世情薄", "author": "宋・唐琬", "body": ["世情薄，人情惡，雨送黃昏花易落。", "曉風乾，淚痕殘。欲箋心事，獨語斜闌。難、難、難。", "", "人成各，今非昨，病魂常似鞦韆索。", "角聲寒，夜闌珊。怕人尋問，咽淚裝歡。瞞、瞞、瞞。"], "note": "咽淚裝歡的苦楚，是被迫分離者最深的傷痛。"}, {"title": "青門引・春思", "author": "宋・張先", "body": ["乍暖還輕冷，風雨晚來方定。", "庭軒寂寞近清明，殘花中酒，又是去年病。", "", "樓頭畫角風吹醒，入夜重門靜。", "那堪更被明月，隔牆送過鞦韆影。"], "note": "月光隔牆送來鞦韆的影子，勾起無限春思。"}, {"title": "蝶戀花・早行", "author": "宋・周邦彥", "body": ["月皎驚烏棲不定，更漏將殘，轆轤牽金井。", "喚起兩眸清炯炯，淚花落枕紅綿冷。", "", "執手霜風吹鬢影，去意徊徨，別語愁難聽。", "樓上闌幹橫斗柄，露寒人遠雞相應。"], "note": "霜風吹鬢的清晨離別，是最難捨的時刻。"}, {"title": "西河・金陵懷古", "author": "宋・周邦彥", "body": ["佳麗地，南朝盛事誰記？", "山圍故國繞清江，髻鬟對起。", "怒濤寂寞打孤城，風檣遙度天際。", "", "斷崖樹，猶倒倚，莫愁艇子曾繫。", "空餘舊跡鬱蒼蒼，霧沉半壘。", "夜深月過女牆來，傷心東望淮水。", "", "酒旗戲鼓甚處市？想依稀、王謝鄰裏。", "燕子不知何世，入尋常巷陌人家，相對如說興亡，斜陽裏。"], "note": "燕子穿梭舊巷陌，不知身處的已是另一個朝代。"}, {"title": "滿江紅・暮春", "author": "宋・辛棄疾", "body": ["家住江南，又過了、清明寒食。", "花徑裏、一番風雨，一番狼藉。", "紅粉暗隨流水去，園林漸覺清陰密。", "算年年、落盡刺桐花，寒無力。", "", "庭院靜，空相憶。無說處，閒愁極。", "怕流鶯乳燕，得知消息。", "尺素如今何處也？彩雲依舊無蹤跡。", "謾教人、羞去上層樓，平蕪碧。"], "note": "風雨過後花落成泥，閒愁無處訴說。"}, {"title": "祝英臺近・晚春", "author": "宋・辛棄疾", "body": ["寶釵分，桃葉渡，煙柳暗南浦。", "怕上層樓，十日九風雨。", "斷腸片片飛紅，都無人管，更誰勸、啼鶯聲住？", "", "鬢邊覷，試把花卜歸期，才簪又重數。", "羅帳燈昏，哽咽夢中語。", "是他春帶愁來，春歸何處？卻不解、帶將愁去。"], "note": "春帶愁來卻不帶愁去，留下滿懷惆悵。"}, {"title": "太常引・建康中秋夜為呂叔潛賦", "author": "宋・辛棄疾", "body": ["一輪秋影轉金波，飛鏡又重磨。", "把酒問姮娥：被白髮、欺人奈何！", "", "乘風好去，長空萬裏，直下看山河。", "斜去桂花樹，人道是、清光更多。"], "note": "乘風直上萬裏長空，俯瞰山河纔是真豪邁。"}, {"title": "賀新郎・甚矣吾衰矣", "author": "宋・辛棄疾", "body": ["甚矣吾衰矣。悵平生、交遊零落，只今餘幾！", "白髮空垂三千丈，一笑人間萬事。", "問何物、能令公喜？", "我見青山多嫵媚，料青山見我應如是。", "情與貌，略相似。", "", "一尊搔首東窗裏。想淵明、停雲詩就，此時風味。", "江左沉酣求名者，豈識濁醪妙理。", "回首叫、雲飛風起。", "不恨古人吾不見，恨古人不見吾狂耳。", "知我者，二三子。"], "note": "我見青山多嫵媚，料青山見我亦如是，人與自然本相知。"}, {"title": "生查子・獨遊雨巖", "author": "宋・辛棄疾", "body": ["溪邊照影行，天在清溪底。", "天上有行雲，人在行雲裏。", "", "高歌誰和餘？空谷清音起。", "非鬼亦非仙，一曲桃花水。"], "note": "人在水中天，天在水中行，物我合一的妙境。"}, {"title": "浣溪沙・漠漠輕寒上小樓", "author": "宋・秦觀", "body": ["漠漠輕寒上小樓，曉陰無賴似窮秋。淡煙流水畫屏幽。", "", "自在飛花輕似夢，無邊絲雨細如愁。寶簾閒掛小銀鉤。"], "note": "飛花輕似夢，絲雨細如愁，萬物皆有情。"}, {"title": "行香子・樹繞村莊", "author": "宋・秦觀", "body": ["樹繞村莊，水滿陂塘。", "倚東風、豪興徜徉。", "小園幾許，收盡春光。", "有桃花紅，李花白，菜花黃。", "", "遠遠圍牆，隱隱茅堂。", "颺青旗、流水橋旁。", "偶然乘興，步過東岡。", "正鶯兒啼，燕兒舞，蝶兒忙。"], "note": "桃紅李白菜花黃，春天的色彩在小園中盡收。"}, {"title": "點絳脣・桃源", "author": "宋・秦觀", "body": ["醉漾輕舟，信流引到花深處。", "塵緣相誤，無計花間住。", "", "煙水茫茫，千里斜陽暮。", "山無數，亂紅如雨，不記來時路。"], "note": "誤入花深處卻不能久留，世間桃源總是一場夢。"}, {"title": "畫堂春・落紅鋪徑水平池", "author": "宋・秦觀", "body": ["落紅鋪徑水平池，弄晴小雨霏霏。杏園憔悴杜鵑啼，無奈春歸。", "", "柳外畫樓獨上，憑欄手捻花枝。放花無語對斜暉，此恨誰知？"], "note": "手捻花枝又放下，對著斜暉的沉默勝過千言。"}, {"title": "夜遊宮・記夢寄師伯渾", "author": "宋・陸遊", "body": ["雪曉清笳亂起，夢遊處、不知何地。", "鐵騎無聲望似水。想關河，雁門西，青海際。", "", "睡覺寒燈裏，漏聲斷、月斜窗紙。", "自許封侯在萬裏。有誰知，鬢雖殘，心未死。"], "note": "鬢已殘白心未死，老驥伏櫪志在千里。"}, {"title": "漁家傲・寄仲高", "author": "宋・陸遊", "body": ["東望山陰何處是？往來一萬三千里。", "寫得家書空滿紙，流清淚，書回已是明年事。", "", "寄語紅橋橋下水，扁舟何日尋兄弟？", "行遍天涯真老矣，愁無寐，鬢絲幾縷茶煙裏。"], "note": "家書寫滿紙卻寄不到，鄉愁在茶煙中繚繞。"}, {"title": "沈園", "author": "宋・陸遊", "body": ["城上斜陽畫角哀，沈園非復舊池臺。", "傷心橋下春波綠，曾是驚鴻照影來。"], "note": "沈園已非舊日模樣，橋下春波卻記得那驚鴻一瞥。"}, {"title": "沈園二首・其二", "author": "宋・陸遊", "body": ["夢斷香消四十年，沈園柳老不吹綿。", "此身行作稽山土，猶弔遺蹤一泫然。"], "note": "四十年後重訪沈園，物是人非淚自流。"}, {"title": "秋波媚・七月十六日晚登高興亭望長安南山", "author": "宋・陸遊", "body": ["秋到邊城角聲哀，烽火照高臺。", "悲歌擊築，憑高酹酒，此興悠哉！", "", "多情誰似南山月，特地暮雲開。", "灞橋煙柳，曲江池館，應待人來。"], "note": "南山明月為多情而破雲而出，似在等待收復故土的人。"}, {"title": "菩薩蠻・金陵賞心亭為葉丞相賦", "author": "宋・辛棄疾", "body": ["青山欲共高人語，聯翩萬馬來無數。", "煙雨卻低迴，望來終不來。", "", "人言頭上髮，總向愁中白。", "拍手笑沙鷗，一身都是愁。"], "note": "笑沙鷗一身皆愁，其實是笑自己。"}, {"title": "鷓鴣天・送人", "author": "宋・辛棄疾", "body": ["唱徹陽關淚未乾，功名餘事且加餐。", "浮天水送無窮樹，帶雨雲埋一半山。", "", "今古恨，幾千般，只應離合是悲歡？", "江頭未是風波惡，別有人間行路難。"], "note": "江上風波尚不算險惡，人間路更難行。"}, {"title": "沁園春・靈山齋庵賦時築偃湖未成", "author": "宋・辛棄疾", "body": ["疊嶂西馳，萬馬迴旋，眾山欲東。", "正驚湍直下，跳珠倒濺；小橋橫截，缺月初弓。", "老合投閒，天教多事，檢校長身十萬松。", "吾廬小，在龍蛇影外，風雨聲中。", "", "爭先見面重重，看爽氣朝來三數峯。", "似謝家子弟，衣冠磊落；相如庭戶，車騎雍容。", "我覺其間，雄深雅健，如對文章太史公。", "新堤路，問偃湖何日，煙水濛濛？"], "note": "萬馬奔騰的山勢，如讀太史公雄文般暢快。"}, {"title": "木蘭花慢・滁州送範倅", "author": "宋・辛棄疾", "body": ["老來情味減，對別酒、怯流年。", "況屈指中秋，十分好月，不照人圓。", "無情水、都不管，共西風、只管送歸船。", "秋晚蓴鱸江上，夜深兒女燈前。", "", "征衫，便好去朝天，玉殿正思賢。", "想夜半承明，留教視草，卻遣籌邊。", "長安故人問我，道尋常、泥酒只依然。", "目斷秋霄落雁，醉來時響空弦。"], "note": "中秋好月不照人圓，老來離別更添傷感。"}, {"title": "浣溪沙・遊蘄水清泉寺", "author": "宋・蘇軾", "body": ["山下蘭芽短浸溪，松間沙路淨無泥，瀟瀟暮雨子規啼。", "", "誰道人生無再少？門前流水尚能西！休將白髮唱黃雞。"], "note": "門前流水尚能西流，何必嘆老唱黃雞。"}, {"title": "採桑子・輕舟短棹西湖好", "author": "宋・歐陽修", "body": ["輕舟短棹西湖好，綠水逶迤，芳草長堤，隱隱笙歌處處隨。", "", "無風水面琉璃滑，不覺船移，微動漣漪，驚起沙禽掠岸飛。"], "note": "西湖靜如琉璃，船行無覺，只有沙禽知道。"}, {"title": "玉樓春・雕鞍好為鶯花住", "author": "宋・晏幾道", "body": ["雕鞍好為鶯花住，佔取東城南陌路。", "盡教春思亂如雲，莫管世情輕似絮。", "", "古來多被虛名誤，寧負虛名身莫負。", "勸君頻入醉鄉來，此是無愁無恨處。"], "note": "寧負虛名不負此身，醉鄉纔是無愁之地。"}, {"title": "南鄉子・送述古", "author": "宋・蘇軾", "body": ["回首亂山橫，不見居人只見城。", "誰似臨平山上塔，亭亭，迎客西來送客行。", "", "歸路晚風清，一枕初寒夢不成。", "今夜殘燈斜照處，熒熒，秋雨晴時淚不晴。"], "note": "秋雨已晴淚未晴，送別之後的夜晚最難眠。"}, {"title": "玉樓春・戲賦雲山", "author": "宋・辛棄疾", "body": ["何人半夜推山去？四面浮雲猜是汝。", "常時相對兩三峯，走遍溪頭無覓處。", "", "西風瞥起雲橫度，忽見東南天一柱。", "老僧拍手笑相誇，且喜青山依舊住。"], "note": "青山被雲遮了又現，依舊住在那裏不曾離去。"}, {"title": "水龍吟・過南劍雙溪樓", "author": "宋・辛棄疾", "body": ["舉頭西北浮雲，倚天萬裏須長劍。", "人言此地，夜深長見，鬥牛光焰。", "我覺山高，潭空水冷，月明星淡。", "待燃犀下看，憑欄卻怕，風雷怒，魚龍慘。", "", "峽束蒼江對起，過危樓、欲飛還斂。", "元龍老矣！不妨高臥，冰壺涼簟。", "千古興亡，百年悲笑，一時登覽。", "問何人又卸，片帆沙岸，繫斜陽纜？"], "note": "舉頭西北需長劍，千古興亡盡在一時登覽。"}, {"title": "減字木蘭花・天涯舊恨", "author": "宋・秦觀", "body": ["天涯舊恨，獨自淒涼人不問。", "欲見回腸，斷盡金爐小篆香。", "", "黛蛾長斂，任是春風吹不展。", "困倚危樓，過盡飛鴻字字愁。"], "note": "飛鴻過盡字字成愁，春風也吹不展眉間鬱結。"}, {"title": "琴詩", "author": "宋・蘇軾", "body": ["若言琴上有琴聲，放在匣中何不鳴？", "若言聲在指頭上，何不於君指上聽？"], "note": "琴聲在琴在指之間，萬物相因方能成妙。"}, {"title": "夏意", "author": "宋・蘇舜欽", "body": ["別院深深夏簟清，石榴開遍透簾明。", "樹陰滿地日當午，夢覺流鶯時一聲。"], "note": "午夢醒來聽一聲鶯啼，是夏日最清涼的時刻。"}, {"title": "淮中晚泊犢頭", "author": "宋・蘇舜欽", "body": ["春陰垂野草青青，時有幽花一樹明。", "晚泊孤舟古祠下，滿川風雨看潮生。"], "note": "孤舟泊古祠，在風雨中靜看潮生潮落。"}, {"title": "歸田樂・試把花期數", "author": "宋・晏幾道", "body": ["試把花期數，便早有、感春情緒。", "看即梅花吐，願花更不謝，春且長住。", "只恐花飛又春去。", "", "花開還不語，問此意、年年有誰知否？", "且趁醉來時，醉倒在花前，只恁催春且住。", "不消更掛牽，你自歸風雨。"], "note": "花開無語，年年如此，唯願春長住不去。"}, {"title": "南柯子・悵望梅花驛", "author": "宋・范成大", "body": ["悵望梅花驛，凝情杜若洲。", "香雲低處有高樓，可惜高樓不近木蘭舟。", "", "緘素雙魚遠，題紅片葉秋。", "欲憑高閣望吳州，便恐江南江北路悠悠。"], "note": "高樓與蘭舟不能相近，正如有情人不得相見。"}, {"title": "橫塘", "author": "宋・范成大", "body": ["南浦春來綠一川，石橋朱塔兩依然。", "年年送客橫塘路，細雨垂楊繫畫船。"], "note": "年年送客的橫塘路，細雨垂楊年年如舊。"}, {"title": "瑞鶴仙・郊原初過雨", "author": "宋・周邦彥", "body": ["郊原初過雨，見敗葉零亂，風定猶舞。", "斜陽掛深樹，映濃愁淺黛，遙山媚嫵。", "來時舊路，尚巖花、娟娟初吐。", "對燻風、南浦離愁，暗送天涯羈旅。", "", "憑高盡是傷春，行人莫問當年事。", "重簾滯午，正炎蒸、水沈一縷。", "但覺懨懨倦、對人無語。", "空階永晝，還又是、扇底流螢，錦箋倩誰與？"], "note": "炎夏永晝無聊，只有流螢與空階相伴。"}, {"title": "六醜・正單衣試酒", "author": "宋・周邦彥", "body": ["正單衣試酒，悵客裏、光陰虛擲。", "願春暫留，春歸如過翼，一去無跡。", "為問花何在？夜來風雨，葬楚宮傾國。", "釵鈿墮處遺香澤，亂點桃蹊，輕翻柳陌。", "多情為誰追惜？", "", "但蜂媒蝶使，時叩窗隔。", "東園岑寂，漸蒙籠暗碧。", "靜繞珍叢底，成嘆息。", "長條故惹行客，似牽衣待話，別情無極。", "殘英小、強簪巾幘。終不似一朵，釵頭顫裊，向人欹側。", "漂流處、莫趁潮汐。恐斷紅、尚有相思字，何由見得？"], "note": "落花流水中或有相思字，可惜無人能見。"}, {"title": "八歸・湘中送胡德華", "author": "宋・姜夔", "body": ["芳蓮墜粉，疏桐吹綠，庭院暗雨乍歇。", "無端抱影銷魂處，還見篠牆螢暗，蘚階蛩切。", "送客重尋西去路，問水面琵琶誰撥？", "最可惜、一片江山，總付與啼鴂。", "", "空江晚浪，翹沙白鳥，更青天月。", "未信此情難繫絆，楊花猶有東風管。", "況怨縛、春情如翦，默翦閒愁未斷。", "回首池南舊遊伴，自翦柔條解棹，人歸溪漵。", "斜日半山，殘螢入戶。"], "note": "一片江山付與啼鴂，離別後的空江更顯寂寞。"}, {"title": "長亭怨慢・漸吹盡", "author": "宋・姜夔", "body": ["漸吹盡，枝頭香絮，是處人家，綠深門戶。", "遠浦縈迴，暮帆零亂向何許？", "閱人多矣，誰得似、長亭樹。", "樹若有情時，不會得、青青如此。", "", "日暮，望高城不見，只見亂山無數。", "韋郎去也，怎忘得、玉環分付。", "第一是早早歸來，怕紅萼無人為主。", "算空有並刀，難剪離愁千縷。"], "note": "長亭樹若有情，不會年年如此青翠無動於衷。"}, {"title": "水調歌頭・金山觀月", "author": "宋・張孝祥", "body": ["江山自雄麗，風露與高寒。", "寄聲月姊，借我玉鑑此中看。", "幽壑魚龍悲嘯，倒影星辰搖動，海氣夜漫漫。", "湧起白銀闕，危駐紫金山。", "", "表獨立，飛霞佩，切雲冠。", "漱冰濯雪，眇視萬裏一毫端。", "回首三山何處，聞道羣仙笑我，要我欲俱還。", "揮手從此去，翳鳳更驂鸞。"], "note": "江山雄麗月色如銀，胸懷天地方見萬裏。"}, {"title": "點絳脣・丁未冬過吳松作", "author": "宋・姜夔", "body": ["燕雁無心，太湖西畔隨雲去。", "數峯清苦，商略黃昏雨。", "", "第四橋邊，擬共天隨住。", "今何許？憑欄懷古，殘柳參差舞。"], "note": "數峯清苦商量著黃昏的雨，山也有人的情思。"}, {"title": "念奴嬌・中秋對月", "author": "宋・文天祥", "body": ["碧天如水，看長空、萬裏銀蟾飛度。", "不似尋常三五夜，清影圓光凝聚。", "天上人間，此時此夕，付與金尊語。", "呼龍耕煙，掃盡四海塵霧。", "", "為問青天明月，記王孫、曾到人間否？", "怎奈今宵看罷，便是經年離阻。", "快意騫鸞，剩須覓取，只恐塵緣誤。", "舉頭望處，漫天星斗如許。"], "note": "中秋明月下，心繫天下蒼生更勝個人悲歡。"}, {"title": "木蘭花令・次歐公西湖韻", "author": "宋・蘇軾", "body": ["霜餘已失長淮闊，空聽潺潺清穎咽。", "佳人猶唱醉翁詞，四十三年如電抹。", "", "草頭秋露流珠滑，三五盈盈還二八。", "與餘同是識翁人，惟有西湖波底月。"], "note": "四十三年如電光一閃，唯有西湖波底月長存。"}, {"title": "鷓鴣天・西都作", "author": "宋・朱敦儒", "body": ["我是清都山水郎，天教分付與疏狂。", "曾批給雨支風券，累上留雲借月章。", "", "詩萬首，酒千觴，幾曾著眼看侯王？", "玉樓金闕慵歸去，且插梅花醉洛陽。"], "note": "不慕王侯只愛山水，插梅醉酒方是真性情。"}, {"title": "鷓鴣天・桃李漫山過眼空", "author": "宋・辛棄疾", "body": ["桃李漫山過眼空，也宜惱損杜陵翁。", "關心近日前村路，買斷斜陽不買風。", "", "吟未了，夢相從，江南身在此山中。", "尊前一笑人何在？落盡梅花雪又空。"], "note": "桃李過眼成空，買得斜陽卻買不得清風。"}, {"title": "西江月・遣興", "author": "宋・辛棄疾", "body": ["醉裏且貪歡笑，要愁那得工夫。", "近來始覺古人書，信著全無是處。", "", "昨夜松邊醉倒，問松我醉何如。", "只疑松動要來扶，以手推松曰去。"], "note": "醉中推松而去的灑脫，是對世事最幽默的回應。"}, {"title": "好事近・夢中作", "author": "宋・秦觀", "body": ["春路雨添花，花動一山春色。", "行到小溪深處，有黃鸝千百。", "", "飛雲當面化龍蛇，夭矯轉空碧。", "醉臥古藤陰下，了不知南北。"], "note": "醉臥藤陰不知南北，是超脫塵世的片刻自由。"}, {"title": "暮江吟", "author": "宋・王安石", "body": ["落帆江口月黃昏，小店無燈欲閉門。", "側出岸沙楓半死，繫船應有去年痕。"], "note": "去年繫船的痕跡猶在，歲月在沙岸上留下印記。"}, {"title": "書湖陰先生壁", "author": "宋・王安石", "body": ["茅簷長掃淨無苔，花木成畦手自栽。", "一水護田將綠繞，兩山排闥送青來。"], "note": "好山好水不請自來，是因為主人心中有清淨。"}, {"title": "秋懷", "author": "宋・歐陽修", "body": ["節物豈不好，秋懷何黯然。", "西風酒旗市，細雨菊花天。", "感事悲雙鬢，包羞食萬錢。", "鹿車何日駕，歸去穎東田。"], "note": "西風細雨菊花天，秋色雖好愁懷依然黯然。"}, {"title": "清平樂・檢校山園書所見", "author": "宋・辛棄疾", "body": ["斷崖修竹，竹裏藏冰玉。", "路轉清溪三百曲，香滿黃昏雪屋。", "", "行人系馬疏籬，折殘猶有高枝。", "留待歸來共醉，只愁風雨無時。"], "note": "斷崖修竹藏冰玉，留得高枝待歸人。"}, {"title": "水龍吟・春恨", "author": "宋・陳亮", "body": ["鬧花深處層樓，畫簾半捲東風軟。", "春歸翠陌，平莎茸嫩，垂楊金淺。", "遲日催花，淡雲閣雨，輕寒輕暖。", "恨芳菲世界，遊人未賞，都付與、鶯和燕。", "", "寂寞憑高念遠，向南樓、一聲歸雁。", "金釵鬥草，青絲勒馬，風流雲散。", "羅綬分香，翠綃封淚，幾多幽怨。", "正銷凝，黃鸝又啼數聲，鞦韆外、曉煙亂。"], "note": "芳菲世界遊人不賞，都付與鶯燕自在享受。"}, {"title": "念奴嬌・書東流村壁", "author": "宋・辛棄疾", "body": ["野棠花落，又匆匆過了，清明時節。", "剗地東風欺客夢，一枕雲屏寒怯。", "曲岸持觴，垂楊繫馬，此地曾經別。", "樓空人去，舊遊飛燕能說。", "", "聞道綺陌東頭，行人長見，簾底纖纖月。", "舊恨春江流不斷，新恨雲山千疊。", "料得明朝，尊前重見，鏡裏花難折。", "也應驚問：近來多少華髮？"], "note": "舊恨如春江新恨如山疊，鏡中華髮是歲月的答案。"}, {"title": "臨江仙・信州作", "author": "宋・晏幾道", "body": ["鬥草階前初見，穿針樓上曾期。", "羅裙香露玉釵隨。靜中生暗意，醉裏得真知。", "", "別後經年花自發，門前流水仍西。", "尊前重拾舊相思。人情今幾許？故故問笙篪。"], "note": "別後經年花照開水照流，唯有相思是舊時模樣。"}, {"title": "蝶戀花・二月風翻過", "author": "宋・晏幾道", "body": ["二月春風翻過了，夢裏分明，記得斜陽道。", "落葉都飛盡了也，此中惟剩殘鶯叫。", "", "深院靜，小窗明，好風搖動讀書聲。", "花開花落人間世，幾度春秋總關情。"], "note": "花開花落間，人間幾度春秋都關乎深情。"}, {"title": "御街行・秋日懷舊", "author": "宋・范仲淹", "body": ["紛紛墜葉飄香砌，夜寂靜、寒聲碎。", "真珠簾捲玉樓空，天淡銀河垂地。", "年年今夜，月華如練，長是人千里。", "", "愁腸已斷無由醉，酒未到、先成淚。", "殘燈明滅枕頭攲，諳盡孤眠滋味。", "都來此事，眉間心上，無計相迴避。"], "note": "愁在眉間心上，想迴避都無計可施。"}, {"title": "剔銀燈・與歐陽公席上分題", "author": "宋・范仲淹", "body": ["昨夜因看蜀志，笑曹操孫權劉備。", "用盡機關，徒勞心力，只得三分天地。", "屈指細尋思，爭如共、劉伶一醉。", "", "人世都無百歲。少癡騃、老成尫悴。", "只有中間，些子少年，忍把浮名牽繫。", "一品與千金，問白髮、如何迴避。"], "note": "三國英雄費盡心機只得三分天地，不如一醉。"}, {"title": "解語花・上元", "author": "宋・周邦彥", "body": ["風銷焰蠟，露浥烘爐，花市光相射。", "桂華流瓦，纖雲散、耿耿素娥欲下。", "衣裳淡雅，看楚女纖腰一把。", "簫鼓喧，人影參差，滿路飄香麝。", "", "因念都城放夜，望千門如晝，嬉笑遊冶。", "鈿車羅帕，相逢處、自有暗塵隨馬。", "年光是也，唯只見、舊情衰謝。", "清漏移、飛蓋歸來，從舞休歌罷。"], "note": "元宵燈火雖美，映照的卻是年光衰謝的感傷。"}, {"title": "南鄉子・自古帝王州", "author": "宋・王安石", "body": ["自古帝王州，鬱鬱蔥蔥佳氣浮。", "四百年來成一夢，堪愁，晉代衣冠成古丘。", "", "繞水恣行遊，上盡層城更上樓。", "往事悠悠君莫問，回頭，檻外長江空自流。"], "note": "四百年帝業成一夢，唯有長江依舊空自流。"}, {"title": "西江月・示兒曹以家事付之", "author": "宋・辛棄疾", "body": ["萬事雲煙忽過，一身蒲柳先衰。", "而今何事最相宜？宜醉宜遊宜睡。", "", "早趁催科了納，更量出入收支。", "乃翁依舊管些兒，管竹管山管水。"], "note": "人生晚年最相宜的事，是管竹管山管水。"}, {"title": "眼兒媚・樓上黃昏杏花寒", "author": "宋・阮閱", "body": ["樓上黃昏杏花寒，斜月小闌幹。", "一雙燕子，兩行歸雁，畫角聲殘。", "", "綺窗人在東風裏，灑淚對春闌。", "也應似舊，盈盈秋水，淡淡春山。"], "note": "春闌獨倚窗前，眉如春山目如秋水。"}, {"title": "眼兒媚・蕭蕭江上荻花秋", "author": "宋・賀鑄", "body": ["蕭蕭江上荻花秋，做弄許多愁。", "半竿落日，兩行新雁，一葉扁舟。", "", "惜分長怕君先去，直待醉時休。", "今宵眼底，明朝心上，後日眉頭。"], "note": "今宵看在眼裏，明朝記在心上，後日愁上眉頭。"}, {"title": "好事近・湓口放船歸", "author": "宋・陸遊", "body": ["湓口放船歸，薄暮散花洲宿。", "兩岸白蘋紅蓼，映一蓑新綠。", "", "有沽酒處便為家，菱芡四時足。", "明日又乘風去，任江南江北。"], "note": "有酒便是家，隨風漂泊也是一種自在。"}, {"title": "千秋歲・水邊沙外", "author": "宋・秦觀", "body": ["水邊沙外，城郭春寒退。", "花影亂，鶯聲碎。飄零疏酒盞，離別寬衣帶。", "人不見，碧雲暮合空相對。", "", "憶昔西池會，鵷鷺同飛蓋。", "攜手處，今誰在？日邊清夢斷，鏡裏朱顏改。", "春去也，飛紅萬點愁如海。"], "note": "飛紅萬點愁如海，春去人散兩茫茫。"}, {"title": "訴衷情令・長安懷古", "author": "宋・康與之", "body": ["阿房廢址漢荒丘，狐兔又羣遊。", "豪華盡成春夢，留下古今愁。", "", "君莫上，古原頭，淚難收。", "夕陽西下，塞雁南飛，渭水東流。"], "note": "豪華成春夢，古今同一愁，渭水默默東流。"}, {"title": "夜書所見", "author": "宋・葉紹翁", "body": ["蕭蕭梧葉送寒聲，江上秋風動客情。", "知有兒童挑促織，夜深籬落一燈明。"], "note": "夜深籬落一盞燈，童年的溫暖照亮了遊子的秋夜。"}, {"title": "遊園不值", "author": "宋・葉紹翁", "body": ["應憐屐齒印蒼苔，小扣柴扉久不開。", "春色滿園關不住，一枝紅杏出牆來。"], "note": "春色是關不住的，總有一枝紅杏探出牆頭。"}, {"title": "鄉村四月", "author": "宋・翁卷", "body": ["綠遍山原白滿川，子規聲裏雨如煙。", "鄉村四月閒人少，才了蠶桑又插田。"], "note": "四月鄉村最忙碌，蠶桑插田兩不歇。"}, {"title": "除夜自石湖歸苕溪", "author": "宋・姜夔", "body": ["細草穿沙雪半銷，吳宮煙冷水迢迢。", "梅花竹裏無人見，一夜吹香過石橋。"], "note": "梅花藏在竹林無人見，暗香卻過石橋傳萬裏。"}, {"title": "雪梅・其一", "author": "宋・盧梅坡", "body": ["梅雪爭春未肯降，騷人擱筆費評章。", "梅須遜雪三分白，雪卻輸梅一段香。"], "note": "梅雪各有長短，天下事物皆有獨特之美。"}, {"title": "雪梅・其二", "author": "宋・盧梅坡", "body": ["有梅無雪不精神，有雪無詩俗了人。", "日暮詩成天又雪，與梅並作十分春。"], "note": "梅雪詩三者合一，纔是完整的春天。"}, {"title": "題臨安邸", "author": "宋・林升", "body": ["山外青山樓外樓，西湖歌舞幾時休？", "暖風燻得遊人醉，直把杭州作汴州。"], "note": "醉生夢死的歌舞中，忘了杭州不是汴州。"}, {"title": "春日偶成", "author": "宋・程顥", "body": ["雲淡風輕近午天，傍花隨柳過前川。", "時人不識餘心樂，將謂偷閒學少年。"], "note": "雲淡風輕中偷得半日閒，心樂旁人不知。"}, {"title": "秋月", "author": "宋・程顥", "body": ["清溪流過碧山頭，空水澄鮮一色秋。", "隔斷紅塵三十里，白雲紅葉兩悠悠。"], "note": "隔斷紅塵的清溪碧山，白雲紅葉自在悠悠。"}, {"title": "絕句", "author": "宋・志南", "body": ["古木陰中繫短篷，杖藜扶我過橋東。", "沾衣欲濕杏花雨，吹面不寒楊柳風。"], "note": "杏花雨不濕衣，楊柳風不寒面，春天溫柔至極。"}, {"title": "三衢道中", "author": "宋・曾幾", "body": ["梅子黃時日日晴，小溪泛盡卻山行。", "綠陰不減來時路，添得黃鸝四五聲。"], "note": "歸途綠陰依舊，多了幾聲黃鸝更添詩意。"}, {"title": "活水亭觀書有感", "author": "宋・朱熹", "body": ["半畝方塘一鑑開，天光雲影共徘徊。", "問渠那得清如許？為有源頭活水來。"], "note": "思想如塘水，要有源頭活水才能清澈見底。"}, {"title": "立秋", "author": "宋・劉翰", "body": ["乳鴉啼散玉屏空，一枕新涼一扇風。", "睡起秋聲無覓處，滿階梧葉月明中。"], "note": "秋聲無處可尋，卻在滿階梧葉與月明中。"}, {"title": "春晚", "author": "宋・左緯", "body": ["池上柳依依，柳邊人掩扉。", "蝶隨花片落，燕拂水紋飛。", "試數交遊看，方驚笑語稀。", "一年春又盡，倚杖對斜暉。"], "note": "春盡之時倚杖對斜暉，驚覺故友已漸稀少。"}, {"title": "東溪", "author": "宋・梅堯臣", "body": ["行到東溪看水時，坐臨孤嶼發船遲。", "野鳧眠岸有閒意，老樹著花無醜枝。", "短短蒲耳齊似剪，平平沙石淨於篩。", "情雖不厭住不得，薄暮歸來車馬疲。"], "note": "老樹開花無醜枝，萬物到了自然之境皆是美。"}, {"title": "初晴遊滄浪亭", "author": "宋・蘇舜欽", "body": ["夜雨連明春水生，嬌雲濃暖弄陰晴。", "簾虛日薄花竹靜，時有乳鳩相對鳴。"], "note": "雨後初晴，花竹靜謐中只聞乳鳩對鳴。"}, {"title": "秋詞", "author": "宋・陸遊", "body": ["六十餘年妄學詩，功夫深處獨心知。", "夜來一笑寒燈下，始是金丹換骨時。"], "note": "六十年學詩的功夫，在寒燈下一笑中頓悟。"}, {"title": "水口行舟", "author": "宋・朱熹", "body": ["昨夜扁舟雨一蓑，滿江風浪夜如何。", "今朝試卷孤蓬看，依舊青山綠樹多。"], "note": "風浪過後青山依舊，困難終會過去。"}, {"title": "夏日田園雜興", "author": "宋・范成大", "body": ["晝出耘田夜績麻，村莊兒女各當家。", "童孫未解供耕織，也傍桑陰學種瓜。"], "note": "兒女當家童孫學耕，田園生活代代傳承。"}, {"title": "除夜雪", "author": "宋・陸遊", "body": ["北風吹雪四更初，嘉瑞天教及歲除。", "半盞屠蘇猶未舉，燈前小草寫桃符。"], "note": "除夕夜的瑞雪中，燈前寫桃符迎新年。"}, {"title": "淡黃柳・空城曉角", "author": "宋・姜夔", "body": ["空城曉角，吹入垂楊陌。", "馬上單衣寒惻惻。看盡鵝黃嫩綠，都是江南舊相識。", "", "正岑寂，明朝又寒食。", "強攜酒、小橋宅。怕梨花落盡成秋色。", "燕燕飛來，問春何在？唯有池塘自碧。"], "note": "空城曉角聲中，江南春色已是舊相識。"}, {"title": "喜遷鶯・曉行", "author": "宋・劉一止", "body": ["曉光催角，聽宿鳥未驚，邊雁南落。", "雪照山城，冰凝水面，一派寒光如削。", "徵鞍消盡酒力，望望不見天邊漠漠。", "心折處，念多情帶眼，傳意千託。", "", "寥落。重尋覓，同來何事，不見歸時約。", "暗想當時，迴廊靜夜，動是梨花寂寞。", "歸來定掃殘局，只恐東風不管蕭索。", "但如今，且抱得離愁歸去，悶懷孤枕何人訴。"], "note": "曉行風雪中，帶著滿懷離愁獨自遠行。"}, {"title": "水調歌頭・秋色漸將晚", "author": "宋・葉夢得", "body": ["秋色漸將晚，霜信報黃花。", "小窗低戶深映，微路繞攲斜。", "為問山翁何事，坐看流年輕度，拚卻鬢雙華。", "徙倚望滄海，天淨水明霞。", "", "念平昔，空飄蕩，遍天涯。", "歸來三徑重掃，松竹本吾家。", "卻恨悲風時起，冉冉雲間新雁，邊馬怨胡笳。", "誰似東山老，談笑靜胡沙。"], "note": "歸隱三徑松竹間，卻仍心繫邊塞風煙。"}, {"title": "謁金門・春半", "author": "宋・朱淑真", "body": ["春已半，觸目此情無限。", "十二闌幹閒倚遍，愁來天不管。", "", "好是風和日暖，輸與鶯鶯燕燕。", "滿院落花簾不卷，斷腸芳草遠。"], "note": "好天氣只便宜了鶯燕，獨自倚闌的人只有愁。"}, {"title": "減字木蘭花・春怨", "author": "宋・朱淑真", "body": ["獨行獨坐，獨唱獨酬還獨臥。", "佇立傷神，無奈輕寒著摸人。", "", "此情誰見？淚洗殘妝無一半。", "愁病相仍，剔盡寒燈夢不成。"], "note": "獨行獨坐獨臥，五個獨字道盡孤寂。"}, {"title": "生查子・春晚", "author": "宋・朱淑真", "body": ["寒食不多時，幾日東風惡。", "無緒倦尋芳，閒卻鞦韆索。", "", "玉減翠裙交，病怯羅衣薄。", "不忍捲簾看，寂寞梨花落。"], "note": "不忍看梨花寂寞飄落，是怕看見自己的心境。"}, {"title": "南柯子・懷舊", "author": "宋・仲殊", "body": ["十里青山遠，潮平路帶沙。", "數聲啼鳥怨年華，又是淒涼時候在天涯。", "", "白露收殘月，清風散曉霞。", "綠楊堤畔問荷花，記得年時沽酒那人家？"], "note": "啼鳥怨年華，綠楊堤畔問荷花，還記得那人嗎？"}, {"title": "鷓鴣天・林斷山明竹隱牆", "author": "宋・蘇軾", "body": ["林斷山明竹隱牆，亂蟬衰草小池塘。", "翻空白鳥時時見，照水紅蕖細細香。", "", "村舍外，古城旁，杖藜徐步轉斜陽。", "殷勤昨夜三更雨，又得浮生一日涼。"], "note": "昨夜一場雨換來浮生一日清涼，知足便是福。"}, {"title": "減字木蘭花・己卯儋耳", "author": "宋・蘇軾", "body": ["春牛春杖，無限春風來海上。", "便丐春工，染得桃紅似肉紅。", "", "春幡春勝，一陣春風吹酒醒。", "不似天涯，捲起楊花似雪花。"], "note": "天涯海角也有春風桃紅，何處不是好風景。"}, {"title": "菩薩蠻・數間茅屋閒臨水", "author": "宋・王安石", "body": ["數間茅屋閒臨水，窄衫短帽垂楊裏。", "花是去年紅，吹開一夜風。", "", "梢梢新月偃，午醉醒來晚。", "何物最關情？黃鸝三兩聲。"], "note": "茅屋臨水黃鸝啼鳴，閒適生活最關情。"}, {"title": "浣溪沙・百畝中庭半是苔", "author": "宋・王安石", "body": ["百畝中庭半是苔，門前白道水縈迴。愛此蕭條竹裏開。", "", "歸去也無風雨也無晴。"], "note": "愛這蕭條竹中景，歸去時風雨晴都不在意。"}, {"title": "春遊湖", "author": "宋・徐俯", "body": ["雙飛燕子幾時回？夾岸桃花蘸水開。", "春雨斷橋人不度，小舟撐出柳陰來。"], "note": "斷橋無路時，柳陰中撐出一葉小舟來。"}, {"title": "好事近・風定落花深", "author": "宋・李清照", "body": ["風定落花深，簾外擁紅堆雪。", "長記海棠開後，正傷春時節。", "", "酒闌歌罷玉尊空，青缸暗明滅。", "魂夢不堪幽怨，更一聲啼鴂。"], "note": "海棠開後傷春起，啼鴂一聲夢魂驚。"}, {"title": "浣溪沙・閨情", "author": "宋・李清照", "body": ["繡面芙蓉一笑開，斜飛寶鴨襯香腮。眼波才動被人猜。", "", "一面風情深有韻，半箋嬌恨寄幽懷。月移花影約重來。"], "note": "眼波一動便被猜透，少女心事藏不住。"}, {"title": "池上二絕", "author": "宋・嶽飛", "body": ["經年塵土滿征衣，特特尋芳上翠微。", "好水好山看不足，馬蹄催趁月明歸。"], "note": "征衣塵土中偷閒賞山水，月明催歸也看不夠。"}, {"title": "蝶戀花・送春", "author": "宋・朱淑真", "body": ["樓外垂楊千萬縷，欲繫青春，少住春還去。", "猶自風前飄柳絮，隨春且看歸何處。", "", "綠滿山川聞杜宇，便做無情，莫也愁人苦。", "把酒送春春不語，黃昏卻下瀟瀟雨。"], "note": "千萬縷楊柳也繫不住春天，它走時只留下一場黃昏雨。"}, {"title": "唐多令・蘆葉滿汀洲", "author": "宋・劉過", "body": ["蘆葉滿汀洲，寒沙帶淺流。", "二十年、重過南樓。", "柳下繫船猶未穩，能幾日、又中秋。", "", "黃鶴斷磯頭，故人今在否？", "舊江山、渾是新愁。", "欲買桂花同載酒，終不似、少年遊。"], "note": "舊江山新愁緒，再也回不到少年遊的心境。"}, {"title": "卜算子・送鮑浩然之浙東", "author": "宋・王觀", "body": ["水是眼波橫，山是眉峯聚。", "欲問行人去那邊？眉眼盈盈處。", "", "纔始送春歸，又送君歸去。", "若到江南趕上春，千萬和春住。"], "note": "水如眼波山如眉峯，去往江南請與春同住。"}, {"title": "木蘭花・城上風光鶯語亂", "author": "宋・錢惟演", "body": ["城上風光鶯語亂，城下煙波春拍岸。", "綠楊芳草幾時休？淚眼愁腸先已斷。", "", "情懷漸覺成衰晚，鸞鏡朱顏驚暗換。", "昔年多病厭芳尊，今日芳尊惟恐淺。"], "note": "昔日嫌酒多，今日恐酒少，心境變了一切都變。"}, {"title": "賀新郎・端午", "author": "宋・劉克莊", "body": ["深院榴花吐，畫簾開、綵衣飛蝶，玉盤盛露。", "糉葉香飄十里，對酒攜樽俎。", "更誰家、橫笛吹雨？", "且和義皇清閒意，採蓮南塘秋暮語。", "留此恨，付湘竹。", "", "年年重五歸期誤，最堪傷、孤舟江上，楚天無數。", "沈湘人去已遠，勸君莫唱楚辭句。", "昔事還堪念否？", "往日多少歡娛，到而今只成追憶。", "空贏得、青衫如故。"], "note": "端午思屈原，年年此日孤舟楚天愁。"}, {"title": "訴衷情・小桃灼灼柳鬖鬖", "author": "宋・黃庭堅", "body": ["小桃灼灼柳鬖鬖，春色滿江南。", "雨晴風暖煙淡，天氣正醺酣。", "", "山潑黛，水挼藍，翠相攙。", "歌樓酒旆，故故招人，權典青衫。"], "note": "春色滿江南，山如潑黛水如挼藍，美不勝收。"}, {"title": "清平樂・獨宿博山王氏庵", "author": "宋・辛棄疾", "body": ["繞牀飢鼠，蝙蝠翻燈舞。", "屋上松風吹急雨，破紙窗間自語。", "", "平生塞北江南，歸來華髮蒼顏。", "布被秋宵夢覺，眼前萬裏江山。"], "note": "破屋寒夜中夢醒，眼前仍是萬裏江山。"}, {"title": "黃鶴樓", "author": "宋・陸遊", "body": ["手把仙人綠玉枝，吾行忽及早秋期。", "蒼龍闕角歸何晚，白鶴樓頭亦似知。"], "note": "登樓遠望秋色，仙人何時歸來已不可知。"}, {"title": "滿庭芳・曉色雲開", "author": "宋・秦觀", "body": ["曉色雲開，春隨人意，驟雨才過還晴。", "古臺芳榭，飛燕蹴紅英。", "舞困榆錢自落，鞦韆外、綠水橋平。", "東風裏，朱門映柳，低按小秦箏。", "", "多情，行樂處，珠鈿翠蓋，玉轡紅纓。", "漸酒空金榼，花困蓬瀛。", "豆蔻梢頭舊恨，十年夢、屈指堪驚。", "憑闌久，疏煙淡日，寂寞下蕪城。"], "note": "十年如夢屈指堪驚，繁華過後是蕪城寂寞。"}, {"title": "菩薩蠻・風柔日薄春猶早", "author": "宋・李清照", "body": ["風柔日薄春猶早，夾衫乍著心情好。", "睡起覺微寒，梅花鬢上殘。", "", "故鄉何處是？忘了除非醉。", "沉水臥時燒，香消酒未消。"], "note": "故鄉只有在醉中才能忘卻，醒來愁更深。"}, {"title": "阮郎歸・天邊金掌露成霜", "author": "宋・晏幾道", "body": ["天邊金掌露成霜，雲隨雁字長。", "綠杯紅袖趁重陽，人情似故鄉。", "", "蘭佩紫，菊簪黃，殷勤理舊狂。", "欲將沉醉換悲涼，清歌莫斷腸。"], "note": "重陽佳節以沉醉換悲涼，清歌莫要太斷腸。"}, {"title": "南歌子・天上星河轉", "author": "宋・李清照", "body": ["天上星河轉，人間簾幕垂。", "涼生枕簟淚痕滋。起解羅衣聊問、夜何其。", "", "翠貼蓮蓬小，金銷藕葉稀。", "舊時天氣舊時衣。只有情懷不似、舊家時。"], "note": "天氣如舊衣裳如舊，只有情懷再不似從前。"}, {"title": "西江月・平山堂", "author": "宋・蘇軾", "body": ["三過平山堂下，半生彈指聲中。", "十年不見老仙翁，壁上龍蛇飛動。", "", "欲弔文章太守，仍歌楊柳春風。", "休言萬事轉頭空，未轉頭時皆夢。"], "note": "不必等轉頭才知空，未轉頭時已是一場夢。"}, {"title": "賀新郎・同父見和再用韻答之", "author": "宋・辛棄疾", "body": ["老大那堪說。似而今、元龍臭味，孟公瓜葛。", "我病君來高歌飲，驚散樓頭飛雪。", "笑富貴千鈞如髮。硬語盤空誰來聽？記當時、只有西窗月。", "重進酒，換鳴瑟。", "", "事無兩樣人心別。問渠儂：神州畢竟，幾番離合？", "汗血鹽車無人顧，千里空收駿骨。", "正目斷關河路絕。", "我最憐君中宵舞，道男兒到死心如鐵。", "看試手，補天裂。"], "note": "男兒到死心如鐵，試手補天裂是最高的壯志。"}, {"title": "秋日", "author": "宋・程顥", "body": ["閒來無事不從容，睡覺東窗日已紅。", "萬物靜觀皆自得，四時佳興與人同。", "道通天地有形外，思入風雲變態中。", "富貴不淫貧賤樂，男兒到此是豪雄。"], "note": "靜觀萬物皆自得，四季皆有可樂之處。"}, {"title": "清明", "author": "宋・黃庭堅", "body": ["佳節清明桃李笑，野田荒塚只生愁。", "雷驚天地龍蛇蟄，雨足郊原草木柔。", "人乞祭餘驕妾婦，士甘焚死不公侯。", "賢愚千載知誰是，滿眼蓬蒿共一丘。"], "note": "賢愚千載最終同歸一丘，清明最宜思生死。"}, {"title": "牧童詩", "author": "宋・黃庭堅", "body": ["騎牛遠遠過前村，短笛橫吹隔隴聞。", "多少長安名利客，機關用盡不如君。"], "note": "牧童騎牛吹笛的自在，勝過長安名利場的算計。"}, {"title": "病起書懷", "author": "宋・陸遊", "body": ["病骨支離紗帽寬，孤臣萬裏客江干。", "位卑未敢忘憂國，事定猶須待闔棺。", "天地神靈扶廟社，京華父老望和鑾。", "出師一表通今古，夜半挑燈更細看。"], "note": "位卑未敢忘憂國，是最樸素也最崇高的情懷。"}, {"title": "採桑子・恨君不似江樓月", "author": "宋・呂本中", "body": ["恨君不似江樓月，南北東西，南北東西，只有相隨無別離。", "", "恨君卻似江樓月，暫滿還虧，暫滿還虧，待得團圓是幾時？"], "note": "恨你不像月亮常相隨，又恨你像月亮總不圓。"}, {"title": "踏莎行・情似遊絲", "author": "宋・周紫芝", "body": ["情似遊絲，人如飛絮，淚珠閣定空相覷。", "一溪煙柳萬絲垂，無因繫得蘭舟住。", "", "雁過斜陽，草迷煙渚，如今已是愁無數。", "明朝且做莫思量，如何過得今宵去？"], "note": "今宵的愁尚且過不去，明日的不思量又如何做到。"}, {"title": "木蘭花慢・可憐今夕月", "author": "宋・辛棄疾", "body": ["可憐今夕月，向何處、去悠悠？", "是別有人間，那邊才見，光影東頭？", "是天外空汗漫，但長風浩浩送中秋？", "飛鏡無根誰繫？嫦娥不嫁誰留？", "", "謂經海底問無由，恍惚使人愁。", "怕萬裏長鯨，縱橫觸破，玉殿瓊樓。", "蝦蟆故堪浴水，問雲何玉兔解沉浮？", "若道都齊無恙，雲何漸漸如鉤？"], "note": "對月亮的奇思妙想，是詩人最浪漫的科學探索。"}, {"title": "霜天曉角・梅", "author": "宋・范成大", "body": ["晚晴風歇，一夜春威折。", "脈脈花疏天淡，雲來去、數枝雪。", "", "勝絕，愁亦絕。此情誰共說？", "惟有兩行低雁，知人倚、畫樓月。"], "note": "梅花疏淡如雪，愁緒只有低飛的雁知道。"}, {"title": "臨江仙・送錢穆父", "author": "宋・蘇軾", "body": ["一別都門三改火，天涯踏盡紅塵。", "依然一笑作春溫。無波真古井，有節是秋筠。", "", "惆悵孤帆連夜發，送行淡月微雲。", "尊前不用翠眉顰。人生如逆旅，我亦是行人。"], "note": "人生如逆旅，你我皆是匆匆行人，何必太傷感。"}, {"title": "點絳脣・感興", "author": "宋・王禹偁", "body": ["雨恨雲愁，江南依舊稱佳麗。", "水村漁市，一縷孤煙細。", "", "天際徵鴻，遙認行如綴。", "平生事，此時凝睇，誰會憑欄意？"], "note": "雨恨雲愁中的江南依舊美麗，只是無人懂我凝望之意。"}, {"title": "浣溪沙・送梅庭老赴上黨學官", "author": "宋・蘇軾", "body": ["門外東風雪灑裾，山頭回首望三吳。不應彈鋏為無魚。", "", "上黨從來天下脊，先生元是古之儒。時平不用魯連書。"], "note": "時平不用英雄策，先生自是古之大儒。"}, {"title": "青玉案・年年社日停針線", "author": "宋・黃庭堅", "body": ["年年社日停針線，怎忍見、雙飛燕？", "今日江城春已半，一身猶在，亂山深處，寂寞溪橋畔。", "", "春衫著破誰針線？點點行行淚痕滿。", "落日解鞍芳草岸，花無人戴，酒無人勸，醉也無人管。"], "note": "花無人戴酒無人勸，醉了也無人管，是最徹底的孤獨。"}, {"title": "好事近・搖首出紅塵", "author": "宋・朱敦儒", "body": ["搖首出紅塵，醒醉更無時節。", "活計綠蓑青笠，慣披霜衝雪。", "", "晚來風定釣絲閒，上下是新月。", "千里水天一色，看孤鴻明滅。"], "note": "披蓑衝雪釣新月，紅塵之外自有清明世界。"}, {"title": "武陵春・桃李風前多嫵媚", "author": "宋・辛棄疾", "body": ["走去走來三百里，五日以為期。", "六日歸時已是疑，應是望多時。", "", "鞭個馬兒歸去也，心急馬行遲。", "不免相煩喜鵲兒，先報那人知。"], "note": "歸心似箭馬卻嫌慢，只好央喜鵲先去報信。"}, {"title": "舟中曉望", "author": "宋・楊萬裏", "body": ["蘆荻叢中一棹聲，人家多在橘林行。", "乾坤身外無餘事，水面初平天未明。"], "note": "天地之間無餘事，水面初平晨光微露。"}, {"title": "插秧歌", "author": "宋・楊萬裏", "body": ["田夫拋秧田婦接，小兒拔秧大兒插。", "笠是兜鍪蓑是甲，雨從頭上濕到胛。", "喚渠朝餐歇半霎，低頭折腰只不答。", "秧根未牢蒔未匝，照管鵝兒與雛鴨。"], "note": "農忙時節顧不上喫飯，生活的辛勞也是一種詩。"}, {"title": "稚子弄冰", "author": "宋・楊萬裏", "body": ["稒子金盆脫曉冰，彩絲穿取當銀鉦。", "敲成玉磬穿林響，忽作玻璃碎地聲。"], "note": "冰碎如玉磬之聲，童年的遊戲天真而美妙。"}, {"title": "蝶戀花・密州上元", "author": "宋・蘇軾", "body": ["燈火錢塘三五夜，明月如霜，照見人如畫。", "帳底吹笙香吐麝，更無一點塵隨馬。", "", "寂寞山城人老也！擊鼓吹簫，卻入農桑社。", "火冷燈稀霜露下，昏昏雪意雲垂野。"], "note": "從繁華錢塘到寂寞山城，心境如霜露般清冷。"}, {"title": "醉花陰・黃花謾說年年好", "author": "宋・辛棄疾", "body": ["黃花謾說年年好，也趁秋光老。", "綠鬢不驚秋，若鬥尊前，人好花堪笑。", "", "蟠桃結子知多少？家住三山島。", "何日跨歸鸞，灃水清風，又報平安了。"], "note": "黃花年年好，可人也隨秋光漸老。"}, {"title": "水調歌頭・落日繡簾捲", "author": "宋・蘇軾", "body": ["落日繡簾捲，亭下水連空。", "知君為我新作，窗戶濕青紅。", "長記平山堂上，欹枕江南煙雨，杳杳沒孤鴻。", "認得醉翁語，山色有無中。", "", "一千頃，都鏡淨，倒碧峯。", "忽然浪起，掀舞一葉白頭翁。", "堪笑蘭臺公子，未解莊生天籟，剛道有雌雄。", "一點浩然氣，千里快哉風。"], "note": "一點浩然氣在胸，千里快哉風在懷，何其暢快。"}, {"title": "瑞龍吟・章臺路", "author": "宋・周邦彥", "body": ["章臺路，還見褪粉梅梢，試花桃樹。", "愔愔坊陌人家，定巢燕子，歸來舊處。", "黯凝佇，因念箇人癡小，乍窺門戶。", "侵晨淺約宮黃，障風映袖，盈盈笑語。", "", "前度劉郎重到，訪鄰尋裏，同時歌舞。", "唯有舊家秋娘，聲價如故。", "吟箋賦筆，猶記燕臺句。", "知誰伴、名園露飲，東城閒步？", "事與孤鴻去，探春盡是，傷離意緒。", "官柳低金縷。歸騎晚、纖纖池塘飛雨。", "斷腸院落，一簾風絮。"], "note": "重訪舊地人事已非，唯有秋娘聲價如故。"}, {"title": "除夜作", "author": "宋・蘇軾", "body": ["歲事盡從殘歲去，春光還向暮春生。", "舊桃新符渾閒事，暗裏催人白髮生。"], "note": "新桃換舊符是熱鬧事，暗裏白髮生是寂寞事。"}, {"title": "溪居", "author": "宋・林逋", "body": ["偶向溪邊步藥畦，鄰翁來往說鋤犁。", "鮮魚在柳穿新碧，濁酒盈樽帶嫩醅。", "雨過日斜羣鳥散，春深煙暖百花飛。", "莫將世事兼身事，須信乾坤一布衣。"], "note": "做天地間一介布衣，莫將世事太放在心上。"}, {"title": "長相思・雨", "author": "宋・萬俟詠", "body": ["一聲聲，一更更。窗外芭蕉窗裏燈，此時無限情。", "", "夢難成，恨難平。不道愁人不喜聽，空階滴到明。"], "note": "芭蕉雨聲不管愁人心情，一滴滴響到天明。"}, {"title": "浣溪沙・荷花", "author": "宋・蘇軾", "body": ["四面垂楊十里荷，問雲何處最花多。畫樓南畔夕陽和。", "", "天氣乍涼人寂寞，光陰須得酒消磨。且來花裏聽笙歌。"], "note": "十里荷花中消磨光陰，寂寞時來花間聽笙歌。"}, {"title": "攤破浣溪沙・揉破黃金萬點輕", "author": "宋・李清照", "body": ["揉破黃金萬點輕，剪成碧玉葉層層。", "風度精神如彥輔，太鮮明。", "", "梅蕊重重何俗甚，丁香千結苦粗生。", "薰透愁人千里夢，卻無情。"], "note": "桂花風度精神鮮明，薰透千里夢卻似無情。"}, {"title": "洗兒詩", "author": "宋・蘇軾", "body": ["人皆養子望聰明，我被聰明誤一生。", "惟願孩兒愚且魯，無災無難到公卿。"], "note": "聰明反被聰明誤，不如愚魯平安度一生。"}, {"title": "泛吳淞江", "author": "宋・王禹偁", "body": ["葦蓬疏薄漏斜陽，半日孤吟未過江。", "惟有鷺鷥知我意，時時翹足對船窗。"], "note": "唯有白鷺懂我心意，翹足相對默默無言。"}, {"title": "臨江仙・探梅", "author": "宋・辛棄疾", "body": ["老去惜花心已懶，愛梅猶繞江村。", "一枝先破玉溪春。更無花態度，全有雪精神。", "", "剩向空山餐秀色，為渠著句清新。", "竹根流水帶溪雲。醉中渾不記，歸路月黃昏。"], "note": "梅花全有雪的精神，無花的態度反而更高潔。"}, {"title": "賀新郎・把酒長亭說", "author": "宋・辛棄疾", "body": ["把酒長亭說。看淵明、風流酷似，臥龍諸葛。", "何處飛來林間鵲，蹙踏松梢殘雪。", "要破帽多添華髮。剩水殘山無態度，被疏梅料理成風月。", "兩三雁，也蕭瑟。", "", "佳人重約還輕別。悵清江、天寒不渡，水深冰合。", "路斷車輪生四角，此地行人銷骨。", "問誰使、君來愁絕？", "鑄就而今相思錯，料當初、費盡人間鐵。", "長夜笛，莫吹裂。"], "note": "鑄就相思錯，費盡人間鐵，最沉痛的離愁。"}, {"title": "柳梢青・送盧梅坡", "author": "宋・劉過", "body": ["泛菊杯深，吹梅角遠，同在京城。", "聚散匆匆，雲邊孤雁，水上浮萍。", "", "教人怎不傷情？覺幾度、魂飛夢驚。", "後夜相思，塵隨馬去，月逐舟行。"], "note": "離別後月隨舟行塵隨馬去，思念無處不在。"}, {"title": "南鄉子・歸夢寄吳檣", "author": "宋・陸遊", "body": ["歸夢寄吳檣，水驛江程去路長。", "想見芳洲初繫纜，斜陽，煙樹參差認武昌。", "", "愁鬢點新霜，曾是朝衣染御香。", "重到故鄉交舊少，淒涼，卻恐他鄉勝故鄉。"], "note": "重回故鄉舊友零落，恐怕他鄉反勝故鄉。"}, {"title": "蝶戀花・別範南伯", "author": "宋・楊炎正", "body": ["離恨做成春夜雨，添得春江，剗地東流去。", "弱柳繫船都不住，為君愁絕聯舟處。", "", "老去悲秋強自寬，興來今日盡君歡。", "長溝流月去無聲，杏花疏影裏，吹笛到天明。"], "note": "離恨化春雨匯入江水，弱柳也繫不住遠行的船。"}, {"title": "鷓鴣天・鵝湖歸病起作", "author": "宋・辛棄疾", "body": ["枕簟溪堂冷欲秋，斷雲依水晚來收。", "紅蓮相倚渾如醉，白鳥無言定自愁。", "", "書咄咄，且休休，一丘一壑也風流。", "不知筋力衰多少，但覺新來懶上樓。"], "note": "一丘一壑也風流，病後方知閒適之美。"}, {"title": "夜泊水村", "author": "宋・陸遊", "body": ["腰間羽箭久凋零，太息燕然未勒銘。", "老子猶堪絕大漠，諸君何至泣新亭。", "一身報國有萬死，雙鬢向人無再青。", "記取江湖泊船處，臥聞新雁落寒汀。"], "note": "報國萬死不辭，只恨雙鬢已不再青。"}, {"title": "清平樂・春晚", "author": "宋・王安中", "body": ["留春不住，費盡鶯兒語。", "滿地殘紅宮錦汙，昨夜南園風雨。", "", "小憐初上琵琶，曉來思繞天涯。", "不肯畫堂朱戶，春風自在楊花。"], "note": "留春不住是常態，楊花自在隨風纔是灑脫。"}, {"title": "西河・和王潛齋韻", "author": "宋・史達祖", "body": ["天邊漸曉，正參橫月落，客夢初覺。", "暮雲長江千嶂黑，想翠幕遮寒怯怯。", "小梅過盡疏桐秋，自窣窣、衣裳如削。", "", "正漠漠水雲朝暮色，斷岸微明有霜雪。", "杯殘歲暮人將歸，問何日可重來約？"], "note": "歲暮歸途問何日重來，離別總帶著不確定。"}, {"title": "玉蝴蝶・望處雨收雲斷", "author": "宋・柳永", "body": ["望處雨收雲斷，憑闌悄悄，目送秋光。", "晚景蕭疏，堪動宋玉悲涼。", "水風輕、蘋花漸老，月露冷、梧葉飄黃。", "遣情傷，故人何在，煙水茫茫。", "", "難忘。文期酒會，幾孤風月，屢變星霜。", "海闊山遙，未知何處是瀟湘？", "念雙燕、難憑遠信，指暮天、空識歸航。", "黯相望，斷鴻聲裏，立盡斜陽。"], "note": "斷鴻聲裏立盡斜陽，是思念最孤絕的姿態。"}, {"title": "定風波・自春來慘綠愁紅", "author": "宋・柳永", "body": ["自春來、慘綠愁紅，芳心是事可可。", "日上花梢，鶯穿柳帶，猶壓香衾臥。", "暖酥消，膩雲嚲，終日厭厭倦梳裹。", "無那！恨薄情一去，音書無箇。", "", "早知恁麼，悔當初、不把雕鞍鎖。", "向雞窗、只與蠻箋象管，拘束教吟課。", "鎮相隨，莫拋躲，針線閒拈伴伊坐。", "和我，免使年少，光陰虛過。"], "note": "早知如此，當初就該把你留住不放。"}, {"title": "滿江紅・赤壁懷古", "author": "宋・戴復古", "body": ["赤壁磯頭，一番過、一番懷古。", "想當時、周郎年少，氣吞區宇。", "萬騎臨江貔虎噪，千艘列炬魚龍怒。", "卷長波、一鼓困曹瞞，今如許。", "", "江上渡，江邊路。形勝地，興亡處。", "覽遺蹤，勝讀史書言語。", "幾度東風吹世換，千年往事隨潮去。", "問道傍、楊柳為誰春，搖金縷。"], "note": "千年往事隨潮去，楊柳不管興亡只管春。"}, {"title": "玉樓春・東城漸覺風光好", "author": "宋・宋祁", "body": ["東城漸覺風光好，縠皺波紋迎客棹。", "綠楊煙外曉寒輕，紅杏枝頭春意鬧。", "", "浮生長恨歡娛少，肯愛千金輕一笑。", "為君持酒勸斜陽，且向花間留晚照。"], "note": "紅杏枝頭春意鬧，一個鬧字寫活了整個春天。"}, {"title": "浣溪沙・春情", "author": "宋・蘇軾", "body": ["道字嬌訛語未成，未應春閣夢多情。朝來何事綠鬟傾。", "", "彩索身輕長趁燕，紅窗睡重不聞鶯。困人天氣日初長。"], "note": "春日漸長人漸困，嬌語未成夢正多情。"}, {"title": "南歌子・疏雨池塘見", "author": "宋・賀鑄", "body": ["疏雨池塘見，微風襟袖知。", "陰陰夏木囀黃鸝，何處飛來白鷺立移時。", "", "易醉扶頭酒，難逢敵手棋。", "日長偏與睡相宜，睡起芭蕉葉上自題詩。"], "note": "夏日長眠醒來無事，就在芭蕉葉上題首詩。"}, {"title": "木蘭花慢・拆桐花爛漫", "author": "宋・柳永", "body": ["拆桐花爛漫，乍疏雨、洗清明。", "正艷杏燒林，緗桃繡野，芳景如屏。", "傾城，盡尋勝去，驟雕鞍紺幰出郊坰。", "風暖繁弦脆管，萬家競奏新聲。", "", "盈盈，鬥草踏青。人豔冶、遞逢迎。", "向路旁往往，遺簪墮珥，珠翠縱橫。", "歡情，對佳麗地，信金罍罄竭玉山傾。", "拚卻明朝永日，畫堂一枕春酲。"], "note": "清明踏青傾城出遊，一枕春醉是最奢侈的享受。"}, {"title": "清平樂・會昌", "author": "宋・辛棄疾", "body": ["連雲松竹，萬事從今足。", "拄杖東家分社肉，白酒牀頭初熟。", "", "西風梨棗山園，兒童偷把長竿。", "莫遣旁人驚去，老夫靜處閒看。"], "note": "看兒童偷打梨棗，老來的閒適勝過功名。"}, {"title": "新城道中", "author": "宋・蘇軾", "body": ["東風知我欲山行，吹斷簷間積雨聲。", "嶺上晴雲披絮帽，樹頭初日掛銅鉦。", "野桃含笑竹籬短，溪柳自搖沙水清。", "西崦人家應最樂，煮芹燒筍餉春耕。"], "note": "東風善解人意吹散積雨，山行處處是春色。"}, {"title": "暑旱苦熱", "author": "宋・王令", "body": ["清風無力屠得熱，落日著翅飛上山。", "人固已懼江海竭，天豈不惜河漢乾？", "崑崙之高有積雪，蓬萊之遠常遺寒。", "不能手提天下往，何忍身去遊其間！"], "note": "天下苦熱而己不能救，是仁者最深的不忍。"}, {"title": "思遠人・紅葉黃花秋意晚", "author": "宋・晏幾道", "body": ["紅葉黃花秋意晚，千里念行客。", "飛雲過盡，歸鴻無信，何處寄書得？", "", "淚彈不盡臨窗滴，就硯旋研墨。", "漸寫到別來，此情深處，紅箋為無色。"], "note": "淚滴研墨寫情書，寫到深處紅箋都褪了色。"}, {"title": "如夢令・昨夜雨疏風驟", "author": "宋・李清照", "body": ["昨夜雨疏風驟，濃睡不消殘酒。", "試問捲簾人，卻道海棠依舊。", "知否，知否？應是綠肥紅瘦。"], "note": "風雨之後綠肥紅瘦，春天的美總是短暫的。"}, {"title": "長相思・吳山青", "author": "宋・林逋", "body": ["吳山青，越山青，兩岸青山相送迎。誰知離別情？", "", "君淚盈，妾淚盈，羅帶同心結未成。江頭潮已平。"], "note": "兩岸青山相迎送，卻不知人間的離別之苦。"}, {"title": "鵲橋仙・華燈縱博", "author": "宋・陸遊", "body": ["華燈縱博，雕鞍馳射，誰記當年豪舉。", "酒徒一半取封侯，獨去作、江邊漁父。", "", "輕舟八尺，低篷三扇，佔斷蘋洲煙雨。", "鏡湖元自屬閒人，又何必、官家賜與。"], "note": "鏡湖本屬閒人，何須等官家賜予。"}, {"title": "過松源晨炊漆公店", "author": "宋・楊萬裏", "body": ["莫言下嶺便無難，賺得行人空喜歡。", "正入萬山圈子裏，一山放過一山攔。"], "note": "人生如行山路，過了一山還有一山攔。"}, {"title": "浣溪沙・門隔花深夢舊遊", "author": "宋・吳文英", "body": ["門隔花深夢舊遊，夕陽無語燕歸愁。玉纖香動小簾鉤。", "", "落絮無聲春墮淚，行雲有影月含羞。東風臨夜冷於秋。"], "note": "落絮無聲如春在墮淚，行雲有影似月在含羞。"}, {"title": "祝英臺近・荷花", "author": "宋・高觀國", "body": ["擁紅妝，翻翠蓋，花影暗南浦。", "笑攜來、粉蝶不知，遊人立日暮。", "芳心只願託丹青，寫真留佳句。", "又攜去、一陣晚涼歸路。", "", "別離處。暗想年少遊蕩，如今情緒。", "水邊燈火漸人行，天外一鉤殘照與。"], "note": "荷花如紅妝翠蓋，年少遊蕩的記憶最難忘。"}, {"title": "訴衷情近・雨晴氣爽", "author": "宋・柳永", "body": ["雨晴氣爽，佇立江樓望處。", "澄明遠水生光，重疊暮山聳翠。", "遙認斷橋幽徑，隱隱漁村，向晚孤煙起。", "", "殘陽裏，脈脈朱闌靜倚。", "黯然情緒，未飲先如醉。", "愁無際。暮雲過了，秋光老盡，故人千里。", "竟日空凝睇。"], "note": "未飲先醉是因為愁太深，故人千里望不盡。"}, {"title": "浪淘沙・疏雨洗天清", "author": "宋・鄧剡", "body": ["疏雨洗天清，枕簟涼生。", "井桐一葉做秋聲。誰念客身輕似葉，千里飄零？", "", "夢斷古臺城，月淡潮平。", "便須攜酒訪新亭。不見當時王謝宅，煙草青青。"], "note": "客身輕似秋葉千里飄零，舊時王謝已成煙草。"}, {"title": "夜直", "author": "宋・王安石", "body": ["金爐香盡漏聲殘，翦翦輕風陣陣寒。", "春色惱人眠不得，月移花影上欄杆。"], "note": "月移花影上欄杆，春夜美到令人無法入眠。"}, {"title": "臨江仙・鬥轉星橫乍曙", "author": "宋・張先", "body": ["自是花中第一流，不須格外結風流。", "霜毫拂拭意如意，誰料東風欲倦時。", "", "待約箇梅魁，未開時先有香飛。", "沉吟久坐西窗下，人不知春在哪裏。"], "note": "梅花未開香先飄，最美的事物往往不張揚。"}, {"title": "感皇恩・讀莊子聞朱晦庵即世", "author": "宋・辛棄疾", "body": ["案上數編書，非莊即老。", "會說忘言始知道。萬言千句，不自能忘堪笑。", "今朝梅雨霽，青天好。", "", "一壑一丘，也須殊自了。", "大廈將顛一木少。人間奇禍，誰能料。"], "note": "萬言千句不如忘言知道，天晴之後看淡萬事。"}, {"title": "江梅引・憶江梅", "author": "宋・洪皓", "body": ["天涯除館憶江梅，幾枝開？使南來。", "還帶餘杭、春信到燕臺。", "準擬寒英聊慰遠，隔山水，應銷落，赴訴誰。", "", "空恁遐想笑摘蕊，斷回腸，思故里。", "漫彈綠綺，引三弄、不覺魂飛。", "更聽胡笳，哀怨淚沾衣。", "亂插繁花須異日，待歸去、對影飲，一杯時。"], "note": "天涯除館思故里，梅花香信隔山水也寄不到。"}, {"title": "水調歌頭・和馬叔度遊月波樓", "author": "宋・辛棄疾", "body": ["客子久不到，好景為君留。", "西樓著意吟賞，何必問更籌？", "喚起一天明月，照我滿懷冰雪，浩蕩百川流。", "鯨飲未吞海，劍氣已橫秋。", "", "野光浮，天宇迥，物華幽。", "中州遺恨，不知今夜幾人愁？", "誰念英雄老矣？不道功名蕞爾，決策尚悠悠。", "此事費分說，來日且扶頭。"], "note": "喚起明月照冰雪胸懷，英雄老矣壯心未已。"}, {"title": "菩薩蠻・歸鴻聲斷殘雲碧", "author": "宋・李清照", "body": ["歸鴻聲斷殘雲碧，背窗雪落爐煙直。", "燭底鳳釵明，釵頭人勝輕。", "", "角聲催曉漏，曙色回牛鬥。", "春意看花難，西風留舊寒。"], "note": "雪落爐煙直的清冷中，春意難覓西風猶寒。"}, {"title": "清平樂・年年雪裏", "author": "宋・李清照", "body": ["年年雪裏，常插梅花醉。", "挼盡梅花無好意，贏得滿衣清淚。", "", "今年海角天涯，蕭蕭兩鬢生華。", "看取晚來風勢，故應難看梅花。"], "note": "從插梅花醉到無心看梅花，是一個人的滄桑史。"}, {"title": "念奴嬌・梅", "author": "宋・辛棄疾", "body": ["疏疏淡淡，問阿誰、堪比天真顏色。", "笑殺東君虛佔斷，多少朱朱白白。", "雪裏溫柔，水邊明秀，不借春工力。", "骨清香嫩，迥然天與奇絕。", "", "嘗記寶篽寒輕，瑣窗人睡起，玉纖輕摘。", "漂泊天涯空瘦損，猶有當年標格。", "萬裏風煙，一溪霜月，未怕欺他得。", "不如歸去，閣樓仙蕊曾識。"], "note": "梅花不借春工力，骨清香嫩天賦奇絕。"}, {"title": "臨江仙・都城元夕", "author": "宋・毛滂", "body": ["聞道長安燈夜好，雕輪寶馬如雲。", "蓬萊高處步青雲。東風吹鼓角，雪暗鳳城春。", "", "闇記年時沽酒處，淡月胭脂小巷深。", "花間竹裏有清尊。梨花寒食夜，深院小桃春。"], "note": "記得當年沽酒處，淡月胭脂巷深深。"}, {"title": "臨江仙・高詠楚辭酬午日", "author": "宋・陳與義", "body": ["高詠楚辭酬午日，天涯節序匆匆。", "榴花不似舞裙紅。無人知此意，歌罷滿簾風。", "", "萬事一身傷老矣，戎葵凝笑牆東。", "酒杯深淺去年同。試澆橋下水，今夕到湘中。"], "note": "端午天涯漂泊，酒澆橋下水寄思念到湘中。"}, {"title": "登嶽陽樓", "author": "宋・陳與義", "body": ["洞庭之東江水西，簾旌不動夕陽遲。", "登臨吳蜀橫分地，徙倚湖山欲暮時。", "萬裏來遊還望遠，三年多難更憑危。", "白頭弔古風霜裏，老木滄波無限悲。"], "note": "萬裏漂泊三年多難，白頭弔古老木滄波。"}, {"title": "山中", "author": "宋・林逋", "body": ["結茅臨水石，淡寂益閒吟。", "久雨寒蟬少，空山落葉深。", "危樓乘月上，遠寺聽鐘尋。", "昨得江僧信，期來此息心。"], "note": "空山落葉深處，結茅而居息心閒吟。"}, {"title": "戚氏・晚秋天", "author": "宋・柳永", "body": ["晚秋天，一霎微雨灑庭軒。", "檻菊蕭疏，井梧零亂惹殘煙。", "淒然，望江關，飛雲黯淡夕陽間。", "當時宋玉悲感，向此臨水與登山。", "遠道迢遞，行人淒楚，倦聽隴水潺湲。", "", "正蟬吟敗葉，蛩響衰草，相應喧喧。", "孤館度日如年。風露漸變，悄悄至更闌。", "長天淨，絳河清淺，皓月嬋娟。", "思綿綿，夜永對景那堪，屈指暗想從前。"], "note": "晚秋天孤館如年，屈指暗想從前的溫暖。"}, {"title": "歸朝歡・別岸扁舟三兩隻", "author": "宋・柳永", "body": ["別岸扁舟三兩隻，葭葦蕭蕭風淅淅。", "沙汀宿雁破煙飛，溪橋殘月和霜白。", "漸漸分曙色，路遙山遠多行役。", "往來人，只輪雙槳，盡是利名客。", "", "一望鄉關煙水隔，轉覺歸心生羽翼。", "愁雲恨雨兩牽縈，新春殘臘相催逼。", "歲華都瞬息，浪萍風梗誠何益。", "歸去來，玉樓深處，有箇人相憶。"], "note": "利名路上往來奔波，不如歸去，有人在深處相憶。"}, {"title": "木蘭花慢・送歸雲去雁", "author": "宋・張先", "body": ["送歸雲去雁，淡寒採、滿溪樓。正沙淨草枯，水平天遠，雪月交輝。", "誰信有書來，沙鶻過，千里暮雲收。", "", "回首重城不見，寒江天際流。", "寄語東陽道上人，莫教辜負了春遊。", "吳山越水間，多少閒愁。"], "note": "千里暮雲收盡時，寒江天際獨自流。"}, {"title": "夢玉人引・送行甚麼是離拆", "author": "宋・周邦彥", "body": ["送行甚麼是離拆，意緒繁蕪如織。", "淚染面、酒添顏色。", "拊掌笑人間，萬事復何益？", "", "小簾鉤，見月明遠岫色。", "記昨宵有約，只恐歸來遲卻。", "更待寒潮退了，又鬱鬱重離側。"], "note": "送行時萬般滋味交織，小簾鉤月明徒增離愁。"}, {"title": "好事近・夢中作", "author": "宋・周邦彥", "body": ["浮花浪蕊都盡，伴君幽獨。", "忍把千金酬一笑？畢竟相思，不似相逢好。", "", "錦幄初溫，獸煙不斷，一曲能教腸寸結。"], "note": "浮花浪蕊散盡，唯留幽獨的陪伴。"}, {"title": "水調歌頭・把酒對斜日", "author": "宋・楊炎正", "body": ["把酒對斜日，無語問西風。", "胭脂何事，都做顏色染芙蓉。", "放眼暮江千頃，中有離愁萬斛，無處落徵鴻。", "天在闌幹角，人倚醉醒中。", "", "千萬裏，江南北，浙西東。", "吾生如寄，尚想三徑菊花叢。", "誰是中州豪傑？借我五湖舟楫，去作釣魚翁。", "故國且回首，此意莫匆匆。"], "note": "萬斛離愁無處安放，不如借五湖舟楫做釣翁。"}, {"title": "卜算子・片片蝶衣輕", "author": "宋・劉克莊", "body": ["片片蝶衣輕，點點猩紅小。", "道是天公不惜花，百種千般巧。", "", "朝見樹頭繁，暮見枝頭少。", "道是天公果惜花，雨洗風吹了。"], "note": "天公惜花或不惜花，終究風雨吹落無情。"}, {"title": "水調歌頭・隱括杜牧之齊山詩", "author": "宋・朱熹", "body": ["江水浸雲影，鴻雁欲南飛。", "攜壺結客，何處空翠渺煙霏。", "塵世難逢一笑，況有紫萸黃菊，堪插滿頭歸。", "風景今朝是，身世昔人非。", "", "酬佳節，須酩酊，莫相違。", "人生如寄，何事辛苦怨斜暉。", "無盡今來古往，多少春花秋月，那更有危機。", "與問牛山客，何必獨沾衣。"], "note": "人生如寄何須怨，春花秋月盡可酩酊歸。"}, {"title": "望海潮・洛陽懷古", "author": "宋・秦觀", "body": ["梅英疏淡，冰澌溶洩，東風暗換年華。", "金谷俊遊，銅駝巷陌，新晴細履平沙。", "長記誤隨車，正絮翻蝶舞，芳思交加。", "柳下桃蹊，亂分春色到人家。", "", "西園夜飲鳴笳。有華燈礙月，飛蓋妨花。", "蘭苑未空，行人漸老，重來是事堪嗟。", "煙暝酒旗斜。但倚樓極目，時見棲鴉。", "無奈歸心，暗隨流水到天涯。"], "note": "東風暗換年華，歸心暗隨流水到天涯。"}, {"title": "沁園春・孤館燈青", "author": "宋・蘇軾", "body": ["孤館燈青，野店雞號，旅枕夢殘。", "漸月華收練，晨霜耿耿；雲山摛錦，朝露漙漙。", "世路無窮，勞生有限，似此區區長鮮歡。", "微吟罷，憑徵鞍無語，往事千端。", "", "當時共客長安，似二陸初來俱少年。", "有筆頭千字，胸中萬卷；致君堯舜，此事何難？", "用舍由時，行藏在我，袖手何妨閒處看。", "身長健，但優遊卒歲，且鬥尊前。"], "note": "用舍由時行藏在我，身長健且優遊卒歲。"}, {"title": "八聲甘州・記玉關踏雪事清遊", "author": "宋・張炎", "body": ["記玉關踏雪事清遊，寒氣脆貂裘。", "傍枯林古道，長河飲馬，此意悠悠。", "短夢依然江表，老淚灑西州。", "一字無題處，落葉都愁。", "", "載取白雲歸去，問誰留楚佩，弄影中洲？", "折蘆花贈遠，零落一身秋。", "向尋常、野橋流水，待招來、不是舊沙鷗。", "空懷感、有斜陽處，卻怕登樓。"], "note": "折蘆花贈遠人，零落一身秋色是最深的懷念。"}, {"title": "念奴嬌・登石頭城次東坡韻", "author": "宋・辛棄疾", "body": ["倚空絕壁，直下江千尺。天際兩蛾凝黛，愁與恨、幾時極！", "暮潮風正急，酒闌聞塞笛。", "試問憂愁都幾許？依舊是、山河如此。", "", "半江帶雨蒼煙闊，翠色暮雲閒。", "回首六朝形勝地，惟有青山。"], "note": "江千尺壁立萬仞，六朝形勝唯餘青山。"}, {"title": "減字木蘭花・賣花擔上", "author": "宋・李清照", "body": ["賣花擔上，買得一枝春欲放。", "淚染輕勻，猶帶彤霞曉露痕。", "", "怕郎猜道，奴面不如花面好。", "雲鬢斜簪，徒要教郎比並看。"], "note": "買花與郎比美的嬌俏，是少女最可愛的心思。"}, {"title": "關山月", "author": "宋・陸遊", "body": ["和戎詔下十五年，將軍不戰空臨邊。", "朱門沉沉按歌舞，廄馬肥死弓斷弦。", "戍樓刁斗催落月，三十從軍今白髮。", "笛裏誰知壯士心，沙頭空照徵人骨。", "中原干戈古亦聞，豈有逆胡傳子孫！", "遺民忍死望恢復，幾處今宵垂淚痕。"], "note": "將軍不戰歌舞昇平，遺民望恢復淚痕幾處。"}, {"title": "玉蝴蝶・為甚夜來添病", "author": "宋・吳文英", "body": ["為甚夜來添病，強臨杯酒、怯對花枝。", "恁時攜手處，回頭萬裏，只在良宵如夢中。", "", "紅蠟淚落成堆，寒食近、花下偷期。", "月明千里夢相思。"], "note": "月明千里的夢中相思，是病中最真摯的牽掛。"}, {"title": "瑞鶴仙・賦梅", "author": "宋・辛棄疾", "body": ["雁霜寒透幕，正護月雲輕，嫩冰猶薄。", "溪奩照梳掠，想含香弄粉，豔妝難學。", "玉肌瘦弱，更重重、龍綃襯著。", "倚東風、一笑嫣然，轉盼萬花羞落。", "", "寂寞，家山何在？雪後園林，水邊籬落。", "瑤池舊約，鱗鴻更無信，好音難託。", "倩誰摘取，寄贈情人桃葉？秦鏡高明裏、也應細觀容顏老卻。"], "note": "梅花玉肌嫣然一笑，萬花皆羞，寂寞更無人知。"}, {"title": "鷓鴣天・化度寺作", "author": "宋・吳文英", "body": ["池上紅衣伴倚闌，棲鴉常帶夕陽還。", "殷雲度雨疏橋畔，明月生涼古殿間。", "", "鄉夢窄，水天寬。小窗愁黛淡秋山。", "吳鴻好為傳歸信，楊柳閶門屋數間。"], "note": "鄉夢太窄裝不下水天之寬，只盼鴻雁傳歸信。"}, {"title": "蘇武慢・雁落平沙", "author": "宋・蔡伸", "body": ["雁落平沙，煙籠寒水，古壘鳴笳聲斷。", "青山隱隱，敗葉蕭蕭，天際暝鴉零亂。", "黯銷凝，追想當年事，花月夜、人在秦樓。", "", "落梅橫笛已三更，更無人處月朧明。", "沈沈暗想，似夢裏、淚暗滴。"], "note": "平沙落雁寒水籠煙，古壘笳聲是最深的懷古。"}, {"title": "減字木蘭花・莎衫筠笠", "author": "宋・盧炳", "body": ["莎衫筠笠，正是村村農務急。", "綠水千畦，慣聽田間布穀啼。", "", "洞簫橫笛，和了一聲天淡碧。", "醉把花枝，欲向花間臥未知。"], "note": "農忙時節簫笛和鳴，醉臥花間是田園最美的畫面。"}, {"title": "臨江仙・憶昔午橋橋上飲", "author": "宋・陳與義", "body": ["憶昔午橋橋上飲，坐中多是豪英。", "長溝流月去無聲。杏花疏影裏，吹笛到天明。", "", "二十餘年如一夢，此身雖在堪驚。", "閒登小閣看新晴。古今多少事，漁唱起三更。"], "note": "二十年如一夢，長溝流月杏花笛聲猶在耳畔。"}, {"title": "浣溪沙・二月和風到碧城", "author": "宋・晏幾道", "body": ["二月和風到碧城，萬條千縷綠相迎。舞煙眠雨過清明。", "", "妝鏡巧眉偷學樣，歌樓妍曲借名聲。晚秋霜霰莫無情。"], "note": "二月春風萬縷綠柳，願晚秋霜霰莫太無情。"}, {"title": "漁父", "author": "宋・蘇軾", "body": ["漁父飲，誰家去？魚蟹一時分付。", "酒無多少醉為期，彼此不論錢數。"], "note": "漁父飲酒不問錢數，醉了便是歸期。"}, {"title": "浪淘沙・極目楚天空", "author": "宋・范成大", "body": ["極目楚天空，雲雨無蹤。漫留遺恨鎖眉峯。", "自是荷花開較晚，孤負東風。", "", "客館嘆飄蓬，聚散匆匆。揚鞭那忍驟花驄。", "望斷斜陽人不見，滿袖啼紅。"], "note": "聚散匆匆如飄蓬，望斷斜陽人不見。"}, {"title": "水龍吟・放船千里凌波去", "author": "宋・朱敦儒", "body": ["放船千里凌波去，略為吳山留顧。", "雲屯水府，濤隨神女，九江東注。", "北客翩然，壯心偏感，年華將暮。", "念伊嵩舊隱，巢由故友，南柯夢、遽如許。", "", "回首妖氛未掃，問人間、英雄何處？", "奇謀報國，可憐無用，尖頭奴子。", "千古豪華，百年流落，太行如砥。", "似黃河，如帶不須多說，看天闊鳶飛。"], "note": "千里放船壯心未老，回首卻問英雄何處。"}, {"title": "瑤華・朱鉛退盡", "author": "宋・周密", "body": ["朱鉛退盡，潘妃卻酒，昭君乍起。", "最愛輕盈，是六出飛花搖曳。", "冷香飛上詩句，正一枝、春風初折。", "", "碧雲歸去，吹蕭人在秦樓月。"], "note": "六出飛花輕盈如夢，冷香飛上詩句最動人。"}, {"title": "齊天樂・蟋蟀", "author": "宋・姜夔", "body": ["庾郎先自吟愁賦，淒淒更聞私語。", "露濕銅鋪，苔侵石井，都是曾聽伊處。", "哀音似訴，正思婦無眠，起尋機杼。", "曲曲屏山，夜涼獨自甚情緒。", "", "西窗又吹暗雨，為誰頻斷續，相和砧杵？", "候館迎秋，離宮弔月，別有傷心無數。", "豳詩漫與，笑籬落呼燈，世間兒女。", "寫入琴絲，一聲聲更苦。"], "note": "蟋蟀秋聲聲聲似訴，寫入琴絲更添淒苦。"}, {"title": "琵琶仙・雙槳來時", "author": "宋・姜夔", "body": ["雙槳來時，有人似、舊曲桃根桃葉。", "歌扇輕約飛花，蛾眉正奇絕。", "春漸遠、汀洲自綠，更添了幾聲啼鴂。", "十里揚州，三生杜牧，前事休說。", "", "又還是、宮燭分煙，奈愁裏匆匆換時節。", "都把一襟芳思，與空階榆莢。", "千萬縷、藏鴉細柳，為玉尊、起舞迴雪。", "想見西出陽關，故人初別。"], "note": "十里揚州三生杜牧，前事休說卻偏偏想起。"}, {"title": "春晚", "author": "宋・王令", "body": ["三月殘花落更開，小簷日日燕飛來。", "子規夜半猶啼血，不信東風喚不回。"], "note": "子規啼血也要喚回東風，是對春天最執著的信念。"}, {"title": "贈別", "author": "宋・趙師秀", "body": ["湖上芙蓉映碧天，秋風吹落半池蓮。", "斜陽一抹江村暮，客裏相逢各自憐。"], "note": "秋風落蓮斜陽暮，他鄉相逢更覺珍貴。"}, {"title": "浣溪沙・萬頃風濤不記蘇", "author": "宋・蘇軾", "body": ["萬頃風濤不記蘇，雪晴江上麥千車。但令人飽我愁無。", "", "翠袖倚風縈柳絮，絳脣得酒爛櫻珠。尊前呵手鑷霜鬚。"], "note": "但令百姓飽食，自己的愁便算不得什麼。"}, {"title": "清平樂・候蛩淒斷", "author": "宋・張炎", "body": ["候蛩淒斷，人語西風岸。", "月落沙平江似練，望盡蘆花無雁。", "", "暗教愁損蘭成，可憐夜夜關情。", "只有一枝梧葉，不知多少秋聲。"], "note": "一枝梧葉便知多少秋聲，敏感的心聽見萬物。"}, {"title": "金陵晚望", "author": "宋・曾鞏", "body": ["曾伯曾孫各異時，後人收拾好規摹。", "登臨不用傷今古，萬事從來有代謝。"], "note": "萬事皆有代謝更替，登臨何須傷今嘆古。"}, {"title": "靈感", "author": "林徽因", "body": ["靈感忽然在黑夜裏來了，", "聯步在星光下走着，", "像一個女郎，", "幽幽的嘆息。", "", "我不敢說出她的名字，", "怕驚破了這夜的靜；", "我不敢望她的眼睛，", "怕我的淚泉冒出了熱。"], "note": "靈感如夜裡的訪客，輕叩便驚動了整個靈魂。"}, {"title": "情願", "author": "林徽因", "body": ["我情願化成一片落葉，", "讓風吹雨打到處飄零；", "或流雲一朵，在澄藍天，", "和大地再沒有些牽連。", "", "但抱緊那傷心的標誌，", "去觸遇沒着落的悵惘；", "在黃昏，夜班，蹉跎歲月，", "不再有希望的期待。"], "note": "有時放手也是一種深情。"}, {"title": "秋天，這秋天", "author": "林徽因", "body": ["這是秋天，秋天，", "風還該是溫軟；", "太陽仍笑着那微笑，", "閒閒地移過每一寸山壁。", "", "這是秋天，秋天，", "一切都成熟了，已完成，——", "那棵大樹上金黃的葉子", "不必是一種悲哀。"], "note": "成熟是秋天最美的姿態。"}, {"title": "記憶", "author": "林徽因", "body": ["斷續的曲子，最美或最溫柔的，", "夜，帶着一天的星。", "記憶的梗上，誰不有", "兩三朵娉婷，披着情緒的花。", "", "環抱那些記憶，暖一些日子——", "在幽暗裏，也在光亮裏，", "怕的是冷的驟雨，", "打散了希望的花。"], "note": "記憶是暗夜裡不捨得放下的花。"}, {"title": "城樓上", "author": "林徽因", "body": ["城樓上，遠遠的行人走去，", "黃昏裏，也有暮鴉飛過，", "城牆根下一帶垂柳輕搖，", "搖曳在紫色的凝靄裏。", "", "不用感嘆這景象蒼涼——", "且看它永恆，古老的莊嚴，", "從容走着的，是時間的步子，", "不是別離。"], "note": "蒼涼也可以是一種莊嚴的美。"}, {"title": "寫給我的大姊", "author": "林徽因", "body": ["夜已深了，窗外一點聲息，", "世界好像全然凝寂。", "一輪明月高高升起，", "把我們的屋子照得分外清冷。", "", "你走了——燈滅了——", "而我想寫字給你：", "說一些話，帶着淚，帶着笑，", "最好能帶來一個好夢。"], "note": "想念是寫不完的長信。"}, {"title": "旗", "author": "穆旦", "body": ["我們都在下面，匐伏或者奔跑，", "但旗在高處飄揚，", "它的方向是風的方向，", "也是我們仰望的方向。", "", "那一塊鮮豔的顏色", "在灰暗的天空下格外分明——", "如同一顆心，熱烈地跳動，", "在冰冷的世界裏。"], "note": "信念是風中不倒的旗幟。"}, {"title": "發現", "author": "聞一多", "body": ["我來了，我喊一聲，迸着血淚，", "「這不是我的中華，不對，不對！」", "我來了，因為我聯見你滿身的傷疤；", "因為我聯到你的痛苦，你的淒涼。", "", "我來了，不知道是一場空喜。", "我會見的是噩夢，那裏是你？", "那裏是你？——那裏是我的中華？"], "note": "愛之深，所以痛之切。"}, {"title": "十四行集（其一）", "author": "馮至", "body": ["我們準備着深深地領受", "那些意想不到的奇蹟，", "在漫長的歲月裏忽然有", "彗星的出現，狂風乍起。", "", "我們的生命在這一瞬間，", "彷彿在第一次的擁抱裏", "過去的悲歡忽然在眼前", "凝結成屹然不動的形體。"], "note": "生命的奇蹟常在意想不到的瞬間降臨。"}, {"title": "十四行集（其四）", "author": "馮至", "body": ["鼠麴草，匍匐在路旁——", "這樣的渺小，這樣的柔弱，", "但它有它自己的方向，", "在天際畫出它微弱的弧。", "", "它不需要人看見，", "不需要人讚美，", "它只在默默裏完成", "它的一生——多安靜！"], "note": "渺小的生命也有完整的一生。"}, {"title": "什麼能從我們身上脫落", "author": "馮至", "body": ["什麼能從我們身上脫落，", "我們都讓它化作塵埃：", "我們安排我們在這時代", "像秋日的樹木，一棵棵", "", "把樹葉和些過遲的花朵", "都交給秋風，好舒開樹身", "伸入嚴冬；我們安排我們", "在自然裏，像蛻化的蟬蛾。"], "note": "脫落也是一種成長的方式。"}, {"title": "生活", "author": "臧克家", "body": ["生活像一條小溪，", "總是在石縫裏擠來擠去，", "也許前面有一條大河——", "那是它的歸宿。", "", "但此刻它只能", "在狹窄裏奮力向前，", "用細小的聲音", "歌唱。"], "note": "即使狹窄，也要歌唱着前行。"}, {"title": "春鳥", "author": "臧克家", "body": ["春鳥是笙簫，", "春風弄柳腰。", "春水浮花去，", "春山眉樣翹。", "", "滿地都是春——", "春在枝頭鬧；", "一走出門來，", "春風撲面笑。"], "note": "春天是大地最快樂的表情。"}, {"title": "星期天的下午", "author": "陳克華", "body": ["星期天的下午", "世界如此安靜", "陽光落在地板上", "像一隻溫馴的貓", "", "我翻開一本書", "字句像蝴蝶飛出來", "在房間裏盤旋", "然後停在我肩膀上"], "note": "閒適的午後是靈魂充電的時刻。"}, {"title": "城市之光", "author": "陳克華", "body": ["城市的光害了我們的眼", "讓我們看不見星星", "但我們學會了", "在霓虹裏辨認方向", "", "每一扇亮着的窗", "都是一顆近距離的星辰", "我們住在彼此的光裏", "卻不自知"], "note": "城市裡每扇亮窗都是一顆星。"}, {"title": "夏天", "author": "陳克華", "body": ["夏天把自己攤開", "像一封冗長的信", "蟬聲是它的字跡", "潦草而且重複", "", "我在樹蔭下讀它", "讀到汗水模糊了眼", "讀到黃昏", "讀到這封信慢慢涼了下來"], "note": "夏天是一封用蟬聲寫成的信。"}, {"title": "花蓮港", "author": "陳黎", "body": ["太陽從海面升起的時候", "花蓮港剛剛醒來", "漁船帶着鹹味回家", "海鷗在桅杆上抖落夜露", "", "這座城市面向太平洋", "背靠中央山脈", "它的心跳聲", "被浪聲蓋過了"], "note": "花蓮是被山海擁抱的城市。"}, {"title": "雨季", "author": "陳黎", "body": ["雨下在花蓮", "下在我寫詩的桌上", "下在稿紙的格子裏", "每一格都裝滿了水", "", "字跡在水裏漂浮", "像水草，像魚", "像我那些", "到處流浪的念頭"], "note": "雨季讓思緒也跟着漂流。"}, {"title": "一片槐樹葉", "author": "紀弦", "body": ["這是全世界最美的一片，", "最珍奇、最可寶貴的一片，", "而又是最使人傷心、最使人流淚的一片——", "薄薄的、乾的、淺灰黃色的槐樹葉。", "", "忘了是在江南、江北，", "是在哪一個城市，哪一個園子裏揀來的了——", "被夾在一冊古老的詩集裏，", "多年來，竟沒有些微的損壞。"], "note": "一片葉承載着回不去的故鄉。"}, {"title": "擲", "author": "紀弦", "body": ["這一切", "不過是一個擲的動作。", "我把自己擲了出去，", "像一枚硬幣。", "", "在空中旋轉的時候，", "我看見了兩面——", "正面是理想，", "反面是現實。", "", "它終將落地，", "但在這旋轉的瞬間，", "我擁有全部的可能。"], "note": "人生在拋擲的瞬間最為自由。"}, {"title": "遠方", "author": "西川", "body": ["在遠方有一種生活", "我從未體驗過的生活", "那裡有更多的星星和月亮", "更多的風和更深的寂靜", "", "我把這種生活叫做詩歌", "雖然它也許只是", "一個窮人的夢", "一個老人的回憶"], "note": "遠方是窮人的詩，也是詩人的遠方。"}, {"title": "把羊羣趕下大海", "author": "西川", "body": ["把羊羣趕下大海！", "讓它們在浪花裏奔跑", "讓它們的白色", "混入海水的白色", "", "牧羊人站在沙灘上", "忽然分不清", "哪是羊羣", "哪是浪花"], "note": "詩意在分不清現實與幻想的一刻誕生。"}, {"title": "潛水艇的悲傷", "author": "翟永明", "body": ["潛水艇沉入海底的時候", "世界在上面繼續喧囂", "我在深處聽見自己的心跳", "像聲納，一下一下", "", "在黑暗裏探測着", "那些沉沒的大陸", "那些被遺忘的語言", "那些我不曾抵達的愛"], "note": "深潛是為了聽見內心的聲納。"}, {"title": "黑房間", "author": "翟永明", "body": ["黑房間裏住着另一個我", "她不說話", "只在深夜裏", "輕輕地呼吸", "", "她的眼睛能看見", "白天看不見的事物——", "比如影子的影子", "比如沉默的聲音"], "note": "黑暗裡的自己看見了白天錯過的一切。"}, {"title": "十四首素歌（之一）", "author": "翟永明", "body": ["在所有的春天裏", "我只記住了一個", "那天你穿白衣", "站在花樹下", "", "風吹來的時候", "花瓣落了一肩", "你沒有動", "像一尊安靜的佛"], "note": "有些春天只需要一個畫面就足夠。"}, {"title": "時間的玫瑰", "author": "翟永明", "body": ["時間是一朵玫瑰", "每一瓣都是一個季節", "它在手中慢慢綻放", "也在手中慢慢凋零", "", "我看着它的顏色變深", "從猩紅到暗紫——", "最後它變成了", "書頁裡壓平的標本"], "note": "時間的玫瑰最終都會成為書裡的記憶。"}, {"title": "我感到了陽光", "author": "王小妮", "body": ["我感到了陽光", "它把我全部的暗處照亮", "連最深的皺紋裏", "也充滿了光", "", "我站在正午的街道上", "像一棵剛被澆過水的植物", "葉子上的水珠", "每一顆都在閃"], "note": "陽光能照進皺紋裡最深的角落。"}, {"title": "月光是一種白", "author": "王小妮", "body": ["月光是一種白", "不是紙的白，不是雪的白", "是看了很久之後", "才能看到的白", "", "像一個人終於安靜下來", "臉上浮出的那種", "不染悲喜的", "白"], "note": "月光的白是心安靜之後纔看得見的。"}, {"title": "悟", "author": "王小妮", "body": ["石頭不說話就是智慧嗎？", "流水不停歇就是勤勞嗎？", "也許它們什麼都不是——", "只是石頭，只是水。", "", "我們加上去的意義", "是我們自己的需要。", "世界本來很安靜，", "是我們把它吵醒的。"], "note": "也許意義是人類最溫柔的打擾。"}, {"title": "某一天", "author": "王小妮", "body": ["某一天我將從人羣中消失", "像一滴水回到水裏", "沒有人注意到", "水面多了一圈漣漪", "", "但那漣漪會擴散", "碰到岸邊再彈回來", "在很久很久以後", "也許有人會問：", "這一圈圓，是誰留下的？"], "note": "每一滴水都在水面留下自己的圓。"}, {"title": "大海的日常", "author": "鯨向海", "body": ["大海也有不想上班的日子", "浪花攤在沙灘上", "像一個翹課的少年", "假裝聽不見鬧鐘", "", "海鷗在上面催促", "潮汐也準時來打卡", "但大海只是翻了個身", "繼續夢它的珊瑚"], "note": "大海翹班的樣子也很可愛。"}, {"title": "我與我的對話", "author": "鯨向海", "body": ["我問自己：你快樂嗎？", "我回答：看情況。", "我又問：什麼情況？", "我說：看你問的時候", "我正好在做什麼。", "", "如果正好在喫冰", "那就是快樂的。", "如果正好在想一個人——", "那要看他有沒有也在想我。"], "note": "快樂有時候取決於正在喫什麼冰。"}, {"title": "宇宙的盡頭", "author": "鯨向海", "body": ["有人說宇宙的盡頭是鐵嶺", "有人說是便利商店", "我覺得宇宙的盡頭", "是你已讀不回的那個瞬間", "", "在那之後", "時間停止了膨脹", "星系開始收縮", "直到縮成一顆", "未發送的訊息"], "note": "已讀不回是宇宙級的寂靜。"}, {"title": "下雨的技術", "author": "鯨向海", "body": ["下雨需要很好的技術", "太大聲會吵到正在失戀的人", "太小聲又不夠浪漫", "", "最好是那種剛剛好的雨", "讓人想起一些什麼", "又想不太起來", "只好去買一杯熱咖啡", "繼續想"], "note": "下雨的最高境界是讓人想買咖啡。"}, {"title": "星期一的詩", "author": "鯨向海", "body": ["星期一早晨醒來", "覺得自己是一首", "還沒寫完的詩", "", "前面幾行還不錯", "後面開始語無倫次", "結尾遙遙無期", "", "但沒關係", "反正到了星期五", "一切都會押韻的"], "note": "星期五會讓一切都押上韻。"}, {"title": "喜歡一個人", "author": "林婉瑜", "body": ["喜歡一個人的時候", "世界變得很小", "小到只剩下一個位子", "剛好是他的形狀", "", "不喜歡的時候", "世界又變得很大", "大到怎麼走都走不到", "一個想念的地方"], "note": "喜歡讓世界縮小，離開讓世界擴大。"}, {"title": "遲到的告白", "author": "林婉瑜", "body": ["如果告白有保存期限", "我的已經過期了三年", "但我還是把它打開——", "聞起來像陳年的葡萄酒", "", "有點酸，有點醇", "喝下去會微醺", "不至於醉", "但足以讓這個下午", "變得不太一樣"], "note": "過期的告白喝起來像陳年的酒。"}, {"title": "日子的模樣", "author": "林婉瑜", "body": ["如果日子有模樣", "今天是一隻貓", "懶洋洋地", "在窗臺上打盹", "", "昨天是一陣風", "來不及抓住就走了", "明天是一封信", "還在路上"], "note": "今天是貓，昨天是風，明天是信。"}, {"title": "安靜的革命", "author": "林婉瑜", "body": ["我在安靜裏", "發動了一場革命", "把所有的焦慮推翻", "把所有的擔心關進地牢", "", "然後我登基——", "成為自己心裏的王", "頒布第一道命令：", "今天不準不快樂"], "note": "安靜是最溫柔的革命方式。"}, {"title": "那些我們沒有去的地方", "author": "任明信", "body": ["那些我們沒有去的地方", "後來都去了別人的照片裏", "我在螢幕上滑過它們", "像滑過一個個平行宇宙", "", "也許在某個宇宙裏", "我們到了那裏", "拍了合照", "笑得像兩個不知道未來的人"], "note": "沒去的地方都住在平行宇宙裡。"}, {"title": "光年之外", "author": "任明信", "body": ["你在光年之外對我笑", "我接到的時候", "已經是下一個季節了", "", "這就是距離——", "不是空間的問題", "是時間的問題", "你的笑到達我的時候", "你可能已經在哭了"], "note": "距離讓笑容總是遲到一個季節。"}, {"title": "失眠的人", "author": "任明信", "body": ["失眠的人擁有整座城市", "所有的燈都是為他亮的", "所有的夜都是為他深的", "", "他一個人醒着", "像一家二十四小時營業的店", "門開着", "但沒有客人", "", "只有月光走進來", "翻了翻架上的書", "又安靜地走了"], "note": "失眠的人和月光是深夜唯二的客人。"}, {"title": "我用什麼把你留住", "author": "任明信", "body": ["我用什麼把你留住？", "用春天的花？它會謝。", "用夏天的風？它會停。", "用秋天的月？它會缺。", "用冬天的雪？它會融。", "", "最後我只能用一首詩", "一首不太好的詩", "但至少它不會消失——", "只要有人記得。"], "note": "詩是唯一不會融化的雪。"}, {"title": "溫柔的練習", "author": "任明信", "body": ["練習對自己溫柔", "像練習一種新的語言", "舌頭還不太靈活", "發音還不太標準", "", "但每天說一次", "「沒關係」", "「你已經很好了」", "「慢慢來」", "", "說久了", "也許就真的相信了"], "note": "對自己溫柔是一門需要每天練習的語言。"}, {"title": "你是浪，我是海", "author": "追奇", "body": ["你是浪", "我是海", "你總是跑遠", "我總是等你回來", "", "每一次你回來的時候", "都帶着一些新的沙子", "一些我不認識的溫度", "", "但沒關係", "海總是能容納", "每一種形狀的浪"], "note": "海從不抱怨浪走得太遠。"}, {"title": "致青春", "author": "追奇", "body": ["把青春摺成紙飛機", "丟出窗外", "它在風裏飛了很遠", "遠到我看不見", "", "多年後在某個角落撿到", "打開一看", "上面寫着：", "「記得要快樂」", "", "是我自己的字跡", "但我已經不認得了"], "note": "青春是一架忘了降落的紙飛機。"}, {"title": "擁抱的形狀", "author": "追奇", "body": ["擁抱的形狀", "是兩個人把孤獨", "暫時合在一起", "", "鬆開的時候", "孤獨還在", "但溫度留下了", "", "像冬天裏", "把手伸進口袋", "摸到昨天的暖暖包", "雖然已經涼了", "但知道它暖過"], "note": "擁抱過的溫度會留在口袋裡。"}, {"title": "給你", "author": "追奇", "body": ["給你一首詩", "不是因為我會寫詩", "是因為我想給你什麼", "卻什麼都沒有", "", "只好把文字排一排", "假裝那是禮物", "假裝你打開的時候", "會有一點點驚喜", "", "像打開一個空盒子", "發現裏面裝的是", "滿滿的想念"], "note": "空盒子裡裝的是滿滿的想念。"}, {"title": "日常的魔法", "author": "追奇", "body": ["每天早上醒來", "就是一種魔法", "——你又回到這個世界了", "", "刷牙是魔法", "把昨晚的夢洗掉", "出門是魔法", "把自己變成人羣的一部分", "", "而晚上回家", "脫掉鞋子的那一刻", "是最大的魔法——", "你又變回了你自己"], "note": "脫鞋的瞬間是變回自己的魔法。"}, {"title": "琴聲", "author": "柏樺", "body": ["琴聲穿過黃昏的薄霧", "像一根絲線", "把我的心從胸腔裏", "慢慢抽出來", "", "在空氣中振動", "和夕陽的頻率一致——", "我忽然明白了", "什麼叫做共鳴"], "note": "共鳴是心與世界同頻的瞬間。"}, {"title": "唯美主義者的回憶", "author": "柏樺", "body": ["那年秋天特別長", "長到我以為冬天不會來了", "我們在銀杏樹下喝茶", "落葉是金色的糖紙", "", "你說美好的事物都短暫", "我說那是因為", "我們還不夠專心——", "如果足夠專心", "一片落葉就是一整個秋天"], "note": "專心看一片落葉就能擁有整個秋天。"}, {"title": "在清朝", "author": "柏樺", "body": ["在清朝", "安閒是一匹馬", "從容地穿過小鎮的街道", "沒有人催促它", "", "在清朝", "時間是一壺茶", "可以喝一個下午", "直到杯底的葉子", "舒展成一座花園", "", "在清朝", "詩是慢的", "像毛筆", "一筆一劃"], "note": "在想像的清朝裡，時間慢得像一壺好茶。"}, {"title": "夏末", "author": "柏樺", "body": ["蟬聲漸漸小了", "像一臺收音機", "被誰轉低了音量", "", "夏天正在收拾行李", "把陽光摺好", "把午後的慵懶打包", "把蟬鳴裝進罐子裏", "", "它回頭看了一眼", "然後輕輕帶上了門"], "note": "夏天離開時會輕輕帶上門。"}, {"title": "路", "author": "芒克", "body": ["路是人走出來的", "可是走的人多了", "路反而不見了", "", "最清晰的路", "是隻有一個人走過的——", "草被壓彎", "又慢慢站起來", "像什麼都沒發生過"], "note": "最好的路走過之後不留痕跡。"}, {"title": "黃昏", "author": "芒克", "body": ["黃昏是一封信", "太陽用最後的光寫的", "收件人是夜晚", "", "信裏說什麼", "沒有人讀過", "因為每次打開信封", "字跡就消失了", "", "只留下一個空的信封", "顏色是橘紅的"], "note": "黃昏是太陽寫給夜晚的密信。"}, {"title": "旅行輓歌", "author": "波蘭・辛波絲卡", "body": ["一切都是我的，", "卻只暫時如此。", "記憶是我的，卻留不住什麼。", "身體是我的，卻遲早要交還。", "", "我把計劃放在桌上", "不知道它明天還算不算數。"], "note": "擁有的一切都只是暫時保管。"}, {"title": "致諾亞", "author": "波蘭・辛波絲卡", "body": ["致敬你，諾亞先生——", "你拯救了一切成雙成對的動物。", "但那些單獨的呢？", "那些孤單的一隻呢？", "", "它們在洪水裏遊着", "越遊越慢", "最後沉了下去", "連名字都沒留下。"], "note": "歷史只記得被拯救的，忘了那些沉沒的。"}, {"title": "讚美什麼都不懂", "author": "波蘭・辛波絲卡", "body": ["我不知道的事情比較多——", "這就是我和世界相處的方式。", "", "每次看見一隻甲蟲", "我都覺得很新鮮。", "每次聞到一朵花", "我都像第一次聞到。", "", "什麼都不懂——", "多好，這樣永遠都有驚喜。"], "note": "不懂是和世界保持新鮮感的方式。"}, {"title": "活着", "author": "日・谷川俊太郎", "body": ["活着", "是鳥兒在振翅", "是海浪在拍岸", "是蝸牛在爬行", "", "活着", "是此刻的呼吸", "是與你相遇", "是手的溫暖", "", "活着", "不需要理由"], "note": "活着本身就是最大的意義。"}, {"title": "早晨的接力", "author": "日・谷川俊太郎", "body": ["早晨從柬埔寨的森林開始", "從那裡到中國的田野", "然後到印度的河岸", "到伊朗的沙漠", "", "早晨像接力棒一樣", "被傳遞着——", "繞地球一圈", "又回到柬埔寨的森林", "", "在你還在睡覺的時候", "世界的某個角落", "有人剛剛醒來"], "note": "早晨是地球上永不停歇的接力。"}, {"title": "世界的約定", "author": "日・谷川俊太郎", "body": ["淚水的背後是微笑", "微笑的背後是淚水", "這是世界和我們的約定", "", "白天的背後是黑夜", "黑夜的背後是白天", "這是時間和我們的約定", "", "遇見的背後是離別", "離別的背後是遇見", "這是人和人的約定"], "note": "一切都有背面，這是世界的約定。"}, {"title": "等", "author": "日・谷川俊太郎", "body": ["等待的時候", "時間過得特別慢", "", "等巴士的時候", "等信的時候", "等一個人的時候", "", "但仔細想想", "我們的一生", "不就是在等", "一個還沒有名字的東西嗎？"], "note": "一生都在等一個說不出名字的什麼。"}, {"title": "謝謝", "author": "日・谷川俊太郎", "body": ["謝謝陽光", "謝謝空氣", "謝謝水和食物", "謝謝活着這件事", "", "謝謝悲傷", "因為它讓我知道了快樂", "謝謝失去", "因為它讓我珍惜擁有", "", "甚至謝謝那些", "讓我流淚的事情——", "因為之後我纔看清了", "世界的輪廓"], "note": "連眼淚都值得感謝。"}, {"title": "飛鳥集（選一）", "author": "印度・泰戈爾", "body": ["如果你因失去了太陽而流淚，", "那麼你也將失去羣星了。"], "note": "不要讓眼淚遮住了滿天星光。"}, {"title": "飛鳥集（選二）", "author": "印度・泰戈爾", "body": ["世界以痛吻我，", "要我報之以歌。"], "note": "將苦難化為歌聲是最大的勇氣。"}, {"title": "生如夏花", "author": "印度・泰戈爾", "body": ["生如夏花之絢爛，", "死如秋葉之靜美。", "", "讓生命像夏季的花朵那樣豐美，", "讓死亡像秋天的落葉那樣安詳。"], "note": "絢爛與靜美是生命的兩種完成。"}, {"title": "吉檀迦利（第35首）", "author": "印度・泰戈爾", "body": ["在那裏，心是無畏的，頭也抬得高昂；", "在那裏，知識是自由的；", "在那裏，世界還沒有被狹小的家園的墻隔成片段；", "在那裏，話是從真理的深處說出；", "在那裏，不懈的努力向着「完美」伸臂；", "", "進入那自由的天國，我的父啊，", "讓我的國家覺醒起來吧。"], "note": "自由是一個民族最美的覺醒。"}, {"title": "最遙遠的距離", "author": "印度・泰戈爾", "body": ["世界上最遙遠的距離", "不是生與死的距離", "而是我站在你面前", "你不知道我愛你", "", "世界上最遙遠的距離", "不是我站在你面前你不知道我愛你", "而是愛到癡迷", "卻不能說我愛你"], "note": "最遠的距離是說不出口的愛。"}, {"title": "園丁集（選一）", "author": "印度・泰戈爾", "body": ["眼睛為她下着雨，", "心卻為她打着傘，", "這就是愛情。"], "note": "愛是一邊為你流淚一邊為你撐傘。"}, {"title": "新月集（選一）", "author": "印度・泰戈爾", "body": ["孩子的眼睛裏", "住着整片海洋", "他們看世界的方式", "是我們遺失已久的語言", "", "如果我能回到那裏", "我要用一整個下午", "看一隻螞蟻搬家", "那會是我做過最重要的事"], "note": "孩子的眼睛裡住着我們遺失的世界。"}, {"title": "流螢集（選一）", "author": "印度・泰戈爾", "body": ["我存在，乃是所謂生命的一個永久的奇蹟。", "", "小草呀，你的足步雖小，", "但是你擁有你足下的土地。", "", "使生如夏花之美，", "使死若無物之輕。"], "note": "小草擁有腳下的土地，這就夠了。"}, {"title": "採果集（選一）", "author": "印度・泰戈爾", "body": ["讓我的愛", "像陽光一樣圍繞着你", "又給你以光輝燦爛的自由。", "", "不要讓我的愛", "成為你的束縛——", "讓它成為翅膀", "帶你飛到你想去的地方。"], "note": "真正的愛是翅膀而不是鎖鏈。"}, {"title": "漂鳥集（選一）", "author": "印度・泰戈爾", "body": ["我今晨坐在窗前，", "世界如一個路人似的，", "停留了一會，", "向我點點頭又走過去了。", "", "這些微思，是樹葉的簌簌之聲呀；", "它們在我的心裏歡悅地微語着。"], "note": "世界像路人點頭致意，溫柔又短暫。"}, {"title": "漂鳥集（選二）", "author": "印度・泰戈爾", "body": ["綠草求她地上的伴侶，", "樹木求他天空的寂寞。", "", "不要因為你自己是冬天", "就把孩子的春天當作夏天。", "", "我不能選擇那最好的。", "是那最好的選擇我。"], "note": "不是我們選擇了最好的，而是最好的選擇了我們。"}, {"title": "傷口是光進來的地方", "author": "波斯・魯米", "body": ["不要轉身離開你的傷口。", "不要試圖掩飾它。", "", "正是從那個傷口", "光才得以進入你的內在。", "", "沒有傷口的人", "是不透光的。"], "note": "傷口是光進入心靈的窗口。"}, {"title": "寂靜", "author": "波斯・魯米", "body": ["寂靜是上帝的語言，", "其他一切都只是拙劣的翻譯。", "", "當你安靜下來——", "不是嘴巴安靜，", "而是心安靜下來的時候，", "你才能聽見", "萬物都在說同一句話。"], "note": "心安靜下來才能聽見萬物的語言。"}, {"title": "愛的火焰", "author": "波斯・魯米", "body": ["愛是一把火", "燒掉了我是誰——", "剩下的灰燼裏", "長出了我真正是誰。", "", "不要怕燃燒", "蠟燭不燃燒", "就只是一根蠟", "而不是光。"], "note": "燃燒是蠟燭成為光的方式。"}, {"title": "鳥翼", "author": "波斯・魯米", "body": ["你生而有翼，", "為何寧願匍匐前行？", "", "你本可以飛翔——", "卻選擇在地上", "和石頭爭論路線。", "", "張開你的翅膀吧，", "天空一直在等你。"], "note": "生而有翼就不該選擇匍匐。"}, {"title": "不要悲傷", "author": "波斯・魯米", "body": ["不要悲傷。", "你失去的任何東西", "都會以另一種形式歸來。", "", "落下的葉子變成了泥土，", "泥土裏長出了新的花。", "", "孩子離開了母親的子宮——", "但他得到了整個世界。"], "note": "失去的一切都會以新的形式歸來。"}, {"title": "你在尋找什麼", "author": "波斯・魯米", "body": ["你在外面尋找的東西", "其實一直在裡面。", "", "你走遍了整個花園", "想找到那朵花——", "卻不知道", "你自己就是那座花園。", "", "回家吧。", "你找的人一直在那裏等你。", "那個人就是你自己。"], "note": "走遍花園才發現自己就是那座花園。"}, {"title": "讓自己變空", "author": "波斯・魯米", "body": ["讓自己變空。", "空的蘆笛才能唱出最美的歌。", "", "杯子裝滿了水就再也裝不下新的了——", "倒空它吧。", "讓新的水流進來。", "", "你不是要放棄一切，", "你只是要騰出空間", "給那些還沒到來的美好。"], "note": "空的蘆笛才能唱出最美的歌。"}, {"title": "舞蹈", "author": "波斯・魯米", "body": ["在悲傷和快樂之外", "有一片曠野。", "我會在那裏等你。", "", "當靈魂躺在那片草地上時，", "世界太滿了，", "甚至無法談論。", "", "思想、語言，甚至", "「彼此」這個詞", "都不再有意義。"], "note": "在悲喜之外有一片曠野，我在那裡等你。"}, {"title": "我要對你歌唱", "author": "智利・聶魯達", "body": ["我喜歡你是寂靜的，", "彷彿你已遠去。", "你聽見了嗎？遠處傳來的聲音——", "那是我的聲音在包圍着你。", "", "讓我在你的沉默裏安靜下來，", "讓我用你的沉默和你說話。", "你的沉默明亮如燈，", "簡單如指環。"], "note": "我喜歡你是寂靜的，像被遠去的你。"}, {"title": "今夜我可以寫出", "author": "智利・聶魯達", "body": ["今夜我可以寫出最悲傷的詩行。", "", "寫，譬如，「夜佈滿了星星，", "藍色的星辰在遠方顫動。」", "", "夜風在天際旋轉，歌唱。", "今夜我可以寫出最悲傷的詩行。", "我愛過她，有時候她也愛我。"], "note": "最悲傷的詩在最多星星的夜裡寫成。"}, {"title": "如果你忘了我", "author": "智利・聶魯達", "body": ["如果你忘了我，", "我希望你知道——", "在我身上什麼也不會改變。", "", "但如果你的每一次觸碰、每一句話", "漸漸在你心裏消失，", "那麼——", "也別回來找我了。", "", "因為我的愛", "像火焰一樣：", "要麼全部", "要麼什麼都沒有。"], "note": "愛要麼是全部，要麼什麼都沒有。"}, {"title": "頌歌：給平凡的事物", "author": "智利・聶魯達", "body": ["讓我讚美一隻洋蔥吧", "它的皮一層一層", "像透明的紗衣", "脫下一層還有一層", "", "讓我讚美一雙襪子", "兩個柔軟的管子", "裝着我的兩隻腳", "帶着我走遍世界", "", "平凡的事物啊", "你們纔是生活的本體"], "note": "平凡的事物纔是生活的本體。"}, {"title": "海", "author": "智利・聶魯達", "body": ["我需要大海，因為它教我——", "我不知道它教我什麼。", "也許教我存在，也許教我呼吸。", "", "也許教我成為一個", "不停拍打的浪。", "我不知道。", "我只知道每次它後退時，", "都帶走了我的一部分。"], "note": "大海每次退去都帶走了我的一部分。"}, {"title": "先知・論愛", "author": "黎巴嫩・紀伯倫", "body": ["當愛向你招手時，跟隨它，", "儘管它的道路艱難而陡峭。", "當它展翅擁抱你時，依順它，", "儘管藏在羽翼中的劍會傷害你。", "", "因為愛既給你加冕，也要將你釘上十字架。", "它既促進你的成長，也修剪你的枝葉。"], "note": "愛既為你加冕，也將你修剪。"}, {"title": "先知・論孩子", "author": "黎巴嫩・紀伯倫", "body": ["你們的孩子，都不是你們的孩子，", "乃是「生命」為自己所渴望的兒女。", "他們藉你們而來，卻不是從你們而來，", "他們雖和你們同在，卻不屬於你們。", "", "你們可以給他們以愛，", "卻不可以給他們以思想，", "因為他們有自己的思想。"], "note": "孩子藉我們而來，卻不屬於我們。"}, {"title": "先知・論自由", "author": "黎巴嫩・紀伯倫", "body": ["在城門口和爐火旁，", "我看見你們匍匐膜拜自己的自由，", "如同奴隸在暴君前卑躬屈膝。", "", "在廟宇的樹林裏，", "在城堡的陰影中——", "你真正的自由不在外面，", "而在你放開手的那一刻。"], "note": "真正的自由在放手的一刻開始。"}, {"title": "先知・論友誼", "author": "黎巴嫩・紀伯倫", "body": ["你的朋友是你的需求的回答。", "他是你用愛播種，", "用感恩收割的田地。", "他是你的餐桌和壁爐。", "", "因為你帶着飢渴來到他身邊，", "向他尋求平安。"], "note": "朋友是用愛播種用感恩收割的田。"}, {"title": "先知・論時間", "author": "黎巴嫩・紀伯倫", "body": ["你們想要測量時間——", "那無限的、無法測量的時間。", "你們想要以時辰和季節", "來指引你們的行為", "甚至引導你們的精神。", "", "但那無時間性的你自身", "知道生命是沒有時間的。", "昨天不過是今天的記憶，", "明天是今天的夢想。"], "note": "昨天是記憶，明天是夢，只有今天是真實。"}, {"title": "我不曾到過的地方", "author": "美・乃米莉・狄金森", "body": ["我不曾到過的地方", "帶着一種從容", "你的眼睛可以解開——", "你最輕微的注視便圍繞住我。", "", "在你面前我的手", "合攏——如花朵", "被冬天觸碰——"], "note": "有些地方只有一個人的眼睛能帶你去。"}, {"title": "靈魂選擇自己的伴侶", "author": "美・乃米莉・狄金森", "body": ["靈魂選擇自己的伴侶——", "然後關上門——", "對她神聖的多數人——", "不再理會任何人——", "", "即使馬車停在她低矮的門前——", "即使皇帝跪在她腳邊——", "她一動不動——", "因為她已經選好了。"], "note": "靈魂一旦選定，便對全世界關上了門。"}, {"title": "希望是長着羽毛的東西", "author": "美・乃米莉・狄金森", "body": ["希望是那件長着羽毛的東西——", "棲息在靈魂裏——", "唱着沒有歌詞的曲調——", "永遠不會停息——", "", "暴風中聽來最甜美——", "那場風暴若能阻止", "那隻溫暖了許多人的小鳥——", "它一定很痛苦。"], "note": "希望是暴風中也不停歌唱的小鳥。"}, {"title": "因為我不能停下等待死亡", "author": "美・乃米莉・狄金森", "body": ["因為我不能停下等待死亡——", "他友善地為我停下——", "馬車裏只有我們兩個——", "和永恆。", "", "我們慢慢地駛過——", "他不知道什麼是趕路——", "我也放下了", "工作和閒暇。"], "note": "死亡是一位不趕路的馬車夫。"}, {"title": "我是無名之輩", "author": "美・乃米莉・狄金森", "body": ["我是無名之輩！你是誰？", "你也是——無名之輩？", "那我們便是一對了——", "別聲張！他們會把我們趕走的——", "", "做個名人多無聊——", "多招搖——像一隻青蛙", "對着一片仰慕的泥沼", "整天叫着自己的名字！"], "note": "做無名之輩反而是最自在的。"}, {"title": "否認", "author": "希臘・瑟菲里斯", "body": ["在祕密的海濱上", "潔白如一隻鴿子", "我們渴了，在中午時分；", "但水是苦澀的。", "", "在金色的沙灘上", "我們寫下她的名字；", "但海風吹來", "將字跡抹去。"], "note": "海風會抹去沙上的名字，卻抹不去心裡的。"}, {"title": "國王的歸來", "author": "希臘・瑟菲里斯", "body": ["他回來了，帶着", "十年的鹽和海風。", "他的船已經腐朽", "他的水手已經衰老", "", "他站在港口", "認不出自己的國家——", "但一隻狗跑過來", "搖着尾巴。"], "note": "離開太久之後，只有狗還認得你。"}, {"title": "三月的水手", "author": "希臘・瑟菲里斯", "body": ["三月的水手出海了", "帶着一個新的夢想", "和一個舊的傷口", "", "海鷗在後面跟着", "不是因為愛他", "而是等他丟出麵包屑", "", "但水手不在乎", "他望着地平線", "那裡有他還不知道名字的島嶼"], "note": "出海是為了那些還沒名字的島嶼。"}, {"title": "神話故事", "author": "希臘・瑟菲里斯", "body": ["那個國王啊", "他出徵的時候以為自己會改變世界", "回來的時候才發現", "改變的只有自己", "", "他的妻子在窗前等他", "頭髮從黑變成了白", "他問她：等了多久？", "她說：剛好一生。"], "note": "等一個人回來，有時候剛好是一生。"}, {"title": "最後的港口", "author": "希臘・瑟菲里斯", "body": ["最後的港口", "不是最遠的那個", "而是你不再想離開的那個", "", "也許那裏沒有金銀財寶", "只有一盞燈", "和一個人", "在門口等你回來喫飯", "", "這就是旅行的意義——", "走了很遠", "才知道家在哪裡"], "note": "最後的港口是不再想離開的地方。"}, {"title": "聽聽那冷雨", "author": "余光中", "body": ["聽聽那冷雨，看看那冷雨", "嗅嗅聞聞那冷雨", "舔舔吧那冷雨", "", "雨是女性的，應該最富於感性", "雨氣空濛而迷幻", "細細嗅嗅，清清爽爽新新", "", "雨打在樹上和瓦上", "韻律都清脆可聽", "尤其是鏗鏗敲在屋瓦上", "那古老的音樂，屬於中國"], "note": "冷雨落在瓦上，敲醒的是故鄉的記憶。"}, {"title": "夢與地理", "author": "余光中", "body": ["夢見故鄉是一種病", "地理課本治不好的病", "那條河流的名字", "還是那樣地念不出來", "", "醒來以後", "枕頭上有淡淡的鹹味", "那是夢裡的海峽", "還是枕上的淚痕"], "note": "地圖上找得到的地方，夢裡卻永遠到不了。"}, {"title": "踢踢踏", "author": "余光中", "body": ["踢踢踏，踢踢踏", "孩子的木屐聲響在巷子裡", "從這一頭到那一頭", "", "青石板路上的迴音", "比母親叫我回家喫飯的聲音", "還要悠長", "", "踢踢踏，踢踢踏", "那聲音踏過了四十年", "還在耳邊"], "note": "木屐聲裡踏過的是童年，回不去的巷弄。"}, {"title": "算命瞎子", "author": "余光中", "body": ["悽涼的胡琴拉長了下午", "偏街小巷不見歸人", "也不見陌生的來者", "", "瞎子的竹杖點過了整條街", "點出了黃昏", "也點不出一個顧客的命運", "", "他坐在那裡，眼前漆黑", "卻替人算著光明的未來"], "note": "看不見光的人，替人點亮前程，這是命運最深的諷刺。"}, {"title": "九廣路上", "author": "余光中", "body": ["九廣路上，車聲隆隆", "窗外是中國的土地", "近了，更近了", "", "隔著一條窄窄的鐵軌", "那邊就是故鄉", "可我只能在車上看", "", "看那熟悉的山水", "像一幅掛在車窗上的畫", "怎麼也走不進去"], "note": "最近的距離，有時是最遠的鄉愁。"}, {"title": "牧神之午後", "author": "鄭愁予", "body": ["草原上有一棵睡了的橡樹", "午後的陽光像蜜一樣", "流過牧神的額角", "", "牧笛擱在膝上不吹了", "讓風自己去唱", "讓草自己去香", "", "牧神說：這樣的午後", "適合做一場沒有盡頭的夢"], "note": "午後的草原上，連夢都帶著陽光的味道。"}, {"title": "邊界酒店", "author": "鄭愁予", "body": ["在邊界的酒店裡飲酒", "在霧來的時候飲酒", "你問是什麼滋味", "", "是離別的滋味", "在邊界上，所有的酒", "都是送行的酒", "", "霧散了之後", "邊界就在腳下了", "跨過去便是異鄉"], "note": "邊界上的每一杯酒，都是對故鄉最後的回望。"}, {"title": "歲月", "author": "席慕蓉", "body": ["好多年前的那些個花", "還開在記憶的最深處", "", "好多年前的那些個夜", "還亮在夢的最靜處", "", "在揮霍了所有的時光之後", "我才知道", "真正一直在我身旁的", "不過就是那幾個名字而已"], "note": "揮霍了所有歲月之後，纔看見誰一直都在。"}, {"title": "石室之死亡", "author": "洛夫", "body": ["只偶然昂首向鄰居的甬道", "我便怔住", "在清晨，那人以裸體去背叛死", "", "任一切從石壁中滲出", "在木然與驚懼之間", "一隻蝴蝶飛過去了", "", "而石室之外", "陽光仍是黃金的火焰", "世界仍在繼續它的繁華"], "note": "石室裡是死亡的凝視，石室外是陽光的繁華。"}, {"title": "湖南大雪", "author": "洛夫", "body": ["車行六百里", "看盡了湖南的大雪", "小村莊埋在白茫茫中", "", "那裡有我未曾見過的母親的墳", "大雪覆蓋著", "像一封沒有地址的信", "", "而我就是那個", "找不到收件人的郵差"], "note": "大雪覆蓋了母親的墳，也覆蓋了兒子歸不去的路。"}, {"title": "眾荷喧嘩", "author": "洛夫", "body": ["眾荷喧嘩", "而你是靜", "眾荷喧嘩的倒影裡", "哪一朵纔是你", "", "你在水中央", "清風來時你搖一搖", "便足以讓整個夏天", "記住你的名字"], "note": "眾聲喧嘩之中，最安靜的那一朵最讓人記住。"}, {"title": "車上讀杜甫", "author": "洛夫", "body": ["在顛簸的公車上讀杜甫", "忽然覺得", "一千兩百年並不算太遠", "", "他的悲憤我嘗得到", "他的飢寒我感覺得到", "他的流離我正在經歷", "", "唯一不同的是", "窗外的戰亂已變成了塞車"], "note": "一千兩百年後讀杜甫，悲歡離合竟然差不了多少。"}, {"title": "生活", "author": "北島", "body": ["網"], "note": "一個字道盡生活的困境——我們都在網中掙扎。"}, {"title": "門前", "author": "顧城", "body": ["我多麼希望，有一個門口", "早晨，陽光照在草上", "", "我們站著", "扶著自己的門窗", "門很低，但太陽是明亮的", "", "草在結它的種子", "風在搖它的葉子", "我們站著，不說話", "就十分美好"], "note": "最好的時光是站在門前，什麼都不說，陽光就夠了。"}, {"title": "簡歷", "author": "顧城", "body": ["我是一個悲哀的孩子", "始終沒有長大", "", "我從北方到南方", "從春天到秋天", "", "我用手指在地上寫了", "一個名字", "被路過的人踩了又踩", "但仍然清晰"], "note": "名字被踩了無數次仍然清晰，像倔強本身。"}, {"title": "祖國或以夢為馬", "author": "海子", "body": ["我要做遠方的忠誠的兒子", "和物質的短暫情人", "和所有以夢為馬的詩人一樣", "", "我不得不和烈士和小丑走在同一道路上", "萬人都要將火熄滅", "我一人獨將此火高高舉起", "", "此火為大，開花落英於神聖的祖國", "和所有以夢為馬的詩人一樣", "我藉此火得度一生的茫茫黑夜"], "note": "萬人慾滅的火，一人高高舉起，以夢為馬走過黑夜。"}, {"title": "春天十個海子", "author": "海子", "body": ["春天，十個海子全都復活", "在光明的景色中", "嘲笑這一個野蠻而悲傷的海子", "", "你這麼長久地沉睡到底是為了什麼", "", "春天，十個海子低低地怒吼", "圍著你和我跳舞、唱歌", "扯亂你的黑頭髮，騎上你飛奔而去，塵土飛揚", "", "你被劈開的疼痛在大地彌漫"], "note": "十個海子在春天復活，卻只有一個留在了人間。"}, {"title": "牆", "author": "舒婷", "body": ["我無法反抗牆", "只有反抗的願望", "", "從星星的彈孔中", "將流出血紅的黎明", "", "我用最後的力氣", "對著牆喊出我的名字", "牆沒有回答", "卻有了裂縫"], "note": "對著牆喊出名字，牆沒有倒，但裂縫已經出現。"}, {"title": "雲遊", "author": "徐志摩", "body": ["那天你翩翩的在空際雲遊", "自在，輕盈，你本不想停留", "在天的那方或地的那角", "你的愉快是無攔阻的逍遙", "", "你更不經意在卑微的地面", "有一流澗水，雖則你的明豔", "在過路時點染了他的空靈", "使他驚醒，將你的倩影抱緊"], "note": "雲遊過人間，不經意間點染了一條溪水的空靈。"}, {"title": "海韻", "author": "徐志摩", "body": ["女郎，回家吧，女郎！", "前面是插天的怪石，又有大浪", "", "女郎，單身的女郎", "她向著大海走去", "在星光下，在涼風裡", "", "女郎，散髮的女郎", "她在沙灘上唱著", "暮色裡的大海蒼茫如夢"], "note": "海邊的女郎不回頭，大海的召喚比歸家更強烈。"}, {"title": "殘詩", "author": "徐志摩", "body": ["怨誰？怨誰？這不是青天裡打了一個霹靂", "關著門，這一間屋子裡有的是春意", "", "我的指頭還在那裡發抖", "心窩裡的溫存還沒有冷", "", "怨誰？怨誰？", "殘了的只是這一首詩", "不殘的是我對你的心意"], "note": "詩可以殘缺，但心意從來不會。"}, {"title": "降落傘", "author": "夏宇", "body": ["我們從天空降落", "像兩朵過期的蒲公英", "你往東我往西", "", "風說了算"], "note": "分離有時只是風的決定。"}, {"title": "第一人稱", "author": "夏宇", "body": ["我說我的時候", "其實是在說一個陌生人", "她住在鏡子的另一邊", "穿我昨天的衣服", "", "做我明天的夢"], "note": "認識自己是一生最遠的旅行。"}, {"title": "連續動作", "author": "夏宇", "body": ["拆開信 讀信 摺好信", "放回信封", "再拆開信 再讀一次", "", "一個下午就這樣過了", "像翻閱一本只有一頁的書"], "note": "重複的動作裡藏著不甘心的柔情。"}, {"title": "腹語術", "author": "夏宇", "body": ["我讓嘴脣靜止", "讓胃替我說話", "讓骨頭替我唱歌", "", "你聽見的聲音", "都不是從正確的地方發出的", "愛情也是"], "note": "真正的聲音往往來自意想不到的地方。"}, {"title": "乘法", "author": "夏宇", "body": ["一個人的寂寞乘以兩個人", "不是兩倍的寂寞", "是寂寞的平方", "", "我們在彼此的孤獨裡", "找到了更大的孤獨"], "note": "有些孤獨因為共享而加倍放大。"}, {"title": "透明筆記", "author": "夏宇", "body": ["用透明的墨水寫信", "在透明的紙上", "寄到一個透明的地址", "", "收件人是空氣", "牠一直都在", "只是從不回信"], "note": "有些話說了等於沒說，沒說又等於說了。"}, {"title": "消失的城", "author": "零雨", "body": ["霧從河面升起", "吞沒了整座城市", "我站在橋上", "看自己的輪廓漸漸模糊", "", "像一個未完成的句子", "等待句號降臨"], "note": "在霧中我們纔看見自己的邊界。"}, {"title": "木質的時間", "author": "零雨", "body": ["年輪是樹的日記", "每一圈都記載一場風暴", "和一次痊癒", "", "我們砍倒它的時候", "才讀到全部的故事"], "note": "有些紀錄要等到結束才能完整閱讀。"}, {"title": "雨的文法", "author": "零雨", "body": ["雨是天空的標點符號", "逗號落在屋簷", "句號沉入池塘", "", "而我一直等待的那個驚嘆號", "始終沒有落下"], "note": "等待本身就是一首安靜的詩。"}, {"title": "玻璃房間", "author": "零雨", "body": ["把所有的牆換成玻璃", "讓陽光進來", "讓目光進來", "", "然後發現", "透明並不等於坦誠", "看見並不等於理解"], "note": "真正的透明是心靈的而非物質的。"}, {"title": "致沉默者", "author": "零雨", "body": ["你的沉默像一口深井", "我往裡面投石頭", "等了很久很久", "", "始終沒有聽見", "水的回聲"], "note": "沉默有時比任何回答都深邃。"}, {"title": "光之書", "author": "羅智成", "body": ["我把所有的光收集起來", "裝訂成冊", "封面是黎明", "封底是黃昏", "", "你翻開任何一頁", "都是正午"], "note": "記憶挑選的永遠是最明亮的時刻。"}, {"title": "夢中書房", "author": "羅智成", "body": ["在夢裡我有一座書房", "書架上排列著", "所有我沒有寫出的詩", "", "每一本都很厚", "每一頁都是空白", "卻散發著墨香"], "note": "未寫出的詩或許纔是最完美的。"}, {"title": "寶寶之書", "author": "羅智成", "body": ["寶寶用手指翻閱世界", "每一棵草都是新的", "每一隻蟲都是奇蹟", "", "他還不知道名字這回事", "所以萬物都還是自由的"], "note": "命名之前，世界保持著最初的神祕。"}, {"title": "黑色鑰匙", "author": "羅智成", "body": ["我有一把黑色的鑰匙", "打不開任何一扇門", "但每扇門看見它", "都會輕輕顫抖", "", "彷彿記起了", "某次被開啟的經驗"], "note": "真正的鑰匙打開的不是鎖，是記憶。"}, {"title": "星圖", "author": "羅智成", "body": ["如果把你去過的地方", "都用線連起來", "從高空俯瞰", "", "那會是一個什麼樣的星座", "是否能替迷路的人指引方向"], "note": "每個人的一生都是一幅獨特的星圖。"}, {"title": "傳說", "author": "楊牧", "body": ["有一座島", "四面被海水擁抱", "島上的人說著一種語言", "只有風聽得懂", "", "每當颱風來臨", "就是風在覆誦", "島嶼的故事"], "note": "每座島嶼都有隻屬於自己的語言。"}, {"title": "北斗行", "author": "楊牧", "body": ["七顆星掛在夜空", "像誰遺落的棋子", "千年的旅人都曾抬頭", "辨認回家的方向", "", "但北方是一個概念", "不是一個地址"], "note": "方向感來自心靈，不來自星辰。"}, {"title": "帶你回花蓮", "author": "楊牧", "body": ["讓我帶你回花蓮", "看太魯閣的大理石", "如何在億萬年裡", "學會沉默", "", "看太平洋的浪", "如何在岸邊", "反覆練習擁抱"], "note": "花蓮是山與海一起寫成的情書。"}, {"title": "秋日書簡", "author": "楊牧", "body": ["秋天的信都比較長", "因為要交代落葉的去向", "和候鳥的行程", "", "最後一段總是寫著：", "天涼了", "你要照顧自己"], "note": "秋天的叮嚀裡藏著一整年的牽掛。"}, {"title": "秋歌——給暖暖", "author": "瘂弦", "body": ["落葉完成了最後的顫抖", "荻花在湖沼的藍睛裡消失", "七月的砧聲遠了", "", "暖暖", "你的名字是一個溫度", "在秋天裡"], "note": "有些名字本身就能取暖。"}, {"title": "火雞", "author": "商禽", "body": ["火雞張開尾巴", "像打開一把扇子", "替自己喝采", "", "牠不知道", "所有的讚美都是為了", "感恩節那頓晚餐"], "note": "被讚美的時候要想想讚美的動機。"}, {"title": "夢或者黎明", "author": "商禽", "body": ["黎明來的時候", "夢就碎了", "像一面鏡子", "掉在石頭地板上", "", "我撿起其中一片", "看見半張臉", "不確定是夢裡的還是醒後的"], "note": "夢與醒之間的那條線永遠是模糊的。"}, {"title": "戰神", "author": "瘂弦", "body": ["把劍插在泥土裡", "劍生了鏽", "鏽開了花", "", "一千年後", "沒有人記得戰爭", "只記得那朵鏽色的花"], "note": "時間把所有的武器都變成花園。"}, {"title": "苦苓林的一夜", "author": "瘂弦", "body": ["苦苓樹在月光下", "投下苦澀的影子", "我坐在影子裡", "嚐到了夜的味道", "", "是淡淡的苦", "像煮過三次的茶"], "note": "有些苦味要靜靜品嚐才知道其中的甘。"}, {"title": "廟", "author": "瘂弦", "body": ["香灰堆了三百年", "佛像的金身斑駁了", "但每個跪下的人", "膝蓋都是新的", "", "苦難永遠是新的", "祈禱也是"], "note": "古老的廟宇接住的永遠是嶄新的悲傷。"}, {"title": "蛇", "author": "瘂弦", "body": ["蛇蛻下了舊皮", "像脫掉一件不合身的衣裳", "陽光下牠的新皮閃亮", "", "但那些舊的花紋", "已經記不得了", "連自己曾經是誰", "也記不得了"], "note": "重生的代價是遺忘。"}, {"title": "暗房", "author": "向陽", "body": ["在暗房裡", "影像慢慢浮現", "像記憶從遺忘中醒來", "", "越暗的地方", "越看得見光", "越安靜的時候", "越聽得見心跳"], "note": "黑暗是光影的故鄉。"}, {"title": "母語", "author": "向陽", "body": ["母親說的話", "是我最早的家", "每一個音節", "都是一根屋樑", "", "離家以後", "我用國語蓋了新房子", "但夢裡說的", "還是母語"], "note": "母語是靈魂的原址，搬不走的。"}, {"title": "河流的意見", "author": "陳義芝", "body": ["河流不發表意見", "它只是流", "遇到石頭就繞過去", "遇到懸崖就跳下去", "", "它的沉默", "比所有的演說都雄辯"], "note": "行動是最有力的發言。"}, {"title": "新婚", "author": "陳義芝", "body": ["我們把兩套餐具", "放進同一個碗櫃", "從此", "你的碗緊挨著我的碗", "", "每天清洗", "每天碰撞", "像兩個人的日子"], "note": "婚姻就是在碰撞中學會溫柔相靠。"}, {"title": "老樹", "author": "陳義芝", "body": ["老樹站在那裡", "看了一百年的風景", "它的根已經到了路的下面", "枝葉蓋住半條街", "", "有人想砍掉它", "它什麼也沒說", "只是繼續站著"], "note": "沉默地站著，就是最有力的抗議。"}, {"title": "字", "author": "陳義芝", "body": ["一筆一劃", "像蓋一座小小的房子", "橫是屋頂", "豎是柱子", "點是窗戶", "", "我在字裡住了一輩子", "還是沒有完全認識它"], "note": "文字是住了一輩子仍覺神祕的居所。"}, {"title": "當我成為一首詩", "author": "許悔之", "body": ["如果我死了", "請把我寫成一首詩", "不要太長", "五行就好", "", "前三行給風景", "後兩行留給你", "想我的時候念一念"], "note": "被念誦就是另一種形式的活著。"}, {"title": "雨天的巴哈", "author": "許悔之", "body": ["雨天聽巴哈", "每一個音符都像雨滴", "落在心裡不同的位置", "", "有些地方積水了", "那是悲傷", "有些地方開花了", "那是感動"], "note": "音樂和雨都是心靈的灌溉。"}, {"title": "致親愛的", "author": "許悔之", "body": ["親愛的", "我把早晨的第一杯水", "留給你", "把夜晚最後的燈", "也留給你", "", "中間那些", "嘈雜而疲倦的時刻", "我自己吞下去"], "note": "愛是把最好的留給對方，把餘下的留給自己。"}, {"title": "抄經", "author": "許悔之", "body": ["一筆一劃抄寫經文", "像螞蟻搬運沙粒", "一粒一粒", "", "不是為了蓋什麼", "只是搬運本身", "就讓人安靜"], "note": "重複的虔誠裡有最深的安寧。"}, {"title": "茶的前世", "author": "許悔之", "body": ["這杯茶的前世", "是一場三月的雨", "一陣四月的風", "和一個採茶女的手溫", "", "我喝下去的時候", "喝下了一整個春天"], "note": "一杯茶裡泡著整個宇宙的因緣。"}, {"title": "禮物", "author": "波蘭・米沃什", "body": ["如此幸福的一天", "霧很早就散了", "我在花園裡工作", "蜂鳥停在忍冬花上", "", "這世界上沒有一樣東西", "是我想要佔有的", "我知道沒有一個人", "值得我去嫉妒"], "note": "不佔有的幸福纔是最完整的幸福。"}, {"title": "但是還有書籍", "author": "波蘭・米沃什", "body": ["世界末日也不能把書毀滅", "書比我們持久", "比大教堂持久", "比國家持久", "", "當一切消失之後", "還有書籍", "還有那些顫抖的字句"], "note": "書籍是文明最堅韌的遺囑。"}, {"title": "遲到的懺悔", "author": "波蘭・米沃什", "body": ["我欠這個世界一個道歉", "為了我活著的時候", "沒有好好看過", "路邊的那棵槐樹", "", "它每年春天都替我開花", "我卻從未停下腳步"], "note": "遲來的注視好過永遠的忽略。"}, {"title": "超越", "author": "波蘭・米沃什", "body": ["我想超越語言的邊界", "到達那個", "字與字之間的空白地帶", "", "那裡住著真正的意義", "像魚住在水裡", "你看不見水", "但魚一刻也離不開"], "note": "語言之外的沉默纔是意義的居所。"}, {"title": "一個聲音", "author": "波蘭・米沃什", "body": ["多年以後我還是聽見", "那個聲音", "從被燒毀的城市裡傳來", "", "它不是哭喊", "而是一首搖籃曲", "有人在廢墟裡", "哄孩子入睡"], "note": "廢墟中的溫柔比任何控訴都震撼。"}, {"title": "窗", "author": "波蘭・米沃什", "body": ["從這扇窗看出去", "是一棵蘋果樹", "從那扇窗看出去", "是一片墓園", "", "我站在兩扇窗之間", "決定今天", "從哪一邊醒來"], "note": "每天都在生與死之間選擇一個角度。"}, {"title": "信仰", "author": "波蘭・米沃什", "body": ["我相信什麼呢", "相信這棵樹的根", "比我的懷疑更深", "相信這條河的流速", "比我的猶豫更快", "", "大自然不需要信仰", "它直接存在"], "note": "最可靠的信仰是萬物自身的存在。"}, {"title": "城市", "author": "波蘭・米沃什", "body": ["城市蓋在死者的上面", "每一條街道下面", "都有更古老的街道", "每一棟建築的地基裡", "都埋著別人的屋瓦", "", "我們走路的時候", "總是踩在時間的肩膀上"], "note": "每座城市都是一部立體的史書。"}, {"title": "花園", "author": "波蘭・米沃什", "body": ["在花園裡我找到了秩序", "每一朵花都知道自己的位置", "每一棵草都守住自己的邊界", "", "只有人", "在各種花之間", "猶豫著不知道", "自己該長成什麼樣子"], "note": "花從不懷疑自己要開成什麼顏色。"}, {"title": "遺忘", "author": "波蘭・米沃什", "body": ["遺忘不是消失", "是沉到更深的地方", "像沉船在海底", "慢慢長出珊瑚", "", "有一天你潛下去", "發現那艘船", "已經成為礁石的一部分"], "note": "遺忘只是記憶換了一種存在方式。"}, {"title": "我學會了在黑暗中生活", "author": "俄・阿赫瑪託娃", "body": ["我學會了在黑暗中生活", "像盲人學會了用手指閱讀", "夜晚有它自己的光", "只是需要另一種眼睛", "", "當你習慣了黑暗", "你就能看見星星", "它們一直都在"], "note": "黑暗教會我們用另一種方式看見。"}, {"title": "安魂曲", "author": "俄・阿赫瑪託娃", "body": ["在監獄的門口我站了十七個月", "和其他的母親們一起", "我們的眼淚已經流乾了", "只剩下鹽漬的面頰", "", "有人問我能不能描述這一切", "我說：我能"], "note": "記錄苦難是倖存者最沉重的義務。"}, {"title": "最後的玫瑰", "author": "俄・阿赫瑪託娃", "body": ["花園裡最後一朵玫瑰", "被霜凍住了", "但它的香氣", "還在空氣裡遊蕩", "", "像一個已經離去的人", "留下的香水味"], "note": "美在消逝之後留下最濃烈的餘韻。"}, {"title": "勇氣", "author": "俄・阿赫瑪託娃", "body": ["我們知道天秤上是什麼", "此刻正在被衡量的是什麼", "勇氣的時刻已經敲響", "勇氣不會離棄我們", "", "我們將保存你，俄語", "偉大的俄語", "讓你自由而純潔地流傳"], "note": "守護語言就是守護一個民族的靈魂。"}, {"title": "夜鶯與玫瑰", "author": "俄・阿赫瑪託娃", "body": ["夜鶯不知道玫瑰有刺", "牠只是唱歌", "唱到天亮", "", "玫瑰不知道夜鶯在唱", "牠只是開花", "開到凋謝", "", "他們彼此相愛", "卻從不知情"], "note": "最純粹的愛是不自知的。"}, {"title": "離別", "author": "俄・阿赫瑪託娃", "body": ["火車開走了", "月臺上的人越來越小", "小到可以裝進眼睛裡", "", "然後裝進記憶裡", "然後裝進夢裡", "越來越小", "但從未消失"], "note": "離別讓人縮小，記憶讓人永恆。"}, {"title": "我的聲音", "author": "俄・阿赫瑪託娃", "body": ["我的聲音不夠大", "大到讓全世界聽見", "但足夠小", "小到剛好鑽進", "一個人的耳朵", "", "一個人就夠了", "如果那個人在聽"], "note": "一首詩只需要一個真正的讀者。"}, {"title": "海邊的房子", "author": "俄・阿赫瑪託娃", "body": ["海邊的房子空了", "窗簾還在風中飄", "像揮手的人已經走了", "手還留在那裡", "", "海浪日夜敲門", "沒有人來應"], "note": "空房子裡住著最忠實的等待。"}, {"title": "白夜", "author": "俄・阿赫瑪託娃", "body": ["彼得堡的白夜", "天不肯黑", "像一個孩子", "怎麼也不肯去睡", "", "我們在這永恆的黃昏裡", "說了太多的話", "又或者太少"], "note": "白夜讓所有的告白都失去了時限。"}, {"title": "詩人之死", "author": "俄・阿赫瑪託娃", "body": ["他們封住了他的嘴", "但他的詩已經在空氣裡了", "你不能把空氣也封住", "", "風會替他說話", "牆壁會記住他的聲音", "連沉默都會引用他的句子"], "note": "真正的詩是封不住的風。"}, {"title": "致一百年後的你", "author": "俄・阿赫瑪託娃", "body": ["一百年後的讀者", "你好", "我是一個曾經活過的女人", "在戰爭和飢餓之間", "寫了一些詩", "", "如果你讀到這裡", "請替我看看窗外", "春天來了嗎"], "note": "詩是寫給未來的信，永遠期待春天。"}, {"title": "沉默的語言", "author": "俄・曼德爾施塔姆", "body": ["沉默有它自己的文法", "停頓是逗號", "嘆息是驚嘆號", "淚水是省略號", "", "我們最想說的話", "往往用沉默來表達"], "note": "沉默是另一種修辭。"}, {"title": "世紀", "author": "俄・曼德爾施塔姆", "body": ["世紀啊，我的野獸", "誰能看進你的眼睛", "誰能用自己的血", "來粘合兩個世紀的脊椎", "", "血像溫暖的軟骨", "在歲月的咽喉裡流淌"], "note": "每個世紀都需要用血來續接。"}, {"title": "列寧格勒", "author": "俄・曼德爾施塔姆", "body": ["我回到了我的城市", "熟悉得像眼淚", "像靜脈", "像童年的腮腺炎", "", "彼得堡我還不想死", "你那裡還有我的電話號碼"], "note": "故鄉是一通永遠打不完的電話。"}, {"title": "馬蹄鐵", "author": "俄・曼德爾施塔姆", "body": ["一枚馬蹄鐵", "釘在時間的門上", "據說能帶來好運", "", "但馬已經走遠了", "留下的只是", "鐵鏽和一個方向"], "note": "好運的象徵留下了，好運本身卻走遠了。"}, {"title": "穹頂", "author": "俄・曼德爾施塔姆", "body": ["教堂的穹頂裡", "回聲比祈禱活得更久", "一個聲音升上去", "撞到頂部", "再落下來的時候", "", "已經不是同一個聲音了", "像人生的去與回"], "note": "每一次回聲都是原聲的重新詮釋。"}, {"title": "石頭", "author": "俄・曼德爾施塔姆", "body": ["我拿起一塊石頭", "問它記不記得", "曾經是山的一部分", "", "石頭沒有回答", "但它的沉重", "像一種鄉愁"], "note": "碎片永遠帶著整體的重量。"}, {"title": "蜜蜂", "author": "俄・曼德爾施塔姆", "body": ["把我帶到蜜蜂的國度去", "那裡時間是甜的", "勞動是六角形的", "", "每一滴蜜", "都是一千次飛行的總結", "和一千朵花的回憶"], "note": "甜蜜是無數辛勤的濃縮。"}, {"title": "失眠", "author": "俄・曼德爾施塔姆", "body": ["失眠的夜", "我數著船隻", "一艘一艘駛向黑暗", "", "荷馬的名單", "那些船", "那些王", "那些永遠回不了家的人"], "note": "失眠的夜最適合想起古老的離散。"}, {"title": "詞語", "author": "俄・曼德爾施塔姆", "body": ["詞語死去的時候", "會變成蝴蝶", "在書頁之間飛", "", "你翻書的時候", "偶爾會感到一陣風", "那是詞語的翅膀"], "note": "書頁間的風是語言最輕盈的存在。"}, {"title": "麵包", "author": "俄・曼德爾施塔姆", "body": ["給我一塊黑麵包", "和一段寒冷的路", "我就能寫出", "一首關於溫暖的詩", "", "因為只有挨過餓的人", "才真正懂得", "麵包的意義"], "note": "匱乏是理解豐盛的最佳老師。"}, {"title": "未走之路", "author": "美・佛洛斯特", "body": ["黃色的樹林裡分出兩條路", "可惜我不能同時去涉足", "我在那路口久久佇立", "向著一條路極目望去", "直到它消失在叢林深處", "", "我選了另一條路", "荒草萋萋 十分幽寂", "這是多年後我會嘆息的事"], "note": "每一次選擇都是對另一種人生的告別。"}, {"title": "雪夜林邊佇立", "author": "美・佛洛斯特", "body": ["這片林子我想我知道是誰的", "他的家住在村子裡", "他不會看見我在這裡停留", "看他的林子白雪漫漫", "", "但我還有諾言尚未實現", "而且還要趕好幾里路才能安眠"], "note": "在美景與責任之間，人總得繼續趕路。"}, {"title": "修牆", "author": "美・佛洛斯特", "body": ["有一種東西不喜歡牆", "想把它推倒", "每年春天凍土隆起", "都要把牆上的石頭震落", "", "鄰居說好籬笆造就好鄰居", "我卻想問", "為什麼好籬笆能造就好鄰居"], "note": "拆牆的衝動和築牆的習慣一樣古老。"}, {"title": "摘蘋果之後", "author": "美・佛洛斯特", "body": ["長梯還靠在蘋果樹上", "指向天空", "我的腳趾還記得", "橫檔的壓痛", "", "今晚我會夢見蘋果", "一個一個", "從枝頭落下", "撞到地面都不會醒"], "note": "疲倦的身體最容易做出甜美的夢。"}, {"title": "火與冰", "author": "美・佛洛斯特", "body": ["有人說世界將毀於火", "有人說毀於冰", "從我對慾望的體驗", "我贊同那些說火的人", "", "但如果世界要毀滅兩次", "我想我對恨也有足夠的認識", "冰的力量也綽綽有餘"], "note": "慾望和仇恨，是毀滅的一體兩面。"}, {"title": "白樺樹", "author": "美・佛洛斯特", "body": ["我喜歡看白樺樹彎下腰", "像小男孩盪鞦韆把它壓彎的", "但鞦韆盪完了", "樹還是直不回來", "", "像某些經歷", "把人壓彎之後", "再也回不到原來的樣子"], "note": "承受過重力的事物都帶著彎曲的記憶。"}, {"title": "荒野之路", "author": "美・佛洛斯特", "body": ["我走了一條荒野之路", "路上只有我的影子陪我", "偶爾有風吹過來", "像大地的呼吸", "", "我不害怕", "因為路本身就是目的地"], "note": "走路這個動作本身就是抵達。"}, {"title": "割草", "author": "美・佛洛斯特", "body": ["鐮刀在草地上低語", "它說的不是夢話", "不是關於懶洋洋的幸福", "", "而是關於事實", "關於勞動", "關於用自己的手", "把世界整理得整齊一些"], "note": "勞動的低語比幻想的吶喊更真實。"}, {"title": "設計", "author": "美・佛洛斯特", "body": ["一隻白蜘蛛蹲在白花上", "抓住了一隻白色的蛾", "三種白色的東西", "組成一個微小的陷阱", "", "是什麼設計了這白色的恐怖", "或者根本沒有設計", "事情就這樣發生了"], "note": "偶然與必然之間，藏著最深的恐懼。"}, {"title": "泥潭", "author": "美・佛洛斯特", "body": ["春天的泥潭", "困住了最早出發的人", "但泥潭下面", "
