是去年秋天的落葉", "", "腐爛是另一種形式的滋養", "被困住也是一種停留"], "note": "困境的底部往往是滋養的開始。"}, {"title": "自我之歌", "author": "美・惠特曼", "body": ["我歌頌自己", "一個原子也不比另一個原子卑微", "我身體裡的每一個原子", "同樣屬於你", "", "我邀請我的靈魂", "我俯下身去", "從容地觀察一片夏天的草葉"], "note": "每一片草葉都值得宇宙般的凝視。"}, {"title": "大路之歌", "author": "美・惠特曼", "body": ["踏上大路吧", "健康的 自由的 在我面前的世界", "漫長的褐色大路在前面引導我", "我要到任何我想去的地方", "", "從此不再要求好運", "我自己就是好運"], "note": "上路的人自身就是最好的運氣。"}, {"title": "噢船長我的船長", "author": "美・惠特曼", "body": ["噢船長 我的船長", "我們可怕的航程已經結束", "船已經渡過了每一個難關", "我們追求的目標已經達到", "", "港口就在眼前 我聽見鐘聲", "人們都在歡呼", "但噢那流著鮮血的甲板", "船長躺在那裡 倒下了 冰冷了"], "note": "勝利的岸邊，最痛的是看見倒下的領路人。"}, {"title": "我聽見美洲在歌唱", "author": "美・惠特曼", "body": ["我聽見美洲在歌唱", "各種各樣的歌", "機工在唱 木匠在唱", "鞋匠在唱", "", "每個人唱著屬於自己的歌", "強壯而悅耳", "在白天唱著白天的歌", "在夜晚唱著夜晚的歌"], "note": "每個勞動者都是一首獨立的歌。"}, {"title": "我在橡樹林中看見", "author": "美・惠特曼", "body": ["我在路易斯安那看見一棵橡樹", "它獨自站立 枝上掛著苔蘚", "沒有同伴", "卻發出快樂的綠葉", "", "我做不到", "我需要朋友在身旁", "才能發出我的綠葉"], "note": "樹可以獨自繁茂，人卻需要同伴才能生長。"}, {"title": "渡布魯克林渡口", "author": "美・惠特曼", "body": ["一百年後的人啊", "你們也會看見這潮水", "你們也會站在船欄邊", "看曼哈頓的輪廓", "", "時間流過我們中間", "但河水是一樣的", "陽光是一樣的"], "note": "穿越時間的不是人，是目光所及的風景。"}, {"title": "一片草葉", "author": "美・惠特曼", "body": ["一個孩子問我", "草是什麼", "他雙手捧著一把草遞給我", "", "我怎麼知道草是什麼呢", "也許它是希望的旗幟", "也許它是上帝的手帕", "誰知道呢"], "note": "最簡單的問題往往通向最深邃的思考。"}, {"title": "這堆肥", "author": "美・惠特曼", "body": ["大地啊你用腐爛做了什麼", "你把所有的屍體都吞了下去", "然後長出玫瑰", "長出蘋果", "長出可以擁抱的身體", "", "大地你真是了不起的化學家"], "note": "死亡是大地最擅長的化學轉換。"}, {"title": "寂靜的陣營", "author": "美・惠特曼", "body": ["夜晚我走過營地", "士兵們都睡了", "他們的臉在月光下", "像是一些孩子的臉", "", "明天他們要上戰場", "但今晚他們在做夢", "夢裡沒有戰爭"], "note": "睡夢是戰爭借不走的和平。"}, {"title": "給守望者", "author": "美・惠特曼", "body": ["繼續守望吧", "在最暗的夜裡", "你的眼睛就是燈塔", "你的堅持就是方向", "", "不是因為你看見了什麼", "而是因為你不肯閉上眼睛"], "note": "守望的意義不在看見，在於不肯別過頭去。"}, {"title": "夜鶯頌", "author": "英・濟慈", "body": ["我的心在痛", "一種昏昏欲睡的麻木", "折磨著我的感官", "彷彿我剛剛喝下了毒汁", "", "不是因為嫉妒你的幸福", "而是因為你的幸福讓我太快樂了", "你這輕翼的林中精靈"], "note": "美帶來的幸福有時痛得像毒藥。"}, {"title": "希臘古甕頌", "author": "英・濟慈", "body": ["你是寂靜的 未被蹂躪的新娘", "你是沉默和悠悠歲月的養女", "森林的歷史家", "你述說著一個花的故事", "", "美就是真 真就是美", "這就是你們在地上所知道的一切", "也是你們所需要知道的一切"], "note": "美與真的統一是藝術最高的啟示。"}, {"title": "秋頌", "author": "英・濟慈", "body": ["霧氣洋溢 果實圓熟的秋", "你和成熟的太陽成為密友", "合謀用累累的珠球", "綴滿茅屋簷下的葡萄藤", "", "後來來的花", "為蜜蜂開著", "讓牠們以為暖天永不終止"], "note": "秋天的豐盛是一場善意的欺騙。"}, {"title": "明亮的星", "author": "英・濟慈", "body": ["明亮的星 願我能像你那樣堅定", "但不是孤獨地掛在夜空", "睜著眼睛 像自然的一個", "耐心的無眠的隱士", "", "不 我要永遠不變地", "枕在我愛人柔軟的胸脯上", "靜聽她的呼吸"], "note": "比起星的永恆，他只要一夜愛人的心跳。"}, {"title": "無情的妖女", "author": "英・濟慈", "body": ["我在草地上遇見一位女子", "她的眼睛是野性的", "我為她編了花環", "她給我蜂蜜和甘露", "", "然後她帶我去她的洞穴", "在那裡我做了一個夢", "夢見蒼白的國王和王子們", "他們喊著：無情的妖女抓住了你"], "note": "美的誘惑與危險永遠並存。"}, {"title": "蟋蟀與蟈蟈", "author": "英・濟慈", "body": ["大地的詩歌從來不會死亡", "當鳥兒因驕陽而昏暈", "躲進了樹蔭", "就有一種聲音", "在草地的歡樂中飄蕩", "那是蟈蟈的歌", "", "大地的詩歌從來不會停息", "冬夜裡有蟋蟀在歌唱"], "note": "大地的詩歌接力賽永遠不會中斷。"}, {"title": "初讀查普曼譯荷馬有感", "author": "英・濟慈", "body": ["我遊歷了許多金色的國度", "看過不少好的城邦和王國", "也曾到過許多西方島嶼", "那裡有歌者向阿波羅稱臣", "", "但我從未呼吸到", "它的純淨氛圍", "直到我聽見查普曼", "雄渾而大膽地說出荷馬的聲音"], "note": "偉大的翻譯像一扇突然打開的窗。"}, {"title": "哀歌", "author": "英・濟慈", "body": ["別把我埋在教堂裡", "把我埋在星空下", "讓雨水當我的音樂", "讓草地當我的被子", "", "寫在我墓碑上：", "這裡躺著一個人", "他的名字寫在水上"], "note": "寫在水上的名字，反而流傳最遠。"}, {"title": "致睡眠", "author": "英・濟慈", "body": ["柔軟的睡眠的使者", "在黑暗中關上你謹慎的眼睛", "在神聖的安寧中", "讓我忘記白天的磨難", "", "來吧 像一支安魂曲", "慢慢覆蓋我疲倦的思緒"], "note": "睡眠是上天給白日疲憊者最溫柔的賞賜。"}, {"title": "憂鬱頌", "author": "英・濟慈", "body": ["當憂鬱突然從天而降", "像一朵哭泣的雲", "落在低垂的山丘上", "和四月的花朵上", "", "那就到你愛人的眼睛裡去吧", "去看她美麗的瞳孔裡", "住著的那一小片天空"], "note": "憂鬱的解藥藏在所愛之人的眼睛裡。"}, {"title": "惡之華", "author": "法・波德萊爾", "body": ["在罪惡的花園裡", "每一朵花都有毒", "但每一朵都很美", "美到你願意中毒", "", "我採了一朵", "放在書裡", "書頁慢慢變黃", "花的毒性卻越來越強"], "note": "美與惡交纏，是文明最古老的主題。"}, {"title": "黃昏的和諧", "author": "法・波德萊爾", "body": ["那時辰到了 花兒在枝頭顫動", "每一朵都像香爐般散發芬芳", "聲音和香氣在黃昏中迴旋", "憂鬱的圓舞曲和昏眩的暈眩", "", "太陽在自己的凝血中下沉了"], "note": "黃昏是感官最敏銳也最脆弱的時刻。"}, {"title": "邀遊", "author": "法・波德萊爾", "body": ["我的孩子 我的姐妹", "讓我們一起去那個地方", "在那裡一切都是秩序和美", "奢華 寧靜和享樂", "", "那裡的太陽", "用潮濕的光芒", "包裹整個世界"], "note": "理想的遠方是秩序與美的合一。"}, {"title": "信天翁", "author": "法・波德萊爾", "body": ["水手們抓住了一隻信天翁", "放在甲板上取樂", "這天空的王者", "走路卻笨拙可笑", "", "詩人也像這空中的王子", "在人羣裡行走", "巨大的翅膀反而妨礙了他"], "note": "詩人的翅膀讓他在天空翱翔，在地上跌倒。"}, {"title": "感應", "author": "法・波德萊爾", "body": ["自然是一座神殿", "活的柱子", "不時發出模糊的語言", "人在那裡穿過象徵的森林", "", "香味 色彩和聲音", "互相呼應", "像黑夜又像光明那樣深邃遼遠"], "note": "萬物互相感應，宇宙是一首通感的詩。"}, {"title": "憂鬱", "author": "法・波德萊爾", "body": ["天空像一口低低的鍋蓋", "壓在發出嘆息的精神上", "把灰色的雨", "傾倒在地平線的四面八方", "", "大地變成了一間潮溼的牢房", "希望像蝙蝠", "用膽怯的翅膀", "撞擊著腐爛的天花板"], "note": "憂鬱把天空壓成牢房，把希望變成蝙蝠。"}, {"title": "旅行", "author": "法・波德萊爾", "body": ["真正的旅人", "只為出發而出發", "心像氣球一樣輕", "永遠不回頭", "", "這個世界多麼大啊", "在燈光下", "但在記憶的眼睛裡", "它又多麼小"], "note": "世界的大小取決於你用什麼眼睛看。"}, {"title": "窮人之死", "author": "法・波德萊爾", "body": ["死亡是唯一的安慰", "它是生命的目的", "是唯一的希望", "像一杯醉人的美酒", "", "給我們勇氣", "一直走到夜幕降臨"], "note": "在苦難的盡頭，終點本身成為慰藉。"}, {"title": "人與海", "author": "法・波德萊爾", "body": ["自由的人 你將永遠愛大海", "大海是你的鏡子", "你在波浪的無窮展開中", "凝視自己的靈魂", "", "你們都是陰暗的 都是含蓄的", "人啊 沒有人探測過你的深淵", "海啊 沒有人知道你的財富"], "note": "人與海互為鏡像，都深不可測。"}, {"title": "美", "author": "法・波德萊爾", "body": ["我是美 像一座石頭的夢", "我的胸脯曾讓所有人", "輪流受傷", "我從不哭也從不笑", "", "詩人們在我莊嚴的姿態面前", "將耗盡他們的日子", "做研究"], "note": "美是一座石頭的夢，冷漠而令人著迷。"}, {"title": "一握之砂", "author": "日・石川啄木", "body": ["一握之砂", "我把它放在掌心", "砂從指縫間流下", "怎麼握都握不住", "", "像那些年少的日子", "像故鄉的風"], "note": "握不住的纔是最真實的擁有。"}, {"title": "不來的人", "author": "日・石川啄木", "body": ["車站的鐘敲了三下", "等的那個人還沒有來", "月臺上的人越來越少", "", "風把落葉吹過鐵軌", "我想也許", "不來也是一種到達"], "note": "等待一個不來的人，也是一種完整的經驗。"}, {"title": "故鄉的山", "author": "日・石川啄木", "body": ["想起故鄉的山", "不是因為山有多高", "而是因為山的後面", "住著我認識的人", "", "如今那些人", "也像山一樣", "越來越遠了"], "note": "故鄉的山不是地理，是人的輪廓。"}, {"title": "悲傷的玩具", "author": "日・石川啄木", "body": ["把石頭放在鐵軌上", "等火車壓過", "石頭變扁了", "", "小時候覺得很好玩", "現在想起來", "覺得那就是我"], "note": "長大後才讀懂童年遊戲裡的隱喻。"}, {"title": "初戀", "author": "日・石川啄木", "body": ["那年的蘋果花開了", "她站在花下面", "比花還白", "", "我什麼都沒說", "只是把蘋果", "喫了一個又一個"], "note": "初戀時不會說的話，都用別的動作代替了。"}, {"title": "工作之餘", "author": "日・石川啄木", "body": ["工作以後", "忽然覺得雙手很空", "於是到街上走走", "看見一隻狗", "也在街上走走", "", "我們互相看了一眼", "都沒有說什麼"], "note": "空虛的時刻，連一隻狗都是知己。"}, {"title": "母親", "author": "日・石川啄木", "body": ["母親的背", "越來越小了", "小到可以放進", "一封信裡", "", "我把信摺好", "放在口袋裡", "走到哪裡都帶著"], "note": "母親的形象在記憶中縮小，在心中放大。"}, {"title": "東京", "author": "日・石川啄木", "body": ["東京太大了", "大到把一個人稀釋", "稀釋到幾乎透明", "", "走在涉谷的人羣裡", "我像一滴水", "掉進了大海"], "note": "大城市讓人自由，也讓人消失。"}, {"title": "煙", "author": "日・石川啄木", "body": ["看著煙升起來", "散掉", "再也拼不回來", "", "人的一生", "大概也是這樣的吧", "聚了散了", "被風記住又被風忘記"], "note": "煙是時間最誠實的比喻。"}, {"title": "秋天的信", "author": "日・石川啄木", "body": ["秋天我想給你寫一封信", "信裡夾一片銀杏葉", "代替所有的話", "", "你打開信的時候", "葉子大概已經碎了", "像我想說又說不出的", "那些句子"], "note": "寄出的心意總在路上碎成碎片，但碎片也是完整的。"}, {"title": "送行", "author": "林泠", "body": ["我折一枝白茶花", "送你到渡口", "霧色蒼茫裡", "你的背影漸漸模糊", "", "不必回頭", "前方有更大的天空", "而我會在這裡", "等風帶回你的消息"], "note": "離別是為了更好的重逢。"}, {"title": "夜讀", "author": "林泠", "body": ["燈火闌珊時", "我翻開一頁秋天", "字句之間有露水", "有昨夜未說完的話", "", "書頁翻動的聲音", "像遠方的潮汐", "一來一去之間", "月光已經白了髮"], "note": "讀書是與時間最溫柔的對話。"}, {"title": "傘", "author": "蓉子", "body": ["一把傘撐開", "便是一座小小的天空", "雨在外面說話", "我在裡面安靜", "", "所有的風暴", "都被薄薄的布擋住了", "而我只聽見", "自己心跳的聲音"], "note": "小小的庇護也能撐起一片晴天。"}, {"title": "青鳥", "author": "蓉子", "body": ["你是那隻青鳥", "棲在我夢的枝頭", "每次我伸出手", "你便飛向更遠的雲端", "", "但你留下的歌聲", "在枝椏間迴盪", "讓整座森林", "都染上了春天的顏色"], "note": "幸福總在追尋的路上。"}, {"title": "晨光", "author": "蓉子", "body": ["第一道光", "從山的那邊翻過來", "像一封遠方的信", "悄悄放在窗臺上", "", "我還來不及拆開", "它已照亮了整個房間", "所有的影子", "都退到牆角去了"], "note": "每一個清晨都是嶄新的祝福。"}, {"title": "種花", "author": "蓉子", "body": ["我在院子裡種花", "把每一個心事", "都埋進土裡", "等春天來翻譯", "", "有些開成了玫瑰", "有些開成了雛菊", "還有一些", "悄悄開成了遺忘"], "note": "種下什麼，就會開出什麼。"}, {"title": "海的女兒", "author": "蓉子", "body": ["我是海的女兒", "浪花是我的裙擺", "潮汐是我的呼吸", "而鹽是我流過的淚", "", "每一次退潮", "我都在沙灘上", "留下一些貝殼", "給撿拾的人"], "note": "大海教會我們給予與放手。"}, {"title": "錯誤的城", "author": "張錯", "body": ["我在一座錯誤的城裡", "走了很久的路", "街燈照不亮方向", "地圖上找不到回家的路", "", "後來才明白", "所有的城都是對的", "只是我們", "走得太急了一些"], "note": "迷路也是一種抵達。"}, {"title": "雙城記", "author": "張錯", "body": ["一座城在東方", "一座城在西方", "我站在中間", "像一座橋", "", "兩岸的燈火", "都在我心裡閃爍", "而我的影子", "不知該倒向哪邊"], "note": "漂泊者的心是最寬廣的地圖。"}, {"title": "茶館", "author": "張錯", "body": ["舊城區的茶館裡", "時間走得很慢", "一壺老普洱", "泡出半世紀的往事", "", "杯中的茶葉", "沉沉浮浮", "像極了我們", "在異鄉的日子"], "note": "一盞茶可以泡出一整座故鄉。"}, {"title": "漂流瓶", "author": "張錯", "body": ["我把思念裝進瓶子", "交給太平洋", "不知道誰會撿到", "也不知道", "那時海水是什麼顏色", "", "也許瓶子會碎在礁石上", "但至少有一刻", "它曾漂在浪尖", "閃閃發光"], "note": "寄出的思念總會找到彼岸。"}, {"title": "秋天的書房", "author": "張錯", "body": ["窗外的楓紅了", "書架上的字句也紅了", "我讀著一本舊書", "像翻閱自己的前半生", "", "有些段落已經模糊", "有些句子卻越來越清晰", "就像秋天", "只留下最重要的顏色"], "note": "秋天是刪繁就簡的智慧。"}, {"title": "流浪者之歌", "author": "白萩", "body": ["我的鞋底磨薄了", "路還那麼長", "每一步都踩出", "一個小小的回聲", "", "回聲說：繼續走", "前方有你不認識的星星", "和你從未見過的", "黎明的顏色"], "note": "路在腳下，不在終點。"}, {"title": "風的形狀", "author": "白萩", "body": ["風沒有形狀", "但它經過的地方", "草都彎了腰", "旗都飄起來了", "", "我想風就是", "一種看不見的手", "輕輕推著世界", "往前走一步"], "note": "看不見的力量往往最強大。"}, {"title": "天河", "author": "白萩", "body": ["夏夜仰望", "天河在頭頂流過", "那些星星", "是誰灑落的鹽粒", "", "我伸手去接", "卻只接到露水", "和一整夜", "涼涼的寂靜"], "note": "仰望星空時我們最接近永恆。"}, {"title": "蟬", "author": "白萩", "body": ["蟬鳴是夏天的心跳", "一聲一聲", "把午後叫得更長", "把影子拉得更深", "", "牠用一生的力氣", "只唱一首歌", "直到秋風來", "輕輕翻過這一頁"], "note": "短暫的生命也能唱出永恆的歌。"}, {"title": "無題第七", "author": "管管", "body": ["把月亮切成兩半", "一半給你", "一半給海", "這樣你想我的時候", "就去看海", "", "海想我的時候", "就去找你", "而我想你們的時候", "就抬頭看天"], "note": "思念是三角的，永遠找不到終點。"}, {"title": "荒謬劇", "author": "管管", "body": ["一條魚走進咖啡館", "點了一杯拿鐵", "服務生問：要糖嗎", "魚說：我要海", "", "服務生說：沒有海", "只有雨天八折優惠", "魚嘆了口氣", "把自己喝了下去"], "note": "荒謬是現實最誠實的鏡子。"}, {"title": "給螞蟻的信", "author": "管管", "body": ["親愛的螞蟻", "你揹著一粒糖走了那麼遠", "是要送給誰呢", "", "如果沒有人等你", "就把糖放下來", "坐在路邊", "看看天空吧", "天空不重的"], "note": "放下執念，天空就會變輕。"}, {"title": "下雨天的哲學", "author": "管管", "body": ["下雨天", "雨把世界洗了一遍", "但沒有人說謝謝", "", "只有蝸牛說了", "牠說：", "「我一直在路上」", "「不管下不下雨」"], "note": "蝸牛的慢，是一種堅定。"}, {"title": "夢的菜單", "author": "管管", "body": ["今晚我要點一個夢", "前菜是童年的草地", "主菜是初戀的微笑", "甜點是外婆的搖椅", "", "飲料呢", "就來一杯", "月光兌的露水", "不加冰"], "note": "記憶是最好的料理。"}, {"title": "都市之門", "author": "羅門", "body": ["都市是一扇門", "走進去", "就被霓虹吞沒", "被噪音淹沒", "", "我在人羣中找自己", "像在字典裡找一個字", "翻了很久", "才發現自己在空白頁上"], "note": "在喧囂中找回自己的聲音。"}, {"title": "窗下", "author": "羅門", "body": ["窗下有人在等", "等一班不會來的公車", "等一個不會響的電話", "等一封不會寄到的信", "", "但他們依然站在那裡", "因為等待本身", "就是一種", "活著的證明"], "note": "等待是最安靜的勇氣。"}, {"title": "鐵橋", "author": "羅門", "body": ["鐵橋跨過河", "火車跨過鐵橋", "時間跨過火車", "而我跨過時間", "", "每一次跨越", "都要留下一些什麼", "比如影子", "比如回聲", "比如一首詩"], "note": "跨越的過程比抵達更重要。"}, {"title": "死亡之塔", "author": "羅門", "body": ["那座塔很高", "高到看不見頂端", "人們說那是死亡", "我說那是另一種開始", "", "從塔頂往下望", "所有的街道都很小", "所有的悲傷都很小", "而天空很大"], "note": "站得越高，悲傷便越小。"}, {"title": "曠野", "author": "羅門", "body": ["曠野上什麼都沒有", "只有風和草", "和一個人的影子", "長長地鋪在地上", "", "這就夠了", "有風就有方向", "有草就有生命", "有影子就證明", "太陽還在"], "note": "最少的擁有裡藏著最多的自由。"}, {"title": "泥土", "author": "吳晟", "body": ["我的腳踩在泥土上", "泥土沒有說話", "但我聽見了", "父親的腳步聲", "", "那些年他彎著腰", "在田裡種下一排排秧苗", "也種下了我", "和我的名字"], "note": "泥土記得每一雙走過的腳。"}, {"title": "稻穗", "author": "吳晟", "body": ["稻穗低頭的時候", "是它最飽滿的時候", "母親說這叫謙虛", "我說這叫感恩", "", "風一吹", "整片稻田都在鞠躬", "向土地", "向陽光", "向每一滴汗水"], "note": "越飽滿的靈魂越懂得低頭。"}, {"title": "溪流", "author": "吳晟", "body": ["小時候的溪水很清", "可以看見石頭的花紋", "和小魚的影子", "還有天空倒過來的樣子", "", "現在溪水渾了", "什麼都看不見", "只有我的倒影", "越來越老"], "note": "守護溪流就是守護童年。"}, {"title": "農婦", "author": "吳晟", "body": ["她的手很粗糙", "像樹皮", "但她握住的東西", "都活了下來", "", "秧苗活了", "孩子活了", "一整個家", "都靠這雙手", "從泥土裡", "長了出來"], "note": "粗糙的手掌裡藏著最柔軟的心。"}, {"title": "返鄉", "author": "吳晟", "body": ["火車過了濁水溪", "我就開始認路了", "那棵老榕樹還在", "廟口的椅子還在", "", "只是坐在椅子上的人", "換了一批又一批", "而我每次回來", "都像是第一次離開"], "note": "回家的路永遠不會迷失。"}, {"title": "水牛圖", "author": "詹冰", "body": ["水牛站在田埂上", "嚼著青草", "尾巴甩走一隻蒼蠅", "也甩走了整個下午", "", "牠不趕時間", "時間也不趕牠", "田埂上的陽光", "暖暖地照著", "一幅活的水墨畫"], "note": "從容是最美的姿態。"}, {"title": "綠", "author": "詹冰", "body": ["綠是什麼顏色", "是青蛙跳進池塘的聲音", "是竹葉搖動時的風", "是母親菜園裡的氣味", "", "綠是眼睛的休息", "是心靈的深呼吸", "是大地", "最慷慨的禮物"], "note": "綠色是大地給眼睛的情書。"}, {"title": "插秧", "author": "詹冰", "body": ["彎下腰", "把秧苗插進水田", "一株一株", "像在泥土上寫字", "", "寫的是什麼呢", "寫的是：", "「秋天見」"], "note": "每一次播種都是一封寄給未來的信。"}, {"title": "日出", "author": "詹冰", "body": ["太陽從海裡爬出來", "渾身濕淋淋的", "把金色的水珠", "灑了一地", "", "漁船醒了", "海鷗醒了", "賣魚的阿婆也醒了", "整個港口", "都被叫醒了"], "note": "日出是世界最準時的鬧鐘。"}, {"title": "螢火蟲", "author": "詹冰", "body": ["螢火蟲提著燈籠", "在夜裡走來走去", "牠在找什麼呢", "", "也許在找", "另一盞燈", "也許只是想讓夜", "不那麼黑"], "note": "微光也有照亮世界的力量。"}, {"title": "符號詩", "author": "林亨泰", "body": ["一條直線", "是路", "兩條平行線", "是鐵軌", "交叉的線", "是十字路口", "", "而我站在交叉點上", "不知道", "該往哪一條線走"], "note": "人生的每個交叉口都是一首詩。"}, {"title": "風景No.1", "author": "林亨泰", "body": ["防風林的", "外邊", "還有", "防風林的", "外邊", "還有", "防風林的", "外邊", "還有", "海"], "note": "重複之後的盡頭是遼闊。"}, {"title": "春", "author": "林亨泰", "body": ["一瓣花", "落在水面上", "水面上多了一個圓", "", "圓越來越大", "大到裝下了", "整個春天"], "note": "一朵花就能漾開一整個季節。"}, {"title": "非情歌", "author": "林亨泰", "body": ["不是每首詩", "都要談情說愛", "這首詩只想說：", "", "今天天氣很好", "陽光把影子", "量了一遍又一遍", "像裁縫在量布"], "note": "最好的日子不需要理由。"}, {"title": "明暗", "author": "林亨泰", "body": ["亮的那面", "是你看到的我", "暗的那面", "是我看到的自己", "", "中間那一條線", "叫做真實", "非常細", "一不小心就踩空了"], "note": "真實藏在光與影的交界處。"}, {"title": "島", "author": "方思", "body": ["島是海的一個念頭", "突然冒出來", "然後就站在那裡", "不走了", "", "海浪推了又推", "島說：我不走", "海只好", "在它腳下唱歌"], "note": "堅定的存在自有一種溫柔。"}, {"title": "鑰匙", "author": "方思", "body": ["我有一把鑰匙", "但找不到那扇門", "走遍了整條街", "每扇門都不對", "", "後來我把鑰匙", "扔進河裡", "才發現", "其實我一直站在門裡面"], "note": "有時候放下鑰匙才能找到出口。"}, {"title": "致時間", "author": "方思", "body": ["時間先生", "你走得那麼快", "能不能停下來", "喝杯茶", "", "你不停也沒關係", "但請走慢一點", "讓我看清楚", "路邊的花"], "note": "慢下來，才能看見美。"}, {"title": "石頭記", "author": "方思", "body": ["石頭不說話", "但它記得一切", "記得第一場雨", "記得最後一場雪", "", "人們踩過它", "車輪碾過它", "它都不吭聲", "只是越來越圓", "越來越光滑"], "note": "沉默是最深的記憶。"}, {"title": "夢的重量", "author": "方思", "body": ["夢很輕", "輕到醒來就忘了", "但有一些夢很重", "重到一輩子都放不下", "", "我把最重的那個夢", "放在胸口", "它就變成了", "心跳的節奏"], "note": "最重的夢化為最深的心跳。"}, {"title": "菸草店", "author": "葡・佩索亞", "body": ["我什麼都不是", "我永遠不會成為什麼", "我不可能想要成為什麼", "除此之外，我擁有世界上所有的夢", "", "窗外是菸草店", "店裡的人不做夢", "他只賣菸", "而我只做夢", "我們誰也不打擾誰"], "note": "不做什麼也是一種完整。"}, {"title": "牧羊人", "author": "葡・佩索亞", "body": ["我的思想是一羣羊", "我是它們的牧羊人", "但有時候羊羣走散了", "跑到山的那一邊去了", "", "我不追", "因為山的那一邊", "也有草地", "也有陽光"], "note": "放手讓思緒漫遊也是一種智慧。"}, {"title": "海", "author": "葡・佩索亞", "body": ["鹹鹹的海啊", "你的鹽是從哪裡來的", "是葡萄牙水手的淚嗎", "是航海者未歸的嘆息嗎", "", "海不回答", "只是不斷地", "把浪推向岸邊", "又拉回來"], "note": "海的沉默比回答更深。"}, {"title": "面具", "author": "葡・佩索亞", "body": ["我有很多張臉", "每一張都是真的", "也每一張都是假的", "這讓我非常自由", "", "因為沒有人知道", "哪一張是我", "包括我自己"], "note": "多重的自我是靈魂的自由。"}, {"title": "失眠", "author": "葡・佩索亞", "body": ["三點鐘了", "世界睡著了", "只有我醒著", "和窗外的路燈", "", "路燈也不想醒著", "但它沒辦法", "有人需要光", "而我需要黑暗"], "note": "失眠者與路燈分享同一種孤獨。"}, {"title": "日記", "author": "葡・佩索亞", "body": ["今天我寫了一首詩", "然後把它撕掉了", "又寫了一首", "又撕掉了", "", "最後剩下的", "只有撕碎的紙片", "和窗外", "越來越暗的天色"], "note": "撕掉的詩裡藏著最真的自己。"}, {"title": "異名者", "author": "葡・佩索亞", "body": ["我叫什麼名字", "這取決於今天是星期幾", "星期一我是悲觀者", "星期二我是牧羊人", "星期三我是水手", "", "到了星期天", "我把所有的名字收起來", "安靜地", "做回沒有名字的人"], "note": "最真實的自己可能沒有名字。"}, {"title": "里斯本", "author": "葡・佩索亞", "body": ["里斯本的電車", "叮叮噹噹地爬上坡", "帶走了遊客", "留下了我", "", "我站在老街上", "看夕陽把牆壁染成金色", "整座城市", "像一首尚未完成的詩"], "note": "城市是住在裡面的人的詩集。"}, {"title": "存在", "author": "葡・佩索亞", "body": ["我存在", "但我不確定", "是以什麼方式存在", "", "也許像霧", "到處都是但抓不住", "也許像回聲", "聽得見卻找不到來源"], "note": "存在的方式比存在本身更神祕。"}, {"title": "窗外", "author": "葡・佩索亞", "body": ["窗外的世界和窗內的世界", "隔著一層玻璃", "一樣薄的", "是夢和醒之間的距離", "", "我把手掌貼在玻璃上", "外面的冷傳進來", "裡面的暖透出去", "這叫做活著"], "note": "冷與暖的交換就是生命的呼吸。"}, {"title": "秋日", "author": "德・裏爾克", "body": ["主啊，是時候了", "夏天盛極一時", "把你的影子置於日晷之上", "讓風吹過牧場", "", "讓最後的果實飽滿", "再給它們兩天南方的好天氣", "催促它們成熟", "把最後的甘甜", "壓進濃酒之中"], "note": "成熟需要最後一點陽光的催促。"}, {"title": "豹", "author": "德・裏爾克", "body": ["牠的目光被那些鐵欄", "消磨得如此疲倦", "什麼也不能收留", "牠覺得只有千條的鐵欄", "鐵欄後面沒有世界", "", "強韌的步伐邁著柔軟的步容", "在極小的圈中旋轉", "彷彿力之舞", "圍繞一個中心", "一個偉大的意志昏眩"], "note": "困境中的力量依然是力量。"}, {"title": "給青年詩人的信", "author": "德・裏爾克", "body": ["你要耐心地", "等待那些尚未解開的問題", "不要去追問答案", "因為你現在還無法活出答案", "", "重要的是", "去體驗每一個問題", "也許有一天", "你會不知不覺", "活進了答案之中"], "note": "活在問題裡，答案會自己到來。"}, {"title": "孤獨", "author": "德・裏爾克", "body": ["孤獨像一場雨", "從海上升起", "向傍晚走去", "從遙遠而荒涼的平原上", "向天空升起", "", "那些不確定的人", "被孤獨帶走了", "而孤獨卻說：", "「我只是想帶你回家」"], "note": "孤獨不是懲罰，是回家的路。"}, {"title": "玫瑰", "author": "德・裏爾克", "body": ["你是一朵玫瑰", "所有的名字都是你的名字", "你展開了那麼多層花瓣", "像一個人展開了那麼多個自己", "", "每一層都是柔軟的", "每一層都有刺", "而最裡面那一層", "是空的", "空得像一個祈禱"], "note": "最深處的空是為了容納一切。"}, {"title": "天使", "author": "德・裏爾克", "body": ["每一位天使都是可怕的", "但我依然歌頌你們", "你們幾乎致命的", "靈魂之鳥", "", "如果一位天使", "突然將我擁入胸懷", "我會因為他更強的存在", "而消亡"], "note": "美到極致便讓人敬畏。"}, {"title": "萬物的根", "author": "德・裏爾克", "body": ["萬物的根很深", "深到我們看不見", "我們只看到花和果實", "卻忘了泥土裡的黑暗", "", "那黑暗不是空無", "而是力量在沉睡", "在等待", "一聲春雷"], "note": "看不見的根撐起看得見的花。"}, {"title": "沉默的石頭", "author": "德・裏爾克", "body": ["一尊古老的石像", "站在教堂門口", "看了千年的人來人去", "它什麼都沒說", "", "但它的沉默裡", "有一座完整的城", "有每一個走過的人", "留下的眼神"], "note": "千年的沉默抵得上千萬句話。"}, {"title": "晚禱", "author": "德・裏爾克", "body": ["黃昏降臨的時候", "鐘聲響了", "把白天和黑夜", "輕輕縫在一起", "", "我站在窗前", "讓鐘聲穿過身體", "每一聲都像", "一個小小的原諒"], "note": "鐘聲裡住著寬恕。"}, {"title": "夜的練習曲", "author": "德・裏爾克", "body": ["夜一點一點加深", "像墨水滴進水裡", "慢慢地", "所有的輪廓都消失了", "", "但聲音還在", "蟲鳴還在", "心跳還在", "夜只是把多餘的", "都收走了"], "note": "夜晚是世界做減法的時刻。"}, {"title": "一個人的酒館", "author": "捷克・赫拉巴爾", "body": ["金虎酒館裡", "啤酒泡沫升起又落下", "像一個人的一生", "起起伏伏", "", "老酒客說：", "「人生就像這杯啤酒", "苦的時候慢慢喝", "就會嘗到甜味」"], "note": "苦盡甘來是啤酒的哲學。"}, {"title": "過於喧囂的孤獨", "author": "捷克・赫拉巴爾", "body": ["三十五年了", "我在廢紙堆裡打包", "把書和垃圾壓在一起", "把叔本華和蒼蠅壓在一起", "", "但每一包裡", "都藏著一本書", "像心臟藏在肋骨裡", "誰也看不見"], "note": "垃圾堆裡也能開出思想的花。"}, {"title": "底層的珍珠", "author": "捷克・赫拉巴爾", "body": ["那些被遺忘的人", "住在城市的最底層", "像珍珠住在蚌殼裡", "沒有人知道", "", "但他們閃著光", "用自己的方式", "安靜地", "照亮黑暗的角落"], "note": "底層的光芒最為堅韌。"}, {"title": "列車上", "author": "捷克・赫拉巴爾", "body": ["火車穿過波希米亞的田野", "窗外是金色的麥浪", "和一座座小教堂", "", "我閉上眼睛", "火車的節奏", "像母親的搖籃曲", "把我搖回了童年"], "note": "火車的節奏是鄉愁的韻腳。"}, {"title": "河邊散步", "author": "捷克・赫拉巴爾", "body": ["伏爾塔瓦河靜靜流過", "帶走了昨天的落葉", "和前天的倒影", "", "我沿著河散步", "河水說：別急", "急也沒用", "我流了千年", "還是在同一條河裡"], "note": "河流教我們從容。"}, {"title": "老貓", "author": "捷克・赫拉巴爾", "body": ["我養了很多貓", "每一隻都有自己的故事", "黑貓喜歡屋頂", "白貓喜歡壁爐旁", "", "而最老的那隻", "什麼都不喜歡了", "只喜歡坐在我膝上", "安靜地呼嚕"], "note": "老去是學會只留下最重要的。"}, {"title": "廢墟花園", "author": "捷克・赫拉巴爾", "body": ["廢墟裡長出了花", "沒人種的花", "從裂縫裡鑽出來", "開得比花園裡的還燦爛", "", "也許因為", "沒有人修剪它", "它就按照自己的樣子", "活成了自己"], "note": "野生的花朵最懂得自由。"}, {"title": "舊書店", "author": "捷克・赫拉巴爾", "body": ["舊書店裡", "每一本書都在等", "等一個懂它的人", "把它帶回家", "", "有些書等了很久很久", "紙都黃了", "字都淡了", "但故事還在", "完好如初"], "note": "好的故事不怕歲月。"}, {"title": "雪地裡的啤酒", "author": "捷克・赫拉巴爾", "body": ["冬天的夜晚", "我把啤酒放在雪地裡冰鎮", "半小時後拿出來", "瓶身上結了一層霜", "", "喝第一口", "冰冷從喉嚨滑到胃", "然後慢慢", "變成了溫暖"], "note": "冰冷的入口可以化為溫暖的心底。"}, {"title": "時間的碎片", "author": "捷克・赫拉巴爾", "body": ["時間碎成了很多片", "有些掉在沙發縫裡", "有些夾在書頁裡", "有些黏在酒杯底", "", "我不打算拼回去", "碎片有碎片的美", "就像馬賽克", "遠看纔是一幅畫"], "note": "碎片的生命拼成完整的回憶。"}, {"title": "柔情", "author": "智利・米斯特拉爾", "body": ["母親的手", "摸過我的額頭", "像風摸過田野", "溫柔而確定", "", "那些被撫摸過的地方", "都開了花", "連額頭上的皺紋", "都是花開的痕跡"], "note": "母親的手是世上最溫柔的土地。"}, {"title": "搖籃曲", "author": "智利・米斯特拉爾", "body": ["睡吧小小的", "月亮在窗外值班", "星星在數你的呼吸", "風在替你蓋被子", "", "整個世界都安靜下來", "只為了讓你", "好好地", "做一個甜甜的夢"], "note": "世界為沉睡的孩子靜音。"}, {"title": "死去的小樹", "author": "智利・米斯特拉爾", "body": ["那棵小樹死了", "在冬天最冷的那一夜", "我去看它的時候", "它的枝椏上還掛著雪", "", "好像穿了一件白衣", "安靜地", "站在那裡", "像在告別"], "note": "離開的姿態也可以很美。"}, {"title": "麵包", "author": "智利・米斯特拉爾", "body": ["我把麵團揉了又揉", "像揉著一個夢", "放進烤爐裡", "等火把它變成金色", "", "麵包的香味", "飄過了整條街", "把鄰居的孩子", "都引來了"], "note": "烤麵包的香是社區最好的語言。"}, {"title": "水", "author": "智利・米斯特拉爾", "body": ["水從山上來", "一路唱著歌", "碰到石頭就繞開", "碰到花就停下來", "", "最後流進了大海", "安靜下來", "把一路上聽到的故事", "都沉到了海底"], "note": "水的旅程就是一首流動的歌。"}, {"title": "教室", "author": "智利・米斯特拉爾", "body": ["教室裡有二十張臉", "每一張都不一樣", "有的像太陽", "有的像月亮", "有的像正在下雨的天", "", "我對每一張臉微笑", "因為每一張臉", "都是一個", "正在長大的宇宙"], "note": "每個孩子都是一個正在膨脹的宇宙。"}, {"title": "松樹", "author": "智利・米斯特拉爾", "body": ["松樹站在山頂上", "風來了不彎", "雪來了不倒", "太陽來了不驕傲", "", "它只是站在那裡", "用自己的方式", "告訴每一個路過的人", "什麼是堅持"], "note": "不彎不倒不驕傲便是堅持。"}, {"title": "思念的手", "author": "智利・米斯特拉爾", "body": ["思念有一雙手", "很長很長", "從這裡伸到那裡", "從現在伸到從前", "", "它摸到了什麼呢", "摸到了你離開時", "忘記帶走的", "那條圍巾"], "note": "遺留的物件是思念的把手。"}, {"title": "土地之歌", "author": "智利・米斯特拉爾", "body": ["土地是安靜的母親", "她不說話", "只是默默地", "養活所有的孩子", "", "草是她的頭髮", "河流是她的血管", "山是她的脊背", "而我們", "是她手心裡的種子"], "note": "土地是最沉默也最豐盛的母親。"}, {"title": "太陽石", "author": "墨西哥・帕斯", "body": ["一棵水晶的柳樹", "一棵水的白楊", "一座風的高塔", "一根水的拱柱", "", "時間在石頭裡停住了", "而石頭在陽光裡", "慢慢地", "說出了它的名字"], "note": "石頭裡藏著凝固的時間。"}, {"title": "兩個身體", "author": "墨西哥・帕斯", "body": ["兩個身體面對面", "有時是兩道浪", "夜晚便是海", "", "兩個身體面對面", "有時是兩塊石頭", "夜晚便是沙漠", "", "兩個身體面對面", "有時是兩把刀", "夜晚便是閃電"], "note": "相對的兩個人定義了夜的質地。"}, {"title": "在此之間", "author": "墨西哥・帕斯", "body": ["在說與不說之間", "有一片空白", "像庭院中", "午後的陰影", "", "在那片空白裡", "字句在休息", "意義在生長", "沉默在開花"], "note": "空白是語言最肥沃的土壤。"}, {"title": "街角", "author": "墨西哥・帕斯", "body": ["墨西哥城的街角", "一個賣花的老婦人", "把百合舉得高高的", "像舉著一束白色的火焰", "", "來往的人", "都被那白色照亮了一瞬", "然後又走回", "各自的陰影裡"], "note": "一束花能照亮整個街角。"}, {"title": "蝴蝶的幻象", "author": "墨西哥・帕斯", "body": ["一隻蝴蝶停在書上", "然後飛走了", "帶走了一個字", "", "那個字是什麼", "我不知道", "但書從此", "少了一些什麼", "多了一些什麼"], "note": "缺少的部分讓故事更完整。"}, {"title": "迷宮", "author": "墨西哥・帕斯", "body": ["我走進迷宮", "牆壁是鏡子", "每面鏡子裡都有一個我", "但沒有一個是真的", "", "走了很久", "才發現出口", "就在入口的旁邊", "我只是轉錯了方向"], "note": "迷宮的出口常在最初的地方。"}, {"title": "火與詞", "author": "墨西哥・帕斯", "body": ["詞語是火", "點燃了就收不回來", "它燒過的地方", "留下灰燼和光", "", "但灰燼裡", "還有種子", "等下一場雨來", "又會長出新的詞"], "note": "語言的灰燼裡藏著重生。"}, {"title": "黃昏花園", "author": "墨西哥・帕斯", "body": ["黃昏的花園裡", "花朵一朵一朵地關閉", "像商店打烊", "像眼睛閉上", "", "但泥土還醒著", "根還在工作", "黑暗不是結束", "是另一種開始"], "note": "花朵閉合時根在悄悄用力。"}, {"title": "橋", "author": "墨西哥・帕斯", "body": ["你我之間有一座橋", "但我們都不敢先走", "怕對面沒有人等", "怕橋中間會斷", "", "後來橋老了", "我們也老了", "才發現", "橋一直都很結實"], "note": "猶豫比橋更容易斷裂。"}, {"title": "風的名字", "author": "墨西哥・帕斯", "body": ["風有很多名字", "在沙漠裡叫乾渴", "在海上叫遠方", "在城市裡叫匆忙", "在你耳邊叫溫柔", "", "但風最喜歡的名字", "是沒有名字", "這樣它就可以", "去任何地方"], "note": "沒有名字的風最自由。"}, {"title": "巨大的謎", "author": "瑞典・特朗斯特羅默", "body": ["醒來是從夢中", "往外跳傘", "掙脫令人窒息的漩渦", "旅行者向早晨的綠色地帶降落", "", "萬物燃燒", "他察覺到——用雲雀的姿勢——", "巨大的樹根在地燈下", "搖晃著", "那些地下的燈盞"], "note": "醒來本身就是一次降落。"}, {"title": "果戈理", "author": "瑞典・特朗斯特羅默", "body": ["夾克磨損得像一羣狼", "臉像一塊大理石碎片", "他坐在信堆裡", "坐在嘲笑和過失的叢林中", "", "心臟像一頁紙", "吹過走廊", "空蕩蕩的走廊"], "note": "天才的心是走廊裡飄蕩的紙頁。"}, {"title": "車站", "author": "瑞典・特朗斯特羅默", "body": ["一列火車到站了", "一列火車離站了", "中間有短暫的寂靜", "", "那寂靜裡", "有人上車", "有人下車", "有人站在月臺上", "什麼也不做", "只是看著"], "note": "月臺上的靜默連接了所有的告別。"}, {"title": "半完成的天", "author": "瑞典・特朗斯特羅默", "body": ["陰天的怯懦", "靠在牆角", "像一個被趕出去的孩子", "", "但牆的另一邊", "太陽在等", "等雲散開的一瞬", "像等一個擁抱"], "note": "陰天是太陽還沒來得及完成的擁抱。"}, {"title": "黑色明信片", "author": "瑞典・特朗斯特羅默", "body": ["日曆滿了，未來不可知", "電纜在黑暗中嗡嗡作響", "雪落在無人的海面上", "", "在最黑的時刻", "我卻看見了光", "不是在天上", "而是在雪地裡", "像埋在地下的星星"], "note": "最黑的地方藏著最亮的光。"}, {"title": "夜間值班", "author": "瑞典・特朗斯特羅默", "body": ["我在夜間開車", "車燈照出兩道光柱", "前方的路像一本翻開的書", "只能看到兩行", "", "但這就夠了", "開車不需要看見終點", "只需要看見", "下一步"], "note": "看見下一步就足以走完全程。"}, {"title": "孤獨的瑞典房屋", "author": "瑞典・特朗斯特羅默", "body": ["一座紅色的房子", "站在雪地裡", "周圍什麼都沒有", "只有白和白和白", "", "但房子裡面有火", "有書和咖啡", "有一個人在窗前", "看著白色的世界微笑"], "note": "孤獨的房子裡住著完整的世界。"}, {"title": "鋼琴", "author": "瑞典・特朗斯特羅默", "body": ["黑鍵白鍵", "像冬天的森林", "光禿的樹和雪", "交替排列", "", "手指按下去", "森林裡就有了鳥鳴", "有了風聲", "有了遠方的河流"], "note": "琴鍵之間藏著一整片森林。"}, {"title": "冰封的海灣", "author": "瑞典・特朗斯特羅默", "body": ["海灣結了冰", "船被凍住了", "海鷗站在冰面上", "像標點符號", "", "等春天的句子", "把它們連起來", "就是一段", "關於等待的故事"], "note": "等待是冰面下流動的暗流。"}, {"title": "記憶在注視我", "author": "瑞典・特朗斯特羅默", "body": ["記憶在注視我", "從一張舊照片的背面", "我看不見它", "但它看得見我", "", "它知道我", "每一次轉身的理由", "每一次停下來的原因", "和每一次出發的方向"], "note": "記憶比我們更瞭解自己。"}, {"title": "乘著無鞍的馬", "author": "愛爾蘭・葉慈", "body": ["我要騎一匹沒有鞍的馬", "穿過銀色的霧", "穿過金色的光", "到那座湖心的小島去", "", "在那裡建一間小屋", "用泥土和枝條", "蜜蜂的嗡嗡聲", "就是我唯一的鄰居"], "note": "夢中的小島是心靈的歸所。"}, {"title": "茵尼斯弗利湖島", "author": "愛爾蘭・葉慈", "body": ["我就要動身走了", "到茵尼斯弗利島", "搭一座小茅屋", "用泥巴和枝條", "", "養九排芸豆", "一個蜂巢", "在蜜蜂嗡嗡的林間", "獨自居住", "我就會得到安寧"], "note": "簡單的嚮往裡住著最深的安寧。"}, {"title": "當你老了", "author": "愛爾蘭・葉慈", "body": ["當你老了，頭白了", "睡意昏沉", "在爐火旁打盹", "請取下這本書", "", "慢慢讀", "讀到那些曾經柔和的眼神", "讀到它們深邃的陰影", "那是愛你靈魂的人", "留下的痕跡"], "note": "靈魂的愛不隨容顏老去。"}, {"title": "二度降臨", "author": "愛爾蘭・葉慈", "body": ["獵鷹盤旋再盤旋", "越飛越遠", "再也聽不見放鷹人的聲音", "萬物崩塌", "中心無法維繫", "", "但在崩塌之中", "有什麼正在成形", "一個粗糙的獸", "緩緩走向伯利恆"], "note": "崩壞之中孕育著新的開始。"}, {"title": "亞當的詛咒", "author": "愛爾蘭・葉慈", "body": ["寫詩是一件苦差事", "比鋪路還累", "比拉車還重", "但總有人願意做", "", "因為有時候", "一個句子突然亮了", "像黑暗中", "劃亮一根火柴", "所有的辛苦", "都值得了"], "note": "一行亮起的詩句抵得過所有辛勞。"}, {"title": "白天鵝", "author": "愛爾蘭・葉慈", "body": ["秋天的水面上", "五十九隻天鵝", "整齊地浮著", "像五十九個問號", "", "十九年了", "從第一次數它們", "到現在", "天鵝沒有變", "是我變了"], "note": "天鵝是時間的計量單位。"}, {"title": "破衣裳", "author": "愛爾蘭・葉慈", "body": ["靈魂穿著破衣裳", "在世界的街上走", "沒有人認出它來", "也沒有人在意", "", "但它走過的地方", "空氣都亮了一些", "像有人", "悄悄點了一盞燈"], "note": "靈魂的光不需要華服。"}, {"title": "咒語", "author": "愛爾蘭・葉慈", "body": ["把你的嘴脣", "靠近我的耳朵", "說一個字", "讓風都停下來", "", "那個字", "不必很大聲", "只要夠真", "就能讓整座山", "都安靜下來"], "note": "最輕的真話有最重的力量。"}, {"title": "拜占庭", "author": "愛爾蘭・葉慈", "body": ["金色的鳥停在金色的樹上", "唱著過去和未來", "牠不是真的鳥", "是匠人用金箔做的", "", "但牠的歌是真的", "穿過了時間", "穿過了帝國的興亡", "還在唱"], "note": "藝術是唯一不會停止的歌。"}, {"title": "塔", "author": "愛爾蘭・葉慈", "body": ["我住在一座塔裡", "螺旋的樓梯", "繞了又繞", "每一層都有不同的風景", "", "最底層是泥土", "最高層是星星", "而我在中間", "寫詩"], "note": "詩人住在泥土與星星之間。"}, {"title": "清晨", "author": "美・瑪麗·奧利弗", "body": ["每一個早晨", "世界都重新開始", "露珠是大地的眼淚", "還是大地的微笑", "", "我不確定", "但我確定的是", "鳥兒在唱歌", "花朵在打開", "而我", "還活著"], "note": "活著本身就是最好的早安。"}, {"title": "野鵝", "author": "美・瑪麗·奧利弗", "body": ["你不必善良", "你不必跪著", "穿過沙漠懺悔", "你只需要讓", "身體裡那隻柔軟的動物", "去愛牠所愛的", "", "同時野鵝在高高的天上", "一次又一次呼喚著", "在粗糲而美麗的世界裡", "宣告你的位置"], "note": "你的存在就是世界的一部分。"}, {"title": "夏日", "author": "美・瑪麗·奧利弗", "body": ["我把一整個下午", "花在草地上", "看蚱蜢喫草", "看雲慢慢變形", "", "有人說這是浪費時間", "但蚱蜢不這麼認為", "雲也不這麼認為", "草地更不這麼認為"], "note": "大自然不認識「浪費」二字。"}, {"title": "旅程", "author": "美・瑪麗·奧利弗", "body": ["終於有一天", "你知道了你該做什麼", "開始上路了", "雖然身邊的聲音", "不斷喊著壞建議", "", "但你沒有停下", "一步一步", "走進了那個", "新的日子"], "note": "最重要的旅程從不聽從外面的聲音。"}, {"title": "黑水塘", "author": "美・瑪麗·奧利弗", "body": ["黑水塘裡", "睡蓮浮在水面上", "它們不知道下面有多深", "也不在乎", "", "它們只管開花", "在最深的水面上", "開出最安靜的白", "這就是它們的全部哲學"], "note": "在深淵之上安靜綻放就是勇氣。"}, {"title": "林中", "author": "美・瑪麗·奧利弗", "body": ["我走進森林", "森林也走進我", "它的綠進了我的眼睛", "它的靜進了我的耳朵", "它的涼進了我的皮膚", "", "出來的時候", "我已經不完全是", "進去時的那個人了"], "note": "每一次走進森林都是一次蛻變。"}, {"title": "白鷺鷥", "author": "美・瑪麗·奧利弗", "body": ["白鷺鷥站在淺水裡", "一動不動", "像一個白色的問號", "", "牠在問什麼呢", "也許在問魚", "也許在問水", "也許只是在問自己：", "「今天的雲好看嗎」"], "note": "靜止也是一種深深的提問。"}, {"title": "蘑菇", "author": "美・瑪麗·奧利弗", "body": ["雨後的森林裡", "蘑菇一夜之間", "從落葉下冒出來", "像一羣小傘", "", "它們沒有根", "沒有花", "但它們知道", "什麼時候該出現", "這就夠了"], "note": "在對的時刻出現就是最好的綻放。"}, {"title": "注意力", "author": "美・瑪麗·奧利弗", "body": ["注意力是一種祈禱", "當我仔細看一朵花的時候", "花也在仔細看我", "", "我們交換了什麼呢", "也許是一些顏色", "一些安靜", "和一些", "關於活著的祕密"], "note": "專注是世間最溫柔的祈禱。"}, {"title": "月光", "author": "美・瑪麗·奧利弗", "body": ["月光把森林", "變成了另一個世界", "白天的綠變成了銀", "白天的鳥聲變成了蟲鳴", "", "我站在月光裡", "覺得自己也變了", "變得更輕", "更透明", "更接近一棵樹"], "note": "月光下我們都更接近自然。"}, {"title": "歌謠", "author": "智利・米斯特拉爾", "body": ["唱一首歌給孩子聽", "不需要華麗的詞", "只需要重複的節拍", "和溫柔的聲音", "", "歌詞忘了沒關係", "因為孩子記住的", "不是歌詞", "是唱歌時的擁抱"], "note": "歌的意義在歌聲之外。"}, {"title": "鄉愁四韻", "author": "余光中", "body": ["給我一瓢長江水啊長江水", "酒一樣的長江水", "醉酒的滋味", "是鄉愁的滋味", "給我一瓢長江水啊長江水", "", "給我一張海棠紅啊海棠紅", "血一樣的海棠紅", "沸血的燒痛", "是鄉愁的燒痛", "給我一張海棠紅啊海棠紅"], "note": "長江水與海棠紅，鄉愁是最醇烈的酒。"}, {"title": "殘堡", "author": "鄭愁予", "body": ["殘堡上有風吹過", "我來得太遲了", "戰旗已經腐爛", "英雄的名字也模糊了", "", "但那些石頭還記得", "那年的血和火", "還有一個士兵最後的呼喊", "被風帶去了很遠的地方"], "note": "殘堡的石頭沉默不語，卻記得每一場風與火。"}, {"title": "旅夢", "author": "鄭愁予", "body": ["夢裏我又走過那條河", "河上的橋很窄", "橋下的水很急", "", "我知道過了這座橋", "就是另一個國度", "回頭看看", "來時的路已經被雲遮住了"], "note": "旅途中的夢最輕也最重，因為來路已被雲霧遮斷。"}, {"title": "暮色", "author": "席慕蓉", "body": ["在一個年輕的夜裏", "聽過一首歌", "清洌纏綿", "", "如今在暮色裏向你揮手", "而你的笑容已老", "天邊有一顆星子在閃爍", "我已不再是那個追星的人了"], "note": "暮色裏揮手，才知道青春已是很遠很遠的事。"}, {"title": "雨想說的", "author": "洛夫", "body": ["雨想說的", "不外是屋簷上那些話", "滴滴答答", "", "它想告訴你", "世界上有一種東西叫做等待", "等一把傘", "等一個人", "等一場晴天"], "note": "雨滴滴答答說的，不過是關於等待的故事。"}, {"title": "給橋", "author": "瘂弦", "body": ["橋，你連接了兩岸", "也連接了分離", "", "有多少人在你身上走過", "帶著行李或者淚水", "你什麼也不說", "只是讓水從你身下流過", "讓人從你身上走過"], "note": "橋沉默地承載所有的離合，讓流水自去。"}, {"title": "疑神", "author": "楊牧", "body": ["疑神疑鬼的年紀過去了", "現在我只疑神", "", "疑那山上的光是不是神的目光", "疑那水中的影是不是神的倒影", "疑這人間種種", "是不是一場巨大的夢"], "note": "疑神的年紀，是對世界懷有最深的敬畏。"}, {"title": "夭", "author": "楊牧", "body": ["桃之夭夭", "灼灼其華", "我寫下這幾個字的時候", "春天正走到窗前", "", "三千年前有人也這樣寫", "三千年後也許還有人這樣寫", "桃花不管朝代", "年年都開"], "note": "桃花不管朝代更迭，三千年來年年綻放。"}, {"title": "星圖", "author": "楊牧", "body": ["夜空是一本打開的書", "星星是上面的字", "", "我讀了很久", "也讀不懂那些句子", "但我知道", "每一顆星都有它的位置", "就像每個人都有他的命運"], "note": "星圖讀不懂，但每顆星都有它註定的位置。"}, {"title": "擺渡船上", "author": "周夢蝶", "body": ["從此岸到彼岸", "擺渡船搖搖晃晃", "", "船上的人各懷心事", "有人趕路", "有人回家", "有人只是想看看河水", "到底流向哪裏"], "note": "擺渡船上各懷心事，河水不語只管流去。"}, {"title": "六月", "author": "周夢蝶", "body": ["六月是火做的月份", "連影子都是熱的", "", "但我的心是涼的", "涼如深井裏的水", "你從井口往下看", "會看見一小片天空", "和一顆孤獨的星"], "note": "六月炎熱，心底的深井裏卻有一片清涼的天。"}, {"title": "樹", "author": "周夢蝶", "body": ["一棵樹站在那裏", "不為等誰", "不為去哪裏", "", "它只是站著", "把根扎得更深", "把枝伸得更遠", "在風中微微搖動", "像在跟天空說話"], "note": "一棵樹只是站著，就已經說出了生命的全部。"}, {"title": "行到水窮處", "author": "周夢蝶", "body": ["行到水窮處", "坐看雲起時", "", "我已經走到了路的盡頭", "但盡頭不是終點", "是另一個開始", "雲在頭頂慢慢升起", "像一個巨大的句號", "也像一個巨大的問號"], "note": "水窮處雲起時，盡頭原來也是另一個開始。"}, {"title": "晨", "author": "紀弦", "body": ["一隻公雞從夜的瓶口跳出來", "叫了一聲", "整個天空就亮了", "", "多麼簡單的事啊", "光明只需要一聲呼喚", "就來了"], "note": "清晨只需一聲雞啼，光明便從夜的瓶口傾瀉。"}, {"title": "過程", "author": "紀弦", "body": ["從前有一首詩", "被寫在紙上", "被風吹走了", "", "那首詩經過了山", "經過了水", "最後落在一個陌生人的手裏", "他讀了，哭了", "然後又放手讓風帶走"], "note": "一首詩隨風流浪，在陌生人手裏找到了知音。"}, {"title": "存在主義", "author": "紀弦", "body": ["我存在", "故我苦惱", "", "我苦惱", "故我寫詩", "", "我寫詩", "故我存在"], "note": "存在、苦惱、寫詩，是詩人最誠實的循環。"}, {"title": "連環", "author": "夏宇", "body": ["你的名字連著我的名字", "像兩個扣在一起的迴紋針", "", "拉開了就再也扣不回去", "不拉開", "就只能一起生銹"], "note": "兩個扣在一起的迴紋針，拉開或不拉開都是難題。"}, {"title": "Salsa", "author": "夏宇", "body": ["如果語言是一種舞蹈", "那我們之間的對話", "大概是一支失敗的莎莎", "", "你進的時候我退", "你退的時候", "我已經離開了舞池"], "note": "對話如莎莎舞，進退之間總是錯過。"}, {"title": "秋歌", "author": "陳黎", "body": ["秋天來了", "葉子一片一片飄下來", "像退回的情書", "", "風把它們送到各處", "有些落在路上", "有些落在水裏", "有些落在陌生人的肩上", "帶著一個已經讀不懂的訊息"], "note": "秋天的落葉像退回的情書，訊息已讀不懂。"}, {"title": "陽光小集", "author": "向陽", "body": ["陽光從窗口進來", "坐在桌上", "翻了翻我的詩集", "", "它沒有說好或不好", "只是照亮了其中幾行", "那幾行剛好是", "我最想讓你看見的句子"], "note": "陽光替我翻開詩集，照亮最想讓你看見的句子。"}, {"title": "銀杏的仰望", "author": "向陽", "body": ["銀杏的葉子像小扇子", "秋天的時候全部變成金色", "", "它們仰望天空的樣子", "像一羣孩子在禱告", "不是祈求什麼", "只是對天空說謝謝"], "note": "銀杏仰望天空，金色的葉子像孩子在說謝謝。"}, {"title": "土地的歌", "author": "向陽", "body": ["土地在唱歌", "你聽不見嗎", "", "稻穗彎腰的時候它在唱", "溪水轉彎的時候它在唱", "農人擦汗的時候它在唱", "連牛的尾巴甩動", "都是這首歌的節拍"], "note": "土地的歌由稻穗、溪水和農人的汗水共同譜成。"}, {"title": "阿爸的飯包", "author": "向陽", "body": ["阿爸天未光就出門", "手裏提著一個布飯包", "飯包裏有昨暝的菜脯", "和阿母天未光就起來煮的飯", "", "中午的時候打開飯包", "飯已經涼了", "但是喫起來", "比什麼都暖"], "note": "阿爸的飯包裏，涼了的飯裝著最暖的心意。"}, {"title": "路", "author": "林泠", "body": ["路是人走出來的", "但走著走著", "路就比人長了", "", "人停下來了", "路還在往前延伸", "延伸到看不見的地方去", "也許那裏有另一個走路的人"], "note": "路比人長，它延伸到看不見的地方等待下一個旅人。"}, {"title": "一朵青蓮", "author": "蓉子", "body": ["我願做一朵青蓮", "在污泥中站出自己的清白", "", "不必太高", "不必太大", "只要清清白白地開著", "讓路過的人心裏", "突然安靜下來"], "note": "一朵青蓮在污泥中站出清白，讓人心安靜。"}, {"title": "維納斯", "author": "蓉子", "body": ["你失去了雙臂", "卻比任何人都完整", "", "因為你不再需要擁抱", "不再需要推開什麼", "你只是站在那裏", "讓所有人仰望", "一種殘缺的完美"], "note": "維納斯失去雙臂，卻擁有了殘缺的完美。"}, {"title": "天空象徵", "author": "白萩", "body": ["天空是一面鏡子", "照出所有人的渺小", "", "但渺小不是壞事", "螢火蟲那麼小", "還是亮了一整個夏天", "我們也是一樣"], "note": "天空如鏡，螢火蟲雖小卻能照亮整個夏夜。"}, {"title": "芒果", "author": "管管", "body": ["咬一口芒果", "汁液順著嘴角流下來", "整個夏天就在嘴裏了", "", "甜的，黏的", "有陽光的味道", "有小時候的味道", "有媽媽切芒果的手的味道"], "note": "一口芒果裏藏著整個夏天和媽媽的手心。"}, {"title": "雨", "author": "管管", "body": ["雨下得很大", "大到可以在街上游泳", "", "我撐著一把傘", "傘太小了", "只夠遮住一個想念你的念頭", "其他的念頭", "全濕了"], "note": "傘太小遮不住所有的念頭，於是思念全被淋濕。"}, {"title": "請你安靜", "author": "管管", "body": ["請你安靜", "讓我聽聽這世界原來的聲音", "", "蟬在叫", "風在走", "雲在飄", "你的心跳", "是其中最好聽的一種"], "note": "安靜下來才聽見，你的心跳是世界最好聽的聲音。"}, {"title": "負荷", "author": "吳晟", "body": ["阿爸每天早早出門", "肩上扛著鋤頭", "扛著一家人的喫穿", "", "回家的時候", "肩膀上的擔子放下了", "但背彎了一點點", "每天都彎一點點", "彎到有一天", "再也直不起來了"], "note": "父親的背每天彎一點點，那是愛最沉重的負荷。"}, {"title": "我不和你談論", "author": "吳晟", "body": ["我不和你談論詩藝", "不和你談論那些糾纏不清的隱喻", "", "請離開書房", "我帶你去廣袤的田野走走", "去看看遍地結穗的稻禾", "如何沉默地", "佇立在風裏"], "note": "離開書房走進田野，稻禾的沉默比詩藝更深。"}, {"title": "店仔頭", "author": "吳晟", "body": ["店仔頭的黃昏", "阿婆坐在廟口搖蒲扇", "隔壁的收音機放著歌仔戲", "", "路過的人都認識", "連狗都有名字", "這就是我的故鄉", "小到可以裝在手掌心裏", "但暖得像冬天的被窩"], "note": "店仔頭小到裝在掌心，卻暖如冬夜的被窩。"}, {"title": "窗", "author": "羅門", "body": ["窗是牆壁的眼睛", "它看見了外面的世界", "也讓外面的世界看見了裏面", "", "你拉上窗簾", "牆壁就閉上了眼睛", "但窗外的風景", "並不因此消失"], "note": "窗是牆壁的眼睛，拉上窗簾風景也不會消失。"}, {"title": "流浪人", "author": "羅門", "body": ["流浪人走過很多城市", "每個城市都像一張陌生的臉", "", "他帶著一把吉他", "和一個空空的行囊", "彈過的歌都留在了風裏", "留在了那些他再也不會回去的地方"], "note": "流浪人的歌留在風裏，留在再也不回的城市。"}, {"title": "風景No.2", "author": "林亨泰", "body": ["田與田之間", "是水圳", "水圳與水圳之間", "是田", "", "農夫在田裏", "水在水圳裏", "風在天上", "雲在更遠的天上"], "note": "田與水圳交錯，構成最簡潔的鄉間風景。"}, {"title": "我的記憶", "author": "戴望舒", "body": ["我的記憶是忠實於我的", "忠實甚於我最好的友人", "", "它存在在燃著的煙捲上", "它存在在繪著百合花的筆桿上", "它存在在破舊的粉盒上", "它存在在頹垣的木莓上", "它存在在喝了一半的酒瓶上"], "note": "記憶比最好的朋友更忠實，存在於一切物件之上。"}, {"title": "樂園鳥", "author": "戴望舒", "body": ["飛著，飛著，春夏秋冬", "晝夜，沒有休止", "華羽的樂園鳥", "這是幸福的雲遊呢", "還是永恆的苦役", "", "飛著，飛著", "渴望著停落的一天"], "note": "樂園鳥不停地飛，幸福與苦役只在一念之間。"}, {"title": "魚目集", "author": "卞之琳", "body": ["魚的眼睛是假的珍珠", "但在水裏看起來", "比真的珍珠還亮", "", "我的詩也許也是魚目", "但在某一個讀者的眼裏", "它或許能發光"], "note": "魚目或許不是珍珠，但在懂的人眼裏一樣發光。"}, {"title": "贈別", "author": "穆旦", "body": ["多少人的青春在這裏迷醉", "然後走上了這同一道路", "", "帶著不同的傷和不同的夢", "我們曾並肩坐在草地上", "看天上的雲慢慢變形", "你說那像一匹馬", "我說那像一朵花", "後來雲散了", "我們也散了"], "note": "雲散了我們也散了，但那個看雲的午後永在。"}, {"title": "詩八首", "author": "穆旦", "body": ["你的眼睛看見這一場火災", "你看不見我，雖然我為你點燃", "", "唉，那燃燒著的不過是成熟的年代", "你的，我的。我們相隔如重山", "", "從這自然底蛻變的程序裏", "我卻愛了一個暫時的你", "即使我哭泣，變灰，變灰又新生", "姑娘，那只是上帝玩弄他自己"], "note": "愛一個暫時的你，在燃燒的年代裏灰飛又新生。"}, {"title": "智慧之歌", "author": "穆旦", "body": ["我已走到了幻想底盡頭", "這是一片落葉飄零的樹林", "", "每一片葉子標記著一種歡喜", "現在都枯黃地堆積在內心", "", "而我的心靈已變成枯乾的河牀", "張大眼睛企望著天上的雨滴", "但這是智慧的來臨", "因為無所期待所以無所畏懼"], "note": "無所期待便無所畏懼，這是智慧最安靜的降臨。"}, {"title": "大堰河我的保姆", "author": "艾青", "body": ["大堰河，是我的保姆", "她的名字就是生她的村莊的名字", "她是童養媳", "", "大堰河，今天我看到雪使我想起了你", "你的被雪壓著的草蓋的墳墓", "你的關閉了的故居簷頭的枯死的瓦菲", "你的被典押了的一丈平方的園地", "", "大堰河，你用你厚大的手掌", "把我抱在懷裏，撫摸我"], "note": "大堰河厚大的手掌裏，有最樸素也最深沉的母愛。"}, {"title": "光的讚歌", "author": "艾青", "body": ["每個人的一生", "不論聰明還是愚蠢", "不論幸福還是不幸", "只要他一離開母體", "就睜著眼睛追尋光明", "", "世界要是沒有光", "等於人沒有眼睛", "航海的沒有羅盤", "光給我們以智慧", "光給我們以想像"], "note": "離開母體的那一刻起，我們都在追尋光明。"}, {"title": "一見鍾情", "author": "辛波絲卡", "body": ["他們彼此深信", "是瞬間迸發的熱情讓他們相遇", "這樣的確定是美麗的", "但變幻無常更為美麗", "", "他們素未謀面", "所以他們確定彼此並無任何瓜葛", "但是從街道、樓梯、大堂傳來的話語——", "他們也許擦肩而過，一百萬次了吧", "", "每一個開始", "畢竟都只是續集", "而充滿情節的書本", "總是從一半開始看起"], "note": "一見鍾情的人也許已擦肩一百萬次，每次開始都是續集。"}, {"title": "種種可能", "author": "辛波絲卡", "body": ["我偏愛電影", "我偏愛貓", "我偏愛華爾乃河沿岸的橡樹", "", "我偏愛寫詩的荒謬", "勝過不寫詩的荒謬", "", "我偏愛例外", "我偏愛及早離去", "我偏愛和醫生聊些別的話題", "我偏愛種種可能"], "note": "偏愛種種可能，是對生命最溫柔的肯定。"}, {"title": "結束與開始", "author": "辛波絲卡", "body": ["每場戰爭過後", "總得有人收拾殘局", "畢竟事情不會自己歸位", "", "總得有人把瓦礫", "鏟到路邊", "好讓載滿屍體的推車通過", "", "總得有人跋涉", "穿過泥沼和灰燼", "穿過沙發的彈簧", "碎玻璃", "和沾血的破布"], "note": "戰爭結束後的收拾殘局，是另一種更漫長的開始。"}, {"title": "在一顆小星星下", "author": "辛波絲卡", "body": ["我為自己向萬物致歉", "我無法同時成為每個人和每樣東西", "", "我知道在我有生之年", "有些東西我永遠不會弄清楚", "我向被我忽略的一切致歉", "向那些我沒能及時伸出援手的人致歉", "", "不要對我生氣，幸福", "我將你視為自己所有"], "note": "在一顆小星星下，為自己無法成為一切而真誠致歉。"}, {"title": "三個最奇怪的詞", "author": "辛波絲卡", "body": ["當我說「未來」這個詞", "第一個字母已經屬於過去", "", "當我說「寂靜」這個詞", "我打破了它", "", "當我說「無」這個詞", "我創造了某種非無的東西"], "note": "語言最奇妙的矛盾——說出寂靜就打破了寂靜。"}, {"title": "萬物靜默如謎", "author": "辛波絲卡", "body": ["窗外的世界很大", "裏面裝著無數的問題", "", "一片葉子為什麼是綠的", "一隻蝴蝶為什麼會飛", "萬物靜默如謎", "只有詩試著回答", "但詩的回答", "也是另一個謎"], "note": "萬物靜默如謎，詩的回答又是另一個謎。"}, {"title": "告別風景", "author": "辛波絲卡", "body": ["我不責怪春天", "它又來了", "我不怪它", "每年都這樣", "以同樣的方式完成自己的義務", "", "我知道", "我的悲傷", "不會阻止綠色的前進"], "note": "我的悲傷不會阻止春天的腳步，綠色照常前進。"}, {"title": "橋上的人們", "author": "辛波絲卡", "body": ["一幅奇異的畫", "橋上的人們在走", "", "有些走得快", "有些走得慢", "沒有人知道", "橋的另一頭是什麼", "但他們都在走", "這就夠了"], "note": "橋上的人不知道另一頭是什麼，但走著本身就夠了。"}, {"title": "二十億光年的孤獨", "author": "谷川俊太郎", "body": ["人類在小小的球上", "睡覺起牀然後工作", "有時也會想", "要到火星上去", "", "萬有引力", "是相互吸引孤獨的力", "", "宇宙正在傾斜", "所以大家渴望相遇", "二十億光年的孤獨裏", "我無端地打了一個噴嚏"], "note": "萬有引力是孤獨相互吸引的力，所以我們渴望相遇。"}, {"title": "小鳥在天空消失的日子", "author": "谷川俊太郎", "body": ["小鳥在天空消失的日子", "天空在默默地俯瞰大地", "地面上的人們在默默地仰望天空", "", "從那天起", "人們把天空叫做", "「失去小鳥的天空」", "而天空什麼也沒說"], "note": "失去小鳥的天空什麼也沒說，沉默比哀傷更深。"}, {"title": "活著", "author": "谷川俊太郎", "body": ["活著", "現在活著", "鳥在展翅", "海在狂湧", "蝸牛在爬", "", "活著", "現在活著", "哭泣是活著", "笑是活著", "感覺風的溫柔也是活著"], "note": "活著就是現在——鳥展翅、海狂湧、風溫柔。"}, {"title": "河流", "author": "谷川俊太郎", "body": ["河流不知道自己要去哪裏", "它只是一直流", "", "經過村莊，經過城市", "經過田野和森林", "它帶走了一些東西", "也留下了一些東西", "最後它到了海裏", "變成了比自己更大的東西"], "note": "河流不知去處只管流，最後匯入大海變成更大的自己。"}, {"title": "春天", "author": "谷川俊太郎", "body": ["春天是什麼顏色的呢", "是粉紅色的櫻花", "還是嫩綠色的新芽", "", "春天是什麼味道的呢", "是泥土的氣息", "還是剛出爐的麵包", "", "春天是什麼聲音的呢", "大概是小孩子奔跑的腳步聲吧"], "note": "春天的聲音，大概是小孩子奔跑的腳步聲。"}, {"title": "夜", "author": "谷川俊太郎", "body": ["夜很安靜", "安靜到可以聽見", "月亮移動的聲音", "", "在這樣的夜裏", "所有白天說不出口的話", "都變成了星星", "掛在天上"], "note": "白天說不出口的話，在夜裏變成了天上的星星。"}, {"title": "世界的約定", "author": "谷川俊太郎", "body": ["淚水和微笑之間", "有一個約定", "那就是活下去", "", "在悲傷和歡喜之間", "有一個約定", "那就是珍惜", "", "這是世界給我們的約定", "我們不能違約"], "note": "世界的約定是活下去、是珍惜，我們不能違約。"}, {"title": "擁抱", "author": "谷川俊太郎", "body": ["擁抱是語言發明之前", "人類最早的交流方式", "", "不需要翻譯", "不需要解釋", "只要把手臂張開", "就能說出所有的話"], "note": "擁抱是語言之前的語言，張開手臂就說出一切。"}, {"title": "飛鳥集精選", "author": "泰戈爾", "body": ["夏天的飛鳥，飛到我的窗前唱歌，又飛去了", "秋天的黃葉，它們沒有什麼可唱，只嘆息一聲，飛落在那裏", "", "世界以痛吻我，要我報之以歌", "", "如果你因失去了太陽而流淚", "那麼你也將失去羣星了", "", "生如夏花之絢爛", "死如秋葉之靜美"], "note": "生如夏花絢爛，死如秋葉靜美，世界以痛吻我而我報以歌。"}, {"title": "新月集精選", "author": "泰戈爾", "body": ["孩子，你真是父親身體的一部分嗎", "我不知道你從哪裏來的", "也不知道你是怎樣來到我身邊的", "", "你知道嗎", "當我第一次把你抱在懷裏的時候", "你伸出小手指", "握住了我的整個世界"], "note": "孩子伸出小手指，就握住了父親的整個世界。"}, {"title": "吉檀迦利精選", "author": "泰戈爾", "body": ["你已經使我永生，這樣做是你的歡樂", "這脆薄的杯兒，你不斷地把它倒空", "又不斷地以新生命來充滿", "", "這小小的葦笛，你攜帶著它翻過山巔越過河谷", "從笛管裏吹出永新的音樂", "", "在你雙手的不朽的按觸下", "我的小小的心，消融在無邊的歡樂之中", "發出不可言說的詞調"], "note": "脆薄的杯兒不斷倒空又充滿，這是永生的歡樂。"}, {"title": "園丁集精選", "author": "泰戈爾", "body": ["你的眼睛像雨雲一樣暗", "你的眼睫毛在雨霧裏垂下來", "", "你的髮絲搭在額頭上", "像是黃昏時候的陰影", "", "而你的嘴脣", "因為回答我的愛而微張", "像一朵新花", "在清晨的光裏初開"], "note": "你的嘴脣為愛微張，像清晨裏初開的新花。"}, {"title": "飛鳥集精選之二", "author": "泰戈爾", "body": ["讓我的愛像陽光一樣包圍著你", "而又給你光輝燦爛的自由", "", "我們的生命是天賦的", "我們惟有獻出生命，才能得到生命", "", "當你把所有的錯誤都關在門外", "真理也就被拒之門外了"], "note": "愛像陽光包圍你，同時給你光輝燦爛的自由。"}, {"title": "新月集精選之二", "author": "泰戈爾", "body": ["我願意我能在我孩子自己的世界的中心", "佔一角清淨之地", "", "他的世界裏有用彩色紙糊的船", "有用枯樹葉做成的船帆", "有用露水裝成的池塘", "有用甜夢編成的搖籃", "在那裏", "一切都如孩子般完整"], "note": "孩子的世界用彩紙和露水搭成，一切完整如夢。"}, {"title": "吉檀迦利精選之二", "author": "泰戈爾", "body": ["如果你不說話，我就含忍著", "以你的沉默來填滿我的心", "我要靜靜地等候", "像黑夜在星光中無眠", "忍耐地低著頭", "", "清晨一定會來", "黑暗也會消失", "你的聲音將劃過金色的天空", "如瀑布般傾落"], "note": "以你的沉默填滿我的心，耐心等候清晨到來。"}, {"title": "園丁集精選之二", "author": "泰戈爾", "body": ["我不要求你與我同行", "也不要求你與我說話", "只是當我坐在路邊疲憊的時候", "讓我看見你在花園裏走過", "", "讓你衣裳的窸窣和手鐲的叮噹", "在午後的慵懶裏", "喚醒我沉睡的心"], "note": "不求同行只求看你走過，那已足夠喚醒沉睡的心。"}, {"title": "客棧", "author": "魯米", "body": ["人的存在就像一座客棧", "每天早上都有新的訪客到來", "", "一份喜悅，一份沮喪，一份卑劣", "某種短暫的覺知", "以不速之客的身分降臨", "", "歡迎他們每一位", "即使他們是一羣悲傷的訪客", "粗暴地把你的屋子掃蕩一空", "仍然要以禮相待", "因為他們每一位", "都可能為你帶來新的喜悅"], "note": "人生如客棧，每個到訪的情緒都是送禮的客人。"}, {"title": "蘆笛之歌", "author": "魯米", "body": ["聽那蘆笛如何訴說", "被從蘆葦叢中割下的故事", "", "自從我被割離那蘆葦叢", "我的哀鳴令男男女女落淚", "我要的是因分離而碎裂的心", "好讓我傾訴思念的痛苦", "", "誰若遠離了自己的源頭", "就會一直尋找回歸的時刻"], "note": "蘆笛的哀鳴是離根之痛，我們都在尋找回歸的路。"}, {"title": "這些痛", "author": "魯米", "body": ["不要逃避你的悲傷", "每一道傷口都是光進入你的地方", "", "這些痛讓你成為更深的海", "更廣闊的天空", "傷口不是恥辱", "它是你被光選中的記號"], "note": "傷口是光進入的地方，每一道痛都讓你更深邃。"}, {"title": "寧靜", "author": "魯米", "body": ["在語言停止的地方", "有一片寧靜的田野", "我在那裏等你", "", "不說對錯", "不論善惡", "只是躺在草地上", "看雲慢慢經過", "那裏的風很輕", "輕到可以聽見靈魂呼吸"], "note": "語言停止的地方有一片田野，我在那裏等你。"}, {"title": "愛的海洋", "author": "魯米", "body": ["愛是一座海洋", "你不能從岸上看它就說你認識它", "", "你得走進去", "讓海水淹過你的腳踝", "你的膝蓋，你的腰", "你的胸口，你的頭頂", "然後你才知道", "愛是什麼"], "note": "愛是海洋，必須走進去讓它淹沒你才能真正認識。"}, {"title": "在你自己的房屋", "author": "魯米", "body": ["你到處尋找上帝", "卻忽略了自己的房屋", "", "你在書本裏找", "在廟宇裏找", "在山頂上找", "回家吧", "你要找的東西", "一直在你的心裏住著"], "note": "到處尋找的答案，一直住在自己心裏。"}, {"title": "秋日", "author": "裏爾克", "body": ["主啊，是時候了。夏天盛極一時", "把你的陰影置於日晷之上", "讓風吹過牧場", "", "讓枝頭最後的果實飽滿", "再給兩天南方的好天氣", "催它們成熟，把最後的甘甜", "壓進濃酒", "", "誰此時沒有房子，就不必建造", "誰此時孤獨，就永遠孤獨", "就醒來，讀書，寫長長的信", "在林蔭路上不停地徘徊，落葉紛飛"], "note": "誰此時孤獨就永遠孤獨，在落葉紛飛中讀書寫信。"}, {"title": "豹", "author": "裏爾克", "body": ["牠的目光被那走不完的鐵柵", "纏得這般疲倦", "什麼也不能收留", "牠好像只有千條的鐵柵", "千條的鐵柵後便沒有宇宙", "", "強韌的腳步邁著柔軟的步容", "步容在這極小的圈中旋轉", "彷彿力之舞圍繞著一個中心", "在中心一個偉大的意志昏眩"], "note": "鐵柵後的豹，偉大的意志在極小的圈中昏眩。"}, {"title": "沉重的時刻", "author": "裏爾克", "body": ["此刻有誰在世上某處哭", "無緣無故在世上哭", "在哭我", "", "此刻有誰在夜間某處笑", "無緣無故在夜間笑", "在笑我", "", "此刻有誰在世上某處走", "無緣無故在世上走", "走向我"], "note": "此刻有人在世上某處走，無緣無故走向我。"}, {"title": "預感", "author": "裏爾克", "body": ["我像一面旗幟被遼遠的事物包圍", "我感到陣陣來風，我必須承受", "下面的一切還沒有動靜", "門還在輕輕關著，煙囪裏還沒有聲響", "窗子還不顫動，塵土還很沉重", "", "但我已經知道那風暴", "我激動如大海", "我舒展開又蜷縮回去", "我掙脫自身，又獨自置身於巨大的風暴中"], "note": "像一面旗幟感受到風暴的預感，在激動中舒展又蜷縮。"}, {"title": "致奧菲尤斯十四行", "author": "裏爾克", "body": ["一棵樹升起。純粹的升騰", "奧菲尤斯在歌唱。樹在耳中", "", "一切沉默了。但即使在沉默中", "新的開始、暗示和變化也在發生", "", "林間的動物走出了光線和巢穴", "而且人們漸漸明白了", "並非機敏和恐懼", "讓牠們如此安靜", "而是傾聽"], "note": "奧菲尤斯的歌聲讓萬物安靜，那不是恐懼而是傾聽。"}, {"title": "今夜我可以寫", "author": "聶魯達", "body": ["今夜我可以寫出最哀傷的詩篇", "寫，譬如說，夜色密佈", "羣星在遠方顫抖，碧藍", "夜風在天空中迴旋歌唱", "", "今夜我可以寫出最哀傷的詩篇", "我愛過她，有時她也愛過我", "如同今夜這般的夜裏", "我曾擁她入懷", "在無盡的天空下一遍又一遍地吻她"], "note": "今夜可以寫最哀傷的詩篇，因為曾在星空下愛過。"}, {"title": "我喜歡你沉默的時候", "author": "聶魯達", "body": ["我喜歡你沉默的時候，因為你彷彿不在", "你從遠處聽我，我的聲音觸不到你", "好像你的眼睛已經飛走", "好像一個吻封住了你的嘴", "", "一切都被我的靈魂領走", "你從一切中浮現，充滿了我的靈魂", "你如同我的靈魂，一隻夢的蝴蝶", "你如同「憂鬱」這個字"], "note": "你沉默時彷彿不在，卻充滿了我的整個靈魂。"}, {"title": "二十首情詩之一", "author": "聶魯達", "body": ["女人的身體，白色的山丘，白色的大腿", "你委身於我的姿態恰似這世界", "我粗獷的農夫的身體挖掘你", "讓泥土深處的兒子跳躍而出", "", "我獨自在荒野上", "像一條船的殘骸", "你的回憶是光的所在", "是煙的所在"], "note": "你的回憶是光的所在，也是煙的所在。"}, {"title": "馬丘比丘之巔", "author": "聶魯達", "body": ["石頭做的美洲，高處的玫瑰", "你終於來到了人的嘴脣旁", "", "通過泥土的混沌", "通過岩石的堡壘", "通過血液的河流", "爬上了你嚴酷美麗的城堡", "", "告訴我一切，告訴我鎖鏈和雨水", "把埋藏的沉默和日子", "交還給我"], "note": "馬丘比丘的石頭記住了沉默，等待千年後被詩喚醒。"}, {"title": "如果白晝落進", "author": "聶魯達", "body": ["如果白晝落進", "一個漆黑的深淵", "如果季節在一片空虛中錯亂", "只有你的目光", "能高揚和震動", "像勇敢的水手手中的鈴鐺", "", "你的存在像一條細線", "貫穿我所有的日子", "在混亂中保持了秩序"], "note": "你的目光像水手的鈴鐺，在混亂中保持了秩序。"}, {"title": "當你老了", "author": "葉慈", "body": ["當你老了，頭白了，睡意昏沉", "爐火旁打盹，請取下這部詩歌", "慢慢讀，回想你過去眼神的柔和", "回想它們昔日濃重的陰影", "", "多少人愛你青春歡暢的時辰", "愛慕你的美麗，假意或真心", "只有一個人愛你那朝聖者的靈魂", "愛你衰老了的臉上痛苦的皺紋"], "note": "多少人愛你的青春，只有一人愛你靈魂的皺紋。"}, {"title": "茵尼斯弗利湖島", "author": "葉慈", "body": ["我就要動身走了，去茵尼斯弗利島", "搭起一個小屋子，築起泥巴房", "支起九行架，一排蜂巢", "獨個兒住著，蔭蔽在蜂鳴的林間", "", "我就要動身走了，因為我總是聽到", "那湖水日夜輕輕拍打湖濱", "不管我站在車行道上還是灰暗的人行道上", "都在心靈深處聽見這聲音"], "note": "心靈深處總聽見湖水拍岸的聲音，那是歸去的召喚。"}, {"title": "二度降臨", "author": "葉慈", "body": ["一切都四散了，再也保不住中心", "世界上到處瀰漫著一片混亂", "血色模糊的潮流奔湧橫溢", "到處把純真的典禮淹沒", "", "優秀的人們信心盡失", "而壞蛋們則充滿了狂熱的激情", "", "什麼野獸終於等到了自己的時辰", "慢吞吞地向伯利恆走去投生"], "note": "中心散了混亂蔓延，某個野獸正向伯利恆走去。"}, {"title": "駛向拜占庭", "author": "葉慈", "body": ["那不是老年人的國度。年輕人", "在彼此的臂膀裏，鳥兒在樹上", "——那些垂死的世代——在歌唱", "", "一個老年人不過是件微不足道的東西", "一件破外衣掛在一根棍子上", "除非靈魂拍手作歌，為了每一個", "它那終有一死的衣裳的殘缺而更加縱情歌唱"], "note": "肉身殘缺了，靈魂便更加縱情歌唱。"}, {"title": "復活節1916", "author": "葉慈", "body": ["我在日暮時分與他們相遇", "他們從櫃臺間或辦公桌後", "帶著倦容走出來", "", "我曾確信", "那不過是徒然的犧牲", "而現在，一種可怕的美已經誕生", "一切都已改變", "徹底地改變了", "一種可怕的美已經誕生"], "note": "一種可怕的美已經誕生，一切徹底改變了。"}, {"title": "我是無名之輩", "author": "狄金森", "body": ["我是無名之輩，你是誰", "你也是無名之輩嗎", "那我們便是一對了", "別說出去——他們會張揚的，你知道", "", "成為某某人是多麼乏味", "多麼公開——像一隻青蛙", "對著仰慕的泥塘", "整天聒噪著自己的名字"], "note": "做無名之輩挺好，不必像青蛙整天聒噪自己的名字。"}, {"title": "因為我不能停步等待死亡", "author": "狄金森", "body": ["因為我不能停步等待死亡", "他便殷勤地為我停下", "馬車裏只有我們兩個", "還有永恆同乘", "", "我們緩緩駛過學校", "孩子們在操場上嬉戲", "我們駛過稻田", "駛過西沉的太陽", "——不，其實是它經過了我們"], "note": "死亡殷勤地停下馬車，載我緩緩駛過人生的風景。"}, {"title": "希望是長著羽毛的東西", "author": "狄金森", "body": ["希望是長著羽毛的東西", "棲息在靈魂之上", "唱著沒有歌詞的曲調", "永遠不會停息", "", "在狂風中聽來最動人", "能令風暴感到羞愧的", "正是那小小的鳥兒", "溫暖了那麼多的人", "卻從不向誰索取一粒麵包屑"], "note": "希望是靈魂上的小鳥，在風暴中歌唱卻不索取什麼。"}, {"title": "靈魂選擇自己的伴侶", "author": "狄金森", "body": ["靈魂選擇自己的伴侶", "然後把門關上", "再不容一個人闖入", "她神聖的決定", "", "整個國家來敲門她也不為所動", "國王跪在她的草蓆前", "她也不會心動", "她只認得她認定的那一個"], "note": "靈魂選定了伴侶便關上門，任誰也闖不進來。"}, {"title": "我感覺到葬禮在腦中", "author": "狄金森", "body": ["我感覺到葬禮在腦中", "哀悼者來來回回", "踩啊踩，直到感覺", "理智正在崩塌", "", "然後他們都坐下了", "一場儀式如同一面鼓", "不停地敲打，敲打", "直到我覺得腦中麻木了", "", "然後一塊板子折斷了", "我掉了下去——掉了下去——", "每一層都撞上一個世界"], "note": "腦中的葬禮是理智崩潰的聲音，一層層墜落。"}, {"title": "詩的野獸派", "author": "紀弦", "body": ["我是現代詩的傳教士", "我把詩從象牙塔裏拉出來", "放到街上去", "", "讓它曬太陽", "讓它淋雨", "讓它跟賣菜的阿婆說話", "讓它變成一頭野獸", "在城市的叢林裏奔跑"], "note": "把詩從象牙塔拉到街上，讓它變成一頭自由的野獸。"}, {"title": "斷魂槍", "author": "臧克家", "body": ["他把槍藝練了一輩子", "到老了，槍已經沒有用了", "", "但他每天晚上還是在院子裏", "獨自練他的五虎斷魂槍", "月亮看著他", "他的影子在地上", "還像年輕時候一樣矯健"], "note": "月下獨練斷魂槍，影子還是年輕時的模樣。"}, {"title": "泥土的歌", "author": "臧克家", "body": ["泥土是貧窮的", "但泥土是富有的", "它養活了一代又一代的人", "", "農人光著腳站在泥土裏", "腳趾和根一樣深", "他們的汗水落在泥土裏", "變成了明年的稻穗"], "note": "泥土貧窮又富有，汗水落入其中變成明年稻穗。"}, {"title": "致大海", "author": "舒婷", "body": ["大海的日出", "引起多少英雄由衷的讚嘆", "大海的夕陽", "招惹多少詩人溫柔的懷想", "", "多少支在峭壁上唱出的歌曲", "還由海風日夜日夜地傳播", "大海啊，你吞吐著的", "是多少人一生的嚮往"], "note": "大海吞吐日出與夕陽，承載多少人一生的嚮往。"}, {"title": "秋", "author": "穆旦", "body": ["連鴿哨都發出了成熟的音調", "過去了，那陣雨似的急驟的一切", "", "現在一個季節的圓滿結束了", "田野裏安歇著豐足和滿足", "而從果樹的枝葉間", "那和金黃觸摸的秋天的空氣", "正溫柔地吹拂著"], "note": "秋天的空氣溫柔吹拂，一個圓滿的季節安歇著。"}, {"title": "向太陽", "author": "艾青", "body": ["從遙遠的東方", "從黑夜裏", "太陽向我們滾來", "", "它用光芒照射著", "這片久被黑暗遮蔽的大地", "它用溫暖的手掌", "撫摸著每一個人的臉", "", "向太陽，向太陽", "那裏有光明的中國"], "note": "太陽從東方滾來，帶著光明撫摸每個人的臉。"}, {"title": "星星變奏曲", "author": "江河", "body": ["如果大地的每個角落都充滿了光明", "誰還需要星星，誰還會", "在夜裏凝望", "尋找遙遠的安慰", "", "誰不願意", "每天都是一首詩", "每個字都是一顆星", "像蜜蜂在心頭顫動", "", "誰不願意，有一個柔軟的晚上", "柔軟得像一片湖", "螢火蟲和星星在睡蓮叢中遊動"], "note": "如果大地充滿光明，誰還需要在夜裏凝望星星。"}, {"title": "星球紀事", "author": "陳克華", "body": ["我們在星球上相遇", "像兩顆隕石", "各自帶著前世的軌跡", "撞出一片燦爛的火光", "", "然後繼續飛行", "在各自的黑暗裡", "懷念那一刻的光明"], "note": "每一次相遇都是宇宙中最珍貴的巧合。"}, {"title": "臺北", "author": "陳克華", "body": ["臺北是一座失眠的城市", "霓虹燈替代了星星", "我們在捷運裡相遇", "又在出口處分離", "", "每個人都趕著去赴約", "和自己的孤獨"], "note": "城市愈繁華，人心愈需要一盞安靜的燈。"}, {"title": "善意的夜晚", "author": "陳克華", "body": ["夜晚是善意的", "它把所有的醜陋藏起來", "只留下星光和月色", "讓我們看見彼此最好的樣子", "", "在黑暗中", "我們終於可以", "不必偽裝地相愛"], "note": "黑夜溫柔地收容了白天不敢說出口的真心。"}, {"title": "欠你一首彩虹", "author": "陳克華", "body": ["我欠你一首彩虹", "從那年雨後的下午算起", "你站在窗前等我", "我卻走進了另一場雨", "", "多年以後", "我終於學會了配色", "卻找不到那扇窗"], "note": "有些虧欠，用一輩子也無法調配出當初的顏色。"}, {"title": "美麗深邃的亞細亞", "author": "陳克華", "body": ["亞細亞的眼睛是深邃的", "裝滿了五千年的風沙", "和一整個太平洋的淚水", "", "我們從這裡出發", "帶著黑頭髮和黃皮膚", "去尋找一個", "不必解釋自己的地方"], "note": "身份是一座橋，而非一道牆。"}, {"title": "比海還遠", "author": "鯨向海", "body": ["你比海還遠", "遠到我的思念", "必須搭乘最慢的船", "才能抵達", "", "而我願意", "用一輩子的時間", "慢慢地航行", "向你靠近"], "note": "最遠的距離，恰好是最深情的航程。"}, {"title": "銀河小學", "author": "鯨向海", "body": ["在銀河小學", "星星們排排坐", "學習如何發光", "", "有的學會了溫柔的閃爍", "有的學會了寂寞的恆亮", "有的在畢業典禮上", "變成了流星"], "note": "每顆星星都有自己的功課，而光是最難學的一門。"}, {"title": "通緝犯", "author": "鯨向海", "body": ["愛情把我列為通緝犯", "罪名是過度思念", "偷走了你的笑容", "私藏了你的聲音", "", "我在每個深夜裡逃亡", "卻總是被夢境出賣"], "note": "在愛裡，我們都是心甘情願的逃亡者。"}, {"title": "沿海岸線徵友", "author": "鯨向海", "body": ["沿著海岸線貼一則啟事", "徵求一個願意和我", "一起數浪的人", "", "不需要太多條件", "只要能忍受我偶爾的沉默", "和我突然的感傷", "在潮汐之間"], "note": "最好的陪伴，是在沉默中也不覺得尷尬。"}, {"title": "春天的速度", "author": "鯨向海", "body": ["春天來得太快了", "快到花還來不及準備", "就被打開了", "", "像一封倉促的情書", "字跡潦草", "卻滿是真心"], "note": "春天從不等誰準備好，它只管盛放。"}, {"title": "那些閃電指向你", "author": "林婉瑜", "body": ["天空裂開的時候", "所有的閃電指向你", "像宇宙的箭頭", "標示著唯一的方向", "", "我沿著光的路徑走去", "在雷聲中找到你", "全身濕透卻微笑著"], "note": "愛是暴風雨裡最明亮的指引。"}, {"title": "愛的24則運算", "author": "林婉瑜", "body": ["愛是加法", "一個人加一個人", "等於一個宇宙", "", "愛是減法", "把所有防備減去", "剩下最脆弱的自己", "", "愛是乘法", "把思念乘以日夜", "得到無限", "", "愛是除法", "痛苦除以兩個人", "就不那麼痛了"], "note": "愛的算式裡沒有標準答案，只有真心。"}, {"title": "可以整天都不說話", "author": "林婉瑜", "body": ["可以整天都不說話", "只是坐在你身邊", "看書或者發呆", "", "偶爾抬頭看你一眼", "確認你還在", "就覺得這一天", "過得很好了"], "note": "最深的默契，是無聲勝有聲的安然。"}, {"title": "剛剛發生的事", "author": "林婉瑜", "body": ["剛剛發生的事", "已經成為過去", "你說的那句話", "還停留在空氣裡", "", "我想伸手去接住它", "像接住一片", "正在飄落的花瓣"], "note": "每一個當下都在消逝，所以每一刻都值得珍惜。"}, {"title": "下輩子更加決定", "author": "林婉瑜", "body": ["下輩子更加決定", "要早一點遇見你", "在我還沒有被世界", "磨去稜角之前", "", "用最完整的自己", "來愛你", "不留餘地地"], "note": "如果有來生，我要把最好的自己先留給你。"}, {"title": "任性的人哭了", "author": "追奇", "body": ["任性的人哭了", "不是因為得不到", "是因為太用力了", "用力地假裝不在乎", "", "其實每一次轉身", "都是在練習", "如何優雅地崩潰"], "note": "任性是脆弱最倔強的偽裝。"}, {"title": "你走之後我自己煮飯", "author": "追奇", "body": ["你走之後我自己煮飯", "才發現米要洗兩次", "水要放到第二個指節", "", "一個人喫飯的時候", "筷子夾起的每一口", "都帶著想你的味道"], "note": "日常裡的思念，總藏在最瑣碎的細節中。"}, {"title": "結局以外", "author": "追奇", "body": ["結局以外", "還有很多值得記住的事", "比如你笑起來的樣子", "比如我們淋過的那場雨", "", "比如那些說不出口的", "後來都寫成了詩"], "note": "結局不是全部，過程中的光纔是永遠。"}, {"title": "如果你像我這樣", "author": "追奇", "body": ["如果你像我這樣", "在深夜裡反覆播放一首歌", "直到歌詞變成自己的故事", "", "你就會知道", "有些寂寞", "是自己選的", "卻不是自己想要的"], "note": "我們選擇了寂寞，卻從沒學會與它和平共處。"}, {"title": "好好愛自己", "author": "追奇", "body": ["好好愛自己", "不是自私", "是因為只有把自己照顧好了", "纔有能力去愛別人", "", "先給自己一個擁抱", "再去擁抱世界"], "note": "愛自己是愛一切的起點。"}, {"title": "雪地裡的星星", "author": "任明信", "body": ["雪地裡有星星", "是誰掉落的眼淚", "凍成了光", "", "我撿起一顆", "握在掌心", "它融化了", "變成一滴溫暖"], "note": "最冷的地方也藏著溫暖，只要你願意彎腰拾起。"}, {"title": "離開以後", "author": "任明信", "body": ["離開以後", "你變成了一個地名", "每次經過那條街", "就像經過你的一生", "", "紅綠燈在那裡變換", "我卻始終停在", "你離開的那一秒"], "note": "離開的人變成了座標，留下的人變成了時鐘。"}, {"title": "有鹿", "author": "許悔之", "body": ["有鹿走過我的心", "留下淡淡的蹄印", "像一行未完成的詩", "", "我追隨那些痕跡", "走進森林的深處", "發現自己纔是", "那隻迷路的鹿"], "note": "追尋的盡頭往往是回到自己。"}, {"title": "當傷口長出翅膀", "author": "許悔之", "body": ["當傷口長出翅膀", "痛苦就變成了飛翔", "那些曾經讓你跪下的重量", "都成了起飛的力量", "", "不要害怕受傷", "每一道裂縫", "都是光進來的地方"], "note": "傷口是生命賜予的翅膀，痛過才能飛翔。"}, {"title": "靜靜的生活", "author": "許悔之", "body": ["靜靜地泡一壺茶", "看窗外的雲慢慢移動", "不急著去任何地方", "", "生活不必轟轟烈烈", "一杯茶的時間", "就是一個小小的永恆"], "note": "真正的奢侈是擁有一段不被打擾的時光。"}, {"title": "島", "author": "許悔之", "body": ["我是一座島", "被海洋圍繞", "看起來孤獨", "其實和整個世界相連", "", "潮水帶來遠方的消息", "又帶走我的思念", "在漲退之間", "我學會了等待"], "note": "孤獨的島嶼，其實連著最深的海。"}, {"title": "我佛", "author": "許悔之", "body": ["我佛慈悲", "慈悲到讓我們受苦", "才能學會放下", "", "佛坐在蓮花上微笑", "看我們在紅塵裡", "反覆練習", "一個簡單的動作——", "鬆開手"], "note": "放下是最難的修行，也是最溫柔的慈悲。"}, {"title": "夢中邊陲", "author": "羅智成", "body": ["夢的邊界在哪裡", "走過最後一棵樹以後", "就是醒來的地方", "", "我在邊陲蓋了一間小屋", "半夢半醒地住著", "養了幾隻意象當寵物", "日子也就這樣過了"], "note": "半夢半醒之間，藏著最自由的國度。"}, {"title": "黑色鑲金", "author": "羅智成", "body": ["黑色的天空鑲滿金色的星", "像一件華麗的禮服", "穿在夜的身上", "", "我們抬頭仰望", "其實是在仰望", "一個更高版本的自己"], "note": "黑暗不是空無，是尚未被看見的金光。"}, {"title": "擲乩者", "author": "羅智成", "body": ["擲乩者在恍惚中", "看見了另一個世界", "那裡的語言是火焰", "溝通的方式是燃燒", "", "他回來以後", "寫下幾行字", "紙張微微發燙"], "note": "詩人都是擲乩者，用燃燒換取神諭。"}, {"title": "地球之島", "author": "羅智成", "body": ["地球是宇宙中的一座島", "我們是島上的居民", "仰望星空的時候", "其實是在眺望其他的島嶼", "", "也許某座島上", "也有人正在仰望", "我們這顆藍色的家"], "note": "我們既是島民，也是星際的鄰居。"}, {"title": "雙脣", "author": "焦桐", "body": ["雙脣是兩片花瓣", "合起來是一朵花", "張開來是一個世界", "", "它說過謊", "也說過最真的話", "咬過蘋果", "也親過你的額頭"], "note": "脣是靈魂最柔軟的出口。"}, {"title": "論豆腐", "author": "焦桐", "body": ["豆腐是最謙遜的食物", "白淨柔軟不張揚", "吸收一切風味", "卻從不失去自己", "", "做人若能像豆腐", "在世間百味中", "保持內心的素白"], "note": "豆腐教會我們，柔軟不是軟弱，是包容。"}, {"title": "消失在地圖上的名字", "author": "零雨", "body": ["那些消失在地圖上的名字", "曾經是某人的故鄉", "是某個孩子放學回家的路", "", "地圖被重新繪製了", "路還在", "只是再也沒有人", "叫得出它的名字"], "note": "名字消失了，但土地的記憶不會。"}, {"title": "特技家族", "author": "零雨", "body": ["我們家族擅長特技", "父親走鋼索", "母親吞火", "我在空中飛翔", "", "觀眾以為這是表演", "其實這是我們", "唯一的生存方式"], "note": "每個家庭都在練習各自的平衡術。"}, {"title": "木冬詠歌集", "author": "零雨", "body": ["冬天的樹木", "把所有的話都藏在根裡", "地面上只剩下沉默", "和偶爾的風聲", "", "它在等待", "一個值得開口的春天"], "note": "沉默是為了在對的時候說出更美的話。"}, {"title": "女兒", "author": "零雨", "body": ["女兒是母親的鏡子", "照出年輕時候的自己", "和所有未完成的夢", "", "她跑在前面", "像一陣新鮮的風", "而我在後面", "慢慢地學習放手"], "note": "女兒是母親放飛的風箏，線的另一端永遠握在心裡。"}, {"title": "時間的女兒", "author": "零雨", "body": ["時間有一個女兒", "名叫遺忘", "她溫柔地替我們", "擦去不需要的記憶", "", "但有些痕跡太深了", "怎麼擦也擦不掉", "就變成了疤"], "note": "遺忘是時間的恩賜，記得是靈魂的選擇。"}, {"title": "河流", "author": "陳育虹", "body": ["河流不問去向", "只是一直走", "繞過石頭", "穿過城市", "最後抵達大海", "", "回頭看來時的路", "才發現自己", "畫了一幅地圖"], "note": "不問前路，只管前行，風景自然展開。"}, {"title": "魅", "author": "陳育虹", "body": ["你的魅力在於", "你不知道自己有魅力", "像月亮不知道自己發光", "像花不知道自己芬芳", "", "這種不自知的美", "是世界上最致命的溫柔"], "note": "最迷人的人，往往不知道自己的魅力。"}, {"title": "索引", "author": "陳育虹", "body": ["如果人生是一本書", "你的名字出現在", "最重要的章節", "", "我翻到索引", "發現你的頁數最多", "橫跨了整個青春"], "note": "有些人的名字，寫滿了我們生命的索引。"}, {"title": "之間", "author": "陳育虹", "body": ["在你和我之間", "隔著適當的距離", "不太近也不太遠", "", "剛好夠放下一首詩", "一段沉默", "和一整個下午的陽光"], "note": "最好的關係是保持剛好的距離。"}, {"title": "閃神", "author": "陳育虹", "body": ["閃神的那一秒", "世界繼續運轉", "只有我停了下來", "站在時間的裂縫裡", "", "看見了一些", "專注時看不見的東西", "比如風的形狀", "比如光的重量"], "note": "閃神是靈魂偷偷給自己放的假。"}, {"title": "骨皮肉", "author": "顏艾琳", "body": ["骨頭是最深的堅持", "皮膚是最外的防線", "肉身在兩者之間", "柔軟地活著", "", "愛一個人的時候", "骨頭會痛", "分離的時候", "皮膚會記得"], "note": "身體是情感最誠實的容器。"}, {"title": "黑暗中的音樂", "author": "顏艾琳", "body": ["黑暗中的音樂", "特別清晰", "因為眼睛關上以後", "耳朵就醒了", "", "聽見了平常聽不見的", "心跳和呼吸", "還有你在遠方", "思念我的聲音"], "note": "閉上眼，世界才真正開始歌唱。"}, {"title": "跟天空說話", "author": "顏艾琳", "body": ["我跟天空說話", "天空用雲回答我", "我說我很寂寞", "它就飄來一朵像你的雲", "", "風一吹就散了", "像你一樣", "來了又走"], "note": "天空是最好的聽眾，雲是最溫柔的回信。"}, {"title": "讓詩飛起來", "author": "顏艾琳", "body": ["讓詩飛起來", "像一隻紙飛機", "摺了又摺", "最後丟向天空", "", "它飛得不遠", "卻載著我所有的", "輕盈和沉重"], "note": "詩是最輕的翅膀，卻能承載最重的心事。"}, {"title": "她方", "author": "顏艾琳", "body": ["她方是遠方", "也是她的方向", "一個女人出走的時候", "全世界都是目的地", "", "她不是逃離", "她是出發", "帶著自己的名字", "去找一個配得上的地方"], "note": "出走不是逃避，是為了找到真正屬於自己的方向。"}, {"title": "我是一件行李", "author": "渡也", "body": ["我是一件行李", "被生活提著走", "從這個城市到那個城市", "", "裡面裝著記憶和夢", "越走越重", "卻捨不得丟掉", "任何一樣東西"], "note": "人生就是一趟不斷加重的旅途。"}, {"title": "飄搖", "author": "渡也", "body": ["風中的草", "不知道自己要去哪裡", "只知道不能停下來", "", "停下來就倒了", "所以繼續飄搖", "在搖晃中", "找到自己的節奏"], "note": "飄搖不是軟弱，是在風中找到自己的舞步。"}, {"title": "流浪的黃狗", "author": "渡也", "body": ["那隻黃狗在街角等了很久", "等一個不會回來的人", "它不知道什麼是背叛", "只知道什麼是等待", "", "後來它學會了流浪", "卻始終記得", "那個街角的方向"], "note": "忠誠是一隻狗教會人類最深的功課。"}, {"title": "背影", "author": "渡也", "body": ["父親的背影", "越來越小", "小到可以裝進", "一張舊照片裡", "", "我把照片放在書桌上", "每天看著他走遠", "每天練習不哭"], "note": "背影是親情最沉默的告白。"}, {"title": "你的聲音充滿時間", "author": "楊佳嫻", "body": ["你的聲音充滿時間", "像水注滿杯子", "溢出來的部分", "變成了回憶", "", "我在回憶裡游泳", "潛入最深處", "聽你說過的每一句話", "在水底迴盪"], "note": "聲音是時間的水印，永遠浮在記憶的表面。"}, {"title": "少女維特", "author": "楊佳嫻", "body": ["少女維特的煩惱", "不是愛情", "是不知道該愛誰", "在選擇太多的年代", "", "她翻開書", "在別人的故事裡", "尋找自己的答案"], "note": "少女的煩惱不是沒有愛，是太多可能。"}, {"title": "金烏", "author": "楊佳嫻", "body": ["金烏飛過天際", "帶走了一整個下午", "留下橘紅色的晚霞", "像一封燃燒的信", "", "收件人是黑夜", "內容是：", "我先走了", "你好好照顧他們"], "note": "日落是太陽寫給黑夜的交接信。"}, {"title": "瑪德蓮", "author": "楊佳嫻", "body": ["一口瑪德蓮", "咬開了整個過去", "記憶像糖粉一樣", "灑落在舌尖", "", "原來時間的味道", "是甜的", "帶著一點點", "回不去的苦"], "note": "味覺是記憶最誠實的時光機。"}, {"title": "屏息的文明", "author": "楊佳嫻", "body": ["文明屏住了呼吸", "在戰爭與和平之間", "在遺忘與記得之間", "", "我們小心翼翼地活著", "像在薄冰上行走", "每一步都可能", "踩碎一個世界"], "note": "文明是一場持續的屏息，一口氣都不能鬆懈。"}, {"title": "異鄉人", "author": "孫維民", "body": ["在異鄉的街頭", "所有的路牌都指向遠方", "沒有一個指向家", "", "我在口袋裡", "摸到一張過期的車票", "纔想起回去的路", "早已停駛"], "note": "異鄉人的口袋裡，總有一張回不去的車票。"}, {"title": "日日", "author": "孫維民", "body": ["日日是相同的", "起牀刷牙喫早餐", "出門上班回家睡覺", "", "但今天的陽光", "和昨天的不一樣", "照在你臉上的角度", "偏了一點點"], "note": "日日相似，卻從不相同，這是生活的祕密。"}, {"title": "麻雀", "author": "孫維民", "body": ["麻雀站在電線上", "像一個個音符", "風一吹", "就演奏起來", "", "沒有人為它們鼓掌", "但它們每天都唱", "唱給自己聽"], "note": "不需要觀眾的歌聲，纔是最自由的歌。"}, {"title": "拾荒", "author": "孫維民", "body": ["我在時間的垃圾堆裡", "撿拾被丟棄的記憶", "有些已經生鏽", "有些還閃著微光", "", "我把它們帶回家", "擦乾淨了", "放在書架上", "假裝那是收藏"], "note": "記憶是時間的廢墟，而我們都是拾荒者。"}, {"title": "聽說", "author": "鍾怡雯", "body": ["聽說你去了遠方", "聽說遠方有海", "聽說海的盡頭", "是另一個開始", "", "我聽說了很多", "卻沒有聽你親口說", "那些關於離開的理由"], "note": "聽說永遠不如親耳聽見，但有時我們只剩聽說。"}, {"title": "河流", "author": "鍾怡雯", "body": ["河流記得所有的倒影", "卻留不住任何一個", "它只能不停地流", "用流動來代替擁有", "", "我站在岸邊", "看見自己的影子", "一閃就過去了"], "note": "流動是河流的方式，放下是我們的功課。"}, {"title": "垂釣", "author": "鍾怡雯", "body": ["坐在河邊垂釣", "不是為了魚", "是為了那一段", "什麼都不想的時間", "", "魚鉤沉入水底", "釣起了一個下午", "和幾朵雲的倒影"], "note": "垂釣者釣的不是魚，是一段寧靜的光陰。"}, {"title": "雨季", "author": "鍾怡雯", "body": ["南方的雨季很長", "長到傘都發了黴", "鞋子長出了水草", "", "但我喜歡雨天", "因為全世界都在哭的時候", "我的眼淚", "就不那麼明顯了"], "note": "雨季是最溫柔的掩護，讓淚水不必偽裝。"}, {"title": "穿過大半個中國去睡你", "author": "餘秀華", "body": ["其實，睡你和被你睡是差不多的", "無非是兩具肉體碰撞的力", "無非是這力催開的花朵", "無非是這花朵虛擬出的春天", "讓我們誤以為生命被重新打開", "", "大半個中國", "什麼都在發生", "火山在噴，河流在枯", "一些不被關心的政治犯和流民", "一路在槍口的麥子和花朵中", "趕著投胎"], "note": "最赤裸的語言裡，藏著最深的渴望與悲憫。"}, {"title": "在打穀場上", "author": "餘秀華", "body": ["在打穀場上", "麥子被反覆拍打", "直到靈魂出竅", "", "我也是這樣", "被生活反覆拍打", "直到把最真的部分", "交了出來"], "note": "人和麥子一樣，只有經過拍打，才能交出精華。"}, {"title": "給你", "author": "餘秀華", "body": ["把最好的詞給你", "也把最壞的給你", "把春天給你", "也把冬天給你", "", "一個女人能給的", "無非就是這些了", "連同她搖晃的身體", "和不搖晃的心"], "note": "真正的給予是完整的自己，好的壞的都不保留。"}, {"title": "一打穀場的麥子", "author": "餘秀華", "body": ["一打穀場的麥子", "在陽光下金黃", "每一粒都飽滿", "像大地的汗珠", "", "我彎腰收割", "收割的同時", "也把自己種回了泥土裡"], "note": "收穫與播種同時發生，這是土地教給我的。"}, {"title": "虛構", "author": "西川", "body": ["我虛構了一個國度", "在那裡", "所有的牆都是透明的", "所有的謊言都會發光", "", "人們靠說真話為生", "說謊的人", "會慢慢變成石頭"], "note": "虛構是為了照見真實中看不見的東西。"}, {"title": "十四首素歌", "author": "翟永明", "body": ["用最素的聲音唱", "不加修飾", "不加濾鏡", "", "把所有的華麗都脫掉", "只剩下一個", "赤裸的靈魂", "站在風裡發抖"], "note": "素歌是靈魂脫去外衣後最真實的聲音。"}, {"title": "咖啡館之歌", "author": "翟永明", "body": ["咖啡館裡坐滿了孤獨的人", "每個人面前一杯咖啡", "一臺電腦", "一整個宇宙的心事", "", "我們在同一個空間裡", "各自孤獨著", "這就是最時髦的社交"], "note": "咖啡館是孤獨者最合羣的聚會場所。"}, {"title": "月光白得很", "author": "王小妮", "body": ["月光白得很", "白到可以洗衣服", "白到可以照見", "一個人心裡的灰塵", "", "我站在月光下", "讓它把我洗乾淨", "連影子都洗白了"], "note": "月光是夜晚的漂白水，把所有的暗都洗淡了。"}, {"title": "起風了", "author": "王小妮", "body": ["起風了", "樹葉都在鼓掌", "不知道是歡迎誰", "還是送走誰", "", "風穿過我的身體", "帶走了一些東西", "也帶來了一些", "我分不清哪些是失去", "哪些是得到"], "note": "風是最公平的旅人，帶走也帶來。"}, {"title": "一塊稻田的懷念", "author": "王小妮", "body": ["那塊稻田還在嗎", "那個蹲在田邊的人", "還在嗎", "", "稻子收了一季又一季", "田還是那塊田", "人卻換了又換", "只有泥土記得所有的腳印"], "note": "泥土是最忠實的日記本，記錄每一雙走過的腳。"}, {"title": "魚羣三部曲", "author": "食指", "body": ["魚羣在水底穿行", "像一支沉默的軍隊", "它們知道方向", "卻不知道目的地", "", "我們何嘗不是這樣", "跟著潮流遊動", "以為是自由", "其實是本能"], "note": "隨波逐流的自由，未必是真正的自由。"}, {"title": "海洋三部曲", "author": "食指", "body": ["海洋有三種聲音", "漲潮時是憤怒", "退潮時是嘆息", "平靜時是思考", "", "我坐在岸邊", "聽了一整天", "學會了海的三種表情"], "note": "海教會我們，情緒是有潮汐的，來了就會退去。"}, {"title": "阿姆斯特丹的河流", "author": "多多", "body": ["阿姆斯特丹的河流", "不急著流向任何地方", "它們在城市裡繞來繞去", "像一個迷路的旅人", "", "但河流從不迷路", "它只是在欣賞風景", "用流動的方式"], "note": "迷路也是一種風景，前提是你不急著到達。"}, {"title": "北方的海", "author": "多多", "body": ["北方的海是灰色的", "不像南方那樣碧藍", "它更像一個沉思的人", "低著頭想事情", "", "海浪拍打岸邊", "像一遍遍重複的句子", "說的都是同一件事", "——我還在這裡"], "note": "灰色的海更像人生，不華麗卻真實。"}, {"title": "瑪格麗特的嘗試", "author": "多多", "body": ["瑪格麗特嘗試了很多次", "才學會在鏡子前微笑", "鏡子裡的她", "總是比真實的她慢半拍", "", "後來她打碎了鏡子", "終於不用再和自己", "比賽微笑了"], "note": "打碎鏡子不是破壞，是與虛假的自己告別。"}, {"title": "一首桃花", "author": "林徽因", "body": ["桃花開了", "在那個沒有你的春天", "每一瓣都是粉紅的問句", "問風你去了哪裡", "", "風不回答", "只是吹落了更多的花瓣", "鋪成一條路", "通往你離開的方向"], "note": "桃花年年開，問的都是同一個人的去向。"}, {"title": "原野的小路", "author": "馮至", "body": ["原野的小路", "彎彎曲曲", "不知道通向哪裡", "但每一步都踩在實處", "", "路的兩旁是麥田", "金色的波浪", "像大地在呼吸"], "note": "不知去向的路也是好路，只要腳下踏實。"}, {"title": "我們準備著", "author": "馮至", "body": ["我們準備著深深地領受", "那些意想不到的奇蹟", "在漫長的歲月裡忽然有", "彗星的出現，狂風乍起", "", "我們的生命在這一瞬間", "彷彿在第一次的擁抱裡", "過去的悲歡忽然在眼前", "凝結成屹然不動的形體"], "note": "生命中最好的事，總是在意想不到時降臨。"}, {"title": "有加利樹", "author": "馮至", "body": ["你挺立在那裡", "高出了一切的樹木", "但你不驕傲", "只是安靜地站著", "", "你的根深入大地", "你的枝伸向天空", "在兩者之間", "你找到了自己的位置"], "note": "真正的高大不是炫耀，是安靜地站在天地之間。"}, {"title": "忘掉她", "author": "聞一多", "body": ["忘掉她，像一朵忘掉的花", "那朝霞在花瓣上", "那花心的一縷香", "忘掉她，像一朵忘掉的花", "", "忘掉她，像一朵忘掉的花", "聽蟋蟀聲聲唱", "看螢火點點亮", "忘掉她，像一朵忘掉的花"], "note": "越說忘記，越是記得——花忘了，香還在。"}, {"title": "牧羊人", "author": "佩索亞", "body": ["我的思想是一羣羊", "放牧在山坡上", "有時候走散了", "我也不急著找回", "", "因為思想和羊一樣", "餓了自然會回來", "天黑了自然會歸圈"], "note": "好的思想不需要管束，給它自由就好。"}, {"title": "我的心略大於整個宇宙", "author": "佩索亞", "body": ["我的心略大於整個宇宙", "所以裝得下所有的星辰", "和所有的寂寞", "", "但它裝不下", "一個人的離去", "那比宇宙更大的空洞", "讓整顆心失重"], "note": "心可以裝下宇宙，卻裝不下一個人離開的空白。"}, {"title": "煙草店", "author": "佩索亞", "body": ["煙草店就在街對面", "門口站著一個人", "他什麼都不做", "只是看著街上的人來人往", "", "這就是哲學", "站在門口", "看世界經過", "然後點一根煙"], "note": "最深的哲學，有時只需要一個門口和一根煙。"}, {"title": "斜雨", "author": "佩索亞", "body": ["斜雨打在窗上", "像一行行傾斜的字", "寫著天空的心事", "", "我讀不懂", "但我感受到了", "那種想說又說不清楚的", "憂愁"], "note": "雨是天空寫在玻璃上的日記，我們讀到的是心情。"}, {"title": "我是一個逃亡者", "author": "佩索亞", "body": ["我是一個逃亡者", "從自己的靈魂裡逃出來", "跑了很遠", "回頭一看", "靈魂還跟在後面", "", "它不急不緩", "因為它知道", "我跑不出自己"], "note": "最無法逃離的追逐者，是你自己。"}, {"title": "在命運之書中", "author": "佩索亞", "body": ["在命運之書中", "翻到屬於我的那一頁", "上面只寫了一個字：", "「等」", "", "我合上書", "開始等待", "也許明天會多一個字"], "note": "命運的書頁很短，但等待讓它變得無限長。"}, {"title": "你不快樂的每一天", "author": "佩索亞", "body": ["你不快樂的每一天", "都不是你的", "你只是在其中虛度而已", "", "不管你是否快樂", "陽光都在那裡", "只要你願意打開窗"], "note": "不快樂的日子不屬於你，打開窗就能找回自己。"}, {"title": "我愛一切", "author": "佩索亞", "body": ["我愛一切", "愛得毫無理由", "愛路邊的石頭", "愛電線桿上的鳥", "愛陌生人的笑容", "", "這種愛不需要回報", "因為回報已經在愛裡了"], "note": "無差別的愛，是最自由的愛。"}, {"title": "海洋頌", "author": "佩索亞", "body": ["海洋是大地的眼淚", "流了幾億年", "還沒有哭完", "", "但海洋也是笑的", "你看那些浪花", "一朵一朵地笑著", "撞碎在岩石上"], "note": "海洋教會我們，哭和笑可以同時發生。"}, {"title": "書信集", "author": "佩索亞", "body": ["我給自己寫了一封信", "問自己過得好不好", "等了很久", "才收到回信", "", "信上說：", "「我不知道，你呢？」"], "note": "最難回答的問題，是自己問自己的那一個。"}, {"title": "野鵝", "author": "瑪麗·奧利弗", "body": ["你不必做一個好人", "你不必跪行穿過沙漠", "懺悔千百里路", "你只要讓身體裡柔軟的動物", "去愛它所愛的", "", "與此同時世界繼續運轉", "太陽和明亮的雨滴", "穿過山谷", "野鵝在清澈的天空高處", "一次又一次呼喚你", "宣告你在萬物的家族中", "佔有一席之地"], "note": "你不必完美，只要允許自己被世界接納。"}, {"title": "夏日", "author": "瑪麗·奧利弗", "body": ["誰創造了這個世界", "誰創造了天鵝和黑熊", "誰創造了蚱蜢", "", "我不知道祈禱是什麼", "但我知道怎樣關注", "怎樣在草叢中跌倒", "怎樣在光裡跪下", "怎樣在田野中散步", "這就是我一整天在做的事"], "note": "專注於當下的一草一木，就是最好的祈禱。"}, {"title": "在黑水塘邊", "author": "瑪麗·奧利弗", "body": ["在黑水塘邊", "我站了一個早上", "看蓮花慢慢打開", "", "它不著急", "花瓣一片一片地舒展", "像一個人慢慢學會信任", "先打開一點點", "然後再多一點"], "note": "信任像花開，需要時間和安全感。"}, {"title": "旅程", "author": "瑪麗·奧利弗", "body": ["終有一天你知道了", "你該怎樣做，然後開始出發", "雖然周圍的聲音", "一直在喊著壞的建議", "", "但你一步一步地", "離開了他們的聲音", "走進了只有星星陪伴的路", "新鮮的空氣", "充滿了你的肺"], "note": "出發的勇氣，就是離開所有人的期待，走自己的路。"}, {"title": "黎明", "author": "瑪麗·奧利弗", "body": ["每天我都看見黎明", "好像第一次看見", "光線從地平線溢出", "像被打翻的蜂蜜", "", "世界重新開始了", "帶著它所有的美和傷"], "note": "每一天的黎明都是一次溫柔的重生。"}, {"title": "早晨", "author": "瑪麗·奧利弗", "body": ["今天早晨", "我又一次起得很早", "在世界還沒醒來之前", "獨自享用這份安靜", "", "鳥兒開始唱歌了", "這是最好的鬧鐘", "不催促只是提醒", "新的一天值得起身"], "note": "早起的人偷到了世界最安靜的一面。"}, {"title": "暴風雨", "author": "瑪麗·奧利弗", "body": ["暴風雨來的時候", "樹木彎腰", "不是屈服", "是配合風的舞步", "", "等風走了", "它們又站直了", "比之前更挺拔"], "note": "彎腰不是屈服，是韌性最優雅的姿態。"}, {"title": "白鷺", "author": "瑪麗·奧利弗", "body": ["白鷺站在淺水裡", "一動不動", "像一個逗號", "停在天地之間的句子裡", "", "然後突然起飛", "把整個句子帶上了天空"], "note": "靜止是為了等待起飛的瞬間。"}, {"title": "讚美", "author": "瑪麗·奧利弗", "body": ["讚美這個早晨", "讚美路邊的野花", "讚美螞蟻的勤勞", "讚美河水的耐心", "", "讚美所有微小的事物", "它們構成了", "這個巨大的世界"], "note": "讚美微小，就是讚美整個宇宙。"}, {"title": "今天", "author": "瑪麗·奧利弗", "body": ["今天我打算做一件", "了不起的事", "什麼都不做", "只是快樂地活著", "", "在陽光下散步", "在樹蔭下休息", "讓這一天", "對得起這一天"], "note": "快樂地活著，就是最了不起的事。"}, {"title": "未走之路", "author": "佛洛斯特", "body": ["金色的樹林裡分出兩條路", "可惜我不能同時去涉足", "我在那路口久久佇立", "向著一條路極目望去", "直到它消失在叢林深處", "", "我選了另外一條路", "也許更值得", "因為它草叢茂盛人跡罕至", "雖說那經過的足跡", "其實差不太多"], "note": "每一條未走之路，都是人生另一個可能的自己。"}, {"title": "雪夜林邊停", "author": "佛洛斯特", "body": ["我想我認識這片林子的主人", "他的房子就在前面的村子裡", "他不會看見我停在這裡", "看他的林子積滿了雪", "", "但是我還有諾言要遵守", "還要趕好多里路才能安睡", "還要趕好多里路才能安睡"], "note": "再美的風景也不能久留，因為遠方還有承諾。"}, {"title": "火與冰", "author": "佛洛斯特", "body": ["有人說世界將終結於火", "有人說終結於冰", "從我嚐過的慾望的滋味", "我站在那些偏愛火的一邊", "", "但如果世界必須毀滅兩次", "我想我對仇恨也有足夠的認識", "可以說就毀滅而言", "冰也同樣偉大", "而且足夠"], "note": "慾望如火，仇恨如冰，兩者都能毀滅世界。"}, {"title": "修牆", "author": "佛洛斯特", "body": ["有什麼東西不喜歡牆", "希望把它推倒", "冬天的霜凍讓地面隆起", "牆上的石頭紛紛滾落", "", "我的鄰居說：", "好籬笆造就好鄰居", "但我想問的是", "在建牆之前", "不該先想想", "把什麼圈在裡面", "把什麼擋在外面？"], "note": "牆的意義不在於隔開，在於我們為何而建。"}, {"title": "白樺", "author": "佛洛斯特", "body": ["當我看見白樺彎曲", "橫跨在左右林木間", "我喜歡想像那是", "某個男孩在搖晃它們", "", "他把每棵白樺的樹幹", "一一征服", "騎著它們向地面俯衝", "然後又盪迴天空"], "note": "在天地之間盪鞦韆，是人類最初的浪漫。"}, {"title": "摘蘋果之後", "author": "佛洛斯特", "body": ["我的長梯還支在樹上", "刺向天空", "旁邊有一個空桶", "還沒裝滿", "", "摘蘋果的夢裡", "蘋果的形狀和顏色", "反覆出現", "連睡著了", "手掌都還是彎的"], "note": "勞動印在身體裡的記憶，比頭腦更深刻。"}, {"title": "無人深入", "author": "佛洛斯特", "body": ["無人深入的森林裡", "有一條小徑", "被落葉覆蓋了", "", "走上去的時候", "腳底下沙沙作響", "像踩在時間上面"], "note": "無人走過的路，腳步就是最新鮮的語言。"}, {"title": "沙漠之地", "author": "佛洛斯特", "body": ["沙漠是一種考驗", "考驗你能帶多少水上路", "能丟掉多少不必要的東西", "", "走到最後", "你會發現", "最不可或缺的", "只有自己的影子"], "note": "沙漠教會你分辨什麼是真正需要的。"}, {"title": "自我之歌", "author": "惠特曼", "body": ["我歌頌自己", "並把自己獻給你", "因為屬於我的每一個原子", "同樣屬於你", "", "我邀請我的靈魂", "我俯身悠然觀察", "一片夏天的草葉"], "note": "自我之歌也是眾生之歌，我與你本是一體。"}, {"title": "我聽見美國在歌唱", "author": "惠特曼", "body": ["我聽見美國在歌唱", "各種各樣的歌", "木匠的，船伕的", "鞋匠的，礦工的", "", "每個人唱著自己的歌", "強壯而悅耳", "匯成一首交響曲"], "note": "每個人的勞動之歌，都是世界交響曲的一部分。"}, {"title": "哦船長我的船長", "author": "惠特曼", "body": ["哦船長！我的船長！", "我們險惡的航程已經終了", "我們的船渡過了每一個難關", "我們追尋的目標已經達到", "", "港口就在前面", "鐘聲響了，人們在歡呼", "但是哦心啊心啊心啊", "那殷紅的血一滴一滴地流"], "note": "勝利的歡呼裡，藏著最深的悲傷。"}, {"title": "當我聽到博學的天文學家", "author": "惠特曼", "body": ["當我聽到博學的天文學家", "當證明和數字陳列在我面前", "當圖表和圖解被展示給我", "用加法、除法和度量", "", "我覺得莫名地疲倦和厭煩", "直到我獨自走出去", "在神祕的夜色中", "不時仰望", "那完美沉默的星空"], "note": "星空不需要解釋，仰望本身就是最好的理解。"}, {"title": "草葉集精選", "author": "惠特曼", "body": ["一片草葉不亞於星辰的旅程", "一隻螞蟻同樣完美", "一粒沙同樣完美", "鷦鷯的蛋也同樣完美", "", "最微小的東西", "都蘊含著宇宙全部的法則"], "note": "一片草葉裡有整個宇宙，如果你肯彎腰去看。"}, {"title": "一隻安靜耐心的蜘蛛", "author": "惠特曼", "body": ["一隻安靜耐心的蜘蛛", "我注意到它站在一個小小的岬角上", "孤立地站著", "不停地探索周圍的廣大的空虛", "射出絲來，絲來，絲來", "從它自身不倦地抽出", "", "我的靈魂啊", "你不也站在", "無邊大海的空虛中", "不停地沉思著", "冒險投擲著那些細絲"], "note": "靈魂和蜘蛛一樣，在虛空中不倦地編織連結。"}, {"title": "我在路易斯安那看見一棵活橡樹", "author": "惠特曼", "body": ["我在路易斯安那看見一棵活橡樹正在生長", "它獨自站在那裡", "枝頭掛滿了苔蘚", "沒有同伴", "卻長出了快樂的葉子", "", "我折下一根枝條帶走", "在上面纏繞了一些苔蘚", "放在書桌上", "但我知道我無法獨自活著"], "note": "樹能獨自快樂，人卻需要陪伴——這是人的軟弱也是美麗。"}, {"title": "穿越布魯克林渡口", "author": "惠特曼", "body": ["洪水漲起來了", "我在渡口看見", "無數的人羣來來去去", "", "一百年後", "你們也會這樣渡河", "看同樣的太陽", "感受同樣的潮水", "而我的詩", "就是那條渡船"], "note": "詩是跨越時間的渡船，把此刻送到永遠。"}, {"title": "秋頌", "author": "濟慈", "body": ["霧靄和果實豐碩的季節", "成熟太陽的親密朋友", "你們在密謀", "怎樣讓葡萄藤", "結滿祝福的果實", "", "讓遲開的花朵", "為蜜蜂們繼續綻放", "讓它們以為", "溫暖的日子永遠不會結束"], "note": "秋天的豐盛裡，藏著一份讓人捨不得醒來的夢。"}, {"title": "夜鶯頌", "author": "濟慈", "body": ["我的心在痛", "一種昏沉的麻木刺穿了感官", "彷彿飲了毒鴆", "又彷彿剛把鴉片吞服", "一分鐘便向忘河沉沒", "", "不是嫉妒你的幸運", "而是你的幸福讓我太快樂", "你是森林的精靈", "在綠蔭下放聲歌唱"], "note": "美到極致的歌聲，讓人分不清快樂和疼痛。"}, {"title": "希臘古甕頌", "author": "濟慈", "body": ["你仍未被摧毀的寧靜新娘", "你被沉默和漫長歲月領養的孩子", "森林的歷史學家", "你訴說著一個花的故事", "比我們的詩更甜蜜", "", "聽見的旋律是甜美的", "但聽不見的更甜美", "美即是真，真即是美", "這是你們所知道的一切", "也是你們需要知道的一切"], "note": "永恆的美凝固在瞬間，真與美在靜止中合而為一。"}, {"title": "明亮的星", "author": "濟慈", "body": ["明亮的星，但願我如你堅定", "不是孤獨地掛在夜空中", "張大眼睛", "像自然界耐心的不眠者", "", "但我不要永恆不變地輝煌", "我只要永遠枕在愛人的胸前", "感受她溫柔的起伏", "永遠醒著，永遠"], "note": "不要星辰的永恆，只要愛人胸口的溫度。"}, {"title": "初讀查普曼譯荷馬", "author": "濟慈", "body": ["我遊歷了許多金色的國度", "見過不少美好的城邦和王國", "也曾泛舟西方許多島嶼之間", "", "但我從未呼吸到它純淨的空氣", "直到我聽見查普曼", "豪放而高亢的聲音", "我的感覺就像一個天文學家", "發現了一顆新的星球"], "note": "一本好書打開的世界，比任何旅行都要遼闊。"}, {"title": "無情的美人", "author": "濟慈", "body": ["我在草地上遇見一位美人", "她的眼睛是野性的", "她的頭髮很長", "腳步很輕", "", "她帶我到她的精靈洞府", "在那裡她哭泣和嘆息", "我親吻了她的眼睛", "然後在她身邊睡去", "在那裡我做了最後一個夢"], "note": "美的誘惑有時是一條通往夢魘的小徑。"}, {"title": "感應", "author": "波德萊爾", "body": ["自然是一座神殿", "活的柱子有時發出模糊的話語", "人從那裡走過", "穿過象徵的森林", "森林用熟悉的目光注視著他", "", "芳香、色彩和聲音相互應和", "有些芳香像孩子的肌膚一樣新鮮", "像雙簧管一樣甜蜜", "像草原一樣翠綠"], "note": "萬物互相呼應，感官之間沒有邊界。"}, {"title": "異國的芳香", "author": "波德萊爾", "body": ["閉上眼睛在溫暖的秋夜", "我聞到你胸膛的芳香", "看見幸福的海岸在展開", "被單調的太陽照得目眩", "", "一個懶洋洋的島", "大自然在那裡", "生長著奇異的樹木和美味的果實", "男人的身體精瘦而強壯", "女人的眼神大膽得令人驚奇"], "note": "一個人的體香裡，可以嗅到一整個異國的想像。"}, {"title": "黃昏的和聲", "author": "波德萊爾", "body": ["時辰到了", "花朵在枝頭顫抖", "每一朵花散發香氣如同香爐", "聲音和芳香在暮色的空氣中旋轉", "", "小提琴像受傷的心在嗚咽", "天空又悲傷又美麗如同祭壇", "太陽在凝結的血泊中下沉"], "note": "黃昏把世界變成一座發著香氣的祭壇。"}, {"title": "邀遊", "author": "波德萊爾", "body": ["我的孩子，我的姊妹", "想想去那邊生活的甜美", "在那裡一起去愛", "去愛，然後死去", "在那個像你一樣的國度", "", "那裡一切都是秩序和美", "豪華、安靜和快樂"], "note": "理想國在遠方，也在我們對美的渴望裡。"}, {"title": "天鵝", "author": "波德萊爾", "body": ["一隻天鵝逃出了籠子", "用蹼掌拖著走在乾燥的路面上", "張開白色的羽翼", "在沒有水的溝渠邊", "焦躁地張開了喙", "", "對著天空", "彷彿在責備上帝", "為什麼不下雨"], "note": "流亡者的渴，不是渴水，是渴望屬於自己的天地。"}, {"title": "憂鬱", "author": "波德萊爾", "body": ["天空像一個沉重的蓋子", "壓在呻吟的大地上", "雨水畫出了一座巨大的監獄", "潮濕的蜘蛛在腦海裡結網", "", "突然鐘聲猛然響起", "向天空發出可怕的嚎叫", "像一羣流浪的幽魂", "開始頑固地哀鳴"], "note": "憂鬱是一口鐘，在心裡反覆敲響。"}, {"title": "一握砂（其一）", "author": "石川啄木", "body": ["一握細砂", "從指間滑落", "我低頭看著它們", "落回大地", "", "就像那些溜走的日子", "再怎麼用力握", "也留不住"], "note": "砂從指縫間流走，像時光一樣不肯停留。"}, {"title": "一握砂（其二）", "author": "石川啄木", "body": ["故鄉的山", "在夢裡出現了", "醒來以後", "枕頭是濕的", "", "山沒有變", "是我變了"], "note": "故鄉不曾改變，改變的是回不去的自己。"}, {"title": "一握砂（其三）", "author": "石川啄木", "body": ["站在月臺上", "等一班不會來的車", "不是為了去哪裡", "是為了等待本身", "", "等待讓時間慢下來", "慢到可以看見", "自己的寂寞"], "note": "等待不是浪費時間，是與自己獨處的練習。"}, {"title": "悲哀的玩具（其一）", "author": "石川啄木", "body": ["孩子的玩具壞了", "他哭了很久", "大人不明白", "為什麼一個玩具值得那麼多眼淚", "", "因為對孩子來說", "那是整個世界"], "note": "大人忘了，孩子的世界很小，所以失去什麼都很大。"}, {"title": "悲哀的玩具（其二）", "author": "石川啄木", "body": ["把額頭貼在冰涼的石頭上", "想哭一場", "卻哭不出來", "", "不是因為堅強", "是因為悲傷太重了", "重到連眼淚", "都流不動了"], "note": "最重的悲傷是乾涸的，連淚水都沉默了。"}, {"title": "悲哀的玩具（其三）", "author": "石川啄木", "body": ["母親的背彎了", "像一把用久了的弓", "射出了我這支箭", "飛得越來越遠", "", "而弓", "越來越彎"], "note": "母親的彎，是把我們射向遠方的代價。"}, {"title": "禮物", "author": "米沃什", "body": ["如此幸福的一天", "霧一早就散了", "我在花園裡工作", "蜂鳥停在忍冬花上", "", "這世上沒有一樣東西", "我想佔有", "我知道沒有一個人", "值得我去羨慕", "", "想到這裡我感到安慰", "覺得從前遭受的一切苦難", "都已得到了補償"], "note": "幸福不是得到更多，而是不再渴望佔有。"}, {"title": "忠實的母語", "author": "米沃什", "body": ["忠實的母語", "我一直在為你服務", "每天夜裡我都在桌前", "擺上小碗裝著各種顏色", "為你準備", "", "你是我的祖國", "我沒有別的了"], "note": "母語是流亡者最後的祖國。"}, {"title": "但願", "author": "米沃什", "body": ["但願人們找到", "活著的勇氣", "不是因為偉大的理想", "只是因為一杯早晨的咖啡", "一抹窗外的陽光", "", "這些微小的事物", "足以支撐一整天的重量"], "note": "活下去的理由不必偉大，一杯咖啡就夠了。"}, {"title": "偶遇", "author": "米沃什", "body": ["我們是被風吹到一起的兩片葉子", "在空中短暫相遇", "然後各自落在不同的地方", "", "但那一秒的碰觸", "改變了我們飄落的軌跡"], "note": "偶然的相遇，足以改變命運的軌道。"}, {"title": "拆散的筆記本", "author": "米沃什", "body": ["拆散的筆記本", "每一頁散落在不同的房間", "有些被風吹走了", "有些被踩在腳下", "", "但那些字還在", "即使紙張碎了", "意義不會碎"], "note": "思想比紙張堅韌，碎了也不會失去意義。"}, {"title": "晚熟", "author": "米沃什", "body": ["我是一顆晚熟的果實", "當別人早已紅透", "我還掛在枝頭", "慢慢地變色", "", "但晚熟有晚熟的好處", "吸收了更多的陽光", "嚐起來", "更甜一些"], "note": "晚熟不是落後，是慢慢積累更多的甜。"}, {"title": "我學會了簡單地明智地生活", "author": "阿赫瑪託娃", "body": ["我學會了簡單地明智地生活", "望著天空向上帝祈禱", "在黃昏之前長久地散步", "以消磨多餘的不安", "", "當山楂在溝裡沙沙作響", "結出一串串黃紅色的漿果", "我寫下快樂的詩篇", "關於腐朽的、短暫的人生"], "note": "簡單地生活，就是最大的智慧。"}, {"title": "黃昏", "author": "阿赫瑪託娃", "body": ["花園裡的音樂響了", "帶著無法言說的悲傷", "海的氣味新鮮而苦澀", "飄在牡蠣的冰盤上", "", "他對我說：", "我是一個忠實的朋友", "然後碰了碰我的裙子", "那觸碰不像一個擁抱", "而像撫摸"], "note": "黃昏裡的觸碰，比言語更誠實。"}, {"title": "最後的玫瑰", "author": "阿赫瑪託娃", "body": ["最後一朵玫瑰", "在霜降之前開放", "它不知道自己是最後一朵", "所以格外用力地綻放", "", "美麗有時候是一種", "不自知的勇敢"], "note": "最後的綻放最動人，因為它不知道自己是最後。"}, {"title": "安魂曲", "author": "阿赫瑪託娃", "body": ["在那可怕的年代裡", "我和整個城市一起排隊", "站在監獄的紅牆外面", "等待探視的日子", "", "有個女人在我身後", "嘴脣凍得發紫", "她低聲問我：", "你能把這一切描寫出來嗎？", "我說：能。"], "note": "在苦難面前，能說出「我能」的詩人，背負著所有人的痛。"}, {"title": "勇氣", "author": "阿赫瑪託娃", "body": ["我們知道此刻天平上的是什麼", "此刻正在發生的是什麼", "勇氣的時刻敲響了我們的鐘", "勇氣不會離棄我們", "", "我們將保存你", "俄羅斯的語言", "偉大的俄羅斯的詞", "我們將把你", "傳給子孫後代"], "note": "保存語言就是保存一個民族的靈魂。"}, {"title": "我來到這世間", "author": "阿赫瑪託娃", "body": ["我來到這世間", "不是為了唱歌", "不是為了戰鬥", "只是為了看一眼陽光", "", "看一眼就夠了", "足以記住一輩子", "在黑暗來臨之前"], "note": "此生只為看一眼光——這就夠了。"}, {"title": "果戈理", "author": "特朗斯特羅默", "body": ["外套破舊得像狼羣", "臉像一塊大理石碎片", "坐在信件的堆裡", "坐在嘲笑和責備的", "嗡嗡作響的叢林裡", "", "心在跳動像一張紙", "飄過冷漠的走廊"], "note": "偉大的靈魂常被包裹在破舊的外衣裡。"}, {"title": "半完成的天堂", "author": "特朗斯特羅默", "body": ["怯懦打斷了我們的話語", "怯懦平滑了我們的話語", "直到它們不再意味著什麼", "或者幾乎不再", "", "但每一個走過的人", "都是半完成的天堂", "只差最後一道光"], "note": "每個人都是未完成的天堂，差的只是一道光。"}, {"title": "悲歌", "author": "特朗斯特羅默", "body": ["在人生的中途", "死亡來找我", "量了量我的尺寸", "然後走了", "", "我繼續活著", "但偶爾會聽見", "它量尺寸時", "布料剪裁的聲音"], "note": "死亡提前量好了尺寸，我們繼續穿著未完的衣裳。"}, {"title": "夜曲", "author": "特朗斯特羅默", "body": ["夜晚我開車穿過村莊", "房屋在車燈裡出現", "一閃即逝", "它們是醒著的——想要喝水", "", "房屋、穀倉、路標、廢棄的車", "都穿上了生命", "在黑暗的照射下"], "note": "黑夜裡萬物醒來，車燈只是打了個招呼。"}, {"title": "四月與沉默", "author": "特朗斯特羅默", "body": ["春天荒蕪地躺著", "安靜的溝渠", "在我身邊爬行", "沒有倒影", "", "唯一閃爍的", "是黃色的花", "我被我的影子帶著", "像一把提琴", "裝在它黑色的箱子裡"], "note": "沉默的四月裡，我們都是裝在箱子裡等待演奏的琴。"}, {"title": "航行日誌", "author": "特朗斯特羅默", "body": ["大海是一本打開的書", "我們在上面航行", "每一天寫下一頁", "用浪花做墨水", "", "到了終點回頭翻閱", "發現大部分的頁面", "都被水洗白了", "只留下幾行", "值得記住的字"], "note": "人生航行留下的字不多，但每一行都是精華。"}, {"title": "論愛", "author": "紀伯倫", "body": ["當愛召喚你時，跟隨它", "雖然它的道路艱難而陡峭", "當它的翅膀環抱你時，順從它", "雖然藏在羽翼中的劍會傷害你", "", "因為愛在為你加冕的同時", "也會將你釘上十字架", "愛在幫助你成長的同時", "也會修剪你的枝葉"], "note": "愛是加冕也是受難，是成長也是修剪。"}, {"title": "論孩子", "author": "紀伯倫", "body": ["你的孩子不是你的孩子", "他們是生命對自身渴望的兒女", "他們通過你來到這世界", "卻非因你而來", "", "你可以給予他們愛", "卻不是你的思想", "因為他們有自己的思想", "你可以庇護他們的身體", "卻不是他們的靈魂"], "note": "孩子是生命射出的箭，而你只是那把弓。"}, {"title": "論自由", "author": "紀伯倫", "body": ["在城門口在爐火邊", "我見你們匍匐膜拜自己的自由", "像奴隸在暴君前謙卑", "", "你們只有在掙脫枷鎖的渴望", "成為你生命中的一部分時", "才能真正自由", "因為自由不是目標", "而是一種生活方式"], "note": "自由不是枷鎖的反面，而是不再需要枷鎖。"}, {"title": "論友誼", "author": "紀伯倫", "body": ["你的朋友是你需求的回答", "他是你用愛播種", "用感謝收穫的田地", "他是你的飯桌和壁爐", "", "因為你帶著飢渴走向他", "也在他那裡尋求安寧", "在友誼中", "一切思想一切渴望", "一切期待", "都在無言中誕生並分享"], "note": "友誼是不需要語言的分享，不需要解釋的懂得。"}, {"title": "論工作", "author": "紀伯倫", "body": ["工作是有形的愛", "如果你不能帶著愛工作", "而只是厭惡地工作", "不如離開", "坐在廟宇的門口", "向那些帶著歡樂工作的人", "乞討", "", "因為如果你漫不經心地烤麵包", "你烤出的是苦澀的麵包", "只能餵飽人的一半飢餓"], "note": "不帶愛的工作，烤出的是苦麵包。"}, {"title": "論歡樂與悲哀", "author": "紀伯倫", "body": ["你的歡樂就是你去掉面具的悲哀", "連你那湧出笑聲的井", "也常常充滿了淚水", "", "當你歡樂時", "深入你的內心吧", "你會發現", "只有曾經讓你悲哀的", "正在給你歡樂"], "note": "歡樂與悲哀是同一口井，深處相連。"}, {"title": "論時間", "author": "紀伯倫", "body": ["你想度量那不可度量的", "用小時和季節來調整你的行為", "你甚至想讓時間成為一條小溪", "坐在岸邊觀看它流過", "", "然而你內在的永恆", "知道生命沒有盡頭", "昨天不過是今天的記憶", "明天不過是今天的夢"], "note": "時間不是小溪，而是你體內永恆的海洋。"}, {"title": "論美", "author": "紀伯倫", "body": ["美不是一種需要", "而是一種狂喜", "不是乾渴的嘴脣", "也不是伸出的空手", "而是一顆燃燒的心", "和一個迷醉的靈魂", "", "美是生命揭開了面紗", "而你就是生命", "你也是面紗"], "note": "美不在外面，美就是你掀開面紗時的樣子。"}, {"title": "太陽石", "author": "帕斯", "body": ["一棵水晶般的柳樹", "一棵水的白楊", "一口高高的噴泉", "被風吹得彎曲", "", "一棵堅定的樹", "搖擺著跳舞", "一條蜿蜒的河流", "前進後退又前進", "繞著一圈又一圈", "總是抵達中心"], "note": "萬物旋轉，最終都朝著同一個中心流去。"}, {"title": "在你清澈的影子下", "author": "帕斯", "body": ["在你清澈的影子下", "我學會了呼吸", "像學會了一門新的語言", "用肺說出花的名字", "", "你教會我看見", "看見光裡面的光", "和黑暗裡面的黑暗"], "note": "在愛人的影子下，連呼吸都成了一種學習。"}, {"title": "兩個身體", "author": "帕斯", "body": ["兩個身體面對面", "有時是兩道波浪", "夜晚是海洋", "", "兩個身體面對面", "有時是兩塊石頭", "夜晚是沙漠", "", "兩個身體面對面", "有時是兩把根", "交織在黑夜中"], "note": "兩個身體之間，是海洋、沙漠、也是森林。"}, {"title": "到達", "author": "帕斯", "body": ["走了很久", "終於到達了", "到達的地方", "和出發的地方一樣", "", "但我不一樣了", "路改變了我", "像水改變了石頭的形狀"], "note": "旅行的意義不是到達，是路上被改變的自己。"}, {"title": "街道", "author": "帕斯", "body": ["長長的寂靜的街道", "我走在黑暗裡", "我絆了一下", "我踩著石頭", "它們是枯葉", "", "我回過身來", "這條街不是那條街", "一切都黑了", "沒有出口"], "note": "有些路走著走著就變了，像夢一樣找不到出口。"}, {"title": "寧靜", "author": "米斯特拉爾", "body": ["寧靜是一座花園", "裡面種著沉默的花", "不需要澆水", "只需要耐心", "", "等到花開的時候", "你會聽見", "世界上最輕的聲音"], "note": "寧靜不是無聲，是最輕的聲音被聽見。"}, {"title": "柔情", "author": "米斯特拉爾", "body": ["用柔情對待受傷的人", "像對待一朵被雨打濕的花", "不要急著擦乾它", "讓它自己慢慢晾乾", "", "有時候", "最好的療癒", "就是在旁邊靜靜地陪著"], "note": "柔情是不急著修補，而是陪你慢慢癒合。"}, {"title": "死亡的十四行", "author": "米斯特拉爾", "body": ["你從此不再為什麼而痛苦", "也不再被任何渴望追逐", "你的眼睛不必再睜開", "去面對世界的殘忍與美麗", "", "你終於安息了", "像一艘回到港口的船", "卸下了所有的貨物"], "note": "死亡是最後的卸貨，讓靈魂空船回港。"}, {"title": "夜", "author": "米斯特拉爾", "body": ["夜是一個母親", "用黑色的裙擺", "蓋住了所有疲憊的孩子", "", "她唱著搖籃曲", "用風的聲音", "用蟲的聲音", "直到全世界都睡了"], "note": "夜是萬物的母親，用黑暗當被子，把世界哄睡。"}, {"title": "小腳", "author": "米斯特拉爾", "body": ["孩子的小腳", "紫了凍紅了", "在石子路上走", "每一步都是一個吻印", "", "大地收到了", "最柔軟的印章", "卻還不了一雙鞋"], "note": "小腳在大地上留下的吻印，是最無辜的控訴。"}, {"title": "列寧格勒", "author": "曼德爾施塔姆", "body": ["我回到了我的城市", "熟悉得像眼淚", "像靜脈，像童年的腮腺炎", "", "彼得堡，我還不想死", "你有我的電話號碼", "彼得堡，我還保存著那些地址", "可以憑它們找到死者的聲音"], "note": "回到故城，眼淚比記憶更快認出那些街道。"}, {"title": "沉默", "author": "曼德爾施塔姆", "body": ["她還沒有出生", "她既是音樂又是語言", "因此是一切生靈的", "不可斷裂的聯繫", "", "在沉默裡", "所有未說出口的話", "都在那裡等著", "等一個對的時刻"], "note": "沉默是所有語言的母體，未說出的比說出的更完整。"}, {"title": "失眠", "author": "曼德爾施塔姆", "body": ["失眠。荷馬。繃緊的帆。", "我讀過了船的名單直到中間：", "這長長的序列，這列鶴的隊伍", "有一次在希臘上空升起", "", "你們要航向何方", "如果沒有海倫", "特洛伊城對你們算什麼"], "note": "失眠的夜裡翻開古書，發現千年前的人和我一樣睡不著。"}, {"title": "時代", "author": "曼德爾施塔姆", "body": ["我的時代，我的野獸", "誰能窺見你的瞳孔", "誰能用自己的血", "把兩個世紀的脊椎骨粘合", "", "血在流", "但什麼也粘合不了", "只有時間才知道", "傷口在哪裡"], "note": "每個時代都是一頭野獸，用血也無法馴服。"}, {"title": "冬天的早晨", "author": "曼德爾施塔姆", "body": ["冬天的早晨", "空氣像玻璃一樣清脆", "一碰就碎", "", "我的呼吸變成白霧", "像在空氣裡寫字", "寫了又消失", "消失了又寫"], "note": "冬天的呼吸是最短命的書寫，卻最見真氣。"}, {"title": "亞當的詛咒", "author": "葉慈", "body": ["勞動是在黑暗的夜裡", "搔刮泥土和石頭", "為了那一瞬間的美", "詩人必須坐下來", "在筋疲力竭中", "用全部的心血", "只為寫出一行", "配得上那美的句子"], "note": "美是詛咒也是祝福，逼迫詩人在泥土中挖出星辰。"}, {"title": "冷天堂", "author": "葉慈", "body": ["冷天堂不是沒有溫度", "而是溫度太高", "高到燒過了以後", "只剩下冰涼的灰燼", "", "在那裡", "激情燃盡後的寧靜", "比任何溫暖都更永恆"], "note": "燃燒殆盡的灰燼裡，藏著永恆的冰涼寧靜。"}, {"title": "長腳蠅", "author": "葉慈", "body": ["像長腳蠅踏在水面上", "她的心思踏在沉默之上", "", "凱撒在帳篷裡思索", "地圖攤在膝上", "他的眼睛盯著虛無", "", "這樣的時刻", "文明在一根線上搖晃", "安靜，安靜"], "note": "偉大的時刻降臨時，世界安靜得像水面上的蠅足。"}, {"title": "學童之間", "author": "葉慈", "body": ["我走在學童之間", "一個六十歲的微笑的老人", "孩子們好奇地看著我", "", "他們不知道", "這個老人的心裡", "住著一個和他們一樣大的孩子", "從來沒有長大過"], "note": "年齡改變了外表，但內心的孩子永遠不畢業。"}, {"title": "幻象", "author": "葉慈", "body": ["在螺旋的中心", "獵鷹聽不見馴鷹人的聲音", "一切都崩散了", "中心無法維持", "", "純然的混亂", "被釋放到世界上", "血色的潮水在奔湧", "到處都是儀式般的純真被淹沒"], "note": "當中心崩散，混亂就是新的秩序。"}, {"title": "杜伊諾哀歌（第一首）", "author": "裏爾克", "body": ["如果我呼喊", "誰將在天使的序列中聽見我", "即使其中一位突然把我", "壓在他的心上", "我也會因他更強的存在而消亡", "", "因為美不是別的", "只是我們恰好能承受的", "恐怖的開始"], "note": "美是恐怖的開端，我們勉強承受的那一點點光芒。"}, {"title": "給青年詩人的信（一）", "author": "裏爾克", "body": ["沒有人能給你忠告", "沒有人能幫助你", "只有一個辦法", "走進你自己的內心", "", "探索那召喚你寫作的原因", "檢查它的根是否深紮在你心靈深處", "如果你會因為被禁止寫作而死", "那就是的——你必須寫"], "note": "寫作的理由只有一個：不寫會死。"}, {"title": "嚴重的時刻", "author": "裏爾克", "body": ["此刻有誰在世上某處哭", "無緣無故地在世上哭", "在哭我", "", "此刻有誰在夜裡某處笑", "無緣無故地在夜裡笑", "在笑我", "", "此刻有誰在世上某處走", "無緣無故地在世上走", "走向我"], "note": "在這嚴重的時刻，有人正走向你，你只是不知道。"}, {"title": "旋轉木馬", "author": "裏爾克", "body": ["在屋簷和影子的輪轉下", "一匹匹馬從那個國度馳來", "有些拉著小車", "全都帶著勇敢的面容", "", "一頭紅色的獅子也出現了", "偶爾有一頭白色的大象", "甚至還有一頭鹿", "像在森林裡一樣", "", "然後一切又重新開始", "旋轉旋轉沒有目標", "一匹紅色的，一匹綠色的", "一個幾乎不見的臉"], "note": "旋轉木馬是生命的隱喻——不停地轉，卻不曾前進。"}, {"title": "秋", "author": "裏爾克", "body": ["樹葉在飄落", "遠方的花園在飄落", "彷彿是天空在凋零", "", "今夜沉重的大地", "從羣星中墜落", "我們都在墜落", "", "然而有一個人", "以無限的溫柔", "在他的手中", "接住了所有的墜落"], "note": "萬物都在墜落，但有一雙手溫柔地接住一切。"}, {"title": "致大海", "author": "惠特曼", "body": ["大海啊，你日夜不停地歌唱", "沒有聽眾你也唱", "沒有舞臺你也唱", "你是世界上最自由的歌手", "", "我站在岸邊聽你", "你的每一個浪", "都是一首完整的詩"], "note": "大海不需要聽眾，歌唱本身就是意義。"}, {"title": "致異鄉人", "author": "惠特曼", "body": ["路過的陌生人啊", "你不知道我多麼渴望地望著你", "你一定就是我尋覓的人", "而我就是你尋覓的人", "", "我從你臉上看出某些東西", "我們相遇不是偶然", "你成長於我身旁", "而我成長於你身旁"], "note": "每一個擦肩而過的陌生人，都是我們在尋找的人。"}, {"title": "給在黑暗中行走的人", "author": "佛洛斯特", "body": ["黑暗中行走的人", "不必害怕", "你的腳知道路在哪裡", "即使眼睛看不見", "", "走了很久以後", "你會發現", "黑暗本身也是一種光", "只是你還不習慣而已"], "note": "黑暗不是光的反面，是另一種看見的方式。"}, {"title": "牧場", "author": "佛洛斯特", "body": ["我要去清理牧場的泉水", "我只是去耙開那些落葉", "也許要等泉水變清——", "我不會去太久的，你也來吧", "", "我要出去把那頭小牛犢趕回來", "它還那麼小站在母牛身邊", "當母親舔它的時候它搖搖晃晃", "我不會去太久的，你也來吧"], "note": "最溫柔的邀請是「你也來吧」——帶著日常的美好。"}, {"title": "被遺忘的語言", "author": "特朗斯特羅默", "body": ["我被一個聲音喚醒", "那聲音來自夢的另一邊", "用一種被遺忘的語言說著", "我曾經知道的事情", "", "醒來以後", "只記得那種感覺", "像走進了一個", "以前住過的房間"], "note": "有些語言只在夢裡還活著，醒來就忘了文法。"}, {"title": "風暴", "author": "特朗斯特羅默", "body": ["突然間漫步者在此遇到了", "古老巨大的橡樹", "像一頭石化了的麋鹿", "面對九月大海墨綠的堡壘", "", "北方的風暴", "正是山楂果成熟的季節", "在黑暗中醒著", "聽見橡樹上方星座的踏步聲"], "note": "風暴中醒著的人，聽得見星座行走的聲音。"}, {"title": "夢的十四行", "author": "濟慈", "body": ["假如我們的靈魂在沉睡", "它是否在另一個世界醒來", "那裡的色彩比這裡更鮮明", "聲音比這裡更清澈", "", "也許我們活著的時候", "纔是在做夢", "死去以後", "纔是真正醒來"], "note": "也許生是夢，死纔是醒來——誰能說得清呢。"}, {"title": "致秋天", "author": "波德萊爾", "body": ["秋天來了", "帶著它金色的倦意", "和微微發涼的風", "提醒我們", "美好的事物正在離去", "", "但離去也是美好的", "因為離去的時候", "一切都鍍上了金邊"], "note": "離去的美好，因為不捨而鍍上了金色的光暈。"}, {"title": "窗", "author": "阿赫瑪託娃", "body": ["窗戶是房間的眼睛", "它看見了所有的日出和日落", "看見了離去的人和歸來的人", "", "我站在窗前", "成了窗的一部分", "看見的和被看見的", "都是同一種孤獨"], "note": "窗前的人和窗外的風景，共享同一份孤獨。"}, {"title": "流星", "author": "米沃什", "body": ["流星劃過天際", "在那一瞬間", "它比所有的星星都亮", "", "然後消失了", "但那一道光", "已經被某個抬頭的人", "永遠記住了"], "note": "短暫的燃燒如果被記住，就是另一種永恆。"}, {"title": "寫給母親", "author": "米斯特拉爾", "body": ["母親", "你的手是世界上最溫暖的地方", "小時候生病的時候", "你把手放在我額頭上", "比任何藥都有效", "", "現在我長大了", "你的手變小了", "但它的溫度", "還是一樣的"], "note": "母親的手從不變老，它的溫度永遠是孩子的故鄉。"}, {"title": "花的葬禮", "author": "曼德爾施塔姆", "body": ["花謝了", "沒有人為它舉行葬禮", "它安靜地落在泥土上", "回到了出發的地方", "", "這是最完美的結局", "從哪裡來", "回哪裡去"], "note": "花的歸宿是泥土，我們的歸宿是星塵。"}, {"title": "無題", "author": "帕斯", "body": ["語言是一座橋", "從我的沉默", "到你的沉默", "", "橋下是時間的河流", "我們站在橋中央", "不知道該往前走", "還是往回走", "於是就站著", "看河水流過"], "note": "有時候不動也是一種選擇，站在橋上看時間流過。"}, {"title": "星期天的早晨", "author": "瑪麗·奧利弗", "body": ["星期天的早晨", "上帝也在休息", "我代替他", "去看望那些花", "", "玫瑰開了", "雛菊也開了", "它們不分星期幾", "每天都在祈禱"], "note": "花每天都在開，因為它們不知道哪天該休息。"}, {"title": "深夜的訪客", "author": "佩索亞", "body": ["深夜有人敲門", "我打開門", "外面沒有人", "只有風", "", "也許是我的另一個自己", "來找我聊天", "卻又臨時改了主意"], "note": "深夜的敲門聲，是另一個自己猶豫的拜訪。"}, {"title": "致友人", "author": "石川啄木", "body": ["很久沒有寫信了", "不是忘了你", "是不知道從哪裡說起", "", "近來好嗎", "這四個字", "我練習了好多遍", "才終於寄出"], "note": "最簡單的問候，往往需要最久的勇氣。"}, {"title": "冬日", "author": "紀伯倫", "body": ["冬天來了", "萬物安靜下來", "這不是死亡", "是深深的休息", "", "在雪的被子下面", "種子正在做夢", "夢見春天的自己", "破土而出的樣子"], "note": "冬天不是結束，是種子在雪下練習發芽。"}, {"title": "黎明之前", "author": "紀伯倫", "body": ["黎明之前最黑暗
