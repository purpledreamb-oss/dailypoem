  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "十棒鼓",
  "author": "元・刘唐卿《白兔记》",
  "body": [
   "奴奴生得如花貌，言语又波俏。",
   "丈大叫做廿一郎，奴奴唤做三七嫂。",
   "方才房中补衣补袄。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "正宫・白鹤子（四首）",
  "author": "元・关汉卿",
  "body": [
   "四时春富贵，万物酒风流。",
   "澄澄水如蓝，灼灼花如绣。",
   "（之一）花边停骏马，柳外缆轻舟。",
   "湖内画船交，湖上骅骝骤。",
   "（之二）鸟啼花影里，人立粉墙头。",
   "春意两丝牵，秋水双波溜。",
   "（之三）香焚金鸭鼎，闲傍小红楼。",
   "月在柳梢头，人约黄昏后。",
   "（之四）。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "严子陵垂钓七里滩・水仙子",
  "author": "元・宫天挺",
  "body": [
   "我这里轻揎袍袖手舒开，满饮琼浆款落台。",
   "饮罢时放的稳忙加额，比俺那使磁瓯奸好不自在，怎如咱草店上倒开怀。",
   "不想阗是祸患，不知阗足利害，畅好拘束人也玳则筵歼。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "楚昭王疏者下船・油葫芦",
  "author": "元・郑延玉",
  "body": [
   "久与吴国姬光阻面颜，(芈旋云)哥哥，既是他下将战书来，凭着俺这里兵多将广，马壮人强，量吴国姬光到的那里，就怕着他哩！(正末云)我不怕姬光，怕是那一个人！(唱)怕的那伍盟府天下罕，(芈旋云)量伍子胥有何英雄，哥哥直这般怕他？(正末唱)他正是良才奇宝在人间。",
   "我则道重修讯问传书简，原来他相期恶战呈公案。",
   "(芈旋云)虽然那子胥多有本事，凭着俺这名山大川，长江险阻，那伍子胥怎便容易到的俺国来？(正末唱)你休道是阻着大川，隔着大山，便有那波涛滚滚长江限，假若是无敌手战应难。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "争报恩三虎下山・二煞",
  "author": "元・无名氏",
  "body": [
   "我可也堪恨这个泼短命，堪恨这个歹贱才，我恨不的一枷稍打碎那厮天灵盖。",
   "他将我那一双儿女拖将去，苦被那祗候公人把我拽过来。",
   "你后来要还我这脓血债！倚仗着你那有官有势，忒欺负我无靠无挨。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "頌",
  "author": "宋・釋德韶",
  "body": [
   "暫下高峰已顯揚，般若圜通遍十方。",
   "人天浩浩無差別，法界縱橫處處彰。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "贈浙西顧推官",
  "author": "宋・徐鉉",
  "body": [
   "盛府賓寮八十餘，閉門高卧興無如。",
   "梁王苑裏相逢早，澗浦城中得信疏。",
   "狼藉杯盤重會面，風流才調一如初。",
   "願君百歲猶强健，他日相尋隠士廬。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "谢金莲诗酒红梨花・那吒令",
  "author": "元・张寿卿",
  "body": [
   "这妮子我问着呵，没些儿个势沙；这妮子道着呵，将话儿对答；这妮子使着呵，早装聋做哑。",
   "泼贱才，堪人骂，再休来利齿能牙。",
   "(梅香云)我说甚的来？(正旦唱)。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "驻马听・蝶亻愁蜂亻孱，芳草天涯春事晚。莺慷燕懒，杏花帘幕雨声寒。",
  "author": "元・无名氏",
  "body": [
   "秦楼寂寞玉箫闲，楚台容易朝云散。",
   "乍离别经这番，恁般懊恼谁曾惯。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "梁山泊李逵负荆・金盏儿",
  "author": "元・康进之",
  "body": [
   "我这里猛睁眸，他那里巧舌头，是非只为多开口。",
   "但半星儿虚谬，恼翻我怎干休！一把火将你那草团瓢烧成为腐炭，盛酒瓮摔成碎瓷瓯。",
   "(带云)绰起俺两把板斧来，(唱)砍折你那蟠根桑枣树，活杀您那阔角水黄牛。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "张君瑞庆团园(第五本)・乔木查",
  "author": "元・王实甫",
  "body": [
   "妾前来拜复，省可里心头怒！间别来安乐否？你那新夫人何处居？比俺姐姐是何如？(末云)和你也葫芦提了也。",
   "小生为小姐受过的苦，诸人不知，瞒不得你。",
   "不甫能成亲，焉有是理？。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "张君瑞害相思(第三本)・脱布衫",
  "author": "元・王实甫",
  "body": [
   "小孩儿家口没遮拦，一迷的将言语摧残。",
   "把似你使性子，休思量秀才，做多少好人家风范。",
   "(红做拾书科)。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "防有鹊巢",
  "author": "詩經",
  "body": [
   "防有鹊巢，邛有旨苕。谁侜予美？心焉忉忉。",
   "",
   "中唐有甓，邛有旨鷊。谁侜予美？心焉惕惕。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "拟古·予生未三十",
  "author": "清・納蘭性德",
  "body": [
   "予生未三十，忧愁居其半",
   "心事如落花，春风吹已断",
   "行当适远道，作记殊汗漫",
   "寒食青草多，薄暮烟冥冥",
   "山桃一夜红，茵箔随飘零",
   "愿餐玉红草，一醉不复醒"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "临江驿潇湘秋夜雨・笑和尚",
  "author": "元・杨显之",
  "body": [
   "我、我、我，捱一夜似一年，我、我、我，埋怨天。",
   "我、我、我，敢前生罚尽了凄凉愿？我、我、我，哭干了泪眼，我、我、我，叫破了喉咽。",
   "来、来、来，哥哥我怎把这烧饼来咽？。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "塞垣春",
  "author": "宋・张先",
  "body": [
   "野树秋声满。",
   "对雨壁、风灯乱。",
   "云低翠帐，烟销素被，签动重幔。",
   "甚客怀、先自无消遣。",
   "更篱落、秋虫叹。",
   "叹樊川、风流减。",
   "旧欢难得重见。",
   "停酒说扬州，平山月、应照棋观。",
   "绿绮为谁弹，空传广陵散。",
   "但光纱短帽，窄袖轻衫，犹记竹西庭院。",
   "老鹤何时去，认琼花一面。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "步步娇・大道从来人难羡，有影无形现。壶中别有天，炼就金丹养胎仙。",
  "author": "元・无名氏",
  "body": [
   "双关路上气连连，酝甘露频吞烟。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "临江驿潇湘秋夜雨・隔尾",
  "author": "元・杨显之",
  "body": [
   "我则待妇随夫唱和你调琴瑟。",
   "谁知你再娶停婚先有个泼贱儿。",
   "(搽旦怒云)你这天杀的，他倒骂我哩。",
   "(崔甸士云)左右，还不扯下去打呀？(正旦唱)倒将我横拖竖拽离阶址。",
   "(带云)崔甸士，(唱)你须记的，那时亲设下誓词。",
   "(崔甸士云)胡说，我有甚么誓词。",
   "(正旦唱)你说道：不亏心，不亏心，把天地来指。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "南吕・西番经",
  "author": "元・张养浩",
  "body": [
   "天上皇华使，来回三四番，便是巢由请下山。",
   "取索檀，略别华鹊山。",
   "无多惭，此心非为官。",
   "屈指归来后，山中八九年，七见征书下日边。",
   "私自怜，又为尘事缠。",
   "鹤休怨，行当还绰然。",
   "累次征书至，教人去往难，岂是无心作大官？君试看，萧萧双鬓斑。",
   "休嗟叹，只不如山水间。",
   "说着功名事，满怀都是愁，可似青山归去休。",
   "休，从今身自由。",
   "谁能够，一蓑烟雨秋！小令。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "楚昭王疏者下船・双调/新水令",
  "author": "元・郑延玉",
  "body": [
   "包胥烈气子胥知，听的道借军来，他可便引兵先退。",
   "借兵的重扶楚国安，投吴的齐着凯歌回。",
   "这两个名姓天下知，真乃是忠与孝两完备。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "中吕・朝天子赠王玉英",
  "author": "元・夏庭芝",
  "body": [
   "玉英，玉英，樵树西风净。",
   "蓝田日暖巧妆成，如琢如磨性。",
   "异钟奇范，精神光莹，价高如十座城。",
   "试听，几声，白雪阳春令。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "尾声・最怕的是檐前头倒把冰锥挂，喜端午愁逢腊八。巧手匠雪狮儿一千",
  "author": "元・苏彦文",
  "body": [
   "般成，我盼的是泥牛儿四九里打。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "醉思乡王粲登楼・雁儿落",
  "author": "元・郑光祖",
  "body": [
   "又不曾趋跄天子堂，又不曾图画臣像。",
   "止不过留心在笔砚间，又不曾恶战在沙场上。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "邯郸道省悟黄粱梦・幺篇",
  "author": "元・马致远",
  "body": [
   "满饮阳关酒一杯。",
   "(洞宾做吐科，云)您孩儿吃不得了，心中有些不好，吐了两口血。",
   "这酒元来伤人。",
   "您孩儿再也不吃这酒了。",
   "(高太尉云)既是伤着你心，再也休吃这酒罢。",
   "(洞宾云)父亲放心，您孩儿不吃了，辞别父亲，便索长行。",
   "(高太尉云)你休忘了我的言语，着心记者。",
   "(唱)则要你在意扶持唐社稷，嘱付了又重题。",
   "但愿的功成破敌，早唱凯歌回。",
   "(下)。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "神奴儿大闹开封府・中吕/粉蝶儿",
  "author": "元・无名氏",
  "body": [
   "这厮每败坏风俗，搅的俺一家儿不成活路，那吃敲才百计亏图。",
   "则他那长舌妻，杀人的贼，教我就怎生轻恕。",
   "待和他厮结着衣服，拣一个大衙门将他告去。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "萧何月夜追韩信・上小楼",
  "author": "元・金仁杰",
  "body": [
   "他不合烧阿房三十六宫，杀降兵二十万人。",
   "先到咸阳，不依前言，自号为君。",
   "赶故主，杀子缨，诛绝斩尽。",
   "更杀义帝江心巾打家难奔。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "丹凤吟",
  "author": "元・徐田臣《杀狗记》",
  "body": [
   "行过柳堤，步入园内。",
   "(末)那一位解元何处？。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "尾",
  "author": "元・杨景贤",
  "body": [
   "我无缘保的他无恙，闹炒起花烛洞房。",
   "怕甚么深院沉沉秋夜长，决撒了帽儿光光。",
   "恨韦郎，不做周方，我不道的恼乱苏州刺史肠。",
   "我如今去，我这里收拾下画堂，埋伏下兵将，等回来拿住再商量。",
   "(下)。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "马丹阳三度任风子・石榴花",
  "author": "元・马致远",
  "body": [
   "每日把辘轳绳直缴到众星稀，我可甚爱日月夜眠迟。",
   "则我在这春里夏里秋里冬里受驱驰。",
   "(旦云)你可休后悔。",
   "(正末唱)更怕甚后悔，又无人把我央及。",
   "(旦云)早是我哩，若是别人家妇人呵，怎了。",
   "(正末唱)哎，你个婆娘妇女夸贤会，直寻到这搭儿田地。",
   "想当日范杞良在长城内，干迤逗的个孟姜女送寒衣。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "刘千病打独角牛・紫花儿序",
  "author": "元・无名氏",
  "body": [
   "休道是刘、刘、刘千的这和尚，便是那释迦如来，被这厮恼下莲台。",
   "(折拆驴云)孩儿也，你身子不停当哩，将息你那证候咱。",
   "(正末唱)将我这神眉剔竖，把我这病眼来睁开。",
   "我好怨恨那个乔才，一会儿气的我浑身上津津的汗出来。",
   "(折拆驴云)孩儿也，倒是些儿好汗。",
   "(正末唱)美也觉我这身子儿轻快。",
   "(折拆驴云)孩儿也，你这般面黄肌瘦，眼嵌缩腮。",
   "两条腿恰似麻秸，十个指头有如灯草，你且将息几日去。",
   "(正末唱)你笑我脸似刀条，腿、腿、腿似麻秸。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "正宫・端正好金钱问卜",
  "author": "元・刘庭信",
  "body": [
   "香尘暗翠帏屏，花露冷鲛绡帐，闷恹恹画阁兰堂。",
   "愁云怨雨风流况，都蹙在眉尖上。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "钱大尹智勘绯衣梦・得胜令",
  "author": "元・关汉卿",
  "body": [
   "您孩儿须告老尊亲：不索你记冤恨；我与那庆安言婚聘，合成了两对门。",
   "也是俺前生，赤紧的俺两个心先顺。",
   "告你个公公：你则是耽饶过俺老父亲！。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "倘秀才・磨着定乌龙墨向端溪砚傍，援着管玉兔笔写在罗纹纸上，恰便似",
  "author": "元・刘庭信",
  "body": [
   "破八卦桃花女计量。",
   "五行推造化，六甲定兴亡，沉吟了半响。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "破幽梦孤雁汉宫秋・驻马听",
  "author": "元・马致远",
  "body": [
   "宰相每商量，大国使还朝多赐赏。",
   "早是俺夫妻悒怏，小家儿出外也摇装。",
   "尚兀自渭城衰柳助凄凉，共那灞桥流水添惆怅。",
   "您偏不断肠。",
   "想娘娘那一天愁都撮在琵琶上。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "冯玉兰夜月泣江舟・逍遥乐",
  "author": "元・无名氏",
  "body": [
   "俺也几番价把爹爹连叫，只见他七魄悠然，三魂去杏。",
   "(做哭科，云)痛杀我也！父亲、兄弟也，(唱)好着我独自嚎啕，这杀人恨何日才消？怎得个清耿耿的官员斯撞着，劈头儿把冤情披告。",
   "告他将父亲杀死，兄弟亏图。",
   "娘亲来占了。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "金衣公子",
  "author": "元・高明《蔡伯喈琵琶记》",
  "body": [
   "一样做浑家，我安然伊受祸，你名为孝妇我吃旁人骂。",
   "公死为我，婆死为我，情愿把你孝衣来穿着把浓妆罢。",
   "(合)事多磨，冤家到此，逃不得这波查。",
   "(旦唱)。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "江州司马青衫泪・滚绣球",
  "author": "元・马致远",
  "body": [
   "你好下得白解元，闪下我女少年。",
   "道不得可怜而见，他又不曾故违着天子三宣。",
   "(云)人说白侍郎吟诗吃酒误了政事，前人也有这等的。",
   "(唱)只那长安市李谪仙，他向酒里卧酒里眠，尚古自得贵妃捧砚，常走马在五凤楼前。",
   "偏教他江州迭配三千里，可不道吏部文章二百年，甚些的纳士招贤？(见卜科，云)母亲，叫你孩儿怎么？(卜儿云)白侍郎一去杳无音信，咱家柴没米没，怎生过活？如今浮梁刘官人有三千引茶，又标致又肯使钱。",
   "你留下他，赚些钱养家。",
   "(正旦云)母亲，我与白侍郎有约在前，我再不留人了。",
   "(卜儿云)我说你也不信，请刘官人自家来和你说。",
   "(净见旦科，云)大姐拜揖，小人久慕大名，拿着三千引茶来与大姐焐脚，先送白银五十两做见面钱。",
   "(正旦云)过一边去！好不知高低。",
   "我做了白侍郎之妻，休来缠我！(卜儿云)你不肯陪我刘员外，好个白侍郎夫人！如今白侍郎那里敢颓气了也。",
   "(正旦唱)。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "须贾大夫谇范叔・雁儿落",
  "author": "元・高文秀",
  "body": [
   "虽然是为恩人有面皮，我与你这贼子无情意。",
   "你若要生辞函谷关，只除非梦返夷门地。",
   "(须贾云)丞相，这都是旧话，不提他也罢了。",
   "(正末唱)。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "马丹阳三度任风子・七兄弟",
  "author": "元・马致远",
  "body": [
   "我这里劝着、道着，他不采分毫，别人的首级他强要。",
   "他小心儿不肯自量度，可不道\"君子不夺人之好\"。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "南吕・一枝花合筝",
  "author": "元・乔吉",
  "body": [
   "酒酣春色浓，帘卷花阴静。",
   "佳人娇和曲，豪客醉弹筝。",
   "心与手调停，敛袂待弦初定，雁行斜江月影。",
   "挡银甲指拨轻清，按金缕歌喉数声。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "温太真玉镜台・鸳鸯煞",
  "author": "元・关汉卿",
  "body": [
   "从今后姻缘注定姻缘簿，相思还彻相思苦。",
   "剩道连理欢浓，于飞愿足。",
   "可怜你窈窕巫娥，不负了多情宋玉。",
   "则这琴曲诗篇吟和处，风流句，须不是我故意亏图，成就了那朝云和暮雨。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "紫花儿・昨宵酩酊，今日模糊，来日醺酣。带一顶嵌肩幔笠，穿一领麻衫。",
  "author": "元・王仲诚",
  "body": [
   "妆一座栽梅结草庵，谁能摇撼？跳出这蚁穴蜂衙，再不入虎窟龙潭。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "丞相贤",
  "author": "元・施惠《幽闺记》",
  "body": [
   "(外扮王尚书上)弯弓驰骑射双雕，武勇超群胆气豪。",
   "紫袍会带非同小，见随朝，兵部尚书官养老。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "野遊",
  "author": "宋・釋延壽",
  "body": [
   "獨步出衡茅，寒雲著地交。",
   "燒平多敗穴，葉落見危巢。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "玉树后庭花・后庭花",
  "author": "宋・张先",
  "body": [
   "华灯火树红相斗。",
   "往来如昼。",
   "桥河水白天青，讶别生星斗。",
   "落梅秾李还依旧。",
   "宝钗沽酒。",
   "晓蟾残漏心情，恨雕鞍归后。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "看钱奴买冤家债主・混江龙",
  "author": "元・郑延玉",
  "body": [
   "你休要虚贪声介，但存的那心田一寸是根芽。",
   "不肯道甘贫守分，都则待侥幸成家。",
   "自拿着杀子杀孙笑里刀，怎留的好儿好女眼前花。",
   "你则看那阳间之事，正和俺阴府无差，明明折挫，暗暗消乏。",
   "这等人动则是忘人恩、背人义、昧人心，管甚么败风俗、杀风景、伤风化！怎能够长享着肥羊法酒，异锦的这轻纱？。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "中吕・朱履曲归兴",
  "author": "元・张可久",
  "body": [
   "堂上先生解印，松边雅子迎门，归来不管晋无人。",
   "莺花新伴等，鹅鸭旧比邻，怕称呼陶令尹。",
   "山中书事一梦黄粱高枕，千年《白雪》遗音，野猿嗔客访云林。",
   "瓦沟弹桂子，石磴拂松阴，仙翁留共饮。",
   "秋江晚兴雨骤风狂已过，酒朋诗伴无多，一舸飘然占烟波。",
   "新炊菰米饭，道和〔竹枝〕歌，芦花深处躲。",
   "湖上有感玉雪亭前老树，翠烟桥外平芜，物是人非谩嗟吁。",
   "海榴曾结子，江燕几将雏，名园三换主。",
   "山中晚秋云顶陈抟高枕，山头杜甫长吟，秋客无风到西林。",
   "泉鸣溪漱玉，菊老地铺金，叶红山衣锦。",
   "烂柯洞永日长闲福地，清风自掩岩扉，樵翁随得道童归。",
   "苍松林下月，白石洞中棋，碧云潭上水。",
   "春晚朝雨过红销锦障，晚风狂香散珠囊，杜鹃声里又斜阳。",
   "三月当三十日，一醉抵一千场，绿阴浓芳草长。",
   "仙游二首题姓字《列仙后传》，寄情怀《秋水》全篇，玲珑花月小壶天。",
   "煮黄金还酒债，种白玉结仙缘，袖青蛇□阆苑。",
   "伙火山中丹灶，顺流溪上诗飘，鹤声吹过紫云桥。",
   "苔封山径冷，松倚石床高，花藏仙洞小。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "感天动地窦娥冤・快活三",
  "author": "元・关汉卿",
  "body": [
   "念窦娥葫芦提当罪愆，念窦娥身首不完全，念窦娥从前已往干家缘。",
   "婆婆也，你只看窦娥少爷无娘面。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "賦得綵燕",
  "author": "宋・徐鉉",
  "body": [
   "縷綵成飛燕，迎和啟蟄時。",
   "翠翹生玉指，繡羽拂文楣。",
   "詎費銜泥力，無勞剪爪期。",
   "化工今在此，翻怪社來遲。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "双调・庆东原叹世",
  "author": "元・马致远",
  "body": [
   "拔山力，举鼎威，暗鸣叱咤千人废。",
   "阴陵道北，乌江岸西，休了衣锦东归，不如醉还醒，醒而醉。",
   "明月闲旌旆，秋风助鼓鼙，帐前滴尽英雄泪。",
   "楚歌四起，乌骓漫嘶，虞美人兮，不如醉还醒，醒而醉。",
   "三顾茅庐问，高才天下知，笑当时诸葛成何计？出师未回，长星坠地，蜀国空悲，不如醉还醒，醒而醉。",
   "夸才智，曹孟德，分香卖履纯狐媚。",
   "奸雄那里？平生落的，只两字征西。",
   "不如醉还醒，醒而醉。",
   "画筹计，堕泪碑，两贤才德谁相配？一个力扶汉基，一个恢张晋室，可惜都寿与心违，不如醉还醒，醒而醉。",
   "珊瑚树，高数尺，珍奇合在谁家内？便认做我的，岂不知财多害已，直到东市方知。",
   "则不如醉还醒，醒而醉。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "醉太平・汉钟离本是个帅首，蓝采和是个俳优。悬壶子本不曾去沽酒，铁",
  "author": "元・无名氏",
  "body": [
   "拐李火焚了尸首。",
   "贺兰仙引定个曹国舅，韩湘子会造逡巡酒。",
   "吕洞宾三醉岳阳楼，度了一株绿柳。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "六・至省库中将官本收得无疏虞，朱钞足那时才得安心绪。常想着半江春",
  "author": "元・刘时中",
  "body": [
   "水翻风浪，愁得一夜秋霜染鬓须，历重难搏得个根基固。",
   "少甚命不快遭逢贼寇，霎时间送了身躯。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "小张屠焚儿救母・中吕/粉蝶儿",
  "author": "元・无名氏",
  "body": [
   "富和贫天地安排，使心计放钱举债，恼神灵天祸生灾。",
   "那一个是人上人，他则待利上取利，全不想其中毒害。",
   "便休题苦尽甘来，利名场有成有败。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "须贾大夫谇范叔・幺篇",
  "author": "元・高文秀",
  "body": [
   "常则是半生忙，不遂我平生志，居陋巷甘分随时。",
   "今日个和使臣冠盖相随次，离魏国，到临淄；凭喉舌，决雄雌；休战阵，免兴师，(带云)大人放心，凭范雎三寸之舌，包请俺公子归国便了。",
   "(唱)管成就这公事。",
   "(下)。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "破幽梦孤雁汉宫秋・南吕/一枝花",
  "author": "元・马致远",
  "body": [
   "四时雨露匀，万里江山秀。",
   "忠臣皆有用，高枕已无忧。",
   "守着那皓齿星眸，争忍的虚白昼。",
   "近新来染得些症候，一半儿为国忧民，一半儿愁花病酒。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "诸葛亮博望烧屯・醉春风",
  "author": "元・无名氏",
  "body": [
   "想昔日梦非熊，您今朝请卧龙。",
   "我可甚两三番懒下卧龙冈，我其实怕冗，冗。",
   "我今日当权，掌军师名项，则不如我在那半坡里养性。",
   "(云)玄德公安排酒果，准备的齐整者。",
   "不到半时，必有说客至此。",
   "则要糜竺、糜芳在此，其余将军都承听令。",
   "赵云附耳来，可是恁的。",
   "(做打耳喑科)(赵云云)师父连主公也着回避，您众将听师父将令。",
   "糜竺、糜芳，紧守着师父，小心在意者。",
   "(正末云)是也。",
   "(刘末云)师父，连刘备也着回避，众将听师父将令。",
   "糜竺、糜芳，紧守着师父，小心在意。",
   "(赵云云)俺回避也。",
   "(同众下)(管通上，云)贫道管通是也。",
   "自离魏地，可早来到新野。",
   "小校报复去，道有一云游先生，乃是管通，特来相访。",
   "(卒子云)理会的。",
   "喏，报的军师得知，有一云游的先生管通，在于门首。",
   "(正末云)我须索接待哥哥，走一遭去。",
   "(见科，云)哥哥有请。",
   "(管通云)不敢。",
   "(正末云)哥哥，俺一向相别，拳拳在意，终日无忘。",
   "不想哥哥今日来到，实乃诸葛之万幸也。",
   "(管通云)贤兄久别情怀，常思快怏。",
   "叹美景无多，流光易迈。",
   "想音容切切于心、思大德悬悬在念。",
   "自庵中作别以来，无一时忘于左右，今日得遇尊颜，实乃贫道之万幸也。",
   "(正末云)哥哥请坐，小校抬上果桌来者。",
   "(卒子云)理会的。",
   "(正末云)将酒来。",
   "(做递酒科，云)哥哥满饮一杯。",
   "(管通云)不敢，贤兄请。",
   "(做饮酒科)(正末唱)。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "送歐陽大監游廬山",
  "author": "宋・徐鉉",
  "body": [
   "家家門外廬山路，唯有夫君乞假遊。",
   "案牘乍拋公署晚，林泉已近暑天秋。",
   "海潮盡處逢陶石，江月圓時上庾樓。",
   "此去蕭然好長往，人間何事不悠悠。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "天闕山絕句",
  "author": "宋・徐鉉",
  "body": [
   "散誕愛山客，凄凉懷古心。",
   "寒風天闕晚，盡日倚軒吟。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "摊破浣溪沙·风絮飘残已化萍",
  "author": "清・納蘭性德",
  "body": [
   "风絮飘残已化萍，泥莲刚倩藕丝萦",
   "珍重别拈香一瓣，记前生",
   "人到情多情转薄，而今真个悔多情",
   "又到断肠回首处，泪偷零",
   " "
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "庆宣和・算到天明走到黑，赤紧的是衣食。凫短鹤长不能齐，且休题，谁",
  "author": "元・关汉卿",
  "body": [
   "是非。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "张君瑞闹道场(第一本)・幺篇",
  "author": "元・王实甫",
  "body": [
   "恰便似呖呖莺声花外啭，行一步可人怜。",
   "解舞腰肢娇又软，千般袅娜，万般旖旎，似垂柳晚风前。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "送寫真成處士入京",
  "author": "宋・徐鉉",
  "body": [
   "傳神蹤迹本來高，澤畔形容愧彩毫。",
   "京邑功臣多佇望，凌烟閣上莫辭勞。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "幺・参的寒来恰禁起，忽的浑身如火气逼。厌的皱了双眉。豁的一会价精",
  "author": "元・无名氏",
  "body": [
   "细，烘的半晌又昏迷。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "谢金莲诗酒红梨花・上小楼",
  "author": "元・张寿卿",
  "body": [
   "他妆梳的异样儿新，眉分八字真。",
   "口吐樱桃，眼转秋波，鬓挽乌云。",
   "那小姐，怕不有，千般儿淹润，秀才也说着呵老身心困。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "驻马听・锦阵里争先，紧卷旗幡不再展；花营中挑战，劳拴意马与心猿。",
  "author": "元・关汉卿",
  "body": [
   "降书执写纳君前，唇枪舌剑难施展。",
   "参破脱空禅，早抽头索甚他人劝。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "地藏王证东窗事犯・秃厮儿",
  "author": "元・孔文卿",
  "body": [
   "臣望写皇阁千年不朽，标青史万代名留。",
   "臣做了个充饥画饼风内烛，这冤仇，这冤仇怎肯于休！。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "吕洞宾三醉岳阳楼・收江南",
  "author": "元・马致远",
  "body": [
   "俺则待朗吟飞过洞庭湖，您在茶坊中说甚蜜和酥。",
   "(外扮孤一行上，云)甚么人乱嚷，与我拿过来者！(正末唱)扇圈般一部落腮胡，更狠似道录，马头前不慌杀了贺仙姑。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "关大王独赴单刀会・醉春风",
  "author": "元・关汉卿",
  "body": [
   "一个短剑下一身亡，一个静鞭三下响。",
   "祖宗传授与儿孙，到今日享、享。",
   "献帝又无靠无依，董卓又不仁不义，吕布又一冲一撞。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "小尉迟将斗将认父归朝・中吕/粉蝶儿",
  "author": "元・无名氏",
  "body": [
   "恼的我不邓邓忿气盈腮，可怎生另巍巍把咱单搦，不由我这胡髯乍满颔颏。",
   "人一似虎出山，马一似龙离海，凭着我枪疾鞭快，领雄兵穰穰垓垓，披挂上卓袍乌铠。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "上元日二首 二",
  "author": "唐・文宗皇帝",
  "body": [
   "蓂生三五葉初齊，上元羽客出桃蹊。",
   "不愛仙家登真訣，願蒙四海福黔黎。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "山麻客",
  "author": "元・施惠《幽闺记》",
  "body": [
   "(生)你去渡关津，怕有人盘问，又没个官司文凭路引。",
   "此行何处能安顿？蓦忽地怕有便人，寄取一封平安书信。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "李太白贬夜郎・梅花酒",
  "author": "元・王伯成",
  "body": [
   "他虽无帝主宣，文武双全，将相双权，鸾驾齐肩。",
   "比侯门深似海，罗筵，衫袖湿，帽檐偏。",
   "相隔着水中原，无旅店少人烟。",
   "龟大夫在旁边，鳖相公守根前，猿先锋可怜见，众水族尽皆全，摆列着一圆圈。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "立成汤伊尹耕莘・耍孩儿",
  "author": "元・郑光祖",
  "body": [
   "看一番揩磨日月兴宗庙，拣士马驱兵战讨。",
   "经纶天地定皇朝，保持的社稷坚牢。",
   "凋和那盐梅燮理阴阳顺，致令的天地和同风雨调。",
   "休想我污婪矫权狡，托赖着一人有庆，稳情取万姓歌谣。",
   "(云)大人，俺去来。",
   "(唱)。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "董秀英花月东墙记・圣药王",
  "author": "元・白朴",
  "body": [
   "想旧境，一梦中，海棠亭下正欢浓。",
   "宝髻松，绣被重，觉来犹在画屏东，无语泪溶溶。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "看钱奴买冤家债主・越调/半鹌鹑",
  "author": "元・郑延玉",
  "body": [
   "赛五岳灵神，为一人圣慈。",
   "总四海神州，受千年祭祀。",
   "护百二山河，掌七十四司。",
   "献香钱，火醮纸。",
   "积善的长生，造恶的便死。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "吕洞宾三度城南柳・醉扶归",
  "author": "元・谷子敬",
  "body": [
   "你自一点芳心苦，(柳云)弟子几时得度脱？(正末云)柳呵，(唱)几时得万结翠眉舒。",
   "(桃、柳各长吁科)(正末唱)您两个对月临风自叹吁，正是你绿惨红愁处。",
   "(桃云)我这等仙种，师父如何配与我柳树！(正末唱)只合与妖桃共居，天生下连枝树。",
   "(柳云)师父，弟子端的几时得托生？(正末云)你要托生，你只在老杨家成人。",
   "(桃云)弟子却是如何？(正末云)你也索跟他将去。",
   "(柳云)师父别有甚遗下言语？(正末云)你听我说。",
   "(诗云)独自行来独自坐，无限世人不识我。",
   "惟有城南柳树精，分明知道神仙过。",
   "(唱)。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "小尉迟将斗将认父归朝・鲍老儿",
  "author": "元・无名氏",
  "body": [
   "我老则老杀场上有些气概，岂不闻虎瘦雄心在？(茂公云)则怕你近不的他么。",
   "(正末唱)若是我不得胜之时怎的来，则怕羞见俺那唐十宰。",
   "料应他衣绝禄尽，时乖运拙，月值年灾，托赖着君王洪福，千秋万岁，神保天差。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "王月英元夜留鞋记・太平令",
  "author": "元・无名氏",
  "body": [
   "唬的我手脚儿惊惊战战，鬼魂灵怎敢胡缠。",
   "(郭华做见旦科，云)小娘子，我和你相见，知道是睡里梦里？(做起身搂，正旦摔开科，唱)断不了轻狂寒贱，还只待痴迷留恋。",
   "我这里跃然，向前，谢天，呀！险些的在云阳推转！。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "寨儿令・尴<九咸>，尴<九咸>，做的来所事忒严。想当初才貌两相堪，一",
  "author": "元・曾瑞",
  "body": [
   "个是娇仕女，一个俊儿男，他自把那婚姻勘。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "看钱奴买冤家债主・鹊踏枝",
  "author": "元・郑延玉",
  "body": [
   "亏心也尽由他，造恶也怎瞒咱，上面有湛湛青天，下面有漫漫黄沙。",
   "请上圣鉴察，枉将他救拔，俺可管他甚贫富穷达。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "梧叶儿・愁填满东洋海，闷弥高太华峰，愁和闷锁眉丛。这些时笔砚无心",
  "author": "元・无名氏",
  "body": [
   "近，经史不待攻。",
   "我这里怨天公，几时得凄凉卷终。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "金水桥陈琳抱妆盒・南吕/一枝花",
  "author": "元・无名氏",
  "body": [
   "虽不比三台中玉佩臣，现掌些六院里金钗客。",
   "常则待鸡鸣宫禁启，簇捧着龙绕圣颜开。",
   "那里也将相之才，无过是随步辇君王爱，听传宣妃后差。",
   "管领他美孜孜八百胭娇，守定这艳亭亭三千粉黛。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "寄生草・大厮家包藏得险，友朋每讲论得同。双生虽俊风声众，苏卿缺镘",
  "author": "元・顾德润",
  "body": [
   "情肠痛，冯魁不语机谋中。",
   "风流浪子怎教贫？孤寒壮士愁难共。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "张公艺九世同居・煞尾",
  "author": "元・无名氏",
  "body": [
   "把我那西园池馆从新构，北院山亭即便修。",
   "留得闲身漫迤逗，栽花种柳，携琴载洒，我和那松竹梅花做心友。",
   "(众下)。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "翠红乡儿女两团圆・哭皇天",
  "author": "元・高茂卿",
  "body": [
   "这厮那狠毒心如蜂虿，荒淫心忒分外。",
   "堪恨这两个薄劣种，现世的不成才。",
   "只古里向咱家、咱家取索，也须知俺这三年五载，看看衰迈，还有甚精金响钞，暗暗藏埋。",
   "只被你两个泼无徒、泼无徒将俺来厮定害。",
   "没揣的大惊小怪，便待要生非作歹。",
   "(云)婆婆，家中有两箱柜文书，休开那锁钥，都与我抬将出来。",
   "(二旦着人抬出科)(正末唱)。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "萨真人夜断碧桃花・步步娇",
  "author": "元・无名氏",
  "body": [
   "我与你款款前来深深拜，(徐端云)孩儿，你拜甚么？(正旦唱)可怜我白头父母都年迈，间别来可便三二载，(徐端云)可怎么有二三载？(正旦云)你孩儿自离了父母去呵。",
   "(唱)我正是几度南柯梦中来。",
   "(徐端云)这是怎么说？(正旦云)你孩儿是碧桃也！(唱)将小名儿道的明白，(徐端云)你道是碧桃，他已死过三年了，你一向在那里？(正旦唱)你孩儿半开中落在那荒郊外。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "相国寺公孙合汗衫・青哥儿",
  "author": "元・张国宾",
  "body": [
   "陈虎口床，显的我言而、言而无信，(带云)张孝友，(唱)你也忒眼内、眼内无珍。",
   "(带云)恰才两个人呵，(唱)他如今迭配遭囚锁缠着身，不得风云，困在埃尘。",
   "你道他一世儿为人，半世儿孤贫，气忍声吞，何日酬恩？则你也曾举目无亲，失魄亡魂，绕户踅门，鼓舌扬唇，唱一年家春尽一年家春。",
   "陈虎口床，你也曾这般穷时分。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "江州司马青衫泪・中吕/粉蝶儿",
  "author": "元・马致远",
  "body": [
   "秋月春花，都出在侍郎门下。",
   "比及我博的个富贵荣华，恰便似盼辰勾，逢大赦，得重回改嫁。",
   "今日里圣旨宣咱，吉和凶索问天买卦。",
   "(云)来到这朝门，好怕人也。",
   "(唱)。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "风雨像生货郎旦・鸳鸯尾煞",
  "author": "元・无名氏",
  "body": [
   "乞与你不痛亲父母行施恩厚，我扶侍义养儿使长多生受。",
   "你途路上驱驰，我村疃里淹留。",
   "畅道你父亲此地身亡，你是必牢记着这日头。",
   "大厮八做个周年，分甚么前和后。",
   "那时节遥望着西楼，与你爷烧一陌儿纸，看一卷儿经，奠一杯儿酒。",
   "(同孛老下)(孤云)那老儿领着妇人去了。",
   "老夫也引着这孩儿抱上马，还我私宅中去来。",
   "(下)(丑哭科，云)好苦恼子也！只一个妇人，领着个小的，几乎被人勒杀。",
   "恰好撞见我，我救了他性命。",
   "他又把这个小的卖与那个官人，那个官人又将他那个小的领着去了。",
   "这等孤孤凄凄，怎教我不要伤感？(做跌倒起科，云)呸！可干我甚么事？(诗云)随他自卖男，随他自认女。",
   "我只去做梢公，不管风和雨。",
   "(下)。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "小尉迟将斗将认父归朝・麻郎儿",
  "author": "元・无名氏",
  "body": [
   "谁使的你来认义？(刘无敌云)是宇文养爷说来。",
   "(正末唱)谁使的你敢相持？(刘无敌云)是刘季真来。",
   "父亲不信呵，兀的水磨鞭信物在此。",
   "(正末云)将来我看。",
   "(唱)我把信物接将来手里，看有甚亲题标记。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "吕洞宾桃柳升仙梦・南昼锦堂",
  "author": "元・贾仲明",
  "body": [
   "自古，道德非俗，修真养性，烧丹炼药工夫。",
   "利锁名缰，人我是非皆除。",
   "无虑，将宝贝金珠弃如土，若是有缘，终到青霄路。",
   "(合)寻真侣，今日向彩云深处，愿登仙府。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "马丹阳三度任风子・倘秀才",
  "author": "元・马致远",
  "body": [
   "你道是苦劝着不依你个妇女，那先生坏衣饭如杀父母。",
   "自古无毒不丈夫。",
   "(云)大嫂，咱那孩儿在那里？(旦云)孩儿在家睡哩。",
   "(正末唱)则那亲生子快啼哭，你与我觑去。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "宋太祖龙虎风云会・滚绣球",
  "author": "元・罗贯中",
  "body": [
   "既然主四海为一人，必须正三纲谨五常。",
   "寡人呵，幼年间广习枪棒，恨未曾登孔子门墙。",
   "《尚书》是几篇？(普云)《尚书》者上古《三坟》《五典》，洪荒莫考。",
   "夫子断自唐虞，以典、谟、训、诰、誓、命六体，皆尧、舜、汤、禹、文、武授受之心法。",
   "孔安国断为五十八篇，帝王治世之书也。",
   "(正末唱)毛诗共几章？(普云)夫诗者，古人吟咏性情之大节。",
   "有风、雅、颂三经，赋、比、兴三纬。",
   "诗有三千，夫子删为三百十一篇，善以为劝，恶以为戒。",
   "(正末云)《礼记》主意如何？(普云)夫《礼记》乃汉儒所撰述，杂录古礼之义。",
   "盖六经之用，礼实为先；治人事神，无非以礼。",
   "日用之间，不可斯须少者。",
   "(正末唱)讲《礼记》始知谦让。",
   "《春秋》主意如何？(普云)《春秋》以褒贬为辞，敦典庸礼，命德讨罪，世道之兴亡可鉴。",
   "(正末唱)论《春秋》可鉴兴亡。",
   "(普云)陛下法宗尧、舜、禹、汤、文、武，方为圣主。",
   "(正末唱)朕待学禹汤文武宗尧舜，(普云)臣有愧于古之贤相也。",
   "(正末唱)卿可继房杜萧曹立汉唐，燮理阴阳。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "望雪",
  "author": "唐・太宗皇帝",
  "body": [
   "凍雲宵徧嶺，素雪曉凝華。",
   "入牖千重碎，迎風一半斜。",
   "不妝空散粉，無樹獨飄花。",
   "縈空慙夕照，破彩謝晨霞。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "詠燭二首 一",
  "author": "唐・太宗皇帝",
  "body": [
   "燄聽風來動，花開不待春。",
   "鎮下千行淚，非是爲思人。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "送薛少卿赴青陽",
  "author": "宋・徐鉉",
  "body": [
   "我愛陶靖節，吏隠從弦歌。",
   "我愛費徵君，高卧歸九華。",
   "清風激頹波，來者何以加。",
   "我志兩不遂，漂淪浩無涯。",
   "數奇時且亂，此圖今愈賒。",
   "賢哉薛夫子，高舉凌晨霞。",
   "安民即是道，投足皆爲家。",
   "功名與權位，悠悠何用誇。",
   "携朋出遠郊，酌酒藉平沙。",
   "雲收遠天靜，江闊片帆斜。",
   "離懷與企羨，南望長咨嗟。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "双调・珍珠马南情",
  "author": "元・无名氏",
  "body": [
   "箫声唤起瑶台月，独倚阑干情惨切。",
   "此恨与谁说，又值那黄昏时节。",
   "花飞也，一点点似离人泪血。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "四・他恋着逢窗下风致佳，舵楼中景物饶。棹歌声里乐陶陶，辱没杀铺红",
  "author": "元・詹时雨",
  "body": [
   "苫绿翡翠巢。",
   "握不道相偎相抱，那里也芙蓉帐暖度春宵。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "争报恩三虎下山・混江龙",
  "author": "元・无名氏",
  "body": [
   "有一日官人知道，将这一双儿泼男女怎耽饶。",
   "若知他暗行云雨，敢可也乱下风雹。",
   "那瓦罐儿少不的井上破，夜盆儿刷杀到头臊。",
   "妆体态。",
   "并娇娆，共伴当，做知交，将家长，厮瞒着。",
   "可正是阎王不在家，着这伙业鬼由他闹。",
   "我今夜着他个火烧袄庙，水淹断了蓝桥。",
   "(下)。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "争报恩三虎下山・中吕/粉蝶儿",
  "author": "元・无名氏",
  "body": [
   "我生长在大院深宅，便烧个灰骨儿断不了我这幽闲体态，尽着他放荡形骸。",
   "我可也万千事，不折证，则我这心儿里忍耐。",
   "遮莫他翻过天来，则你那动人情四般儿不爱。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "降黄龙",
  "author": "元・徐田臣《杀狗记》",
  "body": [
   "(旦)吴国兵强，遂起兵征战，楚国难敌。",
   "昭王败走，到楚江无渡，心下踌躇。",
   "(生)那时节怎么了？(旦)昭王正在忧疑之际，移时见一艄子，驾一叶扁舟来至，救昭王御弟夫人太子离去。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "感天动地窦娥冤・耍孩儿",
  "author": "元・关汉卿",
  "body": [
   "不是我窦娥罚下这等无头愿，委实的冤情不浅；若没些儿灵圣与世人传，也不见得湛湛青天。",
   "我不要半星热血红尘洒，都只在八尺旗枪素练悬。",
   "等他四下里皆瞧见，这就是咱苌弘化碧，望帝啼鹃。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "便宜行事虎头牌・山石榴",
  "author": "元・李直夫",
  "body": [
   "往常我便打扮的别，流妆的善，干皂靴鹿皮绵团也似软，那一领家夹袄子是蓝腰线。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "五煞・腊月里桑采甚的，肚脐里爆豆实心儿退。木猫儿守窟瞧他甚，泥狗",
  "author": "元・杜仁杰",
  "body": [
   "儿看家守甚黑。",
   "天长观里看水庵相识，济元庙里口愿把我抛持。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "李亚仙花酒曲江池・收江南",
  "author": "元・石君宝",
  "body": [
   "呀，草堂中忽地贵人过，急的我忙接待敢蹉跎？(郑府尹云)媳妇儿，我当初在杏园里打上孩儿一顿，也只要他成人。",
   "今日孩儿得了官，就不肯认我。",
   "媳妇儿，你与我问他这个是何道理？(正旦唱)你父子们有甚不相和，倒着俺定夺？管教你一家完美笑呵呵。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "画堂春·一生一代一双人",
  "author": "清・納蘭性德",
  "body": [
   "一生一代一双人，争教两处销魂",
   "相思相望不相亲，天为谁春",
   "浆向蓝桥易乞，药成碧海难奔",
   "若容相访饮牛津，相对忘贫"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "般涉调・哨遍项羽自刎",
  "author": "元・王伯成",
  "body": [
   "虎视鲸吞相并，灭强秦已换炎刘姓。",
   "数年逐鹿走中原，创图基祚隆兴。",
   "各驰骋，布衣学剑，陇亩兴师，霸业特昌盛。",
   "今日悉皆扫荡，上合天统，下应民情。",
   "睢河岸外勇难施，广武山前血犹腥。",
   "恨错放高皇，懊失追韩信，悔不从范增。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "楚昭王疏者下船・太平令",
  "author": "元・郑延玉",
  "body": [
   "自斗宝临潼赴会，赐无祥公主来归。",
   "曾对天割襟为记，愿世世无相违背。",
   "这信誓，在彼，怎悔？难得见今朝这日。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "南吕・一枝花安庆湖雪夜",
  "author": "元・沙正卿",
  "body": [
   "荒陂寒雁鸣，远树昏鸦噪。",
   "断云淮甸阔，残照楚山高。",
   "古岸萧萧，败苇折芦罩，穿林荒径小。",
   "水村寒犬吠柴荆，梅岭冻猿啼树杪。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "鲠直张千替杀妻・游四门",
  "author": "元・无名氏",
  "body": [
   "呀！不赌时搂抱在祭台边，这婆娘色胆大如天。",
   "恰不怕柳外人瞧见。",
   "又不是颠，往日贤，都做了鬼胡延。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "山神庙裴度还带・水仙子",
  "author": "元・关汉卿",
  "body": [
   "想起他那芙蓉娇貌蕙兰魂，杨柳纤腰红杏春，海棠颜色江梅韵；他恨不的上青山变化身，这其间卖登科寻觅回文。",
   "这裴中立身荣贵，那韩琼英守志真，我怎背着别人做了夫人！。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "卖花声煞・簌朱帘猛然离了绣幌，携手相将入洞房。欲诉相思晓鸡唱，好",
  "author": "元・贯云石",
  "body": [
   "梦惊回泪万行，都滴在枕头儿上。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "归去来",
  "author": "宋・柳永",
  "body": [
   "初过元宵三五。",
   "慵困春情绪。",
   "灯月阑珊嬉游处。",
   "游人尽、厌欢聚。",
   "凭仗如花女。",
   "持杯谢、酒朋诗侣。",
   "馀酲更不禁香醑。",
   "歌筵罢、且归去。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "渐渐之石",
  "author": "詩經",
  "body": [
   "渐渐之石，维其高矣。山川悠远，维其劳矣。武人东征，不遑朝矣。",
   "",
   "渐渐之石，维其卒矣。山川悠远，曷其没矣？武人东征，不遑出矣。",
   "",
   "有豕白蹢，烝涉波矣。月离于毕，俾滂沱矣。武人东征，不皇他矣。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "半夜雷轰荐福碑・斗鹌鹑",
  "author": "元・马致远",
  "body": [
   "只为他财散人离，闪的我天宽地窄。",
   "抵死待要屈脊低腰，又不会巧言令色，况兼今日十谒朱门九不开。",
   "休道有七步才，他每道十二金钗，强似养三千剑客。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "郊廟歌辭 武后大享昊天樂章 一",
  "author": "唐・不詳",
  "body": [
   "大陰凝至化，真耀蘊軒儀。",
   "德邁娥臺敞，仁高姒幄披。",
   "捫天遂啓極，夢日乃昇曦。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "张天师断风花雪月・上小楼",
  "author": "元・吴昌龄",
  "body": [
   "你休那耻便伶牙俐齿，调三斡四，说人好歹，许人暖昧，损人行止。",
   "你可便道这个，道那个，做的不是，都揣与这广寒宫宵奔的卓氏。",
   "(天师云)莫不是尔桃花打合的他来么？(桃花云)桂花仙子，你自思凡，我可为甚的来，却牵连着我那。",
   "(正旦云)偏你无过犯哩。",
   "(唱)。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "沙门岛张生煮海・混江龙",
  "author": "元・李好古",
  "body": [
   "清宵无梦，引着这小精灵，闲伴我游踪。",
   "恰离了澄澄碧海，遥望那耿耿长空。",
   "你看那万朵彩云生海上，一轮皓月映波中。",
   "(侍女云)海中景物，与人间敢不同么？(正旦唱)觑了那人间风阙，怎比我水国龙宫？清湛湛、洞天福地任逍遥，碧悠悠、那愁他浴凫飞雁争喧哄。",
   "似俺这闺情深远，直恁般好信难通！。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "哭妓婆",
  "author": "元・无名氏《张协状元》",
  "body": [
   "得两面镜儿，我每好笑。",
   "双手把了，时时来照。",
   "左手照了右手又照，右手照了左手又照。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "包待制智赚灰栏记・喜迁莺",
  "author": "元・李行甫",
  "body": [
   "遭这场无情的官法，方信道漫漫黄沙。",
   "怎当的他家将咱苦打，逼勒得将招伏文状押。",
   "到今日有谁来怜见咱？似这等衔冤负屈，空吃尽吊拷绷扒。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "拨不断・景潇潇，性飘飘，龙中自有真修妙。黄叶成堆任俺烧，白云满地",
  "author": "元・高秀文",
  "body": [
   "无人扫，叹人间长笑。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "尾声・锦窝巢云屏雾帐重围绕，花胡洞翠槛朱栏巧结缚，况值着媚景明时",
  "author": "元・汤舜民",
  "body": [
   "畅欢乐。",
   "我将他风流窨约，行藏品藻，集主青楼卖弄到老。",
   "赠美人号展香绵杨铁笛为著此号芳姿腻腻娇，素质娟娟净。",
   "绸缪无限絮，继续有余情。",
   "天付聘婷，纯一味温柔性，纵丹青画不成。",
   "软耨耨堪宜梅雪同心，白霭霭不与梨花共影。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "郑月莲秋夜云窗梦・鹊踏枝",
  "author": "元・无名氏",
  "body": [
   "你觑似这等俏生员，伴着这女婵娟。",
   "吟几首嘲咏情诗，写数幅锦字花笺。",
   "惯播弄香矫玉软，温存出痛惜轻怜。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "醉思乡王粲登楼・煞尾",
  "author": "元・郑光祖",
  "body": [
   "他年不作文章伯，异日须为将相材。",
   "待与不待总无碍，时与不时且宁耐。",
   "说地谈天口若开，伏虎降龙志不改。",
   "稳情取兴刘大元帅，试看雄师拥麾盖。",
   "恨汝等将咱厮害。",
   "（带云）我若得志呵，（唱）把你掳掠中军账门外，似这等跋扈襄阳吃剑才。",
   "（带云）将二贼擒至马前斩首报来！（唱）那其间才识俺长安少年客。",
   "（下）。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "迷青琐倩女离魂・中吕/粉堞儿",
  "author": "元・郑光祖",
  "body": [
   "自执手临歧，空留下这场憔悴，想人生最苦别离。",
   "说话处少精神，睡卧处无颠倒，茶饭不知滋味。",
   "似这般废寝忘食，折挫得一日瘦如一日。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "神奴儿大闹开封府・黄钟尾",
  "author": "元・无名氏",
  "body": [
   "我这里潜踪蹑足临芳径，我与你破步撩衣近小亭。",
   "见孩儿，世不曾，不由我，不悲哽，天色寒，风力冷，夜迢迢，星耿耿，忽的阴，忽的晴。",
   "我则道神奴儿在曲槛闲行，(带云)兀的不是哥哥来了也。",
   "(唱)哎！却原来是云破月来花弄影。",
   "(同下)。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "杜牧之诗酒扬州梦・雁儿落",
  "author": "元・乔吉",
  "body": [
   "我则道玉阶前花弄影，原来是金殴上传宣令。",
   "本为个牛僧孺门-下人，倒做了杜牧之心头病。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "仙吕・醉中天",
  "author": "元・刘时中",
  "body": [
   "花木相思树，禽鸟折枝图。",
   "水底双双比目鱼，岸上鸳鸯户，一步步金厢翠铺。",
   "世间好处，休没寻思，典卖了西湖。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "闺怨佳人拜月亭・尾",
  "author": "元・关汉卿",
  "body": [
   "他把世间毒害收拾彻，我将天下忧愁结缆绝。",
   "（小旦云了）没盘缠，在店舍，有谁人，厮抬贴？那消疏，那凄切，生分离，厮抛撇。",
   "从相别，恁时节，音书无，信息绝。",
   "我这些时眼跳腮红耳轮热，眠梦交杂不宁贴。",
   "您哥哥暑湿风寒纵较些，多被那烦恼忧愁上送了也！（下）。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "楚昭王疏者下船・金盏儿",
  "author": "元・郑延玉",
  "body": [
   "你道是一个月借兵还，三十日报平安。",
   "但愿你晓行晚宿无辞惮，休着我悬望的恶心烦。",
   "你只看风传金柝远，霜照铁衣寒。",
   "(申包胥云)主公放心，小官若见了秦昭公，借的军马即便回也。",
   "(正末唱)我可为甚着贤人投敌国，也则怕那猛将过昭关！(申包胥云)那吴国孙武子深知兵法，又加以子胥之勇，俺国中无能胜之者。",
   "小官去后，只愿主公坚壁不战，以待秦兵。",
   "休听一时之言，坐失万全之策。",
   "(正末唱)。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "醉落魄",
  "author": "元・无名氏《宦门子弟错立身》",
  "body": [
   "令人去久传音耗，至今不到。",
   "(净上)心忙意急归来报。",
   "(旦上)得见情人，心下称怀抱。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "迷青琐倩女离魂・出队子",
  "author": "元・郑光祖",
  "body": [
   "骑一匹龙驹，畅好口硬。",
   "恰便似驮张纸，不恁般轻。",
   "腾腾腾收不住玉勒，常是虚惊；火火火坐不稳雕鞍，划地眼生；撒撒撒挽不定丝僵，则待撺行。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "刘晨阮肇误入桃源・沽美酒",
  "author": "元・王子一",
  "body": [
   "怎肯学鲲鹏飞杂燕雀，芝兰长混蓬蒿，可正是忙处人多闲处少。",
   "早着我迷踪失道，无处访旧时樵。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "萧何月夜追韩信・收尾",
  "author": "元・金仁杰",
  "body": [
   "只为那八千子弟无踪影，因此上送得他十二瑶阶独自行。",
   "道寡称君事不成，创业开基命不存。",
   "失却龙驹怎战争，别了虞姬那痛增。",
   "前后军兵紧相并，左右枪刀厮围定。",
   "掠袖揎拳挺盔顶，破步撩衣扯剑迎。",
   "响断狮鍪心不宁，伏着龙泉身略横。",
   "猿背弯环。",
   "醉眼朦朦，腰项斜称。",
   "呀，他可早鲜血淋漓了战袍领。",
   "(下)。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "一・早晨间借与他，日平西盼望你，倚门专等来家内。柔肠寸寸因他断，",
  "author": "元・马致远",
  "body": [
   "侧耳频频听你嘶。",
   "道一声“好去”，早两泪双垂。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "董秀英花月东墙记・油葫芦",
  "author": "元・白朴",
  "body": [
   "杏朵桃枝似绛唇，柳絮纷，春光偏闪断肠人。",
   "微风细雨催花信，闲愁万种心间印。",
   "罗帏绣被，孤寒欲断魂。",
   "掩重门尽日无人问，情不遂越伤神。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "中吕・粉蝶儿",
  "author": "元・兰楚芳",
  "body": [
   "骄马金鞭，自悠悠未尝心倦，正闲寻陌上花钿。",
   "过章台，临洛浦，与可憎相见。",
   "他恰正芳年，误沉埋舞裙歌扇。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "萨真人夜断碧桃花・斗鹌鹑",
  "author": "元・无名氏",
  "body": [
   "元来是风月上留情，全不是寒热间害疾。",
   "你则待送雨行云，那些儿于家为国？常言道心病从来无药医，这等干相思不似你，空则想梦里佳人，做了个色中饿鬼。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "商调・梧叶儿出金陵",
  "author": "元・乔吉",
  "body": [
   "尘暗埋金地，云寒树玉宫，归去也老仙翁。",
   "东北朝宗水，西南解愠风，船急似飞龙，到铁瓮城边喜落篷。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "紫花儿・鬓丝禅榻，眉黛吟窗，扇影歌楼。献书北阙，挟策南州。迟留，",
  "author": "元・李邦基",
  "body": [
   "社燕秋鸿几回首。",
   "壮怀感旧，妩媚精神，罗绮风流。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "郑月莲秋夜云窗梦・收江南",
  "author": "元・无名氏",
  "body": [
   "趁着这下江风顺片帆归，俺好姻缘生纽做恶离。",
   "玉箫闲杀共谁吹。",
   "从来到这里，绿窗前学画远山眉。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "崔莺莺夜听琴(第二本)・调笑令",
  "author": "元・王实甫",
  "body": [
   "莫不是梵工宫，夜撞钟？莫不是疏竹潇潇曲槛中？莫不是牙尺剪刀声相送？莫不是漏声长滴响壶铜？潜身再听在墙角东，元来是近西厢理结丝桐。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "耍孩儿・俺那里香风不动松花老，比您那帝辇京师较好。每日看神仙神女",
  "author": "元・王仲元",
  "body": [
   "住仙庄，俺吃的是仙酒仙桃。",
   "俺那里风花雪月人长久，春夏秋冬草不雕。",
   "观着星曜，清闲落魄，快活逍遥。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "于中好·独背残阳上小楼",
  "author": "清・納蘭性德",
  "body": [
   "独背残阳上小楼，谁家玉笛韵偏幽",
   "一行白雁遥天暮，几点黄花满地秋",
   "惊节序，叹沉浮，秾华如梦水东流",
   "人间所事堪惆怅，莫向横塘问旧游",
   " "
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "庞涓夜走马陵道・金盏儿",
  "author": "元・无名氏",
  "body": [
   "他那里一一问行踪，俺兄弟悄悄的嘶过从。",
   "好教我意踌躇，两下里可兀的难趋奉。",
   "我待不说呵，怎生支对主人公；待说呵，我和他书窗曾最密。",
   "怎宦路个不相容。",
   "(公子云)孙先生，你怎生不言语？(正末唱)我正是满怀心腹事，尽在不言中。",
   "(公子云)孙先生，你恰才摆阵时毕竟是谁输谁赢？(正末云)公子，听贫道说咱。",
   "(唱)。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "大石调・好观音怨恨",
  "author": "元・贯云石",
  "body": [
   "先自相逢同欢偶，无妨碍燕侣莺俦。",
   "并坐同肩共携手，恩情厚，夫妇般相看的好。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "倘秀才・睡时节把扁舟来缆住，觉来也又流在芦花浅处，荡荡悠悠无所拘。",
  "author": "元・张可久",
  "body": [
   "市朝远，故人疏，有樵夫做伴侣。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "小桃红・伯苏东云燕西飞，一点芳心醉。鱼雁无凭怎寻觅，信音稀。牙床",
  "author": "元・无名氏",
  "body": [
   "冷落了鸳鸯被，减尽了千娇百媚。",
   "害的人一丝两气，方信道最苦是别离。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "扈驾西山",
  "author": "清・納蘭性德",
  "body": [
   "凤翥龙蟠势作环，浮青不断太行山",
   "九重殿阁葱茏里，一气风云吐纳间",
   "熊虎自当驰道伏，蛟螭长棒御书闲",
   "黄图此日论形胜，惭愧频叨侍从班"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "思园春",
  "author": "元・无名氏《张协状元》",
  "body": [
   "你要休时我未休。",
   "(净)早来吾殿下吃猪头。",
   "(旦出)灵杯不许后，教我怎生留！(生)漾人葫芦水上游，葫芦儿沉后我共伊休。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "桃红菊",
  "author": "元・无名氏《张协状元》",
  "body": [
   "野方直入庙中，见一佳人困穷。",
   "似胜花娘子无异，血染得衣衫煞红。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "李太白贬夜郎・驻马听",
  "author": "元・王伯成",
  "body": [
   "想着天子三宣，翠袖双扶不上船。",
   "不如素娥捧劝，巨瓯一饮倒垂莲。",
   "为杨妃昧龙庭大乃妇之天，钓风波门似钩和线。",
   "虽然在海角边，举头日近长安远。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "山神庙裴度还带・幺篇",
  "author": "元・关汉卿",
  "body": [
   "你道是从来养小防备老，都一般哀哀父母劬劳。",
   "（带云）先圣有言：\"身体发肤，受之父母，不敢毁伤，孝之始也。",
   "\"（唱）你便怎生舍性命寻自吊？（带云）\"扬名于后世，以显父母，孝之终也。",
   "\"（唱）这的可也方为全孝。",
   "（云）\"父母全而生之，子全而归之，可为孝也。",
   "\"（唱）则这的是为人子立的根苗。",
   "（夫人云）据先生说呵，也说的是；争夺我夫主无辜受禁，眼睁睁不得脱难，则觑着这条玉带救夫主；不见了，似此这般，一千贯赃几时纳的了也！（正末云）夫人、小娘子，假若有这玉带呵呢？（夫人云）若是有这玉带呵，便是救了俺一家性命也。",
   "（正末云）假若无了这玉带呵呢？（夫人云）俺一家儿便是死的，都不得活也。",
   "（正末云）老夫人、小娘子放心，玉带我替你收着哩！（旦儿云）先生勿戏言！（正未云）孔子门徒，岂有戏言！（正末做取带科，云）娘子，兀的不是带，还你！（旦儿接科，云）兀的不正是此带！索是谢了先生。",
   "（夫人云）孩儿也，俺娘儿两个一齐的拜谢先生咱。",
   "（正末云）不敢！不敢！（夫人云）先生救活我一家之恩，此义非轻也！世间似先生者世之罕有。",
   "处于布衣窘暴之中，千金不改其志，端的是仁人君子也！（正末云）不敢！不敢！世间似小娘子贞孝之女--自古孝子多，孝女少--女子中只有两三个人也。",
   "（夫人云）是那两三个？先生试说，老身洗耳愿闻咱。",
   "（正末唱）。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "圣药王",
  "author": "元・无名氏《宦门子弟错立身》",
  "body": [
   "更做《四不知》；《双斗医》；更做《风流浪子两相宜》；黄鲁直，《打得底》；《马明王村里会佳期》；更做《搬运太湖石》。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "商调・集贤宾闺情",
  "author": "元・谷子敬",
  "body": [
   "猛听的透帘栊卖花声唤起，将好梦却惊回。",
   "更和那迁乔木莺声偏碎，上纱窗日影重移。",
   "暗沉吟失魄消魂，闷恹恹似醉如痴。",
   "把重门紧紧深闭起，怕莺花笑人憔悴。",
   "离愁何日满，此恨有谁知？。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "尾・南山射虎弓藏，北海诛龙剑隐匣。两字功名不牵挂，书房中卧咱。松",
  "author": "元・无名氏",
  "body": [
   "阴下坐咱，无是无非快活煞。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "南吕・一枝花春思",
  "author": "元・汤舜民",
  "body": [
   "嫩寒生花底风，清影弄帘间月，乱红扑窗外雨，香絮滚树头雪，影物奇绝，谁不道富贵千金夜，我翻做凄凉三月节。",
   "怀故人万里离别，负东君一番艳冶。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "死生交范张鸡黍・天下乐",
  "author": "元・宫天挺",
  "body": [
   "你道是文章好立身，我道今人都为名利引，怪不着赤紧的翰林院那伙老子每钱上紧。",
   "(王仲略云)怎见得他钱上紧？(正末云)有钱的无才学。",
   "有才学的却无钱。",
   "有钱的将着金帛干谒那官人每，暗暗的衙门中分付了，到举场中各自去省试殿试，岂论那文才高低？(唱)他歪吟的儿句诗，胡诌卜一道文，都是些要人钱谄佞臣。"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {
  "title": "尾声・汉相如有朝归故乡，卓文君多曾亲见睹？一星星自把衷肠诉，将我",
  "author": "元・陈克明",
  "body": [
   "这受过的凄凉慢慢的数。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "布袋和尚忍字记・十二月",
  "author": "元・郑延玉",
  "body": [
   "师父你疾来救我，这公事怎好收撮？我想这光阴似水，日月如梭。",
   "每日家不曾道是口合，我可便剩念了些弥陀。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "乐安神南・闲来思虑，自从那日赋归欤，山河日月几盈虚，风光渐觉催寒",
  "author": "元・沈和",
  "body": [
   "欲求生富贵，须下死工夫，且常教两眉舒。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "郊廟歌辭 朝日樂章 雍和",
  "author": "唐・不詳",
  "body": [
   "晨儀式薦，明祀惟光。",
   "神物爰止，靈暉載揚。",
   "玄端肅事，紫幄興祥。",
   "福履攸假，於昭允王。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "冬日晚望",
  "author": "宋・陳摶",
  "body": [
   "山鬼煖或呼，溪魚寒不跳。",
   "晚景愈堪觀，危峰露殘照。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "董秀英花月东墙记・绵打絮",
  "author": "元・白朴",
  "body": [
   "深闱静悄，幽僻庭空。",
   "月轮展纸，几扇屏风。",
   "似海棠半醉春睡重，鲛绡上绿鬓拥。",
   "有情人何日相逢，几时得赴高唐梦中？。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "死生交范张鸡黍・骂玉郎",
  "author": "元・宫天挺",
  "body": [
   "这些时平安信断连三月，我正心绪不宁贴。",
   "猛听的家僮报喜高声说，俺兄弟在那里，我与你亲自接，(做见科，唱)不由人添欢悦。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "温太真玉镜台・上小楼",
  "author": "元・关汉卿",
  "body": [
   "休提着违宣抗敕，越逗的他烦天恼地。",
   "你则说迟了燕尔，过了新婚，误了时刻；你说领着省事，掌着军权，居着高位；又道会亲处倚官挟势。",
   "（云）我则索哀告你个媒婆，做个方便者。",
   "（做跪科）（官媒云）学士，你为何在老身跟前下礼？（正末唱）。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "锦云堂暗定连环计・四块玉",
  "author": "元・无名氏",
  "body": [
   "我则道他瘦恹恹苦病缠，却元来悄促促耽闺怨，方信道色胆从来大似天。",
   "(旦儿做泣科)(正末唱)则见他泪痕儿界破残妆面。",
   "我可甚治家如治国，他也不能守礼似守身，都做的顾后不顾前。",
   "(云)貂蝉，你在这里做甚么？敢如此大胆也。",
   "(梅香云)决撒了，老爷都听见了也。",
   "(旦儿云)你孩儿在此不曾说甚么，则为身子不快，特来烧香。",
   "(正末云)噤声。",
   "(唱)。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "沙门岛张生煮海・雁儿落",
  "author": "元・李好古",
  "body": [
   "不想这火中生比目鱼，石内长荆山玉。",
   "天边有比翼鸟，地上出连枝树。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "立春日遊苑迎春",
  "author": "唐・中宗皇帝",
  "body": [
   "神皐福地三秦邑，玉臺金闕九仙家。",
   "寒光猶戀甘泉樹，淑景偏臨建始花。",
   "綵蝶黃鸎未歌舞，梅香柳色已矜誇。",
   "迎春正啓流霞席，暫囑曦輪勿遽斜。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "裴少俊墙头马上・南吕/一枝花",
  "author": "元・白朴",
  "body": [
   "睡魔缠缴得慌，别恨禁持得煞。",
   "离魂随梦去，几时得好事奔人来，一见了多才，口儿里念，心儿里爱，合是姻缘簿上该。",
   "则为画眉的张敞风流，掷果的潘郎稔色。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "钟离春智勇定齐・混江龙",
  "author": "元・郑光祖",
  "body": [
   "后来也春秋雄壮，各称一国立家邦。",
   "界分列土，隘定封疆。",
   "却正是幸值繁华歌稔岁，喜逢美景乐风光。",
   "端的是人和美行谦让，为人要心存义理，秉受纲常。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "亻刍梅香骗翰林风月・双调/新水令",
  "author": "元・郑光祖",
  "body": [
   "今日个洞房中敕赐与栋梁材。",
   "（云）小姐，我可是敢问你么，（唱）则你那寄香囊故人安在？（旦儿云）说这状元好才学哩。",
   "（正旦唱）都因他七步才及第了。",
   "（旦儿云）说那人有些亻刍亻刍。",
   "（正旦唱）带得那一块刍过门来。",
   "他承恩在玉殿金阶，更堪那兰省乌台。",
   "似这般相貌胎孩。",
   "（带云）他今日到咱门呵。",
   "（唱）休想肯拜俺先代。",
   "（山人云）兀那媒婆，你说去，时辰到了，豫备香花果品，纸烛千张，坛斗弓箭，五谷寸草，这早晚亲状元敢待来也。",
   "（白敏中冠带引祗候上，诗云）宫锦官花跃紫骝，夸官三日凤城游。",
   "不知结彩楼中女，若个争先掷绣球。",
   "小官白敏中，谁想有今日也。",
   "我自到贡院中，撺过卷子，金銮殿上，圣人亲试，日不移影，应对百篇，圣人言曰：\"前朝李翰林，不过如此。",
   "\"将小生一举状元及第，一日加某十三级，官至翰林大学士。",
   "今奉圣人的命，教我去裴相国家门下为婿。",
   "虽然如此，想当日被老夫人那场羞辱，有何面目见之？我待不去来，奈圣人的命，不敢有违。",
   "我如今在使机关，到他家里，则推素不相识，看他认的我么？（行科，山人唱科，诗云）锦城一步一花开，专请新人下马来。",
   "今日鸾凰城配偶，美满夫妻百岁谐。",
   "（白将牙笏遮面，与旦并坐科，山人云）将五谷寸草来。",
   "（官媒云）你正是精驴，休要胡说！（白敏中云）山人去罢。",
   "（山人下）（正旦云）我待不言语来，他道俺不理会的，我着这秀才，吃我几句儿咱。",
   "小姐，梅香寻思来，咱人只要得志，便好了也，若是不得志呵，（唱）。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "鹧鸪天·雁贴寒云次第飞",
  "author": "清・納蘭性德",
  "body": [
   "雁帖寒云次第飞，向南犹自怨归迟",
   "谁能瘦马关山道，又到西风扑鬓时",
   "人杳杳，思依依，更无芳树有乌啼",
   "凭将扫黛窗前月，持向今宵照别离",
   " "
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "北曲得胜令",
  "author": "元・萧德祥《小孙屠》",
  "body": [
   "则笑卓氏女忒心痴，它被这睡魔正厮禁持。",
   "则想醉里乾坤大，全不想花间云雨期。",
   "身靠着屏围，魂梦谁根底？酒病好难医，今朝醒觉迟。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "玉清庵错送鸳鸯被・步步娇",
  "author": "元・无名氏",
  "body": [
   "只为那举债文书我画的有亲笔迹，因此上被强勒为妻室。",
   "这真心儿誓不移，情愿方打千敲受他磨到底。",
   "今日留得个一身归，谢哥哥肯救我亲生妹。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "赵盼儿风月救风尘・柳叶儿",
  "author": "元・关汉卿",
  "body": [
   "则教你怎生消受，我索合再做个机谋。",
   "把这云鬟蝉鬓妆梳就，（带云）还再穿上些锦绣衣服。",
   "（唱）珊瑚钩、芙蓉扣，扭捏的身子儿别样娇柔。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "诈妮子调风月・尾",
  "author": "元・关汉卿",
  "body": [
   "忽地却掀帘，兜地回头问，不由我心儿里便亲。",
   "你把那并枕睡的日头儿再定轮，休教我逐宵价握雨携云。",
   "过今春，先教我不系腰裙，便是半簸箕头钱扑个复纯。",
   "教人道\"眼里有珍\"，你可休\"言而无信\"！（云）许下我包髻、团衫、绣手巾。",
   "专等你世袭千户的小夫人。",
   "（下）。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "慢卷绸",
  "author": "宋・柳永",
  "body": [
   "闲窗烛暗，孤帏夜永，敧枕难成寐。",
   "细屈指寻思，旧事前欢，都来未尽，平生深意。",
   "到得如今，万般追悔。",
   "空只添憔悴。",
   "对好景良辰，皱著眉儿，成甚滋味。",
   "红茵翠被。",
   "当时事、一一堪垂泪。",
   "怎生得依前，似恁偎香倚暖，抱著日高犹睡。",
   "算得伊家，也应随分，烦恼心儿里。",
   "又争似从前，淡淡相看，免恁牵系。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "離歌辭五首  其一",
  "author": "宋・徐鉉",
  "body": [
   "莫折紅芳樹，但知盡意看。",
   "狂風幸無意，那忍折教殘。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "关云长千里独行・幺篇",
  "author": "元・无名氏",
  "body": [
   "又不向盘内取，则向刀刃上挑。",
   "险些儿惊杀许褚，荒杀曹公，唬杀张辽。",
   "他每都，紧赶着，奸雄曹操。",
   "我问你那锦征袍要也那不要？。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "铁拐李度金童玉女・梁州第七",
  "author": "元・贾仲明",
  "body": [
   "看春江鸭头绿皱，接行云雁翅红娇。",
   "酒旗向青杏园林挑。",
   "佳人斗草，公子妆幺。",
   "秋千料峭，鼓吹游遨。",
   "上新黄柳曳金条，绽嫣红花簇冰绡。",
   "芳丛内采嫩蕊，粉蝶队队身轻，回塘畔点香芹，紫燕翩翩翅袅；碧阴中弄清音，流莺恰恰声交。",
   "难挑，怎描？便那女娘行心思十分巧，其实的刺不成绣不到。",
   "丹青手虽然百倍高，也画不出这重叠周遭。",
   "(带云)我想俺这一对好夫妻，也非今世姻缘，是前生配定也。",
   "(唱)。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "楚昭王疏者下船・耍孩儿",
  "author": "元・郑延玉",
  "body": [
   "本待要相随相从相将去，也则为我胆儿自虚。",
   "我只见前山掩映苍苍树，那其间必有埋伏。",
   "小路行怕撞着孙都统，大路走须防他伍子胥。",
   "兄和弟谁防护？可不是免鱼鳖才离江上，逢豺虎又断送山谷。",
   "(芈旋云)既然这等，您兄弟则往这小路上，抄出大路相会。",
   "且辞别了哥哥去也。",
   "哥哥受您兄弟一拜，只愿哥哥稳登前路，无惊无恐。",
   "(正末唱)。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "唐明皇秋夜梧桐雨・搅筝琶",
  "author": "元・白朴",
  "body": [
   "高力士，道与陈玄礼休没高下，岂可教妃子受刑罚？他见请受着皇后中宫，兼踏着寡人御榻。",
   "他又无罪过，颇贤达。",
   "须不似周褒姒举火取笑，纣妲己敲胫觑人。",
   "早间把他个哥哥坏了，总便有万千不是，看寡人也合饶过他，一地胡拿。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "郊廟歌辭 武后大享拜洛樂章 歸和",
  "author": "唐・不詳",
  "body": [
   "言旋雲洞兮躡煙途，永寧中宇兮安下都。",
   "包涵動植兮順榮枯，長貽寶貺兮贊璇圖。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "刘晨阮肇误入桃源・倘秀才",
  "author": "元・王子一",
  "body": [
   "我待学炼九转丹砂葛洪，上万丈昆仑赤松，因此上思入风云变态中。",
   "(云)兄弟，你看一溪流水，几片落花，这山中必有人家也。",
   "(唱)则见一溪流水绿，几片落花红，兀的把春光断送。",
   "(云)兄弟，这般景物，畅是宜人，我且题咏几句咱。",
   "(阮云)兄长正好题咏几句，小弟拱听。",
   "(正末唱)。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "须贾大夫谇范叔・伴读书",
  "author": "元・高文秀",
  "body": [
   "谢大夫多情分，赐绨袍无悭吝。",
   "我可便接将来怎敢虚谦逊，觉的软设设身上如绵囤。",
   "不由不喜孜孜顿解心头闷，我、我、我，怎报的你这救济之恩？。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "秣陵怀古",
  "author": "清・納蘭性德",
  "body": [
   "山色江声共寂寥，十三陵树晚萧萧",
   "中原事业如江左，芳草何须怨六朝"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "郊廟歌辭 五郊樂章 黃帝宮音 舒和",
  "author": "唐・魏徵",
  "body": [
   "御徵乘宮出郊甸，安歌率舞遞將迎。",
   "自有雲門符帝賞，猶持雷鼓答天成。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "萧淑兰情寄菩萨蛮・调笑令",
  "author": "元・贾仲明",
  "body": [
   "说的我面惨，转羞惭，你因甚，相通这书一缄？莫怪我等闲特故来摇撼，赤紧的张横渠不肯贪婪。",
   "只待要坐取公侯伯子男，气昂昂阔论高谈。",
   "(张世英云)昨朝行之，今日如此，似此小生当告辞，有何面目立于萧公之门，耻见天下士大夫也！(嬷嬷唱)。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "张君瑞害相思(第三本)・络丝娘煞尾",
  "author": "元・王实甫",
  "body": [
   "因今宵传言送语，看明日携云握雨。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "八・",
  "author": "元・刘时中",
  "body": [
   "没高低妾与妻，无分限儿共女，及时打扮环珠玉。",
   "鸡头般珠子缘鞋口，火炭似真金裹脑梳。",
   "服色例休题取，打扮得怕不赛夫人样子，脱不了市辈规模。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "辅成王周公摄政・雪里梅",
  "author": "元・郑光祖",
  "body": [
   "为甚不交你皓首退朝归？似你般白发故人稀。",
   "能可你赞拜休名，进殿免跪，凡事便宜。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "商调/浪来里煞",
  "author": "元・杨景贤",
  "body": [
   "经文要阐扬，佛法要通变。",
   "四天王八菩萨尽周全，到长安七日功行圆。",
   "天随人愿，早来至龙华会上饱参禅。",
   "(下)。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "江州司马青衫泪・随煞",
  "author": "元・马致远",
  "body": [
   "恰才来万里天涯，早愁鬓萧萧生白发。",
   "俺把那少年心撇罢，再不去趁春风攀折凤城花！。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "普天乐",
  "author": "元・徐田臣《杀狗记》",
  "body": [
   "(旦)看一本楚昭王真贤慧，弃妻子怜兄弟。",
   "伊不念共乳同胞，割舍赶他出去。",
   "念小叔真狼狈，我夫哀怜回心意，破窑内收取兄弟回归，同享富贵。",
   "效昭王爱亲，休学曹丕。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "普天乐南・玩中秋明月朗，登高在楼台上。东篱下菊蕊含金，正消磨暑气",
  "author": "元・无名氏",
  "body": [
   "秋光。",
   "捧玉觞，葡萄酿，酒友诗朋齐歌唱，玉山颓沉醉何妨。",
   "朱扉绿窗，任风吹落帽龙山赏重阳。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "虞美人·银床淅沥青梧老",
  "author": "清・納蘭性德",
  "body": [
   "银床淅沥青梧老，屧粉秋蛩扫",
   "采香行处蹙连钱，拾得翠翘何恨不能言",
   "回廊一寸相思地，落月成孤倚",
   "背灯和月就花阴，已是十年踪迹十年心"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "尾声・云呵您片时聚散情虽少，几处飞来恨怎消，日幕江东信音到。休低",
  "author": "元・汤舜民",
  "body": [
   "迷画桥，休深笼翠阁，则不如为雨为霖润枯槁。",
   "赠妓素兰散清风烟月中，逞素质风尘内，染一枝春色淡，攒两叶翠痕低。",
   "束具含犀，另一种风流意，比群芳分外奇。",
   "俏如荪名重秦楼，娇似芷声扬楚国。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "雁儿落・被儿冷龙涎不索薰，人儿远龟卦何须问？路儿阻鱼笺断往来，心",
  "author": "元・赵君祥",
  "body": [
   "儿邪鹊语难凭信。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "鲁大夫秋胡戏妻・尧民歌",
  "author": "元・石君宝",
  "body": [
   "桑园里只待强逼做欢娱，吓的我手儿脚儿滴羞蹀躞战笃速。",
   "他便相偎相抱扯衣服，一来一往当拦住。",
   "当也波初，则道是峨冠士大夫，原来是个不晓事的乔男女。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "鲠直张千替杀妻・十二月",
  "author": "元・无名氏",
  "body": [
   "便怕甚担烦受恼，判了个无处归着。",
   "俺哥哥从来软弱，几曾见犯法违条？惜不得家亲年老，好教我苦痛哮啕。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "铁拐李度金童玉女・凤鸾吟",
  "author": "元・贾仲明",
  "body": [
   "听的将金安寿名字呼？我这里低首拜伏。",
   "(铁拐云)金安寿。",
   "你怎生得到俺这里？(正末唱)这埚里云水林峦，甚么去处？(铁拐云)这里是洞天福地。",
   "但能到此，吃仙桃，饮甘露，伴猿鹤，与龟鹿齐寿。",
   "(正末唱)呀！元来这琳宫绀宇，是仙居洞府，食仙桃饮琼浆甘露。",
   "朱顶鹤，献果猿，绿毛龟，衔花鹿，寿长生玉篆丹书。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "朱砂担滴水浮沤记・隔尾",
  "author": "元・无名氏",
  "body": [
   "一领布衫我与你刚刚的扣，八答麻鞋款款的兜。",
   "我又不敢高声大咳嗽，我将这厮左瞅，右瞅。",
   "哎！天也！怎的他一阵儿昏迷稳放我走。",
   "(云)行李衣服都摸着了也，且喜那厮正睡着哩。",
   "此时不走，更待何时！(唱)。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "天净沙・正欢娱阻隔欢娱，道心毒果是心毒，生拆散吹箫伴侣。不堪言处，",
  "author": "元・王修甫",
  "body": [
   "痛伤怀凤只鸾孤。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "包待制三勘蝴蝶梦・川拨棹",
  "author": "元・关汉卿",
  "body": [
   "这场灾，一时间命运衰；早则解放愁怀，喜笑盈腮。",
   "我则道石沉大海！（云）大哥、二哥，您两个管着甚么哩？（唱）这言语休见责。",
   "（云）您两个好不仔细。",
   "抬这尸首来做甚？（唱）。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "钟离春智勇定齐・醉春风",
  "author": "元・郑光祖",
  "body": [
   "你看那邻里俊娇娃，更和这乡闾小幼女，家园万卉叶蓁蓁，要把这成行儿数，数。",
   "走不彻榆林，观不尽枣棘，数不尽桑树。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "桃花女破法嫁周公・尾煞",
  "author": "元・王晔",
  "body": [
   "算人间死与生，较阴阳高共低。",
   "再休提天文地理星家历，周公也你在我桃花女根前如何过去得。",
   "(下)。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "遊長寧公主流杯池二十五首 十一",
  "author": "唐・上官昭容",
  "body": [
   "暫爾遊山第，淹留惜未歸。",
   "霞窗明月滿，澗戶白雲飛。",
   "書引藤爲架，人將薜作衣。",
   "此真攀玩所，臨睨賞光輝。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "梁州序",
  "author": "元・徐田臣《杀狗记》",
  "body": [
   "(旦)员外，你和他结义，心肠奸狡，到底不是坚牢。",
   "心非口是，只恐笑里藏刀。",
   "(生)是我三人结义，赛过关张，永远学管鲍。",
   "你不知就里乱言敢胡道。",
   "(旦)恐怕将来没下梢，空惹得外人笑。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "施仁义刘弘嫁婢・四煞",
  "author": "元・无名氏",
  "body": [
   "一封书寄与咱，你夫情我尽知。",
   "今日红妆共秀才，您两个为门对。",
   "岂不闻书中有女颜如玉，路上行人口胜碑。",
   "君子喻于义，也强如巡寺院布施与钱物，绕庙宇祷告神祗。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "胡捣练",
  "author": "宋・晏殊",
  "body": [
   "小桃花与早梅花，尽是芳妍品格。",
   "未上东风先拆。",
   "分付春消息。",
   "佳人钗上玉尊前，朵朵秾香堪惜。",
   "谁把彩豪描得。",
   "免恁轻抛掷。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "辅成王周公摄政・煞尾",
  "author": "元・郑光祖",
  "body": [
   "宣化的臣民内外服，将傍的君王寿数高。",
   "等天子将摄行的国事亲临却，微臣报国忠心恁时了。",
   "（下）。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "四丞相高会丽春堂・麻郎儿",
  "author": "元・王实甫",
  "body": [
   "昨日个深居华屋，今日个流窜荒墟，冷落了歌儿舞女，空闲了宝马香车。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "锦云堂暗定连环计・隔尾",
  "author": "元・无名氏",
  "body": [
   "一个眼传情羞掩芙蓉面，一个坐不稳难登玳瑁筵。",
   "则见他佯带酒推更衣且宽转。",
   "(吕布云)老宰辅，乞恕吕布疏狂之罪。",
   "(正末唱)请温侯稳便，(吕布做呕科，云)吕布酒醉了，混践华堂，岂不得罪？(正末唱)有甚么混践。",
   "(云)奉先请坐，老夫前后执料去咱。",
   "(唱)我口儿里说话，将身躯倒退的远。",
   "(虚下)(吕布低云)老宰辅去了也。",
   "貂蝉！(旦儿应科)(吕布云)妻也，你怎生却在这里？(旦儿云)自从俺临洮失散，流落在司徒府中，不想今日才得相见。",
   "奉先，则被你痛杀我也。",
   "(旦儿做哭、吕布掩泣科，云)貂蝉，兀的不想杀我也。",
   "(正末冲上，云)你两个说甚么哩？(吕布同旦儿跪科)(正末唱)。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "斗鹌鹑・他爱我那表正容端，我爱他那香娇玉软。你看他那云髻金钗，英",
  "author": "元・兰楚芳",
  "body": [
   "花翠钿，罗袜凌波底样儿浅，正少年。",
   "俺是那前世姻缘，非是今生偶然。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "李亚仙花酒曲江池・商调/尚京马",
  "author": "元・石君宝",
  "body": [
   "也则俺一时间错被鬼昏迷，是赡表子平生落得的。",
   "那有见识的哥哥每知了就里，似这等切切悲悲，从今后有金银，多攒下些买粮食。",
   "(正旦云)这虔婆则道我见元和穷身泼命，必然不睬他。",
   "他不说呵便罢，他若说呵，着他吃我几嘴好的。",
   "(卜儿云)孩儿，你看那无钱的子弟，在那里迎丧送殡哩！(正旦唱)。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "杜牧之诗酒扬州梦・正宫/端正好",
  "author": "元・乔吉",
  "body": [
   "衫袖湿酒痕香，帽檐侧花枝重，似这等宾共主和气春风，一杯未尽笙歌送，就花前唤醒游仙梦。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "随何赚风魔蒯通・金蕉叶",
  "author": "元・无名氏",
  "body": [
   "则落你好似披麻救火，蒯彻也不似那般人随风倒舵。",
   "事冗也辞身涌脱，今日个慌顿断名缰利锁。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "锦上花・富贵无骄，贫穷何辱。贫不忧愁，富莫贪图。富依公，天能鸣护。",
  "author": "元・马致远",
  "body": [
   "贫富人生，各人命福。",
   "富呵亨富来，贫呵乐贫去。",
   "就里无钱，尚良欢娱。",
   "袖有黄金，到有嗟吁。",
   "一日勾来，如何做做主。"
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "金盏儿・减容姿，瘦腰肢，绣床尘满慵针指。眉懒画，粉羞施，憔悴死。",
  "author": "元・杨果",
  "body": [
   "无尽闲愁将甚比？恰如梅子雨丝丝。"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {
  "title": "南吕・骂玉郎带感皇恩采茶歌富山元宵赏灯",
  "author": "元・张可久",
  "body": [
   "朱衣锦带黄金镫，前后羽林兵。",
   "当空皓月悬秋镜，兰麝馨。",
   "箫鼓鸣，天街净。",
   "灯界珠绳，春蔼花屏。",
   "御辇上翠逍遥，宫林传金错落，歌女□玉娉婷。",
   "赏良夜好景，听乐府新声。",
   "庆元正，□队伍，乐升平。",
   "待天明，未收灯，宝筝前殿引长生。",
   "铁瓮千年富山城，西台一点老人星。"
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "送彭秀才",
  "author": "宋・徐鉉",
  "body": [
   "賈生去國已三年，短褐閑行皖水邊。",
   "盡日野雲生舍下，有時京信到門前。",
   "無人與和投湘賦，愧子來浮訪戴船。",
   "滿袖新詩好迴去，莫隨騷客醉林泉。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "生查子·短焰剔残花",
  "author": "清・納蘭性德",
  "body": [
   "短焰剔残花，夜久边声寂",
   "倦舞却闻鸡，暗觉青绫湿",
   "天水接冥蒙，一角西南白",
   "欲渡浣花溪，远梦轻无力"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "四丞相高会丽春堂・相公爱",
  "author": "元・王实甫",
  "body": [
   "泪滴千行与万行，那一日不登楼长望。",
   "我平也波常，何曾道离故乡，那一日离的我这心儿上？。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "张君瑞庆团园(第五本)・满庭芳",
  "author": "元・王实甫",
  "body": [
   "怎不教张生爱尔，堪针工出色，女教为师。",
   "几千般用意针针是，可索寻思。",
   "长共短又没个样子，窄和宽想像著腰肢，好共歹无人试。",
   "想当初做时，用煞那小心儿。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "圣药王・就着这花满溪，柳满堤，掩映着数株红杏出疏篱。风吹的酒力微，",
  "author": "元・宋方壶",
  "body": [
   "景助的诗兴起，见滴溜溜墙外舞青旗，直吃的醉扶归。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "吕洞宾度铁拐李岳・脱布衫",
  "author": "元・岳伯川",
  "body": [
   "我和你十七八共枕闷眠，二十载儿女姻缘。",
   "一脚地停尸在眼前，(带云)妻阿！(唱)则落的酒茶浇奠。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "尉迟恭三夺槊・梁州",
  "author": "元・尚仲贤",
  "body": [
   "这些时但做梦早和敌军对垒，才合眼早不刺剌地战马相交。",
   "则听的韵悠悠的耳畔吹寒角，一回价不冬冬的催军鼓擂，响当当的助战锣敲。",
   "稀撒撒地朱帘筛日，滴溜溜的绣幕翻风，只疑是古剌剌杂彩旗摇。",
   "那的是急煎煎心痒难揉，往常则许咱遇水叠桥，除了咱逢山开道，嗨，如今央别人跨海征辽。",
   "壮怀怎消，近新来病体儿直然较，我自喑约也枉了医疗，被这秋气重金疮越发作，好教我痛苦难消。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "罗李郎大闹相国寺・双雁儿",
  "author": "元・无名氏",
  "body": [
   "白头翁先哭少年儿，想天公，也有私，教老拙遭逢着这场事。",
   "远远的不避辞，特特的来到此。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "擂鼓体・一鞭行色苦相催，皆因些子，浮名薄利。萍梗飘流无定迹，好在",
  "author": "元・朱庭玉",
  "body": [
   "阳关图画里。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "梁州・见青奴亭然独立，使苍童抱过相从。同床共枕如鸾凤。赐夫人名号，",
  "author": "元・赵显宏",
  "body": [
   "有君子家风。",
   "湘川后裔，渭水名宗。",
   "喜绸缪志节雍容，历风霜肌骨丰隆。",
   "一千般可意着人，一时间指空话空，一团儿剔透玲珑。",
   "心聪，性聪。",
   "知卿本是龙孙种，厮敬爱厮陪奉。",
   "睡彻东窗日影红，彼此西东。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "山神庙裴度还带・乔牌儿",
  "author": "元・关汉卿",
  "body": [
   "几曾见酩子里两对门！（媒人云）系是五百年前宿缘仙契。",
   "（正末唱）你道是五百年宿缘分，（媒人云）请状元拜岳父岳母，相见礼毕成亲，有圣旨在此。",
   "（正末唱）他道是奉君王圣旨为盟信，终不我为媳妇拜丈人。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "幺・不提防变却承平卦，闹渔阳一片胡笳。辞风榻，迁鸾驾，马嵬坡下，",
  "author": "元・汤舜民",
  "body": [
   "踏碎海棠花。",
   "丽华临风阁内俏人儿，天生得玉骨冰姿。",
   "承欢奉喜度芳时，多才思，举笔便题诗。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "朱砂担滴水浮沤记・滚绣球",
  "author": "元・无名氏",
  "body": [
   "你道为甚么森森的透骨寒？却元来是茫茫的云雾繁，遮断著红尘无限，刚则见衰草斑斑，兀的不是地府间、黑水湾？早来到这奈河两岸，兀的不是剑树刀山？两只眼紧把冤魂来觑，一只手轻将他鬼力扌班，何处也蹒跚。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "罗李郎大闹相国寺・梁州第七",
  "author": "元・无名氏",
  "body": [
   "把不定心乔意怯，立不定肉颤身摇。",
   "出门去没一个人知道。",
   "恰便似石沉大海，铁坠江涛。",
   "知他在何方归着？甚处流落？只为他孤身去梗泛萍漂。",
   "撇的俺三口儿梦断魂劳。",
   "(带云)汤哥儿，自从去了你呵。",
   "(唱)我是你堂上尊撇的来这般忄敝忄敝焦焦，怀内子、(带云)道俺爹爹这早晚不来家呵。",
   "(唱)也这般烦烦恼恼，哎！连你这娇滴滴脚头妻、也这般酒洒潇潇。",
   "我如今与他定约。",
   "侯兴那厮若是寻来到，(带云)你若回来呵。",
   "(唱)我合道处再不道。",
   "任凭他把铜斗儿家私使尽了，常言道口是心苗。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "锦云堂暗定连环计・胡十八",
  "author": "元・无名氏",
  "body": [
   "据着我王允的心，怎不替你个奉先气，枉了你厮帮助，厮扶持，普天下不似那个老无知。",
   "行这般所为，驴马的见识，这便是出气力、出气力落来的。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "促拍满路花",
  "author": "宋・柳永",
  "body": [
   "香靥融春雪，翠鬓亸秋烟。",
   "楚腰纤细正笄年。",
   "凤帏夜短，偏爱日高眠。",
   "起来贪颠耍，只恁残却黛眉，不整花钿。",
   "有时携手闲坐，偎倚绿窗前。",
   "温柔情态尽人怜。",
   "画堂春过，悄悄落花天。",
   "最是娇痴处，尤殢檀郎，未教拆了秋千。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "诈妮子调风月・三煞",
  "author": "元・关汉卿",
  "body": [
   "明日索一般供与他衣袂穿，一般过与他茶饭吃，到晚送得他被底成双睡。",
   "他\"做成暖帐三更梦\"，我\"拨尽寒炉一夜灰\"。",
   "有句话存心记：则愿得辜恩负德，一个个荫于封妻！。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "吕洞宾三醉岳阳楼・油葫芦",
  "author": "元・马致远",
  "body": [
   "俺只见十二栏干接上苍。",
   "(酒保云)招过客，招过客！(正末云)休叫，休叫。",
   "(酒保云)你怎生着我休叫？(正末唱)我则怕惊着玉皇，谁着你直侵北斗建糟坊。",
   "(酒保云)你看我这楼上有牌，牌上有字，上写着世间无此酒，天下有名楼。",
   "(正末唱)写道是岳阳楼形胜偏雄壮，更压着你洞庭春好酒新炊荡。",
   "(酒保云)老师父，你看这边景致。",
   "(正末唱)翠巍巍当着楚山。",
   "(酒保云)休道是楚山，连太山、华山都看见了。",
   "师父，你看这边景致。",
   "(正末唱)浪淘浪临着汉江。",
   "(酒保云)不要说汉江，连洞庭湖、鄱阳湖、青草湖都看见了。",
   "(正末云)正是鸡肥蟹壮之时。",
   "(唱)正菊花秋不醉倒陶元亮？(酒保云)师父，你来迟了，我这酒已卖尽，无了酒也。",
   "(正末云)你道是无酒呵，(唱)怎发付团脐蟹一包黄？。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "滚绣球・叹光阴疾似梭，想人生能几何，转回头百年已过，急回首两鬓斑",
  "author": "元・薛昂夫",
  "body": [
   "花阴转眼那，日光弹指过，送了些干峥嵘且贪呆货，有两句古语您自评跋。",
   "相随故友年年少，郊外新坟岁岁多，一枕南柯。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "便宜行事虎头牌・天下乐",
  "author": "元・李直夫",
  "body": [
   "只见他越寻思越着昏，敢三魂失了二魂。",
   "(带云)我试猜波。",
   "(唱)莫不是铁哥镇抚家远探亲？(六儿云)不是。",
   "(正末唱)莫不是达鲁家老太君？(六儿云)也不是。",
   "(正末唱)莫不足普察家小舍人？(六儿云)也不是。",
   "(正末唱)莫不是叔叔婶子两口儿来访问？。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "二・就中硬胜刚，外面软似绵。冰盆初破如刀剪，逢人射影停身分，睹物",
  "author": "元・曾瑞",
  "body": [
   "遗形在眼前。",
   "分明现，秋天朗朗，风露涓涓。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "冤报冤赵氏孤儿・迎仙客",
  "author": "元・纪君祥",
  "body": [
   "因甚的掩泪珠？(程婴做吁气科)(正末唱)气长吁？我恰才叉定手向前来紧趋伏。",
   "(带云)则俺见这壁厢爹爹呵，(唱)忄敞支支恶心烦，勃腾腾生忿怒。",
   "(带云)是甚么人敢欺负你来？(唱)我这里低首踌躇。",
   "(带云)既然没的人欺负你呵，(唱)那里是话不投机处。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "逞风流王焕百花亭・得胜令",
  "author": "元・无名氏",
  "body": [
   "笑孙武少神思，病白起不仁慈。",
   "赛韩信十功立，胜孔明八阵施。",
   "无半点瑕疵，展万里鲲鹏翅。",
   "真一表英姿，建千年龙虎祠。"
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "包待制智赚生金阁・仙吕/点绛唇",
  "author": "元・武汉臣",
  "body": [
   "则我这口内嗟吁，腹中忧虑。",
   "离家去，可又早一月多余，则我这白发添无数。",
   "(旦云儿)秀才，想古来也有未遇的人，这般受苦么？(正末唱)。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "拙鲁速",
  "author": "元・杨景贤",
  "body": [
   "你觑那众官每，具着公裳，百姓每，燕名香。",
   "罗列在道傍，俯伏在路上。",
   "道俗僧尼一齐来访，捱捱济济，幡旆飘扬，瑞霭祥光，都接到天花甘露浆。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "郑月莲秋夜云窗梦・倘秀才",
  "author": "元・无名氏",
  "body": [
   "我为他心忙意紧，他为我行眠立盹，一样相思两断魂。",
   "间别一二日，胜似两三春，各自病损。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "温太真玉镜台・醉中天",
  "author": "元・关汉卿",
  "body": [
   "白日短，无时晌，兼夜教，正更长，便误了翰林院编修有甚忙？我待做师为学长，拚的个十分应当，再无推让，早收拾幽静书房。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "羔裘",
  "author": "詩經",
  "body": [
   "羔裘如濡，洵直且侯。彼其之子，舍命不渝。",
   "",
   "羔裘豹饰，孔武有力。彼其之子，邦之司直。",
   "",
   "羔裘晏兮，三英粲兮。彼其之子，邦之彦兮。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "散家财天赐老生儿・小梁州",
  "author": "元・武汉臣",
  "body": [
   "他骂-声绝户的穷民怎敢放刁，则一句道的我便肉战也身摇。",
   "(做悲科，云)兀的不痛杀我也。",
   "(唱)我伤心有似热油浇，他那里忙陪笑，敢这厮笑里暗藏刀。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "楊柳枝詞四首  其二",
  "author": "宋・孫光憲",
  "body": [
   "有池有榭即濛濛，浸潤翻成長養功。",
   "恰似有人長點檢，著行排立向春風。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "桃花女破法嫁周公・煞尾",
  "author": "元・王晔",
  "body": [
   "则怕我到家来有危有难如何躲，我劝你所作依公莫太过。",
   "投至得到我根前问个定夺，讨个提掇，决个死活。",
   "哎！周公徕，你便有灵验的阴阳，敢可也近不的我。",
   "(下)。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "南吕・骂玉郎过感皇恩采茶歌为酸斋解嘲",
  "author": "元・张可久",
  "body": [
   "君王曾赐琼林宴，三斗始朝天，文章懒入编修院。",
   "红锦笺，白苎篇，黄柑传。",
   "学会神仙，参透诗禅。",
   "厌尘嚣，绝名利，近林泉。",
   "天台洞口，地肺山前。",
   "学炼丹，同货墨，共谈玄。",
   "兴飘然，酒家眠。",
   "洞花溪鸟结姻缘，被我瞒他四十年，海天秋月一般圆。",
   "杨驹儿墓园莓苔生满苍云径，人去小红亭，题情犹是酸斋赠。",
   "我把那诗韵赓，书画评，栏干凭。",
   "茶灶尘凝，墨水冰生。",
   "掩幽扃，悬瘦影，伴孤灯。",
   "琴已亡伯牙，酒不到刘伶。",
   "策短藤，乘暮景，放吟情。",
   "写新声，寄春莺。",
   "明年来此赏清明，窗掩梨花庭院静，小楼风雨共谁听？。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "苏子瞻醉写赤壁赋・寄生草",
  "author": "元・无名氏",
  "body": [
   "今日在编修院，往常住冰雪堂。",
   "诗魂高压山河壮，琴弹神鬼魂飘荡，剑挥星斗昏无象。",
   "我将这九经苦志二十年，养就这五陵豪气三千丈。",
   "(秦云)想布衣之中，苦志攻习经史，今日博得金章紫绶，千钟之禄也。",
   "(唱)。"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {
  "title": "野有死麕",
  "author": "詩經",
  "body": [
   "野有死麕，白茅包之。有女怀春，吉士诱之。",
   "",
   "林有朴樕，野有死鹿。白茅纯束，有女如玉。",
   "",
   "舒而脱脱兮，无感我帨兮，无使尨也吠。"
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "宋上皇御断金凤钗・红绣鞋",
  "author": "元・郑延玉",
  "body": [
   "虽不达周公礼乐，虽不及子夏文学，寻思来惟有看书高。",
   "放着花笺纸，端溪砚，乌龙墨，紫霜毫，穷不的卓儿出四宝。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "刮地风北・当初啜赚我的言词都是谎，害的人倒枕垂床。鸾台上尘锁无心",
  "author": "元・荆干臣",
  "body": [
   "傍，有似风狂。",
   "寂寞了绿窗朱幌，空闲了绣榻兰房。",
   "行时思坐时想甚时撇漾？你比那题桥的少一行，闪的我独自孤孀。",
   "望禹门三汲桃花浪，你为功名纸半张。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "逢尤",
  "author": "王逸",
  "body": [
   "悲兮愁，哀兮忧！",
   "天生我兮当闇时，被诼谮兮虚获尤。",
   "心烦憒兮意无聊，严载驾兮出戏游。",
   "周八极兮历九州，求轩辕兮索重华。",
   "世既卓兮远眇眇，握佩玖兮中路躇。",
   "羡咎繇兮建典谟，懿风后兮受瑞图。",
   "愍余命兮遭六极，委玉质兮於泥涂。",
   "遽傽遑兮驱林泽，步屏营兮行丘阿。",
   "车軏折兮马虺颓，惷怅立兮涕滂沱。",
   "思丁文兮圣明哲，哀平差兮迷谬愚。",
   "吕傅举兮殷周兴，忌嚭专兮郢吴虚。",
   "仰长叹兮气噎结，悒殟绝兮咶复苏。",
   "虎兕争兮於廷中，豺狼斗兮我之隅。",
   "云雾会兮日冥晦，飘风起兮扬尘埃。",
   "走鬯罔兮乍东西，欲窜伏兮其焉如？",
   "念灵闺兮隩重深，原竭节兮隔无由。",
   "望旧邦兮路逶随，忧心悄兮志勤劬。",
   "魂茕茕兮不遑寐，目眽眽兮寤终朝。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "宴瑶池・越江吟",
  "author": "宋・欧阳修",
  "body": [
   "恋眼哝心终未改。",
   "向意间长在。",
   "都缘为、颜色殊常，见馀花、尽无心爱。",
   "都为是风流㬠。",
   "至他人、强来厮壤。",
   "从今后、若得相逢，绣帏里、痛惜娇态。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "呆古朵・休言尧舜和桀纣，都不如郝孙谭马丘刘。他每是文中子门徒，亢",
  "author": "元・邓学可",
  "body": [
   "仓志友。",
   "休说为吏道的张平叔，做烟月的刘行首。",
   "若不是阐全真的王祖师，拿不着打轮的马半州。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "金菊香・看别人吹箫跨凤上瑶池，乘兴扁舟访剡溪。真乃是平地白云三万",
  "author": "元・詹时雨",
  "body": [
   "里，堪画堪题。",
   "水昌宫翻做素玻璃。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "中吕・满庭芳看岳王传",
  "author": "元・周德清",
  "body": [
   "披文握武，建中兴庙宇，载青史图书。",
   "功成却被权臣妒，正落奸谋。",
   "闪杀人望旌节中原士夫，误杀人弃丘陵南渡銮舆！钱塘路，愁风怨雨，长是洒西湖！韩世忠安危属君，立勤王志节，比翊汉功勋。",
   "临机料敌存威信，际会风云。",
   "似恁地尽忠勇匡君报本，也消得坐都堂秉笏垂绅。",
   "闲评论，中兴宰臣，万古揖清芬！误国贼秦桧官居极品，欺天误主，贱土轻民。",
   "把一场和议为公论，妒害功臣。",
   "通贼虏怀奸诳君，那些儿立朝堂仗义依仁？英雄恨，使飞云幸存，那里有南北二朝分？张俊谋渊略广，论兵用武，立国安邦。",
   "佐中兴一代贤明将，怎生来险幸如狼？蓄祸心奸私放党，附权臣构陷忠良。",
   "朝堂上，把一个精忠岳王，屈死葬钱塘！。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "大石调・青杏子惜春",
  "author": "元・吴仁卿",
  "body": [
   "幽鸟正调舌，怯春归似有伤嗟。",
   "虚檐凭得阑干暖，落花风里，游丝天外，远翠千叠。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "吕洞宾度铁拐李岳・十二月",
  "author": "元・岳伯川",
  "body": [
   "唬的我忘魂丧魄，谢吕洞宾免难除灾。",
   "阎罗王饶过我性命，你把岳孔目烧毁了尸骸。",
   "一灵儿无处百刂划，空教人雨泪盈腮。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "破斧",
  "author": "詩經",
  "body": [
   "既破我斧，又缺我斨。周公东征，四国是皇。哀我人斯，亦孔之将。",
   "",
   "既破我斧，又缺我锜。周公东征，四国是遒。哀我人斯，亦孔之嘉。",
   "",
   "既破我斧，又缺我銶。周公东征，四国是遒。哀我人斯，亦孔之休。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "罗李郎大闹相国寺・醋葫芦",
  "author": "元・无名氏",
  "body": [
   "不知是那个小厮，一声声唤这老子。",
   "和那熬煎我的须索辨个雄雌，(净云)是我叫你来。",
   "(正末唱)我这里孜孜的端详了多半时。",
   "好和我那亡过的汤哥相似，是神是鬼远些儿。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "醉中天・想当日两军闹，起全翼赴宣朝。将我击破花腔，它每都哭破眼胞。",
  "author": "元・孙叔顺",
  "body": [
   "可正是发擂催军校，不付能勾引的离城去，又将他黎民掳掠，这的是恁破黄巢头件功劳。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "南吕・四块玉北",
  "author": "元・王德信",
  "body": [
   "信物存，情词在，想着他美貌端庄，锦绣文才，好教我病恹恹愁冗冗看看害。",
   "害的我头懒抬，头懒抬眼倦开，锦繁花无心戴。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {

  "body": [

   "拨谄谀而匡邪兮，切淟涊之流俗。",
   "荡渨涹之奸咎兮，夷蠢蠢之溷浊。",

   "握申椒与杜若兮，冠浮云之峨峨。",
   "登长陵而四望兮，览芷圃之蠡蠡。",
   "游兰皋与蕙林兮，睨玉石之嵾嵯。",
   "扬精华以炫燿兮，芳郁渥而纯美。",
   "结桂树之旖旎兮，纫荃蕙与辛夷。",
   "芳若兹而不御兮，捐林薄而菀死。",
   "驱子侨之奔走兮，申徒狄之赴渊。",
   "若由夷之纯美兮，介子推之隐山。",
   "晋申生之离殃兮，荆和氏之泣血。",
   "吴申胥之抉眼兮，王子比干之横废。",
   "欲卑身而下体兮，心隐恻而不置。",
   "方圜殊而不合兮，钩绳用而异态。",
   "欲俟时于须臾兮，日阴曀其将暮。",
   "时迟迟其日进兮，年忽忽而日度。",
   "妄周容而入世兮，内距闭而不开。",
   "俟时风之清激兮，愈氛雾其如塺。",
   "进雄鸠之耿耿兮，谗介介而蔽之。",
   "默顺风以偃仰兮，尚由由而进之。",
   "心懭悢以冤结兮，情舛错以曼忧。",
   "搴薜荔于山野兮，采撚支于中洲。",
   "望高丘而叹涕兮，悲吸吸而长怀。",
   "孰契契而委栋兮，日晻晻而下颓。",
   "叹曰：",
   "江湘油油长流汩兮，挑揄扬汰荡迅疾兮。",
   "忧心展转愁怫郁兮，冤结未舒长隐忿兮，",
   "丁时逢殃可奈何兮，劳心悁悁涕滂沱兮。"

  "body": [
   "飞下天宫，将帝宣钦奉，因他宿缘重。",
   "但得相逢，是一枕蝴蝶梦。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "胜葫芦・正值着浅碧的这粼粼露远洲，赏红叶一枝秋，我则见三径黄花景",
  "author": "元・无名氏",
  "body": [
   "物幽。",
   "正值着丰年稔岁，太平箫鼓，酒醒时节再扶头。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "吕蒙正风雪破窑记・金字经",
  "author": "元・王实甫",
  "body": [
   "绣球儿今日个打着一个穷秀才，(二净唱)气的区区泪满腮，泪满腮。",
   "(大净唱)也是他缘分该，(二净唱)休相怪。",
   "(大净唱)咱拽着尾巴归去来。",
   "(同下)。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "辅成王周公摄政・二煞",
  "author": "元・郑光祖",
  "body": [
   "从今后划地拖带着一身疾病，从今后划地使作的心碎了，从今后划地学舜之徒孳孳为善从头鸡儿叫，从今后划地为宗庙呵春秋祭；祀周三祖，从今后划地忧天下呵日夜思量计万条。",
   "臣不得已，非心乐。",
   "划地似临深渊般兢兢战战，履薄冰般怯怯乔乔。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "天仙令・于飞愿，端的几时酬？会语应难，修书问候。铺玉版写银钩，寄",
  "author": "元・朱庭玉",
  "body": [
   "与娇羞。",
   "真真的的美眷爱，不尚延由。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "送賀知章歸四明",
  "author": "唐・明皇帝",
  "body": [
   "遺榮期入道，辭老竟抽簪。",
   "豈不惜賢達，其如高尚心。",
   "寰中得祕要，方外散幽襟。",
   "獨有青門餞，羣僚悵別深。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "南吕・阅全经闺情",
  "author": "元・乔吉",
  "body": [
   "玉减梅花瘦，翠颦妆镜羞，雨念云思何日休？休，休登江上楼。",
   "红弯袖，泪痕都是愁。",
   "砑金红鸾纸，染香丹凤词，情系人心狄藉丝。",
   "思，掷梭双泪时。",
   "回文字，织成肠断诗。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "幺・客况凄凄又一春，十载区区已四旬。犹自在红尘，愁眉镇锁，白发又",
  "author": "元・杨果",
  "body": [
   "添新。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "风雨",
  "author": "詩經",
  "body": [
   "风雨凄凄，鸡鸣喈喈，既见君子。云胡不夷？",
   "",
   "风雨潇潇，鸡鸣胶胶。既见君子，云胡不瘳？",
   "",
   "风雨如晦，鸡鸣不已。既见君子，云胡不喜？"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "二・俺争将紫府游，斗把玉帝朝，辂车凤辇知多少。三更月底銮声远，万",
  "author": "元・王仲元",
  "body": [
   "里风头鹤背高，每日价神仙闹。",
   "屯合月窟，塞满天桥。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "苏子瞻风雪贬黄州・二煞",
  "author": "元・费唐臣",
  "body": [
   "佳音不托云间犬，老计惟凭阳羡田。",
   "对橘绿橙黄，山高月小，听南枝惊鹊，衰柳鸣蝉。",
   "不愁远害，不陷危机，不纳高轩。",
   "那里人离乡贱甚日是归年！。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "晋陶母剪发待宾・雁儿落",
  "author": "元・秦简夫",
  "body": [
   "你道我养儿的有气分，赤紧的养女的先随顺。",
   "陪奁房成断送，则今日成秦晋。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "宋太祖龙虎风云会・七弟兄",
  "author": "元・罗贯中",
  "body": [
   "文官每这壁，武将每那壁，斟玉液进金杯。",
   "则这白额虎原与龙相配，紫金龙自有虎相随。",
   "这的是庆清朝龙虎风云会。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "狄青复夺衣袄车・尾声",
  "author": "元・无名氏",
  "body": [
   "这红抹额似火霞飘，金面具威风赳。",
   "大杆刀轻轮在手，平定了乾坤四百州。",
   "施展你那武艺滑熟．统戈矛。",
   "有一日建节封侯，恁时节方显男儿得志秋。",
   "则我这气冲着牛斗，胸怀锦绣，我则待播清风万古把杯留。",
   "(下)。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "李太白贬夜郎・收江南",
  "author": "元・王伯成",
  "body": [
   "可甚玉簪珠履客三千，比长安市上酒家眠。",
   "兀的不气喘，月明孤枕梦难全。"
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "陶使君挽歌二首  其一",
  "author": "宋・徐鉉",
  "body": [
   "太守今何在，行春去不歸。",
   "筵空收管吹，郊迥儼驂騑。",
   "營外星纔落，園中露已晞。",
   "傷心梁上燕，猶解向人飛。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "宋太祖龙虎风云会・收尾",
  "author": "元・罗贯中",
  "body": [
   "朕专待正衣冠，尊相貌，就凌烟图画功臣像，卿莫负勒金石，铭钟鼎，向青史标题姓字香。",
   "能用兵，善为将，有心机，有胆量。",
   "仰看天文算早象，俯察山川辨形状。",
   "作战先将九地量，决战须将五间防。",
   "昼战多将旗帜张，夜战频将火鼓扬。",
   "步战屯云护军帐，水战随风使帆桨。",
   "奇正相生兵最强，仁智兼行勇怎当！专听将军定四方，坐拟元戎取乱亡。",
   "飞奏边功进表章，齐和升平回帝乡。",
   "比及列土分茅拜卿相，光将这各部下军卒重重的赏！(众并下)。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "逞风流王焕百花亭・迎仙客",
  "author": "元・无名氏",
  "body": [
   "你两个元同舍，本儒流，那白捉鬼比小卿不姓苏比玉仙不姓周。",
   "双通叔一般双，柳耆卿同是柳。",
   "柳殿试实止望明月玩江楼，双解元干闪在金山后。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "关云长千里独行・双调/新水令",
  "author": "元・无名氏",
  "body": [
   "你保护的俺一家儿妯娌得安康，则他弟和兄这其间别来无恙。",
   "叔叔你是那檠天白玉柱，架海的紫金梁。",
   "义勇忠良，俺今日团圆日不承望。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "河南府张鼎勘头巾・仙吕/赏花时",
  "author": "元・孙仲章",
  "body": [
   "落日西园花正浓，扑面东风酒力涌。",
   "全不省上青骢，只记得金钟漫捧，直劝我吃的到喉咙。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "秦修然竹坞听琴・沽美酒",
  "author": "元・石子章",
  "body": [
   "这一领新道袍，似千里赠鹅毛。",
   "路远风尘你动劳，争知我衣冠改了也，不是做夫人便妆幺。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "賦得花庭霧",
  "author": "唐・太宗皇帝",
  "body": [
   "蘭氣已熏宮，新橤半粧叢。",
   "色含輕重霧，香引去來風。",
   "拂樹濃舒碧，縈花薄蔽紅。",
   "還當雜行雨，髣髴隱遙空。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "诈妮子调风月・上小楼",
  "author": "元・关汉卿",
  "body": [
   "我敢摔碎这盒子，玳瑁纳子，教石头砸碎。",
   "（带云）这手帕。",
   "（唱）剪了做靴檐，染了做鞋面，持了做铺持。",
   "一万分好待你，好觑你！如今刀子根底，我敢割得来粉零麻碎！。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "晋陶母剪发待宾・滚绣球",
  "author": "元・秦简夫",
  "body": [
   "你道是一点墨半张纸，不中吃不中使，(云)俺典了信字，管待秀才。",
   "(唱)又则道俺咬文嚼字。",
   "(韩夫人云)量这个信字，打甚么不紧？(旦唱)都是那十数画儿有这信字。",
   "为臣的作个重臣，为子的作个诤子，为吏的情取个素身行止，借人钱财主每休想道推辞。",
   "(云)姐姐，咱这妇道人家，有这个信字呵，(唱)则被这亲男儿敬重做贤达妇，(云)男子汉有这个信字呵，(唱)交朋友皆呼信有之，你可休看觑因而！(韩夫人云)婆婆，我有心看上你那秀才，肯与我做个女婿，我陪奁房断送，我女孩儿与他为妻。",
   "你意下如何？(旦云)我这里卖头发来？说亲来？下次使不的个媒人说不的！(韩夫人云)我许这亲事早哩。",
   "(旦唱)。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "钟离春智勇定齐・耍孩儿",
  "author": "元・郑光祖",
  "body": [
   "这玲珑玉带为凭据，立于朝偏能济楚。",
   "纲常礼乐定规模，把人伦身体拘束。",
   "(晏婴云)将玉带权为定礼，两下各不敢失信。",
   "(正旦唱)今日个立信与织纺勤劳女，堪匹配你个衣冠大丈夫，得之者贵显家豪富。",
   "他声闻乡里，光耀门闾。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "晋文公火烧介子推・尾",
  "author": "元・狄君厚",
  "body": [
   "跳出那兴废利名场，做一个用舍行藏客。",
   "孔子道：危行言逊免害，不得中行而与之，必也狂狷进退乎哉！(净旦云了)(正末唱)见如今您晋朝中祸已成胎，少不得惹起场干戈横祸灾。",
   "(云了)(正末唱)我想这于尺月台，恁时节撇在九霄云外。",
   "(净云了)(正末唱)我道来，去了这晋朝臣，您可索提备着楚兵来。",
   "(下)。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "铁拐李度金童玉女・喜人心",
  "author": "元・贾仲明",
  "body": [
   "看松云掩霭，闻桂风潇洒。",
   "竹影藤花月色，紫府金坛放毫彩。",
   "醉舞狂歌，长笑高吟，疏散情怀。",
   "他壶内天无坏，咱静里神氏泰。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "梁州・他为我画阁中倦拈针指，我因他在绿窗前懒看诗书。这些时不由我",
  "author": "元・徐琰",
  "body": [
   "心忧虑。",
   "这些时琴闲了雁足，歌歇骊珠。",
   "则我这身心恍惚，鬼病揶揄。",
   "望夕阳对景嗟吁，倚危楼朝夜踌蹰。",
   "我、我、我，觑不的小池中一来一住交颈鸳鸯，听不的疏林外一递一声啼红杜宇，看不的画檐间一上一下斗巧蜘蛛。",
   "景物，态度。",
   "蛛蛛丝一丝丝又被风吹去，杜宇声一声声唤不住，鸳鸯对一对对分飞不趁逐，感起我一弄儿嗟吁。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "萨真人夜断碧桃花・梅花酒",
  "author": "元・无名氏",
  "body": [
   "非是我假虚脾爱使乖，也只怕粉脸香腮，引动你蜜意幽怀，倒做了黄祸之灾。",
   "因此上把鬼名儿潜换改，真姓也暗藏埋，况阳寿尚未该，婚姻簿又明载，天对付俏身材？云和雨好安排。",
   "连理树稳情栽，合欢花纵心摘。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "宋太祖龙虎风云会・赚煞",
  "author": "元・罗贯中",
  "body": [
   "向边塞建功勋，赴京阙朝銮驾，直叩君王御塌。",
   "长朝殿太平筵宴罢，出宫庭拥大纛高牙。",
   "天街上摆头答，醉醺醺把金镫斜踏。",
   "稳坐逍遥玉骢马，马头前对挑着绛纱。",
   "纱笼内齐烧着银蜡，那其间任香风吹落帽檐花。",
   "(同下)。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "題殷舍人宅木芙蓉",
  "author": "宋・徐鉉",
  "body": [
   "憐君庭下木芙蓉，嫋嫋纖枝淡淡紅。",
   "曉吐芳心零宿露，晚摇嬌影媚清風。",
   "似含情態愁秋雨，暗減馨香借菊叢。",
   "默飲數杯應未稱，不知歌管與誰同。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "王月英元夜留鞋记・上小楼",
  "author": "元・无名氏",
  "body": [
   "我金莲步狭，常只在罗裙底下。",
   "为贪着一轮皓月，万盏花灯，九街车马。",
   "更漏深，田地滑，游人稠杂，鳌山畔把他来撇下。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "四丞相高会丽春堂・沽美酒",
  "author": "元・王实甫",
  "body": [
   "舞蹁跹翠袖长，击鼍鼓奏笙簧。",
   "高髻云鬟宫样妆，金钗列数行。",
   "欢声动一座丽春堂。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "汉高皇濯足气英布・寄生草",
  "author": "元・尚仲贤",
  "body": [
   "你将那舌尖儿扛，咱则将剑刃儿磨，咱心头早发起无明火。",
   "这剑头磨的吹毛过，你舌头便是亡身祸。",
   "(随何云)贤弟，你的亡身祸倒在目前，我随何特来救你哩。",
   "(正末做喝科云)噤声。",
   "(唱)你道是特来救咱目前忧，敢正也不知自己在壕中坐。",
   "(云)令人松了绑者。",
   "(卒做放随何科)(正末云)且请过来相见。",
   "(做拜科云)仁兄可也受惊了，彼此各为其主，幸勿介怀。",
   "(随何云)这也何足为惊，只可惜，贤弟，你的祸就到了也。",
   "(正末云)咱的祸从何来？(随何云)这等你敢说三声没祸么？(正末云)不要说三声，便百二十声咱也说。",
   "咱有甚么祸在那里？(随何云)贤弟，你是个武将，只晓的相持厮杀的事，却不知揣摩的事。",
   "你道是项王亲信，你比范增何如？(正末云)那范增是项王的谋臣，称为亚父，咱怎么比的他？(随何云)那范增为着何事，就打发他归去，死于路上那？(正末云)他则为陈平反间之计，以太牢飨范增使者，以恶草具待项王使者，项王疑他归汉，因此放还居巢，路上死的。",
   "(随何云)贤弟既知范增见疑之故，则你今日之祸亦可推矣，(正末云)你道项王疑咱是些甚么来？(随何云)当日我汉王袭破彭城时，项王从齐国慌忙赶回，进则被汉王据其城池，退则被彭越抄其辎重，兵疲粮竭，自知不能取胜，所以特徵贤弟。",
   "一来凭仗虎威，二来要借这一枝生力人马，壮他军气，真如饥儿之待哺，何异旱苗之望雨。",
   "乃贤弟称病不赴，欲项王无疑，其可得乎？若项王与汉战而不利，势方倚仗贤弟，再整干戈，倒也无事。",
   "令汉王大败亏输，项王意得志满，更加以龙且之谮，日在耳傍，必且阴遣使臣，觇你罪衅，此不但范增之祸已也，贤弟请自思之。",
   "(卒子报云)喏！报元帅得知，楚国使命到。",
   "(正末做惊科)(唱)。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "油葫芦・鸾镜光函百炼铜，端详了这玉容。似嫦娥出现广寒宫，衬桃腮巧",
  "author": "元・于伯渊",
  "body": [
   "注铅华莹，启朱唇呵暖兰膏冻。",
   "着粉呵则太白，施朱呵则太红。",
   "鬓蝉低娇怯香云重，端的是占断绮罗丛。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "四丞相高会丽春堂・醉春风",
  "author": "元・王实甫",
  "body": [
   "堪写在画图中，又添入诗句里。",
   "则我这紫藤兜轿趁着浓阴，直等凉些儿个起、起。",
   "受用足万壑清风，半阶凉影，一襟爽气。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "包龙图智赚合同文字・油葫芦",
  "author": "元・无名氏",
  "body": [
   "量小生有甚人情有甚钱，苦痛也波天。",
   "则为那家私生受了二十年，要领旧席铺停柩无一片，要领好衣服妆裹无一件。",
   "(张秉彝云)君子，你不须烦恼。",
   "我这里都已备下了也。",
   "(正末唱)谢员外厮济惠，谢员外肯见怜。",
   "(带云)小生若不得员外呵。",
   "(唱)则俺这人离财散央亲眷，兀良谁赍发与我一根椽。",
   "(做悲科)(唱)。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "朝玉阶・朝天子",
  "author": "宋・杜安世",
  "body": [
   "春色欺人拂眼清。",
   "柳条绿丝软，雪花轻。",
   "黄金才钺掩银屏。",
   "阴沈深院静，语娇莺。",
   "美人春困宝钗横。",
   "惜花芳态，泪盈盈。",
   "风流何处最多情。",
   "千金一笑，须信倾城。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "倘秀才・举伊尹有汤王倚托，微管仲无桓公不可，相公子纠偏如何不九合。",
  "author": "元・曾瑞",
  "body": [
   "失时也亡了家国，得意后霸了山河，也是君臣每会合。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "郊廟歌辭 封泰山樂章 豫和 三",
  "author": "唐・張說",
  "body": [
   "相百辟，貢八荒。",
   "九歌敍，萬舞翔。",
   "肅振振，鏗皇皇。",
   "帝欣欣，福穰穰。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "李太白贬夜郎・折桂令",
  "author": "元・王伯成",
  "body": [
   "一时间趁篷箔顺水推船，不比西出阳关，北侍居延。",
   "几时得为爱青山，住东风懒着吟鞭。",
   "流落似守泪罗独醒屈原，飘零似浮泛槎没兴张骞。",
   "纳了一纸氏黄宣，撇下满门良贱。",
   "对十五婵娟，怎不凄然。",
   "他每向水底天心，两下里团圆。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "郊廟歌辭 武后大享昊天樂章 十一",
  "author": "唐・不詳",
  "body": [
   "禮終肆類，樂闋九成。",
   "仰惟明德，敢薦非馨。",
   "顧慙菲奠，久駐雲軿。",
   "瞻荷靈澤，悚戀兼盈。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "秦修然竹坞听琴・乔牌儿",
  "author": "元・石子章",
  "body": [
   "几曾见出家的有下稍？趁如今我青春尚年少。",
   "(老道姑云)我教你弹琴，正要清心养性，倒教你引老公不成？(正旦唱)倒是我卓文君一曲求凰操，早把那汉相如引动了。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "郊廟歌辭 五郊樂章 白帝商音 肅和",
  "author": "唐・魏徵",
  "body": [
   "金行在節，素靈居正。",
   "氣肅霜嚴，林彫草勁。",
   "豺祭隼擊，潦收川鏡。",
   "九穀已登，萬箱流詠。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "金水桥陈琳抱妆盒・仙吕/赏花时",
  "author": "元・无名氏",
  "body": [
   "大王也，你须是一脉流传亲叔侄，怎不念万里江山托付谁？(带云)大王，你若不收呵，(唱)我则索抱太子撞街基。",
   "(楚王云)陈琳，你快住者。",
   "我是玉叶金枝，怕那刘皇后怎的？恰才我斗你耍哩。",
   "你抱太子过来，与我看波。",
   "(做接太子在手科，云)你看他生的龙颜凤目，他日必为太平天子。",
   "谢天地，我宋家有福，得此一男一女，两个忠臣，救到我府中。",
   "校尉，快去分付宫人，只拣有乳食的，着他好生抚养太子。",
   "等他长大成人，接我宋家后代，休教辜负了这两个忠臣的一场好意。",
   "(官校抱太子下)(正末叩谢科)(唱)这一场先忧后喜，(带云)陈琳愿领这妆盒去，依旧采了果品来上寿也。",
   "(唱)也不枉了我这抱妆盒冒死出宫闱。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "包待制智赚灰栏记・折桂令",
  "author": "元・李行甫",
  "body": [
   "气的个亲男儿唱叫扬疾，(包待制云)既是他气杀丈夫，怎生又告官来？(正旦唱)没揣的告府经官，吃了些六问三推。",
   "(包待制云)你夫主死了，那强夺孩儿，又怎么说？(正旦唱)一壁厢夫主身亡，更待教生各札子母分离。",
   "(包制待云)这孩儿说是那妇人养的哩。",
   "(正旦唱)信着他歹心肠千般妒嫉，(包待制云)那街坊、老娘，都说是他的。",
   "(正旦唱)他买下了众街坊，听事儿依随。",
   "(包待制云)难道官吏每更不问个虚实？(正旦唱)官吏每再不问一个谁是谁非，谁信谁欺。",
   "(包待制云)你既是这等，也不该便招认了。",
   "(正旦唱)妾身本不待点纸招承，也则是吃不过这棍棒临逼。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "中吕・朝天子书所见",
  "author": "元・关汉卿",
  "body": [
   "鬓鸦，脸霞，屈杀将陪嫁。",
   "规模全是大人家，不在红娘下。",
   "笑眼偷瞧，文谈回话，真如解语花。",
   "若咱得他，倒了葡萄架。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "梁州・你为我堆宝髻羞盘凤翅，淡朱唇懒注胭脂。东君有意偷窥视。翠鸾",
  "author": "元・亢文苑",
  "body": [
   "寻梦，彩扇题诗；花笺写恨，锦字传词。",
   "包藏着无限相思，思量煞可意人儿。",
   "几时看靠纱窗偷转秋波，几时见整云髻轻舒玉指，几时看倚东风笑捻花枝。",
   "新婚，燕尔。",
   "到如今抛闪得人独自，你那点至诚心有谁似？休把那山海盟言不勾思，相会何时。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "感皇恩北・呀，那些个投以木桃，报以琼瑶？我便似日影内捕金乌、月轮",
  "author": "元・郑光祖",
  "body": [
   "中擒玉兔、云端里觅黄鹤。",
   "心肠枉费，伎俩徒劳。",
   "也是我恩情尽、时运乖、分缘薄。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "沉醉东风・讲礼教虚心儿拜辞，说艰难满口儿嗟咨。蛾眉浅黛颦，花靥啼",
  "author": "元・汤舜民",
  "body": [
   "红渍，向樽前留下些相思。",
   "我本是当年杜牧之，休认做苏州剌史。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "李亚仙花酒曲江池・三煞",
  "author": "元・石君宝",
  "body": [
   "卖弄甚锦绣帏翡翠屏，则他这瓦罐儿早打破在你姻脂井。",
   "他便能飞也飞不出千重网，便会跳也跳不过万丈坑，郑元和亲身证。",
   "(卜儿云)你这小贱人，还不赶他出去？要讨打哩！(正旦唱)你就将他赶离后院，少不的我也哭倒长城。"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {

  "author": "元・吕止庵",
  "body": [

   "甚娘作怪，绣针儿签着敲才。",
   "海棠轻染胭脂，绿杨乱撒青丝，对对莺儿燕子。",
   "伤心独自，绣针儿停待多时。",
   "玉纤屈损春葱，远山压损眉峰，早是闲愁万种。",

   "冷清清独守兰房，闷恹恹倚定纱窗，呆答孩搭伏定绣床。",
   "一会家神魂飘荡，绣针儿签这梅香。",

 },
 {
  "title": "如梦令·木叶纷纷归路",
  "author": "清・納蘭性德",
  "body": [
   "木叶纷纷归路",
   "残月晓风何处",
   "消息半浮沈，今夜相思几许",
   "秋雨，秋雨",
   "一半西风吹去"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {

  "author": "元・费唐臣",
  "body": [
   "陛下既从头问，微臣怎敢隐？这数年间一言难尽。",

 },
 {
  "title": "吕洞宾三度城南柳・乔牌儿",
  "author": "元・谷子敬",
  "body": [

   "(孤云)这厮白昼杀人，合该偿命，又不合妄指平人，就着这先生亲手杀他。",

 },
 {
  "title": "沙门岛张生煮海・那吒令",
  "author": "元・李好古",
  "body": [
   "听疏剌剌晚风，风声落万松；明朗朗月容，容光照半空；响潺潺水冲，冲流绝涧中。",

 },
 {
  "title": "寄生草",
  "author": "元・杨景贤",
  "body": [
   "直裰上胭脂污，袈裟上腻粉香。",
   "似魔腾伽把阿难摄在淫山上，若鬼子母将如来围定在灵山上，巫枝祗把张僧拿住在龟山上。",

 {
  "title": "白馬峰",
  "author": "宋・釋延壽",
  "body": [
   "湖外層峰瀉危瀑，天際陰陰長寒木。",
   "南北行人望莫窮，秋雲一片橫幽谷。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "尉迟恭单鞭夺槊・脱布衫",
  "author": "元・关汉卿",
  "body": [
   "他厮知重不敢抬头，我再相逢争忍凝眸？君子人不念旧恶，小人儿自来悔后。",
   "（云）左右，将酒来。",
   "我与敬德递一杯送行。",
   "（把酒科，云）将军满饮一杯。",
   "（唱）。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "輓辭 一",
  "author": "唐・後主煜",
  "body": [
   "珠碎眼前珍，花凋世外春。",
   "未銷心裏恨，又失掌中身。",
   "玉笥猶殘藥，香匳已染塵。",
   "前哀將後感，無淚可霑巾。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "双调・水仙子道情",
  "author": "元・李致远",
  "body": [
   "瓮头春色是长生，枕上华胥当解酲。",
   "常将造物合心镜，后庭闲留月明，得工夫休写《黄庭》。",
