<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日日一詩 — 與文字呼吸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FDF6EC;
      --warm-beige: #F5E6D3;
      --latte: #D4B896;
      --brown: #8B7355;
      --dark-brown: #5C4A32;
      --soft-orange: #E8A87C;
      --muted-rose: #D4A0A0;
      --sage: #A8B5A2;
      --text: #4A3F35;
      --text-light: #8B7D6B;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; height: 100%; }
    body {
      font-family: 'Noto Serif TC', serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100%;
      overflow-x: hidden;
    }

    /* ===== NAV ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(253,246,236,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212,184,150,0.15);
    }
    .logo { font-size: 1.2rem; font-weight: 600; color: var(--dark-brown); letter-spacing: 0.15em; }
    .logo span { font-weight: 300; color: var(--text-light); font-size: 0.8rem; margin-left: 0.4rem; }
    .nav-links { display: flex; gap: 1.8rem; list-style: none; }
    .nav-links a {
      text-decoration: none; color: var(--text-light); font-size: 0.85rem;
      font-family: 'Noto Sans TC', sans-serif; font-weight: 400;
      transition: color 0.3s; letter-spacing: 0.08em;
    }
    .nav-links a:hover { color: var(--dark-brown); }

    /* ===== HERO — POEM FRONT & CENTER ===== */
    #hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      text-align: center;
      padding: 5rem 2rem 3rem;
      background: linear-gradient(170deg, var(--cream) 0%, var(--warm-beige) 50%, #EDD9C0 100%);
      position: relative; overflow: hidden;
    }
    #hero::before {
      content: ''; position: absolute; top: -40%; right: -15%;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(232,168,124,0.12) 0%, transparent 70%);
      border-radius: 50%; animation: float 8s ease-in-out infinite;
    }
    #hero::after {
      content: ''; position: absolute; bottom: -25%; left: -8%;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(168,181,162,0.1) 0%, transparent 70%);
      border-radius: 50%; animation: float 10s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-25px) scale(1.04); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-inner { position: relative; z-index: 1; max-width: 620px; }
    .hero-date {
      font-family: 'Noto Sans TC', sans-serif; font-weight: 300;
      font-size: 0.8rem; color: var(--latte); letter-spacing: 0.25em;
      margin-bottom: 1.8rem; opacity: 0; animation: fadeUp 0.8s 0.2s forwards;
    }
    .poem-tag {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.7rem;
      font-weight: 400; letter-spacing: 0.35em; color: var(--soft-orange);
      margin-bottom: 1.2rem; opacity: 0; animation: fadeUp 0.8s 0.35s forwards;
    }
    .poem-title {
      font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 500;
      color: var(--dark-brown); margin-bottom: 0.3rem;
      opacity: 0; animation: fadeUp 0.8s 0.5s forwards;
    }
    .poem-author {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.85rem;
      color: var(--text-light); margin-bottom: 2rem; font-weight: 300;
      opacity: 0; animation: fadeUp 0.8s 0.6s forwards;
    }
    .poem-body {
      font-size: 1.15rem; line-height: 2.3; color: var(--text);
      font-weight: 300; letter-spacing: 0.06em;
      opacity: 0; animation: fadeUp 0.8s 0.7s forwards;
      text-align: center;
      display: flex; flex-direction: column; align-items: center;
    }
    .poem-body p { margin-bottom: 0.3rem; }
    .poem-divider {
      width: 36px; height: 1px; background: var(--latte);
      margin: 2rem auto; opacity: 0; animation: fadeUp 0.8s 0.85s forwards;
    }
    .poem-note {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.85rem;
      color: var(--text-light); font-weight: 300; line-height: 1.8;
      max-width: 420px; margin: 0 auto;
      opacity: 0; animation: fadeUp 0.8s 0.95s forwards;
    }
    .poem-source {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.65rem;
      color: var(--latte); margin-top: 0.8rem; font-weight: 300;
      letter-spacing: 0.1em;
      opacity: 0; animation: fadeUp 0.8s 1s forwards;
    }
    .poem-nav {
      display: flex; gap: 0.8rem; margin-top: 2rem; justify-content: center;
      opacity: 0; animation: fadeUp 0.8s 1.05s forwards;
    }
    .poem-nav button {
      background: none; border: 1px solid var(--latte); color: var(--brown);
      padding: 0.5rem 1.3rem; font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.78rem; letter-spacing: 0.1em; cursor: pointer;
      border-radius: 2rem; transition: all 0.3s;
    }
    .poem-nav button:hover {
      background: var(--dark-brown); border-color: var(--dark-brown); color: var(--cream);
    }
    .poem-nav button.active {
      background: var(--soft-orange); border-color: var(--soft-orange); color: #fff;
    }

    .scroll-hint {
      position: absolute; bottom: 1.5rem;
      opacity: 0; animation: fadeUp 0.8s 1.2s forwards;
    }
    .scroll-hint span {
      display: block; width: 1px; height: 32px;
      background: var(--latte); margin: 0 auto;
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%,100% { transform: scaleY(1); opacity: 0.4; }
      50% { transform: scaleY(1.4); opacity: 0.8; }
    }

    /* ===== BREATHING ===== */
    #breathe {
      min-height: 100vh; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: linear-gradient(170deg, #F0E4D4 0%, var(--warm-beige) 50%, #E8DDD0 100%);
      padding: 3rem 2rem; user-select: none;
    }
    .breathe-wrapper { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
    .breathe-label {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.7rem;
      font-weight: 400; letter-spacing: 0.35em; color: var(--soft-orange);
    }
    .breathe-circle-wrapper {
      position: relative; width: 240px; height: 240px;
      display: flex; align-items: center; justify-content: center;
    }
    .breathe-circle-bg {
      position: absolute; width: 240px; height: 240px;
      border-radius: 50%; border: 1px solid rgba(212,184,150,0.25);
    }
    .breathe-circle {
      width: 110px; height: 110px; border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, var(--soft-orange), var(--muted-rose));
      opacity: 0.65; transition: all 0.1s linear;
      box-shadow: 0 0 50px rgba(232,168,124,0.15);
    }
    .breathe-circle.inhale { animation: inhale 4s ease-in-out forwards; }
    .breathe-circle.hold-in { animation: holdIn 4s ease-in-out forwards; }
    .breathe-circle.exhale { animation: exhale 4s ease-in-out forwards; }
    .breathe-circle.hold-out { animation: holdOut 4s ease-in-out forwards; }
    @keyframes inhale { from { transform: scale(1); opacity: 0.55; } to { transform: scale(1.8); opacity: 0.85; } }
    @keyframes holdIn { from, to { transform: scale(1.8); opacity: 0.85; } 50% { transform: scale(1.82); opacity: 0.88; } }
    @keyframes exhale { from { transform: scale(1.8); opacity: 0.85; } to { transform: scale(1); opacity: 0.55; } }
    @keyframes holdOut { from, to { transform: scale(1); opacity: 0.55; } 50% { transform: scale(1.02); opacity: 0.58; } }
    .breathe-text { font-size: 1.15rem; font-weight: 300; color: var(--dark-brown); letter-spacing: 0.2em; min-height: 1.8rem; }
    .breathe-sub { font-family: 'Noto Sans TC', sans-serif; font-size: 0.78rem; color: var(--text-light); font-weight: 300; }
    .breathe-controls { display: flex; gap: 0.8rem; margin-top: 0.5rem; }
    .btn-breathe {
      background: var(--dark-brown); color: var(--cream); border: none;
      padding: 0.6rem 1.8rem; font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem; letter-spacing: 0.12em; cursor: pointer;
      border-radius: 2rem; transition: all 0.3s;
    }
    .btn-breathe:hover { background: var(--brown); transform: translateY(-1px); }
    .btn-breathe.secondary { background: transparent; border: 1px solid var(--latte); color: var(--brown); }
    .breathe-counter {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.72rem;
      color: var(--text-light); font-weight: 300; letter-spacing: 0.1em;
    }

    /* ===== SUBSCRIBE ===== */
    #subscribe {
      min-height: 100vh; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: var(--dark-brown); color: var(--cream); padding: 3rem 2rem;
    }
    .subscribe-content { text-align: center; max-width: 460px; }
    .subscribe-tag {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.7rem;
      font-weight: 400; letter-spacing: 0.35em; color: var(--soft-orange); margin-bottom: 1.2rem;
    }
    .subscribe-title { font-size: 1.7rem; font-weight: 300; margin-bottom: 0.8rem; line-height: 1.6; }
    .subscribe-desc {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.88rem;
      font-weight: 300; color: rgba(253,246,236,0.65); line-height: 1.8; margin-bottom: 2rem;
    }
    .line-btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      background: #06C755; color: #fff; text-decoration: none;
      padding: 0.8rem 2.2rem; border-radius: 2rem;
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.9rem;
      font-weight: 500; letter-spacing: 0.05em; transition: all 0.3s;
      box-shadow: 0 4px 18px rgba(6,199,85,0.25);
    }
    .line-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(6,199,85,0.35); }
    .line-btn svg { width: 20px; height: 20px; }
    .subscribe-note {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.7rem;
      color: rgba(253,246,236,0.35); margin-top: 1.2rem; font-weight: 300;
    }

    /* ===== FOOTER ===== */
    footer {
      padding: 1.5rem; text-align: center; background: var(--dark-brown);
      border-top: 1px solid rgba(253,246,236,0.06);
    }
    footer p {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.7rem;
      color: rgba(253,246,236,0.3); font-weight: 300; letter-spacing: 0.1em;
    }

    /* ===== FLOATING BTNS ===== */
    .share-fab {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 90;
      display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
    }
    .share-fab button, .share-fab a {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.3s; box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    }
    .share-line { background: #06C755; color: #fff; }
    .share-line:hover { transform: scale(1.1); }
    .share-copy { background: rgba(255,255,255,0.85); color: var(--brown); backdrop-filter: blur(10px); }
    .share-copy:hover { transform: scale(1.1); }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 4.5rem; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--dark-brown); color: var(--cream);
      padding: 0.6rem 1.3rem; border-radius: 2rem;
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.78rem;
      opacity: 0; transition: all 0.3s; z-index: 200; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      nav { padding: 0.8rem 1rem; }
      .nav-links { gap: 1rem; }
      .nav-links a { font-size: 0.78rem; }
      .logo span { display: none; }
      #hero { padding: 4.5rem 1.2rem 2.5rem; }
      .poem-body { font-size: 1.05rem; line-height: 2; }
      .breathe-circle-wrapper { width: 200px; height: 200px; }
      .breathe-circle-bg { width: 200px; height: 200px; }
      .breathe-circle { width: 90px; height: 90px; }
    }

    /* ===== FADE SECTIONS ===== */
    .fade-section { opacity: 0; transform: translateY(25px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-section.visible { opacity: 1; transform: translateY(0); }

    /* ===== POEM TRANSITION ===== */
    .poem-fade-out { animation: poemOut 0.3s ease forwards; }
    .poem-fade-in { animation: poemIn 0.4s ease forwards; }
    @keyframes poemOut { to { opacity: 0; transform: translateY(-10px); } }
    @keyframes poemIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== ADD POEM MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(74,63,53,0.5); backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--cream); border-radius: 1rem; width: 100%; max-width: 500px;
      max-height: 85vh; overflow-y: auto; padding: 2rem;
      box-shadow: 0 20px 60px rgba(92,74,50,0.2);
    }
    .modal h2 {
      font-size: 1.2rem; font-weight: 500; color: var(--dark-brown);
      margin-bottom: 1.5rem; text-align: center;
    }
    .modal label {
      font-family: 'Noto Sans TC', sans-serif; font-size: 0.8rem;
      color: var(--text-light); font-weight: 400; letter-spacing: 0.08em;
      display: block; margin-bottom: 0.4rem; margin-top: 1rem;
    }
    .modal input, .modal textarea {
      width: 100%; padding: 0.7rem 1rem; border: 1px solid var(--latte);
      border-radius: 0.5rem; font-family: 'Noto Serif TC', serif;
      font-size: 0.9rem; color: var(--text); background: #fff;
      outline: none; transition: border 0.3s;
    }
    .modal input:focus, .modal textarea:focus { border-color: var(--soft-orange); }
    .modal textarea { min-height: 120px; resize: vertical; line-height: 1.8; }
    .modal-actions {
      display: flex; gap: 0.8rem; margin-top: 1.5rem; justify-content: center;
    }
    .modal-actions button {
      padding: 0.6rem 1.8rem; border-radius: 2rem; font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.82rem; letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s;
    }
    .btn-save {
      background: var(--dark-brown); color: var(--cream); border: none;
    }
    .btn-save:hover { background: var(--brown); }
    .btn-cancel {
      background: transparent; border: 1px solid var(--latte); color: var(--brown);
    }
    .btn-cancel:hover { background: var(--warm-beige); }
    .custom-badge {
      display: inline-block; background: var(--soft-orange); color: #fff;
      font-size: 0.6rem; padding: 0.15rem 0.5rem; border-radius: 1rem;
      margin-left: 0.4rem; vertical-align: middle; font-family: 'Noto Sans TC', sans-serif;
    }
  </style>
</head>

  <script type="application/json" id="poem-data">
[{"title": "錯誤", "author": "鄭愁予", "body": ["我打江南走過", "那等在季節裡的容顏如蓮花的開落", "", "東風不來，三月的柳絮不飛", "你的心如小小的寂寞的城", "恰若青石的街道向晚", "跫音不響，三月的春帷不揭", "你的心是小小的窗扉緊掩", "", "我達達的馬蹄是美麗的錯誤", "我不是歸人，是個過客……"], "note": "最美的遇見，往往是最溫柔的錯過。"}, {"title": "雨巷", "author": "戴望舒", "body": ["撐著油紙傘，獨自", "彷徨在悠長、悠長", "又寂寥的雨巷", "我希望逢著", "一個丁香一樣的", "結著愁怨的姑娘", "", "她是有", "丁香一樣的顏色", "丁香一樣的芬芳", "丁香一樣的憂愁", "在雨中哀怨", "哀怨又彷徨"], "note": "雨天的時候，允許自己靜靜感受那份朦朧的美。"}, {"title": "面朝大海，春暖花開", "author": "海子", "body": ["從明天起，做一個幸福的人", "餵馬、劈柴，周遊世界", "從明天起，關心糧食和蔬菜", "我有一所房子，面朝大海，春暖花開", "", "從明天起，和每一個親人通信", "告訴他們我的幸福", "那幸福的閃電告訴我的", "我將告訴每一個人", "", "給每一條河每一座山取一個溫暖的名字", "陌生人，我也為你祝福", "願你有一個燦爛的前程", "願你有情人終成眷屬", "願你在塵世獲得幸福", "我只願面朝大海，春暖花開"], "note": "幸福有時候很簡單，就是此刻的陽光。"}, {"title": "你是人間的四月天", "author": "林徽因", "body": ["我說你是人間的四月天", "笑響點亮了四面風", "輕靈在春的光豔中交舞著變", "", "你是四月早天裡的雲煙", "黃昏吹著風的軟", "星子在無意中閃", "細雨點灑在花前", "", "你是一樹一樹的花開", "是燕在梁間呢喃", "——你是愛，是暖，是希望", "你是人間的四月天"], "note": "你本身就是一首詩，溫暖而明亮。"}, {"title": "相信未來", "author": "食指", "body": ["當蜘蛛網無情地查封了我的爐臺", "當灰燼的餘煙嘆息著貧困的悲哀", "我依然固執地鋪平失望的灰燼", "用美麗的雪花寫下：相信未來", "", "當我的紫葡萄化為深秋的露水", "當我的鮮花依偎在別人的情懷", "我依然固執地用凝霜的枯藤", "在淒涼的大地上寫下：相信未來"], "note": "無論經歷了什麼，明天值得期待。"}, {"title": "遠和近", "author": "顧城", "body": ["你", "一會看我", "一會看雲", "", "我覺得", "你看我時很遠", "你看雲時很近"], "note": "最近的距離，是一起安靜地看同一片雲。"}, {"title": "一代人", "author": "顧城", "body": ["黑夜給了我黑色的眼睛", "我卻用它尋找光明"], "note": "最短的詩，最長的力量。"}, {"title": "從前慢", "author": "木心", "body": ["記得早先少年時", "大家誠誠懇懇", "說一句 是一句", "", "清早上火車站", "長街黑暗無行人", "賣豆漿的小店冒著熱氣", "", "從前的日色變得慢", "車，馬，郵件都慢", "一生只夠愛一個人", "", "從前的鎖也好看", "鑰匙精美有樣子", "你鎖了 人家就懂了"], "note": "給自己一點慢下來的時光。"}, {"title": "致橡樹", "author": "舒婷", "body": ["我如果愛你——", "絕不像攀援的凌霄花", "借你的高枝炫耀自己", "", "我必須是你近旁的一株木棉", "作為樹的形象和你站在一起", "根，緊握在地下", "葉，相觸在雲裡", "", "每一陣風過", "我們都互相致意", "但沒有人", "聽懂我們的言語"], "note": "最好的關係，是並肩而立，各自燦爛。"}, {"title": "如果", "author": "席慕蓉", "body": ["如果我能夠，我要寫下我的悔恨和悲哀", "為每一段不能重來的時光", "", "如果，如果有來生", "要做一棵樹", "站成永恆", "沒有悲歡的姿勢", "一半在塵土裡安詳", "一半在風裡飛揚", "一半灑落陰涼", "一半沐浴陽光"], "note": "接受自己的每一面。"}, {"title": "斷章", "author": "卞之琳", "body": ["你站在橋上看風景", "看風景的人在樓上看你", "", "明月裝飾了你的窗子", "你裝飾了別人的夢"], "note": "也許此刻，你正是某人心裡最美的風景。"}, {"title": "再別康橋", "author": "徐志摩", "body": ["輕輕的我走了", "正如我輕輕的來", "我輕輕的招手", "作別西天的雲彩", "", "那河畔的金柳", "是夕陽中的新娘", "波光裡的豔影", "在我的心頭蕩漾", "", "悄悄的我走了", "正如我悄悄的來", "我揮一揮衣袖", "不帶走一片雲彩"], "note": "每一次轉身，都是為了更好的相逢。"}, {"title": "鄉愁", "author": "余光中", "body": ["小時候", "鄉愁是一枚小小的郵票", "我在這頭", "母親在那頭", "", "長大後", "鄉愁是一張窄窄的船票", "我在這頭", "新娘在那頭", "", "後來啊", "鄉愁是一方矮矮的墳墓", "我在外頭", "母親在裡頭", "", "而現在", "鄉愁是一灣淺淺的海峽", "我在這頭", "大陸在那頭"], "note": "心裡總有一個回不去的地方，那就是家。"}, {"title": "等你，在雨中", "author": "余光中", "body": ["等你，在雨中，在造虹的雨中", "蟬聲沉落，蛙聲升起", "一池的紅蓮如紅焰，在雨中", "", "你來不來都一樣，竟感覺", "每朵蓮都像你", "尤其隔著黃昏，隔著這樣的細雨"], "note": "等待一個人時，整個世界都變成了他的模樣。"}, {"title": "我愛這土地", "author": "艾青", "body": ["假如我是一隻鳥", "我也應該用嘶啞的喉嚨歌唱", "這被暴風雨所打擊著的土地", "這永遠洶湧著我們的悲憤的河流", "這無止息地吹刮著的激怒的風", "和那來自林間的無比溫柔的黎明", "", "——然後我死了", "連羽毛也腐爛在土地裡面", "", "為什麼我的眼裡常含淚水", "因為我對這土地愛得深沉"], "note": "因為愛得深沉，每一個日常都值得珍惜。"}, {"title": "偶然", "author": "徐志摩", "body": ["我是天空裡的一片雲", "偶爾投影在你的波心", "你不必訝異", "更無須歡喜", "在轉瞬間消滅了蹤影", "", "你我相逢在黑夜的海上", "你有你的，我有我的，方向", "你記得也好", "最好你忘掉", "在這交會時互放的光亮"], "note": "最美的相遇，不必挽留。"}, {"title": "回答", "author": "北島", "body": ["卑鄙是卑鄙者的通行證", "高尚是高尚者的墓誌銘", "看吧，在那鍍金的天空中", "飄滿了死者彎曲的倒影", "", "我來到這個世界上", "只帶著紙、繩索和身影", "為了在審判之前", "宣讀那些被判決的聲音", "", "告訴你吧，世界", "我——不——相——信"], "note": "最勇敢的事是說出心裡真正的聲音。"}, {"title": "島", "author": "夏宇", "body": ["修辭學告訴我們", "那不是孤獨", "是一座島", "", "浪來了", "把所有的字都沖走", "只留下", "嶼"], "note": "安靜的時候，聽見的反而更清楚。"}, {"title": "九月", "author": "海子", "body": ["目擊眾神死亡的草原上野花一片", "遠在遠方的風比遠方更遠", "我的琴聲嗚咽 淚水全無", "我把這遠方的遠歸還草原"], "note": "遠方不在腳下，在心裡。"}, {"title": "活在珍貴的人間", "author": "海子", "body": ["活在這珍貴的人間", "太陽強烈，水波溫柔", "一層層白雲覆蓋著", "我踩在青草上", "感到自己是徹底地乾淨", "", "合掌低眉", "珍惜人間的晴天"], "note": "此刻的陽光和微風，就是最珍貴的禮物。"}, {"title": "祖國（或以夢為馬）", "author": "海子", "body": ["我要做遠方的忠誠的兒子", "和物質的短暫情人", "和所有以夢為馬的詩人一樣", "我不得不和烈士和小丑走在同一道路上", "", "萬人都要將火熄滅", "我一人獨將此火高高舉起"], "note": "心中有火，就不怕漫長的夜路。"}, {"title": "神女峯", "author": "舒婷", "body": ["在向你揮舞的各色花帕中", "是誰的手突然收回", "緊緊捂住了自己的眼睛", "", "當人們四散而去，誰", "還站在船尾", "衣裙漫飛，如翻湧不息的雲", "", "江濤", "高一聲", "低一聲", "", "與其在懸崖上展覽千年", "不如在愛人肩頭痛哭一晚"], "note": "比起永恆的姿態，真實的眼淚更動人。"}, {"title": "雙桅船", "author": "舒婷", "body": ["霧打濕了我的雙翼", "可風卻不容我再遲疑", "岸呵，心愛的岸", "昨天剛剛和你告別", "今天你又在這裡", "", "明天我們將在", "另一個緯度相遇"], "note": "每一次離岸，都是為了更遠的相遇。"}, {"title": "有些人", "author": "瘂弦", "body": ["有些人使用方言", "有些人使用成語", "有些人用默不作聲"], "note": "沉默，有時候也是一種語言。"}, {"title": "如歌的行板", "author": "瘂弦", "body": ["溫柔之必要", "肯定之必要", "一點點酒和木樨花之必要", "正正經經看一名女子走過之必要", "", "……", "", "而既被目為一條河總得繼續流下去的", "世界老這樣總這樣：", "觀音在遠遠的山上", "罌粟在罌粟的田裡"], "note": "溫柔是必要的，就像呼吸。"}, {"title": "鏡子", "author": "張錯", "body": ["把悲傷映成微笑", "把微笑映成悲傷", "鏡子說：", "我只是如實地反映"], "note": "學會看見真實的自己。"}, {"title": "煙之外", "author": "洛夫", "body": ["在濤聲中喚你的名字而你的名字", "已在千帆之外", "", "潮來潮去", "左邊的鞋印才下午", "右邊的鞋印已黃昏了"], "note": "時間最擅長的事，是不動聲色地走。"}, {"title": "因為風的緣故", "author": "洛夫", "body": ["昨日我沿著河岸", "漫步到蘆葦彎腰喝水的地方", "順便請煙囪", "在天空為我寫一封長長的信", "", "潦是潦草了些", "而我的心意", "則明亮亦如你窗前的一盞燈"], "note": "有些心意，就像風一樣，看不見卻感受得到。"}, {"title": "小站", "author": "鄭愁予", "body": ["是誰傳下這詩人的行業", "黃昏裡掛起一盞燈", "", "啊，來了", "有命運垂在她的眸子", "如燈 如星"], "note": "每一個等待的黃昏，都有一盞燈為你亮著。"}, {"title": "賦別", "author": "鄭愁予", "body": ["這次我離開你，是風，是雨，是夜晚", "你笑了笑，我擺一擺手", "一條寂寞的路便展向兩頭了", "", "念此際你已回到濱河的家居", "想你在梳理長髮或是整理濕了的外衣", "而我風雨的歸程還正長"], "note": "離別之後，各自的路上，依然有思念。"}, {"title": "山中", "author": "席慕蓉", "body": ["一定有些什麼", "是我所不能瞭解的", "不然 草木怎麼都會", "循序生長", "而候鳥都能飛回故鄉", "", "一定有些什麼 是我所無能為力的", "不然 日與夜怎麼交替得", "那樣快", "所有的時刻都已錯過", "憂傷蝕我心懷"], "note": "有些事無法掌控，放下也是一種力量。"}, {"title": "一棵開花的樹", "author": "席慕蓉", "body": ["如何讓你遇見我", "在我最美麗的時刻", "為這", "我已在佛前求了五百年", "求佛讓我們結一段塵緣", "", "佛於是把我化作一棵樹", "長在你必經的路旁", "陽光下慎重地開滿了花", "朵朵都是我前世的盼望", "", "當你走近 請你細聽", "那顫抖的葉是我等待的熱情", "而當你終於無視地走過", "在你身後落了一地的", "朋友啊 那不是花瓣", "是我凋零的心"], "note": "每一朵花開，都是一份用心的等待。"}, {"title": "蓮的心事", "author": "席慕蓉", "body": ["我是一朵盛開的夏荷", "多希望", "你能看見現在的我", "", "風霜還不曾來侵蝕", "秋雨還未滴落", "青澀的季節又已離我遠去", "我已亭亭 不憂 亦不懼", "", "現在 正是", "我最美麗的時刻"], "note": "此刻，就是你最美麗的時刻。"}, {"title": "抉擇", "author": "席慕蓉", "body": ["假如我來世上一遭", "只為與你相聚一次", "只為了億萬光年裡的那一剎那", "一剎那裡所有的甜蜜與悲淒", "", "那麼 就讓一切該發生的", "都在瞬間出現", "讓我俯首感謝所有星球的相助", "讓我與你相遇", "與你別離"], "note": "感謝所有的相遇，即使短暫。"}, {"title": "出塞曲", "author": "席慕蓉", "body": ["請為我唱一首出塞曲", "用那遺忘了的古老言語", "請用美麗的顫音輕輕呼喚", "我心中的大好河山"], "note": "心中有遼闊，到哪裡都是天涯。"}, {"title": "初戀", "author": "席慕蓉", "body": ["還記得年少時的夢嗎", "像朵永遠不凋零的花", "陪我經過那風吹雨打", "看世事無常", "看滄桑變化"], "note": "年少的夢不會老，它只是在心裡安靜地開著。"}, {"title": "旅程", "author": "席慕蓉", "body": ["我總覺得", "每一條走過來的路", "都有不得不這樣跋涉的理由", "每一條要走下去的路", "都有不得不這樣選擇的方向"], "note": "每一步都有它的意義。"}, {"title": "覺", "author": "楊牧", "body": ["彷彿有人在遠方呼喚", "什麼驚覺了我的睡眠", "窗外是繁星和燈火", "階前落著昨夜的雨"], "note": "被什麼驚醒的瞬間，世界格外清晰。"}, {"title": "有人問我公理和正義的問題", "author": "楊牧", "body": ["有人問我公理和正義的問題", "寫在乾枯的葦草上", "——我在暮色中向他乞求最後的", "一點點寬容"], "note": "在複雜的世界裡，保持溫柔已經是一種正義。"}, {"title": "下午茶", "author": "夏宇", "body": ["把你的影子加點鹽", "醃起來", "風乾", "", "老的時候", "下酒"], "note": "把回憶好好收藏。"}, {"title": "甜蜜的復仇", "author": "夏宇", "body": ["把你的影子加點鹽", "醃起來", "風乾", "", "老的時候", "下酒"], "note": "思念可以很甜，也可以很烈。"}, {"title": "背影", "author": "夏宇", "body": ["你往我的方向走來", "相距一百步的時候", "我開始偷看你", "相距五十步的時候", "我開始微笑", "而在我們交錯而過的那一剎那", "我轉身", "看你的背影"], "note": "有些人，只能看著他走遠。"}, {"title": "回家", "author": "顧城", "body": ["我的心", "是一座城", "一座最小的城", "", "沒有雜亂的市場", "沒有眾多的居民", "冷冷清清", "只有一片落葉", "只有一簇花叢", "還偷偷掩藏著", "兒時的深情"], "note": "心裡那座小小的城，永遠住著純真的自己。"}, {"title": "小巷", "author": "顧城", "body": ["小巷", "又彎又長", "沒有門", "沒有窗", "你拿把舊鑰匙", "敲著厚厚的牆"], "note": "找不到入口的時候，也許該換一條路。"}, {"title": "我是一個任性的孩子", "author": "顧城", "body": ["我想在大地上畫滿窗子", "讓所有習慣黑暗的眼睛", "都習慣光明", "", "我是一個任性的孩子", "我想塗去一切不幸", "我想在大地上", "用我稚嫩的手指", "和蠟筆", "畫下永遠不會流淚的眼睛"], "note": "願每一雙眼睛都習慣光明。"}, {"title": "墓牀", "author": "顧城", "body": ["我知道永逝降臨，並不悲傷", "松林中安放著我的願望", "下邊有海，遠看像水池", "一點點跟我的是下午的陽光"], "note": "如果能帶走一樣東西，就帶走下午的陽光。"}, {"title": "感覺", "author": "顧城", "body": ["天是灰色的", "路是灰色的", "樓是灰色的", "雨是灰色的", "", "在一片死灰之中", "走過兩個孩子", "一個鮮紅", "一個淡綠"], "note": "灰色的日子裡，你就是那抹色彩。"}, {"title": "有的人", "author": "臧克家", "body": ["有的人活著", "他已經死了", "有的人死了", "他還活著", "", "有的人", "騎在人民頭上：「呵，我多偉大！」", "有的人", "俯下身子給人民當牛馬"], "note": "活著的方式，比活著本身更重要。"}, {"title": "當你老了", "author": "葉芝（余光中譯）", "body": ["當你老了，頭白了，睡意昏沉", "爐火旁打盹，請取下這部詩歌", "慢慢讀，回想你過去眼神的柔和", "回想它們昔日濃重的陰影", "", "多少人愛你青春歡暢的時辰", "愛慕你的美麗，假意或真心", "只有一個人愛你那朝聖者的靈魂", "愛你衰老了的臉上痛苦的皺紋"], "note": "真正的愛，是愛你靈魂的樣子。"}, {"title": "我喜歡你是寂靜的", "author": "聶魯達（陳黎譯）", "body": ["我喜歡你是寂靜的，彷彿你消失了一樣", "你從遠處聆聽我，我的聲音卻無法觸及你", "好像你的雙眼已經飛離去", "如同一個吻，封緘了你的嘴"], "note": "最深的連結，有時候在沉默裡。"}, {"title": "自由", "author": "保羅·艾呂雅（戴望舒譯）", "body": ["在我的練習簿上", "在我的課桌和樹木上", "在沙上 在雪上", "我寫下你的名字", "", "在每一頁讀過的書上", "在每一頁白紙上", "石上 血上 紙上 灰上", "我寫下你的名字", "", "藉著一個字的力量", "我重新開始我的生活", "我生來是為了認識你", "為了呼喊你的名字", "", "自由"], "note": "自由不是遠方，是你心裡喊得出的名字。"}, {"title": "靜夜思", "author": "唐·李白", "body": ["牀前明月光", "疑是地上霜", "舉頭望明月", "低頭思故鄉"], "note": "千年以前的月光，和今晚的一樣溫柔。"}, {"title": "春曉", "author": "唐·孟浩然", "body": ["春眠不覺曉", "處處聞啼鳥", "夜來風雨聲", "花落知多少"], "note": "允許自己在春天多睡一會兒。"}, {"title": "登鸛雀樓", "author": "唐·王之渙", "body": ["白日依山盡", "黃河入海流", "欲窮千里目", "更上一層樓"], "note": "想看得更遠，就往上走一步。"}, {"title": "楓橋夜泊", "author": "唐·張繼", "body": ["月落烏啼霜滿天", "江楓漁火對愁眠", "姑蘇城外寒山寺", "夜半鐘聲到客船"], "note": "睡不著的夜晚，世界反而安靜得剛好。"}, {"title": "春望", "author": "唐·杜甫", "body": ["國破山河在，城春草木深", "感時花濺淚，恨別鳥驚心", "烽火連三月，家書抵萬金", "白頭搔更短，渾欲不勝簪"], "note": "珍惜身邊每一封溫暖的訊息。"}, {"title": "登高", "author": "唐·杜甫", "body": ["風急天高猿嘯哀，渚清沙白鳥飛回", "無邊落木蕭蕭下，不盡長江滾滾來", "萬裏悲秋常作客，百年多病獨登臺", "艱難苦恨繁霜鬢，潦倒新停濁酒杯"], "note": "站在高處，深呼吸，然後繼續。"}, {"title": "相思", "author": "唐·王維", "body": ["紅豆生南國", "春來發幾枝", "願君多采擷", "此物最相思"], "note": "想念，也是一種溫柔。"}, {"title": "竹裏館", "author": "唐·王維", "body": ["獨坐幽篁裡", "彈琴復長嘯", "深林人不知", "明月來相照"], "note": "獨處不是寂寞，月光懂你。"}, {"title": "送元二使安西", "author": "唐·王維", "body": ["渭城朝雨浥輕塵", "客舍青青柳色新", "勸君更盡一杯酒", "西出陽關無故人"], "note": "每一次道別，都值得好好說聲珍重。"}, {"title": "鹿柴", "author": "唐·王維", "body": ["空山不見人", "但聞人語響", "返景入深林", "復照青苔上"], "note": "安靜到能聽見光的腳步。"}, {"title": "山居秋暝", "author": "唐·王維", "body": ["空山新雨後，天氣晚來秋", "明月松間照，清泉石上流", "竹喧歸浣女，蓮動下漁舟", "隨意春芳歇，王孫自可留"], "note": "雨後的山，就像洗過的心。"}, {"title": "九月九日憶山東兄弟", "author": "唐·王維", "body": ["獨在異鄉為異客", "每逢佳節倍思親", "遙知兄弟登高處", "遍插茱萸少一人"], "note": "節日最想的，是遠方的家人。"}, {"title": "使至塞上", "author": "唐·王維", "body": ["單車欲問邊，屬國過居延", "徵蓬出漢塞，歸雁入胡天", "大漠孤煙直，長河落日圓", "蕭關逢候騎，都護在燕然"], "note": "孤獨的路上，風景反而更遼闊。"}, {"title": "望廬山瀑布", "author": "唐·李白", "body": ["日照香爐生紫煙", "遙看瀑布掛前川", "飛流直下三千尺", "疑是銀河落九天"], "note": "壯闊的風景，能讓心變得開闊。"}, {"title": "早發白帝城", "author": "唐·李白", "body": ["朝辭白帝彩雲間", "千里江陵一日還", "兩岸猿聲啼不住", "輕舟已過萬重山"], "note": "輕舟過萬山，什麼都擋不住前進的心。"}, {"title": "將進酒", "author": "唐·李白", "body": ["君不見黃河之水天上來，奔流到海不復回", "君不見高堂明鏡悲白髮，朝如青絲暮成雪", "人生得意須盡歡，莫使金樽空對月", "天生我材必有用，千金散盡還復來"], "note": "天生我材必有用，好好地欣賞自己。"}, {"title": "月下獨酌", "author": "唐·李白", "body": ["花間一壺酒，獨酌無相親", "舉杯邀明月，對影成三人", "月既不解飲，影徒隨我身", "暫伴月將影，行樂須及春"], "note": "就算只有自己，也值得好好慶祝。"}, {"title": "行路難", "author": "唐·李白", "body": ["金樽清酒鬥十千，玉盤珍羞直萬錢", "停杯投箸不能食，拔劍四顧心茫然", "", "欲渡黃河冰塞川，將登太行雪滿山", "", "行路難，行路難，多歧路，今安在", "長風破浪會有時，直掛雲帆濟滄海"], "note": "路再難，總有破浪的時候。"}, {"title": "送友人", "author": "唐·李白", "body": ["青山橫北郭，白水繞東城", "此地一為別，孤蓬萬裏徵", "浮雲遊子意，落日故人情", "揮手自茲去，蕭蕭班馬鳴"], "note": "朋友，無論多遠，心裡都有你。"}, {"title": "夜泊牛渚懷古", "author": "唐·李白", "body": ["牛渚西江夜，青天無片雲", "登舟望秋月，空憶謝將軍", "餘亦能高詠，斯人不可聞", "明朝掛帆席，楓葉落紛紛"], "note": "想念一個懂你的人。"}, {"title": "黃鶴樓送孟浩然之廣陵", "author": "唐·李白", "body": ["故人西辭黃鶴樓", "煙花三月下揚州", "孤帆遠影碧空盡", "唯見長江天際流"], "note": "看著朋友遠去，心隨江水流。"}, {"title": "獨坐敬亭山", "author": "唐·李白", "body": ["眾鳥高飛盡", "孤雲獨去閒", "相看兩不厭", "只有敬亭山"], "note": "找到那個看不厭的存在。"}, {"title": "春夜喜雨", "author": "唐·杜甫", "body": ["好雨知時節，當春乃發生", "隨風潛入夜，潤物細無聲", "野徑雲俱黑，江船火獨明", "曉看紅濕處，花重錦官城"], "note": "最好的愛，像春雨一樣潤物無聲。"}, {"title": "絕句", "author": "唐·杜甫", "body": ["兩個黃鸝鳴翠柳", "一行白鷺上青天", "窗含西嶺千秋雪", "門泊東吳萬裏船"], "note": "推開窗，世界就在眼前。"}, {"title": "月夜", "author": "唐·杜甫", "body": ["今夜鄜州月，閨中只獨看", "遙憐小兒女，未解憶長安", "香霧雲鬟濕，清輝玉臂寒", "何時倚虛幌，雙照淚痕乾"], "note": "想家的心，月亮都看得見。"}, {"title": "望嶽", "author": "唐·杜甫", "body": ["岱宗夫如何？齊魯青未了", "造化鍾神秀，陰陽割昏曉", "蕩胸生層雲，決眥入歸鳥", "會當凌絕頂，一覽眾山小"], "note": "站到頂峯，一切都變得渺小。"}, {"title": "旅夜書懷", "author": "唐·杜甫", "body": ["細草微風岸，危檣獨夜舟", "星垂平野闊，月湧大江流", "名豈文章著，官應老病休", "飄飄何所似，天地一沙鷗"], "note": "天地間，做一隻自由的鷗鳥也好。"}, {"title": "過故人莊", "author": "唐·孟浩然", "body": ["故人具雞黍，邀我至田家", "綠樹村邊合，青山郭外斜", "開軒面場圃，把酒話桑麻", "待到重陽日，還來就菊花"], "note": "老朋友家的飯菜，是最溫暖的味道。"}, {"title": "宿建德江", "author": "唐·孟浩然", "body": ["移舟泊煙渚", "日暮客愁新", "野曠天低樹", "江清月近人"], "note": "孤獨的時候，月亮離你最近。"}, {"title": "涼州詞", "author": "唐·王之渙", "body": ["黃河遠上白雲間", "一片孤城萬仞山", "羌笛何須怨楊柳", "春風不度玉門關"], "note": "有些地方春風到不了，但思念可以。"}, {"title": "涼州詞", "author": "唐·王翰", "body": ["葡萄美酒夜光杯", "欲飲琵琶馬上催", "醉臥沙場君莫笑", "古來徵戰幾人回"], "note": "此刻能喝一杯茶，已是幸福。"}, {"title": "出塞", "author": "唐·王昌齡", "body": ["秦時明月漢時關", "萬裏長徵人未還", "但使龍城飛將在", "不教胡馬度陰山"], "note": "守護重要的人，是最古老的浪漫。"}, {"title": "芙蓉樓送辛漸", "author": "唐·王昌齡", "body": ["寒雨連江夜入吳", "平明送客楚山孤", "洛陽親友如相問", "一片冰心在玉壺"], "note": "無論外在如何，保持心的清澈。"}, {"title": "閨怨", "author": "唐·王昌齡", "body": ["閨中少婦不知愁", "春日凝妝上翠樓", "忽見陌頭楊柳色", "悔教夫婿覓封侯"], "note": "有時候，陪伴比成就更重要。"}, {"title": "回鄉偶書", "author": "唐·賀知章", "body": ["少小離家老大回", "鄉音無改鬢毛衰", "兒童相見不相識", "笑問客從何處來"], "note": "離開太久，家鄉認不出你，但你還記得它。"}, {"title": "詠柳", "author": "唐·賀知章", "body": ["碧玉妝成一樹高", "萬條垂下綠絲絛", "不知細葉誰裁出", "二月春風似剪刀"], "note": "春天的手藝，比任何人都精巧。"}, {"title": "滁州西澗", "author": "唐·韋應物", "body": ["獨憐幽草澗邊生", "上有黃鸝深樹鳴", "春潮帶雨晚來急", "野渡無人舟自橫"], "note": "無人的渡口，船也可以悠閒。"}, {"title": "遊子吟", "author": "唐·孟郊", "body": ["慈母手中線", "遊子身上衣", "臨行密密縫", "意恐遲遲歸", "誰言寸草心", "報得三春暉"], "note": "媽媽的愛，是穿在身上的溫暖。"}, {"title": "題都城南莊", "author": "唐·崔護", "body": ["去年今日此門中", "人面桃花相映紅", "人面不知何處去", "桃花依舊笑春風"], "note": "花還在，人已遠。珍惜每一次相見。"}, {"title": "黃鶴樓", "author": "唐·崔顥", "body": ["昔人已乘黃鶴去，此地空餘黃鶴樓", "黃鶴一去不復返，白雲千載空悠悠", "晴川歷歷漢陽樹，芳草萋萋鸚鵡洲", "日暮鄉關何處是？煙波江上使人愁"], "note": "站在高樓上，最想看見的是回家的路。"}, {"title": "登幽州臺歌", "author": "唐·陳子昂", "body": ["前不見古人", "後不見來者", "念天地之悠悠", "獨愴然而涕下"], "note": "天地之間，感受自己的渺小與偉大。"}, {"title": "望月懷遠", "author": "唐·張九齡", "body": ["海上生明月，天涯共此時", "情人怨遙夜，竟夕起相思", "滅燭憐光滿，披衣覺露滋", "不堪盈手贈，還寢夢佳期"], "note": "同一輪月亮下，有人也在想你。"}, {"title": "終南望餘雪", "author": "唐·祖詠", "body": ["終南陰嶺秀", "積雪浮雲端", "林表明霽色", "城中增暮寒"], "note": "遠處的雪山，讓城裡多了一份靜。"}, {"title": "烏衣巷", "author": "唐·劉禹錫", "body": ["朱雀橋邊野草花", "烏衣巷口夕陽斜", "舊時王謝堂前燕", "飛入尋常百姓家"], "note": "繁華會過去，平淡纔是真。"}, {"title": "竹枝詞", "author": "唐·劉禹錫", "body": ["楊柳青青江水平", "聞郎江上唱歌聲", "東邊日出西邊雨", "道是無晴卻有晴"], "note": "是晴是雨，心裡自有答案。"}, {"title": "酬樂天揚州初逢席上見贈", "author": "唐·劉禹錫", "body": ["巴山楚水淒涼地，二十三年棄置身", "懷舊空吟聞笛賦，到鄉翻似爛柯人", "沉舟側畔千帆過，病樹前頭萬木春", "今日聽君歌一曲，暫憑杯酒長精神"], "note": "沉舟側畔千帆過，一切都會過去的。"}, {"title": "賦得古原草送別", "author": "唐·白居易", "body": ["離離原上草，一歲一枯榮", "野火燒不盡，春風吹又生", "遠芳侵古道，晴翠接荒城", "又送王孫去，萋萋滿別情"], "note": "再大的困難，春天一來就重新開始。"}, {"title": "錢塘湖春行", "author": "唐·白居易", "body": ["孤山寺北賈亭西，水面初平雲腳低", "幾處早鶯爭暖樹，誰家新燕啄春泥", "亂花漸欲迷人眼，淺草才能沒馬蹄", "最愛湖東行不足，綠楊陰裏白沙堤"], "note": "春天來了，就出去走走吧。"}, {"title": "暮江吟", "author": "唐·白居易", "body": ["一道殘陽鋪水中", "半江瑟瑟半江紅", "可憐九月初三夜", "露似真珠月似弓"], "note": "日落時的江面，美得像一幅畫。"}, {"title": "問劉十九", "author": "唐·白居易", "body": ["綠蟻新醅酒", "紅泥小火爐", "晚來天欲雪", "能飲一杯無"], "note": "天冷了，找個人一起喝杯熱的。"}, {"title": "長恨歌（節選）", "author": "唐·白居易", "body": ["在天願作比翼鳥", "在地願為連理枝", "天長地久有時盡", "此恨綿綿無絕期"], "note": "深情到極致，就成了永恆。"}, {"title": "琵琶行（節選）", "author": "唐·白居易", "body": ["千呼萬喚始出來，猶抱琵琶半遮面", "轉軸撥弦三兩聲，未成曲調先有情", "", "同是天涯淪落人，相逢何必曾相識"], "note": "懂你的人，不需要太多解釋。"}, {"title": "無題", "author": "唐·李商隱", "body": ["相見時難別亦難，東風無力百花殘", "春蠶到死絲方盡，蠟炬成灰淚始乾", "曉鏡但愁雲鬢改，夜吟應覺月光寒", "蓬山此去無多路，青鳥殷勤為探看"], "note": "思念到極致，春蠶和蠟燭都懂。"}, {"title": "夜雨寄北", "author": "唐·李商隱", "body": ["君問歸期未有期", "巴山夜雨漲秋池", "何當共剪西窗燭", "卻話巴山夜雨時"], "note": "最浪漫的事，是把思念留到重逢時說。"}, {"title": "錦瑟", "author": "唐·李商隱", "body": ["錦瑟無端五十弦，一弦一柱思華年", "莊生曉夢迷蝴蝶，望帝春心託杜鵑", "滄海月明珠有淚，藍田日暖玉生煙", "此情可待成追憶，只是當時已惘然"], "note": "最美的感覺，往往在回憶裡才懂。"}, {"title": "嫦娥", "author": "唐·李商隱", "body": ["雲母屏風燭影深", "長河漸落曉星沉", "嫦娥應悔偷靈藥", "碧海青天夜夜心"], "note": "得到了自由，卻失去了陪伴。"}, {"title": "贈別", "author": "唐·杜牧", "body": ["多情卻似總無情", "唯覺樽前笑不成", "蠟燭有心還惜別", "替人垂淚到天明"], "note": "連蠟燭都為離別流淚。"}, {"title": "泊秦淮", "author": "唐·杜牧", "body": ["煙籠寒水月籠沙", "夜泊秦淮近酒家", "商女不知亡國恨", "隔江猶唱後庭花"], "note": "歷史的歌聲，穿越千年。"}, {"title": "清明", "author": "唐·杜牧", "body": ["清明時節雨紛紛", "路上行人慾斷魂", "借問酒家何處有", "牧童遙指杏花村"], "note": "雨天迷路的時候，總有人為你指路。"}, {"title": "山行", "author": "唐·杜牧", "body": ["遠上寒山石徑斜", "白雲生處有人家", "停車坐愛楓林晚", "霜葉紅於二月花"], "note": "秋天的紅葉，比春花更熱烈。"}, {"title": "秋夕", "author": "唐·杜牧", "body": ["銀燭秋光冷畫屏", "輕羅小扇撲流螢", "天階夜色涼如水", "臥看牽牛織女星"], "note": "涼涼的夜晚，躺著看星星。"}, {"title": "江南春", "author": "唐·杜牧", "body": ["千里鶯啼綠映紅", "水村山郭酒旗風", "南朝四百八十寺", "多少樓臺煙雨中"], "note": "江南的春天，是一場煙雨中的夢。"}, {"title": "寄揚州韓綽判官", "author": "唐·杜牧", "body": ["青山隱隱水迢迢", "秋盡江南草未凋", "二十四橋明月夜", "玉人何處教吹簫"], "note": "遠方的朋友，今晚月光也照著你嗎？"}, {"title": "金縷衣", "author": "唐·杜秋娘", "body": ["勸君莫惜金縷衣", "勸君惜取少年時", "花開堪折直須折", "莫待無花空折枝"], "note": "想做的事，趁現在。"}, {"title": "商山早行", "author": "唐·溫庭筠", "body": ["晨起動徵鐸，客行悲故鄉", "雞聲茅店月，人跡板橋霜", "槲葉落山路，枳花明驛牆", "因思杜陵夢，鳧雁滿回塘"], "note": "天還沒亮就出發，旅人的鄉愁特別濃。"}, {"title": "望嶽", "author": "唐·杜甫", "body": ["岱宗夫如何，齊魯青未了", "造化鍾神秀，陰陽割昏曉", "蕩胸生層雲，決眥入歸鳥", "會當凌絕頂，一覽眾山小"], "note": "總有一天，你會站上自己的山頂。"}, {"title": "題破山寺後禪院", "author": "唐·常建", "body": ["清晨入古寺，初日照高林", "曲徑通幽處，禪房花木深", "山光悅鳥性，潭影空人心", "萬籟此俱寂，但餘鐘磬音"], "note": "找一個安靜的角落，清空心裡的雜音。"}, {"title": "春江花月夜（節選）", "author": "唐·張若虛", "body": ["春江潮水連海平，海上明月共潮生", "灩灩隨波千萬裏，何處春江無月明", "", "江畔何人初見月，江月何年初照人", "人生代代無窮已，江月年年望相似", "不知江月待何人，但見長江送流水"], "note": "月亮年年相似，而我們每天都是新的。"}, {"title": "送杜少府之任蜀州", "author": "唐·王勃", "body": ["城闕輔三秦，風煙望五津", "與君離別意，同是宦遊人", "海內存知己，天涯若比鄰", "無為在歧路，兒女共沾巾"], "note": "真正的朋友，不怕距離。"}, {"title": "別董大", "author": "唐·高適", "body": ["千里黃雲白日曛", "北風吹雁雪紛紛", "莫愁前路無知己", "天下誰人不識君"], "note": "不要擔心前方沒有知己。"}, {"title": "塞下曲", "author": "唐·盧綸", "body": ["月黑雁飛高", "單於夜遁逃", "欲將輕騎逐", "大雪滿弓刀"], "note": "在最暗的夜，做最勇敢的事。"}, {"title": "逢入京使", "author": "唐·岑參", "body": ["故園東望路漫漫", "雙袖龍鍾淚不乾", "馬上相逢無紙筆", "憑君傳語報平安"], "note": "遇到回家的人，請幫我帶一句：我很好。"}, {"title": "白雪歌送武判官歸京（節選）", "author": "唐·岑參", "body": ["北風卷地白草折，胡天八月即飛雪", "忽如一夜春風來，千樹萬樹梨花開", "", "山迴路轉不見君，雪上空留馬行處"], "note": "雪像花一樣，離別像詩一樣。"}, {"title": "小池", "author": "宋·楊萬裏", "body": ["泉眼無聲惜細流", "樹陰照水愛晴柔", "小荷才露尖尖角", "早有蜻蜓立上頭"], "note": "美好的事物，總是安靜地出現。"}, {"title": "水調歌頭", "author": "宋·蘇軾", "body": ["明月幾時有？把酒問青天", "不知天上宮闕，今夕是何年", "我欲乘風歸去，又恐瓊樓玉宇", "高處不勝寒", "起舞弄清影，何似在人間", "", "轉朱閣，低綺戶，照無眠", "不應有恨，何事長向別時圓", "人有悲歡離合，月有陰晴圓缺", "此事古難全", "但願人長久，千里共嬋娟"], "note": "不完美才是常態，那些不圓滿終成最美風景。"}, {"title": "題西林壁", "author": "宋·蘇軾", "body": ["橫看成嶺側成峯", "遠近高低各不同", "不識廬山真面目", "只緣身在此山中"], "note": "換個角度看，答案就不一樣。"}, {"title": "飲湖上初晴後雨", "author": "宋·蘇軾", "body": ["水光瀲灩晴方好", "山色空濛雨亦奇", "欲把西湖比西子", "淡妝濃抹總相宜"], "note": "晴天雨天，都有各自的美。"}, {"title": "念奴嬌·赤壁懷古", "author": "宋·蘇軾", "body": ["大江東去，浪淘盡，千古風流人物", "故壘西邊，人道是，三國周郎赤壁", "亂石穿空，驚濤拍岸，捲起千堆雪", "江山如畫，一時多少豪傑", "", "遙想公瑾當年，小喬初嫁了，雄姿英發", "羽扇綸巾，談笑間，檣櫓灰飛煙滅", "故國神遊，多情應笑我，早生華髮", "人生如夢，一尊還酹江月"], "note": "人生如夢，不如敬月亮一杯。"}, {"title": "定風波", "author": "宋·蘇軾", "body": ["莫聽穿林打葉聲，何妨吟嘯且徐行", "竹杖芒鞋輕勝馬，誰怕？", "一蓑煙雨任平生", "", "料峭春風吹酒醒，微冷", "山頭斜照卻相迎", "回首向來蕭瑟處，歸去", "也無風雨也無晴"], "note": "也無風雨也無晴，淡然就好。"}, {"title": "江城子·密州出獵", "author": "宋·蘇軾", "body": ["老夫聊發少年狂", "左牽黃，右擎蒼", "錦帽貂裘，千騎卷平岡", "為報傾城隨太守，親射虎，看孫郎", "", "酒酣胸膽尚開張", "鬢微霜，又何妨", "持節雲中，何日遣馮唐", "會挽雕弓如滿月，西北望，射天狼"], "note": "年紀不是問題，心態決定一切。"}, {"title": "江城子·乙卯正月二十日夜記夢", "author": "宋·蘇軾", "body": ["十年生死兩茫茫", "不思量，自難忘", "千里孤墳，無處話淒涼", "縱使相逢應不識", "塵滿面，鬢如霜", "", "夜來幽夢忽還鄉", "小軒窗，正梳妝", "相顧無言，惟有淚千行", "料得年年腸斷處", "明月夜，短松岡"], "note": "真正的思念，不用刻意想起，它一直在。"}, {"title": "蝶戀花", "author": "宋·柳永", "body": ["佇倚危樓風細細", "望極春愁，黯黯生天際", "草色煙光殘照裡", "無言誰會憑闌意", "", "擬把疏狂圖一醉", "對酒當歌，強樂還無味", "衣帶漸寬終不悔", "為伊消得人憔悴"], "note": "為了重要的事，一切付出都不算辛苦。"}, {"title": "雨霖鈴", "author": "宋·柳永", "body": ["寒蟬淒切，對長亭晚，驟雨初歇", "都門帳飲無緒，留戀處，蘭舟催發", "執手相看淚眼，竟無語凝噎", "念去去，千里煙波，暮靄沉沉楚天闊", "", "多情自古傷離別，更那堪，冷落清秋節", "今宵酒醒何處？楊柳岸，曉風殘月", "此去經年，應是良辰好景虛設", "便縱有千種風情，更與何人說"], "note": "離別時說不出口的，都藏在握緊的手裡。"}, {"title": "青玉案·元夕", "author": "宋·辛棄疾", "body": ["東風夜放花千樹", "更吹落，星如雨", "寶馬雕車香滿路", "鳳簫聲動，玉壺光轉", "一夜魚龍舞", "", "蛾兒雪柳黃金縷", "笑語盈盈暗香去", "眾裡尋他千百度", "驀然回首", "那人卻在", "燈火闌珊處"], "note": "你找的人，也許就在回頭的那一瞬間。"}, {"title": "破陣子·為陳同甫賦壯詞以寄之", "author": "宋·辛棄疾", "body": ["醉裡挑燈看劍，夢回吹角連營", "八百里分麾下炙，五十弦翻塞外聲", "沙場秋點兵", "", "馬作的盧飛快，弓如霹靂弦驚", "了卻君王天下事，贏得生前身後名", "可憐白髮生"], "note": "心中有劍，即使白髮也不老。"}, {"title": "醜奴兒·書博山道中壁", "author": "宋·辛棄疾", "body": ["少年不識愁滋味", "愛上層樓", "愛上層樓", "為賦新詞強說愁", "", "而今識盡愁滋味", "欲說還休", "欲說還休", "卻道天涼好個秋"], "note": "真正懂了愁，反而說不出口了。"}, {"title": "西江月·夜行黃沙道中", "author": "宋·辛棄疾", "body": ["明月別枝驚鵲，清風半夜鳴蟬", "稻花香裡說豐年，聽取蛙聲一片", "", "七八個星天外，兩三點雨山前", "舊時茅店社林邊，路轉溪橋忽見"], "note": "走著走著，就看見了燈火。"}, {"title": "聲聲慢", "author": "宋·李清照", "body": ["尋尋覓覓，冷冷清清", "淒淒慘慘慼慼", "乍暖還寒時候", "最難將息", "", "三杯兩盞淡酒", "怎敵他、晚來風急", "雁過也，正傷心", "卻是舊時相識", "", "滿地黃花堆積", "憔悴損，如今有誰堪摘", "守著窗兒，獨自怎生得黑", "梧桐更兼細雨", "到黃昏，點點滴滴", "這次第，怎一個愁字了得"], "note": "難過的時候不必假裝堅強。"}, {"title": "如夢令", "author": "宋·李清照", "body": ["常記溪亭日暮", "沉醉不知歸路", "興盡晚回舟", "誤入藕花深處", "爭渡，爭渡", "驚起一灘鷗鷺"], "note": "迷路有時候是最美的意外。"}, {"title": "一剪梅", "author": "宋·李清照", "body": ["紅藕香殘玉簟秋", "輕解羅裳，獨上蘭舟", "雲中誰寄錦書來", "雁字回時，月滿西樓", "", "花自飄零水自流", "一種相思，兩處閒愁", "此情無計可消除", "才下眉頭，卻上心頭"], "note": "想念是擋不住的，才下眉頭卻上心頭。"}, {"title": "醉花陰", "author": "宋·李清照", "body": ["薄霧濃雲愁永晝", "瑞腦銷金獸", "佳節又重陽，玉枕紗廚，半夜涼初透", "", "東籬把酒黃昏後", "有暗香盈袖", "莫道不銷魂", "簾捲西風", "人比黃花瘦"], "note": "想念一個人的時候，連花都覺得比你豐滿。"}, {"title": "虞美人", "author": "南唐·李煜", "body": ["春花秋月何時了？往事知多少", "小樓昨夜又東風", "故國不堪回首月明中", "", "雕欄玉砌應猶在", "只是朱顏改", "問君能有幾多愁", "恰似一江春水向東流"], "note": "向前看，春水依然在流。"}, {"title": "相見歡", "author": "南唐·李煜", "body": ["無言獨上西樓", "月如鉤", "寂寞梧桐深院鎖清秋", "", "剪不斷", "理還亂", "是離愁", "別是一般滋味在心頭"], "note": "有些心情，剪不斷理還亂。"}, {"title": "浪淘沙", "author": "南唐·李煜", "body": ["簾外雨潺潺", "春意闌珊", "羅衾不耐五更寒", "夢裡不知身是客", "一晌貪歡", "", "獨自莫憑欄", "無限江山", "別時容易見時難", "流水落花春去也", "天上人間"], "note": "珍惜每一次相見，因為下次不知在何時。"}, {"title": "卜算子·詠梅", "author": "宋·陸遊", "body": ["驛外斷橋邊", "寂寞開無主", "已是黃昏獨自愁", "更著風和雨", "", "無意苦爭春", "一任羣芳妒", "零落成泥碾作塵", "只有香如故"], "note": "即使凋零，也保持自己的香氣。"}, {"title": "釵頭鳳", "author": "宋·陸遊", "body": ["紅酥手，黃藤酒", "滿城春色宮牆柳", "東風惡，歡情薄", "一懷愁緒，幾年離索", "錯，錯，錯", "", "春如舊，人空瘦", "淚痕紅浥鮫綃透", "桃花落，閒池閣", "山盟雖在，錦書難託", "莫，莫，莫"], "note": "有些遺憾，只能用「莫」字結尾。"}, {"title": "遊山西村", "author": "宋·陸遊", "body": ["莫笑農家臘酒渾，豐年留客足雞豚", "山重水複疑無路，柳暗花明又一村", "簫鼓追隨春社近，衣冠簡樸古風存", "從今若許閒乘月，拄杖無時夜叩門"], "note": "看似無路的時候，往往轉角就是花明。"}, {"title": "示兒", "author": "宋·陸遊", "body": ["死去元知萬事空", "但悲不見九州同", "王師北定中原日", "家祭無忘告乃翁"], "note": "心裡放不下的事，就是最重要的事。"}, {"title": "滿江紅", "author": "宋·嶽飛", "body": ["怒髮衝冠，憑闌處、瀟瀟雨歇", "抬望眼、仰天長嘯，壯懷激烈", "三十功名塵與土，八千里路雲和月", "莫等閒、白了少年頭，空悲切", "", "靖康恥，猶未雪", "臣子恨，何時滅", "駕長車，踏破賀蘭山缺", "壯志飢餐胡虜肉，笑談渴飲匈奴血", "待從頭、收拾舊山河，朝天闕"], "note": "莫等閒，白了少年頭。"}, {"title": "水龍吟·登建康賞心亭", "author": "宋·辛棄疾", "body": ["楚天千里清秋", "水隨天去秋無際", "遙岑遠目，獻愁供恨，玉簪螺髻", "落日樓頭，斷鴻聲裡，江南遊子", "把吳鉤看了，欄杆拍遍", "無人會，登臨意"], "note": "拍遍欄杆也無人懂，但你會懂自己。"}, {"title": "鵲橋仙", "author": "宋·秦觀", "body": ["纖雲弄巧，飛星傳恨", "銀漢迢迢暗度", "金風玉露一相逢", "便勝卻人間無數", "", "柔情似水，佳期如夢", "忍顧鵲橋歸路", "兩情若是久長時", "又豈在朝朝暮暮"], "note": "真正的感情，不在乎距離。"}, {"title": "春日", "author": "宋·朱熹", "body": ["勝日尋芳泗水濱", "無邊光景一時新", "等閒識得東風面", "萬紫千紅總是春"], "note": "打開心，萬紫千紅都是春天。"}, {"title": "觀書有感", "author": "宋·朱熹", "body": ["半畝方塘一鑑開", "天光雲影共徘徊", "問渠那得清如許", "為有源頭活水來"], "note": "持續學習，心就不會乾涸。"}, {"title": "過零丁洋", "author": "宋·文天祥", "body": ["辛苦遭逢起一經，干戈寥落四周星", "山河破碎風飄絮，身世浮沉雨打萍", "惶恐灘頭說惶恐，零丁洋裡嘆零丁", "人生自古誰無死，留取丹心照汗青"], "note": "無論何時，保持心中的光。"}, {"title": "泊船瓜洲", "author": "宋·王安石", "body": ["京口瓜洲一水間", "鍾山只隔數重山", "春風又綠江南岸", "明月何時照我還"], "note": "離家越近，歸心越切。"}, {"title": "元日", "author": "宋·王安石", "body": ["爆竹聲中一歲除", "春風送暖入屠蘇", "千門萬戶曈曈日", "總把新桃換舊符"], "note": "新的一天，就是新的開始。"}, {"title": "題臨安邸", "author": "宋·林升", "body": ["山外青山樓外樓", "西湖歌舞幾時休", "暖風薰得遊人醉", "直把杭州作汴州"], "note": "沉醉是美的，但別忘了清醒。"}, {"title": "夏日絕句", "author": "宋·李清照", "body": ["生當作人傑", "死亦為鬼雄", "至今思項羽", "不肯過江東"], "note": "氣節，是一個人最閃亮的地方。"}, {"title": "飲酒·其五", "author": "晉·陶淵明", "body": ["結廬在人境，而無車馬喧", "問君何能爾？心遠地自偏", "採菊東籬下，悠然見南山", "山氣日夕佳，飛鳥相與還", "此中有真意，欲辨已忘言"], "note": "心靜了，喧囂也就遠了。"}, {"title": "歸園田居·其一", "author": "晉·陶淵明", "body": ["少無適俗韻，性本愛丘山", "誤落塵網中，一去三十年", "羈鳥戀舊林，池魚思故淵", "開荒南野際，守拙歸園田", "", "方宅十餘畝，草屋八九間", "榆柳蔭後簷，桃李羅堂前", "曖曖遠人村，依依墟里煙", "狗吠深巷中，雞鳴桑樹顛", "", "戶庭無塵雜，虛室有餘閒", "久在樊籠裡，復得返自然"], "note": "回到自然，就是回到自己。"}, {"title": "歸園田居·其三", "author": "晉·陶淵明", "body": ["種豆南山下", "草盛豆苗稀", "晨興理荒穢", "帶月荷鋤歸", "", "道狹草木長", "夕露沾我衣", "衣沾不足惜", "但使願無違"], "note": "只要不違背心願，一切辛苦都值得。"}, {"title": "雜詩", "author": "晉·陶淵明", "body": ["盛年不重來", "一日難再晨", "及時當勉勵", "歲月不待人"], "note": "今天，就是最好的時候。"}, {"title": "憶江南", "author": "唐·白居易", "body": ["江南好，風景舊曾諳", "日出江花紅勝火", "春來江水綠如藍", "能不憶江南？"], "note": "記憶裡最美的地方，是你最想回去的那裡。"}, {"title": "長歌行", "author": "漢樂府", "body": ["青青園中葵，朝露待日晞", "陽春佈德澤，萬物生光輝", "常恐秋節至，焜黃華葉衰", "百川東到海，何時復西歸", "少壯不努力，老大徒傷悲"], "note": "趁陽光正好，去做想做的事。"}, {"title": "迢迢牽牛星", "author": "漢·佚名", "body": ["迢迢牽牛星，皎皎河漢女", "纖纖擢素手，札札弄機杼", "終日不成章，泣涕零如雨", "河漢清且淺，相去復幾許", "盈盈一水間，脈脈不得語"], "note": "最近的距離，有時候是最遙遠的。"}, {"title": "觀滄海", "author": "漢·曹操", "body": ["東臨碣石，以觀滄海", "水何澹澹，山島竦峙", "樹木叢生，百草豐茂", "秋風蕭瑟，洪波湧起", "", "日月之行，若出其中", "星漢燦爛，若出其裡", "幸甚至哉，歌以詠志"], "note": "心有多大，世界就有多大。"}, {"title": "龜雖壽", "author": "漢·曹操", "body": ["神龜雖壽，猶有竟時", "螣蛇乘霧，終為土灰", "老驥伏櫪，志在千里", "烈士暮年，壯心不已", "", "盈縮之期，不但在天", "養怡之福，可得永年", "幸甚至哉，歌以詠志"], "note": "老驥伏櫪，志在千里。年齡不是限制。"}, {"title": "短歌行", "author": "漢·曹操", "body": ["對酒當歌，人生幾何", "譬如朝露，去日苦多", "慨當以慷，憂思難忘", "何以解憂，唯有杜康", "", "月明星稀，烏鵲南飛", "繞樹三匝，何枝可依", "山不厭高，海不厭深", "周公吐哺，天下歸心"], "note": "人生如朝露，更要把握每一刻。"}, {"title": "七步詩", "author": "三國·曹植", "body": ["煮豆燃豆萁", "豆在釜中泣", "本是同根生", "相煎何太急"], "note": "對自己人溫柔一點。"}, {"title": "木蘭辭（節選）", "author": "南北朝·佚名", "body": ["唧唧復唧唧，木蘭當戶織", "不聞機杼聲，唯聞女嘆息", "", "萬裏赴戎機，關山度若飛", "朔氣傳金柝，寒光照鐵衣", "", "雄兔腳撲朔，雌兔眼迷離", "雙兔傍地走，安能辨我是雄雌"], "note": "勇敢不分性別，堅強是每個人的選擇。"}, {"title": "敕勒歌", "author": "南北朝·佚名", "body": ["敕勒川，陰山下", "天似穹廬，籠蓋四野", "天蒼蒼，野茫茫", "風吹草低見牛羊"], "note": "天地遼闊，心也可以很遼闊。"}, {"title": "蘭亭集序（節選）", "author": "晉·王羲之", "body": ["仰觀宇宙之大", "俯察品類之盛", "所以遊目騁懷", "足以極視聽之娛", "信可樂也", "", "向之所欣，俯仰之間，已為陳跡", "猶不能不以之興懷", "況修短隨化", "終期於盡", "古人云：死生亦大矣", "豈不痛哉"], "note": "人生短暫，所以每一刻的快樂都珍貴。"}, {"title": "桃花源記（節選）", "author": "晉·陶淵明", "body": ["忽逢桃花林", "夾岸數百步", "中無雜樹", "芳草鮮美", "落英繽紛", "", "土地平曠，屋舍儼然", "有良田美池桑竹之屬", "阡陌交通，雞犬相聞"], "note": "心裡的桃花源，隨時都可以走進去。"}, {"title": "歸去來兮辭（節選）", "author": "晉·陶淵明", "body": ["歸去來兮", "田園將蕪胡不歸", "既自以心為形役", "奚惆悵而獨悲", "悟已往之不諫", "知來者之可追", "實迷途其未遠", "覺今是而昨非"], "note": "回頭永遠不嫌晚。"}, {"title": "滕王閣序（節選）", "author": "唐·王勃", "body": ["落霞與孤鶩齊飛", "秋水共長天一色", "", "關山難越，誰悲失路之人", "萍水相逢，盡是他鄉之客", "", "老當益壯，寧移白首之心", "窮且益堅，不墜青雲之志"], "note": "窮且益堅，不墜青雲之志。"}, {"title": "嶽陽樓記（節選）", "author": "宋·范仲淹", "body": ["不以物喜，不以己悲", "居廟堂之高則憂其民", "處江湖之遠則憂其君", "", "先天下之憂而憂", "後天下之樂而樂"], "note": "不因得失而動搖，保持心中的平靜。"}, {"title": "愛蓮說", "author": "宋·周敦頤", "body": ["予獨愛蓮之出淤泥而不染", "濯清漣而不妖", "中通外直，不蔓不枝", "香遠益清，亭亭淨植", "可遠觀而不可褻玩焉"], "note": "做一朵蓮花，出淤泥而不染。"}, {"title": "陋室銘", "author": "唐·劉禹錫", "body": ["山不在高，有仙則名", "水不在深，有龍則靈", "斯是陋室，惟吾德馨", "", "苔痕上階綠，草色入簾青", "談笑有鴻儒，往來無白丁", "", "無絲竹之亂耳", "無案牘之勞形", "南陽諸葛廬，西蜀子雲亭", "孔子云：何陋之有？"], "note": "空間不重要，重要的是裡面住著什麼樣的心。"}, {"title": "師說（節選）", "author": "唐·韓愈", "body": ["古之學者必有師", "師者，所以傳道受業解惑也", "", "是故弟子不必不如師", "師不必賢於弟子", "聞道有先後", "術業有專攻", "如是而已"], "note": "每個人都有值得學習的地方。"}, {"title": "赤壁賦（節選）", "author": "宋·蘇軾", "body": ["且夫天地之間，物各有主", "苟非吾之所有，雖一毫而莫取", "", "惟江上之清風，與山間之明月", "耳得之而為聲，目遇之而成色", "取之無禁，用之不竭", "是造物者之無盡藏也", "而吾與子之所共適"], "note": "清風明月不花錢，最好的東西都是免費的。"}, {"title": "前赤壁賦（節選）", "author": "宋·蘇軾", "body": ["寄蜉蝣於天地", "渺滄海之一粟", "哀吾生之須臾", "羨長江之無窮", "", "蓋將自其變者而觀之", "則天地曾不能以一瞬", "自其不變者而觀之", "則物與我皆無盡也", "而又何羨乎"], "note": "換個角度看，我們其實和宇宙一樣永恆。"}, {"title": "登池上樓", "author": "南朝·謝靈運", "body": ["池塘生春草", "園柳變鳴禽", "", "祁祁傷豳歌", "萋萋感楚吟", "索居易永久", "離羣難處心"], "note": "池塘生春草，最美的發現在日常裡。"}, {"title": "世說新語·詠雪", "author": "南朝·劉義慶", "body": ["白雪紛紛何所似", "", "撒鹽空中差可擬", "", "未若柳絮因風起"], "note": "同一片雪花，不同的人看見不同的美。"}, {"title": "出師表（節選）", "author": "三國·諸葛亮", "body": ["臣本布衣，躬耕於南陽", "苟全性命於亂世", "不求聞達於諸侯", "", "先帝不以臣卑鄙", "猥自枉屈", "三顧臣於草廬之中", "諮臣以當世之事", "由是感激", "遂許先帝以驅馳"], "note": "被一個人真心對待，就值得用一生回報。"}, {"title": "蒹葭", "author": "詩經", "body": ["蒹葭蒼蒼，白露為霜", "所謂伊人，在水一方", "溯洄從之，道阻且長", "溯游從之，宛在水中央"], "note": "追尋的路很長，但那個人一直在那裡。"}, {"title": "關雎", "author": "詩經", "body": ["關關雎鳩，在河之洲", "窈窕淑女，君子好逑", "", "求之不得，寤寐思服", "悠哉悠哉，輾轉反側"], "note": "想念一個人的夜晚，翻來覆去。"}, {"title": "桃夭", "author": "詩經", "body": ["桃之夭夭，灼灼其華", "之子於歸，宜其室家", "", "桃之夭夭，有蕡其實", "之子於歸，宜其家室", "", "桃之夭夭，其葉蓁蓁", "之子於歸，宜其家人"], "note": "桃花盛開的日子，適合說祝福的話。"}, {"title": "采薇（節選）", "author": "詩經", "body": ["昔我往矣，楊柳依依", "今我來思，雨雪霏霏", "行道遲遲，載渴載飢", "我心傷悲，莫知我哀"], "note": "出發時春暖花開，回來時已是冬雪。時間不等人。"}, {"title": "鹿鳴", "author": "詩經", "body": ["呦呦鹿鳴，食野之苹", "我有嘉賓，鼓瑟吹笙", "", "吹笙鼓簧，承筐是將", "人之好我，示我周行"], "note": "有朋友來的日子，值得鼓瑟吹笙。"}, {"title": "離騷（節選）", "author": "戰國·屈原", "body": ["路漫漫其修遠兮", "吾將上下而求索", "", "長太息以掩涕兮", "哀民生之多艱", "", "亦餘心之所善兮", "雖九死其猶未悔"], "note": "路很遠，但值得一直走下去。"}, {"title": "九歌·湘夫人（節選）", "author": "戰國·屈原", "body": ["帝子降兮北渚", "目眇眇兮愁予", "嫋嫋兮秋風", "洞庭波兮木葉下"], "note": "秋風起的時候，思念也跟著飄落。"}, {"title": "天問（節選）", "author": "戰國·屈原", "body": ["遂古之初，誰傳道之", "上下未形，何由考之", "冥昭瞢暗，誰能極之", "馮翼惟象，何以識之"], "note": "敢問天問地，就是智慧的開始。"}, {"title": "早春呈水部張十八員外", "author": "唐·韓愈", "body": ["天街小雨潤如酥", "草色遙看近卻無", "最是一年春好處", "絕勝煙柳滿皇都"], "note": "最美的春天，是那剛剛好的淡綠。"}, {"title": "晚春", "author": "唐·韓愈", "body": ["草樹知春不久歸", "百般紅紫鬥芳菲", "楊花榆莢無才思", "惟解漫天作雪飛"], "note": "就算不夠出眾，也可以努力綻放。"}, {"title": "左遷至藍關示侄孫湘", "author": "唐·韓愈", "body": ["一封朝奏九重天，夕貶潮州路八千", "欲為聖明除弊事，肯將衰朽惜殘年", "雲橫秦嶺家何在，雪擁藍關馬不前", "知汝遠來應有意，好收吾骨瘴江邊"], "note": "即使前路艱難，也不後悔說出真話。"}, {"title": "石壕吏（節選）", "author": "唐·杜甫", "body": ["暮投石壕村，有吏夜捉人", "老翁逾牆走，老婦出門看", "", "吏呼一何怒，婦啼一何苦", "聽婦前致詞：三男鄴城戍", "一男附書至，二男新戰死", "存者且偷生，死者長已矣"], "note": "每一個時代，都有普通人在默默承受。"}, {"title": "茅屋為秋風所破歌（節選）", "author": "唐·杜甫", "body": ["八月秋高風怒號", "卷我屋上三重茅", "", "安得廣廈千萬間", "大庇天下寒士俱歡顏", "風雨不動安如山", "嗚呼！何時眼前突兀見此屋", "吾廬獨破受凍死亦足"], "note": "願每個人都有一個溫暖的家。"}, {"title": "聞官軍收河南河北", "author": "唐·杜甫", "body": ["劍外忽傳收薊北，初聞涕淚滿衣裳", "卻看妻子愁何在，漫卷詩書喜欲狂", "白日放歌須縱酒，青春作伴好還鄉", "即從巴峽穿巫峽，便下襄陽向洛陽"], "note": "好消息來的時候，眼淚和笑容一起出現。"}, {"title": "贈花卿", "author": "唐·杜甫", "body": ["錦城絲管日紛紛", "半入江風半入雲", "此曲只應天上有", "人間能得幾回聞"], "note": "遇到美好的事物，好好感受。"}, {"title": "惠崇春江晚景", "author": "宋·蘇軾", "body": ["竹外桃花三兩枝", "春江水暖鴨先知", "蔞蒿滿地蘆芽短", "正是河豚欲上時"], "note": "春天的消息，鴨子比人先知道。"}, {"title": "六月二十七日望湖樓醉書", "author": "宋·蘇軾", "body": ["黑雲翻墨未遮山", "白雨跳珠亂入船", "卷地風來忽吹散", "望湖樓下水如天"], "note": "暴風雨來得快也去得快，等一等就好。"}, {"title": "春日偶成", "author": "宋·程顥", "body": ["雲淡風輕近午天", "傍花隨柳過前川", "時人不識餘心樂", "將謂偷閒學少年"], "note": "偶爾偷閒，像少年一樣無憂地走走。"}, {"title": "秋詞", "author": "唐·劉禹錫", "body": ["自古逢秋悲寂寥", "我言秋日勝春朝", "晴空一鶴排雲上", "便引詩情到碧霄"], "note": "誰說秋天一定是悲傷的？"}, {"title": "浪淘沙", "author": "唐·劉禹錫", "body": ["九曲黃河萬裏沙", "浪淘風簸自天涯", "如今直上銀河去", "同到牽牛織女家"], "note": "順著黃河一直走，就能到達星空。"}, {"title": "菩薩蠻·書江西造口壁", "author": "宋·辛棄疾", "body": ["鬱孤臺下清江水", "中間多少行人淚", "西北望長安", "可憐無數山", "", "青山遮不住", "畢竟東流去", "江晚正愁餘", "山深聞鷓鴣"], "note": "青山遮不住，江水照樣流。"}, {"title": "摸魚兒", "author": "宋·辛棄疾", "body": ["更能消，幾番風雨", "匆匆春又歸去", "惜春長怕花開早", "何況落紅無數", "春且住", "", "見說道，天涯芳草無歸路", "怨春不語", "算只有殷勤，畫簷蛛網", "盡日惹飛絮"], "note": "春天留不住，但花開的記憶留得住。"}, {"title": "永遇樂·京口北固亭懷古", "author": "宋·辛棄疾", "body": ["千古江山，英雄無覓，孫仲謀處", "舞榭歌臺，風流總被，雨打風吹去", "斜陽草樹，尋常巷陌", "人道寄奴曾住", "", "想當年，金戈鐵馬", "氣吞萬裏如虎", "", "憑誰問：廉頗老矣", "尚能飯否"], "note": "英雄不問年齡，問的是還能不能再戰。"}, {"title": "蘇幕遮", "author": "宋·范仲淹", "body": ["碧雲天，黃葉地", "秋色連波，波上寒煙翠", "山映斜陽天接水", "芳草無情，更在斜陽外", "", "黯鄉魂，追旅思", "夜夜除非，好夢留人睡", "明月樓高休獨倚", "酒入愁腸，化作相思淚"], "note": "秋天的風景再美，也美不過想家的心。"}, {"title": "漁家傲", "author": "宋·范仲淹", "body": ["塞下秋來風景異", "衡陽雁去無留意", "四面邊聲連角起", "千嶂裡，長煙落日孤城閉", "", "濁酒一杯家萬裏", "燕然未勒歸無計", "羌管悠悠霜滿地", "人不寐，將軍白髮征夫淚"], "note": "一杯酒，一萬裏的鄉愁。"}, {"title": "臨江仙", "author": "宋·晏幾道", "body": ["夢後樓臺高鎖", "酒醒簾幕低垂", "去年春恨卻來時", "落花人獨立", "微雨燕雙飛", "", "記得小蘋初見", "兩重心字羅衣", "琵琶弦上說相思", "當時明月在", "曾照彩雲歸"], "note": "落花人獨立，微雨燕雙飛——最美的孤獨。"}, {"title": "浣溪沙", "author": "宋·晏殊", "body": ["一曲新詞酒一杯", "去年天氣舊亭臺", "夕陽西下幾時回", "", "無可奈何花落去", "似曾相識燕歸來", "小園香徑獨徘徊"], "note": "花落了還會開，燕去了還會來。"}, {"title": "蝶戀花", "author": "宋·晏殊", "body": ["檻菊愁煙蘭泣露", "羅幕輕寒，燕子雙飛去", "明月不諳離恨苦", "斜光到曉穿朱戶", "", "昨夜西風凋碧樹", "獨上高樓，望盡天涯路", "欲寄彩箋兼尺素", "山長水闊知何處"], "note": "獨上高樓，望盡天涯路——人生的第一重境界。"}, {"title": "踏莎行", "author": "宋·歐陽修", "body": ["候館梅殘，溪橋柳細", "草薰風暖搖徵轡", "離愁漸遠漸無窮", "迢迢不斷如春水", "", "寸寸柔腸，盈盈粉淚", "樓高莫近危闌倚", "平蕪盡處是春山", "行人更在春山外"], "note": "你以為望到了盡頭，他卻在更遠的地方。"}, {"title": "生查子·元夕", "author": "宋·歐陽修", "body": ["去年元夜時", "花市燈如晝", "月上柳梢頭", "人約黃昏後", "", "今年元夜時", "月與燈依舊", "不見去年人", "淚濕春衫袖"], "note": "同一個節日，不同的人，不同的心情。"}, {"title": "武陵春", "author": "宋·李清照", "body": ["風住塵香花已盡", "日晚倦梳頭", "物是人非事事休", "欲語淚先流", "", "聞說雙溪春尚好", "也擬泛輕舟", "只恐雙溪舴艋舟", "載不動許多愁"], "note": "有些愁，輕舟也載不動。"}, {"title": "點絳脣", "author": "宋·李清照", "body": ["蹴罷鞦韆", "起來慵整纖纖手", "露濃花瘦", "薄汗輕衣透", "", "見客入來", "襪剗金釵溜", "和羞走", "倚門回首", "卻把青梅嗅"], "note": "少女的害羞，藏在回頭嗅青梅的動作裡。"}, {"title": "南鄉子·登京口北固亭有懷", "author": "宋·辛棄疾", "body": ["何處望神州？滿眼風光北固樓", "千古興亡多少事？悠悠", "不盡長江滾滾流", "", "年少萬兜鍪", "坐斷東南戰未休", "天下英雄誰敵手？曹劉", "生子當如孫仲謀"], "note": "千古興亡，都付與長江流水。"}, {"title": "卜算子·送鮑浩然之浙東", "author": "宋·王觀", "body": ["水是眼波橫", "山是眉峯聚", "欲問行人去那邊", "眉眼盈盈處", "", "纔始送春歸", "又送君歸去", "若到江南趕上春", "千萬和春住"], "note": "如果到了春天的地方，記得和春天住在一起。"}, {"title": "江南逢李龜年", "author": "唐·杜甫", "body": ["岐王宅裡尋常見", "崔九堂前幾度聞", "正是江南好風景", "落花時節又逢君"], "note": "在最美的季節重逢，是人生最好的安排。"}, {"title": "春夜洛城聞笛", "author": "唐·李白", "body": ["誰家玉笛暗飛聲", "散入春風滿洛城", "此夜曲中聞折柳", "何人不起故園情"], "note": "一首歌就能喚起所有的鄉愁。"}, {"title": "峨眉山月歌", "author": "唐·李白", "body": ["峨眉山月半輪秋", "影入平羌江水流", "夜發清溪向三峽", "思君不見下渝州"], "note": "月亮跟著你走，就像思念跟著心走。"}, {"title": "渡荊門送別", "author": "唐·李白", "body": ["渡遠荊門外，來從楚國遊", "山隨平野盡，江入大荒流", "月下飛天鏡，雲生結海樓", "仍憐故鄉水，萬裏送行舟"], "note": "故鄉的水，一路送你到遠方。"}, {"title": "聯句（春日）", "author": "民間", "body": ["春水滿四澤", "夏雲多奇峯", "秋月揚明輝", "冬嶺秀寒松"], "note": "四季各有各的美，每一天都值得感恩。"}, {"title": "雪梅", "author": "宋·盧梅坡", "body": ["梅雪爭春未肯降", "騷人擱筆費評章", "梅須遜雪三分白", "雪卻輸梅一段香"], "note": "每個人都有自己獨特的好。"}, {"title": "書湖陰先生壁", "author": "宋·王安石", "body": ["茅簷長掃淨無苔", "花木成畦手自栽", "一水護田將綠繞", "兩山排闥送青來"], "note": "用心打理的生活，連山水都會來拜訪。"}, {"title": "約客", "author": "宋·趙師秀", "body": ["黃梅時節家家雨", "青草池塘處處蛙", "有約不來過夜半", "閒敲棋子落燈花"], "note": "等一個人的夜晚，連敲棋子都是詩。"}, {"title": "曉出淨慈寺送林子方", "author": "宋·楊萬裏", "body": ["畢竟西湖六月中", "風光不與四時同", "接天蓮葉無窮碧", "映日荷花別樣紅"], "note": "對的時候去對的地方，美就在那裡等你。"}, {"title": "望天門山", "author": "唐·李白", "body": ["天門中斷楚江開", "碧水東流至此回", "兩岸青山相對出", "孤帆一片日邊來"], "note": "前方的門終會為你打開。"}, {"title": "贈汪倫", "author": "唐·李白", "body": ["李白乘舟將欲行", "忽聞岸上踏歌聲", "桃花潭水深千尺", "不及汪倫送我情"], "note": "朋友的情誼，比最深的潭水還深。"}, {"title": "夜書所見", "author": "宋·葉紹翁", "body": ["蕭蕭梧葉送寒聲", "江上秋風動客情", "知有兒童挑促織", "夜深籬落一燈明"], "note": "深夜裡的一盞燈，就是溫暖。"}, {"title": "石灰吟", "author": "明·于謙", "body": ["千錘萬鑿出深山", "烈火焚燒若等閒", "粉骨碎身渾不怕", "要留清白在人間"], "note": "經歷千錘百煉，留下的是清白的心。"}, {"title": "竹石", "author": "清·鄭燮", "body": ["咬定青山不放鬆", "立根原在破巖中", "千磨萬擊還堅勁", "任爾東西南北風"], "note": "站穩了，什麼風都吹不倒你。"}, {"title": "己亥雜詩", "author": "清·龔自珍", "body": ["浩蕩離愁白日斜", "吟鞭東指即天涯", "落紅不是無情物", "化作春泥更護花"], "note": "離開不是結束，是另一種守護。"}, {"title": "獄中題壁", "author": "清·譚嗣同", "body": ["望門投止思張儉", "忍死須臾待杜根", "我自橫刀向天笑", "去留肝膽兩崑崙"], "note": "笑對命運，是最瀟灑的姿態。"}, {"title": "對酒", "author": "清·秋瑾", "body": ["不惜千金買寶刀", "貂裘換酒也堪豪", "一腔熱血勤珍重", "灑去猶能化碧濤"], "note": "為了相信的事，值得一腔熱血。"}, {"title": "山園小梅", "author": "宋·林逋", "body": ["眾芳搖落獨暄妍", "佔盡風情向小園", "疏影橫斜水清淺", "暗香浮動月黃昏", "", "霜禽欲下先偷眼", "粉蝶如知合斷魂", "幸有微吟可相狎", "不須檀板共金尊"], "note": "在安靜的角落，獨自綻放也是一種美。"}, {"title": "正氣歌（節選）", "author": "宋·文天祥", "body": ["天地有正氣", "雜然賦流形", "下則為河嶽", "上則為日星", "", "於人曰浩然", "沛乎塞蒼冥", "皇路當清夷", "含和吐明庭"], "note": "天地間有一股正氣，它住在你心裡。"}, {"title": "沁園春·長沙", "author": "毛澤東", "body": ["獨立寒秋，湘江北去，橘子洲頭", "看萬山紅遍，層林盡染", "漫江碧透，百舸爭流", "鷹擊長空，魚翔淺底", "萬類霜天競自由", "", "悵寥廓", "問蒼茫大地", "誰主沉浮"], "note": "面對遼闊的世界，問一問自己想要什麼。"}, {"title": "七律·長徵", "author": "毛澤東", "body": ["紅軍不怕遠徵難", "萬水千山只等閒", "五嶺逶迤騰細浪", "烏蒙磅礡走泥丸", "金沙水拍雲崖暖", "大渡橋橫鐵索寒", "更喜岷山千里雪", "三軍過後盡開顏"], "note": "再難的路，走過去了就是笑容。"}, {"title": "卜算子·詠梅", "author": "毛澤東", "body": ["風雨送春歸", "飛雪迎春到", "已是懸崖百丈冰", "猶有花枝俏", "", "俏也不爭春", "只把春來報", "待到山花爛漫時", "她在叢中笑"], "note": "等到春天來的時候，最早開的花反而安靜地笑了。"}, {"title": "無題", "author": "魯迅", "body": ["萬家墨面沒蒿萊", "敢有歌吟動地哀", "心事浩茫連廣宇", "於無聲處聽驚雷"], "note": "在最安靜的地方，聽見最大的力量。"}, {"title": "自嘲", "author": "魯迅", "body": ["運交華蓋欲何求，未敢翻身已碰頭", "破帽遮顏過鬧市，漏船載酒泛中流", "橫眉冷對千夫指，俯首甘為孺子牛", "躲進小樓成一統，管他冬夏與春秋"], "note": "橫眉冷對千夫指，俯首甘為孺子牛。"}, {"title": "春", "author": "朱自清", "body": ["盼望著，盼望著", "東風來了", "春天的腳步近了", "", "一切都像剛睡醒的樣子", "欣欣然張開了眼", "山朗潤起來了", "水漲起來了", "太陽的臉紅起來了"], "note": "春天來了，一切都在甦醒。"}, {"title": "荷塘月色（節選）", "author": "朱自清", "body": ["曲曲折折的荷塘上面", "彌望的是田田的葉子", "葉子出水很高", "像亭亭的舞女的裙", "", "月光如流水一般", "靜靜地瀉在這一片葉子和花上", "薄薄的青霧浮起在荷塘裡"], "note": "月光下的荷塘，是心靈的避風港。"}, {"title": "背影（節選）", "author": "朱自清", "body": ["他用兩手攀著上面", "兩腳再向上縮", "他肥胖的身子向左微傾", "顯出努力的樣子", "", "這時我看見他的背影", "我的淚很快地流下來了", "我趕緊拭乾了淚", "怕他看見", "也怕別人看見"], "note": "父親的背影，是世上最溫暖的風景。"}, {"title": "雨的隨想", "author": "汪國真", "body": ["有時，外面下著雨", "心卻晴著", "又有時，外面晴著", "心卻下著雨", "", "世界上許多東西", "在對比中讓你品味"], "note": "心晴的時候，什麼天氣都是好天氣。"}, {"title": "熱愛生命", "author": "汪國真", "body": ["我不去想是否能夠成功", "既然選擇了遠方", "便只顧風雨兼程", "", "我不去想身後會不會襲來寒風冷雨", "既然目標是地平線", "留給世界的只能是背影"], "note": "選擇了方向，就風雨兼程。"}, {"title": "假如你不夠快樂", "author": "汪國真", "body": ["假如你不夠快樂", "也不要把眉頭深鎖", "人生本來短暫", "為什麼還要栽培苦澀", "", "打開塵封的門窗", "讓陽光雨露灑遍每個角落", "走向生命的原野", "讓風兒熨平前額"], "note": "打開窗戶，讓陽光進來。"}, {"title": "致青春", "author": "汪國真", "body": ["所有的日子，所有的日子都來吧", "讓我編織你們", "用青春的金線", "和幸福的瓔珞", "", "編織你們"], "note": "青春是金線，把每一天都編織成美好。"}, {"title": "旅行", "author": "汪國真", "body": ["凡是遙遠的地方", "對我們都有一種誘惑", "不是誘惑於美麗", "就是誘惑於傳說", "", "即便遠方的風景", "並不盡如人意", "我們也無需在乎", "因為這實在是一個", "迷人的錯"], "note": "出發本身，就是意義。"}, {"title": "小王子（節選）", "author": "聖修伯裏（林秀清譯）", "body": ["如果你愛上了一朵生長在一顆星星上的花", "那麼夜間你看著天空就感到甜蜜愉快", "所有的星星上都好像開著花"], "note": "當你愛上了什麼，全世界都會為你發光。"}, {"title": "論語·學而", "author": "孔子", "body": ["學而時習之，不亦說乎", "有朋自遠方來，不亦樂乎", "人不知而不慍，不亦君子乎"], "note": "學習、友情、坦然——快樂的三個來源。"}, {"title": "論語·為政", "author": "孔子", "body": ["吾十有五而志於學", "三十而立", "四十而不惑", "五十而知天命", "六十而耳順", "七十而從心所欲不逾矩"], "note": "人生每個階段都有它的功課。"}, {"title": "道德經（節選）", "author": "老子", "body": ["上善若水", "水善利萬物而不爭", "處眾人之所惡", "故幾於道"], "note": "像水一樣，利萬物而不爭。"}, {"title": "道德經·第八十一章", "author": "老子", "body": ["信言不美，美言不信", "善者不辯，辯者不善", "知者不博，博者不知"], "note": "真正的智慧，往往是簡單的。"}, {"title": "逍遙遊（節選）", "author": "莊子", "body": ["北冥有魚，其名為鯤", "鯤之大，不知其幾千里也", "化而為鳥，其名為鵬", "鵬之背，不知其幾千里也", "", "怒而飛，其翼若垂天之雲"], "note": "心有多大，翅膀就有多寬。"}, {"title": "夢遊天姥吟留別（節選）", "author": "唐·李白", "body": ["海客談瀛洲，煙濤微茫信難求", "越人語天姥，雲霞明滅或可睹", "", "安能摧眉折腰事權貴", "使我不得開心顏"], "note": "不為權勢低頭，纔是真正的自在。"}, {"title": "蜀道難（節選）", "author": "唐·李白", "body": ["噫籲嚱，危乎高哉", "蜀道之難，難於上青天", "", "蠶叢及魚鳧，開國何茫然", "爾來四萬八千歲", "不與秦塞通人煙"], "note": "再難的路，也有人走過。"}, {"title": "宣州謝朓樓餞別校書叔雲", "author": "唐·李白", "body": ["棄我去者，昨日之日不可留", "亂我心者，今日之日多煩憂", "長風萬裏送秋雁，對此可以酣高樓", "", "抽刀斷水水更流，舉杯銷愁愁更愁", "人生在世不稱意，明朝散髮弄扁舟"], "note": "過去留不住，不如放下，去吧。"}, {"title": "客至", "author": "唐·杜甫", "body": ["舍南舍北皆春水，但見羣鷗日日來", "花徑不曾緣客掃，蓬門今始為君開", "盤飧市遠無兼味，樽酒家貧只舊醅", "肯與鄰翁相對飲，隔籬呼取盡餘杯"], "note": "有朋友來，粗茶淡飯也是盛宴。"}, {"title": "蜀相", "author": "唐·杜甫", "body": ["丞相祠堂何處尋，錦官城外柏森森", "映階碧草自春色，隔葉黃鸝空好音", "三顧頻煩天下計，兩朝開濟老臣心", "出師未捷身先死，長使英雄淚滿襟"], "note": "未完成的心願，是最深的遺憾。"}, {"title": "兵車行（節選）", "author": "唐·杜甫", "body": ["車轔轔，馬蕭蕭，行人弓箭各在腰", "爺娘妻子走相送，塵埃不見鹹陽橋", "牽衣頓足攔道哭，哭聲直上幹雲霄"], "note": "離別的哭聲，千年後依然讓人心疼。"}, {"title": "秋興八首·其一", "author": "唐·杜甫", "body": ["玉露凋傷楓樹林，巫山巫峽氣蕭森", "江間波浪兼天湧，塞上風雲接地陰", "叢菊兩開他日淚，孤舟一繫故園心", "寒衣處處催刀尺，白帝城高急暮砧"], "note": "秋天的惆悵，是因為心裡裝著太多。"}, {"title": "戲為六絕句", "author": "唐·杜甫", "body": ["爾曹身與名俱滅", "不廢江河萬古流"], "note": "經典之所以經典，是因為時間無法淹沒它。"}, {"title": "終南別業", "author": "唐·王維", "body": ["中歲頗好道，晚家南山陲", "興來每獨往，勝事空自知", "行到水窮處，坐看雲起時", "偶然值林叟，談笑無還期"], "note": "行到水窮處，坐看雲起時——這就是人生的態度。"}, {"title": "輞川閒居贈裴秀才迪", "author": "唐·王維", "body": ["寒山轉蒼翠，秋水日潺湲", "倚杖柴門外，臨風聽暮蟬", "渡頭餘落日，墟里上孤煙", "復值接輿醉，狂歌五柳前"], "note": "靠著柴門聽蟬鳴，這就是悠閒。"}, {"title": "雜詩", "author": "唐·王維", "body": ["君自故鄉來", "應知故鄉事", "來日綺窗前", "寒梅著花未"], "note": "從故鄉來的人，最想問的是那株梅花。"}, {"title": "新嫁娘詞", "author": "唐·王建", "body": ["三日入廚下", "洗手作羹湯", "未諳姑食性", "先遣小姑嘗"], "note": "小心翼翼的溫柔，是最可愛的用心。"}, {"title": "賣炭翁（節選）", "author": "唐·白居易", "body": ["賣炭翁，伐薪燒炭南山中", "滿面塵灰煙火色，兩鬢蒼蒼十指黑", "賣炭得錢何所營？身上衣裳口中食", "可憐身上衣正單，心憂炭賤願天寒"], "note": "每一份辛苦的勞動，都值得被看見。"}, {"title": "花非花", "author": "唐·白居易", "body": ["花非花，霧非霧", "夜半來，天明去", "來如春夢幾多時", "去似朝雲無覓處"], "note": "美好的事物來去匆匆，且珍惜。"}, {"title": "夢微之", "author": "唐·白居易", "body": ["夜來攜手夢同遊", "晨起盈巾淚莫收", "漳浦老身三度病", "鹹陽宿草八回秋", "君埋泉下泥銷骨", "我寄人間雪滿頭"], "note": "最深的友情，跨越生死。"}, {"title": "望洞庭", "author": "唐·劉禹錫", "body": ["湖光秋月兩相和", "潭面無風鏡未磨", "遙望洞庭山水翠", "白銀盤裡一青螺"], "note": "平靜的湖面，像一面鏡子映照你。"}, {"title": "西塞山懷古", "author": "唐·劉禹錫", "body": ["王濬樓船下益州，金陵王氣黯然收", "千尋鐵鎖沉江底，一片降幡出石頭", "人世幾回傷往事，山形依舊枕寒流", "今逢四海為家日，故壘蕭蕭蘆荻秋"], "note": "歷史反覆，但山河不變。"}, {"title": "望江南", "author": "唐·溫庭筠", "body": ["梳洗罷", "獨倚望江樓", "過盡千帆皆不是", "斜暉脈脈水悠悠", "腸斷白蘋洲"], "note": "等的那個人，也許就在下一班船上。"}, {"title": "尋隱者不遇", "author": "唐·賈島", "body": ["松下問童子", "言師採藥去", "只在此山中", "雲深不知處"], "note": "找的人不在，但山裡的雲也是一種答案。"}, {"title": "題李凝幽居", "author": "唐·賈島", "body": ["閒居少鄰並", "草徑入荒園", "鳥宿池邊樹", "僧敲月下門", "過橋分野色", "移石動雲根", "暫去還來此", "幽期不負言"], "note": "推敲之間，藏著對生活的認真。"}, {"title": "江南", "author": "漢樂府", "body": ["江南可採蓮", "蓮葉何田田", "魚戲蓮葉間", "魚戲蓮葉東", "魚戲蓮葉西", "魚戲蓮葉南", "魚戲蓮葉北"], "note": "簡單的快樂，就像魚在蓮葉間嬉戲。"}, {"title": "上邪", "author": "漢樂府", "body": ["上邪！我欲與君相知", "長命無絕衰", "山無陵，江水為竭", "冬雷震震，夏雨雪", "天地合，乃敢與君絕"], "note": "除非天崩地裂，否則不會放手。"}, {"title": "春江花月夜（續）", "author": "唐·張若虛", "body": ["白雲一片去悠悠", "青楓浦上不勝愁", "誰家今夜扁舟子", "何處相思明月樓", "", "可憐樓上月徘徊", "應照離人妝鏡臺", "玉戶簾中卷不去", "擣衣砧上拂還來"], "note": "月光是擋不住的，就像思念。"}, {"title": "夜上受降城聞笛", "author": "唐·李益", "body": ["回樂峯前沙似雪", "受降城外月如霜", "不知何處吹蘆管", "一夜徵人盡望鄉"], "note": "一支笛曲，讓所有人都望向故鄉。"}, {"title": "從軍行", "author": "唐·王昌齡", "body": ["青海長雲暗雪山", "孤城遙望玉門關", "黃沙百戰穿金甲", "不破樓蘭終不還"], "note": "有了目標，百戰也不退縮。"}, {"title": "旅宿", "author": "唐·杜牧", "body": ["旅館無良伴", "凝情自悄然", "寒燈思舊事", "斷雁警愁眠", "遠夢歸侵曉", "家書到隔年", "滄江好煙月", "門繫釣魚船"], "note": "在異鄉的夜晚，回憶是最好的良伴。"}, {"title": "秋思", "author": "唐·張籍", "body": ["洛陽城裡見秋風", "欲作家書意萬重", "復恐匆匆說不盡", "行人臨發又開封"], "note": "寫了又拆，拆了又寫——因為想說的太多了。"}, {"title": "憫農二首", "author": "唐·李紳", "body": ["鋤禾日當午", "汗滴禾下土", "誰知盤中餐", "粒粒皆辛苦", "", "春種一粒粟", "秋收萬顆子", "四海無閒田", "農夫猶餓死"], "note": "珍惜每一口食物，背後都是辛勤。"}, {"title": "長安秋望", "author": "唐·杜牧", "body": ["樓倚霜樹外", "鏡天無一毫", "南山與秋色", "氣勢兩相高"], "note": "秋天的氣勢，和南山一樣高。"}, {"title": "己亥歲", "author": "唐·曹松", "body": ["澤國江山入戰圖", "生民何計樂樵蘇", "憑君莫話封侯事", "一將功成萬骨枯"], "note": "每一份榮耀的背後，都有無數人的犧牲。"}, {"title": "寒食", "author": "唐·韓翃", "body": ["春城無處不飛花", "寒食東風御柳斜", "日暮漢宮傳蠟燭", "輕煙散入五侯家"], "note": "春天的花瓣，飛到每一個角落。"}, {"title": "春詞", "author": "唐·劉禹錫", "body": ["新妝宜面下朱樓", "深鎖春光一院愁", "行到中庭數花朵", "蜻蜓飛上玉搔頭"], "note": "數花朵的時候，蜻蜓也來湊熱鬧。"}, {"title": "後宮詞", "author": "唐·白居易", "body": ["淚濕羅巾夢不成", "夜深前殿按歌聲", "紅顏未老恩先斷", "斜倚薰籠坐到明"], "note": "等不到的回應，是最深的孤獨。"}, {"title": "柳枝詞", "author": "唐·劉禹錫", "body": ["清江一曲柳千條", "二十年前舊板橋", "曾與美人橋上別", "恨無消息到今朝"], "note": "有些人離開了，就再也沒有消息。"}, {"title": "楊柳枝", "author": "唐·白居易", "body": ["一樹春風千萬枝", "嫩於金色軟於絲", "永豐西角荒園裡", "盡日無人屬阿誰"], "note": "再美的風景，也需要有人欣賞。"}, {"title": "題菊花", "author": "唐·黃巢", "body": ["颯颯西風滿院栽", "蕊寒香冷蝶難來", "他年我若為青帝", "報與桃花一處開"], "note": "如果可以改變規則，讓所有花一起開放。"}, {"title": "不第後賦菊", "author": "唐·黃巢", "body": ["待到秋來九月八", "我花開後百花殺", "沖天香陣透長安", "滿城盡帶黃金甲"], "note": "等到屬於你的季節，就是你的天下。"}, {"title": "登科後", "author": "唐·孟郊", "body": ["昔日齷齪不足誇", "今朝放蕩思無涯", "春風得意馬蹄疾", "一日看盡長安花"], "note": "好消息來的時候，整個世界都在微笑。"}, {"title": "憫農（節選）", "author": "唐·李紳", "body": ["春種一粒粟", "秋收萬顆子", "四海無閒田", "農夫猶餓死"], "note": "播種與收穫之間，是漫長的等待和辛勞。"}, {"title": "秋夜將曉出籬門迎涼有感", "author": "宋·陸遊", "body": ["三萬裏河東入海", "五千仞嶽上摩天", "遺民淚盡胡塵裡", "南望王師又一年"], "note": "等待的人最辛苦。"}, {"title": "十一月四日風雨大作", "author": "宋·陸遊", "body": ["僵臥孤村不自哀", "尚思為國戍輪臺", "夜闌臥聯風吹雨", "鐵馬冰河入夢來"], "note": "即使在病榻上，夢裡依然在奔跑。"}, {"title": "書憤", "author": "宋·陸遊", "body": ["早歲那知世事艱，中原北望氣如山", "樓船夜雪瓜洲渡，鐵馬秋風大散關", "塞上長城空自許，鏡中衰鬢已先斑", "出師一表真名世，千載誰堪伯仲間"], "note": "年輕時的壯志，不要讓它白白老去。"}, {"title": "臨安春雨初霽", "author": "宋·陸遊", "body": ["世味年來薄似紗，誰令騎馬客京華", "小樓一夜聽春雨，深巷明朝賣杏花", "矮紙斜行閒作草，晴窗細乳戲分茶", "素衣莫起風塵嘆，猶及清明可到家"], "note": "聽一夜春雨，等明天的花。"}, {"title": "春夜", "author": "宋·王安石", "body": ["金爐香盡漏聲殘", "翦翦輕風陣陣寒", "春色惱人眠不得", "月移花影上欄杆"], "note": "春天太美，讓人捨不得睡。"}, {"title": "登飛來峯", "author": "宋·王安石", "body": ["飛來山上千尋塔", "聞說雞鳴見日升", "不畏浮雲遮望眼", "自緣身在最高層"], "note": "站得夠高，浮雲就遮不住你的眼。"}, {"title": "日出入行", "author": "唐·李白", "body": ["日出東方隈", "似從地底來", "歷天又復入西海", "自古及今行復回"], "note": "太陽每天都會升起，明天也是。"}, {"title": "子夜吳歌·秋歌", "author": "唐·李白", "body": ["長安一片月", "萬戶擣衣聲", "秋風吹不盡", "總是玉關情", "何日平胡虜", "良人罷遠徵"], "note": "月光下的思念，穿越了整座城。"}, {"title": "玉階怨", "author": "唐·李白", "body": ["玉階生白露", "夜久侵羅襪", "卻下水晶簾", "玲瓏望秋月"], "note": "什麼都沒說，卻什麼都說了。"}, {"title": "把酒問月", "author": "唐·李白", "body": ["青天有月來幾時", "我今停杯一問之", "人攀明月不可得", "月行卻與人相隨", "", "今人不見古時月", "今月曾經照古人", "古人今人若流水", "共看明月皆如此"], "note": "月亮陪了人類幾千年，今晚也陪著你。"}, {"title": "春思", "author": "唐·李白", "body": ["燕草如碧絲", "秦桑低綠枝", "當君懷歸日", "是妾斷腸時", "春風不相識", "何事入羅幃"], "note": "思念不需要理由，就像春風不需要邀請。"}, {"title": "宿業師山房期丁大不至", "author": "唐·孟浩然", "body": ["夕陽度西嶺", "羣壑倏已暝", "松月生夜涼", "風泉滿清聽", "樵人歸欲盡", "煙鳥棲初定", "之子期宿來", "孤琴候蘿徑"], "note": "抱著琴等你，等到月亮都出來了。"}, {"title": "題鶴林寺壁", "author": "唐·李涉", "body": ["終日昏昏醉夢間", "忽聞春盡強登山", "因過竹院逢僧話", "偷得浮生半日閒"], "note": "偷得浮生半日閒，就是最大的奢侈。"}, {"title": "溪上遇雨", "author": "唐·崔道融", "body": ["坐看黑雲銜猛雨", "噴灑前山此獨晴", "忽驚雲雨在頭上", "卻是山前晚照明"], "note": "天氣和人生一樣，變化無常纔是常態。"}, {"title": "除夜作", "author": "唐·高適", "body": ["旅館寒燈獨不眠", "客心何事轉淒然", "故鄉今夜思千里", "霜鬢明朝又一年"], "note": "又是一年，又大了一歲，也更懂了一些。"}, {"title": "絕句漫興九首·其五", "author": "唐·杜甫", "body": ["腸斷春江欲盡頭", "杖藜徐步立芳洲", "顛狂柳絮隨風去", "輕薄桃花逐水流"], "note": "隨風去吧，不必計較方向。"}, {"title": "江畔獨步尋花·其六", "author": "唐·杜甫", "body": ["黃四孃家花滿蹊", "千朵萬朵壓枝低", "留連戲蝶時時舞", "自在嬌鶯恰恰啼"], "note": "花開滿路的時候，連蝴蝶都捨不得離開。"}, {"title": "月夜憶舍弟", "author": "唐·杜甫", "body": ["戍鼓斷人行", "邊秋一雁聲", "露從今夜白", "月是故鄉明", "", "有弟皆分散", "無家問死生", "寄書長不達", "況乃未休兵"], "note": "月亮哪裡都一樣，但故鄉的那一輪最亮。"}, {"title": "寄人", "author": "唐·張泌", "body": ["別夢依依到謝家", "小廊回合曲闌斜", "多情只有春庭月", "猶為離人照落花"], "note": "月光為離人照著花落，這就是多情。"}, {"title": "淮上與友人別", "author": "唐·鄭谷", "body": ["揚子江頭楊柳春", "楊花愁殺渡江人", "數聲風笛離亭晚", "君向瀟湘我向秦"], "note": "你往南，我往北，但思念往同一個方向。"}, {"title": "金陵圖", "author": "唐·韋莊", "body": ["誰謂傷心畫不成", "畫人心逐世人情", "君看六幅南朝事", "老木寒雲滿古城"], "note": "傷心的事，畫出來也許就不那麼疼了。"}, {"title": "題金陵渡", "author": "唐·張祜", "body": ["金陵津渡小山樓", "一宿行人自可愁", "潮落夜江斜月裡", "兩三星火是瓜州"], "note": "遠處的燈火，是希望的方向。"}, {"title": "自遣", "author": "唐·羅隱", "body": ["得即高歌失即休", "多愁多恨亦悠悠", "今朝有酒今朝醉", "明日愁來明日愁"], "note": "今天的酒今天喝，明天的事明天說。"}, {"title": "蜂", "author": "唐·羅隱", "body": ["不論平地與山尖", "無限風光盡被佔", "採得百花成蜜後", "為誰辛苦為誰甜"], "note": "辛苦釀的蜜，願你自己也嚐到甜。"}, {"title": "詩品（節選）", "author": "南朝·鍾嶸", "body": ["氣之動物，物之感人", "故搖盪性情，形諸舞詠", "", "嘉會寄詩以親", "離羣託詩以怨", "至於楚臣去境", "漢妾辭宮", "或骨橫朔野", "或魂逐飛蓬", "或負戈外戍", "殺氣雄邊", "塞客衣單", "孀閨淚盡", "", "凡斯種種，感蕩心靈", "非陳詩何以展其義", "非長歌何以騁其情"], "note": "詩，是心靈被觸動後最自然的表達。"}, {"title": "遊園不值", "author": "宋·葉紹翁", "body": ["應憐屐齒印蒼苔", "小扣柴扉久不開", "春色滿園關不住", "一枝紅杏出牆來"], "note": "美好的事物，是關不住的。"}, {"title": "鄉村四月", "author": "宋·翁卷", "body": ["綠遍山原白滿川", "子規聲裡雨如煙", "鄉村四月閒人少", "才了蠶桑又插田"], "note": "忙碌也是一種充實。"}, {"title": "墨竹圖題詩", "author": "清·鄭燮", "body": ["衙齋臥聽蕭蕭竹", "疑是民間疾苦聲", "些小吾曹州縣吏", "一枝一葉總關情"], "note": "每一個小小的聲音，都值得被傾聽。"}, {"title": "所見", "author": "清·袁枚", "body": ["牧童騎黃牛", "歌聲振林樾", "意欲捕鳴蟬", "忽然閉口立"], "note": "專注的時刻，全世界都安靜了。"}, {"title": "苔", "author": "清·袁枚", "body": ["白日不到處", "青春恰自來", "苔花如米小", "也學牡丹開"], "note": "再小的花，也要努力綻放。"}, {"title": "村居", "author": "清·高鼎", "body": ["草長鶯飛二月天", "拂堤楊柳醉春煙", "兒童散學歸來早", "忙趁東風放紙鳶"], "note": "春天最快樂的事，就是放風箏。"}, {"title": "論詩", "author": "清·趙翼", "body": ["李杜詩篇萬口傳", "至今已覺不新鮮", "江山代有才人出", "各領風騷數百年"], "note": "每個時代都有屬於它的聲音。"}, {"title": "臨江仙·滾滾長江東逝水", "author": "明·楊慎", "body": ["滾滾長江東逝水", "浪花淘盡英雄", "是非成敗轉頭空", "青山依舊在", "幾度夕陽紅", "", "白髮漁樵江渚上", "慣看秋月春風", "一壺濁酒喜相逢", "古今多少事", "都付笑談中"], "note": "是非成敗轉頭空，笑一笑就好。"}, {"title": "明日歌", "author": "明·錢福", "body": ["明日復明日", "明日何其多", "我生待明日", "萬事成蹉跎", "", "世人苦被明日累", "春去秋來老將至", "朝看水東流", "暮看日西墜", "百年明日能幾何", "請君聽我明日歌"], "note": "不要等明天，今天就開始。"}, {"title": "詠煤炭", "author": "明·于謙", "body": ["鑿開混沌得烏金", "藏蓄陽和意最深", "爝火燃回春浩浩", "洪爐照破夜沉沉", "鼎彝元賴生成力", "鐵石猶存死後心", "但願蒼生俱飽暖", "不辭辛苦出山林"], "note": "但願每個人都溫飽，這就是最簡單的願望。"}, {"title": "過華清宮", "author": "唐·杜牧", "body": ["長安回望繡成堆", "山頂千門次第開", "一騎紅塵妃子笑", "無人知是荔枝來"], "note": "有些代價，旁人看不見。"}, {"title": "題烏江亭", "author": "唐·杜牧", "body": ["勝敗兵家事不期", "包羞忍恥是男兒", "江東子弟多才俊", "捲土重來未可知"], "note": "失敗不可怕，重要的是還有再來的勇氣。"}, {"title": "三衢道中", "author": "宋·曾幾", "body": ["梅子黃時日日晴", "小溪泛盡卻山行", "綠陰不減來時路", "添得黃鸝四五聲"], "note": "走回來的路上，多了幾聲鳥鳴。"}, {"title": "四時田園雜興", "author": "宋·范成大", "body": ["梅子金黃杏子肥", "麥花雪白菜花稀", "日長籬落無人過", "惟有蜻蜓蛺蝶飛"], "note": "夏日午後，只有蜻蜓和蝴蝶在忙。"}, {"title": "病起書懷", "author": "宋·陸遊", "body": ["病骨支離紗帽寬", "孤臣萬裏客江干", "位卑未敢忘憂國", "事定猶須待闔棺"], "note": "位卑未敢忘憂國。"}, {"title": "冬夜讀書示子聿", "author": "宋·陸遊", "body": ["古人學問無遺力", "少壯工夫老始成", "紙上得來終覺淺", "絕知此事要躬行"], "note": "光看書不夠，要親自去做才會真懂。"}, {"title": "文章千古事", "author": "唐·杜甫", "body": ["文章千古事", "得失寸心知", "作者皆殊列", "名聲豈浪垂"], "note": "寫下的每一個字，自己最清楚它的份量。"}, {"title": "夏日南亭懷辛大", "author": "唐·孟浩然", "body": ["山光忽西落", "池月漸東上", "散髮乘夕涼", "開軒臥閒敞", "荷風送香氣", "竹露滴清響", "欲取鳴琴彈", "恨無知音賞"], "note": "美好的夜晚，只缺一個知音。"}, {"title": "望洞庭湖贈張丞相", "author": "唐·孟浩然", "body": ["八月湖水平，涵虛混太清", "氣蒸雲夢澤，波撼嶽陽城", "欲濟無舟楫，端居恥聖明", "坐觀垂釣者，徒有羨魚情"], "note": "與其羨慕，不如行動。"}, {"title": "北青蘿", "author": "唐·李商隱", "body": ["殘陽西入崦", "茅屋訪孤僧", "落葉人何在", "寒雲路幾層", "獨敲初夜磬", "閒倚一枝藤", "世界微塵裡", "吾寧愛與憎"], "note": "世界如此微小，何必計較愛與恨。"}, {"title": "江上漁者", "author": "宋·范仲淹", "body": ["江上往來人", "但愛鱸魚美", "君看一葉舟", "出沒風波裡"], "note": "你眼中的美味，是他人的風浪。"}, {"title": "梅花", "author": "宋·王安石", "body": ["牆角數枝梅", "凌寒獨自開", "遙知不是雪", "為有暗香來"], "note": "在最冷的時候開花，是梅花教你的事。"}, {"title": "鳥鳴澗", "author": "唐·王維", "body": ["人閒桂花落", "夜靜春山空", "月出驚山鳥", "時鳴春澗中"], "note": "安靜到能聽見花落的夜晚，是一種奢侈。"}, {"title": "終南山", "author": "唐·王維", "body": ["太乙近天都", "連山接海隅", "白雲回望合", "青靄入看無", "分野中峯變", "陰晴眾壑殊", "欲投人處宿", "隔水問樵夫"], "note": "迷路的時候，找人問路就好。"}, {"title": "塞上曲", "author": "唐·王昌齡", "body": ["蟬鳴空桑林", "八月蕭關道", "出塞入塞寒", "處處黃蘆草", "從來幽並客", "皆共沙塵老", "不學遊俠兒", "矜誇紫騮好"], "note": "真正的強者，不需要炫耀。"}, {"title": "秋登宣城謝朓北樓", "author": "唐·李白", "body": ["江城如畫裡", "山曉望晴空", "兩水夾明鏡", "雙橋落彩虹", "人煙寒橘柚", "秋色老梧桐", "誰念北樓上", "臨風懷謝公"], "note": "站在高處思念古人，其實是在思念一種境界。"}, {"title": "暮秋獨遊曲江", "author": "唐·李商隱", "body": ["荷葉生時春恨生", "荷葉枯時秋恨成", "深知身在情長在", "悵望江頭江水聲"], "note": "只要人還在，情就在。"}, {"title": "鎖窗寒", "author": "宋·周邦彥", "body": ["暗柳啼鴉，單衣佇立", "小簾朱戶", "桐花半畝，靜鎖一庭愁雨"], "note": "被雨鎖住的午後，讓思緒自由飄散。"}, {"title": "虞美人·聽雨", "author": "宋·蔣捷", "body": ["少年聽雨歌樓上", "紅燭昏羅帳", "壯年聽雨客舟中", "江闊雲低、斷雁叫西風", "", "而今聽雨僧廬下", "鬢已星星也", "悲歡離合總無情", "一任階前、點滴到天明"], "note": "同樣的雨聲，不同的年紀有不同的感受。"}, {"title": "青玉案", "author": "宋·賀鑄", "body": ["凌波不過橫塘路", "但目送、芳塵去", "錦瑟華年誰與度", "月橋花院、瑣窗朱戶", "只有春知處", "", "飛雲冉冉蘅皋暮", "彩筆新題斷腸句", "試問閒情都幾許", "一川煙草、滿城風絮", "梅子黃時雨"], "note": "思念像梅雨季，綿綿密密。"}, {"title": "陽臺夢", "author": "宋・解", "body": ["仙姿本寓。", "十二峯前住。", "千里行雲行雨。", "偶因鶴馭過巫陽。", "邂逅他、楚襄王。", "無端宋玉誇才賦。", "誣誕人心素。", "至今狂客到陽臺。", "也有癡心，望妾入、夢中來。"], "note": "古詩是時間寄來的信。"}, {"title": "金鷄峯", "author": "宋・釋延壽", "body": ["松蘿高鎮夏長寒，透出羣峯畫恐難。", "造化功成彰五德，洞天雲散露花冠。"], "note": "古詩是時間寄來的信。"}, {"title": "頌", "author": "宋・釋德韶", "body": ["暫下高峯已顯揚，般若圜通遍十方。", "人天浩浩無差別，法界縱橫處處彰。"], "note": "詩是心靈的鏡子，映照真實的自己。"}, {"title": "贈浙西顧推官", "author": "宋・徐鉉", "body": ["盛府賓寮八十餘，閉門高臥興無如。", "梁王苑裏相逢早，澗浦城中得信疏。", "狼藉杯盤重會面，風流才調一如初。", "願君百歲猶強健，他日相尋隠士廬。"], "note": "古人的浪漫，藏在字裡行間。"}, {"title": "防有鵲巢", "author": "詩經", "body": ["防有鵲巢，邛有旨苕。誰侜予美？心焉忉忉。", "", "中唐有甓，邛有旨鷊。誰侜予美？心焉惕惕。"], "note": "在喧囂中讀一首詩，就是一次小小的旅行。"}, {"title": "擬古·予生未三十", "author": "清・納蘭性德", "body": ["予生未三十，憂愁居其半", "心事如落花，春風吹已斷", "行當適遠道，作記殊汗漫", "寒食青草多，薄暮煙冥冥", "山桃一夜紅，茵箔隨飄零", "願餐玉紅草，一醉不復醒"], "note": "讀詩如品茶，越慢越有味。"}, {"title": "塞垣春", "author": "宋・張先", "body": ["野樹秋聲滿。", "對雨壁、風燈亂。", "雲低翠帳，煙銷素被，籤動重幔。", "甚客懷、先自無消遣。", "更籬落、秋蟲嘆。", "嘆樊川、風流減。", "舊歡難得重見。", "停酒說揚州，平山月、應照棋觀。", "綠綺爲誰彈，空傳廣陵散。", "但光紗短帽，窄袖輕衫，猶記竹西庭院。", "老鶴何時去，認瓊花一面。"], "note": "詩教會我們，用另一種眼光看世界。"}, {"title": "野遊", "author": "宋・釋延壽", "body": ["獨步出衡茅，寒雲著地交。", "燒平多敗穴，葉落見危巢。"], "note": "一首詩，一杯茶，一段靜好時光。"}, {"title": "玉樹後庭花・後庭花", "author": "宋・張先", "body": ["華燈火樹紅相鬥。", "往來如晝。", "橋河水白天青，訝別生星斗。", "落梅穠李還依舊。", "寶釵沽酒。", "曉蟾殘漏心情，恨雕鞍歸後。"], "note": "每首詩都是一扇窗，通往另一個世界。"}, {"title": "賦得綵燕", "author": "宋・徐鉉", "body": ["縷綵成飛燕，迎和啟蟄時。", "翠翹生玉指，繡羽拂文楣。", "詎費銜泥力，無勞剪爪期。", "化工今在此，翻怪社來遲。"], "note": "有些情感，千年之後依然鮮活。"}, {"title": "送歐陽大監遊廬山", "author": "宋・徐鉉", "body": ["家家門外廬山路，唯有夫君乞假遊。", "案牘乍拋公署晚，林泉已近暑天秋。", "海潮盡處逢陶石，江月圓時上庾樓。", "此去蕭然好長往，人間何事不悠悠。"], "note": "詩是靈魂深處最柔軟的聲音。"}, {"title": "天闕山絕句", "author": "宋・徐鉉", "body": ["散誕愛山客，淒涼懷古心。", "寒風天闕晚，盡日倚軒吟。"], "note": "古人的智慧，凝結在這幾行字裡。"}, {"title": "攤破浣溪沙·風絮飄殘已化萍", "author": "清・納蘭性德", "body": ["風絮飄殘已化萍，泥蓮剛倩藕絲縈", "珍重別拈香一瓣，記前生", "人到情多情轉薄，而今真個悔多情", "又到斷腸回首處，淚偷零", " "], "note": "詩是最溫柔的力量。"}, {"title": "送寫真成處士入京", "author": "宋・徐鉉", "body": ["傳神蹤跡本來高，澤畔形容愧彩毫。", "京邑功臣多佇望，凌煙閣上莫辭勞。"], "note": "詩是最短的距離，連接兩顆心。"}, {"title": "上元日二首 二", "author": "唐・文宗皇帝", "body": ["蓂生三五葉初齊，上元羽客出桃蹊。", "不愛仙家登真訣，願蒙四海福黔黎。"], "note": "每一個字，都是一次深呼吸。"}, {"title": "望雪", "author": "唐・太宗皇帝", "body": ["凍雲宵徧嶺，素雪曉凝華。", "入牖千重碎，迎風一半斜。", "不妝空散粉，無樹獨飄花。", "縈空慙夕照，破彩謝晨霞。"], "note": "讀詩如品茶，越慢越有味。"}, {"title": "詠燭二首 一", "author": "唐・太宗皇帝", "body": ["燄聽風來動，花開不待春。", "鎮下千行淚，非是爲思人。"], "note": "在喧囂中讀一首詩，就是一次小小的旅行。"}, {"title": "送薛少卿赴青陽", "author": "宋・徐鉉", "body": ["我愛陶靖節，吏隠從絃歌。", "我愛費徵君，高臥歸九華。", "清風激頹波，來者何以加。", "我志兩不遂，漂淪浩無涯。", "數奇時且亂，此圖今愈賒。", "賢哉薛夫子，高舉凌晨霞。", "安民即是道，投足皆爲家。", "功名與權位，悠悠何用誇。", "攜朋出遠郊，酌酒藉平沙。", "雲收遠天靜，江闊片帆斜。", "離懷與企羨，南望長諮嗟。"], "note": "讓文字帶你走一段安靜的路。"}, {"title": "畫堂春·一生一代一雙人", "author": "清・納蘭性德", "body": ["一生一代一雙人，爭教兩處銷魂", "相思相望不相親，天爲誰春", "漿向藍橋易乞，藥成碧海難奔", "若容相訪飲牛津，相對忘貧"], "note": "最美的風景，往往藏在文字裡。"}, {"title": "歸去來", "author": "宋・柳永", "body": ["初過元宵三五。", "慵困春情緒。", "燈月闌珊嬉遊處。", "遊人盡、厭歡聚。", "憑仗如花女。", "持杯謝、酒朋詩侶。", "餘酲更不禁香醑。", "歌筵罷、且歸去。"], "note": "一字一句，皆是人間煙火。"}, {"title": "漸漸之石", "author": "詩經", "body": ["漸漸之石，維其高矣。山川悠遠，維其勞矣。武人東徵，不遑朝矣。", "", "漸漸之石，維其卒矣。山川悠遠，曷其沒矣？武人東徵，不遑出矣。", "", "有豕白蹢，烝涉波矣。月離於畢，俾滂沱矣。武人東徵，不皇他矣。"], "note": "山水之間，詩意自生。"}, {"title": "郊廟歌辭 武后大享昊天樂章 一", "author": "唐・不詳", "body": ["大陰凝至化，真耀蘊軒儀。", "德邁娥臺敞，仁高姒幄披。", "捫天遂啓極，夢日乃昇曦。"], "note": "詩人的眼睛，看見了我們忽略的美。"}, {"title": "於中好·獨背殘陽上小樓", "author": "清・納蘭性德", "body": ["獨背殘陽上小樓，誰家玉笛韻偏幽", "一行白雁遙天暮，幾點黃花滿地秋", "驚節序，嘆沉浮，穠華如夢水東流", "人間所事堪惆悵，莫向橫塘問舊遊", " "], "note": "在詩裡，我們都是歸人，不是過客。"}, {"title": "扈駕西山", "author": "清・納蘭性德", "body": ["鳳翥龍蟠勢作環，浮青不斷太行山", "九重殿閣蔥蘢裏，一氣風雲吐納間", "熊虎自當馳道伏，蛟螭長棒御書閒", "黃圖此日論形勝，慚愧頻叨侍從班"], "note": "讀詩，是與古人的一場對話。"}, {"title": "郊廟歌辭 朝日樂章 雍和", "author": "唐・不詳", "body": ["晨儀式薦，明祀惟光。", "神物爰止，靈暉載揚。", "玄端肅事，紫幄興祥。", "福履攸假，於昭允王。"], "note": "古人的浪漫，藏在字裡行間。"}, {"title": "冬日晚望", "author": "宋・陳摶", "body": ["山鬼煖或呼，溪魚寒不跳。", "晚景愈堪觀，危峯露殘照。"], "note": "詩人寫下的，是我們說不出口的心情。"}, {"title": "立春日遊苑迎春", "author": "唐・中宗皇帝", "body": ["神皐福地三秦邑，玉臺金闕九仙家。", "寒光猶戀甘泉樹，淑景偏臨建始花。", "綵蝶黃鸎未歌舞，梅香柳色已矜誇。", "迎春正啓流霞席，暫囑曦輪勿遽斜。"], "note": "文字的光芒，照亮了最暗的角落。"}, {"title": "鷓鴣天·雁貼寒雲次第飛", "author": "清・納蘭性德", "body": ["雁帖寒雲次第飛，向南猶自怨歸遲", "誰能瘦馬關山道，又到西風撲鬢時", "人杳杳，思依依，更無芳樹有烏啼", "憑將掃黛窗前月，持向今宵照別離", " "], "note": "文字的力量，在於它能跨越時空。"}, {"title": "慢卷綢", "author": "宋・柳永", "body": ["閒窗燭暗，孤幃夜永，敧枕難成寐。", "細屈指尋思，舊事前歡，都來未盡，平生深意。", "到得如今，萬般追悔。", "空只添憔悴。", "對好景良辰，皺著眉兒，成甚滋味。", "紅茵翠被。", "當時事、一一堪垂淚。", "怎生得依前，似恁偎香倚暖，抱著日高猶睡。", "算得伊家，也應隨分，煩惱心兒裏。", "又爭似從前，淡淡相看，免恁牽繫。"], "note": "讀詩的時候，世界暫停了一下。"}, {"title": "離歌辭五首  其一", "author": "宋・徐鉉", "body": ["莫折紅芳樹，但知盡意看。", "狂風幸無意，那忍折教殘。"], "note": "每一個字，都是一次深呼吸。"}, {"title": "郊廟歌辭 武后大享拜洛樂章 歸和", "author": "唐・不詳", "body": ["言旋雲洞兮躡煙途，永寧中宇兮安下都。", "包涵動植兮順榮枯，長貽寶貺兮贊璇圖。"], "note": "一首詩，一杯茶，一段靜好時光。"}, {"title": "秣陵懷古", "author": "清・納蘭性德", "body": ["山色江聲共寂寥，十三陵樹晚蕭蕭", "中原事業如江左，芳草何須怨六朝"], "note": "讀詩的時候，世界暫停了一下。"}, {"title": "郊廟歌辭 五郊樂章 黃帝宮音 舒和", "author": "唐・魏徵", "body": ["御徵乘宮出郊甸，安歌率舞遞將迎。", "自有雲門符帝賞，猶持雷鼓答天成。"], "note": "讀詩的時候，世界暫停了一下。"}, {"title": "虞美人·銀牀淅瀝青梧老", "author": "清・納蘭性德", "body": ["銀牀淅瀝青梧老，屧粉秋蛩掃", "採香行處蹙連錢，拾得翠翹何恨不能言", "迴廊一寸相思地，落月成孤倚", "背燈和月就花陰，已是十年蹤跡十年心"], "note": "千年前的月光，照亮今夜的窗。"}, {"title": "遊長寧公主流杯池二十五首 十一", "author": "唐・上官昭容", "body": ["暫爾遊山第，淹留惜未歸。", "霞窗明月滿，澗戶白雲飛。", "書引藤爲架，人將薜作衣。", "此真攀玩所，臨睨賞光輝。"], "note": "詩是最短的距離，連接兩顆心。"}, {"title": "胡搗練", "author": "宋・晏殊", "body": ["小桃花與早梅花，盡是芳妍品格。", "未上東風先拆。", "分付春消息。", "佳人釵上玉尊前，朵朵穠香堪惜。", "誰把彩豪描得。", "免恁輕拋擲。"], "note": "詩是心靈的鏡子，映照真實的自己。"}, {"title": "送彭秀才", "author": "宋・徐鉉", "body": ["賈生去國已三年，短褐閑行皖水邊。", "盡日野雲生舍下，有時京信到門前。", "無人與和投湘賦，愧子來浮訪戴船。", "滿袖新詩好迴去，莫隨騷客醉林泉。"], "note": "讀詩，是與古人的一場對話。"}, {"title": "生查子·短焰剔殘花", "author": "清・納蘭性德", "body": ["短焰剔殘花，夜久邊聲寂", "倦舞卻聞雞，暗覺青綾溼", "天水接冥濛，一角西南白", "欲渡浣花溪，遠夢輕無力"], "note": "在喧囂中讀一首詩，就是一次小小的旅行。"}, {"title": "促拍滿路花", "author": "宋・柳永", "body": ["香靨融春雪，翠鬢嚲秋煙。", "楚腰纖細正笄年。", "鳳幃夜短，偏愛日高眠。", "起來貪顛耍，只恁殘卻黛眉，不整花鈿。", "有時攜手閒坐，偎倚綠窗前。", "溫柔情態盡人憐。", "畫堂春過，悄悄落花天。", "最是嬌癡處，尤殢檀郎，未教拆了鞦韆。"], "note": "讀詩的時候，世界暫停了一下。"}, {"title": "羔裘", "author": "詩經", "body": ["羔裘如濡，洵直且侯。彼其之子，捨命不渝。", "", "羔裘豹飾，孔武有力。彼其之子，邦之司直。", "", "羔裘晏兮，三英粲兮。彼其之子，邦之彥兮。"], "note": "古詩是時間寄來的信。"}, {"title": "楊柳枝詞四首  其二", "author": "宋・孫光憲", "body": ["有池有榭即濛濛，浸潤翻成長養功。", "恰似有人長點檢，著行排立向春風。"], "note": "在喧囂中讀一首詩，就是一次小小的旅行。"}, {"title": "野有死麕", "author": "詩經", "body": ["野有死麕，白茅包之。有女懷春，吉士誘之。", "", "林有樸樕，野有死鹿。白茅純束，有女如玉。", "", "舒而脫脫兮，無感我帨兮，無使尨也吠。"], "note": "詩是最溫柔的力量。"}, {"title": "逢尤", "author": "王逸", "body": ["悲兮愁，哀兮憂！", "天生我兮當闇時，被諑譖兮虛獲尤。", "心煩憒兮意無聊，嚴載駕兮出戏遊。", "周八極兮歷九州，求軒轅兮索重華。", "世既卓兮遠眇眇，握佩玖兮中路躇。", "羨咎繇兮建典謨，懿風後兮受瑞圖。", "愍餘命兮遭六極，委玉質兮於泥塗。", "遽傽遑兮驅林澤，步屏營兮行丘阿。", "車軏折兮馬虺頹，惷悵立兮涕滂沱。", "思丁文兮聖明哲，哀平差兮迷謬愚。", "呂傅舉兮殷周興，忌嚭專兮郢吳虛。", "仰長嘆兮氣噎結，悒殟絕兮咶復甦。", "虎兕爭兮於廷中，豺狼鬥兮我之隅。", "雲霧會兮日冥晦，飄風起兮揚塵埃。", "走鬯罔兮乍東西，欲竄伏兮其焉如？", "念靈閨兮隩重深，原竭節兮隔無由。", "望舊邦兮路逶隨，憂心悄兮志勤劬。", "魂煢煢兮不遑寐，目眽眽兮寤終朝。"], "note": "詩是靈魂深處最柔軟的聲音。"}, {"title": "宴瑤池・越江吟", "author": "宋・歐陽修", "body": ["戀眼噥心終未改。", "向意間長在。", "都緣爲、顏色殊常，見餘花、盡無心愛。", "都爲是風流㬠。", "至他人、強來廝壤。", "從今後、若得相逢，繡幃裏、痛惜嬌態。"], "note": "詩是生活的調味料，讓平淡變得有味。"}, {"title": "破斧", "author": "詩經", "body": ["既破我斧，又缺我斨。周公東徵，四國是皇。哀我人斯，亦孔之將。", "", "既破我斧，又缺我錡。周公東徵，四國是遒。哀我人斯，亦孔之嘉。", "", "既破我斧，又缺我銶。周公東徵，四國是遒。哀我人斯，亦孔之休。"], "note": "讀詩如品茶，越慢越有味。"}, {"title": "惜賢", "author": "劉向", "body": ["覽屈氏之離騷兮，心哀哀而怫鬱。", "聲嗷嗷以寂寥兮，顧僕伕之憔悴。", "撥諂諛而匡邪兮，切淟涊之流俗。", "蕩渨涹之奸咎兮，夷蠢蠢之溷濁。", "懷芬香而挾蕙兮，佩江蘺之婓婓。", "握申椒與杜若兮，冠浮雲之峨峨。", "登長陵而四望兮，覽芷圃之蠡蠡。", "遊蘭皋與蕙林兮，睨玉石之嵾嵯。", "揚精華以炫燿兮，芳鬱渥而純美。", "結桂樹之旖旎兮，紉荃蕙與辛夷。", "芳若茲而不御兮，捐林薄而菀死。", "驅子僑之奔走兮，申徒狄之赴淵。", "若由夷之純美兮，介子推之隱山。", "晉申生之離殃兮，荊和氏之泣血。", "吳申胥之抉眼兮，王子比干之橫廢。", "欲卑身而下體兮，心隱惻而不置。", "方圜殊而不合兮，鉤繩用而異態。", "欲俟時於須臾兮，日陰曀其將暮。", "時遲遲其日進兮，年忽忽而日度。", "妄周容而入世兮，內距閉而不開。", "俟時風之清激兮，愈氛霧其如塺。", "進雄鳩之耿耿兮，讒介介而蔽之。", "默順風以偃仰兮，尚由由而進之。", "心懭悢以冤結兮，情舛錯以曼憂。", "搴薜荔于山野兮，採撚支於中洲。", "望高丘而嘆涕兮，悲吸吸而長懷。", "孰契契而委棟兮，日晻晻而下頹。", "嘆曰：", "江湘油油長流汩兮，挑揄揚汰蕩迅疾兮。", "憂心展轉愁怫鬱兮，冤結未舒長隱忿兮，", "丁時逢殃可奈何兮，勞心悁悁涕滂沱兮。"], "note": "千年前的月光，照亮今夜的窗。"}, {"title": "郊廟歌辭 祀風師樂章 奠幣登歌", "author": "唐・包佶", "body": ["旨酒告絜，青蘋應候。", "禮陳瑤幣，樂獻金奏。", "彈弦自昔，解凍惟舊。", "仰瞻肸蠁，羣祥來湊。"], "note": "在文字的世界裡，時間是靜止的。"}, {"title": "琵琶仙·中秋", "author": "清・納蘭性德", "body": ["碧海年年，試問取、冰輪爲誰圓缺", "吹到一片秋香，清輝瞭如雪", "愁中看、好天良夜，知道盡成悲咽", "隻影而今，那堪重對，舊時明月", "花徑裏、戲捉迷藏，曾惹下蕭蕭井梧葉", "記否輕紈小扇，又幾番涼熱", "只落得，填膺百感，總茫茫、不關離別。", "一任紫玉無情，夜寒吹裂"], "note": "文字如水，潤物無聲。"}, {"title": "詠梅子真送郭先輩", "author": "宋・徐鉉", "body": ["忠臣本愛君，仁人本愛民。", "寧知貴與賤，豈計名與身。", "梅生爲一尉，獻疏來君門。", "君門深萬裏，金虎重千鈞。", "向永且不用，況復論子真。", "拂衣遂長往，高節邈無鄰。", "至今仙籍中，謂之梅真人。", "郭生負逸氣，百代繼遺塵。", "進退生自知，得喪吾不陳。", "斯民苟有幸，期子一朝伸。"], "note": "有些情感，千年之後依然鮮活。"}, {"title": "終風", "author": "詩經", "body": ["終風且暴，顧我則笑，謔浪笑敖，中心是悼。", "", "終風且霾，惠然肯來，莫往莫來，悠悠我思。", "", "終風且曀，不日有曀，寤言不寐，願言則嚏。", "", "曀曀其陰，虺虺其雷，寤言不寐，願言則懷。"], "note": "文字的力量，在於它能跨越時空。"}, {"title": "送賀知章歸四明", "author": "唐・明皇帝", "body": ["遺榮期入道，辭老竟抽簪。", "豈不惜賢達，其如高尚心。", "寰中得祕要，方外散幽襟。", "獨有青門餞，羣僚悵別深。"], "note": "古人的智慧，凝結在這幾行字裡。"}, {"title": "風雨", "author": "詩經", "body": ["風雨悽悽，雞鳴喈喈，既見君子。雲胡不夷？", "", "風雨瀟瀟，雞鳴膠膠。既見君子，雲胡不瘳？", "", "風雨如晦，雞鳴不已。既見君子，雲胡不喜？"], "note": "讀詩如品茶，越慢越有味。"}, {"title": "陶使君輓歌二首  其一", "author": "宋・徐鉉", "body": ["太守今何在，行春去不歸。", "筵空收管吹，郊迥儼驂騑。", "營外星纔落，園中露已晞。", "傷心樑上燕，猶解向人飛。"], "note": "詩是生活的調味料，讓平淡變得有味。"}, {"title": "賦得花庭霧", "author": "唐・太宗皇帝", "body": ["蘭氣已燻宮，新橤半粧叢。", "色含輕重霧，香引去來風。", "拂樹濃舒碧，縈花薄蔽紅。", "還當雜行雨，髣髴隱遙空。"], "note": "有些情感，千年之後依然鮮活。"}, {"title": "題殷舍人宅木芙蓉", "author": "宋・徐鉉", "body": ["憐君庭下木芙蓉，嫋嫋纖枝淡淡紅。", "曉吐芳心零宿露，晚搖嬌影媚清風。", "似含情態愁秋雨，暗減馨香借菊叢。", "默飲數杯應未稱，不知歌管與誰同。"], "note": "靜下心來，聽見詩裡的風聲。"}, {"title": "朝玉階・朝天子", "author": "宋・杜安世", "body": ["春色欺人拂眼清。", "柳條綠絲軟，雪花輕。", "黃金才鉞掩銀屏。", "陰沈深院靜，語嬌鶯。", "美人春困寶釵橫。", "惜花芳態，淚盈盈。", "風流何處最多情。", "千金一笑，須信傾城。"], "note": "在文字的世界裡，時間是靜止的。"}, {"title": "郊廟歌辭 封泰山樂章 豫和 三", "author": "唐・張說", "body": ["相百辟，貢八荒。", "九歌敍，萬舞翔。", "肅振振，鏗皇皇。", "帝欣欣，福穰穰。"], "note": "最美的風景，往往藏在文字裡。"}, {"title": "郊廟歌辭 武后大享昊天樂章 十一", "author": "唐・不詳", "body": ["禮終肆類，樂闋九成。", "仰惟明德，敢薦非馨。", "顧慙菲奠，久駐雲軿。", "瞻荷靈澤，悚戀兼盈。"], "note": "文字的光芒，照亮了最暗的角落。"}, {"title": "郊廟歌辭 五郊樂章 白帝商音 肅和", "author": "唐・魏徵", "body": ["金行在節，素靈居正。", "氣肅霜嚴，林彫草勁。", "豺祭隼擊，潦收川鏡。", "九穀已登，萬箱流詠。"], "note": "在喧囂中讀一首詩，就是一次小小的旅行。"}, {"title": "如夢令·木葉紛紛歸路", "author": "清・納蘭性德", "body": ["木葉紛紛歸路", "殘月曉風何處", "消息半浮沈，今夜相思幾許", "秋雨，秋雨", "一半西風吹去"], "note": "在文字的世界裡，時間是靜止的。"}, {"title": "白馬峯", "author": "宋・釋延壽", "body": ["湖外層峯瀉危瀑，天際陰陰長寒木。", "南北行人望莫窮，秋雲一片橫幽谷。"], "note": "在古老的文字裡，找到今天的自己。"}, {"title": "輓辭 一", "author": "唐・後主煜", "body": ["珠碎眼前珍，花凋世外春。", "未銷心裏恨，又失掌中身。", "玉笥猶殘藥，香匳已染塵。", "前哀將後感，無淚可霑巾。"], "note": "在詩裡，我們都是歸人，不是過客。"}, {"title": "衡門", "author": "詩經", "body": ["衡門之下，可以棲遲。泌之洋洋，可以樂飢。", "", "豈其食魚，必河之魴？豈其取妻，必齊之姜？", "", "豈其食魚，必河之鯉？豈其取妻，必宋之子？"], "note": "文字的光芒，照亮了最暗的角落。"}, {"title": "郊廟歌辭 夕月樂章 雍和", "author": "唐・不詳", "body": ["朏晨爭舉，天宗禮闢。", "夜典涼秋，陰明湛夕。", "有𨣧斯旨，有牲斯碩。", "穆穆其暉，穰穰是積。"], "note": "讀詩，是與古人的一場對話。"}, {"title": "思美人", "author": "屈原", "body": ["思美人兮，攬涕而竚眙。", "媒絕路阻兮，言不可結而詒。", "蹇蹇之煩冤兮，陷滯而不發。", "申旦以舒中情兮，志沉菀而莫達。", "願寄言於浮雲兮，遇豐隆而不將。", "因歸鳥而致辭兮，羌迅高而難當。", "高辛之靈盛兮，遭玄鳥而致詒。", "欲變節以從俗兮，媿易初而屈志。", "獨歷年而離愍兮，羌憑心猶未化。", "寧隱閔而壽考兮，何變易之可爲！", "知前轍之不遂兮，未改此度。", "車既覆而馬顛兮，蹇獨懷此異路。", "勒騏驥而更駕兮，造父爲我操之，", "遷逡次而勿驅兮，聊假日以須是時。", "指嶓冢之西隈兮，與纁黃以爲期。", "開春發歲兮，白日出之悠悠。", "吾將蕩志而愉樂兮，遵江夏以娛憂。", "攬大薄之芳茝兮，搴長洲之宿莽。", "惜吾不及古人兮，吾誰與玩此芳草？", "解萹薄與雜菜兮，備以爲交佩。", "佩繽紛以繚轉兮，遂萎絕而離異。", "吾且儃徊以娛憂兮，觀南人之變態。", "竊快在中心兮，揚厥憑而不竢。", "芳與澤其雜糅兮，羌芳華自中出。", "紛鬱鬱其遠蒸兮，滿內而外揚。", "情與質信可保兮，羌居蔽而聞章。", "令薜荔以爲理兮，憚舉趾而緣木。", "因芙蓉而爲媒兮，憚褰裳而濡足。", "登高吾不說兮，入下吾不能。", "固朕形之不服兮，然容與而狐疑。", "廣遂前畫兮，未改此度也。", "命則處幽吾將罷兮，願及白日之未暮也。", "獨煢煢而南行兮，思彭咸之故也。"], "note": "一字一句，皆是人間煙火。"}, {"title": "送玄同真人李抱朴謁灊山仙祠", "author": "唐・明皇帝", "body": ["城闕天中近，蓬瀛海上遙。", "歸期千載鶴，春至一來朝。", "採藥逢三秀，餐霞臥九霄。", "參同如有旨，金鼎待君燒。"], "note": "文字裡藏著千年的心事。"}, {"title": "早度蒲津關", "author": "唐・明皇帝", "body": ["鐘鼓嚴更曙，山河野望通。", "鳴鑾下蒲坂，飛斾入秦中。", "地險關逾壯，天平鎮尚雄。", "春來津樹合，月落戍樓空。", "馬色分朝景，雞聲逐曉風。", "所希常道泰，非復候繻同。"], "note": "每首詩，都是一場與自己的相遇。"}, {"title": "還陝述懷", "author": "唐・太宗皇帝", "body": ["慨然撫長劒，濟世豈邀名。", "星旂紛電舉，日羽肅天行。", "徧野屯萬騎，臨原駐五營。", "登山麾武節，背水縱神兵。", "在昔戎戈動，今來宇宙平。"], "note": "古詩是時間寄來的信。"}, {"title": "下泉", "author": "詩經", "body": ["冽彼下泉，浸彼苞稂。愾我寤嘆，念彼周京。", "", "冽彼下泉，浸彼苞蕭。愾我寤嘆，念彼京周。", "", "冽彼下泉，浸彼苞蓍。愾我寤嘆，念彼京師。", "", "芃芃黍苗，陰雨膏之。四國有王，郇伯勞之。"], "note": "詩教會我們，用另一種眼光看世界。"}, {"title": "詠毛女", "author": "宋・陳摶", "body": ["曾折松枝爲寶櫛，又編慄葉作羅襦。", "有時問著秦宮事，笑撚仙花望太虛。"], "note": "靜下心來，聽見詩裡的風聲。"}, {"title": "狼跋", "author": "詩經", "body": ["狼跋其胡，載疐其尾。公孫碩膚，赤舄几几。", "", "狼疐其尾，載跋其胡。公孫碩膚，德音不瑕？"], "note": "一字一句，皆是人間煙火。"}, {"title": "寄江州蕭給事", "author": "宋・徐鉉", "body": ["夕郎憂國不憂身，今向天涯作逐臣。", "魂夢暗馳龍闕曙，嘯吟閒繞虎谿春。", "朝車載酒過山寺，諫紙題詩寄野人。", "惆悵懦夫何足道，自離羣後已同塵。"], "note": "詩人用最少的字，說最多的話。"}, {"title": "採綠", "author": "詩經", "body": ["終朝採綠，不盈一匊。予發曲局，薄言歸沐。", "", "終朝採藍，不盈一襜。五日爲期，六日不詹。", "", "之子於狩，言韔其弓。之子於釣，言綸之繩。", "", "其釣維何？維魴及鱮。維魴及鱮，薄言觀者。"], "note": "有些情感，千年之後依然鮮活。"}, {"title": "江邊秋夕", "author": "宋・譚用之", "body": ["千鍾紫酒薦菖蒲，松島蘭舟瀲灩居。", "曲內橘香江客笛，字中嵐氣嶽僧書。", "吟期汗漫驅金虎，坐約丹青跨玉魚。", "七色花虯一聲鶴，幾時乘興上清虛。"], "note": "讀詩如品茶，越慢越有味。"}, {"title": "陪王庶子游後湖涵虛閣", "author": "宋・徐鉉", "body": ["懸圃清虛乍過秋，看山尋水上茲樓。", "輕鷗的的飛難沒，紅葉紛紛晚更稠。", "風卷微雲分遠岫，浪搖晴日照中州。", "躋攀況有承華客，如在南皮奉勝遊。"], "note": "讀詩的時候，世界暫停了一下。"}, {"title": "初入秦川路逢寒食", "author": "唐・明皇帝", "body": ["洛陽芳樹映天津，灞岸垂楊窣地新。", "直爲經過行處樂，不知虛度兩京春。", "去年餘閏今春早，曙色和風著花草。", "可憐寒食與清明，光輝幷在長安道。", "自從關路入秦川，爭道何人不戲鞭。", "公子途中妨蹴踘，佳人馬上廢鞦韆。", "渭水長橋今欲渡，蔥蔥漸見新豐樹。", "遠看驪岫入雲霄，預想湯池起煙霧。", "煙霧氛氳水殿開，暫拂香輪歸去來。", "今歲清明行已晚，明年寒食更相陪。"], "note": "一首詩，一杯茶，一段靜好時光。"}, {"title": "郊廟歌辭 祀圜丘樂章 豫和", "author": "唐・褚亮", "body": ["上靈睠命膺會昌，盛德殷薦葉辰良。", "景福降兮聖德遠，玄化穆兮天曆長。"], "note": "詩不需要讀懂，只需要感受。"}, {"title": "生查子·東風不解愁", "author": "清・納蘭性德", "body": ["東風不解愁，偷展湘裙衩", "獨夜背紗籠，影著纖腰畫", "爇盡水沉煙，露滴鴛鴦瓦", "花骨冷宜香，小立櫻桃下"], "note": "詩人的眼睛，看見了我們忽略的美。"}, {"title": "眼兒媚·重見星娥碧海槎", "author": "清・納蘭性德", "body": ["重見星娥碧海槎，忍笑卻盤鴉", "尋常多少，月明風細，今夜偏佳", "休籠彩筆閒書字，街鼓巳三撾", "菸絲欲嫋，露光微泫，春在桃花"], "note": "在詩裡，我們都是歸人，不是過客。"}, {"title": "虞美人·殘燈風滅爐煙冷", "author": "清・納蘭性德", "body": ["殘燈風滅爐煙冷，相伴唯孤影", "判教狼藉醉清樽，爲問世間醒眼是何人", "難逢易散花間酒，飲罷空搔首", "閒愁總付醉來眠，只恐醒時依舊到樽前", " "], "note": "有些感動，只有詩能說清楚。"}, {"title": "送道士薛季昌還山", "author": "唐・明皇帝", "body": ["洞府修真客，衡陽念舊居。", "將成金闕要，願奉玉清書。", "雲路三天近，松溪萬籟虛。", "猶期傳祕訣，來往候仙輿。"], "note": "讓文字帶你走一段安靜的路。"}, {"title": "唐明堂樂章 商音", "author": "唐・則天皇后", "body": ["律中夷則，序應收成。", "功宣建武，義表惟明。", "爰申禮奠，庶展翹誠。", "九秋是式，百穀斯盈。"], "note": "千年前的月光，照亮今夜的窗。"}, {"title": "怨世", "author": "東方朔", "body": ["世沉淖而難論兮，俗岒峨而嵾嵯。", "清泠泠而殲滅兮，溷湛湛而日多。", "梟鴞既以成羣兮，玄鶴弭翼而屏移。", "蓬艾親入御於牀笫兮，馬蘭踸踔而日加。", "棄捐藥芷與杜衡兮，餘柰世之不知芳何？",
