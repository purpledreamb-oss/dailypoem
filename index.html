   "牢盆狎客操全算，團扇才人踞上游。",
   "避席畏聞文字獄，著書都為稻粱謀。",
   "田橫五百人安在，難道歸來盡列侯？"
  ],
  "note": "文字獄下著書只為稻粱，是一個時代最大的悲哀。"
 },
 {
  "title": "所見",
  "author": "清・袁枚",
  "body": [
   "牧童騎黃牛，歌聲振林樾。",
   "意欲捕鳴蟬，忽然閉口立。"
  ],
  "note": "牧童捕蟬的瞬間，是童年最天真的定格。"
 },
 {
  "title": "馬嵬",
  "author": "清・袁枚",
  "body": [
   "莫唱當年長恨歌，人間亦自有銀河。",
   "石壕村裏夫妻別，淚比長生殿上多。"
  ],
  "note": "百姓的離別之淚，遠比帝妃的悲劇更值得書寫。"
 },
 {
  "title": "苔",
  "author": "清・袁枚",
  "body": [
   "白日不到處，青春恰自來。",
   "苔花如米小，也學牡丹開。"
  ],
  "note": "苔花如米小也學牡丹開，每個生命都有綻放的權利。"
 },
 {
  "title": "遣興",
  "author": "清・袁枚",
  "body": [
   "愛好由來下筆難，一詩千改始心安。",
   "阿婆還似初笄女，頭未梳成不許看。"
  ],
  "note": "好詩如少女梳妝，未成之前不許人看。"
 },
 {
  "title": "隨園詩話（節選）",
  "author": "清・袁枚",
  "body": [
   "蠶食如蠶吐如絲，活人性情是我師。",
   "詩者人之性情也，性情無古今。",
   "有性情便有詩，無性情便無詩。"
  ],
  "note": "有性情便有詩，最好的詩論不過六個字。"
 },
 {
  "title": "竹石",
  "author": "清・鄭板橋",
  "body": [
   "咬定青山不放鬆，立根原在破巖中。",
   "千磨萬擊還堅勁，任爾東西南北風。"
  ],
  "note": "咬定青山任風吹，是最硬氣的人生態度。"
 },
 {
  "title": "濰縣署中畫竹呈年伯包大中丞括",
  "author": "清・鄭板橋",
  "body": [
   "衙齋臥聽蕭蕭竹，疑是民間疾苦聲。",
   "些小吾曹州縣吏，一枝一葉總關情。"
  ],
  "note": "一枝一葉總關情，好官的心裡裝著百姓。"
 },
 {
  "title": "題畫蘭",
  "author": "清・鄭板橋",
  "body": [
   "身在千山頂上頭，突巖深縫妙香稠。",
   "非無腳下浮雲鬧，來不相知去不留。"
  ],
  "note": "浮雲來去不相知，蘭花只管自己清香。"
 },
 {
  "title": "紅樓夢・葬花吟（節選）",
  "author": "清・曹雪芹",
  "body": [
   "花謝花飛花滿天，紅消香斷有誰憐？",
   "遊絲軟繫飄春榭，落絮輕沾撲繡簾。",
   "",
   "一年三百六十日，風刀霜劍嚴相逼。",
   "明媚鮮妍能幾時，一朝漂泊難尋覓。",
   "",
   "試看春殘花漸落，便是紅顏老死時。",
   "一朝春盡紅顏老，花落人亡兩不知！"
  ],
  "note": "花落人亡兩不知，是紅樓夢中最淒美的讖語。"
 },
 {
  "title": "紅樓夢・好了歌",
  "author": "清・曹雪芹",
  "body": [
   "世人都曉神仙好，惟有功名忘不了！",
   "古今將相在何方？荒塚一堆草沒了。",
   "",
   "世人都曉神仙好，只有金銀忘不了！",
   "終朝只恨聚無多，及到多時眼閉了。",
   "",
   "世人都曉神仙好，只有嬌妻忘不了！",
   "君生日日說恩情，君死又隨人去了。",
   "",
   "世人都曉神仙好，只有兒孫忘不了！",
   "癡心父母古來多，孝順兒孫誰見了？"
  ],
  "note": "功名金銀嬌妻兒孫，到頭來都是一場空。"
 },
 {
  "title": "紅樓夢・枉凝眉",
  "author": "清・曹雪芹",
  "body": [
   "一個是閬苑仙葩，一個是美玉無瑕。",
   "若說沒奇緣，今生偏又遇著他；",
   "若說有奇緣，如何心事終虛化？",
   "一個枉自嗟呀，一個空勞牽掛。",
   "一個是水中月，一個是鏡中花。",
   "想眼中能有多少淚珠兒，",
   "怎經得秋流到冬盡，春流到夏！"
  ],
  "note": "水中月鏡中花，最美的愛情終究是一場虛化。"
 },
 {
  "title": "紅樓夢・聰明累",
  "author": "清・曹雪芹",
  "body": [
   "機關算盡太聰明，反算了卿卿性命。",
   "生前心已碎，死後性空靈。",
   "家富人寧，終有個家亡人散各奔騰。",
   "枉費了意懸懸半世心，好一似蕩悠悠三更夢。",
   "忽喇喇似大廈傾，昏慘慘似燈將盡。",
   "呀！一場歡喜忽悲辛，嘆人世終難定！"
  ],
  "note": "機關算盡反誤了性命，聰明反被聰明誤。"
 },
 {
  "title": "綺懷（其十五）",
  "author": "清・黃景仁",
  "body": [
   "幾回花下坐吹簫，銀漢紅牆入望遙。",
   "似此星辰非昨夜，為誰風露立中宵。",
   "纏綿思盡抽殘繭，宛轉心傷剝後蕉。",
   "三五年時三五月，可憐杯酒不曾消。"
  ],
  "note": "為誰風露立中宵——是問天問地也問自己。"
 },
 {
  "title": "別老母",
  "author": "清・黃景仁",
  "body": [
   "搴帷拜母河梁去，白髮愁看淚眼枯。",
   "慘慘柴門風雪夜，此時有子不如無。"
  ],
  "note": "風雪夜別老母，有子不如無的自責痛徹心扉。"
 },
 {
  "title": "雜感",
  "author": "清・黃景仁",
  "body": [
   "仙佛茫茫兩未成，只知獨夜不平鳴。",
   "風蓬飄盡悲歌氣，泥絮沾來薄倖名。",
   "十有九人堪白眼，百無一用是書生。",
   "莫因詩卷愁成讖，春鳥秋蟲自作聲。"
  ],
  "note": "百無一用是書生，讀書人最深的自嘲與不甘。"
 },
 {
  "title": "癸巳除夕偶成",
  "author": "清・黃景仁",
  "body": [
   "千家笑語漏遲遲，憂患潛從物外知。",
   "悄立市橋人不識，一星如月看多時。"
  ],
  "note": "萬家歡笑中獨立橋頭，孤獨者的除夕最為冷清。"
 },
 {
  "title": "日知錄・正始",
  "author": "清・顧炎武",
  "body": [
   "有亡國，有亡天下。亡國與亡天下奚辨？",
   "曰：易姓改號，謂之亡國；",
   "仁義充塞，而至於率獸食人，人將相食，謂之亡天下。",
   "",
   "是故知保天下，然後知保其國。",
   "保國者，其君其臣肉食者謀之；",
   "保天下者，匹夫之賤與有責焉耳矣。"
  ],
  "note": "天下興亡匹夫有責，是中國知識分子最沉重的擔當。"
 },
 {
  "title": "精衛",
  "author": "清・顧炎武",
  "body": [
   "萬事有不平，爾何空自苦。",
   "長將一寸身，銜木到終古。",
   "我願平東海，身沉心不改。",
   "大海無平期，我心無絕時。"
  ],
  "note": "大海無平期我心無絕時，是最堅定的復國之志。"
 },
 {
  "title": "又酬傅處士次韻",
  "author": "清・顧炎武",
  "body": [
   "清切頻吹越石笳，窮愁猶駕阮生車。",
   "時當漢臘遺臣祭，義激韓讎舊相家。",
   "陵闕生哀回夕照，河山垂淚發春花。",
   "相將教授綏方略，猶及清明澆墓茶。"
  ],
  "note": "山河垂淚春花含悲，遺民的哀痛寫在每一個季節。"
 },
 {
  "title": "蝶戀花",
  "author": "清・王國維",
  "body": [
   "閱盡天涯離別苦，不道歸來，零落花如許。",
   "花底相看無一語，綠窗春與天俱暮。",
   "",
   "待把相思燈下訴，一縷新歡，舊恨千千縷。",
   "最是人間留不住，朱顏辭鏡花辭樹。"
  ],
  "note": "朱顏辭鏡花辭樹，留不住的都是最美好的。"
 },
 {
  "title": "浣溪沙",
  "author": "清・王國維",
  "body": [
   "山寺微茫背夕曛，鳥飛不到半山昏。上方孤磬定行雲。",
   "",
   "試上高峰窺皓月，偶開天眼覷紅塵。可憐身是眼中人。"
  ],
  "note": "試圖跳出紅塵卻發現自己就是紅塵中人。"
 },
 {
  "title": "人間詞話（節選）",
  "author": "清・王國維",
  "body": [
   "古今之成大事業、大學問者，必經過三種之境界：",
   "「昨夜西風凋碧樹。獨上高樓，望盡天涯路。」此第一境也。",
   "「衣帶漸寬終不悔，為伊消得人憔悴。」此第二境也。",
   "「眾裏尋他千百度，驀然回首，那人卻在，燈火闌珊處。」此第三境也。"
  ],
  "note": "三種境界道盡了成就大事業的必經之路。"
 },
 {
  "title": "點絳唇",
  "author": "清・王國維",
  "body": [
   "屏卻相思，近來知道都無益。",
   "不成抛擲，夢裏來相覓。",
   "",
   "訂了三生，都道前生事。",
   "如何是？似曾相識，一笑迎人醉。"
  ],
  "note": "屏卻相思卻又在夢裡相覓，是理智與情感的永恆矛盾。"
 },
 {
  "title": "臨終詩",
  "author": "清・林則徐",
  "body": [
   "力微任重久神疲，再竭衰庸定不支。",
   "苟利國家生死以，豈因禍福避趨之。",
   "謫居正是君恩厚，養拙剛於戍卒宜。",
   "戲與山妻談故事，試吟斷送老頭皮。"
  ],
  "note": "苟利國家生死以，豈因禍福避趨之——最沉重的家國擔當。"
 },
 {
  "title": "出嘉峪關感賦",
  "author": "清・林則徐",
  "body": [
   "嚴關百尺界天西，萬里征人駐馬蹄。",
   "飛閣遙連秦樹直，繚垣斜壓隴雲低。",
   "天山巉削摩肩立，瀚海蒼茫入望迷。",
   "誰道崤函千古險？回看只見一丸泥。"
  ],
  "note": "崤函千古險在嘉峪關前不過一丸泥，格局決定視野。"
 },
 {
  "title": "對酒",
  "author": "清・秋瑾",
  "body": [
   "不惜千金買寶刀，貂裘換酒也堪豪。",
   "一腔熱血勤珍重，灑去猶能化碧濤。"
  ],
  "note": "一腔熱血灑去化碧濤，女俠的氣概不讓鬚眉。"
 },
 {
  "title": "鷓鴣天・祖國沉淪感不禁",
  "author": "清・秋瑾",
  "body": [
   "祖國沉淪感不禁，閒來海外覓知音。",
   "金甌已缺總須補，為國犧牲敢惜身！",
   "",
   "嗟險阻，嘆飄零。關山萬里作雄行。",
   "休言女子非英物，夜夜龍泉壁上鳴。"
  ],
  "note": "休言女子非英物，秋瑾以生命證明了這句話。"
 },
 {
  "title": "讀陸放翁集",
  "author": "清・梁啟超",
  "body": [
   "詩界千年靡靡風，兵魂銷盡國魂空。",
   "集中什九從軍樂，亘古男兒一放翁。"
  ],
  "note": "亘古男兒一放翁，是對陸游最高的評價。"
 },
 {
  "title": "少年中國說（節選）",
  "author": "清・梁啟超",
  "body": [
   "少年智則國智，少年富則國富；",
   "少年強則國強，少年獨立則國獨立；",
   "少年自由則國自由，少年進步則國進步；",
   "少年勝於歐洲則國勝於歐洲，少年雄於地球則國雄於地球。",
   "",
   "紅日初升，其道大光。河出伏流，一瀉汪洋。",
   "美哉，我少年中國，與天不老！",
   "壯哉，我中國少年，與國無疆！"
  ],
  "note": "少年強則國強，百年前的呼喚至今振聾發聵。"
 },
 {
  "title": "獄中題壁",
  "author": "清・譚嗣同",
  "body": [
   "望門投止思張儉，忍死須臾待杜根。",
   "我自橫刀向天笑，去留肝膽兩崑崙。"
  ],
  "note": "橫刀向天笑，以血肉之軀換來維新的火種。"
 },
 {
  "title": "題壁",
  "author": "清・譚嗣同",
  "body": [
   "關河亦有未招魂，況復英雄飲恨吞。",
   "世間無物抵春愁，合向蒼冥一哭昏。"
  ],
  "note": "世間無物抵春愁，是志士壯懷激烈的悲鳴。"
 },
 {
  "title": "雜詩",
  "author": "清・龔自珍",
  "body": [
   "不論鹽鐵不籌河，獨倚東南涕淚多。",
   "國賦三升民一斗，屠牛那不勝栽禾。"
  ],
  "note": "民生困苦國事日非，詩人的淚為蒼生而流。"
 },
 {
  "title": "贈梁任父同年",
  "author": "清・黃遵憲",
  "body": [
   "寸寸山河寸寸金，瓜離分裂力誰任？",
   "杜鵑再拜憂天淚，精衛無窮填海心。"
  ],
  "note": "寸寸山河寸寸金，國土不可分割的信念如磐石。"
 },
 {
  "title": "今別離",
  "author": "清・黃遵憲",
  "body": [
   "別腸轉如輪，一刻既萬周。",
   "眼見雙輪馳，益增中心憂。",
   "古亦有山川，古亦有車舟。",
   "車舟載離別，行止猶自由。",
   "今日舟與車，並力生離愁。",
   "明知須臾景，不許稍綢繆。"
  ],
  "note": "火車輪船讓離別更快，也讓愁緒更濃。"
 },
 {
  "title": "書憤",
  "author": "清・趙翼",
  "body": [
   "騷壇代有才人出，俊逸鮑參清更真。",
   "少時學語苦難圓，只道工夫半未全。",
   "到老始知非力取，三分人事七分天。"
  ],
  "note": "三分人事七分天，到老才懂得順應的智慧。"
 },
 {
  "title": "論詩五首（其二）",
  "author": "清・趙翼",
  "body": [
   "李杜詩篇萬口傳，至今已覺不新鮮。",
   "江山代有才人出，各領風騷數百年。"
  ],
  "note": "江山代有才人出，每個時代都有自己的詩聲。"
 },
 {
  "title": "沁園春・長沙序",
  "author": "清・張惠言",
  "body": [
   "夢中了了醉中醒，只淵明，是前生。",
   "走遍人間，依舊卻躬耕。",
   "昨夜東坡春雨足，烏鵲喜，報新晴。"
  ],
  "note": "夢中了了醉中醒，陶潛的通透是前世的修行。"
 },
 {
  "title": "真州絕句",
  "author": "清・王士禛",
  "body": [
   "江干多是釣人居，柳陌菱塘一帶疏。",
   "好是日斜風定後，半江紅樹賣鱸魚。"
  ],
  "note": "夕陽下半江紅樹賣鱸魚，是最有煙火氣的江南。"
 },
 {
  "title": "出都留別諸公",
  "author": "清・康有為",
  "body": [
   "天龍作騎萬靈從，獨立飛來縹緲峰。",
   "懷抱芳馨蘭一握，縱橫宙合霧千重。",
   "眼中戰國成爭鹿，海內人才孰臥龍？",
   "撫劍長號歸去也，千山風雨嘯青鋒。"
  ],
  "note": "撫劍長號千山風雨，變法者的壯志與孤獨。"
 },
 {
  "title": "醉落魄・詠鷹",
  "author": "清・陳維崧",
  "body": [
   "寒山幾堵，風低削碎中原路。",
   "秋空一碧無今古。",
   "醉袒貂裘，略記尋呼處。",
   "",
   "男兒身手和誰賭？老來猛氣還軒舉。",
   "人間多少閒狐兔，月黑沙黃，此際偏思汝。"
  ],
  "note": "老來猛氣還軒舉，如鷹般不甘平庸的晚年。"
 },
 {
  "title": "海上",
  "author": "清・顧炎武",
  "body": [
   "日入空山海氣侵，秋光千里自登臨。",
   "十年天地干戈老，四海蒼生痛哭深。",
   "水湧神山來白鳥，雲浮仙闕見黃金。",
   "此中何處無人世，只恐難酬壯士心。"
  ],
  "note": "四海蒼生痛哭深，遺民的悲痛是一個時代的縮影。"
 },
 {
  "title": "己亥雜詩（其二十一）",
  "author": "清・龔自珍",
  "body": [
   "滿目蕭然花落盡，風回小院又開門。",
   "漫天關塞今無夢，但有飛鴻入故園。"
  ],
  "note": "飛鴻入故園，是遊子心中最溫暖的歸途。"
 },
 {
  "title": "大風歌",
  "author": "漢・劉邦",
  "body": [
   "大風起兮雲飛揚，",
   "威加海內兮歸故鄉，",
   "安得猛士兮守四方！"
  ],
  "note": "三句道盡帝王的豪邁與憂慮，千古絕唱。"
 },
 {
  "title": "垓下歌",
  "author": "漢・項羽",
  "body": [
   "力拔山兮氣蓋世，",
   "時不利兮騅不逝。",
   "騅不逝兮可奈何，",
   "虞兮虞兮奈若何！"
  ],
  "note": "英雄末路，美人相伴，是最悲壯的絕唱。"
 },
 {
  "title": "秋風辭",
  "author": "漢・劉徹",
  "body": [
   "秋風起兮白雲飛，草木黃落兮雁南歸。",
   "蘭有秀兮菊有芳，懷佳人兮不能忘。",
   "汎樓船兮濟汾河，橫中流兮揚素波。",
   "簫鼓鳴兮發棹歌，歡樂極兮哀情多。",
   "少壯幾時兮奈老何！"
  ],
  "note": "歡樂極時哀情生，帝王也逃不過衰老的恐懼。"
 },
 {
  "title": "李延年歌",
  "author": "漢・李延年",
  "body": [
   "北方有佳人，絕世而獨立。",
   "一顧傾人城，再顧傾人國。",
   "寧不知傾城與傾國？佳人難再得。"
  ],
  "note": "傾城傾國也要得此佳人，美的力量無可抵擋。"
 },
 {
  "title": "悲憤詩（節選）",
  "author": "漢・蔡琰",
  "body": [
   "漢季失權柄，董卓亂天常。",
   "志欲圖篡弒，先害諸賢良。",
   "逼迫遷舊邦，擁主以自強。",
   "海內興義師，欲共討不祥。",
   "",
   "邊荒與華異，人俗少義理。",
   "處所多霜雪，胡風春夏起。",
   "翩翩吹我衣，肅肅入我耳。",
   "感時念父母，哀歎無窮已。"
  ],
  "note": "亂世女子的悲歌，每一字都浸透了血淚。"
 },
 {
  "title": "胡笳十八拍（節選）",
  "author": "漢・蔡琰",
  "body": [
   "我生之初尚無為，我生之後漢祚衰。",
   "天不仁兮降亂離，地不仁兮使我逢此時。",
   "干戈日尋兮道路危，民卒流亡兮共哀悲。",
   "煙塵蔽野兮胡虜盛，志意乖兮節義虧。",
   "",
   "去住兩情兮誰具陳，天涯一身兮骨肉分。"
  ],
  "note": "天涯一身骨肉分離，是亂世中最深的悲劇。"
 },
 {
  "title": "四愁詩",
  "author": "漢・張衡",
  "body": [
   "我所思兮在太山，欲往從之梁父艱。",
   "側身東望涕沾翰。",
   "美人贈我金錯刀，何以報之英瓊瑤。",
   "路遠莫致倚逍遙，何為懷憂心煩勞。"
  ],
  "note": "四方皆有所思之人，卻路遠莫致，惆悵滿懷。"
 },
 {
  "title": "歸田賦（節選）",
  "author": "漢・張衡",
  "body": [
   "仲春令月，時和氣清。",
   "原隰鬱茂，百草滋榮。",
   "王雎鼓翼，倉庚哀鳴。",
   "交頸頡頏，關關嚶嚶。",
   "於焉逍遙，聊以娛情。"
  ],
  "note": "歸田後的逍遙，是科學家張衡最文學的一面。"
 },
 {
  "title": "定情詩",
  "author": "漢・繁欽",
  "body": [
   "何以致拳拳？綰臂雙金環。",
   "何以致殷勤？約指一雙銀。",
   "何以致區區？耳中雙明珠。",
   "何以致叩叩？香囊繫肘後。",
   "何以致契闊？繞腕雙跳脫。",
   "何以結恩情？美玉綴羅纓。",
   "何以結中心？素縷連雙針。",
   "何以結相於？金薄畫搔頭。"
  ],
  "note": "每一件定情之物，都是一份不可替代的承諾。"
 },
 {
  "title": "贈從弟（其二）",
  "author": "魏・劉楨",
  "body": [
   "亭亭山上松，瑟瑟谷中風。",
   "風聲一何盛，松枝一何勁！",
   "冰霜正慘愴，終歲常端正。",
   "豈不罹凝寒？松柏有本性。"
  ],
  "note": "松柏不畏冰霜，因為端正是它的本性。"
 },
 {
  "title": "與朱元思書別作",
  "author": "南朝・丘遲",
  "body": [
   "暮春三月，江南草長，雜花生樹，群鶯亂飛。",
   "見故國之旗鼓，感平生於疇日。"
  ],
  "note": "江南草長雜花生樹，六朝最美的春天在這封信裡。"
 },
 {
  "title": "思舊賦",
  "author": "晉・向秀",
  "body": [
   "將命適於遠京兮，遂旋反而北徂。",
   "濟黃河以汎舟兮，經山陽之舊居。",
   "瞻曠野之蕭條兮，息餘駕乎城隅。",
   "踐二子之遺跡兮，歷窮巷之空廬。",
   "嘆黍離之愍周兮，悲麥秀於殷墟。"
  ],
  "note": "故人已逝空廬猶在，經過舊居的那一刻心如刀割。"
 },
 {
  "title": "詠絮",
  "author": "晉・謝道韞",
  "body": [
   "未若柳絮因風起。"
  ],
  "note": "一句詠雪，才名千載，巾幗不讓鬚眉。"
 },
 {
  "title": "步出夏門行・冬十月",
  "author": "魏・曹操",
  "body": [
   "孟冬十月，北風徘徊。",
   "天氣肅清，繁霜霏霏。",
   "鵾雞晨鳴，鴻雁南飛。",
   "鷙鳥潛藏，熊羆窟棲。",
   "錢鎛停置，農收積場。",
   "逆旅整設，以通賈商。",
   "幸甚至哉，歌以詠志。"
  ],
  "note": "孟冬十月的北方，萬物收藏，天地歸於沉靜。"
 },
 {
  "title": "情詩",
  "author": "魏・曹植",
  "body": [
   "微陰翳陽景，清風飄我衣。",
   "遊魚潛綠水，翔鳥薄天飛。",
   "眇眇客行士，徭役不得歸。",
   "始出嚴霜結，今來白露晞。",
   "遊者嘆黍離，處者歌式微。",
   "慷慨對嘉賓，淒愴內傷悲。"
  ],
  "note": "遊子嘆黍離居者歌式微，離人的悲傷都在歌聲裡。"
 },
 {
  "title": "登樓賦（節選）",
  "author": "漢・王粲",
  "body": [
   "登茲樓以四望兮，聊暇日以銷憂。",
   "覽斯宇之所處兮，實顯敞而寡仇。",
   "挾清漳之通浦兮，倚曲沮之長洲。",
   "背墳衍之廣陸兮，臨皋隰之沃流。",
   "",
   "雖信美而非吾土兮，曾何足以少留。"
  ],
  "note": "信美而非吾土，再好的風景也比不上故鄉。"
 },
 {
  "title": "七哀詩",
  "author": "漢・王粲",
  "body": [
   "西京亂無象，豺虎方遘患。",
   "復棄中國去，委身適荊蠻。",
   "親戚對我悲，朋友相追攀。",
   "出門無所見，白骨蔽平原。",
   "路有飢婦人，抱子棄草間。",
   "顧聞號泣聲，揮涕獨不還。",
   "「未知身死處，何能兩相完？」",
   "驅馬棄之去，不忍聽此言。"
  ],
  "note": "白骨蔽原飢婦棄子，亂世的慘狀讀之令人落淚。"
 },
 {
  "title": "中呂・紅繡鞋・天台瀑布寺",
  "author": "元・張可久",
  "body": [
   "絕頂峰攢雪劍，懸崖水掛冰簾。",
   "倚樹哀猿弄雲尖。",
   "血華啼杜宇，陰洞吼飛廉。",
   "比人心，山未險。"
  ],
  "note": "山再險也比不過人心，是最辛辣的感慨。"
 },
 {
  "title": "越調・天淨沙・閒題",
  "author": "元・吳西逸",
  "body": [
   "長江萬里歸帆，西風幾度陽關。",
   "依舊紅塵滿眼。",
   "夕陽新雁，此情時有時閒。"
  ],
  "note": "長江歸帆西風陽關，紅塵滿眼時聚時散。"
 },
 {
  "title": "雙調・水仙子・居庸關中秋對月",
  "author": "元・宋方壺",
  "body": [
   "一天蟾影映婆娑，萬古誰將此鏡磨？",
   "年年到今宵不缺些兒個。",
   "廣寒宮好快活，碧天淨為甚麼？",
   "玉兔搗藥嫦娥寂寞，桂花樹凋零幾葉落。",
   "問常蛾，皺著眉兒怕甚麼？"
  ],
  "note": "中秋夜問嫦娥為何愁眉，是最可愛的浪漫。"
 },
 {
  "title": "雙調・夜行船・秋思",
  "author": "元・馬致遠",
  "body": [
   "百歲光陰一夢蝶，重回首往事堪嗟。",
   "今日春來，明朝花謝，急罰盞夜闌燈滅。"
  ],
  "note": "百歲光陰如莊周一夢，花開花謝不過一瞬。"
 },
 {
  "title": "雜劇・竇娥冤（節選）",
  "author": "元・關漢卿",
  "body": [
   "地也，你不分好歹何為地？",
   "天也，你錯勘賢愚枉做天！",
   "哎，只落得兩淚漣漣。"
  ],
  "note": "指天罵地的冤屈，是底層百姓最無力的吶喊。"
 },
 {
  "title": "碧玉簪",
  "author": "元・關漢卿",
  "body": [
   "有日月朝暮懸，有鬼神掌著生死權。",
   "天地也，只合把清濁分辨，",
   "可怎生糊突了盜蹠顏淵？",
   "為善的受貧窮更命短，造惡的享富貴又壽延。"
  ],
  "note": "善人受苦惡人享福，是對不公世道最尖銳的質問。"
 },
 {
  "title": "清江引・秋懷",
  "author": "元・張可久",
  "body": [
   "西風信來家萬里，問我歸期未？",
   "雁啼紅葉天，人醉黃花地，",
   "芭蕉雨聲秋夢裏。"
  ],
  "note": "西風帶來萬里外的問候，歸期卻無法回答。"
 },
 {
  "title": "望嶽",
  "author": "明・楊基",
  "body": [
   "泰山天壤間，屹如郁蕭台。",
   "突兀壓乾坤，跋扈排風雷。",
   "雲行信長風，颯若巨海回。",
   "清曉騎白鸞，直上天門來。"
  ],
  "note": "直上天門的豪氣，是明初詩人最有生氣的一面。"
 },
 {
  "title": "題鄭所南蘭",
  "author": "元・倪瓚",
  "body": [
   "秋風蘭蕙化為茅，南國淒涼氣已消。",
   "只有所南心不改，淚泉和墨寫離騷。"
  ],
  "note": "淚泉和墨寫離騷，是亡國遺民最深沉的堅守。"
 },
 {
  "title": "嘆世",
  "author": "元・馬致遠",
  "body": [
   "東籬半世蹉跎，竹里遊亭自酌。",
   "想秦宮漢闕，都做了衰草牛羊野。",
   "不恁麼漁樵無話說。"
  ],
  "note": "秦宮漢闕都成了荒草，還有什麼值得爭的。"
 },
 {
  "title": "京師得家書",
  "author": "明・袁凱",
  "body": [
   "江水三千里，家書十五行。",
   "行行無別語，只道早還鄉。"
  ],
  "note": "十五行家書只說早還鄉，家人的牽掛最為質樸。"
 },
 {
  "title": "題畫",
  "author": "明・沈周",
  "body": [
   "碧水丹山映杖藜，夕陽猶在小橋西。",
   "微吟不道驚溪鳥，飛入亂雲深處啼。"
  ],
  "note": "溪鳥被吟詩聲驚起，飛入亂雲深處。"
 },
 {
  "title": "觀書有感",
  "author": "明・唐寅",
  "body": [
   "十載求名匹馬嘶，黃金散盡為書癡。",
   "功名若是長相守，應與青山同白頭。"
  ],
  "note": "功名若能長守，就該和青山一起白頭了。"
 },
 {
  "title": "過零丁洋",
  "author": "明・夏完淳",
  "body": [
   "到處逢人說故鄉，那知故里已沦亡。",
   "只餘殘照西風裡，滿目荒涼到夕陽。"
  ],
  "note": "故鄉已亡，殘照西風中只剩滿目荒涼。"
 },
 {
  "title": "春日偶成",
  "author": "明・王守仁",
  "body": [
   "靜處體悟有天機，閒來把卷坐移時。",
   "大抵聖賢多寂寞，倚松獨笑白雲低。"
  ],
  "note": "聖賢多寂寞，卻在松下白雲間找到了天機。"
 },
 {
  "title": "正氣歌（節選）",
  "author": "明・楊繼盛",
  "body": [
   "浩氣還太虛，丹心照千古。",
   "生平未報恩，留作忠魂補。"
  ],
  "note": "丹心照千古，忠魂不滅。"
 },
 {
  "title": "夢江南",
  "author": "清・納蘭性德",
  "body": [
   "昏鴉盡，小立恨因誰？",
   "急雪乍翻香閣絮，輕風吹到膽瓶梅。",
   "心字已成灰。"
  ],
  "note": "心字已成灰，是情感燃盡後最冷的餘燼。"
 },
 {
  "title": "山花子",
  "author": "清・納蘭性德",
  "body": [
   "林下荒苔道韞家，生憐玉骨委塵沙。",
   "愁向風前無處說，數歸鴉。",
   "",
   "半世浮萍隨逝水，一宵冷雨葬名花。",
   "魂是柳綿吹欲碎，繞天涯。"
  ],
  "note": "半世浮萍一宵冷雨，名花零落的悲涼。"
 },
 {
  "title": "金縷曲・贈梁汾",
  "author": "清・納蘭性德",
  "body": [
   "德也狂生耳！偶然間、淄塵京國，烏衣門第。",
   "有酒惟澆趙州土，誰會成生此意？",
   "不信道、遂成知己。",
   "青眼高歌俱未老，向尊前、拭盡英雄淚。",
   "君不見，月如水。",
   "",
   "共君此夜須沉醉。且由他、蛾眉謠諑，古今同忌。",
   "身世悠悠何足問，冷笑置之而已！",
   "尋思起、從頭翻悔。一日心期千劫在，後身緣、恐結他生裏。",
   "然諾重，君須記。"
  ],
  "note": "一日心期千劫在，知己之約重過千年。"
 },
 {
  "title": "采桑子",
  "author": "清・納蘭性德",
  "body": [
   "而今才道當時錯，心緒淒迷。",
   "紅淚偷垂，滿眼春風百事非。",
   "",
   "情知此後來無計，強說歡期。",
   "一別如斯，落盡梨花月又西。"
  ],
  "note": "才道當時錯，所有的後悔都太遲了。"
 },
 {
  "title": "臨江仙・寒柳",
  "author": "清・納蘭性德",
  "body": [
   "飛絮飛花何處是，層冰積雪摧殘。疏疏一樹五更寒。",
   "愛他明月好，憔悴也相關。",
   "",
   "最是繁絲搖落後，轉教人憶春山。湔裙夢斷續應難。",
   "西風多少恨，吹不散眉彎。"
  ],
  "note": "西風吹不散的眉彎，是化不開的愁。"
 },
 {
  "title": "減字木蘭花",
  "author": "清・納蘭性德",
  "body": [
   "相逢不語，一朵芙蓉著秋雨。",
   "小暈紅潮，斜溜鬟心只鳳翹。",
   "",
   "待將低喚，直為凝情恐人見。",
   "欲訴幽懷，轉過迴廊叩玉釵。"
  ],
  "note": "相逢不語如秋雨芙蓉，無聲的相遇最動人心弦。"
 },
 {
  "title": "赴戍登程口占示家人",
  "author": "清・林則徐",
  "body": [
   "力微任重久神疲，再竭衰庸定不支。",
   "苟利國家生死以，豈因禍福避趨之。"
  ],
  "note": "國家利益高於個人禍福，是最純粹的愛國情懷。"
 },
 {
  "title": "浪淘沙",
  "author": "清・蔣春霖",
  "body": [
   "雲氣壓虛欄，青失遙山，雨絲風絮一番番。",
   "上巳清明都過了，只是春寒。",
   "",
   "華髮已無端，何況花殘！飛來蝴蝶又成團。",
   "明日朱樓人睡起，莫捲簾看。"
  ],
  "note": "莫捲簾看——怕看到的是春已走遠。"
 },
 {
  "title": "金陵懷古",
  "author": "清・王士禛",
  "body": [
   "年來腸斷秣陵舟，夢繞秦淮水上樓。",
   "十日雨絲風片裡，濃春煙景似殘秋。"
  ],
  "note": "秦淮的春天濃得像殘秋，六朝的繁華已是夢。"
 },
 {
  "title": "夜書所見",
  "author": "清・查慎行",
  "body": [
   "月黑見漁燈，孤光一點螢。",
   "微微風簇浪，散作滿河星。"
  ],
  "note": "一點漁火散作滿河星光，是夜色中最詩意的變幻。"
 },
 {
  "title": "詠梅",
  "author": "清・袁枚",
  "body": [
   "梅花已自不勝寒，況復傍門雪打殘。",
   "待到春來開滿院，回思此際也心酸。"
  ],
  "note": "春來滿院開時，回想雪中堅持的日子更覺心酸。"
 },
 {
  "title": "虞美人・聽雨",
  "author": "清・蔣捷",
  "body": [
   "少年聽雨歌樓上，紅燭昏羅帳。",
   "壯年聽雨客舟中，江闊雲低斷雁叫西風。",
   "",
   "而今聽雨僧廬下，鬢已星星也。",
   "悲歡離合總無情，一任階前點滴到天明。"
  ],
  "note": "少年壯年老年三次聽雨，聽的是一生的悲歡離合。"
 },
 {
  "title": "秋夜吟",
  "author": "清・黃景仁",
  "body": [
   "銀燭秋光冷畫屏，碧天如水夜雲輕。",
   "窗前一片芭蕉影，誰與秋聲作主盟？"
  ],
  "note": "誰與秋聲作主盟，孤獨的秋夜無人共鳴。"
 },
 {
  "title": "采桑子",
  "author": "清・蔣春霖",
  "body": [
   "西風一夜催人老，雪鬢蕭蕭。",
   "新恨條條，都上眉梢。",
   "",
   "也曾聯袂月橋行，記得年年。",
   "明月如鉤，掛向枝頭。"
  ],
  "note": "西風一夜催人老，新恨都寫在眉梢。"
 },
 {
  "title": "詠菊",
  "author": "清・曹雪芹",
  "body": [
   "無賴詩魔昏曉侵，繞籬欹石自沉音。",
   "毫端蘊秀臨霜寫，口齒噙香對月吟。",
   "滿紙自憐題素怨，片言誰解訴秋心。",
   "一從陶令評章後，千古高風說到今。"
  ],
  "note": "千古高風說到今，菊花的品格因陶淵明而永恆。"
 },
 {
  "title": "問菊",
  "author": "清・曹雪芹",
  "body": [
   "欲訊秋情眾莫知，喃喃負手叩東籬。",
   "孤標傲世偕誰隱，一樣花開為底遲？",
   "圃露庭霜何寂寞，鴻歸蛩病可相思？",
   "休言舉世無談者，解語何妨片語時。"
  ],
  "note": "孤標傲世偕誰隱，菊花的寂寞與林黛玉如出一轍。"
 },
 {
  "title": "詠白海棠",
  "author": "清・曹雪芹",
  "body": [
   "半卷湘簾半掩門，碾冰為土玉為盆。",
   "偷來梨蕊三分白，借得梅花一縷魂。",
   "月窟仙人縫縞袂，秋閨怨女拭啼痕。",
   "嬌羞默默同誰訴，倦倚西風夜已昏。"
  ],
  "note": "梨蕊的白梅花的魂，白海棠的美清冷脫俗。"
 },
 {
  "title": "浣溪沙・庚申除夜",
  "author": "清・納蘭性德",
  "body": [
   "收取閒心冷處濃，舞裙猶憶柘枝紅。誰家刻燭待春風。",
   "",
   "竹葉樽空翻采燕，九枝燈灺顫金蟲。風流端合倚天公。"
  ],
  "note": "除夕夜收取閒心，在冷清中回味舊時的熱鬧。"
 },
 {
  "title": "海棠春",
  "author": "清・龔自珍",
  "body": [
   "明月幾時有，把盞歎蒼茫。",
   "功名半紙，風雪千山，斷鴻聲遠長天暮。"
  ],
  "note": "半紙功名不抵千山風雪中的一聲斷鴻。"
 },
 {
  "title": "鄧攸無子",
  "author": "清・袁枚",
  "body": [
   "書生閑對漁樵話，野老猶聞戰伐功。",
   "到底英雄真本色，不因離亂改初衷。"
  ],
  "note": "不因離亂改初衷，是英雄最真的本色。"
 },
 {
  "title": "秋海棠",
  "author": "清・袁枚",
  "body": [
   "小朵嬌紅窈窕姿，獨含秋氣發花遲。",
   "暗中自有清香在，不是幽人不得知。"
  ],
  "note": "暗中清香只有幽人知，是低調的美最動人處。"
 },
 {
  "title": "三忠祠",
  "author": "清・顧炎武",
  "body": [
   "奄忽四十秋，歸來長安陌。",
   "白骨已成塵，忠魂猶未息。",
   "歲歲春風裡，斷碑覆荒棘。"
  ],
  "note": "白骨成塵忠魂未息，忠烈之氣不隨時間消散。"
 },
 {
  "title": "和周起渭韻",
  "author": "清・王士禛",
  "body": [
   "萬壑千巖客夢迷，醉中不覺到招提。",
   "白雲滿地無人掃，明月當頭有鶴棲。"
  ],
  "note": "白雲滿地明月當頭，山寺的夜空澄澈如洗。"
 },
 {
  "title": "浣溪沙",
  "author": "清・納蘭性德",
  "body": [
   "一半殘陽下小樓，朱簾斜控軟金鉤。倚闌無緒不能愁。",
   "",
   "有個盈盈騎馬過，薄妝淺黛亦風流。見人羞澀卻回頭。"
  ],
  "note": "見人羞澀卻回頭，少女的嬌態如畫。"
 },
 {
  "title": "論詩三十首（其六）",
  "author": "元・元好問",
  "body": [
   "心畫心聲總失真，文章寧復見為人。",
   "高情千古閒居賦，爭信安仁拜路塵。"
  ],
  "note": "文章未必見真人，作品與人品往往兩回事。"
 },
 {
  "title": "雙調・折桂令・九日",
  "author": "元・張可久",
  "body": [
   "對青山強整烏紗，歸雁橫秋，倦客思家。",
   "翠袖殷勤，金杯錯落，玉手琵琶。",
   "人老去西風白髮，蝶愁來明日黃花。",
   "迴首天涯，一抹斜陽，數點寒鴉。"
  ],
  "note": "重陽思家，西風白髮中蝶愁黃花，是最蕭瑟的秋意。"
 },
 {
  "title": "中呂・滿庭芳",
  "author": "元・姚燧",
  "body": [
   "天風海濤，昔人曾此，酒聖詩豪。",
   "我到此閒登眺，多少英雄。",
   "淡煙衰草接水平沙。",
   "功名半紙，風雪千山，揚鞭覓路逍遙。"
  ],
  "note": "英雄已逝淡煙衰草，不如揚鞭逍遙去。"
 },
 {
  "title": "己亥雜詩（其二百十五）",
  "author": "清・龔自珍",
  "body": [
   "吟罷江山氣不靈，萬千種話一燈青。",
   "忽然擱筆無言說，重禮天台七卷經。"
  ],
  "note": "吟盡天下事卻無言以對，轉向佛經尋求寧靜。"
 },
 {
  "title": "鵲踏枝",
  "author": "清・王國維",
  "body": [
   "萬事如花不可期，花開花落有成期。",
   "世人惟恐花開盡，卻不知花正好時。"
  ],
  "note": "花正好時莫擔心花落，活在當下最難。"
 },
 {
  "title": "獄中詩",
  "author": "清・譚嗣同",
  "body": [
   "有心殺賊，無力回天。",
   "死得其所，快哉快哉！"
  ],
  "note": "慷慨赴死的快意，是維新志士最後的豪邁。"
 },
 {
  "title": "自嘲",
  "author": "清・鄭板橋",
  "body": [
   "老夫三十年前客，踪跡遍天涯。",
   "寫得蘭花一二朵，滿紙蕭瑟皆生涯。",
   "難得糊塗好，聰明誤一家。"
  ],
  "note": "難得糊塗，是經歷世事後最高的智慧。"
 },
 {
  "title": "秋暮吟望",
  "author": "清・趙翼",
  "body": [
   "二十餘年如一夢，此身雖在堪驚。",
   "閒登小閣看新晴。",
   "古今多少事，漁唱起三更。"
  ],
  "note": "二十年如一夢，往事都付漁唱中。"
 },
 {
  "title": "十二月十五夜",
  "author": "清・袁枚",
  "body": [
   "沉沉更鼓急，漸漸人聲絕。",
   "吹燈窗更明，月照一天雪。"
  ],
  "note": "吹滅燈窗反更明，原來月照一天雪。"
 },
 {
  "title": "餘生",
  "author": "清・黃景仁",
  "body": [
   "全家都在風聲裡，九月衣裳未剪裁。",
   "半夜涼初透衾枕，一生愁已到心來。"
  ],
  "note": "九月未裁衣半夜涼透，窮愁之苦已入骨髓。"
 },
 {
  "title": "浣溪沙・紅橋懷古",
  "author": "清・王士禛",
  "body": [
   "北郭清溪一帶流，紅橋風物眼中秋。綠楊城郭是揚州。",
   "",
   "西望雷塘何處是？香魂零落使人愁。淡煙芳草舊迷樓。"
  ],
  "note": "紅橋風物淡煙芳草，揚州的繁華已成舊夢。"
 },
 {
  "title": "春望",
  "author": "明・楊基",
  "body": [
   "春城無處不飛花，寒食東風御柳斜。",
   "紫陌紅塵拂面來，無人不道看花回。"
  ],
  "note": "春城飛花紫陌紅塵，長安的春天是天下人的嚮往。"
 },
 {
  "title": "秋日",
  "author": "明・高啟",
  "body": [
   "老覺人間歲月遒，秋風吹雨過南樓。",
   "群鷗似識歸心急，催向蒼煙最上頭。"
  ],
  "note": "群鷗似懂人的歸心，催向蒼煙深處。"
 },
 {
  "title": "題扇送友人",
  "author": "明・徐禎卿",
  "body": [
   "城頭落日照長亭，黃葉蕭蕭楚客行。",
   "千里相思如有寄，秋風明月一扇輕。"
  ],
  "note": "千里相思寄於一扇，輕如秋風卻重如情。"
 },
 {
  "title": "塞上曲",
  "author": "明・李攀龍",
  "body": [
   "白羽如霜出塞寒，胡烽不斷接長安。",
   "城頭一片西山月，多少征人馬上看。"
  ],
  "note": "城頭西山月，是多少征人馬上仰望的故鄉。"
 },
 {
  "title": "畫雞",
  "author": "明・唐寅",
  "body": [
   "頭上紅冠不用裁，滿身雪白走將來。",
   "平生不敢輕言語，一叫千門萬戶開。"
  ],
  "note": "平時沉默，一鳴驚人，是蓄勢待發的氣魄。"
 },
 {
  "title": "詠針",
  "author": "明・文嘉",
  "body": [
   "百鍊千錘一根針，一顆心只為穿引。",
   "眼晴長在屁股上，只認衣冠不認人。"
  ],
  "note": "只認衣冠不認人，諷刺勢利小人入木三分。"
 },
 {
  "title": "柳",
  "author": "明・高啟",
  "body": [
   "短長條拂短長堤，上有黃鶯恰恰啼。",
   "翠幕煙綃藏不得，一聲聯拽到城西。"
  ],
  "note": "黃鶯啼聲從柳間傳到城西，春天是藏不住的。"
 },
 {
  "title": "觀獵",
  "author": "清・顧炎武",
  "body": [
   "千里黃雲白日曛，朔風回首望昭君。",
   "男兒墜地射四方，肯學書生老一經？"
  ],
  "note": "男兒當射四方，不甘伏案老死書齋。"
 },
 {
  "title": "念奴嬌・赤壁懷古",
  "author": "宋・蘇軾",
  "body": [
   "大江東去，浪淘盡，千古風流人物。",
   "故壘西邊，人道是，三國周郎赤壁。",
   "亂石穿空，驚濤拍岸，捲起千堆雪。",
   "江山如畫，一時多少豪傑。",
   "",
   "遙想公瑾當年，小喬初嫁了，雄姿英發。",
   "羽扇綸巾，談笑間，檣櫓灰飛煙滅。",
   "故國神遊，多情應笑我，早生華髮。",
   "人生如夢，一尊還酹江月。"
  ],
  "note": "千古英雄終成往事，唯有江月依舊，人生不過一場大夢。"
 },
 {
  "title": "江城子・密州出獵",
  "author": "宋・蘇軾",
  "body": [
   "老夫聊發少年狂，左牽黃，右擎蒼，",
   "錦帽貂裘，千騎卷平岡。",
   "為報傾城隨太守，親射虎，看孫郎。",
   "",
   "酒酣胸膽尚開張，鬢微霜，又何妨！",
   "持節雲中，何日遣馮唐？",
   "會挽雕弓如滿月，西北望，射天狼。"
  ],
  "note": "年華雖老，壯志猶存，豪情不減當年。"
 },
 {
  "title": "江城子・乙卯正月二十日夜記夢",
  "author": "宋・蘇軾",
  "body": [
   "十年生死兩茫茫，不思量，自難忘。",
   "千里孤墳，無處話淒涼。",
   "縱使相逢應不識，塵滿面，鬢如霜。",
   "",
   "夜來幽夢忽還鄉，小軒窗，正梳妝。",
   "相顧無言，惟有淚千行。",
   "料得年年腸斷處，明月夜，短松岡。"
  ],
  "note": "最深的思念，是十年之後夢中相見卻無言。"
 },
 {
  "title": "定風波・莫聽穿林打葉聲",
  "author": "宋・蘇軾",
  "body": [
   "莫聽穿林打葉聲，何妨吟嘯且徐行。",
   "竹杖芒鞋輕勝馬，誰怕？一蓑煙雨任平生。",
   "",
   "料峭春風吹酒醒，微冷，山頭斜照卻相迎。",
   "回首向來蕭瑟處，歸去，也無風雨也無晴。"
  ],
  "note": "風雨與晴天都是人生常態，坦然面對便是自在。"
 },
 {
  "title": "蝶戀花・春景",
  "author": "宋・蘇軾",
  "body": [
   "花褪殘紅青杏小。燕子飛時，綠水人家繞。",
   "枝上柳綿吹又少，天涯何處無芳草！",
   "",
   "牆裏鞦韆牆外道。牆外行人，牆裏佳人笑。",
   "笑漸不聞聲漸悄，多情卻被無情惱。"
  ],
  "note": "天涯處處有芳草，何必執著於一處風景。"
 },
 {
  "title": "臨江仙・夜歸臨皋",
  "author": "宋・蘇軾",
  "body": [
   "夜飲東坡醒復醉，歸來彷彿三更。",
   "家童鼻息已雷鳴。敲門都不應，倚杖聽江聲。",
   "",
   "長恨此身非我有，何時忘卻營營？",
   "夜闌風靜縠紋平。小舟從此逝，江海寄餘生。"
  ],
  "note": "放下塵世的牽絆，隨一葉小舟漂向無垠自由。"
 },
 {
  "title": "卜算子・黃州定慧院寓居作",
  "author": "宋・蘇軾",
  "body": [
   "缺月掛疏桐，漏斷人初靜。",
   "誰見幽人獨往來，縹緲孤鴻影。",
   "",
   "驚起卻回頭，有恨無人省。",
   "揀盡寒枝不肯棲，寂寞沙洲冷。"
  ],
  "note": "孤高如鴻雁，寧可寂寞也不隨波逐流。"
 },
 {
  "title": "浣溪沙・簌簌衣巾落棗花",
  "author": "宋・蘇軾",
  "body": [
   "簌簌衣巾落棗花，村南村北響繰車，牛衣古柳賣黃瓜。",
   "",
   "酒困路長惟欲睡，日高人渴漫思茶，敲門試問野人家。"
  ],
  "note": "鄉間小事皆有味，平淡生活自有詩意。"
 },
 {
  "title": "飲湖上初晴後雨",
  "author": "宋・蘇軾",
  "body": [
   "水光瀲灩晴方好，山色空濛雨亦奇。",
   "欲把西湖比西子，淡妝濃抹總相宜。"
  ],
  "note": "美在自然天成，無論晴雨皆是風景。"
 },
 {
  "title": "題西林壁",
  "author": "宋・蘇軾",
  "body": [
   "橫看成嶺側成峰，遠近高低各不同。",
   "不識廬山真面目，只緣身在此山中。"
  ],
  "note": "跳出局中才能看清全貌，當局者迷是人生常態。"
 },
 {
  "title": "惠崇春江晚景",
  "author": "宋・蘇軾",
  "body": [
   "竹外桃花三兩枝，春江水暖鴨先知。",
   "蔞蒿滿地蘆芽短，正是河豚欲上時。"
  ],
  "note": "春天的訊息，最先被水中的生靈感知。"
 },
 {
  "title": "六月二十七日望湖樓醉書",
  "author": "宋・蘇軾",
  "body": [
   "黑雲翻墨未遮山，白雨跳珠亂入船。",
   "卷地風來忽吹散，望湖樓下水如天。"
  ],
  "note": "暴風雨來得猛烈也去得乾脆，天地自有其節奏。"
 },
 {
  "title": "和子由澠池懷舊",
  "author": "宋・蘇軾",
  "body": [
   "人生到處知何似，應似飛鴻踏雪泥。",
   "泥上偶然留指爪，鴻飛那復計東西。",
   "老僧已死成新塔，壞壁無由見舊題。",
   "往日崎嶇還記否，路長人困蹇驢嘶。"
  ],
  "note": "人生如飛鴻踏雪，痕跡偶然，不必執著來去。"
 },
 {
  "title": "洞仙歌・冰肌玉骨",
  "author": "宋・蘇軾",
  "body": [
   "冰肌玉骨，自清涼無汗。",
   "水殿風來暗香滿。繡簾開，一點明月窺人，人未寢，欹枕釵橫鬢亂。",
   "",
   "起來攜素手，庭戶無聲，時見疏星渡河漢。",
   "試問夜如何？夜已三更，金波淡，玉繩低轉。",
   "但屈指西風幾時來，又不道流年暗中偷換。"
  ],
  "note": "夏夜清涼如水，流年卻在不知不覺中悄然偷換。"
 },
 {
  "title": "西江月・世事一場大夢",
  "author": "宋・蘇軾",
  "body": [
   "世事一場大夢，人生幾度秋涼？",
   "夜來風葉已鳴廊，看取眉頭鬢上。",
   "",
   "酒賤常愁客少，月明多被雲妨。",
   "中秋誰與共孤光，把盞淒然北望。"
  ],
  "note": "中秋孤影，把盞北望，世事如夢秋涼入骨。"
 },
 {
  "title": "如夢令・常記溪亭日暮",
  "author": "宋・李清照",
  "body": [
   "常記溪亭日暮，沉醉不知歸路。",
   "興盡晚回舟，誤入藕花深處。",
   "爭渡，爭渡，驚起一灘鷗鷺。"
  ],
  "note": "少女時光最美的記憶，是那次醉後誤入荷花深處。"
 },
 {
  "title": "醉花陰・薄霧濃雲愁永晝",
  "author": "宋・李清照",
  "body": [
   "薄霧濃雲愁永晝，瑞腦銷金獸。",
   "佳節又重陽，玉枕紗廚，半夜涼初透。",
   "",
   "東籬把酒黃昏後，有暗香盈袖。",
   "莫道不銷魂，簾捲西風，人比黃花瘦。"
  ],
  "note": "相思入骨，人比秋菊還要清瘦。"
 },
 {
  "title": "一剪梅・紅藕香殘玉簟秋",
  "author": "宋・李清照",
  "body": [
   "紅藕香殘玉簟秋，輕解羅裳，獨上蘭舟。",
   "雲中誰寄錦書來？雁字回時，月滿西樓。",
   "",
   "花自飄零水自流，一種相思，兩處閒愁。",
   "此情無計可消除，才下眉頭，卻上心頭。"
  ],
  "note": "相思如水，才從眉間散去，又湧上心頭。"
 },
 {
  "title": "聲聲慢・尋尋覓覓",
  "author": "宋・李清照",
  "body": [
   "尋尋覓覓，冷冷清清，淒淒慘慘戚戚。",
   "乍暖還寒時候，最難將息。",
   "三杯兩盞淡酒，怎敵他、晚來風急！",
   "雁過也，正傷心，卻是舊時相識。",
   "",
   "滿地黃花堆積，憔悴損，如今有誰堪摘？",
   "守著窗兒，獨自怎生得黑！",
   "梧桐更兼細雨，到黃昏、點點滴滴。",
   "這次第，怎一個愁字了得！"
  ],
  "note": "愁到極處，連一個愁字都載不動那般沉重。"
 },
 {
  "title": "武陵春・風住塵香花已盡",
  "author": "宋・李清照",
  "body": [
   "風住塵香花已盡，日晚倦梳頭。",
   "物是人非事事休，欲語淚先流。",
   "",
   "聞說雙溪春尚好，也擬泛輕舟。",
   "只恐雙溪舴艋舟，載不動許多愁。"
  ],
  "note": "愁緒太重，連小舟都承載不住。"
 },
 {
  "title": "點絳唇・蹴罷鞦韆",
  "author": "宋・李清照",
  "body": [
   "蹴罷鞦韆，起來慵整纖纖手。",
   "露濃花瘦，薄汗輕衣透。",
   "",
   "見客入來，襪剗金釵溜。",
   "和羞走，倚門回首，卻把青梅嗅。"
  ],
  "note": "少女心事藏在回首嗅梅的嬌羞裏。"
 },
 {
  "title": "夏日絕句",
  "author": "宋・李清照",
  "body": [
   "生當作人傑，死亦為鬼雄。",
   "至今思項羽，不肯過江東。"
  ],
  "note": "寧為玉碎不為瓦全，是骨氣也是風骨。"
 },
 {
  "title": "漁家傲・天接雲濤連曉霧",
  "author": "宋・李清照",
  "body": [
   "天接雲濤連曉霧，星河欲轉千帆舞。",
   "彷彿夢魂歸帝所，聞天語，殷勤問我歸何處。",
   "",
   "我報路長嗟日暮，學詩謾有驚人句。",
   "九萬里風鵬正舉，風休住，蓬舟吹取三山去！"
  ],
  "note": "縱使路長日暮，也要乘風直上九萬里。"
 },
 {
  "title": "鳳凰臺上憶吹簫・香冷金猊",
  "author": "宋・李清照",
  "body": [
   "香冷金猊，被翻紅浪，起來慵自梳頭。",
   "任寶奩塵滿，日上簾鉤。",
   "生怕離懷別苦，多少事、欲說還休。",
   "新來瘦，非干病酒，不是悲秋。",
   "",
   "休休，這回去也，千萬遍陽關，也則難留。",
   "念武陵人遠，煙鎖秦樓。",
   "惟有樓前流水，應念我、終日凝眸。",
   "凝眸處，從今又添，一段新愁。"
  ],
  "note": "離別之苦說不出口，只化作日漸消瘦的身影。"
 },
 {
  "title": "永遇樂・落日熔金",
  "author": "宋・李清照",
  "body": [
   "落日熔金，暮雲合璧，人在何處？",
   "染柳煙濃，吹梅笛怨，春意知幾許！",
   "元宵佳節，融和天氣，次第豈無風雨？",
   "來相召、香車寶馬，謝他酒朋詩侶。",
   "",
   "中州盛日，閨門多暇，記得偏重三五。",
   "鋪翠冠兒，撚金雪柳，簇帶爭濟楚。",
   "如今憔悴，風鬟霜鬢，怕見夜間出去。",
   "不如向、簾兒底下，聽人笑語。"
  ],
  "note": "昔日繁華已成追憶，如今只能簾下聽人歡笑。"
 },
 {
  "title": "破陣子・為陳同甫賦壯詞以寄之",
  "author": "宋・辛棄疾",
  "body": [
   "醉裏挑燈看劍，夢回吹角連營。",
   "八百里分麾下炙，五十弦翻塞外聲，沙場秋點兵。",
   "",
   "馬作的盧飛快，弓如霹靂弦驚。",
   "了卻君王天下事，贏得生前身後名。可憐白髮生！"
  ],
  "note": "壯志未酬鬢先白，一聲可憐道盡英雄遲暮。"
 },
 {
  "title": "青玉案・元夕",
  "author": "宋・辛棄疾",
  "body": [
   "東風夜放花千樹，更吹落、星如雨。",
   "寶馬雕車香滿路。鳳簫聲動，玉壺光轉，一夜魚龍舞。",
   "",
   "蛾兒雪柳黃金縷，笑語盈盈暗香去。",
   "眾裏尋他千百度，驀然回首，那人卻在，燈火闌珊處。"
  ],
  "note": "踏破鐵鞋無覓處，最珍貴的就在不經意的回首間。"
 },
 {
  "title": "醜奴兒・書博山道中壁",
  "author": "宋・辛棄疾",
  "body": [
   "少年不識愁滋味，愛上層樓。愛上層樓，為賦新詞強說愁。",
   "",
   "而今識盡愁滋味，欲說還休。欲說還休，卻道天涼好個秋。"
  ],
  "note": "真正的愁，是嘗遍苦澀後的欲言又止。"
 },
 {
  "title": "西江月・夜行黃沙道中",
  "author": "宋・辛棄疾",
  "body": [
   "明月別枝驚鵲，清風半夜鳴蟬。",
   "稻花香裏說豐年，聽取蛙聲一片。",
   "",
   "七八個星天外，兩三點雨山前。",
   "舊時茅店社林邊，路轉溪橋忽見。"
  ],
  "note": "鄉間夏夜的蛙鳴與稻香，是最樸實的幸福。"
 },
 {
  "title": "永遇樂・京口北固亭懷古",
  "author": "宋・辛棄疾",
  "body": [
   "千古江山，英雄無覓孫仲謀處。",
   "舞榭歌臺，風流總被雨打風吹去。",
   "斜陽草樹，尋常巷陌，人道寄奴曾住。",
   "想當年，金戈鐵馬，氣吞萬里如虎。",
   "",
   "元嘉草草，封狼居胥，贏得倉皇北顧。",
   "四十三年，望中猶記，烽火揚州路。",
   "可堪回首，佛狸祠下，一片神鴉社鼓。",
   "憑誰問：廉頗老矣，尚能飯否？"
  ],
  "note": "英雄老去壯心不已，最怕的是無人再問廉頗能否。"
 },
 {
  "title": "摸魚兒・更能消幾番風雨",
  "author": "宋・辛棄疾",
  "body": [
   "更能消、幾番風雨，匆匆春又歸去。",
   "惜春長怕花開早，何況落紅無數。",
   "春且住，見說道、天涯芳草無歸路。",
   "怨春不語。算只有殷勤，畫簷蛛網，盡日惹飛絮。",
   "",
   "長門事，準擬佳期又誤。蛾眉曾有人妒。",
   "千金縱買相如賦，脈脈此情誰訴？",
   "君莫舞，君不見、玉環飛燕皆塵土！",
   "閒愁最苦！休去倚危欄，斜陽正在，煙柳斷腸處。"
  ],
  "note": "春光易逝如壯志難酬，最苦是斜陽煙柳中的無奈。"
 },
 {
  "title": "菩薩蠻・書江西造口壁",
  "author": "宋・辛棄疾",
  "body": [
   "鬱孤臺下清江水，中間多少行人淚！",
   "西北望長安，可憐無數山。",
   "",
   "青山遮不住，畢竟東流去。",
   "江晚正愁餘，山深聞鷓鴣。"
  ],
  "note": "青山擋不住東流水，正如壯志擋不住歲月。"
 },
 {
  "title": "清平樂・村居",
  "author": "宋・辛棄疾",
  "body": [
   "茅簷低小，溪上青青草。",
   "醉裏吳音相媚好，白髮誰家翁媼？",
   "",
   "大兒鋤豆溪東，中兒正織雞籠。",
   "最喜小兒亡賴，溪頭臥剝蓮蓬。"
  ],
  "note": "最動人的幸福，是茅簷下一家人的平凡日常。"
 },
 {
  "title": "南鄉子・登京口北固亭有懷",
  "author": "宋・辛棄疾",
  "body": [
   "何處望神州？滿眼風光北固樓。",
   "千古興亡多少事？悠悠。不盡長江滾滾流。",
   "",
   "年少萬兜鍪，坐斷東南戰未休。",
   "天下英雄誰敵手？曹劉。生子當如孫仲謀。"
  ],
  "note": "千古興亡付諸流水，唯有英雄氣概不朽。"
 },
 {
  "title": "鷓鴣天・壯歲旌旗擁萬夫",
  "author": "宋・辛棄疾",
  "body": [
   "壯歲旌旗擁萬夫，錦襜突騎渡江初。",
   "燕兵夜娖銀胡䩮，漢箭朝飛金僕姑。",
   "",
   "追往事，嘆今吾，春風不染白髭鬚。",
   "卻將萬字平戎策，換得東家種樹書。"
  ],
  "note": "萬字平戎策換不來一紙任命，英雄只能種樹度日。"
 },
 {
  "title": "示兒",
  "author": "宋・陸游",
  "body": [
   "死去元知萬事空，但悲不見九州同。",
   "王師北定中原日，家祭無忘告乃翁。"
  ],
  "note": "至死不忘的遺願，是看到山河統一的那一天。"
 },
 {
  "title": "書憤",
  "author": "宋・陸游",
  "body": [
   "早歲那知世事艱，中原北望氣如山。",
   "樓船夜雪瓜洲渡，鐵馬秋風大散關。",
   "",
   "塞上長城空自許，鏡中衰鬢已先斑。",
   "出師一表真名世，千載誰堪伯仲間！"
  ],
  "note": "壯志如山卻報國無門，鏡中衰鬢是最沉痛的嘆息。"
 },
 {
  "title": "遊山西村",
  "author": "宋・陸游",
  "body": [
   "莫笑農家臘酒渾，豐年留客足雞豚。",
   "山重水複疑無路，柳暗花明又一村。",
   "簫鼓追隨春社近，衣冠簡樸古風存。",
   "從今若許閒乘月，拄杖無時夜叩門。"
  ],
  "note": "困境之中別絕望，柳暗花明處自有新天地。"
 },
 {
  "title": "十一月四日風雨大作",
  "author": "宋・陸游",
  "body": [
   "僵臥孤村不自哀，尚思為國戍輪臺。",
   "夜闌臥聽風吹雨，鐵馬冰河入夢來。"
  ],
  "note": "老病孤村中，夢裏依然是金戈鐵馬的沙場。"
 },
 {
  "title": "釵頭鳳・紅酥手",
  "author": "宋・陸游",
  "body": [
   "紅酥手，黃縢酒，滿城春色宮牆柳。",
   "東風惡，歡情薄。一懷愁緒，幾年離索。錯、錯、錯。",
   "",
   "春如舊，人空瘦，淚痕紅浥鮫綃透。",
   "桃花落，閒池閣。山盟雖在，錦書難託。莫、莫、莫。"
  ],
  "note": "一聲錯、一聲莫，道盡有緣無分的悲涼。"
 },
 {
  "title": "卜算子・詠梅",
  "author": "宋・陸游",
  "body": [
   "驛外斷橋邊，寂寞開無主。",
   "已是黃昏獨自愁，更著風和雨。",
   "",
   "無意苦爭春，一任群芳妒。",
   "零落成泥碾作塵，只有香如故。"
  ],
  "note": "即使零落成泥，也要保持那份清香不改。"
 },
 {
  "title": "秋夜將曉出籬門迎涼有感",
  "author": "宋・陸游",
  "body": [
   "三萬里河東入海，五千仞嶽上摩天。",
   "遺民淚盡胡塵裏，南望王師又一年。"
  ],
  "note": "年復一年的南望，是百姓最深沉的期盼。"
 },
 {
  "title": "臨安春雨初霽",
  "author": "宋・陸游",
  "body": [
   "世味年來薄似紗，誰令騎馬客京華。",
   "小樓一夜聽春雨，深巷明朝賣杏花。",
   "矮紙斜行閒作草，晴窗細乳戲分茶。",
   "素衣莫起風塵嘆，猶及清明可到家。"
  ],
  "note": "小樓春雨杏花巷，是亂世中難得的片刻寧靜。"
 },
 {
  "title": "冬夜讀書示子聿",
  "author": "宋・陸游",
  "body": [
   "古人學問無遺力，少壯工夫老始成。",
   "紙上得來終覺淺，絕知此事要躬行。"
  ],
  "note": "讀萬卷書不如行萬里路，實踐出真知。"
 },
 {
  "title": "蝶戀花・佇倚危樓風細細",
  "author": "宋・柳永",
  "body": [
   "佇倚危樓風細細，望極春愁，黯黯生天際。",
   "草色煙光殘照裏，無言誰會憑闌意。",
   "",
   "擬把疏狂圖一醉，對酒當歌，強樂還無味。",
   "衣帶漸寬終不悔，為伊消得人憔悴。"
  ],
  "note": "為了心中所愛，即使衣帶漸寬也無怨無悔。"
 },
 {
  "title": "雨霖鈴・寒蟬淒切",
  "author": "宋・柳永",
  "body": [
   "寒蟬淒切，對長亭晚，驟雨初歇。",
   "都門帳飲無緒，留戀處，蘭舟催發。",
   "執手相看淚眼，竟無語凝噎。",
   "念去去，千里煙波，暮靄沉沉楚天闊。",
   "",
   "多情自古傷離別，更那堪，冷落清秋節！",
   "今宵酒醒何處？楊柳岸，曉風殘月。",
   "此去經年，應是良辰好景虛設。",
   "便縱有千種風情，更與何人說？"
  ],
  "note": "楊柳岸曉風殘月，是離別最經典的意象。"
 },
 {
  "title": "望海潮・東南形勝",
  "author": "宋・柳永",
  "body": [
   "東南形勝，三吳都會，錢塘自古繁華。",
   "煙柳畫橋，風簾翠幕，參差十萬人家。",
   "雲樹繞堤沙，怒濤捲霜雪，天塹無涯。",
   "市列珠璣，戶盈羅綺，競豪奢。",
   "",
   "重湖疊巘清嘉，有三秋桂子，十里荷花。",
   "羌管弄晴，菱歌泛夜，嬉嬉釣叟蓮娃。",
   "千騎擁高牙，乘醉聽簫鼓，吟賞煙霞。",
   "異日圖將好景，歸去鳳池誇。"
  ],
  "note": "三秋桂子十里荷花，是杭州最動人的名片。"
 },
 {
  "title": "八聲甘州・對瀟瀟暮雨灑江天",
  "author": "宋・柳永",
  "body": [
   "對瀟瀟暮雨灑江天，一番洗清秋。",
   "漸霜風淒緊，關河冷落，殘照當樓。",
   "是處紅衰翠減，苒苒物華休。",
   "惟有長江水，無語東流。",
   "",
   "不忍登高臨遠，望故鄉渺邈，歸思難收。",
   "嘆年來蹤跡，何事苦淹留？",
   "想佳人妝樓顒望，誤幾回、天際識歸舟。",
   "爭知我，倚闌杆處，正恁凝愁！"
  ],
  "note": "佳人遠望識歸舟，卻不知我也在遠方凝愁。"
 },
 {
  "title": "少年遊・長安古道馬遲遲",
  "author": "宋・柳永",
  "body": [
   "長安古道馬遲遲，高柳亂蟬嘶。",
   "夕陽鳥外，秋風原上，目斷四天垂。",
   "",
   "歸雲一去無蹤跡，何處是前期？",
   "狎興生疏，酒徒蕭索，不似少年時。"
  ],
  "note": "長安古道上行走的已不是少年，歲月改變了一切。"
 },
 {
  "title": "岳陽樓記（節選）",
  "author": "宋・范仲淹",
  "body": [
   "不以物喜，不以己悲。",
   "居廟堂之高則憂其民，處江湖之遠則憂其君。",
   "是進亦憂，退亦憂。然則何時而樂耶？",
   "其必曰：先天下之憂而憂，後天下之樂而樂乎。"
  ],
  "note": "先憂後樂，是士大夫最崇高的家國情懷。"
 },
 {
  "title": "漁家傲・秋思",
  "author": "宋・范仲淹",
  "body": [
   "塞下秋來風景異，衡陽雁去無留意。",
   "四面邊聲連角起，千嶂裏，長煙落日孤城閉。",
   "",
   "濁酒一杯家萬里，燕然未勒歸無計。",
   "羌管悠悠霜滿地，人不寐，將軍白髮征夫淚。"
  ],
  "note": "邊塞秋風中，將軍白髮與征夫淚同樣沉重。"
 },
 {
  "title": "蘇幕遮・碧雲天",
  "author": "宋・范仲淹",
  "body": [
   "碧雲天，黃葉地，秋色連波，波上寒煙翠。",
   "山映斜陽天接水，芳草無情，更在斜陽外。",
   "",
   "黯鄉魂，追旅思，夜夜除非，好夢留人睡。",
   "明月樓高休獨倚，酒入愁腸，化作相思淚。"
  ],
  "note": "酒入愁腸化相思淚，鄉愁是化不開的濃。"
 },
 {
  "title": "泊船瓜洲",
  "author": "宋・王安石",
  "body": [
   "京口瓜洲一水間，鍾山只隔數重山。",
   "春風又綠江南岸，明月何時照我還？"
  ],
  "note": "一個綠字寫活了春天，卻寫不盡歸鄉的渴望。"
 },
 {
  "title": "元日",
  "author": "宋・王安石",
  "body": [
   "爆竹聲中一歲除，春風送暖入屠蘇。",
   "千門萬戶曈曈日，總把新桃換舊符。"
  ],
  "note": "新年的爆竹聲裏，藏著除舊迎新的希望。"
 },
 {
  "title": "登飛來峰",
  "author": "宋・王安石",
  "body": [
   "飛來山上千尋塔，聞說雞鳴見日升。",
   "不畏浮雲遮望眼，自緣身在最高層。"
  ],
  "note": "站得足夠高，浮雲便遮不住遠方的光明。"
 },
 {
  "title": "梅花",
  "author": "宋・王安石",
  "body": [
   "牆角數枝梅，凌寒獨自開。",
   "遙知不是雪，為有暗香來。"
  ],
  "note": "凌寒獨放的梅花，用暗香宣告自己的存在。"
 },
 {
  "title": "桂枝香・金陵懷古",
  "author": "宋・王安石",
  "body": [
   "登臨送目，正故國晚秋，天氣初肅。",
   "千里澄江似練，翠峰如簇。",
   "歸帆去棹殘陽裏，背西風、酒旗斜矗。",
   "彩舟雲淡，星河鷺起，畫圖難足。",
   "",
   "念往昔、繁華競逐，嘆門外樓頭，悲恨相續。",
   "千古憑高對此，謾嗟榮辱。",
   "六朝舊事隨流水，但寒煙衰草凝綠。",
   "至今商女，時時猶唱，後庭遺曲。"
  ],
  "note": "六朝繁華隨流水去，商女猶唱後庭花，歷史總在重演。"
 },
 {
  "title": "浣溪沙・一曲新詞酒一杯",
  "author": "宋・晏殊",
  "body": [
   "一曲新詞酒一杯，去年天氣舊亭臺。夕陽西下幾時回？",
   "",
   "無可奈何花落去，似曾相識燕歸來。小園香徑獨徘徊。"
  ],
  "note": "花落燕歸之間，是對時光流逝最優雅的嘆息。"
 },
 {
  "title": "蝶戀花・檻菊愁煙蘭泣露",
  "author": "宋・晏殊",
  "body": [
   "檻菊愁煙蘭泣露，羅幕輕寒，燕子雙飛去。",
   "明月不諳離恨苦，斜光到曉穿朱戶。",
   "",
   "昨夜西風凋碧樹，獨上高樓，望盡天涯路。",
   "欲寄彩箋兼尺素，山長水闊知何處。"
  ],
  "note": "獨上高樓望盡天涯，是追尋的第一重境界。"
 },
 {
  "title": "破陣子・春景",
  "author": "宋・晏殊",
  "body": [
   "燕子來時新社，梨花落後清明。",
   "池上碧苔三四點，葉底黃鸝一兩聲，日長飛絮輕。",
   "",
   "巧笑東鄰女伴，採桑徑裏逢迎。",
   "疑怪昨宵春夢好，元是今朝鬥草贏，笑從雙臉生。"
  ],
  "note": "春日鬥草贏了的笑臉，是最純真的快樂。"
 },
 {
  "title": "清平樂・紅箋小字",
  "author": "宋・晏殊",
  "body": [
   "紅箋小字，說盡平生意。",
   "鴻雁在雲魚在水，惆悵此情難寄。",
   "",
   "斜陽獨倚西樓，遙山恰對簾鉤。",
   "人面不知何處，綠波依舊東流。"
  ],
  "note": "滿紙情意卻無處可寄，只剩斜陽與東流水。"
 },
 {
  "title": "玉樓春・春恨",
  "author": "宋・晏殊",
  "body": [
   "綠楊芳草長亭路，年少拋人容易去。",
   "樓頭殘夢五更鐘，花底離愁三月雨。",
   "",
   "無情不似多情苦，一寸還成千萬縷。",
   "天涯地角有窮時，只有相思無盡處。"
  ],
  "note": "天涯地角尚有盡頭，唯獨相思綿綿無絕期。"
 },
 {
  "title": "臨江仙・夢後樓臺高鎖",
  "author": "宋・晏幾道",
  "body": [
   "夢後樓臺高鎖，酒醒簾幕低垂。",
   "去年春恨卻來時。落花人獨立，微雨燕雙飛。",
   "",
   "記得小蘋初見，兩重心字羅衣。",
   "琵琶弦上說相思。當時明月在，曾照彩雲歸。"
  ],
  "note": "落花獨立微雨燕飛，是記憶中最美的重逢幻影。"
 },
 {
  "title": "鷓鴣天・彩袖殷勤捧玉鍾",
  "author": "宋・晏幾道",
  "body": [
   "彩袖殷勤捧玉鍾，當年拚卻醉顏紅。",
   "舞低楊柳樓心月，歌盡桃花扇底風。",
   "",
   "從別後，憶相逢，幾回魂夢與君同。",
   "今宵剩把銀釭照，猶恐相逢是夢中。"
  ],
  "note": "久別重逢怕是夢，舉燈細看才敢相信是真。"
 },
 {
  "title": "鷓鴣天・醉拍春衫惜舊香",
  "author": "宋・晏幾道",
  "body": [
   "醉拍春衫惜舊香，天將離恨惱疏狂。",
   "年年陌上生秋草，日日樓中到夕陽。",
   "",
   "雲渺渺，水茫茫，征人歸路許多長。",
   "相思本是無憑語，莫向花箋費淚行。"
  ],
  "note": "相思寫在花箋上也是枉然，不如任它隨風而去。"
 },
 {
  "title": "生查子・關山魂夢長",
  "author": "宋・晏幾道",
  "body": [
   "關山魂夢長，魚雁音塵少。",
   "兩鬢可憐青，只為相思老。",
   "",
   "歸夢碧紗窗，說與人人道。",
   "真箇別離難，不似相逢好。"
  ],
  "note": "別離之苦，唯有經歷過的人才懂。"
 },
 {
  "title": "鵲橋仙・纖雲弄巧",
  "author": "宋・秦觀",
  "body": [
   "纖雲弄巧，飛星傳恨，銀漢迢迢暗度。",
   "金風玉露一相逢，便勝卻人間無數。",
   "",
   "柔情似水，佳期如夢，忍顧鵲橋歸路。",
   "兩情若是久長時，又豈在朝朝暮暮。"
  ],
  "note": "真正的愛情不在朝夕相守，而在心意長久。"
 },
 {
  "title": "踏莎行・郴州旅舍",
  "author": "宋・秦觀",
  "body": [
   "霧失樓臺，月迷津渡，桃源望斷無尋處。",
   "可堪孤館閉春寒，杜鵑聲裏斜陽暮。",
   "",
   "驛寄梅花，魚傳尺素，砌成此恨無重數。",
   "郴江幸自繞郴山，為誰流下瀟湘去？"
  ],
  "note": "霧裏迷途找不到桃源，恨如磚石層層堆砌。"
 },
 {
  "title": "滿庭芳・山抹微雲",
  "author": "宋・秦觀",
  "body": [
   "山抹微雲，天連衰草，畫角聲斷譙門。",
   "暫停征棹，聊共引離尊。",
   "多少蓬萊舊事，空回首、煙靄紛紛。",
   "斜陽外，寒鴉萬點，流水繞孤村。",
   "",
   "銷魂。當此際，香囊暗解，羅帶輕分。",
   "謾贏得、青樓薄倖名存。",
   "此去何時見也？襟袖上、空惹啼痕。",
   "傷情處，高城望斷，燈火已黃昏。"
  ],
  "note": "山抹微雲天連衰草，離別的底色總是蒼涼。"
 },
 {
  "title": "江城子・西城楊柳弄春柔",
  "author": "宋・秦觀",
  "body": [
   "西城楊柳弄春柔，動離憂，淚難收。",
   "猶記多情曾為繫歸舟。",
   "碧野朱橋當日事，人不見，水空流。",
   "",
   "韶華不為少年留，恨悠悠，幾時休。",
   "飛絮落花時候一登樓。",
   "便做春江都是淚，流不盡，許多愁。"
  ],
  "note": "春江若是淚水，也流不盡心中的愁緒。"
 },
 {
  "title": "蘭陵王・柳",
  "author": "宋・周邦彥",
  "body": [
   "柳陰直，煙裏絲絲弄碧。",
   "隋堤上、曾見幾番，拂水飄綿送行色。",
   "登臨望故國，誰識京華倦客？",
   "長亭路，年去歲來，應折柔條過千尺。",
   "",
   "閒尋舊蹤跡，又酒趁哀弦，燈照離席。",
   "梨花榆火催寒食。愁一箭風快，半篙波暖，回頭迢遞便數驛，望人在天北。",
   "",
   "淒惻，恨堆積！漸別浦縈迴，津堠岑寂。",
   "斜陽冉冉春無極。念月榭攜手，露橋聞笛。",
   "沉思前事，似夢裏，淚暗滴。"
  ],
  "note": "折柳送別千百次，離愁已堆積成山。"
 },
 {
  "title": "蘇幕遮・燎沉香",
  "author": "宋・周邦彥",
  "body": [
   "燎沉香，消溽暑。鳥雀呼晴，侵曉窺簷語。",
   "葉上初陽乾宿雨，水面清圓，一一風荷舉。",
   "",
   "故鄉遙，何日去？家住吳門，久作長安旅。",
   "五月漁郎相憶否？小楫輕舟，夢入芙蓉浦。"
  ],
  "note": "風荷搖曳間，是對故鄉芙蓉浦的悠悠思念。"
 },
 {
  "title": "少年遊・并刀如水",
  "author": "宋・周邦彥",
  "body": [
   "并刀如水，吳鹽勝雪，纖手破新橙。",
   "錦幄初溫，獸煙不斷，相對坐調笙。",
   "",
   "低聲問：向誰行宿？城上已三更。",
   "馬滑霜濃，不如休去，直是少人行。"
  ],
  "note": "一句低聲挽留，勝過千言萬語的深情。"
 },
 {
  "title": "暗香・舊時月色",
  "author": "宋・姜夔",
  "body": [
   "舊時月色，算幾番照我，梅邊吹笛？",
   "喚起玉人，不管清寒與攀摘。",
   "何遜而今漸老，都忘卻春風詞筆。",
   "但怪得竹外疏花，香冷入瑤席。",
   "",
   "江國，正寂寂。嘆寄與路遙，夜雪初積。",
   "翠尊易泣，紅萼無言耿相憶。",
   "長記曾攜手處，千樹壓西湖寒碧。",
   "又片片、吹盡也，幾時見得？"
  ],
  "note": "梅花片片吹落，舊時月色中的人已不再。"
 },
 {
  "title": "疏影・苔枝綴玉",
  "author": "宋・姜夔",
  "body": [
   "苔枝綴玉，有翠禽小小，枝上同宿。",
   "客裏相逢，籬角黃昏，無言自倚修竹。",
   "昭君不慣胡沙遠，但暗憶、江南江北。",
   "想佩環、月夜歸來，化作此花幽獨。",
   "",
   "猶記深宮舊事，那人正睡裏，飛近蛾綠。",
   "莫似春風，不管盈盈，早與安排金屋。",
   "還教一片隨波去，又卻怨、玉龍哀曲。",
   "等恁時、重覓幽香，已入小窗橫幅。"
  ],
  "note": "梅花的幽獨，恰似遠嫁他鄉的昭君之魂。"
 },
 {
  "title": "揚州慢・淮左名都",
  "author": "宋・姜夔",
  "body": [
   "淮左名都，竹西佳處，解鞍少駐初程。",
   "過春風十里，盡薺麥青青。",
   "自胡馬窺江去後，廢池喬木，猶厭言兵。",
   "漸黃昏，清角吹寒，都在空城。",
   "",
   "杜郎俊賞，算而今重到須驚。",
   "縱豆蔻詞工，青樓夢好，難賦深情。",
   "二十四橋仍在，波心蕩、冷月無聲。",
   "念橋邊紅藥，年年知為誰生？"
  ],
  "note": "昔日繁華的揚州已成空城，冷月無聲是最深的悲涼。"
 },
 {
  "title": "踏莎行・自沔東來",
  "author": "宋・姜夔",
  "body": [
   "燕燕輕盈，鶯鶯嬌軟，分明又向華胥見。",
   "夜長爭得薄情知，春初早被相思染。",
   "",
   "別後書辭，別時針線，離魂暗逐郎行遠。",
   "淮南皓月冷千山，冥冥歸去無人管。"
  ],
  "note": "離魂暗隨遠行人，千山皓月冷如心。"
 },
 {
  "title": "鶯啼序・殘寒正欺病酒",
  "author": "宋・吳文英",
  "body": [
   "殘寒正欺病酒，掩沉香繡戶。",
   "燕來晚、飛入西城，似說春事遲暮。",
   "畫船載、清明過卻，晴煙冉冉吳宮樹。",
   "念羈情游蕩，隨風化為輕絮。",
   "",
   "十載西湖，傍柳繫馬，趁嬌塵軟霧。",
   "溯紅漸、招入仙溪，錦兒偷寄幽素。",
   "倚銀屏、春寬夢窄，斷紅濕、歌紈金縷。",
   "暝堤空，輕把斜陽，總還鷗鷺。"
  ],
  "note": "十載西湖夢，春寬夢窄間，斜陽歸了鷗鷺。"
 },
 {
  "title": "風入松・聽風聽雨過清明",
  "author": "宋・吳文英",
  "body": [
   "聽風聽雨過清明，愁草瘞花銘。",
   "樓前綠暗分攜路，一絲柳、一寸柔情。",
   "料峭春寒中酒，交加曉夢啼鶯。",
   "",
   "西園日日掃林亭，依舊賞新晴。",
   "黃蜂頻撲鞦韆索，有當時、纖手香凝。",
   "惆悵雙鴛不到，幽階一夜苔生。"
  ],
  "note": "鞦韆索上猶有纖手餘香，人卻已不在。"
 },
 {
  "title": "唐多令・何處合成愁",
  "author": "宋・吳文英",
  "body": [
   "何處合成愁？離人心上秋。",
   "縱芭蕉、不雨也颼颼。",
   "都道晚涼天氣好，有明月、怕登樓。",
   "",
   "年事夢中休，花空煙水流。",
   "燕辭歸、客尚淹留。",
   "垂柳不縈裙帶住，漫長是、繫行舟。"
  ],
  "note": "愁字拆開是離人心上秋，一語道破千古離情。"
 },
 {
  "title": "寄黃幾復",
  "author": "宋・黃庭堅",
  "body": [
   "我居北海君南海，寄雁傳書謝不能。",
   "桃李春風一杯酒，江湖夜雨十年燈。",
   "持家但有四立壁，治病不蘄三折肱。",
   "想得讀書頭已白，隔溪猿哭瘴溪藤。"
  ],
  "note": "桃李春風與江湖夜雨，寫盡十年聚散離合。"
 },
 {
  "title": "清平樂・春歸何處",
  "author": "宋・黃庭堅",
  "body": [
   "春歸何處？寂寞無行路。",
   "若有人知春去處，喚取歸來同住。",
   "",
   "春無蹤跡誰知？除非問取黃鸝。",
   "百囀無人能解，因風飛過薔薇。"
  ],
  "note": "春天悄然離去無跡可尋，只有黃鸝知曉。"
 },
 {
  "title": "登快閣",
  "author": "宋・黃庭堅",
  "body": [
   "癡兒了卻公家事，快閣東西倚晚晴。",
   "落木千山天遠大，澄江一道月分明。",
   "朱弦已為佳人絕，青眼聊因美酒橫。",
   "萬里歸船弄長笛，此心吾與白鷗盟。"
  ],
  "note": "落木千山澄江月明，此心只與白鷗為盟。"
 },
 {
  "title": "小池",
  "author": "宋・楊萬里",
  "body": [
   "泉眼無聲惜細流，樹陰照水愛晴柔。",
   "小荷才露尖尖角，早有蜻蜓立上頭。"
  ],
  "note": "萬物初生之美，是小荷尖角上那隻蜻蜓。"
 },
 {
  "title": "曉出淨慈寺送林子方",
  "author": "宋・楊萬里",
  "body": [
   "畢竟西湖六月中，風光不與四時同。",
   "接天蓮葉無窮碧，映日荷花別樣紅。"
  ],
  "note": "六月西湖的荷花，是天地間最盛大的紅與綠。"
 },
 {
  "title": "閒居初夏午睡起",
  "author": "宋・楊萬里",
  "body": [
   "梅子留酸軟齒牙，芭蕉分綠與窗紗。",
   "日長睡起無情思，閒看兒童捉柳花。"
  ],
  "note": "午睡醒來無事可做，看孩童捉柳花也是一種閒趣。"
 },
 {
  "title": "宿新市徐公店",
  "author": "宋・楊萬里",
  "body": [
   "籬落疏疏一徑深，樹頭新綠未成陰。",
   "兒童急走追黃蝶，飛入菜花無處尋。"
  ],
  "note": "黃蝶飛入菜花叢，童年的歡樂就是追逐那找不到的蹤影。"
 },
 {
  "title": "觀書有感",
  "author": "宋・朱熹",
  "body": [
   "半畝方塘一鑑開，天光雲影共徘徊。",
   "問渠那得清如許？為有源頭活水來。"
  ],
  "note": "學問如活水，唯有不斷汲取才能保持清澈。"
 },
 {
  "title": "觀書有感・其二",
  "author": "宋・朱熹",
  "body": [
   "昨夜江邊春水生，艨艟巨艦一毛輕。",
   "向來枉費推移力，此日中流自在行。"
  ],
  "note": "時機到了，昔日費力推不動的巨艦自然輕行。"
 },
 {
  "title": "春日",
  "author": "宋・朱熹",
  "body": [
   "勝日尋芳泗水濱，無邊光景一時新。",
   "等閒識得東風面，萬紫千紅總是春。"
  ],
  "note": "萬紫千紅皆是春的面貌，開放包容才見全景。"
 },
 {
  "title": "偶成",
  "author": "宋・朱熹",
  "body": [
   "少年易老學難成，一寸光陰不可輕。",
   "未覺池塘春草夢，階前梧葉已秋聲。"
  ],
  "note": "春草夢未醒，梧桐已秋聲，光陰不等人。"
 },
 {
  "title": "過零丁洋",
  "author": "宋・文天祥",
  "body": [
   "辛苦遭逢起一經，干戈寥落四周星。",
   "山河破碎風飄絮，身世浮沉雨打萍。",
   "惶恐灘頭說惶恐，零丁洋裏嘆零丁。",
   "人生自古誰無死？留取丹心照汗青。"
  ],
  "note": "生死之際，唯有一片丹心可照千秋史冊。"
 },
 {
  "title": "正氣歌（節選）",
  "author": "宋・文天祥",
  "body": [
   "天地有正氣，雜然賦流形。",
   "下則為河嶽，上則為日星。",
   "於人曰浩然，沛乎塞蒼冥。",
   "皇路當清夷，含和吐明庭。"
  ],
  "note": "天地正氣充塞宇宙，是人間浩然之氣的根源。"
 },
 {
  "title": "滿江紅・寫懷",
  "author": "宋・岳飛",
  "body": [
   "怒髮衝冠，憑欄處、瀟瀟雨歇。",
   "抬望眼、仰天長嘯，壯懷激烈。",
   "三十功名塵與土，八千里路雲和月。",
   "莫等閒、白了少年頭，空悲切。",
   "",
   "靖康恥，猶未雪。臣子恨，何時滅？",
   "駕長車，踏破賀蘭山缺。",
   "壯志飢餐胡虜肉，笑談渴飲匈奴血。",
   "待從頭、收拾舊山河，朝天闕。"
  ],
  "note": "莫等閒白了少年頭，報國之志不容蹉跎。"
 },
 {
  "title": "小重山・昨夜寒蛩不住鳴",
  "author": "宋・岳飛",
  "body": [
   "昨夜寒蛩不住鳴，驚回千里夢，已三更。",
   "起來獨自繞階行，人悄悄，簾外月朧明。",
   "",
   "白首為功名，舊山松竹老，阻歸程。",
   "欲將心事付瑤琴，知音少，弦斷有誰聽？"
  ],
  "note": "弦斷無人聽，英雄最怕的是無人懂得。"
 },
 {
  "title": "四時田園雜興・其二十五",
  "author": "宋・范成大",
  "body": [
   "梅子金黃杏子肥，麥花雪白菜花稀。",
   "日長籬落無人過，惟有蜻蜓蛺蝶飛。"
  ],
  "note": "初夏田園的寧靜，只有蜻蜓蝴蝶在忙碌。"
 },
 {
  "title": "四時田園雜興・其三十一",
  "author": "宋・范成大",
  "body": [
   "晝出耘田夜績麻，村莊兒女各當家。",
   "童孫未解供耕織，也傍桑陰學種瓜。"
  ],
  "note": "孩童學種瓜的模樣，是田園生活最溫暖的畫面。"
 },
 {
  "title": "州橋",
  "author": "宋・范成大",
  "body": [
   "州橋南北是天街，父老年年等駕回。",
   "忍淚失聲詢使者，幾時真有六軍來？"
  ],
  "note": "年年翹首盼王師，遺民的淚水最令人心碎。"
 },
 {
  "title": "水龍吟・登建康賞心亭",
  "author": "宋・辛棄疾",
  "body": [
   "楚天千里清秋，水隨天去秋無際。",
   "遙岑遠目，獻愁供恨，玉簪螺髻。",
   "落日樓頭，斷鴻聲裏，江南遊子。",
   "把吳鉤看了，欄杆拍遍，無人會，登臨意。",
   "",
   "休說鱸魚堪膾，盡西風，季鷹歸未？",
   "求田問舍，怕應羞見，劉郎才氣。",
   "可惜流年，憂愁風雨，樹猶如此！",
   "倩何人喚取，紅巾翠袖，揾英雄淚？"
  ],
  "note": "拍遍欄杆無人懂，英雄淚要何人來拭？"
 },
 {
  "title": "賀新郎・別茂嘉十二弟",
  "author": "宋・辛棄疾",
  "body": [
   "綠樹聽鵜鴂，更那堪、鷓鴣聲住，杜鵑聲切。",
   "啼到春歸無尋處，苦恨芳菲都歇。",
   "算未抵、人間離別。馬上琵琶關塞黑，更長門翠輦辭金闕。",
   "看燕燕，送歸妾。",
   "",
   "將軍百戰身名裂，向河梁、回頭萬里，故人長絕。",
   "易水蕭蕭西風冷，滿座衣冠似雪。",
   "正壯士、悲歌未徹。",
   "啼鳥還知如許恨，料不啼清淚長啼血。",
   "誰共我，醉明月？"
  ],
  "note": "古來離別皆傷，啼鳥若知世間恨，當啼血而非淚。"
 },
 {
  "title": "賀鑄・青玉案",
  "author": "宋・賀鑄",
  "body": [
   "凌波不過橫塘路，但目送、芳塵去。",
   "錦瑟華年誰與度？月橋花院，瑣窗朱戶，只有春知處。",
   "",
   "飛雲冉冉蘅皋暮，彩筆新題斷腸句。",
   "試問閒愁都幾許？一川煙草，滿城風絮，梅子黃時雨。"
  ],
  "note": "閒愁多如煙草風絮黃梅雨，瀰漫了整個世界。"
 },
 {
  "title": "醉蓬萊・歸故山",
  "author": "宋・賀鑄",
  "body": [
   "問東君何處，收拾春歸？",
   "空堦淡月，幾瞑迷離。",
   "繁紅嫩翠，如今何在？",
   "但一地殘香，半窗飛絮。",
   "回首來時路，人去也、花無主。"
  ],
  "note": "春歸無處尋，只餘一地殘香與半窗飛絮。"
 },
 {
  "title": "天仙子・水調數聲持酒聽",
  "author": "宋・張先",
  "body": [
   "水調數聲持酒聽，午醉醒來愁未醒。",
   "送春春去幾時回？臨晚鏡，傷流景，往事後期空記省。",
   "",
   "沙上並禽池上暝，雲破月來花弄影。",
   "重重簾幕密遮燈，風不定，人初靜，明日落紅應滿徑。"
  ],
  "note": "雲破月來花弄影，動靜之間盡是詩意。"
 },
 {
  "title": "千秋歲・數聲鶗鴂",
  "author": "宋・張先",
  "body": [
   "數聲鶗鴂，又報芳菲歇。",
   "惜春更把殘紅折，雨輕風色暴，梅子青時節。",
   "永豐柳，無人盡日飛花雪。",
   "",
   "莫把幺弦撥，怨極弦能說。",
   "天不老，情難絕。心似雙絲網，中有千千結。",
   "夜過也，東窗未白凝殘月。"
  ],
  "note": "心如雙絲網千千結，情到深處解不開。"
 },
 {
  "title": "虞美人・聽雨",
  "author": "宋・蔣捷",
  "body": [
   "少年聽雨歌樓上，紅燭昏羅帳。",
   "壯年聽雨客舟中，江闊雲低、斷雁叫西風。",
   "",
   "而今聽雨僧廬下，鬢已星星也。",
   "悲歡離合總無情，一任階前、點滴到天明。"
  ],
  "note": "三段聽雨，三種人生，到最後只剩淡然。"
 },
 {
  "title": "一剪梅・舟過吳江",
  "author": "宋・蔣捷",
  "body": [
   "一片春愁待酒澆，江上舟搖，樓上簾招。",
   "秋娘渡與泰娘橋，風又飄飄，雨又蕭蕭。",
   "",
   "何日歸家洗客袍？銀字笙調，心字香燒。",
   "流光容易把人拋，紅了櫻桃，綠了芭蕉。"
  ],
  "note": "流光拋人而去，櫻桃紅了芭蕉綠了，歲月不等人。"
 },
 {
  "title": "賀新郎・夢繞神州路",
  "author": "宋・陳亮",
  "body": [
   "夢繞神州路，悵秋風、連營畫角，故宮離黍。",
   "底事崑崙傾砥柱，九地黃流亂注。",
   "聚萬落千村狐兔。",
   "天意從來高難問，況人情老易悲難訴。",
   "更南浦，送君去。",
   "",
   "涼生岸柳催殘暑，耿斜河、疏星淡月，斷雲微度。",
   "萬里江山知何處？回首對床夜語。",
   "雁不到、書成誰與？",
   "目盡青天懷今古，肯兒曹恩怨相爾汝！",
   "舉大白，聽金縷。"
  ],
  "note": "萬里江山在夢中，天意高難問，人情更難訴。"
 },
 {
  "title": "念奴嬌・登多景樓",
  "author": "宋・陳亮",
  "body": [
   "危樓還望，嘆此意、今古幾人曾會？",
   "鬼設神施，渾認作、天限南疆北界。",
   "一水橫陳，連岡三面，做出爭雄勢。",
   "六朝何事，只成門戶私計？",
   "",
   "因笑王謝諸人，登高懷遠，也學英雄涕。",
   "憑卻長江管不到，河洛腥膻無際。",
   "正好長驅，不須反顧，尋取中流誓。",
   "小兒破賊，勢成寧問強對！"
  ],
  "note": "長江天塹不是偏安的藉口，正應長驅直入。"
 },
 {
  "title": "六州歌頭・長淮望斷",
  "author": "宋・張孝祥",
  "body": [
   "長淮望斷，關塞莽然平。",
   "征塵暗，霜風勁，悄邊聲。黯銷凝。",
   "追想當年事，殆天數，非人力，洙泗上，弦歌地，亦膻腥。",
   "隔水氈鄉，落日牛羊下，區脫縱橫。",
   "看名王宵獵，騎火一川明。笳鼓悲鳴，遣人驚。",
   "",
   "念腰間箭，匣中劍，空埃蠹，竟何成！",
   "時易失，心徒壯，歲將零。渺神京。",
   "干羽方懷遠，靜烽燧，且休兵。",
   "冠蓋使，紛馳騖，若為情。",
   "聞道中原遺老，常南望、翠葆霓旌。",
   "使行人到此，忠憤氣填膺，有淚如傾。"
  ],
  "note": "腰間箭匣中劍空蒙塵，壯士有淚如傾。"
 },
 {
  "title": "念奴嬌・過洞庭",
  "author": "宋・張孝祥",
  "body": [
   "洞庭青草，近中秋、更無一點風色。",
   "玉鑑瓊田三萬頃，著我扁舟一葉。",
   "素月分輝，明河共影，表裏俱澄澈。",
   "悠然心會，妙處難與君說。",
   "",
   "應念嶺表經年，孤光自照，肝膽皆冰雪。",
   "短髮蕭騷襟袖冷，穩泛滄溟空闊。",
   "盡挹西江，細斟北斗，萬象為賓客。",
   "扣舷獨嘯，不知今夕何夕。"
  ],
  "note": "表裏澄澈如洞庭月色，是心靈最高的境界。"
 },
 {
  "title": "山園小梅",
  "author": "宋・林逋",
  "body": [
   "眾芳搖落獨暄妍，占盡風情向小園。",
   "疏影橫斜水清淺，暗香浮動月黃昏。",
   "霜禽欲下先偷眼，粉蝶如知合斷魂。",
   "幸有微吟可相狎，不須檀板共金尊。"
  ],
  "note": "疏影暗香，是梅花留給世間最清雅的意象。"
 },
 {
  "title": "相見歡・金陵城上西樓",
  "author": "宋・朱敦儒",
  "body": [
   "金陵城上西樓，倚清秋。",
   "萬里夕陽垂地大江流。",
   "",
   "中原亂，簪纓散，幾時收？",
   "試倩悲風吹淚過揚州。"
  ],
  "note": "亂世悲風中，淚隨江水流向失落的中原。"
 },
 {
  "title": "賀新郎・送胡邦衡待制赴新州",
  "author": "宋・張元幹",
  "body": [
   "夢繞神州路，悵秋風、連營畫角，故宮離黍。",
   "底事崑崙傾砥柱，九地黃流亂注。",
   "聚萬落千村狐兔。",
   "天意從來高難問，況人情老易悲如許。",
   "更南浦，送君去。",
   "",
   "涼生岸柳催殘暑，耿斜河、疏星淡月，斷雲微度。",
   "萬里江山知何處？回首對床夜語。",
   "雁不到、書成誰與？",
   "目盡青天懷今古，肯兒曹恩怨相爾汝。",
   "舉大白，聽金縷。"
  ],
  "note": "送別友人赴遠方，家國之恨與離別之愁交織。"
 },
 {
  "title": "約客",
  "author": "宋・趙師秀",
  "body": [
   "黃梅時節家家雨，青草池塘處處蛙。",
   "有約不來過夜半，閒敲棋子落燈花。"
  ],
  "note": "等人不至的夜晚，閒敲棋子的寂寞也有詩意。"
 },
 {
  "title": "雙雙燕・詠燕",
  "author": "宋・史達祖",
  "body": [
   "過春社了，度簾幕中間，去年塵冷。",
   "差池欲住，試入舊巢相並。",
   "還相雕梁藻井，又軟語、商量不定。",
   "飄然快拂花梢，翠尾分開紅影。",
   "",
   "芳徑，芹泥雨潤。愛貼地爭飛，競誇輕俊。",
   "紅樓歸晚，看足柳昏花暝。",
   "應自棲香正穩，便忘了、天涯芳信。",
   "愁損翠黛雙蛾，日日畫闌獨憑。"
  ],
  "note": "燕子歸來尋舊巢，軟語商量的模樣令人莞爾。"
 },
 {
  "title": "賀新郎・國脈微如縷",
  "author": "宋・劉克莊",
  "body": [
   "國脈微如縷，問長纓、何時入手，縛將戎主？",
   "未必人間無好漢，誰與寬些尺度？",
   "試看取、當年韓五。",
   "豈有谷城公付畀，遣鬼門關外著人處。",
   "昏霧塞，塞南路。",
   "",
   "蛇盤大石乘陰樹，極目望、翠煙如織，煙中人苦。",
   "但見淮山隱隱，日照千帆出浦。",
   "也莫惜、浮雲蔽天白日。",
   "清歌莫斷腸，回首關山難越。"
  ],
  "note": "國脈如縷之際，呼喚英雄莫被埋沒。"
 },
 {
  "title": "魯山山行",
  "author": "宋・梅堯臣",
  "body": [
   "適與野情愜，千山高復低。",
   "好峰隨處改，幽徑獨行迷。",
   "霜落熊升樹，林空鹿飲溪。",
   "人家在何許？雲外一聲雞。"
  ],
  "note": "山行迷路不必慌，雲外雞鳴處便有人家。"
 },
 {
  "title": "蝶戀花・庭院深深深幾許",
  "author": "宋・歐陽修",
  "body": [
   "庭院深深深幾許，楊柳堆煙，簾幕無重數。",
   "玉勒雕鞍遊冶處，樓高不見章臺路。",
   "",
   "雨橫風狂三月暮，門掩黃昏，無計留春住。",
   "淚眼問花花不語，亂紅飛過鞦韆去。"
  ],
  "note": "深深庭院鎖不住春光，淚眼問花花也無語。"
 },
 {
  "title": "生查子・元夕",
  "author": "宋・歐陽修",
  "body": [
   "去年元夜時，花市燈如晝。",
   "月上柳梢頭，人約黃昏後。",
   "",
   "今年元夜時，月與燈依舊。",
   "不見去年人，淚濕春衫袖。"
  ],
  "note": "燈月依舊人已不在，同樣的夜晚卻是不同的心境。"
 },
 {
  "title": "踏莎行・候館梅殘",
  "author": "宋・歐陽修",
  "body": [
   "候館梅殘，溪橋柳細，草薰風暖搖征轡。",
   "離愁漸遠漸無窮，迢迢不斷如春水。",
   "",
   "寸寸柔腸，盈盈粉淚，樓高莫近危闌倚。",
   "平蕪盡處是春山，行人更在春山外。"
  ],
  "note": "離愁如春水迢迢不斷，行人已在春山之外。"
 },
 {
  "title": "採桑子・群芳過後西湖好",
  "author": "宋・歐陽修",
  "body": [
   "群芳過後西湖好，狼籍殘紅。飛絮濛濛，垂柳闌干盡日風。",
   "",
   "笙歌散盡遊人去，始覺春空。垂下簾櫳，雙燕歸來細雨中。"
  ],
  "note": "繁華散盡後的西湖，反而有一種空靈之美。"
 },
 {
  "title": "浪淘沙・把酒祝東風",
  "author": "宋・歐陽修",
  "body": [
   "把酒祝東風，且共從容。",
   "垂楊紫陌洛城東，總是當時攜手處，遊遍芳叢。",
   "",
   "聚散苦匆匆，此恨無窮。",
   "今年花勝去年紅，可惜明年花更好，知與誰同？"
  ],
  "note": "花年年更好，可惜共賞的人卻不知還在不在。"
 },
 {
  "title": "戲答元珍",
  "author": "宋・歐陽修",
  "body": [
   "春風疑不到天涯，二月山城未見花。",
   "殘雪壓枝猶有橘，凍雷驚筍欲抽芽。",
   "夜聞歸雁生鄉思，病入新年感物華。",
   "曾是洛陽花下客，野芳雖晚不須嗟。"
  ],
  "note": "曾見過洛陽繁花，便不必為野花遲開而嘆息。"
 },
 {
  "title": "玉樓春・尊前擬把歸期說",
  "author": "宋・歐陽修",
  "body": [
   "尊前擬把歸期說，未語春容先慘咽。",
   "人生自是有情癡，此恨不關風與月。",
   "",
   "離歌且莫翻新闕，一曲能教腸寸結。",
   "直須看盡洛城花，始共春風容易別。"
  ],
  "note": "人生多情是天性，此恨無關風月，只因太深。"
 },
 {
  "title": "春宵",
  "author": "宋・蘇軾",
  "body": [
   "春宵一刻值千金，花有清香月有陰。",
   "歌管樓臺聲細細，鞦韆院落夜沉沉。"
  ],
  "note": "春夜如此美好，每一刻都值得珍惜。"
 },
 {
  "title": "贈劉景文",
  "author": "宋・蘇軾",
  "body": [
   "荷盡已無擎雨蓋，菊殘猶有傲霜枝。",
   "一年好景君須記，最是橙黃橘綠時。"
  ],
  "note": "荷殘菊敗不是終結，橙黃橘綠才是最好的時節。"
 },
 {
  "title": "水龍吟・次韻章質夫楊花詞",
  "author": "宋・蘇軾",
  "body": [
   "似花還似非花，也無人惜從教墜。",
   "拋家傍路，思量卻是，無情有思。",
   "縈損柔腸，困酣嬌眼，欲開還閉。",
   "夢隨風萬里，尋郎去處，又還被、鶯呼起。",
   "",
   "不恨此花飛盡，恨西園、落紅難綴。",
   "曉來雨過，遺蹤何在？一池萍碎。",
   "春色三分，二分塵土，一分流水。",
   "細看來，不是楊花，點點是離人淚。"
  ],
  "note": "楊花似花非花，點點皆是離人淚。"
 },
 {
  "title": "永遇樂・彭城夜宿燕子樓",
  "author": "宋・蘇軾",
  "body": [
   "明月如霜，好風如水，清景無限。",
   "曲港跳魚，圓荷瀉露，寂寞無人見。",
   "紞如三鼓，鏗然一葉，黯黯夢雲驚斷。",
   "夜茫茫，重尋無處，覺來小園行遍。",
   "",
   "天涯倦客，山中歸路，望斷故園心眼。",
   "燕子樓空，佳人何在，空鎖樓中燕。",
   "古今如夢，何曾夢覺，但有舊歡新怨。",
   "異時對、黃樓夜景，為余浩嘆。"
  ],
  "note": "古今皆如一夢，夢中人何曾真正醒來。"
 },
 {
  "title": "行香子・述懷",
  "author": "宋・蘇軾",
  "body": [
   "清夜無塵，月色如銀。",
   "酒斟時、須滿十分。",
   "浮名浮利，虛苦勞神。",
   "嘆隙中駒，石中火，夢中身。",
   "",
   "雖抱文章，開口誰親。",
   "且陶陶、樂盡天真。",
   "幾時歸去，作個閒人。",
   "對一張琴，一壺酒，一溪雲。"
  ],
  "note": "一琴一酒一溪雲，閒人之樂勝過浮名虛利。"
 },
 {
  "title": "浣溪沙・細雨斜風作曉寒",
  "author": "宋・蘇軾",
  "body": [
   "細雨斜風作曉寒，淡煙疏柳媚晴灘。入淮清洛漸漫漫。",
   "",
   "雪沫乳花浮午盞，蓼茸蒿筍試春盤。人間有味是清歡。"
  ],
  "note": "人間最有滋味的，是那份清淡的歡喜。"
 },
 {
  "title": "滿庭芳・蝸角虛名",
  "author": "宋・蘇軾",
  "body": [
   "蝸角虛名，蠅頭微利，算來著甚干忙。",
   "事皆前定，誰弱又誰強。",
   "且趁閒身未老，須放我、些子疏狂。",
   "百年裏，渾教是醉，三萬六千場。",
   "",
   "思量，能幾許？憂愁風雨，一半相妨。",
   "又何須抵死，說短論長。",
   "幸對清風皓月，苔茵展、雲幕高張。",
   "江南好，千鍾美酒，一曲滿庭芳。"
  ],
  "note": "蝸角虛名蠅頭微利，不如對月飲酒來得暢快。"
 },
 {
  "title": "南歌子・寓意",
  "author": "宋・蘇軾",
  "body": [
   "雨暗初疑夜，風回便報晴。",
   "淡雲斜照著山明，細草軟沙溪路、馬蹄輕。",
   "",
   "卯酒醒還困，仙材夢不成。",
   "藍橋何處覓雲英？只有多情流水、伴人行。"
  ],
  "note": "世間知己難尋，唯有多情流水一路相伴。"
 },
 {
  "title": "望江南・超然臺作",
  "author": "宋・蘇軾",
  "body": [
   "春未老，風細柳斜斜。",
   "試上超然臺上看，半壕春水一城花。煙雨暗千家。",
   "",
   "寒食後，酒醒卻咨嗟。",
   "休對故人思故國，且將新火試新茶。詩酒趁年華。"
  ],
  "note": "與其思念故國，不如把握當下，詩酒趁年華。"
 },
 {
  "title": "添字醜奴兒・窗前誰種芭蕉樹",
  "author": "宋・李清照",
  "body": [
   "窗前誰種芭蕉樹？陰滿中庭。",
   "陰滿中庭，葉葉心心，舒卷有餘清。",
   "",
   "傷心枕上三更雨，點滴霖霪。",
   "點滴霖霪，愁損北人，不慣起來聽。"
  ],
  "note": "芭蕉夜雨聲聲入耳，愁損異鄉人。"
 },
 {
  "title": "訴衷情・當年萬里覓封侯",
  "author": "宋・陸游",
  "body": [
   "當年萬里覓封侯，匹馬戍梁州。",
   "關河夢斷何處？塵暗舊貂裘。",
   "",
   "胡未滅，鬢先秋，淚空流。",
   "此生誰料，心在天山，身老滄洲。"
  ],
  "note": "心在天山身老滄洲，是英雄最深沉的無奈。"
 },
 {
  "title": "釵頭鳳・世情薄",
  "author": "宋・唐琬",
  "body": [
   "世情薄，人情惡，雨送黃昏花易落。",
   "曉風乾，淚痕殘。欲箋心事，獨語斜闌。難、難、難。",
   "",
   "人成各，今非昨，病魂常似鞦韆索。",
   "角聲寒，夜闌珊。怕人尋問，咽淚裝歡。瞞、瞞、瞞。"
  ],
  "note": "咽淚裝歡的苦楚，是被迫分離者最深的傷痛。"
 },
 {
  "title": "青門引・春思",
  "author": "宋・張先",
  "body": [
   "乍暖還輕冷，風雨晚來方定。",
   "庭軒寂寞近清明，殘花中酒，又是去年病。",
   "",
   "樓頭畫角風吹醒，入夜重門靜。",
   "那堪更被明月，隔牆送過鞦韆影。"
  ],
  "note": "月光隔牆送來鞦韆的影子，勾起無限春思。"
 },
 {
  "title": "蝶戀花・早行",
  "author": "宋・周邦彥",
  "body": [
   "月皎驚烏棲不定，更漏將殘，轆轤牽金井。",
   "喚起兩眸清炯炯，淚花落枕紅綿冷。",
   "",
   "執手霜風吹鬢影，去意徊徨，別語愁難聽。",
   "樓上闌干橫斗柄，露寒人遠雞相應。"
  ],
  "note": "霜風吹鬢的清晨離別，是最難捨的時刻。"
 },
 {
  "title": "西河・金陵懷古",
  "author": "宋・周邦彥",
  "body": [
   "佳麗地，南朝盛事誰記？",
   "山圍故國繞清江，髻鬟對起。",
   "怒濤寂寞打孤城，風檣遙度天際。",
   "",
   "斷崖樹，猶倒倚，莫愁艇子曾繫。",
   "空餘舊跡鬱蒼蒼，霧沉半壘。",
   "夜深月過女牆來，傷心東望淮水。",
   "",
   "酒旗戲鼓甚處市？想依稀、王謝鄰里。",
   "燕子不知何世，入尋常巷陌人家，相對如說興亡，斜陽裏。"
  ],
  "note": "燕子穿梭舊巷陌，不知身處的已是另一個朝代。"
 },
 {
  "title": "滿江紅・暮春",
  "author": "宋・辛棄疾",
  "body": [
   "家住江南，又過了、清明寒食。",
   "花徑裏、一番風雨，一番狼藉。",
   "紅粉暗隨流水去，園林漸覺清陰密。",
   "算年年、落盡刺桐花，寒無力。",
   "",
   "庭院靜，空相憶。無說處，閒愁極。",
   "怕流鶯乳燕，得知消息。",
   "尺素如今何處也？彩雲依舊無蹤跡。",
   "謾教人、羞去上層樓，平蕪碧。"
  ],
  "note": "風雨過後花落成泥，閒愁無處訴說。"
 },
 {
  "title": "祝英臺近・晚春",
  "author": "宋・辛棄疾",
  "body": [
   "寶釵分，桃葉渡，煙柳暗南浦。",
   "怕上層樓，十日九風雨。",
   "斷腸片片飛紅，都無人管，更誰勸、啼鶯聲住？",
   "",
   "鬢邊覷，試把花卜歸期，才簪又重數。",
   "羅帳燈昏，哽咽夢中語。",
   "是他春帶愁來，春歸何處？卻不解、帶將愁去。"
  ],
  "note": "春帶愁來卻不帶愁去，留下滿懷惆悵。"
 },
 {
  "title": "太常引・建康中秋夜為呂叔潛賦",
  "author": "宋・辛棄疾",
  "body": [
   "一輪秋影轉金波，飛鏡又重磨。",
   "把酒問姮娥：被白髮、欺人奈何！",
   "",
   "乘風好去，長空萬里，直下看山河。",
   "斜去桂花樹，人道是、清光更多。"
  ],
  "note": "乘風直上萬里長空，俯瞰山河才是真豪邁。"
 },
 {
  "title": "賀新郎・甚矣吾衰矣",
  "author": "宋・辛棄疾",
  "body": [
   "甚矣吾衰矣。悵平生、交遊零落，只今餘幾！",
   "白髮空垂三千丈，一笑人間萬事。",
   "問何物、能令公喜？",
   "我見青山多嫵媚，料青山見我應如是。",
   "情與貌，略相似。",
   "",
   "一尊搔首東窗裏。想淵明、停雲詩就，此時風味。",
   "江左沉酣求名者，豈識濁醪妙理。",
   "回首叫、雲飛風起。",
   "不恨古人吾不見，恨古人不見吾狂耳。",
   "知我者，二三子。"
  ],
  "note": "我見青山多嫵媚，料青山見我亦如是，人與自然本相知。"
 },
 {
  "title": "生查子・獨遊雨巖",
  "author": "宋・辛棄疾",
  "body": [
   "溪邊照影行，天在清溪底。",
   "天上有行雲，人在行雲裏。",
   "",
   "高歌誰和余？空谷清音起。",
   "非鬼亦非仙，一曲桃花水。"
  ],
  "note": "人在水中天，天在水中行，物我合一的妙境。"
 },
 {
  "title": "浣溪沙・漠漠輕寒上小樓",
  "author": "宋・秦觀",
  "body": [
   "漠漠輕寒上小樓，曉陰無賴似窮秋。淡煙流水畫屏幽。",
   "",
   "自在飛花輕似夢，無邊絲雨細如愁。寶簾閒掛小銀鉤。"
  ],
  "note": "飛花輕似夢，絲雨細如愁，萬物皆有情。"
 },
 {
  "title": "行香子・樹繞村莊",
  "author": "宋・秦觀",
  "body": [
   "樹繞村莊，水滿陂塘。",
   "倚東風、豪興徜徉。",
   "小園幾許，收盡春光。",
   "有桃花紅，李花白，菜花黃。",
   "",
   "遠遠圍牆，隱隱茅堂。",
   "颺青旗、流水橋旁。",
   "偶然乘興，步過東岡。",
   "正鶯兒啼，燕兒舞，蝶兒忙。"
  ],
  "note": "桃紅李白菜花黃，春天的色彩在小園中盡收。"
 },
 {
  "title": "點絳唇・桃源",
  "author": "宋・秦觀",
  "body": [
   "醉漾輕舟，信流引到花深處。",
   "塵緣相誤，無計花間住。",
   "",
   "煙水茫茫，千里斜陽暮。",
   "山無數，亂紅如雨，不記來時路。"
  ],
  "note": "誤入花深處卻不能久留，世間桃源總是一場夢。"
 },
 {
  "title": "畫堂春・落紅鋪徑水平池",
  "author": "宋・秦觀",
  "body": [
   "落紅鋪徑水平池，弄晴小雨霏霏。杏園憔悴杜鵑啼，無奈春歸。",
   "",
   "柳外畫樓獨上，憑欄手捻花枝。放花無語對斜暉，此恨誰知？"
  ],
  "note": "手捻花枝又放下，對著斜暉的沉默勝過千言。"
 },
 {
  "title": "夜遊宮・記夢寄師伯渾",
  "author": "宋・陸游",
  "body": [
   "雪曉清笳亂起，夢遊處、不知何地。",
   "鐵騎無聲望似水。想關河，雁門西，青海際。",
   "",
   "睡覺寒燈裏，漏聲斷、月斜窗紙。",
   "自許封侯在萬里。有誰知，鬢雖殘，心未死。"
  ],
  "note": "鬢已殘白心未死，老驥伏櫪志在千里。"
 },
 {
  "title": "漁家傲・寄仲高",
  "author": "宋・陸游",
  "body": [
   "東望山陰何處是？往來一萬三千里。",
   "寫得家書空滿紙，流清淚，書回已是明年事。",
   "",
   "寄語紅橋橋下水，扁舟何日尋兄弟？",
   "行遍天涯真老矣，愁無寐，鬢絲幾縷茶煙裏。"
  ],
  "note": "家書寫滿紙卻寄不到，鄉愁在茶煙中繚繞。"
 },
 {
  "title": "沈園",
  "author": "宋・陸游",
  "body": [
   "城上斜陽畫角哀，沈園非復舊池臺。",
   "傷心橋下春波綠，曾是驚鴻照影來。"
  ],
  "note": "沈園已非舊日模樣，橋下春波卻記得那驚鴻一瞥。"
 },
 {
  "title": "沈園二首・其二",
  "author": "宋・陸游",
  "body": [
   "夢斷香消四十年，沈園柳老不吹綿。",
   "此身行作稽山土，猶弔遺蹤一泫然。"
  ],
  "note": "四十年後重訪沈園，物是人非淚自流。"
 },
 {
  "title": "秋波媚・七月十六日晚登高興亭望長安南山",
  "author": "宋・陸游",
  "body": [
   "秋到邊城角聲哀，烽火照高臺。",
   "悲歌擊築，憑高酹酒，此興悠哉！",
   "",
   "多情誰似南山月，特地暮雲開。",
   "灞橋煙柳，曲江池館，應待人來。"
  ],
  "note": "南山明月為多情而破雲而出，似在等待收復故土的人。"
 },
 {
  "title": "菩薩蠻・金陵賞心亭為葉丞相賦",
  "author": "宋・辛棄疾",
  "body": [
   "青山欲共高人語，聯翩萬馬來無數。",
   "煙雨卻低迴，望來終不來。",
   "",
   "人言頭上髮，總向愁中白。",
   "拍手笑沙鷗，一身都是愁。"
  ],
  "note": "笑沙鷗一身皆愁，其實是笑自己。"
 },
 {
  "title": "鷓鴣天・送人",
  "author": "宋・辛棄疾",
  "body": [
   "唱徹陽關淚未乾，功名餘事且加餐。",
   "浮天水送無窮樹，帶雨雲埋一半山。",
   "",
   "今古恨，幾千般，只應離合是悲歡？",
   "江頭未是風波惡，別有人間行路難。"
  ],
  "note": "江上風波尚不算險惡，人間路更難行。"
 },
 {
  "title": "沁園春・靈山齋庵賦時築偃湖未成",
  "author": "宋・辛棄疾",
  "body": [
   "疊嶂西馳，萬馬迴旋，眾山欲東。",
   "正驚湍直下，跳珠倒濺；小橋橫截，缺月初弓。",
   "老合投閒，天教多事，檢校長身十萬松。",
   "吾廬小，在龍蛇影外，風雨聲中。",
   "",
   "爭先見面重重，看爽氣朝來三數峰。",
   "似謝家子弟，衣冠磊落；相如庭戶，車騎雍容。",
   "我覺其間，雄深雅健，如對文章太史公。",
   "新堤路，問偃湖何日，煙水濛濛？"
  ],
  "note": "萬馬奔騰的山勢，如讀太史公雄文般暢快。"
 },
 {
  "title": "木蘭花慢・滁州送范倅",
  "author": "宋・辛棄疾",
  "body": [
   "老來情味減，對別酒、怯流年。",
   "況屈指中秋，十分好月，不照人圓。",
   "無情水、都不管，共西風、只管送歸船。",
   "秋晚莼鱸江上，夜深兒女燈前。",
   "",
   "征衫，便好去朝天，玉殿正思賢。",
   "想夜半承明，留教視草，卻遣籌邊。",
   "長安故人問我，道尋常、泥酒只依然。",
   "目斷秋霄落雁，醉來時響空弦。"
  ],
  "note": "中秋好月不照人圓，老來離別更添傷感。"
 },
 {
  "title": "浣溪沙・遊蘄水清泉寺",
  "author": "宋・蘇軾",
  "body": [
   "山下蘭芽短浸溪，松間沙路淨無泥，瀟瀟暮雨子規啼。",
   "",
   "誰道人生無再少？門前流水尚能西！休將白髮唱黃雞。"
  ],
  "note": "門前流水尚能西流，何必嘆老唱黃雞。"
 },
 {
  "title": "採桑子・輕舟短棹西湖好",
  "author": "宋・歐陽修",
  "body": [
   "輕舟短棹西湖好，綠水逶迤，芳草長堤，隱隱笙歌處處隨。",
   "",
   "無風水面琉璃滑，不覺船移，微動漣漪，驚起沙禽掠岸飛。"
  ],
  "note": "西湖靜如琉璃，船行無覺，只有沙禽知道。"
 },
 {
  "title": "玉樓春・雕鞍好為鶯花住",
  "author": "宋・晏幾道",
  "body": [
   "雕鞍好為鶯花住，占取東城南陌路。",
   "盡教春思亂如雲，莫管世情輕似絮。",
   "",
   "古來多被虛名誤，寧負虛名身莫負。",
   "勸君頻入醉鄉來，此是無愁無恨處。"
  ],
  "note": "寧負虛名不負此身，醉鄉才是無愁之地。"
 },
 {
  "title": "南鄉子・送述古",
  "author": "宋・蘇軾",
  "body": [
   "回首亂山橫，不見居人只見城。",
   "誰似臨平山上塔，亭亭，迎客西來送客行。",
   "",
   "歸路晚風清，一枕初寒夢不成。",
   "今夜殘燈斜照處，熒熒，秋雨晴時淚不晴。"
  ],
  "note": "秋雨已晴淚未晴，送別之後的夜晚最難眠。"
 },
 {
  "title": "玉樓春・戲賦雲山",
  "author": "宋・辛棄疾",
  "body": [
   "何人半夜推山去？四面浮雲猜是汝。",
   "常時相對兩三峰，走遍溪頭無覓處。",
   "",
   "西風瞥起雲橫度，忽見東南天一柱。",
   "老僧拍手笑相誇，且喜青山依舊住。"
  ],
  "note": "青山被雲遮了又現，依舊住在那裏不曾離去。"
 },
 {
  "title": "水龍吟・過南劍雙溪樓",
  "author": "宋・辛棄疾",
  "body": [
   "舉頭西北浮雲，倚天萬里須長劍。",
   "人言此地，夜深長見，斗牛光焰。",
   "我覺山高，潭空水冷，月明星淡。",
   "待燃犀下看，憑欄卻怕，風雷怒，魚龍慘。",
   "",
   "峽束蒼江對起，過危樓、欲飛還斂。",
   "元龍老矣！不妨高臥，冰壺涼簟。",
   "千古興亡，百年悲笑，一時登覽。",
   "問何人又卸，片帆沙岸，繫斜陽纜？"
  ],
  "note": "舉頭西北需長劍，千古興亡盡在一時登覽。"
 },
 {
  "title": "減字木蘭花・天涯舊恨",
  "author": "宋・秦觀",
  "body": [
   "天涯舊恨，獨自淒涼人不問。",
   "欲見回腸，斷盡金爐小篆香。",
   "",
   "黛蛾長斂，任是春風吹不展。",
   "困倚危樓，過盡飛鴻字字愁。"
  ],
  "note": "飛鴻過盡字字成愁，春風也吹不展眉間鬱結。"
 },
 {
  "title": "琴詩",
  "author": "宋・蘇軾",
  "body": [
   "若言琴上有琴聲，放在匣中何不鳴？",
   "若言聲在指頭上，何不於君指上聽？"
  ],
  "note": "琴聲在琴在指之間，萬物相因方能成妙。"
 },
 {
  "title": "夏意",
  "author": "宋・蘇舜欽",
  "body": [
   "別院深深夏簟清，石榴開遍透簾明。",
   "樹陰滿地日當午，夢覺流鶯時一聲。"
  ],
  "note": "午夢醒來聽一聲鶯啼，是夏日最清涼的時刻。"
 },
 {
  "title": "淮中晚泊犢頭",
  "author": "宋・蘇舜欽",
  "body": [
   "春陰垂野草青青，時有幽花一樹明。",
   "晚泊孤舟古祠下，滿川風雨看潮生。"
  ],
  "note": "孤舟泊古祠，在風雨中靜看潮生潮落。"
 },
 {
  "title": "歸田樂・試把花期數",
  "author": "宋・晏幾道",
  "body": [
   "試把花期數，便早有、感春情緒。",
   "看即梅花吐，願花更不謝，春且長住。",
   "只恐花飛又春去。",
   "",
   "花開還不語，問此意、年年有誰知否？",
   "且趁醉來時，醉倒在花前，只恁催春且住。",
   "不消更掛牽，你自歸風雨。"
  ],
  "note": "花開無語，年年如此，唯願春長住不去。"
 },
 {
  "title": "南柯子・悵望梅花驛",
  "author": "宋・范成大",
  "body": [
   "悵望梅花驛，凝情杜若洲。",
   "香雲低處有高樓，可惜高樓不近木蘭舟。",
   "",
   "緘素雙魚遠，題紅片葉秋。",
   "欲憑高閣望吳州，便恐江南江北路悠悠。"
  ],
  "note": "高樓與蘭舟不能相近，正如有情人不得相見。"
 },
 {
  "title": "橫塘",
  "author": "宋・范成大",
  "body": [
   "南浦春來綠一川，石橋朱塔兩依然。",
   "年年送客橫塘路，細雨垂楊繫畫船。"
  ],
  "note": "年年送客的橫塘路，細雨垂楊年年如舊。"
 },
 {
  "title": "瑞鶴仙・郊原初過雨",
  "author": "宋・周邦彥",
  "body": [
   "郊原初過雨，見敗葉零亂，風定猶舞。",
   "斜陽掛深樹，映濃愁淺黛，遙山媚嫵。",
   "來時舊路，尚巖花、娟娟初吐。",
   "對熏風、南浦離愁，暗送天涯羈旅。",
   "",
   "憑高盡是傷春，行人莫問當年事。",
   "重簾滯午，正炎蒸、水沈一縷。",
   "但覺懨懨倦、對人無語。",
   "空階永晝，還又是、扇底流螢，錦箋倩誰與？"
  ],
  "note": "炎夏永晝無聊，只有流螢與空階相伴。"
 },
 {
  "title": "六醜・正單衣試酒",
  "author": "宋・周邦彥",
  "body": [
   "正單衣試酒，悵客裏、光陰虛擲。",
   "願春暫留，春歸如過翼，一去無跡。",
   "為問花何在？夜來風雨，葬楚宮傾國。",
   "釵鈿墮處遺香澤，亂點桃蹊，輕翻柳陌。",
   "多情為誰追惜？",
   "",
   "但蜂媒蝶使，時叩窗隔。",
   "東園岑寂，漸蒙籠暗碧。",
   "靜繞珍叢底，成嘆息。",
   "長條故惹行客，似牽衣待話，別情無極。",
   "殘英小、強簪巾幘。終不似一朵，釵頭顫裊，向人欹側。",
   "漂流處、莫趁潮汐。恐斷紅、尚有相思字，何由見得？"
  ],
  "note": "落花流水中或有相思字，可惜無人能見。"
 },
 {
  "title": "八歸・湘中送胡德華",
  "author": "宋・姜夔",
  "body": [
   "芳蓮墜粉，疏桐吹綠，庭院暗雨乍歇。",
   "無端抱影銷魂處，還見篠牆螢暗，蘚階蛩切。",
   "送客重尋西去路，問水面琵琶誰撥？",
   "最可惜、一片江山，總付與啼鴂。",
   "",
   "空江晚浪，翹沙白鳥，更青天月。",
   "未信此情難繫絆，楊花猶有東風管。",
   "況怨縛、春情如翦，默翦閒愁未斷。",
   "回首池南舊遊伴，自翦柔條解棹，人歸溪漵。",
   "斜日半山，殘螢入戶。"
  ],
  "note": "一片江山付與啼鴂，離別後的空江更顯寂寞。"
 },
 {
  "title": "長亭怨慢・漸吹盡",
  "author": "宋・姜夔",
  "body": [
   "漸吹盡，枝頭香絮，是處人家，綠深門戶。",
   "遠浦縈迴，暮帆零亂向何許？",
   "閱人多矣，誰得似、長亭樹。",
   "樹若有情時，不會得、青青如此。",
   "",
   "日暮，望高城不見，只見亂山無數。",
   "韋郎去也，怎忘得、玉環分付。",
   "第一是早早歸來，怕紅萼無人為主。",
   "算空有並刀，難剪離愁千縷。"
  ],
  "note": "長亭樹若有情，不會年年如此青翠無動於衷。"
 },
 {
  "title": "水調歌頭・金山觀月",
  "author": "宋・張孝祥",
  "body": [
   "江山自雄麗，風露與高寒。",
   "寄聲月姊，借我玉鑑此中看。",
   "幽壑魚龍悲嘯，倒影星辰搖動，海氣夜漫漫。",
   "湧起白銀闕，危駐紫金山。",
   "",
   "表獨立，飛霞佩，切雲冠。",
   "漱冰濯雪，眇視萬里一毫端。",
   "回首三山何處，聞道群仙笑我，要我欲俱還。",
   "揮手從此去，翳鳳更驂鸞。"
  ],
  "note": "江山雄麗月色如銀，胸懷天地方見萬里。"
 },
 {
  "title": "點絳唇・丁未冬過吳松作",
  "author": "宋・姜夔",
  "body": [
   "燕雁無心，太湖西畔隨雲去。",
   "數峰清苦，商略黃昏雨。",
   "",
   "第四橋邊，擬共天隨住。",
   "今何許？憑欄懷古，殘柳參差舞。"
  ],
  "note": "數峰清苦商量著黃昏的雨，山也有人的情思。"
 },
 {
  "title": "念奴嬌・中秋對月",
  "author": "宋・文天祥",
  "body": [
   "碧天如水，看長空、萬里銀蟾飛度。",
   "不似尋常三五夜，清影圓光凝聚。",
   "天上人間，此時此夕，付與金尊語。",
   "呼龍耕煙，掃盡四海塵霧。",
   "",
   "為問青天明月，記王孫、曾到人間否？",
   "怎奈今宵看罷，便是經年離阻。",
   "快意騫鸞，剩須覓取，只恐塵緣誤。",
   "舉頭望處，漫天星斗如許。"
  ],
  "note": "中秋明月下，心繫天下蒼生更勝個人悲歡。"
 },
 {
  "title": "木蘭花令・次歐公西湖韻",
  "author": "宋・蘇軾",
  "body": [
   "霜餘已失長淮闊，空聽潺潺清穎咽。",
   "佳人猶唱醉翁詞，四十三年如電抹。",
   "",
   "草頭秋露流珠滑，三五盈盈還二八。",
   "與余同是識翁人，惟有西湖波底月。"
  ],
  "note": "四十三年如電光一閃，唯有西湖波底月長存。"
 },
 {
  "title": "鹧鸪天・西都作",
  "author": "宋・朱敦儒",
  "body": [
   "我是清都山水郎，天教分付與疏狂。",
   "曾批給雨支風券，累上留雲借月章。",
   "",
   "詩萬首，酒千觴，幾曾著眼看侯王？",
   "玉樓金闕慵歸去，且插梅花醉洛陽。"
  ],
  "note": "不慕王侯只愛山水，插梅醉酒方是真性情。"
 },
 {
  "title": "鹧鸪天・桃李漫山過眼空",
  "author": "宋・辛棄疾",
  "body": [
   "桃李漫山過眼空，也宜惱損杜陵翁。",
   "關心近日前村路，買斷斜陽不買風。",
   "",
   "吟未了，夢相從，江南身在此山中。",
   "尊前一笑人何在？落盡梅花雪又空。"
  ],
  "note": "桃李過眼成空，買得斜陽卻買不得清風。"
 },
 {
  "title": "西江月・遣興",
  "author": "宋・辛棄疾",
  "body": [
   "醉裏且貪歡笑，要愁那得工夫。",
   "近來始覺古人書，信著全無是處。",
   "",
   "昨夜松邊醉倒，問松我醉何如。",
   "只疑松動要來扶，以手推松曰去。"
  ],
  "note": "醉中推松而去的灑脫，是對世事最幽默的回應。"
 },
 {
  "title": "好事近・夢中作",
  "author": "宋・秦觀",
  "body": [
   "春路雨添花，花動一山春色。",
   "行到小溪深處，有黃鸝千百。",
   "",
   "飛雲當面化龍蛇，夭矯轉空碧。",
   "醉臥古藤陰下，了不知南北。"
  ],
  "note": "醉臥藤陰不知南北，是超脫塵世的片刻自由。"
 },
 {
  "title": "暮江吟",
  "author": "宋・王安石",
  "body": [
   "落帆江口月黃昏，小店無燈欲閉門。",
   "側出岸沙楓半死，繫船應有去年痕。"
  ],
  "note": "去年繫船的痕跡猶在，歲月在沙岸上留下印記。"
 },
 {
  "title": "書湖陰先生壁",
  "author": "宋・王安石",
  "body": [
   "茅簷長掃淨無苔，花木成畦手自栽。",
   "一水護田將綠繞，兩山排闥送青來。"
  ],
  "note": "好山好水不請自來，是因為主人心中有清淨。"
 },
 {
  "title": "秋懷",
  "author": "宋・歐陽修",
  "body": [
   "節物豈不好，秋懷何黯然。",
   "西風酒旗市，細雨菊花天。",
   "感事悲雙鬢，包羞食萬錢。",
   "鹿車何日駕，歸去穎東田。"
  ],
  "note": "西風細雨菊花天，秋色雖好愁懷依然黯然。"
 },
 {
  "title": "清平樂・檢校山園書所見",
  "author": "宋・辛棄疾",
  "body": [
   "斷崖修竹，竹裏藏冰玉。",
   "路轉清溪三百曲，香滿黃昏雪屋。",
   "",
   "行人系馬疏籬，折殘猶有高枝。",
   "留待歸來共醉，只愁風雨無時。"
  ],
  "note": "斷崖修竹藏冰玉，留得高枝待歸人。"
 },
 {
  "title": "水龍吟・春恨",
  "author": "宋・陳亮",
  "body": [
   "鬧花深處層樓，畫簾半捲東風軟。",
   "春歸翠陌，平莎茸嫩，垂楊金淺。",
   "遲日催花，淡雲閣雨，輕寒輕暖。",
   "恨芳菲世界，遊人未賞，都付與、鶯和燕。",
   "",
   "寂寞憑高念遠，向南樓、一聲歸雁。",
   "金釵鬥草，青絲勒馬，風流雲散。",
   "羅綬分香，翠綃封淚，幾多幽怨。",
   "正銷凝，黃鸝又啼數聲，秋千外、曉煙亂。"
  ],
  "note": "芳菲世界遊人不賞，都付與鶯燕自在享受。"
 },
 {
  "title": "念奴嬌・書東流村壁",
  "author": "宋・辛棄疾",
  "body": [
   "野棠花落，又匆匆過了，清明時節。",
   "剗地東風欺客夢，一枕雲屏寒怯。",
   "曲岸持觴，垂楊繫馬，此地曾經別。",
   "樓空人去，舊遊飛燕能說。",
   "",
   "聞道綺陌東頭，行人長見，簾底纖纖月。",
   "舊恨春江流不斷，新恨雲山千疊。",
   "料得明朝，尊前重見，鏡裏花難折。",
   "也應驚問：近來多少華髮？"
  ],
  "note": "舊恨如春江新恨如山疊，鏡中華髮是歲月的答案。"
 },
 {
  "title": "臨江仙・信州作",
  "author": "宋・晏幾道",
  "body": [
   "斗草階前初見，穿針樓上曾期。",
   "羅裙香露玉釵隨。靜中生暗意，醉裏得真知。",
   "",
   "別後經年花自發，門前流水仍西。",
   "尊前重拾舊相思。人情今幾許？故故問笙篪。"
  ],
  "note": "別後經年花照開水照流，唯有相思是舊時模樣。"
 },
 {
  "title": "蝶戀花・二月風翻過",
  "author": "宋・晏幾道",
  "body": [
   "二月春風翻過了，夢裏分明，記得斜陽道。",
   "落葉都飛盡了也，此中惟剩殘鶯叫。",
   "",
   "深院靜，小窗明，好風搖動讀書聲。",
   "花開花落人間世，幾度春秋總關情。"
  ],
  "note": "花開花落間，人間幾度春秋都關乎深情。"
 },
 {
  "title": "御街行・秋日懷舊",
  "author": "宋・范仲淹",
  "body": [
   "紛紛墜葉飄香砌，夜寂靜、寒聲碎。",
   "真珠簾捲玉樓空，天淡銀河垂地。",
   "年年今夜，月華如練，長是人千里。",
   "",
   "愁腸已斷無由醉，酒未到、先成淚。",
   "殘燈明滅枕頭攲，諳盡孤眠滋味。",
   "都來此事，眉間心上，無計相迴避。"
  ],
  "note": "愁在眉間心上，想迴避都無計可施。"
 },
 {
  "title": "剔銀燈・與歐陽公席上分題",
  "author": "宋・范仲淹",
  "body": [
   "昨夜因看蜀志，笑曹操孫權劉備。",
   "用盡機關，徒勞心力，只得三分天地。",
   "屈指細尋思，爭如共、劉伶一醉。",
   "",
   "人世都無百歲。少癡騃、老成尫悴。",
   "只有中間，些子少年，忍把浮名牽繫。",
   "一品與千金，問白髮、如何迴避。"
  ],
  "note": "三國英雄費盡心機只得三分天地，不如一醉。"
 },
 {
  "title": "解語花・上元",
  "author": "宋・周邦彥",
  "body": [
   "風銷焰蠟，露浥烘爐，花市光相射。",
   "桂華流瓦，纖雲散、耿耿素娥欲下。",
   "衣裳淡雅，看楚女纖腰一把。",
   "簫鼓喧，人影參差，滿路飄香麝。",
   "",
   "因念都城放夜，望千門如晝，嬉笑遊冶。",
   "鈿車羅帕，相逢處、自有暗塵隨馬。",
   "年光是也，唯只見、舊情衰謝。",
   "清漏移、飛蓋歸來，從舞休歌罷。"
  ],
  "note": "元宵燈火雖美，映照的卻是年光衰謝的感傷。"
 },
 {
  "title": "南鄉子・自古帝王州",
  "author": "宋・王安石",
  "body": [
   "自古帝王州，鬱鬱蔥蔥佳氣浮。",
   "四百年來成一夢，堪愁，晉代衣冠成古丘。",
   "",
   "繞水恣行遊，上盡層城更上樓。",
   "往事悠悠君莫問，回頭，檻外長江空自流。"
  ],
  "note": "四百年帝業成一夢，唯有長江依舊空自流。"
 },
 {
  "title": "西江月・示兒曹以家事付之",
  "author": "宋・辛棄疾",
  "body": [
   "萬事雲煙忽過，一身蒲柳先衰。",
   "而今何事最相宜？宜醉宜遊宜睡。",
   "",
   "早趁催科了納，更量出入收支。",
   "乃翁依舊管些兒，管竹管山管水。"
  ],
  "note": "人生晚年最相宜的事，是管竹管山管水。"
 },
 {
  "title": "眼兒媚・樓上黃昏杏花寒",
  "author": "宋・阮閱",
  "body": [
   "樓上黃昏杏花寒，斜月小闌干。",
   "一雙燕子，兩行歸雁，畫角聲殘。",
   "",
   "綺窗人在東風裏，灑淚對春闌。",
   "也應似舊，盈盈秋水，淡淡春山。"
  ],
  "note": "春闌獨倚窗前，眉如春山目如秋水。"
 },
 {
  "title": "眼兒媚・蕭蕭江上荻花秋",
  "author": "宋・賀鑄",
  "body": [
   "蕭蕭江上荻花秋，做弄許多愁。",
   "半竿落日，兩行新雁，一葉扁舟。",
   "",
   "惜分長怕君先去，直待醉時休。",
   "今宵眼底，明朝心上，後日眉頭。"
  ],
  "note": "今宵看在眼裏，明朝記在心上，後日愁上眉頭。"
 },
 {
  "title": "好事近・湓口放船歸",
  "author": "宋・陸游",
  "body": [
   "湓口放船歸，薄暮散花洲宿。",
   "兩岸白蘋紅蓼，映一蓑新綠。",
   "",
   "有沽酒處便為家，菱芡四時足。",
   "明日又乘風去，任江南江北。"
  ],
  "note": "有酒便是家，隨風漂泊也是一種自在。"
 },
 {
  "title": "千秋歲・水邊沙外",
  "author": "宋・秦觀",
  "body": [
   "水邊沙外，城郭春寒退。",
   "花影亂，鶯聲碎。飄零疏酒盞，離別寬衣帶。",
   "人不見，碧雲暮合空相對。",
   "",
   "憶昔西池會，鵷鷺同飛蓋。",
   "攜手處，今誰在？日邊清夢斷，鏡裏朱顏改。",
   "春去也，飛紅萬點愁如海。"
  ],
  "note": "飛紅萬點愁如海，春去人散兩茫茫。"
 },
 {
  "title": "訴衷情令・長安懷古",
  "author": "宋・康與之",
  "body": [
   "阿房廢址漢荒丘，狐兔又群遊。",
   "豪華盡成春夢，留下古今愁。",
   "",
   "君莫上，古原頭，淚難收。",
   "夕陽西下，塞雁南飛，渭水東流。"
  ],
  "note": "豪華成春夢，古今同一愁，渭水默默東流。"
 },
 {
  "title": "夜書所見",
  "author": "宋・葉紹翁",
  "body": [
   "蕭蕭梧葉送寒聲，江上秋風動客情。",
   "知有兒童挑促織，夜深籬落一燈明。"
  ],
  "note": "夜深籬落一盞燈，童年的溫暖照亮了遊子的秋夜。"
 },
 {
  "title": "遊園不值",
  "author": "宋・葉紹翁",
  "body": [
   "應憐屐齒印蒼苔，小扣柴扉久不開。",
   "春色滿園關不住，一枝紅杏出牆來。"
  ],
  "note": "春色是關不住的，總有一枝紅杏探出牆頭。"
 },
 {
  "title": "鄉村四月",
  "author": "宋・翁卷",
  "body": [
   "綠遍山原白滿川，子規聲裏雨如煙。",
   "鄉村四月閒人少，才了蠶桑又插田。"
  ],
  "note": "四月鄉村最忙碌，蠶桑插田兩不歇。"
 },
 {
  "title": "除夜自石湖歸苕溪",
  "author": "宋・姜夔",
  "body": [
   "細草穿沙雪半銷，吳宮煙冷水迢迢。",
   "梅花竹裏無人見，一夜吹香過石橋。"
  ],
  "note": "梅花藏在竹林無人見，暗香卻過石橋傳萬里。"
 },
 {
  "title": "雪梅・其一",
  "author": "宋・盧梅坡",
  "body": [
   "梅雪爭春未肯降，騷人擱筆費評章。",
   "梅須遜雪三分白，雪卻輸梅一段香。"
  ],
  "note": "梅雪各有長短，天下事物皆有獨特之美。"
 },
 {
  "title": "雪梅・其二",
  "author": "宋・盧梅坡",
  "body": [
   "有梅無雪不精神，有雪無詩俗了人。",
   "日暮詩成天又雪，與梅並作十分春。"
  ],
  "note": "梅雪詩三者合一，才是完整的春天。"
 },
 {
  "title": "題臨安邸",
  "author": "宋・林升",
  "body": [
   "山外青山樓外樓，西湖歌舞幾時休？",
   "暖風熏得遊人醉，直把杭州作汴州。"
  ],
  "note": "醉生夢死的歌舞中，忘了杭州不是汴州。"
 },
 {
  "title": "春日偶成",
  "author": "宋・程顥",
  "body": [
   "雲淡風輕近午天，傍花隨柳過前川。",
   "時人不識余心樂，將謂偷閒學少年。"
  ],
  "note": "雲淡風輕中偷得半日閒，心樂旁人不知。"
 },
 {
  "title": "秋月",
  "author": "宋・程顥",
  "body": [
   "清溪流過碧山頭，空水澄鮮一色秋。",
   "隔斷紅塵三十里，白雲紅葉兩悠悠。"
  ],
  "note": "隔斷紅塵的清溪碧山，白雲紅葉自在悠悠。"
 },
 {
  "title": "絕句",
  "author": "宋・志南",
  "body": [
   "古木陰中繫短篷，杖藜扶我過橋東。",
   "沾衣欲濕杏花雨，吹面不寒楊柳風。"
  ],
  "note": "杏花雨不濕衣，楊柳風不寒面，春天溫柔至極。"
 },
 {
  "title": "三衢道中",
  "author": "宋・曾幾",
  "body": [
   "梅子黃時日日晴，小溪泛盡卻山行。",
   "綠陰不減來時路，添得黃鸝四五聲。"
  ],
  "note": "歸途綠陰依舊，多了幾聲黃鸝更添詩意。"
 },
 {
  "title": "活水亭觀書有感",
  "author": "宋・朱熹",
  "body": [
   "半畝方塘一鑑開，天光雲影共徘徊。",
   "問渠那得清如許？為有源頭活水來。"
  ],
  "note": "思想如塘水，要有源頭活水才能清澈見底。"
 },
 {
  "title": "立秋",
  "author": "宋・劉翰",
  "body": [
   "乳鴉啼散玉屏空，一枕新涼一扇風。",
   "睡起秋聲無覓處，滿階梧葉月明中。"
  ],
  "note": "秋聲無處可尋，卻在滿階梧葉與月明中。"
 },
 {
  "title": "春晚",
  "author": "宋・左緯",
  "body": [
   "池上柳依依，柳邊人掩扉。",
   "蝶隨花片落，燕拂水紋飛。",
   "試數交遊看，方驚笑語稀。",
   "一年春又盡，倚杖對斜暉。"
  ],
  "note": "春盡之時倚杖對斜暉，驚覺故友已漸稀少。"
 },
 {
  "title": "東溪",
  "author": "宋・梅堯臣",
  "body": [
   "行到東溪看水時，坐臨孤嶼發船遲。",
   "野鳧眠岸有閒意，老樹著花無醜枝。",
   "短短蒲耳齊似剪，平平沙石淨於篩。",
   "情雖不厭住不得，薄暮歸來車馬疲。"
  ],
  "note": "老樹開花無醜枝，萬物到了自然之境皆是美。"
 },
 {
  "title": "初晴遊滄浪亭",
  "author": "宋・蘇舜欽",
  "body": [
   "夜雨連明春水生，嬌雲濃暖弄陰晴。",
   "簾虛日薄花竹靜，時有乳鳩相對鳴。"
  ],
  "note": "雨後初晴，花竹靜謐中只聞乳鳩對鳴。"
 },
 {
  "title": "秋詞",
  "author": "宋・陸游",
  "body": [
   "六十餘年妄學詩，功夫深處獨心知。",
   "夜來一笑寒燈下，始是金丹換骨時。"
  ],
  "note": "六十年學詩的功夫，在寒燈下一笑中頓悟。"
 },
 {
  "title": "水口行舟",
  "author": "宋・朱熹",
  "body": [
   "昨夜扁舟雨一蓑，滿江風浪夜如何。",
   "今朝試卷孤蓬看，依舊青山綠樹多。"
  ],
  "note": "風浪過後青山依舊，困難終會過去。"
 },
 {
  "title": "夏日田園雜興",
  "author": "宋・范成大",
  "body": [
   "晝出耘田夜績麻，村莊兒女各當家。",
   "童孫未解供耕織，也傍桑陰學種瓜。"
  ],
  "note": "兒女當家童孫學耕，田園生活代代傳承。"
 },
 {
  "title": "除夜雪",
  "author": "宋・陸游",
  "body": [
   "北風吹雪四更初，嘉瑞天教及歲除。",
   "半盞屠蘇猶未舉，燈前小草寫桃符。"
  ],
  "note": "除夕夜的瑞雪中，燈前寫桃符迎新年。"
 },
 {
  "title": "淡黃柳・空城曉角",
  "author": "宋・姜夔",
  "body": [
   "空城曉角，吹入垂楊陌。",
   "馬上單衣寒惻惻。看盡鵝黃嫩綠，都是江南舊相識。",
   "",
   "正岑寂，明朝又寒食。",
   "強攜酒、小橋宅。怕梨花落盡成秋色。",
   "燕燕飛來，問春何在？唯有池塘自碧。"
  ],
  "note": "空城曉角聲中，江南春色已是舊相識。"
 },
 {
  "title": "喜遷鶯・曉行",
  "author": "宋・劉一止",
  "body": [
   "曉光催角，聽宿鳥未驚，邊雁南落。",
   "雪照山城，冰凝水面，一派寒光如削。",
   "征鞍消盡酒力，望望不見天邊漠漠。",
   "心折處，念多情帶眼，傳意千託。",
   "",
   "寥落。重尋覓，同來何事，不見歸時約。",
   "暗想當時，回廊靜夜，動是梨花寂寞。",
   "歸來定掃殘局，只恐東風不管蕭索。",
   "但如今，且抱得離愁歸去，悶懷孤枕何人訴。"
  ],
  "note": "曉行風雪中，帶著滿懷離愁獨自遠行。"
 },
 {
  "title": "水調歌頭・秋色漸將晚",
  "author": "宋・葉夢得",
  "body": [
   "秋色漸將晚，霜信報黃花。",
   "小窗低戶深映，微路繞攲斜。",
   "為問山翁何事，坐看流年輕度，拚卻鬢雙華。",
   "徙倚望滄海，天淨水明霞。",
   "",
   "念平昔，空飄蕩，遍天涯。",
   "歸來三徑重掃，松竹本吾家。",
   "卻恨悲風時起，冉冉雲間新雁，邊馬怨胡笳。",
   "誰似東山老，談笑靜胡沙。"
  ],
  "note": "歸隱三徑松竹間，卻仍心繫邊塞風煙。"
 },
 {
  "title": "謁金門・春半",
  "author": "宋・朱淑真",
  "body": [
   "春已半，觸目此情無限。",
   "十二闌干閒倚遍，愁來天不管。",
   "",
   "好是風和日暖，輸與鶯鶯燕燕。",
   "滿院落花簾不卷，斷腸芳草遠。"
  ],
  "note": "好天氣只便宜了鶯燕，獨自倚闌的人只有愁。"
 },
 {
  "title": "減字木蘭花・春怨",
  "author": "宋・朱淑真",
  "body": [
   "獨行獨坐，獨唱獨酬還獨臥。",
   "佇立傷神，無奈輕寒著摸人。",
   "",
   "此情誰見？淚洗殘妝無一半。",
   "愁病相仍，剔盡寒燈夢不成。"
  ],
  "note": "獨行獨坐獨臥，五個獨字道盡孤寂。"
 },
 {
  "title": "生查子・春晚",
  "author": "宋・朱淑真",
  "body": [
   "寒食不多時，幾日東風惡。",
   "無緒倦尋芳，閒卻鞦韆索。",
   "",
   "玉減翠裙交，病怯羅衣薄。",
   "不忍捲簾看，寂寞梨花落。"
  ],
  "note": "不忍看梨花寂寞飄落，是怕看見自己的心境。"
 },
 {
  "title": "南柯子・懷舊",
  "author": "宋・仲殊",
  "body": [
   "十里青山遠，潮平路帶沙。",
   "數聲啼鳥怨年華，又是淒涼時候在天涯。",
   "",
   "白露收殘月，清風散曉霞。",
   "綠楊堤畔問荷花，記得年時沽酒那人家？"
  ],
  "note": "啼鳥怨年華，綠楊堤畔問荷花，還記得那人嗎？"
 },
 {
  "title": "鷓鴣天・林斷山明竹隱牆",
  "author": "宋・蘇軾",
  "body": [
   "林斷山明竹隱牆，亂蟬衰草小池塘。",
   "翻空白鳥時時見，照水紅蕖細細香。",
   "",
   "村舍外，古城旁，杖藜徐步轉斜陽。",
   "殷勤昨夜三更雨，又得浮生一日涼。"
  ],
  "note": "昨夜一場雨換來浮生一日清涼，知足便是福。"
 },
 {
  "title": "減字木蘭花・己卯儋耳",
  "author": "宋・蘇軾",
  "body": [
   "春牛春杖，無限春風來海上。",
   "便丐春工，染得桃紅似肉紅。",
   "",
   "春幡春勝，一陣春風吹酒醒。",
   "不似天涯，卷起楊花似雪花。"
  ],
  "note": "天涯海角也有春風桃紅，何處不是好風景。"
 },
 {
  "title": "菩薩蠻・數間茅屋閒臨水",
  "author": "宋・王安石",
  "body": [
   "數間茅屋閒臨水，窄衫短帽垂楊裏。",
   "花是去年紅，吹開一夜風。",
   "",
   "梢梢新月偃，午醉醒來晚。",
   "何物最關情？黃鸝三兩聲。"
  ],
  "note": "茅屋臨水黃鸝啼鳴，閒適生活最關情。"
 },
 {
  "title": "浣溪沙・百畝中庭半是苔",
  "author": "宋・王安石",
  "body": [
   "百畝中庭半是苔，門前白道水縈迴。愛此蕭條竹裏開。",
   "",
   "歸去也無風雨也無晴。"
  ],
  "note": "愛這蕭條竹中景，歸去時風雨晴都不在意。"
 },
 {
  "title": "春遊湖",
  "author": "宋・徐俯",
  "body": [
   "雙飛燕子幾時回？夾岸桃花蘸水開。",
   "春雨斷橋人不度，小舟撐出柳陰來。"
  ],
  "note": "斷橋無路時，柳陰中撐出一葉小舟來。"
 },
 {
  "title": "好事近・風定落花深",
  "author": "宋・李清照",
  "body": [
   "風定落花深，簾外擁紅堆雪。",
   "長記海棠開後，正傷春時節。",
   "",
   "酒闌歌罷玉尊空，青缸暗明滅。",
   "魂夢不堪幽怨，更一聲啼鴂。"
  ],
  "note": "海棠開後傷春起，啼鴂一聲夢魂驚。"
 },
 {
  "title": "浣溪沙・閨情",
  "author": "宋・李清照",
  "body": [
   "繡面芙蓉一笑開，斜飛寶鴨襯香腮。眼波才動被人猜。",
   "",
   "一面風情深有韻，半箋嬌恨寄幽懷。月移花影約重來。"
  ],
  "note": "眼波一動便被猜透，少女心事藏不住。"
 },
 {
  "title": "池上二絕",
  "author": "宋・岳飛",
  "body": [
   "經年塵土滿征衣，特特尋芳上翠微。",
   "好水好山看不足，馬蹄催趁月明歸。"
  ],
  "note": "征衣塵土中偷閒賞山水，月明催歸也看不夠。"
 },
 {
  "title": "蝶戀花・送春",
  "author": "宋・朱淑真",
  "body": [
   "樓外垂楊千萬縷，欲繫青春，少住春還去。",
   "猶自風前飄柳絮，隨春且看歸何處。",
   "",
   "綠滿山川聞杜宇，便做無情，莫也愁人苦。",
   "把酒送春春不語，黃昏卻下瀟瀟雨。"
  ],
  "note": "千萬縷楊柳也繫不住春天，它走時只留下一場黃昏雨。"
 },
 {
  "title": "唐多令・蘆葉滿汀洲",
  "author": "宋・劉過",
  "body": [
   "蘆葉滿汀洲，寒沙帶淺流。",
   "二十年、重過南樓。",
   "柳下繫船猶未穩，能幾日、又中秋。",
   "",
   "黃鶴斷磯頭，故人今在否？",
   "舊江山、渾是新愁。",
   "欲買桂花同載酒，終不似、少年遊。"
  ],
  "note": "舊江山新愁緒，再也回不到少年遊的心境。"
 },
 {
  "title": "卜算子・送鮑浩然之浙東",
  "author": "宋・王觀",
  "body": [
   "水是眼波橫，山是眉峰聚。",
   "欲問行人去那邊？眉眼盈盈處。",
   "",
   "才始送春歸，又送君歸去。",
   "若到江南趕上春，千萬和春住。"
  ],
  "note": "水如眼波山如眉峰，去往江南請與春同住。"
 },
 {
  "title": "木蘭花・城上風光鶯語亂",
  "author": "宋・錢惟演",
  "body": [
   "城上風光鶯語亂，城下煙波春拍岸。",
   "綠楊芳草幾時休？淚眼愁腸先已斷。",
   "",
   "情懷漸覺成衰晚，鸞鏡朱顏驚暗換。",
   "昔年多病厭芳尊，今日芳尊惟恐淺。"
  ],
  "note": "昔日嫌酒多，今日恐酒少，心境變了一切都變。"
 },
 {
  "title": "賀新郎・端午",
  "author": "宋・劉克莊",
  "body": [
   "深院榴花吐，畫簾開、綵衣飛蝶，玉盤盛露。",
   "粽葉香飄十里，對酒攜樽俎。",
   "更誰家、橫笛吹雨？",
   "且和義皇清閒意，採蓮南塘秋暮語。",
   "留此恨，付湘竹。",
   "",
   "年年重五歸期誤，最堪傷、孤舟江上，楚天無數。",
   "沈湘人去已遠，勸君莫唱楚辭句。",
   "昔事還堪念否？",
   "往日多少歡娛，到而今只成追憶。",
   "空贏得、青衫如故。"
  ],
  "note": "端午思屈原，年年此日孤舟楚天愁。"
 },
 {
  "title": "訴衷情・小桃灼灼柳鬖鬖",
  "author": "宋・黃庭堅",
  "body": [
   "小桃灼灼柳鬖鬖，春色滿江南。",
   "雨晴風暖煙淡，天氣正醺酣。",
   "",
   "山潑黛，水挼藍，翠相搀。",
   "歌樓酒旆，故故招人，權典青衫。"
  ],
  "note": "春色滿江南，山如潑黛水如挼藍，美不勝收。"
 },
 {
  "title": "清平樂・獨宿博山王氏庵",
  "author": "宋・辛棄疾",
  "body": [
   "繞床飢鼠，蝙蝠翻燈舞。",
   "屋上松風吹急雨，破紙窗間自語。",
   "",
   "平生塞北江南，歸來華髮蒼顏。",
   "布被秋宵夢覺，眼前萬里江山。"
  ],
  "note": "破屋寒夜中夢醒，眼前仍是萬里江山。"
 },
 {
  "title": "黃鶴樓",
  "author": "宋・陸游",
  "body": [
   "手把仙人綠玉枝，吾行忽及早秋期。",
   "蒼龍闕角歸何晚，白鶴樓頭亦似知。"
  ],
  "note": "登樓遠望秋色，仙人何時歸來已不可知。"
 },
 {
  "title": "滿庭芳・曉色雲開",
  "author": "宋・秦觀",
  "body": [
   "曉色雲開，春隨人意，驟雨才過還晴。",
   "古臺芳榭，飛燕蹴紅英。",
   "舞困榆錢自落，鞦韆外、綠水橋平。",
   "東風裏，朱門映柳，低按小秦箏。",
   "",
   "多情，行樂處，珠鈿翠蓋，玉轡紅纓。",
   "漸酒空金榼，花困蓬瀛。",
   "豆蔻梢頭舊恨，十年夢、屈指堪驚。",
   "憑闌久，疏煙淡日，寂寞下蕪城。"
  ],
  "note": "十年如夢屈指堪驚，繁華過後是蕪城寂寞。"
 },
 {
  "title": "菩薩蠻・風柔日薄春猶早",
  "author": "宋・李清照",
  "body": [
   "風柔日薄春猶早，夾衫乍著心情好。",
   "睡起覺微寒，梅花鬢上殘。",
   "",
   "故鄉何處是？忘了除非醉。",
   "沉水臥時燒，香消酒未消。"
  ],
  "note": "故鄉只有在醉中才能忘卻，醒來愁更深。"
 },
 {
  "title": "阮郎歸・天邊金掌露成霜",
  "author": "宋・晏幾道",
  "body": [
   "天邊金掌露成霜，雲隨雁字長。",
   "綠杯紅袖趁重陽，人情似故鄉。",
   "",
   "蘭佩紫，菊簪黃，殷勤理舊狂。",
   "欲將沉醉換悲涼，清歌莫斷腸。"
  ],
  "note": "重陽佳節以沉醉換悲涼，清歌莫要太斷腸。"
 },
 {
  "title": "南歌子・天上星河轉",
  "author": "宋・李清照",
  "body": [
   "天上星河轉，人間簾幕垂。",
   "涼生枕簟淚痕滋。起解羅衣聊問、夜何其。",
   "",
   "翠貼蓮蓬小，金銷藕葉稀。",
   "舊時天氣舊時衣。只有情懷不似、舊家時。"
  ],
  "note": "天氣如舊衣裳如舊，只有情懷再不似從前。"
 },
 {
  "title": "西江月・平山堂",
  "author": "宋・蘇軾",
  "body": [
   "三過平山堂下，半生彈指聲中。",
   "十年不見老仙翁，壁上龍蛇飛動。",
   "",
   "欲弔文章太守，仍歌楊柳春風。",
   "休言萬事轉頭空，未轉頭時皆夢。"
  ],
  "note": "不必等轉頭才知空，未轉頭時已是一場夢。"
 },
 {
  "title": "賀新郎・同父見和再用韻答之",
  "author": "宋・辛棄疾",
  "body": [
   "老大那堪說。似而今、元龍臭味，孟公瓜葛。",
   "我病君來高歌飲，驚散樓頭飛雪。",
   "笑富貴千鈞如髮。硬語盤空誰來聽？記當時、只有西窗月。",
   "重進酒，換鳴瑟。",
   "",
   "事無兩樣人心別。問渠儂：神州畢竟，幾番離合？",
   "汗血鹽車無人顧，千里空收駿骨。",
   "正目斷關河路絕。",
   "我最憐君中宵舞，道男兒到死心如鐵。",
   "看試手，補天裂。"
  ],
  "note": "男兒到死心如鐵，試手補天裂是最高的壯志。"
 },
 {
  "title": "秋日",
  "author": "宋・程顥",
  "body": [
   "閒來無事不從容，睡覺東窗日已紅。",
   "萬物靜觀皆自得，四時佳興與人同。",
   "道通天地有形外，思入風雲變態中。",
   "富貴不淫貧賤樂，男兒到此是豪雄。"
  ],
  "note": "靜觀萬物皆自得，四季皆有可樂之處。"
 },
 {
  "title": "清明",
  "author": "宋・黃庭堅",
  "body": [
   "佳節清明桃李笑，野田荒塚只生愁。",
   "雷驚天地龍蛇蟄，雨足郊原草木柔。",
   "人乞祭餘驕妾婦，士甘焚死不公侯。",
   "賢愚千載知誰是，滿眼蓬蒿共一丘。"
  ],
  "note": "賢愚千載最終同歸一丘，清明最宜思生死。"
 },
 {
  "title": "牧童詩",
  "author": "宋・黃庭堅",
  "body": [
   "騎牛遠遠過前村，短笛橫吹隔隴聞。",
   "多少長安名利客，機關用盡不如君。"
  ],
  "note": "牧童騎牛吹笛的自在，勝過長安名利場的算計。"
 },
 {
  "title": "病起書懷",
  "author": "宋・陸游",
  "body": [
   "病骨支離紗帽寬，孤臣萬里客江干。",
   "位卑未敢忘憂國，事定猶須待闔棺。",
   "天地神靈扶廟社，京華父老望和鑾。",
   "出師一表通今古，夜半挑燈更細看。"
  ],
  "note": "位卑未敢忘憂國，是最樸素也最崇高的情懷。"
 },
 {
  "title": "采桑子・恨君不似江樓月",
  "author": "宋・呂本中",
  "body": [
   "恨君不似江樓月，南北東西，南北東西，只有相隨無別離。",
   "",
   "恨君卻似江樓月，暫滿還虧，暫滿還虧，待得團圓是幾時？"
  ],
  "note": "恨你不像月亮常相隨，又恨你像月亮總不圓。"
 },
 {
  "title": "踏莎行・情似遊絲",
  "author": "宋・周紫芝",
  "body": [
   "情似遊絲，人如飛絮，淚珠閣定空相覷。",
   "一溪煙柳萬絲垂，無因繫得蘭舟住。",
   "",
   "雁過斜陽，草迷煙渚，如今已是愁無數。",
   "明朝且做莫思量，如何過得今宵去？"
  ],
  "note": "今宵的愁尚且過不去，明日的不思量又如何做到。"
 },
 {
  "title": "木蘭花慢・可憐今夕月",
  "author": "宋・辛棄疾",
  "body": [
   "可憐今夕月，向何處、去悠悠？",
   "是別有人間，那邊才見，光影東頭？",
   "是天外空汗漫，但長風浩浩送中秋？",
   "飛鏡無根誰繫？嫦娥不嫁誰留？",
   "",
   "謂經海底問無由，恍惚使人愁。",
   "怕萬里長鯨，縱橫觸破，玉殿瓊樓。",
   "蝦蟆故堪浴水，問雲何玉兔解沉浮？",
   "若道都齊無恙，雲何漸漸如鉤？"
  ],
  "note": "對月亮的奇思妙想，是詩人最浪漫的科學探索。"
 },
 {
  "title": "霜天曉角・梅",
  "author": "宋・范成大",
  "body": [
   "晚晴風歇，一夜春威折。",
   "脈脈花疏天淡，雲來去、數枝雪。",
   "",
   "勝絕，愁亦絕。此情誰共說？",
   "惟有兩行低雁，知人倚、畫樓月。"
  ],
  "note": "梅花疏淡如雪，愁緒只有低飛的雁知道。"
 },
 {
  "title": "臨江仙・送錢穆父",
  "author": "宋・蘇軾",
  "body": [
   "一別都門三改火，天涯踏盡紅塵。",
   "依然一笑作春溫。無波真古井，有節是秋筠。",
   "",
   "惆悵孤帆連夜發，送行淡月微雲。",
   "尊前不用翠眉顰。人生如逆旅，我亦是行人。"
  ],
  "note": "人生如逆旅，你我皆是匆匆行人，何必太傷感。"
 },
 {
  "title": "點絳唇・感興",
  "author": "宋・王禹偁",
  "body": [
   "雨恨雲愁，江南依舊稱佳麗。",
   "水村漁市，一縷孤煙細。",
   "",
   "天際征鴻，遙認行如綴。",
   "平生事，此時凝睇，誰會憑欄意？"
  ],
  "note": "雨恨雲愁中的江南依舊美麗，只是無人懂我凝望之意。"
 },
 {
  "title": "浣溪沙・送梅庭老赴上黨學官",
  "author": "宋・蘇軾",
  "body": [
   "門外東風雪灑裾，山頭回首望三吳。不應彈鋏為無魚。",
   "",
   "上黨從來天下脊，先生元是古之儒。時平不用魯連書。"
  ],
  "note": "時平不用英雄策，先生自是古之大儒。"
 },
 {
  "title": "青玉案・年年社日停針線",
  "author": "宋・黃庭堅",
  "body": [
   "年年社日停針線，怎忍見、雙飛燕？",
   "今日江城春已半，一身猶在，亂山深處，寂寞溪橋畔。",
   "",
   "春衫著破誰針線？點點行行淚痕滿。",
   "落日解鞍芳草岸，花無人戴，酒無人勸，醉也無人管。"
  ],
  "note": "花無人戴酒無人勸，醉了也無人管，是最徹底的孤獨。"
 },
 {
  "title": "好事近・搖首出紅塵",
  "author": "宋・朱敦儒",
  "body": [
   "搖首出紅塵，醒醉更無時節。",
   "活計綠蓑青笠，慣披霜衝雪。",
   "",
   "晚來風定釣絲閒，上下是新月。",
   "千里水天一色，看孤鴻明滅。"
  ],
  "note": "披蓑衝雪釣新月，紅塵之外自有清明世界。"
 },
 {
  "title": "武陵春・桃李風前多嫵媚",
  "author": "宋・辛棄疾",
  "body": [
   "走去走來三百里，五日以為期。",
   "六日歸時已是疑，應是望多時。",
   "",
   "鞭個馬兒歸去也，心急馬行遲。",
   "不免相煩喜鵲兒，先報那人知。"
  ],
  "note": "歸心似箭馬卻嫌慢，只好央喜鵲先去報信。"
 },
 {
  "title": "舟中曉望",
  "author": "宋・楊萬里",
  "body": [
   "蘆荻叢中一棹聲，人家多在橘林行。",
   "乾坤身外無餘事，水面初平天未明。"
  ],
  "note": "天地之間無餘事，水面初平晨光微露。"
 },
 {
  "title": "插秧歌",
  "author": "宋・楊萬里",
  "body": [
   "田夫拋秧田婦接，小兒拔秧大兒插。",
   "笠是兜鍪蓑是甲，雨從頭上濕到胛。",
   "喚渠朝餐歇半霎，低頭折腰只不答。",
   "秧根未牢蒔未匝，照管鵝兒與雛鴨。"
  ],
  "note": "農忙時節顧不上吃飯，生活的辛勞也是一種詩。"
 },
 {
  "title": "稚子弄冰",
  "author": "宋・楊萬里",
  "body": [
   "稒子金盆脫曉冰，彩絲穿取當銀鉦。",
   "敲成玉磬穿林響，忽作玻璃碎地聲。"
  ],
  "note": "冰碎如玉磬之聲，童年的遊戲天真而美妙。"
 },
 {
  "title": "蝶戀花・密州上元",
  "author": "宋・蘇軾",
  "body": [
   "燈火錢塘三五夜，明月如霜，照見人如畫。",
   "帳底吹笙香吐麝，更無一點塵隨馬。",
   "",
   "寂寞山城人老也！擊鼓吹簫，卻入農桑社。",
   "火冷燈稀霜露下，昏昏雪意雲垂野。"
  ],
  "note": "從繁華錢塘到寂寞山城，心境如霜露般清冷。"
 },
 {
  "title": "醉花陰・黃花謾說年年好",
  "author": "宋・辛棄疾",
  "body": [
   "黃花謾說年年好，也趁秋光老。",
   "綠鬢不驚秋，若斗尊前，人好花堪笑。",
   "",
   "蟠桃結子知多少？家住三山島。",
   "何日跨歸鸞，灃水清風，又報平安了。"
  ],
  "note": "黃花年年好，可人也隨秋光漸老。"
 },
 {
  "title": "水調歌頭・落日繡簾捲",
  "author": "宋・蘇軾",
  "body": [
   "落日繡簾捲，亭下水連空。",
   "知君為我新作，窗戶濕青紅。",
   "長記平山堂上，欹枕江南煙雨，杳杳沒孤鴻。",
   "認得醉翁語，山色有無中。",
   "",
   "一千頃，都鏡淨，倒碧峰。",
   "忽然浪起，掀舞一葉白頭翁。",
   "堪笑蘭臺公子，未解莊生天籟，剛道有雌雄。",
   "一點浩然氣，千里快哉風。"
  ],
  "note": "一點浩然氣在胸，千里快哉風在懷，何其暢快。"
 },
 {
  "title": "綠頭鴨・詠月",
  "author": "宋・晁元禮",
  "body": [
   "晚雲收，淡天一片琉璃。",
   "爛銀盤、來從海底，皓色千里澄輝。",
   "瑩無塵、素娥澹佇；靜可數、丹桂參差。",
   "玉露初零，金風未凜，一年無似此佳時。",
   "露坐久，疏螢時度，烏鵲正南飛。",
   "瑤臺冷，欄杆憑暖，欲下遲遲。"
  ],
  "note": "秋月澄輝千里，一年中最好的時節。"
 },
 {
  "title": "瑞龍吟・章臺路",
  "author": "宋・周邦彥",
  "body": [
   "章臺路，還見褪粉梅梢，試花桃樹。",
   "愔愔坊陌人家，定巢燕子，歸來舊處。",
   "黯凝佇，因念箇人癡小，乍窺門戶。",
   "侵晨淺約宮黃，障風映袖，盈盈笑語。",
   "",
   "前度劉郎重到，訪鄰尋里，同時歌舞。",
   "唯有舊家秋娘，聲價如故。",
   "吟箋賦筆，猶記燕臺句。",
   "知誰伴、名園露飲，東城閒步？",
   "事與孤鴻去，探春盡是，傷離意緒。",
   "官柳低金縷。歸騎晚、纖纖池塘飛雨。",
   "斷腸院落，一簾風絮。"
  ],
  "note": "重訪舊地人事已非，唯有秋娘聲價如故。"
 },
 {
  "title": "除夜作",
  "author": "宋・蘇軾",
  "body": [
   "歲事盡從殘歲去，春光還向暮春生。",
   "舊桃新符渾閒事，暗裏催人白髮生。"
  ],
  "note": "新桃換舊符是熱鬧事，暗裏白髮生是寂寞事。"
 },
 {
  "title": "溪居",
  "author": "宋・林逋",
  "body": [
   "偶向溪邊步藥畦，鄰翁來往說鋤犁。",
   "鮮魚在柳穿新碧，濁酒盈樽帶嫩醅。",
   "雨過日斜群鳥散，春深煙暖百花飛。",
   "莫將世事兼身事，須信乾坤一布衣。"
  ],
  "note": "做天地間一介布衣，莫將世事太放在心上。"
 },
 {
  "title": "長相思・雨",
  "author": "宋・萬俟詠",
  "body": [
   "一聲聲，一更更。窗外芭蕉窗裏燈，此時無限情。",
   "",
   "夢難成，恨難平。不道愁人不喜聽，空階滴到明。"
  ],
  "note": "芭蕉雨聲不管愁人心情，一滴滴響到天明。"
 },
 {
  "title": "浣溪沙・荷花",
  "author": "宋・蘇軾",
  "body": [
   "四面垂楊十里荷，問雲何處最花多。畫樓南畔夕陽和。",
   "",
   "天氣乍涼人寂寞，光陰須得酒消磨。且來花裏聽笙歌。"
  ],
  "note": "十里荷花中消磨光陰，寂寞時來花間聽笙歌。"
 },
 {
  "title": "攤破浣溪沙・揉破黃金萬點輕",
  "author": "宋・李清照",
  "body": [
   "揉破黃金萬點輕，剪成碧玉葉層層。",
   "風度精神如彥輔，太鮮明。",
   "",
   "梅蕊重重何俗甚，丁香千結苦粗生。",
   "薰透愁人千里夢，卻無情。"
  ],
  "note": "桂花風度精神鮮明，薰透千里夢卻似無情。"
 },
 {
  "title": "洗兒詩",
  "author": "宋・蘇軾",
  "body": [
   "人皆養子望聰明，我被聰明誤一生。",
   "惟願孩兒愚且魯，無災無難到公卿。"
  ],
  "note": "聰明反被聰明誤，不如愚魯平安度一生。"
 },
 {
  "title": "泛吳淞江",
  "author": "宋・王禹偁",
  "body": [
   "葦蓬疏薄漏斜陽，半日孤吟未過江。",
   "惟有鷺鷥知我意，時時翹足對船窗。"
  ],
  "note": "唯有白鷺懂我心意，翹足相對默默無言。"
 },
 {
  "title": "臨江仙・探梅",
  "author": "宋・辛棄疾",
  "body": [
   "老去惜花心已懶，愛梅猶繞江村。",
   "一枝先破玉溪春。更無花態度，全有雪精神。",
   "",
   "剩向空山餐秀色，為渠著句清新。",
   "竹根流水帶溪雲。醉中渾不記，歸路月黃昏。"
  ],
  "note": "梅花全有雪的精神，無花的態度反而更高潔。"
 },
 {
  "title": "賀新郎・把酒長亭說",
  "author": "宋・辛棄疾",
  "body": [
   "把酒長亭說。看淵明、風流酷似，臥龍諸葛。",
   "何處飛來林間鵲，蹙踏松梢殘雪。",
   "要破帽多添華髮。剩水殘山無態度，被疏梅料理成風月。",
   "兩三雁，也蕭瑟。",
   "",
   "佳人重約還輕別。悵清江、天寒不渡，水深冰合。",
   "路斷車輪生四角，此地行人銷骨。",
   "問誰使、君來愁絕？",
   "鑄就而今相思錯，料當初、費盡人間鐵。",
   "長夜笛，莫吹裂。"
  ],
  "note": "鑄就相思錯，費盡人間鐵，最沉痛的離愁。"
 },
 {
  "title": "柳梢青・送盧梅坡",
  "author": "宋・劉過",
  "body": [
   "泛菊杯深，吹梅角遠，同在京城。",
   "聚散匆匆，雲邊孤雁，水上浮萍。",
   "",
   "教人怎不傷情？覺幾度、魂飛夢驚。",
   "後夜相思，塵隨馬去，月逐舟行。"
  ],
  "note": "離別後月隨舟行塵隨馬去，思念無處不在。"
 },
 {
  "title": "南鄉子・歸夢寄吳檣",
  "author": "宋・陸游",
  "body": [
   "歸夢寄吳檣，水驛江程去路長。",
   "想見芳洲初繫纜，斜陽，煙樹參差認武昌。",
   "",
   "愁鬢點新霜，曾是朝衣染御香。",
   "重到故鄉交舊少，淒涼，卻恐他鄉勝故鄉。"
  ],
  "note": "重回故鄉舊友零落，恐怕他鄉反勝故鄉。"
 },
 {
  "title": "蝶戀花・別範南伯",
  "author": "宋・楊炎正",
  "body": [
   "離恨做成春夜雨，添得春江，剗地東流去。",
   "弱柳繫船都不住，為君愁絕聯舟處。",
   "",
   "老去悲秋強自寬，興來今日盡君歡。",
   "長溝流月去無聲，杏花疏影裏，吹笛到天明。"
  ],
  "note": "離恨化春雨匯入江水，弱柳也繫不住遠行的船。"
 },
 {
  "title": "鹧鸪天・鵝湖歸病起作",
  "author": "宋・辛棄疾",
  "body": [
   "枕簟溪堂冷欲秋，斷雲依水晚來收。",
   "紅蓮相倚渾如醉，白鳥無言定自愁。",
   "",
   "書咄咄，且休休，一丘一壑也風流。",
   "不知筋力衰多少，但覺新來懶上樓。"
  ],
  "note": "一丘一壑也風流，病後方知閒適之美。"
 },
 {
  "title": "夜泊水村",
  "author": "宋・陸游",
  "body": [
   "腰間羽箭久凋零，太息燕然未勒銘。",
   "老子猶堪絕大漠，諸君何至泣新亭。",
   "一身報國有萬死，雙鬢向人無再青。",
   "記取江湖泊船處，臥聞新雁落寒汀。"
  ],
  "note": "報國萬死不辭，只恨雙鬢已不再青。"
 },
 {
  "title": "清平樂・春晚",
  "author": "宋・王安中",
  "body": [
   "留春不住，費盡鶯兒語。",
   "滿地殘紅宮錦汙，昨夜南園風雨。",
   "",
   "小憐初上琵琶，曉來思繞天涯。",
   "不肯畫堂朱戶，春風自在楊花。"
  ],
  "note": "留春不住是常態，楊花自在隨風才是灑脫。"
 },
 {
  "title": "西河・和王潛齋韻",
  "author": "宋・史達祖",
  "body": [
   "天邊漸曉，正參橫月落，客夢初覺。",
   "暮雲長江千嶂黑，想翠幕遮寒怯怯。",
   "小梅過盡疏桐秋，自窣窣、衣裳如削。",
   "",
   "正漠漠水雲朝暮色，斷岸微明有霜雪。",
   "杯殘歲暮人將歸，問何日可重來約？"
  ],
  "note": "歲暮歸途問何日重來，離別總帶著不確定。"
 },
 {
  "title": "玉蝴蝶・望處雨收雲斷",
  "author": "宋・柳永",
  "body": [
   "望處雨收雲斷，憑闌悄悄，目送秋光。",
   "晚景蕭疏，堪動宋玉悲涼。",
   "水風輕、蘋花漸老，月露冷、梧葉飄黃。",
   "遣情傷，故人何在，煙水茫茫。",
   "",
   "難忘。文期酒會，幾孤風月，屢變星霜。",
   "海闊山遙，未知何處是瀟湘？",
   "念雙燕、難憑遠信，指暮天、空識歸航。",
   "黯相望，斷鴻聲裏，立盡斜陽。"
  ],
  "note": "斷鴻聲裏立盡斜陽，是思念最孤絕的姿態。"
 },
 {
  "title": "定風波・自春來慘綠愁紅",
  "author": "宋・柳永",
  "body": [
   "自春來、慘綠愁紅，芳心是事可可。",
   "日上花梢，鶯穿柳帶，猶壓香衾臥。",
   "暖酥消，膩雲嚲，終日厭厭倦梳裹。",
   "無那！恨薄情一去，音書無箇。",
   "",
   "早知恁麼，悔當初、不把雕鞍鎖。",
   "向雞窗、只與蠻箋象管，拘束教吟課。",
   "鎮相隨，莫拋躲，針線閒拈伴伊坐。",
   "和我，免使年少，光陰虛過。"
  ],
  "note": "早知如此，當初就該把你留住不放。"
 },
 {
  "title": "滿江紅・赤壁懷古",
  "author": "宋・戴復古",
  "body": [
   "赤壁磯頭，一番過、一番懷古。",
   "想當時、周郎年少，氣吞區宇。",
   "萬騎臨江貔虎噪，千艘列炬魚龍怒。",
   "卷長波、一鼓困曹瞞，今如許。",
   "",
   "江上渡，江邊路。形勝地，興亡處。",
   "覽遺蹤，勝讀史書言語。",
   "幾度東風吹世換，千年往事隨潮去。",
   "問道傍、楊柳為誰春，搖金縷。"
  ],
  "note": "千年往事隨潮去，楊柳不管興亡只管春。"
 },
 {
  "title": "玉樓春・東城漸覺風光好",
  "author": "宋・宋祁",
  "body": [
   "東城漸覺風光好，縠皺波紋迎客棹。",
   "綠楊煙外曉寒輕，紅杏枝頭春意鬧。",
   "",
   "浮生長恨歡娛少，肯愛千金輕一笑。",
   "為君持酒勸斜陽，且向花間留晚照。"
  ],
  "note": "紅杏枝頭春意鬧，一個鬧字寫活了整個春天。"
 },
 {
  "title": "浣溪沙・春情",
  "author": "宋・蘇軾",
  "body": [
   "道字嬌訛語未成，未應春閣夢多情。朝來何事綠鬟傾。",
   "",
   "彩索身輕長趁燕，紅窗睡重不聞鶯。困人天氣日初長。"
  ],
  "note": "春日漸長人漸困，嬌語未成夢正多情。"
 },
 {
  "title": "南歌子・疏雨池塘見",
  "author": "宋・賀鑄",
  "body": [
   "疏雨池塘見，微風襟袖知。",
   "陰陰夏木囀黃鸝，何處飛來白鷺立移時。",
   "",
   "易醉扶頭酒，難逢敵手棋。",
   "日長偏與睡相宜，睡起芭蕉葉上自題詩。"
  ],
  "note": "夏日長眠醒來無事，就在芭蕉葉上題首詩。"
 },
 {
  "title": "木蘭花慢・拆桐花爛漫",
  "author": "宋・柳永",
  "body": [
   "拆桐花爛漫，乍疏雨、洗清明。",
   "正艷杏燒林，緗桃繡野，芳景如屏。",
   "倾城，盡尋勝去，驟雕鞍紺幰出郊坰。",
   "風暖繁弦脆管，萬家競奏新聲。",
   "",
   "盈盈，鬥草踏青。人豔冶、遞逢迎。",
   "向路旁往往，遺簪墮珥，珠翠縱橫。",
   "歡情，對佳麗地，信金罍罄竭玉山傾。",
   "拚卻明朝永日，畫堂一枕春酲。"
  ],
  "note": "清明踏青傾城出遊，一枕春醉是最奢侈的享受。"
 },
 {
  "title": "清平樂・會昌",
