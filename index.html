 {
  "title": "包待制陈州粜米・天下乐",
  "author": "元・无名氏",
  "body": [
   "你比那开封府包龙图少四星。",
   "(大斗子云)兀那老子休要胡说，他两个是权豪势要的人，休要惹他。",
   "(正末唱)卖弄你那官清法正行，多要些也不到的担罪名。",
   "(二斗子云)这米还尖，再抓了些者。",
   "(小忄敝古云)父亲，他又□了些去了。",
   "(正末唱)这壁厢去了半斗，那壁厢□了几升，做的一个轻人来还自轻。",
   "(二斗子云)你挣着口袋，我量与你么。",
   "(正末云)你怎么量米哩？俺不是私自来籴米的。",
   "(大斗子云)你不是私自来籴米，我也是奉官差，不是私自来粜米的。",
   "(正末唱)。"
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "六幺序",
  "author": "元・杨景贤",
  "body": [
   "香馥郁销金帐，光灿烂白象床，俺两个破题儿待弄玉偷香。",
   "听得说天地阴阳，自有纲常，人伦上下，不可孤孀。",
   "俺这里天生阴地无阳长，你何辜不近好婆娘？浮屠尽把三纲丧。",
   "(唐僧云)佛教自是一家。",
   "(女王云)说你那佛怎么？孔夫子文章贯世，天下传扬。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "送李邕之任滑臺",
  "author": "唐・明皇帝",
  "body": [
   "漢家重東郡，宛彼白馬津。",
   "黎庶既蕃殖，臨之勞近臣。",
   "遠別初首路，今行方及春。",
   "課成應第一，良牧爾當仁。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "死生交范张鸡黍・金盏儿",
  "author": "元・宫天挺",
  "body": [
   "想二载隔音尘，千里共消魂，(张元伯云)我则道哥哥不来赴会也，谁想有今日。",
   "(正末唱)我恨不的趁天风飞出山阳郡。",
   "想弟兄的情分痛关亲，我特来升堂重拜母，尊酒细论文。",
   "当初若不因鸡黍约，今日个谁识俺志诚人。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "望歌儿",
  "author": "元・徐田臣《杀狗记》",
  "body": [
   "三人踏雪同宴赏，他两个先自回归，撇你在长街上。",
   "(生作醉语介)二位贤弟赛关张。",
   "(小生)口是心非，休想赛关张！到此方知他调谎，从今后休把亲撇漾。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "中吕・喜春来鉴湖春日",
  "author": "元・张可久",
  "body": [
   "雁啼秋水移冰柱，蚁泛春波倒玉壶，绿杨花谢燕将雏。",
   "人笑语，游遍贺家湖。",
   "金华客舍落红小雨苍苔径，飞絮东风细柳营，可怜客里过清明。",
   "不待听，昨夜杜鹃声。",
   "永康驿中荷盘敲雨珠千颗，山背披云玉一蓑，半篇诗景费吟哦。",
   "芳草坡，松外采茶歌。",
   "春夜收云敛雨销金帐，望月瞻星傅粉郎，欢天喜地小红娘。",
   "来要赏，花影过东墙。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "好酒赵元遇上皇・菩萨梁州",
  "author": "元・高文秀",
  "body": [
   "我须是鳏寡孤独，对谁人分诉，衔冤负屈？（驾云）你这等啼哭也无用也。",
   "（正末唱）因此上气填胸雨泪如珠。",
   "（驾云）赵元，我救你这一命，你意下如何？（正末云）哥哥，你怎生救我？（驾云）你放心，我与上京丞相赵光普一面之交。",
   "我欲待写书去，途中无纸。",
   "楚昭辅，你袖中将的霜毫笔来，你扳着赵元臂膊，石守信扶着兄弟，我在你臂膊上写两行字，画一个押字。",
   "若赵丞相见了时，你必然不死也。",
   "（楚、石二人扶正末科）（正末唱）一个举霜毫，一个扳臂膊，一个把咱扶着，道两行字便是我生天疏。",
   "（楚云）这两行字书、若到上京见了赵丞相，你必不死也。",
   "（正末唱）却教我无事还乡故，这好事要人做。",
   "不想二百长钱买了命处，胜似纸天书。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "雁门关存孝打虎・圣药王",
  "author": "元・无名氏",
  "body": [
   "叵耐他，小觑咱，匣中宝剑定中华。",
   "凭着我坐下马，手中挝，李存孝非是自矜夸，我扶立起大唐家。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "摩利支飞刀对箭・朝天子",
  "author": "元・无名氏",
  "body": [
   "遮莫待开弓也那蹬弩，(张士贵云)你敢扬威耀武么？(正末唱)扬威也那耀武。",
   "(张士贵云)你敢阵面上相持去么？(正末唱)我情愿阵面上相持去，(张士贵云)我就用你在我军阵中，做个小卒，你意下如何？(正末唱)但能够军阵里做一个小卒，(张士贵云)我着你合后当先，你敢去么？(正末唱)遮莫便合后等当先去，(张士贵云)兀那厮，你是军健汉，逢山开路，遇水叠桥，你敢去么？(正末唱)遮莫待遇水叠桥，逢山开路，(张士贵云)你敢施威、敢射虎么？(正末唱)我可便敢施威、敢射虎。",
   "(张士贵云)就用了这厮。",
   "(正末唱)大人若是用度、用度了这勇夫，我马到处写满了您那功劳簿。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "唐享昊天樂 第三",
  "author": "唐・則天皇后",
  "body": [
   "乾儀混成沖邃，天道下濟高明。",
   "闓陽晨披紫闕，太一曉降黃庭。",
   "圜壇敢申昭報，方璧冀展虔情。",
   "丹襟式敷衷懇，玄鑒庶察微誠。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "山神庙裴度还带・采茶歌",
  "author": "元・关汉卿",
  "body": [
   "无才学有权势，有文章受驱驰，长老，这的是鹤长凫短不能齐！比小生剩趱浮财润自己，比吾师身穿几件虼虫两皮。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "看钱奴买冤家债主・后庭花",
  "author": "元・郑延玉",
  "body": [
   "你不肯冬三月开暖堂，你不肯夏三月舍义浆。",
   "则你那情狠身中病，则你那心平便是海上方。",
   "您爷呵，休想道是安康，稳情取无人埋葬。",
   "泪汪汪甚人来守孝堂，急慌慌为亲爷来献香。",
   "我痛杀杀身躯儿无倚仗，他絮叨叨还口愿都是谎。",
   "我骨胀胀傍人谁尽让，他气昂昂不做好勾当。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "张子房圯桥进履・醉太平",
  "author": "元・李文蔚",
  "body": [
   "他那里孜孜觑当，(灌婴云)军师休怕，申阳陆贾二将，如何出得俺手也。",
   "(正末唱)唬的我战兢兢手脚慌张。",
   "(灌婴云)此将中俺之计也。",
   "(正末唱)说道是中吾计不索再商量，(灌婴云)俺韩元帅领大势雄兵来接应也。",
   "(正末唱)又道是兵多将广，(灌婴云)此陆贾并无疑虑之心也。",
   "(正末唱)你道是申阳陆贾别无恙，(灌婴云)若到半途，必然下手也。",
   "(正末唱)到半途暗暗拿雄将。",
   "(灌婴云)想二将不知俺暗定其计也。",
   "(正末唱)他本待要望福禄，不想到这脑背后起灾殃。",
   "我则待坚心扶立明圣主，我播一个《史记》内便书名，可着人慢慢的讲。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "包待制三勘蝴蝶梦・正宫/端正好",
  "author": "元・关汉卿",
  "body": [
   "遥望着死囚牢，恰离了悲田院，谁敢道半步俄延！排门儿叫化都寻遍，讨了些泼剩饭和杂面。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "洞庭湖柳毅传书・仙吕/点绛唇",
  "author": "元・尚仲贤",
  "body": [
   "魂断频哭，梦回不睹，逢春暮，甚日归湖，备把这离愁诉。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "南吕・一枝花遗张伯元",
  "author": "元・周德清",
  "body": [
   "正伯牙志未谐，遇钟子心能解。",
   "使高山群虎啸，要流水老龙哀。",
   "洒落襟怀，一笑乾坤大，高谈云雾开。",
   "几行北雁吞声，一片西山失色。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "商调・集贤宾退隐",
  "author": "元・王德信",
  "body": [
   "捻苍髯笑擎冬夜酒，人事远老怀幽。",
   "志难酬知机的王粲，梦无凭见景的庄周。",
   "抱孙孙儿成愿足，引甥甥女嫁心休。",
   "百年期六分甘到手，数支干周遍又从头。",
   "笑频因酒醉，烛换为诗留。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "圣药王・我如今近七十，才晓得，方知道老而不死是为贼。指鹿做马，唤",
  "author": "元・吴仁卿",
  "body": [
   "凤做鸡。",
   "葫芦今后大家提，想谁别辨个是和非。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "六・撺断的昏撒多，主张的自吸溜，几曾见双撮泥金袖。可怜虱虮沿肩甲，",
  "author": "元・高安道",
  "body": [
   "犹道珍珠络臂耩。",
   "四翩儿乔弯纽，甚实曾官梅点额，谁肯将蜀锦缠头。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "关云长千里独行・金盏儿",
  "author": "元・无名氏",
  "body": [
   "刀剑-时催，弓弩似电光飞。",
   "伏兵四面一齐起，饶你有通天武艺，怎施威。",
   "骤征马宛寻家计，插翅走如飞。",
   "他可甚鞭敲金镫响，人和凯歌回。",
   "(曹末与关末相见科)(曹末云)云长，一别许久也。",
   "则今日咱便往京师，见了圣人，将你重重赐赏加官。",
   "一壁厢准备车乘，老小每上车。",
   "(关末云)嫂嫂，您上车儿先行。",
   "(正旦云)多谢叔叔。",
   "(关末云)嫂嫂，关羽不敢。",
   "(小旦云)姐姐，若不是二叔叔，俺岂有今日也。",
   "(正旦唱)。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "龙济山野猿听经・耍孩儿",
  "author": "元・无名氏",
  "body": [
   "恰便似青螺放顶云霄中插，高接凌空彩霞。",
   "你看俺奇山秀水两交加，绕僧堂禅室堪佳。",
   "果然是依为佛祖菩提处。",
   "堪作禅僧寂静家。",
   "端的是真图画，小生心响豁畅，肺腑清嘉。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "随何赚风魔蒯通・得胜令",
  "author": "元・无名氏",
  "body": [
   "呀，畅好是没算计的汉贤良，左使着这一片狠心肠。",
   "早知道屈死了韩元帅，何不还留他楚霸王。",
   "图甚么风光，待气昂昂端坐在中军帐；只不如守着农庄，倒也稳拍拍常为田舍郎。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "也不罗・只听得乐声喧，列着华筵，聚集诸亲眷。首先一盏拦门劝，走马",
  "author": "元・关汉卿",
  "body": [
   "身劳倦。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "・草堂时共渔樵论：笔儿曹富贵浮云。椰子瓢，松花酝；山中风韵，乐道岂忧贫？春怀",
  "author": "元・任昱",
  "body": [
   "幺落花无数满汀洲，转眼春休。",
   "绿阴枝上杜鹃愁，空拖逗，白了少年头。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "包龙图智赚合同文字・得胜令",
  "author": "元・无名氏",
  "body": [
   "呀！这是我独自落便宜，好着我半晌似呆痴。",
   "俺只道正直萧丞相，元来是风魔的党太尉。",
   "堪悲，屈沉杀刘天瑞，谁知可怎了葫芦提包待制？(包待制云)张千，将刘安住下在死囚牢里去。",
   "你近前来。",
   "(打耳喑科)(张千云)理会的。",
   "(张千做枷正末下)(包待制云)这小厮明明要混赖你这家私，是个假的，(搽旦云，大人见的是。",
   "他那里是我亲侄儿刘安住？(张千云)禀爷，那刘安住下在牢里发起病来，有八九分重哩。",
   "(包待制云)天有不测风云，人有旦夕祸福：那小厮恰才无病，怎生下在牢里便有病？张千你再去看来。",
   "(张千报，云)病重九分了也。",
   "(包待制云)，你再看云。",
   "(张千又报，云)刘安住太阳穴被他物所伤，观有青紫痕可验，是个破伤风的病症，死了也。",
   "(搽旦云)死了，谢天地。",
   "(包待制云)怎么了这桩事？如今倒做了人命，事越重了也。",
   "兀那婆子，你与刘安住关亲么？(搽旦云)俺不亲。",
   "(包待制云)你若是亲呵，你是大他是小，休道死了一个刘安住，便死了十个，则是误杀子孙不偿命，则罚些铜纳赎；若是不亲呵。",
   "道不的杀人偿命，欠债还钱。",
   "他是各白世人，你不认他罢了，却拿着甚些仗打破他头，做了破伤风身死。",
   "律上说：殴打平人，因而致死者抵命。",
   "张千将枷来，枷了这婆子，替刘安住偿命去。",
   "(搽旦慌科，云)大人，假若有些关亲，可饶的么？(包待制云)是亲便不偿命。",
   "(搽旦云)这等，他须是俺亲侄儿哩。",
   "(包待制云)兀那婆子，刘安住活时你说不是，刘安住死了，可就说是。",
   "这官府倒由的你那？既说是亲侄儿，有甚么显证？(搽旦云)大人，现有合同文书在此。",
   "(包待制词云)这小厮本说的丁一确二，这婆子生扭做差三错四。",
   "我用的个小小机关，早嫌出合同文字。",
   "兀那婆子，合同文书有一样两张，只这一张，怎做的合同文字？(搽旦云)大人，这里还有一张。",
   "(包待制云)既然合同文字有了也，你买个棺材。",
   "葬埋刘安住去罢。",
   "(搽旦叩头科，云)索是谢了大人。",
   "(包待制云)张千，将刘安住尸首，抬在当面，教他看去。",
   "(张千领正末上)(搽日见科，云)呀！他原来不曾死。",
   "他是假的，不是刘安住。",
   "(包待制云)刘安住，被我赚出这合同文书来了也。",
   "(正末云)若非青天老爷，兀的不屈杀小人也！(包待制云)刘安住，你欢喜么？(正末云)可知欢喜哩。",
   "(包待制云)我更着你大欢喜哩。",
   "张千，司房中唤出那张秉彝来者。",
   "(张秉彝上，见正末悲科)(正末唱)。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "郑孔目风雪酷寒亭・双调/新水令",
  "author": "元・杨显之",
  "body": [
   "我如今向槽房连瓮掇将来，偿还了我弟兄每口债。",
   "酒斟着醇糯醅，脍切着鲤鱼胎。",
   "今口开怀，直吃的沉醉出山寨。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "双调・雁儿落过得胜令闲居",
  "author": "元・宋方壶",
  "body": [
   "功名梦不成，富贵心勾罢。",
   "青山绿水间，茅舍疏篱下。",
   "广种邵平瓜，细焙玉川茶，遍插渊明柳，多栽潘令花。",
   "清佳，寻方外清幽话；欢恰，与亲朋闲戏耍。",
   "套数。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "庞居士误放来生债・仙吕/点绛唇",
  "author": "元・刘君锡",
  "body": [
   "尘世人伦，我可也煞曾穷问，长思忖。",
   "他可便趋富嫌贫，不想那富贵可是天之分。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "摩利支飞刀对箭・后庭花",
  "author": "元・无名氏",
  "body": [
   "休将你这歹孩儿留恋着，枉把我这功名来耽误了。",
   "(孛老儿云)你这一去，凭着你甚么武艺那？(正末唱)凭着我这四海五湖量，(孛老见云)孩儿也，则做庄农罢。",
   "(正末唱)我怎肯深村里穷到老？(孛老儿云)两阵之间，你怎生与他拒敌？(正末唱)你看我便显英豪，听您这歹孩儿言道，马头前若撞着，仗英雄显荣耀！(卜儿云)孩儿也，便好道父母在堂，不可远游也。",
   "(正末唱)见母亲留恋着，老家尊心内焦。",
   "(孛老儿云)好共歹不要你去。",
   "(正末云)父亲，您孩儿若不去呵，(唱)。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "賀李昉",
  "author": "宋・范質",
  "body": [
   "翰苑重求李謫仙，詞鋒穎利勝龍泉。",
   "朝趨建禮霞烘日，夜直承明月印天。",
   "聖主重知緣國士，相公多喜爲同年。",
   "青春才子金門貴，蜀錦袍新奪日鮮。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "破幽梦孤雁汉宫秋・十二月",
  "author": "元・马致远",
  "body": [
   "休道是咱家动情，你宰相每也生憎。",
   "不比那雕梁燕语，不比那锦树莺鸣。",
   "汉昭君离乡背井，知他在何处愁听！。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "幺篇・腰瘦刚争不姓沈，被闲愁恼至如今。只为那镜约钗期，翻做了花毒",
  "author": "元・刘庭信",
  "body": [
   "酒鸩，揣上一个罪名儿雨囚云禁。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "梁山泊李逵负荆・离亭宴煞",
  "author": "元・康进之",
  "body": [
   "蓼儿洼里开筵待，花标树下肥羊宰，酒尽呵拚当再买。",
   "涎邓邓眼睛剜，滴屑屑手脚卸，碜可可心肝摘。",
   "饿虎口中将脆骨夺，骊龙颔下把明珠握，生担他一场利害。",
   "(带云)智深哥哥，(唱)我也则要洗清你这强打挣的执柯人，(带云)公明哥哥，(唱)出脱你这干风情的画眉客。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "喜迁鸾",
  "author": "元・无名氏《张协状元》",
  "body": [
   "喜到宸京，涉山川万般愁闷。",
   "儿夫见免萦奴方寸，未知是何处深藏见在身？遍寻觅，浑不见故人。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "谢金吾诈拆清风府・金蕉叶",
  "author": "元・无名氏",
  "body": [
   "则这满京城百姓每尽知，你与俺大宋朝出甚么气力？提起他父子每端的痛悲，一辈辈于家为国。"
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "泛清苕",
  "author": "宋・张先",
  "body": [
   "绿净无痕，过晓霁清苕，镜里游人。",
   "红柱巧，彩船稳，当筵主、秘馆词臣。",
   "吴娃劝饮韩娥唱，竞艳容、左右皆春。",
   "学为行雨，傍画桨，从教水溅罗裙。",
   "溪烟混月黄昏。",
   "渐楼台上下，火影星分。",
   "飞槛倚，斗牛近，响箫鼓、远破重云。",
   "归轩未至千家待，掩半妆、翠箔朱门。",
   "衣香拂面，扶醉卸簪花，满袖馀煴。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "赚煞・花月巧梳妆，脂粉娇调弄，没乱杀看花的眼睛，更那堪心有灵犀一",
  "author": "元・于伯渊",
  "body": [
   "点通，恼春光烂熳娇慵，莫不是蕊珠宫天上飞琼。",
   "走向瑶台月下逢。",
   "比及他彩灯照梦，且看咱隔墙儿窥宋，俊宠儿娇怯海棠风。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "马丹阳三度任风子・混江龙",
  "author": "元・马致远",
  "body": [
   "俺屠家开宴，端的是肉如山岳酒如川。",
   "都是些吾兄我弟，等辈齐肩。",
   "直吃的月上化梢倾尽酒，风吹荷叶倒垂莲。",
   "客喧席上，酒到跟前；何曾摘厌，并不推言。",
   "一盏盏接入手，可都干干的咽。",
   "卖弄他掂斤播两，拨万论千。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "經東都太子橋",
  "author": "宋・徐鉉",
  "body": [
   "綸闈放逐知何道，桂苑風流且暫歸。",
   "莫問升遷橋上客，身謀疏拙舊心違。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "朱砂担滴水浮沤记・仙吕/端正好",
  "author": "元・无名氏",
  "body": [
   "躲非灾，离乡故，相别罢便践程途。",
   "(旦儿云)王文用，今日分别，好生凄凉也。",
   "(正末唱)方信道人生唯有别离苦，眼看着向那海角天涯去。",
   "(下)。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "赵盼儿风月救风尘・得胜令",
  "author": "元・关汉卿",
  "body": [
   "宋引章有亲夫，他强占作家属。",
   "淫乱心情歹，凶顽胆气粗，无徒！到处里胡为做。",
   "现放着体书，望恩官明鉴取。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "卜算子·塞草晚才青",
  "author": "清・納蘭性德",
  "body": [
   "塞草晚才青，日落箫笳动，戚戚凄凄入夜分，催度星前梦",
   "小语绿杨烟，怯踏银河冻，行尽关山到白狼，相见惟珍重",
   " "
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "承明殿霍光鬼谏・三煞",
  "author": "元・杨梓",
  "body": [
   "可知道摘星楼剖下比干，汨罗江淹杀屈原，姑苏台范蠡辞了勾践。",
   "从来乱国皆无道，自古昏君不重贤，不把清浊辨，则怕吃人心盗跖，那里敬有德行颜渊。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "集贤宾",
  "author": "元・徐田臣《杀狗记》",
  "body": [
   "(旦)官人近日心恁偏，与兄弟结冤。",
   "每日与非亲同欢宴，把骨肉顿成抛闪。",
   "不听劝谏，怕迤逦日疏日远。",
   "长挂念，恐一宅分为两院。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "幺・垂杨渡口人相送，拜深深暗祝东风：“他去的高挂起帆，则愿休吹动。”",
  "author": "元・贯云石",
  "body": [
   "刚留一宿，天意肯相容？春春风花草满园香，马系在垂杨。",
   "桃红柳绿映池塘，堪游赏，沙暖睡鸳鸯。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "天下乐・一个黄桑叶拈将来额上粘，一个那里磨镰。一个将榆树舔，一个",
  "author": "元・王大学士",
  "body": [
   "树梢头ㄋ歌不怕险。",
   "一个吊小鬼的灰抹眉，一个扮判官的墨画了髯，一个扮牛王着土抢脸。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "郊廟歌辭 雩祀樂章 肅和",
  "author": "唐・褚亮",
  "body": [
   "朱鳥開辰，蒼龍啓映。",
   "大帝昭饗，羣生展敬。",
   "禮備懷柔，功宣舞詠。",
   "旬液應序，年祥協慶。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "脱布衫带过小梁州北・歌《白雪》余韵悠扬，红牙撒尽按宫商。品玉箫鸾",
  "author": "元・无名氏",
  "body": [
   "鸣凤叶，舞《霓裳》翠盘宫样。",
   "解语知音所事强，端的是世上无双。",
   "冰弦慢拨趁奇腔，声嘹亮，口喷麝兰香。",
   "轻清韵美低低唱，启朱唇皓齿如霜。",
   "穿一套缟素衣，尽都是依宫样。",
   "又不是悲秋宋玉，可着我想像赋高唐。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "迷青琐倩女离魂・鹊踏枝",
  "author": "元・郑光祖",
  "body": [
   "据胸次，那英豪；论人品，更清高。",
   "他管跳出黄尘，走上青霄。",
   "又不比闹清晓，茅檐燕雀；他是掣风涛，混海鲸鳌。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "董秀英花月东墙记・二煞",
  "author": "元・白朴",
  "body": [
   "婚姻配偶迟，难挨更漏永，画蛾眉懒去临妆镜。",
   "老天不管人憔翠，一派黄河九遍清。",
   "贞烈性，也只是粉墙一堵，似隔着百座连城。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "中吕・满庭芳春夜",
  "author": "元・王举之",
  "body": [
   "梨花月明，秋千露冷，杨柳烟澄。",
   "海棠病酒风吹醒，不用银灯。",
   "阑干外闲花有影，柳梢头宿鸟无声。",
   "罗帏静，香销玉鼎，禁鼓报初更。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "程咬金斧劈老君堂・醉春风",
  "author": "元・郑光祖",
  "body": [
   "不由咱心内恼泪珠垂，也是咱时运蹇。",
   "不信那贤臣言语受忄西惶，悔时节晚、晚！恨不的驾雾腾云，臂生两翅，飞出狱院。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "宜秋山赵礼让肥・一煞",
  "author": "元・秦简夫",
  "body": [
   "我共埯哥哥半生情分干休了。",
   "(带云)母亲！(唱)这的是你养儿女一世前程无下梢。",
   "我不能勾进取功名，干撇下母亲兄长，割舍我七尺身躯，和这满腹文学。",
   "(云)母亲请坐！受您孩儿几拜。",
   "(唱)我这里拜辞在阶下，知咱每相见在何年？不想我死在今朝。",
   "(卜儿云)孩儿也！等哥哥见一面去也好。",
   "(正末唱)我也等不的哥哥来到，怎肯失口信与儿曹！。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "萨真人夜断碧桃花・满庭芳",
  "author": "元・无名氏",
  "body": [
   "待招你个先生做女婿，他早是一言既出，你可休心下疑惑。",
   "(张道南云)他也识字么？(嬷嬷唱)那小姐诗书上索是攻习，(张道南云)可伶俐么？(嬷嬷唱)那小姐忒温柔俊雅忒伶俐，(张道南云)他伶俐杀也比不的孟光么？(嬷嬷唱)他比孟德耀还多艳质，则你这张京兆怎画蛾眉？真个是天缘对，你可便将息贵体，管教你运至遇良医。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "钱大尹智宠谢天香・醉中天",
  "author": "元・关汉卿",
  "body": [
   "初相见呼你为学士，谨厚不因而；今遍回身嘱付尔，相公也冷眼儿频偷视。",
   "你觑他交椅上抬颏样儿，待的你不同前次，他则是微分间将表字呼之。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "好酒赵元遇上皇・雁儿落",
  "author": "元・高文秀",
  "body": [
   "姜太公颠倒敢，鲁义姑心中鉴。",
   "倚官府要了手模，你今日遭坑陷。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "马丹阳度脱刘行首・锦上花",
  "author": "元・杨景贤",
  "body": [
   "淡饭粗衣。",
   "山中活计。",
   "落托清闲，倒大幽微。",
   "采蕨寻芝，绕山转水。",
   "炼药烧丹，驱神捉鬼。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "古水仙子・我、我、我，自叹吁，罢、罢、罢，姻缘簿仍将姓字书。是、",
  "author": "元・无名氏",
  "body": [
   "是、是，断云将楚岫遮拦，敢、敢、敢，桃花把天台截住，来、来、来，生分开比目鱼，呀、呀、呀，两三朝鬼病揶揄，是、是、是，教吹箫月明无伴侣。",
   "他、他、他，把六朝金粉收拾去，单、单、单，留下写恨几行书。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "杨氏女杀狗劝夫・十二月",
  "author": "元・萧德祥",
  "body": [
   "这公事非同造次，望相公台鉴寻思。",
   "俺哥哥花枝般媳妇，掌着那铜斗家私。",
   "这便是情由终始，有甚的过犯公私？。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "駕幸新豐溫泉宮獻詩三首 一",
  "author": "唐・上官昭容",
  "body": [
   "三冬季月景[龍]年，萬乘觀風出灞川。",
   "遙看電躍龍爲馬，回矚霜原玉作田。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "五煞・照妖镇释坛，护心保命全。分开后对成姻眷，乐昌暗结风流配，鲁",
  "author": "元・曾瑞",
  "body": [
   "肃深谋斩斫权。",
   "憔悴佳人倦，愁观衰貌，鼓照芳研。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "伴读书带过笑和尚北・停歇了泥金柬，隔断了衡阳雁，将一段美爱幽欢常",
  "author": "元・方伯成",
  "body": [
   "凝盼。",
   "为他时晓夜心无惮，怎承望冰人托梦成虚幻？似羝羊触藩，无人驾司马车，凭谁举梁鸿案？贾充宅频巡看，张京兆情绪悭，沈东阳胆心寒。",
   "两眉攒，寸心拴，将意马锁心猿按。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "罗李郎大闹相国寺・沽美酒",
  "author": "元・无名氏",
  "body": [
   "拜了呵再不着榆木枷压项筋。",
   "粗铁锁束腰身，稳情取白马红缨彩色新。",
   "将你那破衣服重加整顿，施礼数叙寒温。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "玉箫女两世姻缘・水仙子",
  "author": "元・乔吉",
  "body": [
   "这公曾绝缨会上戏裙钗，(末云)我在那里来？(正旦唱)也曾细柳营中大会垓。",
   "(末云)我却怎生闹起来？(正旦唱)你将个相公宅看觑似莺花寨。",
   "(末云)是他先怒了我来。",
   "(正旦唱)你道是他不该，便活佛也恼下下莲台。",
   "(末云)我是大元帅，他如何便敢欺我？(正旦唱)也是俺官官相为，你可甚贤贤易色，(末云)我是好意求亲，他怎敢恁的！(正旦唱)因此上不远千里而来。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "张君瑞庆团园(第五本)・仙吕/赏花时",
  "author": "元・王实甫",
  "body": [
   "相见时红雨纷纷点绿苔，别离后黄叶萧萧凝暮霭。",
   "今日见梅开，别离半载。",
   "琴童，我嘱咐你的言语记着！则说道特地寄书来。",
   "(下)(仆云)得了这书，星夜望河中府走一遭。",
   "(下)。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "幺・到冬来搅清酣鸡语繁，漾茅檐日影稠，压梅梢晴雪带花留。倚蒲团唤",
  "author": "元・王德信",
  "body": [
   "童重荡酒，看万里冰绡染就，有王维妙手总难酬。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "北山",
  "author": "詩經",
  "body": [
   "陟彼北山，言采其杞。偕偕士子，朝夕从事。王事靡盬，忧我父母。",
   "",
   "溥天之下，莫非王土；率土之滨，莫非王臣。大夫不均，我从事独贤。",
   "",
   "四牡彭彭，王事傍傍。嘉我未老，鲜我方将。旅力方刚，经营四方。",
   "",
   "或燕燕居息，或尽瘁事国；或息偃在床，或不已于行。",
   "",
   "或不知叫号，或惨惨劬劳；或栖迟偃仰，或王事鞅掌。",
   "",
   "或湛乐饮酒，或惨惨畏咎；或出入风议，或靡事不为。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "唐明堂樂章 迎送王公",
  "author": "唐・則天皇后",
  "body": [
   "千官肅事，萬國朝宗。",
   "載延百辟，爰集三宮。",
   "君臣德合，魚水斯同。",
   "睿圖方永，周曆長隆。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "刘玄德独赴襄阳会・尾声",
  "author": "元・高文秀",
  "body": [
   "痛离别，愁分袂，我和你再相见知道是何年甚日？望新野樊城去路疾，我则要你善加兵紧护城池，则要你用心机将那士马操习，准备着那灭寇兴刘显气势。",
   "那其间这干戈定息，我着他四方宁谧，恁时节风云文武拜丹墀。",
   "(下)。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "瘸李岳诗酒玩江亭・南吕/一枝花",
  "author": "元・无名氏",
  "body": [
   "良辰晓雾浓，美景韶光丽。",
   "草茵轻荏苒，则他这桃李任芳菲。",
   "春日迟迟，槛外黄莺呖，帘前紫燕飞。",
   "幸开怀宴乐欢娱，俺可便宜赏玩，情甘意美。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "尾声・虽忘了并头莲空房独守心常苦，也合想连理枝嫩绿成阴叶未枯。手",
  "author": "元・汤舜民",
  "body": [
   "抵着牙儿自犹豫，几时得ゐ惶业足。",
   "多管是凄凉限促，不由人蘸绿亭前放声儿哭。",
   "客中奇遇寄情代友作风月长存一寸心，雨云又作三春梦；青鸟不传千里信，落花空恨五更风。",
   "想当日旅馆相逢，取次间谐鸾凤。",
   "实心儿担怕恐，瞒不过纱窗下半篝残夜孤灯，喜的是罗帕上数点芳春嫩红。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "踏莎行・彩射龙光，云埋铁柱。迷津烟暗，渡水平湖。高士词堂，旌阳殿",
  "author": "元・庾吉甫",
  "body": [
   "洪恩路，藕花无数。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "李太白贬夜郎・醉高歌",
  "author": "元・王伯成",
  "body": [
   "脚列趄登辇路花基，神恍惚步瑶阶玉砌。",
   "吐了口中涎，按捺定心头气，勉强已呼万岁。",
   "(正末失惊了)。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "三煞・他做官司的剖决明，告私情的能指实，监囚在里人心碎。一个旱莲",
  "author": "元・孙叔顺",
  "body": [
   "腮空滴白凡泪，一个漏芦腿难禁苦仗笞。",
   "吊疼痛，添憔悴。",
   "问甚么干连你父子？可惜教带累他乌梅。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "更漏子",
  "author": "宋・张先",
  "body": [
   "锦筵红，罗幕翠。",
   "侍宴美人姝丽。",
   "十五六，解怜才。",
   "劝人深酒杯。",
   "黛眉长，檀口小。",
   "耳畔向人轻道。",
   "柳阴曲，是儿家。",
   "门前红杏花。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "月明和尚度柳翠・上小楼",
  "author": "元・李寿卿",
  "body": [
   "柳翠也，自从你点污了素体，人将你多曾钻刺。",
   "郎君每他今后无钱向你的手内，但没权术，吃会抛掷。",
   "你若到三四五三六里，那其间早则妆幺不得。",
   "柳翠也，好色的这把骨头儿，你便休恁般寒碎。",
   "(云)抬了者，抬了者。",
   "(旦儿云)母亲，将过气球，来，我和师父踢一抛儿咱。",
   "(卜儿云)下次小的每，将过气球来者。",
   "(做取气球科)(正末云)柳翠，这个唤做甚么？(旦儿云)师父，这个唤做难当的。",
   "(正末云)怎生唤做难当的？(旦儿云)师父，这里面有个表，这个为三添气，郎君子弟要难当作耍呵，吹一口气，添上些水润这表，倾了那水，再吹一口气，拴了这葱管儿，便难当作耍。",
   "去了抛索儿，褪了那口气，便难当作耍不的了也。",
   "(正末云)假若有这口气呵，(旦儿云)便难当的。",
   "(正末云)若无这口气呵。",
   "(旦儿云)便难当不的。",
   "(正末云)若是无了这一口气呵，原来便难当不的。",
   "柳翠也，你便是比并着这气球。",
   "(旦儿云)师父，这气球怎生比并着柳翠？(正末云)你听，我也有一偈。",
   "(偈云)地水与火风，包含无为公，一朝公去后，四大各西东。",
   "(唱)。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "包龙图智赚合同文字・甜水令",
  "author": "元・无名氏",
  "body": [
   "我只为认祖归宗，迟眠早起，登山涉水，甫能勾到庭帏。",
   "又谁知伯母无情，十分猜忌，百般驱逼，直恁的命运低微。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "调笑令・柳七，《乐章集》，把臂双歌真先味。幽欢美爱成佳配，效连理",
  "author": "元・贯云石",
  "body": [
   "鹣鹣比翼。",
   "云窗共寝闻子规，似繁华晓梦惊回。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "李云英风送梧桐叶・梅花酒",
  "author": "元・李唐宾",
  "body": [
   "倚栏杆数断鸿，起阵狂风，吹落梧桐，飘入帘栊。",
   "手亲题一首诗，写离恨在其中。",
   "为家乡信未通，题待罢告天公，替雁帖当鱼封。",
   "风卷起入长空，任南北与西东。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "小尉迟将斗将认父归朝・得胜令",
  "author": "元・无名氏",
  "body": [
   "呀，则为这二十三的小将军，险送了七十老功臣。",
   "(云)孩儿，你拜了军师者。",
   "(唱)你将这徐茂公亲身拜，(小尉迟做拜科，云)军师受小将一礼。",
   "(茂公云)小将军免礼。",
   "刘季真安在？(正末云)孩儿，你拿过刘季真来者。",
   "(卒子做拿刘季真跪见科)(正末唱)分付与你两事家刘季真。",
   "欢欣，同扶着唐天子方兴运，殷也波勒，多谢你个房玄龄落保人。",
   "(茂公云)这是刘季真么？(小尉迟云)则这厮便是刘季真。",
   "(茂公云)令人，将刘季真推出辕门，斩讫报来。",
   "(刘季真云)罢、罢、罢，他本是尉迟公的孩儿，没来由养的他长大成人，倒将我来做降唐的礼物。",
   "你家父子都一样这等没仁没义的，我死去与我家老子说，少不的来报你。",
   "(卒子拿刘季真下)(茂公云)尉迟公，你父子每望阙跪着，听圣人的命。",
   "(词云)则为你勇敢无前，俺唐主宠任多年。",
   "生撇下孩儿不题，再相逢这是天缘。",
   "鄂国公赐金千两，加食邑万顷庄田。",
   "小尉迟金吾上将，作先锋世掌军权。",
   "将斗将同扶王室，鞭对鞭父子团圆。",
   "(正末小尉迟谢恩科)。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "二・逐户儿编褙成料例来，各分旬将勘合书。逐张儿背印拘钤住，即时支",
  "author": "元・刘时中",
  "body": [
   "料还原主。",
   "本日交昏入库府，另有细说直至起解时才方取。",
   "免得他撑船小倒，提调官封锁无虞。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "救孝子贤母不认尸・水仙子",
  "author": "元・王仲文",
  "body": [
   "你便瞒过衔冤负屈老婆娘，送了俺孩儿得甚么赏？你全无那于公阴德高门望！(张千云)李万，你做的好勾当也！(正旦唱)呀，也要你儿孙向上长，恨不得飞腾到那审囚的官行。",
   "我手脚儿不知高下，身肢儿没处顿放，空教我腹热肠慌。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "同乐院燕青博鱼・倘秀才",
  "author": "元・李文蔚",
  "body": [
   "鼓打到一更也那二更，犬吠到三声也那四声。",
   "(搽旦同杨衙内上，搽旦云)衙内，咱两个往那黑地里走，休往月亮处，着人瞧见，要说短说长的。",
   "咱两个打着个暗号：赤、赤、赤！(杨衙内搽旦做跳过正末身科)(正末唱)我这里呵欠罢翻身打个呓挣，(搽旦云)赤、赤、赤！(杨衙内云)赤、赤、赤！(正末唱)蓦见那女娉婷引着个后生。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "双调・新水令",
  "author": "元・关汉卿",
  "body": [
   "楚台云雨会巫峡，赴昨宵约来的期话。",
   "楼头栖燕子，庭院已闻鸦，料想他家，收针指晚妆罢。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "眼儿媚·独倚春寒掩夕扉",
  "author": "清・納蘭性德",
  "body": [
   "独倚春寒掩夕扉，清露泣铢衣",
   "玉萧吹梦，金钗划影，悔不同携",
   "刻残红烛曾相待，旧事总依稀",
   "料应遗恨，月中教去，花底催归"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "诈妮子调风月・哨遍",
  "author": "元・关汉卿",
  "body": [
   "并不是婆娘人把你抑勒，招取那肯心儿自说来的神前誓。",
   "天果报，无差移，子争个来早来迟。",
   "限时刻，十王地藏，六道轮回，单劝化人间世。",
   "善恶天心人意，\"人间私语，天闻若雷\"。",
   "但年高都是积善好心人；早寿夭都是辜恩负德贼。",
   "好说话清晨，变了卦今日，冷了心晚夕。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "冤报冤赵氏孤儿・雁儿落",
  "author": "元・纪君祥",
  "body": [
   "是那一个实丕丕将着粗棍敲？打的来痛杀杀精皮掉。",
   "我和你狠程婴有甚的仇？却教我老公孙受这般虐。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "小张屠焚儿救母・秃厮儿",
  "author": "元・无名氏",
  "body": [
   "焰腾腾无明烈火，昏惨惨宇宙屯合。",
   "儿也！咱两个义绝恩断在这垛，人穰穰，闹呵呵，无个收罗。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "一匹布",
  "author": "元・徐田臣《杀狗记》",
  "body": [
   "(净上)开食店，得多年，声名天下传。",
   "那人久住不还钱，管取教伊吃拳。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "幸秦川上梓潼山",
  "author": "唐・後主衍",
  "body": [
   "喬巖簇冷煙，幽徑上寒天。",
   "下瞰峨眉嶺，上窺華岳巔。",
   "驅馳非取樂，按幸爲憂邊。",
   "此去如登陟，歌樓路幾千。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "法曲献仙音",
  "author": "宋・柳永",
  "body": [
   "追想秦楼心事，当年便约，于飞比翼。",
   "每恨临歧处，正携手、翻成云雨离拆。",
   "念倚玉偎香，前事顿轻掷。",
   "惯怜惜。",
   "饶心性，镇厌厌多病，柳腰花态娇无力。",
   "早是乍清减，别后忍教愁寂。",
   "记取盟言，少孜煎、剩好将息。",
   "遇佳景、临风对月，事须时恁相忆。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "感天动地窦娥冤・仙吕/赏花时",
  "author": "元・关汉卿",
  "body": [
   "我也只为尤计营生四壁贫，因此上割舍得亲儿在两处分。",
   "从今日远践洛阳尘，又不知归期定准，则落的无语暗消魂。",
   "（下）（卜儿云）窦秀才留下他这女孩儿与我做媳妇儿，他一径上朝应举去了。",
   "（正旦做悲科，云）爹爹，你直下的撇了我孩儿去也！（卜儿云）媳妇儿，你在我家，我是亲婆，你是亲媳妇，只当自家骨肉一般。",
   "你不要啼哭，跟着老身前后执料去来。",
   "（同下）。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "萨真人夜断碧桃花・金盏儿",
  "author": "元・无名氏",
  "body": [
   "他将我厮温存，我将他索殷勤。",
   "口儿未说早心儿顺，俺两个正是那不因亲者强来亲。",

   "秦宫汉冢，乌江云梦，依旧起秋风。",

   "红雪飞来满芳径，问春莺，春莺无语风方定。",
   "小蛮有情，夜凉人静，唱彻醉翁亭。",
   "海棠开过到蔷薇，春色无多味。",
   "争奈新来越憔悴，教他谁，小环也似知人意。",
   "疏帘卷起，重门不闭，要看燕双飞。",
   "淡烟微雨锁横塘，且看无风浪。",
   "一叶轻舟任飘荡，芰荷香，渔歌虽美休高唱。",
   "些儿晚凉，金沙滩上，多有睡鸳鸯。",
   "绿杨堤畔蓼花洲，可爱溪山秀。",
   "烟水茫茫晚凉后，捕鱼舟，冲开万顷玻璃皱。",
   "乱云不收，残霞妆就，一片洞庭秋。",
   "晚来群雀噪茅檐，渐渐云收敛。",
   "但觉新凉入藤簟，喜幽潜，佳人学得皆勤俭。",
   "闲情幽怨，新愁旧恨，不许上眉尖。",
   "淡黄杨柳月中疏，今古横塘路。",
   "为问萧郎在何处，近来书，一帆又下潇湘去。",
   "试问别后，软绡红泪，多似露荷珠。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "刘玄德醉走黄鹤楼・货郎儿",
  "author": "元・无名氏",
  "body": [
   "你过的这乞留曲律蚰蜒小道，听说罢官人你记着。",
   "你过的一横涧搭一横桥，更有那倒塌了的山神庙。",
   "(关平云)再有甚么记号？(正末唱)破墙匡草团瓢，转山坡过岭桥，河取鱼儿水不着，春夏秋冬草不凋。",
   "贪看云中鹘打雁，你可休离俺这山庄，可便错去了。"
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "折桂令・春先去人瘦三分。妆减了半面风流，衣松了一捻精神。步红尘愁",
  "author": "元・王晔",
  "body": [
   "践红芳，上绣榻怕拈绣贴，倚朱扉愁盼朱轮。",
   "海棠困琴闲玉轸，石榴皱睡损罗裙。",
   "愁思昏昏，人事纷纷；眼底卿卿，心上人人。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "失调名",
  "author": "宋・宋祁",
  "body": [
   "因为衔泥污锦衣。",
   "垂下珠帘不敢归。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "朱太守风雪渔樵记・赚煞",
  "author": "元・无名氏",
  "body": [
   "一转眼选场开，发了愿来年去，直至那长安帝都，(孤云)据凭贤士锦绣文章，何所不至！(正末唱)凭着我锦绣也似文章敢应举。",
   "(孤云)明年去，也是迟了。",
   "(正末云)大人，你道为何，这几年不进取功名来？(孤云)这可是为何？(正末唱)也是我不得时可便韫椟藏诸，我若是的鳌鱼，怕不就压倒群儒？(孤云)贤士，你若去进取功名，岂在他人之下。",
   "(正末唱)我着普天下文人每，那一个不拱手的伏！(孤云)请贤士收拾琴剑书箱，来年应举去也。",
   "(正末云)大人，别的书生用那琴剑书箱，小生则用着身边一般儿物件，夺取皇家富贵。",
   "(孤云)贤士，可那一般儿物件？(正末唱)凭着这砍黄桑的巨斧，端的便上青霄独步，(云)别的书生说道月中丹桂，若到的那里，折得一枝回来，足可了一生之愿。",
   "不是我朱买臣敢说大言也，(唱)落可便我把那月中仙桂剖根除。",
   "(下)。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "置酒坐飛閣",
  "author": "唐・太宗皇帝",
  "body": [
   "高軒臨碧渚，飛檐迥架空。",
   "餘花攢鏤檻，殘柳散雕櫳。",
   "岸菊初含橤，園梨始帶紅。",
   "莫慮崑山暗，還共盡杯中。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "杜牧之诗酒扬州梦・小梁州",
  "author": "元・乔吉",
  "body": [
   "这些时陡恁春寒绣被空，冷清清褥隐芙蓉。",
   "我则道阳台云雨去无踪，今夜个乘欢宠，山也有相逢。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "风入松・再休将风月檐儿担，就里尴尬。付能捱得离坑陷，又钻入虎窟蛟",
  "author": "元・马致远",
  "body": [
   "使不着狂心怪胆，恁却甚饱轻谙。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "月照庭・半纸功名，断送关山。云渺渺，草凄凄。小楼风，重门月，应盼",
  "author": "元・侯正卿",
  "body": [
   "人归。",
   "归心急，去路迷。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "归塞北・钩索响，时听韵伊哑。翠带舞低风外柳，绛裙惊落雨前霞，拂绽",
  "author": "元・朱庭玉",
  "body": [
   "树头花。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "中吕・粉蝶儿怨别",
  "author": "元・陈克明",
  "body": [
   "画阁萧疏，那里也玉堂人物，间别来音信全无。",
   "拆鸾凰，分莺燕，生离开比目。",
   "闷恹恹瘦损肌肤，粉慵施朱唇懒注。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "汉钟离度脱蓝采和・双调/新水令",
  "author": "元・无名氏",
  "body": [
   "道门中法礼炼修持，俺师父度了个乐官徒弟。",
   "俺师父明明的使道法，暗暗的说禅机，待和我同赴瑶池。",
   "怎承望有今日。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "崔莺莺夜听琴(第二本)・月上海棠",
  "author": "元・王实甫",
  "body": [
   "一杯闷酒尊前过，低首无言自摧挫。",
   "不甚醉颜酡，却早嫌玻璃盏大。",
   "从因我，酒上心来较可。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "风雨像生货郎旦・太平令",
  "author": "元・无名氏",
  "body": [
   "住了雨也晒甚娘褐袖，只愿的下雹子打你娘驴头。",
   "(外旦骂科，云)这泼妇，我打不的你那！(打科)(副旦唱)只见他百忙里眉梢一皱，公然的指尖儿把颊腮剜透。",
   "似这般左瞅，右瞅，只不如罢手，俺也须是那爷娘皮肉。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "死生交范张鸡黍・哭皇天",
  "author": "元・宫天挺",
  "body": [
   "你既是肯相探多承谢，(张元伯云)我见了哥哥面，便回程也。",
   "(正末唱)便回程因甚也？(张元伯云)您兄弟就此回去了也。",
   "(正末云)那里去？(唱)把持房门们闭上，(做扯张科，唱)将衣袂紧揪扯，(张元伯云)哥哥放手，你是生魂。",
   "我是鬼魂，您兄弟死了也。",
   "(正末哭科，唱)谁想你今番今番命绝。",
   "想着俺问堂学业，同舍攻书，指望和你同朝帝阙，同建功名。",
   "你如今四旬不到，一事无成抛离去母，割舍妻男，怎下的撇了您歹哥哥死去也。",
   "这回相见，今番永别。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "严子陵垂钓七里滩・离亭宴煞",
  "author": "元・宫天挺",
  "body": [
   "九经三史文书册，压着一千场国破山河改。",
   "富贵荣华，草介尘埃。",
   "唱道禄重官高，阗是祸害，凤阁龙楼，包着成败。",
   "您那里是舜殿尧阶，严光则是跳出了十万丈风波是非海。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "宋太祖龙虎风云会・正宫/端正好",
  "author": "元・罗贯中",
  "body": [
   "光射水晶宫，冷透鲛绡帐，夜深沉睡不稳龙床。",
   "离金门私出天街上，正瑞雪空中降。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "尾声・若道是成就了洞房中惜玉怜香愿，媒合了翠馆内清风皓月筵，六片",
  "author": "元・萨都剌",
  "body": [
   "儿香皮做烟眷。",
   "茶コ架边，蔷薇洞前，管教你到底团圆不离了半步儿远。"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "行園樹",
  "author": "宋・徐鉉",
  "body": [
   "松節凌霜久，蓬根逐吹頻。",
   "羣生各有性，桃李但爭春。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "崔莺莺夜听琴(第二本)・江儿水",
  "author": "元・王实甫",
  "body": [
   "佳人自来多命薄，秀才每从来懦，闷杀没头鹅，撇了赔钱货，不争你不成亲呵，下场头那答儿发付我！。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "大车",
  "author": "詩經",
  "body": [
   "大车槛槛，毳衣如菼。岂不尔思？畏子不敢。",
   "",
   "大车啍啍，毳衣如璊，岂不尔思？畏子不奔。",
   "",
   "谷则异室，死则同穴。谓予不信，有如皎日。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "降桑椹蔡顺奉母・沽美酒",
  "author": "元・刘唐卿",
  "body": [
   "感大恩重呵怜，招杰士纳英贤。",
   "端的足德似尧汤千古传，万万载江山固坚，好收成谢冲天。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "汤泉应制·清时礼乐萃朝端",
  "author": "清・納蘭性德",
  "body": [
   "清时礼乐萃朝端，次第郊原引玉銮",
   "河岳千年归带砾，寝园三月拜衣冠",
   "便从畿甸亲民隐，更启神泉示从官",
   "非独炎灵钟坎德，恩波深处不知寒"
  ],
  "note": "讀詩，是與古人的一場對話。"
 },
 {
  "title": "金水桥陈琳抱妆盒・幺篇",
  "author": "元・无名氏",
  "body": [
   "传示那六宫人知严令，(带云)这金弹呵，(唱)弹落处各办虔城，分头儿自去穿芳径。",
   "寻仔细，认分明，捧金弹，献彤庭，当寝夕，应前星，那其间可也永团圆万万载同欢庆。",
   "(下)。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "九月九日上幸慈恩寺登浮圖羣臣上菊花壽酒",
  "author": "唐・上官昭容",
  "body": [
   "帝里重陽節，香園萬乘來。",
   "卻邪萸入佩，獻壽菊傳杯。",
   "墖類承天湧，門疑待佛開。",
   "睿詞懸日月，長得仰昭回。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "地藏王证东窗事犯・寄生草",
  "author": "元・孔文卿",
  "body": [
   "仰面将高天问，英雄气怨上苍！问天公不曾天垂象，治居民不曾教居民荡，统三军不曾教三军丧。",
   "只落的满身枷锁跪厅前，却甚一轮皂盖飞头下！。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "四丞相高会丽春堂・乔木查",
  "author": "元・王实甫",
  "body": [
   "自别来间阔，幸得俱无恙。",
   "这里是土长根生父母邦，怎将咱流窜在济南天一方？这些时怎不凄凉？。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "死生交范张鸡黍・斗鹌鹑",
  "author": "元・宫天挺",
  "body": [
   "人都道我暮景桑榆，合有些峥嵘气象，可正是乐极悲生，今日个泰来否往。",
   "(第五伦云)为你在此筑垒坟墙，栽松种柏，百日有余，小官奏知圣人，特来宣命。",
   "(正末唱)垒筑了这五六板坟墙，奏与帝王，又不曾学傅说作辑为霖，误陛下眠思梦想。",
   "(第五伦云)贤士不可迟延怠慢，便索临朝，同见圣人去来。",
   "(正末唱)。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "小张屠焚儿救母・鹊踏枝",
  "author": "元・无名氏",
  "body": [
   "带头面插金装，穿绫罗好衣裳，出来的毁遍尊亲，骂遍街坊。",
   "你学那哭长城送寒衣孟姜，休学那无廉耻盗果京娘。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "游蔣山題辛夷花寄陳奉禮本約陳同游不至",
  "author": "宋・徐鉉",
  "body": [
   "今歲游山已恨遲，山中仍喜見辛夷。",
   "簪纓且免全爲累，桃李猶堪別作期。",
   "晴後日高偏照灼，晚來風急漸離披。",
   "山郎不作同行伴，折是何由寄所思。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "布袋和尚忍字记・梁州第七",
  "author": "元・郑延玉",
  "body": [
   "每日家扫地焚香念佛，索强如恁买柴籴米当家。",
   "(带云)若不是俺师父呵，我刘均佐怎了也啊！(唱)谢诸尊菩萨摩诃萨，感吾师度脱，将俺这弟子来提拔。",
   "我如今不遭王法，不受刑罚。",
   "至如我指空说谎瞒咱，这一场了身脱命亏他。",
   "我、我、我，谢俺那雪山中无荣无辱的禅师，是、是、是，传授与我那莲台上无岸无边的佛法，来、来、来，我做了个草庵中无忧无虑的僧家。",
   "一回家火发，我可便按纳。",
   "心头万事无牵挂，数珠在手中掐。",
   "我这里静坐无言叹落花，独步烟霞。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "邓夫人苦痛哭存孝・尧民歌",
  "author": "元・关汉卿",
  "body": [
   "他把一条紫金梁生砍做两三截，阿者休波，是他便那里每分说！想着十八骑长安城内逞豪杰，今日个则落的足律律的旋风踅，我可便伤也波嗟。",
   "将存孝见时节，阿者，则除是水底下捞明月！（刘夫人云）小番，你要说来又不说，可是为甚么来？（莽古歹云）李存信、康君立的言语，将存孝五车裂死了也！(刘夫人云)苦死的儿也！（莽古歹云）他临死时，将存孝棍棒临身，毁骂了千言万语，眼见的命掩黄泉。",
   "（刘夫人云）存孝儿衔冤负屈，孩儿怎生死了来？（正旦唱）。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "死生交范张鸡黍・元和令",
  "author": "元・宫天挺",
  "body": [
   "数日前落长星大似斗，流光射夜如昼，原来是丧贤人地惨共天愁。",
   "空余下剑挂尽汝阳城外柳，则这青山一带也白头，满街人雨泪流。",
   "(众街坊云)巨卿，上千的人拽不动灵车，谁想有这等灵验。",
   "(正末唱)。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "睿恩新",
  "author": "宋・晏殊",
  "body": [
   "芙蓉一朵霜秋色。",
   "迎晓露、依依先拆。",
   "似佳人、独立倾城，傍朱槛、暗传消息。",
   "静对西风脉脉。",
   "金蕊绽、粉红如滴。",
   "向兰堂、莫厌重深，免清夜、微寒渐逼。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "吕洞宾三醉岳阳楼・梅花酒",
  "author": "元・马致远",
  "body": [
   "想您个匹夫，不识贤愚。",
   "蠢蠢之物，落落之徒，休猜俺做左道术。",
   "俺自拿着捩鼻木，您拽着我布道服；俺急切里要回去，您当街里缠师父。",
   "俺为甚的不言语，您心下儿自踌躇。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "赵匡义智娶符金锭・金盏儿",
  "author": "元・无名氏",
  "body": [
   "也是我命低微，惹灾危，若是俺尊堂知道可也甘当罪。",
   "(赵匡义云)这厮合死也。",
   "(正旦唱)他那里揎拳裸袖皱双眉。",
   "(韩松云)这个是甚么人？我怕你不成也。",
   "(正旦唱)那里也画堂欢宴，早难道是花下燕莺期。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "神奴儿大闹开封府・雁儿落",
  "author": "元・无名氏",
  "body": [
   "你莫不是李员外娶的后婚？(大旦云)俺是绾角儿夫妻，持过公婆孝服，埋殡夫主，每自的浇茶奠酒上坟哩。",
   "我家是敕赐义门李氏，怎敢辱抹家门？大人可怜见。",
   "(正末唱)他道是绾角儿成秦晋。",
   "他去那公婆行持孝服，他将亲夫主才埋殡。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "浣溪沙·伏雨朝寒愁不胜",
  "author": "清・納蘭性德",
  "body": [
   "伏雨朝寒悉不胜，那能还傍杏花行",
   "去年高摘斗轻盈",
   "漫惹炉烟双袖紫，空将酒晕一衫青",
   "人间何处问多情"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "幺・我待要买断了严陵一钓台，请佃了陶潜五柳宅。日日访吾侪，水边山",
  "author": "元・汤舜民",
  "body": [
   "侧，诗酒共开怀。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "鸳鸯煞・梅花枝上春光露，椒盘杯里香风度。帐设鲛绡，帘卷虾须。唱道",
  "author": "元・贯云石",
  "body": [
   "天赐长生，人皆赞祝。",
   "道德巍巍，众臣等蒙恩露。",
   "拜舞嵩呼，万万岁当今圣明主。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "浣溪沙·姜女庙",
  "author": "清・納蘭性德",
  "body": [
   "海色残阳影断霓，寒涛日夜女郎祠",
   "翠钿尘网上蛛丝",
   "澄海楼高空极目，望夫石在且留题",
   "六王如梦祖龙非"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "料峭东风・南・缘何，乐事赏心多？诗朋酒侣吟哦，花浓酒艳，破除万事",
  "author": "元・贯云石",
  "body": [
   "无过。",
   "嬉游玩赏，对清风明月安然坐。",
   "任春夏秋月冬天，适兴四时皆可。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "赚尾・洛阳花，宜城酒，那说与狂朋怪友。水远山长憔悴也，满青衫两泪",
  "author": "元・石子章",
  "body": [
   "交流。",
   "唱道事到如今，收了孛篮罢了斗，那些儿自羞。",
   "二年三岁，不承望空溜溜了会眼儿休。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "子衿",
  "author": "詩經",
  "body": [
   "青青子衿，悠悠我心。纵我不往，子宁不嗣音？",
   "",
   "青青子佩，悠悠我思。纵我不往，子宁不来？",
   "",
   "挑兮达兮，在城阙兮。一日不见，如三月兮。"
  ],
  "note": "文字如水，潤物無聲。"
 },
 {
  "title": "北得胜令",
  "author": "元・徐田臣《杀狗记》",
  "body": [
   "化一狗，假如人，撇他在后园门。",
   "孙员外匆忙见，料无能辨假真！杀人，教他结义的难承认，销魂，须知是亲人到底亲。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "包待制智勘后庭花・太平令",
  "author": "元・郑延玉",
  "body": [
   "我见他扭身子十分希诧，须是我赏发与一夜欢洽。",
   "咱欲要两家都罢，赤紧的我领得三朝严假。",
   "若事发，教咱救拔，你稳情取功名科甲。",
   "(云)兀那秀才，他不是人，是个鬼魂。",
   "(刘天义怕科)(正末唱)。"
  ],
  "note": "詩是最溫柔的力量。"
 },
 {
  "title": "郊廟歌辭 武后明堂樂章 迎送王公",
  "author": "唐・武則天",
  "body": [
   "千官肅事，萬國朝宗。",
   "載延百辟，爰集三宮。",
   "君臣德合，魚水斯同。",
   "睿圖方永，周曆長隆。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "五・这财曾燃了董卓脐，曾枭了元载头，聚而不散遭殃咎。怕不是堆金积",
  "author": "元・钱霖",
  "body": [
   "玉连城富，眨眼早野草闲花满地愁。",
   "干生受，生财有道，受用无由。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "尉迟恭三夺槊・梅花酒",
  "author": "元・尚仲贤",
  "body": [
   "你看我发回村，恼犯魔君，撞着丧门。",
   "我想那榆窠园实是狠。",
   "他不若如单雄信，则我这鞭稳打死须定无论。"
  ],
  "note": "靜下心來，聽見詩裡的風聲。"
 },
 {
  "title": "状元堂陈母教子・柳叶儿",
  "author": "元・关汉卿",
  "body": [
   "他终则是寒门卿相，正青春血气方刚，拥虹霓气吐三千丈。",
   "孩儿每休夸强，意休慌，他则是放着你那紫绶金章。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "救孝子贤母不认尸・双调/新水令",
  "author": "元・王仲文",
  "body": [
   "为两个业冤家，使我一日泪千行，点点儿滴在我这胸上。",
   "想那叶军的临战场，坐牢的赴云阳，急的我寸断肝肠。",
   "这把老骸骨着谁葬？。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "倘秀才・莫不是黄司理缘薄分浅，多管是双通叔时乖运蹇，小卿你再不向",
  "author": "元・无名氏",
  "body": [
   "秦楼动管弦。",
   "彩鸾回舞镜，青鸟罢衔笺，兀良不远。"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "卜算子·新柳",
  "author": "清・納蘭性德",
  "body": [
   "娇软不胜垂，瘦怯那禁舞",
   "多事年年二月风，翦出鹅黄缕",
   "一种可怜生，落日和烟雨",
   "苏小门前长短条，即渐迷行处"
  ],
  "note": "古人的智慧，凝結在這幾行字裡。"
 },
 {
  "title": "尾声・拟将樱络千金串，结就珍珠七宝钿，世世生生作姻眷。脱空心告免，",
  "author": "元・汤舜民",
  "body": [
   "指山盟是谝，则不如剪发燃香意儿远。",
   "赠王善才手曾将千眼佛绿柳瓶，身曾侍七宝岩红莲座。",
   "目曾瞻普陀山金孔雀，心曾记南海岸玉鹦哥。",
   "为一念差伪，离水月观音阁，堕风尘锦绣窝。",
   "金刚刃怎割愁肠，甘露水难消业火。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "骂玉郎・也是我孜孜的撺断他学干禄，嗟行事，悔当初，多情却被列情误。",
  "author": "元・汤舜民",
  "body": [
   "唤不应离恨天，填不满忧怨海，赶不上相思路。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "降桑椹蔡顺奉母・叨叨令",
  "author": "元・刘唐卿",
  "body": [
   "母亲，也你似那旧时节脉息通胸胃；恰才无半霎，就把你灾除退；(卜儿云)孩儿也，多亏你行这等孝顺之心也。",
   "(正末唱)则我这孝心肠，感动天和地。",
   "则愿的母亲年高百岁身荣贵。",
   "兀的不喜欢杀也波哥，喜欢杀也波哥，俺一家儿办诚心酬谢天和地。",
   "(卜儿云)孩儿，我不问你别。",
   "这牛蹄、粳米，是那里来的？(正末云)母亲，您孩儿大山之中，遇着延岑哥哥来。",
   "(卜儿云)延岑？他不去郑州迭配牢城，他在山中做些甚么那？(正末唱)。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "半夜雷轰荐福碑・川拨棹",
  "author": "元・马致远",
  "body": [
   "你道你便老实，你不知为不知，你只会拽耙扶犁，抱瓮浇畦。",
   "万言策谁人做的？你待要狐假虎威。",
   "哎，你个贾长沙省气力。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "两军师隔江斗智・油葫芦",
  "author": "元・无名氏",
  "body": [
   "母亲你无语低头甚意儿？唤我来何处使？(云)梅香，老夫人烦恼，可是为何？(梅香云)你也不知道，我那里省得？(正旦唱)敢是那一个泼无知恼犯俺尊慈？(夫人云)孩儿，你哥哥将你许了人家也。",
   "(梅香云)就与我也寻一门儿亲波。",
   "(正旦唱)你把俺成婚作配何人氏？也则要门当户对该如此。",
   "(云)哥哥许了甚的人家来？(孙权云)妹子，将你许了人便罢了，不必问他。",
   "(正旦唱)端的是谁保亲？在几时？(孙权云)则在这一二日内，就要成这亲事哩。",
   "(正旦唱)为甚么慌慌速速成亲事？(孙权云)我则为荆州九郡，才想这个念头。",
   "(正旦唱)元来你图取荆州地免兴师！。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "郊廟歌辭 祀雨師樂章 送神",
  "author": "唐・包佶",
  "body": [
   "整駕昇車望寥廓，垂陰薦祉蕩昏氛。",
   "饗時靈貺僾如在，樂罷餘聲遙可聞。",
   "飲福陳誠禮容備，撤俎終獻曙光分。",
   "跪拜臨壇結空想，年年應節候油雲。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "玉堂春",
  "author": "宋・晏殊",
  "body": [
   "帝城春暖。",
   "御柳暗遮空苑。",
   "海燕双双，拂扬帘栊。",
   "女伴相携、共绕林间路，折得樱桃插髻红。",
   "昨夜临明微雨，新英遍旧丛。",
   "宝马香车、欲傍西池看，触处杨花满袖风。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "山居詩  其一○",
  "author": "宋・釋延壽",
  "body": [
   "曠然不被興亡墜，豁爾難教寵辱驚。",
   "鼓角城遥無伺候，輪蹄路絕免逢迎。",
   "暖眠紙帳茅堂密，穩坐蒲團石面平。",
   "祇有此途爲上策，更無餘事可關情。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "裴少俊墙头马上・天下乐",
  "author": "元・白朴",
  "body": [
   "我可便提起东来忘了西，(梅香云)昨日几家来问亲，小姐不语怎么？(正旦唱)咱萱堂又虚着面皮，至如个穷人家女孩儿到十六七，或是谁家来问亲，那家来做媒，你教女孩羞答答说甚的？(梅香云)今日上巳，王孙士女，宝马香车，都去郊外玩赏去了；咱两个去后花园内看一看来。",
   "(正旦云)梅香，将着纸墨笔砚，咱去来。",
   "(做行科)(正旦唱)。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "中吕・醉高歌过红绣鞋",
  "author": "元・贯云石",
  "body": [
   "看别人鞍马上胡颜，叹自己如尘世污眼。",
   "英雄谁识男儿汉，岂肯向人行诉难？阳气盛冰消北岸，暮云遮日落西山，四时天气尚轮还。",
   "秦甘罗疾发禄，姜吕望晚登坛，迟和疾时运里趱。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "双调・新水令皇都元日",
  "author": "元・贯云石",
  "body": [
   "郁葱佳气蔼寰区，庆丰年太平时序。",
   "民有感，国无虞。",
   "瞻仰皇都，圣天子有百灵助。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "中吕・山坡羊春日二首",
  "author": "元・张可久",
  "body": [
   "芙蓉春帐，葡萄新酿，一声《金缕》樽前唱。",
   "锦生香，翠成行，醒来犹问春无恙，花边醉来能几场？妆，黄四娘。",
   "狂，白侍郎。",
   "西湖沉醉，东风得意，玉骢骤响黄金辔。",
   "赏春归，看花回，宝香已暖鸳鸯被，萝绕绿窗初睡起。",
   "痴，人未知。",
   "噫，春去矣。",
   "雪夜扁舟乘兴，读书相映，不如高卧柴门静。",
   "唾壶冰，短檠灯，隔窗孤月悬秋镜，长笛不知何处声？惊，人睡醒。",
   "清，梅弄影。",
   "别怀梨花都谢，春衫初卸，绿阴空锁闲台榭。",
   "远山叠，暮云遮，青青杨柳连官舍。",
   "此景此情难弃舍，车，且慢些。",
   "别，人去也。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "谢金莲诗酒红梨花・尾煞",
  "author": "元・张寿卿",
  "body": [
   "我把一枝翠柳将身映，(赵汝州云)小娘子，你可仔细走。",
   "(正旦唱)这里不比十二瑶台独自行。",
   "曲栏傍月光净，粉墙边晚风劲。",
   "(云)呀，兀的不有人来也。",
   "(唱)只听的扑簌簌鞋底鸣，唬的我颤兢兢手脚冷。",
   "俺只索止安身躯注着眼睛，(带云)原来不是人呵。",
   "(唱)可正是云破月来花弄影。",
   "(下)。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "菩萨蛮·为春憔悴留春住",
  "author": "清・納蘭性德",
  "body": [
   "为春憔悴留春住，那禁半霎催归雨",
   "深巷卖樱桃，雨余红更娇",
   "黄昏清泪阁，忍便花飘泊",
   "消得一声莺，东风三月情"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "黑旋风双献功・幺篇",
  "author": "元・高文秀",
  "body": [
   "哎，你个嫂嫂莫得见责，也则是亏着俺为人在客，我恰才嘱付了三回五解。",
   "（搽旦扯孔目科，云）孔目，你早些儿回来。",
   "（孙孔目云）我就回来也。",
   "（正末扯孔目做走科，云）嫂嫂不索说，我和哥哥使来。",
   "我恰才嘱付了店家安抚了嫂嫂，天色将晚也。",
   "（唱）则去兀那泰安州寻一个家头房子去来。",
   "（同下）。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "减字木兰花·相逢不语",
  "author": "清・納蘭性德",
  "body": [
   "相逢不语，一朵芙蓉著秋雨",
   "小晕红潮，斜溜鬟心只凤翘",
   "待将低唤，直为凝情恐人见",
   "欲诉幽怀，转过回阑叩玉钗"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "钱大尹智勘绯衣梦・幺篇",
  "author": "元・关汉卿",
  "body": [
   "他去那阁子里扳了窗棂，茶局子里摔碎了汤瓶。",
   "他直挺挺的眉剔竖，骨碌碌的眼圆睁，叫一声：白日里要见簸箕星！。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "张孔目智勘魔合罗・挂金索",
  "author": "元・孟汉卿",
  "body": [
   "我则道调理风寒，谁想他暗里藏毒药。",
   "他如今致命图财，我正是自养着家生哨，疑怪来时，不将着亲嫂嫂。",
   "万代人传，倒惹的关张笑。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "李云英风送梧桐叶・双调/新水令",
  "author": "元・李唐宾",
  "body": [
   "华堂褥隐绣芙蓉。",
   "似锦妆成桃源仙洞。",
   "这状元簪花在玉殿前，那状元折桂在月宫中。",
   "孔雀屏风，今日个已高中。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "尾・郝大使王玉带皆称赏，焦治中天然秀小样。劝你个聪明姝丽俏吴姬，",
  "author": "元・赵明道",
  "body": [
   "就取这蕴藉风流俊张敞。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "惜春郎",
  "author": "宋・柳永",
  "body": [
   "玉肌琼艳新妆饰。",
   "好壮观歌席。",
   "潘妃宝钏，阿娇金屋，应也消得。",
   "属和新词多俊格。",
   "敢共我勍敌。",
   "恨少年、枉费疏狂，不早与伊相识。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "商调・望远行",
  "author": "元・李唐宾",
  "body": [
   "闷拂银筝，暂也那消停。",
   "响瑶阶风韵清，忽惊起潇湘外寒雁儿叫破沙汀，支楞的泪湿弦初定。",
   "弦初定，银河淡月明，相思调再整，蓦感起花阴外那个人听。",
   "高力士诉与实情，金篦儿唬的人孤另。",
   "套数。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "画眉序",
  "author": "元・施惠《幽闺记》",
  "body": [
   "文武掇巍科，丹桂高攀近嫦娥。",
   "喜莺迁乔木，凤止高柯；十年探孔孟心传，一旦试孙吴家学。",
   "(合)画堂花烛光摇处，一派乐声喧和。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "駕幸三會寺應制",
  "author": "唐・上官昭容",
  "body": [
   "釋子談經處，軒臣刻字留。",
   "故臺遺老識，殘簡聖皇求。",
   "駐蹕懷千古，開襟望九州。",
   "四山緣塞合，二水夾城流。",
   "宸翰陪瞻仰，天杯接獻酬。",
   "太平詞藻盛，長願紀鴻休。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "尾・有一等逞雄心屠户贪微利，咽馋涎豪客思佳味。一地把性命亏图，百",
  "author": "元・刘时中",
  "body": [
   "般地将刑法陵迟。",
   "唱道任意欺公，全无道理。",
   "从今去谁买谁骑？眼见得无客贩无人喂。",
   "便休说站驿难为，则怕你东讨西征那时节悔！。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "四丞相高会丽春堂・天下乐",
  "author": "元・王实甫",
  "body": [
   "可正是气压山河百二雄，元也波戎，将军校统。",
   "宰臣每为头儿又尽忠，文官每守正直，武将每建大功，到今日可也乐升平，好受用。",
   "(云)令人报复去，道某家来了也。",
   "(祗从报科，云)有四丞相来了也。",
   "(押宴官云)道有请。",
   "(见科)(押宴官云)老丞相，今奉圣人的命，教俺文武官员今日赴射柳会。",
   "左右那里，都摆布下了也未？(祗从云)都摆布了也。",
   "(净扮李圭上，诗云)幼年习兵器，都夸咱武艺，也会做院本，也会唱杂剧。",
   "要饱一只羊，好酒十瓶醉，听的去厮杀，躲在帐房睡。",
   "某普察人氏，姓李名圭，见为右副统军使。",
   "我这官不为那武艺上得的，为我唱得好，弹得好，舞的好。",
   "今日是蕤宾节令，圣人的命着俺大小官员赴射柳会。",
   "到那里我便射不着呵，也有我的赏赐。",
   "可早来到也，令人报复去，道我李监军来了也。",
   "(祗从报科)(押宴官云)着过来。",
   "(李圭见科，云)老大人，小子李圭来了也。",
   "(押宴官云)李监军，你来了也。",
   "我奉圣人的命，在此押宴。",
   "左右那里，将这圣人赐来的锦袍玉带。",
   "若射着的，将这锦袍玉带赏与他。",
   "先饮酒．射不着的，则饮酒，无赏。",
   "(祗从云)理会得。",
   "(押宴官云)老丞相，圣人前日分付操练的军马如何？(正末云)大人，数日前分付老夫操练的军马，都有了也。",
   "(押宴官云)如今有那几员上将？(正末唱)。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "甘州令",
  "author": "宋・柳永",
  "body": [
   "冻云深，淑气浅，寒欺绿野。",
   "轻雪伴、早梅飘谢。",
   "艳阳天，正明媚，却成潇洒。",
   "玉人歌，画楼酒，对此景、骤增高价。",
   "卖花巷陌，放灯台榭。",
   "好时节、怎生轻舍。",
   "赖和风，荡霁蔼，廓清良夜。",
   "玉尘铺，桂华满，素光里、更堪游冶。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "梁山泊李逵负荆・赏花时",
  "author": "元・康进之",
  "body": [
   "咱两个每日尊前语话投，今日呵，为甚将咱佯不愀。",
   "(王林云)你不知道，我自嫁我的女孩儿，为此着恼。",
   "(正末唱)哎！你个呆老子畅好是忒掐搜，(云)比似你这般烦恼，休嫁他不的。",
   "(王林哭科，云)哎哟！我那满堂娇儿也。",
   "(正末唱)你何不养着他到苍颜皓首？(云)你晓的世上有三不留么？(王林云)哥，是那三不留？(王末云)蚕老不中留，人老不中留，(唱)呆老子，常言道：女大不中留。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "草桥店梦莺莺(第四本)・乔木查",
  "author": "元・王实甫",
  "body": [
   "走荒郊旷野，把不住心娇怯，喘吁吁难将两气接。",
   "疾忙赶上者，打草惊蛇。"
  ],
  "note": "千年前的月光，照亮今夜的窗。"
 },
 {
  "title": "耍孩儿・安贫知足神明佑，好聚敛多招悔尤。王戎遗下旧牙筹，夜连明计",
  "author": "元・钱霖",
  "body": [
   "算无休。",
   "不思日月搬乌兔，只与儿孙作马牛。",
   "添消瘦，不调ブ鼎，恣逞戈矛。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "郊廟歌辭 祭汾陰樂章 南呂羽",
  "author": "唐・韓休",
  "body": [
   "於穆濬哲，維清緝熙。",
   "肅事昭配，永言孝思。",
   "滌濯靜嘉，馨香在茲。",
   "神之聽之，用受福釐。"
  ],
  "note": "詩是靈魂深處最柔軟的聲音。"
 },
 {
  "title": "落梅风・肌消玉，脸褪霞，怎打熬九秋三夏？被薄赚的孤又寡，辜负了小",
  "author": "元・童童学士",
  "body": [
   "乔初嫁。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "萧何月夜追韩信・上马娇",
  "author": "元・金仁杰",
  "body": [
   "口口庚运歹也逢太岁恶，但行处撞着儿曹。",
   "(等净做住，行着唱)他把我丕丕的赶过长安道，恶难怎逃。",
   "时下怎归着，忿气不消，赶到我二十遭。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "潼關口號",
  "author": "唐・明皇帝",
  "body": [
   "河曲回千里，關門限二京。",
   "所嗟非恃德，設險到天平。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "尾声・金瓯应已藏名讳，麟阁终当绘像仪。寄语公明董狐笔：比及待论功",
  "author": "元・汤舜民",
  "body": [
   "赐邑，铭彝勒石，先筑沙堤四十里。",
   "子弟每心寄青楼爱人芳卿细细听，贱子明明道。",
   "雨云虽念想，风月不坚牢。",
   "月夜花朝，两地成耽阁，虚飘飘何日了。",
   "吐蛛丝锁不住蝶使蜂媒，衔燕泥对不就鸾窝凤巢。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "双调・沉醉东风钓台",
  "author": "元・张可久",
  "body": [
   "貂裘敝谁怜倦客，锦笺寒难写秋怀。",
   "野水边，闲云外，尽教他鸥鹭惊猜。",
   "溪上良田得数顷来，也敢上严陵钓台。",
   "湖上垂杨柳无人自舞，提葫芦有意相呼。",
   "酒醒时，花深处，插花枝满头归去。",
   "莫惜千金倒玉壶，春已近梨花暮雨。",
   "元夜明月无心紫箫，夕阳何处蓝桥？蕙帐寒，梅花落，故人稀渐疏谈笑。",
   "看见鹅黄上柳条，等闲放元宵过了。",
   "幽居二首脚到处青山绿水，兴来时白酒黄鸡。",
   "远是非，绝名利，腹便便午窗酣睡。",
   "鹦鹉杯中昼日迟，到强似麒麟画里。",
   "笑白发犹缠利锁，喜红尘不到渔蓑。",
   "八咏诗，三闾些，收拾下晚春工课。",
   "茅舍疏篱小过活，有情分沙鸥伴我。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "吕洞宾三醉岳阳楼・贺新郎",
  "author": "元・马致远",
  "body": [
   "你看那龙争虎斗旧江山。",
   "(郭云)你笑甚么？(正末唱)我笑那曹操奸雄。",
   "(郭云)你哭甚么？(正末唱)我哭呵，哀哉霸王好汉。",
   "(郭云)老师父，你怎么哭了又笑，笑了又哭？(正末唱)为兴亡笑罢还悲叹，不觉的斜阳又晚。",
   "咱想这百年人则在这捻指中间。",
   "(郭云)不争老师父在楼上玩赏，可不搅了我茶客。",
   "(正末唱)空听得楼前茶客闹，争似江上野鸥闲。",
   "百年人光景皆虚幻。",
   "(正末看科)(郭云)我也学你看一看。",
   "(正末唱)我觑你一株金线柳，犹兀自闲凭着十二玉栏干。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "包待制智赚灰栏记・后庭花",
  "author": "元・李行甫",
  "body": [
   "恰才我脊梁上挨了棍棒，又索去厨房中煎碗热汤，一任他男子汉多心硬，大刚来则是俺这婆娘每不气长。",
   "(做下、捧汤上科，云)姐姐，兀的不是汤。",
   "(搽旦云)拿汤来，我试尝咱。",
   "(做尝科，云)还少些盐酱，快去取来。",
   "(正旦应，下)(搽旦云)前日这一服毒药，待我取来，倾在这汤儿里。",
   "(做倾药科，云)海棠，快来。",
   "(正旦上，唱)怎这般忒慌张，连催盐酱？(云)姐姐，兀的不是盐酱。",
   "(搽旦做调汤科，云)海棠，你将去。",
   "(正旦云)姐姐，你将去波，怕员外见了我越气也。",
   "(搽旦云)你不去，员外又道你恼着他哩。",
   "(下)(正旦云)理会得。",
   "员外，你吃口汤儿波。",
   "(员外做接吃科)(正旦唱)则见他闷沉沉等半晌，苦恹恹口内尝。",
   "(员外做死科)(正旦惊，云)员外，你放精细者！(唱)为甚的黄甘甘改了面上，白邓邓丢了眼光？。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "半夜雷轰荐福碑・耍孩儿",
  "author": "元・马致远",
  "body": [
   "更怕我东南倦上红尘陌，空惹的行人赛色。",
   "可不骑鹤人枉沉埋，把着个颜回瓢也叫化的回来。",
   "未曾结庐山长老白莲社，正遇着东海龙王大会垓。",
   "他共我冤仇大，将这座药师佛海会，都变作赵太祖凶宅。"
  ],
  "note": "每個人心裡，都住著一首詩。"
 },
 {
  "title": "刘晨阮肇误入桃源・后庭花",
  "author": "元・王子一",
  "body": [
   "并不想有轩车有驷马，我则愿无根椽无片瓦。",
   "出来的一品职千钟禄，那里有六韬书三略法，他都是井中蛙妄称尊大。",
   "比周公不握发，比陈蕃不下榻。",
   "空结实花木瓜，费琢磨水晶塔。",
   "斗筲器不足夸，粪土墙容易塌，儿童见惊讶杀。"
  ],
  "note": "一首詩，一杯茶，一段靜好時光。"
 },
 {
  "title": "四・至如，有些官禄，辨甚么贤共愚。更那，有些金玉，识甚么亲共疏？",
  "author": "元・杜仁杰",
  "body": [
   "命福，有些乘除，问甚么有共无！。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "苏子瞻醉写赤壁赋・金蕉叶",
  "author": "元・无名氏",
  "body": [
   "人言语山鸣谷应，靠江边把扁舟缆定。",
   "山高处有仙则名，水深处有龙则灵。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "麻郎儿",
  "author": "元・无名氏《宦门子弟错立身》",
  "body": [
   "我能添插更疾，一管笔如飞。",
   "真字能抄掌记，更压着御京书会。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "张君瑞庆团园(第五本)・贺圣朝",
  "author": "元・王实甫",
  "body": [
   "少甚宰相人家，招婿的娇姿。",
   "其间或有个人儿似尔，那里取那温柔，这般才思？想莺莺意儿，怎不教人梦想眠思？。"
  ],
  "note": "古詩是時間寄來的信。"
 },
 {
  "title": "滚绣球・赤羽旗疏刺剌风尚高，丹墀陛湿浸浸雪未消，金銮殿淡氤氲瑞烟",
  "author": "元・汤舜民",
  "body": [
   "缭绕，玉狮炉香馥馥兰麝风飘。",
   "银酥蜡明灿灿金莲护绛绡，采鸾扇微影影青鸾纛翠翘，氍毹锦软茸茸平铺着宝街复道，珊瑚钩滴滴溜高簇起绣幕珠箔。",
   "九龙车霞光闪闪明芝盖，五凤楼日色瞳瞳映赭袍，隐隐鸣鞘。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "朱太守风雪渔樵记・天下乐",
  "author": "元・无名氏",
  "body": [
   "我一会家时复挑灯来看古书，我可便踌也波躇，那官职有也无，一会家受饥寒便似活地狱。",
   "则俺这朱买臣，虽不做真宰辅，(云)我虽然不做官，却也和那做官的一般。",
   "(杨孝先云)哥哥，可怎生与做官的一般？(正末唱)俺可也伴着他播清名一万古。",
   "(杨孝先云)哥哥说的是。",
   "(正末云)那江岸边不是哥哥的渔船？待我叫他一声。",
   "(做叫科，云)哥哥。",
   "(王安道云)俺两个兄弟来了也，快上船来！(做上船科)(王安道云)你两个兄弟请坐，老汉沽下一壶儿新酒，等你来荡寒，咱就此处闲攀话咱。",
   "(杨孝先云)雪下的紧，着哥哥久等也。",
   "(王安道做递酒科，云)兄弟满饮一杯。",
   "(正末云)哥哥先请。",
   "(王安道云)兄弟请。",
   "(正末做饮酒科)(王安道再递酒科，云)孝先兄弟，满饮一杯。",
   "(孝先做饮科)(王安道云)兄弟，咱闲口论闲话。",
   "我想来这会稽城中有钱的财主每，不知他怎生受用，兄弟细说一遍。",
   "我试听咱。",
   "(正末云)哥哥，便好道风雪酒家天。",
   "据着哥哥说呵，也有那等受苦的人；据着你兄弟说呵，也有那等受用的人。",
   "(王安道云)兄弟也，可是那一等人受用？(正末云)哥哥且休题别处，则说会稽城中有那等仕户财主每，遇着那太热的时节，他也不受热；遇着那太冷的时节，他也不受冷。",
   "哥哥不信时，听你兄弟说一遍咱。",
   "(王安道云)兄弟，你道那财主每，他冬月间不受冷，夏月间不受热，你说的差了也。",
   "可不道冷呵大家冷，热呵大家热，偏他怎生受用？你说，你说！(正末唱)。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "耍孩儿・山屏锦幛繁花盛，雪霁风和雨晴，良工着色画难成。竹疏梅淡轻",
  "author": "元・曾瑞",
  "body": [
   "盈，竹穿坏壁凉阴浅，梅枕寒流瘦影清。",
   "贪幽净，懒趋权势，不就功名。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "十探子大闹延安府・呆骨朵",
  "author": "元・无名氏",
  "body": [
   "则为他制造的汤水无滋味，你可甚调羹处燮理盐梅。",
   "怎能够做茶饭五味俱全，则您那和鼎鼐四时皆失。",
   "您治民无决断，他可也怎见这庖官罪！(回回官人云)俺几曾吃一口加味汤。",
   "(正末唱)他道是他几曾吃一口加味汤，我道来您，可便都不是宰相职。"
  ],
  "note": "在古老的文字裡，找到今天的自己。"
 },
 {
  "title": "梁州・卜龟卦铜腥玉笋，盼鸿书目断云山。别离情绪谁曾惯！这些时银筝",
  "author": "元・贯云石",
  "body": [
   "懒按，锦瑟慵弹，玉箫倦品，宝鉴羞观。",
   "病恹恹瘦损容颜，闷昏昏多少愁烦。",
   "花钿坠懒贴香腮，衫袖湿镇淹泪眼，玉簪斜倦整云鬟。",
   "近间，坐间。",
   "用工夫修下封鸳鸯缄，无处倩鱼雁。",
   "有万种凄凉不可堪，何日回还？。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "谢金吾诈拆清风府・水仙子",
  "author": "元・无名氏",
  "body": [
   "哎，他道俺劫法场擅放了御囚徒，又道俺恃皇亲毁诏书，又道俺殴大臣激的天颜怒。",
   "(殿头官云)长国姑，你也枉做一场，那杨景、焦赞，到底饶不得这死罪哩。",
   "(正旦唱)要鸣冤何处所，可不的屈杀无辜。",
   "既然是饶不的那孩儿命，我也便何颜号国姑，拚纳下这雪白头颅。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "张君瑞害相思(第三本)・沉醉东风",
  "author": "元・王实甫",
  "body": [
   "我则道槐影风摇暮鸦，原来是玉人帽侧乌纱。",
   "一个潜峰在曲槛边，一个背立在湖山下；那里叙寒温，并不曾打话。",
   "(红云)赫赫赤赤，那鸟来了。",
   "(末云)小姐，你来也。",
   "(搂住红科)(红云)禽兽，是我，你看得好仔细着，若是夫人怎了。",
   "(末云)小生害得眼花，搂得慌了些儿，不知是谁，望乞恕罪！(红唱)便做道搂得慌呵，你也索觑咱，多管是饿得你个穷神眼花。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "辅成王周公摄政・迎仙客",
  "author": "元・郑光祖",
  "body": [
   "今日册东宫登宝位，代先帝拜南郊。",
   "（小驾云了）（正末唱）听言绝擗踊一声险气倒。",
   "然如此省艰难，怕彳乞彳艹。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "冯玉兰夜月泣江舟・青哥儿",
  "author": "元・无名氏",
  "body": [
   "呀，则见他忙将、忙将兵刃，可教我怎生、怎生逃遁？你若是留得我残生过几春。",
   "我可也答报你深恩，敬似俺严亲。",
   "奉侍晨昏，不避辛勤。",
   "衣进时新，食献奇珍。",
   "情愿与你做孩儿左右不离身，甘承认。"
  ],
  "note": "在詩裡，我們都是歸人，不是過客。"
 },
 {
  "title": "幺・群芳会首，繁英故友。梦回时绿肥红瘦，荣华过可见疏薄，财物广始",
  "author": "元・曾瑞",
  "body": [
   "知亲厚。",
   "慕新思旧，簪遗佩解，镜破钗分，蜂妒蝶羞。",
   "恶缘难救，痼疾长发，业贯将盈，努力呈头。",
   "冷冫食重馅，口摇舌剑，吻搠唇枪，独攻决胜，混战无忧。",
   "不到得落人奸彀。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "李太白贬夜郎・太平令",
  "author": "元・王伯成",
  "body": [
   "大唐家朝冶里龙蛇不辨，禁帏中共猪狗同眠。",
   "河洛间途俗皆现，日月上清浑不辨。",
   "把谪仙，盛贬，一年半年，浪淘尽尘埃满面。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "幺・他争知我嫁人，我知他应过举。翻做了鱼沉雁杳，瓶坠簪折，信断音",
  "author": "元・王氏",
  "body": [
   "咫尺地半载余，一字无。",
   "双郎何处？我则索随他泛茶船去。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "张子房圯桥进履・醉扶归",
  "author": "元・李文蔚",
  "body": [
   "我见一个老叟亲来到，(太白云)兀那张良，你的性命，实是难逃也！(正末唱)他道我性命怎生逃，(太白云)便着人拿住张良者。",
   "(正末云)老尊长救性命咱。",
   "(唱)唬的我胆战心惊魂魄消。",
   "(太白云)兀那张良，这等风雪，如何不行动些？(正末唱)我这里迷却经尘道，(太白云)你来到俺这里，你走如何的往那里去？(正末唱)告你个老尊长将咱来且饶。",
   "(太白云)张良，我待救你这一命，你可是如何？(正末云)若是救了我的性命呵，(唱)久以后将你这救我命的恩临报。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "海门张仲村乐堂・四块玉",
  "author": "元・无名氏",
  "body": [
   "不索你厮掩藏，休倔强，(同知云)好是奇怪也，你回去罢。",
   "(正末云)洒家知道。",
   "(唱)我急走的去那厨房中我点着灯光，若是实呵小人请功赏。",
   "早来个可便黑洞洞的，如今照耀的来便刚朗朗，请同知觑见这二人的气象！。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "題玉堂壁",
  "author": "宋・陶穀",
  "body": [
   "官職有來須與做，才能用處不憂無。",
   "堪笑翰林陶學士，一生依樣畫葫蘆。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "诈妮子调风月・胜葫芦",
  "author": "元・关汉卿",
  "body": [
   "怕不依随蒙君一夜恩，争奈忒达地、忒知根，兼上亲上成亲好对门。",
   "觑了他兀的模样，这般身分。",
   "若脱过这好郎君。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "四・急宜将法变更，但因循弊若初，严刑峻法休轻恕。则这二攒司过似蛇",
  "author": "元・刘时中",
  "body": [
   "吞象，再差十大户犹如插翅虎。",
   "一半儿弓手先芟去，合干人同知数目，把门军切禁科需。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "南吕・四块玉叹世",
  "author": "元・马致远",
  "body": [
   "两鬓皤，中年过，图甚区区苦张罗？人间宠辱都参破。",
   "种春风二顷田，远红尘千丈波，倒大来闲快活。",
   "子孝顺，妻贤惠，使碎心机为他谁？到头来难免无常日。",
   "争名利，夺富贵，都是痴。",
   "带野花，携村酒，烦恼如何到心头。",
   "谁能跃马常食肉？二顷田，一具牛，饱后休。",
   "佐国心，拿云手，命里无时莫刚求。",
   "随时过遣休生受。",
   "几叶绵，一片绸，暖后休。",
   "带月行，披星走，孤馆寒食故乡秋。",
   "妻儿胖了咱消瘦。",
   "枕上忧，马上愁，死后休。",
   "白玉堆，黄金垛，一日无常果如何？良辰媚景休空过。",
   "琉璃钟琥珀浓，细腰舞皓齿歌，倒大来闲快活。",
   "风内灯，石中火，从结灵胎便南柯，福田休种儿孙祸。",
   "结三生清净缘，住一区安乐窝，倒大来闲快活。",
   "月满轮，花成朵，信马携仆到鸣珂，选一间岩嵌房儿坐。",
   "浅斟着金曲卮，低讴着白雪歌，倒大来闲快活。",
   "甑有尘，门无锁，人海从教斗张罗。",
   "共诗朋闲访相酬和，尽场儿吃闷酒，即席间发淡科，倒大来闲快活。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "看钱奴买冤家债主・高过浪来里煞",
  "author": "元・郑延玉",
  "body": [
   "但得见亲生儿俺可也不似这凄惶，他、他、他，明欺负俺无人侍养。",
   "(做哭科，云)俺那长寿儿也。",
   "(唱)想着俺长寿儿来，也和他都一般家血气方刚。",
   "(带云)婆婆，(唱)则俺这受苦的糟糠，卖儿呵也合将咱拦当。",
   "俺可甚么养小防备老，栽树要阴凉。",
   "想着俺那忤逆的儿郎，便成人也不认爷娘。",
   "有一日激恼了穹他，要整顿着纲常，你可不怕那五六月的雷声骨碌碌只在半空里响。"
  ],
  "note": "詩人寫下的，是我們說不出口的心情。"
 },
 {
  "title": "铁拐李度金童玉女・相公爱",
  "author": "元・贾仲明",
  "body": [
   "恰便似并蒂池莲一处栽，春水游鱼两和谐。",
   "疑猜，恐青春不再来，挨甚么时光待？。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "阀阅舞射柳蕤丸记・四块玉",
  "author": "元・无名氏",
  "body": [
   "则说他有见识，则说他多智谋。",
   "(陈尧佐云)将军有伊吕之才，管乐之术，凭着你手下将勇兵强，无人可及。",
   "(正末唱)你道我将勇兵强有谁及，争奈待罪犯歇马在这云州地。",
   "(陈尧佐云)据将军文武高强，智勇并行，手下军校，人人敢勇，个个当先，谁人可敌？(正末唱)小官可也武艺低，手下可也军校微，(陈尧佐云)将军挂了元戎印者，若是迟误，便抗违宣敕也。",
   "(正末唱)我怎敢道违宣敕。",
   "(陈尧佐云)将军与参谋使李信，领你手下十万雄兵，休避驱驰，便索长行也。",
   "(正末唱)。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "宋上皇御断金凤钗・石榴花",
  "author": "元・郑延玉",
  "body": [
   "则见压肩叠脊相簇一周遭，劝着的不睬半分毫。",
   "那厮憔憔忄敞忄敞，挥天霍地怒难消，(云)支揖哥哥，你休闹罢！(邦云)他少我二百钱，不还我，我和他跳河去！(正末唱)越见人劝着，越逞粗豪。",
   "(孤云)哥哥，你放了老汉，借些钱与哥哥便了。",
   "(做见正末科，云)支揖哥哥，多亏你相劝。",
   "老汉见你有二百长钱，怎生借与老汉，还了那人去，我一本一利交还。",
   "我撞着恶人也无奈何了。",
   "(邦云)你少我钱还胡赖！(正末唱)哎，你个孟尝君，自养着家中哨。",
   "(孤云)哥哥贵姓？(邦云)我是李虎。",
   "(正末唱)你正是晏平仲善与人交，走函关不肯学鸡叫，没钱呵扯着他跳周桥。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "幺・绿树成阴和烟暗，近香街羞对宜男。锦字书成粉泪缄，怕黄昏梦里将",
  "author": "元・吴仁卿",
  "body": [
   "人赚。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "辅成王周公摄政・调笑令",
  "author": "元・郑光祖",
  "body": [
   "客旅每报知，这的是真实，可知道路上行人口胜碑。",
   "我子为君王幼小权监国，除此外别无他意。",
   "（带云）公将不利于孺子！（唱）慌向丹墀内俯伏呼岁，臣死无葬身之地。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "紫花儿序・冷落了流苏绣幕，萧疏了画阁兰堂，寂寞了锦帐罗帏。生折散",
  "author": "元・无名氏",
  "body": [
   "鸾孤凤只，硬分开燕约莺期，暗暗的伤悲，永远山长隔万里。",
   "一思量一番憔悴，离愁断九曲柔肠，蹙损了八字蛾眉。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "裴少俊墙头马上・后庭花",
  "author": "元・白朴",
  "body": [
   "休道是转星眸上下窥，恨不的倚香腮左右偎。",
   "便锦被翻红浪，罗裙作地席。",
   "(梅香云)小姐休看他，倘有人看见。",
   "(正旦唱)既待要暗偷期，咱先有意，爱别人可舍了自己。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "得胜令・书信寄封封，烟水隔重重。夜月巴陵下，秋风渭水东。相逢，枕",
  "author": "元・姚燧",
  "body": [
   "上欢娱梦。",
   "飘蓬，天涯怅望中。"
  ],
  "note": "讓文字帶你走一段安靜的路。"
 },
 {
  "title": "老庄周一枕胡蝶梦・油葫芦",
  "author": "元・史九散人",
  "body": [
   "不如我跨凤乘鸾朝玉京，仙家日月永，你只待浩歌一曲酒千钟。",
   "见如今春秋七国刀兵动，不如我柳阴中一枕南柯梦。",
   "俺昆仑顶上人，比凌烟阁上臣。",
   "试看咸阳原上麒麟冢，都一般潇洒月明中。",
   "(云)自太极初分，到今春秋时，已经几万年了，日月好疾也。",
   "(唱)。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "两军师隔江斗智・二煞",
  "author": "元・无名氏",
  "body": [
   "想着我同胞的能有几，我大哥哥又不到底，提起来尚兀自肝肠碎。",
   "我母亲呵，可怜永日萱花晚，哥哥也没甚傍枝棠棣稀，怎不顾亲生妹？倒着我明为嫁送，暗夺城池。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "昼夜乐",
  "author": "宋・柳永",
  "body": [
   "洞房记得初相遇。",
   "便只合、长相聚。",
   "何期小会幽欢，变作离情别绪。",
   "况值阑珊春色暮。",
   "对满目、乱花狂絮。",
   "直恐好风光，尽随伊归去。",
   "一场寂寞凭谁诉。",
   "算前言、总轻负。",
   "早知恁地难拼，悔不当时留住。",
   "其奈风流端正外，更别有、系人心处。",
   "一日不思量，也攒眉千度。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "好酒赵元遇上皇・十二月",
  "author": "元・高文秀",
  "body": [
   "纳我在交椅上坐地，拿着我手脚身躯。",
   "地铺着绣褥，香喷着金猊。",
   "唤大夫是甚脉息？则我这病眼难医。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "山居詩  其七",
  "author": "宋・釋延壽",
  "body": [
   "事多興廢莫持論，唯有禪宗理可尊。",
   "似訥始平分別路，如愚方塞是非門。",
   "刳腸祇爲生靈智，剖舌多因强語言。",
   "爭似息機高卧客，年來年去道長存。"
  ],
  "note": "文字的光芒，照亮了最暗的角落。"
 },
 {
  "title": "朱砂担滴水浮沤记・醉扶归",
  "author": "元・无名氏",
  "body": [
   "我则见那野水穿花径，村犬吠柴扃。",
   "合剌剌辘轳响，可正和着各琅琅的捣碓声，更那堪绿柳相遮映。",
   "(做见店小二科，云)这是一个小酒务儿，小二哥，有酒么？(店小二云)有酒、有酒。",
   "(正末云)小二哥，打二百文长钱的酒来。",
   "(店小二云)酒在此。",
   "你有量尽着你吃，只不要撒酒风。",
   "(正末唱)则你这醇糯酒浑如靛青。",
   "我且饮一盏消闲兴。"
  ],
  "note": "詩人的眼睛，看見了我們忽略的美。"
 },
 {
  "title": "雁门关存孝打虎・四门子",
  "author": "元・无名氏",
  "body": [
   "恶口音欠口音欠撞入垓心内，张归霸走似飞，料应他武艺敌不的。",
   "打征马宛捻玉勒，畅好是慌，好是急。",
   "飞虎将早来望后追，畅好是慌，好是急，误撞入长安市里。"
  ],
  "note": "歲月流轉，唯有詩句永恆。"
 },
 {
  "title": "耍孩儿・从黑河边赶我到东吴内，我也则望前程万里。想道是物离乡贵有",
  "author": "元・曾瑞",
  "body": [
   "些峥嵘，撞着个主人翁少东没西。",
   "无料喂把肠胃都抛做粪，无水饮将脂膏尽化做尿。",
   "便似养虎豹牢监系，从朝至暮，坐守行随。"
  ],
  "note": "詩是心靈的鏡子，映照真實的自己。"
 },
 {
  "title": "石榴花・想这荔枝金带紫罗袍，刑法用萧曹。鼎镬斧钺斩身刀，轻轻地犯",
  "author": "元・邓玉宾",
  "body": [
   "着，便是天条。",
   "金珠宝贝休挨靠，天符帝敕难逃。",
   "顶门上飞下个雷霆炮，不似恁那初及第时节绣球儿抛。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "五・也不索闲言赞，冷句儿攒，快疾做取英雄汉。扫除乞俭分开吝，倚阁",
  "author": "元・董君瑞",
  "body": [
   "酸寒打破悭。",
   "忙迭办，俺巷来近远，怎地回还？。"
  ],
  "note": "詩教會我們，用另一種眼光看世界。"
 },
 {
  "title": "亻刍梅香骗翰林风月・鹊踏枝",
  "author": "元・郑光祖",
  "body": [
   "花共柳笑相迎，风与月更多情。",
   "酝酿出嫩绿娇红，淡白深青。",
   "对如此良辰美景，可知道动骚人风调才情。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "插花三台令",
  "author": "元・刘唐卿《白兔记》",
  "body": [
   "(众舞)打和鼓乔妆三教，舞狮豹间着大旗。",
   "小二哥敲罗击鼓，使牛儿萧笛乱吹，浪猪娘先呈百戏，驷马勒妆神跳鬼。",
   "牛筋引鼠哥一队，忙行走竹马似飞。",
   "(舞下。",
   "外、老旦、旦)。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "严子陵垂钓七里滩・络丝娘",
  "author": "元・宫天挺",
  "body": [
   "倒两个醉廛市同眠抵足，我怎去他手里三叩头扬尘拜舞？我说来的言词你寄将去，休忘了我-句。"
  ],
  "note": "在文字的世界裡，時間是靜止的。"
 },
 {
  "title": "仙吕・祆神急",
  "author": "元・白贲",
  "body": [
   "绿阴笼小院，红雨点苍苔。",
   "谁想东君也是人间客，纵分连理枝，谩解合欢带，伤春早是心地窄。",
   "愁山和闷海，畅会栽排。"
  ],
  "note": "山水之間，詩意自生。"
 },
 {
  "title": "洞庭湖柳毅传书・赚煞",
  "author": "元・尚仲贤",
  "body": [
   "俺为县么懒上凤凰台，羞对鸳鸯浦？则为那霹雳火无情的丈夫。",
   "是则是海藏龙宫曾共逐，世不曾似水如鱼，谩踌躇。",
   "影只形孤。",
   "只我这泪点儿多如那落花雨，多谢你有心肠的足，可着我便乘龙归去。",
   "(做拜科)(唱)全在这寄双亲和泪一封书。",
   "(下)(柳毅云)知他是神是鬼，且将这书直至洞庭湖庙前走一遭去。",
   "(诗云)泾河岸偶遇三娘，诉离愁雨泪行行。",
   "如今去洞庭湖上．将此书寄与龙王。",
   "(下)。"
  ],
  "note": "文字的力量，在於它能跨越時空。"
 },
 {
  "title": "尾声・庆风调雨顺升平日，保一统江山社稷。托赖着千千载仁主圣明朝，",
  "author": "元・宋方壶",
  "body": [
   "齐仰贺万万岁吾皇大明国。"
  ],
  "note": "文字的溫度，穿越了千年。"
 },
 {
  "title": "钟离春智勇定齐・圣药王",
  "author": "元・郑光祖",
  "body": [
   "那一个枪举的迟，这一个马骤的微，看看的马乏人困怎支持。",
   "征尘起，杀气迷，抛撇金鼓漾了征旗。",
   "(秦姬辇、吴起、孙操败走科)(秦姬辇云)不中，敌不住他，我与你走走走！(下)(正旦唱)则见他没揣的撞出兵围。"
  ],
  "note": "在喧囂中讀一首詩，就是一次小小的旅行。"
 },
 {
  "title": "斗鹌鹑",
  "author": "元・杨景贤",
  "body": [
   "恁娘那里望眼将穿，俺儿大灵魂儿尚有。",
   "儿呵，则愿得性命完全，精神抖擞。",
   "恰便似红叶儿飘香出御沟，淹淹地伴野鸥。",
   "俺孩儿身向低行，谁肯道恩从亡流？。"
  ],
  "note": "讀一首詩，像是深吸一口山間的空氣。"
 },
 {
  "title": "张公艺九世同居・正宫/端正好",
  "author": "元・无名氏",
  "body": [
   "人事尚炎凉，世态轻忠信，似这般不义富于我如浮云。",
   "小人若得十年运，早忘了贫时分。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "約張處士遊梁",
  "author": "宋・譚用之",
  "body": [
   "莫學區區老一經，夷門關吏舊書生。",
   "晉朝滅後無中散，韓國亡來絕上卿。",
   "龍變洞中千谷冷，劍橫天外八風清。",
   "好携長策干時去，免逐漁樵度太平。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "耍孩儿・金针绣作皆疏懒，方胜同心倦挽。回纹织锦断肠诗，无青鸾寄不",
  "author": "元・无名氏",
  "body": [
   "到云间。",
   "屏闲孔雀金翎断，衾剩鸳鸯翠羽寒。",
   "倚枕春魂散，梦中唤觉，万水千山。"
  ],
  "note": "一字一句，皆是人間煙火。"
 },
 {
  "title": "晋陶母剪发待宾・鹊踏枝",
  "author": "元・秦简夫",
  "body": [
   "你则待要赴佳筵，倒金船；咱如今少米无柴，赤手空拳。",
   "你不学汉贾谊献长策万言，你则待学刘伶般烂醉十年。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "关云长千里独行・上小楼",
  "author": "元・无名氏",
  "body": [
   "他待使些雕心鹰爪，安排下龙韬虎略。",
   "他一个个执锐披坚，勒马横枪，举斧轮刀。",
   "他将一领锦征袍，盘内托，我可便观了容貌，他那里曲躬躬一身伏着。"
  ],
  "note": "詩是生活的調味料，讓平淡變得有味。"
 },
 {
  "title": "正宫・黑漆弩",
  "author": "元・卢挚",
  "body": [
   "晚泊采石，醉歌田不伐。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "一・颜真卿苏子瞻，米元章黄鲁直，先贤墨迹君都得。满箱拍塞数千卷，",
  "author": "元・马致远",
  "body": [
   "文锦编挑满四围。",
   "通三昧，磨崖的本，画赞初碑。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "上小楼・他纯一味温柔软善，无半点轻狂寒贱。常则是眼儿盼盼，脚儿尖",
  "author": "元・兰楚芳",
  "body": [
   "尖，越着他那意儿悬悬。",
   "若是天可怜，得两全，成合姻眷，尽今生称了心愿。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "題金樓子後",
  "author": "唐・後主煜",
  "body": [
   "牙籤萬軸裹紅綃，王粲書同付火燒。",
   "不於祖龍留面目，遺篇那得到今朝。"
  ],
  "note": "有些感動，只有詩能說清楚。"
 },
 {
  "title": "郑月莲秋夜云窗梦・驻马听",
  "author": "元・无名氏",
  "body": [
   "幽梦初回，待教我一纸音书传信息。",
   "闲愁萦系，想当初一尊白酒话别离。",
   "不争秦台弄玉彩云低，都做了江州司马青衫湿。",
   "两下里，一般阻隔人千里。"
  ],
  "note": "每首詩都是一扇窗，通往另一個世界。"
 },
 {
  "title": "赵匡义智娶符金锭・太平令",
  "author": "元・无名氏",
  "body": [
   "多亏你个恩人说道，将亲事不错分毫。",
   "都则为韩松暴虐，将平人姻缘打落。",
   "(赵匡义云)夫妻皆是前定，岂他人能破的也呵。",
   "(正旦唱)呀，我这里说着，念着，笑倒，险些儿无着无落。",
   "(王朴云)今日个天下喜事，夫妻团圆。",
   "听我与您下断：您本是柴世忠良，一个个胆量高强。",
   "则因为赏春之景，来到你符氏门墙。",
   "赵匡义花下闲走，正见您年小红妆。",
   "既结下目前姻眷，搭彩楼招做新郎。",
   "有韩松依权挟势，遣官媒故意商量。",
   "恼犯了郑恩兄弟，施手段显耀刚强。",
   "诈妆做青春妇女，韩松见魂魄皆亡。",
   "今日个已成婚配，开筵会酒泛肴觞。",
   "赵匡义文武兼济，符金锭本性温良。",
   "今日个夫妻完备，一齐的拜谢吾皇。"
  ],
  "note": "文字裡藏著千年的心事。"
 },
 {
  "title": "晋文公火烧介子推・天下乐",
  "author": "元・狄君厚",
  "body": [
   "今日待动土兴工七十利开，但用的民夫，将百姓差，题起来痛伤情老臣心内骇。",
   "不争宫殿上太极宫，不争台修成云月台，臣则怕引得祸从天上来。"
  ],
  "note": "每一個字，都是一次深呼吸。"
 },
 {
  "title": "半夜雷轰荐福碑・普天乐",
  "author": "元・马致远",
  "body": [
   "谢吾师，倾心爱，有田文义气、赵胜的胸怀。",
   "打一统法帖碑，去向京师卖。",
   "到处里书生都相待，谁肯学有朋自远方来？那里取鸣时的凤麟，则别些个喧檐的燕雀，当路的狼豺。"
  ],
  "note": "詩人用最少的字，說最多的話。"
 },
 {
  "title": "遊長寧公主流杯池二十五首 二十二",
  "author": "唐・上官昭容",
  "body": [
   "橫鋪豹皮褥，側帶鹿胎巾。",
   "借問何爲者，山中有逸人。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "谢金吾诈拆清风府・越调/斗鹌鹑",
  "author": "元・无名氏",
  "body": [
   "我看那赴法的孩儿，则待搭救俺女婿。",
   "今日个郡马当刑，畅好是君皇下的。",
   "臣宰每不劝谏留人，直等到午时三刻，听的那一声叫下手只。",
   "可不道一将难求，千军易得。"
  ],
  "note": "每首詩，都是一場與自己的相遇。"
 },
 {
  "title": "游四门・正是枫麻梧叶报新秋，呀呀的寒雁过南楼。正遇着鸡肥蟹壮秋收",
  "author": "元・无名氏",
  "body": [
   "候，霜降水痕收。",
   "朋友每留，乘兴饮两三瓯。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "步步娇・劣性儿从前人难奔，何下手咱行顺。谩着外人，忙里偷闲厮温存。",
  "author": "元・无名氏",
  "body": [
   "想着那些儿恩，教俺几世儿填还尽。"
  ],
  "note": "讀詩的時候，世界暫停了一下。"
 },
 {
  "title": "吕洞宾度铁拐李岳・正宫/端正好",
  "author": "元・岳伯川",
  "body": [
   "你装裹我二十重，或是三十件。",
   "(旦云)你置下的合该你穿。",
   "(正末唱)你道是我置下我死合穿，知他土坑中埋我多深浅，装裹杀也无人见。"
  ],
  "note": "詩是最短的距離，連接兩顆心。"
 },
 {
  "title": "印秀才至舒州見尋別後寄詩依韻和",
  "author": "宋・徐鉉",
  "body": [
   "羈游白社身雖屈，高步辭場道不卑。",
   "投分共爲知我者，相尋多愧謫居時。",
   "離懷耿耿年來夢，厚意勤勤別後詩。",
   "今日谿邊正相憶，雪晴山秀柳絲垂。"
  ],
  "note": "最美的風景，往往藏在文字裡。"
 },
 {
  "title": "闺怨佳人拜月亭・贺新郎",
  "author": "元・关汉卿",
  "body": [
   "自从都下对尊堂，走马离朝，阿马间别无恙？（孤认了）则恁的犹自常思想，可更随车驾南迁汴梁；教俺去住无门、徊徨，家缘都撇漾，人口尽逃亡，闪的俺一双子母每无归向。",
   "自从身体上一朝出帝辇，俺这梦魂无夜不辽阳！。"
  ],
  "note": "詩不需要讀懂，只需要感受。"
 },
 {
  "title": "张孔目智勘魔合罗・混江龙",
  "author": "元・孟汉卿",
  "body": [
   "连阴不住，荒郊一望水模糊。",
   "我则见雨迷了山岫，云锁了青虚。",
   "(带云)这雨大不大？(唱)云气深，如倒悬着东大海；雨势大，似翻合了洞庭湖。",
   "好教我满眼儿没处寻归路，黑暗暗云迷四野，白茫茫水淹长涂。"
  ],
  "note": "有些情感，千年之後依然鮮活。"
 },
 {
  "title": "董秀英花月东墙记・正宫/端正好",
  "author": "元・白朴",
  "body": [
   "下香阶，踏芳径，步苍苔月影当庭。",
   "过回廊一弄凄凉景，好教我添悲兴。"
  ],
  "note": "讀詩如品茶，越慢越有味。"
 },
 {
  "title": "严子陵垂钓七里滩・尾",
  "author": "元・宫天挺",
  "body": [
   "您每朝聚九卿，你须当起五更，去得迟呵着那两班文武在丹墀候等。",
   "俺出家来纳被蒙头，黑甜一枕，直睡到红日三竿犹兀自唤不的我醒。",
   "(下)。"
  ],
  "note": "古人的浪漫，藏在字裡行間。"
 },
 {
  "title": "等你在雨中",
  "author": "余光中",
  "body": [
   "等你在雨中在造虹的雨中",
   "蟬聲沉落蛙聲升起",
   "一池的紅蓮如紅焰在雨中",
   "",
   "你來不來都一樣竟感覺",
   "每朵蓮都像你",
   "尤其隔著黃昏隔著這樣的細雨"
  ],
  "note": "等待本身即是一首詩，蓮與你在雨中重疊成永恆。"
 },
 {
  "title": "白玉苦瓜",
  "author": "余光中",
  "body": [
   "似醒似睡緩緩的柔光裏",
   "似悒似含朦朧的薄光裏",
   "白玉苦瓜不再是苦瓜",
   "而是一隻圓滿光潤的容器",
   "",
   "鍾整個大陸的愛在一隻苦瓜",
   "皮色恰似翠玉",
   "被永恆引渡此岸的某個角落"
  ],
  "note": "一只苦瓜凝結了千年的文化鄉愁與美學。"
 },
 {
  "title": "與永恆拔河",
  "author": "余光中",
  "body": [
   "與永恆拔河",
   "你在這一頭我在那一頭",
   "日子是一條繩索",
   "拉過來又放過去",
   "",
   "而歲月不肯認輸",
   "把我們都拉向同一個方向",
   "那邊是白髮是皺紋是沉默"
  ],
  "note": "時間是唯一不會放手的對手。"
 },
 {
  "title": "民歌",
  "author": "余光中",
  "body": [
   "傳說北方有一首民歌",
   "只有黃河的肺活量能歌唱",
   "從青海到黃海",
   "風也聽見沙也聽見",
   "",
   "如果黃河是一把豎琴",
   "大雪便是急奏"
  ],
  "note": "黃河即是歌喉，大地即是樂章。"
 },
 {
  "title": "碧潭",
  "author": "余光中",
  "body": [
   "十六柄桂槳敲碎青琉璃",
   "幾則羅曼史散落在水面",
   "碧潭的水色太薄了",
   "沉不下一疊厚厚的記憶",
   "",
   "如果碧潭再玻璃些",
   "就可以照見你了"
  ],
  "note": "碧潭薄得裝不下往事，卻厚得映出整個青春。"
 },
 {
  "title": "天問",
  "author": "余光中",
  "body": [
   "水上的霞光呵",
   "木中的年輪呵",
   "此刻的我呵",
   "",
   "有什麼能比光更寂寞",
   "除了追光的影子",
   "有什麼能比回聲更空洞",
   "除了發聲的山谷"
  ],
  "note": "追問天地的人，終究在問自己。"
 },
 {
  "title": "當我死時",
  "author": "余光中",
  "body": [
   "當我死時葬我在長江與黃河之間",
   "枕我的頭顱白髮蓋著黑土",
   "在中國最美最母親的國度",
   "",
   "我便坦然睡去睡整張大陸",
   "聽兩側安魂曲起自長江黃河",
   "兩管永生的音樂滔滔向東"
  ],
  "note": "以大陸為床，以江河為曲，死亡也是歸鄉。"
 },
 {
  "title": "風鈴",
  "author": "余光中",
  "body": [
   "我的心是七層塔簷上懸掛的風鈴",
   "叮嚀叮嚀嚀",
   "此起彼落敲叩著一個人的名字",
   "",
   "你的塔上也感到微震嗎",
   "這是寂靜的脈搏",
   "日夜不停"
  ],
  "note": "風鈴不為風響，只為遠方那人而鳴。"
 },
 {
  "title": "車過枋寮",
  "author": "余光中",
  "body": [
   "雨落在屏東的甘蔗田裏",
   "甜甜的甘蔗甜甜的雨",
   "肥肥的甘蔗肥肥的田",
   "",
   "從此地到山麓",
   "一片新綠鋪著",
   "無際的蔗田"
  ],
  "note": "火車窗外，甘蔗田是南方最甜的風景。"
 },
 {
  "title": "絕色",
  "author": "余光中",
  "body": [
   "若逢新雪初霽",
   "滿月當空",
   "下面平鋪著皓影",
   "上面流轉著亮銀",
   "",
   "而你帶笑地向我步來",
   "月色與雪色之間",
   "你是第三種絕色"
  ],
  "note": "月色與雪色之間，你是世間第三種明亮。"
 },
 {
  "title": "五陵少年",
  "author": "余光中",
  "body": [
   "颱風季巨浪向乾坤挑戰",
   "而我們以臂相拒",
   "少年的五陵如今隔著水",
   "",
   "我的怒中有燧人氏",
   "我的血中有共工氏",
   "但生我的土地被海峽斬斷"
  ],
  "note": "少年壯志如浪，大海隔不斷古老的血脈。"
 },
 {
  "title": "敲打樂",
  "author": "余光中",
  "body": [
   "你那雙鐵掌啊",
   "把節拍把鋼鐵敲得火辣辣的",
   "敲得天空一片青紫",
   "",
   "太陽是你的銅鈸",
   "月亮是你的銅鑼",
   "而風是那面旗"
  ],
  "note": "世界是一座巨大的打擊樂器，需要用力敲醒。"
 },
 {
  "title": "蓮的聯想",
  "author": "余光中",
  "body": [
   "搖曳在時光裏的那朵蓮",
   "是你踏波而來的倒影嗎",
   "一莖蓮舉起的是整個夏天",
   "",
   "在光的絲縷與水的皺褶之間",
   "你微微低首",
   "恰是凝碧的波痕"
  ],
  "note": "蓮是一個姿態，也是一場等待的隱喻。"
 },
 {
  "title": "大江東去",
  "author": "余光中",
  "body": [
   "大江東去浪聲滔滔",
   "歲月亦然",
   "凡是浪花走過的地方",
   "都是肉身沖刷的痕跡",
   "",
   "我立在此岸",
   "聽那千年的回聲"
  ],
  "note": "江水帶走歲月，留下的只有聽浪的人。"
 },
 {
  "title": "翠玉白菜",
  "author": "余光中",
  "body": [
   "通體碧綠剔透而輕盈",
   "每一條葉脈裏藏著帝國的秘密",
   "青白之間是匠人的呼吸",
   "",
   "一棵白菜鎮住千年的展廳",
   "比玉更溫潤的",
   "是巧匠注入的那口氣"
  ],
  "note": "一棵玉白菜，藏住一整座文明的溫潤。"
 },
 {
  "title": "春天遂想起",
  "author": "余光中",
  "body": [
   "春天遂想起江南",
   "唐詩裏的江南",
   "九歲時採桑葉於其中",
   "",
   "遂想起江南的小杜",
   "想起雨打在湖上",
   "那些年少的水花"
  ],
  "note": "春天一到，江南便從唐詩裏走出來了。"
 },
 {
  "title": "鬼雨",
  "author": "余光中",
  "body": [
   "雨是鬼的淚是鬼的汗",
   "在黃泉之上在人間之下",
   "一滴滴落在薄薄的世界",
   "",
   "你聽那窗外",
   "千萬隻腳在天上走過",
   "那是雲的腳步"
  ],
  "note": "雨聲裏藏著另一個世界的消息。"
 },
 {
  "title": "尋李白",
  "author": "余光中",
  "body": [
   "那一雙傲慢的靴子至今還落在",
   "高力士羞憤的手裏人卻不見了",
   "痛飲狂歌空度日飛揚跋扈為誰雄",
   "",
   "把滿地的難民和傷兵",
   "把整座長安讓給你",
   "讓一壺濁酒醉倒整個盛唐"
  ],
  "note": "一壺濁酒裏裝的不是酒，是整個盛唐的氣魄。"
 },
 {
  "title": "夸父",
  "author": "余光中",
  "body": [
   "為什麼要苦苦去追逐",
   "那團巨大的火球",
   "渴了就飲盡大澤與黃河",
   "",
   "最後仆倒在暮色裏",
   "化為一片桃林",
   "讓後來者在蔭下乘涼"
  ],
  "note": "追日者雖倒，化為桃林替後人遮蔭。"
 },
 {
  "title": "初相遇",
  "author": "席慕蓉",
  "body": [
   "美麗的夢和美麗的詩一樣",
   "都是可遇而不可求的",
   "常常在最沒能料到的時刻裏出現",
   "",
   "我喜歡那樣的夢",
   "在夢裏一切都可以重新開始",
   "一切都可以慢慢解釋"
  ],
  "note": "初遇是命運打翻的調色盤，所有顏色都是新的。"
 },
 {
  "title": "青春",
  "author": "席慕蓉",
  "body": [
   "所有的結局都已寫好",
   "所有的淚水也都已啟程",
   "卻忽然忘了是怎麼樣的一個開始",
   "",
   "在那個古老的不再回來的夏日",
   "無論我如何地去追索",
   "年輕的你只如雲影掠過"
  ],
  "note": "青春的殘忍在於——結局比開始先到。"
 },
 {
  "title": "無怨的青春",
  "author": "席慕蓉",
  "body": [
   "在年輕的時候",
   "如果你愛上了一個人",
   "請你一定要溫柔地對待她",
   "",
   "不管你們相愛的時間有多長或多短",
   "若你們能始終溫柔地相待",
   "那麼所有的時刻都將是一種無瑕的美麗"
  ],
  "note": "溫柔是唯一不會過期的承諾。"
 },
 {
  "title": "回首",
  "author": "席慕蓉",
  "body": [
   "我只好回首又回首",
   "在時光的河裏逆流而上",
   "尋找那個渡口那條小路",
   "",
   "牽我心的是一段歲月",
   "在歲月的盡頭",
   "你的笑容如月光灑落"
  ],
  "note": "回首是為了在舊時光裏再認出你一次。"
 },
 {
  "title": "渡口",
  "author": "席慕蓉",
  "body": [
   "讓我與你握別",
   "再輕輕抽出我的手",
   "知道思念從此生根",
   "",
   "浮雲白日山川莊嚴溫柔",
   "讓我與你握別",
   "再輕輕抽出我的手"
  ],
  "note": "握別時輕輕抽出的手，比握緊時更重。"
 },
 {
  "title": "暮歌",
  "author": "席慕蓉",
  "body": [
   "我喜歡將暮未暮的原野",
   "在這時候所有的顏色都已沉靜",
   "而黑暗尚未來臨",
   "",
   "在山崗上那叢鬱綠裏",
   "還有著最後一筆的激情",
   "我也喜歡這時的自己"
  ],
  "note": "黃昏最好的時刻，是暗還沒到、光還沒走的那一刻。"
 },
 {
  "title": "前緣",
  "author": "席慕蓉",
  "body": [
   "人若真能轉世",
   "世間若真有輪迴",
   "那麼我的前生一定在等你",
   "",
   "一世一世地等",
   "不是情願不是不甘",
   "只是命裏注定"
  ],
  "note": "前緣不是執念，是靈魂認出彼此的本能。"
 },
 {
  "title": "歷史博物館",
  "author": "席慕蓉",
  "body": [
   "是誰將我的故鄉弄丟了",
   "把它放在一個方方正正的玻璃櫃裏",
   "標上說明寫下年代",
   "",
   "而我的心啊在櫃外想要觸摸",
   "那已碎裂的陶罐上",
   "指紋還清晰如昨"
  ],
  "note": "故鄉一旦進了博物館，就只能隔著玻璃想念了。"
 },
 {
  "title": "七里香",
  "author": "席慕蓉",
  "body": [
   "溪水急著要流向海洋",
   "浪潮卻渴望重回土地",
   "在綠樹白花的籬前",
   "曾那樣輕易地揮手道別",
   "",
   "而滄桑的二十年後",
   "我們的魂魄卻夜夜歸來",
   "微風拂過時便化作滿園的郁香"
  ],
  "note": "七里香的香氣，是時間寄回的情書。"
 },
 {
  "title": "山路",
  "author": "席慕蓉",
  "body": [
   "我好像答應過你",
   "要和你一起走上那條美麗的山路",
   "你說那坡上種滿了新茶",
   "",
   "還有細密的相思樹",
   "我好像答應過你",
   "在一個遙遠的春日下午"
  ],
  "note": "答應過的山路，成了此生走不完的距離。"
 },
 {
  "title": "盼望",
  "author": "席慕蓉",
  "body": [
   "其實我盼望的也不過就只是那一瞬",
   "我從來不敢奢望能在人間得到永久",
   "只要在我開花的時候你恰好經過",
   "",
   "風吹過一陣清涼",
   "你看過便走也好",
   "至少你曾俯首"
  ],
  "note": "盼望不貪心，只要你經過時花恰好開著。"
 },
 {
  "title": "送別",
  "author": "席慕蓉",
  "body": [
   "不是所有的夢都來得及實現",
   "不是所有的話都來得及告訴你",
   "內疚和悔恨總要深深地種在離別後的心中",
   "",
   "儘管他們說世間種種",
   "最後終必成空",
   "我並不是立意要錯過"
  ],
  "note": "來不及的話比說出口的更重，因為它永遠說不完。"
 },
 {
  "title": "旅行",
  "author": "席慕蓉",
  "body": [
   "凡是遙遠的地方",
   "對我們都有一種誘惑",
   "不是誘惑於美麗",
   "就是誘惑於傳說",
   "",
   "即使遠方的風景",
   "並不盡如人意",
   "我們也無需在乎"
  ],
  "note": "遠方的意義不在風景，在於出發本身。"
 },
 {
  "title": "透明的哀傷",
  "author": "席慕蓉",
  "body": [
   "在長長的一生裏",
   "歡樂總是乍現就凋落",
   "走得最急的都是最美的時光",
   "",
   "向我揮手的那個少年",
   "還站在原地不動",
   "而我已經走了好遠好遠"
  ],
  "note": "走得最急的是最美的時光，留得最久的是透明的哀傷。"
 },
 {
  "title": "時光九篇",
  "author": "席慕蓉",
  "body": [
   "在黑暗的河流上被你閃亮的月光照亮",
   "我是一條潔白的船",
   "在你的港灣裏安然停泊",
   "",
   "年少的歲月行過蒼茫",
   "來到你的窗前",
   "化成一簾幽夢"
  ],
  "note": "時光是河，而你是唯一的港灣。"
 },
 {
  "title": "父親的草原母親的河",
  "author": "席慕蓉",
  "body": [
   "父親曾經形容草原的清香",
   "讓他在天涯海角也不能相忘",
   "母親總愛描摹那大河浩蕩",
   "",
   "奔流在蒙古高原我遙遠的家鄉",
   "如今終於見到了遼闊的大地",
   "站在芬芳的草原上我淚落如雨"
  ],
  "note": "草原的清香是父親的語言，大河的浩蕩是母親的歌。"
 },
 {
  "title": "小小的島",
  "author": "鄭愁予",
  "body": [
   "你住的小小的島我正思念",
   "那兒屬於熱帶椰子肥碩",
   "陽光透明木瓜甜",
   "",
   "長夏無風你走在巷子裏",
   "裙裾如午後的蝶",
   "蝶翅如你午後的裙裾"
  ],
  "note": "小島上你走過的風，比熱帶的陽光更溫暖。"
 },
 {
  "title": "如霧起時",
  "author": "鄭愁予",
  "body": [
   "我從海上來帶回航海的二十二顆星",
   "你問我航海的事兒",
   "我仰天笑了",
   "",
   "如霧起時",
   "敲叮叮的耳環在風裏搖響",
   "你是那待解纜的船"
  ],
  "note": "霧起時什麼都看不清，唯獨你是最清晰的方向。"
 },
 {
  "title": "雨說",
  "author": "鄭愁予",
  "body": [
   "雨說我來了我來探訪四月的大地",
   "我來了我走得很輕而且溫聲細語",
   "我的愛心像絲縷那樣把天地織在一起",
   "",
   "第一樣事兒我要教你們勇敢地笑啊",
   "君不見柳條兒見了我笑彎了腰",
   "石獅子見了我笑出了淚"
  ],
  "note": "雨是天空寫給大地最溫柔的一封信。"
 },
 {
  "title": "情婦",
  "author": "鄭愁予",
  "body": [
   "在一個港口而沒有船的城市",
   "我把木柵關上了",
   "在柵裏種花一年四季",
   "",
   "我和你的故事",
   "像一首不能唱的歌",
   "永遠封存在木柵之內"
  ],
  "note": "沒有船的港口，種滿了不能出航的思念。"
 },
 {
  "title": "夢土上",
  "author": "鄭愁予",
  "body": [
   "我們是旅人在夢土上行走",
   "腳步輕輕",
   "怕驚醒了沉睡的花",
   "",
   "走了一程又一程",
   "回頭看時",
   "足印已被晨露填平"
  ],
  "note": "夢土上的旅人，走過的路只有晨露記得。"
 },
 {
  "title": "客來小城",
  "author": "鄭愁予",
  "body": [
   "客來小城來自遠方",
   "風塵僕僕但眉間有光",
   "他帶來一壺雨水和半卷詩",
   "",
   "小城裏的人都笑了",
   "因為從此以後",
   "巷口的老樹也學會吟誦"
  ],
  "note": "遠方的客帶來的不是風塵，是讓老樹開口的詩意。"
 },
 {
  "title": "野店",
  "author": "鄭愁予",
  "body": [
   "是誰傳下了這行業",
   "黃昏裏掛起一盞燈",
   "啊是誰傳下了這詩人的行業",
   "",
   "讓他在黃昏裏歌唱",
   "野店是一首古老的歌",
   "唱給每個趕路的人聽"
  ],
  "note": "野店的燈是為迷路的人點的，詩也是。"
 },
 {
  "title": "窗外的女奴",
  "author": "鄭愁予",
  "body": [
   "窗外的女奴在月光下歌唱",
   "她的歌聲穿過夜色",
   "像一條銀色的河",
   "",
   "我在窗內聽著",
   "彷彿聽見了",
   "整個古老世界的歎息"
  ],
  "note": "月光下的歌聲，唱的是自由還是囚禁。"
 },
 {
  "title": "崖上",
  "author": "鄭愁予",
  "body": [
   "崖上的風吹得猛烈",
   "草低伏如臣服的群馬",
   "而我站在此處",
   "",
   "看海翻湧如一鍋沸騰的藍",
   "天地之間只剩下",
   "風和我的對話"
  ],
  "note": "站在崖上的人不是看海，是聽風的獨白。"
 },
 {
  "title": "船長的獨步",
  "author": "鄭愁予",
  "body": [
   "船長在甲板上獨步",
   "星斗是他頭上的錨",
   "黑夜是他手中的舵",
   "",
   "他走了一圈又一圈",
   "像在量度大洋的寬度",
   "用腳步"
  ],
  "note": "船長的孤獨和大洋一樣寬，需要用一生去丈量。"
 },
 {
  "title": "水巷",
  "author": "鄭愁予",
  "body": [
   "水巷裏的石板濕濕的",
   "映著對岸的燈火",
   "一個人的腳步聲",
   "在巷子裏來回踱著",
   "",
   "像一首重複的短詩",
   "怎麼讀都是同一個韻腳"
  ],
  "note": "水巷的回聲裏，寂寞是唯一的韻腳。"
 },
 {
  "title": "旅程",
  "author": "鄭愁予",
  "body": [
   "旅程在腳下展開",
   "像一卷漫長的地圖",
   "每一步都是一個新的注腳",
   "",
   "而那些走過的路",
   "都已成為身後的風景",
   "只在夢中偶爾重逢"
  ],
  "note": "走過的路都變成了夢裏才能重訪的風景。"
 },
 {
  "title": "天窗",
  "author": "鄭愁予",
  "body": [
   "天窗是屋頂的眼睛",
   "看著雲看著星看著飛鳥",
   "也看著窗下仰望的人",
   "",
   "人與天之間",
   "只隔一方玻璃",
   "和無限的想像"
  ],
  "note": "天窗是屋子留給天空的一個眼神。"
 },
 {
  "title": "子夜讀信",
  "author": "洛夫",
  "body": [
   "子夜的燈是一條未穿衣裳的",
   "小河你的信像一尾魚",
   "游入我的掌中",
   "",
   "讀信的手在微微顫抖",
   "彷彿握著一片薄冰",
   "隨時會在掌心融化"
  ],
  "note": "深夜讀到的信，每個字都是融化中的薄冰。"
 },
 {
  "title": "石室之死亡（節選）",
  "author": "洛夫",
  "body": [
   "我在石室中坐著",
   "死亡在隔壁房間磨刀",
   "鏡子裏的人不是我",
   "是時間的另一個面孔",
   "",
   "石室外有風吹過",
   "那是永恆在散步",
   "踩碎了一地的落葉"
  ],
  "note": "石室裏的人與死亡為鄰，鏡中映出的是時間本身。"
 },
 {
  "title": "漂木（節選）",
  "author": "洛夫",
  "body": [
   "一根漂木在大海上浮沉",
   "不知來處不知歸途",
   "它曾經是一棵挺拔的樹",
   "",
   "而此刻它只是一段木頭",
   "被海水沖刷被太陽曬白",
   "隨波逐流如一封退回的信"
  ],
  "note": "漂木是被海洋退回的信，收件人是永恆。"
 },
 {
  "title": "長恨歌",
  "author": "洛夫",
  "body": [
   "月光在水面上寫字",
   "寫的都是舊時的名字",
   "魚讀了感動得吐出泡沫",
   "",
   "而岸上的柳",
   "垂下千萬條傷心的手臂",
   "撈不起一片完整的月光"
  ],
  "note": "月光碎在水裏，恰如舊事碎在記憶裏。"
 },
 {
  "title": "邊界望鄉",
  "author": "洛夫",
  "body": [
   "望遠鏡中擴大數十倍的鄉愁",
   "亂如風中的散髮",
   "當距離調整到令人心跳的程度",
   "",
   "一座遠山迎面飛來",
   "把我撞成了嚴重的內傷"
  ],
  "note": "望遠鏡拉近的不是山，是痛。"
 },
 {
  "title": "窗下",
  "author": "洛夫",
  "body": [
   "當暮色裝滿大街小巷",
   "燈一盞盞亮起來",
   "我在窗下坐著讀一本舊書",
   "",
   "書頁間夾著一片枯葉",
   "那是去年秋天你放進去的",
   "如今它比書頁更薄了"
  ],
  "note": "枯葉比書頁薄，記憶卻比書頁重。"
 },
 {
  "title": "雨中過辛亥隧道",
  "author": "洛夫",
  "body": [
   "雨在隧道外等我",
   "像一群焦急的孩子",
   "車穿過黑暗",
   "前方忽然一片明亮",
   "",
   "而雨又在出口處迎接我",
   "彷彿什麼都沒有發生"
  ],
  "note": "隧道是一段短暫的遺忘，出口處雨還在等你。"
 },
 {
  "title": "水與火",
  "author": "洛夫",
  "body": [
   "水說我是溫柔的",
   "火說我是熱烈的",
   "你站在中間不知所措",
   "",
   "而我同時是水與火",
   "在你的掌心裏",
   "既沸騰又結冰"
  ],
  "note": "愛是同時沸騰又結冰的矛盾。"
 },
 {
  "title": "背向大海",
  "author": "洛夫",
  "body": [
   "背向大海我走向內陸",
   "每一步都踩在回憶的碎片上",
   "海風在身後呼喊",
   "",
   "但我不回頭",
   "因為回頭就看見",
   "浪花組成的你的臉"
  ],
  "note": "背向大海不是告別，是怕看見浪花裏的你。"
 },
 {
  "title": "午夜削梨",
  "author": "洛夫",
  "body": [
   "午夜削一顆梨",
   "窸窸窣窣的聲音",
   "像是在削去一層光陰",
   "",
   "削到最後",
   "只剩一顆白白的心",
   "放在掌中微微發涼"
  ],
  "note": "削去的是果皮，也是歲月；剩下的白心，微涼如初。"
 },
 {
  "title": "與李賀共飲",
  "author": "洛夫",
  "body": [
   "月光斟滿了你的酒杯",
   "你說天若有情天亦老",
   "我說那就讓它老去",
   "",
   "你我隔著千年共飲",
   "酒是冷的詩是熱的",
   "長安的風至今未歇"
  ],
  "note": "千年前的酒杯裏，盛的是同一輪月光。"
 },
 {
  "title": "裸奔",
  "author": "洛夫",
  "body": [
   "一棵樹在秋天裏裸奔",
   "甩掉所有的葉子",
   "只剩骨骼和天空對峙",
   "",
   "那是一種徹底的自由",
   "也是一種徹底的寂寞",
   "風吹過它不再發出聲音"
  ],
  "note": "落盡繁華的樹，是最自由也最沉默的。"
 },
 {
  "title": "秋歌",
  "author": "瘂弦",
  "body": [
   "落葉完成了最後的顫抖",
   "荻花在煙水裏搖曳",
   "這是秋的盡頭了",
   "",
   "我們的心事像一團糾纏的毛線",
   "在風裏打著結又散開",
   "散開又打結"
  ],
  "note": "秋天是心事打結又散開的季節。"
 },
 {
  "title": "深淵",
  "author": "瘂弦",
  "body": [
   "一個老婦人坐在門檻上",
   "編織一雙過冬的襪子",
   "她的手指像枯枝",
   "在記憶的線團裏穿梭",
   "",
   "深淵是什麼",
   "深淵是一雙永遠織不完的襪子",
   "和一個永遠等不到冬天的人"
  ],
  "note": "深淵不在腳下，在那雙永遠織不完的襪子裏。"
 },
 {
  "title": "紅玉米",
  "author": "瘂弦",
  "body": [
   "宣統那年的風吹過來",
   "吹過了七十年",
   "紅玉米掛在屋簷下",
   "",
   "猶似新嫁娘的串珠",
   "那老去的是人",
   "紅玉米還是一樣的紅"
  ],
  "note": "紅玉米不老，老的是看它的人。"
 },
 {
  "title": "鹽",
  "author": "瘂弦",
  "body": [
   "二哥從北方帶回來一把鹽",
   "在燈下攤開來像一堆白雪",
   "母親把它藏在罐子裏",
   "",
   "每天取出一小撮",
   "放進苦澀的湯裏",
   "那是北方寄來的唯一的甜"
  ],
  "note": "鹽是苦的，但從故鄉帶回的鹽，是唯一的甜。"
 },
 {
  "title": "上校",
  "author": "瘂弦",
  "body": [
   "退了役的上校",
   "在家鄉的門口坐著",
   "他的勳章鎖在抽屜裏",
   "",
   "而他的影子",
   "在夕陽裏越拉越長",
   "像一條回不去的路"
  ],
  "note": "勳章鎖進了抽屜，但回不去的路還攤在夕陽裏。"
 },
 {
  "title": "巴黎",
  "author": "瘂弦",
  "body": [
   "一個遙遠的名字",
   "像一朵不謝的花",
   "開在所有年輕人的唇上",
   "",
   "巴黎是一封信",
   "寫給全世界的人",
   "但永遠沒有人讀完"
  ],
  "note": "巴黎是一封寫給全世界卻永遠讀不完的情書。"
 },
 {
  "title": "坤伶",
  "author": "瘂弦",
  "body": [
   "十四歲她逃出了木柵欄",
   "夜裏在一條河邊唱起了戲",
   "水中的月亮替她打拍子",
   "",
   "從此她的嗓子裏住著一條河",
   "唱盡了悲歡離合",
   "台下的人都走了她還在唱"
  ],
  "note": "台下空了她還在唱，因為河住進嗓子就流不走了。"
 },
 {
  "title": "山神",
  "author": "瘂弦",
  "body": [
   "山神獨坐在雲端",
   "看人間忙碌如螞蟻",
   "他不說話已經三千年了",
   "",
   "偶爾嘆一口氣",
   "便化為山谷的風",
   "吹動了山腳下一面旗幟"
  ],
  "note": "山神的嘆息化成風，人間卻以為只是天氣變了。"
 },
 {
  "title": "乞丐",
  "author": "瘂弦",
  "body": [
   "乞丐蹲在城門下",
   "他的碗裏盛著一小片天空",
   "和三枚銅板",
   "",
   "他是全城唯一有閒的人",
   "看白雲走完一整天的路",
   "然後收起碗回到黑暗裏"
  ],
  "note": "乞丐的碗裏有天空，那是富人看不見的風景。"
 },
 {
  "title": "水之湄",
  "author": "楊牧",
  "body": [
   "水之湄你在水之湄",
   "而我在岸上望你",
   "風吹過蘆葦便是你的手",
   "在遠方搖動",
   "",
   "你若是那條溪流",
   "那我便是兩岸的石頭",
   "日夜聽你的低語"
  ],
  "note": "你是水，我是岸，日夜聽你流過的聲音。"
 },
 {
  "title": "有人",
  "author": "楊牧",
  "body": [
   "有人問我公理和正義的問題",
   "在一個深秋的午後",
   "我沉默了很久",
   "",
   "窗外的楓葉正一片一片落下",
   "每一片都像是一個",
   "來不及回答的答案"
  ],
  "note": "正義的答案像楓葉，落了滿地卻來不及撿起。"
 },
 {
  "title": "延陵季子掛劍",
  "author": "楊牧",
  "body": [
   "你已經離去了",
   "而我帶來的劍還在",
   "掛在墳前的老松上",
   "",
   "風吹動劍穗如當年",
   "你微笑的樣子",
   "諾言比劍更鋒利"
  ],
  "note": "劍掛在墳前，守的不是墓，是當年一個未說出的承諾。"
 },
 {
  "title": "給時間",
  "author": "楊牧",
  "body": [
   "給時間一點時間",
   "讓過去的成為過去",
   "讓開始的重新開始",
   "",
   "在兩者之間",
   "有一段沉默",
   "那就是現在"
  ],
  "note": "現在是過去和未來之間的一段沉默。"
 },
 {
  "title": "瓶中稿",
  "author": "楊牧",
  "body": [
   "我把詩裝進瓶裏",
   "擲入大海",
   "讓洋流替我選擇讀者",
   "",
   "也許若干年後",
   "有人在沙灘上拾起",
   "讀到了一個已不存在的秋天"
  ],
  "note": "瓶中的詩會比寫詩的人活得更久更遠。"
 },
 {
  "title": "秋祭",
  "author": "楊牧",
  "body": [
   "稻穗低垂如行禮的僧侶",
   "田間的風帶著穀物的香",
   "收割之後大地便空了",
   "",
   "空得像一面鼓",
   "等待下一個季節來敲響",
   "那是大地的輪迴"
  ],
  "note": "收割後的田是一面等待被敲響的鼓。"
 },
 {
  "title": "十二月",
  "author": "楊牧",
  "body": [
   "十二月的光很薄",
   "薄得像一層紗",
   "蓋在這座城市上面",
   "",
   "人們裹緊了衣裳走路",
   "每個人的影子都很短",
   "因為太陽在很遠的地方"
  ],
  "note": "十二月的光薄如紗，影子短如匆匆的一年。"
 },
 {
  "title": "出航",
  "author": "楊牧",
  "body": [
   "解纜之後回頭望去",
   "港口已小得像一枚郵票",
   "而前方是無盡的藍",
   "",
   "我不知道風會把我帶向何方",
   "但我知道",
   "每一道浪都是新的開始"
  ],
  "note": "出航的意義不在抵達，在於敢面對無盡的藍。"
 },
 {
  "title": "山風海雨",
  "author": "楊牧",
  "body": [
   "山風從左邊來",
   "海雨從右邊來",
   "我站在花蓮的土地上",
   "被兩種力量同時擁抱",
   "",
   "一邊是粗獷的太平洋",
   "一邊是溫柔的中央山脈"
  ],
  "note": "花蓮的孩子同時被山的溫柔和海的粗獷養大。"
 },
 {
  "title": "星之組曲",
  "author": "楊牧",
  "body": [
   "星星是夜空的標點符號",
   "有些是逗號有些是句號",
   "你指著那顆最亮的說",
   "那是驚嘆號",
   "",
   "而我知道",
   "流星是天空寫了又劃掉的字"
  ],
  "note": "流星是天空後悔寫下又急忙劃掉的秘密。"
 },
 {
