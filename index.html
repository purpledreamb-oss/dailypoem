 "何周道之平易兮，然蕪穢而險戲。", "高陽無故而委塵兮，唐虞點灼而毀議。", "誰使正其真是兮，雖有八師而不可爲。", "皇天保其高兮，后土持其久。", "服清白以逍遙兮，偏與乎玄英異色。", "西施媞媞而不得見兮，嫫母勃屑而日侍。", "桂蠹不知所淹留兮，蓼蟲不知徙乎葵菜。", "處湣湣之濁世兮，今安所達乎吾志。", "意有所載而遠逝兮，固非衆人之所識。", "驥躊躇於弊輂兮，遇孫陽而得代。", "呂望窮困而不聊生兮，遭周文而舒志。", "甯戚飯牛而商歌兮，桓公聞而弗置。", "路室女之方桑兮，孔子過之以自侍。", "吾獨乖剌而無當兮，心悼怵而耄思。", "思比干之恲恲兮，哀子胥之慎事。", "悲楚人之和氏兮，獻寶玉以爲石。", "遇厲武之不察兮，羌兩足以畢斮。", "小人之居勢兮，視忠正之何若？", "改前聖之法度兮，喜囁嚅而妄作。", "親讒諛而疏賢聖兮，訟謂閭娵爲醜惡。", "愉近習而蔽遠兮，孰知察其黑白？", "卒不得效其心容兮，安眇眇而無所歸薄。", "專精爽以自明兮，晦冥冥而壅蔽。", "年既已過太半兮，然埳軻而留滯。", "欲高飛而遠集兮，恐離罔而滅敗。", "獨冤抑而無極兮，傷精神而壽夭。", "皇天既不純命兮，餘生終無所依。", "願自沉於江流兮，絕橫流而徑逝。", "寧爲江海之泥塗兮，安能久見此濁世？"], "note": "一字一句，皆是人間煙火。"}, {"title": "河廣", "author": "詩經", "body": ["誰謂河廣？一葦杭之。誰謂宋遠？跂予望之。", "", "誰謂河廣？曾不容刀。誰謂宋遠？曾不崇朝。"], "note": "在詩裡，我們都是歸人，不是過客。"}, {"title": "帝京篇十首 十", "author": "唐・太宗皇帝", "body": ["以茲遊觀極，悠然獨長想。", "披卷覽前蹤，撫躬尋既往。", "望古茅茨約，瞻今蘭殿廣。", "人道惡高危，虛心戒盈蕩。", "奉天竭誠敬，臨民思惠養。", "納善察忠諫，明科慎刑賞。", "六五誠難繼，四三非易仰。", "廣待淳化敷，方嗣雲亭響。"], "note": "千年前的月光，照亮今夜的窗。"}, {"title": "桐廬員外出勳德之門以儒素爲業泊來儀於京闕久飛譽於縉紳今則膺鳳詔於朝端奏牛刀於江表會承旨尚書賦瓊章於丹地餞蘭櫂於清流愚雖不才敢繼其作", "author": "宋・扈蒙", "body": ["王謝高門江鮑才，東遊何用更裴回。", "絃歌好就吳鄉拜，簪組初從魏闕來。", "清酒一尊攜瀲灩，舊詩千首貯瓊瑰。", "健颿輕櫂須行樂，莫效當時庾信哀。"], "note": "最美的風景，往往藏在文字裡。"}, {"title": "雞鳴", "author": "詩經", "body": ["雞既鳴矣，朝既盈矣。匪雞則鳴，蒼蠅之聲。", "", "東方明矣，朝既昌矣。匪東方則明，月出之光。", "", "蟲飛薨薨，甘與子同夢。會且歸矣，無庶予子憎。"], "note": "靜下心來，聽見詩裡的風聲。"}, {"title": "於中好·詠史", "author": "清・納蘭性德", "body": ["馬上吟成促渡江，分明閒氣屬閨房", "生憎久閉金鋪暗，花冷迴心玉一牀", "添哽咽，足淒涼", "誰教生得滿身香", "只今西海年年月，猶爲蕭家照斷腸"], "note": "讀一首詩，像是深吸一口山間的空氣。"}, {"title": "酬郭先輩", "author": "宋・徐鉉", "body": ["太原郭夫子，行高文炳蔚。", "弱齡負世譽，一舉遊月窟。", "仙籍第三人，時人故稱屈。", "昔餘吏西省，傾蓋名籍籍。", "及我竄羣舒，向風心鬰鬰。", "歸來暮江上，雲霧一披拂。", "雷雨不下施，猶作池中物。", "念君介然氣，感時思奮發。", "示我數篇文，與古爭馳突。", "綵縟粲英華，理深刮肌骨。", "古詩尤精奧，史論皆宏拔。", "舉此措諸民，何憂民不活。", "吁嗟吾道薄，與世長迂闊。", "顧我徒有心，數奇身正絀。", "論兵屬少年，經國須儒術。", "夫子無自輕，蒼生正愁疾。"], "note": "詩是靈魂深處最柔軟的聲音。"}, {"title": "慶春澤", "author": "宋・張先", "body": ["飛閣危橋相倚。", "人獨立東風，滿衣輕絮。", "還記憶江南，如今天氣。", "正白蘋花，繞堤漲流水。", "寒梅落盡誰寄。", "方春意無窮，青空千里。", "愁草樹依依，關城初閉。", "對月黃昏，角聲傍煙起。"], "note": "詩人寫下的，是我們說不出口的心情。"}, {"title": "遼東山夜臨秋", "author": "唐・太宗皇帝", "body": ["煙生遙岸隱，月落半崖陰。", "連山驚鳥亂，隔岫斷猿吟。"], "note": "詩人用最少的字，說最多的話。"}, {"title": "贈王貞素先生", "author": "宋・徐鉉", "body": ["先生嘗已佩真形，紺髮朱顔骨氣清。", "道祕未傳鴻寶術，院深時聽步虛聲。", "遼東幾度悲城郭，吳市終應變姓名。", "三十六天皆有籍，他年何處問歸程。"], "note": "山水之間，詩意自生。"}, {"title": "酒泉子·謝卻荼蘼", "author": "清・納蘭性德", "body": ["謝卻荼蘼，一片月明如水", "篆香消，猶未睡，早鴉啼", "嫩寒無賴羅衣薄，休傍闌幹角", "最愁人，燈欲落，雁還飛"], "note": "文字的光芒，照亮了最暗的角落。"}, {"title": "鹿鳴", "author": "詩經", "body": ["呦呦鹿鳴，食野之苹。我有嘉賓，鼓瑟吹笙。吹笙鼓簧，承筐是將。人之好我，示我周行。", "", "呦呦鹿鳴，食野之蒿。我有嘉賓，德音孔昭。視民不恌，君子是則是效。我有旨酒，嘉賓式燕以敖。", "", "呦呦鹿鳴，食野之芩。我有嘉賓，鼓瑟鼓琴。鼓瑟鼓琴，和樂且湛。我有旨酒，以燕樂嘉賓之心。"], "note": "有些感動，只有詩能說清楚。"}, {"title": "山居詩  其四四", "author": "宋・釋延壽", "body": ["萬境閒來情澹澹，羣囂息後思微微。", "當時白業無門入，今日玄關有路歸。", "熟果不搖翻自落，生禽誰喚卻驚飛。", "到頭何用空忙得，任運應須待對機。"], "note": "山水之間，詩意自生。"}, {"title": "怨春郎", "author": "宋・歐陽修", "body": ["爲伊家，終日悶。", "受盡恓惶誰問。", "不知不覺上心頭，悄一霎身心，頓也沒處頓。", "惱愁腸，成寸寸。", "已恁莫把人縈損。", "奈每每人前道著伊，空把相思淚眼和衣搵。"], "note": "讀詩，是與古人的一場對話。"}, {"title": "東門之墠", "author": "詩經", "body": ["東門之墠，茹藘在阪。其室則邇，其人甚遠。", "", "東門之慄，有踐家室。豈不爾思？子不我即！"], "note": "每一個字，都是一次深呼吸。"}, {"title": "江舍人宅筵上有妓唱和州韓舍人歌辭因以寄", "author": "宋・徐鉉", "body": ["良宵絲竹偶成歡，中有佳人俯翠鬟。", "白雪飄颻傳樂府，阮郎憔悴在人間。", "清風朗月長相憶，佩蕙紉蘭早晚還。", "深夜酒空筵欲散，向隅惆悵鬢堪斑。"], "note": "詩是最溫柔的力量。"}, {"title": "郊廟歌辭 封泰山樂章 豫和 一", "author": "唐・張說", "body": ["款泰壇，柴泰清。", "受天命，報天成。", "竦皇心，薦樂聲。", "志上達，歌下迎。"], "note": "詩是靈魂深處最柔軟的聲音。"}, {"title": "遊長寧公主流杯池二十五首 九", "author": "唐・上官昭容", "body": ["登山一長望，正遇九春初。", "結駟填街術，閭閻滿邑居。", "鬬雪梅先吐，驚風柳未舒。", "直愁斜日落，不畏酒尊虛。"], "note": "文字如水，潤物無聲。"}, {"title": "採桑子·桃花羞作無情死", "author": "清・納蘭性德", "body": ["桃花羞作無情死，感激東風，吹落嬌紅，飛入窗間伴懊儂", "誰憐辛苦東陽瘦，也爲春慵，不及芙蓉，一片幽情冷處濃"], "note": "千年前的月光，照亮今夜的窗。"}, {"title": "昭君怨·深禁好春誰惜", "author": "清・納蘭性德", "body": ["深禁好春誰惜，薄暮瑤階佇立", "別院管絃聲，不分明", "又是梨花欲謝，繡被春寒今夜", "寂寞鎖朱門，夢承恩"], "note": "詩不需要讀懂，只需要感受。"}, {"title": "奉和聖製過溫湯", "author": "唐・越王貞", "body": ["鳳輦騰宸駕，驪籞次乾遊。", "坎德疎溫液，山隈派暖流。", "寒氛空外擁，蒸氣沼中浮。", "林凋帷影散，雲斂蓋陰收。", "霜郊暢玄覽，參差落景遒。"], "note": "有些情感，千年之後依然鮮活。"}, {"title": "送吳郎中爲宣州推官知涇縣", "author": "宋・徐鉉", "body": ["徵虜亭邊月，雞鳴伴客行。", "可憐何水部，今事謝宣城。", "風物聊供賞，班資莫繫情。", "同心不同載，留滯爲浮名。"], "note": "文字裡藏著千年的心事。"}, {"title": "還過東都留守周公筵上贈座客", "author": "宋・徐鉉", "body": ["賈生三載在長沙，故友相思道路賒。", "已分終年甘寂寞，豈知今日返京華。", "麟符上相恩偏厚，隋苑留歡日欲斜。", "明旦江頭倍惆悵，遠山芳草映殘霞。"], "note": "每首詩，都是一場與自己的相遇。"}, {"title": "中和節賜百官燕集因示所懷", "author": "唐・德宗皇帝", "body": ["至化恆在宥，保和茲息人。", "推誠撫諸夏，與物長爲春。", "仲月風景暖，禁城花柳新。", "芳時協金奏，賜宴同羣臣。", "絲竹豈雲樂，忠賢惟所親。", "庶洽朝野意，曠然天地均。"], "note": "文字的光芒，照亮了最暗的角落。"}, {"title": "金縷曲·亡婦忌日有感", "author": "清・納蘭性德", "body": ["此恨何時已", "滴空階、寒更雨歇，葬花天氣", "三載悠悠魂夢杳，是夢久應醒矣", "料也覺、人間無味", "不及夜臺塵土隔，冷清清、一片埋愁地", "釵鈿約，竟拋棄", "重泉若有雙魚寄", "好知他、年來苦樂，與誰相倚", "我自中宵成轉側，忍聽湘弦重理", "待結個、他生知己", "還怕兩人俱薄命，再緣慳、剩月零風裏", "清淚盡，紙灰起"], "note": "最美的風景，往往藏在文字裡。"}, {"title": "安陽好・憶江南", "author": "宋・韓琦", "body": ["安陽好，形勢魏西州。", "曼衍山川環故國，昇平歌吹沸高樓。", "和氣鎮飛浮。", "籠畫陌，喬木幾春秋。", "花外軒窗排遠岫，竹間門巷帶長流。", "風物更清幽。"], "note": "每首詩都是一扇窗，通往另一個世界。"}, {"title": "臨江仙·點滴芭蕉心欲碎", "author": "清・納蘭性德", "body": ["點滴芭蕉心欲碎，聲聲催憶當初", "欲眠還展舊時書", "鴛鴦小字，猶記手生疏", "倦眼乍低緗帙亂，重看一半模糊", "幽窗冷雨一燈孤", "料應情盡，還道有情無"], "note": "文字的光芒，照亮了最暗的角落。"}, {"title": "飲馬長城窟行", "author": "唐・太宗皇帝", "body": ["塞外悲風切，交河冰已結。", "瀚海百重波，陰山千里雪。", "迥戍危烽火，層巒引高節。", "悠悠卷斾旌，飲馬出長城。", "寒沙連騎跡，朔吹斷邊聲。", "胡塵清玉塞，羌笛韻金鉦。", "絕漠干戈戢，車徒振原隰。", "都尉反龍堆，將軍旋馬邑。", "揚麾氛霧靜，紀石功名立。", "荒裔一戎衣，靈臺凱歌入。"], "note": "山水之間，詩意自生。"}, {"title": "憶秦娥·長飄泊", "author": "清・納蘭性德", "body": ["長飄泊，多愁多病心情惡", "心情惡", "模糊一片，強分哀樂", "擬將歡笑排離索，鏡中無奈顏非昨", "顏非昨", "才華尚淺，因何福薄"], "note": "古人的智慧，凝結在這幾行字裡。"}, {"title": "奉和御製麟德殿宴百官", "author": "唐・尚宮宋氏若憲", "body": ["端拱承休命，時清荷聖皇。", "四聰聞受諫，五服遠朝王。", "景媚鶯初囀，春殘日更長。", "命筵多濟濟，盛樂復鏘鏘。", "酆鎬誰將敵，橫汾未可方。", "願齊山嶽壽，祉福永無疆。"], "note": "詩不需要讀懂，只需要感受。"}, {"title": "滿朝歡", "author": "宋・柳永", "body": ["花隔銅壺，露晞金掌，都門十二清曉。", "帝裏風光爛漫，偏愛春杪。", "煙輕晝永，引鶯囀上林，魚遊靈沼。", "巷陌乍晴，香塵染惹，垂楊芳草。", "因念秦樓綵鳳，楚觀朝雲，往惜曾迷歌笑。", "別來歲久，偶憶歡盟重到。", "人面桃花，未知何處，但掩朱扉悄悄。", "盡日佇立無言，贏得淒涼懷抱。"], "note": "歲月流轉，唯有詩句永恆。"}, {"title": "魚藻", "author": "詩經", "body": ["魚在在藻，有頒其首。王在在鎬，豈樂飲酒。", "", "魚在在藻，有莘其尾。王在在鎬，飲酒樂豈。", "", "魚在在藻，依於其蒲。王在在鎬，有那其居。"], "note": "山水之間，詩意自生。"}, {"title": "書靈筵手巾", "author": "唐・後主煜", "body": ["浮生共顦顇，壯歲失嬋娟。", "汗手遺香漬，痕眉染黛煙。"], "note": "有些情感，千年之後依然鮮活。"}, {"title": "江南柳", "author": "宋・張先", "body": ["隋堤遠，波急路塵輕。", "今古柳橋多送別，見人分袂亦愁生。", "何況自關情。", "斜照後，新月上西城。", "城上樓高重倚望，願身能似月亭亭。", "千里伴君行。"], "note": "讀詩如品茶，越慢越有味。"}, {"title": "山居詩  其一六", "author": "宋・釋延壽", "body": ["抱朴澄神蘊道光，石爐閒爇六時香。", "曳空橫野雲和靜，逗石穿崖水自忙。", "晚圃雨來葵葉嫩，晴坡燒後蕨苗長。", "一心包盡乾坤內，莫把閒文更度量。"], "note": "有些感動，只有詩能說清楚。"}, {"title": "採桑子·詠春雨", "author": "清・納蘭性德", "body": ["嫩煙分染鵝兒柳，一樣風絲", "似整如欹，才着春寒瘦不支", "涼侵曉夢輕蟬膩，約略紅肥", "不惜葳蕤，碾取名香作地衣"], "note": "讀一首詩，像是深吸一口山間的空氣。"}, {"title": "天仙子·淥水亭秋夜", "author": "清・納蘭性德", "body": ["水浴涼蟾風入袂，魚鱗蹙損金波碎", "好天良夜酒盈尊，心自醉，愁難睡", "西風月落城烏起"], "note": "詩人寫下的，是我們說不出口的心情。"}, {"title": "和太常蕭少卿近郊馬上偶吟  其一", "author": "宋・徐鉉", "body": ["田園經雨綠分畦，飛蓋閑行九里堤。", "拂袖清風塵不起，滿川芳草路如迷。", "林開始覺晴天迥，潮上初驚浦岸齊。", "怪得仙郎詩句好，斷霞殘照遠山西。"], "note": "詩人寫下的，是我們說不出口的心情。"}, {"title": "湘夫人", "author": "屈原", "body": ["帝子降兮北渚，目眇眇兮愁予", "嫋嫋兮秋風，洞庭波兮木葉下", "登白薠兮騁望，與佳期兮夕張", "鳥何萃兮蘋中，罾何爲兮木上？", "沅有茝兮醴有蘭，思公子兮未敢言", "荒忽兮遠望，觀流水兮潺湲", "麋何食兮庭中，蛟何爲兮水裔", "朝馳餘馬兮江皋，夕濟兮西澨", "聞佳人兮召餘，將騰駕兮偕逝", "築室兮水中，葺之兮荷蓋", "蓀壁兮紫壇，播芳椒兮成堂", "桂棟兮蘭橑，辛夷楣兮藥房", "罔薜荔兮爲帷，擗蕙櫋兮既張", "白玉兮爲鎮，疏石蘭兮爲芳", "芷葺兮荷屋，繚之兮杜衡", "合百草兮實庭，建芳馨兮廡門", "九嶷繽兮並迎，靈之來兮如雲", "捐餘袂兮江中，遺餘褋兮醴浦", "搴汀洲兮杜若，將以遺兮遠者", "時不可兮驟得，聊逍遙兮容與！"], "note": "詩不需要讀懂，只需要感受。"}, {"title": "賜道士鄧紫陽", "author": "唐・明皇帝", "body": ["太乙三門訣，元君六甲符。", "下傳金版術，上刻玉清書。", "有美探真士，囊中得祕書。", "自知三醮後，翊我滅殘胡。"], "note": "每一個字，都是一次深呼吸。"}, {"title": "題程修己竹障", "author": "唐・文宗皇帝", "body": ["良工運精思，巧極似有神。", "臨窗忽覩繁陰合，再盼真假殊未分。"], "note": "讀詩如品茶，越慢越有味。"}, {"title": "郊廟歌辭 中宗祀昊天樂章 豫和", "author": "唐・不詳", "body": ["天之曆數歸睿唐，顧惟菲德欽昊蒼。", "撰吉日兮表殷薦，冀神鑒兮降闓陽。"], "note": "每一個字，都是一次深呼吸。"}, {"title": "減字木蘭花·從教鐵石", "author": "清・納蘭性德", "body": ["從教鐵石，每見花開成惜惜", "淚點難消，滴損蒼煙玉一條", "憐伊大冷，添個紙窗疏竹影", "記取相思，環佩歸來月上時"], "note": "一首詩，一杯茶，一段靜好時光。"}, {"title": "郊廟歌辭 武后大享昊天樂章 七", "author": "唐・不詳", "body": ["樽浮九醞，禮備三週。", "陳誠菲奠，契福神猷。"], "note": "文字的力量，在於它能跨越時空。"}, {"title": "夜行船", "author": "宋・謝絳", "body": ["昨夜佳期初共。", "鬢雲低、翠翹金鳳。", "尊前和笑不成歌，意偷轉、眼波微送。", "草草不容成楚夢。", "漸寒深、翠簾霜重。", "相看送到斷腸時，月西斜、畫樓鍾動。"], "note": "有些情感，千年之後依然鮮活。"}, {"title": "卜算子慢", "author": "宋・張先", "body": ["溪山別意，煙樹去程，日落採蘋春晚。", "欲上徵鞍，更掩翠簾相眄。", "惜彎彎淺黛長長眼。", "奈畫閣歡遊，也學狂花亂絮輕散。", "水影橫池館。", "對靜夜無人，月高雲遠。", "一餉凝思，兩袖淚痕還滿。", "恨私書、又逐東風斷。", "縱西北層樓萬尺，望重城那見。"], "note": "一字一句，皆是人間煙火。"}, {"title": "送黃秀才姑熟辟命", "author": "宋・徐鉉", "body": ["世亂離情苦，家貧色養難。", "水雲孤棹去，風雨暮春寒。", "幕府才方急，騷人淚未乾。", "何時王道泰，萬裏看鵬摶。"], "note": "每首詩都是一扇窗，通往另一個世界。"}, {"title": "點絳脣·五夜光寒", "author": "清・納蘭性德", "body": ["五夜光寒，照來積雪平於棧", "西風何限，自起披衣看", "對此茫茫，不覺成長嘆", "何時旦，曉星欲散，飛起平沙雁"], "note": "一字一句，皆是人間煙火。"}, {"title": "菩薩蠻·惜春春去驚新燠", "author": "清・納蘭性德", "body": ["惜春春去驚新燠，粉融輕汗紅綿撲", "妝罷只思眠，江南四月天", "綠陰簾半揭，此景清幽絕", "行度竹林風，單衫杏子紅"], "note": "一字一句，皆是人間煙火。"}, {"title": "對御歌", "author": "宋・陳摶", "body": ["臣愛睡，臣愛睡。", "不臥氈，不蓋被。", "片石枕頭，蓑衣鋪地。", "震雷掣電鬼神驚，臣當其時正酣睡。", "閑思張良，悶想范蠡。", "說甚孟德，休言劉備。", "三四君子只是爭些閑氣，爭如臣向青山頂頭。", "白雲堆裏，展開眉頭。", "解放肚皮，但一覺睡。", "管什玉兔東昇，紅輪西墜。"], "note": "山水之間，詩意自生。"}, {"title": "禮魂", "author": "屈原", "body": ["成禮兮會鼓，", "傳芭兮代舞", "姱女倡兮容與", "春蘭兮秋菊，", "長無絕兮終古。"], "note": "文字的光芒，照亮了最暗的角落。"}, {"title": "柳枝辭十二首  其六", "author": "宋・徐鉉", "body": ["濛濛堤畔柳含煙，疑是陽和二月天。", "醉裏不知時節改，漫隨兒女打鞦韆。"], "note": "在古老的文字裡，找到今天的自己。"}, {"title": "迎新春", "author": "宋・柳永", "body": ["嶰管變青律，帝裏陽和新布。", "晴景回輕煦。", "慶嘉節、當三五。", "列華燈、千門萬戶。", "遍九陌、羅綺香風微度。", "十里然絳樹。", "鰲山聳、喧天瀟鼓。", "漸天如水，素月當午。", "香徑裏、絕纓擲果無數。", "更闌燭影花陰下，少年人、往往奇遇。", "太平時、朝野多歡民康阜。", "隨分良聚。", "堪對此景，爭忍獨醒歸去。"], "note": "山水之間，詩意自生。"}, {"title": "武肅王有旨石橋設齋會進一詩  其一", "author": "宋・釋延壽", "body": ["南有天台事可尊，孕靈含秀獨超羣。", "重重曲澗侵危石，步步層巖踏碎雲。", "金雀每從雲裏現，異香多向夜深聞。", "當知此界非凡界，一道幽奇各自分。"], "note": "詩是靈魂深處最柔軟的聲音。"}, {"title": "朝中措", "author": "宋・歐陽修", "body": ["平山闌檻倚晴空。", "山色有無中。", "手種堂前垂柳，別來幾度春風。", "文章太守，揮毫萬字，一飲千鍾。", "行樂直須年少，尊前看取衰翁。"], "note": "古人的浪漫，藏在字裡行間。"}, {"title": "登三臺言志", "author": "唐・太宗皇帝", "body": ["未央初壯漢，阿房昔侈秦。", "在危猶騁麗，居奢遂役人。", "豈如家四海，日宇罄朝倫。", "扇天裁戶舊，砌地翦基新。", "引月擎宵桂，飄雲逼曙鱗。", "露除光炫玉，霜闕映雕銀。", "舞接花梁燕，歌迎鳥路塵。", "鏡池波太液，莊苑麗宜春。", "作異甘泉日，停非路寢辰。", "念勞慙逸己，居曠返勞神。", "所欣成大廈，宏材佇渭濱。"], "note": "每首詩都是一扇窗，通往另一個世界。"}, {"title": "贈索處士", "author": "宋・譚用之", "body": ["不將桂子種諸天，長得尋君水石邊。", "玄豹夜寒和霧隠，驪龍春暖抱珠眠。", "山中宰相陶弘景，洞裏真人葛稚川。", "一度相思一惆悵，水寒煙澹落花前。"], "note": "詩是靈魂深處最柔軟的聲音。"}, {"title": "南海子·相風微動九門開", "author": "清・納蘭性德", "body": ["相風微動九門開，南陌離宮萬柳栽", "草色橫粘下馬泊，水光平佔晾鷹臺", "錦韉欲射波間去，玉輦疑從島上回", "自是軟紅驚十丈，天教到此洗塵埃"], "note": "文字的光芒，照亮了最暗的角落。"}, {"title": "天問", "author": "屈原", "body": ["曰：", "遂古之初，誰傳道之？", "上下未形，何由考之？", "冥昭瞢暗，誰能極之？", "馮翼惟象，何以識之？", "明明暗暗，惟時何爲？", "陰陽三合，何本何化？", "圜則九重，孰營度之？", "惟茲何功，孰初作之？", "斡維焉系，天極焉加？", "八柱何當，東南何虧？", "九天之際，安放安屬？", "隅隈多有，誰知其數？", "天何所沓？", "十二焉分？", "日月安屬？", "列星安陳？", "出自湯谷，次於濛汜。", "自明及晦，所行幾裏？", "夜光何德，死則又育？", "厥利維何，而顧菟在腹？", "女岐無合，夫焉取九子？", "伯強何處？", "惠氣安在？", "何闔而晦？", "何開而明？", "角宿未旦，曜靈安藏？", "不任汩鴻，師何以尚之？", "僉曰", "“何憂，何不課而行之？”", "鴟龜曳銜，鯀何聽焉？", "順欲成功，帝何刑焉？", "永遏在羽山，夫何三年不施？", "伯禹愎鯀，夫何以變化？", "纂就前緒，遂成考功。", "何續初繼業，而厥謀不同？", "洪泉極深，何以窴之？", "地方九則，何以墳之？", "河海應龍？", "何盡何歷？", "鯀何所營？", "禹何所成？", "康回馮怒，墬何故以東南傾？", "九州安錯？", "川穀何洿？", "東流不溢，孰知其故？", "東西南北，其修孰多？", "南北順橢，其衍幾何？", "崑崙懸圃，其尻安在？", "增城九重，其高几裏？", "四方之門，其誰從焉？", "西北闢啓，何氣通焉？", "日安不到？", "燭龍何照？", "羲和之未揚，若華何光？", "何所冬暖？", "何所夏寒？", "焉有石林？", "何獸能言？", "焉有虯龍，負熊以遊？", "雄虺九首，鯈忽焉在？", "何所不死？", "長人何守？", "靡蓱九衢，枲華安居？", "靈蛇吞象，厥大何如？", "黑水玄趾，三危安在？", "延年不死，壽何所止？", "鯪魚何所？", "鬿堆焉處？", "羿焉彃日？", "烏焉解羽？", "禹之力獻功，降省下土四方。", "焉得彼嵞山女，而通之於臺桑？", "閔妃匹合，厥身是繼。", "胡維嗜不同味，而快鼂飽？", "啓代益作後，卒然離蠥。", "何啓惟憂，而能拘是達？", "皆歸射鞫，而無害厥躬。", "何後益作革，而禹播降？", "啓棘賓商，《九辨》《九歌》。", "何勤子屠母，而死分竟地？", "帝降夷羿，革孽夏民。", "胡射夫河伯，而妻彼雒嬪？", "馮珧利決，封豨是射。", "何獻蒸肉之膏，而後帝不若？", "浞娶純狐，眩妻爰謀。", "何羿之射革，而交吞揆之？", "阻窮西征，巖何越焉？", "化而爲黃熊，巫何活焉？", "鹹播秬黍，莆雚是營。", "何由並投，而鯀疾修盈？", "白蜺嬰茀，胡爲此堂？", "安得夫良藥，不能固臧？", "天式從橫，陽離爰死。", "大鳥何鳴，夫焉喪厥體？", "蓱號起雨，何以興之？", "撰體協脅，鹿何膺之？", "鰲戴山抃，何以安之？", "釋舟陵行，何之遷之？", "惟澆在戶，何求於嫂？", "何少康逐犬，而顛隕厥首？", "女歧縫裳，而館同爰止。", "何顛易厥首，而親以逢殆？", "湯謀易旅，何以厚之？", "覆舟斟尋，何道取之？", "桀伐蒙山，何所得焉？", "妺嬉何肆，湯何殛焉？", "舜閔在家，父何以鰥？", "堯不姚告，二女何親？", "厥萌在初，何所億焉？", "璜臺十成，誰所極焉？", "登立爲帝，孰道尚之？", "女媧有體，孰制匠之？", "舜服厥弟，終然爲害。", "何肆犬豕，而厥身不危敗？", "吳獲迄古，南嶽是止。", "孰期去斯，得兩男子？", "緣鵠飾玉，后帝是饗。", "何承謀夏桀，終以滅喪？", "帝乃降觀，下逢伊摯。", "何條放致罰，而黎服大說？", "簡狄在臺，嚳何宜？", "玄鳥致貽，女何喜？", "該秉季德，厥父是臧。", "胡終弊於有扈，牧夫牛羊？", "幹協時舞，何以懷之？", "平脅曼膚，何以肥之？", "有扈牧豎，云何而逢？", "擊牀先出，其命何從？", "恆秉季德，焉得夫樸牛？", "何往營班祿，不但還來？", "昏微循跡，有狄不寧。", "何繁鳥萃棘，負子肆情？", "眩弟並淫，危害厥兄。", "何變化以作詐，而後嗣逢長？", "成湯東巡，有莘爰極。", "何乞彼小臣，而吉妃是得？", "水濱之木，得彼小子。", "夫何惡之，媵有莘之婦？", "湯出重泉，夫何辠尤？", "不勝心伐帝，夫誰使挑之？", "會朝爭盟，何踐吾期？", "蒼鳥羣飛，孰使萃之？", "列擊紂躬，叔旦不嘉。", "何親揆發足，周之命以諮嗟？", "授殷天下，其位安施？", "反成乃亡，其罪伊何？", "爭遣伐器，何以行之？", "並驅擊翼，何以將之？", "昭後成遊，南土爰底。", "厥利惟何，逢彼白雉？", "穆王巧梅，夫何爲周流？", "環理天下，夫何索求？", "妖夫曳炫，何號於市？", "周幽誰誅？", "焉得夫褒姒？", "天命反側，何罰何佑？", "齊桓九會，卒然身殺。", "彼王紂之躬，孰使亂惑？", "何惡輔弼，讒諂是服？", "比干何逆，而抑沈之？", "雷開阿順，而賜封之？", "何聖人之一德，卒其異方？", "梅伯受醢，箕子詳狂？", "稷維元子，帝何竺之？", "投之於冰上，鳥何燠之？", "何馮弓挾矢，殊能將之？", "既驚帝切激，何逢長之？", "伯昌號衰，秉鞭作牧。", "何令徹彼岐社，命有殷國？", "遷藏就岐，何能依？", "殷有惑婦，何所譏？", "受賜茲醢，西伯上告。", "何親就上帝罰，殷之命以不救？", "師望在肆，昌何識？", "鼓刀揚聲，後何喜？", "武發殺殷，何所悒？", "載屍集戰，何所急？", "伯林雉經，維其何故？", "何感天抑墬，夫誰畏懼？", "皇天集命，惟何戒之？", "受禮天下，又使至代之？", "初湯臣摯，後茲承輔。", "何卒官湯，尊食宗緒？", "勳闔夢生，少離散亡。", "何壯武歷，能流厥嚴？", "彭鏗斟雉，帝何饗？", "受壽永多，夫何久長？", "中央共牧，後何怒？", "蜂蛾微命，力何固？", "驚女采薇，鹿何佑？", "北至回水，萃何喜？", "兄有噬犬，弟何欲？", "易之以百兩，卒無祿？", "薄暮雷電，歸何憂？", "厥嚴不奉，帝何求？", "伏匿穴處，爰何雲？", "荊勳作師，夫何長？", "悟過改更，我又何言？", "吳光爭國，久餘是勝。", "何環穿自閭社丘陵，爰出子文？", "吾告堵敖以不長。", "何試上自予，忠名彌彰？"], "note": "文字的溫度，穿越了千年。"}, {"title": "湯泉應制·六龍初駐浴藍天", "author": "清・納蘭性德", "body": ["六龍初駐浴藍天，碧瓦朱旗共一川", "潤逼仙桃紅自舞，醉酣人柳綠猶眠", "吹成暖律回燕谷，散作薰風入舜弦", "最是垂衣深聖德，不須詞筆頌甘泉"], "note": "歲月流轉，唯有詩句永恆。"}, {"title": "郊廟歌辭 五郊樂章 黑帝羽音 舒和", "author": "唐・魏徵", "body": ["執籥持羽初終曲，朱幹玉鏚始分行。", "七德九功鹹已暢，明靈降福具穰穰。"], "note": "有些情感，千年之後依然鮮活。"}, {"title": "贈夢英大師", "author": "宋・楊昭儉", "body": ["紀贈歌詩數百人，序師多藝各求新。", "未言篆隸飛龍鳳，且說風騷感鬼神。", "琴有古聲清耳目，鶴無凡態惹埃塵。", "英公所學還如此，不錯承恩近紫宸。"], "note": "古詩是時間寄來的信。"}, {"title": "送王四十五歸東都", "author": "宋・徐鉉", "body": ["海內兵方起，離筵淚易垂。", "憐君負米去，惜此落花時。", "想憶看來信，相寬指後期。", "殷勤手中柳，此是向南枝。"], "note": "讓文字帶你走一段安靜的路。"}, {"title": "武肅王有旨石橋設齋會進一詩  其二", "author": "宋・釋延壽", "body": ["仙源佛窟有天台，今古嘉名遍九垓。", "石磴嵌空神匠出，瀑泉雄壯雨聲來。", "景強偏感高僧住，地勝能令遠思開。", "一等翹誠依此處，自然靈貺作梯媒。"], "note": "詩人的眼睛，看見了我們忽略的美。"}, {"title": "唐享昊天樂 第二", "author": "唐・則天皇后", "body": ["瞻紫極，望玄穹。", "翹至懇，罄深衷。", "聽雖遠，誠必通。", "垂厚澤，降雲宮。"], "note": "每首詩，都是一場與自己的相遇。"}, {"title": "賜棃李泌與諸王聯句", "author": "唐・肅宗皇帝", "body": ["先生年幾許，顏色似童兒。", "夜抱九仙骨，朝披一品衣。", "不食千鍾粟，唯餐兩顆棃。", "天生此間氣，助我化無爲。"], "note": "讓文字帶你走一段安靜的路。"}, {"title": "定風波令・定風波", "author": "宋・張先", "body": ["碧玉篦扶墜髻雲。", "鶯黃衫子退紅裙。", "妝樣巧將花草競。", "相併。", "要教人意勝於春。", "酒眼茸茸香拂面。", "□見。", "丹青寧似鏡中真。", "自是有情偏小小。", "向道。", "江東誰信更無人。"], "note": "文字的力量，在於它能跨越時空。"}, {"title": "同劉晃喜雨", "author": "唐・明皇帝", "body": ["節變寒初盡，時和氣已春。", "繁雲先合寸，膏雨自依旬。", "颯颯飛平野，霏霏靜暗塵。", "懸知花葉意，朝夕望中新。"], "note": "每個人心裡，都住著一首詩。"}, {"title": "奉和御製麟德殿宴百僚應制", "author": "唐・尚宮宋氏若昭", "body": ["垂衣臨八極，肅穆四門通。", "自是無爲化，非關輔弼功。", "修文招隱伏，尚武殄妖兇。", "德炳韶光熾，恩霑雨露濃。", "衣冠陪御宴，禮樂盛朝宗。", "萬壽稱觴舉，千年信一同。"], "note": "每首詩都是一扇窗，通往另一個世界。"}, {"title": "金陵覽古 直瀆", "author": "宋・朱存", "body": ["晝役人功夜鬼功，陽開陰闔幾時終。", "不聞擲土江中語，爭得盈流一水通。"], "note": "詩人寫下的，是我們說不出口的心情。"}, {"title": "郊廟歌辭 武后大享拜洛樂章 九和", "author": "唐・不詳", "body": ["祗荷坤德，欽若乾靈。", "慙惕罔寘，興居匪寧。", "恭崇禮則，肅奉儀形。", "惟憑展敬，敢薦非馨。"], "note": "有些情感，千年之後依然鮮活。"}, {"title": "贈顔詡", "author": "宋・孟賓於", "body": ["園林蕭爽聞來久，欲訪因循二十秋。", "此日開襟吟不盡，碧山重疊水長流。"], "note": "詩人寫下的，是我們說不出口的心情。"}, {"title": "白華", "author": "詩經", "body": ["白華菅兮，白茅束兮。之子之遠，俾我獨兮。", "", "英英白雲，露彼菅茅。天步艱難，之子不猶。", "", "滮池北流，浸彼稻田。嘯歌傷懷，念彼碩人。", "", "樵彼桑薪，卬烘於煁。維彼碩人，實勞我心。", "", "鼓鍾於宮，聲聞於外。念子懆懆，視我邁邁。", "", "有鶖在梁，有鶴在林。維彼碩人，實勞我心。", "", "鴛鴦在梁，戢其左翼。之子無良，二三其德。", "", "有扁斯石，履之卑兮。之子之遠，俾我疧兮。"], "note": "詩人寫下的，是我們說不出口的心情。"}, {"title": "謝文靜墓下作", "author": "宋・徐鉉", "body": ["越徼稽天討，周京亂虜塵。", "蒼生何可奈，江表更無人。", "豈憚尋荒壟，猶思認後身。", "春風白楊裏，獨步淚霑巾。"], "note": "詩是靈魂深處最柔軟的聲音。"}, {"title": "郊廟歌辭 五郊樂章 赤郊迎神", "author": "唐・不詳", "body": ["青陽節謝，朱明候改。", "靡草彫華，含桃流彩。", "虡列鐘磬，筵陳脯醢。", "樂以迎神，神其如在。"], "note": "有些情感，千年之後依然鮮活。"}, {"title": "菩薩蠻·飄蓬只逐驚飈轉", "author": "清・納蘭性德", "body": ["飄蓬只逐驚飈轉，行人過盡煙光遠", "立馬認河流，茂陵風雨秋", "寂寥行殿鎖，梵唄琉璃火", "塞雁與宮鴉，山深日易斜"], "note": "有些情感，千年之後依然鮮活。"}, {"title": "柳枝辭十二首  其二", "author": "宋・徐鉉", "body": ["南園日暮起春風，吹散楊花雪滿空。", "不惜楊花飛也得，愁君老盡臉邊紅。"], "note": "讀一首詩，像是深吸一口山間的空氣。"}, {"title": "浣溪沙·肯把離情容易看", "author": "清・納蘭性德", "body": ["肯把離情容易看，要從容易見艱難", "難拋往事一般般", "今夜燈前形共影，枕函虛置翠衾單", "更無人與共春寒"], "note": "讀詩如品茶，越慢越有味。"}, {"title": "浣溪沙·十八年來墮世間", "author": "清・納蘭性德", "body": ["十八年來墮世間，吹花嚼蕊弄冰弦", "多情情寄阿誰邊", "紫玉釵斜燈影背，紅綿粉冷枕函偏", "相看好處卻無言"], "note": "文字裡藏著千年的心事。"}, {"title": "春日出苑遊矚", "author": "唐・明皇帝", "body": ["三陽麗景早芳辰，四序佳園物候新。", "梅花百樹障去路，垂柳千條暗回津。", "鳥飛直爲驚風葉，魚沒都由怯岸人。", "惟願聖主南山壽，何愁不賞萬年春。"], "note": "古人的智慧，凝結在這幾行字裡。"}, {"title": "西湖念語", "author": "宋・歐陽修", "body": ["昔者王子猷之愛竹，造門不問於主人，陶淵明之臥輿，遇酒便留於道士。", "況西湖之勝概，擅東潁之佳名。", "雖美景良辰，固多於高會。", "而清風明月，幸屬於閒人。", "並遊或結於良朋，乘興有時而獨往。", "鳴蛙暫聽，安問屬官而屬私。", "曲水臨流，自可一觴而一詠。", "至歡然而會意，亦傍若於無人。", "乃知偶來常勝於特來，前言可信。", "所有雖非於己有，其得已多。", "因翻舊闋之辭，寫以新聲之調，敢陣薄伎，聊佐清歡。"], "note": "讀詩如品茶，越慢越有味。"}, {"title": "山居詩  其四五", "author": "宋・釋延壽", "body": ["攜筇閒步望山行，竟日逍遙任野情。", "上嶺梯登危石側，渡溪橋踏古槎橫。", "綠羅水皺巖根急，紅錦霞舒海面明。", "一軸詠懷高尚意，援毫因事偶吟成。"], "note": "古人的智慧，凝結在這幾行字裡。"}, {"title": "泉水", "author": "詩經", "body": ["毖彼泉水，亦流於淇。有懷於衛，靡日不思。孌彼諸姬，聊與之謀。", "", "出宿於泲，飲餞於禰。女子有行，遠父母兄弟，問我諸姑，遂及伯姊。", "", "出宿於幹，飲餞於言。載脂載轄，還車言邁。遄臻於衛，不瑕有害？", "", "我思肥泉，茲之永嘆。思須與漕，我心悠悠。駕言出遊，以寫我憂。"], "note": "文字的力量，在於它能跨越時空。"}, {"title": "清平樂·孤花片葉", "author": "清・納蘭性德", "body": ["孤花片葉，斷送清秋節", "寂寂繡屏香篆滅，暗裏朱顏消歇", "誰憐散髻吹笙，天涯芳草關情", "懊惱隔簾幽夢，半牀花月縱橫"], "note": "讀詩，是與古人的一場對話。"}, {"title": "沔水", "author": "詩經", "body": ["沔彼流水，朝宗於海。鴥彼飛隼，載飛載止。嗟我兄弟，邦人諸友。莫肯念亂，誰無父母？", "", "沔彼流水，其流湯湯。鴥彼飛隼，載飛載揚。念彼不跡，載起載行。心之憂矣，不可弭忘。", "", "鴥彼飛隼，率彼中陵。民之訛言，寧莫之懲？我友敬矣，讒言其興。"], "note": "每首詩都是一扇窗，通往另一個世界。"}, {"title": "贈胡天師", "author": "唐・則天皇后", "body": ["高人葉高志，山服往山家。", "迢迢間風月，去去隔煙霞。", "碧岫窺玄洞，玉竈鍊丹砂。", "今日星津上，延首望靈槎。"], "note": "在古老的文字裡，找到今天的自己。"}, {"title": "郊廟歌辭 祭汾陰樂章 順和", "author": "唐・林鍾宮", "body": ["大樂和暢，殷薦明神。", "一降通感，八變必臻。", "有求斯應，無德不親。", "降靈醉止，休徵萬人。"], "note": "詩人用最少的字，說最多的話。"}, {"title": "鶺鴒頌", "author": "唐・明皇帝", "body": ["伊我軒宮，奇樹青蔥。", "藹周廬兮，冒霜停雪，以茂以悅。", "恣卷舒兮，連枝同榮，吐綠含英。", "曜春初兮，蓐收御節，寒露微結。", "氣清虛兮，桂宮蘭殿，唯所息宴。", "棲雍渠兮，行搖飛鳴，急難有情。", "情有餘兮，顧惟德涼，夙夜兢惶。", "慙化疎兮，上之所教，下之所效。", "實在予兮，天倫之性，魯衛分政。", "親賢居兮，爰遊爰處，爰笑爰語。", "巡庭除兮，觀此翔禽，以悅我心，良史書兮。"], "note": "每首詩都是一扇窗，通往另一個世界。"}, {"title": "興京陪祭福陵", "author": "清・納蘭性德", "body": ["龍盤鳳翥氣佳哉，東指齋宮玉輦來", "影入松楸仙仗遠，香升俎豆曉雲開", "盛儀備處千官肅，神貺乘時萬馬回", "豹尾叨陪須獻頌，小臣慚愧展微才"], "note": "一首詩，一杯茶，一段靜好時光。"}, {"title": "送李邕之任滑臺", "author": "唐・明皇帝", "body": ["漢家重東郡，宛彼白馬津。", "黎庶既蕃殖，臨之勞近臣。", "遠別初首路，今行方及春。", "課成應第一，良牧爾當仁。"], "note": "詩是心靈的鏡子，映照真實的自己。"}, {"title": "唐享昊天樂 第三", "author": "唐・則天皇后", "body": ["乾儀混成沖邃，天道下濟高明。", "闓陽晨披紫闕，太一曉降黃庭。", "圜壇敢申昭報，方璧冀展虔情。", "丹襟式敷衷懇，玄鑒庶察微誠。"], "note": "讀一首詩，像是深吸一口山間的空氣。"}, {"title": "賀李昉", "author": "宋・範質", "body": ["翰苑重求李謫仙，詞鋒穎利勝龍泉。", "朝趨建禮霞烘日，夜直承明月印天。", "聖主重知緣國士，相公多喜爲同年。", "青春才子金門貴，蜀錦袍新奪日鮮。"], "note": "文字如水，潤物無聲。"}, {"title": "泛清苕", "author": "宋・張先", "body": ["綠淨無痕，過曉霽清苕，鏡裏遊人。", "紅柱巧，綵船穩，當筵主、祕館詞臣。", "吳娃勸飲韓娥唱，競豔容、左右皆春。", "學爲行雨，傍畫槳，從教水濺羅裙。", "溪煙混月黃昏。", "漸樓臺上下，火影星分。", "飛檻倚，鬥牛近，響簫鼓、遠破重雲。", "歸軒未至千家待，掩半妝、翠箔朱門。", "衣香拂面，扶醉卸簪花，滿袖餘熅。"], "note": "詩是生活的調味料，讓平淡變得有味。"}, {"title": "經東都太子橋", "author": "宋・徐鉉", "body": ["綸闈放逐知何道，桂苑風流且暫歸。", "莫問升遷橋上客，身謀疏拙舊心違。"], "note": "在古老的文字裡，找到今天的自己。"}, {"title": "卜算子·塞草晚才青", "author": "清・納蘭性德", "body": ["塞草晚才青，日落簫笳動，慼慼悽悽入夜分，催度星前夢", "小語綠楊煙，怯踏銀河凍，行盡關山到白狼，相見惟珍重", " "], "note": "詩是最溫柔的力量。"}, {"title": "郊廟歌辭 雩祀樂章 肅和", "author": "唐・褚亮", "body": ["朱鳥開辰，蒼龍啓映。", "大帝昭饗，羣生展敬。", "禮備懷柔，功宣舞詠。", "旬液應序，年祥協慶。"], "note": "每一個字，都是一次深呼吸。"}, {"title": "駕幸新豐溫泉宮獻詩三首 一", "author": "唐・上官昭容", "body": ["三冬季月景[龍]年，萬乘觀風出灞川。", "遙看電躍龍爲馬，回矚霜原玉作田。"], "note": "讀詩如品茶，越慢越有味。"}, {"title": "北山", "author": "詩經", "body": ["陟彼北山，言採其杞。偕偕士子，朝夕從事。王事靡盬，憂我父母。", "", "溥天之下，莫非王土；率土之濱，莫非王臣。大夫不均，我從事獨賢。", "", "四牡彭彭，王事傍傍。嘉我未老，鮮我方將。旅力方剛，經營四方。", "", "或燕燕居息，或盡瘁事國；或息偃在牀，或不已於行。", "", "或不知叫號，或慘慘劬勞；或棲遲偃仰，或王事鞅掌。", "", "或湛樂飲酒，或慘慘畏咎；或出入風議，或靡事不爲。"], "note": "詩是生活的調味料，讓平淡變得有味。"}, {"title": "唐明堂樂章 迎送王公", "author": "唐・則天皇后", "body": ["千官肅事，萬國朝宗。", "載延百辟，爰集三宮。", "君臣德合，魚水斯同。", "睿圖方永，周曆長隆。"], "note": "一字一句，皆是人間煙火。"}, {"title": "更漏子", "author": "宋・張先", "body": ["錦筵紅，羅幕翠。", "侍宴美人姝麗。", "十五六，解憐才。", "勸人深酒杯。", "黛眉長，檀口小。", "耳畔向人輕道。", "柳陰曲，是兒家。", "門前紅杏花。"], "note": "最美的風景，往往藏在文字裡。"}, {"title": "眼兒媚·獨倚春寒掩夕扉", "author": "清・納蘭性德", "body": ["獨倚春寒掩夕扉，清露泣銖衣", "玉蕭吹夢，金釵劃影，悔不同攜", "刻殘紅燭曾相待，舊事總依稀", "料應遺恨，月中教去，花底催歸"], "note": "文字裡藏著千年的心事。"}, {"title": "幸秦川上梓潼山", "author": "唐・後主衍", "body": ["喬巖簇冷煙，幽徑上寒天。", "下瞰峨眉嶺，上窺華嶽巔。", "驅馳非取樂，按幸爲憂邊。", "此去如登陟，歌樓路幾千。"], "note": "古人的浪漫，藏在字裡行間。"}, {"title": "法曲獻仙音", "author": "宋・柳永", "body": ["追想秦樓心事，當年便約，於飛比翼。", "每恨臨歧處，正攜手、翻成雲雨離拆。", "念倚玉偎香，前事頓輕擲。", "慣憐惜。", "饒心性，鎮厭厭多病，柳腰花態嬌無力。", "早是乍清減，別後忍教愁寂。", "記取盟言，少孜煎、剩好將息。", "遇佳景、臨風對月，事須時恁相憶。"], "note": "讀詩的時候，世界暫停了一下。"}, {"title": "採桑子·明月多情應笑我", "author": "清・納蘭性德", "body": ["明月多情應笑我，笑我如今", "辜負春心，獨自閒行獨自吟", "近來怕說當時事，結遍蘭襟", "月淺燈深，夢裏雲歸何處尋"], "note": "每首詩都是一扇窗，通往另一個世界。"}, {"title": "卷耳", "author": "詩經", "body": ["采采卷耳，不盈頃筐。嗟我懷人，置彼周行。", "", "陟彼崔嵬，我馬虺隤。我姑酌彼金罍，維以不永懷。", "", "陟彼高岡，我馬玄黃。我姑酌彼兕觥，維以不永傷。", "", "陟彼砠矣，我馬瘏矣，我僕痡矣，云何籲矣。"], "note": "詩人寫下的，是我們說不出口的心情。"}, {"title": "駉", "author": "詩經", "body": ["駉駉牡馬，在坰之野。薄言駉者，有驈有皇，有驪有黃，以車彭彭。思無疆思，馬斯臧。", "", "駉駉牡馬，在坰之野。薄言駉者，有騅有駓，有騂有騏，以車伾伾。思無期思，馬斯才。", "", "駉駉牡馬，在坰之野。溥言駉者，有驒有駱，有騮有雒，以車繹繹。思無斁思，馬斯作。", "", "駉駉牡馬，在坰之野。薄言駉者，有駰有騢，有驔有魚，以車祛祛。思無邪思，馬斯徂。"], "note": "每首詩，都是一場與自己的相遇。"}, {"title": "唐明堂樂章 宮音", "author": "唐・則天皇后", "body": ["履艮包羣望，居中冠百靈。", "萬方資廣運，庶品荷財成。", "神功諒匪測，盛德實難名。", "藻奠申誠敬，恭祀表惟馨。"], "note": "古人的智慧，凝結在這幾行字裡。"}, {"title": "郊廟歌辭 祀雨師樂章 迎俎酌獻", "author": "唐・包佶", "body": ["陽開幽蟄，躬奉鬱鬯。", "禮備節應，震來靈降。", "動植求聲，飛沈允望。", "時康氣茂，惟神之貺。"], "note": "詩人用最少的字，說最多的話。"}, {"title": "金蕉葉", "author": "宋・柳永", "body": ["厭厭夜飲平陽第。", "添銀燭、旋呼佳麗。", "巧笑難禁，豔歌無間聲相繼。", "準擬幕天席地。", "金蕉葉泛金波齊，未更闌、已盡狂醉。", "就中有個風流，暗向燈光底。", "惱遍兩行珠翠。"], "note": "在喧囂中讀一首詩，就是一次小小的旅行。"}, {"title": "和司門郎中陳彥", "author": "宋・徐鉉", "body": ["衡門寂寂逢迎少，不見仙郎向五旬。", "莫問龍山前日事，菊花開卻爲閒人。"], "note": "詩是最溫柔的力量。"}, {"title": "失調名", "author": "宋・宋祁", "body": ["因爲銜泥污錦衣。", "垂下珠簾不敢歸。"], "note": "古人的浪漫，藏在字裡行間。"}, {"title": "置酒坐飛閣", "author": "唐・太宗皇帝", "body": ["高軒臨碧渚，飛檐迥架空。", "餘花攢鏤檻，殘柳散雕櫳。", "岸菊初含橤，園梨始帶紅。", "莫慮崑山暗，還共盡杯中。"], "note": "在喧囂中讀一首詩，就是一次小小的旅行。"}, {"title": "行園樹", "author": "宋・徐鉉", "body": ["松節凌霜久，蓬根逐吹頻。", "羣生各有性，桃李但爭春。"], "note": "詩人寫下的，是我們說不出口的心情。"}, {"title": "大車", "author": "詩經", "body": ["大車檻檻，毳衣如菼。豈不爾思？畏子不敢。", "", "大車啍啍，毳衣如璊，豈不爾思？畏子不奔。", "", "谷則異室，死則同穴。謂予不信，有如皎日。"], "note": "每一個字，都是一次深呼吸。"}, {"title": "湯泉應制·清時禮樂萃朝端", "author": "清・納蘭性德", "body": ["清時禮樂萃朝端，次第郊原引玉鑾", "河嶽千年歸帶礫，寢園三月拜衣冠", "便從畿甸親民隱，更啓神泉示從官", "非獨炎靈鍾坎德，恩波深處不知寒"], "note": "讀詩，是與古人的一場對話。"}, {"title": "九月九日上幸慈恩寺登浮圖羣臣上菊花壽酒", "author": "唐・上官昭容", "body": ["帝裏重陽節，香園萬乘來。", "卻邪萸入佩，獻壽菊傳杯。", "墖類承天湧，門疑待佛開。", "睿詞懸日月，長得仰昭回。"], "note": "在古老的文字裡，找到今天的自己。"}, {"title": "遊蔣山題辛夷花寄陳奉禮本約陳同遊不至", "author": "宋・徐鉉", "body": ["今歲遊山已恨遲，山中仍喜見辛夷。", "簪纓且免全爲累，桃李猶堪別作期。", "晴後日高偏照灼，晚來風急漸離披。", "山郎不作同行伴，折是何由寄所思。"], "note": "在詩裡，我們都是歸人，不是過客。"}, {"title": "睿恩新", "author": "宋・晏殊", "body": ["芙蓉一朵霜秋色。", "迎曉露、依依先拆。", "似佳人、獨立傾城，傍朱檻、暗傳消息。", "靜對西風脈脈。", "金蕊綻、粉紅如滴。", "向蘭堂、莫厭重深，免清夜、微寒漸逼。"], "note": "有些情感，千年之後依然鮮活。"}, {"title": "浣溪沙·伏雨朝寒愁不勝", "author": "清・納蘭性德", "body": ["伏雨朝寒悉不勝，那能還傍杏花行", "去年高摘鬥輕盈", "漫惹爐煙雙袖紫，空將酒暈一衫青", "人間何處問多情"], "note": "靜下心來，聽見詩裡的風聲。"}, {"title": "浣溪沙·姜女廟", "author": "清・納蘭性德", "body": ["海色殘陽影斷霓，寒濤日夜女郎祠", "翠鈿塵網上蛛絲", "澄海樓高空極目，望夫石在且留題", "六王如夢祖龍非"], "note": "詩教會我們，用另一種眼光看世界。"}, {"title": "子衿", "author": "詩經", "body": ["青青子衿，悠悠我心。縱我不往，子寧不嗣音？", "", "青青子佩，悠悠我思。縱我不往，子寧不來？", "", "挑兮達兮，在城闕兮。一日不見，如三月兮。"], "note": "文字如水，潤物無聲。"}, {"title": "郊廟歌辭 武后明堂樂章 迎送王公", "author": "唐・武則天", "body": ["千官肅事，萬國朝宗。", "載延百辟，爰集三宮。", "君臣德合，魚水斯同。", "睿圖方永，周曆長隆。"], "note": "古人的浪漫，藏在字裡行間。"}, {"title": "卜算子·新柳", "author": "清・納蘭性德", "body": ["嬌軟不勝垂，瘦怯那禁舞", "多事年年二月風，翦出鵝黃縷", "一種可憐生，落日和煙雨", "蘇小門前長短條，即漸迷行處"], "note": "古人的智慧，凝結在這幾行字裡。"}, {"title": "郊廟歌辭 祀雨師樂章 送神", "author": "唐・包佶", "body": ["整駕昇車望寥廓，垂陰薦祉蕩昏氛。", "饗時靈貺僾如在，樂罷餘聲遙可聞。", "飲福陳誠禮容備，撤俎終獻曙光分。", "跪拜臨壇結空想，年年應節候油雲。"], "note": "讀一首詩，像是深吸一口山間的空氣。"}, {"title": "玉堂春", "author": "宋・晏殊", "body": ["帝城春暖。", "御柳暗遮空苑。", "海燕雙雙，拂揚簾櫳。", "女伴相攜、共繞林間路，折得櫻桃插髻紅。", "昨夜臨明微雨，新英遍舊叢。", "寶馬香車、欲傍西池看，觸處楊花滿袖風。"], "note": "詩是靈魂深處最柔軟的聲音。"}, {"title": "山居詩  其一○", "author": "宋・釋延壽", "body": ["曠然不被興亡墜，豁爾難教寵辱驚。", "鼓角城遙無伺候，輪蹄路絕免逢迎。", "暖眠紙帳茅堂密，穩坐蒲團石面平。", "祇有此途爲上策，更無餘事可關情。"], "note": "有些感動，只有詩能說清楚。"}, {"title": "菩薩蠻·爲春憔悴留春住", "author": "清・納蘭性德", "body": ["爲春憔悴留春住，那禁半霎催歸雨", "深巷賣櫻桃，雨餘紅更嬌", "黃昏清淚閣，忍便花飄泊", "消得一聲鶯，東風三月情"], "note": "文字的光芒，照亮了最暗的角落。"}, {"title": "減字木蘭花·相逢不語", "author": "清・納蘭性德", "body": ["相逢不語，一朵芙蓉著秋雨", "小暈紅潮，斜溜鬟心只鳳翹", "待將低喚，直爲凝情恐人見", "欲訴幽懷，轉過回闌叩玉釵"], "note": "讀一首詩，像是深吸一口山間的空氣。"}, {"title": "惜春郎", "author": "宋・柳永", "body": ["玉肌瓊豔新妝飾。", "好壯觀歌席。", "潘妃寶釧，阿嬌金屋，應也消得。", "屬和新詞多俊格。", "敢共我勍敵。", "恨少年、枉費疏狂，不早與伊相識。"], "note": "在古老的文字裡，找到今天的自己。"}, {"title": "駕幸三會寺應制", "author": "唐・上官昭容", "body": ["釋子談經處，軒臣刻字留。", "故臺遺老識，殘簡聖皇求。", "駐蹕懷千古，開襟望九州。", "四山緣塞合，二水夾城流。", "宸翰陪瞻仰，天杯接獻酬。", "太平詞藻盛，長願紀鴻休。"], "note": "讀一首詩，像是深吸一口山間的空氣。"}, {"title": "甘州令", "author": "宋・柳永", "body": ["凍雲深，淑氣淺，寒欺綠野。", "輕雪伴、早梅飄謝。", "豔陽天，正明媚，卻成瀟灑。", "玉人歌，畫樓酒，對此景、驟增高價。", "賣花巷陌，放燈臺榭。", "好時節、怎生輕舍。", "賴和風，蕩霽藹，廓清良夜。", "玉塵鋪，桂華滿，素光裏、更堪遊冶。"], "note": "詩不需要讀懂，只需要感受。"}, {"title": "郊廟歌辭 祭汾陰樂章 南呂羽", "author": "唐・韓休", "body": ["於穆濬哲，維清緝熙。", "肅事昭配，永言孝思。", "滌濯靜嘉，馨香在茲。", "神之聽之，用受福釐。"], "note": "詩是靈魂深處最柔軟的聲音。"}, {"title": "潼關口號", "author": "唐・明皇帝", "body": ["河曲回千里，關門限二京。", "所嗟非恃德，設險到天平。"], "note": "每首詩都是一扇窗，通往另一個世界。"}, {"title": "題玉堂壁", "author": "宋・陶穀", "body": ["官職有來須與做，才能用處不憂無。", "堪笑翰林陶學士，一生依樣畫葫蘆。"], "note": "古人的浪漫，藏在字裡行間。"}, {"title": "晝夜樂", "author": "宋・柳永", "body": ["洞房記得初相遇。", "便只合、長相聚。", "何期小會幽歡，變作離情別緒。", "況值闌珊春色暮。", "對滿目、亂花狂絮。", "直恐好風光，盡隨伊歸去。", "一場寂寞憑誰訴。", "算前言、總輕負。", "早知恁地難拼，悔不當時留住。", "其奈風流端正外，更別有、系人心處。", "一日不思量，也攢眉千度。"], "note": "有些情感，千年之後依然鮮活。"}, {"title": "山居詩  其七", "author": "宋・釋延壽", "body": ["事多興廢莫持論，唯有禪宗理可尊。", "似訥始平分別路，如愚方塞是非門。", "刳腸祇爲生靈智，剖舌多因強語言。", "爭似息機高臥客，年來年去道長存。"], "note": "文字的光芒，照亮了最暗的角落。"}, {"title": "約張處士遊梁", "author": "宋・譚用之", "body": ["莫學區區老一經，夷門關吏舊書生。", "晉朝滅後無中散，韓國亡來絕上卿。", "龍變洞中千谷冷，劍橫天外八風清。", "好攜長策幹時去，免逐漁樵度太平。"], "note": "最美的風景，往往藏在文字裡。"}, {"title": "題金樓子後", "author": "唐・後主煜", "body": ["牙籤萬軸裹紅綃，王粲書同付火燒。", "不於祖龍留面目，遺篇那得到今朝。"], "note": "有些感動，只有詩能說清楚。"}, {"title": "遊長寧公主流杯池二十五首 二十二", "author": "唐・上官昭容", "body": ["橫鋪豹皮褥，側帶鹿胎巾。", "借問何爲者，山中有逸人。"], "note": "有些情感，千年之後依然鮮活。"}, {"title": "印秀才至舒州見尋別後寄詩依韻和", "author": "宋・徐鉉", "body": ["羈遊白社身雖屈，高步辭場道不卑。", "投分共爲知我者，相尋多愧謫居時。", "離懷耿耿年來夢，厚意勤勤別後詩。", "今日谿邊正相憶，雪晴山秀柳絲垂。"], "note": "最美的風景，往往藏在文字裡。"}, {"title": "等你在雨中", "author": "余光中", "body": ["等你在雨中在造虹的雨中", "蟬聲沉落蛙聲升起", "一池的紅蓮如紅焰在雨中", "", "你來不來都一樣竟感覺", "每朵蓮都像你", "尤其隔著黃昏隔著這樣的細雨"], "note": "等待本身即是一首詩，蓮與你在雨中重疊成永恆。"}, {"title": "白玉苦瓜", "author": "余光中", "body": ["似醒似睡緩緩的柔光裏", "似悒似含朦朧的薄光裏", "白玉苦瓜不再是苦瓜", "而是一隻圓滿光潤的容器", "", "鍾整個大陸的愛在一隻苦瓜", "皮色恰似翠玉", "被永恆引渡此岸的某個角落"], "note": "一隻苦瓜凝結了千年的文化鄉愁與美學。"}, {"title": "與永恆拔河", "author": "余光中", "body": ["與永恆拔河", "你在這一頭我在那一頭", "日子是一條繩索", "拉過來又放過去", "", "而歲月不肯認輸", "把我們都拉向同一個方向", "那邊是白髮是皺紋是沉默"], "note": "時間是唯一不會放手的對手。"}, {"title": "民歌", "author": "余光中", "body": ["傳說北方有一首民歌", "只有黃河的肺活量能歌唱", "從青海到黃海", "風也聽見沙也聽見", "", "如果黃河是一把豎琴", "大雪便是急奏"], "note": "黃河即是歌喉，大地即是樂章。"}, {"title": "碧潭", "author": "余光中", "body": ["十六柄桂槳敲碎青琉璃", "幾則羅曼史散落在水面", "碧潭的水色太薄了", "沉不下一疊厚厚的記憶", "", "如果碧潭再玻璃些", "就可以照見你了"], "note": "碧潭薄得裝不下往事，卻厚得映出整個青春。"}, {"title": "天問", "author": "余光中", "body": ["水上的霞光呵", "木中的年輪呵", "此刻的我呵", "", "有什麼能比光更寂寞", "除了追光的影子", "有什麼能比回聲更空洞", "除了發聲的山谷"], "note": "追問天地的人，終究在問自己。"}, {"title": "當我死時", "author": "余光中", "body": ["當我死時葬我在長江與黃河之間", "枕我的頭顱白髮蓋著黑土", "在中國最美最母親的國度", "", "我便坦然睡去睡整張大陸", "聽兩側安魂曲起自長江黃河", "兩管永生的音樂滔滔向東"], "note": "以大陸為牀，以江河為曲，死亡也是歸鄉。"}, {"title": "風鈴", "author": "余光中", "body": ["我的心是七層塔簷上懸掛的風鈴", "叮嚀叮嚀嚀", "此起彼落敲叩著一個人的名字", "", "你的塔上也感到微震嗎", "這是寂靜的脈搏", "日夜不停"], "note": "風鈴不為風響，只為遠方那人而鳴。"}, {"title": "車過枋寮", "author": "余光中", "body": ["雨落在屏東的甘蔗田裏", "甜甜的甘蔗甜甜的雨", "肥肥的甘蔗肥肥的田", "", "從此地到山麓", "一片新綠鋪著", "無際的蔗田"], "note": "火車窗外，甘蔗田是南方最甜的風景。"}, {"title": "絕色", "author": "余光中", "body": ["若逢新雪初霽", "滿月當空", "下面平鋪著皓影", "上面流轉著亮銀", "", "而你帶笑地向我步來", "月色與雪色之間", "你是第三種絕色"], "note": "月色與雪色之間，你是世間第三種明亮。"}, {"title": "五陵少年", "author": "余光中", "body": ["颱風季巨浪向乾坤挑戰", "而我們以臂相拒", "少年的五陵如今隔著水", "", "我的怒中有燧人氏", "我的血中有共工氏", "但生我的土地被海峽斬斷"], "note": "少年壯志如浪，大海隔不斷古老的血脈。"}, {"title": "敲打樂", "author": "余光中", "body": ["你那雙鐵掌啊", "把節拍把鋼鐵敲得火辣辣的", "敲得天空一片青紫", "", "太陽是你的銅鈸", "月亮是你的銅鑼", "而風是那面旗"], "note": "世界是一座巨大的打擊樂器，需要用力敲醒。"}, {"title": "蓮的聯想", "author": "余光中", "body": ["搖曳在時光裏的那朵蓮", "是你踏波而來的倒影嗎", "一莖蓮舉起的是整個夏天", "", "在光的絲縷與水的皺褶之間", "你微微低首", "恰是凝碧的波痕"], "note": "蓮是一個姿態，也是一場等待的隱喻。"}, {"title": "大江東去", "author": "余光中", "body": ["大江東去浪聲滔滔", "歲月亦然", "凡是浪花走過的地方", "都是肉身沖刷的痕跡", "", "我立在此岸", "聽那千年的回聲"], "note": "江水帶走歲月，留下的只有聽浪的人。"}, {"title": "翠玉白菜", "author": "余光中", "body": ["通體碧綠剔透而輕盈", "每一條葉脈裏藏著帝國的祕密", "青白之間是匠人的呼吸", "", "一棵白菜鎮住千年的展廳", "比玉更溫潤的", "是巧匠注入的那口氣"], "note": "一棵玉白菜，藏住一整座文明的溫潤。"}, {"title": "春天遂想起", "author": "余光中", "body": ["春天遂想起江南", "唐詩裏的江南", "九歲時採桑葉於其中", "", "遂想起江南的小杜", "想起雨打在湖上", "那些年少的水花"], "note": "春天一到，江南便從唐詩裏走出來了。"}, {"title": "鬼雨", "author": "余光中", "body": ["雨是鬼的淚是鬼的汗", "在黃泉之上在人間之下", "一滴滴落在薄薄的世界", "", "你聽那窗外", "千萬隻腳在天上走過", "那是雲的腳步"], "note": "雨聲裏藏著另一個世界的消息。"}, {"title": "尋李白", "author": "余光中", "body": ["那一雙傲慢的靴子至今還落在", "高力士羞憤的手裏人卻不見了", "痛飲狂歌空度日飛揚跋扈為誰雄", "", "把滿地的難民和傷兵", "把整座長安讓給你", "讓一壺濁酒醉倒整個盛唐"], "note": "一壺濁酒裏裝的不是酒，是整個盛唐的氣魄。"}, {"title": "夸父", "author": "余光中", "body": ["為什麼要苦苦去追逐", "那團巨大的火球", "渴了就飲盡大澤與黃河", "", "最後仆倒在暮色裏", "化為一片桃林", "讓後來者在蔭下乘涼"], "note": "追日者雖倒，化為桃林替後人遮蔭。"}, {"title": "初相遇", "author": "席慕蓉", "body": ["美麗的夢和美麗的詩一樣", "都是可遇而不可求的", "常常在最沒能料到的時刻裏出現", "", "我喜歡那樣的夢", "在夢裏一切都可以重新開始", "一切都可以慢慢解釋"], "note": "初遇是命運打翻的調色盤，所有顏色都是新的。"}, {"title": "青春", "author": "席慕蓉", "body": ["所有的結局都已寫好", "所有的淚水也都已啟程", "卻忽然忘了是怎麼樣的一個開始", "", "在那個古老的不再回來的夏日", "無論我如何地去追索", "年輕的你只如雲影掠過"], "note": "青春的殘忍在於——結局比開始先到。"}, {"title": "無怨的青春", "author": "席慕蓉", "body": ["在年輕的時候", "如果你愛上了一個人", "請你一定要溫柔地對待她", "", "不管你們相愛的時間有多長或多短", "若你們能始終溫柔地相待", "那麼所有的時刻都將是一種無瑕的美麗"], "note": "溫柔是唯一不會過期的承諾。"}, {"title": "回首", "author": "席慕蓉", "body": ["我只好回首又回首", "在時光的河裏逆流而上", "尋找那個渡口那條小路", "", "牽我心的是一段歲月", "在歲月的盡頭", "你的笑容如月光灑落"], "note": "回首是為了在舊時光裏再認出你一次。"}, {"title": "渡口", "author": "席慕蓉", "body": ["讓我與你握別", "再輕輕抽出我的手", "知道思念從此生根", "", "浮雲白日山川莊嚴溫柔", "讓我與你握別", "再輕輕抽出我的手"], "note": "握別時輕輕抽出的手，比握緊時更重。"}, {"title": "暮歌", "author": "席慕蓉", "body": ["我喜歡將暮未暮的原野", "在這時候所有的顏色都已沉靜", "而黑暗尚未來臨", "", "在山崗上那叢鬱綠裏", "還有著最後一筆的激情", "我也喜歡這時的自己"], "note": "黃昏最好的時刻，是暗還沒到、光還沒走的那一刻。"}, {"title": "前緣", "author": "席慕蓉", "body": ["人若真能轉世", "世間若真有輪迴", "那麼我的前生一定在等你", "", "一世一世地等", "不是情願不是不甘", "只是命裏註定"], "note": "前緣不是執念，是靈魂認出彼此的本能。"}, {"title": "歷史博物館", "author": "席慕蓉", "body": ["是誰將我的故鄉弄丟了", "把它放在一個方方正正的玻璃櫃裏", "標上說明寫下年代", "", "而我的心啊在櫃外想要觸摸", "那已碎裂的陶罐上", "指紋還清晰如昨"], "note": "故鄉一旦進了博物館，就只能隔著玻璃想念了。"}, {"title": "七里香", "author": "席慕蓉", "body": ["溪水急著要流向海洋", "浪潮卻渴望重回土地", "在綠樹白花的籬前", "曾那樣輕易地揮手道別", "", "而滄桑的二十年後", "我們的魂魄卻夜夜歸來", "微風拂過時便化作滿園的鬱香"], "note": "七里香的香氣，是時間寄回的情書。"}, {"title": "山路", "author": "席慕蓉", "body": ["我好像答應過你", "要和你一起走上那條美麗的山路", "你說那坡上種滿了新茶", "", "還有細密的相思樹", "我好像答應過你", "在一個遙遠的春日下午"], "note": "答應過的山路，成了此生走不完的距離。"}, {"title": "盼望", "author": "席慕蓉", "body": ["其實我盼望的也不過就只是那一瞬", "我從來不敢奢望能在人間得到永久", "只要在我開花的時候你恰好經過", "", "風吹過一陣清涼", "你看過便走也好", "至少你曾俯首"], "note": "盼望不貪心，只要你經過時花恰好開著。"}, {"title": "送別", "author": "席慕蓉", "body": ["不是所有的夢都來得及實現", "不是所有的話都來得及告訴你", "內疚和悔恨總要深深地種在離別後的心中", "", "儘管他們說世間種種", "最後終必成空", "我並不是立意要錯過"], "note": "來不及的話比說出口的更重，因為它永遠說不完。"}, {"title": "旅行", "author": "席慕蓉", "body": ["凡是遙遠的地方", "對我們都有一種誘惑", "不是誘惑於美麗", "就是誘惑於傳說", "", "即使遠方的風景", "並不盡如人意", "我們也無需在乎"], "note": "遠方的意義不在風景，在於出發本身。"}, {"title": "透明的哀傷", "author": "席慕蓉", "body": ["在長長的一生裏", "歡樂總是乍現就凋落", "走得最急的都是最美的時光", "", "向我揮手的那個少年", "還站在原地不動", "而我已經走了好遠好遠"], "note": "走得最急的是最美的時光，留得最久的是透明的哀傷。"}, {"title": "時光九篇", "author": "席慕蓉", "body": ["在黑暗的河流上被你閃亮的月光照亮", "我是一條潔白的船", "在你的港灣裏安然停泊", "", "年少的歲月行過蒼茫", "來到你的窗前", "化成一簾幽夢"], "note": "時光是河，而你是唯一的港灣。"}, {"title": "父親的草原母親的河", "author": "席慕蓉", "body": ["父親曾經形容草原的清香", "讓他在天涯海角也不能相忘", "母親總愛描摹那大河浩蕩", "", "奔流在蒙古高原我遙遠的家鄉", "如今終於見到了遼闊的大地", "站在芬芳的草原上我淚落如雨"], "note": "草原的清香是父親的語言，大河的浩蕩是母親的歌。"}, {"title": "小小的島", "author": "鄭愁予", "body": ["你住的小小的島我正思念", "那兒屬於熱帶椰子肥碩", "陽光透明木瓜甜", "", "長夏無風你走在巷子裏", "裙裾如午後的蝶", "蝶翅如你午後的裙裾"], "note": "小島上你走過的風，比熱帶的陽光更溫暖。"}, {"title": "如霧起時", "author": "鄭愁予", "body": ["我從海上來帶回航海的二十二顆星", "你問我航海的事兒", "我仰天笑了", "", "如霧起時", "敲叮叮的耳環在風裏搖響", "你是那待解纜的船"], "note": "霧起時什麼都看不清，唯獨你是最清晰的方向。"}, {"title": "雨說", "author": "鄭愁予", "body": ["雨說我來了我來探訪四月的大地", "我來了我走得很輕而且溫聲細語", "我的愛心像絲縷那樣把天地織在一起", "", "第一樣事兒我要教你們勇敢地笑啊", "君不見柳條兒見了我笑彎了腰", "石獅子見了我笑出了淚"], "note": "雨是天空寫給大地最溫柔的一封信。"}, {"title": "情婦", "author": "鄭愁予", "body": ["在一個港口而沒有船的城市", "我把木柵關上了", "在柵裏種花一年四季", "", "我和你的故事", "像一首不能唱的歌", "永遠封存在木柵之內"], "note": "沒有船的港口，種滿了不能出航的思念。"}, {"title": "夢土上", "author": "鄭愁予", "body": ["我們是旅人在夢土上行走", "腳步輕輕", "怕驚醒了沉睡的花", "", "走了一程又一程", "回頭看時", "足印已被晨露填平"], "note": "夢土上的旅人，走過的路只有晨露記得。"}, {"title": "客來小城", "author": "鄭愁予", "body": ["客來小城來自遠方", "風塵僕僕但眉間有光", "他帶來一壺雨水和半卷詩", "", "小城裏的人都笑了", "因為從此以後", "巷口的老樹也學會吟誦"], "note": "遠方的客帶來的不是風塵，是讓老樹開口的詩意。"}, {"title": "野店", "author": "鄭愁予", "body": ["是誰傳下了這行業", "黃昏裏掛起一盞燈", "啊是誰傳下了這詩人的行業", "", "讓他在黃昏裏歌唱", "野店是一首古老的歌", "唱給每個趕路的人聽"], "note": "野店的燈是為迷路的人點的，詩也是。"}, {"title": "窗外的女奴", "author": "鄭愁予", "body": ["窗外的女奴在月光下歌唱", "她的歌聲穿過夜色", "像一條銀色的河", "", "我在窗內聽著", "彷彿聽見了", "整個古老世界的歎息"], "note": "月光下的歌聲，唱的是自由還是囚禁。"}, {"title": "崖上", "author": "鄭愁予", "body": ["崖上的風吹得猛烈", "草低伏如臣服的羣馬", "而我站在此處", "", "看海翻湧如一鍋沸騰的藍", "天地之間只剩下", "風和我的對話"], "note": "站在崖上的人不是看海，是聽風的獨白。"}, {"title": "船長的獨步", "author": "鄭愁予", "body": ["船長在甲板上獨步", "星斗是他頭上的錨", "黑夜是他手中的舵", "", "他走了一圈又一圈", "像在量度大洋的寬度", "用腳步"], "note": "船長的孤獨和大洋一樣寬，需要用一生去丈量。"}, {"title": "水巷", "author": "鄭愁予", "body": ["水巷裏的石板濕濕的", "映著對岸的燈火", "一個人的腳步聲", "在巷子裏來回踱著", "", "像一首重複的短詩", "怎麼讀都是同一個韻腳"], "note": "水巷的回聲裏，寂寞是唯一的韻腳。"}, {"title": "旅程", "author": "鄭愁予", "body": ["旅程在腳下展開", "像一卷漫長的地圖", "每一步都是一個新的注腳", "", "而那些走過的路", "都已成為身後的風景", "只在夢中偶爾重逢"], "note": "走過的路都變成了夢裏才能重訪的風景。"}, {"title": "天窗", "author": "鄭愁予", "body": ["天窗是屋頂的眼睛", "看著雲看著星看著飛鳥", "也看著窗下仰望的人", "", "人與天之間", "只隔一方玻璃", "和無限的想像"], "note": "天窗是屋子留給天空的一個眼神。"}, {"title": "子夜讀信", "author": "洛夫", "body": ["子夜的燈是一條未穿衣裳的", "小河你的信像一尾魚", "遊入我的掌中", "", "讀信的手在微微顫抖", "彷彿握著一片薄冰", "隨時會在掌心融化"], "note": "深夜讀到的信，每個字都是融化中的薄冰。"}, {"title": "石室之死亡（節選）", "author": "洛夫", "body": ["我在石室中坐著", "死亡在隔壁房間磨刀", "鏡子裏的人不是我", "是時間的另一個面孔", "", "石室外有風吹過", "那是永恆在散步", "踩碎了一地的落葉"], "note": "石室裏的人與死亡為鄰，鏡中映出的是時間本身。"}, {"title": "漂木（節選）", "author": "洛夫", "body": ["一根漂木在大海上浮沉", "不知來處不知歸途", "它曾經是一棵挺拔的樹", "", "而此刻它只是一段木頭", "被海水沖刷被太陽曬白", "隨波逐流如一封退回的信"], "note": "漂木是被海洋退回的信，收件人是永恆。"}, {"title": "長恨歌", "author": "洛夫", "body": ["月光在水面上寫字", "寫的都是舊時的名字", "魚讀了感動得吐出泡沫", "", "而岸上的柳", "垂下千萬條傷心的手臂", "撈不起一片完整的月光"], "note": "月光碎在水裏，恰如舊事碎在記憶裏。"}, {"title": "邊界望鄉", "author": "洛夫", "body": ["望遠鏡中擴大數十倍的鄉愁", "亂如風中的散髮", "當距離調整到令人心跳的程度", "", "一座遠山迎面飛來", "把我撞成了嚴重的內傷"], "note": "望遠鏡拉近的不是山，是痛。"}, {"title": "窗下", "author": "洛夫", "body": ["當暮色裝滿大街小巷", "燈一盞盞亮起來", "我在窗下坐著讀一本舊書", "", "書頁間夾著一片枯葉", "那是去年秋天你放進去的", "如今它比書頁更薄了"], "note": "枯葉比書頁薄，記憶卻比書頁重。"}, {"title": "雨中過辛亥隧道", "author": "洛夫", "body": ["雨在隧道外等我", "像一羣焦急的孩子", "車穿過黑暗", "前方忽然一片明亮", "", "而雨又在出口處迎接我", "彷彿什麼都沒有發生"], "note": "隧道是一段短暫的遺忘，出口處雨還在等你。"}, {"title": "水與火", "author": "洛夫", "body": ["水說我是溫柔的", "火說我是熱烈的", "你站在中間不知所措", "", "而我同時是水與火", "在你的掌心裏", "既沸騰又結冰"], "note": "愛是同時沸騰又結冰的矛盾。"}, {"title": "背向大海", "author": "洛夫", "body": ["背向大海我走向內陸", "每一步都踩在回憶的碎片上", "海風在身後呼喊", "", "但我不回頭", "因為回頭就看見", "浪花組成的你的臉"], "note": "背向大海不是告別，是怕看見浪花裏的你。"}, {"title": "午夜削梨", "author": "洛夫", "body": ["午夜削一顆梨", "窸窸窣窣的聲音", "像是在削去一層光陰", "", "削到最後", "只剩一顆白白的心", "放在掌中微微發涼"], "note": "削去的是果皮，也是歲月；剩下的白心，微涼如初。"}, {"title": "與李賀共飲", "author": "洛夫", "body": ["月光斟滿了你的酒杯", "你說天若有情天亦老", "我說那就讓它老去", "", "你我隔著千年共飲", "酒是冷的詩是熱的", "長安的風至今未歇"], "note": "千年前的酒杯裏，盛的是同一輪月光。"}, {"title": "裸奔", "author": "洛夫", "body": ["一棵樹在秋天裏裸奔", "甩掉所有的葉子", "只剩骨骼和天空對峙", "", "那是一種徹底的自由", "也是一種徹底的寂寞", "風吹過它不再發出聲音"], "note": "落盡繁華的樹，是最自由也最沉默的。"}, {"title": "秋歌", "author": "瘂弦", "body": ["落葉完成了最後的顫抖", "荻花在煙水裏搖曳", "這是秋的盡頭了", "", "我們的心事像一團糾纏的毛線", "在風裏打著結又散開", "散開又打結"], "note": "秋天是心事打結又散開的季節。"}, {"title": "深淵", "author": "瘂弦", "body": ["一個老婦人坐在門檻上", "編織一雙過冬的襪子", "她的手指像枯枝", "在記憶的線團裏穿梭", "", "深淵是什麼", "深淵是一雙永遠織不完的襪子", "和一個永遠等不到冬天的人"], "note": "深淵不在腳下，在那雙永遠織不完的襪子裏。"}, {"title": "紅玉米", "author": "瘂弦", "body": ["宣統那年的風吹過來", "吹過了七十年", "紅玉米掛在屋簷下", "", "猶似新嫁娘的串珠", "那老去的是人", "紅玉米還是一樣的紅"], "note": "紅玉米不老，老的是看它的人。"}, {"title": "鹽", "author": "瘂弦", "body": ["二哥從北方帶回來一把鹽", "在燈下攤開來像一堆白雪", "母親把它藏在罐子裏", "", "每天取出一小撮", "放進苦澀的湯裏", "那是北方寄來的唯一的甜"], "note": "鹽是苦的，但從故鄉帶回的鹽，是唯一的甜。"}, {"title": "上校", "author": "瘂弦", "body": ["退了役的上校", "在家鄉的門口坐著", "他的勳章鎖在抽屜裏", "", "而他的影子", "在夕陽裏越拉越長", "像一條回不去的路"], "note": "勳章鎖進了抽屜，但回不去的路還攤在夕陽裏。"}, {"title": "巴黎", "author": "瘂弦", "body": ["一個遙遠的名字", "像一朵不謝的花", "開在所有年輕人的脣上", "", "巴黎是一封信", "寫給全世界的人", "但永遠沒有人讀完"], "note": "巴黎是一封寫給全世界卻永遠讀不完的情書。"}, {"title": "坤伶", "author": "瘂弦", "body": ["十四歲她逃出了木柵欄", "夜裏在一條河邊唱起了戲", "水中的月亮替她打拍子", "", "從此她的嗓子裏住著一條河", "唱盡了悲歡離合", "臺下的人都走了她還在唱"], "note": "臺下空了她還在唱，因為河住進嗓子就流不走了。"}, {"title": "山神", "author": "瘂弦", "body": ["山神獨坐在雲端", "看人間忙碌如螞蟻", "他不說話已經三千年了", "", "偶爾嘆一口氣", "便化為山谷的風", "吹動了山腳下一面旗幟"], "note": "山神的嘆息化成風，人間卻以為只是天氣變了。"}, {"title": "乞丐", "author": "瘂弦", "body": ["乞丐蹲在城門下", "他的碗裏盛著一小片天空", "和三枚銅板", "", "他是全城唯一有閒的人", "看白雲走完一整天的路", "然後收起碗回到黑暗裏"], "note": "乞丐的碗裏有天空，那是富人看不見的風景。"}, {"title": "水之湄", "author": "楊牧", "body": ["水之湄你在水之湄", "而我在岸上望你", "風吹過蘆葦便是你的手", "在遠方搖動", "", "你若是那條溪流", "那我便是兩岸的石頭", "日夜聽你的低語"], "note": "你是水，我是岸，日夜聽你流過的聲音。"}, {"title": "有人", "author": "楊牧", "body": ["有人問我公理和正義的問題", "在一個深秋的午後", "我沉默了很久", "", "窗外的楓葉正一片一片落下", "每一片都像是一個", "來不及回答的答案"], "note": "正義的答案像楓葉，落了滿地卻來不及撿起。"}, {"title": "延陵季子掛劍", "author": "楊牧", "body": ["你已經離去了", "而我帶來的劍還在", "掛在墳前的老松上", "", "風吹動劍穗如當年", "你微笑的樣子", "諾言比劍更鋒利"], "note": "劍掛在墳前，守的不是墓，是當年一個未說出的承諾。"}, {"title": "給時間", "author": "楊牧", "body": ["給時間一點時間", "讓過去的成為過去", "讓開始的重新開始", "", "在兩者之間", "有一段沉默", "那就是現在"], "note": "現在是過去和未來之間的一段沉默。"}, {"title": "瓶中稿", "author": "楊牧", "body": ["我把詩裝進瓶裏", "擲入大海", "讓洋流替我選擇讀者", "", "也許若干年後", "有人在沙灘上拾起", "讀到了一個已不存在的秋天"], "note": "瓶中的詩會比寫詩的人活得更久更遠。"}, {"title": "秋祭", "author": "楊牧", "body": ["稻穗低垂如行禮的僧侶", "田間的風帶著穀物的香", "收割之後大地便空了", "", "空得像一面鼓", "等待下一個季節來敲響", "那是大地的輪迴"], "note": "收割後的田是一面等待被敲響的鼓。"}, {"title": "十二月", "author": "楊牧", "body": ["十二月的光很薄", "薄得像一層紗", "蓋在這座城市上面", "", "人們裹緊了衣裳走路", "每個人的影子都很短", "因為太陽在很遠的地方"], "note": "十二月的光薄如紗，影子短如匆匆的一年。"}, {"title": "出航", "author": "楊牧", "body": ["解纜之後回頭望去", "港口已小得像一枚郵票", "而前方是無盡的藍", "", "我不知道風會把我帶向何方", "但我知道", "每一道浪都是新的開始"], "note": "出航的意義不在抵達，在於敢面對無盡的藍。"}, {"title": "山風海雨", "author": "楊牧", "body": ["山風從左邊來", "海雨從右邊來", "我站在花蓮的土地上", "被兩種力量同時擁抱", "", "一邊是粗獷的太平洋", "一邊是溫柔的中央山脈"], "note": "花蓮的孩子同時被山的溫柔和海的粗獷養大。"}, {"title": "星之組曲", "author": "楊牧", "body": ["星星是夜空的標點符號", "有些是逗號有些是句號", "你指著那顆最亮的說", "那是驚嘆號", "", "而我知道", "流星是天空寫了又劃掉的字"], "note": "流星是天空後悔寫下又急忙劃掉的祕密。"}, {"title": "狼之獨步", "author": "紀弦", "body": ["我乃曠野裏獨來獨往的一匹狼", "不是先知不是乞丐也不是石像", "我走我的路", "", "人間種種我不理會", "只偶爾抬頭看看天上的月", "那也是一匹獨步的狼"], "note": "月亮是天上的狼，獨步者在地上仰望同類。"}, {"title": "你的名字", "author": "紀弦", "body": ["用了世界上最輕最輕的聲音", "輕輕地喚你的名字每夜每夜", "寫你的名字畫你的名字", "", "而夢是唯一的行李", "你的名字是唯一的燈", "在所有黑暗的路上"], "note": "你的名字是黑暗中唯一的燈，輕如呼吸卻亮如星。"}, {"title": "擺渡船上", "author": "紀弦", "body": ["在擺渡船上", "我遇見了一個陌生人", "他的眼神像深秋的水", "", "我們沒有交談", "只是並肩站著看河", "然後他下了船消失在人羣中"], "note": "擺渡船上的陌生人，是命運安排的一幕默劇。"}, {"title": "飛", "author": "紀弦", "body": ["我要飛不用翅膀", "我要飛不借助風", "只要意念裏有一片天空", "", "那麼身體就是最好的翅膀", "影子就是最輕的行李", "飛吧飛到語言不能到達的地方"], "note": "飛不靠翅膀靠意念，到語言不能到的地方去。"}, {"title": "晨歌", "author": "紀弦", "body": ["清晨推開窗戶", "世界像一隻剛出爐的麵包", "散發著金黃色的香氣", "", "鳥兒是第一批顧客", "牠們用歌聲付帳", "買走了一整個早晨的新鮮"], "note": "清晨是世界新鮮出爐的時刻，鳥聲是最早的貨幣。"}, {"title": "火葬", "author": "紀弦", "body": ["把所有的舊信都燒了吧", "讓它們化成煙", "升上天空變成雲", "", "然後在某個午後", "以雨的形式", "再回到你的窗前"], "note": "燒掉的舊信會化成雨，總會回來的。"}, {"title": "存在主義者", "author": "紀弦", "body": ["我坐在咖啡館裏", "攪動杯中的黑色液體", "如攪動一個深邃的命題", "", "存在先於本質", "但咖啡冷了", "命題也就沒那麼迫切了"], "note": "哲學的迫切感，有時不敵一杯冷掉的咖啡。"}, {"title": "過客", "author": "紀弦", "body": ["我是這座城市的過客", "不帶走什麼也不留下什麼", "只是經過", "", "像風經過一扇半開的窗", "翻動了桌上的一頁書", "然後繼續趕路"], "note": "過客翻動了你桌上的書頁，那就是他留下的全部。"}, {"title": "在另一個國度", "author": "紀弦", "body": ["在另一個國度裏", "花開的方式不同", "月亮的形狀也不同", "", "但思念的重量是一樣的", "不管在哪個經緯度", "都壓得人喘不過氣"], "note": "經緯度可以不同，但思念的重量是統一的度量衡。"}, {"title": "距離", "author": "紀弦", "body": ["你在海的那邊", "我在海的這邊", "中間隔著幾千公里的藍", "", "但藍不是距離", "沉默纔是", "你不寫信的每一天都是一光年"], "note": "真正的距離不是海，是你不寫信的每一天。"}, {"title": "孤獨國", "author": "周夢蝶", "body": ["昨夜我又夢見我赤裸裸地", "騎在一匹白色的馬上", "奔馳在一片無邊的雪原上", "", "千山鳥飛絕萬徑人蹤滅", "只剩下我和那匹白馬", "在白色的國度裏孤獨地奔跑"], "note": "孤獨國裏白馬白雪，唯有心跳是唯一的顏色。"}, {"title": "還魂草", "author": "周夢蝶", "body": ["讓我做一株還魂草", "在你的窗前死去", "又在你的窗前活來", "", "每一次枯萎都是為了", "下一次更綠更勇敢地", "向你伸出我的手"], "note": "還魂草死了又活，每次復生都是為了更靠近你。"}, {"title": "菩提樹下", "author": "周夢蝶", "body": ["菩提樹下我坐了很久", "久到樹根以為我也是泥土", "鳥兒以為我是一截枯木", "", "但我的心裏有一條河在流", "流過了四季流過了悲歡", "流到了沒有名字的地方"], "note": "坐得夠久，萬物都認不出你，只有心裏的河還在流。"}, {"title": "十月", "author": "周夢蝶", "body": ["十月的陽光薄如蟬翼", "照在我的稿紙上", "每一個字都有了影子", "", "而那些沒有寫出來的字", "它們的影子更長", "長到了十一月"], "note": "寫下的字有影子，沒寫的字影子更長。"}, {"title": "剎那", "author": "周夢蝶", "body": ["剎那即永恆", "你說的那句話", "在空氣中凝固成琥珀", "", "千年之後有人挖出它", "舉到光線下端詳", "聽見了你當年的心跳"], "note": "一句話凝成琥珀，千年後還聽得見心跳。"}, {"title": "雪的可能", "author": "周夢蝶", "body": ["雪是天空做的一個白色的夢", "飄落在人間", "就成了冬天的方言", "", "你伸手去接一片", "它在掌心說了一句話", "然後融化了"], "note": "雪在掌心融化前說的那句話，只有接住它的人聽見。"}, {"title": "化城再來人", "author": "周夢蝶", "body": ["我是化城的再來人", "前世走過的路今生再走一遍", "每一步都踩在舊日的腳印上", "", "然而風景全變了", "只有那棵樹還認得我", "它用落葉鋪了一條回家的路"], "note": "再來人走舊路，唯有老樹用落葉認出了他。"}, {"title": "燈下讀書", "author": "周夢蝶", "body": ["燈下讀書", "讀到一句話忽然停住", "像被什麼絆了一跤", "", "那句話不是寫給我的", "但我知道", "它等了很久等一個人讀懂它"], "note": "有些句子等了很久，只為遇見一個讀懂的人。"}, {"title": "夜坐", "author": "周夢蝶", "body": ["夜深了我還坐著", "聽牆上的鐘走了一圈又一圈", "它走的是時間的路我走的是心的路", "", "兩條路偶爾交叉", "在某個整點上相遇", "然後各自分開"], "note": "鐘走時間的路，人走心的路，整點時才短暫交會。"}, {"title": "一月的哀傷", "author": "周夢蝶", "body": ["一月很冷", "冷得讓人想寫信", "但不知寫給誰", "", "於是把信寫給一月", "一月讀完了就下一場雪", "把信蓋住"], "note": "寫給一月的信，一月用雪回覆了。"}, {"title": "阡陌", "author": "林泠", "body": ["走在田間的阡陌上", "左邊是稻右邊也是稻", "風吹過來像一隻看不見的手", "輕輕推動整片金黃", "", "我站在其中", "像一個小小的標點", "被大地寫進它的詩裏"], "note": "人是大地之詩裏的一個小小標點。"}, {"title": "不繫之舟", "author": "林泠", "body": ["不繫之舟在水上漂著", "不問方向不問歸期", "河流帶它去哪裏", "它就到哪裏", "", "自由是一條沒有名字的河", "而我是河上唯一的乘客"], "note": "不繫之舟的自由，是把方向交給河流的勇氣。"}, {"title": "落雪", "author": "林泠", "body": ["雪落在北方的屋頂上", "像一封從天上寄來的信", "沒有字只有白", "", "但住在屋裏的人都讀懂了", "於是添了柴", "關上門讓爐火回信"], "note": "雪是天的來信，爐火是人的回覆。"}, {"title": "微光", "author": "林泠", "body": ["你走過來帶著微光", "不是太陽的光", "是那種從內心透出來的光", "", "照亮了房間的一角", "和我臉上的一個微笑", "這就夠了"], "note": "從心裏透出的微光，只需照亮一個微笑就夠了。"}, {"title": "窗", "author": "林泠", "body": ["窗是牆壁上的一幅畫", "畫裏的風景每天都在換", "今天是雨明天是晴", "", "而我是這幅畫唯一的觀眾", "坐在窗前", "看四季在框裏輪迴"], "note": "窗是牆上唯一的動態畫，觀眾只有一個。"}, {"title": "長頸鹿", "author": "商禽", "body": ["那個小女孩問我", "長頸鹿的脖子為什麼那麼長", "我說因為牠的心離頭很遠", "", "所以每一個念頭", "都要走很長的路", "才能到達嘴邊"], "note": "長頸鹿的沉默，是念頭從心到嘴的漫長旅程。"}, {"title": "雞", "author": "商禽", "body": ["一隻雞站在早晨的光線裏", "像一個穿了禮服的紳士", "牠歪著頭看了看世界", "", "然後決定大叫一聲", "把太陽叫出來", "雖然太陽本來就會出來"], "note": "雞的自信在於，牠真的相信太陽是自己叫出來的。"}, {"title": "門或者天空", "author": "商禽", "body": ["門打開了可以走出去", "也可以走進來", "但天空呢", "", "天空是一扇打開了的門", "沒有門框沒有鑰匙", "每個人都可以走進去但沒有人走得出來"], "note": "天空是唯一不需要鑰匙卻走不出去的門。"}, {"title": "夢中鏡", "author": "商禽", "body": ["夢裏有一面鏡子", "照出來的不是我的臉", "是一條河流的臉", "", "河流在鏡中流動", "魚在鏡中游泳", "我在鏡外發呆"], "note": "夢中的鏡子照出的不是人，是人心裏的河。"}, {"title": "用腳思想", "author": "商禽", "body": ["用腳思想的人走得最遠", "因為每一步都是一個結論", "不需要辯證不需要推理", "", "路走到盡頭", "就是最終的答案", "而答案是一片海"], "note": "用腳想出的答案，比用腦想的走得更遠。"}, {"title": "四季", "author": "向陽", "body": ["春天是一封用花寫的信", "夏天是一首用蟬唱的歌", "秋天是一幅用楓畫的畫", "冬天是一首用雪寫的詩", "", "而我最喜歡的季節", "是你在的那個季節"], "note": "四季各有語言，但你在的那季最動聽。"}, {"title": "搬布袋戲的姊妹", "author": "向陽", "body": ["阿姊搬金光戲", "阿妹搬歌仔戲", "兩個人在廟口搭起了舞臺", "", "月光是最好的燈", "觀眾是整條街的風", "戲演完了人散了月還在"], "note": "廟口的戲散了，月光是最後一個不走的觀眾。"}, {"title": "寫給春天的信", "author": "向陽", "body": ["春天你好", "我是南方一棵等你的樹", "去年你來得晚了些", "我的花差點等不及就開了", "", "今年請準時", "我已經備好了所有的芬芳"], "note": "樹寫給春天的信，用芬芳當郵票。"}, {"title": "阿爹的飯包", "author": "向陽", "body": ["阿爹天未光就出門", "飯包裏有三條菜脯", "和半塊豆腐乳", "", "他說食飯配鹹就好", "人生嘛免計較那麼多", "日頭落山就收工回來"], "note": "飯包裏裝的不是菜脯，是日出而作的踏實。"}, {"title": "立場", "author": "向陽", "body": ["你說東我說西", "你說對我說錯", "在立場的兩端", "我們像兩棵背對背的樹", "", "但地底下", "根是交纏在一起的", "共享同一片土地的水分"], "note": "立場背對背，根卻交纏在一起。"}, {"title": "戰爭交響曲", "author": "陳黎", "body": ["兵兵兵兵兵兵兵兵兵兵", "乒乒乒乒乒乒乒乒乒乒", "兵乒兵乒兵乒兵乒", "", "乒乒   乒  乒", "乒", "兵"], "note": "最少的字演出最殘酷的消耗，剩下的沉默比炮聲更響。"}, {"title": "小宇宙", "author": "陳黎", "body": ["一粒沙裏有一個宇宙", "一滴水裏有一片海洋", "一個字裏有一整本書", "", "而你的眼睛裏", "有我看不完的風景", "和走不完的路"], "note": "小宇宙的奧祕：越小的東西裝的東西越多。"}, {"title": "島嶼邊緣", "author": "陳黎", "body": ["站在島嶼的邊緣", "面對太平洋的風", "我的頭髮是一面旗", "", "替這座島嶼", "向大海宣示", "我們還在"], "note": "島嶼邊緣的人，用頭髮當旗向大海說我們還在。"}, {"title": "花蓮", "author": "陳黎", "body": ["花蓮是一首橫著寫的詩", "左邊是山右邊是海", "中間住著我和我的鄰居們", "", "太魯閣是這首詩的開頭", "七星潭是這首詩的結尾", "而每天的日出是新的一行"], "note": "花蓮橫在山海之間，每天的日出都是新的詩行。"}, {"title": "聲音的故事", "author": "陳黎", "body": ["風的聲音是樹教的", "浪的聲音是岸教的", "雨的聲音是屋頂教的", "", "而沉默的聲音", "是心自己學會的", "在某個深夜裏"], "note": "所有的聲音都有老師，唯有沉默是自學的。"}, {"title": "備忘錄", "author": "夏宇", "body": ["備忘錄第一條", "不要忘記忘記", "備忘錄第二條", "不要記得記得", "", "備忘錄第三條", "以上兩條都忘了也沒關係"], "note": "最好的備忘錄，是連備忘錄本身都忘掉。"}, {"title": "連連看", "author": "夏宇", "body": ["從你的眼睛連到星星", "從星星連到海", "從海連到一滴眼淚", "從眼淚連到微笑", "", "從微笑連到沉默", "連完了才發現", "畫出來的是你的臉"], "note": "連連看畫到最後，所有的線條都是你的輪廓。"}, {"title": "擁抱", "author": "夏宇", "body": ["擁抱是兩個人", "用身體寫的一個字", "那個字沒有人會唸", "", "但所有的人都看得懂", "它的意思是——", "我暫時還捨不得放手"], "note": "擁抱是不需要認字就讀得懂的語言。"}, {"title": "失蹤的象", "author": "夏宇", "body": ["一頭象從動物園走失了", "牠走過整座城市", "沒有人發現", "", "因為城市裏的人都太忙了", "忙到看不見", "一頭灰色的大象在灰色的街上走"], "note": "城市太灰了，連走失的象也灰得看不見。"}, {"title": "星期天適合告白", "author": "陳克華", "body": ["星期天適合告白", "因為被拒絕了", "還有六天可以復原", "", "但如果成功了呢", "那就用剩下的六天", "慢慢開始緊張"], "note": "告白選星期天，是為失敗預留復原的時間。"}, {"title": "善男子", "author": "陳克華", "body": ["善男子你的眼淚", "是世界上最鹹的海", "你把它們收進瓶子裏", "", "標上日期貼上標籤", "放在書架的最高層", "和那些不再翻閱的書在一起"], "note": "眼淚裝瓶放在書架最高處，和不再翻的書作伴。"}, {"title": "我撿到一顆頭顱", "author": "陳克華", "body": ["我撿到一顆頭顱", "在海邊在退潮之後", "它的眼窩裏有兩個小水窪", "", "水窪裏映著天空", "天空裏有一朵雲", "雲的形狀像一顆完整的頭顱"], "note": "頭顱裏映著天空，天空裏映著頭顱，互相盛裝。"}, {"title": "都市之肺", "author": "陳克華", "body": ["公園是都市的肺", "吸進廢氣呼出綠蔭", "而我坐在長椅上", "", "像肺裏的一粒塵", "安靜地沉澱", "等下一陣風把我吹起"], "note": "人是都市之肺裏的一粒塵，等風來決定方向。"}, {"title": "給B的情詩", "author": "陳克華", "body": ["給你寫一首詩", "用所有我不擅長的比喻", "月亮像你你像月亮", "", "算了這比喻太舊了", "不如直說", "想你"], "note": "比喻用盡，不如直說兩個字：想你。"}, {"title": "水色", "author": "管管", "body": ["水是沒有顏色的", "但你看看那條河", "早上是金的中午是銀的", "傍晚是一條銅做的蛇", "", "水的顏色是時間給的", "就像人的表情", "是經歷給的"], "note": "水的顏色是借來的，正如人的表情是經歷給的。"}, {"title": "燃燒的臉", "author": "管管", "body": ["秋天來了", "所有的樹都在燃燒", "用紅色和黃色", "", "我站在樹下", "臉也跟著燃燒起來", "像一片最後的楓葉"], "note": "秋天的樹在燃燒，站在樹下的人也跟著著了火。"}, {"title": "荒蕪之歌", "author": "管管", "body": ["荒蕪的土地上長出了一朵花", "它不知道自己有多勇敢", "只是按時開按時謝", "", "路過的人看了一眼", "說好美", "花不知道美是什麼意思"], "note": "最勇敢的花不知道自己勇敢，最美的花不懂美。"}, {"title": "瓶中信", "author": "管管", "body": ["我把一首詩摺好", "放進空瓶裏", "扔進太平洋", "", "如果你在對岸撿到了", "請不要回信", "因為我已經把所有的話說完了"], "note": "瓶中信不需要回覆，因為全部的話都在那一首詩裏了。"}, {"title": "鳥籠", "author": "管管", "body": ["鳥飛走了", "籠子還在", "門開著像一張驚訝的嘴", "", "風吹進來又吹出去", "住進了一陣風", "比鳥安靜比鳥自由"], "note": "鳥飛走後，風住了進來——比鳥更安靜也更自由。"}, {"title": "流浪的詩句", "author": "渡也", "body": ["一句詩從稿紙上逃走了", "它搭上了末班的公車", "坐在最後一排靠窗的位子", "", "看著窗外的路燈一盞盞退去", "它想去找一個", "願意把它讀完的人"], "note": "流浪的詩句搭末班車，只為找一個願意讀完它的人。"}, {"title": "永遠的蝴蝶", "author": "渡也", "body": ["你穿過街道的時候", "彷彿一隻白色的蝴蝶", "穿過了一場雨", "", "然後你消失在對街的人羣中", "像蝴蝶消失在花叢裏", "我還站在原地淋著雨"], "note": "你像蝴蝶穿過雨消失了，我還在原地淋著。"}, {"title": "讀書", "author": "渡也", "body": ["讀一本書像走進一座森林", "有時候迷路有時候遇見鹿", "有時候什麼也沒遇見", "", "但走出來的時候", "身上總帶著一股", "松木的香氣"], "note": "走出書本的人，身上總有松木的香氣。"}, {"title": "中年", "author": "渡也", "body": ["到了中年才知道", "人生是一本越讀越薄的書", "前半本已經翻過去了", "", "後半本的頁碼越來越少", "但每一頁的字", "比從前更重了"], "note": "中年的書頁更少了，但每個字都比從前更重。"}, {"title": "下午茶", "author": "渡也", "body": ["下午三點半", "世界安靜得像一杯放涼的茶", "糖沉在杯底", "甜蜜需要攪一攪才會出來", "", "人生也是這樣", "好的東西都沉在底下", "需要耐心"], "note": "甜蜜沉在杯底，好日子需要攪一攪才嚐得到。"}, {"title": "雁", "author": "白萩", "body": ["我們仍然活著仍然要飛行", "在無邊際的天空", "地平線長久在遠處退縮地引逗著我們", "", "活著就為了追趕地平線", "而地平線永遠", "在一步之外"], "note": "活著就是追地平線，它永遠在一步之外誘你前行。"}, {"title": "流浪者", "author": "白萩", "body": ["把自己摺成一隻紙船", "放在命運的水面上", "順流而下不問方向", "", "風來了就偏左", "雨來了就偏右", "最後在一個陌生的岸邊停下"], "note": "紙船不問方向，但每個停泊處都是命運的安排。"}, {"title": "天空", "author": "白萩", "body": ["天空是一張藍色的紙", "白雲是還沒寫的字", "飛鳥是已經寫好的標點", "", "而夕陽是最後的簽名", "蓋在一天的結尾", "像一枚金色的印章"], "note": "夕陽是天空蓋在一天結尾的金色印章。"}, {"title": "世界的邊緣", "author": "白萩", "body": ["站在世界的邊緣往下看", "看見的不是深淵", "是另一個世界的天空", "", "原來掉下去", "也是一種飛翔", "只是方向不同"], "note": "掉下去也是飛翔，只是方向朝另一個天空。"}, {"title": "詩的葬禮", "author": "白萩", "body": ["一首寫壞了的詩", "被揉成紙團扔進字紙簍", "它在黑暗中慢慢展開", "", "像一朵夜裏開的花", "雖然沒有人看見", "它還是開了"], "note": "被揉皺的詩在黑暗裏展開，像無人看見也要開的花。"}, {"title": "都市之死", "author": "羅門", "body": ["都市在霓虹燈裏死去", "死得五彩繽紛", "每一盞燈都是一朵電子的花", "", "開在鋼鐵的枝椏上", "而夜裏走過的人", "是一羣趕赴喪禮的螢火蟲"], "note": "霓虹燈是都市華麗的喪花，行人是趕赴喪禮的螢火蟲。"}, {"title": "窗外無人", "author": "羅門", "body": ["窗是牆的傷口", "光從傷口進來", "照亮了房間裏的灰塵", "", "灰塵在光束裏跳舞", "像一羣快樂的囚犯", "在放風時間裏盡情旋轉"], "note": "光從牆的傷口進來，灰塵便開始了它們的舞會。"}, {"title": "麥堅利堡", "author": "羅門", "body": ["那些年輕的名字刻在石碑上", "風吹過時字跡微微震動", "像他們還在呼吸", "", "每一行字是一條生命", "走到石碑這裏就停了", "永遠留在二十歲的春天"], "note": "石碑上的名字永遠停在二十歲，風吹過像還在呼吸。"}, {"title": "觀海", "author": "羅門", "body": ["海的意思是", "把所有的藍集中在一起", "然後不停地翻動", "", "翻了幾億年", "也沒有翻到底", "底下藏著什麼只有海知道"], "note": "海翻了幾億年都沒翻到底，祕密比深度更深。"}, {"title": "第九日的底流", "author": "羅門", "body": ["第九日了水退了", "但底流還在暗處奔走", "像一個不肯離開的幽靈", "", "表面的平靜是假的", "真正的力量都在看不見的地方", "默默地改變河牀的方向"], "note": "水面平靜是假象，底流在暗處默默改變一切。"}, {"title": "歸航", "author": "鄭愁予", "body": ["港口的燈塔還亮著", "像母親留的一盞燈", "船在霧裏慢慢靠岸", "", "纜繩拋出去的瞬間", "所有的浪都安靜了", "歸來比出發更需要勇氣"], "note": "歸航時的寂靜，比出航時的浪濤更動人。"}, {"title": "河畔墓園", "author": "洛夫", "body": ["河水從墓園旁流過", "帶走了花瓣留下了石碑", "碑上的字被雨水洗了又洗", "", "洗到最後只剩兩個字", "一個是生一個是死", "中間那條橫線是河"], "note": "生與死之間的橫線，原來是一條流不盡的河。"}, {"title": "一切", "author": "北島", "body": ["一切都是命運，", "一切都是煙雲，", "一切都是沒有結局的開始，", "一切都是稍縱即逝的追尋。", "", "一切歡樂都沒有微笑，", "一切苦難都沒有淚痕，", "一切語言都是重複，", "一切交往都是初逢。"], "note": "虛無中仍閃爍著不屈的凝視。"}, {"title": "宣告", "author": "北島", "body": ["也許最後的時刻到了，", "我沒有留下遺囑，", "只留下筆，給我的母親。", "", "我並不是英雄，", "在沒有英雄的年代裏，", "我只想做一個人。", "", "寧靜的地平線，", "分開了生者和死者的行列，", "我只能選擇天空，", "決不跪在地上，", "以顯出劊子手們的高大。"], "note": "站立本身即是一種宣告。"}, {"title": "結局或開始", "author": "北島", "body": ["我，站在這裏，", "代替另一個被殺害的人，", "沒有別的選擇，", "在我倒下的地方，", "將會有另一個人站起。", "", "我的肩上是風，", "風上是閃爍的星羣，", "也許有一天，", "太陽變成了萎縮的花環，", "垂放在每一個不屈的戰士的墓前。"], "note": "結局與開始是同一枚硬幣的兩面。"}, {"title": "雨夜", "author": "北島", "body": ["當一切都已過去，", "我回頭凝望，", "雨夜將成為大廳，", "我來回踱步，", "我的皮鞋叩響地板，", "如同敲一面小鼓。", "", "我對這場合似乎並不陌生，", "雨水帶來的刺激早已消失。"], "note": "記憶像雨水浸潤夜的地板。"}, {"title": "迷途", "author": "北島", "body": ["沿著鴿子的哨音，", "我尋找著你，", "高高的森林擋住了天空，", "小路上一棵迷途的蒲公英，", "把我引向藍灰色的湖泊。", "", "在微微傾斜的湖面上，", "我看見了你的影子。"], "note": "迷途也是一種抵達。"}, {"title": "古寺", "author": "北島", "body": ["消失的鐘聲，", "結成蛛網，在裂縫的柱子裏，", "擴散成一圈圈的年輪。", "", "沒有過去沒有未來，", "只有蜘蛛在織網。"], "note": "古寺裏時間凝固為蛛絲。"}, {"title": "觸電", "author": "北島", "body": ["我曾和一個無形的人握手，", "一聲慘叫之後，", "我的手，", "被磁石般攫住。", "", "指間的電流，", "使大地微微顫抖。"], "note": "觸碰真相時總會有疼痛。"}, {"title": "紅帆船", "author": "北島", "body": ["到處都是殘垣斷壁，", "路，怎麼從腳下延伸？", "石頭，碎了，碎了，", "像一羣白鴿在天空中消失。", "", "我看見一艘紅帆船，", "駛向落日。"], "note": "廢墟之上仍有遠航的勇氣。"}, {"title": "履歷", "author": "北島", "body": ["我曾正步走過廣場，", "剃光腦袋做作乖順，", "用心靈對燃燒的旗幟，", "致以崇高的敬禮。", "", "後來我才知道，", "那些光是別人的，", "只有黑暗屬於我自己。"], "note": "認領黑暗是覺醒的開始。"}, {"title": "走吧", "author": "北島", "body": ["走吧，", "落葉吹進深谷，", "歌聲卻沒有歸宿。", "", "走吧，", "冰上的月光，", "已從河牀上溢出。", "", "走吧，", "我們沒有失去記憶，", "我們去尋找生命的湖。"], "note": "行走本身就是方向。"}, {"title": "日子", "author": "北島", "body": ["用抽屜鎖住自己的祕密，", "在日記本的最後一頁，", "大聲朗讀著明天的約會。", "", "日子像一隻只空碗，", "碰在一起就有了聲響。"], "note": "平凡的日子也有回聲。"}, {"title": "一束", "author": "北島", "body": ["在我和世界之間，", "你是海灣，是帆，", "是纜繩忠實的兩端。", "你是噴泉，是風，", "是童年清脆的呼喊。", "", "在我和世界之間，", "你是一束光。"], "note": "你是我與世界之間最明亮的連結。"}, {"title": "很多年", "author": "北島", "body": ["很多年，像忍受著什麼，", "我們默默地坐在牆角裏。", "門開了，一個人走進來，", "抖落一身的月光。", "", "很多年，像等待著什麼，", "我們在黑暗中並肩站立。"], "note": "等待本身已是漫長的信仰。"}, {"title": "黃昏：丁家灘", "author": "北島", "body": ["山貓竄過荒蕪的田野，", "斷牆內黃昏在徘徊，", "幾隻灰鴿在房脊上起落，", "菜園已開始荒蕪。", "", "一個老人抖抖索索地走過，", "在昏暗中把門關上。"], "note": "黃昏收容了所有的荒涼。"}, {"title": "八月的夢遊者", "author": "北島", "body": ["從前的夢已不可尋覓，", "八月的夢遊者光著腳丫，", "踩過碎玻璃般的星光。", "", "拐角處一盞路燈孤懸，", "把他的影子拉得很長。"], "note": "夢遊者在星光碎片中行走。"}, {"title": "時間的玫瑰", "author": "北島", "body": ["當守門人沉睡，", "你和風暴一起轉身，", "擁抱中老去的是時間的玫瑰。", "", "當鳥路界定天空，", "你回望那落日，", "消失中呈現的是時間的玫瑰。"], "note": "時間在消逝中綻放。"}, {"title": "零度以上的風景", "author": "北島", "body": ["一棵樹在另一棵樹上，", "一片雲在另一片雲上，", "在零度以上的風景裏，", "我們相遇了。", "", "語言在對岸，", "沉默在此岸。"], "note": "零度以上的遇見自帶溫度。"}, {"title": "歧路行", "author": "北島", "body": ["叉路口我停下來，", "辨認著覆蓋積雪的路標。", "一隻烏鴉飛過，", "帶走了我的遲疑。", "", "我選了那條更荒涼的路。"], "note": "選擇荒涼即是選擇自由。"}, {"title": "關於傳統", "author": "北島", "body": ["一扇門的開關之間，", "幾代人的呼吸留在門把手上。", "風從窗口灌入，", "翻動桌上的紙頁。", "", "傳統在風中飄散，", "又在手指間重新聚攏。"], "note": "傳統不在典籍裏，在呼吸的溫度中。"}, {"title": "這也是一切", "author": "舒婷", "body": ["不是一切大樹都被暴風折斷，", "不是一切種子都找不到生根的土壤，", "不是一切真情都流失在人心的沙漠裏，", "不是一切夢想都甘願被折掉翅膀。", "", "不，不是一切都像你說的那樣！", "", "一切的現在都孕育著未來，", "未來的一切都生長於它的昨天。"], "note": "對絕望最有力的回答是「不」。"}, {"title": "會唱歌的鳶尾花", "author": "舒婷", "body": ["我的憂傷因為你的照耀，", "升起成為一簇花焰。", "我的身體裏有一棵鳶尾花，", "它會在你的注視下開口歌唱。", "", "你聽，那是風在替它發聲，", "還是我心裏的迴音？"], "note": "被凝視的花朵會唱出心事。"}, {"title": "祖國啊我親愛的祖國", "author": "舒婷", "body": ["我是你河邊上破舊的老水車，", "數百年來紡著疲憊的歌；", "我是你額上燻黑的礦燈，", "照你在歷史的隧洞裏蝸行摸索。", "", "我是你雪被下古蓮的胚芽；", "我是你掛著眼淚的笑渦。", "——祖國啊！"], "note": "愛是從苦難中長出的古蓮。"}, {"title": "往事二三", "author": "舒婷", "body": ["一隻打翻的酒盞，", "石路在月光下閃閃發亮。", "青蛙蹲在荷葉上呱呱叫著，", "扇動了一塘的清涼。", "", "往事就是這麼簡單。"], "note": "往事不過是月下打翻的一盞酒。"}, {"title": "思念", "author": "舒婷", "body": ["一幅色彩繽紛但缺乏線條的掛圖，", "一題清純然而無解的代數，", "一具我在海誓山盟裏夢想的花崗巖雕塑，", "", "思念呵，以我忠誠的心。"], "note": "思念是一道永遠無解的題。"}, {"title": "惠安女子", "author": "舒婷", "body": ["野火在遠方，遠方——", "在你琥珀色的眼睛裏。", "天生不愛傾訴苦難，", "並非苦難已經永遠絕跡。", "", "你把花頭巾一角輕輕咬在嘴裏，", "這樣優美地站在海天之間。"], "note": "沉默是最優美的堅強。"}, {"title": "日光巖下的三角梅", "author": "舒婷", "body": ["是喜歡這日光巖的陽光呢，", "還是喜歡這日光巖的風？", "你這麼熱烈地開著，", "把石頭都映紅了。", "", "一年四季你都這麼瘋狂嗎？"], "note": "熱烈地活，把石頭都映紅。"}, {"title": "初春", "author": "舒婷", "body": ["朋友，是春天了，", "驅散憂愁，揩去淚水。", "向前看，應該看見什麼？", "春天的蘆葦正冒出新芽。", "", "大地隱約的震動，", "是季節在轉換檔位。"], "note": "春天是大地換擋的聲音。"}, {"title": "饋贈", "author": "舒婷", "body": ["我的夢想是池塘的夢想，", "蓄滿了一池安靜的水，", "映一片天光雲影。", "", "我願分給每一個人，", "讓他們也有一小方水面，", "照見自己也照見天空。"], "note": "最好的饋贈是一方映照天空的靜水。"}, {"title": "中秋夜", "author": "舒婷", "body": ["今夜月色如許，", "我在窗前坐定，", "想著遠方的你。", "", "月亮不說話，", "卻比任何人都懂得圓缺。"], "note": "月亮用沉默說盡了離合。"}, {"title": "黃昏的夢", "author": "舒婷", "body": ["黃昏像一枚被遺忘的書籤，", "夾在今天和明天之間。", "風翻動了幾頁雲彩，", "露出星星的批語。", "", "我在這一頁上停留了太久。"], "note": "黃昏是時間遺落的書籤。"}, {"title": "四月的黃昏", "author": "舒婷", "body": ["四月的黃昏裏，", "樹木安靜地披上新綠。", "我推開窗，", "讓晚風進來打量這間屋子。", "", "我和它一樣，都在等待什麼。"], "note": "等待是四月黃昏最深的顏色。"}, {"title": "弧線", "author": "顧城", "body": ["鳥兒在疾風中，", "迅速轉向。", "", "少年去撿拾，", "一枚分幣。", "", "葡萄藤因幻想，", "而延伸的觸絲。", "", "海浪因退縮，", "而聳起的背脊。"], "note": "萬物的弧線裏藏著相同的猶豫。"}, {"title": "生命幻想曲", "author": "顧城", "body": ["把我的幻影和夢，", "放在狹長的貝殼裏。", "柳枝編成的船篷，", "還旋繞著夏蟲的長鳴。", "", "拉緊桅繩，", "風吹起花瓣如一場陣雨。"], "note": "幻想是駛向遠方的貝殼船。"}, {"title": "泡影", "author": "顧城", "body": ["兩個自由的水泡，", "從夢裏升起來了，", "它們輕輕地碰了一下，", "然後就破滅了。"], "note": "相觸即破滅，這是自由的代價。"}, {"title": "夢是一種願望", "author": "顧城", "body": ["夢是一種願望，", "想是一種孤獨。", "當夢中人醒來，", "身邊只有枕頭的溫度。", "", "願望比星星更遙遠，", "卻比心跳更真實。"], "note": "醒來後枕邊殘存的溫度便是夢。"}, {"title": "山影", "author": "顧城", "body": ["山影在水裏搖動，", "像很多條魚在遊動。", "", "忽然一顆小石子打碎了它們，", "小石子是我扔的，", "魚就再也沒有了。"], "note": "童真的破壞力比風暴更徹底。"}, {"title": "別", "author": "顧城", "body": ["在春天，", "你把手帕輕揮，", "是讓我遠去，", "還是馬上返回？", "", "不，什麼也不是。", "什麼也不因為。"], "note": "告別不需要理由，春風自知。"}, {"title": "安慰", "author": "顧城", "body": ["青青的野葡萄，", "淡黃的小月亮。", "媽媽發愁了：", "怎麼做果醬？", "", "我說：", "別加糖，在早晨的籬笆上，", "有一枚甜甜的紅太陽。"], "note": "孩子的眼睛裏太陽可以做果醬。"}, {"title": "田埂", "author": "顧城", "body": ["路是一條窄窄的田埂，", "兩邊種著水稻。", "我走在上面，", "像走在一道綠色的牆之間。", "", "風來了，", "兩邊的稻子都向我鞠躬。"], "note": "田埂上行走的人受到萬物的敬意。"}, {"title": "雨後", "author": "顧城", "body": ["嘀嗒嘀嗒，", "下雨啦。", "雨後的小路上，", "出現了一面小鏡子。", "", "一隻螞蟻在旁邊照了照，", "看見了天空。"], "note": "一窪雨水便是螞蟻的天空。"}, {"title": "星月的來由", "author": "顧城", "body": ["樹枝想去撕裂天空，", "卻只戳了幾個微小的窟窿，", "它透出了天外的光亮，", "人們把它叫做月亮和星星。"], "note": "所有的星光都是天空的傷口。"}, {"title": "面朝大海春暖花開", "author": "海子", "body": ["從明天起，做一個幸福的人，", "餵馬、劈柴，周遊世界。", "從明天起，關心糧食和蔬菜，", "我有一所房子，面朝大海，春暖花開。", "", "從明天起，和每一個親人通信，", "告訴他們我的幸福。", "那幸福的閃電告訴我的，", "我將告訴每一個人。"], "note": "幸福總在明天，而詩人永遠活在今天。"}, {"title": "日記", "author": "海子", "body": ["姐姐，今夜我在德令哈，", "這是雨水中一座荒涼的城。", "", "姐姐，今夜我只有戈壁。", "草原盡頭我兩手空空，", "悲痛時握不住一顆淚滴。", "", "姐姐，今夜我不關心人類，", "我只想你。"], "note": "荒涼到極處，思念最純粹。"}, {"title": "春天，十個海子", "author": "海子", "body": ["春天，十個海子全都復活，", "在光明的景色中，", "嘲笑這一野蠻而悲傷的海子。", "你這麼長久地沉睡到底是為了什麼？", "", "春天，十個海子低低地怒吼，", "圍著你和我跳舞，唱歌，", "扯亂你的黑頭髮，騎上你飛奔而去。"], "note": "春天復活的不是詩人，是他的分裂。"}, {"title": "麥地", "author": "海子", "body": ["喫麥子長大的，", "在月亮下端著大碗，", "碗內的月亮和麥子，", "一直沒有聲響。", "", "和你倆相愛以來，", "連麥地也已荒涼。"], "note": "麥地的沉默比任何言語更深重。"}, {"title": "亞洲銅", "author": "海子", "body": ["亞洲銅，亞洲銅，", "祖父死在這裏，父親死在這裏，", "我也將死在這裏。", "", "亞洲銅，亞洲銅，", "愛懷疑和愛飛翔的是鳥，", "淹沒一切的是海水。"], "note": "銅色大地上世代輪回的宿命。"}, {"title": "黑夜的獻詩", "author": "海子", "body": ["黑夜從大地上升起，", "遮住了光明的天空，", "豐收後荒涼的大地，", "黑夜從你內部上升。", "", "你從遠方來，我到遠方去，", "遙遠的路程經過這裏。", "天空一無所有，", "為何給我安慰。"], "note": "天空一無所有，卻給了最大的安慰。"}, {"title": "夜色", "author": "海子", "body": ["在夜色中，", "我有三次受難：流浪、愛情、生存。", "我有三種幸福：詩歌、王位、太陽。"], "note": "受難與幸福各有三重，恰好是一生。"}, {"title": "村莊", "author": "海子", "body": ["村莊裏住著母親和兒女，", "住著穀倉和馬匹。", "", "遠方只有在死亡中凝聚野花一片，", "明月如鏡，高懸草原。"], "note": "村莊是出發的地方也是歸不去的遠方。"}, {"title": "五月的麥地", "author": "海子", "body": ["全世界的兄弟們，", "要在麥地裏擁抱。", "東方，南方，北方和西方，", "麥地裏的四兄弟，好兄弟。", "", "回顧天空和黑夜，", "麥地泛著幽幽的光。"], "note": "麥地是兄弟們最後的教堂。"}, {"title": "四姐妹", "author": "海子", "body": ["荒涼的山岡上站著四姐妹，", "所有的風只向她們吹去，", "所有的日子都為她們破碎。", "", "荒涼的山岡上站著四姐妹，", "她們是空氣中飄動的旗幟。"], "note": "站在荒涼之上的人是風的旗幟。"}, {"title": "給我的孤獨", "author": "海子", "body": ["黑雨滴一樣的鳥羣，", "從黃昏飛入黑夜。", "黑夜一無所有，", "為何給我安慰。", "", "走在路上，放聲歌唱，", "大風刮過山崗，上面是無邊的天空。"], "note": "大風中歌唱的人擁有全部的天空。"}, {"title": "房屋", "author": "海子", "body": ["你在早上碰落的第一滴露水，", "肯定和你的愛人有關，", "你在中午飲馬，在一棵白樺樹下。", "", "而你的房屋如此沉靜，", "像一面湖水。"], "note": "房屋沉靜如湖，收容一天的露水。"}, {"title": "這是四點零八分的北京", "author": "食指", "body": ["這是四點零八分的北京，", "一片手的海浪翻動，", "這是四點零八分的北京，", "一聲尖厲的汽笛長鳴。", "", "我的心驟然一陣疼痛，一定是，", "媽媽綴釦子的針線穿透了心胸。", "這時，我的心變成了一隻風箏，", "風箏的線繩就在媽媽手中。"], "note": "離別的汽笛穿透了母親的針線。"}, {"title": "魚兒三部曲", "author": "食指", "body": ["自由的魚兒啊，", "水是你的天空，", "你在水中遊動，", "像鳥在空中飛翔。", "", "但你可知道，", "在你頭頂上那個更大的天空裏，", "也有一個更大的海洋？"], "note": "自由的邊界之外還有更大的自由。"}, {"title": "熱愛生命", "author": "食指", "body": ["也許我瘦弱的身軀像攀附的葛藤，", "把握不住自己命運的前程，", "那請在淒風苦雨中聽我的聲音，", "仍在反覆地低語：熱愛生命。", "", "也許經過人生激烈的搏鬥後，", "我死得比那湖水還要平靜。", "那請去墓地尋找我的碑文，", "上面仍會刻著：熱愛生命。"], "note": "碑文上最短的句子最有力量。"}, {"title": "瘋狗", "author": "食指", "body": ["受夠無情的戲弄之後，", "我不再把自己當人看，", "彷彿我成了一條瘋狗，", "漫無目的地遊蕩人間。", "", "我不怕人們向我投石塊，", "因為那些拾石塊的手同樣顫慄。"], "note": "被世界放逐的人看見了石頭背後的恐懼。"}, {"title": "命運", "author": "食指", "body": ["好的聲望是永遠找不開的鈔票，", "壞的名聲是永遠掙不脫的枷鎖。", "", "如果命運給了你一副好牌，", "你未必能贏。", "如果命運給了你一副壞牌，", "你也未必會輸。"], "note": "命運發的牌不如出牌的手重要。"}, {"title": "願望", "author": "食指", "body": ["我祈求爐火純青的技藝，", "能夠把失去的歲月提煉，", "提煉成一枚閃光的金幣，", "做為歷史永久的紀念。", "", "用失去的歲月鑄一枚金幣。"], "note": "時間在爐火裏可以成為金幣。"}, {"title": "落葉與大地", "author": "食指", "body": ["大地和落葉之間，", "有一段短短的距離。", "每一片落葉都想飛得更遠，", "可最終還是回到泥土裏。", "", "大地不說話，只張開懷抱。"], "note": "歸來不需要語言，大地自會接住。"}, {"title": "書簡", "author": "食指", "body": ["把信投入郵筒的時候，", "風正吹過十字路口。", "信封上歪歪扭扭的字跡，", "像醉漢走過的腳步。", "", "你收到信時，", "風大概已經停了。"], "note": "風停的時候思念剛好抵達。"}, {"title": "窗外", "author": "食指", "body": ["窗外是一棵老槐樹，", "它比我的年齡還大。", "夏天它替我擋住陽光，", "冬天替我擋住風沙。", "", "有一天我搬走了，", "不知道誰替它澆水。"], "note": "離開後最放心不下的是一棵樹。"}, {"title": "陽光中的向日葵", "author": "芒克", "body": ["你看到了嗎？", "你看到陽光中的那棵向日葵了嗎？", "你看它正朝著明亮的方向怒放——", "它把周圍的空氣都燃燒了。", "", "它周身金黃，", "不，是沸騰的金黃。"], "note": "向日葵不是追隨陽光，是自己燃燒。"}, {"title": "天空", "author": "芒克", "body": ["天空永遠是藍色的，", "像一塊磨損的鋼鐵。", "鳥羣飛過去，", "像鐵屑被磁石吸走。", "", "天空永遠是藍色的。"], "note": "天空的藍是一種磨損後的堅硬。"}, {"title": "冬天", "author": "芒克", "body": ["我們走在冰上面，", "像走在一面鏡子上。", "整個世界翻過了身，", "天空在我們的腳下流動。", "", "沒有什麼比倒影更真實。"], "note": "冬天把天空翻到了腳下。"}, {"title": "路上的月亮", "author": "芒克", "body": ["月亮在路上，", "被無數人踩過。", "它碎了又圓，", "圓了又碎。", "", "像一個忘不掉的承諾。"], "note": "月亮和承諾一樣在碎裂中反覆圓滿。"}, {"title": "白色的牆", "author": "芒克", "body": ["白色的牆上什麼也沒有，", "但我看見了所有的東西。", "一個人影晃過去了，", "把牆壁分成了兩半。", "", "一半是過去，一半是未來。"], "note": "白牆是時間最簡潔的分界線。"}, {"title": "手藝", "author": "多多", "body": ["我從未喚醒過死者的靈魂，", "也從未把活人送入地獄。", "我只是偶爾撫摸石頭，", "感到它溫暖如人的臉頰。", "", "這就是我全部的手藝。"], "note": "詩人的手藝不過是讓石頭有了溫度。"}, {"title": "瑪格麗特的北方", "author": "多多", "body": ["北方的天空落下一根羽毛，", "比雪還輕，比骨頭還白。", "瑪格麗特，你的歌聲在結冰，", "在河流的底部。", "", "北方睡著了，", "在羽毛之下。"], "note": "北方在一根羽毛下沉入夢境。"}, {"title": "致太陽", "author": "多多", "body": ["太陽，你每天升起，", "像一個不知疲倦的債主。", "你向大地索取影子，", "向河流索取倒影。", "", "我們欠你的光，", "一輩子都還不完。"], "note": "陽光是一筆永遠還不清的債。"}, {"title": "語言的夜晚", "author": "多多", "body": ["語言在夜晚變得沉重，", "像灌了鉛的翅膀。", "一個詞在窗臺上坐了很久，", "然後跳了下去。", "", "第二天早晨，", "地上開了一朵花。"], "note": "跳下窗臺的詞語在清晨開成花朵。"}, {"title": "秋日之歌", "author": "多多", "body": ["天空很高很藍，", "藍得讓人想哭。", "一片葉子轉了很多個圈，", "才落到了地上。", "", "它在找一個好位置躺下。"], "note": "落葉用旋轉的方式選擇最後的歸處。"}, {"title": "在哈爾蓋仰望星空", "author": "西川", "body": ["有一種神祕你無法駕馭，", "你只能充當旁觀者的角色。", "聽憑那神祕的力量，", "從你的指間滑過。", "", "在哈爾蓋，在這荒涼的高原上，", "一個夏天的夜晚，", "我抬頭仰望星空，", "莊嚴地等待著銀河的出現。"], "note": "在最荒涼的地方仰望最莊嚴的星空。"}, {"title": "夕光中的蝙蝠", "author": "西川", "body": ["有一隻蝙蝠在夕光中飛翔，", "它的路線不可預知。", "它把黃昏攪亂了，", "天空因此有了褶皺。", "", "我站在下面看著，", "學不會它的自由。"], "note": "蝙蝠的自由是把黃昏攪成褶皺。"}, {"title": "虛構的家譜", "author": "西川", "body": ["在我之前有過很多人，", "他們走過的路已被野草覆蓋。", "他們的聲音混在風裏，", "聽不出哪一句是遺言。", "", "我繼承了他們的沉默，", "卻找不到族譜。"], "note": "繼承沉默的人沒有族譜。"}, {"title": "讀一本書", "author": "西川", "body": ["讀一本書意味著你在別人的影子裏，", "走了一段路。", "合上書頁的那一刻，", "影子消失了，路還在。", "", "你站在路的中間，", "分不清去哪個方向。"], "note": "合上書便站在了無人的路中央。"}, {"title": "夠了", "author": "西川", "body": ["夠了，我不要再聽那些大話，", "不要史詩，不要紀念碑。", "給我一把椅子和一杯水就夠了，", "讓我安靜地坐著。", "", "讓風從窗口進來，", "翻動桌上僅有的幾頁紙。"], "note": "一把椅子一杯水便是全部的詩學。"}, {"title": "近景和遠景", "author": "西川", "body": ["近處是一棵歪脖子的樹，", "遠處是一列火車。", "火車穿過樹的枝椏，", "像線穿過了針眼。", "", "你在近景裏站了太久，", "遠景已經不認識你了。"], "note": "遠景和近景之間隔著一整個人生。"}, {"title": "暮色", "author": "西川", "body": ["暮色是從地面長出來的，", "不是從天上落下來的。", "它先淹沒了草，然後淹沒了樹，", "最後才淹沒了飛鳥。", "", "站在暮色裏的人，", "像站在齊腰深的水中。"], "note": "暮色是從大地生長出來的潮水。"}, {"title": "鷹的話語", "author": "西川", "body": ["鷹在山頂說了一句話，", "山谷回答了七遍。", "可是沒有人聽懂，", "包括鷹自己。", "", "有些話只適合在高處說，", "回聲比原話更動聽。"], "note": "高處的話語要靠回聲來理解。"}, {"title": "致敬", "author": "西川", "body": ["我向那些早起的人致敬，", "向磨刀的人和挑水的人致敬，", "向在路邊賣早點的女人致敬。", "", "他們的一天從霧氣裏開始，", "比太陽還早。"], "note": "比太陽更早醒來的人值得致敬。"}, {"title": "一個人老了", "author": "西川", "body": ["一個人老了，在煙鬥裏看到往事。", "一個人老了，在棋盤上想起了誰。", "一個人老了，把眼鏡擱在報紙上就睡著了。", "", "夢裏有人叫他的小名。"], "note": "老去不過是在夢裏重新變小。"}, {"title": "尚義街六號", "author": "于堅", "body": ["尚義街六號住著我們幾個朋友，", "喝啤酒，寫詩，拍桌子吵架，", "把燈泡搖得暈頭轉向。", "", "隔壁的鄰居已經習慣了我們，", "他們知道這只是一羣寫詩的人，", "不會傷害任何人。"], "note": "詩歌的據點不過是一間吵鬧的屋子。"}, {"title": "對一隻烏鴉的命名", "author": "于堅", "body": ["我叫它黑先生，", "它站在電線桿上不動。", "我叫它老黑，", "它還是不動。", "", "它不需要我的命名，", "它有自己的名字，只是不告訴我。"], "note": "烏鴉拒絕被命名，這是它的尊嚴。"}, {"title": "避雨的樹", "author": "于堅", "body": ["下雨了，我站在一棵大樹下面，", "樹替我擋住了雨。", "雨停了，陽光出來，", "樹上的水滴落在我頭上。", "", "樹在雨後才開始下雨。"], "note": "樹的雨比天空的雨來得更晚也更親近。"}, {"title": "一枚穿過天空的釘子", "author": "于堅", "body": ["飛機在天空中留下一道白線，", "像一枚釘子穿過藍色的布匹。", "", "過了一會兒，", "那道白線散了，", "布匹又恢復了完整。", "", "天空的傷口癒合得比人的快。"], "note": "天空是世界上自癒最快的布匹。"}, {"title": "事件", "author": "于堅", "body": ["一隻貓跳上了牆頭，", "蹲了一會兒就跳下去了。", "如果不是我剛好看見，", "這件事就不存在。", "", "世界上有多少事，", "因為沒有目擊者而不存在。"], "note": "沒有目擊者的事件等於從未發生。"}, {"title": "女人", "author": "翟永明", "body": ["我忽然感到萬分飢渴，", "彷彿所有的水都乾涸了。", "我的身體裏住著另一個女人，", "她比我更古老，更陌生。", "", "她在黑暗中伸出手來，", "握住了我的心。"], "note": "每個女人體內都住著更古老的自己。"}, {"title": "靜安莊", "author": "翟永明", "body": ["靜安莊的樹都老了，", "只有風還年輕。", "一個女人推開窗戶，", "像推開了一面鏡子。", "", "鏡子裏是二十年前的街道，", "和一個正在跑步的少女。"], "note": "窗戶是通向過去的鏡子。"}, {"title": "預感", "author": "翟永明", "body": ["在一切開始之前，", "我已經預感到了結局。", "像一滴水預感到大海，", "像種子預感到花的形狀。", "", "可是我還是走了進去，", "帶著全部的預感和天真。"], "note": "預知結局仍然走進去，這是勇氣。"}, {"title": "母親", "author": "翟永明", "body": ["母親的手像一片葉子，", "蓋在我的額頭上。", "退燒之後世界恢復原樣，", "只有她的手還帶著我的溫度。", "", "很多年後我才明白，", "那溫度是她給我的，不是我給她的。"], "note": "母親的手記住了每一次發燒的溫度。"}, {"title": "時間裏的話", "author": "翟永明", "body": ["我們說的那些話，", "有一些死在了空氣中，", "有一些落進了泥土裏。", "", "很多年以後，", "泥土裏長出了一棵樹，", "那棵樹在風中沙沙作響——", "像是在重複我們說過的什麼。"], "note": "話語落入泥土，多年後長成樹的聲音。"}, {"title": "1980年代的愛情", "author": "王小妮", "body": ["那時候我們什麼都沒有，", "只有大把的時間和一點點愛情。", "我們坐在河邊，", "看夕陽把河水染紅。", "", "現在我們什麼都有了，", "只是丟了那條河。"], "note": "丟掉的不是河，是坐在河邊的時間。"}, {"title": "我看見大風", "author": "王小妮", "body": ["我看見大風從田野上跑過來，", "它跑得比我快多了。", "它替我摸了每一棵莊稼的頭頂，", "替我翻動了每一頁書。", "", "大風是我派出去的，", "可它再也不回來了。"], "note": "大風是放出去就收不回的自由。"}, {"title": "白紙的內部", "author": "王小妮", "body": ["白紙的內部有什麼？", "是比白更白的白嗎？", "還是藏著無數的字，", "等著被一支筆喚醒。", "", "我把筆放上去的那一刻，", "白紙活了。"], "note": "白紙的內部藏著尚未出生的詩。"}, {"title": "月亮在做什麼", "author": "王小妮", "body": ["月亮今晚在做什麼？", "它大概在替那些失眠的人值班。", "它掛在窗外一動不動，", "像一個盡職的守夜人。", "", "可它自己也是孤獨的，", "從來沒有人替月亮值過班。"], "note": "替所有人值班的月亮無人替班。"}, {"title": "可能", "author": "王小妮", "body": ["可能我明天就不寫詩了，", "改去種菜或者養雞。", "可能那些雞比讀者更懂我的詩——", "它們至少會在我朗誦時安靜地聽。", "", "可能這就是詩人最好的下場。"], "note": "詩人最好的讀者可能是一羣安靜的雞。"}, {"title": "我用殘損的手掌", "author": "戴望舒", "body": ["我用殘損的手掌，", "摸索這廣大的土地：", "這一角已變成灰燼，", "那一角只是血和泥。", "", "這一片湖該是我的家鄉——", "嶺南的荔枝花寂寞地憔悴。", "", "手指沾了血和灰，", "手掌沾了陰暗。"], "note": "殘損的手掌觸到的是整個民族的傷口。"}, {"title": "蕭紅墓畔口占", "author": "戴望舒", "body": ["走六小時寂寞的長途，", "到你頭邊放一束紅山茶。", "我等待著，長夜漫漫，", "你卻臥聽著海濤閒話。"], "note": "六小時的路和一束紅山茶，已是最深的悼念。"}, {"title": "偶成", "author": "戴望舒", "body": ["如果生命的春天重到，", "古舊的凝冰都嘩嘩地解凍，", "那時我會再看見燦爛的微笑，", "再聽見明朗的呼喚——這些迢遙的夢。", "", "再握一握手吧，友人。"], "note": "冰融之日便是重逢之時。"}, {"title": "致螢火", "author": "戴望舒", "body": ["螢火蟲，螢火蟲，", "你來照我歸途的路。", "是天上的星太遠了，", "你來做一顆近處的星。", "", "多謝你殷勤的引路，", "在這黑暗的田野上。"], "note": "近處的一點螢火勝過遠處的滿天星。"}, {"title": "秋天的夢", "author": "戴望舒", "body": ["迢遙的牧女的羊鈴，", "搖落了輕的樹葉。", "秋天的夢是輕的，", "那是窈窕的牧女之戀。", "", "於是我的夢靜靜地來了，", "但卻載著沉重的昔日。"], "note": "秋夢雖輕卻載著沉重的昔日。"}, {"title": "我思想", "author": "戴望舒", "body": ["我思想，故我是蝴蝶……", "萬年後小花的輕呼，", "透過無夢無醒的雲霧，", "來振撼我斑斕的彩翼。"], "note": "思想的蝴蝶飛越萬年的雲霧。"}, {"title": "煩憂", "author": "戴望舒", "body": ["說是寂寞的秋的清愁，", "說是遼遠的海的相思。", "假如有人問我的煩憂，", "我不敢說出你的名字。"], "note": "不敢說出的名字是最深的煩憂。"}, {"title": "夜行者", "author": "戴望舒", "body": ["在黑暗中靜靜地徘徊，", "夜行者，你還認得歸路嗎？", "星星已經隱去了，", "而那些房屋都入了睡。", "", "你的腳步是唯一醒著的聲音。"], "note": "夜行者的腳步是黑暗裏唯一的清醒。"}, {"title": "獄中題壁", "author": "戴望舒", "body": ["如果我死在這裏，", "朋友啊，不要悲傷，", "我會永遠地生存，", "在你們的心上。", "", "當你們回來，從泥土掘起他傷損的肢體，", "用你們勝利的歡呼把他喚醒。"], "note": "泥土裏的人等待被勝利的歡呼喚醒。"}, {"title": "過舊居", "author": "戴望舒", "body": ["這裏住過一個在夢裏哭泣的人，", "這裏有他的窗，他的牀，", "他的衣架上還掛著舊衣裳。", "", "但是那個人已經走了，", "連影子也沒有留下。", "只留下窗前一盆枯了的花。"], "note": "舊居最忠實的記憶是一盆枯花。"}, {"title": "沙揚娜拉", "author": "徐志摩", "body": ["最是那一低頭的溫柔，", "像一朵水蓮花不勝涼風的嬌羞，——", "道一聲珍重，道一聲珍重，", "那一聲珍重裏有蜜甜的憂愁——", "沙揚娜拉！"], "note": "低頭的瞬間藏著蜜甜的憂愁。"}, {"title": "我不知道風是在哪一個方向吹", "author": "徐志摩", "body": ["我不知道風是在哪一個方向吹——", "我是在夢中，", "在夢的輕波裏依洄。", "", "我不知道風是在哪一個方向吹——", "我是在夢中，", "她的溫存，我的迷醉。"], "note": "不知風向的人活在最溫柔的迷醉裏。"}, {"title": "雪花的快樂", "author": "徐志摩", "body": ["假如我是一朵雪花，", "翩翩的在半空裏瀟灑，", "我一定認清我的方向——", "飛揚，飛揚，飛揚——", "", "在半空裏娟娟的飛舞，", "認明瞭那清幽的住處，", "等著她來花園裏探望——", "飛揚，飛揚，飛揚。"], "note": "雪花的方向是愛人的花園。"}, {"title": "翡冷翠的一夜", "author": "徐志摩", "body": ["你真的走了，明天？那我，那我，", "你也不用管，遲早有那一天；", "你願意記著我，就記著我，", "要不然趁早忘了這世界上有我。", "", "你先走吧，我在這裏看著你走。"], "note": "目送是比擁抱更漫長的告別。"}, {"title": "這是一個懦怯的世界", "author": "徐志摩", "body": ["這是一個懦怯的世界，", "容不得戀愛的存在，", "我們去吧！跟著白雲去，", "跟著白雲到天外。", "", "我們將花種在地上，", "看它們開出成片的繽紛。"], "note": "帶著愛情跟著白雲出走。"}, {"title": "生活", "author": "徐志摩", "body": ["陰沉，黑暗，毒蛇似的蜿蜒，", "生活逼成了一條甬道：", "一度陷入，你就只有向前——", "手捫著冷壁的潮濕，", "在妖魔的臟腑裏掙扎。"], "note": "生活是一條只能向前的甬道。"}, {"title": "月下待杜鵑不來", "author": "徐志摩", "body": ["看一回凝靜的橋影，", "數一數螺鈿的波紋，", "我倚暖了石欄的青苔，", "青苔涼透了我的心坎。", "", "月兒，你休學新娘羞，", "把錦被都遮了臉。"], "note": "等待落空後連月亮都在害羞。"}, {"title": "黃鸝", "author": "徐志摩", "body": ["一掠顏色飛上了樹，", "看，一隻黃鸝！", "聯想——禁止聯想！", "又一掠顏色飛了出去。", "", "它飛得那樣快，", "像是把所有的金色都帶走了。"], "note": "黃鸝飛過便帶走了全部的金色。"}, {"title": "死水", "author": "聞一多", "body": ["這是一溝絕望的死水，", "清風吹不起半點漪淪。", "不如多扔些破銅爛鐵，", "爽性潑你的剩菜殘羹。", "", "也許銅的要綠成翡翠，", "鐵罐上銹出幾瓣桃花。", "讓死水酵成一溝綠酒，", "飄滿了珍珠似的白沫。"], "note": "絕望到極致時生出了詭異的美。"}, {"title": "靜夜", "author": "聞一多", "body": ["這燈光漂白了的四壁，", "這賢良的桌椅，像殿堂。", "誰的呼吸在黑暗中發芽？", "誰的耳朵守著窗外的月光？", "", "靜夜裏我聽見了，", "遠處松樹林裏的風聲。"], "note": "靜夜裏呼吸在黑暗中發芽。"}, {"title": "太陽吟", "author": "聞一多", "body": ["太陽啊，刺得我心痛的太陽！", "又逼走了遊子的一出還鄉夢。", "太陽啊，火一樣燒著的太陽！", "烘乾了小草尖頭的露水。", "", "太陽啊，六龍驂駕的太陽！", "省得我受這般苦！"], "note": "異鄉的太陽刺痛了思鄉的心。"}, {"title": "一句話", "author": "聞一多", "body": ["有一句話說出就是禍，", "有一句話能點得著火。", "別看五千年沒有說破，", "你猜得透火山的緘默？", "", "說不定是突然著了魔，", "突然青天裏一個霹靂——", "咱們的中國！"], "note": "五千年的緘默裏藏著一句話的雷霆。"}, {"title": "也許", "author": "聞一多", "body": ["也許你真是哭得太累，", "也許，也許你要睡一睡，", "那麼叫夜鷹不要咳嗽，", "蛙不要號，蝙蝠不要飛。", "", "不許陽光撥你的眼簾，", "撐一傘松蔭庇護你睡。", "也許你聽這蚯蚓翻泥，", "聽這小草的根鬚吸水。"], "note": "最溫柔的葬歌是讓世界安靜下來。"}, {"title": "別丟掉", "author": "林徽因", "body": ["別丟掉，", "這一把過往的熱情，", "現在流水似的，輕輕，", "在幽冷的山泉底，", "在黑夜，在松林。", "", "嘆息似的渺茫，", "你仍要保存著那真。"], "note": "過往的熱情值得像山泉一樣保存。"}, {"title": "蓮燈", "author": "林徽因", "body": ["如果我的心是一朵蓮花，", "正中擎出一支點亮的蠟，", "熒熒雖則單是那一剪光，", "我也要它照徹太空。", "", "蓮花底部浮在水上，", "光照不到的是黑暗的水。"], "note": "一朵蓮燈的光也要照徹太空。"}, {"title": "誰愛這不息的變幻", "author": "林徽因", "body": ["誰愛這不息的變幻，", "她的行徑？", "催一陣急雨，抹一天雲霞，", "月亮，星光，日影。", "", "是誰在暗處哭泣？", "百花的冠冕你戴著，", "你是天真，莊嚴，你是夜夜的月圓。"], "note": "不息的變幻裏藏著天真與莊嚴。"}, {"title": "深笑", "author": "林徽因", "body": ["是誰笑成這百層塔高聳，", "讓不知名鳥雀來盤旋？", "是誰笑成這萬千星火閃爍，", "在深邃的穹蒼，等候黑夜的來臨？", "", "笑成一朵金色的蘑菇雲，", "從你嘴角升起。"], "note": "深笑是從嘴角升起的金色雲朵。"}, {"title": "距離的組織", "author": "卞之琳", "body": ["想獨上高樓讀一遍《羅馬衰亡史》，", "忽有羅馬滅亡星出現在報上。", "報上頭條要聞我看了看：", "我的手指沾了一點新聞紙的油墨。", "", "距離就這樣被組織起來了。"], "note": "指尖的油墨與羅馬的滅亡距離剛好。"}, {"title": "寂寞", "author": "卞之琳", "body": ["鄉下小孩子怕寂寞，", "枒杈著手指數天上的星。", "最後數到自己只有那一個了，", "便依了漁夫的建議把自己也投入其中。", "", "從此天上多了一顆星。"], "note": "把自己投入天空的孩子成了一顆星。"}, {"title": "圓寶盒", "author": "卞之琳", "body": ["我幻想在哪兒（天河裏？）", "撈到了一個圓寶盒，", "裏面有一面鏡子，", "鏡子照見了我的房間。", "", "房間裏有一個圓寶盒，", "寶盒裏有一面鏡子……"], "note": "無限嵌套的鏡子是宇宙的祕密。"}, {"title": "無題", "author": "卞之琳", "body": ["三日前山中的一道小水，", "掬你入口不凝手的冰冷，", "這泉水你挑來煮了茗吧？", "", "隔著茶的味道想到了山中——", "三日前那道小水的溫度。"], "note": "一杯茶裏藏著三天前山泉的溫度。"}, {"title": "十四行集（第一首）", "author": "馮至", "body": ["我們準備著深深地領受，", "那些意想不到的奇蹟，", "在漫長的歲月裏忽然有，", "彗星的出現，狂風乍起。", "", "我們的生命在這一瞬間，", "彷彿在第一次的擁抱裏，", "過去的悲歡忽然在眼前，", "凝結成屹然不動的形體。"], "note": "生命中最深的奇蹟來得毫無預兆。"}, {"title": "蛇", "author": "馮至", "body": ["我的寂寞是一條蛇，", "靜靜地沒有言語。", "你萬一夢到它時，", "千萬啊不要悚懼！", "", "它是我忠誠的侶伴，", "心裏害著熱烈的鄉思。"], "note": "寂寞像蛇一樣忠誠地陪伴左右。"}, {"title": "十四行集（第四首）", "author": "馮至", "body": ["我們經常度過無風的夜，", "也嚐過許多有風有雨的時刻。", "我們有時歡樂有時寂寞，", "還有些時候只是沉默。", "", "什麼都經歷了以後，", "眼前的風景不增不減。"], "note": "歷盡風雨後，風景不增不減。"}, {"title": "十四行集（第二十七首）", "author": "馮至", "body": ["從一片氾濫無形的水裏，", "取水人取來橢圓的一瓶。", "這點水就得到一個定形——", "看，木嬰花丟了影子在水裏。", "", "讓遠方的光來尋你的影子，", "它也會跳出瓶外找到你。"], "note": "被定形的水中仍然有影子的自由。"}, {"title": "南方的夜", "author": "馮至", "body": ["我們靜靜地坐在湖邊的岩石上，", "聽水聲重複著一種永恆的樂曲。", "遠處的蛙鳴和近處的蟲叫，", "組成了一支小小的合奏。", "", "南方的夜是溫暖的，", "像母親的手臂環著嬰孩。"], "note": "南方的夜溫暖如母親的臂彎。"}, {"title": "大堰河——我的保姆（節選）", "author": "艾青", "body": ["大堰河，是我的保姆。", "她的名字就是生她的村莊的名字，", "她是童養媳，", "大堰河，是我的保姆。", "", "我是地主的兒子，", "也是喫了大堰河的奶而長大了的，", "大堰河的兒子。", "大堰河，我是喫著你的奶長大了的。"], "note": "乳汁裏流淌的是比血緣更深的愛。"}, {"title": "雪落在中國的土地上", "author": "艾青", "body": ["雪落在中國的土地上，", "寒冷在封鎖著中國呀……", "", "風，像一個太悲哀了的老婦，", "緊緊地跟隨著，", "伸出寒冷的指爪，", "拉扯著行人的衣襟。", "", "雪落在中國的土地上，", "寒冷在封鎖著中國呀……"], "note": "雪封大地的寒冷是一個時代的體溫。"}, {"title": "太陽的話", "author": "艾青", "body": ["打開你們的窗子吧，", "打開你們的板門吧，", "讓我進去，讓我進去，", "進到你們的小屋裏。", "", "我帶著金黃的花束，", "我帶著林間的香氣，", "我帶著亮光和溫暖，", "我帶著滿身的露水。"], "note": "打開門窗，陽光會帶著露水走進來。"}, {"title": "光的讚歌（節選）", "author": "艾青", "body": ["每一個人都是一個生命，", "人世銀河星雲中的一粒微塵。", "每一粒微塵都有自己的能量，", "無數的微塵匯集成一片光明。", "", "每一個人都是一個生命，", "比所有的星星更有內在的光輝。"], "note": "每粒微塵的光匯聚起來便是星河。"}, {"title": "鏡子", "author": "艾青", "body": ["僅僅是一個平面，", "卻又深不可測。", "它最為真實，", "決不隱瞞缺點。", "", "它忠實於尋找它的人，", "誰都從中發現自己。"], "note": "鏡子忠實得讓人不敢對視。"}, {"title": "煤的對話", "author": "艾青", "body": ["你住在哪裏？", "我住在萬年的深山裏，", "我住在萬年的岩石裏。", "", "你的年紀——", "我的年紀比山的更大，", "比岩石的更大。", "", "你從什麼時候沉默的？", "從恐龍統治了森林的年代。"], "note": "煤的沉默始於恐龍的年代。"}, {"title": "樹", "author": "艾青", "body": ["一棵樹，一棵樹，", "彼此孤離地兀立著。", "風與空氣，", "告訴它們的距離。", "", "但是在泥土的覆蓋下，", "它們的根伸長著，", "在看不見的深處，", "它們把根鬚糾纏在一起。"], "note": "看不見的地方根鬚早已糾纏在一起。"}, {"title": "盼望", "author": "艾青", "body": ["一個海員說，", "他最喜歡的是起錨所激起的，", "那一片潔白的浪花……", "", "一個海員說，", "最使他高興的是拋錨所發出的，", "那一陣鐵鏈的喧譁……", "", "一個盼望出發，", "一個盼望到達。"], "note": "出發與到達是同一種盼望的兩端。"}, {"title": "魚化石", "author": "艾青", "body": ["動作多麼活潑，", "精力多麼旺盛，", "在浪花裏跳躍，", "在大海裏浮沉。", "", "不幸遇到了火山爆發，", "也可能是地震，", "你失去了自由，", "被埋進了灰塵。", "", "過了多少億年，", "地質勘探隊員在巖層裏發現你，", "依然栩栩如生。"], "note": "億年前的自由凝固成石頭裏的姿態。"}, {"title": "繁星（一）", "author": "冰心", "body": ["繁星閃爍著——", "深藍的太空，", "何曾聽得見他們對語？", "沉默中，", "微光裡，", "他們深深的互相頌讚了。"], "note": "星辰無語，卻以光芒訴說彼此的敬意。"}, {"title": "繁星（七）", "author": "冰心", "body": ["醒著的，", "只有孤憤的人罷！", "聽聲聲算命的鑼兒，", "敲破世人的命運。"], "note": "夜深人靜時，清醒反而是一種孤獨。"}, {"title": "繁星（一〇）", "author": "冰心", "body": ["嫩綠的芽兒，", "和青年說：", "「發展你自己！」", "淡白的花兒，", "和青年說：", "「貢獻你自己！」", "深紅的果兒，", "和青年說：", "「犧牲你自己！」"], "note": "生命的三個階段，是成長、綻放與奉獻。"}, {"title": "繁星（一三一）", "author": "冰心", "body": ["大海啊！", "哪一顆星沒有光？", "哪一朵花沒有香？", "哪一次我的思潮裡，", "沒有你波濤的清響？"], "note": "大海是詩人永恆的母親意象。"}, {"title": "春水（一）", "author": "冰心", "body": ["春水！", "又是一年了，", "還這般的微微吹動。", "可以再照個影兒麼？", "春水溫靜的答謝我說：", "「我的朋友！", "我從來沒拒絕過你。」"], "note": "春水年年不變，是自然最溫柔的承諾。"}, {"title": "春水（五）", "author": "冰心", "body": ["一道小河，", "平平蕩蕩的流將下去，", "只經過平沙萬裏——", "自由的，", "沉寂的，", "他沒有快樂的聲音。"], "note": "無波瀾的人生，未必是真正的自由。"}, {"title": "紙船", "author": "冰心", "body": ["我從不肯妄棄了一張紙，", "總是留著——留著，", "疊成一隻一隻很小的船兒，", "從舟上拋下在海裡。", "", "有的被天風吹捲到舟中的窗裡，", "有的被海浪打濕，沾在船頭上。", "我仍是不灰心的每天的疊著，", "總希望有一隻能流到我要他到的地方去。", "", "母親，倘若你夢中看見一隻很小的白船兒，", "不要驚訝他無端入夢——", "這是你至愛的女兒含著淚疊的，", "萬水千山，求他載著她的愛和悲哀歸去。"], "note": "紙船渡不了海，卻渡得了思念。"}, {"title": "成功的花", "author": "冰心", "body": ["成功的花，", "人們只驚羨她現時的明艷！", "然而當初她的芽兒，", "浸透了奮鬥的淚泉，", "灑遍了犧牲的血雨。"], "note": "每一朵盛開的花背後，都藏著無人知曉的辛酸。"}, {"title": "母親", "author": "冰心", "body": ["母親呵！", "天上的風雨來了，", "鳥兒躲到他的巢裡；", "心中的風雨來了，", "我只躲到你的懷裡。"], "note": "母親的懷抱是世間最安穩的避風港。"}, {"title": "繁星（七一）", "author": "冰心", "body": ["這些事——", "是永不漫滅的回憶：", "月明的園中，", "藤蘿的葉下，", "母親的膝上。"], "note": "最深的記憶，往往藏在最平凡的畫面裡。"}, {"title": "讚美", "author": "穆旦", "body": ["走不盡的山巒和起伏，河流和草原，", "數不盡的密密的村莊，雞鳴和狗吠，", "接連在原是荒涼的亞洲的土地上，", "在野草的茫茫中呼嘯著乾燥的風，", "", "我要以一切擁抱你，你，", "我到處看見的人民呵，", "在恥辱裡生活的人民，佝僂的人民，", "我要以帶血的手和你們一一擁抱。"], "note": "詩人以帶血的手擁抱苦難的大地。"}, {"title": "春", "author": "穆旦", "body": ["綠色的火焰在草上搖曳，", "他渴求著擁抱你，花朵。", "反抗著土地，花朵伸出來，", "當暖風吹來煩惱，或者歡樂。", "", "如果你是醒了，推開窗子，", "看這滿園的慾望多麼美麗。"], "note": "春天是大地壓抑不住的慾望。"}, {"title": "詩八首（其一）", "author": "穆旦", "body": ["你底眼睛看見這一場火災，", "你看不見我，雖然我為你點燃；", "唉，那燃燒著的不過是成熟的年代，", "你底，我底，我們相隔如重山。"], "note": "愛情是一場你看得見火光卻看不見縱火者的火災。"}, {"title": "詩八首（其二）", "author": "穆旦", "body": ["水流山石間沉澱下你我，", "而我們成長，在死底子宮裡。", "在無數的可能裡一個變形的生命，", "永遠不能完成他自己。"], "note": "生命在無數可能中掙扎，卻永遠是未完成的自己。"}, {"title": "詩八首（其五）", "author": "穆旦", "body": ["靜靜地，我們擁抱在", "用言語所能照明的世界裡，", "而那未形成的黑暗是可怕的，", "那可能和不可能的使我們沉迷。"], "note": "語言照亮的世界之外，是更遼闊的未知。"}, {"title": "冬", "author": "穆旦", "body": ["我愛在淡淡的太陽短命的日子，", "臨窗把喜愛的工作做完；", "纔到下午四點，便又冷又昏黃，", "我將用一杯酒灌溉我的心田。", "", "多麼快，人生已到嚴酷的冬天。"], "note": "冬日短暫如人生晚景，唯有一杯酒溫暖心田。"}, {"title": "我看", "author": "穆旦", "body": ["我看一陣向晚的春風，", "悄悄揉過豐潤的青草，", "我看它們低首又低首，", "也許遠水蕩起了一片綠潮。"], "note": "向晚的春風裡，藏著大地最柔軟的呼吸。"}, {"title": "葬歌", "author": "穆旦", "body": ["最後的顫慄屬於風，", "最後的芬芳屬於泥土，", "最後的骸骨在這裡，", "最後的，最後的痛苦。"], "note": "一切歸於塵土，連痛苦也終有盡頭。"}, {"title": "出發", "author": "穆旦", "body": ["告訴我們和平又必須戰鬥，", "而這是我們的，是不能選擇的，", "猶如我們的父母的結合，", "我們準備著深深地領受。"], "note": "命運無法選擇，但可以深深地領受。"}, {"title": "森林之魅", "author": "穆旦", "body": ["在青苔上落滿了雨珠，", "他摸過每一個潮濕的樹幹，", "在幽暗裡他從來沒看見，", "這些樹的盡頭是什麼。", "", "靜靜的，在那被遺忘的山坡上，", "還下著密雨，還吹著細風。"], "note": "森林深處的魅惑，是未知本身的召喚。"}, {"title": "老馬", "author": "臧克家", "body": ["總得叫大車裝個夠，", "他橫豎不說一句話，", "背上的壓力往肉裡扣，", "他把頭沉重地垂下！", "", "這刻不知道下刻的命，", "他有淚只往心裡咽，", "眼前飄來一道鞭影，", "他抬起頭望望前面。"], "note": "沉默的老馬，是千萬勞動者的縮影。"}, {"title": "三代", "author": "臧克家", "body": ["孩子，", "在土裡洗澡；", "爸爸，", "在土裡流汗；", "爺爺，", "在土裡埋葬。"], "note": "三代人的命運，都寫在同一片泥土上。"}, {"title": "難民", "author": "臧克家", "body": ["日頭墜到鳥巢裡，", "黃昏裡還趕路程。", "翻過的山頭座座，", "一個孩兒一聲哭。", "", "前面是條河，", "他們的腳步慢下了。"], "note": "流離失所的人，連黃昏都不敢停留。"}, {"title": "生命的零度", "author": "臧克家", "body": ["生命本沒有意義，", "你能給他什麼意義，", "他就有什麼意義。", "", "與其終日冥想人生有何意義，", "不如試用此生做點有意義的事。"], "note": "意義不是被發現的，而是被創造的。"}, {"title": "預言", "author": "何其芳", "body": ["這一個心跳的日子終於來臨！", "你夜的嘆息似的漸近的足音，", "我聽得清不是林葉和夜風的私語，", "麋鹿馳過苔徑的細碎的蹄聲。", "", "告訴我，用你銀鈴的歌聲告訴我，", "你是不是預言中的年輕的神？"], "note": "等待中的腳步聲，是命運最動聽的預言。"}, {"title": "秋天", "author": "何其芳", "body": ["震落了清晨滿披著的露珠，", "伐木聲丁丁地飄出幽谷。", "放下飽食過稻香的鎌刀，", "用背簍來裝竹籬間肥碩的瓜果。", "", "秋天棲息在農家裡。"], "note": "秋天最美的模樣，是農家豐收的喜悅。"}, {"title": "花環", "author": "何其芳", "body": ["開落在幽谷裡的花最香，", "無人記憶的朝露最有光。", "我說你是幸福的，小玲玲，", "沒有照過影子的小溪最清亮。"], "note": "最純粹的美，往往綻放在無人知曉處。"}, {"title": "生活是多麼廣闊", "author": "何其芳", "body": ["生活是多麼廣闊，", "生活是海洋。", "凡是有生活的地方就有快樂和寶藏。", "", "去參加歌詠隊，去演戲，", "去建設鐵路，去做飛行師，", "去坐在實驗室裡，去寫詩。"], "note": "生活的廣闊，在於你願意走多遠。"}, {"title": "夢後", "author": "何其芳", "body": ["我走過你夢中的花園，", "拾到你遺落的紅葉一片，", "上面寫著我們夢中的歡聚，", "醒來時只剩下淚眼模糊。"], "note": "夢醒後最殘忍的事，是記得夢裡的快樂。"}, {"title": "明天不散步了", "author": "木心", "body": ["明天不散步了，", "明天不散步了。", "", "風會停 雲會走，", "唯有我和落葉，", "永遠散步。"], "note": "即使停下腳步，心仍在散步的路上。"}, {"title": "我紛紛的情慾", "author": "木心", "body": ["我紛紛的情慾，", "像林中的羣鳥。", "一半明媚，一半憂傷。"], "note": "情慾如羣鳥，留不住也趕不走。"}, {"title": "眉目", "author": "木心", "body": ["林深時見鹿，", "海藍時見鯨。", "夢醒時見你。"], "note": "最美的相遇，都在最深處。"}, {"title": "借我", "author": "木心", "body": ["借我一個暮年，", "借我碎片，", "借我瞻前與顧後，", "借我執拗如少年。", "", "借我後天長成的先天，", "借我變如不曾改變。", "借我素淡的世故和明白的愚，", "借我可預知的險。", "", "借我悲懷的磊落，", "借我溫軟的魯莽和玩笑的莊嚴。", "借我最初與最終的不敢，", "借我不言而喻的不見。"], "note": "我們一生都在向歲月借那些回不去的東西。"}, {"title": "雲雀叫了一整天", "author": "木心", "body": ["雲雀叫了一整天，", "都是牠求偶的歌。", "你聽不出牠的焦急嗎？"], "note": "求而不得的焦急，連鳥鳴都藏不住。"}, {"title": "知與愛", "author": "木心", "body": ["你再不來，", "我要下雪了。"], "note": "等待到了極限，連心都要結冰了。"}, {"title": "論萬境", "author": "木心", "body": ["萬頭攢動火樹銀花之處不必找我。", "如欲相見，", "我在各種悲喜交集處，", "能做的事就只是長途跋涉的歸真返璞。"], "note": "繁華深處不見我，悲喜交集纔是歸處。"}, {"title": "哥倫比亞的倒影", "author": "木心", "body": ["凡是出於願望的事，", "不問結局如何，", "動機既是率真的，", "就只有率真可以為之註解。"], "note": "率真的動機，不需要結局來證明。"}, {"title": "大衛", "author": "木心", "body": ["他們說凡事要看得開，", "我早看開了。", "往哪裡看都是空的。", "", "他們說凡事要放得下，", "我早放下了。", "沒有什麼可以拿起。"], "note": "看開與放下，有時只是另一種空。"}, {"title": "素履之往", "author": "木心", "body": ["所謂無底深淵，", "下去，也是前程萬裏。"], "note": "深淵並不可怕，可怕的是不敢往下跳。"}, {"title": "同車人的啜泣", "author": "木心", "body": ["巷口有棵老樹，", "許多鳥在上面叫。", "童年一晃就過了。", "", "許多鳥又飛走了，", "老樹依然在。"], "note": "鳥飛了，人散了，只有老樹還記得一切。"}, {"title": "竹秀", "author": "木心", "body": ["五月將盡，", "六月的少女已在遠方。", "我不能去，", "我是五月的舊愁。"], "note": "五月的人，永遠追不上六月的風。"}, {"title": "夏明珠", "author": "木心", "body": ["我是一個在黑暗中大雪紛飛的人哪。", "你再不來，", "我要下雪了。"], "note": "孤獨的人，心裡永遠在下著大雪。"}, {"title": "杯弓蛇影之相", "author": "木心", "body": ["我好久沒有以小步緊跑去迎接一個人的那種快樂了。"], "note": "成年後最奢侈的快樂，是奔向一個人。"}, {"title": "雷聲與蟬鳴", "author": "也斯", "body": ["午後的雷聲在遠山響起，", "蟬在近處不停地叫。", "我坐在陽臺上讀一封信，", "讀完了又讀一遍。", "", "那些字跡慢慢模糊了，", "像雷聲一般遠去。"], "note": "有些話讀再多遍，也會像雷聲一樣遠去。"}, {"title": "中午在鰂魚湧", "author": "也斯", "body": ["街上的人羣散了又聚，", "午飯時間如此短暫。", "有人低頭看手機，", "有人在嚼著三明治趕路。", "", "太陽照在每個人的影子上，", "把每個人都縮得很小。"], "note": "城市的正午，每個人都被時間追趕。"}, {"title": "形象香港", "author": "也斯", "body": ["讓我習慣街上的速度，", "讓我學會在窄巷裡轉身。", "我們的城市如此擁擠，", "連夢也要排隊。"], "note": "在擁擠的城市裡，連夢都需要排隊。"}, {"title": "島和大陸", "author": "也斯", "body": ["這個島嶼太小了，", "裝不下一個完整的夢。", "但海浪不停地來，", "帶來遠方的消息。", "", "我在岸邊撿拾貝殼，", "每一個都有海的聲音。"], "note": "島嶼雖小，每一個貝殼都連著大海。"}, {"title": "蔬菜的政治", "author": "也斯", "body": ["一棵菜心從田裡到餐桌，", "經過了多少雙手。", "我們談論風味的時候，", "很少想起泥土的顏色。"], "note": "餐桌上的每一口，都有人在泥土裡彎腰。"}, {"title": "感冒", "author": "西西", "body": ["我的城市得了感冒，", "一直在咳嗽。", "街道發著燒，", "人們裹緊了外套。", "", "什麼時候才會好呢？", "喫藥也沒有用的時候。"], "note": "城市生病了，每個人都是症狀的一部分。"}, {"title": "旋轉木馬", "author": "西西", "body": ["我們坐在旋轉木馬上，", "以為在前進。", "音樂停了才發現，", "還在原來的地方。"], "note": "有時忙碌一生，不過是一場華麗的原地旋轉。"}, {"title": "浮城誌異", "author": "西西", "body": ["這座城市浮在水上，", "沒有人知道它的錨在哪裡。", "我們住在高樓裡，", "以為離地面很遠。", "", "其實是離天空很近，", "近得可以聽見雲的呼吸。"], "note": "浮城的人，離地越遠，離天越近。"}, {"title": "花木欄", "author": "西西", "body": ["把花種在陽臺上，", "讓它看看這城市。", "花開了，", "它大概覺得這城市比花盆還小。"], "note": "花的世界雖小，卻比城市更自在。"}, {"title": "動物園", "author": "西西", "body": ["星期天帶孩子去動物園，", "孩子看猴子，", "猴子看孩子，", "誰在籠子裡呢？", "", "回家的路上，", "孩子說：我也想住在動物園。"], "note": "自由與囚禁之間，只隔著一層目光。"}, {"title": "時間的聲音", "author": "鍾曼芬", "body": ["時間敲門的時候，", "我假裝不在家。", "它就從窗縫裡溜進來，", "在我的頭髮上留下記號。"], "note": "時間從不缺席，即使你假裝看不見。"}, {"title": "寫給海", "author": "鍾曼芬", "body": ["大海不需要我的詩，", "它自己就是一首。", "但我還是寫了——", "因為我需要大海。"], "note": "寫詩不是為了表達海，而是為了靠近海。"}, {"title": "夜讀", "author": "鍾曼芬", "body": ["翻過一頁又一頁，", "直到窗外發白。", "書裡的人還醒著，", "而我已經困了。", "", "把書蓋在臉上，", "和書裡的人一起入夢。"], "note": "夜讀到天
