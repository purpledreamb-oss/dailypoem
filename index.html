   "斷牆內黃昏在徘徊，",
   "幾隻灰鴿在房脊上起落，",
   "菜園已開始荒蕪。",
   "",
   "一個老人抖抖索索地走過，",
   "在昏暗中把門關上。"
  ],
  "note": "黃昏收容了所有的荒涼。"
 },
 {
  "title": "八月的夢遊者",
  "author": "北島",
  "body": [
   "從前的夢已不可尋覓，",
   "八月的夢遊者光著腳丫，",
   "踩過碎玻璃般的星光。",
   "",
   "拐角處一盞路燈孤懸，",
   "把他的影子拉得很長。"
  ],
  "note": "夢遊者在星光碎片中行走。"
 },
 {
  "title": "時間的玫瑰",
  "author": "北島",
  "body": [
   "當守門人沉睡，",
   "你和風暴一起轉身，",
   "擁抱中老去的是時間的玫瑰。",
   "",
   "當鳥路界定天空，",
   "你回望那落日，",
   "消失中呈現的是時間的玫瑰。"
  ],
  "note": "時間在消逝中綻放。"
 },
 {
  "title": "零度以上的風景",
  "author": "北島",
  "body": [
   "一棵樹在另一棵樹上，",
   "一片雲在另一片雲上，",
   "在零度以上的風景裏，",
   "我們相遇了。",
   "",
   "語言在對岸，",
   "沉默在此岸。"
  ],
  "note": "零度以上的遇見自帶溫度。"
 },
 {
  "title": "歧路行",
  "author": "北島",
  "body": [
   "叉路口我停下來，",
   "辨認著覆蓋積雪的路標。",
   "一隻烏鴉飛過，",
   "帶走了我的遲疑。",
   "",
   "我選了那條更荒涼的路。"
  ],
  "note": "選擇荒涼即是選擇自由。"
 },
 {
  "title": "關於傳統",
  "author": "北島",
  "body": [
   "一扇門的開關之間，",
   "幾代人的呼吸留在門把手上。",
   "風從窗口灌入，",
   "翻動桌上的紙頁。",
   "",
   "傳統在風中飄散，",
   "又在手指間重新聚攏。"
  ],
  "note": "傳統不在典籍裏，在呼吸的溫度中。"
 },
 {
  "title": "這也是一切",
  "author": "舒婷",
  "body": [
   "不是一切大樹都被暴風折斷，",
   "不是一切種子都找不到生根的土壤，",
   "不是一切真情都流失在人心的沙漠裏，",
   "不是一切夢想都甘願被折掉翅膀。",
   "",
   "不，不是一切都像你說的那樣！",
   "",
   "一切的現在都孕育著未來，",
   "未來的一切都生長於它的昨天。"
  ],
  "note": "對絕望最有力的回答是「不」。"
 },
 {
  "title": "會唱歌的鳶尾花",
  "author": "舒婷",
  "body": [
   "我的憂傷因為你的照耀，",
   "升起成為一簇花焰。",
   "我的身體裏有一棵鳶尾花，",
   "它會在你的注視下開口歌唱。",
   "",
   "你聽，那是風在替它發聲，",
   "還是我心裏的回音？"
  ],
  "note": "被凝視的花朵會唱出心事。"
 },
 {
  "title": "祖國啊我親愛的祖國",
  "author": "舒婷",
  "body": [
   "我是你河邊上破舊的老水車，",
   "數百年來紡著疲憊的歌；",
   "我是你額上熏黑的礦燈，",
   "照你在歷史的隧洞裏蝸行摸索。",
   "",
   "我是你雪被下古蓮的胚芽；",
   "我是你掛著眼淚的笑渦。",
   "——祖國啊！"
  ],
  "note": "愛是從苦難中長出的古蓮。"
 },
 {
  "title": "往事二三",
  "author": "舒婷",
  "body": [
   "一隻打翻的酒盞，",
   "石路在月光下閃閃發亮。",
   "青蛙蹲在荷葉上呱呱叫著，",
   "扇動了一塘的清涼。",
   "",
   "往事就是這麼簡單。"
  ],
  "note": "往事不過是月下打翻的一盞酒。"
 },
 {
  "title": "思念",
  "author": "舒婷",
  "body": [
   "一幅色彩繽紛但缺乏線條的掛圖，",
   "一題清純然而無解的代數，",
   "一具我在海誓山盟裏夢想的花崗岩雕塑，",
   "",
   "思念呵，以我忠誠的心。"
  ],
  "note": "思念是一道永遠無解的題。"
 },
 {
  "title": "惠安女子",
  "author": "舒婷",
  "body": [
   "野火在遠方，遠方——",
   "在你琥珀色的眼睛裏。",
   "天生不愛傾訴苦難，",
   "並非苦難已經永遠絕跡。",
   "",
   "你把花頭巾一角輕輕咬在嘴裏，",
   "這樣優美地站在海天之間。"
  ],
  "note": "沉默是最優美的堅強。"
 },
 {
  "title": "日光岩下的三角梅",
  "author": "舒婷",
  "body": [
   "是喜歡這日光岩的陽光呢，",
   "還是喜歡這日光岩的風？",
   "你這麼熱烈地開著，",
   "把石頭都映紅了。",
   "",
   "一年四季你都這麼瘋狂嗎？"
  ],
  "note": "熱烈地活，把石頭都映紅。"
 },
 {
  "title": "初春",
  "author": "舒婷",
  "body": [
   "朋友，是春天了，",
   "驅散憂愁，揩去淚水。",
   "向前看，應該看見什麼？",
   "春天的蘆葦正冒出新芽。",
   "",
   "大地隱約的震動，",
   "是季節在轉換檔位。"
  ],
  "note": "春天是大地換擋的聲音。"
 },
 {
  "title": "饋贈",
  "author": "舒婷",
  "body": [
   "我的夢想是池塘的夢想，",
   "蓄滿了一池安靜的水，",
   "映一片天光雲影。",
   "",
   "我願分給每一個人，",
   "讓他們也有一小方水面，",
   "照見自己也照見天空。"
  ],
  "note": "最好的饋贈是一方映照天空的靜水。"
 },
 {
  "title": "中秋夜",
  "author": "舒婷",
  "body": [
   "今夜月色如許，",
   "我在窗前坐定，",
   "想著遠方的你。",
   "",
   "月亮不說話，",
   "卻比任何人都懂得圓缺。"
  ],
  "note": "月亮用沉默說盡了離合。"
 },
 {
  "title": "黃昏的夢",
  "author": "舒婷",
  "body": [
   "黃昏像一枚被遺忘的書籤，",
   "夾在今天和明天之間。",
   "風翻動了幾頁雲彩，",
   "露出星星的批語。",
   "",
   "我在這一頁上停留了太久。"
  ],
  "note": "黃昏是時間遺落的書籤。"
 },
 {
  "title": "四月的黃昏",
  "author": "舒婷",
  "body": [
   "四月的黃昏裏，",
   "樹木安靜地披上新綠。",
   "我推開窗，",
   "讓晚風進來打量這間屋子。",
   "",
   "我和它一樣，都在等待什麼。"
  ],
  "note": "等待是四月黃昏最深的顏色。"
 },
 {
  "title": "弧線",
  "author": "顧城",
  "body": [
   "鳥兒在疾風中，",
   "迅速轉向。",
   "",
   "少年去撿拾，",
   "一枚分幣。",
   "",
   "葡萄藤因幻想，",
   "而延伸的觸絲。",
   "",
   "海浪因退縮，",
   "而聳起的背脊。"
  ],
  "note": "萬物的弧線裏藏著相同的猶豫。"
 },
 {
  "title": "生命幻想曲",
  "author": "顧城",
  "body": [
   "把我的幻影和夢，",
   "放在狹長的貝殼裏。",
   "柳枝編成的船篷，",
   "還旋繞著夏蟲的長鳴。",
   "",
   "拉緊桅繩，",
   "風吹起花瓣如一場陣雨。"
  ],
  "note": "幻想是駛向遠方的貝殼船。"
 },
 {
  "title": "泡影",
  "author": "顧城",
  "body": [
   "兩個自由的水泡，",
   "從夢裏升起來了，",
   "它們輕輕地碰了一下，",
   "然後就破滅了。"
  ],
  "note": "相觸即破滅，這是自由的代價。"
 },
 {
  "title": "夢是一種願望",
  "author": "顧城",
  "body": [
   "夢是一種願望，",
   "想是一種孤獨。",
   "當夢中人醒來，",
   "身邊只有枕頭的溫度。",
   "",
   "願望比星星更遙遠，",
   "卻比心跳更真實。"
  ],
  "note": "醒來後枕邊殘存的溫度便是夢。"
 },
 {
  "title": "山影",
  "author": "顧城",
  "body": [
   "山影在水裏搖動，",
   "像很多條魚在遊動。",
   "",
   "忽然一顆小石子打碎了它們，",
   "小石子是我扔的，",
   "魚就再也沒有了。"
  ],
  "note": "童真的破壞力比風暴更徹底。"
 },
 {
  "title": "別",
  "author": "顧城",
  "body": [
   "在春天，",
   "你把手帕輕揮，",
   "是讓我遠去，",
   "還是馬上返回？",
   "",
   "不，什麼也不是。",
   "什麼也不因為。"
  ],
  "note": "告別不需要理由，春風自知。"
 },
 {
  "title": "安慰",
  "author": "顧城",
  "body": [
   "青青的野葡萄，",
   "淡黃的小月亮。",
   "媽媽發愁了：",
   "怎麼做果醬？",
   "",
   "我說：",
   "別加糖，在早晨的籬笆上，",
   "有一枚甜甜的紅太陽。"
  ],
  "note": "孩子的眼睛裏太陽可以做果醬。"
 },
 {
  "title": "田埂",
  "author": "顧城",
  "body": [
   "路是一條窄窄的田埂，",
   "兩邊種著水稻。",
   "我走在上面，",
   "像走在一道綠色的牆之間。",
   "",
   "風來了，",
   "兩邊的稻子都向我鞠躬。"
  ],
  "note": "田埂上行走的人受到萬物的敬意。"
 },
 {
  "title": "雨後",
  "author": "顧城",
  "body": [
   "嘀嗒嘀嗒，",
   "下雨啦。",
   "雨後的小路上，",
   "出現了一面小鏡子。",
   "",
   "一隻螞蟻在旁邊照了照，",
   "看見了天空。"
  ],
  "note": "一窪雨水便是螞蟻的天空。"
 },
 {
  "title": "星月的來由",
  "author": "顧城",
  "body": [
   "樹枝想去撕裂天空，",
   "卻只戳了幾個微小的窟窿，",
   "它透出了天外的光亮，",
   "人們把它叫做月亮和星星。"
  ],
  "note": "所有的星光都是天空的傷口。"
 },
 {
  "title": "面朝大海春暖花開",
  "author": "海子",
  "body": [
   "從明天起，做一個幸福的人，",
   "餵馬、劈柴，周遊世界。",
   "從明天起，關心糧食和蔬菜，",
   "我有一所房子，面朝大海，春暖花開。",
   "",
   "從明天起，和每一個親人通信，",
   "告訴他們我的幸福。",
   "那幸福的閃電告訴我的，",
   "我將告訴每一個人。"
  ],
  "note": "幸福總在明天，而詩人永遠活在今天。"
 },
 {
  "title": "日記",
  "author": "海子",
  "body": [
   "姐姐，今夜我在德令哈，",
   "這是雨水中一座荒涼的城。",
   "",
   "姐姐，今夜我只有戈壁。",
   "草原盡頭我兩手空空，",
   "悲痛時握不住一顆淚滴。",
   "",
   "姐姐，今夜我不關心人類，",
   "我只想你。"
  ],
  "note": "荒涼到極處，思念最純粹。"
 },
 {
  "title": "春天，十個海子",
  "author": "海子",
  "body": [
   "春天，十個海子全都復活，",
   "在光明的景色中，",
   "嘲笑這一野蠻而悲傷的海子。",
   "你這麼長久地沉睡到底是為了什麼？",
   "",
   "春天，十個海子低低地怒吼，",
   "圍著你和我跳舞，唱歌，",
   "扯亂你的黑頭髮，騎上你飛奔而去。"
  ],
  "note": "春天復活的不是詩人，是他的分裂。"
 },
 {
  "title": "麥地",
  "author": "海子",
  "body": [
   "吃麥子長大的，",
   "在月亮下端著大碗，",
   "碗內的月亮和麥子，",
   "一直沒有聲響。",
   "",
   "和你倆相愛以來，",
   "連麥地也已荒涼。"
  ],
  "note": "麥地的沉默比任何言語更深重。"
 },
 {
  "title": "亞洲銅",
  "author": "海子",
  "body": [
   "亞洲銅，亞洲銅，",
   "祖父死在這裏，父親死在這裏，",
   "我也將死在這裏。",
   "",
   "亞洲銅，亞洲銅，",
   "愛懷疑和愛飛翔的是鳥，",
   "淹沒一切的是海水。"
  ],
  "note": "銅色大地上世代輪回的宿命。"
 },
 {
  "title": "黑夜的獻詩",
  "author": "海子",
  "body": [
   "黑夜從大地上升起，",
   "遮住了光明的天空，",
   "豐收後荒涼的大地，",
   "黑夜從你內部上升。",
   "",
   "你從遠方來，我到遠方去，",
   "遙遠的路程經過這裏。",
   "天空一無所有，",
   "為何給我安慰。"
  ],
  "note": "天空一無所有，卻給了最大的安慰。"
 },
 {
  "title": "夜色",
  "author": "海子",
  "body": [
   "在夜色中，",
   "我有三次受難：流浪、愛情、生存。",
   "我有三種幸福：詩歌、王位、太陽。"
  ],
  "note": "受難與幸福各有三重，恰好是一生。"
 },
 {
  "title": "村莊",
  "author": "海子",
  "body": [
   "村莊裏住著母親和兒女，",
   "住著穀倉和馬匹。",
   "",
   "遠方只有在死亡中凝聚野花一片，",
   "明月如鏡，高懸草原。"
  ],
  "note": "村莊是出發的地方也是歸不去的遠方。"
 },
 {
  "title": "五月的麥地",
  "author": "海子",
  "body": [
   "全世界的兄弟們，",
   "要在麥地裏擁抱。",
   "東方，南方，北方和西方，",
   "麥地裏的四兄弟，好兄弟。",
   "",
   "回顧天空和黑夜，",
   "麥地泛著幽幽的光。"
  ],
  "note": "麥地是兄弟們最後的教堂。"
 },
 {
  "title": "四姐妹",
  "author": "海子",
  "body": [
   "荒涼的山岡上站著四姐妹，",
   "所有的風只向她們吹去，",
   "所有的日子都為她們破碎。",
   "",
   "荒涼的山岡上站著四姐妹，",
   "她們是空氣中飄動的旗幟。"
  ],
  "note": "站在荒涼之上的人是風的旗幟。"
 },
 {
  "title": "給我的孤獨",
  "author": "海子",
  "body": [
   "黑雨滴一樣的鳥群，",
   "從黃昏飛入黑夜。",
   "黑夜一無所有，",
   "為何給我安慰。",
   "",
   "走在路上，放聲歌唱，",
   "大風刮過山崗，上面是無邊的天空。"
  ],
  "note": "大風中歌唱的人擁有全部的天空。"
 },
 {
  "title": "房屋",
  "author": "海子",
  "body": [
   "你在早上碰落的第一滴露水，",
   "肯定和你的愛人有關，",
   "你在中午飲馬，在一棵白樺樹下。",
   "",
   "而你的房屋如此沉靜，",
   "像一面湖水。"
  ],
  "note": "房屋沉靜如湖，收容一天的露水。"
 },
 {
  "title": "這是四點零八分的北京",
  "author": "食指",
  "body": [
   "這是四點零八分的北京，",
   "一片手的海浪翻動，",
   "這是四點零八分的北京，",
   "一聲尖厲的汽笛長鳴。",
   "",
   "我的心驟然一陣疼痛，一定是，",
   "媽媽綴扣子的針線穿透了心胸。",
   "這時，我的心變成了一隻風箏，",
   "風箏的線繩就在媽媽手中。"
  ],
  "note": "離別的汽笛穿透了母親的針線。"
 },
 {
  "title": "魚兒三部曲",
  "author": "食指",
  "body": [
   "自由的魚兒啊，",
   "水是你的天空，",
   "你在水中遊動，",
   "像鳥在空中飛翔。",
   "",
   "但你可知道，",
   "在你頭頂上那個更大的天空裏，",
   "也有一個更大的海洋？"
  ],
  "note": "自由的邊界之外還有更大的自由。"
 },
 {
  "title": "熱愛生命",
  "author": "食指",
  "body": [
   "也許我瘦弱的身軀像攀附的葛藤，",
   "把握不住自己命運的前程，",
   "那請在淒風苦雨中聽我的聲音，",
   "仍在反覆地低語：熱愛生命。",
   "",
   "也許經過人生激烈的搏鬥後，",
   "我死得比那湖水還要平靜。",
   "那請去墓地尋找我的碑文，",
   "上面仍會刻著：熱愛生命。"
  ],
  "note": "碑文上最短的句子最有力量。"
 },
 {
  "title": "瘋狗",
  "author": "食指",
  "body": [
   "受夠無情的戲弄之後，",
   "我不再把自己當人看，",
   "仿佛我成了一條瘋狗，",
   "漫無目的地遊蕩人間。",
   "",
   "我不怕人們向我投石塊，",
   "因為那些拾石塊的手同樣顫栗。"
  ],
  "note": "被世界放逐的人看見了石頭背後的恐懼。"
 },
 {
  "title": "命運",
  "author": "食指",
  "body": [
   "好的聲望是永遠找不開的鈔票，",
   "壞的名聲是永遠掙不脫的枷鎖。",
   "",
   "如果命運給了你一副好牌，",
   "你未必能贏。",
   "如果命運給了你一副壞牌，",
   "你也未必會輸。"
  ],
  "note": "命運發的牌不如出牌的手重要。"
 },
 {
  "title": "願望",
  "author": "食指",
  "body": [
   "我祈求爐火純青的技藝，",
   "能夠把失去的歲月提煉，",
   "提煉成一枚閃光的金幣，",
   "做為歷史永久的紀念。",
   "",
   "用失去的歲月鑄一枚金幣。"
  ],
  "note": "時間在爐火裏可以成為金幣。"
 },
 {
  "title": "落葉與大地",
  "author": "食指",
  "body": [
   "大地和落葉之間，",
   "有一段短短的距離。",
   "每一片落葉都想飛得更遠，",
   "可最終還是回到泥土裏。",
   "",
   "大地不說話，只張開懷抱。"
  ],
  "note": "歸來不需要語言，大地自會接住。"
 },
 {
  "title": "書簡",
  "author": "食指",
  "body": [
   "把信投入郵筒的時候，",
   "風正吹過十字路口。",
   "信封上歪歪扭扭的字跡，",
   "像醉漢走過的腳步。",
   "",
   "你收到信時，",
   "風大概已經停了。"
  ],
  "note": "風停的時候思念剛好抵達。"
 },
 {
  "title": "窗外",
  "author": "食指",
  "body": [
   "窗外是一棵老槐樹，",
   "它比我的年齡還大。",
   "夏天它替我擋住陽光，",
   "冬天替我擋住風沙。",
   "",
   "有一天我搬走了，",
   "不知道誰替它澆水。"
  ],
  "note": "離開後最放心不下的是一棵樹。"
 },
 {
  "title": "陽光中的向日葵",
  "author": "芒克",
  "body": [
   "你看到了嗎？",
   "你看到陽光中的那棵向日葵了嗎？",
   "你看它正朝著明亮的方向怒放——",
   "它把周圍的空氣都燃燒了。",
   "",
   "它周身金黃，",
   "不，是沸騰的金黃。"
  ],
  "note": "向日葵不是追隨陽光，是自己燃燒。"
 },
 {
  "title": "天空",
  "author": "芒克",
  "body": [
   "天空永遠是藍色的，",
   "像一塊磨損的鋼鐵。",
   "鳥群飛過去，",
   "像鐵屑被磁石吸走。",
   "",
   "天空永遠是藍色的。"
  ],
  "note": "天空的藍是一種磨損後的堅硬。"
 },
 {
  "title": "冬天",
  "author": "芒克",
  "body": [
   "我們走在冰上面，",
   "像走在一面鏡子上。",
   "整個世界翻過了身，",
   "天空在我們的腳下流動。",
   "",
   "沒有什麼比倒影更真實。"
  ],
  "note": "冬天把天空翻到了腳下。"
 },
 {
  "title": "路上的月亮",
  "author": "芒克",
  "body": [
   "月亮在路上，",
   "被無數人踩過。",
   "它碎了又圓，",
   "圓了又碎。",
   "",
   "像一個忘不掉的承諾。"
  ],
  "note": "月亮和承諾一樣在碎裂中反覆圓滿。"
 },
 {
  "title": "白色的牆",
  "author": "芒克",
  "body": [
   "白色的牆上什麼也沒有，",
   "但我看見了所有的東西。",
   "一個人影晃過去了，",
   "把牆壁分成了兩半。",
   "",
   "一半是過去，一半是未來。"
  ],
  "note": "白牆是時間最簡潔的分界線。"
 },
 {
  "title": "手藝",
  "author": "多多",
  "body": [
   "我從未喚醒過死者的靈魂，",
   "也從未把活人送入地獄。",
   "我只是偶爾撫摸石頭，",
   "感到它溫暖如人的臉頰。",
   "",
   "這就是我全部的手藝。"
  ],
  "note": "詩人的手藝不過是讓石頭有了溫度。"
 },
 {
  "title": "瑪格麗特的北方",
  "author": "多多",
  "body": [
   "北方的天空落下一根羽毛，",
   "比雪還輕，比骨頭還白。",
   "瑪格麗特，你的歌聲在結冰，",
   "在河流的底部。",
   "",
   "北方睡著了，",
   "在羽毛之下。"
  ],
  "note": "北方在一根羽毛下沉入夢境。"
 },
 {
  "title": "致太陽",
  "author": "多多",
  "body": [
   "太陽，你每天升起，",
   "像一個不知疲倦的債主。",
   "你向大地索取影子，",
   "向河流索取倒影。",
   "",
   "我們欠你的光，",
   "一輩子都還不完。"
  ],
  "note": "陽光是一筆永遠還不清的債。"
 },
 {
  "title": "語言的夜晚",
  "author": "多多",
  "body": [
   "語言在夜晚變得沉重，",
   "像灌了鉛的翅膀。",
   "一個詞在窗台上坐了很久，",
   "然後跳了下去。",
   "",
   "第二天早晨，",
   "地上開了一朵花。"
  ],
  "note": "跳下窗台的詞語在清晨開成花朵。"
 },
 {
  "title": "秋日之歌",
  "author": "多多",
  "body": [
   "天空很高很藍，",
   "藍得讓人想哭。",
   "一片葉子轉了很多個圈，",
   "才落到了地上。",
   "",
   "它在找一個好位置躺下。"
  ],
  "note": "落葉用旋轉的方式選擇最後的歸處。"
 },
 {
  "title": "在哈爾蓋仰望星空",
  "author": "西川",
  "body": [
   "有一種神秘你無法駕馭，",
   "你只能充當旁觀者的角色。",
   "聽憑那神秘的力量，",
   "從你的指間滑過。",
   "",
   "在哈爾蓋，在這荒涼的高原上，",
   "一個夏天的夜晚，",
   "我抬頭仰望星空，",
   "莊嚴地等待著銀河的出現。"
  ],
  "note": "在最荒涼的地方仰望最莊嚴的星空。"
 },
 {
  "title": "夕光中的蝙蝠",
  "author": "西川",
  "body": [
   "有一隻蝙蝠在夕光中飛翔，",
   "它的路線不可預知。",
   "它把黃昏攪亂了，",
   "天空因此有了褶皺。",
   "",
   "我站在下面看著，",
   "學不會它的自由。"
  ],
  "note": "蝙蝠的自由是把黃昏攪成褶皺。"
 },
 {
  "title": "虛構的家譜",
  "author": "西川",
  "body": [
   "在我之前有過很多人，",
   "他們走過的路已被野草覆蓋。",
   "他們的聲音混在風裏，",
   "聽不出哪一句是遺言。",
   "",
   "我繼承了他們的沉默，",
   "卻找不到族譜。"
  ],
  "note": "繼承沉默的人沒有族譜。"
 },
 {
  "title": "讀一本書",
  "author": "西川",
  "body": [
   "讀一本書意味著你在別人的影子裏，",
   "走了一段路。",
   "合上書頁的那一刻，",
   "影子消失了，路還在。",
   "",
   "你站在路的中間，",
   "分不清去哪個方向。"
  ],
  "note": "合上書便站在了無人的路中央。"
 },
 {
  "title": "夠了",
  "author": "西川",
  "body": [
   "夠了，我不要再聽那些大話，",
   "不要史詩，不要紀念碑。",
   "給我一把椅子和一杯水就夠了，",
   "讓我安靜地坐著。",
   "",
   "讓風從窗口進來，",
   "翻動桌上僅有的幾頁紙。"
  ],
  "note": "一把椅子一杯水便是全部的詩學。"
 },
 {
  "title": "近景和遠景",
  "author": "西川",
  "body": [
   "近處是一棵歪脖子的樹，",
   "遠處是一列火車。",
   "火車穿過樹的枝椏，",
   "像線穿過了針眼。",
   "",
   "你在近景裏站了太久，",
   "遠景已經不認識你了。"
  ],
  "note": "遠景和近景之間隔著一整個人生。"
 },
 {
  "title": "暮色",
  "author": "西川",
  "body": [
   "暮色是從地面長出來的，",
   "不是從天上落下來的。",
   "它先淹沒了草，然後淹沒了樹，",
   "最後才淹沒了飛鳥。",
   "",
   "站在暮色裏的人，",
   "像站在齊腰深的水中。"
  ],
  "note": "暮色是從大地生長出來的潮水。"
 },
 {
  "title": "鷹的話語",
  "author": "西川",
  "body": [
   "鷹在山頂說了一句話，",
   "山谷回答了七遍。",
   "可是沒有人聽懂，",
   "包括鷹自己。",
   "",
   "有些話只適合在高處說，",
   "回聲比原話更動聽。"
  ],
  "note": "高處的話語要靠回聲來理解。"
 },
 {
  "title": "致敬",
  "author": "西川",
  "body": [
   "我向那些早起的人致敬，",
   "向磨刀的人和挑水的人致敬，",
   "向在路邊賣早點的女人致敬。",
   "",
   "他們的一天從霧氣裏開始，",
   "比太陽還早。"
  ],
  "note": "比太陽更早醒來的人值得致敬。"
 },
 {
  "title": "一個人老了",
  "author": "西川",
  "body": [
   "一個人老了，在煙斗裏看到往事。",
   "一個人老了，在棋盤上想起了誰。",
   "一個人老了，把眼鏡擱在報紙上就睡著了。",
   "",
   "夢裏有人叫他的小名。"
  ],
  "note": "老去不過是在夢裏重新變小。"
 },
 {
  "title": "尚義街六號",
  "author": "于堅",
  "body": [
   "尚義街六號住著我們幾個朋友，",
   "喝啤酒，寫詩，拍桌子吵架，",
   "把燈泡搖得暈頭轉向。",
   "",
   "隔壁的鄰居已經習慣了我們，",
   "他們知道這只是一群寫詩的人，",
   "不會傷害任何人。"
  ],
  "note": "詩歌的據點不過是一間吵鬧的屋子。"
 },
 {
  "title": "對一隻烏鴉的命名",
  "author": "于堅",
  "body": [
   "我叫它黑先生，",
   "它站在電線桿上不動。",
   "我叫它老黑，",
   "它還是不動。",
   "",
   "它不需要我的命名，",
   "它有自己的名字，只是不告訴我。"
  ],
  "note": "烏鴉拒絕被命名，這是它的尊嚴。"
 },
 {
  "title": "避雨的樹",
  "author": "于堅",
  "body": [
   "下雨了，我站在一棵大樹下面，",
   "樹替我擋住了雨。",
   "雨停了，陽光出來，",
   "樹上的水滴落在我頭上。",
   "",
   "樹在雨後才開始下雨。"
  ],
  "note": "樹的雨比天空的雨來得更晚也更親近。"
 },
 {
  "title": "一枚穿過天空的釘子",
  "author": "于堅",
  "body": [
   "飛機在天空中留下一道白線，",
   "像一枚釘子穿過藍色的布匹。",
   "",
   "過了一會兒，",
   "那道白線散了，",
   "布匹又恢復了完整。",
   "",
   "天空的傷口癒合得比人的快。"
  ],
  "note": "天空是世界上自癒最快的布匹。"
 },
 {
  "title": "事件",
  "author": "于堅",
  "body": [
   "一隻貓跳上了牆頭，",
   "蹲了一會兒就跳下去了。",
   "如果不是我剛好看見，",
   "這件事就不存在。",
   "",
   "世界上有多少事，",
   "因為沒有目擊者而不存在。"
  ],
  "note": "沒有目擊者的事件等於從未發生。"
 },
 {
  "title": "女人",
  "author": "翟永明",
  "body": [
   "我忽然感到萬分飢渴，",
   "仿佛所有的水都乾涸了。",
   "我的身體裏住著另一個女人，",
   "她比我更古老，更陌生。",
   "",
   "她在黑暗中伸出手來，",
   "握住了我的心。"
  ],
  "note": "每個女人體內都住著更古老的自己。"
 },
 {
  "title": "靜安莊",
  "author": "翟永明",
  "body": [
   "靜安莊的樹都老了，",
   "只有風還年輕。",
   "一個女人推開窗戶，",
   "像推開了一面鏡子。",
   "",
   "鏡子裏是二十年前的街道，",
   "和一個正在跑步的少女。"
  ],
  "note": "窗戶是通向過去的鏡子。"
 },
 {
  "title": "預感",
  "author": "翟永明",
  "body": [
   "在一切開始之前，",
   "我已經預感到了結局。",
   "像一滴水預感到大海，",
   "像種子預感到花的形狀。",
   "",
   "可是我還是走了進去，",
   "帶著全部的預感和天真。"
  ],
  "note": "預知結局仍然走進去，這是勇氣。"
 },
 {
  "title": "母親",
  "author": "翟永明",
  "body": [
   "母親的手像一片葉子，",
   "蓋在我的額頭上。",
   "退燒之後世界恢復原樣，",
   "只有她的手還帶著我的溫度。",
   "",
   "很多年後我才明白，",
   "那溫度是她給我的，不是我給她的。"
  ],
  "note": "母親的手記住了每一次發燒的溫度。"
 },
 {
  "title": "時間裏的話",
  "author": "翟永明",
  "body": [
   "我們說的那些話，",
   "有一些死在了空氣中，",
   "有一些落進了泥土裏。",
   "",
   "很多年以後，",
   "泥土裏長出了一棵樹，",
   "那棵樹在風中沙沙作響——",
   "像是在重複我們說過的什麼。"
  ],
  "note": "話語落入泥土，多年後長成樹的聲音。"
 },
 {
  "title": "1980年代的愛情",
  "author": "王小妮",
  "body": [
   "那時候我們什麼都沒有，",
   "只有大把的時間和一點點愛情。",
   "我們坐在河邊，",
   "看夕陽把河水染紅。",
   "",
   "現在我們什麼都有了，",
   "只是丟了那條河。"
  ],
  "note": "丟掉的不是河，是坐在河邊的時間。"
 },
 {
  "title": "我看見大風",
  "author": "王小妮",
  "body": [
   "我看見大風從田野上跑過來，",
   "它跑得比我快多了。",
   "它替我摸了每一棵莊稼的頭頂，",
   "替我翻動了每一頁書。",
   "",
   "大風是我派出去的，",
   "可它再也不回來了。"
  ],
  "note": "大風是放出去就收不回的自由。"
 },
 {
  "title": "白紙的內部",
  "author": "王小妮",
  "body": [
   "白紙的內部有什麼？",
   "是比白更白的白嗎？",
   "還是藏著無數的字，",
   "等著被一支筆喚醒。",
   "",
   "我把筆放上去的那一刻，",
   "白紙活了。"
  ],
  "note": "白紙的內部藏著尚未出生的詩。"
 },
 {
  "title": "月亮在做什麼",
  "author": "王小妮",
  "body": [
   "月亮今晚在做什麼？",
   "它大概在替那些失眠的人值班。",
   "它掛在窗外一動不動，",
   "像一個盡職的守夜人。",
   "",
   "可它自己也是孤獨的，",
   "從來沒有人替月亮值過班。"
  ],
  "note": "替所有人值班的月亮無人替班。"
 },
 {
  "title": "可能",
  "author": "王小妮",
  "body": [
   "可能我明天就不寫詩了，",
   "改去種菜或者養雞。",
   "可能那些雞比讀者更懂我的詩——",
   "它們至少會在我朗誦時安靜地聽。",
   "",
   "可能這就是詩人最好的下場。"
  ],
  "note": "詩人最好的讀者可能是一群安靜的雞。"
 },
 {
  "title": "我用殘損的手掌",
  "author": "戴望舒",
  "body": [
   "我用殘損的手掌，",
   "摸索這廣大的土地：",
   "這一角已變成灰燼，",
   "那一角只是血和泥。",
   "",
   "這一片湖該是我的家鄉——",
   "嶺南的荔枝花寂寞地憔悴。",
   "",
   "手指沾了血和灰，",
   "手掌沾了陰暗。"
  ],
  "note": "殘損的手掌觸到的是整個民族的傷口。"
 },
 {
  "title": "蕭紅墓畔口占",
  "author": "戴望舒",
  "body": [
   "走六小時寂寞的長途，",
   "到你頭邊放一束紅山茶。",
   "我等待著，長夜漫漫，",
   "你卻臥聽著海濤閒話。"
  ],
  "note": "六小時的路和一束紅山茶，已是最深的悼念。"
 },
 {
  "title": "偶成",
  "author": "戴望舒",
  "body": [
   "如果生命的春天重到，",
   "古舊的凝冰都哗哗地解凍，",
   "那時我會再看見燦爛的微笑，",
   "再聽見明朗的呼喚——這些迢遙的夢。",
   "",
   "再握一握手吧，友人。"
  ],
  "note": "冰融之日便是重逢之時。"
 },
 {
  "title": "致螢火",
  "author": "戴望舒",
  "body": [
   "螢火蟲，螢火蟲，",
   "你來照我歸途的路。",
   "是天上的星太遠了，",
   "你來做一顆近處的星。",
   "",
   "多謝你殷勤的引路，",
   "在這黑暗的田野上。"
  ],
  "note": "近處的一點螢火勝過遠處的滿天星。"
 },
 {
  "title": "秋天的夢",
  "author": "戴望舒",
  "body": [
   "迢遙的牧女的羊鈴，",
   "搖落了輕的樹葉。",
   "秋天的夢是輕的，",
   "那是窈窕的牧女之戀。",
   "",
   "於是我的夢靜靜地來了，",
   "但卻載著沉重的昔日。"
  ],
  "note": "秋夢雖輕卻載著沉重的昔日。"
 },
 {
  "title": "我思想",
  "author": "戴望舒",
  "body": [
   "我思想，故我是蝴蝶……",
   "萬年後小花的輕呼，",
   "透過無夢無醒的雲霧，",
   "來振撼我斑斕的彩翼。"
  ],
  "note": "思想的蝴蝶飛越萬年的雲霧。"
 },
 {
  "title": "煩憂",
  "author": "戴望舒",
  "body": [
   "說是寂寞的秋的清愁，",
   "說是遼遠的海的相思。",
   "假如有人問我的煩憂，",
   "我不敢說出你的名字。"
  ],
  "note": "不敢說出的名字是最深的煩憂。"
 },
 {
  "title": "夜行者",
  "author": "戴望舒",
  "body": [
   "在黑暗中靜靜地徘徊，",
   "夜行者，你還認得歸路嗎？",
   "星星已經隱去了，",
   "而那些房屋都入了睡。",
   "",
   "你的腳步是唯一醒著的聲音。"
  ],
  "note": "夜行者的腳步是黑暗裏唯一的清醒。"
 },
 {
  "title": "獄中題壁",
  "author": "戴望舒",
  "body": [
   "如果我死在這裏，",
   "朋友啊，不要悲傷，",
   "我會永遠地生存，",
   "在你們的心上。",
   "",
   "當你們回來，從泥土掘起他傷損的肢體，",
   "用你們勝利的歡呼把他喚醒。"
  ],
  "note": "泥土裏的人等待被勝利的歡呼喚醒。"
 },
 {
  "title": "過舊居",
  "author": "戴望舒",
  "body": [
   "這裏住過一個在夢裏哭泣的人，",
   "這裏有他的窗，他的床，",
   "他的衣架上還掛著舊衣裳。",
   "",
   "但是那個人已經走了，",
   "連影子也沒有留下。",
   "只留下窗前一盆枯了的花。"
  ],
  "note": "舊居最忠實的記憶是一盆枯花。"
 },
 {
  "title": "沙揚娜拉",
  "author": "徐志摩",
  "body": [
   "最是那一低頭的溫柔，",
   "像一朵水蓮花不勝涼風的嬌羞，——",
   "道一聲珍重，道一聲珍重，",
   "那一聲珍重裏有蜜甜的憂愁——",
   "沙揚娜拉！"
  ],
  "note": "低頭的瞬間藏著蜜甜的憂愁。"
 },
 {
  "title": "我不知道風是在哪一個方向吹",
  "author": "徐志摩",
  "body": [
   "我不知道風是在哪一個方向吹——",
   "我是在夢中，",
   "在夢的輕波裏依洄。",
   "",
   "我不知道風是在哪一個方向吹——",
   "我是在夢中，",
   "她的溫存，我的迷醉。"
  ],
  "note": "不知風向的人活在最溫柔的迷醉裏。"
 },
 {
  "title": "雪花的快樂",
  "author": "徐志摩",
  "body": [
   "假如我是一朵雪花，",
   "翩翩的在半空裏瀟灑，",
   "我一定認清我的方向——",
   "飛揚，飛揚，飛揚——",
   "",
   "在半空裏娟娟的飛舞，",
   "認明了那清幽的住處，",
   "等著她來花園裏探望——",
   "飛揚，飛揚，飛揚。"
  ],
  "note": "雪花的方向是愛人的花園。"
 },
 {
  "title": "翡冷翠的一夜",
  "author": "徐志摩",
  "body": [
   "你真的走了，明天？那我，那我，",
   "你也不用管，遲早有那一天；",
   "你願意記著我，就記著我，",
   "要不然趁早忘了這世界上有我。",
   "",
   "你先走吧，我在這裏看著你走。"
  ],
  "note": "目送是比擁抱更漫長的告別。"
 },
 {
  "title": "這是一個懦怯的世界",
  "author": "徐志摩",
  "body": [
   "這是一個懦怯的世界，",
   "容不得戀愛的存在，",
   "我們去吧！跟著白雲去，",
   "跟著白雲到天外。",
   "",
   "我們將花種在地上，",
   "看它們開出成片的繽紛。"
  ],
  "note": "帶著愛情跟著白雲出走。"
 },
 {
  "title": "生活",
  "author": "徐志摩",
  "body": [
   "陰沉，黑暗，毒蛇似的蜿蜒，",
   "生活逼成了一條甬道：",
   "一度陷入，你就只有向前——",
   "手捫著冷壁的潮濕，",
   "在妖魔的臟腑裏掙扎。"
  ],
  "note": "生活是一條只能向前的甬道。"
 },
 {
  "title": "月下待杜鵑不來",
  "author": "徐志摩",
  "body": [
   "看一回凝靜的橋影，",
   "數一數螺鈿的波紋，",
   "我倚暖了石欄的青苔，",
   "青苔涼透了我的心坎。",
   "",
   "月兒，你休學新娘羞，",
   "把錦被都遮了臉。"
  ],
  "note": "等待落空後連月亮都在害羞。"
 },
 {
  "title": "黃鸝",
  "author": "徐志摩",
  "body": [
   "一掠顏色飛上了樹，",
   "看，一隻黃鸝！",
   "聯想——禁止聯想！",
   "又一掠顏色飛了出去。",
   "",
   "它飛得那樣快，",
   "像是把所有的金色都帶走了。"
  ],
  "note": "黃鸝飛過便帶走了全部的金色。"
 },
 {
  "title": "死水",
  "author": "聞一多",
  "body": [
   "這是一溝絕望的死水，",
   "清風吹不起半點漪淪。",
   "不如多扔些破銅爛鐵，",
   "爽性潑你的剩菜殘羹。",
   "",
   "也許銅的要綠成翡翠，",
   "鐵罐上銹出幾瓣桃花。",
   "讓死水酵成一溝綠酒，",
   "飄滿了珍珠似的白沫。"
  ],
  "note": "絕望到極致時生出了詭異的美。"
 },
 {
  "title": "靜夜",
  "author": "聞一多",
  "body": [
   "這燈光漂白了的四壁，",
   "這賢良的桌椅，像殿堂。",
   "誰的呼吸在黑暗中發芽？",
   "誰的耳朵守著窗外的月光？",
   "",
   "靜夜裏我聽見了，",
   "遠處松樹林裏的風聲。"
  ],
  "note": "靜夜裏呼吸在黑暗中發芽。"
 },
 {
  "title": "太陽吟",
  "author": "聞一多",
  "body": [
   "太陽啊，刺得我心痛的太陽！",
   "又逼走了遊子的一出還鄉夢。",
   "太陽啊，火一樣燒著的太陽！",
   "烘乾了小草尖頭的露水。",
   "",
   "太陽啊，六龍驂駕的太陽！",
   "省得我受這般苦！"
  ],
  "note": "異鄉的太陽刺痛了思鄉的心。"
 },
 {
  "title": "一句話",
  "author": "聞一多",
  "body": [
   "有一句話說出就是禍，",
   "有一句話能點得著火。",
   "別看五千年沒有說破，",
   "你猜得透火山的緘默？",
   "",
   "說不定是突然著了魔，",
   "突然青天裏一個霹靂——",
   "咱們的中國！"
  ],
  "note": "五千年的緘默裏藏著一句話的雷霆。"
 },
 {
  "title": "也許",
  "author": "聞一多",
  "body": [
   "也許你真是哭得太累，",
   "也許，也許你要睡一睡，",
   "那麼叫夜鷹不要咳嗽，",
   "蛙不要號，蝙蝠不要飛。",
   "",
   "不許陽光撥你的眼簾，",
   "撐一傘松蔭庇護你睡。",
   "也許你聽這蚯蚓翻泥，",
   "聽這小草的根鬚吸水。"
  ],
  "note": "最溫柔的葬歌是讓世界安靜下來。"
 },
 {
  "title": "別丟掉",
  "author": "林徽因",
  "body": [
   "別丟掉，",
   "這一把過往的熱情，",
   "現在流水似的，輕輕，",
   "在幽冷的山泉底，",
   "在黑夜，在松林。",
   "",
   "嘆息似的渺茫，",
   "你仍要保存著那真。"
  ],
  "note": "過往的熱情值得像山泉一樣保存。"
 },
 {
  "title": "蓮燈",
  "author": "林徽因",
  "body": [
   "如果我的心是一朵蓮花，",
   "正中擎出一支點亮的蠟，",
   "熒熒雖則單是那一剪光，",
   "我也要它照徹太空。",
   "",
   "蓮花底部浮在水上，",
   "光照不到的是黑暗的水。"
  ],
  "note": "一朵蓮燈的光也要照徹太空。"
 },
 {
  "title": "誰愛這不息的變幻",
  "author": "林徽因",
  "body": [
   "誰愛這不息的變幻，",
   "她的行徑？",
   "催一陣急雨，抹一天雲霞，",
   "月亮，星光，日影。",
   "",
   "是誰在暗處哭泣？",
   "百花的冠冕你戴著，",
   "你是天真，莊嚴，你是夜夜的月圓。"
  ],
  "note": "不息的變幻裏藏著天真與莊嚴。"
 },
 {
  "title": "深笑",
  "author": "林徽因",
  "body": [
   "是誰笑成這百層塔高聳，",
   "讓不知名鳥雀來盤旋？",
   "是誰笑成這萬千星火閃爍，",
   "在深邃的穹蒼，等候黑夜的來臨？",
   "",
   "笑成一朵金色的蘑菇雲，",
   "從你嘴角升起。"
  ],
  "note": "深笑是從嘴角升起的金色雲朵。"
 },
 {
  "title": "距離的組織",
  "author": "卞之琳",
  "body": [
   "想獨上高樓讀一遍《羅馬衰亡史》，",
   "忽有羅馬滅亡星出現在報上。",
   "報上頭條要聞我看了看：",
   "我的手指沾了一點新聞紙的油墨。",
   "",
   "距離就這樣被組織起來了。"
  ],
  "note": "指尖的油墨與羅馬的滅亡距離剛好。"
 },
 {
  "title": "寂寞",
  "author": "卞之琳",
  "body": [
   "鄉下小孩子怕寂寞，",
   "枒杈著手指數天上的星。",
   "最後數到自己只有那一個了，",
   "便依了漁夫的建議把自己也投入其中。",
   "",
   "從此天上多了一顆星。"
  ],
  "note": "把自己投入天空的孩子成了一顆星。"
 },
 {
  "title": "圓寶盒",
  "author": "卞之琳",
  "body": [
   "我幻想在哪兒（天河裏？）",
   "撈到了一個圓寶盒，",
   "裏面有一面鏡子，",
   "鏡子照見了我的房間。",
   "",
   "房間裏有一個圓寶盒，",
   "寶盒裏有一面鏡子……"
  ],
  "note": "無限嵌套的鏡子是宇宙的秘密。"
 },
 {
  "title": "無題",
  "author": "卞之琳",
  "body": [
   "三日前山中的一道小水，",
   "掬你入口不凝手的冰冷，",
   "這泉水你挑來煮了茗吧？",
   "",
   "隔著茶的味道想到了山中——",
   "三日前那道小水的溫度。"
  ],
  "note": "一杯茶裏藏著三天前山泉的溫度。"
 },
 {
  "title": "十四行集（第一首）",
  "author": "馮至",
  "body": [
   "我們準備著深深地領受，",
   "那些意想不到的奇蹟，",
   "在漫長的歲月裏忽然有，",
   "彗星的出現，狂風乍起。",
   "",
   "我們的生命在這一瞬間，",
   "彷彿在第一次的擁抱裏，",
   "過去的悲歡忽然在眼前，",
   "凝結成屹然不動的形體。"
  ],
  "note": "生命中最深的奇蹟來得毫無預兆。"
 },
 {
  "title": "蛇",
  "author": "馮至",
  "body": [
   "我的寂寞是一條蛇，",
   "靜靜地沒有言語。",
   "你萬一夢到它時，",
   "千萬啊不要悚懼！",
   "",
   "它是我忠誠的侶伴，",
   "心裏害著熱烈的鄉思。"
  ],
  "note": "寂寞像蛇一樣忠誠地陪伴左右。"
 },
 {
  "title": "十四行集（第四首）",
  "author": "馮至",
  "body": [
   "我們經常度過無風的夜，",
   "也嚐過許多有風有雨的時刻。",
   "我們有時歡樂有時寂寞，",
   "還有些時候只是沉默。",
   "",
   "什麼都經歷了以後，",
   "眼前的風景不增不減。"
  ],
  "note": "歷盡風雨後，風景不增不減。"
 },
 {
  "title": "十四行集（第二十七首）",
  "author": "馮至",
  "body": [
   "從一片氾濫無形的水裏，",
   "取水人取來橢圓的一瓶。",
   "這點水就得到一個定形——",
   "看，木嬰花丟了影子在水裏。",
   "",
   "讓遠方的光來尋你的影子，",
   "它也會跳出瓶外找到你。"
  ],
  "note": "被定形的水中仍然有影子的自由。"
 },
 {
  "title": "南方的夜",
  "author": "馮至",
  "body": [
   "我們靜靜地坐在湖邊的岩石上，",
   "聽水聲重複著一種永恆的樂曲。",
   "遠處的蛙鳴和近處的蟲叫，",
   "組成了一支小小的合奏。",
   "",
   "南方的夜是溫暖的，",
   "像母親的手臂環著嬰孩。"
  ],
  "note": "南方的夜溫暖如母親的臂彎。"
 },
 {
  "title": "大堰河——我的保姆（節選）",
  "author": "艾青",
  "body": [
   "大堰河，是我的保姆。",
   "她的名字就是生她的村莊的名字，",
   "她是童養媳，",
   "大堰河，是我的保姆。",
   "",
   "我是地主的兒子，",
   "也是吃了大堰河的奶而長大了的，",
   "大堰河的兒子。",
   "大堰河，我是吃著你的奶長大了的。"
  ],
  "note": "乳汁裏流淌的是比血緣更深的愛。"
 },
 {
  "title": "雪落在中國的土地上",
  "author": "艾青",
  "body": [
   "雪落在中國的土地上，",
   "寒冷在封鎖著中國呀……",
   "",
   "風，像一個太悲哀了的老婦，",
   "緊緊地跟隨著，",
   "伸出寒冷的指爪，",
   "拉扯著行人的衣襟。",
   "",
   "雪落在中國的土地上，",
   "寒冷在封鎖著中國呀……"
  ],
  "note": "雪封大地的寒冷是一個時代的體溫。"
 },
 {
  "title": "太陽的話",
  "author": "艾青",
  "body": [
   "打開你們的窗子吧，",
   "打開你們的板門吧，",
   "讓我進去，讓我進去，",
   "進到你們的小屋裏。",
   "",
   "我帶著金黃的花束，",
   "我帶著林間的香氣，",
   "我帶著亮光和溫暖，",
   "我帶著滿身的露水。"
  ],
  "note": "打開門窗，陽光會帶著露水走進來。"
 },
 {
  "title": "光的讚歌（節選）",
  "author": "艾青",
  "body": [
   "每一個人都是一個生命，",
   "人世銀河星雲中的一粒微塵。",
   "每一粒微塵都有自己的能量，",
   "無數的微塵匯集成一片光明。",
   "",
   "每一個人都是一個生命，",
   "比所有的星星更有內在的光輝。"
  ],
  "note": "每粒微塵的光匯聚起來便是星河。"
 },
 {
  "title": "鏡子",
  "author": "艾青",
  "body": [
   "僅僅是一個平面，",
   "卻又深不可測。",
   "它最為真實，",
   "決不隱瞞缺點。",
   "",
   "它忠實於尋找它的人，",
   "誰都從中發現自己。"
  ],
  "note": "鏡子忠實得讓人不敢對視。"
 },
 {
  "title": "煤的對話",
  "author": "艾青",
  "body": [
   "你住在哪裏？",
   "我住在萬年的深山裏，",
   "我住在萬年的岩石裏。",
   "",
   "你的年紀——",
   "我的年紀比山的更大，",
   "比岩石的更大。",
   "",
   "你從什麼時候沉默的？",
   "從恐龍統治了森林的年代。"
  ],
  "note": "煤的沉默始於恐龍的年代。"
 },
 {
  "title": "樹",
  "author": "艾青",
  "body": [
   "一棵樹，一棵樹，",
   "彼此孤離地兀立著。",
   "風與空氣，",
   "告訴它們的距離。",
   "",
   "但是在泥土的覆蓋下，",
   "它們的根伸長著，",
   "在看不見的深處，",
   "它們把根鬚糾纏在一起。"
  ],
  "note": "看不見的地方根鬚早已糾纏在一起。"
 },
 {
  "title": "盼望",
  "author": "艾青",
  "body": [
   "一個海員說，",
   "他最喜歡的是起錨所激起的，",
   "那一片潔白的浪花……",
   "",
   "一個海員說，",
   "最使他高興的是拋錨所發出的，",
   "那一陣鐵鏈的喧譁……",
   "",
   "一個盼望出發，",
   "一個盼望到達。"
  ],
  "note": "出發與到達是同一種盼望的兩端。"
 },
 {
  "title": "魚化石",
  "author": "艾青",
  "body": [
   "動作多麼活潑，",
   "精力多麼旺盛，",
   "在浪花裏跳躍，",
   "在大海裏浮沉。",
   "",
   "不幸遇到了火山爆發，",
   "也可能是地震，",
   "你失去了自由，",
   "被埋進了灰塵。",
   "",
   "過了多少億年，",
   "地質勘探隊員在岩層裏發現你，",
   "依然栩栩如生。"
  ],
  "note": "億年前的自由凝固成石頭裏的姿態。"
 },
 {
  "title": "繁星（一）",
  "author": "冰心",
  "body": [
   "繁星閃爍著——",
   "深藍的太空，",
   "何曾聽得見他們對語？",
   "沉默中，",
   "微光裡，",
   "他們深深的互相頌讚了。"
  ],
  "note": "星辰無語，卻以光芒訴說彼此的敬意。"
 },
 {
  "title": "繁星（七）",
  "author": "冰心",
  "body": [
   "醒著的，",
   "只有孤憤的人罷！",
   "聽聲聲算命的鑼兒，",
   "敲破世人的命運。"
  ],
  "note": "夜深人靜時，清醒反而是一種孤獨。"
 },
 {
  "title": "繁星（一〇）",
  "author": "冰心",
  "body": [
   "嫩綠的芽兒，",
   "和青年說：",
   "「發展你自己！」",
   "淡白的花兒，",
   "和青年說：",
   "「貢獻你自己！」",
   "深紅的果兒，",
   "和青年說：",
   "「犧牲你自己！」"
  ],
  "note": "生命的三個階段，是成長、綻放與奉獻。"
 },
 {
  "title": "繁星（一三一）",
  "author": "冰心",
  "body": [
   "大海啊！",
   "哪一顆星沒有光？",
   "哪一朵花沒有香？",
   "哪一次我的思潮裡，",
   "沒有你波濤的清響？"
  ],
  "note": "大海是詩人永恆的母親意象。"
 },
 {
  "title": "春水（一）",
  "author": "冰心",
  "body": [
   "春水！",
   "又是一年了，",
   "還這般的微微吹動。",
   "可以再照個影兒麼？",
   "春水溫靜的答謝我說：",
   "「我的朋友！",
   "我從來沒拒絕過你。」"
  ],
  "note": "春水年年不變，是自然最溫柔的承諾。"
 },
 {
  "title": "春水（五）",
  "author": "冰心",
  "body": [
   "一道小河，",
   "平平蕩蕩的流將下去，",
   "只經過平沙萬里——",
   "自由的，",
   "沉寂的，",
   "他沒有快樂的聲音。"
  ],
  "note": "無波瀾的人生，未必是真正的自由。"
 },
 {
  "title": "紙船",
  "author": "冰心",
  "body": [
   "我從不肯妄棄了一張紙，",
   "總是留著——留著，",
   "疊成一隻一隻很小的船兒，",
   "從舟上拋下在海裡。",
   "",
   "有的被天風吹卷到舟中的窗裡，",
   "有的被海浪打濕，沾在船頭上。",
   "我仍是不灰心的每天的疊著，",
   "總希望有一隻能流到我要他到的地方去。",
   "",
   "母親，倘若你夢中看見一隻很小的白船兒，",
   "不要驚訝他無端入夢——",
   "這是你至愛的女兒含著淚疊的，",
   "萬水千山，求他載著她的愛和悲哀歸去。"
  ],
  "note": "紙船渡不了海，卻渡得了思念。"
 },
 {
  "title": "成功的花",
  "author": "冰心",
  "body": [
   "成功的花，",
   "人們只驚羨她現時的明艷！",
   "然而當初她的芽兒，",
   "浸透了奮鬥的淚泉，",
   "灑遍了犧牲的血雨。"
  ],
  "note": "每一朵盛開的花背後，都藏著無人知曉的辛酸。"
 },
 {
  "title": "母親",
  "author": "冰心",
  "body": [
   "母親呵！",
   "天上的風雨來了，",
   "鳥兒躲到他的巢裡；",
   "心中的風雨來了，",
   "我只躲到你的懷裡。"
  ],
  "note": "母親的懷抱是世間最安穩的避風港。"
 },
 {
  "title": "繁星（七一）",
  "author": "冰心",
  "body": [
   "這些事——",
   "是永不漫滅的回憶：",
   "月明的園中，",
   "藤蘿的葉下，",
   "母親的膝上。"
  ],
  "note": "最深的記憶，往往藏在最平凡的畫面裡。"
 },
 {
  "title": "讚美",
  "author": "穆旦",
  "body": [
   "走不盡的山巒和起伏，河流和草原，",
   "數不盡的密密的村莊，雞鳴和狗吠，",
   "接連在原是荒涼的亞洲的土地上，",
   "在野草的茫茫中呼嘯著乾燥的風，",
   "",
   "我要以一切擁抱你，你，",
   "我到處看見的人民呵，",
   "在恥辱裡生活的人民，佝僂的人民，",
   "我要以帶血的手和你們一一擁抱。"
  ],
  "note": "詩人以帶血的手擁抱苦難的大地。"
 },
 {
  "title": "春",
  "author": "穆旦",
  "body": [
   "綠色的火焰在草上搖曳，",
   "他渴求著擁抱你，花朵。",
   "反抗著土地，花朵伸出來，",
   "當暖風吹來煩惱，或者歡樂。",
   "",
   "如果你是醒了，推開窗子，",
   "看這滿園的慾望多麼美麗。"
  ],
  "note": "春天是大地壓抑不住的慾望。"
 },
 {
  "title": "詩八首（其一）",
  "author": "穆旦",
  "body": [
   "你底眼睛看見這一場火災，",
   "你看不見我，雖然我為你點燃；",
   "唉，那燃燒著的不過是成熟的年代，",
   "你底，我底，我們相隔如重山。"
  ],
  "note": "愛情是一場你看得見火光卻看不見縱火者的火災。"
 },
 {
  "title": "詩八首（其二）",
  "author": "穆旦",
  "body": [
   "水流山石間沉澱下你我，",
   "而我們成長，在死底子宮裡。",
   "在無數的可能裡一個變形的生命，",
   "永遠不能完成他自己。"
  ],
  "note": "生命在無數可能中掙扎，卻永遠是未完成的自己。"
 },
 {
  "title": "詩八首（其五）",
  "author": "穆旦",
  "body": [
   "靜靜地，我們擁抱在",
   "用言語所能照明的世界裡，",
   "而那未形成的黑暗是可怕的，",
   "那可能和不可能的使我們沉迷。"
  ],
  "note": "語言照亮的世界之外，是更遼闊的未知。"
 },
 {
  "title": "冬",
  "author": "穆旦",
  "body": [
   "我愛在淡淡的太陽短命的日子，",
   "臨窗把喜愛的工作做完；",
   "才到下午四點，便又冷又昏黃，",
   "我將用一杯酒灌溉我的心田。",
   "",
   "多麼快，人生已到嚴酷的冬天。"
  ],
  "note": "冬日短暫如人生晚景，唯有一杯酒溫暖心田。"
 },
 {
  "title": "我看",
  "author": "穆旦",
  "body": [
   "我看一陣向晚的春風，",
   "悄悄揉過豐潤的青草，",
   "我看它們低首又低首，",
   "也許遠水蕩起了一片綠潮。"
  ],
  "note": "向晚的春風裡，藏著大地最柔軟的呼吸。"
 },
 {
  "title": "葬歌",
  "author": "穆旦",
  "body": [
   "最後的顫慄屬於風，",
   "最後的芬芳屬於泥土，",
   "最後的骸骨在這裡，",
   "最後的，最後的痛苦。"
  ],
  "note": "一切歸於塵土，連痛苦也終有盡頭。"
 },
 {
  "title": "出發",
  "author": "穆旦",
  "body": [
   "告訴我們和平又必須戰鬥，",
   "而這是我們的，是不能選擇的，",
   "猶如我們的父母的結合，",
   "我們準備著深深地領受。"
  ],
  "note": "命運無法選擇，但可以深深地領受。"
 },
 {
  "title": "森林之魅",
  "author": "穆旦",
  "body": [
   "在青苔上落滿了雨珠，",
   "他摸過每一個潮濕的樹幹，",
   "在幽暗裡他從來沒看見，",
   "這些樹的盡頭是什麼。",
   "",
   "靜靜的，在那被遺忘的山坡上，",
   "還下著密雨，還吹著細風。"
  ],
  "note": "森林深處的魅惑，是未知本身的召喚。"
 },
 {
  "title": "老馬",
  "author": "臧克家",
  "body": [
   "總得叫大車裝個夠，",
   "他橫豎不說一句話，",
   "背上的壓力往肉裡扣，",
   "他把頭沉重地垂下！",
   "",
   "這刻不知道下刻的命，",
   "他有淚只往心裡咽，",
   "眼前飄來一道鞭影，",
   "他抬起頭望望前面。"
  ],
  "note": "沉默的老馬，是千萬勞動者的縮影。"
 },
 {
  "title": "三代",
  "author": "臧克家",
  "body": [
   "孩子，",
   "在土裡洗澡；",
   "爸爸，",
   "在土裡流汗；",
   "爺爺，",
   "在土裡埋葬。"
  ],
  "note": "三代人的命運，都寫在同一片泥土上。"
 },
 {
  "title": "難民",
  "author": "臧克家",
  "body": [
   "日頭墜到鳥巢裡，",
   "黃昏裡還趕路程。",
   "翻過的山頭座座，",
   "一個孩兒一聲哭。",
   "",
   "前面是條河，",
   "他們的腳步慢下了。"
  ],
  "note": "流離失所的人，連黃昏都不敢停留。"
 },
 {
  "title": "生命的零度",
  "author": "臧克家",
  "body": [
   "生命本沒有意義，",
   "你能給他什麼意義，",
   "他就有什麼意義。",
   "",
   "與其終日冥想人生有何意義，",
   "不如試用此生做點有意義的事。"
  ],
  "note": "意義不是被發現的，而是被創造的。"
 },
 {
  "title": "預言",
  "author": "何其芳",
  "body": [
   "這一個心跳的日子終於來臨！",
   "你夜的嘆息似的漸近的足音，",
   "我聽得清不是林葉和夜風的私語，",
   "麋鹿馳過苔徑的細碎的蹄聲。",
   "",
   "告訴我，用你銀鈴的歌聲告訴我，",
   "你是不是預言中的年輕的神？"
  ],
  "note": "等待中的腳步聲，是命運最動聽的預言。"
 },
 {
  "title": "秋天",
  "author": "何其芳",
  "body": [
   "震落了清晨滿披著的露珠，",
   "伐木聲丁丁地飄出幽谷。",
   "放下飽食過稻香的鎌刀，",
   "用背簍來裝竹籬間肥碩的瓜果。",
   "",
   "秋天棲息在農家裡。"
  ],
  "note": "秋天最美的模樣，是農家豐收的喜悅。"
 },
 {
  "title": "花環",
  "author": "何其芳",
  "body": [
   "開落在幽谷裡的花最香，",
   "無人記憶的朝露最有光。",
   "我說你是幸福的，小玲玲，",
   "沒有照過影子的小溪最清亮。"
  ],
  "note": "最純粹的美，往往綻放在無人知曉處。"
 },
 {
  "title": "生活是多麼廣闊",
  "author": "何其芳",
  "body": [
   "生活是多麼廣闊，",
   "生活是海洋。",
   "凡是有生活的地方就有快樂和寶藏。",
   "",
   "去參加歌詠隊，去演戲，",
   "去建設鐵路，去做飛行師，",
   "去坐在實驗室裡，去寫詩。"
  ],
  "note": "生活的廣闊，在於你願意走多遠。"
 },
 {
  "title": "夢後",
  "author": "何其芳",
  "body": [
   "我走過你夢中的花園，",
   "拾到你遺落的紅葉一片，",
   "上面寫著我們夢中的歡聚，",
   "醒來時只剩下淚眼模糊。"
  ],
  "note": "夢醒後最殘忍的事，是記得夢裡的快樂。"
 },
 {
  "title": "明天不散步了",
  "author": "木心",
  "body": [
   "明天不散步了，",
   "明天不散步了。",
   "",
   "風會停 雲會走，",
   "唯有我和落葉，",
   "永遠散步。"
  ],
  "note": "即使停下腳步，心仍在散步的路上。"
 },
 {
  "title": "我紛紛的情慾",
  "author": "木心",
  "body": [
   "我紛紛的情慾，",
   "像林中的群鳥。",
   "一半明媚，一半憂傷。"
  ],
  "note": "情慾如群鳥，留不住也趕不走。"
 },
 {
  "title": "眉目",
  "author": "木心",
  "body": [
   "林深時見鹿，",
   "海藍時見鯨。",
   "夢醒時見你。"
  ],
  "note": "最美的相遇，都在最深處。"
 },
 {
  "title": "借我",
  "author": "木心",
  "body": [
   "借我一個暮年，",
   "借我碎片，",
   "借我瞻前與顧後，",
   "借我執拗如少年。",
   "",
   "借我後天長成的先天，",
   "借我變如不曾改變。",
   "借我素淡的世故和明白的愚，",
   "借我可預知的險。",
   "",
   "借我悲懷的磊落，",
   "借我溫軟的魯莽和玩笑的莊嚴。",
   "借我最初與最終的不敢，",
   "借我不言而喻的不見。"
  ],
  "note": "我們一生都在向歲月借那些回不去的東西。"
 },
 {
  "title": "雲雀叫了一整天",
  "author": "木心",
  "body": [
   "雲雀叫了一整天，",
   "都是牠求偶的歌。",
   "你聽不出牠的焦急嗎？"
  ],
  "note": "求而不得的焦急，連鳥鳴都藏不住。"
 },
 {
  "title": "知與愛",
  "author": "木心",
  "body": [
   "你再不來，",
   "我要下雪了。"
  ],
  "note": "等待到了極限，連心都要結冰了。"
 },
 {
  "title": "論萬境",
  "author": "木心",
  "body": [
   "萬頭攢動火樹銀花之處不必找我。",
   "如欲相見，",
   "我在各種悲喜交集處，",
   "能做的事就只是長途跋涉的歸真返璞。"
  ],
  "note": "繁華深處不見我，悲喜交集才是歸處。"
 },
 {
  "title": "哥倫比亞的倒影",
  "author": "木心",
  "body": [
   "凡是出於願望的事，",
   "不問結局如何，",
   "動機既是率真的，",
   "就只有率真可以為之註解。"
  ],
  "note": "率真的動機，不需要結局來證明。"
 },
 {
  "title": "大衛",
  "author": "木心",
  "body": [
   "他們說凡事要看得開，",
   "我早看開了。",
   "往哪裡看都是空的。",
   "",
   "他們說凡事要放得下，",
   "我早放下了。",
   "沒有什麼可以拿起。"
  ],
  "note": "看開與放下，有時只是另一種空。"
 },
 {
  "title": "素履之往",
  "author": "木心",
  "body": [
   "所謂無底深淵，",
   "下去，也是前程萬里。"
  ],
  "note": "深淵並不可怕，可怕的是不敢往下跳。"
 },
 {
  "title": "同車人的啜泣",
  "author": "木心",
  "body": [
   "巷口有棵老樹，",
   "許多鳥在上面叫。",
   "童年一晃就過了。",
   "",
   "許多鳥又飛走了，",
   "老樹依然在。"
  ],
  "note": "鳥飛了，人散了，只有老樹還記得一切。"
 },
 {
  "title": "竹秀",
  "author": "木心",
  "body": [
   "五月將盡，",
   "六月的少女已在遠方。",
   "我不能去，",
   "我是五月的舊愁。"
  ],
  "note": "五月的人，永遠追不上六月的風。"
 },
 {
  "title": "夏明珠",
  "author": "木心",
  "body": [
   "我是一個在黑暗中大雪紛飛的人哪。",
   "你再不來，",
   "我要下雪了。"
  ],
  "note": "孤獨的人，心裡永遠在下著大雪。"
 },
 {
  "title": "杯弓蛇影之相",
  "author": "木心",
  "body": [
   "我好久沒有以小步紧跑去迎接一個人的那種快樂了。"
  ],
  "note": "成年後最奢侈的快樂，是奔向一個人。"
 },
 {
  "title": "雷聲與蟬鳴",
  "author": "也斯",
  "body": [
   "午後的雷聲在遠山響起，",
   "蟬在近處不停地叫。",
   "我坐在陽台上讀一封信，",
   "讀完了又讀一遍。",
   "",
   "那些字跡慢慢模糊了，",
   "像雷聲一般遠去。"
  ],
  "note": "有些話讀再多遍，也會像雷聲一樣遠去。"
 },
 {
  "title": "中午在鰂魚涌",
  "author": "也斯",
  "body": [
   "街上的人群散了又聚，",
   "午飯時間如此短暫。",
   "有人低頭看手機，",
   "有人在嚼著三明治趕路。",
   "",
   "太陽照在每個人的影子上，",
   "把每個人都縮得很小。"
  ],
  "note": "城市的正午，每個人都被時間追趕。"
 },
 {
  "title": "形象香港",
  "author": "也斯",
  "body": [
   "讓我習慣街上的速度，",
   "讓我學會在窄巷裡轉身。",
   "我們的城市如此擁擠，",
   "連夢也要排隊。"
  ],
  "note": "在擁擠的城市裡，連夢都需要排隊。"
 },
 {
  "title": "島和大陸",
  "author": "也斯",
  "body": [
   "這個島嶼太小了，",
   "裝不下一個完整的夢。",
   "但海浪不停地來，",
   "帶來遠方的消息。",
   "",
   "我在岸邊撿拾貝殼，",
   "每一個都有海的聲音。"
  ],
  "note": "島嶼雖小，每一個貝殼都連著大海。"
 },
 {
  "title": "蔬菜的政治",
  "author": "也斯",
  "body": [
   "一棵菜心從田裡到餐桌，",
   "經過了多少雙手。",
   "我們談論風味的時候，",
   "很少想起泥土的顏色。"
  ],
  "note": "餐桌上的每一口，都有人在泥土裡彎腰。"
 },
 {
  "title": "感冒",
  "author": "西西",
  "body": [
   "我的城市得了感冒，",
   "一直在咳嗽。",
   "街道發著燒，",
   "人們裹緊了外套。",
   "",
   "什麼時候才會好呢？",
   "吃藥也沒有用的時候。"
  ],
  "note": "城市生病了，每個人都是症狀的一部分。"
 },
 {
  "title": "旋轉木馬",
  "author": "西西",
  "body": [
   "我們坐在旋轉木馬上，",
   "以為在前進。",
   "音樂停了才發現，",
   "還在原來的地方。"
  ],
  "note": "有時忙碌一生，不過是一場華麗的原地旋轉。"
 },
 {
  "title": "浮城誌異",
  "author": "西西",
  "body": [
   "這座城市浮在水上，",
   "沒有人知道它的錨在哪裡。",
   "我們住在高樓裡，",
   "以為離地面很遠。",
   "",
   "其實是離天空很近，",
   "近得可以聽見雲的呼吸。"
  ],
  "note": "浮城的人，離地越遠，離天越近。"
 },
 {
  "title": "花木欄",
  "author": "西西",
  "body": [
   "把花種在陽台上，",
   "讓它看看這城市。",
   "花開了，",
   "它大概覺得這城市比花盆還小。"
  ],
  "note": "花的世界雖小，卻比城市更自在。"
 },
 {
  "title": "動物園",
  "author": "西西",
  "body": [
   "星期天帶孩子去動物園，",
   "孩子看猴子，",
   "猴子看孩子，",
   "誰在籠子裡呢？",
   "",
   "回家的路上，",
   "孩子說：我也想住在動物園。"
  ],
  "note": "自由與囚禁之間，只隔著一層目光。"
 },
 {
  "title": "時間的聲音",
  "author": "鍾曼芬",
  "body": [
   "時間敲門的時候，",
   "我假裝不在家。",
   "它就從窗縫裡溜進來，",
   "在我的頭髮上留下記號。"
  ],
  "note": "時間從不缺席，即使你假裝看不見。"
 },
 {
  "title": "寫給海",
  "author": "鍾曼芬",
  "body": [
   "大海不需要我的詩，",
   "它自己就是一首。",
   "但我還是寫了——",
   "因為我需要大海。"
  ],
  "note": "寫詩不是為了表達海，而是為了靠近海。"
 },
 {
  "title": "夜讀",
  "author": "鍾曼芬",
  "body": [
   "翻過一頁又一頁，",
   "直到窗外發白。",
   "書裡的人還醒著，",
   "而我已經困了。",
   "",
   "把書蓋在臉上，",
   "和書裡的人一起入夢。"
  ],
  "note": "夜讀到天明，書頁之間藏著另一個世界。"
 },
 {
  "title": "古池",
  "author": "日・松尾芭蕉",
  "body": [
   "古池塘——",
   "青蛙跳入水中央，",
   "一聲清響。"
  ],
  "note": "千年的寂靜，被一聲水響打破。"
 },
 {
  "title": "荒野旅行",
  "author": "日・松尾芭蕉",
  "body": [
   "荒野上旅行，",
   "讓我的夢也去流浪吧——",
   "枯草原上。"
  ],
  "note": "身在荒野，夢也隨風遠行。"
 },
 {
  "title": "菊花香",
  "author": "日・松尾芭蕉",
  "body": [
   "菊花香裡——",
   "奈良城中那些古老的，",
   "石佛像。"
  ],
  "note": "花香與石佛，都是時間留下的印記。"
 },
 {
  "title": "暮秋之旅",
  "author": "日・松尾芭蕉",
  "body": [
   "枯枝上——",
   "烏鴉棲息的黃昏，",
   "秋日暮色。"
  ],
  "note": "一隻烏鴉，道盡了秋天的蕭瑟。"
 },
 {
  "title": "夏草",
  "author": "日・松尾芭蕉",
  "body": [
   "夏草茂盛啊——",
   "昔日武士們夢想的，",
   "殘跡所在。"
  ],
  "note": "草長得越茂盛，昔日的夢就越模糊。"
 },
 {
  "title": "海邊",
  "author": "日・松尾芭蕉",
  "body": [
   "海邊日暮——",
   "鳴叫的野鴨聲中，",
   "隱約泛白。"
  ],
  "note": "暮色中的鴨鳴，是海邊最寂寞的聲音。"
 },
 {
  "title": "閑寂",
  "author": "日・松尾芭蕉",
  "body": [
   "多麼寂靜啊——",
   "蟬聲滲入了，",
   "岩石之中。"
  ],
  "note": "蟬鳴入石，寂靜反而更深了。"
 },
 {
  "title": "旅途之病",
  "author": "日・松尾芭蕉",
  "body": [
   "旅途中病倒——",
   "夢仍在枯野上，",
   "四處飄蕩。"
  ],
  "note": "身體倒下了，夢卻不肯停歇。"
 },
 {
  "title": "早春",
  "author": "日・松尾芭蕉",
  "body": [
   "春天來了——",
   "無名的山丘上，",
   "薄薄的霧靄。"
  ],
  "note": "春天最初的消息，是山間的一層薄霧。"
 },
 {
  "title": "五月雨",
  "author": "日・松尾芭蕉",
  "body": [
   "五月的雨——",
   "匯聚而成的急流啊，",
   "最上川。"
  ],
  "note": "無數細雨匯成大河，平凡匯成磅礴。"
 },
 {
  "title": "秋風",
  "author": "日・松尾芭蕉",
  "body": [
   "秋風吹過——",
   "原野上的石頭，",
   "也感到了寒冷。"
  ],
  "note": "連石頭都冷了，秋天就真的到了。"
 },
 {
  "title": "月夜",
  "author": "日・松尾芭蕉",
  "body": [
   "雲時時——",
   "給賞月的人，",
   "一段歇息。"
  ],
  "note": "雲遮月不是遺憾，是讓人歇一歇的溫柔。"
 },
 {
  "title": "初雪",
  "author": "日・松尾芭蕉",
  "body": [
   "初雪紛飛——",
   "水仙花的葉子，",
   "微微彎曲。"
  ],
  "note": "初雪的重量，連花葉都感受到了。"
 },
 {
  "title": "蝴蝶",
  "author": "日・松尾芭蕉",
  "body": [
   "蝴蝶飛舞——",
   "我也隨之而動的，",
   "心思浮沉。"
  ],
  "note": "一隻蝴蝶，就足以攪動一顆安靜的心。"
 },
 {
  "title": "落花",
  "author": "日・松尾芭蕉",
  "body": [
   "細看那些——",
   "薺菜花開在籬笆下，",
   "安靜從容。"
  ],
  "note": "最不起眼的花，往往開得最從容。"
 },
 {
  "title": "我與天地",
  "author": "日・小林一茶",
  "body": [
   "露水的世界——",
   "雖是露水的世界，",
   "雖然如此。"
  ],
  "note": "明知人生如露，卻仍捨不得放手。"
 },
 {
  "title": "蝸牛",
  "author": "日・小林一茶",
  "body": [
   "慢慢爬吧——",
   "蝸牛啊，慢慢爬上，",
   "富士山頂。"
  ],
  "note": "再慢也沒關係，只要方向是山頂。"
 },
 {
  "title": "雀兒",
  "author": "日・小林一茶",
  "body": [
   "來跟我玩吧——",
   "沒有母親的，",
   "小麻雀。"
  ],
  "note": "孤獨的心，總想陪伴另一個孤獨。"
 },
 {
  "title": "故鄉",
  "author": "日・小林一茶",
  "body": [
   "故鄉啊——",
   "無論碰到什麼，",
   "都是刺。"
  ],
  "note": "故鄉讓人疼痛，因為太過在意。"
 },
 {
  "title": "正月",
  "author": "日・小林一茶",
  "body": [
   "新年的天空——",
   "也不過如此啊，",
   "和昨天一樣。"
  ],
  "note": "新年改變的是日曆，天空還是那片天空。"
 },
 {
  "title": "蛙",
  "author": "日・小林一茶",
  "body": [
   "瘦青蛙——",
   "別認輸啊，",
   "一茶在這裡。"
  ],
  "note": "為弱小者加油，也是為自己打氣。"
 },
 {
  "title": "春雨",
  "author": "日・小林一茶",
  "body": [
   "春雨啊——",
   "還沒有吃到東西的，",
   "小鴨子們。"
  ],
  "note": "春雨中的小鴨子，讓人心生憐愛。"
 },
 {
  "title": "落葉",
  "author": "日・小林一茶",
  "body": [
   "這個秋天——",
   "隔壁的孩子也像落葉一樣，",
   "越長越大了。"
  ],
  "note": "孩子像落葉一樣成長，不知不覺間就離開了枝頭。"
 },
 {
  "title": "螢火蟲",
  "author": "日・小林一茶",
  "body": [
   "螢火蟲——",
   "閃了一下就飛走了，",
   "回來呀。"
  ],
  "note": "美好的事物總是一閃而逝，讓人不捨。"
 },
 {
  "title": "大雪紛飛",
  "author": "日・小林一茶",
  "body": [
   "大雪紛飛——",
   "但這裡也是淨土，",
   "也是的。"
  ],
  "note": "即使大雪封路，腳下也是淨土。"
 },
 {
  "title": "秋夜",
  "author": "日・小林一茶",
  "body": [
   "秋天的夜——",
   "有人在敲著木魚，",
   "噠，噠，噠。"
  ],
  "note": "秋夜的木魚聲，是孤獨最有節奏的伴奏。"
 },
 {
  "title": "老貓",
  "author": "日・小林一茶",
  "body": [
   "老貓啊——",
   "你也對著春雨，",
   "打起呵欠。"
  ],
  "note": "連老貓都懶洋洋的春天，才是真正的春天。"
 },
 {
  "title": "炊煙",
  "author": "日・小林一茶",
  "body": [
   "傍晚的炊煙——",
   "每一縷都彎彎曲曲，",
   "像我的命運。"
  ],
  "note": "炊煙和命運一樣，從來不走直線。"
 },
 {
  "title": "櫻花",
  "author": "日・小林一茶",
  "body": [
   "櫻花樹下——",
   "完全陌生的人，",
   "也不算陌生了。"
  ],
  "note": "共賞一樹花，陌生人也變成了故人。"
 },
 {
  "title": "晨露",
  "author": "日・小林一茶",
  "body": [
   "草葉上的露珠——",
   "每一滴裡，",
   "都有一個世界。"
  ],
  "note": "微小的露珠裡，映照著整個宇宙。"
 },
 {
  "title": "菜花",
  "author": "日・與謝蕪村",
  "body": [
   "菜花開遍——",
   "西邊落日，",
   "東邊升月。"
  ],
  "note": "一邊是日落，一邊是月升，天地從不停歇。"
 },
 {
  "title": "春雨",
  "author": "日・與謝蕪村",
  "body": [
   "春雨裡——",
   "邊走邊說話的，",
   "蓑衣和傘。"
  ],
  "note": "春雨中最動人的風景，是結伴而行。"
 },
 {
  "title": "離別",
  "author": "日・與謝蕪村",
  "body": [
   "離去的春天——",
   "帶著遲來的，",
   "櫻花離去。"
  ],
  "note": "春天離去的時候，連遲來的花也一併帶走。"
 },
 {
  "title": "月光",
  "author": "日・與謝蕪村",
  "body": [
   "月光照著——",
   "梅花的影子，",
   "投在拉門上。"
  ],
  "note": "月光把梅花的影子，當作畫送給了人間。"
 },
 {
  "title": "秋風",
  "author": "日・與謝蕪村",
  "body": [
   "秋風吹過——",
   "紅色的蜻蜓，",
   "像辣椒一樣。"
  ],
  "note": "秋天的蜻蜓，帶著辣椒般的熱烈。"
 },
 {
  "title": "暮雨",
  "author": "日・與謝蕪村",
  "body": [
   "暮色中的雨——",
   "牛欄旁邊的，",
   "一隻白鷺。"
  ],
  "note": "暮雨中的白鷺，是最安靜的風景。"
 },
 {
  "title": "短夜",
  "author": "日・與謝蕪村",
  "body": [
   "短短的夏夜——",
   "毛蟲上面留下了，",
   "一滴露珠。"
  ],
  "note": "夏夜太短，連露珠都來不及蒸發。"
 },
 {
  "title": "夏河",
  "author": "日・與謝蕪村",
  "body": [
   "夏日的河流——",
   "讓人高興啊，",
   "可以踩進去。"
  ],
  "note": "踩進夏天的河流，是最簡單的快樂。"
 },
 {
  "title": "鮎魚",
  "author": "日・與謝蕪村",
  "body": [
   "鮎魚游過——",
   "水底的石頭，",
   "也在動搖。"
  ],
  "note": "一條魚的經過，連石頭都為之動搖。"
 },
 {
  "title": "寒梅",
  "author": "日・與謝蕪村",
  "body": [
   "梅花一朵——",
   "就增添了一朵的，",
   "溫暖啊。"
  ],
  "note": "每開一朵梅花，冬天就暖了一分。"
 },
 {
  "title": "柿子",
  "author": "日・正岡子規",
  "body": [
   "吃了一個柿子——",
   "鐘聲就響了，",
   "法隆寺。"
  ],
  "note": "一口柿子、一聲鐘，秋天就圓滿了。"
 },
 {
  "title": "病床",
  "author": "日・正岡子規",
  "body": [
   "病床上——",
   "翻一個身，",
   "就到了冬天。"
  ],
  "note": "病中的日子，翻個身就換了季節。"
 },
 {
  "title": "雞頭花",
  "author": "日・正岡子規",
  "body": [
   "雞頭花開著——",
   "已經看不見的池水，",
   "深了又深。"
  ],
  "note": "花在水面開，水在花下深不見底。"
 },
 {
  "title": "春寒",
  "author": "日・正岡子規",
  "body": [
   "春天的寒氣——",
   "連硯台裡的墨，",
   "也凝住了。"
  ],
  "note": "春寒料峭，連寫詩的墨都不願流動。"
 },
 {
  "title": "月下",
  "author": "日・正岡子規",
  "body": [
   "月亮升起來——",
   "搖晃著倒映在，",
   "水桶中。"
  ],
  "note": "月亮倒映在水桶裡，也是一輪完整的月。"
 },
 {
  "title": "蒲公英",
  "author": "日・正岡子規",
  "body": [
   "蒲公英啊——",
   "鐵路一直延伸，",
   "到了遠方。"
  ],
  "note": "蒲公英和鐵路，都是遠方的使者。"
 },
 {
  "title": "紅葉",
  "author": "日・正岡子規",
  "body": [
   "一片紅葉——",
   "落在石磨上面，",
   "好像一封信。"
  ],
  "note": "紅葉落在石磨上，是秋天寫的一封信。"
 },
 {
  "title": "斷腸",
  "author": "日・正岡子規",
  "body": [
   "糸瓜開花了——",
   "痰堵住了喉嚨的，",
   "佛前此日。"
  ],
  "note": "花開在病痛中，生命的美與苦交織。"
 },
 {
  "title": "朝顏",
  "author": "日・正岡子規",
  "body": [
   "牽牛花啊——",
   "一朵深淵般的，",
   "藍色。"
  ],
  "note": "一朵花的藍，深得像一個深淵。"
 },
 {
  "title": "霜夜",
  "author": "日・正岡子規",
  "body": [
   "霜降之夜——",
   "星星踏著霜光，",
   "走過天空。"
  ],
  "note": "霜夜的星星，像踩著冰霜過河的旅人。"
 },
 {
  "title": "飛鳥集（一）",
  "author": "印度・泰戈爾",
  "body": [
   "夏天的飛鳥，",
   "飛到我的窗前唱歌，",
   "又飛去了。",
   "",
   "秋天的黃葉，",
   "它們沒有什麼可唱，",
   "只嘆息一聲，",
   "飛落在那裡。"
  ],
  "note": "夏天用歌聲告別，秋天只能用嘆息。"
 },
 {
  "title": "飛鳥集（二）",
  "author": "印度・泰戈爾",
  "body": [
   "世界以痛吻我，",
   "要我報之以歌。"
  ],
  "note": "承受了所有的痛，依然選擇歌唱。"
 },
 {
  "title": "飛鳥集（三）",
  "author": "印度・泰戈爾",
  "body": [
   "生如夏花之絢爛，",
   "死如秋葉之靜美。"
  ],
  "note": "活就活得燦爛，走就走得安詳。"
 },
 {
  "title": "飛鳥集（四）",
  "author": "印度・泰戈爾",
  "body": [
   "如果你因失去了太陽而流淚，",
   "那麼你也將失去群星了。"
  ],
  "note": "為失去的哭泣，會讓你錯過更多的光。"
 },
 {
  "title": "飛鳥集（五）",
  "author": "印度・泰戈爾",
  "body": [
   "不是鐵器的敲打，",
   "而是水的載歌載舞，",
   "使粗糙的石塊，",
   "變成了美麗的鵝卵石。"
  ],
  "note": "溫柔比力量更能改變堅硬的事物。"
 },
 {
  "title": "新月集・金色花",
  "author": "印度・泰戈爾",
  "body": [
   "假如我變成了一朵金色花，",
   "為了好玩，",
   "長在樹的高枝上，",
   "笑嘻嘻地在風中搖擺。",
   "",
   "媽媽，你會認識我嗎？",
   "你要是叫道：孩子你在哪裡呀？",
   "我暗暗地在那裡匿笑，",
   "卻一聲兒不響。"
  ],
  "note": "孩子的淘氣裡，藏著最純真的愛。"
 },
 {
  "title": "新月集・紙船",
  "author": "印度・泰戈爾",
  "body": [
   "我每天把紙船一個個放在急流的溪中。",
   "我用大黑字寫我的名字和我住的村名在紙船上。",
   "",
   "我希望住在異地的人會得到這紙船，",
   "知道我是誰。"
  ],
  "note": "紙船載著名字漂向遠方，是最初的社交網絡。"
 },
 {
  "title": "飛鳥集（六）",
  "author": "印度・泰戈爾",
  "body": [
   "我們把世界看錯了，",
   "反說它欺騙我們。"
  ],
  "note": "不是世界欺騙了我們，是我們看錯了世界。"
 },
 {
  "title": "飛鳥集（七）",
  "author": "印度・泰戈爾",
  "body": [
   "當你為錯過太陽而哭泣的時候，",
   "你也要再錯過群星了。"
  ],
  "note": "沉溺在過去的失去中，便無法看見眼前的星光。"
 },
 {
  "title": "吉檀迦利（選）",
  "author": "印度・泰戈爾",
  "body": [
   "讓我的愛像陽光一樣包圍著你，",
   "又給你以光輝燦爛的自由。"
  ],
  "note": "最好的愛，是給你溫暖也給你自由。"
 },
 {
  "title": "二十首情詩（其一）",
  "author": "智利・乃粹",
  "body": [
   "我喜歡你是寂靜的，",
   "彷彿你消失了一樣。",
   "你從遠處聆聽我，",
   "我的聲音卻無法觸及你。"
  ],
  "note": "最深的喜歡，是喜歡你安靜的樣子。"
 },
 {
  "title": "二十首情詩（其五）",
  "author": "智利・乃粹",
  "body": [
   "為了讓你聽見我的話語，",
   "有時候它們變得纖細，",
   "像飛鳥的足跡在沙灘上。"
  ],
  "note": "為了讓你聽見，我把語言磨得像沙上鳥跡一樣輕。"
 },
 {
  "title": "二十首情詩（其十五）",
  "author": "智利・乃粹",
  "body": [
   "我喜歡你是寂靜的，",
   "彷彿你不存在一般。",
   "遙遠而且哀傷——",
   "彷彿你已經死了。",
   "",
   "一個字，一個微笑就夠了。",
   "而我很高興，",
   "為了那不是真的而高興。"
  ],
  "note": "你的寂靜讓我心痛，但你的存在讓我高興。"
 },
 {
  "title": "每一天你都在玩弄",
  "author": "智利・乃粹",
  "body": [
   "每一天你都在玩弄宇宙的光。",
   "微妙的來客，你來到花和水之間。"
  ],
  "note": "你的存在就是一場光的遊戲。"
 },
 {
  "title": "馬丘比丘之巔",
  "author": "智利・乃粹",
  "body": [
   "石頭之中的石頭，而人，在哪裡？",
   "空氣之中的空氣，而人，在哪裡？",
   "時間之中的時間，而人，在哪裡？",
   "",
   "起來和我同行吧。"
  ],
  "note": "遺跡中追問人的蹤跡，是對文明最深的叩問。"
 },
 {
  "title": "一見鍾情",
  "author": "波蘭・辛波絲卡",
  "body": [
   "他們彼此深信，",
   "是瞬間迸發的熱情讓他們相遇。",
   "這樣的確定是美麗的，",
   "但變幻無常更為美麗。",
   "",
   "他們素未謀面，所以確定——",
   "彼此之間什麼也沒有發生。",
   "但是從街道、樓梯、走廊——",
   "他們之間可能存在多少偶然？"
  ],
  "note": "一見鍾情的美麗，在於那無數次的擦肩而過。"
 },
 {
  "title": "種種可能",
  "author": "波蘭・辛波絲卡",
  "body": [
   "我偏愛寫詩的荒謬，",
   "勝過不寫詩的荒謬。",
   "我偏愛喜歡人們的自己，",
   "勝過喜歡全人類的自己。"
  ],
  "note": "偏愛就是在荒謬中做出的最誠實的選擇。"
 },
 {
  "title": "結束與開始",
  "author": "波蘭・辛波絲卡",
  "body": [
   "每次戰爭過後，",
   "總得有人收拾殘局。",
   "畢竟事物不會自己",
   "整理自己。",
   "",
   "總得有人把瓦礫",
   "鏟到路邊，",
   "好讓載滿屍體的車子",
   "通過。"
  ],
  "note": "每一次結束都是另一次開始的沉重序幕。"
 },
 {
  "title": "在一顆小星星下",
  "author": "波蘭・辛波絲卡",
  "body": [
   "我為不能無所不在向你道歉。",
   "向在深淵中呼喊的人道歉，",
   "我無法做每個人的朋友。",
   "",
   "向所有我不了解的人道歉。",
   "向大海道歉，我用小杯子取水。"
  ],
  "note": "我們用一輩子的愧疚，向無法觸及的世界道歉。"
 },
 {
  "title": "對色情文學的看法",
  "author": "波蘭・辛波絲卡",
  "body": [
   "靈魂和肉體之間——",
   "沒有什麼比靈魂",
   "更令肉體無法忍受的了。"
  ],
  "note": "靈與肉的矛盾，是人最深的困境。"
 },
 {
  "title": "博物館",
  "author": "波蘭・辛波絲卡",
  "body": [
   "這裡有盤子而沒有食慾，",
   "有結婚戒指但沒有愛情已至少三百年，",
   "這裡有扇子——臉紅呢？",
   "這裡有劍——憤怒呢？"
  ],
  "note": "博物館裡只剩下物件，激情早已蒸發。"
 },
 {
  "title": "寫履歷表",
  "author": "波蘭・辛波絲卡",
  "body": [
   "需要什麼就寫什麼。",
   "填好表格，附上照片。",
   "",
   "不管你的生命有多長——",
   "履歷表應該簡短。",
   "簡潔扼要是必須的。",
   "",
   "風景被地址取代了，",
   "搖擺不定的記憶向確切的日期讓步。"
  ],
  "note": "一個人的一生被壓縮成一張表格，何其荒謬。"
 },
 {
  "title": "也許這一切",
  "author": "波蘭・辛波絲卡",
  "body": [
   "也許這一切",
   "發生在某個實驗室的星球上？",
   "我們被偷偷觀察了一小陣子，",
   "在有趣的地方做了些記號。"
  ],
  "note": "如果人類不過是宇宙的實驗品呢。"
 },
 {
  "title": "三個最奇怪的詞",
  "author": "波蘭・辛波絲卡",
  "body": [
   "當我說「未來」這個詞，",
   "第一音方出即成過去。",
   "",
   "當我說「寂靜」這個詞，",
   "我打破了它。",
   "",
   "當我說「虛無」這個詞，",
   "我在無中生有。"
  ],
  "note": "語言是最大的悖論，說出口的一刻就背叛了自己。"
 },
 {
  "title": "橋上的人們",
  "author": "波蘭・辛波絲卡",
  "body": [
   "奇怪的星球，上面住著奇怪的人。",
   "他們屈服於時間，",
   "卻不願承認。",
   "",
   "他們有自己的方式表達抗議——",
   "他們做些小東西，",
   "然後稱之為藝術。"
  ],
  "note": "藝術是人類對抗時間的最溫柔的方式。"
 },
 {
  "title": "二十億光年的孤獨",
  "author": "日・谷川俊太郎",
  "body": [
   "人類在小小的球上，",
   "睡覺 起來 然後工作，",
   "偶爾渴望火星上有朋友。",
   "",
   "火星人在小小的球上，",
   "睡覺 起來 然後工作，",
   "偶爾也渴望地球上有朋友。",
   "",
   "萬有引力——",
   "是相互吸引孤獨的力。",
   "",
   "宇宙正在傾斜，",
   "所以大家都在互相尋找。"
  ],
  "note": "孤獨是宇宙的底色，萬有引力是尋找彼此的力量。"
 },
 {
  "title": "活著",
  "author": "日・谷川俊太郎",
  "body": [
   "活著",
   "就是現在活著",
   "口渴了",
   "是美麗的人行道上的花",
   "是突然襲來的旋律",
   "是打噴嚏",
   "是和你手牽手"
  ],
  "note": "活著就是此刻的感受，簡單到不需要理由。"
 },
 {
  "title": "春天",
  "author": "日・谷川俊太郎",
  "body": [
   "泥土裡有什麼——",
   "蚯蚓的夢想。",
   "根的耐心。",
   "還有來年春天的承諾。"
  ],
  "note": "春天的承諾，埋在泥土最深處。"
 },
 {
  "title": "小鳥在天空消失的日子",
  "author": "日・谷川俊太郎",
  "body": [
   "小鳥在天空消失的日子，",
   "我在街上到處走。",
   "一個人。",
   "",
   "魚在大海消失的日子，",
   "大海翻起了波浪。",
   "只有波浪。",
   "",
   "人在大地消失的日子——",
   "大地什麼都不知道。"
  ],
  "note": "消失的悲劇在於，承載你的世界根本不會在意。"
 },
 {
  "title": "語言",
  "author": "日・谷川俊太郎",
  "body": [
   "語言啊——",
   "你究竟能表達什麼？",
   "沉默中有一片森林，",
   "而你只是其中的一片落葉。"
  ],
  "note": "語言所能表達的，不過是沉默的一小片碎屑。"
 },
 {
  "title": "早安",
  "author": "日・谷川俊太郎",
  "body": [
   "早安——",
   "在嶄新的早晨向你問好。",
   "太陽還是一樣的，",
   "但今天的光和昨天不同。",
   "",
   "因為你在。"
  ],
  "note": "同樣的早晨，因為你在就不一樣了。"
 },
 {
  "title": "夜中",
  "author": "日・谷川俊太郎",
  "body": [
   "半夜三點鐘醒了。",
   "世界正在呼吸。",
   "小小的鐘聲也在呼吸。",
   "我也在呼吸。",
   "",
   "活著啊——",
   "只是這件事就很了不起了。"
  ],
  "note": "深夜裡發現自己在呼吸，就是最了不起的事。"
 },
 {
  "title": "河流",
  "author": "日・谷川俊太郎",
  "body": [
   "河流不回頭，",
   "所以才是河流。",
   "如果回了頭，",
   "就只是一灘積水。"
  ],
  "note": "向前是河流，回頭就成了池塘。"
 },
 {
  "title": "給孩子的詩",
  "author": "日・谷川俊太郎",
  "body": [
   "不要急著長大，",
   "因為長大以後——",
   "花會變成植物學，",
   "星星會變成物理學，",
   "而你的淚水會變成化學。"
  ],
  "note": "長大是一場緩慢的去魅，讓一切美好變成學科。"
 },
 {
  "title": "什麼都沒有的貓",
  "author": "日・谷川俊太郎",
  "body": [
   "什麼都沒有的貓，",
   "有著毛茸茸的肚子。",
   "什麼都沒有的貓，",
   "有著溫暖的鼻息。",
   "",
   "我也想成為——",
   "什麼都沒有的貓。"
  ],
  "note": "什麼都沒有的貓，反而擁有了一切。"
 },
 {
  "title": "客棧",
  "author": "波斯・魯米",
  "body": [
   "做人好像經營一家客棧，",
   "每天早晨都有新的客人到來。",
   "",
   "一個歡樂，一個沮喪，一個卑鄙，",
   "瞬間的覺察——",
   "像不速之客突然來訪。",
   "",
   "歡迎且款待他們每一位！"
  ],
  "note": "接納每一種情緒，如同好客的主人。"
 },
 {
  "title": "愛的海洋",
  "author": "波斯・魯米",
  "body": [
   "我是一個小小的世界——",
   "由尋找所構成。",
   "每一粒原子都在渴望著什麼，",
   "我的整個身體就是這渴望。"
  ],
  "note": "存在的本質，就是渴望與尋找。"
 },
 {
  "title": "蘆葦笛",
  "author": "波斯・魯米",
  "body": [
   "你聽那蘆葦笛在哭訴——",
   "自從我從蘆葦叢中被割下，",
   "我的哀聲令男男女女落淚。",
   "",
   "我要的是因離別而撕裂的胸膛，",
   "這樣我才能傾訴對愛的渴望。"
  ],
  "note": "蘆葦笛的哀鳴，是每個離鄉者的心聲。"
 },
 {
  "title": "那裡有一片原野",
  "author": "波斯・魯米",
  "body": [
   "在對與錯的觀念之外，",
   "有一片原野。",
   "我將在那裡等你。",
   "",
   "當靈魂躺臥在那片青草地上時，",
   "世界滿溢，無法言說。"
  ],
  "note": "超越是非的那片原野，是靈魂最自由的歸處。"
 },
 {
  "title": "你不是一滴水",
  "author": "波斯・魯米",
  "body": [
   "你不是一滴水在海洋中。",

   "",
   "紛吾既有此內美兮，又重之以修能。",
   "扈江離與辟芷兮，紉秋蘭以為佩。",
   "汩余若將不及兮，恐年歲之不吾與。",
   "朝搴阰之木蘭兮，夕攬洲之宿莽。",
   "",
   "路漫漫其修遠兮，吾將上下而求索。"
  ],
  "note": "上下求索的精神，是中國知識分子最高貴的品格。"
 },
 {
  "title": "九歌・湘夫人",
  "author": "楚辭・屈原",
  "body": [
   "帝子降兮北渚，目眇眇兮愁予。",
   "嫋嫋兮秋風，洞庭波兮木葉下。",
   "登白薠兮騁望，與佳期兮夕張。",
   "鳥何萃兮蘋中，罾何為兮木上？"
  ],
  "note": "秋風落葉洞庭波，千古湘妃的愁情如水長流。"
 },
 {
  "title": "九歌・山鬼",
  "author": "楚辭・屈原",
  "body": [
   "若有人兮山之阿，被薜荔兮帶女蘿。",
   "既含睇兮又宜笑，子慕予兮善窈窕。",
   "乘赤豹兮從文貍，辛夷車兮結桂旗。",
   "被石蘭兮帶杜衡，折芳馨兮遺所思。"
  ],
  "note": "山中的女神，是屈原筆下最浪漫的意象。"
 },
 {
  "title": "九歌・國殤",
  "author": "楚辭・屈原",
  "body": [
   "操吳戈兮被犀甲，車錯轂兮短兵接。",
   "旌蔽日兮敵若雲，矢交墜兮士爭先。",
   "凌余陣兮躐余行，左驂殪兮右刃傷。",
   "霾兩輪兮縶四馬，援玉枹兮擊鳴鼓。",
   "天時墜兮威靈怒，嚴殺盡兮棄原野。",
   "",
   "身既死兮神以靈，子魂魄兮為鬼雄。"
  ],
  "note": "為國捐軀者的魂魄，千年之後仍是鬼中之雄。"
 },
 {
  "title": "九歌・少司命",
  "author": "楚辭・屈原",
  "body": [
   "秋蘭兮麋蕪，羅生兮堂下。",
   "綠葉兮素華，芳菲菲兮襲予。",
   "夫人兮自有美子，蓀何以兮愁苦？",
   "",
   "悲莫悲兮生別離，樂莫樂兮新相知。"
  ],
  "note": "悲莫悲兮生別離——離別之苦，古今共感。"
 },
 {
  "title": "九章・涉江",
  "author": "楚辭・屈原",
  "body": [
   "余幼好此奇服兮，年既老而不衰。",
   "帶長鋏之陸離兮，冠切雲之崔嵬。",
   "被明月兮佩寶璐。",
   "",
   "世溷濁而莫余知兮，吾方高馳而不顧。",
   "駕青虯兮驂白螭，吾與重華遊兮瑤之圃。"
  ],
  "note": "世人皆濁我獨清，是屈原一生的堅守。"
 },
 {
  "title": "天問（節選）",
  "author": "楚辭・屈原",
  "body": [
   "曰遂古之初，誰傳道之？",
   "上下未形，何由考之？",
   "冥昭瞢暗，誰能極之？",
   "馮翼惟象，何以識之？",
   "明明暗暗，惟時何為？",
   "陰陽三合，何本何化？"
  ],
  "note": "對天地的追問，是人類最初的哲學。"
 },
 {
  "title": "漁父",
  "author": "楚辭・屈原",
  "body": [
   "屈原既放，遊於江潭，行吟澤畔。",
   "顏色憔悴，形容枯槁。",
   "漁父見而問之曰：「子非三閭大夫與？何故至於斯？」",
   "屈原曰：「舉世皆濁我獨清，眾人皆醉我獨醒，是以見放。」",
   "",
   "漁父曰：「滄浪之水清兮，可以濯吾纓；",
   "滄浪之水濁兮，可以濯吾足。」"
  ],
  "note": "清與濁的抉擇，是每個時代知識分子的永恆命題。"
 },
 {
  "title": "九歌・東皇太一",
  "author": "楚辭・屈原",
  "body": [
   "吉日兮辰良，穆將愉兮上皇。",
   "撫長劍兮玉珥，璆鏘鳴兮琳琅。",
   "瑤席兮玉瑱，盍將把兮瓊芳。",
   "蕙肴蒸兮蘭藉，奠桂酒兮椒漿。"
  ],
  "note": "祭祀天神的莊嚴，是先民對天地最虔誠的敬畏。"
 },
 {
  "title": "橘頌",
  "author": "楚辭・屈原",
  "body": [
   "后皇嘉樹，橘徠服兮。",
   "受命不遷，生南國兮。",
   "深固難徙，更壹志兮。",
   "綠葉素榮，紛其可喜兮。"
  ],
  "note": "橘樹生於南國不可移植，正如高潔之士不改其志。"
 },
 {
  "title": "長歌行",
  "author": "漢・漢樂府",
  "body": [
   "青青園中葵，朝露待日晞。",
   "陽春布德澤，萬物生光輝。",
   "常恐秋節至，焜黃華葉衰。",
   "百川東到海，何時復西歸？",
   "少壯不努力，老大徒傷悲。"
  ],
  "note": "百川東到海不復西歸，時光亦然，不等人。"
 },
 {
  "title": "江南",
  "author": "漢・漢樂府",
  "body": [
   "江南可採蓮，蓮葉何田田。",
   "魚戲蓮葉間。",
   "魚戲蓮葉東，魚戲蓮葉西，",
   "魚戲蓮葉南，魚戲蓮葉北。"
  ],
  "note": "魚在蓮間嬉戲，是江南最生動的畫面。"
 },
 {
  "title": "上邪",
  "author": "漢・漢樂府",
  "body": [
   "上邪！",
   "我欲與君相知，長命無絕衰。",
   "山無陵，江水為竭，",
   "冬雷震震，夏雨雪，",
   "天地合，乃敢與君絕！"
  ],
  "note": "用天地翻覆來誓言不離，是最決絕的愛情宣言。"
 },
 {
  "title": "陌上桑",
  "author": "漢・漢樂府",
  "body": [
   "日出東南隅，照我秦氏樓。",
   "秦氏有好女，自名為羅敷。",
   "羅敷喜蠶桑，採桑城南隅。",
   "青絲為籠係，桂枝為籠鉤。",
   "頭上倭墮髻，耳中明月珠。",
   "緗綺為下裙，紫綺為上襦。",
   "行者見羅敷，下擔捋髭鬚。",
   "少年見羅敷，脫帽著帩頭。",
   "耕者忘其犁，鋤者忘其鋤。",
   "來歸相怨怒，但坐觀羅敷。"
  ],
  "note": "美到令人忘記手中活計，是最生動的側面描寫。"
 },
 {
  "title": "飲馬長城窟行",
  "author": "漢・漢樂府",
  "body": [
   "青青河畔草，綿綿思遠道。",
   "遠道不可思，宿昔夢見之。",
   "夢見在我傍，忽覺在他鄉。",
   "他鄉各異縣，輾轉不相見。",
   "枯桑知天風，海水知天寒。",
   "入門各自媚，誰肯相為言。",
   "客從遠方來，遺我雙鯉魚。",
   "呼兒烹鯉魚，中有尺素書。",
   "長跪讀素書，書中竟何如。",
   "上言加餐食，下言長相憶。"
  ],
  "note": "千里之外寄來的書信，不過是「多吃飯、常想你」。"
 },
 {
  "title": "十五從軍征",
  "author": "漢・漢樂府",
  "body": [
   "十五從軍征，八十始得歸。",
   "道逢鄉里人：「家中有阿誰？」",
   "「遙看是君家，松柏冢累累。」",
   "兔從狗竇入，雉從樑上飛。",
   "中庭生旅穀，井上生旅葵。",
   "舂穀持作飯，采葵持作羹。",
   "羹飯一時熟，不知貽阿誰。",
   "出門東向看，淚落沾我衣。"
  ],
  "note": "少年出征白頭歸，家中只剩荒草墳，戰爭的殘酷莫過於此。"
 },
 {
  "title": "孔雀東南飛（節選）",
  "author": "漢・漢樂府",
  "body": [
   "孔雀東南飛，五里一徘徊。",
   "「十三能織素，十四學裁衣，",
   "十五彈箜篌，十六誦詩書，",
   "十七為君婦，心中常苦悲。」",
   "",
   "「君當作磐石，妾當作蒲葦，",
   "蒲葦紉如絲，磐石無轉移。」",
   "",
   "兩家求合葬，合葬華山傍。",
   "東西植松柏，左右種梧桐。",
   "枝枝相覆蓋，葉葉相交通。",
   "中有雙飛鳥，自名為鴛鴦。"
  ],
  "note": "磐石蒲葦的誓言，是漢代最動人的愛情悲劇。"
 },
 {
  "title": "行行重行行",
  "author": "漢・古詩十九首",
  "body": [
   "行行重行行，與君生別離。",
   "相去萬餘里，各在天一涯。",
   "道路阻且長，會面安可知？",
   "胡馬依北風，越鳥巢南枝。",
   "相去日已遠，衣帶日已緩。",
   "浮雲蔽白日，遊子不顧反。",
   "思君令人老，歲月忽已晚。",
   "棄捐勿復道，努力加餐飯。"
  ],
  "note": "千言萬語到最後，只剩一句「好好吃飯」。"
 },
 {
  "title": "青青河畔草",
  "author": "漢・古詩十九首",
  "body": [
   "青青河畔草，鬱鬱園中柳。",
   "盈盈樓上女，皎皎當窗牖。",
   "娥娥紅粉妝，纖纖出素手。",
   "昔為娼家女，今為蕩子婦。",
   "蕩子行不歸，空床難獨守。"
  ],
  "note": "獨守空房的等待，是古代女子最無奈的命運。"
 },
 {
  "title": "迢迢牽牛星",
  "author": "漢・古詩十九首",
  "body": [
   "迢迢牽牛星，皎皎河漢女。",
   "纖纖擢素手，札札弄機杼。",
   "終日不成章，泣涕零如雨。",
   "河漢清且淺，相去復幾許。",
   "盈盈一水間，脈脈不得語。"
  ],
  "note": "銀河淺淺卻不能相見，最痛的距離不在腳下。"
 },
 {
  "title": "西北有高樓",
  "author": "漢・古詩十九首",
  "body": [
   "西北有高樓，上與浮雲齊。",
   "交疏結綺窗，阿閣三重階。",
   "上有絃歌聲，音響一何悲！",
   "誰能為此曲？無乃杞梁妻。",
   "清商隨風發，中曲正徘徊。",
   "一彈再三嘆，慷慨有餘哀。",
   "不惜歌者苦，但傷知音稀。",
   "願為雙鴻鵠，奮翅起高飛。"
  ],
  "note": "世間最大的寂寞，不是無人聽，而是無人懂。"
 },
 {
  "title": "涉江采芙蓉",
  "author": "漢・古詩十九首",
  "body": [
   "涉江采芙蓉，蘭澤多芳草。",
   "采之欲遺誰？所思在遠道。",
   "還顧望舊鄉，長路漫浩浩。",
   "同心而離居，憂傷以終老。"
  ],
  "note": "採花欲贈遠人，花在手中，人在天涯。"
 },
 {
  "title": "明月何皎皎",
  "author": "漢・古詩十九首",
  "body": [
   "明月何皎皎，照我羅床幃。",
   "憂愁不能寐，攬衣起徘徊。",
   "客行雖云樂，不如早旋歸。",
   "出戶獨彷徨，愁思當告誰？",
   "引領還入房，淚下沾裳衣。"
  ],
  "note": "月光照進孤獨的房間，思鄉的淚無人可訴。"
 },
 {
  "title": "生年不滿百",
  "author": "漢・古詩十九首",
  "body": [
   "生年不滿百，常懷千歲憂。",
   "晝短苦夜長，何不秉燭遊？",
   "為樂當及時，何能待來茲？",
   "愚者愛惜費，但為後世嗤。",
   "仙人王子喬，難可與等期。"
  ],
  "note": "人生苦短，何不趁夜秉燭而遊，及時行樂。"
 },
 {
  "title": "驅車上東門",
  "author": "漢・古詩十九首",
  "body": [
   "驅車上東門，遙望郭北墓。",
   "白楊何蕭蕭，松柏夾廣路。",
   "下有陳死人，杳杳即長暮。",
   "潛寐黃泉下，千載永不寤。",
   "浩浩陰陽移，年命如朝露。",
   "人生忽如寄，壽無金石固。"
  ],
  "note": "墓前白楊蕭蕭，提醒人生不過是一場暫寄。"
 },
 {
  "title": "今日良宴會",
  "author": "漢・古詩十九首",
  "body": [
   "今日良宴會，歡樂難具陳。",
   "彈箏奮逸響，新聲妙入神。",
   "令德唱高言，識曲聽其真。",
   "齊心同所願，含意俱未申。",
   "人生寄一世，奄忽若飆塵。",
   "何不策高足，先據要路津。",
   "無為守窮賤，坎軻長苦辛。"
  ],
  "note": "宴飲之歡難掩人生如塵的感慨。"
 },
 {
  "title": "回車駕言邁",
  "author": "漢・古詩十九首",
  "body": [
   "回車駕言邁，悠悠涉長道。",
   "四顧何茫茫，東風搖百草。",
   "所遇無故物，焉得不速老。",
   "盛衰各有時，立身苦不早。",
   "人生非金石，豈能長壽考？",
   "奄忽隨物化，榮名以為寶。"
  ],
  "note": "萬物都在變老，唯有好名聲可以長存。"
 },
 {
  "title": "庭中有奇樹",
  "author": "漢・古詩十九首",
  "body": [
   "庭中有奇樹，綠葉發華滋。",
   "攀條折其榮，將以遺所思。",
   "馨香盈懷袖，路遠莫致之。",
   "此物何足貴？但感別經時。"
  ],
  "note": "花香滿袖卻寄不到你身邊，距離讓一切禮物都變得無力。"
 },
 {
  "title": "明月皎夜光",
  "author": "漢・古詩十九首",
  "body": [
   "明月皎夜光，促織鳴東壁。",
   "玉衡指孟冬，眾星何歷歷。",
   "白露沾野草，時節忽復易。",
   "秋蟬鳴樹間，玄鳥逝安適。",
   "昔我同門友，高舉振六翮。",
   "不念攜手好，棄我如遺跡。"
  ],
  "note": "同窗好友一旦飛黃騰達，往日情誼便如塵土。"
 },
 {
  "title": "冉冉孤生竹",
  "author": "漢・古詩十九首",
  "body": [
   "冉冉孤生竹，結根泰山阿。",
   "與君為新婚，菟絲附女蘿。",
   "菟絲生有時，夫婦會有宜。",
   "千里遠結婚，悠悠隔山陂。",
   "思君令人老，軒車來何遲！"
  ],
  "note": "新婚便別離，等待的日子比路途更漫長。"
 },
 {
  "title": "客從遠方來",
  "author": "漢・古詩十九首",
  "body": [
   "客從遠方來，遺我一端綺。",
   "相去萬餘里，故人心尚爾。",
   "文彩雙鴛鴦，裁為合歡被。",
   "著以長相思，緣以結不解。",
   "以膠投漆中，誰能別離此？"
  ],
  "note": "一匹錦緞做成合歡被，如膠似漆的思念不可拆。"
 },
 {
  "title": "短歌行",
  "author": "魏・曹操",
  "body": [
   "對酒當歌，人生幾何！",
   "譬如朝露，去日苦多。",
   "慨當以慷，憂思難忘。",
   "何以解憂？唯有杜康。",
   "",
   "青青子衿，悠悠我心。",
   "但為君故，沉吟至今。",
   "呦呦鹿鳴，食野之苹。",
   "我有嘉賓，鼓瑟吹笙。",
   "",
   "明明如月，何時可掇？",
   "憂從中來，不可斷絕。",
   "越陌度阡，枉用相存。",
   "契闊談讌，心念舊恩。",
   "",
   "月明星稀，烏鵲南飛。",
   "繞樹三匝，何枝可依？",
   "山不厭高，海不厭深。",
   "周公吐哺，天下歸心。"
  ],
  "note": "對酒當歌卻憂思難忘，一代梟雄的求賢若渴。"
 },
 {
  "title": "觀滄海",
  "author": "魏・曹操",
  "body": [
   "東臨碣石，以觀滄海。",
   "水何澹澹，山島竦峙。",
   "樹木叢生，百草豐茂。",
   "秋風蕭瑟，洪波湧起。",
   "日月之行，若出其中；",
   "星漢燦爛，若出其裏。",
   "幸甚至哉，歌以詠志。"
  ],
  "note": "容得下日月星辰的氣魄，是曹操獨有的胸襟。"
 },
 {
  "title": "龜雖壽",
  "author": "魏・曹操",
  "body": [
   "神龜雖壽，猶有竟時。",
   "騰蛇乘霧，終為土灰。",
   "老驥伏櫪，志在千里。",
   "烈士暮年，壯心不已。",
   "盈縮之期，不但在天；",
   "養怡之福，可得永年。",
   "幸甚至哉，歌以詠志。"
  ],
  "note": "老驥伏櫪志在千里，暮年的雄心最令人動容。"
 },
 {
  "title": "蒿里行",
  "author": "魏・曹操",
  "body": [
   "關東有義士，興兵討群凶。",
   "初期會盟津，乃心在咸陽。",
   "軍合力不齊，躊躇而雁行。",
   "勢利使人爭，嗣還自相戕。",
   "淮南弟稱號，刻璽於北方。",
   "鎧甲生蟣蝨，萬姓以死亡。",
   "白骨露於野，千里無雞鳴。",
   "生民百遺一，念之斷人腸。"
  ],
  "note": "白骨露野千里無雞鳴，亂世的真相是生民塗炭。"
 },
 {
  "title": "白馬篇",
  "author": "魏・曹植",
  "body": [
   "白馬飾金羈，連翩西北馳。",
   "借問誰家子，幽并遊俠兒。",
   "少小去鄉邑，揚聲沙漠垂。",
   "宿昔秉良弓，楛矢何參差。",
   "控弦破左的，右發摧月支。",
   "仰手接飛猱，俯身散馬蹄。",
   "狡捷過猴猿，勇剽若豹螭。",
   "",
   "棄身鋒刃端，性命安可懷？",
   "父母且不顧，何言子與妻！",
   "名編壯士籍，不得中顧私。",
   "捐軀赴國難，視死忽如歸！"
  ],
  "note": "捐軀赴國難視死忽如歸，是少年英雄最壯烈的理想。"
 },
 {
  "title": "七步詩",
  "author": "魏・曹植",
  "body": [
   "煮豆持作羹，漉菽以為汁。",
   "萁在釜下燃，豆在釜中泣。",
   "本自同根生，相煎何太急？"
  ],
  "note": "骨肉相殘的悲劇，七步之內道盡千古傷痛。"
 },
 {
  "title": "洛神賦（節選）",
  "author": "魏・曹植",
  "body": [
   "其形也，翩若驚鴻，婉若遊龍。",
   "榮曜秋菊，華茂春松。",
   "髣髴兮若輕雲之蔽月，飄颻兮若流風之迴雪。",
   "遠而望之，皎若太陽升朝霞；",
   "迫而察之，灼若芙蕖出淥波。"
  ],
  "note": "翩若驚鴻婉若遊龍，是中國文學中最美的女性形象。"
 },
 {
  "title": "燕歌行",
  "author": "魏・曹丕",
  "body": [
   "秋風蕭瑟天氣涼，草木搖落露為霜。",
   "群燕辭歸鵠南翔，念君客遊思斷腸。",
   "慊慊思歸戀故鄉，君何淹留寄他方？",
   "賤妾煢煢守空房，憂來思君不敢忘，不覺淚下沾衣裳。",
   "援琴鳴弦發清商，短歌微吟不能長。",
   "明月皎皎照我床，星漢西流夜未央。",
   "牽牛織女遙相望，爾獨何辜限河梁。"
  ],
  "note": "七言詩之祖，秋夜的思念長過銀河。"
 },
 {
  "title": "詠懷詩（其一）",
  "author": "魏・阮籍",
  "body": [
   "夜中不能寐，起坐彈鳴琴。",
   "薄帷鑒明月，清風吹我襟。",
   "孤鴻號外野，翔鳥鳴北林。",
   "徘徊將何見？憂思獨傷心。"
  ],
  "note": "夜半撫琴的孤獨，是亂世文人無處安放的憂愁。"
 },
 {
  "title": "詠史（其二）",
  "author": "晉・左思",
  "body": [
   "鬱鬱澗底松，離離山上苗。",
   "以彼徑寸莖，蔭此百尺條。",
   "世胄躡高位，英俊沉下僚。",
   "地勢使之然，由來非一朝。",
   "金張藉舊業，七葉珥漢貂。",
   "馮公豈不偉，白首不見招。"
  ],
  "note": "澗底之松高於山上之苗，卻被地勢所限，世道不公古已有之。"
 },
 {
  "title": "飲酒（其五）",
  "author": "晉・陶淵明",
  "body": [
   "結廬在人境，而無車馬喧。",
   "問君何能爾？心遠地自偏。",
   "採菊東籬下，悠然見南山。",
   "山氣日夕佳，飛鳥相與還。",
   "此中有真意，欲辨已忘言。"
  ],
  "note": "心遠地自偏，真正的自由不在遠方，在心境。"
 },
 {
  "title": "歸園田居（其一）",
  "author": "晉・陶淵明",
  "body": [
   "少無適俗韻，性本愛丘山。",
   "誤落塵網中，一去三十年。",
   "羈鳥戀舊林，池魚思故淵。",
   "開荒南野際，守拙歸園田。",
   "方宅十餘畝，草屋八九間。",
   "榆柳蔭後簷，桃李羅堂前。",
   "曖曖遠人村，依依墟里煙。",
   "狗吠深巷中，雞鳴桑樹顛。",
   "戶庭無塵雜，虛室有餘閒。",
   "久在樊籠裡，復得返自然。"
  ],
  "note": "三十年塵網終於掙脫，歸田是最大的自由。"
 },
 {
  "title": "歸園田居（其三）",
  "author": "晉・陶淵明",
  "body": [
   "種豆南山下，草盛豆苗稀。",
   "晨興理荒穢，帶月荷鋤歸。",
   "道狹草木長，夕露沾我衣。",
   "衣沾不足惜，但使願無違。"
  ],
  "note": "帶月荷鋤歸的瀟灑，是不違本心的代價。"
 },
 {
  "title": "桃花源記（詩）",
  "author": "晉・陶淵明",
  "body": [
   "嬴氏亂天紀，賢者避其世。",
   "黃綺之商山，伊人亦云逝。",
   "往跡浸復湮，來徑遂蕪廢。",
   "相命肆農耕，日入從所憩。",
   "桑竹垂餘蔭，菽稷隨時藝。",
   "春蠶收長絲，秋熟靡王稅。",
   "荒路曖交通，雞犬互鳴吠。",
   "俎豆猶古法，衣裳無新製。",
   "童孺縱行歌，斑白歡遊詣。"
  ],
  "note": "桃源的美好不在仙境，在沒有壓迫的人間。"
 },
 {
  "title": "雜詩（其一）",
  "author": "晉・陶淵明",
  "body": [
   "人生無根蒂，飄如陌上塵。",
   "分散逐風轉，此已非常身。",
   "落地為兄弟，何必骨肉親！",
   "得歡當作樂，斗酒聚比鄰。",
   "盛年不重來，一日難再晨。",
   "及時當勉勵，歲月不待人。"
  ],
  "note": "盛年不重來，及時當勉勵——陶潛也有勵志的一面。"
 },
 {
  "title": "讀山海經（其一）",
  "author": "晉・陶淵明",
  "body": [
   "孟夏草木長，繞屋樹扶疏。",
   "眾鳥欣有託，吾亦愛吾廬。",
   "既耕亦已種，時還讀我書。",
   "窮巷隔深轍，頗迴故人車。",
   "歡言酌春酒，摘我園中蔬。",
   "微雨從東來，好風與之俱。",
   "泛覽周王傳，流觀山海圖。",
   "俯仰終宇宙，不樂復何如？"
  ],
  "note": "耕完田再讀書，俯仰間與宇宙同樂。"
 },
 {
  "title": "移居（其二）",
  "author": "晉・陶淵明",
  "body": [
   "春秋多佳日，登高賦新詩。",
   "過門更相呼，有酒斟酌之。",
   "農務各自歸，閒暇輒相思。",
   "相思則披衣，言笑無厭時。",
   "此理將不勝？無為忽去茲。",
   "衣食當須紀，力耕不吾欺。"
  ],
  "note": "鄰里有酒便相呼，最好的生活不過如此簡單。"
 },
 {
  "title": "歸去來兮辭（節選）",
  "author": "晉・陶淵明",
  "body": [
   "歸去來兮，田園將蕪胡不歸？",
   "既自以心為形役，奚惆悵而獨悲？",
   "悟已往之不諫，知來者之可追。",
   "實迷途其未遠，覺今是而昨非。",
   "",
   "舟遙遙以輕颺，風飄飄而吹衣。",
   "問征夫以前路，恨晨光之熹微。"
  ],
  "note": "覺今是而昨非，醒悟的那一刻便是新生。"
 },
 {
  "title": "詠荊軻",
  "author": "晉・陶淵明",
  "body": [
   "燕丹善養士，志在報強嬴。",
   "招集百夫良，歲暮得荊卿。",
   "君子死知己，提劍出燕京。",
   "素驥鳴廣陌，慷慨送我行。",
   "雄髮指危冠，猛氣衝長纓。",
   "飲餞易水上，四座列群英。",
   "漸離擊悲筑，宋意唱高聲。",
   "蕭蕭哀風逝，淡淡寒波生。",
   "商音更流涕，羽奏壯士驚。",
   "心知去不歸，且有後世名。"
  ],
  "note": "風蕭蕭兮易水寒，壯士一去不復還的悲壯。"
 },
 {
  "title": "擬行路難（其四）",
  "author": "南朝・鮑照",
  "body": [
   "瀉水置平地，各自東西南北流。",
   "人生亦有命，安能行歎復坐愁？",
   "酌酒以自寬，舉杯斷絕歌路難。",
   "心非木石豈無感？吞聲躑躅不敢言。"
  ],
  "note": "心非木石豈無感，卻只能把苦楚吞進肚裡。"
 },
 {
  "title": "登池上樓",
  "author": "南朝・謝靈運",
  "body": [
   "潛虯媚幽姿，飛鴻響遠音。",
   "薄霄愧雲浮，棲川怍淵沈。",
   "進德智所拙，退耕力不任。",
   "徇祿反窮海，臥痾對空林。",
   "衾枕昧節候，褰開暫窺臨。",
   "傾耳聆波瀾，舉目眺嶇嵚。",
   "初景革緒風，新陽改故陰。",
   "池塘生春草，園柳變鳴禽。"
  ],
  "note": "池塘生春草——春天悄然而至，是最自然的詩意。"
 },
 {
  "title": "晚登三山還望京邑",
  "author": "南朝・謝朓",
  "body": [
   "灞涘望長安，河陽視京縣。",
   "白日麗飛甍，參差皆可見。",
   "餘霞散成綺，澄江靜如練。",
   "喧鳥覆春洲，雜英滿芳甸。",
   "去矣方滯淫，懷哉罷歡宴。",
   "佳期悵何許，淚下如流霰。"
  ],
  "note": "餘霞散成綺澄江靜如練，是六朝最華美的落日。"
 },
 {
  "title": "西洲曲",
  "author": "南朝・民歌",
  "body": [
   "憶梅下西洲，折梅寄江北。",
   "單衫杏子紅，雙鬢鴉雛色。",
   "西洲在何處？兩槳橋頭渡。",
   "日暮伯勞飛，風吹烏臼樹。",
   "",
   "采蓮南塘秋，蓮花過人頭。",
   "低頭弄蓮子，蓮子清如水。",
   "置蓮懷袖中，蓮心徹底紅。",
   "",
   "南風知我意，吹夢到西洲。"
  ],
  "note": "蓮子清如水蓮心徹底紅，借蓮寫情寫到了極致。"
 },
 {
  "title": "木蘭詩（節選）",
  "author": "南朝・民歌",
  "body": [
   "唧唧復唧唧，木蘭當戶織。",
   "不聞機杼聲，唯聞女嘆息。",
   "問女何所思，問女何所憶。",
   "女亦無所思，女亦無所憶。",
   "昨夜見軍帖，可汗大點兵。",
   "軍書十二卷，卷卷有爺名。",
   "阿爺無大兒，木蘭無長兄。",
   "願為市鞍馬，從此替爺征。",
   "",
   "萬里赴戎機，關山度若飛。",
   "朔氣傳金柝，寒光照鐵衣。",
   "將軍百戰死，壯士十年歸。"
  ],
  "note": "代父從軍的巾幗英雄，千年之後仍令人敬仰。"
 },
 {
  "title": "敕勒歌",
  "author": "南朝・北朝民歌",
  "body": [
   "敕勒川，陰山下。",
   "天似穹廬，籠蓋四野。",
   "天蒼蒼，野茫茫，",
   "風吹草低見牛羊。"
  ],
  "note": "天蒼蒼野茫茫，北方草原的遼闊一唱千年。"
 },
 {
  "title": "哀江南賦序（節選）",
  "author": "南朝・庾信",
  "body": [
   "粵以戊辰之年，建亥之月，大盜移國，金陵瓦解。",
   "余乃竄身荒谷，公私塗炭。",
   "日暮途遠，人間何世！",
   "將軍一去，大樹飄零；壯士不還，寒風蕭瑟。",
   "",
   "傅燮之但悲身世，無處求生；",
   "袁安之每念王室，自然流涕。"
  ],
  "note": "大樹飄零壯士不還，亡國之臣的悲痛入骨三分。"
 },
 {
  "title": "擬詠懷（其十一）",
  "author": "南朝・庾信",
  "body": [
   "搖落秋為氣，淒涼多怨情。",
   "啼枯湘水竹，哭壞杞梁城。",
   "天亡遭憤戰，日蹙值愁兵。",
   "直虹朝映壘，長星夜落營。",
   "楚歌饒恨曲，南風多死聲。",
   "眼前一杯酒，誰論身後名。"
  ],
  "note": "身後名不及眼前酒，亂世中的絕望與達觀。"
 },
 {
  "title": "贈範曄詩",
  "author": "南朝・陸凱",
  "body": [
   "折花逢驛使，寄與隴頭人。",
   "江南無所有，聊贈一枝春。"
  ],
  "note": "江南無所有只寄一枝春，最輕的禮物最重的情意。"
 },
 {
  "title": "吳均與朱元思書",
  "author": "南朝・吳均",
  "body": [
   "風煙俱淨，天山共色。",
   "從流飄蕩，任意東西。",
   "自富陽至桐廬一百許里，奇山異水，天下獨絕。",
   "",
   "水皆縹碧，千丈見底。",
   "游魚細石，直視無礙。",
   "急湍甚箭，猛浪若奔。"
  ],
  "note": "千丈水底清澈見魚，富春江的美令人忘歸。"
 },
 {
  "title": "入若耶溪",
  "author": "南朝・王籍",
  "body": [
   "艅艎何泛泛，空水共悠悠。",
   "陰霞生遠岫，陽景逐迴流。",
   "蟬噪林逾靜，鳥鳴山更幽。",
   "此地動歸念，長年悲倦遊。"
  ],
  "note": "蟬噪林逾靜鳥鳴山更幽，以聲寫靜的千古名句。"
 },
 {
  "title": "別賦（節選）",
  "author": "南朝・江淹",
  "body": [
   "黯然銷魂者，唯別而已矣！",
   "況秦吳兮絕國，復燕趙兮千里。",
   "或春苔兮始生，乍秋風兮暫起。",
   "是以行子腸斷，百感淒惻。",
   "風蕭蕭而異響，雲漫漫而奇色。"
  ],
  "note": "黯然銷魂者唯別而已矣，一句話道盡離愁。"
 },
 {
  "title": "詠史（其二）",
  "author": "魏・阮籍",
  "body": [
   "嘉樹下成蹊，東園桃與李。",
   "秋風吹飛藿，零落從此始。",
   "繁華有憔悴，堂上生荊杞。",
   "驅馬舍之去，去上西山趾。",
   "一身不自保，何況戀妻子。",
   "凝霜被野草，歲暮亦云已。"
  ],
  "note": "繁華有憔悴之日，人生的無常是永恆的主題。"
 },
 {
  "title": "贈秀才入軍（其十四）",
  "author": "魏・嵇康",
  "body": [
   "息徒蘭圃，秣馬華山。",
   "流磻平皋，垂綸長川。",
   "目送歸鴻，手揮五絃。",
   "俯仰自得，遊心太玄。",
   "嘉彼釣叟，得魚忘筌。",
   "郢人逝矣，誰與盡言。"
  ],
  "note": "目送歸鴻手揮五絃，是魏晉風度的極致瀟灑。"
 },
 {
  "title": "詠懷詩（其三十一）",
  "author": "魏・阮籍",
  "body": [
   "駕言發魏都，南向望吹臺。",
   "簫管有遺音，梁王安在哉？",
   "戰士食糟糠，賢者處蒿萊。",
   "歌舞曲未終，秦兵已復來。",
   "夾林非吾有，朱宮生塵埃。",
   "軍敗華陽下，身竟為土灰。"
  ],
  "note": "歌舞未終兵已至，繁華轉瞬成灰燼。"
 },
 {
  "title": "雜詩（其二）",
  "author": "魏・曹植",
  "body": [
   "轉蓬離本根，飄颻隨長風。",
   "何意回飈舉，吹我入雲中。",
   "高高上無極，天路安可窮？",
   "類此遊客子，捐軀遠從戎。",
   "毛褐不掩形，薇藿常不充。",
   "去去莫復道，沉憂令人老。"
  ],
  "note": "如蓬草般無根漂泊，遊子的孤獨無處訴說。"
 },
 {
  "title": "詠雪聯句",
  "author": "晉・謝道韞等",
  "body": [
   "白雪紛紛何所似？",
   "撒鹽空中差可擬。",
   "未若柳絮因風起。"
  ],
  "note": "柳絮因風起，才女的靈氣勝過一切比喻。"
 },
 {
  "title": "詠史（其五）",
  "author": "晉・左思",
  "body": [
   "皓天舒白日，靈景耀神州。",
   "列宅紫宮裏，飛宇若雲浮。",
   "峨峨高門內，藹藹皆王侯。",
   "自非攀龍客，何為歘來遊？",
   "被褐出閶闔，高步追許由。",
   "振衣千仞岡，濯足萬里流。"
  ],
  "note": "振衣千仞岡濯足萬里流，超脫的氣度令人心折。"
 },
 {
  "title": "贈婦詩（其三）",
  "author": "魏・秦嘉",
  "body": [
   "肅肅僕夫征，鏘鏘揚和鈴。",
   "清晨當引邁，束帶待雞鳴。",
   "顧看空室中，彷彿想姿形。",
   "一別懷萬恨，起坐為不寧。",
   "何用敘我心？遺思致款誠。",
   "寶釵好耀首，明鏡可鑒形。",
   "芳香去垢穢，素琴有清聲。",
   "詩人感木瓜，乃欲答瑤瓊。",
   "愧彼贈我厚，慚此往物輕。"
  ],
  "note": "臨行前回望空房中妻子的身影，是最真摯的離情。"
 },
 {
  "title": "悼亡詩（其一）",
  "author": "晉・潘岳",
  "body": [
   "荏苒冬春謝，寒暑忽流易。",
   "之子歸窮泉，重壤永幽隔。",
   "私懷誰克從，淹留亦何益。",
   "僶俛恭朝命，迴心反初役。",
   "望廬思其人，入室想所歷。",
   "幃屏無髣髴，翰墨有餘跡。",
   "流芳未及歇，遺掛猶在壁。",
   "悵恍如或存，迴遑忡驚惕。"
  ],
  "note": "亡妻的翰墨遺跡還在壁上，人已永隔，是最深的悼念。"
 },
 {
  "title": "蘭亭集序（節選）",
  "author": "晉・王羲之",
  "body": [
   "永和九年，歲在癸丑，暮春之初，會於會稽山陰之蘭亭。",
   "群賢畢至，少長咸集。",
   "此地有崇山峻嶺，茂林修竹，又有清流激湍，映帶左右。",
   "引以為流觴曲水，列坐其次。",
   "雖無絲竹管絃之盛，一觴一詠，亦足以暢敘幽情。",
   "",
   "仰觀宇宙之大，俯察品類之盛，",
   "所以遊目騁懷，足以極視聽之娛，信可樂也。"
  ],
  "note": "仰觀俯察之間，是魏晉名士最瀟灑的人生態度。"
 },
 {
  "title": "詠白雲",
  "author": "南朝・陶弘景",
  "body": [
   "山中何所有，嶺上多白雲。",
   "只可自怡悅，不堪持贈君。"
  ],
  "note": "山中只有白雲，卻是世間最奢侈的禮物。"
 },
 {
  "title": "天淨沙・秋思",
  "author": "元・馬致遠",
  "body": [
   "枯藤老樹昏鴉，",
   "小橋流水人家，",
   "古道西風瘦馬。",
   "夕陽西下，",
   "斷腸人在天涯。"
  ],
  "note": "二十八字寫盡天涯遊子的斷腸之思，被譽為秋思之祖。"
 },
 {
  "title": "天淨沙・秋",
  "author": "元・白樸",
  "body": [
   "孤村落日殘霞，",
   "輕煙老樹寒鴉，",
   "一點飛鴻影下。",
   "青山綠水，",
   "白草紅葉黃花。"
  ],
  "note": "五種色彩一幅秋景，蕭瑟中卻藏著明艷。"
 },
 {
  "title": "山坡羊・潼關懷古",
  "author": "元・張養浩",
  "body": [
   "峰巒如聚，波濤如怒，",
   "山河表裏潼關路。",
   "望西都，意躊躇。",
   "傷心秦漢經行處，宮闕萬間都做了土。",
   "興，百姓苦；亡，百姓苦。"
  ],
  "note": "興亡都是百姓苦，道破了千年王朝更替的真相。"
 },
 {
  "title": "山坡羊・驪山懷古",
  "author": "元・張養浩",
  "body": [
   "驪山四顧，阿房一炬，",
   "當時奢侈今何處？",
   "只見草蕭疏，水縈紆。",
   "至今遺恨迷煙樹。",
   "列國周齊秦漢楚，",
   "贏，都變做了土；輸，都變做了土。"
  ],
  "note": "贏也成土輸也成土，歷史的結局從不偏袒勝者。"
 },
 {
  "title": "南呂・四塊玉・別情",
  "author": "元・關漢卿",
  "body": [
   "自送別，心難捨，一點相思幾時絕？",
   "憑闌袖拂楊花雪。",
   "溪又斜，山又遮，人去也！"
  ],
  "note": "山遮水隔人已去，相思卻無處可絕。"
 },
 {
  "title": "雙調・沉醉東風",
  "author": "元・關漢卿",
  "body": [
   "咫尺的天南地北，霎時間月缺花飛。",
   "手執著餞行杯，眼閣著別離淚。",
   "剛道得聲「保重將息」，",
   "痛煞煞教人捨不得。",
   "好去者望前程萬里！"
  ],
  "note": "一聲保重，已是千言萬語。"
 },
 {
  "title": "大德歌・春",
  "author": "元・關漢卿",
  "body": [
   "子規啼，不如歸，道是春歸人未歸。",
   "幾日添憔悴，虛飄飄柳絮飛。",
   "一春魚雁無消息，則見雙燕鬥銜泥。"
  ],
  "note": "春歸人未歸，燕子成雙人獨守。"
 },
 {
  "title": "大德歌・秋",
  "author": "元・關漢卿",
  "body": [
   "風飄飄，雨瀟瀟，便做陳摶也睡不著。",
   "懊惱傷懷抱，擾擾清漏報。",
   "那堪比楚天秋，更添了一聲聲玉漏催。"
  ],
  "note": "風雨夜裡輾轉難眠，秋愁讓時間格外漫長。"
 },
 {
  "title": "摸魚兒・雁丘詞",
  "author": "元・元好問",
  "body": [
   "問世間，情是何物，直教生死相許？",
   "天南地北雙飛客，老翅幾回寒暑。",
   "歡樂趣，離別苦，就中更有癡兒女。",
   "君應有語：渺萬里層雲，千山暮雪，隻影向誰去？",
   "",
   "橫汾路，寂寞當年簫鼓，荒煙依舊平楚。",
   "招魂楚些何嗟及，山鬼暗啼風雨。",
   "天也妒，未信與，鶯兒燕子俱黃土。",
   "千秋萬古，為留待騷人，狂歌痛飲，來訪雁丘處。"
  ],
  "note": "問世間情是何物，大雁殉情的故事感動千年。"
 },
 {
  "title": "論詩三十首（其四）",
  "author": "元・元好問",
  "body": [
   "一語天然萬古新，豪華落盡見真淳。",
   "南窗白日羲皇上，未害淵明是晉人。"
  ],
  "note": "豪華落盡見真淳，最好的詩不在辭藻而在天然。"
 },
 {
  "title": "論詩三十首（其十二）",
  "author": "元・元好問",
  "body": [
   "望帝春心託杜鵑，佳人錦瑟怨華年。",
   "詩家總愛西崑好，獨恨無人作鄭箋。"
  ],
  "note": "美則美矣，若無人能解，終是遺憾。"
 },
 {
  "title": "臨江仙（自洛陽往孟津道中作）",
  "author": "元・元好問",
  "body": [
   "今古北邙山下路，黃塵老盡英雄。",
   "人生長恨水長東。",
   "幽懷誰共語，遠目送歸鴻。",
   "",
   "蓋世功名將底用，從前錯怨天公。",
   "浩歌一曲酒千鍾。",
   "男兒行處是，未要論窮通。"
  ],
  "note": "蓋世功名將底用，男兒該行便行，不問窮通。"
 },
 {
  "title": "中呂・陽春曲・知幾",
  "author": "元・白樸",
  "body": [
   "知榮知辱牢緘口，誰是誰非暗點頭。",
   "詩書叢裏且淹留。",
   "閒袖手，貧煞也風流。"
  ],
  "note": "是非不論榮辱不爭，窮也窮得風流。"
 },
 {
  "title": "雙調・慶東原",
  "author": "元・白樸",
  "body": [
   "忘憂草，含笑花，問君何所似？",
   "「六朝舊事隨流水，但寒煙衰草凝綠。」",
   "世態醉時看，人情夢裏知。"
  ],
  "note": "世態在醉中看透，人情在夢裡才真。"
 },
 {
  "title": "雙調・水仙子・夜雨",
  "author": "元・徐再思",
  "body": [
   "一聲梧葉一聲秋，一點芭蕉一點愁，",
   "三更歸夢三更後。",
   "落燈花棋未收，嘆新豐孤館人留。",
   "枕上十年事，江南二老憂，都到心頭。"
  ],
  "note": "梧葉聲聲催秋來，芭蕉點點添新愁。"
 },
 {
  "title": "雙調・壽陽曲・遠浦帆歸",
  "author": "元・馬致遠",
  "body": [
   "夕陽下，酒旆閑，兩三航未曾著岸。",
   "落花水香茅舍晚，斷橋頭賣魚人散。"
  ],
  "note": "夕陽漁舟茅舍落花，是歸隱者最嚮往的黃昏。"
 },
 {
  "title": "中呂・滿庭芳・看嶽王傳",
  "author": "元・周德清",
  "body": [
   "披文握武，建中興廟宇，命世英豪。",
   "威風凜凜千人怯，全仗精忠報。",
   "尊主功高，開邊展土，力盡忠盡孝。",
   "奸佞殘害，萬古千秋恨，天有報。"
  ],
  "note": "忠良被害奸佞當道，歷史的公道或遲但必到。"
 },
 {
  "title": "正宮・醉太平・譏貪小利者",
  "author": "元・無名氏",
  "body": [
   "奪泥燕口，削鐵針頭，",
   "刮金佛面細搜求，無中覓有。",
   "鵪鶉嗉裏尋豌豆，鷺鷥腿上劈精肉，",
   "蚊子腹內刳脂油。",
   "虧老先生下手！"
  ],
  "note": "極盡誇張之能事，把貪婪諷刺到了骨頭裡。"
 },
 {
  "title": "雙調・折桂令・春情",
  "author": "元・徐再思",
  "body": [
   "平生不會相思，才會相思，便害相思。",
   "身似浮雲，心如飛絮，氣若游絲。",
   "空一縷餘香在此，盼千金遊子何之。",
   "證候來時，正是何時？燈半昏時，月半明時。"
  ],
  "note": "才學會相思便害了相思病，愛情從來不講道理。"
 },
 {
  "title": "中呂・喜春來・春宴",
  "author": "元・元好問",
  "body": [
   "春盤宜剪三生菜，春燕斜簪七寶釵。",
   "春風春醞透人懷。",
   "春宴排，齊唱喜春來。"
  ],
  "note": "滿篇皆春，歡快得讓人忘記了憂愁。"
 },
 {
  "title": "雙調・殿前歡・對菊自嘆",
  "author": "元・張養浩",
  "body": [
   "可憐秋，一簾疏雨暗西樓。",
   "黃花零落重陽後，減盡風流。",
   "對黃花人自羞，花依舊，人比黃花瘦。",
   "問花不語，花替人愁。"
  ],
  "note": "花不語卻替人愁，秋菊有情人自知。"
 },
 {
  "title": "越調・天淨沙・江上",
  "author": "元・張可久",
  "body": [
   "嗈嗈落雁平沙，依依孤鶩殘霞。",
   "隔水疏林幾家。",
   "小舟如畫，漁歌唱入蘆花。"
  ],
  "note": "小舟漁歌蘆花，江上的安寧令人嚮往。"
 },
 {
  "title": "中呂・賣花聲・懷古",
  "author": "元・張可久",
  "body": [
   "美人自刎烏江岸，戰火曾燒赤壁山，",
   "將軍空老玉門關。",
   "傷心秦漢，生民塗炭。",
   "讀書人一聲長嘆！"
  ],
  "note": "讀書人面對歷史只能長嘆，蒼生之苦無人能解。"
 },
 {
  "title": "雙調・水仙子・詠江南",
  "author": "元・張養浩",
  "body": [
   "一江煙水照晴嵐，兩岸人家接畫簷，",
   "芰荷叢一段秋光淡。",
   "看沙鷗舞再三，卷香風十里珠簾。",
   "畫船兒天邊至，酒旗兒風外颭。",
   "愛殺江南！"
  ],
  "note": "煙水晴嵐畫簷珠簾，怎能不愛江南。"
 },
 {
  "title": "正宮・端正好・上高監司",
  "author": "元・劉時中",
  "body": [
   "衰柳枯楊映水灣，鏡兒中只見顏容換。",
   "嘆年華如箭嗖嗖去，恨世事如棋著著難。"
  ],
  "note": "鏡中人漸老，世事如棋步步難行。"
 },
 {
  "title": "般涉調・哨遍・高祖還鄉",
  "author": "元・睢景臣",
  "body": [
   "社長排門告示，但有的差使無推故。",
   "你頭上全無一個字，要做官須用讀書。",
   "",
   "只道劉三誰肯把你揪撏住？",
   "白甚麼改了姓、更了名、喚做漢高祖！"
  ],
  "note": "用鄉民的視角戲謔帝王，是元曲最大膽的幽默。"
 },
 {
  "title": "越調・憑闌人・金陵道中",
  "author": "元・喬吉",
  "body": [
   "瘦馬馱詩天一涯，倦鳥呼愁村數家。",
   "撲頭飛柳花，與人添鬢華。"
  ],
  "note": "瘦馬馱詩走天涯，是元代文人最典型的形象。"
 },
 {
  "title": "雙調・蟾宮曲・嘆世",
  "author": "元・馬致遠",
  "body": [
   "東籬半世蹉跎，竹里遊亭，小宇婆娑。",
   "一枕清風，半輪明月，臥看嫦娥。",
   "有客至可人無多，無客至省氣如何。",
   "只是天公，莫把愁來，與我分些。"
  ],
  "note": "半輪明月一枕清風，隱士的快意在於無所求。"
 },
 {
  "title": "越調・小桃紅・秋江",
  "author": "元・倪瓚",
  "body": [
   "一江秋水澹無光，耐可漁人傍。",
   "幾曲風蒲空自香，月明藏，數枝漁火殘燈亮。",
   "疏林外，何處一聲蟲響？"
  ],
  "note": "秋江月夜蟲聲一響，寂靜便有了形狀。"
 },
 {
  "title": "中呂・山坡羊",
  "author": "元・陳草庵",
  "body": [
   "晨雞初叫，昏鴉爭噪，那個不去紅塵鬧？",
   "路遙遙，水迢迢，功名盡在長安道。",
   "今日少年明日老。",
   "山，依舊好；人，憔悴了。"
  ],
  "note": "山依舊好人卻老了，追名逐利不如看山。"
 },
 {
  "title": "雙調・蟾宮曲・春情",
  "author": "元・商挺",
  "body": [
   "平生不會相思，偏有相思愁。",
   "黃昏月上小樓，倚遍闌干十二。",
   "恨薄情一去，音書兩處閑。",
   "今古別離難。"
  ],
  "note": "倚遍十二欄杆，等不來一封書信。"
 },
 {
  "title": "雙調・折桂令・登姑蘇臺",
  "author": "元・喬吉",
  "body": [
   "倚欄桿螺髻遙山。",
   "水際巉巖，日落魚竿。",
   "千古興亡，百年悲笑，一時登覽。",
   "問曾經桃李無言，這魚龍寂寞秋江冷。"
  ],
  "note": "千古興亡在一次登覽中盡收眼底。"
 },
 {
  "title": "中呂・朝天子・詠喇叭",
  "author": "明・王磐",
  "body": [
   "喇叭，嗩吶，曲兒小腔兒大。",
   "官船來往亂如麻，全仗你抬聲價。",
   "軍聽了軍愁，民聽了民怕。",
   "哪裏去辨甚麼真共假？",
   "眼見的吹翻了這家，吹傷了那家，",
   "只吹的水盡鵝飛罷！"
  ],
  "note": "小小喇叭吹盡民脂民膏，諷刺入骨三分。"
 },
 {
  "title": "石灰吟",
  "author": "明・于謙",
  "body": [
   "千錘萬鑿出深山，烈火焚燒若等閒。",
   "粉骨碎身渾不怕，要留清白在人間。"
  ],
  "note": "粉身碎骨也要留清白，是為官者最高的節操。"
 },
 {
  "title": "詠煤炭",
  "author": "明・于謙",
  "body": [
   "鑿開混沌得烏金，藏蓄陽和意最深。",
   "爝火燃回春浩浩，洪爐照破夜沉沉。",
   "鼎彝元賴生成力，鐵石猶存死後心。",
   "但願蒼生俱飽暖，不辭辛苦出山林。"
  ],
  "note": "但願蒼生俱飽暖，是最質樸的為民情懷。"
 },
 {
  "title": "入京",
  "author": "明・于謙",
  "body": [
   "絹帕蘑菇與線香，本資民用反為殃。",
   "清風兩袖朝天去，免得閭閻話短長。"
  ],
  "note": "兩袖清風入京城，是千古廉吏的典範。"
 },
 {
  "title": "登金陵雨花臺望大江",
  "author": "明・高啟",
  "body": [
   "大江來從萬山中，山勢盡與江流東。",
   "鍾山如龍獨西上，欲破巨浪乘長風。",
   "江山相雄不相讓，形勝爭誇天下壯。",
   "秦皇空此瘞黃金，佳氣蔥蔥至今王。",
   "我懷鬱塞何由開，酒酣走上城南臺。",
   "坐覺蒼茫萬古意，遠自荒煙落日之中來。"
  ],
  "note": "大江東去鍾山西上，金陵的氣勢令人胸懷大開。"
 },
 {
  "title": "尋胡隱君",
  "author": "明・高啟",
  "body": [
   "渡水復渡水，看花還看花。",
   "春風江上路，不覺到君家。"
  ],
  "note": "一路看花不知不覺就到了，最好的拜訪不在目的地。"
 },
 {
  "title": "梅花九首（其一）",
  "author": "明・高啟",
  "body": [
   "瓊姿只合在瑤臺，誰向江南處處栽？",
   "雪滿山中高士臥，月明林下美人來。",
   "寒依疏影蕭蕭竹，春掩殘香漠漠苔。",
   "自去何郎無好詠，東風愁寂幾回開。"
  ],
  "note": "雪中高士月下美人，梅花的兩種風骨盡在其中。"
 },
 {
  "title": "青丘子歌",
  "author": "明・高啟",
  "body": [
   "青丘子，瘦如鶴，短蓑長箭落魄。",
   "白眼望青天，時復一中矢。",
   "醉來幽興有誰知？朝吟暮醉總是詩。",
   "不肯折腰為五斗，寧可長飢到白頭。"
  ],
  "note": "不折腰寧長飢，是文人最硬的骨頭。"
 },
 {
  "title": "桃花庵歌",
  "author": "明・唐寅",
  "body": [
   "桃花塢裏桃花庵，桃花庵下桃花仙。",
   "桃花仙人種桃樹，又摘桃花換酒錢。",
   "酒醒只在花前坐，酒醉還來花下眠。",
   "半醒半醉日復日，花落花開年復年。",
   "但願老死花酒間，不願鞠躬車馬前。",
   "車塵馬足富者趣，酒盞花枝貧者緣。",
   "若將富貴比貧者，一在平地一在天。",
   "若將貧賤比車馬，他得驅馳我得閒。",
   "別人笑我太瘋癲，我笑他人看不穿。",
   "不見五陵豪傑墓，無花無酒鋤作田。"
  ],
  "note": "半醉半醒花酒間，看似瘋癲實是看穿了人生。"
 },
 {
  "title": "一剪梅・雨打梨花深閉門",
  "author": "明・唐寅",
  "body": [
   "雨打梨花深閉門，忘了青春，誤了青春。",
   "賞心樂事共誰論？花下銷魂，月下銷魂。",
   "",
   "愁聚眉峰盡日顰，千點啼痕，萬點啼痕。",
   "曉看天色暮看雲，行也思君，坐也思君。"
  ],
  "note": "行也思君坐也思君，無時無刻不在想你。"
 },
 {
  "title": "把酒對月歌",
  "author": "明・唐寅",
  "body": [
   "李白前時原有月，惟有李白詩能說。",
   "李白如今已仙去，月在青天幾圓缺？",
   "今人猶歌李白詩，明月還如李白時。",
   "我學李白對明月，白與明月安能知！",
   "李白能詩復能酒，我今百杯復千首。",
   "我愧雖無李白才，料應月不嫌我醜。",
   "我也不登天子船，我也不上長安眠。",
   "姑蘇城外一茅屋，萬樹桃花月滿天。"
  ],
  "note": "不登天子船不上長安眠，桃花月下自逍遙。"
 },
 {
  "title": "言志",
  "author": "明・唐寅",
  "body": [
   "不鍊金丹不坐禪，不為商賈不耕田。",
   "閒來寫就青山賣，不使人間造孽錢。"
  ],
  "note": "賣畫為生不染塵俗，是文人最體面的謀生。"
 },
 {
  "title": "臨江仙・滾滾長江東逝水",
  "author": "明・楊慎",
  "body": [
   "滾滾長江東逝水，浪花淘盡英雄。",
   "是非成敗轉頭空。",
   "青山依舊在，幾度夕陽紅。",
   "",
   "白髮漁樵江渚上，慣看秋月春風。",
   "一壺濁酒喜相逢。",
   "古今多少事，都付笑談中。"
  ],
  "note": "是非成敗轉頭空，看盡歷史的人最懂釋然。"
 },
 {
  "title": "竹枝詞",
  "author": "明・楊慎",
  "body": [
   "錦城絲管日紛紛，半入江風半入雲。",
   "滇海月明來照客，蜀天晴好似迎君。"
  ],
  "note": "從蜀地到滇南，月光和鄉愁一路相隨。"
 },
 {
  "title": "泛太湖",
  "author": "明・王鏊",
  "body": [
   "長風掛席出江津，極目平湖萬頃新。",
   "漁火有時明暗浦，蘆花無數亂秋汀。",
   "龜山欲暝雲猶積，鼋瀆初晴浪未平。",
   "好是夕陽凝睇處，殘霞一片繞空青。"
  ],
  "note": "太湖萬頃波光，殘霞映空青，美到忘歸。"
 },
 {
  "title": "瀑布",
  "author": "明・楊慎",
  "body": [
   "萬里水從天上來，亂雲飛雪噴成堆。",
   "夕陽映著銀河落，彷彿仙人挂玉杯。"
  ],
  "note": "瀑布如銀河倒掛，大自然的壯麗不需矯飾。"
 },
 {
  "title": "教條示龍場諸生",
  "author": "明・王守仁",
  "body": [
   "險夷原不滯胸中，何異浮雲過太空。",
   "夜靜海濤三萬里，月明飛錫下天風。"
  ],
  "note": "險夷如浮雲過太空，心學大師的胸懷無礙。"
 },
 {
  "title": "泛海",
  "author": "明・王守仁",
  "body": [
   "險夷原不滯胸中，何異浮雲過太空。",
   "夜靜海濤三萬里，月明飛錫下天風。"
  ],
  "note": "三萬里海濤在月光下不過是心中一片清明。"
 },
 {
  "title": "春日花園雜詠",
  "author": "明・王守仁",
  "body": [
   "焚香默坐草堂中，一縷氤氳透碧空。",
   "吾道自來通萬物，何須更問雨和風。"
  ],
  "note": "心通萬物，便不必在乎外在的風雨。"
 },
 {
  "title": "別諸生",
  "author": "明・王守仁",
  "body": [
   "綿綿聖學已千秋，兩字良知是血酬。",
   "萬里風波歸夢遠，一山花草入吟幽。",
   "天池浮雲變古今，風竹清陰正好留。"
  ],
  "note": "良知二字是千秋聖學的精髓。"
 },
 {
  "title": "滿井遊記（節選）",
  "author": "明・袁宏道",
  "body": [
   "廿二日天稍和，偕數友出東直，至滿井。",
   "高柳夾堤，土膏微潤，一望空闊，若脫籠之鵠。",
   "",
   "山巒為晴雪所洗，娟然如拭，鮮妍明媚，",
   "如倩女之靧面而髻鬟之始掠也。"
  ],
  "note": "早春的山巒如洗面的少女，清新得令人心動。"
 },
 {
  "title": "西湖雜詩",
  "author": "明・袁宏道",
  "body": [
   "修眉斂黛對春愁，碧水紅蓮引客留。",
   "半是煙霞半是夢，一船明月一船秋。"
  ],
  "note": "一船明月一船秋，西湖的美在半夢半醒之間。"
 },
 {
  "title": "戲題齋壁",
  "author": "明・袁宏道",
  "body": [
   "了知身是患中身，始悟閒為天下珍。",
   "萬事不如身處好，一生能有幾回真。"
  ],
  "note": "一生能有幾回真，閒暇才是人間至寶。"
 },
 {
  "title": "春暮西園",
  "author": "明・高攀龍",
  "body": [
   "綠池芳草滿晴波，春色都從雨裏過。",
   "知是人家花落盡，菜畦今日蝶來多。"
  ],
  "note": "花謝蝶去菜畦來，春天自有替補的美。"
 },
 {
  "title": "絕句",
  "author": "明・夏完淳",
  "body": [
   "揚鞭慷慨蒞中原，不為仇讎不為恩。",
   "只覺蒼天方憒憒，莫教奇禍到忠門。"
  ],
  "note": "少年英雄慷慨赴義，十七歲的忠魂令人動容。"
 },
 {
  "title": "別雲間",
  "author": "明・夏完淳",
  "body": [
   "三年羈旅客，今日又南冠。",
   "無限山河淚，誰言天地寬！",
   "已知泉路近，欲別故鄉難。",
   "毅魄歸來日，靈旗空際看。"
  ],
  "note": "毅魄歸來靈旗空際看，是少年殉國的壯烈。"
 },
 {
  "title": "秋望",
  "author": "明・李夢陽",
  "body": [
   "黃河水繞漢宮牆，河上秋風雁幾行。",
   "客子過壕追野馬，將軍韜箭射天狼。",
   "黃塵古渡迷飛挽，白月橫空冷戰場。",
   "聞道朔方多勇略，只今誰是郭汾陽。"
  ],
  "note": "秋風古渡冷戰場，邊塞的蒼涼呼喚英雄。"
 },
 {
  "title": "詠月",
  "author": "明・李夢陽",
  "body": [
   "碧落銀盤掛玉鉤，清光無限照神州。",
   "不知天上為何事，又到人間一度秋。"
  ],
  "note": "月亮每年照一回秋，人間的變與不變都在其光中。"
 },
 {
  "title": "竹",
  "author": "明・劉基",
  "body": [
   "落盡群花獨自芳，紅塵不到臥雲房。",
   "挺身自有凌雲節，卻恥隨風作柳狂。"
  ],
  "note": "竹有凌雲之節卻不隨風搖擺，是君子的寫照。"
 },
 {
  "title": "絕句",
  "author": "明・劉基",
  "body": [
   "人生無百歲，百歲復如何？",
   "古來英雄士，各已歸山河。"
  ],
  "note": "英雄終歸山河，何必執著於百歲之齡。"
 },
 {
  "title": "賣柑者言（節選）",
  "author": "明・劉基",
  "body": [
   "觀其坐高堂，騎大馬，醉醇醴而飫肥鮮者，",
   "孰不巍巍乎可畏，赫赫乎可象也？",
   "又何往而不金玉其外，敗絮其中也哉！"
  ],
  "note": "金玉其外敗絮其中，是對虛偽權貴最辛辣的諷刺。"
 },
 {
  "title": "題墨葡萄詩",
  "author": "明・徐渭",
  "body": [
   "半生落魄已成翁，獨立書齋嘯晚風。",
   "筆底明珠無處賣，閒拋閒擲野藤中。"
  ],
  "note": "滿腹才華無人識，只能拋擲在野藤之間。"
 },
 {
  "title": "秋興八首（其一）",
  "author": "明・王世貞",
  "body": [
   "西風吹客上高樓，目盡秋光不自由。",
   "萬里長城今尚在，不見當年秦始皇。"
  ],
  "note": "長城尚在建造者已逝，一切功業終抵不過時光。"
 },
 {
  "title": "湖上雜詩",
  "author": "明・袁宏道",
  "body": [
   "葛嶺花開二月天，遊人來往說神仙。",
   "老夫心與遊人異，不羨神仙羨少年。"
  ],
  "note": "不羨神仙羨少年，最真實的感慨莫過於此。"
 },
 {
  "title": "過文信國祠同舟中諸公",
  "author": "明・陳子龍",
  "body": [
   "愁風逆雨千年淚，碧草荒煙一片心。",
   "只道丹心能報國，不知末路有知音。"
  ],
  "note": "丹心報國至末路，才知誰是真知音。"
 },
 {
  "title": "馬上作",
  "author": "明・戚繼光",
  "body": [
   "南北驅馳報主情，江花邊草笑平生。",
   "一年三百六十日，多是橫戈馬上行。"
  ],
  "note": "三百六十日橫戈馬上，是將軍最孤獨的忠誠。"
 },
 {
  "title": "望闕臺",
  "author": "明・戚繼光",
  "body": [
   "十年驅馳海色寒，孤臣於此望宸鸞。",
   "繁霜盡是心頭血，灑向千峰秋葉丹。"
  ],
  "note": "繁霜是心頭血灑成秋葉丹，忠臣的赤誠染紅了山川。"
 },
 {
  "title": "詠竹",
  "author": "明・鄭板橋",
  "body": [
   "一節復一節，千枝攢萬葉。",
   "我自不開花，免撩蜂與蝶。"
  ],
  "note": "不開花免撩蜂蝶，竹子的高潔在於不招搖。"
 },
 {
  "title": "出塞",
  "author": "明・戚繼光",
  "body": [
   "萬里腰間帶吳鉤，男兒無處不封侯。",
   "年年戰骨埋荒外，空見蒲桃入漢家。"
  ],
  "note": "年年戰骨埋荒外，邊功的代價是無數將士的白骨。"
 },
 {
  "title": "燕子樓",
  "author": "明・文徵明",
  "body": [
   "鈿帶羅衫色似煙，幾回欲去又流連。",
   "傷心一覺繁華夢，人在燕子樓中天。"
  ],
  "note": "繁華一夢醒來，人還在舊樓中守著舊時月光。"
 },
 {
  "title": "除夕",
  "author": "明・文徵明",
  "body": [
   "人家除夕正忙時，我自挑燈揀舊詩。",
   "莫笑書生太迂闊，一年功事是文詞。"
  ],
  "note": "除夕夜別人忙年，書生卻在挑燈揀詩，可敬也可嘆。"
 },
 {
  "title": "感事",
  "author": "明・袁枚",
  "body": [
   "天道何曾盡苦辛，成名原自有前因。",
   "春風得意馬蹄疾，一日看盡長安花。"
  ],
  "note": "春風得意時莫忘曾經的辛苦。"
 },
 {
  "title": "夜歸鹿門歌",
  "author": "明・何景明",
  "body": [
   "山寺鐘鳴晝已昏，漁梁渡頭爭渡喧。",
   "人隨沙路向江村，余亦乘舟歸鹿門。",
   "鹿門月照開煙樹，忽到龐公棲隱處。",
   "巖扉松徑長寂寥，惟有幽人自來去。"
  ],
  "note": "鹿門山月照開煙樹，隱者的世界只有自己。"
 },
 {
  "title": "秋柳四首（其一）",
  "author": "清・王士禛",
  "body": [
   "秋來何處最銷魂？殘照西風白下門。",
   "他日差池春燕影，只今憔悴晚煙痕。",
   "愁生陌上黃驄曲，夢遠江南烏夜村。",
   "莫聽臨風三弄笛，玉關哀怨總難論。"
  ],
  "note": "秋柳憔悴如人，銷魂處是時光的無情。"
 },
 {
  "title": "木蘭花・擬古決絕詞",
  "author": "清・納蘭性德",
  "body": [
   "人生若只如初見，何事秋風悲畫扇。",
   "等閒變卻故人心，卻道故人心易變。",
   "",
   "驪山語罷清宵半，淚雨零鈴終不怨。",
   "何如薄倖錦衣郎，比翼連枝當日願。"
  ],
  "note": "人生若只如初見，所有的遺憾都始於變心。"
 },
 {
  "title": "長相思",
  "author": "清・納蘭性德",
  "body": [
   "山一程，水一程，身向榆關那畔行，夜深千帳燈。",
   "",
   "風一更，雪一更，聒碎鄉心夢不成，故園無此聲。"
  ],
  "note": "山水千程雪風千更，故園的安靜是最深的鄉愁。"
 },
 {
  "title": "浣溪沙・誰念西風獨自涼",
  "author": "清・納蘭性德",
  "body": [
   "誰念西風獨自涼，蕭蕭黃葉閉疏窗。沉思往事立殘陽。",
   "",
   "被酒莫驚春睡重，賭書消得潑茶香。當時只道是尋常。"
  ],
  "note": "當時只道是尋常，失去後才知那是最珍貴的日常。"
 },
 {
  "title": "浣溪沙・殘雪凝輝冷畫屏",
  "author": "清・納蘭性德",
  "body": [
   "殘雪凝輝冷畫屏，落梅橫笛已三更，更無人處月朧明。",
   "",
   "我是人間惆悵客，知君何事淚縱橫，斷腸聲裏憶平生。"
  ],
  "note": "我是人間惆悵客，納蘭的一生都在這句話裡。"
 },
 {
  "title": "蝶戀花・出塞",
  "author": "清・納蘭性德",
  "body": [
   "今古河山無定據，畫角聲中，牧馬頻來去。",
   "滿目荒涼誰可語？西風吹老丹楓樹。",
   "",
   "從前幽怨應無數，鐵馬金戈，青塚黃昏路。",
   "一往情深深幾許？深山夕照深秋雨。"
  ],
  "note": "一往情深深幾許——深山夕照深秋雨，三個深字道盡深情。"
 },
 {
  "title": "畫堂春",
  "author": "清・納蘭性德",
  "body": [
   "一生一代一雙人，爭教兩處銷魂。",
   "相思相望不相親，天為誰春。",
   "",
   "漿向藍橋易乞，藥成碧海難奔。",
   "若容相訪飲牛津，相對忘貧。"
  ],
  "note": "一生一代一雙人，最簡單的願望卻最難實現。"
 },
 {
  "title": "虞美人",
  "author": "清・納蘭性德",
  "body": [
   "銀床淅瀝青梧老，屧粉秋蛩掃。",
   "采香行處蹙連錢，拾得翠翹何恨不能言。",
   "",
   "迴廊一寸相思地，落月成孤倚。",
   "背燈和月就花陰，已是十年蹤跡十年心。"
  ],
  "note": "十年蹤跡十年心，歲月不曾沖淡半分思念。"
 },
 {
  "title": "南鄉子・為亡婦題照",
  "author": "清・納蘭性德",
  "body": [
   "淚咽卻無聲，只向從前悔薄情。",
   "憑仗丹青重省識，盈盈。一片傷心畫不成。",
   "",
   "別語忒分明，午夜鶼鶼夢早醒。",
   "卿自早醒儂自夢，更更。泣盡風檐夜雨鈴。"
  ],
  "note": "一片傷心畫不成，悼亡之痛連丹青都承載不了。"
 },
 {
  "title": "如夢令",
  "author": "清・納蘭性德",
  "body": [
   "萬帳穹廬人醉，星影搖搖欲墜。",
   "歸夢隔狼河，又被河聲攪碎。",
   "還睡，還睡，解道醒來無味。"
  ],
  "note": "醒來無味不如醉睡，塞外的思鄉太苦了。"
 },
 {
  "title": "菩薩蠻",
  "author": "清・納蘭性德",
  "body": [
   "朔風吹散三更雪，倩魂猶戀桃花月。",
   "夢好莫催醒，由他好處行。",
   "",
   "無端聽畫角，枕畔紅冰薄。",
   "塞馬一聲嘶，殘星拂大旗。"
  ],
  "note": "夢好莫催醒，醒來只有朔風殘星。"
 },
 {
  "title": "己亥雜詩（其五）",
  "author": "清・龔自珍",
  "body": [
   "浩蕩離愁白日斜，吟鞭東指即天涯。",
   "落紅不是無情物，化作春泥更護花。"
  ],
  "note": "落紅化春泥護花，離去也是另一種奉獻。"
 },
 {
  "title": "己亥雜詩（其一二五）",
  "author": "清・龔自珍",
  "body": [
   "九州生氣恃風雷，萬馬齊喑究可哀。",
   "我勸天公重抖擻，不拘一格降人才。"
  ],
  "note": "萬馬齊喑的時代最需要破格的人才。"
 },
 {
  "title": "己亥雜詩（其二二〇）",
  "author": "清・龔自珍",
  "body": [
   "少年擊劍更吹簫，劍氣簫心一例消。",
   "誰分蒼涼歸棹後，萬千哀樂集今朝。"
  ],
  "note": "劍氣與簫心都消磨在歲月裡，只剩萬千哀樂。"
 },
 {
  "title": "己亥雜詩（其八十三）",
  "author": "清・龔自珍",
  "body": [
   "只籌一纜十夫多，細算千艘渡此河。",
   "我亦曾糜太倉粟，夜聞邪許淚滂沱。"
  ],
  "note": "吃著國家俸祿卻聽見纖夫號子，愧疚之心溢於言表。"
 },
 {
  "title": "詠史",
  "author": "清・龔自珍",
  "body": [
   "金粉東南十五州，萬重恩怨屬名流。",
